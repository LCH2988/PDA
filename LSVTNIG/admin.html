<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社團管理後台</title>
  <style>
    /* ═══════════════════════════════════════════
       CSS 變數 & Reset
    ═══════════════════════════════════════════ */
    :root {
      --primary    : #1DB446;
      --primary-dk : #178a38;
      --primary-lt : #e8f8ed;
      --danger     : #e74c3c;
      --warning    : #f39c12;
      --info       : #3498db;
      --dark       : #2c3e50;
      --gray       : #95a5a6;
      --light      : #f4f6f8;
      --white      : #ffffff;
      --border     : #dde1e7;
      --shadow     : 0 2px 12px rgba(0,0,0,.08);
      --radius     : 10px;
      --sidebar-w  : 240px;
      --topbar-h   : 60px;
      --transition : .25s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background : var(--light);
      color      : var(--dark);
      min-height : 100vh;
      display    : flex;
    }

    /* ═══════════════════════════════════════════
       側邊欄
    ═══════════════════════════════════════════ */
    #sidebar {
      width      : var(--sidebar-w);
      min-height : 100vh;
      background : var(--dark);
      display    : flex;
      flex-direction: column;
      position   : fixed;
      top: 0; left: 0;
      z-index    : 100;
      transition : transform var(--transition);
    }
    #sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }

    .sidebar-logo {
      padding    : 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      display    : flex;
      align-items: center;
      gap        : 10px;
    }
    .sidebar-logo .logo-icon {
      width: 36px; height: 36px;
      background : var(--primary);
      border-radius: 8px;
      display    : flex;
      align-items: center;
      justify-content: center;
      font-size  : 18px;
    }
    .sidebar-logo .logo-text {
      color      : var(--white);
      font-size  : 15px;
      font-weight: 700;
      line-height: 1.3;
    }
    .sidebar-logo .logo-sub {
      color      : var(--gray);
      font-size  : 11px;
    }

    .sidebar-nav {
      flex       : 1;
      overflow-y : auto;
      padding    : 12px 0;
    }
    .nav-section-title {
      color      : rgba(255,255,255,.35);
      font-size  : 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding    : 16px 20px 6px;
    }
    .nav-item {
      display    : flex;
      align-items: center;
      gap        : 10px;
      padding    : 11px 20px;
      color      : rgba(255,255,255,.7);
      cursor     : pointer;
      border-left: 3px solid transparent;
      transition : all var(--transition);
      font-size  : 14px;
      user-select: none;
    }
    .nav-item:hover {
      background : rgba(255,255,255,.06);
      color      : var(--white);
    }
    .nav-item.active {
      background : rgba(29,180,70,.15);
      color      : var(--primary);
      border-left-color: var(--primary);
      font-weight: 600;
    }
    .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background : var(--danger);
      color      : var(--white);
      font-size  : 10px;
      font-weight: 700;
      padding    : 1px 6px;
      border-radius: 10px;
      min-width  : 18px;
      text-align : center;
    }

    .sidebar-footer {
      padding    : 16px;
      border-top : 1px solid rgba(255,255,255,.1);
    }
    .admin-info {
      display    : flex;
      align-items: center;
      gap        : 10px;
    }
    .admin-avatar {
      width: 34px; height: 34px;
      background : var(--primary);
      border-radius: 50%;
      display    : flex;
      align-items: center;
      justify-content: center;
      font-size  : 16px;
      color      : var(--white);
      flex-shrink: 0;
    }
    .admin-name  { color: var(--white); font-size: 13px; font-weight: 600; }
    .admin-role  { color: var(--gray);  font-size: 11px; }

    /* ═══════════════════════════════════════════
       主內容區
    ═══════════════════════════════════════════ */
    #main-wrap {
      margin-left: var(--sidebar-w);
      flex       : 1;
      display    : flex;
      flex-direction: column;
      min-height : 100vh;
      transition : margin var(--transition);
    }
    #main-wrap.expanded { margin-left: 0; }

    /* ── 頂部欄 ── */
    #topbar {
      height     : var(--topbar-h);
      background : var(--white);
      border-bottom: 1px solid var(--border);
      display    : flex;
      align-items: center;
      padding    : 0 24px;
      gap        : 12px;
      position   : sticky;
      top: 0;
      z-index    : 90;
      box-shadow : 0 1px 4px rgba(0,0,0,.06);
    }
    #menu-toggle {
      background : none;
      border     : none;
      font-size  : 20px;
      cursor     : pointer;
      color      : var(--dark);
      padding    : 4px 8px;
      border-radius: 6px;
      transition : background var(--transition);
    }
    #menu-toggle:hover { background: var(--light); }
    #page-title {
      font-size  : 16px;
      font-weight: 700;
      color      : var(--dark);
      flex       : 1;
    }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .topbar-btn {
      background : none;
      border     : 1px solid var(--border);
      border-radius: 8px;
      padding    : 6px 14px;
      font-size  : 13px;
      cursor     : pointer;
      color      : var(--dark);
      display    : flex;
      align-items: center;
      gap        : 6px;
      transition : all var(--transition);
    }
    .topbar-btn:hover { background: var(--light); border-color: var(--gray); }
    .topbar-btn.primary {
      background : var(--primary);
      border-color: var(--primary);
      color      : var(--white);
    }
    .topbar-btn.primary:hover { background: var(--primary-dk); }

    /* ── 頁面內容 ── */
    #page-content {
      flex       : 1;
      padding    : 24px;
      overflow-x : hidden;
    }

    /* ═══════════════════════════════════════════
       通用元件
    ═══════════════════════════════════════════ */

    /* 統計卡片 */
    .stats-grid {
      display    : grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap        : 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background : var(--white);
      border-radius: var(--radius);
      padding    : 20px;
      box-shadow : var(--shadow);
      display    : flex;
      align-items: center;
      gap        : 16px;
      transition : transform var(--transition);
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      display    : flex;
      align-items: center;
      justify-content: center;
      font-size  : 22px;
      flex-shrink: 0;
    }
    .stat-icon.green  { background: var(--primary-lt); }
    .stat-icon.blue   { background: #e8f4fd; }
    .stat-icon.orange { background: #fef5e7; }
    .stat-icon.red    { background: #fdecea; }
    .stat-icon.purple { background: #f3e8fd; }
    .stat-value { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .stat-sub   { font-size: 11px; color: var(--primary); margin-top: 2px; }

    /* 卡片 */
    .card {
      background : var(--white);
      border-radius: var(--radius);
      box-shadow : var(--shadow);
      margin-bottom: 20px;
      overflow   : hidden;
    }
    .card-header {
      padding    : 16px 20px;
      border-bottom: 1px solid var(--border);
      display    : flex;
      align-items: center;
      justify-content: space-between;
      gap        : 12px;
    }
    .card-title {
      font-size  : 15px;
      font-weight: 700;
      display    : flex;
      align-items: center;
      gap        : 8px;
    }
    .card-body  { padding: 20px; }

    /* 表格 */
    .table-wrap { overflow-x: auto; }
    table {
      width      : 100%;
      border-collapse: collapse;
      font-size  : 13px;
    }
    thead th {
      background : var(--light);
      padding    : 10px 14px;
      text-align : left;
      font-weight: 700;
      color      : var(--dark);
      white-space: nowrap;
      border-bottom: 2px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background var(--transition); }
    tbody tr:hover { background: var(--primary-lt); }
    tbody td { padding: 10px 14px; vertical-align: middle; }
    tbody tr:last-child { border-bottom: none; }

    /* 徽章 */
    .badge {
      display    : inline-block;
      padding    : 2px 10px;
      border-radius: 20px;
      font-size  : 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-green  { background: #d4edda; color: #155724; }
    .badge-red    { background: #f8d7da; color: #721c24; }
    .badge-yellow { background: #fff3cd; color: #856404; }
    .badge-blue   { background: #d1ecf1; color: #0c5460; }
    .badge-gray   { background: #e2e3e5; color: #383d41; }
    .badge-purple { background: #e2d9f3; color: #4a235a; }
    .badge-orange { background: #fde8d0; color: #7d3c00; }

    /* 按鈕 */
    .btn {
      display    : inline-flex;
      align-items: center;
      gap        : 5px;
      padding    : 7px 16px;
      border-radius: 7px;
      border     : none;
      font-size  : 13px;
      font-weight: 600;
      cursor     : pointer;
      transition : all var(--transition);
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: var(--white); }
    .btn-primary:hover { background: var(--primary-dk); }
    .btn-danger  { background: var(--danger);  color: var(--white); }
    .btn-danger:hover  { background: #c0392b; }
    .btn-warning { background: var(--warning); color: var(--white); }
    .btn-warning:hover { background: #e08e0b; }
    .btn-info    { background: var(--info);    color: var(--white); }
    .btn-info:hover    { background: #2980b9; }
    .btn-outline {
      background : transparent;
      border     : 1px solid var(--border);
      color      : var(--dark);
    }
    .btn-outline:hover { background: var(--light); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-xs { padding: 2px 8px;  font-size: 11px; }

    /* 表單 */
    .form-group { margin-bottom: 16px; }
    .form-label {
      display    : block;
      font-size  : 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color      : var(--dark);
    }
    .form-label .req { color: var(--danger); margin-left: 2px; }
    .form-control {
      width      : 100%;
      padding    : 9px 12px;
      border     : 1px solid var(--border);
      border-radius: 7px;
      font-size  : 13px;
      color      : var(--dark);
      background : var(--white);
      transition : border-color var(--transition), box-shadow var(--transition);
      outline    : none;
    }
    .form-control:focus {
      border-color: var(--primary);
      box-shadow : 0 0 0 3px rgba(29,180,70,.15);
    }
    select.form-control { cursor: pointer; }
    textarea.form-control { resize: vertical; min-height: 80px; }
    .form-row {
      display    : grid;
      grid-template-columns: 1fr 1fr;
      gap        : 16px;
    }
    .form-row-3 {
      display    : grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap        : 16px;
    }

    /* 搜尋列 */
    .search-bar {
      display    : flex;
      gap        : 10px;
      align-items: center;
      flex-wrap  : wrap;
      margin-bottom: 16px;
    }
    .search-input-wrap {
      position   : relative;
      flex       : 1;
      min-width  : 200px;
    }
    .search-input-wrap .search-icon {
      position   : absolute;
      left: 10px; top: 50%;
      transform  : translateY(-50%);
      color      : var(--gray);
      font-size  : 14px;
    }
    .search-input-wrap input {
      width      : 100%;
      padding    : 8px 12px 8px 32px;
      border     : 1px solid var(--border);
      border-radius: 7px;
      font-size  : 13px;
      outline    : none;
      transition : border-color var(--transition);
    }
    .search-input-wrap input:focus { border-color: var(--primary); }

    /* Modal */
    .modal-overlay {
      display    : none;
      position   : fixed;
      inset      : 0;
      background : rgba(0,0,0,.45);
      z-index    : 200;
      align-items: center;
      justify-content: center;
      padding    : 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background : var(--white);
      border-radius: var(--radius);
      width      : 100%;
      max-width  : 600px;
      max-height : 90vh;
      display    : flex;
      flex-direction: column;
      box-shadow : 0 20px 60px rgba(0,0,0,.2);
      animation  : modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(.95) translateY(-10px); }
      to   { opacity: 1; transform: scale(1)  translateY(0); }
    }
    .modal-header {
      padding    : 18px 20px;
      border-bottom: 1px solid var(--border);
      display    : flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background : none;
      border     : none;
      font-size  : 20px;
      cursor     : pointer;
      color      : var(--gray);
      line-height: 1;
      padding    : 2px 6px;
      border-radius: 4px;
    }
    .modal-close:hover { background: var(--light); color: var(--dark); }
    .modal-body {
      padding    : 20px;
      overflow-y : auto;
      flex       : 1;
    }
    .modal-footer {
      padding    : 14px 20px;
      border-top : 1px solid var(--border);
      display    : flex;
      justify-content: flex-end;
      gap        : 10px;
    }

    /* Toast 通知 */
    #toast-container {
      position   : fixed;
      bottom     : 24px;
      right      : 24px;
      z-index    : 999;
      display    : flex;
      flex-direction: column;
      gap        : 10px;
    }
    .toast {
      background : var(--dark);
      color      : var(--white);
      padding    : 12px 18px;
      border-radius: 8px;
      font-size  : 13px;
      box-shadow : 0 4px 16px rgba(0,0,0,.2);
      display    : flex;
      align-items: center;
      gap        : 10px;
      animation  : toastIn .3s ease;
      min-width  : 220px;
      max-width  : 360px;
    }
    .toast.success { border-left: 4px solid var(--primary); }
    .toast.error   { border-left: 4px solid var(--danger);  }
    .toast.warning { border-left: 4px solid var(--warning); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Loading */
    .loading-mask {
      display    : none;
      position   : fixed;
      inset      : 0;
      background : rgba(255,255,255,.7);
      z-index    : 300;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap        : 14px;
    }
    .loading-mask.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border     : 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation  : spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--gray); }

    /* 空狀態 */
    .empty-state {
      text-align : center;
      padding    : 48px 20px;
      color      : var(--gray);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .empty-text { font-size: 15px; margin-bottom: 6px; }
    .empty-state .empty-sub  { font-size: 13px; }

    /* 分頁 */
    .pagination {
      display    : flex;
      align-items: center;
      justify-content: center;
      gap        : 6px;
      padding    : 16px 0 0;
    }
    .page-btn {
      width: 32px; height: 32px;
      display    : flex;
      align-items: center;
      justify-content: center;
      border     : 1px solid var(--border);
      border-radius: 6px;
      cursor     : pointer;
      font-size  : 13px;
      transition : all var(--transition);
      background : var(--white);
      color      : var(--dark);
    }
    .page-btn:hover  { border-color: var(--primary); color: var(--primary); }
    .page-btn.active { background: var(--primary); border-color: var(--primary); color: var(--white); }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* RWD */
    @media (max-width: 768px) {
      #sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      #sidebar.mobile-open { transform: translateX(0); }
      #main-wrap { margin-left: 0; }
      .form-row, .form-row-3 { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      #page-content { padding: 16px; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* 頁面切換動畫 */
    .page-section { display: none; }
    .page-section.active {
      display  : block;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 圖表容器 */
    .chart-container {
      position   : relative;
      height     : 260px;
      width      : 100%;
    }

    /* 進度條 */
    .progress-bar-wrap {
      background : var(--light);
      border-radius: 10px;
      height     : 8px;
      overflow   : hidden;
      margin-top : 6px;
    }
    .progress-bar {
      height     : 100%;
      border-radius: 10px;
      background : var(--primary);
      transition : width .6s ease;
    }

    /* 標籤頁 */
    .tabs {
      display    : flex;
      gap        : 4px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
    }
    .tab-btn {
      padding    : 8px 18px;
      border     : none;
      background : none;
      font-size  : 13px;
      font-weight: 600;
      color      : var(--gray);
      cursor     : pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition : all var(--transition);
    }
    .tab-btn:hover  { color: var(--primary); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════
       側邊欄
  ═══════════════════════════════════════════ -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌸</div>
      <div>
        <div class="logo-text">社團管理系統</div>
        <div class="logo-sub">Admin Dashboard</div>
      </div>
    </div>

    <div class="sidebar-nav">
      <div class="nav-section-title">總覽</div>
      <div class="nav-item active" data-page="dashboard">
        <span class="nav-icon">📊</span> 儀表板
      </div>

      <div class="nav-section-title">會員管理</div>
      <div class="nav-item" data-page="members">
        <span class="nav-icon">👥</span> 會員列表
      </div>
      <div class="nav-item" data-page="fees">
        <span class="nav-icon">💳</span> 繳費管理
      </div>

      <div class="nav-section-title">活動管理</div>
      <div class="nav-item" data-page="events">
        <span class="nav-icon">📅</span> 活動列表
      </div>
      <div class="nav-item" data-page="registrations">
        <span class="nav-icon">📝</span> 報名管理
        <span class="nav-badge" id="badge-reg">0</span>
      </div>

      <div class="nav-section-title">志工管理</div>
      <div class="nav-item" data-page="volunteers">
        <span class="nav-icon">🙋</span> 志工列表
        <span class="nav-badge" id="badge-vol">0</span>
      </div>
      <div class="nav-item" data-page="tasks">
        <span class="nav-icon">📋</span> 任務管理
      </div>
      <div class="nav-item" data-page="hours">
        <span class="nav-icon">⏱</span> 時數記錄
      </div>

      <div class="nav-section-title">財務管理</div>
      <div class="nav-item" data-page="income">
        <span class="nav-icon">💰</span> 收入管理
      </div>
      <div class="nav-item" data-page="expense">
        <span class="nav-icon">💸</span> 支出管理
      </div>

      <div class="nav-section-title">其他功能</div>
      <div class="nav-item" data-page="store">
        <span class="nav-icon">🛍</span> 積分商城
      </div>
      <div class="nav-item" data-page="announcements">
        <span class="nav-icon">📢</span> 公告管理
      </div>
    </div>

    <div class="sidebar-footer">
      <div class="admin-info">
        <div class="admin-avatar">👑</div>
        <div>
          <div class="admin-name" id="admin-name-display">管理員</div>
          <div class="admin-role">系統管理員</div>
        </div>
      </div>
    </div>
  </nav>

  <!-- ═══════════════════════════════════════════
       主內容區
  ═══════════════════════════════════════════ -->
  <div id="main-wrap">

    <!-- 頂部欄 -->
    <header id="topbar">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div id="page-title">📊 儀表板</div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="refreshPage()">🔄 重新整理</button>
        <button class="topbar-btn primary" id="topbar-add-btn" onclick="openAddModal()" style="display:none">
          ＋ 新增
        </button>
      </div>
    </header>

    <!-- 頁面內容（各頁面 section 由 JS 動態注入） -->
    <main id="page-content">
      <!-- 動態內容區 -->
    </main>
  </div>

  <!-- ═══════════════════════════════════════════
       全域 Modal（動態內容）
  ═══════════════════════════════════════════ -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">標題</div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" id="modal-confirm-btn" onclick="confirmModal()">確認</button>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div id="toast-container"></div>

  <!-- Loading 遮罩 -->
  <div class="loading-mask" id="loading-mask">
    <div class="spinner"></div>
    <div class="loading-text">載入中...</div>
  </div>

  <!-- ═══════════════════════════════════════════
       JavaScript — 核心框架
  ═══════════════════════════════════════════ -->
  <script>
    /* ── 全域設定 ── */
    const CFG = {
      gasUrl   : 'https://script.google.com/macros/s/AKfycbzgVAelkImE5jUO1wC9yRA5yEfuOTVNNfcFYfz0-xVY4RrXmHlyj-XS4bHP1SCXgMtJlQ/exec',
      liffId   : '2001679903-r5VXNe5g',
      adminId  : 'Ua334bad3a531232d64480d9730797759',   // 登入後填入
    };

    /* ── 頁面路由表 ── */
    const PAGE_MAP = {
      dashboard     : { title: '📊 儀表板',   addBtn: false },
      members       : { title: '👥 會員列表', addBtn: true  },
      fees          : { title: '💳 繳費管理', addBtn: true  },
      events        : { title: '📅 活動列表', addBtn: true  },
      registrations : { title: '📝 報名管理', addBtn: false },
      volunteers    : { title: '🙋 志工列表', addBtn: true  },
      tasks         : { title: '📋 任務管理', addBtn: true  },
      hours         : { title: '⏱ 時數記錄', addBtn: true  },
      income        : { title: '💰 收入管理', addBtn: true  },
      expense       : { title: '💸 支出管理', addBtn: true  },
      store         : { title: '🛍 積分商城', addBtn: true  },
      announcements : { title: '📢 公告管理', addBtn: true  },
    };

    let currentPage    = 'dashboard';
    let modalConfirmFn = null;

    /* ── 側邊欄切換 ── */
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const mw = document.getElementById('main-wrap');
      if (window.innerWidth <= 768) {
        sb.classList.toggle('mobile-open');
      } else {
        sb.classList.toggle('collapsed');
        mw.classList.toggle('expanded');
      }
    }

    /* ── 頁面切換 ── */
    function navigateTo(page) {
      if (!PAGE_MAP[page]) return;
      currentPage = page;

      /* 更新側邊欄 active */
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.page === page);
      });

      /* 更新頂部標題 */
      document.getElementById('page-title').textContent = PAGE_MAP[page].title;

      /* 新增按鈕顯示 */
      const addBtn = document.getElementById('topbar-add-btn');
      addBtn.style.display = PAGE_MAP[page].addBtn ? '' : 'none';

      /* 載入頁面內容 */
      loadPage(page);

      /* 行動版自動關閉側邊欄 */
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('mobile-open');
      }
    }

    /* ── 重新整理 ── */
    function refreshPage() { loadPage(currentPage); }

    /* ── 呼叫 GAS API ── */
    async function callAPI(action, params = {}) {
      params.action  = action;
      params.userId  = CFG.adminId;
      const url      = CFG.gasUrl + '?t=' + Date.now();
      const res      = await fetch(url, {
        method : 'POST',
        body   : JSON.stringify(params),
      });
      return res.json();
    }

    /* ── Toast 通知 ── */
    function showToast(msg, type = 'success') {
      const icons = { success: '✅', error: '❌', warning: '⚠️' };
      const el    = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    /* ── Loading ── */
    function showLoading(show) {
      document.getElementById('loading-mask').classList.toggle('show', show);
    }

    /* ── Modal ── */
    function openModal(title, bodyHTML, confirmFn, confirmText = '確認') {
      document.getElementById('modal-title').textContent        = title;
      document.getElementById('modal-body').innerHTML           = bodyHTML;
      document.getElementById('modal-confirm-btn').textContent  = confirmText;
      modalConfirmFn = confirmFn;
      document.getElementById('global-modal').classList.add('show');
    }
    function closeModal() {
      document.getElementById('global-modal').classList.remove('show');
      modalConfirmFn = null;
    }
    function confirmModal() {
      if (typeof modalConfirmFn === 'function') modalConfirmFn();
    }

    /* ── 徽章輔助 ── */
    function badgeHTML(text, color) {
      return `<span class="badge badge-${color}">${text}</span>`;
    }
    function feeStatusBadge(s) {
      return s === '已繳費' ? badgeHTML(s,'green') : badgeHTML(s||'未繳費','red');
    }
    function volStatusBadge(s) {
      const m = { '已核准':'green','待審核':'yellow','已停用':'gray' };
      return badgeHTML(s, m[s]||'gray');
    }
    function taskStatusBadge(s) {
      const m = { '進行中':'blue','已完成':'green','已取消':'gray','待開始':'yellow' };
      return badgeHTML(s, m[s]||'gray');
    }

    /* ── 分頁輔助 ── */
    function buildPagination(total, page, perPage, onPage) {
      const pages = Math.ceil(total / perPage);
      if (pages <= 1) return '';
      let html = '<div class="pagination">';
      html += `<button class="page-btn" ${page<=1?'disabled':''} onclick="${onPage}(${page-1})">‹</button>`;
      for (let i = 1; i <= pages; i++) {
        if (i === 1 || i === pages || Math.abs(i - page) <= 2) {
          html += `<button class="page-btn ${i===page?'active':''}" onclick="${onPage}(${i})">${i}</button>`;
        } else if (Math.abs(i - page) === 3) {
          html += `<span style="padding:0 4px;color:var(--gray)">…</span>`;
        }
      }
      html += `<button class="page-btn" ${page>=pages?'disabled':''} onclick="${onPage}(${page+1})">›</button>`;
      html += '</div>';
      return html;
    }

    /* ── 側邊欄導航事件綁定 ── */
    document.querySelectorAll('.nav-item[data-page]').forEach(el => {
      el.addEventListener('click', () => navigateTo(el.dataset.page));
    });

    /* ── 點擊 Modal 外部關閉 ── */
    document.getElementById('global-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    /* ── 初始化（登入後呼叫） ── */
    function initApp(adminUserId, adminName) {
      CFG.adminId = adminUserId;
      document.getElementById('admin-name-display').textContent = adminName || '管理員';
      navigateTo('dashboard');
    }

    /* ── 頁面載入 Stub（由後續 Part 實作） ── */
    function loadPage(page) {
      const content = document.getElementById('page-content');
      content.innerHTML = `<div class="empty-state">
        <div class="empty-icon">⏳</div>
        <div class="empty-text">載入中...</div>
      </div>`;
      /* 各頁面渲染函式由 Part 2～4 實作 */
      if (typeof window[`render_${page}`] === 'function') {
        window[`render_${page}`]();
      }
    }

    function openAddModal() {
      if (typeof window[`openAdd_${currentPage}`] === 'function') {
        window[`openAdd_${currentPage}`]();
      }
    }

    /* ── 啟動 ── */
    window.addEventListener('DOMContentLoaded', () => {
      /* 開發測試用：直接帶入管理員 ID
         正式環境請改用 LIFF 取得 userId */
      initApp('【你的管理員userId】', '管理員');
    });

function _statCard(icon, label, value, sub, color) {
  return `<div class="stat-card">
    <div class="stat-icon ${color}">${icon}</div>
    <div>
      <div class="stat-value">${value}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-sub">${sub}</div>
    </div>
  </div>`;
}
function _fmt(n) { return Number(n||0).toLocaleString(); }

function _drawTrendChart(trend) {
  const ctx = document.getElementById('trend-chart');
  if (!ctx || !trend) return;
  const labels  = trend.map(t => t.month);
  const incomes = trend.map(t => t.income);
  const expenses= trend.map(t => t.expense);
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'收入', data: incomes,  backgroundColor:'rgba(29,180,70,.7)',  borderRadius:4 },
        { label:'支出', data: expenses, backgroundColor:'rgba(231,76,60,.7)',  borderRadius:4 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom' } },
      scales: { y: { beginAtZero:true } }
    }
  });
}

function _drawMemberChart(typeStats) {
  const ctx = document.getElementById('member-chart');
  if (!ctx || !typeStats) return;
  const labels = Object.keys(typeStats);
  const data   = Object.values(typeStats);
  const colors = ['#1DB446','#3498db','#f39c12','#e74c3c','#9b59b6','#1abc9c'];
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth:2 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom' } }
    }
  });
}

function _expireBadge(dateStr) {
  const diff = (new Date(dateStr) - new Date()) / 86400000;
  if (diff < 0)  return 'badge-red';
  if (diff <= 30) return 'badge-yellow';
  return 'badge-green';
}

let _memberFeeFilter = '', _memberTypeFilter = '';
function _memberFilterFee(v)  { _memberFeeFilter  = v; _applyMemberFilter(); }
function _memberFilterType(v) { _memberTypeFilter = v; _applyMemberFilter(); }
function _membersSearch(kw)   { _memberKw = kw;        _applyMemberFilter(); }

function _applyMemberFilter() {
  let rows = _membersData;
  if (_memberFeeFilter)  rows = rows.filter(m => m.feeStatus  === _memberFeeFilter);

  _renderMembersTableDirect(rows, _memberKw);
}

let _feesData = [], _feesPage = 1;
const _feesPerPage = 15;

async function render_fees() {
  showLoading(true);

  showLoading(false);
  _feesData = (res.success && res.data) ? res.data : [];
  _feesPage = 1;
  _renderFeesTable();
}

function _renderFeesTable(keyword = '') {
  const content = document.getElementById('page-content');
  let rows = _feesData;
  if (keyword) {
    const kw = keyword.toLowerCase();
    rows = rows.filter(f =>
      (f.memberName||'').toLowerCase().includes(kw) ||
      (f.memberId||'').toLowerCase().includes(kw)
    );
  }
  const total = rows.length;
  const start = (_feesPage - 1) * _feesPerPage;
  const paged = rows.slice(start, start + _feesPerPage);

  /* 統計 */
  const totalAmt   = rows.filter(f=>f.status==='已繳費').reduce((s,f)=>s+Number(f.amount||0),0);
  const pendingCnt = rows.filter(f=>f.status!=='已繳費').length;

  content.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      ${_statCard('💳','已收金額','NT$'+_fmt(totalAmt),'本年度','green')}
      ${_statCard('⚠️','待繳人數', pendingCnt+'人','需催繳','red')}
      ${_statCard('📊','繳費筆數', rows.length+'筆','全部記錄','blue')}
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">💳 繳費記錄</div>
      </div>
      <div class="card-body" style="padding-bottom:0">
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜尋姓名或會員編號..."
              oninput="_feesSearch(this.value)" id="fee-search-input">
          </div>
          <select class="form-control" style="width:120px" onchange="_feeFilterStatus(this.value)">
            <option value="">全部狀態</option>
            <option value="已繳費">已繳費</option>
            <option value="未繳費">未繳費</option>
          </select>
          <button class="btn btn-primary" onclick="openAdd_fees()">＋ 新增繳費</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>年度</th><th>會員姓名</th><th>會員編號</th>
              <th>金額</th><th>繳費方式</th><th>繳費日期</th>
              <th>狀態</th><th>備註</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${paged.length ? paged.map(f=>`
                <tr>
                  <td>${f.year||'-'}</td>
                  <td><strong>${f.memberName||'-'}</strong></td>
                  <td><code style="font-size:11px">${f.memberId||'-'}</code></td>
                  <td>NT$ ${_fmt(f.amount)}</td>
                  <td>${f.method||'-'}</td>
                  <td>${f.date||'-'}</td>
                  <td>${feeStatusBadge(f.status)}</td>
                  <td style="font-size:12px;color:var(--gray)">${f.notes||'-'}</td>
                  <td>
                    <button class="btn btn-xs btn-info"   onclick="openEdit_fees('${f.id}')">編輯</button>
                    <button class="btn btn-xs btn-danger" onclick="deleteFee('${f.id}','${f.memberName}')">刪除</button>
                  </td>
                </tr>`).join('') :
                `<tr><td colspan="9"><div class="empty-state" style="padding:32px">
                  <div class="empty-icon">💳</div><div class="empty-text">查無繳費記錄</div>
                </div></td></tr>`
              }
            </tbody>
          </table>
        </div>
        ${buildPagination(total, _feesPage, _feesPerPage, '_feesGoPage')}
      </div>
    </div>
  `;
}

function _renderIncomeTable(keyword = '') {
  const content = document.getElementById('page-content');

    const kw = keyword.toLowerCase();
    rows = rows.filter(r =>
      (r.title||'').toLowerCase().includes(kw) ||
      (r.category||'').toLowerCase().includes(kw) ||
      (r.payer||'').toLowerCase().includes(kw)
    );
  }
  const total    = rows.length;
  const totalAmt = rows.reduce((s,r) => s + Number(r.amount||0), 0);
  const start    = (_incomePage - 1) * _incomePerPage;

  /* 月份統計 */
  const byMonth = {};

    const m = (r.date||'').slice(0,7);
    if (m) byMonth[m] = (byMonth[m]||0) + Number(r.amount||0);
  });
  const topMonths = Object.entries(byMonth).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,3);

  content.innerHTML = `

      ${topMonths[0]?_statCard('📅',topMonths[0][0],'NT$'+_fmt(topMonths[0][1]),'最近月份','orange'):''}

          <option value="捐款">捐款</option>
          <option value="補助">補助</option>
          <option value="其他">其他</option>
        </select>
      </div>
      <div class="card-body" style="padding-bottom:0">
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜尋項目名稱、類別、付款人..."
              oninput="_incomeSearch(this.value)" id="income-search-input">
          </div>
          <input type="month" class="form-control" style="width:150px"
            onchange="_incomeFilterMonth(this.value)" title="依月份篩選">
          <button class="btn btn-primary" onclick="openAdd_income()">＋ 新增收入</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>日期</th><th>項目名稱</th><th>類別</th>
              <th>金額</th><th>付款人</th><th>付款方式</th>
              <th>關聯活動</th><th>備註</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${paged.length ? paged.map(r => `
                <tr>
                  <td>${r.date||'-'}</td>
                  <td><strong>${r.title||'-'}</strong></td>
                  <td>${badgeHTML(r.category||'其他','green')}</td>
                  <td><strong style="color:var(--primary)">NT$ ${_fmt(r.amount)}</strong></td>
                  <td>${r.payer||'-'}</td>

            <option value="餐費">餐費</option>
            <option value="材料費">材料費</option>
            <option value="交通費">交通費</option>
            <option value="印刷費">印刷費</option>

            <option value="">全部狀態</option>
            <option value="待核銷">待核銷</option>
            <option value="已核銷">已核銷</option>
            <option value="已拒絕">已拒絕</option>

            onchange="_expenseFilterMonth(this.value)" title="依月份篩選">
          <button class="btn btn-primary" onclick="openAdd_expense()">＋ 新增支出</button>

          <table>
            <thead><tr>
              <th>日期</th><th>項目名稱</th><th>類別</th>
              <th>金額</th><th>收款人</th><th>付款方式</th>
              <th>狀態</th><th>備註</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${paged.length ? paged.map(r => `
                <tr>
                  <td>${r.date||'-'}</td>
                  <td><strong>${r.title||'-'}</strong></td>
                  <td>${badgeHTML(r.category||'其他','orange')}</td>
                  <td><strong style="color:var(--danger)">NT$ ${_fmt(r.amount)}</strong></td>
                  <td>${r.payee||'-'}</td>

                  </td>
                </tr>`).join('') :
                `<tr><td colspan="9"><div class="empty-state" style="padding:32px">

                </div></td></tr>`

            </tbody>
          </table>
        </div>
        ${buildPagination(total, _expensePage, _expensePerPage, '_expenseGoPage')}
      </div>
    </div>
  `;

let _storeData = [], _storePage = 1;
const _storePerPage = 12;

async function render_store() {
  showLoading(true);
  const res = await callAPI('getAllStoreItems');
  showLoading(false);
  _storeData = (res.success && res.data) ? res.data : [];
  _storePage = 1;

function _renderStoreTable(keyword = '') {
  const content = document.getElementById('page-content');
  let rows = _storeData;
  if (keyword) {
    const kw = keyword.toLowerCase();
    rows = rows.filter(r =>
      (r.name||'').toLowerCase().includes(kw) ||
      (r.description||'').toLowerCase().includes(kw)
    );
  }
  const total       = rows.length;
  const activeCount = rows.filter(r=>String(r.isActive)==='true').length;
  const totalRedeem = rows.reduce((s,r)=>s+Number(r.totalRedeemed||0),0);
  const start       = (_storePage - 1) * _storePerPage;
  const paged       = rows.slice(start, start + _storePerPage);

  content.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      ${_statCard('🛍','商品總數',total+'件','','blue')}
      ${_statCard('✅','上架中',activeCount+'件','','green')}
      ${_statCard('🎁','累計兌換',totalRedeem+'次','','orange')}
      ${_statCard('📦','庫存不足',rows.filter(r=>Number(r.stock||0)<=5).length+'件','≤5件','red')}
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">🛍 積分商城（共 ${total} 件）</div>
        <select class="form-control" style="width:120px" onchange="_storeFilterActive(this.value)">
          <option value="">全部狀態</option>
          <option value="true">上架中</option>
          <option value="false">已下架</option>
        </select>
      </div>
      <div class="card-body" style="padding-bottom:0">
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜尋商品名稱或說明..."
              oninput="_storeSearch(this.value)" id="store-search-input">
          </div>
          <button class="btn btn-primary" onclick="openAdd_store()">＋ 新增商品</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>圖示</th><th>商品名稱</th><th>說明</th>
              <th>所需積分</th><th>庫存</th><th>累計兌換</th>
              <th>狀態</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${paged.length ? paged.map(r => `
                <tr>
                  <td style="font-size:24px;text-align:center">${r.emoji||'🎁'}</td>
                  <td><strong>${r.name||'-'}</strong></td>
                  <td style="font-size:12px;color:var(--gray);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.description||'-'}</td>

                  <td style="text-align:center">
                    <span class="${Number(r.stock)<=5?'badge badge-red':'badge badge-green'}">${r.stock}</span>
                  </td>
                  <td style="text-align:center">${r.totalRedeemed||0}</td>
                  <td>${String(r.isActive)==='true'?badgeHTML('上架中','green'):badgeHTML('已下架','gray')}</td>
                  <td style="white-space:nowrap">
                    <button class="btn btn-xs btn-info"    onclick="openEdit_store('${r.id}')">編輯</button>
                    <button class="btn btn-xs btn-warning" onclick="toggleStoreItem('${r.id}',${String(r.isActive)!=='true'})">${String(r.isActive)==='true'?'下架':'上架'}</button>
                    <button class="btn btn-xs btn-danger"  onclick="deleteStoreItem('${r.id}','${_esc(r.name)}')">刪除</button>

                </tr>`).join('') :

                </div></td></tr>`
              }
            </tbody>
          </table>
        </div>
        ${buildPagination(total, _storePage, _storePerPage, '_storeGoPage')}
      </div>
    </div>
  `;
}

    showLoading(true);
    const res = await callAPI('adminUpdateStoreItem', { rowId: r.id, ...data });
    showLoading(false);
    if (res.success) { closeModal(); showToast('更新成功'); render_store(); }
    else showToast(res.message||'更新失敗','error');
  }, '儲存');
}

async function toggleStoreItem(id, newActive) {
  showLoading(true);
  const res = await callAPI('adminUpdateStoreItem', { rowId: id, isActive: String(newActive) });
  showLoading(false);
  if (res.success) { showToast(newActive?'商品已上架':'商品已下架'); render_store(); }
  else showToast(res.message||'操作失敗','error');
}

function deleteStoreItem(id, name) {
  openModal('🗑 確認刪除', `<p>確定要刪除商品 <strong>${name}</strong> 嗎？</p>`,
    async () => {
      showLoading(true);
      const res = await callAPI('adminDeleteStoreItem', { rowId: id });
      showLoading(false);
      if (res.success) { closeModal(); showToast('已刪除'); render_store(); }
      else showToast(res.message||'刪除失敗','error');
    }, '確認刪除'
  );
}

/* ═══════════════════════════════════════════════════════════
   公告管理 render_announcements
═══════════════════════════════════════════════════════════ */
let _annData = [], _annPage = 1;
const _annPerPage = 12;

async function render_announcements() {
  showLoading(true);
  const res = await callAPI('getAllAnnouncements');
  showLoading(false);
  _annData = (res.success && res.data) ? res.data : [];
  _annPage = 1;
  _renderAnnTable();
}

function _renderAnnTable(keyword = '') {
  const content = document.getElementById('page-content');
  let rows = _annData;
  if (keyword) {
    const kw = keyword.toLowerCase();
    rows = rows.filter(r =>
      (r.title||'').toLowerCase().includes(kw) ||
      (r.content||'').toLowerCase().includes(kw)
    );
  }
  const total     = rows.length;
  const published = rows.filter(r=>String(r.isPublished)==='true').length;
  const urgent    = rows.filter(r=>r.priority==='urgent').length;
  const start     = (_annPage - 1) * _annPerPage;
  const paged     = rows.slice(start, start + _annPerPage);

  content.innerHTML = `
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
      ${_statCard('📢','公告總數',total+'則','','blue')}
      ${_statCard('✅','已發布',published+'則','','green')}
      ${_statCard('🚨','緊急公告',urgent+'則','','red')}
      ${_statCard('📝','草稿',(total-published)+'則','未發布','gray')}
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">📢 公告管理（共 ${total} 則）</div>
        <div style="display:flex;gap:8px">
          <select class="form-control" style="width:120px" onchange="_annFilterPublish(this.value)">
            <option value="">全部狀態</option>
            <option value="true">已發布</option>
            <option value="false">草稿</option>
          </select>
          <select class="form-control" style="width:120px" onchange="_annFilterPriority(this.value)">
            <option value="">全部優先</option>
            <option value="urgent">緊急</option>
            <option value="normal">一般</option>
          </select>
        </div>
      </div>
      <div class="card-body" style="padding-bottom:0">
        <div class="search-bar">
          <div class="search-input-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="搜尋公告標題或內容..."
              oninput="_annSearch(this.value)" id="ann-search-input">
          </div>
          <button class="btn btn-primary" onclick="openAdd_announcements()">＋ 新增公告</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>標題</th><th>類型</th><th>優先級</th>
              <th>內容預覽</th><th>發布狀態</th>
              <th>建立時間</th><th>操作</th>
            </tr></thead>
            <tbody>
              ${paged.length ? paged.map(r => `
                <tr>
                  <td><strong>${r.title||'-'}</strong></td>
                  <td>${badgeHTML(r.type||'一般','blue')}</td>
                  <td>${r.priority==='urgent'?badgeHTML('🚨 緊急','red'):badgeHTML('一般','gray')}</td>
                  <td style="font-size:12px;color:var(--gray);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.content||'-'}</td>
                  <td>${String(r.isPublished)==='true'?badgeHTML('✅ 已發布','green'):badgeHTML('📝 草稿','yellow')}</td>
                  <td style="font-size:11px;color:var(--gray)">${(r.createdAt||'').slice(0,10)}</td>
                  <td style="white-space:nowrap">
                    <button class="btn btn-xs btn-info"    onclick="openEdit_announcements('${r.id}')">編輯</button>
                    <button class="btn btn-xs btn-primary" onclick="toggleAnnPublish('${r.id}',${String(r.isPublished)!=='true'})">${String(r.isPublished)==='true'?'下架':'發布'}</button>
                    <button class="btn btn-xs btn-warning" onclick="pushAnnToLine('${r.id}','${_esc(r.title)}')">推播</button>
                    <button class="btn btn-xs btn-danger"  onclick="deleteAnn('${r.id}','${_esc(r.title)}')">刪除</button>
                  </td>
                </tr>`).join('') :
                `<tr><td colspan="7"><div class="empty-state" style="padding:32px">
                  <div class="empty-icon">📢</div><div class="empty-text">查無公告資料</div>
                </div></td></tr>`
              }
            </tbody>
          </table>
        </div>
        ${buildPagination(total, _annPage, _annPerPage, '_annGoPage')}
      </div>
    </div>
  `;
}

let _annPublishFilter='', _annPriorityFilter='';
function _annFilterPublish(v)  { _annPublishFilter=v;  _annPage=1; _renderAnnTable(document.getElementById('ann-search-input')?.value||''); }
function _annFilterPriority(v) { _annPriorityFilter=v; _annPage=1; _renderAnnTable(document.getElementById('ann-search-input')?.value||''); }
function _annSearch(kw)        { _annPage=1; _renderAnnTable(kw); }
function _annGoPage(p)         { _annPage=p; _renderAnnTable(document.getElementById('ann-search-input')?.value||''); }

function _annFormHTML(r={}) {
  return `
    <div class="form-group">
      <label class="form-label">公告標題 <span class="req">*</span></label>
      <input class="form-control" id="an-title" value="${r.title||''}" placeholder="請輸入公告標題">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">類型</label>
        <select class="form-control" id="an-type">
          ${['一般','活動','重要','系統'].map(t=>`<option ${r.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">優先級</label>
        <select class="form-control" id="an-priority">
          <option value="normal" ${r.priority!=='urgent'?'selected':''}>一般</option>
          <option value="urgent" ${r.priority==='urgent'?'selected':''}>🚨 緊急</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">公告內容 <span class="req">*</span></label>
      <textarea class="form-control" id="an-content" rows="5" placeholder="請輸入公告內容...">${r.content||''}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">發布狀態</label>
        <select class="form-control" id="an-publish">
          <option value="true"  ${String(r.isPublished)==='true'?'selected':''}>立即發布</option>
          <option value="false" ${String(r.isPublished)!=='true'?'selected':''}>儲存草稿</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">到期日（選填）</label>
        <input class="form-control" id="an-expire" type="date" value="${r.expireDate||''}">
      </div>
    </div>
  `;
}

function _getAnnFormData() {
  return {
    title      : document.getElementById('an-title').value.trim(),
    type       : document.getElementById('an-type').value,
    priority   : document.getElementById('an-priority').value,
    content    : document.getElementById('an-content').value.trim(),
    isPublished: document.getElementById('an-publish').value,
    expireDate : document.getElementById('an-expire').value,
  };
}

function openAdd_announcements() {
  openModal('➕ 新增公告', _annFormHTML(), async () => {
    const data = _getAnnFormData();
    if (!data.title || !data.content) return showToast('請填寫標題與內容','warning');
    showLoading(true);
    const res = await callAPI('adminAddAnnouncement', data);
    showLoading(false);
    if (res.success) { closeModal(); showToast('公告新增成功'); render_announcements(); }
    else showToast(res.message||'新增失敗','error');
  }, '新增');
}

function openEdit_announcements(id) {
  const r = _annData.find(x=>x.id===id);
  if (!r) return showToast('找不到公告','error');
  openModal('✏️ 編輯公告', _annFormHTML(r), async () => {
    const data = _getAnnFormData();
    if (!data.title || !data.content) return showToast('請填寫標題與內容','warning');
    showLoading(true);
    const res = await callAPI('adminUpdateAnnouncement', { rowId: r.id, ...data });
    showLoading(false);
    if (res.success) { closeModal(); showToast('更新成功'); render_announcements(); }
    else showToast(res.message||'更新失敗','error');
  }, '儲存');
}

async function toggleAnnPublish(id, newState) {
  showLoading(true);
  const res = await callAPI('adminUpdateAnnouncement', { rowId: id, isPublished: String(newState) });
  showLoading(false);
  if (res.success) { showToast(newState?'公告已發布':'公告已下架'); render_announcements(); }
  else showToast(res.message||'操作失敗','error');
}

function pushAnnToLine(id, title) {
  openModal('📣 推播公告',
    `<p>確定要將公告 <strong>${title}</strong> 推播給所有會員嗎？</p>
     <p style="color:var(--gray);font-size:13px;margin-top:8px">⚠️ 此操作將對所有有效 LINE userId 的會員發送推播訊息。</p>`,
    async () => {
      showLoading(true);
      const res = await callAPI('adminPushAnnouncement', { announcementId: id });
      showLoading(false);
      if (res.success) {
        closeModal();
        showToast(`推播完成，共發送 ${res.data?.sent||0} 人`);
      } else showToast(res.message||'推播失敗','error');
    }, '確認推播'
  );
}

function deleteAnn(id, title) {
  openModal('🗑 確認刪除', `<p>確定要刪除公告 <strong>${title}</strong> 嗎？</p>`,
    async () => {
      showLoading(true);
      const res = await callAPI('adminDeleteAnnouncement', { rowId: id });
      showLoading(false);
      if (res.success) { closeModal(); showToast('已刪除'); render_announcements(); }
      else showToast(res.message||'刪除失敗','error');
    }, '確認刪除'
  );
}

function todayStr() {
  return new Date().toISOString().slice(0,10);
}
function nowStr() {
  return new Date().toLocaleString('sv').replace(' ','T');
}
