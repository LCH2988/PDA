    } catch (e) {
      el.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">載入失敗：' + e.message + '</div>' +
        '</div>';
    }
  }

  function _renderNews(list, el) {
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">📢</div>' +
        '<div class="empty-text">目前沒有消息</div></div>';
      return;
    }
    const IC = { '緊急':'red','重要':'orange','一般':'blue' };
    el.innerHTML = list.map(n =>
      '<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="Info._toggle(this)">' +
      '  <div class="flex-between mb-8">' +
      '    <span class="tag tag-' + (IC[n.importance] || 'blue') + '">' + (n.importance || '一般') + '</span>' +
      '    <span style="font-size:14px;color:var(--grey5)">' + (n.date || '') + '</span>' +
      '  </div>' +
      '  <div class="font-bold" style="font-size:18px;margin-bottom:6px">' + n.title + '</div>' +
      '  <div class="toggle-content" style="font-size:16px;color:var(--grey3);display:none;line-height:1.8;white-space:pre-wrap">' + (n.content || '') + '</div>' +
      '  <div class="toggle-hint" style="font-size:13px;color:var(--primary);margin-top:6px">▼ 點擊展開</div>' +
      '</div>'
    ).join('');
  }

  function _renderHealth(list, el) {
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">🏥</div>' +
        '<div class="empty-text">目前沒有健康資訊</div></div>';
      return;
    }
    el.innerHTML = list.map(h =>
      '<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="Info._toggle(this)">' +
      '  <div class="flex-between mb-8">' +
      '    <span class="tag tag-green">' + (h.category || '健康') + '</span>' +
      '    <span style="font-size:14px;color:var(--grey5)">' + (h.date || '') + '</span>' +
      '  </div>' +
      '  <div class="font-bold" style="font-size:18px;margin-bottom:6px">' + h.title + '</div>' +
      '  <div class="toggle-content" style="font-size:16px;color:var(--grey3);display:none;line-height:1.8;white-space:pre-wrap">' + (h.content || '') + '</div>' +
      (h.source
        ? '<div style="font-size:13px;color:var(--grey5);margin-top:4px">來源：' + h.source + '</div>'
        : '') +
      '  <div class="toggle-hint" style="font-size:13px;color:var(--primary);margin-top:6px">▼ 點擊展開</div>' +
      '</div>'
    ).join('');
  }

  function _renderFaq(list, el) {
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">❓</div>' +
        '<div class="empty-text">目前沒有常見問答</div></div>';
      return;
    }
    el.innerHTML = list.map((f, i) =>
      '<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="Info._toggleFaq(this)">' +
      '  <div style="display:flex;align-items:flex-start;gap:10px">' +
      '    <span style="font-size:20px;font-weight:700;color:var(--primary);flex-shrink:0;min-width:32px">Q' + (i + 1) + '</span>' +
      '    <div class="font-bold" style="font-size:17px;line-height:1.5">' + f.question + '</div>' +
      '  </div>' +
      '  <div class="faq-answer" style="display:none;margin-top:12px;padding-top:12px;border-top:1px solid #F0F0F0">' +
      '    <div style="display:flex;gap:10px;align-items:flex-start">' +
      '      <span style="font-size:20px;font-weight:700;color:var(--green);flex-shrink:0;min-width:32px">A</span>' +
      '      <div style="font-size:16px;color:var(--grey3);line-height:1.8">' + f.answer + '</div>' +
      '    </div>' +
      '  </div>' +
      '</div>'
    ).join('');
  }

  function _toggle(el) {
    const content = el.querySelector('.toggle-content');
    const hint    = el.querySelector('.toggle-hint');
    if (!content) return;
    const isOpen = content.style.display !== 'none';
    content.style.display = isOpen ? 'none' : 'block';
    if (hint) hint.textContent = isOpen ? '▼ 點擊展開' : '▲ 點擊收合';
  }

  function _toggleFaq(el) {
    const ans = el.querySelector('.faq-answer');
    if (ans) ans.style.display = ans.style.display === 'none' ? 'block' : 'none';
  }

  return { load, switchTab, _toggle, _toggleFaq };
})();

  // ── 行政日曆（管理員/理監事專用） ─────────────────────────
  async function _renderAdminCal(el) {
    // 權限提示
    el.innerHTML =
      '<div style="background:#F3E8FF;border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px">' +
      '  <span style="font-size:22px">🔒</span>' +
      '  <div>' +
      '    <div style="font-size:16px;font-weight:700;color:var(--purple)">行政日曆（管理員專用）</div>' +
      '    <div style="font-size:14px;color:var(--grey5);margin-top:2px">僅管理員與理監事可見此行事曆</div>' +
      '  </div>' +
      '</div>' +
      '<div id="admin-cal-wrap"></div>';

    try {
      const data = await API.get('getAdminCalendar', {
        year:  _adminCalYear,
        month: _adminCalMonth + 1,
      });
      _adminEvents = Array.isArray(data) ? data : [];
    } catch (e) {
      _adminEvents = [];
    }

    _renderAdminCalGrid(document.getElementById('admin-cal-wrap'));
  }

  function _renderAdminCalGrid(wrap) {
    if (!wrap) return;
    const year  = _adminCalYear;
    const month = _adminCalMonth;
    const today = new Date();
    const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const firstDay   = new Date(year, month, 1).getDay();
    const lastDate   = new Date(year, month + 1, 0).getDate();
    const prevLast   = new Date(year, month, 0).getDate();

    // 事件 Map
    const evMap = {};
    _adminEvents.forEach(ev => {
      const key = ev.date || ev.startDate || '';
      if (!key) return;
      if (!evMap[key]) evMap[key] = [];
      evMap[key].push(ev);
    });

    const TYPE_COLORS = {
      '理事會':'#6A1B9A','監事會':'#1565C0','幹部會議':'#E65100',
      '財務會議':'#2E7D32','行政作業':'#00695C','其他':'#455A64',
    };

    let html =
      // 導覽
      '<div class="cal-header">' +
      '  <button class="cal-nav-btn" onclick="Admin._adminCalPrev()">‹</button>' +
      '  <div class="cal-month-label">' + year + ' 年 ' + monthNames[month] + '</div>' +
      '  <button class="cal-nav-btn" onclick="Admin._adminCalNext()">›</button>' +
      '</div>' +
      // 新增按鈕
      '<div style="padding:10px 16px">' +
      '  <button class="btn btn-purple btn-full" onclick="Admin._showCreateAdminEvent()">➕ 新增行政事項</button>' +
      '</div>' +
      // 星期標題
      '<div class="cal-weekdays">' +
      ['日','一','二','三','四','五','六'].map(d => '<div class="cal-weekday">' + d + '</div>').join('') +
      '</div>' +
      // 日期格
      '<div class="cal-days">';

    for (let i = firstDay - 1; i >= 0; i--) {
      html += '<div class="cal-day other-month"><div class="cal-day-num">' + (prevLast - i) + '</div></div>';
    }
    for (let d = 1; d <= lastDate; d++) {
      const dateStr  = year + '-' + String(month + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
      const isToday  = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
      const dayOfWeek= new Date(year, month, d).getDay();
      const evList   = evMap[dateStr] || [];

      let cls    = 'cal-day' + (isToday ? ' today' : '');
      let numCls = 'cal-day-num' + (dayOfWeek === 0 ? ' sun' : dayOfWeek === 6 ? ' sat' : '');

      html += '<div class="' + cls + '" onclick="Admin._selectAdminDay(\'' + dateStr + '\')">' +
        '<div class="' + numCls + '">' + d + '</div>';
      if (evList.length) {
        html += '<div class="cal-dots">';
        evList.slice(0, 3).forEach(ev => {
          const c = TYPE_COLORS[ev.type] || '#6A1B9A';
          html += '<div class="cal-dot" style="background:' + c + '"></div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    const totalCells = firstDay + lastDate;
    const remaining  = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let d = 1; d <= remaining; d++) {
      html += '<div class="cal-day other-month"><div class="cal-day-num">' + d + '</div></div>';
    }
    html += '</div>';

    // 圖例
    html += '<div class="cal-legend">' +
      Object.entries(TYPE_COLORS).map(([type, color]) =>
        '<div class="cal-legend-item">' +
        '<div class="cal-legend-dot" style="background:' + color + '"></div>' + type +
        '</div>'
      ).join('') +
      '</div>';

    // 本月所有行政事項列表
    html += '<div style="padding:14px 16px">' +
      '<div class="section-title">📋 本月行政事項</div>';
    if (!_adminEvents.length) {
      html += '<div class="empty-state" style="padding:24px"><div class="empty-icon">📅</div><div class="empty-text">本月尚無行政事項</div></div>';
    } else {
      html += _adminEvents.map(ev => {
        const color = TYPE_COLORS[ev.type] || '#6A1B9A';
        return '<div class="admin-cal-event">' +
          '<div class="admin-cal-event-title">' +
          ev.title +
          '<span class="admin-cal-badge">' + (ev.type || '其他') + '</span>' +
          '</div>' +
          '<div class="admin-cal-event-meta">' +
          '  📅 ' + (ev.date || ev.startDate || '--') +
          '  &nbsp;⏰ ' + (ev.time || ev.startTime || '--') +
          '  &nbsp;📍 ' + (ev.location || '--') +
          '</div>' +
          (ev.description
            ? '<div style="font-size:14px;color:var(--grey5);margin-top:6px">' + ev.description + '</div>'
            : '') +
          (ev.attendees
            ? '<div style="font-size:14px;color:var(--grey5);margin-top:4px">👥 出席：' + ev.attendees + '</div>'
            : '') +
          '<div style="display:flex;gap:8px;margin-top:10px">' +
          '<button class="btn btn-secondary btn-sm" onclick="Admin._editAdminEvent(\'' + ev.id + '\')">✏️ 編輯</button>' +
          '<button class="btn btn-danger btn-sm"    onclick="Admin._deleteAdminEvent(\'' + ev.id + '\',\'' + ev.title.replace(/'/g, "\\'") + '\')">🗑️ 刪除</button>' +
          '</div>' +
          '</div>';
      }).join('');
    }
    html += '</div>';

    wrap.innerHTML = html;
  }

  function _selectAdminDay(dateStr) {
    const evList = _adminEvents.filter(ev => (ev.date || ev.startDate || '') === dateStr);
    if (!evList.length) {
      Modal.alert('📅 ' + dateStr + ' 沒有行政事項', '行政日曆');
      return;
    }
    const TYPE_COLORS = {
      '理事會':'#6A1B9A','監事會':'#1565C0','幹部會議':'#E65100',
      '財務會議':'#2E7D32','行政作業':'#00695C','其他':'#455A64',
    };
    Modal.show(
      '<div class="modal-title">📅 ' + dateStr + '</div>' +
      evList.map(ev => {
        const color = TYPE_COLORS[ev.type] || '#6A1B9A';
        return '<div class="admin-cal-event" style="border-left-color:' + color + ';margin-bottom:12px">' +
          '<div class="admin-cal-event-title">' + ev.title +
          '<span class="admin-cal-badge" style="background:' + color + '20;color:' + color + '">' + (ev.type || '其他') + '</span>' +
          '</div>' +
          '<div class="admin-cal-event-meta">⏰ ' + (ev.time || '--') + ' &nbsp;📍 ' + (ev.location || '--') + '</div>' +
          (ev.description ? '<div style="font-size:15px;color:var(--grey3);margin-top:8px;line-height:1.7">' + ev.description + '</div>' : '') +
          (ev.attendees   ? '<div style="font-size:14px;color:var(--grey5);margin-top:6px">👥 出席：' + ev.attendees + '</div>' : '') +
          '</div>';
      }).join('') +
      '<button class="btn btn-secondary btn-full" onclick="Modal.close()">關閉</button>'
    );
  }

  async function _adminCalPrev() {
    if (_adminCalMonth === 0) { _adminCalMonth = 11; _adminCalYear--; }
    else _adminCalMonth--;
    const wrap = document.getElementById('admin-cal-wrap');
    if (wrap) {
      try {
        const data = await API.get('getAdminCalendar', { year: _adminCalYear, month: _adminCalMonth + 1 });
        _adminEvents = Array.isArray(data) ? data : [];
      } catch (e) { _adminEvents = []; }
      _renderAdminCalGrid(wrap);
    }
  }

  async function _adminCalNext() {
    if (_adminCalMonth === 11) { _adminCalMonth = 0; _adminCalYear++; }
    else _adminCalMonth++;
    const wrap = document.getElementById('admin-cal-wrap');
    if (wrap) {
      try {
        const data = await API.get('getAdminCalendar', { year: _adminCalYear, month: _adminCalMonth + 1 });
        _adminEvents = Array.isArray(data) ? data : [];
      } catch (e) { _adminEvents = []; }
      _renderAdminCalGrid(wrap);
    }
  }

  function _showCreateAdminEvent() {
    const today = new Date().toISOString().slice(0, 10);
    Modal.show(
      '<div class="modal-title">➕ 新增行政事項</div>' +
      '<div class="form-group"><label class="form-label">事項名稱 <span class="req">*</span></label>' +
      '<input id="ace-title" class="form-control" placeholder="例：第三季理事會"></div>' +
      '<div class="form-group"><label class="form-label">類型</label>' +
      '<select id="ace-type" class="form-control">' +
      ['理事會','監事會','幹部會議','財務會議','行政作業','其他'].map(t =>
        '<option value="' + t + '">' + t + '</option>'
      ).join('') +
      '</select></div>' +
      '<div class="form-group"><label class="form-label">日期 <span class="req">*</span></label>' +
      '<input id="ace-date" class="form-control" type="date" value="' + today + '"></div>' +
      '<div class="form-group"><label class="form-label">時間</label>' +
      '<input id="ace-time" class="form-control" type="time" value="09:00"></div>' +
      '<div class="form-group"><label class="form-label">地點</label>' +
      '<input id="ace-location" class="form-control" placeholder="例：本會辦公室"></div>' +
      '<div class="form-group"><label class="form-label">出席人員</label>' +
      '<input id="ace-attendees" class="form-control" placeholder="例：理事長、副理事長…"></div>' +
      '<div class="form-group"><label class="form-label">說明</label>' +
      '<textarea id="ace-desc" class="form-control" rows="3" placeholder="議程或備注…"></textarea></div>' +
      '<div style="display:flex;gap:12px">' +
      '<button class="btn btn-secondary btn-lg" style="flex:1" onclick="Modal.close()">取消</button>' +
      '<button class="btn btn-purple btn-lg"    style="flex:1" id="ace-submit-btn" onclick="Admin._submitAdminEvent()">新增</button>' +
      '</div>'
    );
  }

  async function _submitAdminEvent() {
    const title = document.getElementById('ace-title').value.trim();
    const date  = document.getElementById('ace-date').value;
    if (!title) { Toast.warning('請填寫事項名稱'); return; }
    if (!date)  { Toast.warning('請選擇日期'); return; }
    const btn = document.getElementById('ace-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = '新增中…'; }
    try {
      const result = await API.postOnce('createAdminEvent', {
        title,
        type:      document.getElementById('ace-type').value,
        date,
        time:      document.getElementById('ace-time').value,
        location:  document.getElementById('ace-location').value.trim(),
        attendees: document.getElementById('ace-attendees').value.trim(),
        description: document.getElementById('ace-desc').value.trim(),
      });
      if (result && result.success) {
        Toast.success('行政事項已新增！');
        Modal.close();
        await _renderAdminCal(document.getElementById('admin-content'));
      } else {
        Toast.error(result.error || '新增失敗');
        if (btn) { btn.disabled = false; btn.textContent = '新增'; }
      }
    } catch (e) {
      Toast.error(e.message);
      if (btn) { btn.disabled = false; btn.textContent = '新增'; }
    }
  }

  async function _deleteAdminEvent(eventId, title) {
    Modal.confirm('確定要刪除「' + title + '」嗎？', async () => {
      try {
        const result = await API.postOnce('deleteAdminEvent', { eventId });
        if (result && result.success) {
          Toast.success('已刪除');
          await _renderAdminCal(document.getElementById('admin-content'));
        } else {
          Toast.error(result.error || '刪除失敗');
        }
      } catch (e) { Toast.error(e.message); }
    }, '確認刪除', true);
  }

  function _editAdminEvent(eventId) {
    const ev = _adminEvents.find(e => e.id === eventId);
    if (!ev) { Toast.error('找不到事項資料'); return; }
    Modal.show(
      '<div class="modal-title">✏️ 編輯行政事項</div>' +
      '<div class="form-group"><label class="form-label">事項名稱 <span class="req">*</span></label>' +
      '<input id="ace-edit-title" class="form-control" value="' + (ev.title || '') + '"></div>' +
      '<div class="form-group"><label class="form-label">類型</label>' +
      '<select id="ace-edit-type" class="form-control">' +
      ['理事會','監事會','幹部會議','財務會議','行政作業','其他'].map(t =>
        '<option value="' + t + '"' + (ev.type === t ? ' selected' : '') + '>' + t + '</option>'
      ).join('') +
      '</select></div>' +
      '<div class="form-group"><label class="form-label">日期</label>' +
      '<input id="ace-edit-date" class="form-control" type="date" value="' + (ev.date || ev.startDate || '') + '"></div>' +
      '<div class="form-group"><label class="form-label">時間</label>' +
      '<input id="ace-edit-time" class="form-control" type="time" value="' + (ev.time || ev.startTime || '') + '"></div>' +
      '<div class="form-group"><label class="form-label">地點</label>' +
      '<input id="ace-edit-location" class="form-control" value="' + (ev.location || '') + '"></div>' +
      '<div class="form-group"><label class="form-label">出席人員</label>' +
      '<input id="ace-edit-attendees" class="form-control" value="' + (ev.attendees || '') + '"></div>' +
      '<div class="form-group"><label class="form-label">說明</label>' +
      '<textarea id="ace-edit-desc" class="form-control" rows="3">' + (ev.description || '') + '</textarea></div>' +
      '<div style="display:flex;gap:12px">' +
      '<button class="btn btn-secondary btn-lg" style="flex:1" onclick="Modal.close()">取消</button>' +
      '<button class="btn btn-primary btn-lg"   style="flex:1" id="ace-edit-btn" onclick="Admin._submitEditAdminEvent(\'' + eventId + '\')">儲存</button>' +
      '</div>'
    );
  }

  async function _submitEditAdminEvent(eventId) {
    const title = document.getElementById('ace-edit-title').value.trim();
    if (!title) { Toast.warning('請填寫事項名稱'); return; }
    const btn = document.getElementById('ace-edit-btn');
    if (btn) { btn.disabled = true; btn.textContent = '儲存中…'; }
    try {
      const result = await API.postOnce('updateAdminEvent', {
        eventId,
        title,
        type:        document.getElementById('ace-edit-type').value,
        date:        document.getElementById('ace-edit-date').value,
        time:        document.getElementById('ace-edit-time').value,
        location:    document.getElementById('ace-edit-location').value.trim(),
        attendees:   document.getElementById('ace-edit-attendees').value.trim(),
        description: document.getElementById('ace-edit-desc').value.trim(),
      });
      if (result && result.success) {
        Toast.success('已更新！');
        Modal.close();
        await _renderAdminCal(document.getElementById('admin-content'));
      } else {
        Toast.error(result.error || '更新失敗');
        if (btn) { btn.disabled = false; btn.textContent = '儲存'; }
      }
    } catch (e) {
      Toast.error(e.message);
      if (btn) { btn.disabled = false; btn.textContent = '儲存'; }
    }
  }

  
</script>
</body>
</html>
