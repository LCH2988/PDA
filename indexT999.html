// Volunteer 模組（會員端）
// ============================================================
const Volunteer = (() => {
  let _tab = 'activities';

  async function load() { await switchTab(_tab); }

  async function switchTab(tab, btnEl) {
    _tab = tab;
    if (btnEl) {
      document.querySelectorAll('#page-volunteer .tab-btn')
        .forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
    }
    const el = document.getElementById('volunteer-list');
    el.innerHTML =
      '<div class="skeleton skeleton-line"></div>' +
      '<div class="skeleton skeleton-line medium"></div>' +
      '<div class="skeleton skeleton-line short"></div>';
    try {
      if (tab === 'activities') await _renderActivities(el);
      else                      await _renderMyRecord(el);
    } catch (e) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">載入失敗：' + e.message + '</div></div>';
    }
  }

  async function _renderActivities(el) {
    const data = await API.get('getVolunteerActivities');
    const list = Array.isArray(data) ? data : [];
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">🤝</div>' +
        '<div class="empty-text">目前沒有志工活動</div>' +
        '<div class="empty-sub">請稍後再查看</div></div>';
      return;
    }
    el.innerHTML = list.map(act => {
      const full = (act.currentVol || 0) >= (act.maxVol || 1);
      return (
        '<div class="vol-card">' +
        '<div class="vol-card-header">' +
        '<div style="font-size:13px;opacity:.88;margin-bottom:3px">' + (act.eventType || '志工活動') + '</div>' +
        '<div style="font-size:18px;font-weight:700">' + _esc(act.title) + '</div>' +
        '</div>' +
        '<div class="vol-card-body">' +
        '<div class="info-row"><span class="info-label">📅 日期</span>' +
        '<span class="info-value">' + _esc(act.date || '--') + '</span></div>' +
        '<div class="info-row"><span class="info-label">🕐 時間</span>' +
        '<span class="info-value">' + _esc(act.startTime || '--') +
        (act.endTime ? ' ～ ' + _esc(act.endTime) : '') + '</span></div>' +
        '<div class="info-row"><span class="info-label">📍 地點</span>' +
        '<span class="info-value">' + _esc(act.location || '--') + '</span></div>' +
        '<div class="info-row"><span class="info-label">⏱️ 服務時數</span>' +
        '<span class="info-value font-bold color-purple">' + (act.hours || 0) + ' 小時</span></div>' +
        '<div class="info-row"><span class="info-label">👥 志工人數</span>' +
        '<span class="info-value">' + (act.currentVol || 0) + ' / ' + (act.maxVol || 0) +
        (full ? ' <span class="tag tag-red" style="margin-left:6px">已額滿</span>' : '') +
        '</span></div>' +
        (act.description
          ? '<div style="margin-top:10px;padding:10px;background:#F8FAFC;border-radius:8px;' +
            'font-size:14px;color:var(--grey3);line-height:1.6">' + _esc(act.description) + '</div>'
          : '') +
        '<div style="margin-top:12px">' +
        (!full
          ? '<button class="btn btn-purple btn-full" ' +
            'onclick="Volunteer.signUp(\'' + act.id + '\',\'' +
            act.title.replace(/'/g, "\\'") + '\')">🙋 報名志工</button>'
          : '<button class="btn btn-secondary btn-full" disabled>已額滿</button>') +
        '</div></div></div>'
      );
    }).join('');
  }

  async function _renderMyRecord(el) {
    const data = await API.get('getMyVolunteerRecord');
    const d    = data || {};
    const logs = Array.isArray(d.logs) ? d.logs : [];
    el.innerHTML =
      '<div class="vol-hours">' +
      '<div class="vol-hours-num">' + (d.totalHours || 0) + '</div>' +
      '<div class="vol-hours-lbl">' +
      '<div style="font-weight:700;font-size:17px">累計服務時數</div>' +
      '<div style="font-size:14px;color:var(--grey5);margin-top:3px">目標：100 小時</div>' +
      '</div></div>' +
      '<div style="margin-bottom:14px">' +
      '<div style="font-size:14px;color:var(--grey5);margin-bottom:6px">' +
      '服務進度（' + Math.min(Math.round((d.totalHours || 0) / 100 * 100), 100) + '%）</div>' +
      '<div class="progress"><div class="progress-bar" style="width:' +
      Math.min((d.totalHours || 0), 100) + '%;background:var(--purple)"></div></div>' +
      '</div>' +
      (logs.length
        ? '<div class="section-title" style="font-size:16px">📋 服務記錄</div>' +
          logs.map(log =>
            '<div class="card" style="margin-bottom:10px">' +
            '<div class="flex-between mb-8">' +
            '<span class="font-bold">' + _esc(log.taskName || log.title || '--') + '</span>' +
            '<span class="tag tag-' + (log.status === '已審核' ? 'green' : 'orange') + '">' +
            (log.status || '待審核') + '</span>' +
            '</div>' +
            '<div class="info-row"><span class="info-label">📅 日期</span>' +
            '<span class="info-value">' + _esc(log.date || '--') + '</span></div>' +
            '<div class="info-row"><span class="info-label">⏱️ 時數</span>' +
            '<span class="info-value font-bold color-purple">+' + (log.hours || 0) + ' 小時</span></div>' +
            '</div>'
          ).join('')
        : '<div class="empty-state" style="padding:32px">' +
          '<div class="empty-icon">📋</div>' +
          '<div class="empty-text">尚無服務記錄</div></div>');
  }

  async function signUp(actId, title) {
    Modal.confirm('確定要報名志工活動「' + title + '」嗎？', async () => {
      try {
        const result = await API.postOnce('signUpVolunteer', { activityId: actId });
        if (result && result.success) {
          Toast.success(result.message || '報名成功！');
          await switchTab('activities');
        } else { Toast.error(result.error || '報名失敗'); }
      } catch (e) { Toast.error(e.message); }
    });
  }

  return { load, switchTab, signUp };
})();

// ============================================================
// Forum 模組
// ============================================================
const Forum = (() => {
  let _category = '';
  let _posts    = [];

  async function load() { await switchCategory(_category); }

  async function switchCategory(cat, btnEl) {
    _category = cat;
    if (btnEl) {
      document.querySelectorAll('#page-forum .tab-btn')
        .forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
    }
    const el = document.getElementById('forum-list');
    el.innerHTML =
      '<div class="skeleton skeleton-line"></div>' +
      '<div class="skeleton skeleton-line medium"></div>' +
      '<div class="skeleton skeleton-line short"></div>';
    try {
      const data = await API.get('getForumPosts', { category: cat });
      _posts = Array.isArray(data) ? data : [];
      _render(el);
    } catch (e) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">載入失敗：' + e.message + '</div></div>';
    }
  }

  function _render(el) {
    if (!_posts.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">💬</div>' +
        '<div class="empty-text">目前沒有文章</div>' +
        '<div class="empty-sub">成為第一個發文的人！</div></div>';
      return;
    }
    const CAT_COLOR = {
      '互助討論':'#1565C0','醫療資訊':'#2E7D32',
      '心情分享':'#AD1457','資訊交換':'#E65100',
      '活動心得':'#6A1B9A','其他':'#455A64',
    };
    el.innerHTML = _posts.map((p, idx) => {
      const color  = CAT_COLOR[p.category] || '#455A64';
      const initials = (p.authorName || '?').slice(0, 2);
      return (
        '<div class="post-card" onclick="Forum.openPost(' + idx + ')">' +
        '<div class="post-header">' +
        '<div class="post-avatar">' + _esc(initials) + '</div>' +
        '<div>' +
        '<div class="post-author">' + _esc(p.authorName || '匿名') + '</div>' +
        '<div class="post-time">'   + _esc(p.createdAt  || '') + '</div>' +
        '</div>' +
        '<span class="tag" style="margin-left:auto;background:' + color + '20;color:' + color + '">' +
        _esc(p.category || '其他') + '</span>' +
        '</div>' +
        '<div class="post-title">'   + _esc(p.title)   + '</div>' +
        '<div class="post-preview">' + _esc(p.content || '') + '</div>' +
        '<div class="post-footer">' +
        '<button class="post-action" onclick="event.stopPropagation();Forum.like(' + idx + ',event)">' +
        '❤️ <span id="like-count-' + idx + '">' + (p.likeCount || 0) + '</span></button>' +
        '<span class="post-action">💬 ' + (p.commentCount || 0) + '</span>' +
        '<span class="post-action" style="margin-left:auto;font-size:13px;color:var(--grey7)">' +
        '👁️ ' + (p.viewCount || 0) + '</span>' +
        '</div></div>'
      );
    }).join('');
  }

  function openPost(idx) {
    const p = _posts[idx];
    if (!p) return;
    const CAT_COLOR = {
      '互助討論':'#1565C0','醫療資訊':'#2E7D32',
      '心情分享':'#AD1457','資訊交換':'#E65100',
      '活動心得':'#6A1B9A','其他':'#455A64',
    };
    const color    = CAT_COLOR[p.category] || '#455A64';
    const initials = (p.authorName || '?').slice(0, 2);
    const comments = Array.isArray(p.comments) ? p.comments : [];
    Modal.show(
      '<span class="tag" style="background:' + color + '20;color:' + color + '">' +
      _esc(p.category || '其他') + '</span>' +
      '<div class="modal-title" style="margin-top:10px;text-align:left">' + _esc(p.title) + '</div>' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">' +
      '<div class="post-avatar">' + _esc(initials) + '</div>' +
      '<div><div class="font-bold">' + _esc(p.authorName || '匿名') + '</div>' +
      '<div style="font-size:13px;color:var(--grey5)">' + _esc(p.createdAt || '') + '</div></div>' +
      '</div>' +
      '<div style="font-size:16px;line-height:1.8;color:var(--grey1);margin-bottom:18px;' +
      'white-space:pre-wrap">' + _esc(p.content || '') + '</div>' +
      (p.attachments && p.attachments.length
        ? '<div style="margin-bottom:16px">' +
          p.attachments.map(a =>
            '<div class="attach-item">' +
            '<span class="attach-item-icon">' + AttachmentHelper.getIcon(a.mimeType || '') + '</span>' +
            '<div class="attach-item-info"><div class="attach-item-name">' + _esc(a.name || '附件') + '</div></div>' +
            (a.url ? '<button class="attach-btn" onclick="AttachmentHelper.download(\'' +
              _esc(a.url) + '\',\'' + _esc(a.name || 'file') + '\')">⬇️</button>' : '') +
            '</div>'
          ).join('') + '</div>'
        : '') +
      '<div style="border-top:1px solid #F0F0F0;padding-top:14px;margin-bottom:14px">' +
      '<div class="font-bold" style="margin-bottom:10px">💬 留言（' + comments.length + '）</div>' +
      (comments.length
        ? comments.map(c =>
            '<div style="padding:10px;background:#F8FAFC;border-radius:10px;margin-bottom:8px">' +
            '<div style="font-size:14px;font-weight:700;margin-bottom:4px">' + _esc(c.authorName || '匿名') + '</div>' +
            '<div style="font-size:15px;line-height:1.6">' + _esc(c.content || '') + '</div>' +
            '<div style="font-size:12px;color:var(--grey5);margin-top:4px">' + _esc(c.createdAt || '') + '</div>' +
            '</div>'
          ).join('')
        : '<div style="text-align:center;color:var(--grey5);padding:16px">尚無留言，來第一個留言吧！</div>') +
      '</div>' +
      '<div class="form-group">' +
      '<textarea id="comment-input" class="form-control" rows="2" placeholder="輸入留言…"></textarea>' +
      '</div>' +
      '<div style="display:flex;gap:10px">' +
      '<button class="btn btn-secondary" style="flex:1" onclick="Modal.close()">關閉</button>' +
      '<button class="btn btn-primary"   style="flex:1" ' +
      'onclick="Forum._submitComment(\'' + p.id + '\',' + idx + ')">💬 送出留言</button>' +
      '</div>'
    );
  }

  async function _submitComment(postId, idx) {
    const content = (document.getElementById('comment-input') || {}).value?.trim();
    if (!content) { Toast.warning('請輸入留言內容'); return; }
    try {
      const result = await API.postOnce('addComment', { postId, content });
      if (result && result.success) {
        Toast.success('留言成功！積分 +5');
        if (_posts[idx]) {
          _posts[idx].commentCount = (_posts[idx].commentCount || 0) + 1;
          if (!_posts[idx].comments) _posts[idx].comments = [];
          _posts[idx].comments.push({
            authorName : (App.profile || {}).displayName || '我',
            content,
            createdAt  : _nowStr(),
          });
        }
        Modal.close();
        openPost(idx);
      } else { Toast.error(result.error || '留言失敗'); }
    } catch (e) { Toast.error(e.message); }
  }

  async function like(idx, event) {
    const p = _posts[idx];
    if (!p) return;
    try {
      const result = await API.postOnce('likePost', { postId: p.id });
      if (result && result.success) {
        p.likeCount = (p.likeCount || 0) + 1;
        const el = document.getElementById('like-count-' + idx);
        if (el) el.textContent = p.likeCount;
        Toast.success('已按讚！積分 +2');
      } else { Toast.warning(result.message || '操作失敗'); }
    } catch (e) { Toast.error(e.message); }
  }

  return { load, switchCategory, openPost, like, _submitComment };
})();

// Info 模組
// ============================================================
const Info = (() => {
  let _tab = 'news';

  async function load() { await switchTab(_tab); }

  async function switchTab(tab, btnEl) {
    _tab = tab;
    if (btnEl) {
      document.querySelectorAll('#page-info .tab-btn')
        .forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
    }
    const el = document.getElementById('info-list');
    el.innerHTML =
      '<div class="skeleton skeleton-line"></div>' +
      '<div class="skeleton skeleton-line medium"></div>' +
      '<div class="skeleton skeleton-line short"></div>';
    try {
      if (tab === 'news')   await _renderNews(el);
      else if (tab === 'health') await _renderHealth(el);
      else                       await _renderFAQ(el);
    } catch (e) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div>' +
        '<div class="empty-text">載入失敗：' + e.message + '</div></div>';
    }
  }

  async function _renderNews(el) {
    const data = await API.get('getNews');
    const list = Array.isArray(data) ? data : [];
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">📢</div>' +
        '<div class="empty-text">目前沒有最新消息</div></div>';
      return;
    }
    const IC = { '緊急':'red','重要':'orange','一般':'blue' };
    el.innerHTML = list.map(n =>
      '<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="Info._openNews(\'' +
      _esc(n.id) + '\')">' +
      '<div class="flex-between mb-8">' +
      '<span class="tag tag-' + (IC[n.importance] || 'blue') + '">' +
      (n.importance || '一般') + '</span>' +
      '<span style="font-size:13px;color:var(--grey5)">' + _esc(n.date || '') + '</span>' +
      '</div>' +
      '<div class="font-bold" style="font-size:17px;margin-bottom:6px">' + _esc(n.title) + '</div>' +
      '<div style="font-size:15px;color:var(--grey5);line-height:1.6;display:-webkit-box;' +
      '-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' +
      _esc(n.content || '') + '</div>' +
      '</div>'
    ).join('');
  }

  function _openNews(newsId) {
    API.get('getNewsDetail', { newsId }).then(n => {
      if (!n || n.error) { Toast.error('載入失敗'); return; }
      Modal.show(
        '<div style="font-size:13px;color:var(--grey5);margin-bottom:8px">' +
        _esc(n.date || '') + '</div>' +
        '<div class="modal-title" style="text-align:left">' + _esc(n.title) + '</div>' +
        '<div style="font-size:16px;line-height:1.8;color:var(--grey1);' +
        'white-space:pre-wrap;margin-bottom:20px">' + _esc(n.content || '') + '</div>' +
        '<button class="btn btn-secondary btn-full" onclick="Modal.close()">關閉</button>'
      );
    }).catch(e => Toast.error(e.message));
  }

  async function _renderHealth(el) {
    const data = await API.get('getHealthInfo');
    const list = Array.isArray(data) ? data : [];
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">💊</div>' +
        '<div class="empty-text">目前沒有健康資訊</div></div>';
      return;
    }
    const CAT_COLOR = {
      '用藥資訊':'#1565C0','復健運動':'#2E7D32',
      '飲食建議':'#E65100','心理健康':'#AD1457','其他':'#455A64',
    };
    el.innerHTML = list.map(h => {
      const color = CAT_COLOR[h.category] || '#455A64';
      return (
        '<div class="card" style="margin-bottom:12px">' +
        '<div class="flex-between mb-8">' +
        '<span class="tag" style="background:' + color + '20;color:' + color + '">' +
        _esc(h.category || '其他') + '</span>' +
        '<span style="font-size:13px;color:var(--grey5)">' + _esc(h.date || '') + '</span>' +
        '</div>' +
        '<div class="font-bold" style="font-size:17px;margin-bottom:8px">' + _esc(h.title) + '</div>' +
        '<div style="font-size:15px;color:var(--grey3);line-height:1.7">' + _esc(h.summary || '') + '</div>' +
        (h.source
          ? '<div style="margin-top:10px;font-size:13px;color:var(--grey5)">來源：' + _esc(h.source) + '</div>'
          : '') +
        '</div>'
      );
    }).join('');
  }

  async function _renderFAQ(el) {
    const data = await API.get('getFAQ');
    const list = Array.isArray(data) ? data : [];
    if (!list.length) {
      el.innerHTML =
        '<div class="empty-state"><div class="empty-icon">❓</div>' +
        '<div class="empty-text">目前沒有常見問答</div></div>';
      return;
    }
    el.innerHTML = list.map((faq, idx) =>
      '<div class="card" style="margin-bottom:10px;cursor:pointer" ' +
      'onclick="Info._toggleFAQ(' + idx + ')">' +
      '<div class="flex-between">' +
      '<div style="font-size:16px;font-weight:700;color:var(--primary);flex:1;padding-right:10px">' +
      'Q：' + _esc(faq.question) + '</div>' +
      '<span id="faq-arrow-' + idx + '" style="font-size:20px;color:var(--grey5);flex-shrink:0">›</span>' +
      '</div>' +
      '<div id="faq-answer-' + idx + '" style="display:none;margin-top:12px;padding-top:12px;' +
      'border-top:1px solid #F0F0F0;font-size:15px;color:var(--grey3);line-height:1.7">' +
      'A：' + _esc(faq.answer) + '</div>' +
      '</div>'
    ).join('');
  }

  function _toggleFAQ(idx) {
    const ans   = document.getElementById('faq-answer-' + idx);
    const arrow = document.getElementById('faq-arrow-'  + idx);
    if (!ans) return;
    const open = ans.style.display === 'none';
    ans.style.display   = open ? 'block' : 'none';
    arrow.textContent   = open ? '⌄' : '›';
    arrow.style.color   = open ? 'var(--primary)' : 'var(--grey5)';
  }

  return { load, switchTab, _openNews, _toggleFAQ };
})();

  // ── ① 統計 ───────────────────────────────────────────
  async function _renderStats(el) {

      '<div class="stat-grid">' +
      _statCard('👥', d.totalMembers   || 0, '總會員數',   'var(--primary)') +
      _statCard('✅', d.activeMembers  || 0, '有效會員',   'var(--green)')   +
      _statCard('⚠️', d.expiredMembers || 0, '已到期',     'var(--red)')     +
      _statCard('🤝', d.totalVolunteers|| 0, '志工人數',   'var(--purple)')  +
      _statCard('📅', d.totalEvents    || 0, '活動場次',   'var(--orange)')  +
      _statCard('💰', 'NT$' + (d.totalRevenue || 0).toLocaleString(), '本年收入', 'var(--teal)') +
      '</div>' +
      '<div class="card">' +
      '<div class="section-title" style="font-size:16px">📊 近期動態</div>' +
      (Array.isArray(d.recentActivities) && d.recentActivities.length

            '<div class="list-item">' +

    return '<div class="stat-card">' +

      '</div>';

        const tagClass  = isExpired ? 'tag-red' : daysLeft !== null && daysLeft <= 30 ? 'tag-orange' : 'tag-green';

          '<div class="flex-between mb-8">' +
          '<div><div class="font-bold" style="font-size:17px">' + _esc(m.name || '--') + '</div>' +
          '<div style="font-size:13px;color:var(--grey5)">' + _esc(m.memberType || '--') + '</div></div>' +

  // ── ③ 財務審核 ───────────────────────────────────────
  async function _renderFinance(el) {
    const data = await API.get('getAdminExpenses');
    _DataCache.adminExpenseList = Array.isArray(data) ? data : [];
    if (!_DataCache.adminExpenseList.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">💰</div><div class="empty-text">目前沒有待審核支出</div></div>';
      return;
    }
    el.innerHTML = _DataCache.adminExpenseList.map((r, idx) => {
      const ST = { '待審核':'tag-orange','已核准':'tag-green','已拒絕':'tag-red' };
      return (
        '<div class="card" style="margin-bottom:12px">' +
        '<div class="flex-between mb-8">' +
        '<div><div class="font-bold" style="font-size:17px">' + _esc(r.description || '--') + '</div>' +
        '<div style="font-size:13px;color:var(--grey5)">' + _esc(r.applicantName || '--') + '</div></div>' +
        '<span class="tag ' + (ST[r.status] || 'tag-grey') + '">' + (r.status || '--') + '</span>' +

        '<div class="info-row"><span class="info-label">類別</span><span class="info-value">' + _esc(r.category || '--') + '</span></div>' +
        '<div class="info-row"><span class="info-label">金額</span>' +
        '<span class="info-value font-bold color-red">NT$' + (r.amount || 0).toLocaleString() + '</span></div>' +

      );

    const r = _DataCache.adminExpenseList[idx];
    if (!r) return;
    Modal.confirm('確定核准「' + r.description + '」的支出申請？\n金額：NT$' + r.amount.toLocaleString(), async () => {
      try {
        const result = await API.postOnce('approveExpense', { expenseId: r.id });
        if (result && result.success) {
          Toast.success('已核准支出申請');
          await _renderFinance(document.getElementById('admin-content'));
        } else { Toast.error(result.error || '操作失敗'); }
      } catch (e) { Toast.error(e.message); }

    const r = _DataCache.adminExpenseList[idx];
    if (!r) return;
    Modal.confirm('確定拒絕「' + r.description + '」的支出申請？', async () => {
      try {
        const result = await API.postOnce('rejectExpense', { expenseId: r.id });
        if (result && result.success) {
          Toast.warning('已拒絕支出申請');
          await _renderFinance(document.getElementById('admin-content'));
        } else { Toast.error(result.error || '操作失敗'); }

  async function _submitEvt() {
    const title  = _v('em-title');
    const type   = _v('em-type');
    const sDate  = _v('em-start-date');
    const sTime  = _v('em-start-time');
    const loc    = _v('em-location');
    const cName  = _v('em-cname');
    const cPhone = _v('em-cphone');
    if (!title)  { Toast.warning('請填寫活動名稱');   return; }
    if (!type)   { Toast.warning('請選擇活動類型');   return; }
    if (!sDate)  { Toast.warning('請選擇開始日期');   return; }
    if (!sTime)  { Toast.warning('請選擇開始時間');   return; }
    if (!loc)    { Toast.warning('請填寫活動地點');   return; }
    if (!cName)  { Toast.warning('請填寫負責人姓名'); return; }
    if (!cPhone) { Toast.warning('請填寫聯絡電話');   return; }
    if (!_phoneOk(cPhone)) { Toast.warning('電話格式不正確（09 開頭 10 碼）'); return; }
    const ev = {
      id           : MgmtDB.newEventId(),
      title, type,
      startDate    : sDate,
      endDate      : _v('em-end-date') || sDate,
      startTime    : sTime,
      endTime      : _v('em-end-time'),
      location     : loc,
      description  : _v('em-desc'),
      quota        : parseInt(_v('em-quota')) || 0,
      contactName  : cName,
      contactPhone : cPhone,
      contactEmail : _v('em-cemail'),
      target       : _v('em-target'),
      needVol      : _v('em-need-vol') === 'yes',
      status       : '已發佈',
      createdAt    : _nowStr(),
      registered   : 0,
    };
    MgmtDB.events.push(ev);
    const el = document.getElementById('admin-content');
    _renderEvtMgmt(el);
    const targetLabel = { all:'全部會員及志工', volunteer:'志工', member:'一般會員' };
    Toast.success('🚀 活動「' + title + '」已發佈！推播給' + (targetLabel[ev.target] || '全部'));
    API.mgmtPost({ action:'addEvent', data:ev })
      .catch(e => console.warn('[MgmtAPI] addEvent:', e));
  }

  function _buildEvtList() {
    if (!MgmtDB.events.length) {
      return '<div class="empty-state" style="padding:24px">' +
        '<div class="empty-icon">📅</div>' +
        '<div class="empty-text">尚無已發佈活動</div></div>';
    }
    const TC = {
      '醫療講座':'#1565C0','復健活動':'#2E7D32','社交聚會':'#6A1B9A',
      '志工活動':'#E65100','健康講座':'#AD1457','一般活動':'#00695C',
    };
    return MgmtDB.events.slice().reverse().map((ev, idx) => {
      const realIdx = MgmtDB.events.length - 1 - idx;
      const color   = TC[ev.type] || '#455A64';
      return (
        '<div style="border-left:5px solid ' + color + ';border-radius:10px;' +

  // ── _saveEvt 續完 ─────────────────────────────────────
  function _saveEvt(idx) {
    const ev = MgmtDB.events[idx];
    if (!ev) return;
    const title  = (document.getElementById('edit-em-title')  || {}).value?.trim();
    const cPhone = (document.getElementById('edit-em-cphone') || {}).value?.trim();
    if (!title) { Toast.warning('活動名稱不可為空'); return; }
    if (cPhone && !_phoneOk(cPhone)) { Toast.warning('電話格式不正確'); return; }
    ev.title        = title;
    ev.startDate    = (document.getElementById('edit-em-sdate')  || {}).value || ev.startDate;
    ev.endDate      = (document.getElementById('edit-em-edate')  || {}).value || ev.endDate;
    ev.location     = (document.getElementById('edit-em-loc')    || {}).value?.trim() || ev.location;
    ev.contactName  = (document.getElementById('edit-em-cname')  || {}).value?.trim() || ev.contactName;
    ev.contactPhone = cPhone || ev.contactPhone;
    Modal.close();
    _renderEvtMgmt(document.getElementById('admin-content'));
    Toast.success('活動資訊已更新！');
    API.mgmtPost({ action: 'updateEvent', data: ev })
      .catch(e => console.warn('[MgmtAPI] updateEvent:', e));
  }

  function _removeEvt(idx) {
    const ev = MgmtDB.events[idx];
    if (!ev) return;
    Modal.confirm(
      '確定要刪除活動「' + ev.title + '」嗎？\n此操作無法復原。',
      () => {
        const evId = ev.id;
        MgmtDB.events.splice(idx, 1);
        _renderEvtMgmt(document.getElementById('admin-content'));
        Toast.success('活動已刪除');
        API.mgmtPost({ action: 'deleteEvent', data: { id: evId } })
          .catch(e => console.warn('[MgmtAPI] deleteEvent:', e));
      },
      '確認刪除', true
    );
  }

  function _vmSwitchTab(tab, btnEl) {
    document.querySelectorAll('#page-admin .tabs .tab-btn[id^="vm-tab"]')
      .forEach(b => b.classList.remove('active'));

    if (tab === 'apply') _vmRenderApply(panel);

  function _vmSubmitApply() {
    const name       = _v('vm-name');
    const phone      = _v('vm-phone');
    const motivation = _v('vm-motivation');
    if (!name)       { Toast.warning('請填寫真實姓名'); return; }
    if (!phone)      { Toast.warning('請填寫聯絡電話'); return; }
    if (!_phoneOk(phone)) { Toast.warning('電話格式不正確（09 開頭 10 碼）'); return; }
    if (!motivation) { Toast.warning('請填寫申請動機'); return; }
    const cleanPhone = phone.replace(/\s/g, '');
    if (MgmtDB.volApply.find(v => v.phone === cleanPhone && v.status === 'pending')) {
      Toast.warning('此電話號碼已有待審核申請'); return;
    }
    if (MgmtDB.volunteers.find(v => v.phone === cleanPhone)) {
      Toast.warning('此電話號碼已是正式志工'); return;
    }
    const apply = {
      id: MgmtDB.newVolId(), name, phone: cleanPhone,
      email      : _v('vm-email'),
      motivation,

    Modal.confirm(
      '確定審核通過「' + apply.name + '」的志工申請？\n通過後將加入正式志工名冊。',
      () => {
        apply.status     = 'approved';
        apply.approvedAt = _nowStr();
        MgmtDB.volunteers.push({
          id: apply.id, name: apply.name, phone: apply.phone,
          email: apply.email, skills: apply.skills, avail: apply.avail,
          joinedAt: _nowStr(), totalHours: 0,
        });
        _vmSwitchTab('apply', document.getElementById('vm-tab-apply'));
        Toast.success('✅ 已通過「' + apply.name + '」的志工申請！');
        API.mgmtPost({ action: 'approveVolApply', data: { id: volId } })
          .catch(e => console.warn('[MgmtAPI] approveVolApply:', e));
        API.mgmtPost({ action: 'pushVolResult', data: { volId, approved: true } })
          .catch(e => console.warn('[MgmtAPI] pushVolResult:', e));

  function _vmGenTaskCode() { _set('vm-task-code', MgmtDB.newTaskCode()); }

  function _vmSubmitTask() {
    const code  = _v('vm-task-code');
    const name  = _v('vm-task-name');
    const desc  = _v('vm-task-desc');
    const hours = parseFloat(_v('vm-task-hours'));
    if (!code)              { Toast.warning('請填寫活動代號');          return; }
    if (!name)              { Toast.warning('請填寫任務名稱');          return; }
    if (!desc)              { Toast.warning('請填寫任務說明');          return; }
    if (!hours || hours<=0) { Toast.warning('請填寫正確的所需時數');    return; }
    if (MgmtDB.tasks.find(t => t.id === code)) {
      Toast.warning('活動代號「' + code + '」已存在，請重新產生'); return;
    }
    const task = {
      id          : code, name, description: desc, hours,
      eventId     : _v('vm-task-event'),
      needCount   : parseInt(_v('vm-task-count')) || 1,
      assignedVol : _v('vm-task-vol'),
      status      : '進行中',
      createdAt   : _nowStr(),
    };
    MgmtDB.tasks.push(task);
    _vmSwitchTab('task', document.getElementById('vm-tab-task'));
    Toast.success('📌 任務「' + name + '」已建立！代號：' + code);
    API.mgmtPost({ action: 'addTask', data: task })
      .catch(e => console.warn('[MgmtAPI] addTask:', e));
  }

  function _vmCompleteTask(idx) {
    const task = MgmtDB.tasks[idx];
    if (!task) return;
    Modal.confirm('確定將任務「' + task.name + '」標記為已完成？', () => {
      task.status      = '已完成';
      task.completedAt = _nowStr();
      _vmSwitchTab('task', document.getElementById('vm-tab-task'));
      Toast.success('✅ 任務「' + task.name + '」已標記為完成');
      API.mgmtPost({ action: 'updateTaskStatus', data: { id: task.id, status: '已完成' } })
        .catch(e => console.warn('[MgmtAPI] updateTaskStatus:', e));
    }, '確認完成');
  }

  function _vmRemoveTask(idx) {
    const task = MgmtDB.tasks[idx];
    if (!task) return;
    Modal.confirm('確定要刪除任務「' + task.name + '」嗎？', () => {
      MgmtDB.tasks.splice(idx, 1);
      _vmSwitchTab('task', document.getElementById('vm-tab-task'));
      Toast.success('任務已刪除');
    }, '確認刪除', true);
  }

  function _vmSubmitHours() {
    const taskId  = _v('vm-hr-task');
    const volId   = _v('vm-hr-vol');
    const actual  = parseFloat(_v('vm-hr-actual'));
    const date    = _v('vm-hr-date');
    const checkin = _v('vm-hr-checkin');
    if (!taskId)              { Toast.warning('請選擇任務');             return; }
    if (!volId)               { Toast.warning('請選擇志工');             return; }
    if (!actual || actual<=0) { Toast.warning('請填寫正確的實際時數');   return; }
    if (!date)                { Toast.warning('請選擇服務日期');         return; }
    if (checkin !== 'confirmed') { Toast.warning('請先確認簽到表正確性'); return; }
    if (MgmtDB.hoursLog.find(h => h.taskId===taskId && h.volId===volId && h.status==='pending')) {
      Toast.warning('此任務已有待審核的時數登記'); return;
    }
    const log = {
      id: MgmtDB.newHrId(), taskId, volId,
      hours: actual, date, checkin,
      note      : _v('vm-hr-note'),
      status    : 'pending',
      createdAt : _nowStr(),
    };
    MgmtDB.hoursLog.push(log);
    _vmSwitchTab('hours', document.getElementById('vm-tab-hours'));
    Toast.success('⏱️ 時數登記已送出！' + MgmtDB.volName(volId) + ' / ' + actual + ' 小時（待審核）');
    API.mgmtPost({ action: 'submitHours', data: log })
      .catch(e => console.warn('[MgmtAPI] submitHours:', e));
  }

  function _vmApproveHours(hrId) {
    const log = MgmtDB.hoursLog.find(h => h.id === hrId);
    if (!log) return;
    Modal.confirm(
      '確定審核通過「' + MgmtDB.volName(log.volId) + '」的時數登記？\n' +
      '任務：' + MgmtDB.taskName(log.taskId) + '\n時數：' + log.hours + ' 小時\n\n通過後時數將自動累計。',
      () => {
        log.status     = 'approved';
        log.approvedAt = _nowStr();
        MgmtDB.hoursApproved.push({
          id: log.id, taskId: log.taskId, volId: log.volId,
          hours: log.hours, date: log.date, note: log.note, approvedAt: _nowStr(),
        });
        _vmSwitchTab('hours', document.getElementById('vm-tab-hours'));
        Toast.success('✅ 已審核通過！' + MgmtDB.volName(log.volId) + ' 累計 +' + log.hours + ' 小時');
        API.mgmtPost({ action: 'approveHours', data: { id: hrId } })
          .catch(e => console.warn('[MgmtAPI] approveHours:', e));
      },
      '確認通過'
    );
  }

  function _vmRejectHours(hrId) {
    const log = MgmtDB.hoursLog.find(h => h.id === hrId);
    if (!log) return;
    Modal.confirm(
      '確定退回「' + MgmtDB.volName(log.volId) + '」的時數登記？',
      () => {
        log.status     = 'rejected';
        log.rejectedAt = _nowStr();
        _vmSwitchTab('hours', document.getElementById('vm-tab-hours'));
        Toast.warning('已退回時數登記');
        API.mgmtPost({ action: 'rejectHours', data: { id: hrId } })
          .catch(e => console.warn('[MgmtAPI] rejectHours:', e));
      },
      '確認退回', true
    );
  }

      '<button class="tab-btn active" id="fm-tab-pay"     onclick="Admin._fmSwitchTab(\'pay\',this)">💳 繳費登記</button>' +
      '<button class="tab-btn" id="fm-tab-confirm"        onclick="Admin._fmSwitchTab(\'confirm\',this)">✅ 確認入款</button>' +
      '<button class="tab-btn" id="fm-tab-receipt"        onclick="Admin._fmSwitchTab(\'receipt\',this)">🧾 收據管理</button>' +
      '</div>' +
      '<div id="fm-panel"></div>';
    _fmSwitchTab('pay', document.getElementById('fm-tab-pay'));
  }

  function _fmSwitchTab(tab, btnEl) {
    document.querySelectorAll('#page-admin .tabs .tab-btn[id^="fm-tab"]')
      .forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');
    const panel = document.getElementById('fm-panel');
    if (!panel) return;
    if (tab === 'pay')     _fmRenderPay(panel);
    else if (tab === 'confirm') _fmRenderConfirm(panel);
    else _fmRenderReceipts(panel);
  }

  const FEE_MAP = { '一般會員':500,'榮譽會員':1000,'學生會員':200,'家屬會員':300 };
  const METHOD_ICON = { '銀行轉帳':'🏦','現金':'💵','LINE Pay':'📱','信用卡':'💳' };

  function _fmRenderPay(panel) {
    panel.innerHTML =
      '<div class="card">' +
      '<div class="card-header">' +
      '<div class="card-icon" style="background:var(--orange-l)">💳</div>' +
      '<div><div class="card-title">登記繳費</div>' +
      '<div class="card-sub">成員繳費後登記，等待管理員確認入款</div></div></div>' +
      '<div class="form-group"><label class="form-label">會員姓名 <span class="req">*</span></label>' +
      '<input id="fm-pay-name" class="form-control" placeholder="請輸入會員真實姓名"></div>' +
      '<div class="form-group"><label class="form-label">會員類型 <span class="req">*</span></label>' +
      '<select id="fm-pay-type" class="form-control" onchange="Admin._fmUpdateAmount()">' +
      '<option value="">請選擇</option>' +
      Object.entries(FEE_MAP).map(([type, amt]) =>
        '<option value="' + type + '" data-amount="' + amt + '">' + type + ' — NT$' + amt.toLocaleString() + ' / 年</option>'
      ).join('') + '</select></div>' +
      '<div id="fm-amount-box" style="display:none;background:var(--primary-l);border-radius:10px;padding:14px;text-align:center;margin-bottom:16px">' +
      '<div style="font-size:13px;color:var(--primary);margin-bottom:4px">應繳金額</div>' +
      '<div id="fm-amount-num" style="font-size:28px;font-weight:700;color:var(--primary)">--</div>' +
      '</div>' +
      '<div class="form-group"><label class="form-label">繳費方式 <span class="req">*</span></label>' +
      '<select id="fm-pay-method" class="form-control">' +
      Object.keys(METHOD_ICON).map(m => '<option value="' + m + '">' + METHOD_ICON[m] + ' ' + m + '</option>').join('') +
      '</select></div>' +
      '<div class="form-group"><label class="form-label">繳費日期 <span class="req">*</span></label>' +
      '<input id="fm-pay-date" class="form-control" type="date" value="' + _todayStr() + '"></div>' +
      '<div class="form-group"><label class="form-label">備註</label>' +
      '<input id="fm-pay-note" class="form-control" placeholder="例：末五碼 12345…"></div>' +
      '<div style="background:var(--orange-l);border-radius:10px;padding:13px;margin-bottom:16px;font-size:14px;color:var(--orange)">' +
      '⚠️ 登記後需等待管理員確認入款，確認後系統自動開立收據</div>' +
      '<button class="btn btn-orange btn-full" onclick="Admin._fmSubmitPay()">💳 登記繳費</button>' +
      '</div>';
  }

  function _fmUpdateAmount() {
    const sel = document.getElementById('fm-pay-type');
    const box = document.getElementById('fm-amount-box');
    const num = document.getElementById('fm-amount-num');
    if (!sel || !box || !num) return;
    const opt    = sel.options[sel.selectedIndex];
    const amount = opt ? parseInt(opt.getAttribute('data-amount')) : 0;
    if (amount) { box.style.display = ''; num.textContent = _fmtMoney(amount); }
    else        { box.style.display = 'none'; }
  }

  function _fmSubmitPay() {
    const name   = _v('fm-pay-name');
    const type   = _v('fm-pay-type');
    const method = _v('fm-pay-method');
    const date   = _v('fm-pay-date');
    if (!name)   { Toast.warning('請填寫會員姓名'); return; }
    if (!type)   { Toast.warning('請選擇會員類型'); return; }
    if (!date)   { Toast.warning('請選擇繳費日期'); return; }
    const amount = FEE_MAP[type];
    if (!amount) { Toast.warning('無法取得對應費用'); return; }
    const pay = {
      id: MgmtDB.newPayId(), name, type, amount, method, date,
      note      : _v('fm-pay-note'),
      status    : 'pending',
      createdAt : _nowStr(),
    };
    MgmtDB.payments.push(pay);
    _fmSwitchTab('pay', document.getElementById('fm-tab-pay'));
    Toast.success('💳 繳費登記完成！' + name + '（' + type + '）' + _fmtMoney(amount) + '，等待確認入款');
    API.mgmtPost({ action: 'submitPayment', data: pay })
      .catch(e => console.warn('[MgmtAPI] submitPayment:', e));
  }

  function _fmRenderConfirm(panel) {
    const pending = MgmtDB.payments.filter(p => p.status === 'pending');
    panel.innerHTML =
      '<div class="card">' +
      '<div style="background:var(--green-l);border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:var(--green)">' +
      '✅ 管理員確認入款後，系統自動開立收據，檔名格式：<strong>收據編號_會員姓名</strong></div>' +
      '<div class="flex-between mb-12">' +
      '<div class="section-title" style="margin-bottom:0">⏳ 待確認入款</div>' +
      '<span class="tag tag-orange">' + pending.length + ' 筆</span>' +
      '</div>' +
      (pending.length
        ? pending.map(p =>
            '<div style="border:1px solid #FED7AA;border-radius:10px;padding:14px;margin-bottom:10px;background:#FFFBF5">' +
            '<div class="flex-between mb-8">' +
            '<div><div class="font-bold" style="font-size:17px">' + _esc(p.name) + '</div>' +
            '<div style="font-size:13px;color:var(--grey5)">' + _esc(p.id) + '</div></div>' +
            '<span class="tag tag-orange">⏳ 待確認</span>' +
            '</div>' +
            '<div class="info-row"><span class="info-label">👤 會員類型</span><span class="info-value">' + _esc(p.type) + '</span></div>' +
            '<div class="info-row"><span class="info-label">💰 金額</span>' +
            '<span class="info-value font-bold color-orange" style="font-size:18px">' + _fmtMoney(p.amount) + '</span></div>' +
            '<div class="info-row"><span class="info-label">💳 方式</span>' +
            '<span class="info-value">' + (METHOD_ICON[p.method] || '💰') + ' ' + _esc(p.method) + '</span></div>' +
            '<div class="info-row"><span class="info-label">📅 日期</span><span class="info-value">' + _fmtDate(p.date) + '</span></div>' +
            (p.note ? '<div class="info-row"><span class="info-label">📝 備註</span><span class="info-value">' + _esc(p.note) + '</span></div>' : '') +
            '<div style="display:flex;gap:8px;margin-top:12px">' +
            '<button class="btn btn-success btn-sm" style="flex:1" onclick="Admin._fmConfirmPay(\'' + p.id + '\')">✅ 確認入款並開立收據</button>' +
            '<button class="btn btn-danger  btn-sm" style="flex:1" onclick="Admin._fmRejectPay(\'' + p.id + '\')">❌ 退回</button>' +
            '</div></div>'
          ).join('')
        : '<div class="empty-state" style="padding:24px"><div class="empty-icon">💳</div><div class="empty-text">目前沒有待確認的繳費</div></div>') +
      '</div>';
  }

  function _fmConfirmPay(payId) {
    const pay = MgmtDB.payments.find(p => p.id === payId);
    if (!pay) return;
    Modal.confirm(
      '確認「' + pay.name + '」的入款？\n金額：' + _fmtMoney(pay.amount) + '\n方式：' + pay.method + '\n\n確認後系統將自動開立收據。',
      () => {
        pay.status      = 'confirmed';
        pay.confirmedAt = _nowStr();
        const recNo     = MgmtDB.newReceiptNo();
        const fileName  = recNo + '_' + pay.name;
        const receipt   = {
          id: recNo, fileName, payId: pay.id,
          memberName  : pay.name,  memberType: pay.type,
          amount      : pay.amount, method: pay.method,
          payDate     : pay.date,   issuedAt: _nowStr(),
          confirmedAt : pay.confirmedAt, note: pay.note,
        };
        MgmtDB.receipts.push(receipt);
        _fmSwitchTab('confirm', document.getElementById('fm-tab-confirm'));
        Toast.success('🧾 收據已開立！檔名：' + fileName);
        MgmtReceiptHelper.show(receipt);
        API.mgmtPost({ action: 'confirmPayment', data: { id: payId } })
          .catch(e => console.warn('[MgmtAPI] confirmPayment:', e));
      },
      '確認入款'
    );
  }

  function _fmRejectPay(payId) {
    const pay = MgmtDB.payments.find(p => p.id === payId);
    if (!pay) return;
    Modal.confirm(
      '確定退回「' + pay.name + '」的繳費登記？',
      () => {
        pay.status     = 'rejected';
        pay.rejectedAt = _nowStr();
        _fmSwitchTab('confirm', document.getElementById('fm-tab-confirm'));
        Toast.warning('已退回「' + pay.name + '」的繳費登記');
        API.mgmtPost({ action: 'rejectPayment', data: { id: payId } })
          .catch(e => console.warn('[MgmtAPI] rejectPayment:', e));
      },
      '確認退回', true
    );
  }

  function _fmRenderReceipts(panel) {
    panel.innerHTML =
      '<div class="card">' +
      '<div class="flex-between mb-12">' +
      '<div class="section-title" style="margin-bottom:0">🧾 已開立收據</div>' +
      '<span class="tag tag-green">' + MgmtDB.receipts.length + ' 筆</span>' +
      '</div>' +
      '<div style="background:var(--primary-l);border-radius:10px;padding:12px;margin-bottom:14px;font-size:14px;color:var(--primary)">' +
      '📁 檔名格式：<strong>收據編號_會員姓名</strong>（例：REC20250001_王小明）</div>' +
      (MgmtDB.receipts.length
        ? MgmtDB.receipts.slice().reverse().map(r =>
            '<div style="border:1px solid #BBF7D0;border-radius:10px;padding:14px;margin-bottom:10px;background:#F0FDF4">' +
            '<div class="flex-between mb-8">' +
            '<div><div class="font-bold" style="font-size:16px">' + _esc(r.memberName) + '</div>' +
            '<div style="font-size:12px;color:var(--grey5);margin-top:2px">📁 ' + _esc(r.fileName) + '</div></div>' +
            '<span class="tag tag-green">✅ 已開立</span>' +
            '</div>' +
            '<div class="info-row"><span class="info-label">🧾 收據編號</span>' +
            '<span class="info-value font-bold color-primary">' + _esc(r.id) + '</span></div>' +
            '<div class="info-row"><span class="info-label">👤 會員類型</span><span class="info-value">' + _esc(r.memberType) + '</span></div>' +
            '<div class="info-row"><span class="info-label">💰 金額</span>' +
            '<span class="info-value font-bold color-green" style="font-size:18px">' + _fmtMoney(r.amount) + '</span></div>' +
            '<div class="info-row"><span class="info-label">📅 繳費日期</span><span class="info-value">' + _fmtDate(r.payDate) + '</span></div>' +
            '<div class="info-row"><span class="info-label">🕐 開立時間</span><span class="info-value">' + _esc(r.issuedAt) + '</span></div>' +
            '<div style="display:flex;gap:8px;margin-top:12px">' +
            '<button class="btn btn-primary btn-sm" style="flex:1" onclick="Admin._fmPreviewReceipt(\'' + r.id + '\')">👁️ 預覽收據</button>' +
            '<button class="btn btn-success btn-sm" style="flex:1" onclick="Admin._fmPrintReceipt(\'' + r.id + '\')">🖨️ 列印收據</button>' +
            '</div></div>'
          ).join('')
        : '<div class="empty-state" style="padding:24px"><div class="empty-icon">🧾</div><div class="empty-text">尚無已開立收據</div></div>') +
      '</div>';
  }

  function _fmPreviewReceipt(recId) {
    const r = MgmtDB.receipts.find(x => x.id === recId);
    if (!r) { Toast.error('找不到收據資料'); return; }
    MgmtReceiptHelper.show(r);
  }

  function _fmPrintReceipt(recId) {
    const r = MgmtDB.receipts.find(x => x.id === recId);
    if (!r) { Toast.error('找不到收據資料'); return; }
    MgmtReceiptHelper.show(r);
    setTimeout(() => MgmtReceiptHelper.print(), 400);
  }

  // ── 公開介面 ──────────────────────────────────────────
  return {
    load, switchTab,
    _renderStats, _renderMembers, _renderFinance,
    _renderAdminCal, _addAdminCalEvent,
    _renderBroadcast, _sendBroadcast,
    _approveExpense, _rejectExpense,
    _renderEvtMgmt,
    _submitEvt, _editEvt, _saveEvt, _removeEvt,
    _renderVolMgmt,
    _vmSwitchTab, _vmSubmitApply, _vmApprove, _vmReject,
    _vmGenTaskCode, _vmSubmitTask, _vmCompleteTask, _vmRemoveTask,
    _vmSubmitHours, _vmApproveHours, _vmRejectHours,
    _renderFinMgmt,
    _fmSwitchTab, _fmUpdateAmount, _fmSubmitPay,
    _fmConfirmPay, _fmRejectPay,
    _fmPreviewReceipt, _fmPrintReceipt,
  };
})();


// ============================================================
// DOMContentLoaded — 應用程式啟動入口
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {

  // ── 1. 預先掛載所有需要在 onclick 中呼叫的全域函式 ──
  window.App               = App;
  window.Member            = Member;
  window.UI                = UI;
  window.Calendar          = Calendar;
  window.Finance           = Finance;
  window.Volunteer         = Volunteer;
  window.Forum             = Forum;
  window.Info              = Info;
  window.Admin             = Admin;
  window.Modal             = Modal;
  window.Toast             = Toast;
  window.AttachmentHelper  = AttachmentHelper;
  window.ReceiptHelper     = ReceiptHelper;
  window.VoucherHelper     = VoucherHelper;
  window.MgmtReceiptHelper = MgmtReceiptHelper;
  window.MgmtDB            = MgmtDB;
  window.API               = API;

  // ── 2. 全域錯誤攔截 ──────────────────────────────────
  window.addEventListener('error', (e) => {
    console.error('[GlobalError]', e.message, e.filename, e.lineno);
    Toast.error('發生未預期錯誤，請重新整理頁面');
  });

  window.addEventListener('unhandledrejection', (e) => {
    console.error('[UnhandledRejection]', e.reason);
    const msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
    if (msg && !msg.includes('AbortError')) {
      Toast.error('操作失敗：' + msg);
    }
  });

  // ── 3. 底部導覽列：鍵盤可及性（Enter / Space 觸發）──
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.setAttribute('role', 'button');
    btn.setAttribute('tabindex', '0');
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        btn.click();
      }
    });
  });

  // ── 4. 快速選單：鍵盤可及性 ─────────────────────────
  document.querySelectorAll('.quick-item').forEach(btn => {
    btn.setAttribute('role', 'button');
    btn.setAttribute('tabindex', '0');
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        btn.click();
      }
    });
  });

  // ── 5. 頁面可見性：返回前景時自動重整首頁資料 ───────
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      const activePage = document.querySelector('.page.active');
      if (activePage && activePage.id === 'page-home') {
        App.loadMemberData().catch(e => console.warn('[visibilitychange]', e));
      }
    }
  });

  // ── 6. iOS Safari 安全區域補丁 ──────────────────────
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS) {
    document.documentElement.style.setProperty(
      '--safe-bottom', 'env(safe-area-inset-bottom, 20px)'
    );
  }

  // ── 7. 觸控回饋（防止 300ms 延遲）──────────────────
  if ('ontouchstart' in window) {
    document.querySelectorAll('.btn, .quick-item, .nav-item, .list-item, .post-card, .event-card').forEach(el => {
      el.addEventListener('touchstart', () => {}, { passive: true });
    });
  }

  // ── 8. 載入進度條動畫完成後啟動 LIFF ────────────────
  //    給 loading-bar-inner 的 2s 動畫一點緩衝再 init
  setTimeout(async () => {
    try {
      await App.init();
    } catch (err) {
      console.error('[App.init Error]', err);
      const sub = document.querySelector('.loading-sub');
      if (sub) sub.textContent = '啟動失敗：' + (err.message || '未知錯誤');
      Toast.error('應用程式啟動失敗，請重新整理');
    }
  }, 300);

});

// Service Worker 註冊（離線快取，選用）

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // 如有部署 SW，取消下方註解

}

console.info(

  ' 建置：' + new Date().toLocaleDateString('zh-TW') + '\n' +
  ' 模組：App / Member / UI / Calendar / Finance /\n' +
  '        Volunteer / Forum / Info /\n' +
  '        Admin（stats/members/finance/admincal/broadcast/evtmgmt/volmgmt/finmgmt）\n' +

  ' API ：主程式 GAS + 管理系統 GAS（雙端點）',

);
