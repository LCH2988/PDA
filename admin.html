<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>管理員登入 - 帕金森病友促進會</title>
  <style>
    :root {
      --primary:#1A5276; --secondary:#4A90D9; --success:#27AE60;
      --danger:#E74C3C; --bg:#EAF2FF; --card:#FFFFFF;
      --text:#2C3E50; --muted:#7F8C8D; --border:#B0C8E8;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); font-size:18px; min-height:100vh; display:flex; flex-direction:column; }
    .header {
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:white; padding:30px 20px 24px; text-align:center;
    }
    .header .logo { font-size:2.8rem; margin-bottom:10px; }
    .header h1   { font-size:1.3rem; font-weight:700; line-height:1.5; }
    .header p    { font-size:0.9rem; opacity:0.85; margin-top:6px; }
    .container   { padding:20px 16px; max-width:440px; margin:0 auto; width:100%; }
    .card { background:var(--card); border-radius:16px; padding:24px 20px; margin-bottom:16px; box-shadow:0 2px 14px rgba(26,82,118,0.12); }
    .card-title { font-size:1.15rem; font-weight:700; color:var(--primary); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
    .form-group  { margin-bottom:16px; }
    .form-label  { display:block; font-size:1rem; font-weight:600; margin-bottom:8px; }
    .form-control { width:100%; padding:14px 16px; border:2px solid var(--border); border-radius:10px; font-size:1.1rem; color:var(--text); background:#FAFAFA; outline:none; transition:border-color 0.2s; }
    .form-control:focus { border-color:var(--primary); background:white; }
    .btn { display:block; width:100%; padding:16px; border:none; border-radius:12px; font-size:1.1rem; font-weight:700; cursor:pointer; margin-bottom:10px; transition:all 0.2s; text-align:center; }
    .btn:active { transform:scale(0.97); }
    .btn-primary { background:var(--primary); color:white; }
    .btn-outline { background:white; color:var(--primary); border:2px solid var(--primary); }
    .alert { padding:13px 16px; border-radius:10px; font-size:1rem; margin-bottom:14px; display:none; }
    .alert-danger  { background:#FADBD8; color:#C0392B; border:1px solid #F1948A; }
    .alert-success { background:#D5F5E3; color:#1E8449; border:1px solid #A9DFBF; }
    .role-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .role-item { background:#EAF2FF; border-radius:10px; padding:14px 10px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all 0.2s; }
    .role-item.selected { border-color:var(--primary); background:#D6EAF8; }
    .role-item .r-icon  { font-size:1.8rem; margin-bottom:6px; }
    .role-item .r-label { font-size:0.9rem; font-weight:600; color:var(--text); }
    .divider { text-align:center; color:var(--muted); font-size:0.9rem; margin:14px 0; position:relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:38%; height:1px; background:var(--border); }
    .divider::before { left:0; } .divider::after { right:0; }
    .link-btn { display:block; text-align:center; color:var(--secondary); font-size:0.95rem; margin-top:8px; cursor:pointer; text-decoration:underline; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo">🔐</div>
  <h1>管理員登入</h1>
  <p>台灣帕金森病友權益促進會</p>
</div>

<div class="container">
  <div id="alertBox" class="alert"></div>

  <div class="card">
    <div class="card-title">👤 選擇角色</div>
    <div class="role-grid">
      <div class="role-item selected" id="role-finance" onclick="selectRole('finance')">
        <div class="r-icon">💰</div><div class="r-label">財務管理</div>
      </div>
      <div class="role-item" id="role-member" onclick="selectRole('member')">
        <div class="r-icon">👥</div><div class="r-label">會員管理</div>
      </div>
      <div class="role-item" id="role-admin" onclick="selectRole('admin')">
        <div class="r-icon">⚙️</div><div class="r-label">系統管理</div>
      </div>
      <div class="role-item" id="role-report" onclick="selectRole('report')">
        <div class="r-icon">📊</div><div class="r-label">報表查詢</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔑 帳號登入</div>
    <div class="form-group">
      <label class="form-label">人員ID 或 電話後9碼</label>
      <input type="text" id="adminId" class="form-control" placeholder="請輸入ID">
    </div>
    <div class="form-group">
      <label class="form-label">姓名</label>
      <input type="text" id="adminName" class="form-control" placeholder="請輸入姓名">
    </div>
    <button class="btn btn-primary" onclick="adminLogin()">🔓 登入管理系統</button>
  </div>

  <div class="divider">或</div>
  <a class="link-btn" href="index.html">← 返回會員登入頁</a>

  <!-- 初始化區塊（首次部署用）-->
  <div class="card" style="margin-top:20px;border:2px dashed var(--border);">
    <div class="card-title" style="color:var(--muted);">🛠️ 系統初始化（首次使用）</div>
    <p style="font-size:0.9rem;color:var(--muted);margin-bottom:14px;">
      首次部署時點擊此按鈕，自動建立所有 Google Sheets 工作表與預設資料。
    </p>
    <button class="btn btn-outline" onclick="initSystem()">🚀 初始化系統</button>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycby88k95QPzmrt8tiahwaERfwh85p5s_MsLMrA8eqexE4dxieWz91mTtGkPBSAqPmreA/exec';
  let selectedRole = 'finance';

  function selectRole(role) {
    selectedRole = role;
    document.querySelectorAll('.role-item').forEach(el => el.classList.remove('selected'));
    document.getElementById('role-' + role).classList.add('selected');
  }

  async function adminLogin() {
    const id   = document.getElementById('adminId').value.trim();
    const name = document.getElementById('adminName').value.trim();
    if (!id || !name) { showAlert('請填寫ID與姓名', 'danger'); return; }
    try {
      const res = await fetch(API_URL, {
        method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'login', name, phone:id })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('admin', JSON.stringify({ ...data, role: selectedRole }));
        showAlert('登入成功，正在跳轉...', 'success');
        setTimeout(() => {
          if (selectedRole === 'finance' || selectedRole === 'admin' || selectedRole === 'report') {
            window.location.href = 'finance.html';
          } else {
            window.location.href = 'member.html';
          }
        }, 800);
      } else {
        showAlert(data.message || '登入失敗，請確認資料', 'danger');
      }
    } catch(e) { showAlert('網路錯誤：' + e.message, 'danger'); }
  }

  async function initSystem() {
    if (!confirm('確定要初始化系統嗎？此操作將建立所有工作表。')) return;
    try {
      const res = await fetch(API_URL, {
        method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'initSystem' })
      });
      const data = await res.json();
      showAlert(data.success ? '✅ 系統初始化完成！' : data.message, data.success ? 'success' : 'danger');
    } catch(e) { showAlert('初始化失敗：' + e.message, 'danger'); }
  }

  function showAlert(msg, type='success') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => box.style.display='none', 4000);
  }

  window.onload = function() {
    const admin = localStorage.getItem('admin');
    if (admin) {
      const a = JSON.parse(admin);
      if (a.memberId || a.staffId) {
        window.location.href = 'finance.html';
      }
    }
  };
</script>
</body>
</html>
