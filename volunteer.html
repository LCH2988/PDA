<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>法師接送護持隨身助手</title>
  
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-size: 18px;
      touch-action: manipulation;
    }
    input, select, textarea, button {
      font-size: 18px !important;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // [系統設定] 請在此處替換您的 LIFF ID 與 GAS API 網址
    // =========================================================================
    const LIFF_ID = "2006181829-l81j2YrD"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbzRTuIjg0ol8ifcKUgW2hhFDIfmc3PYxDkBYHsks1WQqsZy83NNhsC7sJgkHtGaNN7C3g/exec";

    function App() {
      const [userRole, setUserRole] = React.useState('volunteer');
      const [userName, setUserName] = React.useState('載入中...');
      const [userId, setUserId] = React.useState(''); 
      const [userPhone, setUserPhone] = React.useState('0912-345-678');
      const [isLiffInit, setIsLiffInit] = React.useState(false);
      
      const [tasks, setTasks] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('my-tasks');

      const [newForm, setNewForm] = React.useState({
        monks: '', date: '', time: '', pickup: '', dropoff: '', notes: ''
      });

      // 初始化 LIFF 並取得使用者真實資訊
      React.useEffect(() => {
        liff.init({ liffId: LIFF_ID })
          .then(() => {
            setIsLiffInit(true);
            if (liff.isLoggedIn()) {
              liff.getProfile()
                .then(profile => {
                  setUserName(profile.displayName);
                  setUserId(profile.userId);
                  if (profile.displayName.includes("法師")) {
                    setUserRole("monk");
                  }
                })
                .catch(err => console.error("取得 LINE 個人資料失敗", err));
            } else {
              liff.login();
            }
          })
          .catch(err => {
            console.error("LIFF 初始化失敗，切換為模擬模式", err);
            setUserName("林東毅 (模擬)");
            setUserId("U114514");
          });
          
        fetchTasks();
      }, []);

      // 修正：每次畫面更新後重新渲染 Lucide 圖示，避免切換 Tab 後圖示消失
      React.useEffect(() => {
        if (window.lucide) {
          lucide.createIcons();
        }
      }, [activeTab, tasks, userRole, loading, userName]);

      // API：讀取雲端行程 (GET 請求)
      const fetchTasks = async () => {
        setLoading(true);
        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error('網路連線失敗');
          const data = await response.json();
          setTasks(data);
        } catch (error) {
          console.error("讀取資料失敗，載入模擬資料:", error);
          setTasks([
            { id: 'REC0001', status: '已排定', monks: '如英法師', date: '2026-07-01', time: '19:00', pickup: '妙覺寺', dropoff: '華藏樓', driverId: 'U114514', driverName: '林東毅', driverPhone: '0912-345-678', notes: '法師行李較多' },
            { id: 'REC0002', status: '進行中', monks: '清幢法師', date: '2026-07-01', time: '15:30', pickup: '華藏樓', dropoff: '鳳山寺', driverId: 'U114514', driverName: '林東毅', driverPhone: '0912-345-678', notes: '需準時' }
          ]);
        } finally {
          setLoading(false);
        }
      };

      // LIFF：發送訊息至當前聊天室
      const sendLiffChatMessage = async (textMessage) => {
        if (liff.isInClient()) {
          try {
            await liff.sendMessages([{ type: 'text', text: textMessage }]);
            console.log("LIFF 訊息發送成功");
          } catch (error) {
            console.error("LIFF 傳送訊息失敗:", error);
          }
        } else {
          console.log("非 LINE 環境，模擬發送訊息：", textMessage);
        }
      };

      // 通用 POST 請求函式
      // 修正：使用 text/plain 避免瀏覽器發送 CORS Preflight (OPTIONS) 請求
      // Google Apps Script 無法處理 OPTIONS，改用此法可讓前端讀取真實回應
      const postToAPI = async (payload) => {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error('伺服器連線失敗');
        const result = await response.json();
        if (result.status !== 'success') {
          throw new Error(result.message || '未知錯誤');
        }
        return result;
      };

      // API：更新行程狀態 (出發、已完成)
      const handleUpdateStatus = async (task, newStatus) => {
        setLoading(true);
        try {
          await postToAPI({ action: 'updateStatus', id: task.id, status: newStatus });

          const msg = `📢【接送狀態更新】\n━━━━━━━━━━━━━━━\n👤 護持法師：${task.monks}\n🚗 護持司機：${userName}\n🚩 最新狀態：【${newStatus}】\n━━━━━━━━━━━━━━━`;
          await sendLiffChatMessage(msg);

          alert(`✅ 狀態已成功更新為：${newStatus}`);
          setTasks(prev => prev.map(t => t.id === task.id ? { ...t, status: newStatus } : t));
        } catch (error) {
          console.error(error);
          alert('❌ 更新失敗：' + error.message);
        } finally {
          setLoading(false);
        }
      };

      // API：志工認領行程 (接單)
      const handleClaimTask = async (task) => {
        setLoading(true);
        try {
          await postToAPI({
            action: 'claim',
            id: task.id,
            driverId: userId,
            driverName: userName,
            driverPhone: userPhone
          });

          const msg = `🚗【大護法已接單！】\n━━━━━━━━━━━━━━━\n👤 護持法師：${task.monks}\n📅 接送時間：${task.date} ${task.time}\n📍 路線：${task.pickup} ➔ ${task.dropoff}\n👤 護持司機：${userName} (${userPhone})\n━━━━━━━━━━━━━━━\n隨喜發心護持，行車平安，功德無量！`;
          await sendLiffChatMessage(msg);

          alert('🎉 您已成功接下此護持任務，功德無量！');
          setTasks(prev => prev.map(t => t.id === task.id ? { ...t, driverId: userId, driverName: userName, driverPhone: userPhone, status: '已排定' } : t));
        } catch (error) {
          console.error(error);
          alert('❌ 接單失敗：' + error.message);
          fetchTasks(); // 可能已被其他人接單，重新整理清單
        } finally {
          setLoading(false);
        }
      };

      // API：排班志工新增接送需求
      const handleCreateTask = async (e) => {
        e.preventDefault();
        if (!newForm.monks || !newForm.date || !newForm.time || !newForm.pickup || !newForm.dropoff) {
          alert('⚠️ 請填寫所有的必填欄位！');
          return;
        }
        setLoading(true);
        try {
          await postToAPI({ action: 'create', ...newForm });

          const msg = `🔔【新登記法師接送需求】\n━━━━━━━━━━━━━━━\n👤 需護持法師：${newForm.monks}\n📅 接送日期：${newForm.date}\n⏰ 接送時間：${newForm.time}\n📍 接送路線：${newForm.pickup} ➔ ${newForm.dropoff}\n📝 備註事項：${newForm.notes || '無'}\n━━━━━━━━━━━━━━━\n👉 請大護法志工們點擊系統接單護持！`;
          await sendLiffChatMessage(msg);

          alert('💾 接送需求已成功寫入雲端試算表並發送通知！');
          setNewForm({ monks: '', date: '', time: '', pickup: '', dropoff: '', notes: '' });
          setActiveTab('all-tasks');
          fetchTasks();
        } catch (error) {
          console.error(error);
          alert('❌ 送出失敗：' + error.message);
        } finally {
          setLoading(false);
        }
      };

      // 測試用：手動切換身分 (正式上線建議移除或加權限保護)
      const handleRoleChange = (role) => {
        setUserRole(role);
        if (role === 'volunteer') {
          setUserName('林東毅'); setUserId('U114514'); setActiveTab('my-tasks');
        } else if (role === 'monk') {
          setUserName('如英法師'); setUserId('M0001'); setActiveTab('my-tasks');
        } else {
          setUserName('妙覺寺排班組'); setUserId('S0001'); setActiveTab('all-tasks');
        }
      };

      return (
        <div className="max-w-md mx-auto bg-slate-100 min-h-screen flex flex-col pb-24 text-slate-900 shadow-xl">
          
          <header className="bg-emerald-800 text-white p-5 shadow-lg sticky top-0 z-10">
            <div className="flex justify-between items-center">
              <div>
                <h1 className="text-2xl font-black tracking-wider">法師接送隨身助手</h1>
                <p className="text-base text-emerald-200 mt-1 font-bold">
                  👤 使用者：<span className="underline">{userName}</span> ({
                    userRole === 'volunteer' ? '護持志工' : userRole === 'monk' ? '法師' : '排班志工'
                  })
                </p>
              </div>
              <button 
                onClick={fetchTasks} 
                className="bg-emerald-900 p-3 rounded-full active:bg-emerald-950 border border-emerald-700 transition"
                title="重新整理"
              >
                <i data-lucide="refresh-cw" className={`w-6 h-6 block ${loading ? 'animate-spin' : ''}`}></i>
              </button>
            </div>

            <div className="mt-4 bg-emerald-950 p-1.5 rounded-xl flex gap-1 text-base font-bold border border-emerald-900">
              <button 
                onClick={() => handleRoleChange('volunteer')}
                className={`flex-1 py-3 rounded-lg text-center transition ${userRole === 'volunteer' ? 'bg-white text-emerald-950 shadow-md' : 'text-white'}`}
              >志工端</button>
              <button 
                onClick={() => handleRoleChange('monk')}
                className={`flex-1 py-3 rounded-lg text-center transition ${userRole === 'monk' ? 'bg-white text-emerald-950 shadow-md' : 'text-white'}`}
              >法師端</button>
              <button 
                onClick={() => handleRoleChange('scheduler')}
                className={`flex-1 py-3 rounded-lg text-center transition ${userRole === 'scheduler' ? 'bg-white text-emerald-950 shadow-md' : 'text-white'}`}
              >排班端</button>
            </div>
          </header>

          <div className="flex bg-white border-b-4 border-slate-200 sticky top-[156px] z-10 shadow-md">
            {userRole !== 'scheduler' && (
              <button 
                onClick={() => setActiveTab('my-tasks')}
                className={`flex-1 py-4 text-lg font-black flex flex-col items-center gap-1 transition ${activeTab === 'my-tasks' ? 'text-emerald-800 border-b-4 border-emerald-800 bg-emerald-50/50' : 'text-slate-500'}`}
              >
                <i data-lucide="user" className="w-7 h-7"></i>
                <span>我的行程</span>
              </button>
            )}
            <button 
              onClick={() => setActiveTab('all-tasks')}
              className={`flex-1 py-4 text-lg font-black flex flex-col items-center gap-1 transition ${activeTab === 'all-tasks' ? 'text-emerald-800 border-b-4 border-emerald-800 bg-emerald-50/50' : 'text-slate-500'}`}
            >
              <i data-lucide="list" className="w-7 h-7"></i>
              <span>所有行程</span>
            </button>
            {userRole === 'scheduler' && (
              <button 
                onClick={() => setActiveTab('create')}
                className={`flex-1 py-4 text-lg font-black flex flex-col items-center gap-1 transition ${activeTab === 'create' ? 'text-emerald-800 border-b-4 border-emerald-800 bg-emerald-50/50' : 'text-slate-500'}`}
              >
                <i data-lucide="plus-circle" className="w-7 h-7"></i>
                <span>登記接送</span>
              </button>
            )}
          </div>

          <main className="flex-1 p-4 space-y-4">

            {activeTab === 'my-tasks' && userRole !== 'scheduler' && (
              <div className="space-y-4">
                <div className="bg-amber-50 border-2 border-amber-300 rounded-2xl p-4 text-amber-950 shadow-sm">
                  <p className="text-xl font-black">您好，{userName}！</p>
                  <p className="text-base mt-1 font-bold">以下是您目前已排定的護持行程：</p>
                  {userRole === 'volunteer' && (
                    <div className="mt-2">
                      <label className="block text-xs font-bold text-slate-500 mb-1">您的聯絡電話 (接單時會提供給法師)：</label>
                      <input 
                        type="text" 
                        value={userPhone} 
                        onChange={(e) => setUserPhone(e.target.value)}
                        className="w-full border p-2 rounded-lg text-sm bg-white"
                      />
                    </div>
                  )}
                </div>

                {tasks.filter(t => 
                  (userRole === 'volunteer' && t.driverId === userId && t.status !== '已完成') ||
                  (userRole === 'monk' && t.monks.includes(userName) && t.status !== '已完成')
                ).length === 0 ? (
                  <div className="bg-white rounded-2xl p-10 text-center border-2 border-dashed border-slate-300">
                    <p className="text-xl text-slate-500 font-black">目前沒有進行中的行程</p>
                  </div>
                ) : (
                  tasks.filter(t => 
                    (userRole === 'volunteer' && t.driverId === userId && t.status !== '已完成') ||
                    (userRole === 'monk' && t.monks.includes(userName) && t.status !== '已完成')
                  ).map(task => (
                    <div key={task.id} className="bg-white rounded-2xl shadow-md border-2 border-slate-200 overflow-hidden">
                      
                      <div className="bg-amber-500 text-white px-4 py-3 flex justify-between items-center">
                        <span className="text-xl font-black tracking-wider">【行程狀態：{task.status}】</span>
                        <span className="text-sm font-mono font-bold bg-amber-600 px-2 py-0.5 rounded">#{task.id}</span>
                      </div>

                      <div className="p-4 space-y-4">
                        <div className="flex items-center gap-3 border-b pb-2">
                          <i data-lucide="user" className="w-8 h-8 text-emerald-700 flex-shrink-0"></i>
                          <div>
                            <p className="text-xs text-slate-400 font-bold">需護持的法師</p>
                            <p className="text-2xl font-black text-slate-800">{task.monks}</p>
                          </div>
                        </div>

                        <div className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-xl border">
                          <div className="flex items-center gap-2">
                            <i data-lucide="calendar" className="w-6 h-6 text-slate-500"></i>
                            <span className="text-lg font-bold text-slate-700">{task.date}</span>
                          </div>
                          <div className="flex items-center gap-2">
                            <i data-lucide="clock" className="w-6 h-6 text-slate-500"></i>
                            <span className="text-lg font-bold text-slate-700">{task.time}</span>
                          </div>
                        </div>

                        <div className="bg-emerald-50/50 p-4 rounded-xl border-2 border-emerald-100 space-y-3">
                          <div className="flex items-start gap-3">
                            <i data-lucide="map-pin" className="w-7 h-7 text-blue-600 mt-1 flex-shrink-0"></i>
                            <div>
                              <span className="text-xs font-bold text-blue-600 bg-blue-100 px-2 py-0.5 rounded">上車地 (接地)</span>
                              <p className="text-xl font-black text-slate-800 mt-1">{task.pickup}</p>
                            </div>
                          </div>
                          <div className="h-5 border-l-4 border-dashed border-slate-300 ml-3.5"></div>
                          <div className="flex items-start gap-3">
                            <i data-lucide="map-pin" className="w-7 h-7 text-red-600 mt-1 flex-shrink-0"></i>
                            <div>
                              <span className="text-xs font-bold text-red-600 bg-red-100 px-2 py-0.5 rounded">下車地 (送地)</span>
                              <p className="text-xl font-black text-slate-800 mt-1">{task.dropoff}</p>
                            </div>
                          </div>
                        </div>

                        {userRole === 'monk' && task.driverName && (
                          <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 flex justify-between items-center">
                            <div>
                              <p className="text-xs text-blue-600 font-bold">負責的大護法</p>
                              <p className="text-xl font-black text-slate-800">{task.driverName}</p>
                            </div>
                            <a href={`tel:${task.driverPhone}`} className="bg-blue-600 text-white p-4 rounded-full shadow-md active:bg-blue-700">
                              <i data-lucide="phone" className="w-6 h-6"></i>
                            </a>
                          </div>
                        )}

                        {task.notes && (
                          <div className="bg-amber-50 p-3 rounded-xl border border-amber-200">
                            <p className="text-base font-bold text-amber-900">⚠️ 備註：{task.notes}</p>
                          </div>
                        )}

                        {userRole === 'volunteer' && (
                          <div className="space-y-3 pt-2">
                            <a 
                              href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.pickup)}`}
                              target="_blank" 
                              rel="noreferrer"
                              className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-xl text-lg font-black flex justify-center items-center gap-2 shadow-md"
                            >
                              <i data-lucide="navigation" className="w-6 h-6"></i> 開啟地圖導航
                            </a>
                            
                            {task.status === '已排定' && (
                              <button 
                                onClick={() => handleUpdateStatus(task, '進行中')}
                                className="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-xl text-lg font-black shadow-md"
                              >
                                現在出發去接法師
                              </button>
                            )}

                            {task.status === '進行中' && (
                              <button 
                                onClick={() => handleUpdateStatus(task, '已完成')}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-black flex justify-center items-center gap-2 shadow-md"
                              >
                                <i data-lucide="check-circle-2" className="w-6 h-6"></i> 已安全送達目的地
                              </button>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {activeTab === 'all-tasks' && (
              <div className="space-y-4">
                <h2 className="text-xl font-black text-slate-800 px-1">全部接送清單 ({tasks.length} 筆)</h2>
                {tasks.map(task => (
                  <div key={task.id} className="bg-white p-4 rounded-2xl border-2 border-slate-200 shadow-sm space-y-3">
                    <div className="flex justify-between items-center">
                      <span className={`text-sm px-3 py-1 rounded-full font-black ${
                        task.status === '已完成' ? 'bg-slate-200 text-slate-700' :
                        task.status === '進行中' ? 'bg-blue-100 text-blue-800' :
                        task.status === '已排定' ? 'bg-emerald-100 text-emerald-800' : 'bg-red-100 text-red-800'
                      }`}>
                        {task.status}
                      </span>
                      <span className="text-sm font-mono text-slate-400 font-bold">#{task.id}</span>
                    </div>

                    <h3 className="text-xl font-black text-slate-800">{task.monks}</h3>
                    
                    <div className="text-base font-bold text-slate-600 space-y-1">
                      <p>📅 日期時間：{task.date} 在 {task.time}</p>
                      <p>📍 路線：<span className="text-blue-600">{task.pickup}</span> → <span className="text-red-600">{task.dropoff}</span></p>
                    </div>

                    <div className="pt-3 border-t border-slate-100 flex justify-between items-center">
                      {task.driverName ? (
                        <p className="text-base font-bold text-slate-700">🚗 護持司機：{task.driverName}</p>
                      ) : (
                        <p className="text-base font-black text-red-600">⚠️ 尚無司機護持</p>
                      )}

                      {userRole === 'volunteer' && !task.driverName && (
                        <button 
                          onClick={() => handleClaimTask(task)}
                          className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-xl text-base font-black shadow-md active:bg-emerald-800"
                        >
                          我要接單
                        </button>
                      )}
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'create' && userRole === 'scheduler' && (
              <form onSubmit={handleCreateTask} className="bg-white p-5 rounded-2xl border-2 border-slate-200 shadow-sm space-y-5">
                <h2 className="text-xl font-black text-slate-800 border-b-2 pb-2">✍️ 登記新接送需求</h2>
                
                <div>
                  <label className="block text-base font-black text-slate-700 mb-1">1. 需護持的法師 *</label>
                  <input 
                    type="text" 
                    placeholder="例如：如英法師" 
                    value={newForm.monks}
                    onChange={e => setNewForm({...newForm, monks: e.target.value})}
                    className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                    required
                  />
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-base font-black text-slate-700 mb-1">2. 接送日期 *</label>
                    <input 
                      type="date" 
                      value={newForm.date}
                      onChange={e => setNewForm({...newForm, date: e.target.value})}
                      className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-base font-black text-slate-700 mb-1">3. 時間 *</label>
                    <input 
                      type="time" 
                      value={newForm.time}
                      onChange={e => setNewForm({...newForm, time: e.target.value})}
                      className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                      required
                    />
                  </div>
                </div>

                <div>
                  <label className="block text-base font-black text-slate-700 mb-1">4. 接地 (出發地) *</label>
                  <input 
                    type="text" 
                    placeholder="例如：鳳山寺" 
                    value={newForm.pickup}
                    onChange={e => setNewForm({...newForm, pickup: e.target.value})}
                    className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                    required
                  />
                </div>

                <div>
                  <label className="block text-base font-black text-slate-700 mb-1">5. 送地 (目的地) *</label>
                  <input 
                    type="text" 
                    placeholder="例如：桃園機場" 
                    value={newForm.dropoff}
                    onChange={e => setNewForm({...newForm, dropoff: e.target.value})}
                    className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                    required
                  />
                </div>

                <div>
                  <label className="block text-base font-black text-slate-700 mb-1">6. 備註說明</label>
                  <textarea 
                    rows={2}
                    placeholder="例如：法師行李多，需協助搬運" 
                    value={newForm.notes}
                    onChange={e => setNewForm({...newForm, notes: e.target.value})}
                    className="w-full border-2 border-slate-300 rounded-xl p-3 text-lg focus:outline-none focus:border-emerald-600"
                  />
                </div>

                <button 
                  type="submit"
                  className="w-full bg-emerald-700 hover:bg-emerald-800 text-white py-4 rounded-xl text-xl font-black shadow-lg transition-colors"
                >
                  💾 儲存並同步至雲端
                </button>
              </form>
            )}
          </main>

          <footer className="text-center py-6 text-xs text-slate-500 border-t border-slate-200 bg-white mt-auto">
            <p className="font-bold text-sm">妙覺寺 / 鳳山寺 護法車隊系統</p>
            <p className="mt-1">字體已放大，適合長輩與開車時閱讀</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
