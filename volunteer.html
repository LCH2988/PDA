<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>法師接送護持隨身助手</title>
  
  <!-- 載入 LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- 載入 React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    body {
      font-size: 18px;
      touch-action: manipulation;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    input, select, textarea, button {
      font-size: 18px !important;
    }
    /* 自訂捲軸樣式 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #c5a880;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-stone-100 min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // [正式版設定] 請在此處替換您的實體 LIFF ID 與 GAS API 網址
    // =========================================================================
    const LIFF_ID = "2006181829-l81j2YrD"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbwFRE4KjByrOFBaSoapZ8WhNpcmx8RhEx0JLyPwciLsSIqjNQbSSlUjL-J1Nvw8gt5kZA/exec";

    // -------------------------------------------------------------------------
    // 獨立 SVG 圖示元件 (防止 Lucide 異步載入時失效)
    // -------------------------------------------------------------------------
    function Icon({ name, className = "w-6 h-6 inline-block" }) {
      const svgs = {
        'refresh': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
        ),
        'user': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
          </svg>
        ),
        'list': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 6.75h12M8.25 12h12M8.25 17.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
          </svg>
        ),
        'plus-circle': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        ),
        'calendar': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
          </svg>
        ),
        'clock': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        ),
        'map-pin': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
            <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25s-7.5-4.108-7.5-11.25a7.5 7.5 0 1115 0z" />
          </svg>
        ),
        'phone': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-2.824-1.802-5.176-4.154-7-7.008l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z" />
          </svg>
        ),
        'navigation': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
          </svg>
        ),
        'check-circle-2': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        ),
        'info': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.063.852l-.708 2.836a.75.75 0 001.063.852l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
          </svg>
        ),
        'search': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.604 10.604z" />
          </svg>
        ),
        'trash': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
          </svg>
        ),
        'check': (
          <svg fill="none" viewBox="0 0 24 24" strokeWidth="3" stroke="currentColor" className={className}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" />
          </svg>
        )
      };
      return svgs[name] || <span className="text-xs">圖示</span>;
    }

    function App() {
      // 1. 使用者認證與註冊狀態
      const [isRegistered, setIsRegistered] = React.useState(false);
      const [userRole, setUserRole] = React.useState('volunteer'); // 'volunteer', 'monk', 'scheduler'
      const [userName, setUserName] = React.useState('載入中...');
      const [userId, setUserId] = React.useState(''); 
      const [userPhone, setUserPhone] = React.useState('');
      const [isLiffInit, setIsLiffInit] = React.useState(false);
      
      const [tasks, setTasks] = React.useState([]);
      const [driversList, setDriversList] = React.useState([]); // 從後端動態獲取的司機名冊
      const [loading, setLoading] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('my-tasks');

      // 篩選與搜尋
      const [searchTerm, setSearchTerm] = React.useState('');
      const [statusFilter, setStatusFilter] = React.useState('全部');

      // 自訂通知與 Modal 系統 (取代 window.alert & confirm)
      const [toast, setToast] = React.useState({ show: false, message: '', type: 'success' });
      const [modal, setModal] = React.useState({ show: false, title: '', message: '', onConfirm: null, confirmText: '確定' });

      // 新增需求表單 State (排班與法師共用)
      const [newForm, setNewForm] = React.useState({
        monks: '',
        date: '',
        time: '',
        pickup: '',
        dropoff: '',
        notes: '',
        assignedDriverId: '' // 新增指派駕駛欄位 (排班志工用)
      });

      // 註冊表單 State
      const [regForm, setRegForm] = React.useState({
        name: '',
        phone: '',
        role: 'volunteer'
      });

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast(prev => ({ ...prev, show: false }));
        }, 3500);
      };

      const showConfirmModal = (title, message, onConfirm, confirmText = '確定') => {
        setModal({ show: true, title, message, onConfirm, confirmText });
      };

      const closeConfirmModal = () => {
        setModal(prev => ({ ...prev, show: false }));
      };

      // 2. 初始化 LIFF 並取得使用者真實資訊與註冊狀態
      React.useEffect(() => {
        if (typeof liff !== 'undefined') {
          liff.init({ liffId: LIFF_ID })
            .then(() => {
              setIsLiffInit(true);
              if (liff.isLoggedIn()) {
                liff.getProfile()
                  .then(profile => {
                    const lineId = profile.userId;
                    setUserId(lineId);
                    // 根據 LINE 顯示名稱預填註冊表單
                    setRegForm(prev => ({
                      ...prev,
                      name: profile.displayName,
                      role: profile.displayName.includes("法師") ? "monk" : "volunteer"
                    }));
                    // 向 GAS 後端查詢是否已註冊
                    checkUserRegistration(lineId);
                  })
                  .catch(err => {
                    console.error("取得 LINE 個人資料失敗", err);
                    showToast("讀取 LINE 資訊失敗，請確認行動網路環境。", "error");
                  });
              } else {
                if (liff.isInClient()) {
                  liff.login();
                } else {
                  // 在非 LINE App 瀏覽器開啟時自動進行重導向登入
                  liff.login();
                }
              }
            })
            .catch(err => {
              console.error("LIFF 初始化失敗", err);
              showToast("LIFF 載入失敗，請確認是否在 LINE 內置瀏覽器中開啟。", "error");
            });
        }
      }, []);

      // 查詢使用者是否在試算表中有註冊紀錄
      const checkUserRegistration = async (lineId) => {
        setLoading(true);
        try {
          const response = await fetch(`${API_URL}?action=getUser&userId=${lineId}`);
          if (!response.ok) throw new Error();
          const data = await response.json();
          if (data.success && data.isRegistered) {
            setUserName(data.user.name);
            setUserPhone(data.user.phone);
            setUserRole(data.user.role);
            setIsRegistered(true);
            
            // 根據註冊身分導入合適的預設頁籤
            if (data.user.role === 'scheduler') {
              setActiveTab('all-tasks');
              fetchDrivers(); // 排班人員自動讀取所有志工駕駛
            } else {
              setActiveTab('my-tasks');
            }
            fetchTasks();
          } else {
            // 尚未註冊
            setIsRegistered(false);
          }
        } catch (error) {
          showToast("連線後端驗證失敗，請確認 API 網址是否正確設定。", "error");
        } finally {
          setLoading(false);
        }
      };

      // 3. API：讀取所有接送行程
      const fetchTasks = async () => {
        setLoading(true);
        try {
          const response = await fetch(API_URL);
          if (!response.ok) throw new Error('網路連線失敗');
          const data = await response.json();
          setTasks(data);
        } catch (error) {
          showToast("讀取雲端行程失敗，請確認連線。", "error");
        } finally {
          setLoading(false);
        }
      };

      // 4. API：讀取所有駕駛名冊 (排班志工登記時，從 Users 表單即時查詢)
      const fetchDrivers = async () => {
        try {
          const response = await fetch(`${API_URL}?action=getDrivers`);
          if (response.ok) {
            const data = await response.json();
            setDriversList(data);
          }
        } catch (error) {
          console.error("讀取司機名冊失敗", error);
        }
      };

      // 5. LIFF：發送同步訊息至 LINE 聊天室
      const sendLiffChatMessage = async (textMessage) => {
        if (typeof liff !== 'undefined' && liff.isInClient() && liff.isLoggedIn()) {
          try {
            await liff.sendMessages([{ type: 'text', text: textMessage }]);
            showToast("已同步在 LINE 群組中發送通知訊息！", "success");
          } catch (error) {
            console.error("LIFF 傳送訊息失敗:", error);
            showToast("無法同步發送 LINE 訊息 (可能非群組對話框內)", "info");
          }
        } else {
          console.log("非 LINE 環境，模擬發送：\n", textMessage);
        }
      };

      // 6. 提交註冊登記
      const handleRegisterSubmit = async (e) => {
        e.preventDefault();
        if (!regForm.name || !regForm.phone) {
          showToast('⚠️ 請填寫完整註冊欄位！', 'warning');
          return;
        }
        setLoading(true);

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              action: 'register',
              userId: userId,
              name: regForm.name,
              phone: regForm.phone,
              role: regForm.role
            })
          });
          const data = await response.json();
          if (data.success) {
            showToast("🎉 註冊成功，正在導入系統...", "success");
            setTimeout(() => {
              checkUserRegistration(userId);
            }, 1000);
          } else {
            showToast("❌ 註冊寫入失敗，請重試。", "error");
          }
        } catch (error) {
          showToast("❌ 註冊寫入失敗，請確認網路連線。", "error");
        } finally {
          setLoading(false);
        }
      };

      // 7. 志工接受或婉拒排班組「直接指派任務」
      const handleConfirmAssignment = (task, isAccepted) => {
        const actionText = isAccepted ? '確認接受' : '婉拒指派';
        showConfirmModal(
          `${actionText}此護持指派？`,
          isAccepted 
            ? `確認接受護持 ${task.monks} 的任務嗎？接受後將會正式成立行程，並通知法師大護法駕駛資訊。`
            : `婉拒後，此任務會重新釋放至「待領取」狀態。`,
          async () => {
            closeConfirmModal();
            setLoading(true);

            const apiAction = isAccepted ? 'acceptAssignment' : 'rejectAssignment';

            try {
              const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                  action: apiAction, 
                  id: task.id, 
                  driverPhone: userPhone // 確認接受時需要提供最新的司機手機
                })
              });
              const data = await response.json();
              if (data.success) {
                if (isAccepted) {
                  const msg = `🚗【護持志工已接單確認！】\n━━━━━━━━━━━━━━━\n👤 護持法師：${task.monks}\n📅 接送時間：${task.date} ${task.time}\n📍 路線：${task.pickup} ➔ ${task.dropoff}\n👤 護持大護法已確認：${userName} (${userPhone})\n━━━━━━━━━━━━━━━\n法師已收到您的資訊，感恩護持！`;
                  await sendLiffChatMessage(msg);
                } else {
                  const msg = `⚠️【護持指派已婉拒】\n━━━━━━━━━━━━━━━\n👤 需護持法師：${task.monks}\n📅 時間：${task.date} ${task.time}\n此指派已被婉拒，已重新釋放為待領取。`;
                  await sendLiffChatMessage(msg);
                }
                showToast(`您已${actionText}指派任務`);
                fetchTasks();
              } else {
                showToast("❌ 操作更新失敗，請重新嘗試。", "error");
              }
            } catch (error) {
              showToast('❌ 處理失敗，請確認連線！', 'error');
            } finally {
              setLoading(false);
            }
          }
        );
      };

      // 8. 志工主動認領任務 (待排班審核)
      const handleClaimTask = (task) => {
        showConfirmModal(
          '申請認領護持行程？',
          `您即將申請認領此任務：\n👤 法師：${task.monks}\n📅 時間：${task.date} ${task.time}\n\n注意：認領將進入「待排班審核」狀態。審核核准後才會正式成立並通知法師。`,
          async () => {
            closeConfirmModal();
            setLoading(true);

            try {
              const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                  action: 'claim',
                  id: task.id,
                  driverId: userId,
                  driverName: userName,
                  driverPhone: userPhone
                })
              });
              const data = await response.json();
              if (data.success) {
                const msg = `🙋‍♂️【志工申請認領行程】\n━━━━━━━━━━━━━━━\n👤 護持法師：${task.monks}\n📅 接送時間：${task.date} ${task.time}\n👤 認領駕駛：${userName} (${userPhone})\n━━━━━━━━━━━━━━━\n⏳ 待排班志工審核確認後正式生效。`;
                await sendLiffChatMessage(msg);
                showToast('🎉 已提交認領申請，請等待排班審核！', 'success');
                fetchTasks();
              } else {
                showToast("❌ 提交認領失敗。", "error");
              }
            } catch (error) {
              showToast('❌ 申請認領失敗，請稍後再試！', 'error');
            } finally {
              setLoading(false);
            }
          }
        );
      };

      // 9. 排班志工：核准或拒絕志工認領
      const handleApproveClaim = (task, isApproved) => {
        const actionLabel = isApproved ? '核准' : '拒絕';
        showConfirmModal(
          `確定要${actionLabel}此認領？`,
          isApproved 
            ? `確認指派大護法【${task.driverName}】護持本行程嗎？核准後會發布正式通知至 LINE。`
            : `拒絕後，本行程將會重新釋放為「待領取」狀態。`,
          async () => {
            closeConfirmModal();
            setLoading(true);

            const apiAction = isApproved ? 'approveClaim' : 'rejectClaim';

            try {
              const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ 
                  action: apiAction, 
                  id: task.id
                })
              });
              const data = await response.json();
              if (data.success) {
                if (isApproved) {
                  const msg = `✅【排班核准：接送任務已成立！】\n━━━━━━━━━━━━━━━\n👤 護持法師：${task.monks}\n📅 時間：${task.date} ${task.time}\n📍 路線：${task.pickup} ➔ ${task.dropoff}\n🚗 護持大護法：${task.driverName} (${task.driverPhone})\n━━━━━━━━━━━━━━━\n行車平安，隨喜大家發心護持！`;
                  await sendLiffChatMessage(msg);
                } else {
                  const msg = `⚠️【認領審核退回】\n━━━━━━━━━━━━━━━\n👤 需護持法師：${task.monks}\n📅 時間：${task.date} ${task.time}\n認領申請已駁回，本行程重新開放認領。`;
                  await sendLiffChatMessage(msg);
                }
                showToast(`已成功${actionLabel}認領申請！`, 'success');
                fetchTasks();
              } else {
                showToast("❌ 審核處理失敗。", "error");
              }

                        {userRole === 'monk' && (
                          <div className="bg-emerald-50/70 p-4 rounded-2xl border border-emerald-100">
                            <p className="text-xs text-emerald-800 font-bold">負責護持的大護法志工</p>
                            {task.status === '待排班確認' || task.status === '待駕駛確認' ? (
                              <p className="text-lg font-black text-stone-500 mt-1">⏳ 駕駛安排與確認中，生效後會立即呈現聯絡方式</p>
                            ) : task.driverName ? (
                              <div className="flex justify-between items-center mt-1">
                                <div>
                                  <p className="text-xl font-black text-stone-800">{task.driverName}</p>
                                  <p className="text-sm text-stone-500 font-mono mt-0.5">{task.driverPhone}</p>
                                </div>
                                <a 
                                  href={`tel:${task.driverPhone}`} 
                                  className="bg-emerald-800 text-white p-3 rounded-full shadow-md hover:bg-emerald-900"
                                >
                                  <Icon name="phone" className="w-6 h-6" />
                                </a>
                              </div>
                            ) : (
                              <p className="text-lg font-black text-red-600 mt-1">⏳ 正在安排大護法駕駛中...</p>
                            )}
                          </div>
                        )}

                        {/* 駕駛專用操作區 */}
                        {userRole === 'volunteer' && (
                          <div className="space-y-3 pt-2">
                            {/* 情況一：被指派待確認 */}
                            {task.status === '待駕駛確認' && (
                              <div className="bg-amber-100/60 p-4 rounded-2xl border-2 border-amber-300 space-y-3">
                                <p className="text-sm text-amber-950 font-black text-center">排班人員已將此行程指派給您，請確認您是否能護持？</p>
                                <div className="flex gap-2">
                                  <button 
                                    onClick={() => handleConfirmAssignment(task, false)}
                                    className="flex-1 bg-stone-200 text-stone-800 font-bold py-3 rounded-xl hover:bg-stone-300 text-sm"
                                  >
                                    婉拒指派 ❌
                                  </button>
                                  <button 
                                    onClick={() => handleConfirmAssignment(task, true)}
                                    className="flex-1 bg-emerald-800 text-white font-black py-3 rounded-xl hover:bg-emerald-900 text-sm shadow-md"
                                  >
                                    確認接受 👍
                                  </button>
                                </div>
                              </div>
                            )}

                            {/* 情況二：主動認領，待審核中 */}
                            {task.status === '待排班確認' && (
                              <div className="bg-stone-100 p-4 rounded-2xl text-center border">
                                <p className="text-sm font-black text-stone-500">⏳ 已向排班管理組提交認領申請，請等待確認核准...</p>
                              </div>
                            )}

                            {/* 情況三：已排定/進行中/可操作導航 */}
                            {task.status === '已排定' && (
                              <div className="space-y-3">
                                <a 
                                  href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.pickup)}`}
                                  target="_blank" 
                                  rel="noreferrer"
                                  className="w-full bg-stone-800 hover:bg-stone-900 text-white py-3.5 rounded-2xl text-lg font-black flex justify-center items-center gap-2 shadow-md"
                                >
                                  <Icon name="navigation" className="w-5 h-5" /> 開啟導航前往接地點
                                </a>
                                <button 
                                  onClick={() => handleUpdateStatus(task, '進行中')}
                                  className="w-full bg-amber-500 hover:bg-amber-600 text-stone-950 py-3.5 rounded-2xl text-lg font-black shadow"
                                >
                                  現在出發接法師 ➔
                                </button>
                              </div>
                            )}

                            {task.status === '進行中' && (
                              <div className="space-y-3">
                                <a 
                                  href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.dropoff)}`}
                                  target="_blank" 
                                  rel="noreferrer"
                                  className="w-full bg-stone-800 hover:bg-stone-900 text-white py-3.5 rounded-2xl text-lg font-black flex justify-center items-center gap-2 shadow-md"
                                >
                                  <Icon name="navigation" className="w-5 h-5" /> 開啟目的地導航
                                </a>
                                <button 
                                  onClick={() => handleUpdateStatus(task, '已完成')}
                                  className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-3.5 rounded-2xl text-lg font-black flex justify-center items-center gap-2 shadow"
                                >
                                  <Icon name="check-circle-2" className="w-6 h-6" /> 我已安全送達目的地
                                </button>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* 頁面 B：所有行程 */}
            {activeTab === 'all-tasks' && (
              <div className="space-y-4">
                <div className="bg-white p-4 rounded-3xl shadow-sm border border-stone-200 space-y-3 animate-fade-in">
                  <h2 className="text-xl font-black text-stone-800">🔍 接送行程篩選搜尋</h2>
                  
                  {/* 搜尋 */}
                  <div className="relative">
                    <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-stone-400">
                      <Icon name="search" className="w-5 h-5" />
                    </span>
                    <input 
                      type="text" 
                      placeholder="搜尋法師名字、地點..." 
                      value={searchTerm}
                      onChange={e => setSearchTerm(e.target.value)}
                      className="w-full bg-stone-50 pl-11 pr-4 py-3 border-2 border-stone-200 rounded-2xl text-base focus:border-emerald-800 focus:bg-white focus:outline-none transition-colors"
                    />
                  </div>

                  {/* 狀態過濾鈕 */}
                  <div className="flex flex-wrap gap-1.5 pt-1">
                    {['全部', '待領取', '待駕駛確認', '待排班確認', '已排定', '進行中', '已完成'].map(st => (
                      <button
                        key={st}
                        onClick={() => setStatusFilter(st)}
                        className={`px-3 py-1.5 rounded-xl text-xs font-black transition ${
                          statusFilter === st 
                            ? 'bg-emerald-800 text-white shadow-sm' 
                            : 'bg-stone-100 text-stone-600 hover:bg-stone-200'
                        }`}
                      >
                        {st}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="flex justify-between items-center px-1">
                  <span className="text-base text-stone-500 font-bold">
                    符合條件：<span className="text-emerald-800 font-black">{filteredTasks.length}</span> 筆行程
                  </span>
                </div>

                {filteredTasks.length === 0 ? (
                  <div className="bg-white rounded-3xl p-10 text-center border-2 border-stone-200 text-stone-400 font-bold">
                    目前沒有符合搜尋與篩選條件的行程。
                  </div>
                ) : (
                  filteredTasks.map(task => (
                    <div key={task.id} className="bg-white p-5 rounded-3xl border border-stone-200 shadow-md space-y-4 hover:border-stone-300 transition animate-fade-in">
                      
                      <div className="flex justify-between items-start">
                        <span className={`text-xs px-3 py-1 rounded-full font-black border ${
                          task.status === '已完成' ? 'bg-stone-100 text-stone-600 border-stone-200' :
                          task.status === '進行中' ? 'bg-blue-50 text-blue-700 border-blue-200 animate-pulse' :
                          task.status === '已排定' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 
                          task.status === '待排班確認' ? 'bg-purple-50 text-purple-700 border-purple-200' :
                          task.status === '待駕駛確認' ? 'bg-amber-50 text-amber-700 border-amber-200' :
                          'bg-red-50 text-red-600 border-red-200 animate-pulse'
                        }`}>
                          {task.status === '待領取' ? '⚠️ 待領取 (徵求大護法)' : task.status}
                        </span>
                        
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-mono text-stone-400 font-bold">#{task.id}</span>
                          {/* 排班組專用：刪除/取消行程 */}
                          {userRole === 'scheduler' && (
                            <button 
                              onClick={() => handleDeleteTask(task)}
                              className="text-red-600 p-1.5 hover:bg-red-50 rounded-lg transition"
                              title="刪除並取消此行程"
                            >
                              <Icon name="trash" className="w-5 h-5" />
                            </button>
                          )}
                        </div>
                      </div>

                      <div>
                        <h3 className="text-2xl font-black text-stone-800 flex items-center gap-1.5">
                          <span>☸️</span> {task.monks}
                        </h3>
                      </div>
                      
                      <div className="text-base font-bold text-stone-600 space-y-2 bg-stone-50 p-3.5 rounded-2xl border border-stone-150">
                        <p className="flex items-center gap-2">
                          <Icon name="calendar" className="w-5 h-5 text-stone-400" />
                          <span>{task.date} ({task.time})</span>
                        </p>
                        <p className="flex items-start gap-2">
                          <Icon name="map-pin" className="w-5 h-5 text-stone-400 mt-0.5" />
                          <span className="leading-snug">
                            <span className="text-blue-600 font-black">{task.pickup}</span>
                            <span className="mx-1 text-stone-400">➔</span>
                            <span className="text-red-600 font-black">{task.dropoff}</span>
                          </span>
                        </p>
                      </div>

                      {task.notes && (
                        <p className="text-sm font-bold text-amber-800 bg-amber-50/50 px-3 py-2 rounded-xl">
                          備註說明：{task.notes}
                        </p>
                      )}

                      {/* 認領、審核與接受面板 */}
                      <div className="pt-3.5 border-t border-stone-100 space-y-3">
                        
                        <div className="flex justify-between items-center">
                          {task.driverName ? (
                            <div className="flex items-center gap-2">
                              <span className="text-2xl">🚗</span>
                              <div>
                                <p className="text-xs text-stone-400 font-bold">
                                  {task.status === '待排班確認' ? '認領申請志工' : '已定護持司機'}
                                </p>
                                <p className="text-base font-black text-stone-700">{task.driverName}</p>
                              </div>
                            </div>
                          ) : (
                            <p className="text-base font-black text-red-600 flex items-center gap-1.5">
                              <span className="w-2.5 h-2.5 rounded-full bg-red-600 inline-block animate-ping"></span>
                              尚待安排志工承接
                            </p>
                          )}

                          {/* 認領動作：限司機志工端，待領取狀態 */}
                          {userRole === 'volunteer' && task.status === '待領取' && !task.driverName && (
                            <button 
                              onClick={() => handleClaimTask(task)}
                              className="bg-emerald-800 hover:bg-emerald-900 text-white px-5 py-2.5 rounded-2xl text-base font-black shadow-md active:scale-95 transition-all"
                            >
                              申請認領護持 ✍️
                            </button>
                          )}
                        </div>

                        {/* 排班組審核志工認領 */}
                        {userRole === 'scheduler' && task.status === '待排班確認' && (
                          <div className="bg-purple-50 p-3 rounded-2xl border border-purple-200 flex flex-col gap-2">
                            <p className="text-sm font-bold text-purple-950 text-center">志工「{task.driverName}」已發出認領，請進行審核：</p>
                            <div className="flex gap-2">
                              <button 
                                onClick={() => handleApproveClaim(task, false)}
                                className="flex-1 bg-stone-200 hover:bg-stone-300 text-stone-800 font-bold py-2 rounded-xl text-sm"
                              >
                                婉拒申請
                              </button>
                              <button 
                                onClick={() => handleApproveClaim(task, true)}
                                className="flex-1 bg-purple-700 hover:bg-purple-800 text-white font-black py-2 rounded-xl text-sm shadow"
                              >
                                核准指派 ✔️
                              </button>
                            </div>
                          </div>
                        )}

                        {userRole === 'scheduler' && task.status === '待駕駛確認' && (
                          <div className="bg-amber-50 p-3 rounded-2xl border border-amber-200 text-center">
                            <p className="text-sm font-bold text-amber-950">⏳ 已指定發信給「{task.driverName}」，等待駕駛回覆接受...</p>
                          </div>
                        )}

                      </div>
                    </div>
                  ))
                )}
              </div>
            )}

            {/* 頁面 C：登記接送 (排班管理組專用) */}
            {activeTab === 'create' && userRole === 'scheduler' && (
              <form onSubmit={handleCreateTask} className="bg-white p-6 rounded-3xl border border-stone-200 shadow-lg space-y-5 animate-fade-in">
                <h2 className="text-2xl font-black text-stone-800 border-b-2 border-stone-100 pb-3 flex items-center gap-2">
                  <span>✍️</span> 登記新接送需求
                </h2>
                
                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">1. 需護持的法師姓名 *</label>
                  <input 
                    type="text" 
                    placeholder="例如：如英法師" 
                    value={newForm.monks}
                    onChange={e => setNewForm({...newForm, monks: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                    required
                  />
                </div>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-base font-black text-stone-700 mb-1.5">2. 接送日期 *</label>
                    <input 
                      type="date" 
                      value={newForm.date}
                      onChange={e => setNewForm({...newForm, date: e.target.value})}
                      className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-base font-black text-stone-700 mb-1.5">3. 時間 *</label>
                    <input 
                      type="time" 
                      value={newForm.time}
                      onChange={e => setNewForm({...newForm, time: e.target.value})}
                      className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                      required
                    />
                  </div>
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">4. 接地 (出發地) *</label>
                  <input 
                    type="text" 
                    placeholder="例如：鳳山寺 / 台北高鐵站 3 號出口" 
                    value={newForm.pickup}
                    onChange={e => setNewForm({...newForm, pickup: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                    required
                  />
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">5. 送地 (目的地) *</label>
                  <input 
                    type="text" 
                    placeholder="例如：妙覺寺 / 桃園機場第一航廈" 
                    value={newForm.dropoff}
                    onChange={e => setNewForm({...newForm, dropoff: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                    required
                  />
                </div>

                {/* 指派駕駛：動態讀取雲端註冊的志工司機列表 */}
                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">6. 指派特定的護持司機</label>
                  <select 
                    value={newForm.assignedDriverId}
                    onChange={e => setNewForm({...newForm, assignedDriverId: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors font-bold"
                  >
                    <option value="">（不指定司機，開放自由認領）</option>
                    {driversList.map(driver => (
                      <option key={driver.id} value={driver.id}>🚗 {driver.name} ({driver.phone})</option>
                    ))}
                  </select>
                  <p className="text-xs text-stone-500 mt-1 font-bold">提示：指派後，行程進入「待駕駛確認」，對方點選同意後系統會自動通知法師。</p>
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">7. 備註說明 (特別需求)</label>
                  <textarea 
                    rows={2}
                    placeholder="例如：法師行李多，車輛請預留行李箱空位。" 
                    value={newForm.notes}
                    onChange={e => setNewForm({...newForm, notes: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                  />
                </div>

                <button 
                  type="submit"
                  disabled={loading}
                  className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-4 rounded-2xl text-xl font-black shadow-lg transition duration-200 active:scale-[0.99]"
                >
                  {loading ? '同步處理中...' : '💾 儲存並同步指派任務'}
                </button>
              </form>
            )}

            {/* 頁面 D：提出接送需求 (法師自主提出) */}
            {activeTab === 'monk-request' && userRole === 'monk' && (
              <form onSubmit={handleMonkCreateTask} className="bg-white p-6 rounded-3xl border border-stone-200 shadow-lg space-y-5 animate-fade-in">
                <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-200 font-bold text-stone-850 text-sm leading-relaxed">
                  🙏 尊貴的 <span className="underline text-emerald-800 font-black">{userName}</span> 您好，請於下方填寫您的接送需求，送出後系統會立刻發出通知，供車隊的大護法志工們點擊認領護持。
                </div>

                <h2 className="text-2xl font-black text-stone-800 border-b-2 border-stone-100 pb-3 flex items-center gap-2">
                  <span>✍️</span> 登記我的接送需求
                </h2>

                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-base font-black text-stone-700 mb-1.5">1. 接送日期 *</label>
                    <input 
                      type="date" 
                      value={newForm.date}
                      onChange={e => setNewForm({...newForm, date: e.target.value})}
                      className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                      required
                    />
                  </div>
                  <div>
                    <label className="block text-base font-black text-stone-700 mb-1.5">2. 接送時間 *</label>
                    <input 
                      type="time" 
                      value={newForm.time}
                      onChange={e => setNewForm({...newForm, time: e.target.value})}
                      className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                      required
                    />
                  </div>
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">3. 上車地點 *</label>
                  <input 
                    type="text" 
                    placeholder="例如：妙覺寺 / 台北高鐵站 3 號出口" 
                    value={newForm.pickup}
                    onChange={e => setNewForm({...newForm, pickup: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                    required
                  />
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">4. 下車地點 *</label>
                  <input 
                    type="text" 
                    placeholder="例如：鳳山寺 / 桃園機場" 
                    value={newForm.dropoff}
                    onChange={e => setNewForm({...newForm, dropoff: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                    required
                  />
                </div>

                <div>
                  <label className="block text-base font-black text-stone-700 mb-1.5">5. 備註特別說明</label>
                  <textarea 
                    rows={2}
                    placeholder="例如：此行法師行李較多，需要車廂空間稍寬敞。" 
                    value={newForm.notes}
                    onChange={e => setNewForm({...newForm, notes: e.target.value})}
                    className="w-full border-2 border-stone-200 bg-stone-50 rounded-2xl p-3.5 text-lg focus:outline-none focus:border-emerald-800 focus:bg-white transition-colors"
                  />
                </div>

                <button 
                  type="submit"
                  disabled={loading}
                  className="w-full bg-emerald-800 hover:bg-emerald-900 text-white py-4 rounded-2xl text-xl font-black shadow-lg transition duration-200 active:scale-[0.99]"
                >
                  {loading ? '同步處理中...' : '🙏 送出並同步通知大護法們'}
                </button>
              </form>
            )}
          </main>

          {/* 頁尾 */}
          <footer className="text-center py-8 px-4 text-xs text-stone-400 border-t border-stone-200 bg-white mt-auto rounded-t-[2.5rem] shadow-inner">
            <p className="font-bold text-sm text-stone-600">☸️ 妙覺寺 / 鳳山寺 護法車隊隨身助手</p>
            <p className="mt-1.5">專為開車安全、高清晰高辨識設計之特大字正式版</p>
            <p className="mt-1 text-[10px] text-stone-400 font-mono">LIFF ID: {LIFF_ID}</p>
          </footer>
        </div>
      );
    }

    // 渲染 React 元件
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
