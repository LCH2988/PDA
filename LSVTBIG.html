<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LINE 記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --line-green: #06C755; --line-dark: #00B248; --line-light: #E8F9EE;
      --bg: #F7F7F7; --card-bg: #FFFFFF; --text-main: #1A1A1A;
      --text-sub: #888888; --border: #E5E5E5; --danger: #FF4D4F;
      --pin-color: #FFB800; --tag-bg: #E8F9EE; --tag-color: #00B248;
      --nav-h: 60px; --header-h: 56px; --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
    }
    html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    .header { height: var(--header-h); background: var(--line-green); display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(6,199,85,.3); flex-shrink: 0; }
    .header h1 { color: #fff; font-size: 18px; font-weight: 700; flex: 1; text-align: center; }
    .header-btn { background: none; border: none; cursor: pointer; color: #fff; font-size: 22px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background .2s; }
    .header-btn:hover { background: rgba(255,255,255,.2); }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-h) + 8px); }
    .view { display: none; }
    .view.active { display: block; }

    /* Bottom Nav */
    .bottom-nav { height: var(--nav-h); background: #fff; border-top: 1px solid var(--border); display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,.06); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: var(--text-sub); font-size: 11px; font-weight: 500; transition: color .2s; border: none; background: none; }
    .nav-item .nav-icon { font-size: 22px; line-height: 1; }
    .nav-item.active { color: var(--line-green); }

    /* Search */
    .search-wrap { padding: 12px 16px 8px; position: sticky; top: 0; background: var(--bg); z-index: 10; }
    .search-box { display: flex; align-items: center; gap: 8px; background: #fff; border: 1.5px solid var(--border); border-radius: 24px; padding: 8px 14px; transition: border-color .2s; }
    .search-box:focus-within { border-color: var(--line-green); }
    .search-box input { flex: 1; border: none; outline: none; font-size: 14px; background: transparent; }
    .search-icon { color: var(--text-sub); font-size: 16px; }

    /* Note Cards */
    .notes-grid { padding: 8px 16px; display: flex; flex-direction: column; gap: 10px; }
    .note-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); cursor: pointer; transition: transform .15s, box-shadow .15s; position: relative; border-left: 4px solid transparent; animation: fadeIn .25s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .note-card:active { transform: scale(.98); }
    .note-card.pinned { border-left-color: var(--pin-color); }
    .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .card-title { font-size: 15px; font-weight: 600; flex: 1; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; }
    .pin-badge { font-size: 14px; flex-shrink: 0; color: var(--pin-color); }
    .card-preview { font-size: 13px; color: var(--text-sub); line-height: 1.5; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
    .card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .card-date { font-size: 11px; color: var(--text-sub); margin-right: auto; }
    .tag-chip { font-size: 11px; background: var(--tag-bg); color: var(--tag-color); border-radius: 20px; padding: 2px 8px; font-weight: 500; }
    .card-actions { display: flex; gap: 4px; margin-left: 4px; }
    .card-action-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 4px; border-radius: 6px; transition: background .15s; line-height: 1; }
    .card-action-btn:hover { background: var(--bg); }
    .card-image { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-sub); }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* Edit View */
    .edit-wrap { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-sub); }
    .form-input, .form-textarea { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .2s, box-shadow .2s; background: #fff; color: var(--text-main); }
    .form-input:focus, .form-textarea:focus { border-color: var(--line-green); box-shadow: 0 0 0 3px rgba(6,199,85,.12); }
    .form-textarea { min-height: 200px; resize: vertical; line-height: 1.6; }
    .char-count { font-size: 11px; color: var(--text-sub); text-align: right; }

    /* Tags */
    .tags-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 10px; background: #fff; cursor: text; min-height: 44px; align-items: center; transition: border-color .2s; }
    .tags-input-wrap:focus-within { border-color: var(--line-green); }
    .tag-item { display: flex; align-items: center; gap: 4px; background: var(--tag-bg); color: var(--tag-color); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 500; }
    .tag-remove { cursor: pointer; font-size: 14px; line-height: 1; }
    .tags-input { border: none; outline: none; font-size: 14px; background: transparent; min-width: 80px; flex: 1; }

    /* Markdown */
    .md-toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-switch { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-sub); cursor: pointer; user-select: none; }
    .toggle-switch input { display: none; }
    .toggle-track { width: 36px; height: 20px; background: var(--border); border-radius: 10px; position: relative; transition: background .2s; flex-shrink: 0; }
    .toggle-switch input:checked + .toggle-track { background: var(--line-green); }
    .toggle-track::after { content: ""; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); }
    .md-preview { border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; min-height: 200px; background: #fff; font-size: 14px; line-height: 1.7; display: none; }
    .md-preview.show { display: block; }
    .md-preview h1,.md-preview h2,.md-preview h3 { margin: .5em 0 .3em; color: var(--text-main); }
    .md-preview p { margin: .3em 0; }
    .md-preview code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .md-preview pre { background: #f5f5f5; border-radius: 8px; padding: 12px; overflow-x: auto; margin: .5em 0; }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview ul, .md-preview ol { padding-left: 20px; margin: .3em 0; }
    .md-preview blockquote { border-left: 3px solid var(--line-green); padding-left: 10px; color: var(--text-sub); margin: .5em 0; }
    .md-preview a { color: var(--line-green); }
    .md-preview table { border-collapse: collapse; width: 100%; margin: .5em 0; }
    .md-preview th, .md-preview td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
    .md-preview th { background: var(--line-light); }

    /* Image Upload */
    .img-upload-area { border: 2px dashed var(--border); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; color: var(--text-sub); font-size: 14px; }
    .img-upload-area:hover { border-color: var(--line-green); background: var(--line-light); }
    .img-upload-area input { display: none; }
    .img-preview-wrap { position: relative; display: inline-block; }
    .img-preview { max-width: 100%; max-height: 200px; border-radius: 8px; }
    .img-remove-btn { position: absolute; top: -8px; right: -8px; background: var(--danger); color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Pin Row */
    .pin-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: #fff; border: 1.5px solid var(--border); border-radius: 10px; }
    .pin-row-label { font-size: 14px; display: flex; align-items: center; gap: 6px; }

    /* Buttons */
    .btn { border: none; border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .btn-primary { background: var(--line-green); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-ghost { background: var(--bg); color: var(--text-main); border: 1px solid var(--border); }
    .btn-block { width: 100%; }
    .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 20px; width: 52px; height: 52px; border-radius: 50%; background: var(--line-green); color: #fff; font-size: 26px; border: none; cursor: pointer; box-shadow: 0 4px 16px rgba(6,199,85,.45); display: flex; align-items: center; justify-content: center; transition: transform .2s, box-shadow .2s; z-index: 90; }
    .fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(6,199,85,.5); }

    /* Detail */
    .detail-wrap { padding: 16px; }
    .detail-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .detail-meta { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .detail-image { width: 100%; border-radius: 10px; margin-bottom: 14px; max-height: 300px; object-fit: cover; }
    .detail-content { font-size: 15px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
    .detail-content-md { font-size: 15px; line-height: 1.8; }
    .detail-content-md h1,.detail-content-md h2,.detail-content-md h3 { margin: .5em 0 .3em; }
    .detail-content-md p { margin: .4em 0; }
    .detail-content-md code { background: #f0f0f0; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .detail-content-md pre { background: #f5f5f5; border-radius: 8px; padding: 12px; overflow-x: auto; margin: .5em 0; }
    .detail-content-md pre code { background: none; }
    .detail-content-md ul, .detail-content-md ol { padding-left: 20px; margin: .3em 0; }
    .detail-content-md blockquote { border-left: 3px solid var(--line-green); padding-left: 10px; color: var(--text-sub); }
    .detail-content-md a { color: var(--line-green); }
    .detail-content-md table { border-collapse: collapse; width: 100%; margin: .5em 0; }
    .detail-content-md th, .detail-content-md td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
    .detail-content-md th { background: var(--line-light); }
    .detail-actions { display: flex; gap: 10px; margin-top: 20px; }
    .detail-actions .btn { flex: 1; }

    /* Toast */
    #toast { position: fixed; bottom: calc(var(--nav-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(0,0,0,.75); color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; pointer-events: none; opacity: 0; transition: opacity .3s, transform .3s; z-index: 999; white-space: nowrap; max-width: 90vw; text-align: center; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: flex-end; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .25s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box { background: #fff; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; width: 100%; max-width: 480px; transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.4,1); }
    .modal-overlay.show .modal-box { transform: translateY(0); }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
    .modal-msg { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.6; }
    .modal-actions { display: flex; gap: 10px; }
    .modal-actions .btn { flex: 1; }

    /* Loading */
    #loading { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 999; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--line-light); border-top-color: var(--line-green); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--text-sub); font-size: 14px; }

    /* Non-LIFF */
    #non-liff-warning { display: none; position: fixed; inset: 0; background: #fff; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 32px; text-align: center; z-index: 1000; }
    #non-liff-warning .warn-icon { font-size: 64px; }
    #non-liff-warning h2 { font-size: 20px; font-weight: 700; }
    #non-liff-warning p { font-size: 14px; color: var(--text-sub); line-height: 1.6; }

    /* Scrollbar */
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>載入中...</p>
</div>

<!-- Non-LIFF Warning -->
<div id="non-liff-warning">
  <div class="warn-icon">⚠️</div>
  <h2>請從 LINE 開啟</h2>
  <p>此應用程式需要在 LINE App 內開啟才能使用。<br>請透過 LINE 的 LIFF 連結存取。</p>
</div>

<!-- App -->
<div id="app" style="display:none;">
  <div class="header" id="main-header">
    <button class="header-btn" id="back-btn" style="visibility:hidden;" onclick="App.goBack()">←</button>
    <h1 id="header-title">📒 我的記事本</h1>
    <button class="header-btn" id="header-action-btn" style="visibility:hidden;"></button>
  </div>

  <div class="content" id="content-area">

    <!-- 列表頁 -->
    <div id="view-list" class="view active">
      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="搜尋標題、內容或標籤..." />
          <span id="search-clear" style="cursor:pointer;color:var(--text-sub);display:none;">✕</span>
        </div>
      </div>
      <div class="notes-grid" id="notes-grid"></div>
    </div>

    <!-- 編輯頁 -->
    <div id="view-edit" class="view">
      <div class="edit-wrap">
        <div class="form-group">
          <label class="form-label">標題</label>
          <input type="text" class="form-input" id="edit-title" placeholder="輸入記事標題..." maxlength="100" />
          <div class="char-count"><span id="title-count">0</span> / 100</div>
        </div>
        <div class="form-group">
          <div class="md-toggle-row">
            <label class="form-label">內容</label>
            <label class="toggle-switch">
              <input type="checkbox" id="md-toggle" />
              <div class="toggle-track"></div>
              Markdown 預覽
            </label>
          </div>
          <textarea class="form-textarea" id="edit-content" placeholder="輸入記事內容...&#10;&#10;支援 Markdown：&#10;**粗體** *斜體* `程式碼`&#10;# 標題  - 列表"></textarea>
          <div class="md-preview" id="md-preview"></div>
          <div class="char-count"><span id="content-count">0</span> 字</div>
        </div>
        <div class="form-group">
          <label class="form-label">標籤（輸入後按 Enter 新增）</label>
          <div class="tags-input-wrap" id="tags-input-wrap">
            <input type="text" class="tags-input" id="tags-input" placeholder="新增標籤..." maxlength="20" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">圖片（最大 5MB）</label>
          <div class="img-upload-area" id="img-upload-area" onclick="document.getElementById('img-file-input').click()">
            <input type="file" id="img-file-input" accept="image/*" />
            <div id="img-upload-placeholder">📷 點擊上傳圖片</div>
            <div class="img-preview-wrap" id="img-preview-wrap" style="display:none;">
              <img class="img-preview" id="img-preview" src="" alt="預覽" />
              <button class="img-remove-btn" onclick="App.removeImage(event)">✕</button>
            </div>
          </div>
        </div>
        <div class="pin-row">
          <span class="pin-row-label">📌 置頂此記事</span>
          <label class="toggle-switch">
            <input type="checkbox" id="pin-toggle" />
            <div class="toggle-track"></div>
          </label>
        </div>
        <button class="btn btn-primary btn-block" id="save-btn" onclick="App.saveNote()">💾 儲存記事</button>
        <button class="btn btn-ghost btn-block" id="delete-edit-btn" style="display:none;" onclick="App.confirmDelete()">🗑️ 刪除此記事</button>
      </div>
    </div>

    <!-- 詳情頁 -->
    <div id="view-detail" class="view">
      <div class="detail-wrap">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-tags" id="detail-tags"></div>
        <img class="detail-image" id="detail-image" src="" alt="" style="display:none;" />
        <div id="detail-content-area"></div>
        <div class="detail-actions">
          <button class="btn btn-primary" onclick="App.editCurrentNote()">✏️ 編輯</button>
          <button class="btn btn-ghost" onclick="App.shareNote()">📤 分享</button>
          <button class="btn btn-danger" onclick="App.confirmDelete()">🗑️ 刪除</button>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <button class="fab" id="fab" onclick="App.openNewNote()" title="新增記事">＋</button>

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-list" onclick="App.switchNav('list')">
      <span class="nav-icon">📋</span>列表
    </button>
    <button class="nav-item" id="nav-add" onclick="App.openNewNote()">
      <span class="nav-icon">✏️</span>新增
    </button>
    <button class="nav-item" id="nav-search" onclick="App.focusSearch()">
      <span class="nav-icon">🔍</span>搜尋
    </button>
  </nav>
</div><!-- /app -->

<!-- Toast -->
<div id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">確認刪除</div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal()">取消</button>
      <button class="btn btn-danger" id="modal-confirm-btn">確認刪除</button>
    </div>
  </div>
</div>

<script>
// =============================================
// ⚙️ 設定區 — 請修改以下兩個值
// =============================================
const CONFIG = {
  LIFF_ID: "2009456572-AUDE1qmM",         // ← 替換為你的 LIFF ID
  GAS_URL: "https://script.google.com/macros/s/AKfycbzmcuiXkBPf7CjuFg2QHGd7oIV6bcN6oy5sngB_CiO9gbjBbrJGRDcib55GOkli4nXY5w/exec"  // ← 替換為你的 GAS Web App URL
};

// =============================================
// App 主體
// =============================================
const App = (() => {
  // ── State ──────────────────────────────────
  let userId             = null;
  let notes              = [];
  let editingId          = null;
  let currentNote        = null;
  let currentView        = "list";
  let searchTimer        = null;
  let modalCallback      = null;
  let tagValues          = [];
  let pendingImageBase64 = null;
  let pendingImageMime   = null;
  let pendingImageName   = null;

  const $ = id => document.getElementById(id);

  // ── Init ───────────────────────────────────
  async function init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      userId = profile.userId;
      boot();
    } catch (err) {
      console.error("LIFF init error:", err);
      // 本機開發 fallback
      if (["localhost", "127.0.0.1"].includes(location.hostname)) {
        userId = "U_DEV_TEST";
        boot();
        showToast("⚠️ 開發模式（非 LIFF 環境）");
      } else {
        $("loading").style.display = "none";
        const w = $("non-liff-warning");
        w.style.display = "flex";
      }
    }
  }

  function boot() {
    $("app").style.display = "flex";
    $("loading").style.display = "none";
    bindEvents();
    loadNotes();
  }

  // ── API ────────────────────────────────────
  async function apiGet(params) {
    const url = new URL(CONFIG.GAS_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    const res = await fetch(url.toString(), { method: "GET" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  async function apiPost(body) {
    const res = await fetch(CONFIG.GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
      redirect: "follow"
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  // ── Load Notes ─────────────────────────────
  async function loadNotes(keyword = "") {
    try {
      const params = keyword
        ? { action: "searchNotes", userId, keyword }
        : { action: "getNotes", userId };
      const result = await apiGet(params);
      if (result.status === "success") {
        notes = result.data;
        renderNotesList();
      } else {
        showToast("❌ 載入失敗：" + result.message);
      }
    } catch (e) {
      showToast("❌ 網路錯誤，請稍後再試");
      console.error(e);
    }
  }

  // ── Render List ────────────────────────────
  function renderNotesList() {
    const grid = $("notes-grid");
    if (!notes.length) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📝</div>
          <p>還沒有任何記事<br>點擊右下角 ＋ 開始記錄吧！</p>
        </div>`;
      return;
    }
    grid.innerHTML = notes.map(note => {
      const preview  = note.content.replace(/[#*`>\-\[\]_~|]/g, "").slice(0, 60);
      const date     = formatDate(note.updatedAt);
      const tags     = note.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join("");
      const pinBadge = note.isPinned ? `<span class="pin-badge">📌</span>` : "";
      const imgHtml  = note.imageUrl
        ? `<img class="card-image" src="${escHtml(note.imageUrl)}" alt="" loading="lazy" />`
        : "";
      return `
        <div class="note-card ${note.isPinned ? "pinned" : ""}" data-id="${note.id}" onclick="App.openDetail('${note.id}')">
          ${imgHtml}
          <div class="card-header">
            <div class="card-title">${escHtml(note.title)}</div>
            ${pinBadge}
          </div>
          <div class="card-preview">${escHtml(preview)}${note.content.length > 60 ? "…" : ""}</div>
          <div class="card-footer">
            <span class="card-date">${date}</span>
            ${tags}
            <div class="card-actions" onclick="event.stopPropagation()">
              <button class="card-action-btn" title="${note.isPinned ? "取消置頂" : "置頂"}" onclick="App.togglePin('${note.id}')">
                ${note.isPinned ? "📌" : "📍"}
              </button>
              <button class="card-action-btn" title="編輯" onclick="App.openEdit('${note.id}')">✏️</button>
              <button class="card-action-btn" title="刪除" onclick="App.confirmDeleteById('${note.id}')">🗑️</button>
            </div>
          </div>
        </div>`;
    }).join("");
  }

  // ── Detail ─────────────────────────────────
  function openDetail(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentNote = note;

    $("detail-title").textContent = note.title;
    $("detail-meta").innerHTML =
      `<span>📅 建立：${formatDate(note.createdAt)}</span>
       <span>🔄 更新：${formatDate(note.updatedAt)}</span>
       ${note.isPinned ? "<span>📌 已置頂</span>" : ""}`;

    $("detail-tags").innerHTML = note.tags.length
      ? note.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join("")
      : "";

    if (note.imageUrl) {
      $("detail-image").src = note.imageUrl;
      $("detail-image").style.display = "block";
    } else {
      $("detail-image").style.display = "none";
    }

    // 自動偵測 Markdown
    const contentArea = $("detail-content-area");
    const hasMd = /[#*`>\-\[\]_~]/.test(note.content);
    if (hasMd) {
      contentArea.innerHTML = `<div class="detail-content-md">${marked.parse(note.content)}</div>`;
    } else {
      contentArea.innerHTML = `<div class="detail-content">${escHtml(note.content)}</div>`;
    }

    showView("detail");
    $("header-title").textContent = "記事詳情";
    $("back-btn").style.visibility = "visible";
    $("header-action-btn").style.visibility = "hidden";
  }

  // ── Edit ───────────────────────────────────
  function openNewNote() {
    editingId   = null;
    currentNote = null;
    $("edit-title").value   = "";
    $("edit-content").value = "";
    $("pin-toggle").checked = false;
    $("md-toggle").checked  = false;
    $("md-preview").classList.remove("show");
    $("edit-content").style.display = "block";
    $("delete-edit-btn").style.display = "none";
    $("title-count").textContent   = "0";
    $("content-count").textContent = "0";
    clearTags();
    clearImage();
    showView("edit");
    $("header-title").textContent = "新增記事";
    $("back-btn").style.visibility = "visible";
    setTimeout(() => $("edit-title").focus(), 100);
  }

  function openEdit(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    editingId   = id;
    currentNote = note;

    $("edit-title").value   = note.title;
    $("edit-content").value = note.content;
    $("pin-toggle").checked = note.isPinned;
    $("md-toggle").checked  = false;
    $("md-preview").classList.remove("show");
    $("edit-content").style.display = "block";
    $("delete-edit-btn").style.display = "block";
    $("title-count").textContent   = note.title.length;
    $("content-count").textContent = note.content.length;
    clearTags();
    note.tags.forEach(addTag);

    if (note.imageUrl) {
      $("img-upload-placeholder").style.display = "none";
      $("img-preview-wrap").style.display = "inline-block";
      $("img-preview").src = note.imageUrl;
      pendingImageBase64 = null;
    } else {
      clearImage();
    }

    showView("edit");
    $("header-title").textContent = "編輯記事";
    $("back-btn").style.visibility = "visible";
  }

  function editCurrentNote() {
    if (currentNote) openEdit(currentNote.id);
  }

  // ── Save ───────────────────────────────────
  async function saveNote() {
    const title    = $("edit-title").value.trim();
    const content  = $("edit-content").value.trim();
    const isPinned = $("pin-toggle").checked;
    const tags     = getTagValues();

    if (!title)   { showToast("⚠️ 請輸入標題"); return; }
    if (!content) { showToast("⚠️ 請輸入內容"); return; }

    const saveBtn = $("save-btn");
    saveBtn.disabled    = true;
    saveBtn.textContent = "儲存中...";

    try {
      let result;
      if (editingId) {
        result = await apiPost({ action: "updateNote", id: editingId, userId, title, content, isPinned, tags });
      } else {
        result = await apiPost({ action: "addNote", userId, title, content, isPinned, tags });
      }
      if (result.status !== "success") throw new Error(result.message);

      // 上傳圖片（若有新選取的圖片）
      if (pendingImageBase64) {
        const noteId = editingId || result.data.id;
        const imgResult = await apiPost({
          action: "uploadImage", id: noteId, userId,
          fileName: pendingImageName,
          mimeType: pendingImageMime,
          base64Data: pendingImageBase64
        });
        if (imgResult.status !== "success") {
          showToast("⚠️ 記事已儲存，但圖片上傳失敗");
        }
      }

      showToast(editingId ? "✅ 記事已更新" : "✅ 記事已新增");
      await loadNotes();
      goBack();
    } catch (e) {
      showToast("❌ 儲存失敗：" + e.message);
      console.error(e);
    } finally {
      saveBtn.disabled    = false;
      saveBtn.innerHTML   = "💾 儲存記事";
    }
  }

  // ── Delete ─────────────────────────────────
  function confirmDelete() {
    if (!currentNote) return;
    showModal(
      "確認刪除",
      `確定要刪除「${currentNote.title}」嗎？此操作無法復原。`,
      () => doDelete(currentNote.id)
    );
  }

  function confirmDeleteById(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    currentNote = note;
    confirmDelete();
  }

  async function doDelete(id) {
    try {
      const result = await apiPost({ action: "deleteNote", id, userId });
      if (result.status !== "success") throw new Error(result.message);
      showToast("🗑️ 記事已刪除");
      currentNote = null;
      editingId   = null;
      await loadNotes();
      showView("list");
      $("header-title").textContent = "📒 我的記事本";
      $("back-btn").style.visibility = "hidden";
    } catch (e) {
      showToast("❌ 刪除失敗：" + e.message);
    }
  }

  // ── Toggle Pin ─────────────────────────────
  async function togglePin(id) {
    try {
      const result = await apiPost({ action: "togglePin", id, userId });
      if (result.status !== "success") throw new Error(result.message);
      showToast(result.data.isPinned ? "📌 已置頂" : "📍 已取消置頂");
      await loadNotes();
    } catch (e) {
      showToast("❌ 操作失敗：" + e.message);
    }
  }

  // ── Share ──────────────────────────────────
  async function shareNote() {
    if (!currentNote) return;
    if (!liff.isApiAvailable("shareTargetPicker")) {
      showToast("⚠️ 此環境不支援分享功能");
      return;
    }
    try {
      const result = await liff.shareTargetPicker([{
        type: "text",
        text: `📒 ${currentNote.title}\n\n${currentNote.content}\n\n─ 來自 LINE 記事本`
      }]);
      if (result) showToast("✅ 分享成功");
    } catch (e) {
      if (e.code !== "CANCEL") showToast("❌ 分享失敗：" + e.message);
    }
  }

  // ── Tags ───────────────────────────────────
  function addTag(tag) {
    tag = tag.trim().replace(/,/g, "");
    if (!tag || tagValues.includes(tag) || tagValues.length >= 10) return;
    tagValues.push(tag);
    const wrap = $("tags-input-wrap");
    const chip = document.createElement("span");
    chip.className  = "tag-item";
    chip.dataset.tag = tag;
    chip.innerHTML  = `${escHtml(tag)}<span class="tag-remove" data-tag="${escHtml(tag)}">×</span>`;
    chip.querySelector(".tag-remove").addEventListener("click", () => removeTag(tag));
    wrap.insertBefore(chip, $("tags-input"));
  }

  function removeTag(tag) {
    tagValues = tagValues.filter(t => t !== tag);
    const chip = $("tags-input-wrap").querySelector(`.tag-item[data-tag="${tag}"]`);
    if (chip) chip.remove();
  }

  function clearTags() {
    tagValues = [];
    $("tags-input-wrap").querySelectorAll(".tag-item").forEach(el => el.remove());
  }

  function getTagValues() { return [...tagValues]; }

  // ── Image ──────────────────────────────────
  function handleImageSelect(file) {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast("⚠️ 圖片大小不能超過 5MB"); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      pendingImageBase64 = dataUrl.split(",")[1];
      pendingImageMime   = file.type;
      pendingImageName   = file.name;
      $("img-preview").src = dataUrl;
      $("img-upload-placeholder").style.display = "none";
      $("img-preview-wrap").style.display = "inline-block";
    };
    reader.readAsDataURL(file);
  }

  function removeImage(e) {
    e.stopPropagation();
    clearImage();
  }

  function clearImage() {
    pendingImageBase64 = null;
    pendingImageMime   = null;
    pendingImageName   = null;
    $("img-file-input").value = "";
    $("img-preview").src = "";
    $("img-upload-placeholder").style.display = "block";
    $("img-preview-wrap").style.display = "none";
  }

  // ── View Switch ────────────────────────────
  function showView(name) {
    currentView = name;
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    $("view-" + name).classList.add("active");
    $("content-area").scrollTop = 0;
    ["list","add","search"].forEach(n => { const el = $("nav-" + n); if (el) el.classList.remove("active"); });
    if (name === "list") $("nav-list").classList.add("active");
    $("fab").style.display = name === "list" ? "flex" : "none";
  }

  function switchNav(name) {
    if (name === "list") {
      showView("list");
      $("header-title").textContent = "📒 我的記事本";
      $("back-btn").style.visibility = "hidden";
      $("header-action-btn").style.visibility = "hidden";
    }
  }

  function focusSearch() {
    showView("list");
    $("header-title").textContent = "📒 我的記事本";
    $("back-btn").style.visibility = "hidden";
    setTimeout(() => $("search-input").focus(), 100);
  }

  function goBack() {
    showView("list");
    $("header-title").textContent = "📒 我的記事本";
    $("back-btn").style.visibility = "hidden";
    $("header-action-btn").style.visibility = "hidden";
    currentNote = null;
    editingId   = null;
  }

  // ── Modal ──────────────────────────────────
  function showModal(title, msg, onConfirm) {
    $("modal-title").textContent = title;
    $("modal-msg").textContent   = msg;
    modalCallback = onConfirm;
    $("modal-overlay").classList.add("show");
  }

  function closeModal() {
    $("modal-overlay").classList.remove("show");
    modalCallback = null;
  }

  // ── Toast ──────────────────────────────────
  let toastTimer = null;
  function showToast(msg, duration = 2500) {
    const el = $("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), duration);
  }

  // ── Helpers ────────────────────────────────
  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function formatDate(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000)      return "剛剛";
    if (diff < 3600000)    return Math.floor(diff / 60000) + " 分鐘前";
    if (diff < 86400000)   return Math.floor(diff / 3600000) + " 小時前";
    if (diff < 604800000)  return Math.floor(diff / 86400000) + " 天前";
    return d.toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit" });
  }

  // ── Bind Events ────────────────────────────
  function bindEvents() {
    // Search
    $("search-input").addEventListener("input", e => {
      const kw = e.target.value.trim();
      $("search-clear").style.display = kw ? "block" : "none";
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => loadNotes(kw), 350);
    });
    $("search-clear").addEventListener("click", () => {
      $("search-input").value = "";
      $("search-clear").style.display = "none";
      loadNotes();
    });

    // Char count
    $("edit-title").addEventListener("input", e => {
      $("title-count").textContent = e.target.value.length;
    });
    $("edit-content").addEventListener("input", e => {
      $("content-count").textContent = e.target.value.length;
      if ($("md-toggle").checked) {
        $("md-preview").innerHTML = marked.parse(e.target.value || "");
      }
    });

    // Markdown toggle
    $("md-toggle").addEventListener("change", e => {
      const on = e.target.checked;
      $("edit-content").style.display = on ? "none" : "block";
      if (on) {
        $("md-preview").classList.add("show");
        $("md-preview").innerHTML = marked.parse($("edit-content").value || "");
      } else {
        $("md-preview").classList.remove("show");
      }
    });

    // Tags
    $("tags-input").addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === ",") {
        e.preventDefault();
        addTag($("tags-input").value);
        $("tags-input").value = "";
      }
    });
    $("tags-input-wrap").addEventListener("click", () => $("tags-input").focus());

    // Image
    $("img-file-input").addEventListener("change", e => handleImageSelect(e.target.files[0]));

    // Modal confirm
    $("modal-confirm-btn").addEventListener("click", () => {
      closeModal();
      if (modalCallback) modalCallback();
    });

    // Modal overlay dismiss
    $("modal-overlay").addEventListener("click", e => {
      if (e.target === $("modal-overlay")) closeModal();
    });

    // Keyboard: Esc to go back
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && currentView !== "list") goBack();
    });
  }

  // ── Public API ─────────────────────────────
  return {
    init, loadNotes,
    openDetail, openNewNote, openEdit, editCurrentNote,
    saveNote, confirmDelete, confirmDeleteById,
    togglePin, shareNote,
    removeImage, removeTag,
    goBack, switchNav, focusSearch,
    closeModal, showToast
  };
})();

// 啟動
App.init();
</script>
</body>
</html>
