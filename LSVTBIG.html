/* ============================================================
   人員管理：載入
============================================================ */
async function loadUsers() {
  showLoading('載入人員中…');
  try {
    const res   = await callAPI('getUsers');
    State.users = res.users || [];
    applyUserFilter('all');
  } catch (err) {
    showToast(`載入人員失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   人員管理：篩選
============================================================ */
function applyUserFilter(filter) {
  let list = [...State.users];

  switch (filter) {
    case 'admin'  : list = list.filter(u => u.Role   === 'admin');  break;
    case 'member' : list = list.filter(u => u.Role   === 'member'); break;
    case 'guest'  : list = list.filter(u => u.Role   === 'guest');  break;
    case 'banned' : list = list.filter(u => u.Status === 'banned'); break;
    default: /* all — 不過濾 */ break;
  }

  /* 排序：owner > admin > member > guest，封鎖排最後 */
  list.sort((a, b) => {
    if (a.Status === 'banned' && b.Status !== 'banned') return  1;
    if (b.Status === 'banned' && a.Status !== 'banned') return -1;
    return (ROLE_LEVEL[b.Role] || 0) - (ROLE_LEVEL[a.Role] || 0);
  });

  document.getElementById('users-count').textContent =
    `共 ${list.length} 位${filter !== 'all' ? `（篩選：${filter}）` : ''}`;

  renderUserList(list);
}

/* ============================================================
   人員管理：渲染列表
============================================================ */
function renderUserList(users) {
  const container = document.getElementById('user-list');
  container.innerHTML = '';

  if (!users.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">👥</div>
        <p>此分類沒有成員</p>
      </div>`;
    return;
  }

  users.forEach(user => container.appendChild(buildUserCard(user)));
}

/* ============================================================
   人員管理：建立使用者卡片
============================================================ */
function buildUserCard(user) {
  const isSelf   = user.UserID === State.user?.userId;
  const isOwner  = user.Role   === 'owner';
  const isBanned = user.Status === 'banned';
  const roleCfg  = ROLE_LABEL[user.Role] || ROLE_LABEL.guest;

  const card = document.createElement('div');
  card.className = `user-card${isBanned ? ' banned' : ''}`;

  /* ── 頭像 ── */
  const avatar = document.createElement('div');
  avatar.className = 'user-avatar';
  if (user.PictureUrl) {
    const img = document.createElement('img');
    img.src = user.PictureUrl;
    img.alt = user.DisplayName;
    img.onerror = () => {
      img.remove();
      avatar.textContent = (user.DisplayName || '?')[0].toUpperCase();
    };
    avatar.appendChild(img);
  } else {
    avatar.textContent = (user.DisplayName || '?')[0].toUpperCase();
  }
  card.appendChild(avatar);

  /* ── 資訊區 ── */
  const info = document.createElement('div');
  info.className = 'user-info';

  /* 名稱列 */
  const nameRow = document.createElement('div');
  nameRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap;';

  const nameEl = document.createElement('span');
  nameEl.className   = 'user-name';
  nameEl.textContent = user.DisplayName || '未知';
  nameRow.appendChild(nameEl);

  const badge = document.createElement('span');
  badge.className   = `role-badge ${roleCfg.cls}`;
  badge.textContent = `${roleCfg.icon} ${roleCfg.text}`;
  nameRow.appendChild(badge);

  if (isSelf) {
    const selfTag = document.createElement('span');
    selfTag.style.cssText =
      'font-size:.65rem;background:var(--primary-light);color:var(--primary-dark);' +
      'border-radius:8px;padding:1px 6px;font-weight:700;';
    selfTag.textContent = '（我）';
    nameRow.appendChild(selfTag);
  }

  if (isBanned) {
    const banTag = document.createElement('span');
    banTag.style.cssText =
      'font-size:.65rem;background:var(--danger-light);color:var(--danger);' +
      'border-radius:8px;padding:1px 6px;font-weight:700;';
    banTag.textContent = '🚫 封鎖中';
    nameRow.appendChild(banTag);
  }
  info.appendChild(nameRow);

  /* Meta：加入時間 / 最後上線 */
  const metaEl = document.createElement('div');
  metaEl.className   = 'user-meta';
  metaEl.textContent =
    `加入：${fmtTime(user.JoinedAt)}　最後上線：${fmtTime(user.LastSeenAt)}`;
  info.appendChild(metaEl);

  /* ── 操作列（非自己、非 owner 才顯示） ── */
  if (!isSelf && !isOwner) {
    const actions = document.createElement('div');
    actions.className = 'user-actions';

    /* 角色下拉選單 */
    const select = document.createElement('select');
    select.className = 'role-select';
    [
      { value:'admin',  label:'🛡 管理者' },
      { value:'member', label:'⭐ 會員'   },
      { value:'guest',  label:'👤 訪客'   },
    ].forEach(opt => {
      const o = document.createElement('option');
      o.value       = opt.value;
      o.textContent = opt.label;
      if (opt.value === user.Role) o.selected = true;
      select.appendChild(o);
    });

    select.addEventListener('change', async () => {
      const newRole = select.value;
      if (newRole === user.Role) return;
      if (!confirm(`確定將「${user.DisplayName}」的角色改為「${newRole}」？`)) {
        select.value = user.Role;
        return;
      }
      await updateUserRole(user.UserID, newRole);
    });
    actions.appendChild(select);

    /* 封鎖 / 解封按鈕 */
    const banBtn = document.createElement('button');
    banBtn.className   = `btn-ban ${isBanned ? 'unban' : 'ban'}`;
    banBtn.textContent = isBanned ? '✅ 解封' : '🚫 封鎖';
    banBtn.addEventListener('click', async () => {
      const action = isBanned ? '解封' : '封鎖';
      if (!confirm(`確定要${action}「${user.DisplayName}」嗎？`)) return;
      await toggleBanUser(user.UserID, !isBanned);
    });
    actions.appendChild(banBtn);

    info.appendChild(actions);
  }

  card.appendChild(info);
  return card;
}

/* ============================================================
   人員管理：更新角色
============================================================ */
async function updateUserRole(targetId, newRole) {
  showLoading('更新角色中…');
  try {
    await callAPI('updateRole', { targetId, newRole });
    showToast(`✅ 角色已更新為「${newRole}」`, 'success');
    await loadUsers();
    applyUserFilter(
      document.querySelector('.filter-btn.active')?.dataset.filter || 'all'
    );
  } catch (err) {
    showToast(`更新失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   人員管理：封鎖 / 解封
============================================================ */
async function toggleBanUser(targetId, ban) {
  showLoading(ban ? '封鎖中…' : '解封中…');
  try {
    await callAPI('toggleBan', { targetId, ban });
    showToast(ban ? '🚫 已封鎖該使用者' : '✅ 已解封該使用者', 'success');
    await loadUsers();
    applyUserFilter(
      document.querySelector('.filter-btn.active')?.dataset.filter || 'all'
    );
  } catch (err) {
    showToast(`操作失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   ★ 啟動入口（唯一 DOMContentLoaded）

document.addEventListener('DOMContentLoaded', initApp);
