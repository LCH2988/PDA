<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title><?= APP_NAME ?></title>

  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  
  <style>
  /* ============================================================
     CSS Reset & 全域變數
  ============================================================ */
  :root {
    --primary:    #06C755;
    --primary-dk: #05a847;
    --secondary:  #1a1a2e;
    --accent:     #e94560;
    --bg:         #f0f2f5;
    --card:       #ffffff;
    --text:       #2d3436;
    --muted:      #636e72;
    --border:     #dfe6e9;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 2px 12px rgba(0,0,0,0.08);
    --shadow-md:  0 4px 20px rgba(0,0,0,0.12);
    --transition: all 0.2s ease;
    --nav-h:      60px;
    --header-h:   56px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  /* ============================================================
     App 容器
  ============================================================ */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--card);
    position: relative;
    overflow: hidden;
  }

  /* ============================================================
     頂部 Header
  ============================================================ */
  #header {
    height: var(--header-h);
    background: linear-gradient(135deg, var(--secondary), #16213e);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    flex-shrink: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header .app-title {
    color: white;
    font-size: 17px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #header .app-title .logo { font-size: 22px; }
  #userBar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #userBar .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--primary);
    cursor: pointer;
  }
  #userBar .user-name {
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 600;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .role-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }
  .rb-admin  { background: #e74c3c; color: white; }
  .rb-mod    { background: #e67e22; color: white; }
  .rb-vip    { background: #9b59b6; color: white; }
  .rb-user   { background: var(--primary); color: white; }
  .rb-guest  { background: #95a5a6; color: white; }

  /* ============================================================
     頁面容器
  ============================================================ */
  #pages {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    overflow-x: hidden;
    display: none;
    padding-bottom: calc(var(--nav-h) + 16px);
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }

  /* ============================================================
     底部導覽列
  ============================================================ */
  #nav {
    height: var(--nav-h);
    background: white;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    cursor: pointer;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    transition: var(--transition);
    border: none;
    background: none;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item i { font-size: 20px; transition: var(--transition); }
  .nav-item.active { color: var(--primary); }
  .nav-item.active i { transform: scale(1.15); }
  .nav-item:active { background: var(--bg); }

  /* ============================================================
     登入頁
  ============================================================ */
  #page-login {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    background: linear-gradient(160deg, var(--secondary) 0%, #16213e 50%, #0f3460 100%);
  }
  .login-logo { font-size: 80px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-10px); }
  }
  .login-title {
    color: white;
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    text-align: center;
  }
  .login-sub {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-bottom: 40px;
    text-align: center;
    line-height: 1.6;
  }
  .btn-line {
    width: 100%;
    max-width: 280px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: var(--transition);
    margin-bottom: 12px;
  }
  .btn-line:hover  { background: var(--primary-dk); transform: translateY(-1px); }
  .btn-line:active { transform: translateY(0); }
  .btn-guest {
    width: 100%;
    max-width: 280px;
    background: transparent;
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius);
    padding: 12px 24px;
    font-size: 14px;
    cursor: pointer;
    transition: var(--transition);
  }
  .btn-guest:hover { background: rgba(255,255,255,0.1); color: white; }

  /* ============================================================
     實名制登記頁
  ============================================================ */
  #page-register {
    padding: 24px 20px;
    background: var(--bg);
  }
  .register-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .register-card h2 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .register-card .sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* ============================================================
     表單元件
  ============================================================ */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  .form-label .required { color: var(--accent); margin-left: 2px; }
  .form-control {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    color: var(--text);
    background: white;
    transition: var(--transition);
    outline: none;
    font-family: inherit;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.15); }
  .form-control:disabled { background: var(--bg); color: var(--muted); cursor: not-allowed; }
  .form-control.error { border-color: var(--accent); }
  textarea.form-control { resize: vertical; min-height: 120px; line-height: 1.6; }
  select.form-control { cursor: pointer; }

  /* ============================================================
     按鈕
  ============================================================ */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary  { background: var(--primary); color: white; }
  .btn-primary:hover:not(:disabled)  { background: var(--primary-dk); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-danger   { background: #fce4ec; color: #c62828; }
  .btn-danger:hover:not(:disabled)   { background: #f48fb1; }
  .btn-full     { width: 100%; }
  .btn-sm       { padding: 6px 12px; font-size: 12px; }

  /* ============================================================
     文章列表頁
  ============================================================ */
  .page-header {
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  .search-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    background: white;
    transition: var(--transition);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-btn {
    padding: 10px 14px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 16px;
  }
  .cat-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 10px;
    scrollbar-width: none;
  }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: var(--transition);
    white-space: nowrap;
  }
  .cat-btn.active, .cat-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  /* 文章卡片 */
  .article-list { padding: 8px 16px 0; }
  .article-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: var(--transition);
    border: 1.5px solid transparent;
  }
  .article-card:hover  { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .article-card:active { transform: translateY(0); }
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .vis-badge {
    flex-shrink: 0;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }
  .vb-public  { background: #e8f5e9; color: #2e7d32; }
  .vb-vip     { background: #f3e5f5; color: #7b1fa2; }
  .vb-private { background: #fce4ec; color: #c62828; }
  .card-summary {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 4px;
  }
  .card-meta-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cat-tag {
    padding: 2px 8px;
    background: var(--bg);
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
  }
  .author-name { font-size: 12px; color: var(--muted); }
  .read-count  { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
  .tag-list    { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag-item    { padding: 1px 7px; background: #e3f2fd; color: #1565c0; border-radius: 10px; font-size: 10px; font-weight: 600; }

  /* 分頁 */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 16px;
  }
  .page-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
  }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .page-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  .page-info { font-size: 13px; color: var(--muted); }

  /* 空狀態 */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 13px; line-height: 1.6; }

  /* ============================================================
     撰寫文章頁
  ============================================================ */
  #page-write { padding: 16px; background: var(--bg); }
  .write-card {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
  }
  .write-card h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--secondary);
  }
  .char-count {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .char-count.warn { color: #e67e22; }
  .char-count.over { color: var(--accent); }

  /* 上傳區 */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--bg);
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--primary);
    background: rgba(6,199,85,0.05);
  }
  .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-zone strong { color: var(--primary); }
  .file-preview-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
  }
  .file-item .file-info { flex: 1; min-width: 0; }
  .file-item .file-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-item .file-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-progress {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .file-progress-bar {
    height: 100%;
    background: var(--primary);
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  .file-status { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-status.error { color: var(--accent); }
  .file-status.success { color: var(--primary); }

  /* ============================================================
     統計頁
  ============================================================ */
  #page-stats { padding: 16px; background: var(--bg); }
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
  .stat-card .stat-num  { font-size: 28px; font-weight: 800; color: var(--primary); line-height: 1; }
  .stat-card .stat-lbl  { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .top-list { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .top-list-header {
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .top-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    transition: var(--transition);
  }
  .top-item:last-child { border-bottom: none; }
  .top-item:hover { background: var(--bg); }
  .top-rank {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .top-rank.r1 { background: #ffd700; color: #7d6608; }
  .top-rank.r2 { background: #c0c0c0; color: #555; }
  .top-rank.r3 { background: #cd7f32; color: white; }
  .top-title { flex: 1; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  /* ============================================================
     管理頁
  ============================================================ */
  #page-admin { padding: 16px; background: var(--bg); }
  .user-item {
    background: white;
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-item .u-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .user-item .u-info { flex: 1; min-width: 0; }
  .user-item .u-name { font-size: 14px; font-weight: 700; }
  .user-item .u-real { font-size: 12px; color: var(--muted); }
  .user-item .u-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-badge {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
  }
  .sb-active   { background: #e8f5e9; color: #2e7d32; }
  .sb-inactive { background: #fff3e0; color: #e65100; }
  .sb-banned   { background: #fce4ec; color: #c62828; }

  /* ============================================================
     個人資料頁
  ============================================================ */
  #page-profile { padding: 16px; background: var(--bg); }
  .profile-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    text-align: center;
  }
  .profile-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--primary);
    margin-bottom: 12px;
  }
  .profile-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .profile-role { margin-bottom: 16px; }

  /* ============================================================
     文章詳情 Modal
  ============================================================ */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.active { display: flex; }
  .modal-sheet {
    background: white;
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
    flex-shrink: 0;
  }
  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-shrink: 0;
  }
  .modal-title { font-size: 17px; font-weight: 800; line-height: 1.4; flex: 1; }
  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: var(--transition);
  }
  .modal-close:hover { background: var(--border); }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    -webkit-overflow-scrolling: touch;
  }
  .modal-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;

// ── LIFF 登入 ──
window.initLiff = async function () {
  showLoading('連接 LINE 中...');
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }
    const profile = await liff.getProfile();
    const idToken = liff.getIDToken();
    hideLoading();
    showToast('LINE 授權成功！', 'success');
    showRegisterPage(profile, idToken);
  } catch (err) {
    hideLoading();
    let msg = 'LIFF 初始化失敗';
    if (err.message && err.message.includes('liffId is necessary')) {
      msg = 'LIFF ID 為空，請確認 Code.gs 設定';
    } else if (err.message && err.message.includes('Invalid liffId')) {
      msg = 'LIFF ID 格式錯誤（應為 1234567890-xxxxxxxx）';
    } else if (err.message) {
      msg = 'LIFF 錯誤：' + err.message;
    }
    showToast(msg, 'error');
    console.error('LIFF Error:', err);
  }
};

// ── 實名制登記 ──
window.submitRegister = async function () {
  const realName = (document.getElementById('regRealName').value || '').trim();
  if (!realName) { showToast('請輸入真實姓名', 'error'); return; }

  const profile = window._pendingProfile;
  if (!profile)  { showToast('請重新登入', 'error'); return; }

  const btn = document.querySelector('#page-register .btn-primary');
  setButtonLoading(btn, true, '登記中...');

  const res = await apiPost({
    action:      'registerUser',
    lineUserId:  profile.userId,
    displayName: profile.displayName,
    pictureUrl:  profile.pictureUrl || '',
    realName,
    email:   (document.getElementById('regEmail')?.value   || '').trim(),
    phone:   (document.getElementById('regPhone')?.value   || '').trim(),
    idToken: window._pendingIdToken || ''
  });

  setButtonLoading(btn, false, '完成登記並進入');

  if (res.success) {
    currentToken = res.token;
    currentUser  = res.user;
    localStorage.setItem('nb_token', currentToken);
    showToast(res.isNewUser ? '🎉 歡迎加入！' : '✅ 登入成功！', 'success');
    enterApp();

  document.querySelectorAll('#pages .page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

  const page = document.getElementById('page-' + tab);
  const nav  = document.getElementById('nav-' + tab);
  if (page) page.classList.add('active');
  if (nav)  nav.classList.add('active');

  switch (tab) {
    case 'articles': loadArticles();  break;
    case 'write':    initWritePage(); break;
    case 'stats':    loadStats();     break;
    case 'admin':    loadUsers();     break;
    case 'profile':  loadProfile();   break;

};

// ── 發布 / 更新文章 ──
window.submitArticle = async function () {
  const title   = (document.getElementById('articleTitle')?.value   || '').trim();
  const content = (document.getElementById('articleContent')?.value || '').trim();

  if (!title)        { showToast('請輸入文章標題', 'error'); return; }
  if (!content)      { showToast('請輸入文章內容', 'error'); return; }
  if (!currentToken) { showToast('請先登入', 'error');       return; }

  const tags   = (document.getElementById('articleTags')?.value || '')
    .split(',').map(t => t.trim()).filter(t => t);
  const isEdit = !!editingArticleId;
  const btn    = document.getElementById('submitBtn');

  setButtonLoading(btn, true, isEdit ? '更新中...' : '發布中...');

  try {
    const res = await apiPost({
      action:     isEdit ? 'updateArticle' : 'createArticle',
      token:      currentToken,
      articleId:  editingArticleId || undefined,
      title, content,
      category:   document.getElementById('articleCategory')?.value   || '未分類',
      visibility: document.getElementById('articleVisibility')?.value || 'public',
      tags
    });

    if (!res.success) { showToast('❌ ' + res.message, 'error'); return; }

    const targetId = isEdit ? editingArticleId : res.articleId;

    if (pendingFiles.length > 0) {
      showToast('📤 上傳附件中...', 'info');
      await uploadAllPendingFiles(targetId);
    }

    showToast(isEdit ? '✅ 文章更新成功！' : '🎉 文章發布成功！', 'success');
    localStorage.removeItem('nb_draft');
    clearWriteForm();
    setTimeout(() => window.switchTab('articles'), 800);

  } finally {
    setButtonLoading(btn, false, isEdit ? '更新文章' : '發布文章');
  }
};

async function loadArticles(page) {
  currentPage = page || 1;
  const list  = document.getElementById('articleList');
  list.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><h3>載入中...</h3></div>';

  const res = await apiPost({
    action:   currentKeyword ? 'searchArticles' : 'listArticles',
    token:    currentToken,
    page:     currentPage,
    pageSize: 8,
    category: currentCategory,
    keyword:  currentKeyword
  });

  if (!res.success) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">❌</div>
      <h3>載入失敗</h3><p>${escHtml(res.message)}</p></div>`;
    return;
  }

  const { articles, pagination } = res;
  if (!articles || articles.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <h3>${currentKeyword ? '找不到相關文章' : '目前沒有文章'}</h3>
      <p>${currentKeyword ? '請嘗試其他關鍵字' : '成為第一個發文的人吧！'}</p></div>`;
    renderPagination(pagination);
    return;
  }

  list.innerHTML = articles.map(a => renderArticleCard(a)).join('');
  renderPagination(pagination);
}

function renderArticleCard(a) {
  const visMap = {
    public:  { label: '🌐 公開',  cls: 'vb-public'  },
    vip:     { label: '👑 VIP',   cls: 'vb-vip'     },
    private: { label: '🔒 私人',  cls: 'vb-private' }
  };
  const vis  = visMap[a.visibility] || visMap.public;
  const tags = (a.tags || []).slice(0, 3)
    .map(t => `<span class="tag-item">${escHtml(t)}</span>`).join('');
  const date = a.createdAt ? String(a.createdAt).substr(0, 10) : '';
  return `
    <div class="article-card" onclick="window.openArticle('${escHtml(a.articleId)}')">
      <div class="card-top">
        <div class="card-title">${escHtml(a.title)}</div>
        <span class="vis-badge ${vis.cls}">${vis.label}</span>
      </div>
      <div class="card-summary">${escHtml(a.summary || '')}</div>
      <div class="card-meta">
        <div class="card-meta-left">
          <span class="cat-tag">${escHtml(a.category || '未分類')}</span>
          <span class="author-name">
            <i class="fas fa-user" style="font-size:10px"></i>
            ${escHtml(a.authorName || '')}
          </span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="read-count"><i class="fas fa-eye"></i> ${a.readCount || 0}</span>
          <span style="font-size:11px;color:var(--muted)">${date}</span>
        </div>
      </div>
      ${tags ? `<div class="tag-list">${tags}</div>` : ''}
    </div>`;
}

function renderPagination(p) {
  const el = document.getElementById('pagination');
  if (!p || p.totalPages <= 1) { el.innerHTML = ''; return; }
  let html = '';
  html += `<button class="page-btn" ${p.page <= 1 ? 'disabled' : ''}
    onclick="window.loadArticles(${p.page - 1})">
    <i class="fas fa-chevron-left"></i></button>`;
  const start = Math.max(1, p.page - 2);
  const end   = Math.min(p.totalPages, start + 4);
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i === p.page ? 'active' : ''}"
      onclick="window.loadArticles(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" ${p.page >= p.totalPages ? 'disabled' : ''}
    onclick="window.loadArticles(${p.page + 1})">
    <i class="fas fa-chevron-right"></i></button>`;
  html += `<span class="page-info">${p.page} / ${p.totalPages} 頁・共 ${p.total} 篇</span>`;
  el.innerHTML = html;
}

function renderAttachments(files, articleId) {
  const el = document.getElementById('modalAttach');
  if (!files || files.length === 0) { el.innerHTML = ''; return; }
  const items = files.map(f => `
    <div class="attach-item">
      <span class="attach-icon">${getFileEmoji(f.fileType)}</span>
      <div class="attach-info">
        <div class="attach-name" title="${escHtml(f.fileName)}">${escHtml(f.fileName)}</div>
        <div class="attach-size">${f.fileSizeStr || ''} · ${escHtml(f.uploaderName || '')}</div>
      </div>
      <div class="attach-actions">
        <button class="btn btn-secondary btn-sm"
          onclick="window.previewFile('${escHtml(f.previewUrl)}','${escHtml(f.fileType)}','${escHtml(f.fileName)}')"
          title="預覽"><i class="fas fa-eye"></i>
        </button>
        <a class="btn btn-secondary btn-sm"
          href="${escHtml(f.downloadUrl)}" target="_blank" title="下載">
          <i class="fas fa-download"></i>
        </a>
      </div>
    </div>`).join('');
  el.innerHTML = `
    <div class="attach-title">
      <i class="fas fa-paperclip"></i> 附件（${files.length} 個）
    </div>${items}`;
}

function previewFile(url, mimeType, fileName) {
  if (!url) { showToast('預覽連結無效', 'error'); return; }
  const modal   = document.getElementById('previewModal');
  const content = document.getElementById('previewContent');
  if (mimeType && mimeType.startsWith('image/')) {
    content.innerHTML = `<img src="${escHtml(url)}" alt="${escHtml(fileName)}"
      onerror="showToast('圖片載入失敗','error');window.closePreview()">`;
  } else {
    content.innerHTML = `<iframe src="${escHtml(url)}"
      title="${escHtml(fileName)}" allowfullscreen></iframe>`;
  }
  modal.classList.add('active');
}

function closePreview() {
  document.getElementById('previewModal').classList.remove('active');
  document.getElementById('previewContent').innerHTML = '';
}

function initWritePage() {
  if (!currentUser || currentUser.role === 'guest') {
    showToast('請先登入才能發文', 'warning');
    window.switchTab('articles');
    return;
  }
  if (!editingArticleId) restoreDraft();
  startDraftTimer();
}

function updateCharCount(inputId, countId, max) {
  const val = document.getElementById(inputId)?.value || '';
  const len = val.length;
  const el  = document.getElementById(countId);
  if (!el) return;
  el.textContent = len + ' / ' + max;
  el.className   = 'char-count' +
    (len > max ? ' over' : len > max * 0.9 ? ' warn' : '');
}

function startDraftTimer() {
  if (draftTimer) clearInterval(draftTimer);
  draftTimer = setInterval(saveDraft, 30000);
}

function saveDraft() {
  const title   = document.getElementById('articleTitle')?.value   || '';
  const content = document.getElementById('articleContent')?.value || '';
  if (!title && !content) return;
  localStorage.setItem('nb_draft', JSON.stringify({
    title, content,
    category:   document.getElementById('articleCategory')?.value   || '',
    visibility: document.getElementById('articleVisibility')?.value || 'public',
    tags:       document.getElementById('articleTags')?.value       || '',
    savedAt:    new Date().toISOString()
  }));
}

function restoreDraft() {
  try {
    const raw = localStorage.getItem('nb_draft');
    if (!raw) return;
    const draft = JSON.parse(raw);
    if (!draft.title && !draft.content) return;
    const savedAt = draft.savedAt
      ? new Date(draft.savedAt).toLocaleString('zh-TW') : '';
    const el     = document.getElementById('page-write');
    const notice = document.createElement('div');
    notice.style.cssText =
      'background:#fff3cd;border:1px solid #ffc107;border-radius:8px;' +
      'padding:12px;margin-bottom:12px;font-size:13px;display:flex;' +
      'align-items:center;justify-content:space-between;gap:8px';
    const draftJson = escHtml(JSON.stringify(draft));
    notice.innerHTML = `
      <span>📝 發現未完成草稿（${savedAt}），是否恢復？</span>
      <div style="display:flex;gap:6px;flex-shrink:0">
        <button class="btn btn-secondary btn-sm"
          onclick="window.discardDraft(this.closest('div[style]'))">捨棄</button>
        <button class="btn btn-primary btn-sm"
          onclick="window.applyDraft(JSON.parse(this.dataset.draft),this.closest('div[style]'))"
          data-draft="${draftJson}">恢復</button>
      </div>`;
    el.insertBefore(notice, el.firstChild);
  } catch(e) { console.error('restoreDraft:', e); }
}

function clearWriteForm() {
  ['articleTitle','articleContent','articleTags'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const cat = document.getElementById('articleCategory');
  const vis = document.getElementById('articleVisibility');
  if (cat) cat.value = '技術';
  if (vis) vis.value = 'public';
  pendingFiles     = [];
  editingArticleId = null;
  renderPendingFiles();
  updateCharCount('articleTitle',   'titleCount',   100);
  updateCharCount('articleContent', 'contentCount', 5000);
  const t = document.getElementById('writePageTitle');
  if (t) t.textContent = '撰寫文章';
  const b = document.getElementById('submitBtn');
  if (b) b.innerHTML = '<i class="fas fa-paper-plane"></i> 發布文章';
  localStorage.removeItem('nb_draft');
  if (draftTimer) clearInterval(draftTimer);
}

async function loadStats() {
  const el = document.getElementById('statsContent');
  el.innerHTML = '<div class="empty-state"><div class="empty-icon">⏳</div><h3>載入中...</h3></div>';
  const res = await apiPost({ action: 'getStats', token: currentToken });
  if (!res.success) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔒</div>
      <h3>無法取得統計</h3><p>${escHtml(res.message)}</p></div>`;
    return;
  }

    <div class="stats-grid">
      <div class="stat-card">

        <div class="stat-num">${s.totalArticles || 0}</div>
        <div class="stat-lbl">文章總數</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-num">${s.totalReadCount || 0}</div>
        <div class="stat-lbl">總閱讀次數</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-num">${s.totalUsers || 0}</div>
        <div class="stat-lbl">使用者人數</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📋</div>
        <div class="stat-num">${s.totalReadLogs || 0}</div>
        <div class="stat-lbl">閱讀記錄筆數</div>
      </div>
    </div>
    <div class="top-list">
      <div class="top-list-header">
        <i class="fas fa-trophy" style="color:#ffd700"></i> 熱門文章 Top 5
      </div>
      ${topHtml || '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">暫無資料</div>'}
    </div>`;
}

          <button class="btn btn-secondary btn-sm"

function loadProfile() {
  if (!currentUser) return;
  const roleMap = {
    admin: { label: '👑 管理者', cls: 'rb-admin' },
    mod:   { label: '🛡️ 版主',  cls: 'rb-mod'   },
    vip:   { label: '⭐ VIP',   cls: 'rb-vip'   },
    user:  { label: '👤 一般會員', cls: 'rb-user' },
    guest: { label: '👁️ 遊客',  cls: 'rb-guest' }
  };
  const r      = roleMap[currentUser.role] || roleMap.guest;
  const avatar = document.getElementById('profileAvatar');
  const name   = document.getElementById('profileName');
  const role   = document.getElementById('profileRole');

    avatar.src     = currentUser.pictureUrl || 'https://i.pravatar.cc/150?img=0';
    avatar.onerror = () => { avatar.src = 'https://i.pravatar.cc/150?img=0'; };

// ── 附件上傳 ──
const ALLOWED_TYPES = [
  'image/jpeg','image/jpg','image/png','image/gif','image/webp',
  'image/svg+xml','image/bmp','application/pdf','application/msword',
  'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
  'application/vnd.ms-excel',
  'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
  'application/vnd.ms-powerpoint',
  'application/vnd.openxmlformats-officedocument.presentationml.presentation',
  'text/plain','text/csv','application/zip','application/x-zip-compressed',
  'video/mp4','video/quicktime','audio/mpeg','audio/wav'
];
const MAX_FILE_SIZE = 10 * 1024 * 1024;

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('dragover');
}
function handleDragLeave(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  processFiles(Array.from(e.dataTransfer.files));
}
function handleFileSelect(e) {
  processFiles(Array.from(e.target.files));
  e.target.value = '';
}

function processFiles(files) {
  files.forEach(file => {
    if (file.size > MAX_FILE_SIZE) {
      showToast(`❌ ${file.name}：超過 10MB 限制`, 'error'); return;
    }
    const mime = file.type || getMimeByExt(file.name);
    if (!ALLOWED_TYPES.includes(mime)) {
      showToast(`❌ ${file.name}：不支援的檔案類型`, 'error'); return;
    }
    if (pendingFiles.find(f => f.name === file.name && f.size === file.size)) {
      showToast(`⚠️ ${file.name} 已在列表中`, 'warning'); return;
    }
    pendingFiles.push(file);
  });
  renderPendingFiles();
}

function getMimeByExt(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  const map = {
    jpg:'image/jpeg',jpeg:'image/jpeg',png:'image/png',gif:'image/gif',
    webp:'image/webp',svg:'image/svg+xml',pdf:'application/pdf',
    doc:'application/msword',
    docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    xls:'application/vnd.ms-excel',
    xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    ppt:'application/vnd.ms-powerpoint',
    pptx:'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    txt:'text/plain',csv:'text/csv',zip:'application/zip',
    mp4:'video/mp4',mov:'video/quicktime',mp3:'audio/mpeg',wav:'audio/wav'
  };
  return map[ext] || 'application/octet-stream';
}

function getFileEmoji(mime) {
  if (!mime)                          return '📎';
  if (mime.startsWith('image/'))      return '🖼️';
  if (mime === 'application/pdf')     return '📄';
  if (mime.includes('word'))          return '📝';
  if (mime.includes('excel') || mime.includes('sheet')) return '📊';
  if (mime.includes('powerpoint') || mime.includes('presentation')) return '📑';
  if (mime.startsWith('video/'))      return '🎬';
  if (mime.startsWith('audio/'))      return '🎵';
  if (mime.includes('zip'))           return '🗜️';
  if (mime === 'text/plain')          return '📃';
  return '📎';
}

function removePendingFile(idx) {
  pendingFiles.splice(idx, 1);
  renderPendingFiles();
}

function renderPendingFiles() {
  const container = document.getElementById('filePreviewList');
  if (!container) return;
  if (pendingFiles.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = pendingFiles.map((f, i) => {
    const mime    = f.type || getMimeByExt(f.name);
    const isImage = mime.startsWith('image/');
    return `
      <div class="file-item" id="pf_${i}">
        <div style="width:44px;height:44px;border-radius:8px;background:var(--bg);
                    display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${isImage
            ? `<img id="thumb_${i}" src="" style="width:44px;height:44px;object-fit:cover;border-radius:8px">`
            : `<span style="font-size:22px">${getFileEmoji(mime)}</span>`}
        </div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-size">${formatFileSize(f.size)}</div>
          <div class="file-progress">
            <div class="file-progress-bar" id="fpb_${i}" style="width:0%"></div>
          </div>
          <div class="file-status" id="fps_${i}">等待上傳</div>
        </div>
        <button class="btn btn-danger btn-sm"
          onclick="window.removePendingFile(${i})">
          <i class="fas fa-times"></i>
        </button>
      </div>`;
  }).join('');
  pendingFiles.forEach((f, i) => {
    if (f.type && f.type.startsWith('image/')) {
      const reader  = new FileReader();
      reader.onload = e => {
        const el = document.getElementById('thumb_' + i);
        if (el) el.src = e.target.result;
      };
      reader.readAsDataURL(f);
    }
  });
}

function updateFileProgress(idx, pct, text, isError) {
  const bar = document.getElementById('fpb_' + idx);
  const txt = document.getElementById('fps_' + idx);
  if (bar) {
    bar.style.width      = pct + '%';
    bar.style.background = isError ? '#e74c3c' : 'var(--primary)';
  }
  if (txt) {
    txt.textContent = text;
    txt.className   = 'file-status' + (isError ? ' error' : pct === 100 ? ' success' : '');
  }
}

function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader   = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = e => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

async function uploadSingleFile(file, articleId, idx) {
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      updateFileProgress(idx, 10, attempt > 1 ? `重試第 ${attempt} 次...` : '讀取中...', false);
      const dataUrl = await readFileAsBase64(file);
      if (!dataUrl || !dataUrl.includes(',')) throw new Error('Base64 轉換失敗');
      updateFileProgress(idx, 50, '上傳中...', false);
      const res = await apiPost({
        action: 'uploadFile', token: currentToken, articleId,
        fileName: file.name,
        fileType: file.type || getMimeByExt(file.name),
        fileData: dataUrl
      });
      if (res.success) {
        updateFileProgress(idx, 100, '✅ 上傳成功', false);
        return res;
      } else {
        updateFileProgress(idx, 100, '❌ ' + res.message, true);
        return res;
      }
    } catch(err) {
      if (attempt < 2) {
        updateFileProgress(idx, 0, '失敗，準備重試...', true);
        await sleep(1500);
      } else {
        updateFileProgress(idx, 100, '❌ ' + err.message, true);
        return { success: false, message: err.message };
      }
    }
  }
}

async function uploadAllPendingFiles(articleId) {
  if (!pendingFiles.length) return [];
  const results = [];
  for (let i = 0; i < pendingFiles.length; i++) {
    results.push(await uploadSingleFile(pendingFiles[i], articleId, i));
  }
  const ok   = results.filter(r => r && r.success).length;
  const fail = results.length - ok;
  if (fail === 0) {
    showToast(`✅ ${ok} 個附件上傳成功`, 'success');
  } else {
    showToast(`⚠️ ${ok} 個成功，${fail} 個失敗`,
      fail === results.length ? 'error' : 'warning');
  }
  return results;
}

// ── API ──
async function apiPost(payload) {
  try {
    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(err) {
    console.error('API Error:', err);
    return { success: false, message: '網路錯誤：' + err.message };
  }
}

// ── UI 工具 ──
function showToast(msg, type) {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const c     = document.getElementById('toastContainer');
  if (!c) return;
  const t = document.createElement('div');
  t.className = 'toast ' + (type || 'info');
  t.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${escHtml(String(msg))}</span>`;
  c.appendChild(t);
  setTimeout(() => {
    t.style.opacity    = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(() => t.remove(), 300);
  }, 3500);
}

function showLoading(text) {
  const el = document.getElementById('loadingOverlay');
  const tx = document.getElementById('loadingText');
  if (el) el.classList.add('active');
  if (tx) tx.textContent = text || '載入中...';
}
function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.classList.remove('active');
}

function setButtonLoading(btn, loading, text) {
  if (!btn) return;
  btn.disabled  = loading;
  btn.innerHTML = loading
    ? `<i class="fas fa-spinner fa-spin"></i> ${escHtml(text)}`
    : `<i class="fas fa-check"></i> ${escHtml(text)}`;
}

function showConfigError(msg) {
  const p = document.getElementById('page-login');
  if (!p) return;
  p.innerHTML = `
    <div style="text-align:center;padding:40px 24px">
      <div style="font-size:64px;margin-bottom:16px">⚙️</div>
      <h2 style="color:#e74c3c;margin-bottom:12px">系統設定不完整</h2>
      <div style="background:#fce4ec;border-radius:12px;padding:16px;
                  max-width:320px;margin:0 auto 20px;text-align:left">
        <p style="font-size:13px;color:#c62828;line-height:1.8">
          <i class="fas fa-exclamation-circle"></i> ${escHtml(msg)}
        </p>
      </div>
      <div style="background:#f8f9fa;border-radius:12px;padding:16px;
                  max-width:320px;margin:0 auto;text-align:left">
        <p style="font-size:13px;font-weight:700;margin-bottom:8px">🔧 修正步驟：</p>
        <ol style="font-size:12px;color:#636e72;line-height:2;padding-left:16px">
          <li>開啟 GAS 編輯器</li>
          <li>在 Code.gs 填入正確的 LIFF_ID</li>
          <li>重新部署（選「新版本」）</li>
          <li>使用新的部署網址開啟</li>
        </ol>
      </div>
    </div>`;
  p.classList.add('active');
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatFileSize(bytes) {
  if (!bytes || bytes <= 0)          return '0 B';
  if (bytes < 1024)                  return bytes + ' B';
  if (bytes < 1024 * 1024)           return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1024 * 1024 * 1024)    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

// ── 鍵盤快捷鍵 ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('articleModal')?.classList.remove('active');
    document.getElementById('previewModal')?.classList.remove('active');
    document.getElementById('editUserModal')?.classList.remove('active');
  }
});
