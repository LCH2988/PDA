<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📒 LIFF 筆記本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
  <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary   : #06C755;
      --primary-d : #05a847;
      --danger    : #e74c3c;
      --bg        : #f0f4f8;
      --card      : #ffffff;
      --text      : #2d3748;
      --sub       : #718096;
      --border    : #e2e8f0;
      --radius    : 14px;
      --shadow    : 0 4px 20px rgba(0,0,0,.08);
    }
    body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Header */
    .header { background: linear-gradient(135deg,#06C755,#04a847); color:#fff; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(6,199,85,.35); }
    .header h1 { font-size:1.2rem; font-weight:700; }
    .user-info { font-size:.78rem; opacity:.9; display:flex; align-items:center; gap:6px; }
    .avatar { width:30px; height:30px; border-radius:50%; border:2px solid rgba(255,255,255,.6); object-fit:cover; display:none; }

    /* Tabs */
    .tabs { display:flex; background:var(--card); border-bottom:2px solid var(--border); position:sticky; top:57px; z-index:99; }
    .tab-btn { flex:1; padding:13px; border:none; background:transparent; font-size:.9rem; font-weight:600; color:var(--sub); cursor:pointer; transition:all .2s; border-bottom:3px solid transparent; margin-bottom:-2px; }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

    /* Page */
    .page { display:none; padding:20px; max-width:680px; margin:0 auto; }
    .page.active { display:block; }

    /* Card */
    .card { background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); margin-bottom:16px; }
    .card-title { font-size:.8rem; font-weight:700; color:var(--sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; }

    /* Form */
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:.85rem; font-weight:600; color:var(--sub); margin-bottom:6px; }
    input[type="text"] { width:100%; padding:11px 14px; border:2px solid var(--border); border-radius:10px; font-size:.95rem; color:var(--text); transition:border-color .2s; outline:none; }
    input[type="text"]:focus { border-color:var(--primary); }

    /* Quill */
    #editor-container { border:2px solid var(--border); border-radius:10px; overflow:hidden; transition:border-color .2s; }
    #editor-container:focus-within { border-color:var(--primary); }
    .ql-toolbar { border:none !important; border-bottom:1px solid var(--border) !important; background:#f8fafc; }
    .ql-container { border:none !important; min-height:160px; font-size:.95rem; }

    /* Upload */
    .upload-area { border:2px dashed var(--border); border-radius:10px; padding:28px 20px; text-align:center; cursor:pointer; transition:all .2s; background:#fafbfc; position:relative; }
    .upload-area:hover,.upload-area.dragover { border-color:var(--primary); background:#f0fff5; }
    .upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-icon { font-size:2.2rem; margin-bottom:8px; }
    .upload-text { font-size:.88rem; color:var(--sub); }
    .upload-text span { color:var(--primary); font-weight:600; }

    /* Preview */
    #preview-area { margin-top:14px; display:none; }
    .preview-card { border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .preview-header { background:#f8fafc; padding:10px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border); }
    .preview-filename { font-size:.85rem; font-weight:600; display:flex; align-items:center; gap:6px; }
    .preview-filesize { font-size:.75rem; color:var(--sub); }
    .preview-remove { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1.1rem; padding:2px 6px; border-radius:6px; }
    .preview-body { padding:12px; text-align:center; max-height:300px; overflow:auto; }
    .preview-body img { max-width:100%; max-height:260px; border-radius:8px; object-fit:contain; }
    .preview-body iframe { width:100%; height:260px; border:none; border-radius:8px; }
    .file-type-badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; font-weight:700; text-transform:uppercase; background:#e8f5e9; color:var(--primary-d); margin-left:6px; }

    /* Button */
    .btn { width:100%; padding:14px; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-d); transform:translateY(-1px); box-shadow:0 4px 14px rgba(6,199,85,.4); }
    .btn-primary:disabled { background:#a0aec0; cursor:not-allowed; transform:none; box-shadow:none; }

    /* Status Bar */
    .status-bar { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; margin-bottom:14px; font-size:.82rem; font-weight:600; }
    .status-bar.checking { background:#fff8e1; color:#f57f17; }
    .status-bar.ok       { background:#e8f5e9; color:#2e7d32; }
    .status-bar.err      { background:#fdecea; color:#c62828; }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; animation: pulse 1.5s infinite; }
    .status-bar.checking .status-dot { background:#ffc107; }
    .status-bar.ok       .status-dot { background:#06C755; animation:none; }
    .status-bar.err      .status-dot { background:var(--danger); animation:none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#2d3748; color:#fff; padding:12px 24px; border-radius:30px; font-size:.88rem; font-weight:600; z-index:9999; transition:transform .3s ease; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,.2); }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .toast.success { background:var(--primary); }
    .toast.error   { background:var(--danger); }

    /* Notes List */
    .note-item { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); border-left:4px solid var(--primary); cursor:pointer; transition:transform .15s,box-shadow .15s; }
    .note-item:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.1); }
    .note-item-title { font-size:1rem; font-weight:700; margin-bottom:6px; }
    .note-item-preview { font-size:.82rem; color:var(--sub); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .note-item-meta { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
    .note-item-time { font-size:.75rem; color:var(--sub); }
    .note-item-attach { font-size:.75rem; color:var(--primary); font-weight:600; }
    .empty-state { text-align:center; padding:60px 20px; color:var(--sub); }
    .empty-state .emoji { font-size:3rem; margin-bottom:12px; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:flex-end; justify-content:center; }
    .modal-overlay.show { display:flex; }
    .modal { background:var(--card); border-radius:20px 20px 0 0; padding:24px 20px; width:100%; max-width:680px; max-height:85vh; overflow-y:auto; animation:slideUp .3s ease; }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
    .modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--sub); }
    .modal-content-text { font-size:.9rem; line-height:1.7; }
    .modal-attach { margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
    .modal-attach a { color:var(--primary); font-weight:600; text-decoration:none; font-size:.88rem; }

    /* Spinner */
    .spinner { width:20px; height:20px; border:3px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>📒 我的筆記本</h1>
    <div class="user-info">
      <img class="avatar" id="userAvatar" alt="avatar" onerror="this.style.display='none'" />
      <span id="userName">載入中...</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('write',this)">✏️ 新增筆記</button>
    <button class="tab-btn"        onclick="switchTab('list', this)">📋 我的筆記</button>
  </div>

  <!-- ===== 新增筆記 ===== -->
  <div class="page active" id="page-write">

    <!-- 連線狀態列 -->
    <div class="status-bar checking" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">檢查連線中...</span>
    </div>

    <div class="card">
      <div class="card-title">📝 筆記內容</div>
      <div class="form-group">
        <label>📌 標題 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="noteTitle" placeholder="請輸入筆記標題..." maxlength="100" />
      </div>
      <div class="form-group">
        <label>📄 內容</label>
        <div id="editor-container"><div id="quill-editor"></div></div>
      </div>
      <div class="form-group">
        <label>📎 附件上傳</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip" />
          <div class="upload-icon">☁️</div>
          <div class="upload-text">拖曳檔案到此，或 <span>點擊上傳</span></div>
          <div class="upload-text" style="margin-top:4px;font-size:.75rem;">支援：圖片、PDF、Office、TXT、ZIP（最大 10MB）</div>
        </div>
        <div id="preview-area">
          <div class="preview-card">
            <div class="preview-header">
              <div class="preview-filename">
                <span id="previewIcon">📄</span>
                <span id="previewName"></span>
                <span class="file-type-badge" id="previewType"></span>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="preview-filesize" id="previewSize"></span>
                <button class="preview-remove" onclick="removeFile()">✕</button>
              </div>
            </div>
            <div class="preview-body" id="previewBody"></div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn" onclick="saveNote()">
      <span>💾</span><span>儲存筆記</span>
    </button>
  </div>

  <!-- ===== 筆記列表 ===== -->
  <div class="page" id="page-list">
    <div id="notesList"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal">
      <div class="modal-title">
        <span id="modalTitle"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-content-text" id="modalContent"></div>
      <div class="modal-attach" id="modalAttach" style="display:none;">
        <strong>📎 附件：</strong>
        <a id="modalAttachLink" href="#" target="_blank"></a>
      </div>
      <div style="font-size:.75rem;color:var(--sub);margin-top:12px;" id="modalMeta"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =====================================================
    // 🔧 ★ 請填入你的設定值 ★
    // =====================================================
    const LIFF_ID = '2001679903-jkND3El9';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxDSDZribCwRl7UzvgtPofGIBL1iGMHvreW8bQCDrMgf6ECQ2e9N6AgZGxOVQ3IiyKEtA/exec';
    // =====================================================

    let liffUser     = null;
    let quill        = null;
    let uploadedFile = null;

    // ─────────────────────────────
    // 🚀 初始化
    // ─────────────────────────────
    window.addEventListener('DOMContentLoaded', async () => {
      initQuill();
      initFileUpload();
      await initLiff();
      checkConnection();   // 不 await，背景執行
    });

    // ── Quill ──
    function initQuill() {
      quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: '請輸入筆記內容...',
        modules: {
          toolbar: [
            [{ header: [1,2,3,false] }],
            ['bold','italic','underline','strike'],
            [{ color:[] },{ background:[] }],
            [{ list:'ordered' },{ list:'bullet' }],
            [{ align:[] }],
            ['blockquote','code-block'],
            ['link'],['clean']
          ]
        }
      });
    }

    // ── LIFF ──
    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          liffUser = { userId: profile.userId, userName: profile.displayName };
          document.getElementById('userName').textContent = profile.displayName;
          if (profile.pictureUrl) {
            const av = document.getElementById('userAvatar');
            av.src = profile.pictureUrl;
            av.style.display = 'block';
          }
        } else {
          liff.login();
        }
      } catch (err) {
        console.warn('LIFF demo mode:', err.message);
        liffUser = { userId: 'demo_user', userName: 'Demo 使用者' };
        document.getElementById('userName').textContent = 'Demo 使用者';
      }
    }

    // ─────────────────────────────
    // 🔌 連線狀態檢查（JSONP 方式，完全繞過 CORS）
    // ─────────────────────────────
    function checkConnection() {
      setStatus('checking', '🔄 檢查連線中...');

      const cbName = '__gasping_' + Date.now();
      const script = document.createElement('script');
      const timer  = setTimeout(() => {
        cleanup();
        setStatus('err', '❌ 連線逾時，請確認 GAS_URL 是否正確');
      }, 8000);

      window[cbName] = (data) => {
        cleanup();
        if (data && data.success !== undefined) {
          setStatus('ok', '✅ 已連線到 Google 試算表');
        } else {
          setStatus('err', '⚠️ GAS 回應異常');
        }
      };

      function cleanup() {
        clearTimeout(timer);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        setStatus('err', '❌ 無法連線，請確認 GAS_URL 並重新部署');
      };

      script.src = `${GAS_URL}?action=ping&callback=${cbName}`;
      document.head.appendChild(script);
    }

    function setStatus(type, msg) {
      const bar  = document.getElementById('statusBar');
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      if (!bar) return;
      bar.className  = 'status-bar ' + type;
      dot.className  = 'status-dot';
      text.textContent = msg;
    }

    // ─────────────────────────────
    // 📋 讀取筆記（JSONP）
    // ─────────────────────────────
    function fetchNotesJsonp(userId) {
      return new Promise((resolve, reject) => {
        const cbName = '__gasnotes_' + Date.now();
        const script = document.createElement('script');
        const timer  = setTimeout(() => {
          cleanup();
          reject(new Error('請求逾時'));
        }, 10000);

        window[cbName] = (data) => { cleanup(); resolve(data); };

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = () => { cleanup(); reject(new Error('載入失敗')); };
        script.src = `${GAS_URL}?action=getNotes&userId=${encodeURIComponent(userId||'')}&callback=${cbName}`;
        document.head.appendChild(script);
      });
    }

    // ─────────────────────────────
    // 💾 儲存筆記（POST fetch，GAS 已加 CORS Header）
    // ─────────────────────────────
    async function saveNote() {
      const title   = document.getElementById('noteTitle').value.trim();
      const content = quill.root.innerHTML;
      const textLen = quill.getText().trim().length;

      if (!title) {
        showToast('⚠️ 請輸入筆記標題', 'error');
        document.getElementById('noteTitle').focus();
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div><span>儲存中...</span>';

      try {
        const payload = {
          action   : 'saveNote',
          userId   : liffUser?.userId   || 'unknown',
          userName : liffUser?.userName || '匿名',
          title    : title,
          content  : textLen > 0 ? content : ''
        };

        if (uploadedFile) {
          payload.fileData = await fileToBase64(uploadedFile);
          payload.fileName = uploadedFile.name;
          payload.fileType = uploadedFile.type;
        }

        const resp = await fetch(GAS_URL, {
          method  : 'POST',
          headers : { 'Content-Type': 'text/plain' },  // ← 避免 preflight
          body    : JSON.stringify(payload)
        });

        const result = await resp.json();
        if (result.success) {
          showToast('✅ 筆記儲存成功！', 'success');
          resetForm();
          setStatus('ok', '✅ 已連線到 Google 試算表');
        } else {
          throw new Error(result.message || '儲存失敗');
        }
      } catch (err) {
        if (err instanceof SyntaxError) {
          showToast('✅ 已送出（請至試算表確認）', 'success');
          resetForm();
        } else {
          showToast('❌ ' + err.message, 'error');
          setStatus('err', '❌ 儲存失敗：' + err.message);
        }
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<span>💾</span><span>儲存筆記</span>';
      }
    }

    function resetForm() {
      document.getElementById('noteTitle').value = '';
      quill.setContents([]);
      removeFile();
    }

    // ─────────────────────────────
    // 📋 載入筆記列表
    // ─────────────────────────────
    async function loadNotes() {
      const container = document.getElementById('notesList');
      container.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><div>載入中...</div></div>';
      try {
        const result = await fetchNotesJsonp(liffUser?.userId || '');
        if (!result.notes || result.notes.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><div>還沒有筆記，快去新增吧！</div></div>';
          return;
        }
        container.innerHTML = result.notes.map(note => `
          <div class="note-item" onclick='openNote(${JSON.stringify(note).replace(/'/g,"&#39;")})'>
            <div class="note-item-title">${escapeHtml(note.title)}</div>
            <div class="note-item-preview">${stripHtml(note.content) || '（無內容）'}</div>
            <div class="note-item-meta">
              <span class="note-item-time">🕐 ${note.time}</span>
              ${note.fileName ? `<span class="note-item-attach">📎 ${escapeHtml(note.fileName)}</span>` : ''}
            </div>
          </div>
        `).join('');
      } catch (err) {
        container.innerHTML = `<div class="empty-state"><div class="emoji">⚠️</div><div>載入失敗：${err.message}</div></div>`;
      }
    }

    // ─────────────────────────────
    // 🔍 Modal
    // ─────────────────────────────
    function openNote(note) {
      document.getElementById('modalTitle').textContent = note.title;
      document.getElementById('modalContent').innerHTML = note.content || '（無內容）';
      document.getElementById('modalMeta').textContent  = `📅 ${note.time}　👤 ${note.userName}`;
      const ad = document.getElementById('modalAttach');
      const al = document.getElementById('modalAttachLink');
      if (note.fileName && note.fileUrl) {
        ad.style.display = 'block';
        al.textContent   = note.fileName;
        al.href          = note.fileUrl;
      } else {
        ad.style.display = 'none';
      }
      document.getElementById('noteModal').classList.add('show');
    }
    function closeModal() { document.getElementById('noteModal').classList.remove('show'); }
    document.getElementById('noteModal').addEventListener('click', e => { if (e.target===e.currentTarget) closeModal(); });

    // ─────────────────────────────
    // 🔀 Tab 切換
    // ─────────────────────────────
    function switchTab(tab, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      btn.classList.add('active');
      if (tab === 'list') loadNotes();
    }

    // ─────────────────────────────
    // 📎 檔案上傳
    // ─────────────────────────────
    function initFileUpload() {
      const area  = document.getElementById('uploadArea');
      const input = document.getElementById('fileInput');
      input.addEventListener('change', e => handleFile(e.target.files[0]));
      area.addEventListener('dragover',  e => { e.preventDefault(); area.classList.add('dragover'); });
      area.addEventListener('dragleave', () => area.classList.remove('dragover'));
      area.addEventListener('drop', e => { e.preventDefault(); area.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
    }

    function handleFile(file) {
      if (!file) return;
      if (file.size > 10*1024*1024) { showToast('❌ 檔案大小不能超過 10MB','error'); return; }
      uploadedFile = file;
      const ext = file.name.split('.').pop().toLowerCase();
      const iconMap = {pdf:'📕',doc:'📘',docx:'📘',xls:'📗',xlsx:'📗',ppt:'📙',pptx:'📙',txt:'📄',zip:'🗜️'};
      document.getElementById('previewIcon').textContent = iconMap[ext]||'📄';
      document.getElementById('previewName').textContent = file.name;
      document.getElementById('previewType').textContent = ext;
      document.getElementById('previewSize').textContent = formatFileSize(file.size);
      const body = document.getElementById('previewBody');
      body.innerHTML = '';
      const reader = new FileReader();
      if (file.type.startsWith('image/')) {
        reader.onload = e => { body.innerHTML = `<img src="${e.target.result}" alt="preview"/>`; };
        reader.readAsDataURL(file);
      } else if (ext==='pdf') {
        reader.onload = e => { body.innerHTML = `<iframe src="${e.target.result}"></iframe>`; };
        reader.readAsDataURL(file);
      } else if (ext==='txt') {
        reader.onload = e => { body.innerHTML = `<pre style="text-align:left;font-size:.82rem;white-space:pre-wrap;padding:8px;">${escapeHtml(e.target.result)}</pre>`; };
        reader.readAsText(file);
      } else {
        body.innerHTML = `<div style="font-size:3rem;padding:20px 0;">${iconMap[ext]||'📄'}</div><div style="color:var(--sub);font-size:.85rem;">此格式無法預覽</div>`;
      }
      document.getElementById('preview-area').style.display = 'block';
      document.getElementById('uploadArea').style.display   = 'none';
    }

    function removeFile() {
      uploadedFile = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('preview-area').style.display = 'none';
      document.getElementById('uploadArea').style.display   = 'block';
    }

    // ─────────────────────────────
    // 🛠️ 工具函式
    // ─────────────────────────────
    function fileToBase64(file) {
      return new Promise((resolve,reject) => {
        const r = new FileReader();
        r.onload  = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }
    function formatFileSize(b) {
      if (b<1024) return b+' B';
      if (b<1048576) return (b/1024).toFixed(1)+' KB';
      return (b/1048576).toFixed(1)+' MB';
    }
    function escapeHtml(s) {
      if (!s) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function stripHtml(html) {
      if (!html) return '';
      const d = document.createElement('div');
      d.innerHTML = html;
      return d.textContent||d.innerText||'';
    }
    let toastTimer = null;
    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = 'toast '+type+' show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
