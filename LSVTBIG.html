<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>文章管理系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Microsoft JhengHei",sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

    /* ── Navbar ── */
    .navbar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;
            padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
    .navbar h1{font-size:1.1rem;font-weight:700}
    .user-info{display:flex;align-items:center;gap:8px;font-size:.82rem}
    .user-avatar{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.5)}
    .perm-badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700}
    .perm-edit    {background:#48bb78;color:#fff}
    .perm-download{background:#4299e1;color:#fff}
    .perm-view    {background:#ed8936;color:#fff}
    .perm-none    {background:#fc5c65;color:#fff}

    /* ── Layout ── */
    .container{max-width:960px;margin:24px auto;padding:0 16px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;
         border:none;border-radius:8px;cursor:pointer;font-size:.88rem;
         font-weight:600;transition:all .2s}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
    .btn-danger{background:#fc5c65;color:#fff}
    .btn-danger:hover:not(:disabled){background:#eb3b5a}
    .btn-edit{background:#f7b731;color:#fff}
    .btn-edit:hover:not(:disabled){background:#f0a500}
    .btn-sm{padding:5px 12px;font-size:.78rem}

    /* ── Cards ── */
    .card{background:#fff;border-radius:14px;padding:22px;
          box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:18px}
    .card-header{display:flex;justify-content:space-between;
                 align-items:flex-start;margin-bottom:10px}
    .article-title{font-size:1.15rem;font-weight:700;color:#2d3748}
    .article-meta{font-size:.8rem;color:#718096;margin-bottom:8px}
    .article-content{font-size:.93rem;line-height:1.75;color:#4a5568;
                      white-space:pre-wrap;word-break:break-word}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
    .tag{background:#ebf4ff;color:#3182ce;padding:2px 9px;
         border-radius:20px;font-size:.76rem;font-weight:600}

    /* ── Attachments ── */
    .attachments{margin-top:12px;border-top:1px solid #e2e8f0;padding-top:10px}
    .attachments h4{font-size:.82rem;color:#718096;margin-bottom:7px}
    .att-list{display:flex;flex-wrap:wrap;gap:7px}
    .att-item{display:flex;align-items:center;gap:5px;background:#f7fafc;
              border:1px solid #e2e8f0;border-radius:8px;padding:5px 10px;font-size:.8rem}
    .att-item a{color:#3182ce;text-decoration:none;font-weight:600}
    .att-item a:hover{text-decoration:underline}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
                   z-index:200;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.active{display:flex}
    .modal{background:#fff;border-radius:16px;padding:26px;width:100%;
           max-width:620px;max-height:90vh;overflow-y:auto;
           box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal h2{font-size:1.15rem;font-weight:700;margin-bottom:18px;color:#2d3748;
              border-bottom:2px solid #e2e8f0;padding-bottom:10px}
    .form-group{margin-bottom:15px}
    .form-group label{display:block;font-size:.83rem;font-weight:600;
                      color:#4a5568;margin-bottom:5px}
    .form-group input,
    .form-group textarea{width:100%;padding:9px 13px;border:1.5px solid #e2e8f0;
      border-radius:8px;font-size:.88rem;transition:border .2s;font-family:inherit}
    .form-group input:focus,
    .form-group textarea:focus{outline:none;border-color:#667eea;
      box-shadow:0 0 0 3px rgba(102,126,234,.15)}
    .form-group textarea{resize:vertical;min-height:130px}

    /* ── Upload ── */
    .upload-area{border:2px dashed #cbd5e0;border-radius:10px;padding:18px;
                 text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
    .upload-area:hover,.upload-area.dragover{border-color:#667eea;background:#ebf4ff}
    .upload-area p{color:#718096;font-size:.85rem}
    .upload-icon{font-size:1.8rem;margin-bottom:5px}
    #fileInput{display:none}
    .file-preview{margin-top:9px;display:flex;flex-wrap:wrap;gap:7px}
    .file-chip{display:flex;align-items:center;gap:5px;background:#ebf4ff;
               border:1px solid #bee3f8;border-radius:20px;
               padding:3px 11px;font-size:.78rem;color:#2b6cb0}
    .remove-file{cursor:pointer;color:#fc5c65;font-weight:700;margin-left:3px}

    /* ── Search ── */
    .search-bar{display:flex;gap:10px;margin-bottom:0}
    .search-bar input{flex:1;padding:9px 15px;border:1.5px solid #e2e8f0;
                      border-radius:10px;font-size:.88rem}
    .search-bar input:focus{outline:none;border-color:#667eea}

    /* ── Empty / Loading ── */
    .empty{text-align:center;padding:50px 20px;color:#a0aec0}
    .empty-icon{font-size:3rem;margin-bottom:10px}
    .loading{text-align:center;padding:40px;color:#718096}
    .spinner{display:inline-block;width:30px;height:30px;
             border:3px solid #e2e8f0;border-top-color:#667eea;
             border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;right:20px;background:#2d3748;color:#fff;
           padding:11px 18px;border-radius:10px;font-size:.85rem;
           box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:999;
           transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:#38a169}
    .toast.error  {background:#e53e3e}
    .toast.info   {background:#3182ce}

    /* ── Notice ── */
    .perm-notice{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;
                 padding:12px 16px;margin-bottom:16px;font-size:.85rem;color:#856404}
    .action-btns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;margin-left:10px}

    /* ── Debug Panel ── */
    #debugPanel{display:none;position:fixed;bottom:60px;left:10px;right:10px;
                background:#1a202c;color:#68d391;font-size:.72rem;padding:10px;
                border-radius:8px;max-height:160px;overflow-y:auto;
                z-index:998;font-family:monospace}
  </style>
</head>
<body>

<!-- ══ Navbar ══════════════════════════════════════ -->
<nav class="navbar">
  <h1>📝 文章管理系統</h1>
  <div class="user-info" id="userInfo">
    <span style="font-size:.8rem;opacity:.8">載入中…</span>
  </div>
</nav>

<!-- ══ Main ════════════════════════════════════════ -->
<div class="container" id="mainContainer">
  <div class="loading">
    <div class="spinner"></div>
    <p style="margin-top:12px">初始化中…</p>
  </div>
</div>

<!-- ══ Modal ════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">✏️ 撰寫新文章</h2>
    <input type="hidden" id="editId"/>

    <div class="form-group">
      <label>標題 *</label>
      <input type="text" id="fTitle" placeholder="請輸入文章標題"/>
    </div>
    <div class="form-group">
      <label>作者</label>
      <input type="text" id="fAuthor" placeholder="請輸入作者名稱"/>
    </div>
    <div class="form-group">
      <label>內容 *</label>
      <textarea id="fContent" placeholder="請輸入文章內容…"></textarea>
    </div>
    <div class="form-group">
      <label>標籤（以逗號分隔）</label>
      <input type="text" id="fTags" placeholder="例：技術, 生活, 旅遊"/>
    </div>

    <div id="existingAttachments" style="display:none" class="form-group">
      <label>現有附件</label>
      <div id="existingAttList" class="att-list"></div>
    </div>

    <div class="form-group">
      <label>上傳附件</label>
      <div class="upload-area" id="uploadArea"
           onclick="document.getElementById('fileInput').click()"
           ondragover="dragOver(event)"
           ondragleave="dragLeave()"
           ondrop="dropFiles(event)">
        <div class="upload-icon">📎</div>
        <p>點擊或拖曳檔案至此上傳</p>
        <p style="font-size:.73rem;margin-top:4px;color:#a0aec0">
          支援所有格式，單檔最大 10MB
        </p>
      </div>
      <input type="file" id="fileInput" multiple onchange="addFiles(this.files)"/>
      <div class="file-preview" id="filePreview"></div>
    </div>

    <div style="background:#e6fffa;border:1px solid #81e6d9;border-radius:8px;
                padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#234e52">
      💬 儲存後將自動分享到 LINE 群組
    </div>

    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn" style="background:#e2e8f0;color:#4a5568"
              onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="submitBtn"
              onclick="submitArticle()">💾 儲存並分享</button>
    </div>
  </div>
</div>

<div class="toast"    id="toast"></div>
<div id="debugPanel"></div>

<script>
  // ══════════════════════════════════════════════
  // ⚙️ 設定區 — 部署前請修改這兩個值
  // ══════════════════════════════════════════════
  var CONFIG = {
    BACKEND_URL : "https://script.google.com/macros/s/AKfycbzi2ZGA-jRlQ8s4wHo7AC4gIjR-66l_lVBebWz8hx2tAt0fVmInLJszeLDChKYIjkOI/exec",
    LIFF_ID     : "2009456572-AUDE1qmM"
  };

  // ══════════════════════════════════════════════
  // 全域狀態
  // ══════════════════════════════════════════════
  var STATE = {
    userId      : null,
    displayName : null,
    pictureUrl  : null,
    perm        : "none",
    articles    : [],
    pendingFiles: []
  };

  // ══════════════════════════════════════════════
  // 🐛 除錯工具
  // ══════════════════════════════════════════════
  function dbg(msg) {
    console.log("[DBG] " + msg);
    var p = document.getElementById("debugPanel");
    if (p) {
      var t = new Date().toLocaleTimeString();
      p.innerHTML += "<div>[" + t + "] " + msg + "</div>";
      p.scrollTop = p.scrollHeight;
    }
  }

  // ══════════════════════════════════════════════
  // 🌐 API 呼叫封裝
  // ══════════════════════════════════════════════

  /** GET 請求：?action=xxx */
  function apiGet(action, params) {
    var url = CONFIG.BACKEND_URL + "?action=" + encodeURIComponent(action);
    if (params) {
      Object.keys(params).forEach(function(k) {
        url += "&" + encodeURIComponent(k) + "=" + encodeURIComponent(params[k]);
      });
    }
    dbg("GET " + url);
    return fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(res) {
        dbg("GET 回應: " + JSON.stringify(res).substring(0, 120));
        return res;
      });
  }

  /** POST 請求：body = { action, ...payload } */
  function apiPost(action, payload) {
    var body = Object.assign({ action: action }, payload || {});
    dbg("POST action=" + action + " | userId=" + STATE.userId);
    return fetch(CONFIG.BACKEND_URL, {
      method  : "POST",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify(body)
    })
      .then(function(r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function(res) {
        dbg("POST 回應: " + JSON.stringify(res).substring(0, 120));
        return res;
      });
  }

  // ══════════════════════════════════════════════
  // 🚀 初始化：LIFF → verifyUser → 載入文章
  // ══════════════════════════════════════════════
  window.onload = function() {
    dbg("window.onload");
    liff.init({ liffId: CONFIG.LIFF_ID })
      .then(function() {
        dbg("LIFF init 成功 | isLoggedIn=" + liff.isLoggedIn());
        if (!liff.isLoggedIn()) {
          liff.login();
          return Promise.reject("需要登入");
        }
        return liff.getProfile();
      })
      .then(function(profile) {
        dbg("取得 profile | userId=" + profile.userId);
        STATE.userId      = profile.userId;
        STATE.displayName = profile.displayName;
        STATE.pictureUrl  = profile.pictureUrl;
        updateNavbar();
        return callVerifyUser();
      })
      .catch(function(err) {
        dbg("LIFF 失敗（非 LIFF 環境）: " + err);
        STATE.userId      = null;
        STATE.displayName = "訪客";
        STATE.pictureUrl  = null;
        STATE.perm        = "view";
        updateNavbar();
        renderMain();
        loadArticles();
      });
  };

  // ══════════════════════════════════════════════
  // 👤 verifyUser
  // ══════════════════════════════════════════════
  function callVerifyUser() {
    dbg("callVerifyUser | userId=" + STATE.userId);
    return apiPost("verifyUser", {
      lineUserId  : STATE.userId,
      displayName : STATE.displayName
    })
      .then(function(res) {
        dbg("verifyUser 結果: " + JSON.stringify(res));
        STATE.perm = (res && res.perm) ? res.perm : "none";
        if (res && res.userId) STATE.userId = res.userId;
        updateNavbar();
        renderMain();
        loadArticles();
      })
      .catch(function(err) {
        dbg("verifyUser 失敗: " + err.message);
        STATE.perm = "none";
        updateNavbar();
        renderMain();
        loadArticles();
      });
  }

  // ══════════════════════════════════════════════
  // 🖼️ 更新 Navbar
  // ══════════════════════════════════════════════
  function updateNavbar() {
    var permText = {
      edit    : "✏️ 編輯",
      download: "⬇️ 下載",
      view    : "👁️ 瀏覽",
      none    : "🚫 無權限"
    }[STATE.perm] || "🚫";
    var html = "";
    if (STATE.pictureUrl)
      html += '<img class="user-avatar" src="' + STATE.pictureUrl + '" alt="avatar"/>';
    html += '<span>' + esc(STATE.displayName || "訪客") + '</span>';
    html += '<span class="perm-badge perm-' + STATE.perm + '">' + permText + '</span>';
    document.getElementById("userInfo").innerHTML = html;
  }

  // ══════════════════════════════════════════════
  // 🏠 渲染主畫面
  // ══════════════════════════════════════════════
  function renderMain() {
    var container = document.getElementById("mainContainer");

    if (STATE.perm === "none") {
      container.innerHTML =
        '<div style="display:flex;flex-direction:column;align-items:center;' +
        'justify-content:center;min-height:60vh;text-align:center;padding:20px">' +
        '<div style="font-size:4rem;margin-bottom:16px">🔒</div>' +
        '<h2 style="font-size:1.4rem;font-weight:700;color:#2d3748;margin-bottom:8px">' +
        '您尚無存取權限</h2>' +
        '<p style="color:#718096;margin-bottom:24px;font-size:.9rem">' +
        '請聯絡管理員開通權限<br>透過 LINE Bot 輸入 /myperm 查詢</p>' +
        (STATE.userId
          ? '<p style="font-size:.75rem;color:#a0aec0">您的 ID：' + STATE.userId + '</p>'
          : '') +
        '</div>';
      return;
    }

    var writeBtn = STATE.perm === "edit"
      ? '<button class="btn btn-primary" onclick="openModal()">✏️ 撰寫文章</button>'
      : "";

    var noticeHtml = "";
    if (STATE.perm === "view")
      noticeHtml = '<div class="perm-notice">👁️ 您目前為「只能瀏覽」權限，無法編輯或下載附件。</div>';
    if (STATE.perm === "download")
      noticeHtml = '<div class="perm-notice">⬇️ 您目前為「可下載」權限，可下載附件但無法編輯文章。</div>';

    container.innerHTML =
      '<div style="display:flex;justify-content:space-between;' +
      'align-items:center;margin-bottom:16px">' +
        '<div class="search-bar" style="flex:1;margin-right:12px">' +
          '<input type="text" id="searchInput"' +
          ' placeholder="🔍 搜尋標題、作者或標籤…"' +
          ' oninput="renderArticles()"/>' +
        '</div>' + writeBtn +
      '</div>' +
      noticeHtml +
      '<div id="articleList">' +
        '<div class="loading"><div class="spinner"></div>' +
        '<p style="margin-top:12px">載入中…</p></div>' +
      '</div>';
  }

  // ══════════════════════════════════════════════
  // 📋 載入文章
  // ══════════════════════════════════════════════
  function loadArticles() {
    dbg("loadArticles");
    var listEl = document.getElementById("articleList");
    if (listEl)
      listEl.innerHTML =
        '<div class="loading"><div class="spinner"></div>' +
        '<p style="margin-top:12px">載入中…</p></div>';

    apiGet("getArticles")
      .then(function(res) {
        var data = (res && res.data) ? res.data : (Array.isArray(res) ? res : []);
        dbg("getArticles 回傳 " + data.length + " 筆");
        STATE.articles = data;
        renderArticles();
      })
      .catch(function(err) {
        dbg("getArticles 失敗: " + err.message);
        if (listEl)
          listEl.innerHTML =
            '<div class="empty"><div class="empty-icon">⚠️</div>' +
            '<p>載入失敗，請重新整理</p></div>';
        showToast("載入失敗：" + err.message, "error");
      });
  }

  // ══════════════════════════════════════════════
  // 📰 渲染文章列表
  // ══════════════════════════════════════════════
  function renderArticles() {
    var searchEl = document.getElementById("searchInput");
    var q        = searchEl ? searchEl.value.toLowerCase() : "";
    var listEl   = document.getElementById("articleList");
    if (!listEl) return;

    var result = STATE.articles.filter(function(a) {
      if (a.title.toLowerCase().indexOf(q)        > -1) return true;
      if ((a.author||"").toLowerCase().indexOf(q) > -1) return true;
      return (a.tags||[]).some(function(t) {
        return t.toLowerCase().indexOf(q) > -1;
      });
    });

    if (!result.length) {
      listEl.innerHTML =
        '<div class="empty"><div class="empty-icon">📭</div><p>' +
        (q ? "找不到符合的文章" : "尚無文章") + '</p></div>';
      return;
    }

    listEl.innerHTML = result.map(buildCard).join("");
  }

  // ══════════════════════════════════════════════
  // 🃏 建立文章卡片
  // ══════════════════════════════════════════════
  function buildCard(a) {
    var tagsHtml = "";
    if (a.tags && a.tags.length) {
      tagsHtml = '<div class="tags">' +
        a.tags.filter(function(t){ return t.trim(); })
              .map(function(t){ return '<span class="tag">#' + esc(t.trim()) + '</span>'; })
              .join("") +
        '</div>';
    }

    var attHtml = "";
    if (a.attachments && a.attachments.length) {
      var canDL = (STATE.perm === "edit" || STATE.perm === "download");
      attHtml =
        '<div class="attachments">' +
        '<h4>📎 附件（' + a.attachments.length + '）</h4>' +
        '<div class="att-list">' +
        a.attachments.map(function(f) {
          var linkHtml = canDL
            ? '<a href="' + f.url + '" target="_blank">' + esc(f.name) + '</a>'
            : '<span style="color:#a0aec0">' + esc(f.name) + ' 🔒</span>';
          var delBtn = STATE.perm === "edit"
            ? '<span class="remove-file" ' +
              'onclick="removeExistingAtt(\'' + a.id + '\',\'' + f.fileId + '\')"' +
              '>✕</span>'
            : "";
          return '<div class="att-item" id="att-' + f.fileId + '">' +
            fileIcon(f.mimeType) + ' ' + linkHtml +
            '<span style="color:#a0aec0;font-size:.73rem">' + fmtSize(f.size) + '</span>' +
            delBtn + '</div>';
        }).join("") +
        '</div></div>';
    }

    var actionHtml = "";
    if (STATE.perm === "edit") {
      actionHtml =
        '<div class="action-btns">' +
        '<button class="btn btn-edit btn-sm" ' +
        'onclick="openEdit(\'' + a.id + '\')">✏️ 編輯</button>' +
        '<button class="btn btn-danger btn-sm" ' +
        'onclick="confirmDelete(\'' + a.id + '\',\'' +
        esc(a.title).replace(/'/g,"&#39;") + '\')">🗑️ 刪除</button>' +
        '</div>';
    }

    var updHtml = (a.updatedAt && a.updatedAt !== a.createdAt)
      ? ' &nbsp;|&nbsp; ✏️ ' + a.updatedAt : "";

    return '<div class="card">' +
      '<div class="card-header">' +
        '<div style="flex:1;min-width:0">' +
          '<div class="article-title">' + esc(a.title) + '</div>' +
          '<div class="article-meta">👤 ' + esc(a.author||"匿名") +
            ' &nbsp;|&nbsp; 🕐 ' + a.createdAt + updHtml + '</div>' +
          tagsHtml +
        '</div>' + actionHtml +
      '</div>' +
      '<div class="article-content">' + esc(a.content) + '</div>' +
      attHtml +
    '</div>';
  }

  // ══════════════════════════════════════════════
  // 📝 Modal 開關
  // ══════════════════════════════════════════════
  function openModal() {
    if (STATE.perm !== "edit") { showToast("您沒有編輯權限","error"); return; }
    document.getElementById("editId").value            = "";
    document.getElementById("modalTitle").textContent  = "✏️ 撰寫新文章";
    document.getElementById("fTitle").value            = "";
    document.getElementById("fAuthor").value           = STATE.displayName || "";
    document.getElementById("fContent").value          = "";
    document.getElementById("fTags").value             = "";
    STATE.pendingFiles                                  = [];
    document.getElementById("filePreview").innerHTML   = "";
    document.getElementById("existingAttachments").style.display = "none";
    document.getElementById("modalOverlay").classList.add("active");
  }

  function openEdit(id) {
    if (STATE.perm !== "edit") { showToast("您沒有編輯權限","error"); return; }
    var a = STATE.articles.find(function(x){ return x.id === id; });
    if (!a) return;
    document.getElementById("editId").value            = id;
    document.getElementById("modalTitle").textContent  = "✏️ 編輯文章";
    document.getElementById("fTitle").value            = a.title;
    document.getElementById("fAuthor").value           = a.author || "";
    document.getElementById("fContent").value          = a.content;
    document.getElementById("fTags").value             = (a.tags||[]).join(", ");
    STATE.pendingFiles                                  = [];
    document.getElementById("filePreview").innerHTML   = "";

    var existDiv = document.getElementById("existingAttachments");
    var attList  = document.getElementById("existingAttList");
    if (a.attachments && a.attachments.length) {
      existDiv.style.display = "block";
      attList.innerHTML = a.attachments.map(function(f) {
        return '<div class="att-item" id="att-' + f.fileId + '">' +
          fileIcon(f.mimeType) + ' ' +
          '<a href="' + f.url + '" target="_blank">' + esc(f.name) + '</a>' +
          '<span style="color:#a0aec0;font-size:.73rem">' + fmtSize(f.size) + '</span>' +
          '<span class="remove-file" ' +
          'onclick="removeExistingAtt(\'' + id + '\',\'' + f.fileId + '\')"' +
          '>✕</span>' +
          '</div>';
      }).join("");
    } else {
      existDiv.style.display = "none";
    }
    document.getElementById("modalOverlay").classList.add("active");
  }

  function closeModal()         { document.getElementById("modalOverlay").classList.remove("active"); }
  function closeModalOutside(e) { if (e.target.id === "modalOverlay") closeModal(); }

  // ══════════════════════════════════════════════
  // 💾 儲存文章
  // ══════════════════════════════════════════════
  function submitArticle() {
    var title   = document.getElementById("fTitle").value.trim();
    var content = document.getElementById("fContent").value.trim();
    if (!title)        { showToast("請輸入標題","error"); return; }
    if (!content)      { showToast("請輸入內容","error"); return; }
    if (!STATE.userId) { showToast("無法識別使用者身份，請重新整理","error"); return; }

    var tags = document.getElementById("fTags").value
      .split(",").map(function(t){ return t.trim(); }).filter(Boolean);

    var articleData = {
      title  : title,
      author : document.getElementById("fAuthor").value.trim(),
      content: content,
      tags   : tags
    };

    dbg("submitArticle | userId=" + STATE.userId + " | title=" + title);
    setSubmitLoading(true);

    readAllFiles(STATE.pendingFiles, function(filesData) {
      var editId = document.getElementById("editId").value;
      var action = editId ? "updateArticle" : "saveArticle";
      var payload = editId
        ? { id: editId, articleData: articleData, filesData: filesData, lineUserId: STATE.userId }
        : { articleData: articleData, filesData: filesData, lineUserId: STATE.userId };

      apiPost(action, payload)
        .then(function(res) {
          setSubmitLoading(false);
          if (res && res.success) {
            var msg = editId ? "✅ 文章已更新！" : "✅ 文章已儲存！";
            if (res.shared) msg += " 已分享到 LINE 群組";
            showToast(msg, "success");
            closeModal();
            loadArticles();
          } else {
            showToast("❌ " + (res ? res.error : "未知錯誤"), "error");
          }
        })
        .catch(function(err) {
          setSubmitLoading(false);
          dbg("submitArticle 失敗: " + err.message);
          showToast("儲存失敗：" + err.message, "error");
        });
    });
  }

  function setSubmitLoading(on) {
    var btn     = document.getElementById("submitBtn");
    btn.disabled    = on;
    btn.textContent = on ? "⏳ 儲存中…" : "💾 儲存並分享";
  }

  // ══════════════════════════════════════════════
  // 🗑️ 刪除文章
  // ══════════════════════════════════════════════
  function confirmDelete(id, title) {
    if (!confirm("確定要刪除「" + title + "」？\n附件也會一併刪除，無法復原。")) return;
    dbg("deleteArticle | id=" + id);
    apiPost("deleteArticle", { id: id, lineUserId: STATE.userId })
      .then(function(res) {
        if (res && res.success) {
          showToast("✅ 已刪除", "success");
          loadArticles();
        } else {
          showToast("刪除失敗：" + (res ? res.error : ""), "error");
        }
      })
      .catch(function(err) {
        showToast("刪除失敗：" + err.message, "error");
      });
  }

  // ══════════════════════════════════════════════
  // 📎 刪除現有附件
  // ══════════════════════════════════════════════
  function removeExistingAtt(articleId, fileId) {
    if (!confirm("確定要刪除此附件？")) return;
    dbg("deleteAttachment | articleId=" + articleId + " | fileId=" + fileId);
    apiPost("deleteAttachment", {
      articleId  : articleId,
      fileId     : fileId,
      lineUserId : STATE.userId
    })
      .then(function(res) {
        if (res && res.success) {
          var el = document.getElementById("att-" + fileId);
          if (el) el.remove();
          showToast("✅ 附件已刪除", "success");
          loadArticles();
        } else {
          showToast("刪除失敗：" + (res ? res.error : ""), "error");
        }
      })
      .catch(function(err) {
        showToast("刪除失敗：" + err.message, "error");
      });
  }

  // ══════════════════════════════════════════════
  // 📁 檔案處理
  // ══════════════════════════════════════════════
  function addFiles(fileList) {
    for (var i = 0; i < fileList.length; i++) {
      if (fileList[i].size > 10 * 1024 * 1024) {
        showToast(fileList[i].name + " 超過 10MB 上限", "error");
        continue;
      }
      STATE.pendingFiles.push(fileList[i]);
    }
    renderFilePreview();
    document.getElementById("fileInput").value = "";
  }

  function removeFile(i) {
    STATE.pendingFiles.splice(i, 1);
    renderFilePreview();
  }

  function renderFilePreview() {
    document.getElementById("filePreview").innerHTML =
      STATE.pendingFiles.map(function(f, i) {
        return '<div class="file-chip">' +
          fileIcon(f.type) + ' ' + esc(f.name) +
          '<span class="remove-file" onclick="removeFile(' + i + ')">✕</span>' +
          '</div>';
      }).join("");
  }

  function dragOver(e)  { e.preventDefault(); document.getElementById("uploadArea").classList.add("dragover"); }
  function dragLeave()  { document.getElementById("uploadArea").classList.remove("dragover"); }
  function dropFiles(e) { e.preventDefault(); dragLeave(); addFiles(e.dataTransfer.files); }

  function readAllFiles(files, callback) {
    if (!files || !files.length) { callback([]); return; }
    var result = [], pending = files.length;
    files.forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        result.push({
          name    : file.name,
          mimeType: file.type || "application/octet-stream",
          data    : e.target.result.split(",")[1],
          size    : file.size
        });
        if (--pending === 0) callback(result);
      };
      reader.onerror = function() {
        dbg("FileReader 失敗：" + file.name);
        if (--pending === 0) callback(result);
      };
      reader.readAsDataURL(file);
    });
  }

  // ══════════════════════════════════════════════
  // 🛠️ 工具函式
  // ══════════════════════════════════════════════
  function esc(s) {
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function fmtSize(b) {
    if (!b)          return "";
    if (b < 1024)    return b + "B";
    if (b < 1048576) return (b / 1024).toFixed(1) + "KB";
    return (b / 1048576).toFixed(1) + "MB";
  }

  function fileIcon(m) {
    if (!m)                                        return "📄";
    if (m.indexOf("image")       > -1)             return "🖼️";
    if (m.indexOf("video")       > -1)             return "🎬";
    if (m.indexOf("audio")       > -1)             return "🎵";
    if (m.indexOf("pdf")         > -1)             return "📕";
    if (m.indexOf("word")        > -1)             return "📘";
    if (m.indexOf("excel")       > -1 ||
        m.indexOf("spreadsheet") > -1)             return "📗";
    if (m.indexOf("zip")         > -1 ||
        m.indexOf("rar")         > -1)             return "🗜️";
    return "📄";
  }

  function showToast(msg, type) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.className   = "toast show " + (type || "");
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove("show"); }, 3500);
  }

</script>
