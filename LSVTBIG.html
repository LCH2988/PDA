<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>📓 網頁筆記本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #4285f4; --success: #34a853; --danger: #ea4335;
      --warning: #fbbc04; --dark: #1a1a2e; --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; margin: 0; }

    /* Sidebar */
    .sidebar { width: 260px; background: var(--dark); color: #fff; height: 100vh;
               position: fixed; left: 0; top: 0; overflow-y: auto; transition: transform .3s; z-index: 100; }
    .sidebar.collapsed { transform: translateX(-260px); }
    .main-content { margin-left: 260px; min-height: 100vh; transition: margin .3s; }
    .main-content.expanded { margin-left: 0; }

    /* Cards */
    .note-card { background: #fff; border-radius: 12px; padding: 16px;
                 box-shadow: 0 2px 8px rgba(0,0,0,.08); cursor: pointer;
                 transition: all .2s; border-left: 4px solid var(--primary); }
    .note-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
    .file-card { background: #fff; border-radius: 10px; overflow: hidden;
                 box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: all .2s; }
    .file-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5);
                     z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 16px; width: 90%; max-width: 720px;
                 max-height: 90vh; overflow-y: auto; padding: 28px; }

    /* Upload Zone */
    .upload-zone { border: 2px dashed #cbd5e0; border-radius: 12px; padding: 40px;
                   text-align: center; cursor: pointer; transition: all .2s; }
    .upload-zone.dragover { border-color: var(--primary); background: #ebf4ff; }
    .upload-zone:hover { border-color: var(--primary); }

    /* Progress */
    .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width .3s; }

    /* Preview */
    .preview-img { width: 100%; height: 160px; object-fit: cover; }
    .file-icon-wrap { width: 100%; height: 160px; display: flex; align-items: center;
                      justify-content: center; background: #f7fafc; font-size: 48px; }

    /* Tags */
    .tag { display: inline-block; padding: 2px 10px; border-radius: 20px;
           font-size: 12px; background: #ebf4ff; color: var(--primary); margin: 2px; }

    /* Folder item */
    .folder-item { padding: 10px 16px; border-radius: 8px; cursor: pointer;
                   display: flex; align-items: center; gap: 10px; transition: background .2s; }
    .folder-item:hover, .folder-item.active { background: rgba(255,255,255,.15); }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999;
             background: #1a1a2e; color: #fff; padding: 12px 20px; border-radius: 10px;
             box-shadow: 0 4px 16px rgba(0,0,0,.2); animation: slideUp .3s; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-260px); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
    }

    .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
           font-size: 14px; font-weight: 500; transition: all .2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: #3367d6; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger  { background: var(--danger);  color: #fff; }
    .btn-outline { background: transparent; border: 1.5px solid #cbd5e0; color: #4a5568; }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

    input, textarea, select {
      width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: 14px; outline: none; transition: border .2s;
    }
    input:focus, textarea:focus { border-color: var(--primary); }
    label { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 4px; display: block; }

    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  </style>
</head>
<body>

    <!-- Stats Bar -->

<script>
// ============================================================
// 設定
// ============================================================
const API_URL = 'https://script.google.com/macros/s/AKfycbwIZOEnlPbu06NFWOk9hNKadtItXgTQCgIDJ78fZgQrP8ngqhLOllmmP1QBmnb1XD4kXQ/exec'; // 替換為 GAS 部署 URL
let currentView = 'all';
let currentFolderId = '';
let currentNoteId = '';
let layout = 'grid';
let selectedColor = '#4285f4';
let pendingFiles = { noteFiles: [], batchFiles: [] };
let allFolders = [];
let allNotes = [];
let allFiles = [];


// ============================================================
// ★ JSONP API 模組 — 解決 GAS CORS 問題
//   取代原本的 fetch，所有請求改走 GET + JSONP
// ============================================================

/**
 * JSONP 呼叫 GAS
 * @param {string} action  - GAS action 名稱
 * @param {object} params  - 參數物件（會序列化為 payload）
 * @returns {Promise<object>}
 */
function api(action, params = {}) {
  return new Promise((resolve, reject) => {
    // 產生唯一 callback 名稱
    const cbName = '_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);

    // 設定 timeout（15 秒）
    const timer = setTimeout(() => {
      cleanup();
      reject(new Error('API 請求逾時'));
    }, 15000);

    // 清理函式
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      const el = document.getElementById(cbName);
      if (el) el.remove();
    }

    // 掛載 callback
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };

    // 組合 URL
    const payload    = encodeURIComponent(JSON.stringify(params));
    const url        = `${API_URL}?action=${action}&payload=${payload}&callback=${cbName}`;

    // 動態插入 <script>
    const script     = document.createElement('script');
    script.id        = cbName;
    script.src       = url;
    script.onerror   = () => {
      cleanup();
      // 降級：回傳 demo 資料
      resolve(demoData(action, params));
    };
    document.head.appendChild(script);
  });
}

// ============================================================
// Demo 資料（API 不通時展示用）
// ============================================================
function demoData(action, params) {
  const now = new Date().toISOString();
  switch(action) {
    case 'getFolders':
      return { success: true, data: [
        { id:'f1', name:'📁 我的筆記', color:'#4285f4', noteCount:'3', fileCount:'2' },
        { id:'f2', name:'🖼️ 相簿',    color:'#ea4335', noteCount:'1', fileCount:'8' },
        { id:'f3', name:'💼 工作',     color:'#34a853', noteCount:'5', fileCount:'3' }
      ]};
    case 'getNotes':
      return { success: true, data: [
        { id:'n1', title:'歡迎使用網頁筆記本',
          content:'這是功能完整的筆記本系統，支援附件上傳、資料夾管理、批量操作。',
          folderId:'f1', tags:'歡迎,教學', updatedAt: now, fileIds:[] },
        { id:'n2', title:'相簿使用說明',
          content:'上傳圖片到相簿資料夾，可直接預覽縮圖，點擊可放大檢視。',
          folderId:'f2', tags:'相簿,圖片', updatedAt: now, fileIds:[] },
        { id:'n3', title:'批量上傳功能',
          content:'點擊右上角「批量上傳」，可一次上傳多個檔案到指定資料夾。',
          folderId:'f1', tags:'功能,上傳', updatedAt: now, fileIds:[] }
      ]};
    case 'getNote':
      return { success: true, data: {
        id: params.id, title:'Demo 筆記', content:'這是 Demo 模式的筆記內容。',
        folderId:'f1', tags:'demo', updatedAt: now, fileIds:[], files:[]
      }};
    case 'getFiles':
      return { success: true, data: [], total: 0 };
    case 'createNote':
    case 'updateNote':
      return { success: true, data: { id: 'n_' + Date.now(), createdAt: now } };
    case 'deleteNote':
    case 'deleteFile':
    case 'deleteFolder':
      return { success: true };
    case 'createFolder':
      return { success: true, data: { id: 'f_' + Date.now() } };
    case 'uploadFile':
      return { success: true, data: {
        id: 'file_' + Date.now(), driveId: 'demo',
        name: params.name, mimeType: params.mimeType, size: params.size,
        thumbnail: '', viewUrl: '#', downloadUrl: '#'
      }};
    default:
      return { success: false, error: 'Unknown action: ' + action };
  }
}

// ============================================================
// 初始化
// ============================================================
async function init() {
  await loadFolders();
  await loadNotes();
  await loadFiles();
  updateStats();
}

async function loadFolders() {
  const res = await api('getFolders');
  if (res.success) {
    allFolders = res.data;
    renderFolderList();
    updateFolderSelects();
  }
}

async function loadNotes(folderId = '', search = '') {
  const res = await api('getNotes', { folderId, search });
  if (res.success) {

function switchView(view, folderId = '') {
  currentView = view;
  currentFolderId = folderId;
  document.querySelectorAll('.folder-item').forEach(el => el.classList.remove('active'));

  const notesContainer = document.getElementById('notesContainer');
  const filesContainer = document.getElementById('filesContainer');
  const viewTitle = document.getElementById('viewTitle');

  if (view === 'all') {
    document.getElementById('nav-all').classList.add('active');
    viewTitle.textContent = '📝 全部筆記';
    notesContainer.style.display = '';
    filesContainer.style.display = 'none';
    loadNotes();
  } else if (view === 'album') {
    document.getElementById('nav-album').classList.add('active');
    viewTitle.textContent = '🖼️ 相簿';
    notesContainer.style.display = 'none';
    filesContainer.style.display = '';
    // 篩選圖片
    const imgs = allFiles.filter(f => f.mimeType && f.mimeType.startsWith('image/'));
    renderFiles(imgs);
  } else if (view === 'files') {
    document.getElementById('nav-files').classList.add('active');
    viewTitle.textContent = '📎 所有檔案';
    notesContainer.style.display = 'none';
    filesContainer.style.display = '';
    renderFiles(allFiles);
  } else if (view === 'folder') {
    const folder = allFolders.find(f => f.id === folderId);
    const navEl = document.getElementById(`nav-folder-${folderId}`);
    if (navEl) navEl.classList.add('active');
    viewTitle.textContent = folder ? folder.name : '資料夾';
    notesContainer.style.display = '';
    filesContainer.style.display = 'none';
    loadNotes(folderId);
  }
}

async function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  if (!title) { showToast('請輸入標題', 'error'); return; }

  const btn = document.getElementById('saveNoteBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 儲存中...';

  try {
    // 先上傳附件
    let fileIds = [];
    if (pendingFiles.noteFiles.length > 0) {
      showToast('上傳附件中...', 'info');
      const uploadRes = await uploadFilesBase64(pendingFiles.noteFiles, currentFolderId);
      fileIds = uploadRes.map(r => r.data?.id).filter(Boolean);
    }

    const params = {
      title,
      content: document.getElementById('noteContent').value,
      folderId: document.getElementById('noteFolderId').value,
      tags: document.getElementById('noteTags').value
        .split(',').map(t => t.trim()).filter(Boolean),
      fileIds
    };

    const res = currentNoteId
      ? await api('updateNote', { id: currentNoteId, ...params })
      : await api('createNote', params);

    if (res.success) {
      showToast(currentNoteId ? '筆記已更新' : '筆記已建立', 'success');
      closeModal('noteModal');
      await loadNotes(currentFolderId);
      updateStats();
    } else {
      showToast(res.error || '儲存失敗', 'error');
    }
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-save"></i> 儲存筆記';
  }
}

function addPendingFiles(files, key) {
  pendingFiles[key] = [...(pendingFiles[key] || []), ...files];

function removePendingFile(key, index) {
  pendingFiles[key].splice(index, 1);

}

// 讀取 File 為 Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// 上傳多個檔案（回傳結果陣列）
async function uploadFilesBase64(files, folderId = '', noteId = '') {
  const results = [];
  for (const file of files) {
    try {
      const data = await fileToBase64(file);
      const res  = await api('uploadFile', {
        name: file.name, mimeType: file.type,
        size: file.size, data, folderId, noteId
      });
      results.push(res);
    } catch (e) {
      results.push({ success: false, error: e.message });
    }
  }
  return results;
}

// ============================================================
// 批量上傳
// ============================================================
function showBatchUploadModal() {
  pendingFiles.batchFiles = [];
  document.getElementById('batchFilesPreview').innerHTML = '';
  document.getElementById('batchProgress').style.display = 'none';
  document.getElementById('batchModal').style.display = 'flex';
}

async function startBatchUpload() {
  const files = pendingFiles.batchFiles;
  if (!files.length) { showToast('請先選擇檔案', 'error'); return; }

  const folderId = document.getElementById('batchFolderId').value;
  const btn = document.getElementById('batchUploadBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> 上傳中...';

  document.getElementById('batchProgress').style.display = 'block';
  let done = 0;

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const statusEl = document.getElementById(`file-status-${i}`);
    if (statusEl) statusEl.innerHTML = `<span style="color:#fbbc04;font-size:11px">上傳中</span>`;

    try {
      const data = await fileToBase64(file);
      const res  = await api('uploadFile', {
        name: file.name, mimeType: file.type,
        size: file.size, data, folderId
      });
      if (statusEl) {
        statusEl.innerHTML = res.success
          ? `<span style="color:#34a853;font-size:11px">✓ 完成</span>`
          : `<span style="color:#ea4335;font-size:11px">✗ 失敗</span>`;
      }
      if (res.success) done++;
    } catch(e) {
      if (statusEl) statusEl.innerHTML = `<span style="color:#ea4335;font-size:11px">✗ 錯誤</span>`;
    }

    const pct = Math.round(((i + 1) / files.length) * 100);
    document.getElementById('batchProgressFill').style.width = pct + '%';
    document.getElementById('batchProgressPct').textContent  = pct + '%';
    document.getElementById('batchProgressText').textContent =
      `已上傳 ${i + 1} / ${files.length}`;
  }

  showToast(`批量上傳完成：${done} 成功，${files.length - done} 失敗`, done === files.length ? 'success' : 'warning');
  btn.disabled = false;
  btn.innerHTML = '<i class="fa fa-upload"></i> 開始上傳';
  pendingFiles.batchFiles = [];
  await loadFiles(folderId);
  updateStats();
}

// ============================================================
// 批量下載（ZIP）
// ============================================================
async function batchDownload(fileIds) {
  showToast('準備下載連結...', 'info');
  for (const id of fileIds) {
    const file = allFiles.find(f => f.id === id);
    if (file) {
      const a = document.createElement('a');
      a.href = file.downloadUrl;
      a.target = '_blank';
      a.download = file.name;
      a.click();
      await new Promise(r => setTimeout(r, 400)); // 避免瀏覽器封鎖
    }
  }
}

async function deleteFile(id) {
  if (!confirm('確定要刪除此檔案？')) return;
  const res = await api('deleteFile', { id });
  if (res.success) {
    showToast('檔案已刪除', 'success');
    allFiles = allFiles.filter(f => f.id !== id);
    switchView(currentView, currentFolderId);
    updateStats();
  }
}

function handleSearch() {

// ============================================================

function updateStats() {

function setLayout(mode) {
  layout = mode;
  const nc = document.getElementById('notesContainer');
  nc.className = mode === 'grid' ? 'grid-3' : '';
  if (mode === 'list') {
    nc.style.display = 'flex';
    nc.style.flexDirection = 'column';

  } else {
    nc.style.display = '';
    nc.style.flexDirection = '';

// ============================================================
function closeModal(id) {

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const mc = document.getElementById('mainContent');

    sb.classList.toggle('open');
  } else {
    sb.classList.toggle('collapsed');
    mc.classList.toggle('expanded');
  }

// ============================================================
// Toast 通知
// ============================================================
function showToast(msg, type = 'info') {
  const colors = { success: '#34a853', error: '#ea4335', warning: '#fbbc04', info: '#4285f4' };
  const icons  = { success: '✓', error: '✗', warning: '⚠', info: 'ℹ' };
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderLeft = `4px solid ${colors[type]}`;
  el.innerHTML = `<span style="color:${colors[type]};margin-right:8px">${icons[type]}</span>${msg}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ============================================================
// 工具函式
// ============================================================
function getFileIcon(mimeType) {
  if (!mimeType) return '📄';
  if (mimeType.startsWith('image/'))       return '🖼️';
  if (mimeType.startsWith('video/'))       return '🎬';
  if (mimeType.startsWith('audio/'))       return '🎵';
  if (mimeType.includes('pdf'))            return '📕';
  if (mimeType.includes('word') || mimeType.includes('document')) return '📝';
  if (mimeType.includes('excel') || mimeType.includes('sheet'))   return '📊';
  if (mimeType.includes('powerpoint') || mimeType.includes('presentation')) return '📋';
  if (mimeType.includes('zip') || mimeType.includes('rar') || mimeType.includes('compressed')) return '🗜️';
  if (mimeType.includes('text'))           return '📃';
  return '📄';
}

function formatSize(bytes) {
  if (!bytes || bytes === '0') return '0 B';
  const b = parseInt(bytes);
  if (b < 1024)       return b + ' B';
  if (b < 1048576)    return (b / 1024).toFixed(1) + ' KB';
  if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
  return (b / 1073741824).toFixed(2) + ' GB';
}
