<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary:   #4CAF50;
      --secondary: #6c757d;
      --danger:    #dc3545;
      --bg:        #f4f4f9;
      --text:      #333;
      --fs-base:   20px;
      --fs-lg:     24px;
      --fs-xl:     28px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      font-size: var(--fs-base);
      line-height: 1.6;
    }

    h1, h2 { color: var(--primary); text-align: center; }

    .container { max-width: 600px; margin: 0 auto; }

    /* ── 按鈕 ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: var(--fs-lg);
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .btn-secondary { background: var(--secondary); }
    .btn-danger    { background: var(--danger); }
    .btn:hover     { opacity: .88; }
    .btn:disabled  { opacity: .5; cursor: not-allowed; }

    /* ── 表單 ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: var(--fs-lg);
    }
    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: var(--fs-base);
    }
    textarea { height: 200px; resize: vertical; }

    /* ── 記事卡片 ── */
    .note-card {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      border-left: 8px solid var(--primary);
      cursor: pointer;
    }
    .note-title   { font-size: var(--fs-xl); font-weight: bold; margin-bottom: 10px; color: #222; }
    .note-meta    { font-size: 16px; color: #777; margin-bottom: 10px; }
    .note-content { white-space: pre-wrap; margin-bottom: 15px; font-size: var(--fs-base); }

    /* ── 附件 ── */
    .attachment-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .attachment-img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #ddd;
      cursor: pointer;
    }
    .attachment-link {
      font-size: 16px;
      padding: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      text-decoration: none;
      color: #333;
    }

    /* ── 搜尋 ── */
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; }
    .search-box .btn  { width: auto; margin: 0; padding: 10px 20px; font-size: var(--fs-base); }

    /* ── 按鈕群組 ── */
    .button-group { margin-top: 15px; display: flex; gap: 10px; }
    .button-group .btn { flex: 1; margin: 0; padding: 10px; font-size: 16px; }

    /* ── 閱覽者 ── */
    .viewers-list {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 16px;
      word-break: break-all;
    }

    /* ── Toast 通知 ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── 全域載入 Overlay ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8888;
      font-size: var(--fs-lg);
    }
    #loadingOverlay.hidden { display: none !important; }

    /* ── 初始載入（首次進入） ── */
    #initLoading {
      text-align: center;
      font-size: var(--fs-lg);
      margin-top: 50px;
    }

    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 5px solid #ccc;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 自訂 Modal（取代 confirm） ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }
    #modal-overlay.hidden { display: none !important; }
    #modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 30px 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    #modal-msg { font-size: var(--fs-lg); margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btns .btn { margin: 0; flex: 1; padding: 12px; font-size: var(--fs-base); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- 首次進入載入畫面 -->
  <div id="initLoading">
    <div class="spinner"></div>
    <p>載入中，請稍候...</p>
  </div>

  <!-- 主畫面（記事列表） -->
  <div id="app" class="hidden">
    <h1>📒 網路記事本</h1>

    <div class="search-box">
      <!-- [修正 #6] 加入 Enter 鍵觸發搜尋 -->
      <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋..."
             onkeydown="if(event.key==='Enter') searchNotes()">
      <button class="btn" onclick="searchNotes()">搜尋</button>
    </div>

    <div style="display:flex; gap:10px;">
      <button class="btn" style="flex:1; margin:0 0 15px 0;" onclick="showAddForm()">＋ 新增記事</button>
      <!-- [修正 #11] 新增重新整理按鈕 -->
      <button class="btn btn-secondary" style="width:auto; margin:0 0 15px 0; padding:10px 18px; font-size:var(--fs-base);"
              onclick="loadNotes()" title="重新整理">🔄</button>
    </div>

    <div id="noteList"></div>
  </div>

  <!-- 新增 / 編輯表單 -->
  <div id="noteForm" class="hidden">
    <h2 id="formTitle">新增記事</h2>
    <div class="form-group">
      <label for="title">標題</label>
      <input type="text" id="title" placeholder="請輸入標題">
    </div>
    <div class="form-group">
      <label for="content">內容</label>
      <textarea id="content" placeholder="請輸入內容"></textarea>
    </div>
    <div class="form-group">
      <label for="attachments">附件（可多選）</label>
      <input type="file" id="attachments" multiple onchange="previewFiles()">
      <div id="previewContainer" class="attachment-preview"></div>
    </div>
    <button class="btn" id="saveBtn" onclick="saveNote()">儲存</button>
    <button class="btn btn-secondary" id="cancelBtn" onclick="showList()">取消</button>
  </div>

</div>

<!-- 全域載入 Overlay（[修正 #1][#10] 不干涉頁面切換，覆蓋在上層） -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner"></div>
  <p>處理中，請稍候...</p>
</div>

<!-- 自訂刪除確認 Modal（[修正 #9]） -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-msg">確定要刪除這筆記事嗎？</div>
    <div class="modal-btns">
      <button class="btn btn-danger"    id="modal-confirm">確定刪除</button>
      <button class="btn btn-secondary" id="modal-cancel" >取消</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // =============================================
  // 設定區
  // =============================================
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxNeyzcBzf3Vqf-kg1CdIp1D4iHPUX11gXry4PY_YmEZJ7L0Og0hLc3WNhbpmGH1lt8fQ/exec';
  const LIFF_ID = '2009456572-AUDE1qmM';

  // =============================================
  // 全域狀態
  // =============================================
  let currentUser   = { userID: '', userName: '' };
  let currentNotes  = [];
  let editingNoteID = null;

  // 目前顯示的頁面：'list' | 'form'
  // [修正 #1][#7][#12] 用狀態變數管理頁面，showLoading 不再強制切換頁面
  let currentPage = 'list';

  // =============================================
  // 頁面切換（統一管理，避免 showLoading 干涉）
  // =============================================
  function showPage(page) {
    currentPage = page;
    document.getElementById('app').classList.toggle('hidden', page !== 'list');
    document.getElementById('noteForm').classList.toggle('hidden', page !== 'form');
  }

  // =============================================
  // 初始化
  // =============================================
  async function initLiff() {
    // [修正 #8] 區分 LIFF 初始化失敗 與 getProfile 失敗
    try {
      await liff.init({ liffId: LIFF_ID });
    } catch (err) {
      console.warn('LIFF 初始化失敗，使用測試模式', err);
      currentUser = { userID: 'test_user', userName: '測試使用者' };
      document.getElementById('initLoading').classList.add('hidden');
      showPage('list');
      loadNotes();
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    try {
      const profile = await liff.getProfile();
      currentUser.userID   = profile.userId;
      currentUser.userName = profile.displayName;
    } catch (err) {
      // getProfile 失敗：顯示錯誤，不 fallback 測試帳號（避免誤用真實環境）
      console.error('取得使用者資料失敗', err);
      showToast('無法取得使用者資料，請重新開啟');
      document.getElementById('initLoading').classList.add('hidden');
      return;
    }

    document.getElementById('initLoading').classList.add('hidden');
    showPage('list');
    loadNotes();
  }

  // =============================================
  // API 呼叫
  // =============================================
  async function callGasApi(action, data) {
    try {
      const params = new URLSearchParams({
        action: action,
        data: JSON.stringify(data)
      });
      const url = GAS_WEB_APP_URL + '?' + params.toString();
      const response = await fetch(url, { method: 'GET', redirect: 'follow' });
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return await response.json();
    } catch (error) {
      console.error('API 呼叫失敗:', error);
      return { success: false, message: error.message };
    }
  }

  // =============================================
  // 記事清單
  // =============================================
  async function loadNotes(keyword) {
    showOverlay(true);
    const result = await callGasApi('getNotes', { keyword: keyword || '' });
    showOverlay(false);

    if (result.success) {
      currentNotes = result.data;
      renderNotes(result.data);
    } else {
      showToast('載入失敗：' + result.message);
    }
  }

  function renderNotes(notes) {
    const listDiv = document.getElementById('noteList');
    listDiv.innerHTML = '';

    if (!notes || notes.length === 0) {
      listDiv.innerHTML = '<p style="text-align:center;color:#999;">目前沒有記事</p>';
      return;
    }

    notes.forEach(function(note) {
      if (note.Status === 'deleted') return;

      const card = document.createElement('div');
      card.className = 'note-card';
      // [修正 #5] 改用 data-* 屬性，不在 HTML 字串內拼接 noteID
      card.dataset.noteId = note.NoteID;

      // ── 附件 HTML（[修正 #4][#7]）──
      let attachments = [];
      try { attachments = JSON.parse(note.Attachments || '[]'); } catch(e) {}

      let attachHtml = '';
      attachments.forEach(function(item) {
        const url      = (typeof item === 'object') ? (item.url      || '') : String(item);
        const mimeType = (typeof item === 'object') ? (item.mimeType || '') : '';
        const name     = (typeof item === 'object') ? (item.name     || '附件') : '附件';
        const safeUrl  = escHtml(url);
        const safeName = escHtml(name);

        if (mimeType.startsWith('image/')) {
          // [修正 #7] 將 Drive view URL 轉為 thumbnail URL 才能嵌入 <img>
          const thumbUrl = driveViewToThumb(url);
          const safeThumb = escHtml(thumbUrl);
          attachHtml += '<img src="' + safeThumb + '" class="attachment-img"'
            + ' alt="' + safeName + '"'
            + ' data-open-url="' + safeUrl + '">';
        } else {
          attachHtml += '<a href="' + safeUrl + '" target="_blank"'
            + ' rel="noopener noreferrer"'
            + ' class="attachment-link"'
            + ' onclick="event.stopPropagation()">📎 ' + safeName + '</a>';
        }
      });

      // ── 閱覽者 ──
      let viewers = [];
      try { viewers = JSON.parse(note.Viewers || '[]'); } catch(e) {}
      const viewersHtml = viewers.length > 0
        ? '<div class="viewers-list"><strong>閱覽者：</strong>' + escHtml(viewers.join(', ')) + '</div>'
        : '';

      // ── 本人才顯示編輯/刪除（[修正 #5] 按鈕不拼 noteID，改用 data-*）──
      const isOwner = note.CreatedByUserID === currentUser.userID;
      const actionHtml = isOwner
        ? '<div class="button-group">'
          + '<button class="btn btn-secondary edit-btn">✏️ 編輯</button>'
          + '<button class="btn btn-danger delete-btn">🗑️ 刪除</button>'
          + '</div>'
        : '';

      card.innerHTML =
        '<div class="note-title">' + escHtml(note.Title) + '</div>'
        + '<div class="note-meta">'
        +   '發言者：' + escHtml(note.CreatedByUserName)
        +   ' ｜ 時間：' + fmtDate(note.CreatedAt)
        +   ' ｜ 閱覽：<span class="view-count">' + (note.ViewCount || 0) + '</span> 次'
        + '</div>'
        + '<div class="note-content">' + escHtml(note.Content) + '</div>'
        + '<div class="attachment-preview">' + attachHtml + '</div>'
        + viewersHtml
        + actionHtml;

      // ── 事件綁定（[修正 #5] 全部用 addEventListener）──
      // 卡片點擊 → 記錄閱覽
      card.addEventListener('click', function() {
        recordView(note.NoteID, card);
      });

      // 附件圖片點擊 → 開新分頁
      card.querySelectorAll('.attachment-img').forEach(function(img) {
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          const openUrl = img.dataset.openUrl;
          if (openUrl) window.open(openUrl, '_blank');
        });
      });

      // 編輯按鈕
      const editBtn = card.querySelector('.edit-btn');
      if (editBtn) {
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          editNote(note.NoteID);
        });
      }

      // 刪除按鈕
      const deleteBtn = card.querySelector('.delete-btn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          confirmDelete(note.NoteID);
        });
      }

      listDiv.appendChild(card);
    });
  }

  function searchNotes() {
    const kw = document.getElementById('searchInput').value.trim();
    loadNotes(kw);
  }

  // =============================================
  // 新增 / 編輯表單
  // =============================================
  function showAddForm() {
    editingNoteID = null;
    document.getElementById('formTitle').innerText = '新增記事';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML = '';
    showPage('form');
  }

  function editNote(noteID) {
    const note = currentNotes.find(function(n) { return n.NoteID === noteID; });
    if (!note) return;
    editingNoteID = noteID;
    document.getElementById('formTitle').innerText = '編輯記事';
    document.getElementById('title').value   = note.Title;
    document.getElementById('content').value = note.Content;
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML =
      '<p style="font-size:16px;color:#666;">（新上傳的附件將追加至現有附件）</p>';
    showPage('form');
  }

  function showList() {
    showPage('list');
  }

  // =============================================
  // 附件預覽
  // =============================================
  function previewFiles() {
    const preview = document.getElementById('previewContainer');
    preview.innerHTML = '';
    const files = document.getElementById('attachments').files;
    // [確認 #9] 使用 let 宣告 i，閉包安全
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'attachment-img';
          img.alt = file.name;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      } else {
        const span = document.createElement('span');
        span.className = 'attachment-link';
        span.innerText = '📎 ' + file.name;
        preview.appendChild(span);
      }
    }
  }

  // =============================================
  // 儲存記事（[修正 #2][#10] 改用 overlay，不隱藏表單）
  // =============================================
  async function saveNote() {
    const title   = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!title || !content) {
      showToast('請填寫標題與內容');
      return;
    }

    const saveBtn   = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    saveBtn.disabled   = true;
    cancelBtn.disabled = true;
    saveBtn.innerText  = '儲存中...';
    showOverlay(true);  // [修正 #10] 用 overlay 覆蓋，不隱藏表單

    // 附件轉 Base64
    const files = document.getElementById('attachments').files;
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      const b64 = await toBase64(files[i]);
      attachments.push({
        fileName: files[i].name,
        mimeType: files[i].type,
        base64:   b64.split(',')[1]
      });
    }

    const noteData = {
      title:       title,
      content:     content,
      attachments: attachments,
      userID:      currentUser.userID,
      userName:    currentUser.userName
    };

    let result;
    if (editingNoteID) {
      result = await callGasApi('updateNote', {
        noteID:   editingNoteID,
        noteData: noteData,
        userID:   currentUser.userID
      });
    } else {
      result = await callGasApi('addNote', noteData);
    }

    showOverlay(false);
    saveBtn.disabled   = false;
    cancelBtn.disabled = false;
    saveBtn.innerText  = '儲存';

    if (result.success) {
      showToast(editingNoteID ? '記事已更新 ✅' : '記事已新增 ✅');
      showList();
      loadNotes();
    } else {
      // [修正 #2] 失敗時保持在表單頁，不閃爍
      showToast('儲存失敗：' + result.message);
    }
  }

  // =============================================
  // 刪除記事（[修正 #9] 自訂 Modal）
  // =============================================
  function confirmDelete(noteID) {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('hidden');

    // 確定刪除
    document.getElementById('modal-confirm').onclick = function() {
      overlay.classList.add('hidden');
      doDeleteNote(noteID);
    };
    // 取消
    document.getElementById('modal-cancel').onclick = function() {
      overlay.classList.add('hidden');
    };
  }

  async function doDeleteNote(noteID) {
    showOverlay(true);
    const result = await callGasApi('deleteNote', {
      noteID: noteID,
      userID: currentUser.userID
    });
    showOverlay(false);

    if (result.success) {
      showToast('記事已刪除 🗑️');
      loadNotes();
    } else {
      showToast('刪除失敗：' + result.message);
    }
  }

  // =============================================
  // 閱覽紀錄（[修正 #3] 即時更新卡片上的閱覽數）
  // =============================================
  async function recordView(noteID, cardEl) {
    const result = await callGasApi('recordView', {
      noteID: noteID,
      userID: currentUser.userID
    });
    if (result.success && cardEl) {
      // 即時更新卡片上的閱覽數，不需重新載入整頁
      const countEl = cardEl.querySelector('.view-count');
      if (countEl) countEl.innerText = result.viewCount;
      // 同步更新 currentNotes 快取
      const note = currentNotes.find(function(n) { return n.NoteID === noteID; });
      if (note) note.ViewCount = result.viewCount;
    }
  }

  // =============================================
  // 輔助函數
  // =============================================

  /**
   * [修正 #7] 將 Google Drive view URL 轉為可嵌入的 thumbnail URL
   * 輸入：https://drive.google.com/file/d/FILE_ID/view?usp=...
   * 輸出：https://drive.google.com/thumbnail?id=FILE_ID&sz=w200
   */
  function driveViewToThumb(url) {
    if (!url) return '';
    const match = url.match(/\/file\/d\/([^/]+)\//);
    if (match && match[1]) {
      return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w200';
    }
    return url; // 非 Drive URL 原樣回傳
  }

  const toBase64 = function(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload  = function() { resolve(reader.result); };
      reader.onerror = function(e) { reject(e); };
    });
  };

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    return isNaN(d) ? String(val) : d.toLocaleString('zh-TW');
  }

  /**
   * [修正 #1][#7][#12] 全域 overlay loading，完全不干涉頁面切換狀態
   */
  function showOverlay(show) {
    document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
  }

  // =============================================
  // 啟動
  // =============================================
  window.onload = initLiff;
</script>
</body>
</html>
