<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LSVTBIG 論壇 - 年長者友善社群平台</title>
  <meta name="description" content="專為年長者設計的友善論壇系統，提供大字體、語音朗讀、簡潔介面等無障礙功能">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary:#3b82f6; --primary-dark:#2563eb; --primary-light:#93c5fd;
      --secondary:#6b7280; --success:#10b981; --warning:#f59e0b;
      --error:#ef4444; --info:#06b6d4;a<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>📝 筆記本系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    :root {
      --primary:#06C755;--primary-dark:#05a847;--secondary:#4285F4;
      --danger:#EA4335;--warning:#FBBC04;--bg:#F8F9FA;
      --card-bg:#FFFFFF;--text:#212529;--text-muted:#6C757D;
      --border:#DEE2E6;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:12px;
    }
    [data-theme="dark"]{--bg:#1A1A2E;--card-bg:#16213E;--text:#E0E0E0;--text-muted:#9E9E9E;--border:#2D3748;--shadow:0 2px 12px rgba(0,0,0,0.3);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}
    #loading-screen{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;}
    #loading-screen .logo{font-size:64px;margin-bottom:16px;}
    #loading-screen h1{font-size:24px;font-weight:700;}
    .spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;margin-top:24px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #app{display:none;min-height:100vh;}
    .topnav{position:sticky;top:0;z-index:100;background:var(--card-bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
    .topnav .logo{font-size:24px;}
    .topnav h1{font-size:18px;font-weight:700;flex:1;}
    .topnav .actions{display:flex;gap:8px;align-items:center;}
    .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid var(--primary);}
    .icon-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:18px;padding:6px;border-radius:8px;transition:all .2s;}
    .icon-btn:hover{background:var(--bg);color:var(--text);}
    .bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card-bg);border-top:1px solid var(--border);display:flex;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;color:var(--text-muted);font-size:11px;gap:4px;transition:color .2s;border:none;background:none;}
    .nav-item i{font-size:20px;}
    .nav-item.active{color:var(--primary);}
    .nav-item.hidden{display:none!important;}
    .main-content{padding:16px;padding-bottom:80px;max-width:800px;margin:0 auto;}
    .page{display:none;}
    .page.active{display:block;}
    .search-bar{display:flex;gap:8px;margin-bottom:16px;}
    .search-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--card-bg);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
    .search-input:focus{border-color:var(--primary);}
    .tag-filter{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .tag-chip{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-muted);font-size:12px;cursor:pointer;transition:all .2s;}
    .tag-chip.active{background:var(--primary);color:white;border-color:var(--primary);}
    .notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
    .note-card{background:var(--card-bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border);position:relative;}
    .note-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.12);}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .note-card h3{font-size:15px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .visibility-badge{font-size:10px;padding:2px 8px;border-radius:10px;margin-left:8px;white-space:nowrap;}
    .badge-private{background:#FEE2E2;color:#DC2626;}
    .badge-shared{background:#DBEAFE;color:#2563EB;}
    .badge-team{background:#D1FAE5;color:#059669;}
    .badge-public{background:#F3F4F6;color:#6B7280;}
    .note-preview{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:10px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
    .note-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);}
    .note-tags{display:flex;gap:4px;flex-wrap:wrap;}
    .note-tag{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:11px;}
    .note-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s;}
    .note-card:hover .note-actions{opacity:1;}
    .note-action-btn{padding:4px 8px;border-radius:6px;border:none;cursor:pointer;font-size:12px;transition:background .2s;}
    .btn-edit{background:#DBEAFE;color:#2563EB;}
    .btn-delete{background:#FEE2E2;color:#DC2626;}
    .btn-share{background:#D1FAE5;color:#059669;}
    .fab{position:fixed;bottom:80px;right:20px;width:56px;height:56px;border-radius:50%;background:var(--primary);color:white;border:none;cursor:pointer;font-size:24px;box-shadow:0 4px 16px rgba(6,199,85,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s;z-index:50;}
    .fab:hover{transform:scale(1.1);}
    .fab.hidden{display:none!important;}
    .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .3s;}
    .modal-overlay.active{opacity:1;pointer-events:all;}
    .modal{background:var(--card-bg);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px;transform:translateY(100%);transition:transform .3s;}
    .modal-overlay.active .modal{transform:translateY(0);}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
    .modal-header h2{font-size:18px;font-weight:700;}
    .modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-muted);}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted);}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);}
    .form-textarea{resize:vertical;min-height:160px;line-height:1.6;}
    .editor-tabs{display:flex;border-bottom:1px solid var(--border);}
    .editor-tab{padding:8px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--text-muted);border-bottom:2px solid transparent;transition:all .2s;}
    .editor-tab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .editor-preview{min-height:160px;padding:12px;border:1px solid var(--border);border-radius:0 0 8px 8px;background:var(--card-bg);line-height:1.7;}
    .editor-preview h1,.editor-preview h2,.editor-preview h3{margin:12px 0 6px;}
    .editor-preview p{margin-bottom:8px;}
    .editor-preview code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:13px;}
    .editor-preview pre{background:var(--bg);padding:12px;border-radius:8px;overflow-x:auto;margin-bottom:8px;}
    .editor-preview ul,.editor-preview ol{padding-left:20px;margin-bottom:8px;}
    .editor-preview blockquote{border-left:3px solid var(--primary);padding-left:12px;color:var(--text-muted);}
    .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-primary{background:var(--primary);color:white;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);}
    .btn-danger{background:var(--danger);color:white;}
    .btn-full{width:100%;justify-content:center;}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .upload-area{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s;color:var(--text-muted);}
    .upload-area:hover{border-color:var(--primary);}
    .upload-area i{font-size:32px;margin-bottom:8px;}
    .upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .upload-thumb{width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
    .note-detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
    .note-detail-title{font-size:22px;font-weight:700;flex:1;line-height:1.3;}
    .note-detail-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;font-size:12px;color:var(--text-muted);}
    .note-detail-meta span{display:flex;align-items:center;gap:4px;}
    .note-detail-content{line-height:1.8;font-size:15px;}
    .note-detail-actions{display:flex;gap:8px;margin-top:20px;flex-wrap:wrap;}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
    .stat-card{background:var(--card-bg);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);text-align:center;}
    .stat-card .stat-value{font-size:28px;font-weight:700;color:var(--primary);}
    .stat-card .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
    .table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);}
    table{width:100%;border-collapse:collapse;background:var(--card-bg);}
    th{background:var(--bg);padding:10px 12px;font-size:12px;font-weight:600;text-align:left;color:var(--text-muted);}
    td{padding:10px 12px;font-size:13px;border-top:1px solid var(--border);}
    tr:hover td{background:var(--bg);}
    .role-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
    .role-super_admin{background:#FEF3C7;color:#D97706;}
    .role-admin{background:#EDE9FE;color:#7C3AED;}
    .role-editor{background:#DBEAFE;color:#2563EB;}
    .role-viewer{background:#D1FAE5;color:#059669;}
    .role-guest{background:#F3F4F6;color:#6B7280;}
    .log-result-success{color:var(--primary);}
    .log-result-denied{color:var(--danger);}
    .log-result-error{color:var(--warning);}
    #toast-container{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .toast{background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;white-space:nowrap;animation:toastIn .3s ease,toastOut .3s ease 2.7s forwards;}
    .toast.success{background:var(--primary);}
    .toast.error{background:var(--danger);}
    .toast.warning{background:var(--warning);color:#333;}
    @keyframes toastIn{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
    @keyframes toastOut{from{opacity:1;}to{opacity:0;}}
    .confirm-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .confirm-overlay.active{opacity:1;pointer-events:all;}
    .confirm-box{background:var(--card-bg);border-radius:var(--radius);padding:24px;max-width:320px;width:90%;text-align:center;}
    .confirm-box h3{font-size:16px;margin-bottom:8px;}
    .confirm-box p{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
    .confirm-actions{display:flex;gap:8px;justify-content:center;}
    .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
    .empty-state i{font-size:48px;margin-bottom:12px;opacity:.4;}
    .empty-state p{font-size:15px;}
    .profile-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;text-align:center;box-shadow:var(--shadow);margin-bottom:16px;}
    .profile-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--primary);margin-bottom:12px;}
    .profile-name{font-size:18px;font-weight:700;margin-bottom:4px;}
    .profile-role{font-size:13px;color:var(--text-muted);}
    .settings-list{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
    .settings-item{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;}
    .settings-item:last-child{border-bottom:none;}
    .settings-item:hover{background:var(--bg);}
    .settings-item i{width:24px;color:var(--text-muted);margin-right:12px;}
    .settings-item span{flex:1;font-size:14px;}
    .settings-item .chevron{color:var(--text-muted);font-size:12px;}
    .toggle{position:relative;display:inline-block;width:44px;height:24px;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:24px;cursor:pointer;transition:.3s;}
    .toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:.3s;}
    .toggle input:checked+.toggle-slider{background:var(--primary);}
    .toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
    @media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">📝</div>
  <h1>筆記本系統</h1>
  <p>正在載入中...</p>
  <div class="spinner"></div>
</div>

<div id="toast-container"></div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">確認操作</h3>
    <p id="confirm-message">確定要執行此操作嗎？</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirm-ok-btn">確認</button>
    </div>
  </div>
</div>

<div id="app">
  <nav class="topnav">
    <span class="logo">📝</span>
    <h1 id="page-title">我的筆記</h1>
    <div class="actions">
      <button class="icon-btn" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></button>
      <img class="avatar" id="user-avatar" src="https://via.placeholder.com/36" alt="avatar" onclick="showPage('profile')">
    </div>
  </nav>

  <div class="main-content">

    <!-- Notes List -->
    <div class="page active" id="page-notes">
      <div class="search-bar">
        <input class="search-input" type="text" id="search-input" placeholder="🔍 搜尋筆記..." oninput="debounceSearch()">
      </div>
      <div class="tag-filter" id="tag-filter">
        <span class="tag-chip active" data-tag="" onclick="filterByTag(this,'')">全部</span>
      </div>
      <div class="notes-grid" id="notes-grid">
        <div class="empty-state"><i class="fas fa-book-open"></i><p>載入中...</p></div>
      </div>
    </div>

    <!-- Note Detail -->
    <div class="page" id="page-detail">
      <div id="note-detail-content"></div>
    </div>

    <!-- Admin -->
    <div class="page" id="page-admin">
      <div class="stats-grid" id="admin-stats"></div>
      <div class="editor-tabs" style="margin-bottom:16px;">
        <button class="editor-tab active" onclick="switchAdminTab(this,'tab-users')">👥 使用者</button>
        <button class="editor-tab" onclick="switchAdminTab(this,'tab-logs')">📋 稽核日誌</button>
      </div>
      <div id="tab-users">
        <div class="table-wrap">
          <table>
            <thead><tr><th>使用者</th><th>角色</th><th>狀態</th><th>最後登入</th><th>操作</th></tr></thead>
            <tbody id="users-table-body"><tr><td colspan="5" style="text-align:center">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div id="tab-logs" style="display:none;">
        <div class="table-wrap">
          <table>
            <thead><tr><th>時間</th><th>操作者</th><th>動作</th><th>資源</th><th>結果</th></tr></thead>
            <tbody id="logs-table-body"><tr><td colspan="5" style="text-align:center">載入中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Profile -->
    <div class="page" id="page-profile">
      <div class="profile-card">
        <img class="profile-avatar" id="profile-avatar" src="https://via.placeholder.com/80" alt="avatar">
        <div class="profile-name" id="profile-name">載入中...</div>
        <div class="profile-role" id="profile-role"></div>
      </div>
      <div class="settings-list">
        <div class="settings-item" onclick="showPage('notes')">
          <i class="fas fa-book"></i><span>我的筆記</span><i class="fas fa-chevron-right chevron"></i>
        </div>
        <div class="settings-item">
          <i class="fas fa-moon"></i><span>深色模式</span>
          <label class="toggle">
            <input type="checkbox" id="dark-toggle" onchange="toggleTheme()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item" onclick="confirmLogout()">
          <i class="fas fa-sign-out-alt" style="color:var(--danger)"></i>
          <span style="color:var(--danger)">登出</span>
          <i class="fas fa-chevron-right chevron"></i>
        </div>
      </div>
    </div>

  </div>

  <nav class="bottomnav">
    <button class="nav-item active" id="nav-notes" onclick="showPage('notes')">
      <i class="fas fa-book"></i><span>筆記</span>
    </button>
    <button class="nav-item hidden" id="nav-admin" onclick="showPage('admin')">
      <i class="fas fa-shield-alt"></i><span>管理</span>
    </button>
    <button class="nav-item" id="nav-profile" onclick="showPage('profile')">
      <i class="fas fa-user"></i><span>我的</span>
    </button>
  </nav>

  <button class="fab hidden" id="fab-new-note" onclick="openNoteModal()">
    <i class="fas fa-plus"></i>
  </button>
</div>

<!-- Modal: Note Editor -->
<div class="modal-overlay" id="modal-note-editor">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-note-title">✏️ 新增筆記</h2>
      <button class="modal-close" onclick="closeModal('modal-note-editor')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">標題 *</label>
      <input class="form-input" id="note-title-input" type="text" placeholder="輸入筆記標題..." maxlength="200">
    </div>
    <div class="form-group">
      <label class="form-label">內容（支援 Markdown）</label>
      <div class="editor-tabs">
        <button class="editor-tab active" onclick="switchEditorTab(this,'write')">✏️ 編輯</button>
        <button class="editor-tab" onclick="switchEditorTab(this,'preview')">👁️ 預覽</button>
      </div>
      <textarea class="form-textarea" id="note-content-input"
        placeholder="支援 Markdown 語法...&#10;# 標題&#10;**粗體** *斜體*&#10;- 清單&#10;```code```"
        style="border-radius:0 0 8px 8px;border-top:none;"></textarea>
      <div class="editor-preview" id="note-preview" style="display:none;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">標籤（逗號分隔）</label>
      <input class="form-input" id="note-tags-input" type="text" placeholder="工作, 學習, 重要">
    </div>
    <div class="form-group">
      <label class="form-label">可見度</label>
      <select class="form-select" id="note-visibility-input">
        <option value="private">🔒 私人</option>
        <option value="shared">🔗 共享</option>
        <option value="team">👥 團隊</option>
        <option value="public">🌐 公開</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">上傳圖片</label>
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>點擊上傳圖片（JPG, PNG, GIF，最大 10MB）</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
      <div class="upload-preview" id="upload-preview"></div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal('modal-note-editor')">取消</button>
      <button class="btn btn-primary" style="flex:2" onclick="saveNote()">
        <i class="fas fa-save"></i> 儲存筆記
      </button>
    </div>
  </div>
</div>

<!-- Modal: Share -->
<div class="modal-overlay" id="modal-share">
  <div class="modal">
    <div class="modal-header">
      <h2>🔗 分享筆記</h2>
      <button class="modal-close" onclick="closeModal('modal-share')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">使用者 ID（每行一個）</label>
      <textarea class="form-textarea" id="share-user-ids" style="min-height:80px"
        placeholder="U1234567890abcdef&#10;U9876543210fedcba"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">權限層級</label>
      <select class="form-select" id="share-permission">
        <option value="read">👁️ 唯讀</option>
        <option value="write">✏️ 可編輯</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">到期時間（選填）</label>
      <input class="form-input" type="datetime-local" id="share-expires">

    <button class="btn btn-primary btn-full" onclick="submitShare()">
      <i class="fas fa-share"></i> 確認分享
    </button>
  </div>
</div>

<!-- Modal: Role -->
<div class="modal-overlay" id="modal-role">
  <div class="modal">
    <div class="modal-header">
      <h2>🛡️ 修改角色</h2>
      <button class="modal-close" onclick="closeModal('modal-role')">✕</button>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
      使用者：<strong id="role-target-name"></strong>
    </p>
    <div class="form-group">
      <label class="form-label">選擇角色</label>
      <select class="form-select" id="role-select">
        <option value="viewer">👁️ 檢視者</option>
        <option value="editor">✏️ 編輯者</option>
        <option value="admin">🛡️ 管理員</option>
        <option value="super_admin">👑 超級管理員</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" onclick="submitRoleChange()">
      <i class="fas fa-check"></i> 確認變更
    </button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const CONFIG = {
  GAS_URL:   'https://script.google.com/macros/s/AKfycbw5ZhKZdorPOZYPQ2CH0r3Xo0WbuOpFOvL1H3gcP7DzyDBdNijiHeC94g8v3hLkMrTiJw/exec',  // ← 替換
  LIFF_ID:   '2009456572-AUDE1qmM',          // ← 替換
  TOKEN_KEY: 'notebook_token',
  USER_KEY:  'notebook_user',
  THEME_KEY: 'notebook_theme'
};

// ── STATE ───────────────────────────────────────────────────
let state = {
  token: null, user: null, role: 'guest',
  notes: [], currentNoteId: null,
  editingNoteId: null, shareNoteId: null,
  roleTargetId: null, searchTimer: null,
  currentTag: '', uploadedFiles: []
};

// ── RBAC (前端) ─────────────────────────────────────────────
const ROLE_HIERARCHY = { guest:0, viewer:1, editor:2, admin:3, super_admin:4 };
const PERMISSIONS = {
  create_note:      ['editor','admin','super_admin'],
  edit_own_note:    ['editor','admin','super_admin'],
  delete_own_note:  ['editor','admin','super_admin'],
  edit_others_note: ['admin','super_admin'],
  share_note:       ['editor','admin','super_admin'],
  manage_users:     ['admin','super_admin'],
  assign_role:      ['super_admin'],
  view_audit_logs:  ['admin','super_admin'],
  upload_file:      ['editor','admin','super_admin']
};
function hasPermission(role, action) {
  return (PERMISSIONS[action] || []).includes(role);
}
function isOwnerOrAdmin(note) {
  if (!state.user) return false;
  if (ROLE_HIERARCHY[state.role] >= ROLE_HIERARCHY['admin']) return true;
  return note.owner_id === state.user.userId;
}

// ── API ─────────────────────────────────────────────────────
async function apiGet(path, params = {}) {
  const url = new URL(CONFIG.GAS_URL);
  url.searchParams.set('path', path);
  url.searchParams.set('token', state.token || '');
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  return res.json();
}
async function apiPost(path, body = {}, method = 'POST') {
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method, token: state.token || '', ...body })
  });
  return res.json();
}

// ── INIT ────────────────────────────────────────────────────
async function init() {
  const savedTheme = localStorage.getItem(CONFIG.THEME_KEY);
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme','dark');
    document.getElementById('theme-icon').className = 'fas fa-sun';
    document.getElementById('dark-toggle').checked = true;
  }
  const savedToken = localStorage.getItem(CONFIG.TOKEN_KEY);
  const savedUser  = localStorage.getItem(CONFIG.USER_KEY);
  if (savedToken && savedUser) {
    state.token = savedToken;
    state.user  = JSON.parse(savedUser);
    state.role  = state.user.role || 'viewer';
    await startApp();
    return;
  }
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile     = await liff.getProfile();
    const accessToken = liff.getAccessToken();
    await loginToBackend(profile, accessToken);
  } catch (err) {
    console.warn('LIFF 初始化失敗，訪客模式:', err);
    state.role = 'guest';
    await startApp();
  }
}

async function loginToBackend(profile, accessToken) {
  const res = await apiPost('auth/login', {
    lineUserId:    profile.userId,
    displayName:   profile.displayName,
    pictureUrl:    profile.pictureUrl,
    lineAccessToken: accessToken
  });
  if (res.status === 200) {
    state.token = res.data.token;
    state.role  = res.data.role;
    state.user  = {
      userId: res.data.userId, displayName: res.data.displayName,
      pictureUrl: res.data.pictureUrl, role: res.data.role
    };
    localStorage.setItem(CONFIG.TOKEN_KEY, state.token);
    localStorage.setItem(CONFIG.USER_KEY,  JSON.stringify(state.user));
  }
  await startApp();
}

async function startApp() {
  renderUI();
  await loadNotes();
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── RENDER UI ───────────────────────────────────────────────
function renderUI() {
  const { role, user } = state;
  if (user) {
    document.getElementById('user-avatar').src    = user.pictureUrl || 'https://via.placeholder.com/36';
    document.getElementById('profile-avatar').src = user.pictureUrl || 'https://via.placeholder.com/80';
    document.getElementById('profile-name').textContent = user.displayName || '使用者';
    document.getElementById('profile-role').innerHTML =
      `<span class="role-badge role-${role}">${getRoleLabel(role)}</span>`;
  }
  document.getElementById('fab-new-note')
    .classList.toggle('hidden', !hasPermission(role,'create_note'));
  document.getElementById('nav-admin')
    .classList.toggle('hidden', !hasPermission(role,'manage_users'));
}

function getRoleLabel(r) {
  return { super_admin:'👑 超級管理員', admin:'🛡️ 管理員',
           editor:'✏️ 編輯者', viewer:'👁️ 檢視者', guest:'👤 訪客' }[r] || r;
}

// ── PAGE NAV ────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const titles = { notes:'我的筆記', detail:'筆記內容', admin:'管理後台', profile:'個人資料' };
  document.getElementById('page-title').textContent = titles[name] || '';
  document.getElementById('page-' + name).classList.add('active');
  const navMap = { notes:'nav-notes', admin:'nav-admin', profile:'nav-profile' };
  if (navMap[name]) document.getElementById(navMap[name]).classList.add('active');
  if (name === 'admin') loadAdminData();
}

// ── NOTES ───────────────────────────────────────────────────
async function loadNotes(keyword = '', tag = '') {
  const params = {};
  if (keyword) params.keyword = keyword;
  if (tag)     params.tag     = tag;
  const res = await apiGet('notes', params);
  if (res.status === 200) {
    state.notes = res.data.notes || [];
    renderNotes(state.notes);
    renderTagFilter(state.notes);
  } else {
    showToast('載入筆記失敗','error');
  }
}

function renderNotes(notes) {
  const grid = document.getElementById('notes-grid');
  if (!notes.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <i class="fas fa-book-open"></i><p>目前沒有筆記</p>
      ${hasPermission(state.role,'create_note')
        ? '<p style="font-size:13px;margin-top:8px">點擊右下角 ＋ 新增第一篇筆記</p>' : ''}
    </div>`;
    return;
  }
  grid.innerHTML = notes.map(note => {
    const canEdit   = isOwnerOrAdmin(note) && hasPermission(state.role,'edit_own_note');
    const canDelete = isOwnerOrAdmin(note) && hasPermission(state.role,'delete_own_note');
    const canShare  = hasPermission(state.role,'share_note') && isOwnerOrAdmin(note);
    const tags = (note.tags||'').split(',').filter(t=>t.trim())
      .map(t=>`<span class="note-tag">#${t.trim()}</span>`).join('');
    return `
      <div class="note-card" onclick="viewNote('${note.note_id}')">
        <div class="card-header">
          <h3>${escapeHtml(note.title)}</h3>
          <span class="visibility-badge badge-${note.visibility}">${getVisibilityLabel(note.visibility)}</span>
        </div>
        <div class="note-preview">${escapeHtml(note.content_preview||'')}</div>
        <div class="note-tags">${tags}</div>
        <div class="note-meta" style="margin-top:8px">
          <span>${formatDate(note.updated_at)}</span>
          <div class="note-actions" onclick="event.stopPropagation()">
            ${canEdit   ? `<button class="note-action-btn btn-edit"   onclick="openNoteModal('${note.note_id}')">✏️</button>`  : ''}
            ${canShare  ? `<button class="note-action-btn btn-share"  onclick="openShareModal('${note.note_id}')">🔗</button>` : ''}
            ${canDelete ? `<button class="note-action-btn btn-delete" onclick="deleteNote('${note.note_id}')">🗑️</button>`    : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderTagFilter(notes) {
  const tagSet = new Set();
  notes.forEach(n => (n.tags||'').split(',').forEach(t => { if(t.trim()) tagSet.add(t.trim()); }));
  const container = document.getElementById('tag-filter');
  const chips = [`<span class="tag-chip active" data-tag="" onclick="filterByTag(this,'')">全部</span>`];
  tagSet.forEach(tag => chips.push(
    `<span class="tag-chip" data-tag="${tag}" onclick="filterByTag(this,'${tag}')">#${tag}</span>`
  ));
  container.innerHTML = chips.join('');
}

function filterByTag(el, tag) {
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.currentTag = tag;
  loadNotes(document.getElementById('search-input').value, tag);
}

function debounceSearch() {
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(() =>
    loadNotes(document.getElementById('search-input').value, state.currentTag), 400);
}

async function viewNote(noteId) {
  const res = await apiGet(`notes/${noteId}`);
  if (res.status !== 200) { showToast('無法查看此筆記','error'); return; }
  const note = res.data;
  state.currentNoteId = noteId;
  const canEdit   = isOwnerOrAdmin(note) && hasPermission(state.role,'edit_own_note');
  const canDelete = isOwnerOrAdmin(note) && hasPermission(state.role,'delete_own_note');
  const canShare  = hasPermission(state.role,'share_note') && isOwnerOrAdmin(note);
  const tags = (note.tags||'').split(',').filter(t=>t.trim())
    .map(t=>`<span class="note-tag">#${t.trim()}</span>`).join('');
  const mdContent = DOMPurify.sanitize(marked.parse(note.content||''));
  document.getElementById('note-detail-content').innerHTML = `
    <div class="note-detail-header">
      <h1 class="note-detail-title">${escapeHtml(note.title)}</h1>
      <span class="visibility-badge badge-${note.visibility}">${getVisibilityLabel(note.visibility)}</span>
    </div>
    <div class="note-detail-meta">
      <span><i class="fas fa-user"></i> ${escapeHtml(note.owner_id)}</span>
      <span><i class="fas fa-clock"></i> ${formatDate(note.updated_at)}</span>
      <span><i class="fas fa-calendar"></i> 建立於 ${formatDate(note.created_at)}</span>
    </div>
    ${tags ? `<div class="note-tags" style="margin-bottom:16px">${tags}</div>` : ''}
    <div class="note-detail-content">${mdContent}</div>
    <div class="note-detail-actions">
      <button class="btn btn-secondary" onclick="showPage('notes')"><i class="fas fa-arrow-left"></i> 返回</button>
      ${canEdit   ? `<button class="btn btn-secondary" onclick="openNoteModal('${noteId}')"><i class="fas fa-edit"></i> 編輯</button>`  : ''}
      ${canShare  ? `<button class="btn btn-secondary" onclick="openShareModal('${noteId}')"><i class="fas fa-share"></i> 分享</button>` : ''}
      ${canDelete ? `<button class="btn btn-danger"    onclick="deleteNote('${noteId}')"><i class="fas fa-trash"></i> 刪除</button>`     : ''}
    </div>`;
  showPage('detail');
}

// ── NOTE EDITOR ─────────────────────────────────────────────
async function openNoteModal(noteId = null) {
  state.editingNoteId = noteId;
  state.uploadedFiles = [];
  document.getElementById('upload-preview').innerHTML = '';
  if (noteId) {
    document.getElementById('modal-note-title').textContent = '✏️ 編輯筆記';
    const res = await apiGet(`notes/${noteId}`);
    if (res.status === 200) {
      const n = res.data;
      document.getElementById('note-title-input').value      = n.title      || '';
      document.getElementById('note-content-input').value    = n.content    || '';
      document.getElementById('note-tags-input').value       = n.tags       || '';
      document.getElementById('note-visibility-input').value = n.visibility || 'private';
    }
  } else {
    document.getElementById('modal-note-title').textContent  = '✏️ 新增筆記';
    document.getElementById('note-title-input').value        = '';
    document.getElementById('note-content-input').value      = '';
    document.getElementById('note-tags-input').value         = '';
    document.getElementById('note-visibility-input').value   = 'private';
  }
  document.getElementById('note-content-input').style.display = 'block';
  document.getElementById('note-preview').style.display       = 'none';
  document.querySelectorAll('#modal-note-editor .editor-tab')
    .forEach((t,i) => t.classList.toggle('active', i === 0));
  openModal('modal-note-editor');
}

async function saveNote() {
  const title      = document.getElementById('note-title-input').value.trim();
  const content    = document.getElementById('note-content-input').value.trim();
  const tags       = document.getElementById('note-tags-input').value.trim();
  const visibility = document.getElementById('note-visibility-input').value;
  if (!title) { showToast('請輸入標題','warning'); return; }

  let finalContent = content;
  for (const file of state.uploadedFiles) {
    const up = await uploadFile(file);
    if (up) finalContent += `\n\n![${file.name}](${up.fileUrl})`;
  }

  const res = state.editingNoteId
    ? await apiPost(`notes/${state.editingNoteId}`, { title, content:finalContent, tags, visibility }, 'PUT')
    : await apiPost('notes', { title, content:finalContent, tags, visibility });

  if (res.status === 200) {
    showToast(state.editingNoteId ? '筆記已更新！' : '筆記已建立！', 'success');
    closeModal('modal-note-editor');
    await loadNotes();
  } else {
    showToast(res.message || '儲存失敗','error');
  }
}

async function deleteNote(noteId) {
  showConfirm('刪除筆記','確定要刪除這篇筆記嗎？此操作無法復原。', async () => {
    const res = await apiPost(`notes/${noteId}`, {}, 'DELETE');
    if (res.status === 200) {
      showToast('筆記已刪除','success');
      if (document.getElementById('page-detail').classList.contains('active')) showPage('notes');
      await loadNotes();
    } else {
      showToast(res.message || '刪除失敗','error');
    }
  });
}

// ── SHARE ───────────────────────────────────────────────────
function openShareModal(noteId) {
  state.shareNoteId = noteId;
  document.getElementById('share-user-ids').value  = '';
  document.getElementById('share-permission').value = 'read';
  document.getElementById('share-expires').value   = '';
  openModal('modal-share');
}

async function submitShare() {
  const rawIds = document.getElementById('share-user-ids').value;
  const shareWithUsers = rawIds.split('\n').map(s=>s.trim()).filter(Boolean);
  if (!shareWithUsers.length) { showToast('請輸入分享對象','warning'); return; }
  const res = await apiPost(`notes/${state.shareNoteId}/share`, {
    shareWithUsers,
    permission: document.getElementById('share-permission').value,
    expiresAt:  document.getElementById('share-expires').value
  });
  if (res.status === 200) { showToast('分享成功！','success'); closeModal('modal-share'); }
  else showToast(res.message || '分享失敗','error');
}

// ── ADMIN ───────────────────────────────────────────────────
async function loadAdminData() {
  await Promise.all([loadAdminStats(), loadUsers(), loadAuditLogs()]);
}

async function loadAdminStats() {
  const [notesRes, usersRes, logsRes] = await Promise.all([
    apiGet('notes', { limit:9999 }),
    apiGet('users'),
    apiGet('audit-logs', { limit:9999 })
  ]);
  const totalNotes  = notesRes.data  ? notesRes.data.total  : 0;
  const users       = usersRes.data  ? usersRes.data        : [];
  const totalLogs   = logsRes.data   ? logsRes.data.total   : 0;
  const activeUsers = users.filter(u => u.status === 'active').length;
  document.getElementById('admin-stats').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalNotes}</div><div class="stat-label">📝 筆記總數</div></div>
    <div class="stat-card"><div class="stat-value">${users.length}</div><div class="stat-label">👥 使用者數</div></div>
    <div class="stat-card"><div class="stat-value">${activeUsers}</div><div class="stat-label">✅ 活躍使用者</div></div>
    <div class="stat-card"><div class="stat-value">${totalLogs}</div><div class="stat-label">📋 操作記錄</div></div>`;
}

async function loadUsers() {
  const res = await apiGet('users');
  if (res.status !== 200) return;
  const users        = res.data || [];
  const isSuperAdmin = state.role === 'super_admin';
  const isAdmin      = ROLE_HIERARCHY[state.role] >= ROLE_HIERARCHY['admin'];

  document.getElementById('users-table-body').innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <img src="${u.picture_url||'https://via.placeholder.com/28'}"
            style="width:28px;height:28px;border-radius:50%;object-fit:cover">
          <div>
            <div style="font-weight:600;font-size:13px">${escapeHtml(u.display_name||'')}</div>
            <div style="font-size:11px;color:var(--text-muted)">${u.user_id}</div>
          </div>
        </div>
      </td>
      <td><span class="role-badge role-${u.role}">${getRoleLabel(u.role)}</span></td>
      <td><span style="color:${u.status==='active'?'var(--primary)':'var(--danger)'}">
        ${u.status==='active' ? '✅ 啟用' : '🚫 停用'}</span></td>
      <td>${formatDate(u.last_login)}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${isSuperAdmin ? `<button class="btn btn-sm btn-secondary" onclick="openRoleModal('${u.user_id}','${u.display_name||u.user_id}','${u.role}')">🛡️ 角色</button>` : ''}
          ${isAdmin && u.user_id !== (state.user&&state.user.userId) ? `
            <button class="btn btn-sm ${u.status==='active'?'btn-danger':'btn-primary'}"
              onclick="toggleUserStatus('${u.user_id}','${u.status}')">
              ${u.status==='active' ? '🚫 停用' : '✅ 啟用'}
            </button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

async function loadAuditLogs() {
  const res = await apiGet('audit-logs', { limit: 50 });
  if (res.status !== 200) return;
  const logs = res.data.logs || [];
  document.getElementById('logs-table-body').innerHTML = logs.length
    ? logs.map(log => `
        <tr>
          <td style="white-space:nowrap">${formatDate(log.timestamp)}</td>
          <td style="font-size:11px;max-width:100px;overflow:hidden;text-overflow:ellipsis">${log.user_id}</td>
          <td><code style="font-size:11px;background:var(--bg);padding:2px 6px;border-radius:4px">${log.action}</code></td>
          <td style="font-size:12px">${log.resource_type}${log.resource_id ? ' / '+log.resource_id.substring(0,8)+'…' : ''}</td>
          <td><span class="log-result-${log.result}">${
            log.result==='success' ? '✅' : log.result==='denied' ? '🚫' : '⚠️'
          } ${log.result}</span></td>
        </tr>`).join('')
    : '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">暫無記錄</td></tr>';
}

function switchAdminTab(btn, tabId) {
  document.querySelectorAll('#page-admin .editor-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-users').style.display = tabId === 'tab-users' ? 'block' : 'none';
  document.getElementById('tab-logs').style.display  = tabId === 'tab-logs'  ? 'block' : 'none';
}

// ── ROLE MODAL ──────────────────────────────────────────────
function openRoleModal(userId, name, currentRole) {
  state.roleTargetId = userId;
  document.getElementById('role-target-name').textContent = name;
  document.getElementById('role-select').value = currentRole;
  openModal('modal-role');
}

async function submitRoleChange() {
  const newRole = document.getElementById('role-select').value;
  showConfirm('變更角色', `確定要將此使用者角色變更為「${getRoleLabel(newRole)}」嗎？`, async () => {
    const res = await apiPost(`users/${state.roleTargetId}/role`, { role: newRole }, 'PUT');
    if (res.status === 200) {
      showToast('角色已更新','success');
      closeModal('modal-role');
      await loadUsers();
    } else {
      showToast(res.message || '更新失敗','error');
    }
  });
}

async function toggleUserStatus(userId, currentStatus) {
  const newStatus = currentStatus === 'active' ? 'suspended' : 'active';
  const label     = newStatus === 'active' ? '啟用' : '停用';
  showConfirm(`${label}使用者`, `確定要${label}此使用者嗎？`, async () => {
    const res = await apiPost(`users/${userId}/status`, { status: newStatus }, 'PUT');
    if (res.status === 200) {
      showToast(`使用者已${label}`,'success');
      await loadUsers();
    } else {
      showToast(res.message || '操作失敗','error');
    }
  });
}

// ── FILE UPLOAD ─────────────────────────────────────────────
function handleFileSelect(event) {
  const files = Array.from(event.target.files);
  const preview = document.getElementById('upload-preview');
  files.forEach(file => {
    if (file.size > 10 * 1024 * 1024) { showToast(`${file.name} 超過 10MB 限制`,'warning'); return; }
    state.uploadedFiles.push(file);
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'upload-thumb';
      img.title = file.name;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
  event.target.value = '';
}

async function uploadFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];
      const res = await apiPost('upload', {
        fileName: file.name, mimeType: file.type, base64Data: base64
      });
      resolve(res.status === 200 ? res.data : null);
    };
    reader.readAsDataURL(file);
  });
}

// ── MARKDOWN EDITOR TABS ─────────────────────────────────────
function switchEditorTab(btn, mode) {
  document.querySelectorAll('#modal-note-editor .editor-tab')
    .forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  const textarea = document.getElementById('note-content-input');
  const preview  = document.getElementById('note-preview');

  if (mode === 'preview') {
    const raw = textarea.value;
    preview.innerHTML = DOMPurify.sanitize(marked.parse(raw || '*（無內容）*'));
    textarea.style.display = 'none';
    preview.style.display  = 'block';
  } else {
    textarea.style.display = 'block';
    preview.style.display  = 'none';
  }
}

// ── THEME ────────────────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if (isDark) {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('theme-icon').className = 'fas fa-moon';
    document.getElementById('dark-toggle').checked  = false;
    localStorage.setItem(CONFIG.THEME_KEY, 'light');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('theme-icon').className = 'fas fa-sun';
    document.getElementById('dark-toggle').checked  = true;
    localStorage.setItem(CONFIG.THEME_KEY, 'dark');
  }
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}

// 點擊遮罩關閉 Modal
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) closeModal(this.id);
  });
});

// ── TOAST ────────────────────────────────────────────────────
function showToast(message, type = 'default') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ── CONFIRM DIALOG ───────────────────────────────────────────
let _confirmCallback = null;

function showConfirm(title, message, onConfirm) {
  document.getElementById('confirm-title').textContent   = title;
  document.getElementById('confirm-message').textContent = message;
  _confirmCallback = onConfirm;
  document.getElementById('confirm-overlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('active');
  _confirmCallback = null;
}

document.getElementById('confirm-ok-btn').addEventListener('click', () => {
  if (typeof _confirmCallback === 'function') _confirmCallback();
  closeConfirm();
});

// ── LOGOUT ───────────────────────────────────────────────────
function confirmLogout() {
  showConfirm('登出', '確定要登出嗎？', async () => {
    await apiPost('auth/logout', {});
    localStorage.removeItem(CONFIG.TOKEN_KEY);
    localStorage.removeItem(CONFIG.USER_KEY);
    state.token = null;
    state.user  = null;
    state.role  = 'guest';
    // 重新導向 LIFF 登入
    try { liff.logout(); } catch(e) {}
    location.reload();
  });
}

// ── FORMAT HELPERS ───────────────────────────────────────────
function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return '—';
  const now  = new Date();
  const diff = now - d;
  const mins  = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days  = Math.floor(diff / 86400000);
  if (mins  <  1) return '剛剛';
  if (mins  < 60) return `${mins} 分鐘前`;
  if (hours < 24) return `${hours} 小時前`;
  if (days  <  7) return `${days} 天前`;
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
}

function getVisibilityLabel(v) {
  return { private:'🔒 私人', shared:'🔗 共享', team:'👥 團隊', public:'🌐 公開' }[v] || v;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#x27;');
}

<script>
// ═══════════════════════════════════════
//  全域變數
// ═══════════════════════════════════════
const API_BASE_URL='https://script.google.com/macros/s/AKfycbyd6XsPHw5ou8I7haElayyohdEhGhEtLlBCtc22G07TS7aF7Q4LTWJQAheJly8HqBj3NA/exec';
const LIFF_ID='2009456572-AUDE1qmM';
let liffInitialized=false,lineProfile=null,currentUser=null,userApprovalStatus='pending';
let currentCategory='全部',currentPage='home',initializationTimeout=null;
let initStartTime=Date.now(),currentCalendarDate=new Date(),currentMyTab='posts';
let notificationPollingTimer=null;
let postsCache=[],eventsCache=[],databaseCache=[],notificationsCache=[];
let currentPostsPage=1,hasMorePosts=true;
let userPreferences={fontSize:'medium',theme:'light',highContrast:false,voiceEnabled:true,autoRead:false,readingSpeed:1.0,notifications:true,autoSave:true};
let speechSynthesisObj=window.speechSynthesis,currentUtterance=null;

// ═══════════════════════════════════════
//  偏好設定
// ═══════════════════════════════════════
function loadUserPreferences(){try{const s=localStorage.getItem('lsvtbig_preferences');if(s)userPreferences={...userPreferences,...JSON.parse(s)};}catch(e){console.error(e);}}
function saveUserPreferences(){try{localStorage.setItem('lsvtbig_preferences',JSON.stringify(userPreferences));}catch(e){console.error(e);}}
function applyUserPreferences(){try{document.body.className=document.body.className.replace(/font-\w+/g,'');document.body.classList.add('font-'+userPreferences.fontSize);document.documentElement.setAttribute('data-theme',userPreferences.highContrast?'high-contrast':userPreferences.theme);}catch(e){console.error(e);}}

// ═══════════════════════════════════════
//  工具函數
// ═══════════════════════════════════════
function getTimeAgo(d){const s=Math.floor((new Date()-d)/1000);if(s<60)return'剛剛';if(s<3600)return Math.floor(s/60)+'分鐘前';if(s<86400)return Math.floor(s/3600)+'小時前';if(s<604800)return Math.floor(s/86400)+'天前';return formatDate(d);}
function formatDate(d){return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}
function escapeHtml(t){if(!t)return'';return String(t).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function showToast(m,t,d){showNotificationToast(m,t,d);}
function getFileIcon(t){if(!t)return'📄';const s=t.toLowerCase();if(s.includes('image'))return'🖼️';if(s.includes('pdf'))return'📄';if(s.includes('doc'))return'📝';if(s.includes('sheet')||s.includes('excel'))return'📊';if(s.includes('video'))return'🎥';if(s.includes('audio'))return'🎵';if(s.includes('zip')||s.includes('rar'))return'📦';return'📄';}
function formatFileSize(b){if(!b||b===0)return'0 Bytes';const k=1024,sz=['Bytes','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(2))+' '+sz[i];}
function getExtFromMime(m){const map={'image/jpeg':'jpg','image/png':'png','image/gif':'gif','image/webp':'webp','application/pdf':'pdf','text/plain':'txt','application/vnd.openxmlformats-officedocument.wordprocessingml.document':'docx','application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':'xlsx','application/vnd.openxmlformats-officedocument.presentationml.presentation':'pptx','application/msword':'doc','application/vnd.ms-excel':'xls','video/mp4':'mp4','audio/mpeg':'mp3'};return map[m]||'bin';}
function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{const p=(e.target?.result||'').split(',');if(p.length<2||!p[1]){rej(new Error('Base64轉換失敗'));return;}res(p[1]);};r.onerror=()=>rej(new Error('FileReader失敗'));r.readAsDataURL(file);});}
async function uploadFile(file,category='general'){
  if(!currentUser)throw new Error('請先登入');
  if(!file)throw new Error('未選擇檔案');
  if(file.size>30*1024*1024)throw new Error('檔案超過30MB限制');
  const rawName=(file.name||'').trim();
  const fileName=rawName!==''?(rawName.length>200?rawName.substring(0,200):rawName):'upload_'+Date.now()+'.'+getExtFromMime(file.type);
  const mimeType=(file.type&&file.type.trim()!=='')?file.type:'application/octet-stream';
  if(file.size>20*1024*1024)showToast('大檔案上傳中，請耐心等候...','warning');
  const base64=await fileToBase64(file);
  if(!base64||base64.trim()==='')throw new Error('Base64內容為空');
  const response=await apiCall('uploadFile',{userId:currentUser.userId,userName:currentUser.displayName||'',fileName,mimeType,fileBase64:base64,category:category||'general'});
  if(!response||!response.success)throw new Error(response?.error||'上傳失敗');
  return response;
}

// ═══════════════════════════════════════
//  API
// ═══════════════════════════════════════
async function apiCall(action,data={}){
  try{
    const req={action,...data};
    if(currentUser){req.userId=currentUser['使用者ID']||currentUser.userId;req.userName=currentUser['實名']||currentUser.displayName;}
    const res=await fetch(API_BASE_URL,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(req)});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const result=await res.json();
    if(result.error)throw new Error(result.error);
    return result;
  }catch(e){console.error('API失敗:',action,e);throw e;}
}

// ═══════════════════════════════════════
//  資料載入
// ═══════════════════════════════════════
async function loadPosts(reset=false){
  try{
    if(reset){currentPostsPage=1;hasMorePosts=true;document.getElementById('posts-container').innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';}
    const r=await apiCall('getPosts',{page:currentPostsPage,category:currentCategory==='全部'?'':currentCategory,limit:10});
    const posts=r.data||[];
    if(reset){postsCache=posts;}else{postsCache=[...postsCache,...posts];}

function renderPosts(posts,reset=false){

function setupPostForm(){
  const ta=document.getElementById('post-content'),cc=document.getElementById('content-counter');
  if(ta&&cc)ta.addEventListener('input',function(){cc.textContent=this.value.length;});
  setupPostFileUpload();
}
function setupPostFileUpload(){
  const area=document.getElementById('post-file-upload');
  const inp=document.getElementById('post-file-input');
  const selDiv=document.getElementById('selected-files');
  let selFiles=[];
  area.addEventListener('click',()=>inp.click());
  area.addEventListener('dragover',e=>{e.preventDefault();area.classList.add('dragover');});
  area.addEventListener('dragleave',()=>area.classList.remove('dragover'));
  area.addEventListener('drop',e=>{e.preventDefault();area.classList.remove('dragover');handlePostFileSelect(Array.from(e.dataTransfer.files));});
  inp.addEventListener('change',e=>handlePostFileSelect(Array.from(e.target.files)));
  function handlePostFileSelect(files){
    if(selFiles.length+files.length>3){showErrorMessage('最多只能上傳3個檔案');return;}
    for(const f of files){if(f.size>30*1024*1024){showErrorMessage('檔案'+f.name+'超過30MB');return;}}
    selFiles=[...selFiles,...files];renderSel();
  }
  function renderSel(){
    if(selFiles.length===0){selDiv.style.display='none';return;}
    selDiv.style.display='block';
    selDiv.innerHTML=selFiles.map((f,i)=>`<div class="attachment-item">
      <span class="attachment-icon">${getFileIcon(f.type)}</span>
      <div class="attachment-info"><div class="attachment-name">${escapeHtml(f.name)}</div><div class="attachment-size">${formatFileSize(f.size)}</div></div>
      <button type="button" onclick="removeSelectedFile(${i})" style="background:none;border:none;color:var(--error);cursor:pointer;font-size:var(--font-lg);">×</button>
    </div>`).join('');
  }
  window.removeSelectedFile=i=>{selFiles.splice(i,1);renderSel();};
  window.getSelectedPostFiles=()=>selFiles;
}
async function submitNewPost(event){
  event.preventDefault();
  const title=document.getElementById('post-title').value.trim();
  const category=document.getElementById('post-category').value;
  const content=document.getElementById('post-content').value.trim();
  const files=window.getSelectedPostFiles?window.getSelectedPostFiles():[];
  if(!title||!category||!content){showErrorMessage('請填寫所有必填欄位');return;}
  const btn=document.getElementById('submit-post-btn');
  btn.disabled=true;btn.textContent='發表中...';
  try{
    let attachments=[];
    for(const f of files){
      const r=await uploadFile(f,'post-attachment');
      if(r.success)attachments.push({name:f.name,type:f.type,size:f.size,url:r.url,id:r.fileId});
    }
    const r=await apiCall('createPost',{title,content,category,attachments:JSON.stringify(attachments)});
    if(r.success){closeAllModals();showSuccessMessage('文章發表成功！');if(currentPage==='posts')loadPosts(true);if(userPreferences.voiceEnabled)speakText('文章發表成功');}
    else throw new Error(r.error||'發表失敗');
  }catch(e){console.error(e);showErrorMessage('發表文章失敗：'+e.message);}
  finally{btn.disabled=false;btn.textContent='發表文章';}
}

async function previewResource(resourceId){
  try{
    const resource=databaseCache.find(r=>String(r.id)===String(resourceId));
    if(!resource){showErrorMessage('找不到該資源');return;}
    const r=await apiCall('getFilePreview',{fileId:resourceId});
    if(!r.success)throw new Error('無法獲取預覽');
    const ft=(resource.type||'').toLowerCase();
    let previewContent='';
    if(ft.includes('image'))previewContent=`<img src="${r.previewUrl}" class="preview-image" alt="${escapeHtml(resource.title)}">`;
    else if(ft.includes('pdf')||ft.includes('doc'))previewContent=`<iframe src="${r.previewUrl}" class="preview-iframe" title="${escapeHtml(resource.title)}"></iframe>`;
    else previewContent=`<div class="preview-error"><div style="text-align:center;"><div style="font-size:3rem;">${getFileIcon(resource.type)}</div><h3>${escapeHtml(resource.title)}</h3><p>此檔案類型不支援預覽</p><button class="btn btn-primary" onclick="downloadResource('${resource.id}')">下載檔案</button></div></div>`;
    showModal(`<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" style="max-width:90vw;" onclick="event.stopPropagation()">
        <div class="modal-header"><h2 class="modal-title">👁️ 預覽：${escapeHtml(resource.title)}</h2><button class="modal-close" onclick="closeAllModals()">&times;</button></div>
        <div class="modal-body" style="padding:0;">${previewContent}</div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeAllModals()">關閉</button><button class="btn btn-primary" onclick="downloadResource('${resourceId}')">下載檔案</button></div>
      </div>
    </div>`);
  }catch(e){showErrorMessage('預覽失敗：'+e.message);}
}
function sharePost(postId){
  const post=postsCache.find(p=>String(p.id)===String(postId));if(!post)return;
  const t=`${post.title}\n\n${post.content.substring(0,200)}...\n\n來自LSVTBIG論壇`;
  if(navigator.share)navigator.share({title:post.title,text:post.content.substring(0,100)+'...',url:window.location.href});
  else navigator.clipboard.writeText(t).then(()=>showSuccessMessage('已複製到剪貼簿'));
}
function shareEvent(eventId){
  const ev=eventsCache.find(e=>String(e.id)===String(eventId));if(!ev)return;
  const t=`${ev.title}\n\n${ev.description}\n\n時間：${formatDate(new Date(ev.date))} ${ev.time}\n地點：${ev.location}`;
  if(navigator.share)navigator.share({title:ev.title,text:t,url:window.location.href});
  else navigator.clipboard.writeText(t).then(()=>showSuccessMessage('已複製到剪貼簿'));
}
function shareResource(resourceId){
  const r=databaseCache.find(x=>String(x.id)===String(resourceId));if(!r)return;
  const t=`${r.title}\n\n${r.description}\n\n來自LSVTBIG資料庫`;
  if(navigator.share)navigator.share({title:r.title,text:r.description,url:window.location.href});
  else navigator.clipboard.writeText(t).then(()=>showSuccessMessage('已複製到剪貼簿'));
}

async function loadNotifications(){
  try{const r=await apiCall('getNotifications',{limit:20});notificationsCache=r.data||[];updateNotificationBadge();}
  catch(e){console.error(e);}
}
function updateNotificationBadge(){
  const n=notificationsCache.filter(x=>!x.read).length;
  const b=document.getElementById('notification-badge');
  if(b){if(n>0){b.textContent=n>99?'99+':n.toString();b.style.display='flex';}else{b.style.display='none';}}
}
function startNotificationPolling(){
  stopNotificationPolling();
  if(!currentUser||!userPreferences.notifications)return;
  notificationPollingTimer=setInterval(async()=>{try{await loadNotifications();}catch(e){console.warn(e);}},60000);
}
function stopNotificationPolling(){if(notificationPollingTimer){clearInterval(notificationPollingTimer);notificationPollingTimer=null;}}
async function showNotifications(){
  try{
    await loadNotifications();
    const unread=notificationsCache.filter(n=>!n.read).length;
    showModal(`<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" style="max-width:600px;" onclick="event.stopPropagation()">
        <div class="modal-header"><h2 class="modal-title">🔔 通知中心${unread>0?` (${unread})`:''}</h2><button class="modal-close" onclick="closeAllModals()">&times;</button></div>
        <div class="modal-body">
          ${notificationsCache.length===0?'<div class="empty-state"><div style="font-size:3rem;">🔔</div><h3>暫無通知</h3></div>':
          `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-4);">
            <span style="color:var(--text-secondary);">共${notificationsCache.length}則通知</span>
            ${unread>0?'<button class="btn btn-outline btn-sm" onclick="markAllAsRead()">全部標為已讀</button>':''}
          </div>
          <div style="display:flex;flex-direction:column;gap:var(--space-3);">
            ${notificationsCache.map(n=>`<div style="padding:var(--space-3);border:1px solid var(--border);border-radius:var(--radius);background:${n.read?'var(--surface)':'var(--bg-secondary)'};${!n.read?'border-left:4px solid var(--primary);':''}cursor:pointer;" onclick="markAsRead('${n.id}')">
              <div style="display:flex;align-items:flex-start;gap:var(--space-3);">
                <div style="font-size:var(--font-xl);">${getNotificationIcon(n.type)}</div>
                <div style="flex:1;">
                  <h4 style="margin:0 0 var(--space-1) 0;font-size:var(--font-base);">${escapeHtml(n.title)}${!n.read?'<span style="color:var(--primary);font-size:var(--font-sm);"> • 新</span>':''}</h4>
                  <p style="margin:0 0 var(--space-2) 0;color:var(--text-secondary);">${escapeHtml(n.message)}</p>
                  <div style="font-size:var(--font-sm);color:var(--text-muted);">${getTimeAgo(new Date(n.createdAt))}</div>
                </div>
              </div>
            </div>`).join('')}
          </div>`}
        </div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeAllModals()">關閉</button></div>
      </div>
    </div>`);
    if(userPreferences.voiceEnabled)speakText(`您有${unread}則未讀通知`);
  }catch(e){showErrorMessage('載入通知失敗');}
}
function getNotificationIcon(t){return{comment:'💬',like:'👍',event:'📅',system:'⚙️',message:'📨'}[t]||'🔔';}
async function markAsRead(id){
  try{await apiCall('markNotificationAsRead',{notificationId:id});const n=notificationsCache.find(x=>String(x.id)===String(id));if(n){n.read=true;updateNotificationBadge();}}
  catch(e){console.error(e);}
}
async function markAllAsRead(){
  try{await apiCall('markAllNotificationsAsRead');notificationsCache.forEach(n=>n.read=true);updateNotificationBadge();showSuccessMessage('所有通知已標記為已讀');showNotifications();}
  catch(e){showErrorMessage('操作失敗');}
}

function initializeCalendar(){currentCalendarDate=new Date();}
function renderCalendar(){
  const grid=document.getElementById('calendar-grid');
  const title=document.getElementById('calendar-title');
  if(!grid||!title)return;
  const y=currentCalendarDate.getFullYear(),m=currentCalendarDate.getMonth();
  title.textContent=`${y}年${m+1}月`;
  grid.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(d=>{const el=document.createElement('div');el.className='calendar-day-header';el.textContent=d;grid.appendChild(el);});
  const first=new Date(y,m,1),start=new Date(first);
  start.setDate(start.getDate()-first.getDay());
  const today=new Date();
  for(let i=0;i<42;i++){
    const cur=new Date(start);cur.setDate(start.getDate()+i);
    const el=document.createElement('div');el.className='calendar-day';el.textContent=cur.getDate();
    if(cur.toDateString()===today.toDateString())el.classList.add('today');
    if(eventsCache.some(e=>new Date(e.date).toDateString()===cur.toDateString()))el.classList.add('has-event');
    const cap=new Date(cur);
    el.addEventListener('click',()=>showDayEvents(cap));
    grid.appendChild(el);
  }
}
function previousMonth(){currentCalendarDate.setMonth(currentCalendarDate.getMonth()-1);renderCalendar();}
function nextMonth(){currentCalendarDate.setMonth(currentCalendarDate.getMonth()+1);renderCalendar();}
function showDayEvents(date){
  const evs=eventsCache.filter(e=>new Date(e.date).toDateString()===date.toDateString());
  if(evs.length===0){showInfoMessage(`${date.getMonth()+1}月${date.getDate()}日沒有活動`);return;}
  showModal(`<div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" style="max-width:500px;" onclick="event.stopPropagation()">
      <div class="modal-header"><h2 class="modal-title">📅 ${date.getMonth()+1}月${date.getDate()}日活動</h2><button class="modal-close" onclick="closeAllModals()">&times;</button></div>
      <div class="modal-body">${evs.map(e=>`<div class="event-item" onclick="showEventDetail('${e.id}')" style="margin-bottom:var(--space-3);">
        <div class="event-details"><div class="event-title">${escapeHtml(e.title)}</div><div class="event-time">⏰ ${escapeHtml(e.time)}</div><div style="color:var(--text-muted);">📍 ${escapeHtml(e.location)}</div><div style="color:var(--text-muted);">👥 ${e.attendees}/${e.maxAttendees}人</div></div>
      </div>`).join('')}</div>
      <div class="modal-footer"><button class="btn btn-outline" onclick="closeAllModals()">關閉</button></div>
    </div>
  </div>`);
}

function setupResourceUpload(){
  const area=document.getElementById('file-upload-area');
  const inp=document.getElementById('file-input');
  let selFile=null,upType='file';
  area.addEventListener('click',()=>{if(upType==='file')inp.click();});
  area.addEventListener('dragover',e=>{e.preventDefault();if(upType==='file')area.classList.add('dragover');});
  area.addEventListener('dragleave',()=>area.classList.remove('dragover'));
  area.addEventListener('drop',e=>{e.preventDefault();area.classList.remove('dragover');if(upType==='file'&&e.dataTransfer.files.length>0)handleResFileSelect(e.dataTransfer.files[0]);});
  inp.addEventListener('change',e=>{if(e.target.files.length>0)handleResFileSelect(e.target.files[0]);});
  function handleResFileSelect(file){
    if(file.size>30*1024*1024){showErrorMessage('檔案大小不能超過30MB');return;}
    selFile=file;
    area.innerHTML=`<div style="color:var(--success);"><span style="font-size:var(--font-2xl);">✅</span><p>已選擇：${escapeHtml(file.name)}</p><p style="font-size:var(--font-sm);color:var(--text-muted);">大小：${formatFileSize(file.size)}</p><button type="button" class="btn btn-outline btn-sm" onclick="clearSelectedFile()">重新選擇</button></div>`;
  }
  window.toggleUploadType=function(type){
    upType=type;
    const fa=document.getElementById('file-upload-area'),la=document.getElementById('link-input-area');
    const ft=document.getElementById('file-tab'),lt=document.getElementById('link-tab');
    if(type==='file'){fa.style.display='block';la.style.display='none';ft.classList.add('btn-primary');ft.classList.remove('btn-outline');lt.classList.add('btn-outline');lt.classList.remove('btn-primary');}

  };
  window.clearSelectedFile=function(){selFile=null;area.innerHTML='<div><span style="font-size:var(--font-2xl);">📁</span><p>點擊選擇或拖曳檔案</p><p style="font-size:var(--font-sm);color:var(--text-muted);">支援PDF、DOC、圖片等格式，最大30MB</p></div>';};
  window.getSelectedResourceFile=()=>selFile;
  window.getUploadType=()=>upType;

async function submitUpload(event){
  event.preventDefault();
  const title=document.getElementById('upload-title').value.trim();
  const category=document.getElementById('upload-category').value;
  const description=document.getElementById('upload-description').value.trim();
  const upType=window.getUploadType?window.getUploadType():'file';
  const file=window.getSelectedResourceFile?window.getSelectedResourceFile():null;
  const linkEl=document.getElementById('resource-link');
  const link=linkEl?linkEl.value.trim():'';
  if(!title||!category||!description){showErrorMessage('請填寫所有必填欄位');return;}
  if(upType==='file'&&!file){showErrorMessage('請選擇要上傳的檔案');return;}
  if(upType==='link'&&!link){showErrorMessage('請輸入資源連結');return;}
  const btn=document.getElementById('submit-upload-btn');btn.disabled=true;btn.textContent='上傳中...';
  try{
    let r;
    if(upType==='file'){
      const ur=await uploadFile(file,'database-resource');
      if(!ur.success)throw new Error('檔案上傳失敗');
      r=await apiCall('createDatabaseItem',{title,category,description,type:'file',fileId:ur.fileId,fileName:file.name,fileSize:file.size,fileType:file.type});
    }else{
      r=await apiCall('createDatabaseItem',{title,category,description,type:'link',url:link});
    }
    if(r.success){closeAllModals();showSuccessMessage('資源上傳成功！');if(currentPage==='database')loadDatabase();}
    else throw new Error(r.error||'上傳失敗');
  }catch(e){showErrorMessage('上傳資源失敗：'+e.message);}
  finally{btn.disabled=false;btn.textContent='上傳資源';}
}

// ── 接續 speakText ──
function speakText(text,options={}){
  if(!userPreferences.voiceEnabled||!text)return;
  try{
    if(speechSynthesisObj)speechSynthesisObj.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=userPreferences.readingSpeed||1.0;
    u.pitch=options.pitch||1.0;
    u.volume=options.volume||1.0;
    const voices=speechSynthesisObj.getVoices();
    const cv=voices.find(v=>v.lang.includes('zh')||v.lang.includes('cmn'));
    if(cv)u.voice=cv;
    u.onstart=()=>{currentUtterance=u;};
    u.onend=()=>{currentUtterance=null;};
    u.onerror=()=>{currentUtterance=null;};
    speechSynthesisObj.speak(u);
  }catch(e){console.error('語音朗讀失敗:',e);}
}
function stopSpeaking(){
  try{if(speechSynthesisObj&&speechSynthesisObj.speaking){speechSynthesisObj.cancel();currentUtterance=null;}}
  catch(e){console.error(e);}
}
function toggleVoice(){
  userPreferences.voiceEnabled=!userPreferences.voiceEnabled;
  const vi=document.getElementById('voice-toggle-icon');
  const vt=document.getElementById('voice-toggle-text');
  if(vi&&vt){
    if(userPreferences.voiceEnabled){vi.textContent='🔊';vt.textContent='關閉語音';speakText('語音功能已開啟');}
    else{vi.textContent='🔇';vt.textContent='開啟語音';stopSpeaking();}
  }
  saveUserPreferences();
  showInfoMessage(userPreferences.voiceEnabled?'語音功能已開啟':'語音功能已關閉');
}

function showNotificationToast(message,type='info',duration=4000){
  try{
    document.querySelectorAll('.notification').forEach(n=>n.remove());
    const n=document.createElement('div');
    n.className=`notification notification-${type}`;
    const icons={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
    n.innerHTML=`<div style="display:flex;align-items:center;gap:var(--space-2);">
      <span style="font-size:var(--font-lg);">${icons[type]||'ℹ️'}</span>
      <span>${escapeHtml(message)}</span>
      <button onclick="this.parentElement.parentElement.remove()" style="background:none;border:none;color:inherit;cursor:pointer;margin-left:auto;font-size:var(--font-lg);">&times;</button>
    </div>`;
    document.body.appendChild(n);
    setTimeout(()=>{
      if(n.parentNode){n.style.opacity='0';n.style.transform='translateY(-20px)';n.style.transition='all 0.3s ease';setTimeout(()=>n.remove(),300);}
    },duration);
  }catch(e){console.error(e);}
}

}

  try{

    if(r.success){
      currentUser=r.user;userApprovalStatus=r.user.approvalStatus||'approved';
