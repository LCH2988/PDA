<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<!-- LINE LIFF SDK -->

<style>
  /* 保持原有的 CSS 樣式 */
  :root {
    --primary: #3b82f6;
    --primary-dark: #2563eb;
    --primary-light: #93c5fd;
    --secondary: #6b7280;
    --success: #10b981;
    --warning: #f59e0b;

    --info: #06b6d4;
    
    --bg-primary: #ffffff;

    --text-primary: #1f2937;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --text-inverse: #ffffff;
    
    --border: #e5e7eb;
    --border-light: #f3f4f6;
    --border-dark: #d1d5db;
    
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    
    --font-xs: 0.75rem;
    --font-sm: 0.875rem;
    --font-base: 1rem;
    --font-lg: 1.125rem;
    --font-xl: 1.25rem;
    --font-2xl: 1.5rem;
    --font-3xl: 1.875rem;
    --font-4xl: 2.25rem;
    
    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-5: 1.25rem;
    --space-6: 1.5rem;
    --space-8: 2rem;
    --space-10: 2.5rem;
    --space-12: 3rem;
    --space-16: 4rem;
    
    --radius-sm: 0.25rem;
    --radius: 0.375rem;
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
    --radius-full: 9999px;
    
    --transition: all 0.2s ease;

  }
  
  * {

  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;

    right: 0;

  }
  
  .loading-content {

  }
  
  .loading-logo {
    display: flex;
    align-items: center;

  }
  
  .loading-logo .logo-icon {

  .loading-text {
    margin-top: var(--space-4);

  .spinner {

  .app {

  }
  
  .container {
    max-width: 1200px;
    margin: 0 auto;

  .header {

  .header-content {

  }
  
  .header-actions {

  }
  
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;

    padding: var(--space-3) var(--space-4);
    font-size: var(--font-base);
    font-weight: 500;

    border: 1px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    text-decoration: none;
    transition: var(--transition);
    white-space: nowrap;
    user-select: none;
  }
  
  .btn-primary {
    background: var(--primary);
    color: var(--text-inverse);
    border-color: var(--primary);
  }
  
  .btn-primary:hover {
    background: var(--primary-dark);
    border-color: var(--primary-dark);

  }
  
  .btn-outline {

    color: var(--text-primary);
    border-color: var(--border-dark);
  }
  
  .btn-outline:hover {
    background: var(--surface-hover);
    color: var(--text-primary);
    text-decoration: none;
  }
  
  .main-container {
    min-height: calc(100vh - 64px);
    background: var(--bg-secondary);
  }
  
  .main-content {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    gap: var(--space-6);
    padding: var(--space-6) var(--space-4);
  }
  
  .content-area {
    flex: 1;
    min-width: 0;
  }
  
  .sidebar {
    width: 280px;
    flex-shrink: 0;
  }
  
  .page {
    animation: fadeIn 0.3s ease;
  }
  
  .page-header {
    margin-bottom: var(--space-6);
  }
  
  .page-title {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    margin-bottom: var(--space-2);
  }
  
  .page-icon {
    font-size: var(--font-2xl);
  }
  
  .page-subtitle {
    color: var(--text-secondary);
    font-size: var(--font-lg);
  }
  
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    transition: var(--transition);
  }
  
  .card:hover {
    box-shadow: var(--shadow);
  }
  
  .card-body {
    padding: var(--space-4);
  }
  
  .feature-card {
    text-align: center;
    transition: var(--transition);
  }
  
  .feature-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  
  .empty-state {
    text-align: center;
    padding: var(--space-8);
    color: var(--text-secondary);
  }
  
  .empty-state h3 {
    color: var(--text-primary);
    margin-bottom: var(--space-2);
  }
  
  .error-message {
    text-align: center;
    padding: var(--space-8);
    color: var(--error);
  }
  
  .notification {
    position: fixed;
    top: 20px;
    right: 20px;
    max-width: 400px;
    padding: var(--space-4);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    z-index: 10001;
    animation: slideDown 0.3s ease;
  }
  
  .notification-success {
    background: var(--success);
    color: var(--text-inverse);
  }
  
  .notification-error {
    background: var(--error);
    color: var(--text-inverse);
  }
  
  .notification-warning {
    background: var(--warning);
    color: var(--text-inverse);
  }
  
  .notification-info {
    background: var(--info);
    color: var(--text-inverse);
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideDown {
    from {
      opacity: 0;
      transform: translateY(-20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  .hidden { display: none !important; }
  .text-center { text-align: center; }
  .text-primary { color: var(--primary); }
  .text-secondary { color: var(--text-secondary); }
  .text-error { color: var(--error); }
  
  @media (max-width: 768px) {
    .main-content {
      flex-direction: column;
      gap: var(--space-4);
      padding: var(--space-4);
    }
    
    .sidebar {
      width: 100%;
      order: -1;
    }
    
    .header-content {
      padding: var(--space-3) 0;
    }
    
    .logo {
      font-size: var(--font-lg);
    }
  }
</style>
</head>

<body>
<!-- 載入畫面 -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-content">
    <div class="loading-logo">
      <span class="logo-icon">🏠</span>

<!-- 主要內容 -->
<div id="app" class="app">
  <!-- 頁首 -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <!-- Logo -->
        <div class="logo">
          <span class="logo-icon">🏠</span>
          <span class="logo-text">LSVTBIG 論壇</span>

        <!-- 頁首動作區 -->
        <div class="header-actions">

          <button id="login-button" class="btn btn-primary" onclick="handleLINELogin()">

      <!-- 主要內容區域 -->
      <main class="content-area">

<script>
  // ═══════════════════════════════════════
  //  全域變數和設定
  // ═══════════════════════════════════════
  
  // API 設定
  const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzeGO3Fd3nYTC2ChpZEW8qqXGwC5s6h_w2O3RIa3b64Yb-CQx5t6pm8ssEpLEaXzYNq/exec';
  const LIFF_ID = '2001679903-jkND3El9';
  
  // 全域變數
  let liffInitialized = false;
  let lineProfile = null;
  let currentUser = null;
  let userApprovalStatus = 'pending';
  let initializationTimeout = null;
  let initializationStartTime = Date.now();
  
  // 使用者偏好設定
  let userPreferences = {
    fontSize: 'medium',
    theme: 'light',
    highContrast: false,
    voiceEnabled: true,
    autoRead: false,
    readingSpeed: 1.0
  };
  
  // ═══════════════════════════════════════
  //  載入進度管理
  // ═══════════════════════════════════════
  
  function updateLoadingProgress(message) {
    const progressElement = document.getElementById('loading-progress');
    if (progressElement) {
      progressElement.textContent = message;
    }
    console.log('📱 載入進度:', message);
  }
  
  // ═══════════════════════════════════════
  //  安全的初始化函數
  // ═══════════════════════════════════════
  
  /**
   * 安全的應用程式初始化
   */
  async function initializeApp() {
    try {
      console.log('🚀 LSVTBIG 論壇初始化開始...');
      updateLoadingProgress('正在初始化系統...');
      
      // 設定初始化超時（10秒）
      initializationTimeout = setTimeout(() => {
        console.warn('⚠️ 初始化超時，啟用緊急模式');
        handleInitializationTimeout();
      }, 10000);
      
      // 載入使用者偏好設定
      loadUserPreferences();
      updateLoadingProgress('載入使用者設定...');
      
      // 嘗試初始化 LINE LIFF
      try {
        updateLoadingProgress('連接 LINE 服務...');
        await initializeLIFF();
      } catch (liffError) {
        console.warn('LINE LIFF 初始化失敗，使用降級模式:', liffError);
        handleLIFFFailure();
      }
      
      // 套用使用者偏好
      updateLoadingProgress('套用個人設定...');
      applyUserPreferences();
      
      // 設定基本功能
      updateLoadingProgress('設定系統功能...');
      setupBasicFeatures();
      
      // 清除超時
      if (initializationTimeout) {
        clearTimeout(initializationTimeout);
        initializationTimeout = null;
      }
      
      updateLoadingProgress('初始化完成！');
      console.log('✅ LSVTBIG 論壇初始化完成');
      
      // 顯示應用程式
      setTimeout(showApp, 500);
      
    } catch (error) {
      console.error('❌ 初始化失敗:', error);
      handleInitializationError(error);
    }
  }
  
  /**
   * 處理初始化超時
   */
  function handleInitializationTimeout() {
    console.warn('⚠️ 系統初始化超時，啟用緊急模式');
    updateLoadingProgress('啟用緊急模式...');
    
    // 強制顯示應用程式
    showApp();
    
    // 顯示超時警告
    setTimeout(() => {
      showWarningMessage('系統載入較慢，部分功能可能需要稍後才能使用');
    }, 1000);
  }
  
  /**
   * 處理初始化錯誤
   */
  function handleInitializationError(error) {
    console.error('❌ 系統初始化失敗:', error);
    updateLoadingProgress('初始化失敗，啟用安全模式...');
    
    // 顯示錯誤頁面
    showErrorPage(error);
  }
  
  /**
   * 顯示錯誤頁面
   */
  function showErrorPage(error) {
    const app = document.getElementById('app');
    const loadingScreen = document.getElementById('loading-screen');
    
    if (app) {
      app.innerHTML = `
        <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--space-4);">
          <div style="text-align: center; max-width: 500px;">
            <div style="font-size: 4rem; margin-bottom: var(--space-4);">😔</div>
            <h1 style="color: var(--error); margin-bottom: var(--space-3);">系統載入失敗</h1>
            <p style="color: var(--text-secondary); margin-bottom: var(--space-4); line-height: 1.6;">
              很抱歉，系統在載入過程中遇到問題。請嘗試以下解決方案：
            </p>
            <div style="text-align: left; margin-bottom: var(--space-4);">
              <ul style="color: var(--text-secondary);">
                <li>重新整理頁面</li>
                <li>檢查網路連線</li>
                <li>清除瀏覽器快取</li>
                <li>嘗試使用其他瀏覽器</li>
              </ul>
            </div>
            <div style="display: flex; gap: var(--space-3); justify-content: center; flex-wrap: wrap;">
              <button class="btn btn-primary" onclick="window.location.reload()">
                🔄 重新載入
              </button>
              <button class="btn btn-outline" onclick="showTechnicalDetails()">
                🔧 技術詳情
              </button>
            </div>
            <div id="technical-details" style="display: none; margin-top: var(--space-4); padding: var(--space-3); background: var(--bg-secondary); border-radius: var(--radius); text-align: left;">
              <h4>錯誤詳情：</h4>
              <pre style="font-size: var(--font-sm); color: var(--error); overflow-x: auto;">${error.message || error}</pre>
            </div>
          </div>
        </div>
      `;
      
      // 隱藏載入畫面，顯示錯誤頁面
      if (loadingScreen) loadingScreen.style.display = 'none';
      app.style.display = 'block';
    }
  }
  
  /**
   * 顯示技術詳情
   */
  function showTechnicalDetails() {
    const details = document.getElementById('technical-details');
    if (details) {
      details.style.display = details.style.display === 'none' ? 'block' : 'none';
    }
  }
  
  /**
   * 顯示應用程式
   */
  function showApp() {
    const loadingScreen = document.getElementById('loading-screen');
    const app = document.getElementById('app');
    
    if (loadingScreen && app) {
      // 淡出載入畫面
      loadingScreen.style.opacity = '0';
      loadingScreen.style.transition = 'opacity 0.5s ease';
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        app.style.display = 'block';
        
        // 淡入應用程式
        app.style.opacity = '0';
        app.style.transition = 'opacity 0.5s ease';
        
        setTimeout(() => {
          app.style.opacity = '1';
        }, 50);
      }, 500);
    }
    
    const totalTime = Date.now() - initializationStartTime;
    console.log(`📊 系統載入完成，總耗時：${totalTime}ms`);
  }
  
  // ═══════════════════════════════════════
  //  LINE LIFF 初始化
  // ═══════════════════════════════════════
  
  /**
   * 初始化 LINE LIFF
   */
  async function initializeLIFF() {
    try {
      console.log('初始化 LINE LIFF...');
      
      // 檢查 LIFF SDK 是否載入
      if (typeof liff === 'undefined') {
        throw new Error('LINE LIFF SDK 未載入');
      }
      
      await liff.init({ liffId: LIFF_ID });
      liffInitialized = true;
      
      console.log('LINE LIFF 初始化成功');
      
      // 檢查登入狀態
      if (liff.isLoggedIn()) {
        await handleLIFFLogin();
      } else {
        showLoginRequired();
      }
      
    } catch (error) {
      console.error('LINE LIFF 初始化失敗:', error);
      throw error;
    }
  }
  
  /**
   * 處理 LIFF 初始化失敗
   */
  function handleLIFFFailure() {
    console.warn('LIFF 初始化失敗，使用降級模式');
    showManualLoginOption();
  }
  
  /**
   * 處理 LINE 登入
   */
  async function handleLIFFLogin() {
    try {
      console.log('處理 LINE 登入...');
      
      // 取得 LINE 使用者資料
      lineProfile = await liff.getProfile();
      console.log('LINE 使用者資料:', lineProfile);
      
      // 模擬登入成功（在實際環境中這裡會呼叫後端 API）
      currentUser = {
        '使用者ID': lineProfile.userId,
        '實名': lineProfile.displayName,
        'LINE顯示名稱': lineProfile.displayName,
        'LINE頭像': lineProfile.pictureUrl,
        '角色': 'user',
        '審核狀態': 'approved' // 為了演示，直接設為已審核
      };
      
      userApprovalStatus = 'approved';
      
      console.log('使用者登入成功:', currentUser);
      updateUserInterface(true);
      
    } catch (error) {
      console.error('處理 LINE 登入失敗:', error);
      throw error;
    }
  }
  
  // ═══════════════════════════════════════
  //  基本功能設定
  // ═══════════════════════════════════════
  
  /**
   * 設定基本功能
   */
  function setupBasicFeatures() {
    // 設定鍵盤快捷鍵
    setupKeyboardShortcuts();
    
    // 設定語音功能
    if (userPreferences.voiceEnabled) {
      setupVoiceFeatures();
    }
    
    // 設定錯誤處理
    setupErrorHandling();
    
    console.log('基本功能設定完成');
  }
  
  /**
   * 設定鍵盤快捷鍵
   */
  function setupKeyboardShortcuts() {
    document.addEventListener('keydown', function(event) {
      // 只在沒有焦點在輸入框時才執行快捷鍵
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
        return;
      }
      
      // Escape 鍵關閉模態框
      if (event.key === 'Escape') {
        closeAllModals();
      }
    });
  }
  
  /**
   * 設定語音功能
   */
  function setupVoiceFeatures() {
    if (!('speechSynthesis' in window)) {
      console.warn('此瀏覽器不支援語音合成功能');
      userPreferences.voiceEnabled = false;
      return;
    }
    
    console.log('語音功能已啟用');
  }
  
  /**
   * 設定錯誤處理
   */
  function setupErrorHandling() {
    // 全域錯誤處理
    window.addEventListener('error', function(event) {
      console.error('全域錯誤:', event.error);
      
      // 避免顯示太多錯誤訊息
      if (event.error && event.error.message && !event.error.message.includes('Script error')) {
        showErrorMessage('系統發生錯誤，請重新整理頁面');
      }
    });
    
    // Promise 錯誤處理
    window.addEventListener('unhandledrejection', function(event) {
      console.error('未處理的 Promise 錯誤:', event.reason);
      event.preventDefault();
    });
  }
  
  // ═══════════════════════════════════════
  //  使用者介面更新
  // ═══════════════════════════════════════
  
  /**
   * 更新使用者介面
   */
  function updateUserInterface(isLoggedIn) {
    const loginButton = document.getElementById('login-button');
    const userMenu = document.getElementById('user-menu');
    const userAvatar = document.getElementById('user-avatar');
    const userName = document.getElementById('user-name');
    
    if (isLoggedIn && currentUser) {
      // 更新使用者頭像和名稱
      if (userAvatar && lineProfile) {
        userAvatar.innerHTML = `<img src="${lineProfile.pictureUrl}" alt="頭像" style="width: 24px; height: 24px; border-radius: 50%; object-fit: cover;">`;
      }
      
      if (userName) {
        userName.textContent = currentUser['實名'] || lineProfile.displayName;
      }
      
      // 隱藏登入按鈕
      if (loginButton) {
        loginButton.style.display = 'none';
      }
      
      // 顯示使用者選單
      if (userMenu) {
        userMenu.style.display = 'block';
      }
      
      showSuccessMessage(`歡迎回來，${currentUser['實名']}！`);
    }
  }
  
  /**
   * 顯示需要登入訊息
   */
  function showLoginRequired() {
    // 更新側邊欄
    updateSidebarForGuest();
  }
  
  /**
   * 更新訪客側邊欄
   */
  function updateSidebarForGuest() {
    const sidebar = document.querySelector('.sidebar');
    if (sidebar) {
      sidebar.innerHTML = `
        <div class="quick-actions">
          <div class="card">
            <div class="card-body" style="text-align: center;">
              <h3 style="margin: 0 0 var(--space-3) 0;">歡迎使用</h3>
              <p style="color: var(--text-secondary); margin-bottom: var(--space-4);">
                請使用 LINE 登入以體驗完整功能
              </p>
              <button class="btn btn-primary" onclick="handleLINELogin()">
                📱 LINE 登入
              </button>
            </div>
          </div>
        </div>
      `;
    }
  }
  
  /**
   * 顯示手動登入選項
   */
  function showManualLoginOption() {
    updateSidebarForGuest();
    showWarningMessage('LINE 登入系統暫時無法使用，請稍後再試');
  }
  
  // ═══════════════════════════════════════
  //  使用者偏好設定
  // ═══════════════════════════════════════
  
  /**
   * 載入使用者偏好設定
   */
  function loadUserPreferences() {
    try {
      const saved = localStorage.getItem('lsvtbig_preferences');
      if (saved) {
        const preferences = JSON.parse(saved);
        userPreferences = { ...userPreferences, ...preferences };
      }
      
      console.log('載入使用者偏好設定:', userPreferences);
      
    } catch (error) {
      console.error('載入使用者偏好設定失敗:', error);
    }
  }
  
  /**
   * 儲存使用者偏好設定
   */
  function saveUserPreferences() {
    try {
      localStorage.setItem('lsvtbig_preferences', JSON.stringify(userPreferences));
      console.log('儲存使用者偏好設定:', userPreferences);
      
    } catch (error) {
      console.error('儲存使用者偏好設定失敗:', error);
    }
  }
  
  /**
   * 套用使用者偏好設定
   */
  function applyUserPreferences() {
    // 套用字體大小
    document.body.className = document.body.className.replace(/font-\w+/g, '');
    document.body.classList.add(`font-${userPreferences.fontSize}`);
    
    // 套用主題
    document.documentElement.setAttribute('data-theme', userPreferences.theme);
    
    // 套用高對比模式
    if (userPreferences.highContrast) {
      document.documentElement.setAttribute('data-theme', 'high-contrast');
    }
    
    console.log('套用使用者偏好設定');
  }
  
  // ═══════════════════════════════════════
  //  事件處理函數
  // ═══════════════════════════════════════
  
  /**
   * 處理 LINE 登入按鈕點擊
   */
  function handleLINELogin() {
    try {
      if (!liffInitialized) {
        showErrorMessage('LINE 登入系統尚未初始化，請重新整理頁面');
        return;
      }
      
      if (liff.isLoggedIn()) {
        handleLIFFLogin();
      } else {
        liff.login();
      }
      
    } catch (error) {
      console.error('LINE 登入失敗:', error);
      showErrorMessage('LINE 登入失敗：' + error.message);
    }
  }
  
  /**
   * 顯示登入資訊
   */
  function showLoginInfo() {
    if (currentUser) {
      showInfoMessage('您已經登入了！');
    } else {
      handleLINELogin();
    }
  }
  
  /**
   * 顯示使用者資料
   */
  function showUserProfile() {
    if (!currentUser) {
      showErrorMessage('使用者未登入');
      return;
    }
    
    showInfoMessage('使用者資料功能開發中');
  }
  
  /**
   * 顯示設定
   */
  function showSettings() {
    showInfoMessage('設定功能開發中');
  }
  
  /**
   * 顯示說明
   */
  function showHelp() {
    const helpContent = `
      <div style="line-height: 1.8;">
        <h3>🚀 快速入門</h3>
        <ol>
          <li>使用 LINE 帳號登入</li>
          <li>完成實名註冊</li>
          <li>等待審核通過</li>
          <li>開始使用完整功能</li>
        </ol>
        
        <h3>✨ 主要功能</h3>
        <ul>
          <li><strong>討論區：</strong>發表文章、參與討論</li>
          <li><strong>資料庫：</strong>瀏覽實用資源</li>
          <li><strong>行事曆：</strong>查看活動資訊</li>
          <li><strong>語音朗讀：</strong>文章內容語音播放</li>
        </ul>
        
        <h3>♿ 無障礙功能</h3>
        <ul>
          <li>五種字體大小選擇</li>
          <li>淺色/深色主題切換</li>
          <li>高對比模式</li>
          <li>語音朗讀功能</li>
        </ul>
      </div>
    `;
    
    showModal(`
      <div class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" style="max-width: 600px;" onclick="event.stopPropagation()">
          <div style="padding: var(--space-4); border-bottom: 1px solid var(--border);">
            <h2 style="margin: 0;">❓ 使用說明</h2>
          </div>
          <div style="padding: var(--space-4); max-height: 60vh; overflow-y: auto;">
            ${helpContent}
          </div>
          <div style="padding: var(--space-4); border-top: 1px solid var(--border); text-align: right;">
            <button class="btn btn-primary" onclick="closeAllModals()">了解</button>
          </div>
        </div>
      </div>
    `);
  }
  
  // ═══════════════════════════════════════
  //  模態框功能
  // ═══════════════════════════════════════
  
  /**
   * 顯示模態框
   */
  function showModal(html) {
    closeAllModals();
    
    const modalContainer = document.createElement('div');
    modalContainer.innerHTML = html;
    document.body.appendChild(modalContainer);
    
    // 防止背景滾動
    document.body.style.overflow = 'hidden';
  }
  
  /**
   * 關閉模態框
   */
  function closeModal(event) {
    if (event && event.target === event.currentTarget) {
      closeAllModals();
    }
  }
  
  /**
   * 關閉所有模態框
   */
  function closeAllModals() {
    const modals = document.querySelectorAll('.modal-overlay');
    modals.forEach(modal => modal.remove());
    
    // 恢復背景滾動
    document.body.style.overflow = '';
  }
  
  // ═══════════════════════════════════════
  //  訊息提示功能
  // ═══════════════════════════════════════
  
  /**
   * 顯示成功訊息
   */
  function showSuccessMessage(message) {
    showNotificationToast(message, 'success');
  }
  
  /**
   * 顯示錯誤訊息
   */
  function showErrorMessage(message) {
    showNotificationToast(message, 'error');
  }
  
  /**
   * 顯示警告訊息
   */
  function showWarningMessage(message) {
    showNotificationToast(message, 'warning');
  }
  
  /**
   * 顯示資訊訊息
   */
  function showInfoMessage(message) {
    showNotificationToast(message, 'info');
  }
  
  /**
   * 顯示通知提示
   */
  function showNotificationToast(message, type = 'info', duration = 4000) {
    // 移除現有通知
    const existingNotifications = document.querySelectorAll('.notification');
    existingNotifications.forEach(notification => notification.remove());
    
    // 創建通知元素
    const notification = document.createElement('div');
    notification.className = `notification notification-${type}`;
    
    // 圖示映射
    const icons = {
      success: '✅',
      error: '❌',
      warning: '⚠️',
      info: 'ℹ️'
    };
    
    notification.innerHTML = `
      <div style="display: flex; align-items: center; gap: var(--space-2);">
        <span style="font-size: var(--font-lg);">${icons[type]}</span>
        <span>${escapeHtml(message)}</span>
        <button onclick="this.parentElement.parentElement.remove()" 
                style="background: none; border: none; color: inherit; cursor: pointer; margin-left: auto; font-size: var(--font-lg);">
          &times;
        </button>
      </div>
    `;
    
    // 添加到頁面
    document.body.appendChild(notification);
    
    // 自動移除
    setTimeout(() => {
      if (notification.parentNode) {
        notification.style.opacity = '0';
        notification.style.transform = 'translateY(-20px)';
        setTimeout(() => notification.remove(), 300);
      }
    }, duration);
  }
  
  // ═══════════════════════════════════════
  //  工具函數
  // ═══════════════════════════════════════
  
  /**
   * HTML 轉義
   */
  function escapeHtml(text) {
    if (!text) return '';
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }
  
  // ═══════════════════════════════════════
  //  頁面載入事件
  // ═══════════════════════════════════════
  
  // 確保 DOM 完全載入後才初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initializeApp);
  } else {
    // DOM 已經載入完成
    setTimeout(initializeApp, 100);
  }
  
  // 頁面完全載入事件
  window.addEventListener('load', function() {
    console.log('📱 頁面完全載入');
  });
  
  // 頁面卸載前的清理
  window.addEventListener('beforeunload', function() {
    // 清理超時
    if (initializationTimeout) {
      clearTimeout(initializationTimeout);
    }
    
    // 儲存使用者偏好設定
    saveUserPreferences();
  });
  
  // 記錄開始時間
  console.log(`

  ╚══════════════════════════════════════╝
  `);
</script>
