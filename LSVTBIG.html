<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>樂齡專業分享平台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi5qiC6Iqh5bCo5qWt5YiG5Lqr5bmz5Y+wIiwic2hvcnRfbmFtZSI6IuWIhuS6q+W5s+WPsCIsInN0YXJ0X3VybCI6Ii4vIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJ0aGVtZV9jb2xvciI6IiM2NjdlZWEiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiI2ZmZmZmZiJ9">
  <style>
      :root {
          --primary-color: #667eea;
          --secondary-color: #764ba2;
          --success-color: #48bb78;
          --warning-color: #ed8936;
          --error-color: #f56565;
          --info-color: #4299e1;
          --text-primary: #2d3748;
          --text-secondary: #4a5568;
          --text-muted: #718096;
          --bg-primary: #ffffff;
          --bg-secondary: #f7fafc;
          --bg-accent: #edf2f7;
          --border-color: #e2e8f0;
          --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
          --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
          --border-radius: 12px;
          --border-radius-lg: 16px;
          --spacing-xs: 4px;
          --spacing-sm: 8px;
          --spacing-md: 16px;
          --spacing-lg: 24px;
          --spacing-xl: 32px;
          --font-size-xs: 12px;
          --font-size-sm: 14px;
          --font-size-base: 16px;
          --font-size-lg: 18px;
          --font-size-xl: 20px;
          --font-size-2xl: 24px;
          --font-size-3xl: 28px;
      }

      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          -webkit-tap-highlight-color: transparent;
      }

      body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', 'PingFang TC', 'Hiragino Sans GB', sans-serif;
          font-size: var(--font-size-base);
          line-height: 1.6;
          color: var(--text-primary);
          background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
          min-height: 100vh;
          min-height: 100dvh;
          overflow-x: hidden;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
      }

      .app-container {
          max-width: 100%;
          min-height: 100vh;
          min-height: 100dvh;
          display: flex;
          flex-direction: column;
          position: relative;
      }

      /* 頂部狀態欄 */
      .status-bar {
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          height: 44px;
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-bottom: 1px solid var(--border-color);
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 var(--spacing-md);
          z-index: 1000;
          font-size: var(--font-size-sm);
          font-weight: 500;
      }

      .user-info {
          display: flex;
          align-items: center;
          gap: var(--spacing-sm);
      }

      .user-avatar {
          width: 28px;
          height: 28px;
          border-radius: 50%;
          background: var(--primary-color);
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-size: var(--font-size-xs);
          font-weight: bold;
      }

      .connection-status {
          display: flex;
          align-items: center;
          gap: var(--spacing-xs);
          font-size: var(--font-size-xs);
      }

      .status-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--success-color);
          animation: pulse 2s infinite;
      }

      .status-dot.disconnected {
          background: var(--error-color);
      }

      @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
      }

      /* 主要內容區域 */
      .main-content {
          flex: 1;
          padding-top: 44px;
          padding-bottom: 80px;
      }

      /* 頁面標題 */
      .page-header {
          background: var(--bg-primary);
          padding: var(--spacing-lg) var(--spacing-md);
          margin: var(--spacing-md);
          border-radius: var(--border-radius-lg);
          box-shadow: var(--shadow);
          text-align: center;
      }

      .page-title {
          font-size: var(--font-size-3xl);
          font-weight: bold;
          color: var(--text-primary);
          margin-bottom: var(--spacing-sm);
      }

      .page-subtitle {
          font-size: var(--font-size-base);
          color: var(--text-muted);
      }

      /* 導航選項卡 */
      .nav-tabs {
          display: flex;
          background: var(--bg-primary);
          margin: 0 var(--spacing-md) var(--spacing-md);
          border-radius: var(--border-radius-lg);
          box-shadow: var(--shadow);
          overflow: hidden;
      }

      .nav-tab {
          flex: 1;
          padding: var(--spacing-md);
          text-align: center;
          background: transparent;
          border: none;
          cursor: pointer;
          transition: all 0.3s ease;
          font-size: var(--font-size-base);
          font-weight: 500;
          color: var(--text-muted);
          position: relative;
      }

      .nav-tab.active {
          color: var(--primary-color);
          background: rgba(102, 126, 234, 0.1);
      }

      .nav-tab.active::after {
          content: '';
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          height: 3px;
          background: var(--primary-color);
          border-radius: 3px 3px 0 0;
      }

      /* 內容面板 */
      .content-panel {
          display: none;
          padding: 0 var(--spacing-md);
      }

      .content-panel.active {
          display: block;
      }

      /* 操作按鈕組 */
      .action-buttons {
          display: flex;
          gap: var(--spacing-sm);
          margin-bottom: var(--spacing-lg);
          flex-wrap: wrap;
      }

      .btn {
          flex: 1;
          min-width: 120px;
          padding: var(--spacing-md) var(--spacing-lg);
          border: none;
          border-radius: var(--border-radius);
          font-size: var(--font-size-base);
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: var(--spacing-sm);
          box-shadow: var(--shadow);
          text-decoration: none;
          position: relative;
          overflow: hidden;
      }

      .btn::before {
          content: '';
          position: absolute;
          top: 50%;
          left: 50%;
          width: 0;
          height: 0;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.3);
          transition: all 0.3s ease;
          transform: translate(-50%, -50%);
      }

      .btn:active::before {
          width: 300px;
          height: 300px;
      }

      .btn:disabled {
          opacity: 0.6;
          cursor: not-allowed;
      }

      .btn-primary {
          background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
          color: white;
      }

      .btn-success {
          background: linear-gradient(135deg, var(--success-color), #38a169);
          color: white;
      }

      .btn-info {
          background: linear-gradient(135deg, var(--info-color), #3182ce);
          color: white;
      }

      .btn-warning {
          background: linear-gradient(135deg, var(--warning-color), #dd6b20);
          color: white;
      }

      .btn-secondary {
          background: var(--bg-accent);
          color: var(--text-primary);
      }

      /* 篩選器 */
      .filter-section {
          background: var(--bg-primary);
          border-radius: var(--border-radius);
          padding: var(--spacing-md);
          margin-bottom: var(--spacing-lg);
          box-shadow: var(--shadow);
      }

      .filter-group {
          margin-bottom: var(--spacing-md);
      }

      .filter-label {
          display: block;
          font-size: var(--font-size-sm);
          font-weight: 600;
          color: var(--text-primary);
          margin-bottom: var(--spacing-sm);
      }

      .filter-select {
          width: 100%;
          padding: var(--spacing-md);
          border: 2px solid var(--border-color);
          border-radius: var(--border-radius);
          font-size: var(--font-size-base);
          background: var(--bg-primary);
          color: var(--text-primary);
          cursor: pointer;
          transition: border-color 0.3s ease;
      }

      .filter-select:focus {
          outline: none;
          border-color: var(--primary-color);
      }

      /* 內容列表 */
      .content-list {
          display: flex;
          flex-direction: column;
          gap: var(--spacing-md);
      }

      .content-item {
          background: var(--bg-primary);
          border-radius: var(--border-radius-lg);
          padding: var(--spacing-lg);
          box-shadow: var(--shadow);
          transition: transform 0.3s ease, box-shadow 0.3s ease;
          position: relative;
          overflow: hidden;
      }

      .content-item:active {
          transform: scale(0.98);
      }

      .content-item::before {
          content: '';
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 4px;
          background: var(--primary-color);
      }

      .content-header {
          display: flex;
          justify-content: space-between;
          align-items: flex-start;
          margin-bottom: var(--spacing-md);
      }

      .content-title {
          font-size: var(--font-size-lg);
          font-weight: bold;
          color: var(--text-primary);
          line-height: 1.4;
          margin-bottom: var(--spacing-xs);
      }

      .content-category {
          display: inline-block;
          padding: var(--spacing-xs) var(--spacing-sm);
          background: rgba(102, 126, 234, 0.1);
          color: var(--primary-color);
          border-radius: 20px;
          font-size: var(--font-size-xs);
          font-weight: 600;
      }

      .content-body {
          color: var(--text-secondary);
          line-height: 1.6;
          margin-bottom: var(--spacing-md);
      }

      .content-attachments {
          display: flex;
          flex-wrap: wrap;
          gap: var(--spacing-sm);
          margin-bottom: var(--spacing-md);
      }

      .attachment-item {
          display: flex;
          align-items: center;
          gap: var(--spacing-xs);
          padding: var(--spacing-sm) var(--spacing-md);
          background: var(--bg-accent);
          border-radius: var(--border-radius);
          font-size: var(--font-size-sm);
          color: var(--text-secondary);
          text-decoration: none;
          transition: background-color 0.3s ease;
      }

      .attachment-item:hover {
          background: var(--border-color);
      }

      .content-footer {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-top: var(--spacing-md);
          border-top: 1px solid var(--border-color);
          font-size: var(--font-size-sm);
          color: var(--text-muted);
      }

      .content-meta {
          display: flex;
          flex-direction: column;
          gap: var(--spacing-xs);
      }

      .content-actions {
          display: flex;
          gap: var(--spacing-sm);
      }

      .action-btn {
          padding: var(--spacing-sm) var(--spacing-md);
          border: none;
          border-radius: var(--border-radius);
          font-size: var(--font-size-sm);
          font-weight: 500;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          gap: var(--spacing-xs);
      }

      .action-btn.like {
          background: rgba(72, 187, 120, 0.1);
          color: var(--success-color);
      }

      .action-btn.share {
          background: rgba(66, 153, 225, 0.1);
          color: var(--info-color);
      }

      /* 相簿網格 */
      .gallery-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: var(--spacing-md);
      }

      .gallery-item {
          background: var(--bg-primary);
          border-radius: var(--border-radius);
          overflow: hidden;
          box-shadow: var(--shadow);
          transition: transform 0.3s ease;
      }

      .gallery-item:active {
          transform: scale(0.95);
      }

      .gallery-image {
          width: 100%;
          height: 120px;
          object-fit: cover;
          background: var(--bg-accent);
          display: flex;
          align-items: center;
          justify-content: center;
          color: var(--text-muted);
          font-size: var(--font-size-lg);
      }

      .gallery-info {
          padding: var(--spacing-md);
      }

      .gallery-title {
          font-size: var(--font-size-sm);
          font-weight: 600;
          color: var(--text-primary);
          margin-bottom: var(--spacing-xs);
      }

      .gallery-meta {
          font-size: var(--font-size-xs);
          color: var(--text-muted);
      }

      /* 模態視窗 */
      .modal {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.8);
          z-index: 2000;
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
      }

      .modal.active {
          display: flex;
          align-items: flex-end;
      }

      .modal-content {
          width: 100%;
          max-height: 90vh;
          background: var(--bg-primary);
          border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0;
          padding: var(--spacing-lg);
          overflow-y: auto;
          transform: translateY(100%);
          transition: transform 0.3s ease;
      }

      .modal.active .modal-content {
          transform: translateY(0);
      }

      .modal-header {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: var(--spacing-lg);
          padding-bottom: var(--spacing-md);
          border-bottom: 1px solid var(--border-color);
      }

      .modal-title {
          font-size: var(--font-size-xl);
          font-weight: bold;
          color: var(--text-primary);
      }

      .modal-close {
          width: 32px;
          height: 32px;
          border: none;
          background: var(--bg-accent);
          border-radius: 50%;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: var(--font-size-lg);
          color: var(--text-muted);
      }

      /* 表單樣式 */
      .form-group {
          margin-bottom: var(--spacing-lg);
      }

      .form-label {
          display: block;
          font-size: var(--font-size-base);
          font-weight: 600;
          color: var(--text-primary);
          margin-bottom: var(--spacing-sm);
      }

      .form-control {
          width: 100%;
          padding: var(--spacing-md);
          border: 2px solid var(--border-color);
          border-radius: var(--border-radius);
          font-size: var(--font-size-base);
          background: var(--bg-primary);
          color: var(--text-primary);
          transition: border-color 0.3s ease;
          resize: vertical;
      }

      .form-control:focus {
          outline: none;
          border-color: var(--primary-color);
      }

      .form-control.textarea {
          min-height: 120px;
          font-family: inherit;
      }

      /* 檔案上傳 */
      .file-upload {
          border: 2px dashed var(--border-color);
          border-radius: var(--border-radius);
          padding: var(--spacing-xl);
          text-align: center;
          background: var(--bg-secondary);
          cursor: pointer;
          transition: all 0.3s ease;
      }

      .file-upload:hover {
          border-color: var(--primary-color);
          background: rgba(102, 126, 234, 0.05);
      }

      .file-upload.dragover {
          border-color: var(--primary-color);
          background: rgba(102, 126, 234, 0.1);
      }

      .file-upload input {
          display: none;
      }

      .upload-icon {
          font-size: var(--font-size-3xl);
          color: var(--text-muted);
          margin-bottom: var(--spacing-md);
      }

      .upload-text {
          font-size: var(--font-size-base);
          color: var(--text-muted);
          margin-bottom: var(--spacing-sm);
      }

      .upload-hint {
          font-size: var(--font-size-sm);
          color: var(--text-muted);
      }

      /* 檔案預覽 */
      .file-preview {
          margin-top: var(--spacing-md);
      }

      .preview-item {
          display: flex;
          align-items: center;
          gap: var(--spacing-md);
          padding: var(--spacing-md);
          background: var(--bg-secondary);
          border-radius: var(--border-radius);
          margin-bottom: var(--spacing-sm);
      }

      .preview-thumbnail {
          width: 48px;
          height: 48px;
          border-radius: var(--border-radius);
          object-fit: cover;
          background: var(--bg-accent);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: var(--font-size-lg);
          color: var(--text-muted);
      }

      .preview-info {
          flex: 1;
      }

      .preview-name {
          font-size: var(--font-size-sm);
          font-weight: 600;
          color: var(--text-primary);
          margin-bottom: var(--spacing-xs);
      }

      .preview-size {
          font-size: var(--font-size-xs);
          color: var(--text-muted);
      }

      .preview-remove {
          width: 32px;
          height: 32px;
          border: none;
          background: var(--error-color);
          color: white;
          border-radius: 50%;
          cursor: pointer;
          font-size: var(--font-size-sm);
      }

      /* 底部導航 */
      .bottom-nav {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          height: 80px;
          background: rgba(255, 255, 255, 0.95);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border-top: 1px solid var(--border-color);
          display: flex;
          align-items: center;
          justify-content: space-around;
          padding: var(--spacing-sm) 0;
          z-index: 1000;
      }

      .nav-item {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: var(--spacing-xs);
          padding: var(--spacing-sm);
          border-radius: var(--border-radius);
          cursor: pointer;
          transition: all 0.3s ease;
          color: var(--text-muted);
          font-size: var(--font-size-xs);
          font-weight: 500;
          min-width: 60px;
      }

      .nav-item.active {
          color: var(--primary-color);
          background: rgba(102, 126, 234, 0.1);
      }

      .nav-icon {
          font-size: var(--font-size-lg);
      }

      /* 訊息提示 */
      .toast {
          position: fixed;
          top: 60px;
          left: var(--spacing-md);
          right: var(--spacing-md);
          padding: var(--spacing-md);
          border-radius: var(--border-radius);
          font-size: var(--font-size-sm);
          font-weight: 500;
          z-index: 3000;
          transform: translateY(-100px);
          opacity: 0;
          transition: all 0.3s ease;
      }

      .toast.show {
          transform: translateY(0);
          opacity: 1;
      }

      .toast.success {
          background: var(--success-color);
          color: white;
      }

      .toast.error {
          background: var(--error-color);
          color: white;
      }

      .toast.info {
          background: var(--info-color);
          color: white;
      }

      /* 載入動畫 */
      .loading {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: var(--spacing-xl);
          color: var(--text-muted);
      }

      .loading-spinner {
          width: 32px;
          height: 32px;
          border: 3px solid var(--border-color);
          border-top: 3px solid var(--primary-color);
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: var(--spacing-md);
      }

      @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
      }

      /* 空狀態 */
      .empty-state {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          padding: var(--spacing-xl);
          text-align: center;
          color: var(--text-muted);
      }

      .empty-icon {
          font-size: 48px;
          margin-bottom: var(--spacing-md);
          opacity: 0.5;
      }

      .empty-title {
          font-size: var(--font-size-lg);
          font-weight: 600;
          margin-bottom: var(--spacing-sm);
      }

      .empty-text {
          font-size: var(--font-size-base);
          line-height: 1.6;
      }

      /* 響應式設計 */
      @media (max-width: 480px) {
          .action-buttons {
              flex-direction: column;
          }
          
          .btn {
              min-width: auto;
          }
          
          .gallery-grid {
              grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
          }
          
          .gallery-image {
              height: 100px;
          }
      }

      /* PWA 支援 */
      @media (display-mode: standalone) {
          .status-bar {
              padding-top: env(safe-area-inset-top);
              height: calc(44px + env(safe-area-inset-top));
          }
          
          .main-content {
              padding-top: calc(44px + env(safe-area-inset-top));
          }
          
          .bottom-nav {
              padding-bottom: env(safe-area-inset-bottom);
              height: calc(80px + env(safe-area-inset-bottom));
          }
          
          .main-content {
              padding-bottom: calc(80px + env(safe-area-inset-bottom));
          }
      }

      /* 深色模式支援 */
      @media (prefers-color-scheme: dark) {
          :root {
              --text-primary: #f7fafc;
              --text-secondary: #e2e8f0;
              --text-muted: #a0aec0;
              --bg-primary: #2d3748;
              --bg-secondary: #4a5568;
              --bg-accent: #718096;
              --border-color: #4a5568;
          }
      }

      /* 可訪問性 */
      @media (prefers-reduced-motion: reduce) {
          * {
              animation-duration: 0.01ms !important;
              animation-iteration-count: 1 !important;
              transition-duration: 0.01ms !important;
          }
      }

      /* 高對比模式 */
      @media (prefers-contrast: high) {
          :root {
              --border-color: #000000;
              --shadow: 0 0 0 1px #000000;
          }
      }
  </style>
</head>
<body>
  <!-- 狀態欄 -->
  <div class="status-bar">

  <!-- 模態視窗 -->
  <div class="modal" id="modal">
      <div class="modal-content">
          <div class="modal-header">
              <h3 class="modal-title" id="modalTitle">標題</h3>
              <button class="modal-close" onclick="closeModal()">✕</button>
          </div>
          <div id="modalBody"></div>
      </div>

  <!-- 訊息提示 -->
  <div class="toast" id="toast"></div>

  <script>
      // 全域變數
      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxO_qPfNBfANTmUFhbjN18fsgCiWnmm8ALNYAvHpWtphIgIRA2NhqSwTD0y4M0bMWcjLw/exec';
      
      let currentUser = {
          name: '訪客',
          role: 'user',
          avatar: '👤'
      };
      
      let currentPosts = [];
      let currentInfo = [];
      let currentGallery = [];
      let selectedFiles = [];
      let isConnected = false;
      let liffReady = false;

      // 初始化應用
      window.addEventListener('DOMContentLoaded', function() {
          initializeApp();
      });

      async function initializeApp() {
          console.log('初始化應用...');
          
          // 載入用戶資訊
          loadUserInfo();
          
          // 初始化 LIFF (如果可用)
          initializeLIFF();
          
          // 測試連線
          await testConnection();
          
          // 載入初始資料
          loadPosts();
          
          // 設置事件監聽器
          setupEventListeners();
          
          // 註冊 Service Worker (PWA 支援)
          registerServiceWorker();
      }

      // 載入用戶資訊
      function loadUserInfo() {
          const savedUser = localStorage.getItem('currentUser');
          if (savedUser) {
              currentUser = JSON.parse(savedUser);
              updateUserDisplay();
          }
      }

      // 更新用戶顯示
      function updateUserDisplay() {
          document.getElementById('userName').textContent = currentUser.name;
          document.getElementById('userAvatar').textContent = currentUser.avatar;
          document.getElementById('userNameInput').value = currentUser.name;
          document.getElementById('userRoleSelect').value = currentUser.role;
          
          // 根據用戶角色顯示/隱藏功能
          updateUIByRole();
      }

      // 根據用戶角色更新 UI
      function updateUIByRole() {
          const isAdmin = currentUser.role === 'admin';
          const isModerator = currentUser.role === 'moderator' || isAdmin;
          
          // 顯示/隱藏管理功能
          document.getElementById('createInfoBtn').style.display = isModerator ? 'block' : 'none';
          document.getElementById('createAlbumBtn').style.display = isModerator ? 'block' : 'none';
          document.getElementById('initBtn').style.display = isAdmin ? 'block' : 'none';
      }

      // 初始化 LIFF
      async function initializeLIFF() {
          if (typeof liff !== 'undefined') {
              try {
                  await liff.init({ liffId: '2009456572-AUDE1qmM' });
                  console.log('LIFF 初始化成功');
                  liffReady = true;
                  
                  if (liff.isLoggedIn()) {
                      const profile = await liff.getProfile();
                      currentUser.name = profile.displayName;
                      currentUser.avatar = '👤'; // 可以使用 profile.pictureUrl
                      updateUserDisplay();
                      saveUserInfo();
                  }
              } catch (err) {
                  console.log('LIFF 初始化失敗:', err);
                  liffReady = false;
              }
          }
      }

      // 設置事件監聽器
      function setupEventListeners() {
          // 選項卡切換
          document.querySelectorAll('.nav-tab, .nav-item').forEach(tab => {
              tab.addEventListener('click', function() {
                  const tabName = this.dataset.tab;
                  if (tabName) {
                      switchTab(tabName);
                  }
              });
          });

          // 模態視窗外部點擊關閉
          document.getElementById('modal').addEventListener('click', function(e) {
              if (e.target === this) {
                  closeModal();
              }
          });

          // 檔案拖拽支援
          setupFileDragAndDrop();

          // 下拉刷新支援
          setupPullToRefresh();
      }

      // 檔案拖拽設置
      function setupFileDragAndDrop() {
          document.addEventListener('dragover', function(e) {
              e.preventDefault();
          });

          document.addEventListener('drop', function(e) {
              e.preventDefault();
              const fileUpload = document.querySelector('.file-upload');
              if (fileUpload && fileUpload.contains(e.target)) {
                  const files = e.dataTransfer.files;
                  handleFileSelection(files);
              }
          });
      }

      // 下拉刷新設置
      function setupPullToRefresh() {
          let startY = 0;
          let currentY = 0;
          let pullDistance = 0;
          let isPulling = false;

          document.addEventListener('touchstart', function(e) {
              startY = e.touches[0].clientY;
              isPulling = window.scrollY === 0;
          });

          document.addEventListener('touchmove', function(e) {
              if (!isPulling) return;
              
              currentY = e.touches[0].clientY;
              pullDistance = currentY - startY;
              
              if (pullDistance > 0 && pullDistance < 100) {
                  e.preventDefault();
                  // 可以在這裡添加下拉刷新的視覺效果
              }
          });

          document.addEventListener('touchend', function(e) {
              if (isPulling && pullDistance > 50) {
                  // 觸發刷新
                  refreshCurrentTab();
              }
              isPulling = false;
              pullDistance = 0;
          });
      }

      // 註冊 Service Worker
      async function registerServiceWorker() {
          if ('serviceWorker' in navigator) {
              try {
                  // 這裡可以註冊 Service Worker 以支援離線功能
                  console.log('Service Worker 支援可用');
              } catch (error) {
                  console.log('Service Worker 註冊失敗:', error);
              }
          }
      }

      // 測試連線
      async function testConnection() {
          try {
              updateConnectionStatus('connecting');
              const result = await callAPI('test');
              
              if (result && result.success) {
                  updateConnectionStatus('connected');
              } else {
                  updateConnectionStatus('disconnected');
              }
          } catch (error) {
              console.error('連線測試失敗:', error);
              updateConnectionStatus('disconnected');
          }
      }

      // 更新連線狀態
      function updateConnectionStatus(status) {
          const statusDot = document.getElementById('statusDot');
          const statusText = document.getElementById('statusText');
          
          isConnected = status === 'connected';
          
          statusDot.className = 'status-dot';
          
          switch (status) {
              case 'connected':
                  statusText.textContent = '已連線';
                  break;
              case 'connecting':
                  statusText.textContent = '連線中';
                  break;
              case 'disconnected':
                  statusDot.classList.add('disconnected');
                  statusText.textContent = '離線';
                  break;
          }
      }

      // API 呼叫函數
      async function callAPI(action, data = null) {
          try {
              let url = GAS_WEB_APP_URL;
              const params = new URLSearchParams({ action });
              
              if (data) {
                  Object.keys(data).forEach(key => {
                      if (data[key] !== null && data[key] !== undefined) {
                          if (typeof data[key] === 'object') {
                              params.append(key, JSON.stringify(data[key]));
                          } else {
                              params.append(key, data[key]);
                          }
                      }
                  });
              }
              
              url += '?' + params.toString();
              console.log('API 請求:', action, data);
              
              const response = await fetch(url, {
                  method: 'GET',
                  redirect: 'follow'
              });
              
              if (!response.ok) {
                  throw new Error(`HTTP error! status: ${response.status}`);
              }
              
              const result = await response.json();
              console.log('API 回應:', result);
              
              if (!isConnected) {
                  updateConnectionStatus('connected');
              }
              
              return result;
          } catch (error) {
              console.error('API 呼叫錯誤:', error);
              updateConnectionStatus('disconnected');
              showToast('連線錯誤，請檢查網路連線', 'error');
              return { error: error.message };
          }
      }

      // 選項卡切換
      function switchTab(tabName) {
          // 更新選項卡狀態
          document.querySelectorAll('.nav-tab, .nav-item').forEach(tab => {
              tab.classList.remove('active');
          });
          
          document.querySelectorAll(`[data-tab="${tabName}"]`).forEach(tab => {
              tab.classList.add('active');
          });

          // 更新面板顯示
          document.querySelectorAll('.content-panel').forEach(panel => {
              panel.classList.remove('active');
          });
          
          document.getElementById(`${tabName}-panel`).classList.add('active');

          // 載入對應資料
          switch(tabName) {
              case 'forum':
                  if (currentPosts.length === 0) loadPosts();
                  break;
              case 'info':
                  if (currentInfo.length === 0) loadInfo();
                  break;
              case 'gallery':
                  if (currentGallery.length === 0) loadGallery();
                  break;
              case 'manage':
                  getSystemStatus();
                  break;
          }
      }

      // 刷新當前選項卡
      function refreshCurrentTab() {
          const activeTab = document.querySelector('.nav-tab.active, .nav-item.active');
          if (activeTab) {
              const tabName = activeTab.dataset.tab;
              switch(tabName) {
                  case 'forum':
                      loadPosts();
                      break;
                  case 'info':
                      loadInfo();
                      break;
                  case 'gallery':
                      loadGallery();
                      break;
                  case 'manage':
                      getSystemStatus();
                      break;
              }
          }
      }

      // 載入貼文
      async function loadPosts(category = '') {
          const postsList = document.getElementById('postsList');
          postsList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>載入中...</p></div>';
          
          const result = await callAPI('getPosts', { category });
          
          if (result.error) {
              postsList.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-title">載入失敗</div><div class="empty-text">${result.error}</div></div>`;
              return;
          }
          
          currentPosts = result;
          displayPosts(result);
      }

      // 顯示貼文
      function displayPosts(posts) {
          const postsList = document.getElementById('postsList');
          
          if (!posts || posts.length === 0) {
              postsList.innerHTML = `
                  <div class="empty-state">
                      <div class="empty-icon">📝</div>
                      <div class="empty-title">還沒有任何貼文</div>
                      <div class="empty-text">快來發表第一篇主題吧！</div>
                  </div>
              `;
              return;
          }
          
          let html = '';
          posts.forEach(post => {
              let attachmentsHtml = '';
              if (post.attachments) {
                  try {
                      const attachments = JSON.parse(post.attachments);
                      attachments.forEach(att => {
                          attachmentsHtml += `
                              <a href="${att.url}" target="_blank" class="attachment-item">
                                  📎 ${att.name}
                              </a>
                          `;
                      });
                  } catch (e) {
                      // 忽略解析錯誤
                  }
              }
              
              let linkHtml = '';
              if (post.link) {
                  linkHtml = `
                      <a href="${post.link}" target="_blank" class="attachment-item">
                          🔗 相關連結
                      </a>
                  `;
              }
              
              html += `
                  <div class="content-item">
                      <div class="content-header">
                          <div>
                              <div class="content-title">${escapeHtml(post.title)}</div>
                              <span class="content-category">${post.category}</span>
                          </div>
                      </div>
                      <div class="content-body">${escapeHtml(post.content)}</div>
                      ${attachmentsHtml || linkHtml ? `<div class="content-attachments">${attachmentsHtml}${linkHtml}</div>` : ''}
                      <div class="content-footer">
                          <div class="content-meta">
                              <div>作者：${post.author}</div>
                              <div>時間：${formatDate(post.timestamp)}</div>
                          </div>
                          <div class="content-actions">
                              <button class="action-btn like" onclick="likePost(${post.id})">
                                  👍 ${post.likes || 0}
                              </button>
                              <button class="action-btn share" onclick="shareContent('${escapeHtml(post.title)}')">
                                  📤 分享
                              </button>
                          </div>
                      </div>
                  </div>
              `;
          });
          
          postsList.innerHTML = html;
      }

      // 載入資訊
      async function loadInfo(category = '') {
          const infoList = document.getElementById('infoList');
          infoList.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>載入中...</p></div>';
          
          const result = await callAPI('getInfo', { category });
          
          if (result.error) {
              infoList.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-title">載入失敗</div><div class="empty-text">${result.error}</div></div>`;
              return;
          }
          
          currentInfo = result;
          displayInfo(result);
      }

      // 顯示資訊
      function displayInfo(info) {
          const infoList = document.getElementById('infoList');
          
          if (!info || info.length === 0) {
              infoList.innerHTML = `
                  <div class="empty-state">
                      <div class="empty-icon">📢</div>
                      <div class="empty-title">還沒有任何資訊</div>
                      <div class="empty-text">等待管理員發布最新消息</div>
                  </div>
              `;
              return;
          }
          
          let html = '';
          info.forEach(item => {
              let attachmentsHtml = '';
              if (item.attachments) {
                  try {
                      const attachments = JSON.parse(item.attachments);
                      attachments.forEach(att => {
                          attachmentsHtml += `
                              <a href="${att.url}" target="_blank" class="attachment-item">
                                  📎 ${att.name}
                              </a>
                          `;
                      });
                  } catch (e) {
                      // 忽略解析錯誤
                  }
              }
              
              html += `
                  <div class="content-item">
                      <div class="content-header">
                          <div>
                              <div class="content-title">${escapeHtml(item.title)}</div>
                              <span class="content-category">${item.category}</span>
                          </div>
                      </div>
                      <div class="content-body">${escapeHtml(item.content)}</div>
                      ${attachmentsHtml ? `<div class="content-attachments">${attachmentsHtml}</div>` : ''}
                      <div class="content-footer">
                          <div class="content-meta">
                              <div>發布者：${item.publisher}</div>
                              <div>時間：${formatDate(item.timestamp)}</div>
                          </div>
                          <div class="content-actions">
                              <button class="action-btn share" onclick="shareContent('${escapeHtml(item.title)}')">
                                  📤 分享
                              </button>
                          </div>
                      </div>
                  </div>
              `;
          });
          
          infoList.innerHTML = html;
      }

      // 載入相簿
      async function loadGallery(album = '') {
          const photoGallery = document.getElementById('photoGallery');
          photoGallery.innerHTML = '<div class="loading"><div class="loading-spinner"></div><p>載入中...</p></div>';
          
          const result = await callAPI('getGallery', { album });
          
          if (result.error) {
              photoGallery.innerHTML = `<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-title">載入失敗</div><div class="empty-text">${result.error}</div></div>`;
              return;
          }
          
          currentGallery = result;
          updateGalleryFilter(result);
          displayGallery(result);
      }

      // 更新相簿篩選選單
      function updateGalleryFilter(galleries) {
          const galleryFilter = document.getElementById('galleryFilter');
          const currentValue = galleryFilter.value;
          
          // 清空現有選項（保留第一個）
          while (galleryFilter.children.length > 1) {
              galleryFilter.removeChild(galleryFilter.lastChild);
          }
          
          // 添加相簿選項
          galleries.forEach(gallery => {
              const option = document.createElement('option');
              option.value = gallery.name;
              option.textContent = gallery.name;
              galleryFilter.appendChild(option);
          });
          
          // 恢復選擇
          galleryFilter.value = currentValue;
      }

      // 顯示相簿
      function displayGallery(galleries) {
          const photoGallery = document.getElementById('photoGallery');
          
          if (!galleries || galleries.length === 0) {
              photoGallery.innerHTML = `
                  <div class="empty-state">

        // 設置檔案上傳事件
        function setupFileUploadEvents() {
            const fileInputs = document.querySelectorAll('input[type="file"]');
            fileInputs.forEach(input => {
                input.addEventListener('change', function() {
                    const previewId = this.id + 'Preview';
                    handleFileSelection(this.files, previewId);
                });
            });

            // 拖拽事件
            const fileUploads = document.querySelectorAll('.file-upload');
            fileUploads.forEach(upload => {
                upload.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    this.classList.add('dragover');
                });

                upload.addEventListener('dragleave', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                });

                upload.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('dragover');
                    const input = this.querySelector('input[type="file"]');
                    const previewId = input.id + 'Preview';
                    handleFileSelection(e.dataTransfer.files, previewId);
                });
            });
        }

        // 處理檔案選擇
        function handleFileSelection(files, previewId) {
            const preview = document.getElementById(previewId);
            if (!preview) return;

            selectedFiles = Array.from(files);
            
            if (files.length === 0) {
                preview.innerHTML = '';
                return;
            }

            let html = '';
            Array.from(files).forEach((file, index) => {
                const fileType = getFileType(file.type);
                const fileIcon = getFileIcon(fileType);
                
                html += `
                    <div class="preview-item" data-index="${index}">
                        <div class="preview-thumbnail">
                            ${fileType === 'image' ? 
                                `<img src="${URL.createObjectURL(file)}" alt="${file.name}">` : 
                                fileIcon
                            }
                        </div>
                        <div class="preview-info">
                            <div class="preview-name">${file.name}</div>
                            <div class="preview-size">${formatFileSize(file.size)}</div>
                        </div>
                        <button class="preview-remove" onclick="removeFile(${index}, '${previewId}')">✕</button>
                    </div>
                `;
            });

            preview.innerHTML = html;
        }

        // 移除檔案
        function removeFile(index, previewId) {
            selectedFiles.splice(index, 1);
            const preview = document.getElementById(previewId);
            const item = preview.querySelector(`[data-index="${index}"]`);
            if (item) {
                item.remove();
            }
        }

        // 取得檔案類型
        function getFileType(mimeType) {
            if (mimeType.startsWith('image/')) return 'image';
            if (mimeType.includes('pdf')) return 'pdf';
            if (mimeType.includes('word') || mimeType.includes('document')) return 'document';
            if (mimeType.includes('text')) return 'text';
            return 'file';
        }

        // 取得檔案圖示
        function getFileIcon(fileType) {
            const icons = {
                image: '🖼️',
                pdf: '📄',

                text: '📃',
                file: '📎'
            };
            return icons[fileType] || '📎';
        }

        // 處理檔案轉換
        async function processFiles(files) {
            const processedFiles = [];
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                try {
                    const base64 = await fileToBase64(file);
                    processedFiles.push({
                        name: file.name,
                        data: base64.split(',')[1],
                        mimeType: file.type,
                        size: file.size
                    });
                } catch (error) {
                    console.error(`處理檔案失敗 ${file.name}:`, error);
                }
            }
            
            return processedFiles;
        }

        // 檔案轉 base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

                html += `<p>試算表：${result.spreadsheet?.status === 'ok' ? '✅' : '❌'} 正常</p>`;

                    Object.keys(result.sheets).forEach(sheetName => {

                        html += `<p>${sheetName}：${sheet.status === 'ok' ? '✅' : '❌'} ${sheet.rows || 0} 行資料</p>`;
                    });
                }
                
                html += `<p>Drive：${result.drive?.status === 'ok' ? '✅' : result.drive?.status === 'not_configured' ? '⚠️ 未設定' : '❌'}</p>`;
                html += '</div>';

        // 初始化系統
        async function initializeSystem() {

            const initBtn = document.getElementById('initBtn');
            initBtn.disabled = true;
            initBtn.innerHTML = '🔧 初始化中...';

            try {
                const result = await callAPI('init');
                
                if (result.success) {
                    showToast('系統初始化成功！', 'success');
                    getSystemStatus();
                } else {
                    showToast('初始化失敗: ' + (result.message || '未知錯誤'), 'error');
                }
            } catch (error) {
                showToast('初始化失敗: ' + error.message, 'error');
            } finally {
                initBtn.disabled = false;
                initBtn.innerHTML = '🔧 初始化系統';
            }
        }

        // 關閉模態視窗
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('active');
            selectedFiles = [];
        }

        // 顯示提示訊息
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 工具函數
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(date) {
            if (!date) return '';
            const d = new Date(date);
            const now = new Date();
            const diff = now - d;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) {
                return d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            } else if (days === 1) {
                return '昨天 ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
            } else if (days < 7) {
                return `${days}天前`;
            } else {
                return d.toLocaleDateString('zh-TW');
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // PWA 安裝提示
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showToast('可以安裝此應用到主畫面', 'info');
        });

        // 網路狀態監控
        window.addEventListener('online', () => {
            updateConnectionStatus('connected');
            showToast('網路連線已恢復', 'success');
        });

        window.addEventListener('offline', () => {
            updateConnectionStatus('disconnected');
            showToast('網路連線中斷', 'error');
        });
    </script>
</body>
</html>
