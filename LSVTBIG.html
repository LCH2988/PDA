<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* =============================================
       CSS 變數
    ============================================= */
    :root {
      --primary:   #4CAF50;
      --secondary: #6c757d;
      --danger:    #dc3545;
      --warning:   #fd7e14;
      --bg:        #f4f4f9;
      --text:      #333;
      --fs-base:   20px;
      --fs-lg:     24px;
      --fs-xl:     28px;
      --radius:    10px;
      --shadow:    0 4px 6px rgba(0,0,0,.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      font-size: var(--fs-base);
      line-height: 1.6;
    }

    h1, h2 { color: var(--primary); text-align: center; margin-bottom: 20px; }

    .container { max-width: 600px; margin: 0 auto; }

    /* ── 按鈕 ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: var(--fs-lg);
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      transition: opacity .2s;
    }
    .btn-secondary { background: var(--secondary); }
    .btn-danger    { background: var(--danger); }
    .btn-warning   { background: var(--warning); }
    .btn:hover     { opacity: .88; }
    .btn:disabled  { opacity: .5; cursor: not-allowed; }

    /* ── 表單 ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: var(--fs-lg);
    }
    .char-count {
      font-size: 14px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }
    .char-count.over { color: var(--danger); font-weight: bold; }

    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: var(--fs-base);
      transition: border-color .2s;
    }
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    textarea { height: 200px; resize: vertical; }

    /* ── 標籤 ── */
    .tag-badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 14px;
      margin: 2px;
    }
    .tag-filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }
    .tag-filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid var(--primary);
      background: #fff;
      color: var(--primary);
      font-size: 16px;
      cursor: pointer;
      transition: all .2s;
    }
    .tag-filter-btn.active {
      background: var(--primary);
      color: #fff;
    }

    /* ── 記事卡片 ── */
    .note-card {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border-left: 8px solid var(--primary);
      cursor: pointer;
      transition: box-shadow .2s;
    }
    .note-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.15); }
    .note-title   { font-size: var(--fs-xl); font-weight: bold; margin-bottom: 10px; color: #222; }
    .note-meta    { font-size: 16px; color: #777; margin-bottom: 10px; }
    .note-content { white-space: pre-wrap; margin-bottom: 15px; font-size: var(--fs-base); }
    .note-tags    { margin-bottom: 10px; }

    /* ── 附件 ── */
    .attachment-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .attachment-img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #ddd;
      cursor: pointer;
      transition: transform .2s;
    }
    .attachment-img:hover { transform: scale(1.05); }
    .attachment-link {
      font-size: 16px;
      padding: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      text-decoration: none;
      color: #333;
    }

    /* ── 留言區 ── */
    .comments-section {
      margin-top: 15px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    .comments-toggle {
      font-size: 16px;
      color: var(--primary);
      cursor: pointer;
      font-weight: bold;
      user-select: none;
    }
    .comments-list { margin-top: 10px; }
    .comment-item {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
      font-size: 16px;
      position: relative;
    }
    .comment-meta { font-size: 13px; color: #999; margin-bottom: 4px; }
    .comment-del-btn {
      position: absolute;
      top: 8px; right: 10px;
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 0;
    }
    .comment-del-btn:hover { color: var(--danger); }
    .comment-input-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .comment-input-row input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    .comment-input-row button {
      padding: 10px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ── 搜尋 ── */
    .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
    .search-box input { flex: 1; }
    .search-box .btn { width: auto; margin: 0; padding: 10px 20px; font-size: var(--fs-base); }

    /* ── 按鈕群組 ── */
    .button-group { margin-top: 15px; display: flex; gap: 10px; }
    .button-group .btn { flex: 1; margin: 0; padding: 10px; font-size: 16px; }

    /* ── 閱覽者 ── */
    .viewers-list {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 16px;
      word-break: break-all;
    }

    /* ── 分頁 ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      font-size: var(--fs-base);
    }
    .pagination button {
      padding: 8px 20px;
      border: 2px solid var(--primary);
      border-radius: 8px;
      background: #fff;
      color: var(--primary);
      font-size: var(--fs-base);
      cursor: pointer;
      font-weight: bold;
    }
    .pagination button:disabled {
      opacity: .4;
      cursor: not-allowed;
    }
    .pagination .page-info { color: #555; }

    /* ── Toast 通知 ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ── 全域載入 Overlay ── */
    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 8888;
      font-size: var(--fs-lg);
    }
    #loadingOverlay.hidden { display: none !important; }

    /* ── 初始載入 ── */
    #initLoading {
      text-align: center;
      font-size: var(--fs-lg);
      margin-top: 50px;
    }

    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 5px solid #ccc;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 自訂 Modal ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9000;
    }
    #modal-overlay.hidden { display: none !important; }
    #modal-box {
      background: #fff;
      border-radius: 16px;
      padding: 30px 24px 20px;
      max-width: 320px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    #modal-msg { font-size: var(--fs-lg); margin-bottom: 24px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btns .btn { margin: 0; flex: 1; padding: 12px; font-size: var(--fs-base); }

    .hidden { display: none !important; }

    /* ── 空狀態 ── */
    .empty-state {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: var(--fs-lg);
    }
    .empty-state .empty-icon { font-size: 60px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container">

  <!-- 首次進入載入畫面 -->
  <div id="initLoading">
    <div class="spinner"></div>
    <p>載入中，請稍候...</p>
  </div>

  <!-- 主畫面（記事列表） -->
  <div id="app" class="hidden">
    <h1>📒 網路記事本</h1>

    <!-- 搜尋列 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋..."
             onkeydown="if(event.key==='Enter') searchNotes()">
      <button class="btn" onclick="searchNotes()">搜尋</button>
    </div>

    <!-- 標籤篩選列 -->
    <div id="tagFilterBar" class="tag-filter-bar"></div>

    <!-- 操作列 -->
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <button class="btn" style="flex:1; margin:0;" onclick="showAddForm()">＋ 新增記事</button>
      <button class="btn btn-secondary"
              style="width:auto; margin:0; padding:10px 18px; font-size:var(--fs-base);"
              onclick="loadNotes()" title="重新整理">🔄</button>
    </div>

    <!-- 記事列表 -->
    <div id="noteList"></div>

    <!-- 分頁 -->
    <div id="pagination" class="pagination hidden">
      <button id="prevBtn" onclick="changePage(-1)">◀ 上一頁</button>
      <span class="page-info" id="pageInfo"></span>
      <button id="nextBtn" onclick="changePage(1)">下一頁 ▶</button>
    </div>
  </div>

  <!-- 新增 / 編輯表單 -->
  <div id="noteForm" class="hidden">
    <h2 id="formTitle">新增記事</h2>

    <div class="form-group">
      <label for="title">標題 <span style="color:red;">*</span></label>
      <input type="text" id="title" placeholder="請輸入標題（最多 50 字）"
             maxlength="50" oninput="updateCharCount('title','titleCount',50)">
      <div class="char-count" id="titleCount">0 / 50</div>
    </div>

    <div class="form-group">
      <label for="content">內容 <span style="color:red;">*</span></label>
      <textarea id="content" placeholder="請輸入內容（最多 2000 字）"
                maxlength="2000" oninput="updateCharCount('content','contentCount',2000)"></textarea>
      <div class="char-count" id="contentCount">0 / 2000</div>
    </div>

    <div class="form-group">
      <label for="tagInput">標籤（逗號分隔，例如：公告,重要）</label>
      <input type="text" id="tagInput" placeholder="例如：公告, 重要, 活動">
    </div>

    <div class="form-group">
      <label for="attachments">附件（最多 5 個，每個最大 5MB）</label>
      <input type="file" id="attachments" multiple onchange="previewFiles()">
      <div id="previewContainer" class="attachment-preview"></div>
    </div>

    <button class="btn" id="saveBtn" onclick="saveNote()">💾 儲存</button>
    <button class="btn btn-secondary" id="cancelBtn" onclick="showList()">✕ 取消</button>
  </div>

</div>

<!-- 全域載入 Overlay -->
<div id="loadingOverlay" class="hidden">
  <div class="spinner"></div>
  <p id="overlayMsg">處理中，請稍候...</p>
</div>

<!-- 自訂確認 Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-box">
    <div id="modal-msg">確定要執行此操作嗎？</div>
    <div class="modal-btns">
      <button class="btn btn-danger"    id="modal-confirm">確定</button>
      <button class="btn btn-secondary" id="modal-cancel">取消</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // =============================================
  // ★ 設定區（請依實際情況修改）
  // =============================================
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx878XMyhAHwmrGaG8715AP_298qu1Nmz4aREPc4IckNYcr5By3G3h2ij5Ga7dSgVmw/exec';
  const LIFF_ID         = '2009456572-AUDE1qmM';
  const PAGE_SIZE       = 10; // 每頁顯示幾筆

  // =============================================
  // 全域狀態
  // =============================================
  let currentUser   = { userID: '', userName: '' };
  let currentNotes  = [];   // 目前頁面顯示的記事
  let allTags       = [];   // 所有標籤（用於篩選列）
  let editingNoteID = null;
  let currentPage   = 'list'; // 'list' | 'form'
  let currentPageNo = 1;      // 分頁：目前頁碼
  let totalPages    = 1;      // 分頁：總頁數
  let activeTag     = '';     // 目前選取的標籤篩選
  let viewedNotes   = new Set(); // session 內已閱覽的 noteID（節流用）

  // =============================================
  // 頁面切換
  // =============================================
  function showPage(page) {
    currentPage = page;
    document.getElementById('app').classList.toggle('hidden', page !== 'list');
    document.getElementById('noteForm').classList.toggle('hidden', page !== 'form');
  }

  // =============================================
  // 初始化 LIFF
  // =============================================
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
    } catch (err) {
      console.warn('LIFF 初始化失敗，使用測試模式', err);
      currentUser = { userID: 'test_user_001', userName: '測試使用者' };
      finishInit();
      return;
    }

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    try {
      const profile = await liff.getProfile();
      currentUser.userID   = profile.userId;
      currentUser.userName = profile.displayName;
      finishInit();
    } catch (err) {
      console.error('取得使用者資料失敗', err);
      document.getElementById('initLoading').innerHTML = `
        <p style="color:var(--danger);font-size:var(--fs-lg);">⚠️ 無法取得使用者資料</p>
        <p style="color:#666;font-size:16px;">請關閉後重新開啟</p>
        <button class="btn" style="max-width:200px;margin:20px auto;" onclick="initLiff()">🔄 重新嘗試</button>
      `;
    }
  }

  function finishInit() {
    document.getElementById('initLoading').classList.add('hidden');
    showPage('list');
    loadNotes();
  }

  // =============================================
  // API 呼叫（GET / POST 自動切換）
  // =============================================
  async function callGasApi(action, data) {
    try {
      const hasAttachments = data && data.attachments && data.attachments.length > 0;

      if (hasAttachments) {
        // 有附件 → POST（避免 URL 過長）
        const response = await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, data }),
          redirect: 'follow'
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return await response.json();
      } else {
        // 無附件 → GET
        const params = new URLSearchParams({
          action: action,
          data: JSON.stringify(data || {})
        });
        const response = await fetch(GAS_WEB_APP_URL + '?' + params.toString(), {
          method: 'GET',
          redirect: 'follow'
        });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return await response.json();
      }
    } catch (error) {
      console.error('API 呼叫失敗:', error);
      return { success: false, message: error.message };
    }
  }

  // =============================================
  // 記事清單（含分頁）
  // =============================================
  async function loadNotes(keyword, tag, page) {
    currentPageNo = page || 1;
    const kw = keyword !== undefined ? keyword : document.getElementById('searchInput').value.trim();
    const filterTag = tag !== undefined ? tag : activeTag;

    // 搜尋中先顯示 loading 狀態
    document.getElementById('noteList').innerHTML =
      '<p style="text-align:center;color:#bbb;padding:30px 0;">載入中...</p>';
    showOverlay(true, '載入記事中...');

    const result = await callGasApi('getNotes', {
      keyword:  kw,
      tag:      filterTag,
      page:     currentPageNo,
      pageSize: PAGE_SIZE
    });

    showOverlay(false);

    if (result.success) {
      currentNotes = result.data;
      totalPages   = result.totalPages || 1;
      renderNotes(result.data);
      renderPagination();
      renderTagFilterBar(result.allTags || []);
    } else {
      showToast('載入失敗：' + result.message);
      document.getElementById('noteList').innerHTML =
        '<p style="text-align:center;color:var(--danger);">載入失敗，請重試</p>';
    }
  }

  function renderNotes(notes) {
    const listDiv = document.getElementById('noteList');
    listDiv.innerHTML = '';

    if (!notes || notes.length === 0) {
      listDiv.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">📭</span>
          目前沒有記事
        </div>`;
      return;
    }

    notes.forEach(function(note) {
      if (note.Status === 'deleted') return;

      const card = document.createElement('div');
      card.className = 'note-card';
      card.dataset.noteId = note.NoteID;

      // ── 附件 HTML ──
      let attachments = [];
      try { attachments = JSON.parse(note.Attachments || '[]'); } catch(e) {}

      let attachHtml = '';
      attachments.forEach(function(item) {
        const url      = (typeof item === 'object') ? (item.url      || '') : String(item);
        const mimeType = (typeof item === 'object') ? (item.mimeType || '') : '';
        const name     = (typeof item === 'object') ? (item.name     || '附件') : '附件';
        const safeUrl  = escHtml(url);
        const safeName = escHtml(name);

        if (mimeType.startsWith('image/')) {
          const thumbUrl  = driveViewToThumb(url);
          const safeThumb = escHtml(thumbUrl);
          attachHtml += '<img src="' + safeThumb + '" class="attachment-img"'
            + ' alt="' + safeName + '" data-open-url="' + safeUrl + '">';
        } else {
          attachHtml += '<a href="' + safeUrl + '" target="_blank"'
            + ' rel="noopener noreferrer" class="attachment-link"'
            + ' onclick="event.stopPropagation()">📎 ' + safeName + '</a>';
        }
      });

      // ── 標籤 HTML ──
      let tags = [];
      try { tags = JSON.parse(note.Tags || '[]'); } catch(e) {}
      const tagsHtml = tags.length > 0
        ? '<div class="note-tags">' + tags.map(t => '<span class="tag-badge">' + escHtml(t) + '</span>').join('') + '</div>'
        : '';

      // ── 閱覽者 HTML ──
      let viewers = [];
      try { viewers = JSON.parse(note.Viewers || '[]'); } catch(e) {}
      const viewerNames = viewers.map(v => typeof v === 'object' ? v.userName : v);
      const viewersHtml = viewerNames.length > 0
        ? '<div class="viewers-list"><strong>閱覽者：</strong>' + escHtml(viewerNames.join(', ')) + '</div>'
        : '';

      // ── 留言數 ──
      const commentCount = note.CommentCount || 0;

      // ── 操作按鈕（本人或管理員） ──
      const isOwner = note.CreatedByUserID === currentUser.userID;
      const actionHtml = isOwner
        ? '<div class="button-group">'
          + '<button class="btn btn-secondary edit-btn">✏️ 編輯</button>'
          + '<button class="btn btn-danger delete-btn">🗑️ 刪除</button>'
          + '</div>'
        : '';

      card.innerHTML =
        '<div class="note-title">' + escHtml(note.Title) + '</div>'
        + '<div class="note-meta">'
        +   '👤 ' + escHtml(note.CreatedByUserName)
        +   ' ｜ 🕐 ' + fmtDate(note.CreatedAt)
        +   ' ｜ 👁️ <span class="view-count">' + (note.ViewCount || 0) + '</span> 次'
        + '</div>'
        + tagsHtml
        + '<div class="note-content">' + escHtml(note.Content) + '</div>'
        + '<div class="attachment-preview">' + attachHtml + '</div>'
        + viewersHtml
        + '<div class="comments-section">'
        +   '<span class="comments-toggle">💬 留言（<span class="comment-count">'
        +   commentCount + '</span>）▼</span>'
        +   '<div class="comments-list hidden"></div>'
        +   '<div class="comment-input-row hidden">'
        +     '<input type="text" class="comment-input" placeholder="輸入留言...">'
        +     '<button class="comment-submit-btn">送出</button>'
        +   '</div>'
        + '</div>'
        + actionHtml;

      // ── 事件綁定 ──

      // 卡片點擊 → 閱覽（節流：同 session 同篇只記一次）
      card.addEventListener('click', function() {
        if (!viewedNotes.has(note.NoteID)) {
          viewedNotes.add(note.NoteID);
          recordView(note.NoteID, card);
        }
      });

      // 附件圖片點擊
      card.querySelectorAll('.attachment-img').forEach(function(img) {
        img.addEventListener('click', function(e) {
          e.stopPropagation();
          const openUrl = img.dataset.openUrl;
          if (openUrl) window.open(openUrl, '_blank');
        });
      });

      // 編輯按鈕
      const editBtn = card.querySelector('.edit-btn');
      if (editBtn) {
        editBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          editNote(note.NoteID);
        });
      }

      // 刪除按鈕
      const deleteBtn = card.querySelector('.delete-btn');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          confirmAction('確定要刪除這筆記事嗎？', function() {
            doDeleteNote(note.NoteID);
          });
        });
      }

      // 留言展開/收合
      const commentsToggle = card.querySelector('.comments-toggle');
      const commentsList   = card.querySelector('.comments-list');
      const commentInputRow = card.querySelector('.comment-input-row');
      commentsToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        const isOpen = !commentsList.classList.contains('hidden');
        if (isOpen) {
          commentsList.classList.add('hidden');
          commentInputRow.classList.add('hidden');
        } else {
          loadComments(note.NoteID, commentsList, card);
          commentInputRow.classList.remove('hidden');
        }
      });

      // 留言送出
      const submitBtn   = card.querySelector('.comment-submit-btn');
      const commentInput = card.querySelector('.comment-input');
      submitBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        submitComment(note.NoteID, commentInput, card);
      });
      commentInput.addEventListener('keydown', function(e) {
        e.stopPropagation();
        if (e.key === 'Enter') submitComment(note.NoteID, commentInput, card);
      });

      listDiv.appendChild(card);
    });
  }

  // ── 標籤篩選列 ──
  function renderTagFilterBar(tags) {
    const bar = document.getElementById('tagFilterBar');
    bar.innerHTML = '';
    if (!tags || tags.length === 0) return;

    const allBtn = document.createElement('button');
    allBtn.className = 'tag-filter-btn' + (activeTag === '' ? ' active' : '');
    allBtn.textContent = '全部';
    allBtn.addEventListener('click', function() {
      activeTag = '';
      loadNotes('', '', 1);
    });
    bar.appendChild(allBtn);

    tags.forEach(function(tag) {
      const btn = document.createElement('button');
      btn.className = 'tag-filter-btn' + (activeTag === tag ? ' active' : '');
      btn.textContent = '#' + tag;
      btn.addEventListener('click', function() {
        activeTag = tag;
        loadNotes('', tag, 1);
      });
      bar.appendChild(btn);
    });
  }

  // ── 分頁 ──
  function renderPagination() {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) {
      pag.classList.add('hidden');
      return;
    }
    pag.classList.remove('hidden');
    document.getElementById('pageInfo').textContent = currentPageNo + ' / ' + totalPages + ' 頁';
    document.getElementById('prevBtn').disabled = currentPageNo <= 1;
    document.getElementById('nextBtn').disabled = currentPageNo >= totalPages;
  }

  function changePage(delta) {
    const newPage = currentPageNo + delta;
    if (newPage < 1 || newPage > totalPages) return;
    loadNotes(undefined, undefined, newPage);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function searchNotes() {
    activeTag = '';
    loadNotes(document.getElementById('searchInput').value.trim(), '', 1);
  }

  // =============================================
  // 新增 / 編輯表單
  // =============================================
  function showAddForm() {
    editingNoteID = null;
    document.getElementById('formTitle').innerText = '新增記事';
    document.getElementById('title').value   = '';
    document.getElementById('content').value = '';
    document.getElementById('tagInput').value = '';
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML = '';
    updateCharCount('title',   'titleCount',   50);
    updateCharCount('content', 'contentCount', 2000);
    showPage('form');
  }

  function editNote(noteID) {
    const note = currentNotes.find(function(n) { return n.NoteID === noteID; });
    if (!note) return;
    editingNoteID = noteID;
    document.getElementById('formTitle').innerText = '編輯記事';
    document.getElementById('title').value   = note.Title;
    document.getElementById('content').value = note.Content;

    let tags = [];
    try { tags = JSON.parse(note.Tags || '[]'); } catch(e) {}
    document.getElementById('tagInput').value = tags.join(', ');

    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML =
      '<p style="font-size:16px;color:#666;">（新上傳的附件將追加至現有附件）</p>';
    updateCharCount('title',   'titleCount',   50);
    updateCharCount('content', 'contentCount', 2000);
    showPage('form');
  }

  function showList() { showPage('list'); }

  // ── 字數計數 ──
  function updateCharCount(inputId, countId, max) {
    const len = document.getElementById(inputId).value.length;
    const el  = document.getElementById(countId);
    el.textContent = len + ' / ' + max;
    el.classList.toggle('over', len >= max);
  }

  // =============================================
  // 附件預覽（含限制檢查）
  // =============================================
  function previewFiles() {
    const MAX_SIZE  = 5 * 1024 * 1024; // 5MB
    const MAX_COUNT = 5;
    const preview = document.getElementById('previewContainer');
    const files   = document.getElementById('attachments').files;

    if (files.length > MAX_COUNT) {
      showToast('最多只能上傳 ' + MAX_COUNT + ' 個附件');
      document.getElementById('attachments').value = '';
      preview.innerHTML = '';
      return;
    }

    for (let i = 0; i < files.length; i++) {
      if (files[i].size > MAX_SIZE) {
        showToast('「' + files[i].name + '」超過 5MB 限制');
        document.getElementById('attachments').value = '';
        preview.innerHTML = '';
        return;
      }
    }

    preview.innerHTML = '';
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'attachment-img';
          img.alt = file.name;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      } else {
        const span = document.createElement('span');
        span.className = 'attachment-link';
        span.innerText = '📎 ' + file.name;
        preview.appendChild(span);
      }
    }
  }

  // =============================================
  // 儲存記事
  // =============================================
  async function saveNote() {
    const title   = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    const tagRaw  = document.getElementById('tagInput').value.trim();

    if (!title)   { showToast('請填寫標題'); return; }
    if (!content) { showToast('請填寫內容'); return; }

    const tags = tagRaw
      ? tagRaw.split(',').map(t => t.trim()).filter(t => t !== '')
      : [];

    const saveBtn   = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    saveBtn.disabled   = true;
    cancelBtn.disabled = true;
    saveBtn.innerText  = '儲存中...';
    showOverlay(true, '儲存中，請稍候...');

    // 附件轉 Base64
    const files = document.getElementById('attachments').files;
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      try {
        const b64 = await toBase64(files[i]);
        attachments.push({
          fileName: files[i].name,
          mimeType: files[i].type,
          base64:   b64.split(',')[1]
        });
      } catch(e) {
        showToast('附件讀取失敗：' + files[i].name);
      }
    }

    const noteData = {
      title:       title,
      content:     content,
      tags:        tags,
      attachments: attachments,
      userID:      currentUser.userID,
      userName:    currentUser.userName
    };

    let result;
    if (editingNoteID) {
      result = await callGasApi('updateNote', {
        noteID:   editingNoteID,
        noteData: noteData,
        userID:   currentUser.userID
      });
    } else {
      result = await callGasApi('addNote', noteData);
    }

    showOverlay(false);
    saveBtn.disabled   = false;
    cancelBtn.disabled = false;
    saveBtn.innerText  = '💾 儲存';

    if (result.success) {
      showToast(editingNoteID ? '記事已更新 ✅' : '記事已新增 ✅');
      showList();
      loadNotes();
    } else {
      showToast('儲存失敗：' + result.message);
    }
  }

  // =============================================
  // 刪除記事
  // =============================================
  async function doDeleteNote(noteID) {
    showOverlay(true, '刪除中...');
    const result = await callGasApi('deleteNote', {
      noteID: noteID,
      userID: currentUser.userID
    });
    showOverlay(false);

    if (result.success) {
      // 樂觀更新：先從畫面移除，背景同步
      currentNotes = currentNotes.filter(n => n.NoteID !== noteID);
      renderNotes(currentNotes);
      showToast('記事已刪除 🗑️');
      loadNotes(); // 背景同步
    } else {
      showToast('刪除失敗：' + result.message);
    }
  }

  // =============================================
  // 閱覽紀錄
  // =============================================
  async function recordView(noteID, cardEl) {
    const result = await callGasApi('recordView', {
      noteID:   noteID,
      userID:   currentUser.userID,
      userName: currentUser.userName
    });
    if (result.success && cardEl) {
      const countEl = cardEl.querySelector('.view-count');
      if (countEl) countEl.innerText = result.viewCount;
      const note = currentNotes.find(n => n.NoteID === noteID);
      if (note) note.ViewCount = result.viewCount;
    }
  }

  // =============================================
  // 留言功能
  // =============================================
  async function loadComments(noteID, listEl, cardEl) {
    listEl.innerHTML = '<p style="color:#bbb;font-size:15px;">載入留言中...</p>';
    listEl.classList.remove('hidden');

    const result = await callGasApi('getComments', { noteID });
    listEl.innerHTML = '';

    if (!result.success) {
      listEl.innerHTML = '<p style="color:var(--danger);font-size:15px;">載入失敗</p>';
      return;
    }

    const comments = result.data || [];
    if (comments.length === 0) {
      listEl.innerHTML = '<p style="color:#bbb;font-size:15px;text-align:center;">尚無留言</p>';
    } else {
      comments.forEach(function(c) {
        const item = document.createElement('div');
        item.className = 'comment-item';
        item.dataset.commentId = c.CommentID;

        const isOwner = c.CreatedByUserID === currentUser.userID;
        item.innerHTML =
          '<div class="comment-meta">👤 ' + escHtml(c.CreatedByUserName)
          + ' ｜ ' + fmtDate(c.CreatedAt) + '</div>'
          + '<div>' + escHtml(c.Content) + '</div>'
          + (isOwner ? '<button class="comment-del-btn" title="刪除留言">✕</button>' : '');

        if (isOwner) {
          item.querySelector('.comment-del-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            confirmAction('確定要刪除此留言嗎？', function() {
              doDeleteComment(c.CommentID, noteID, listEl, cardEl);
            });
          });
        }
        listEl.appendChild(item);
      });
    }

    // 更新留言數
    const countEl = cardEl.querySelector('.comment-count');
    if (countEl) countEl.textContent = comments.length;
  }

  async function submitComment(noteID, inputEl, cardEl) {
    const content = inputEl.value.trim();
    if (!content) { showToast('請輸入留言內容'); return; }

    inputEl.disabled = true;
    const result = await callGasApi('addComment', {
      noteID:   noteID,
      content:  content,
      userID:   currentUser.userID,
      userName: currentUser.userName
    });
    inputEl.disabled = false;

    if (result.success) {
      inputEl.value = '';
      const listEl = cardEl.querySelector('.comments-list');
      loadComments(noteID, listEl, cardEl);
      showToast('留言已送出 💬');
    } else {
      showToast('留言失敗：' + result.message);
    }
  }

  async function doDeleteComment(commentID, noteID, listEl, cardEl) {
    const result = await callGasApi('deleteComment', {
      commentID: commentID,
      userID:    currentUser.userID
    });
    if (result.success) {
      showToast('留言已刪除');
      loadComments(noteID, listEl, cardEl);
    } else {
      showToast('刪除失敗：' + result.message);
    }
  }

  // =============================================
  // 輔助函數
  // =============================================

  /** Drive view URL → thumbnail URL */
  function driveViewToThumb(url) {
    if (!url) return '';
    const match = url.match(/\/file\/d\/([^/]+)\//);
    if (match && match[1]) {
      return 'https://drive.google.com/thumbnail?id=' + match[1] + '&sz=w200';
    }
    return url;
  }

  /** File → Base64 Promise */
  const toBase64 = function(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload  = function() { resolve(reader.result); };
      reader.onerror = function(e) { reject(e); };
    });
  };

  /** XSS 防護 */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /** 日期格式化 */
  function fmtDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    return isNaN(d) ? String(val) : d.toLocaleString('zh-TW');
  }

  /** Loading Overlay */
  function showOverlay(show, msg) {
    document.getElementById('loadingOverlay').classList.toggle('hidden', !show);
    if (msg) document.getElementById('overlayMsg').textContent = msg;
  }

  /** Toast 通知 */
  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
  }

  /** 自訂確認 Modal */
  function confirmAction(msg, onConfirm) {
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-msg').textContent = msg;
    overlay.classList.remove('hidden');
    document.getElementById('modal-confirm').onclick = function() {
      overlay.classList.add('hidden');
      onConfirm();
    };
    document.getElementById('modal-cancel').onclick = function() {
      overlay.classList.add('hidden');
    };
  }

  // =============================================
  // 啟動
  // =============================================
  window.onload = initLiff;
</script>
</body>
