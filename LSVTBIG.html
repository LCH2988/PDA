<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    :root {
      --primary      : #00B900;
      --primary-dark : #009900;
      --primary-light: #E8F5E9;
      --danger       : #E53935;
      --danger-light : #FFEBEE;
      --warn         : #F57C00;
      --warn-light   : #FFF3E0;
      --info         : #1565C0;
      --info-light   : #E3F2FD;
      --bg           : #F5F5F5;
      --card-bg      : #FFFFFF;
      --border       : #E0E0E0;
      --text-main    : #212121;
      --text-sub     : #757575;
      --text-hint    : #BDBDBD;
      --shadow       : 0 2px 8px rgba(0,0,0,.08);
      --radius       : 12px;
      --transition   : .18s ease;
      --header-h     : 56px;
      --search-h     : 54px;   /* ★ 搜尋列高度，用於計算 top offset */
      --max-w        : 480px;
      --font         : 'Noto Sans TC', system-ui, sans-serif;

      /* ★ 字體大小變數（由 JS 控制） */
      --fs-base      : 14px;   /* 中（預設） */
      --fs-sm        : 0.82em;
      --fs-xs        : 0.75em;
      --fs-lg        : 1.05em;
    }

    /* ★ 字體大小 class */
    body.font-small  { --fs-base: 12px; }
    body.font-medium { --fs-base: 14px; }
    body.font-large  { --fs-base: 16px; }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { font-size: var(--fs-base); }
    body { font-family:var(--font); background:var(--bg); color:var(--text-main); min-height:100dvh; display:flex; justify-content:center; font-size:var(--fs-base); }
    #app { width:100%; max-width:var(--max-w); display:flex; flex-direction:column; min-height:100dvh; position:relative; }

    /* ── Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--header-h);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
      flex-shrink: 0;   /* ★ 不壓縮 */
    }
    #header-back { background:none; border:none; color:#fff; font-size:1.3rem; cursor:pointer; padding:6px; border-radius:8px; display:none; transition:background var(--transition); }
    #header-back.visible { display:block; }
    #header-back:hover { background:rgba(255,255,255,.2); }
    #header-title { flex:1; font-size:1.05rem; font-weight:700; letter-spacing:.03em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ★ Header 右側按鈕群 */
    .header-actions { display:flex; gap:6px; align-items:center; flex-shrink:0; }
    .header-btn { background:rgba(255,255,255,.2); border:none; color:#fff; font-size:.8rem; font-weight:700; padding:6px 10px; border-radius:20px; cursor:pointer; transition:background var(--transition); white-space:nowrap; }
    .header-btn:hover { background:rgba(255,255,255,.35); }

    /* ── Pages ── */
    .page { display:none; flex-direction:column; flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .page.active { display:flex; }

    /* ── ★ 搜尋列：不用 sticky，改為 flex 固定在頁面頂部 ── */
    .search-bar {
      flex-shrink: 0;
      padding: 10px 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .search-bar input {
      flex:1; border:1px solid var(--border); border-radius:20px;
      padding:8px 14px; font-size:.88rem; font-family:var(--font);
      background:var(--bg); color:var(--text-main); outline:none;
      transition:border-color var(--transition);
    }
    .search-bar input:focus { border-color:var(--primary); }
    .search-bar select {
      border:1px solid var(--border); border-radius:20px;
      padding:8px 10px; font-size:.82rem; font-family:var(--font);
      background:var(--bg); color:var(--text-main); outline:none; cursor:pointer;
    }

    /* ── ★ 列表頁內容區（可捲動） ── */
    #list-scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #list-meta { padding:8px 16px 0; font-size:.78rem; color:var(--text-sub); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    #note-list { padding:10px 16px; display:flex; flex-direction:column; gap:10px; padding-bottom:90px; }

    /* ── 記事卡片 ── */
    .note-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); display:flex; overflow:hidden; cursor:pointer; transition:transform var(--transition), box-shadow var(--transition); }
    .note-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
    .note-card:active { transform:scale(.98); }
    .note-card-stripe { width:4px; background:var(--primary); flex-shrink:0; }
    .note-card-body { flex:1; padding:12px 14px; display:flex; flex-direction:column; gap:6px; min-width:0; }
    .note-card-title { font-size:.95rem; font-weight:700; color:var(--text-main); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .note-card-meta { display:flex; flex-wrap:wrap; gap:4px; }
    .meta-badge { font-size:.7rem; color:var(--text-sub); background:var(--bg); border-radius:10px; padding:2px 8px; border:1px solid var(--border); }
    .note-card-content { font-size:.82rem; color:var(--text-sub); line-height:1.6; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .note-card-attachments { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
    .attach-file { display:inline-flex; align-items:center; gap:4px; font-size:.75rem; color:var(--primary-dark); background:var(--primary-light); border-radius:8px; padding:4px 10px; text-decoration:none; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .note-card-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
    .btn-card { font-size:.75rem; font-family:var(--font); font-weight:700; border:none; border-radius:8px; padding:5px 12px; cursor:pointer; transition:filter var(--transition); }
    .btn-card:hover { filter:brightness(.92); }
    .btn-edit    { background:var(--primary-light); color:var(--primary-dark); }
    .btn-delete  { background:var(--danger-light);  color:var(--danger); }
    .btn-forward { background:var(--info-light);    color:var(--info); }

    /* ── 角色徽章 ── */
    .role-badge  { display:inline-flex; align-items:center; gap:3px; font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:10px; }
    .role-owner  { background:#FFF8E1; color:#F9A825; }
    .role-admin  { background:#F3E5F5; color:#6A1B9A; }
    .role-member { background:#E3F2FD; color:#1565C0; }
    .role-guest  { background:#F5F5F5; color:#757575; }

    /* ── 空狀態 ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-hint); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }
    .empty-state p { font-size:.88rem; line-height:1.8; }

    /* ── FAB ── */
    #fab-add { position:fixed; bottom:24px; right:max(24px, calc((100vw - var(--max-w)) / 2 + 24px)); width:56px; height:56px; border-radius:50%; background:var(--primary); color:#fff; font-size:1.8rem; border:none; cursor:pointer; box-shadow:0 4px 16px rgba(0,185,0,.4); display:flex; align-items:center; justify-content:center; transition:transform var(--transition), box-shadow var(--transition); z-index:150; }
    #fab-add:hover { transform:scale(1.1); box-shadow:0 6px 24px rgba(0,185,0,.5); }
    #fab-add:active { transform:scale(.95); }
    #fab-add.hidden { display:none; }

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:300; align-items:flex-end; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-sheet { background:var(--card-bg); border-radius:20px 20px 0 0; width:min(var(--max-w), 100vw); max-height:90dvh; display:flex; flex-direction:column; overflow:hidden; animation:slideUp .25s ease; }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
    .modal-header { display:flex; align-items:center; padding:16px 20px 12px; border-bottom:1px solid var(--border); gap:10px; flex-shrink:0; }
    .modal-title { flex:1; font-size:1rem; font-weight:700; }
    .modal-close { background:none; border:none; font-size:1.3rem; cursor:pointer; color:var(--text-sub); padding:4px; border-radius:6px; transition:background var(--transition); }
    .modal-close:hover { background:var(--bg); }
    .modal-body { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:.8rem; font-weight:700; color:var(--text-sub); }
    .form-input, .form-textarea { border:1.5px solid var(--border); border-radius:10px; padding:10px 14px; font-size:.9rem; font-family:var(--font); color:var(--text-main); background:var(--bg); outline:none; transition:border-color var(--transition); resize:none; }
    .form-input:focus, .form-textarea:focus { border-color:var(--primary); }
    .form-textarea { min-height:120px; }

    /* ── 附件預覽 ── */
    .preview-list { display:flex; flex-wrap:wrap; gap:8px; min-height:0; }
    .preview-item { position:relative; width:72px; height:72px; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3px; }
    .preview-item img { width:100%; height:100%; object-fit:cover; }
    .file-icon { font-size:1.6rem; }
    .file-name { font-size:.55rem; color:var(--text-sub); text-align:center; padding:0 4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%; }
    .preview-remove { position:absolute; top:2px; right:2px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.6); color:#fff; border:none; font-size:.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
    .video-thumb { width:100%; height:100%; object-fit:cover; display:block; }
    .video-play-icon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.6rem; pointer-events:none; background:rgba(0,0,0,.25); }
    .btn-upload { display:inline-flex; align-items:center; gap:6px; background:var(--bg); border:1.5px dashed var(--border); border-radius:10px; padding:10px 16px; font-size:.85rem; font-family:var(--font); color:var(--text-sub); cursor:pointer; transition:border-color var(--transition), color var(--transition); }
    .btn-upload:hover { border-color:var(--primary); color:var(--primary); }
    .modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; gap:10px; flex-shrink:0; }
    .btn-submit, .btn-cancel { flex:1; padding:13px; border:none; border-radius:10px; font-family:var(--font); font-size:.9rem; font-weight:700; cursor:pointer; transition:filter var(--transition), transform var(--transition); }
    .btn-submit:hover, .btn-cancel:hover { filter:brightness(.93); }
    .btn-submit:active, .btn-cancel:active { transform:scale(.97); }
    .btn-submit { background:var(--primary); color:#fff; }
    .btn-cancel { background:var(--border); color:var(--text-main); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }

    /* ── 詳細頁 ── */
    #page-detail { overflow-y:auto; padding-bottom:100px; gap:0; }
    .detail-hero { background:var(--card-bg); padding:20px 16px 16px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .detail-title { font-size:1.15rem; font-weight:700; color:var(--text-main); line-height:1.4; margin-bottom:10px; word-break:break-word; }
    .detail-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .detail-section { background:var(--card-bg); margin:12px 16px 0; border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .detail-section-label { font-size:.78rem; font-weight:700; color:var(--text-sub); letter-spacing:.05em; padding:12px 16px 8px; border-bottom:1px solid var(--border); background:var(--bg); }
    .detail-content { padding:16px; font-size:.92rem; line-height:1.85; color:var(--text-main); white-space:pre-wrap; word-break:break-word; }
    .detail-attachments { padding:14px 16px; display:flex; flex-wrap:wrap; gap:10px; }
    .detail-attach-file { display:inline-flex; align-items:center; gap:6px; font-size:.82rem; color:var(--primary-dark); background:var(--primary-light); border-radius:10px; padding:8px 14px; text-decoration:none; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:filter var(--transition); }
    .detail-attach-file:hover { filter:brightness(.93); }
    .detail-attach-file.locked { background:var(--border); color:var(--text-hint); cursor:not-allowed; }
    .attach-video-wrap { width:100%; border-radius:10px; overflow:hidden; border:1px solid var(--border); background:#000; }
    .attach-video-wrap video { width:100%; max-height:280px; display:block; }
    .attach-audio-wrap { width:100%; border-radius:10px; border:1px solid var(--border); background:var(--bg); padding:10px 14px; display:flex; align-items:center; gap:10px; }
    .attach-audio-wrap audio { flex:1; min-width:0; }
    .attach-audio-icon { font-size:1.6rem; flex-shrink:0; }
    .attach-media-badge { display:inline-flex; align-items:center; gap:4px; font-size:.75rem; border-radius:8px; padding:4px 10px; text-decoration:none; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .attach-media-badge.video { background:#EDE7F6; color:#4527A0; }
    .attach-media-badge.audio { background:#E0F2F1; color:#00695C; }
    .detail-viewers { padding:12px 16px; display:flex; flex-wrap:wrap; gap:8px; }
    .viewer-chip { display:inline-flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:.75rem; color:var(--text-sub); }
    .detail-footer { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:min(var(--max-w), 100vw); background:var(--card-bg); border-top:1px solid var(--border); padding:12px 16px; display:flex; gap:10px; z-index:200; }
    .detail-footer button { flex:1; padding:13px; border:none; border-radius:10px; font-family:var(--font); font-size:.85rem; font-weight:700; cursor:pointer; transition:filter var(--transition), transform var(--transition); }
    .detail-footer button:hover { filter:brightness(.93); }
    .detail-footer button:active { transform:scale(.97); }
    .btn-detail-back    { background:var(--border);        color:var(--text-main); }
    .btn-detail-edit    { background:var(--primary-light); color:var(--primary-dark); }
    .btn-detail-delete  { background:var(--danger-light);  color:var(--danger); }
    .btn-detail-forward { background:var(--info-light);    color:var(--info); }

    /* ── 人員管理 ── */
    #page-users { overflow-y:auto; padding-bottom:20px; gap:0; }
    .users-filter { flex-shrink:0; padding:10px 16px; background:var(--card-bg); border-bottom:1px solid var(--border); display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn { font-size:.78rem; font-family:var(--font); font-weight:700; border:1.5px solid var(--border); border-radius:20px; padding:5px 14px; background:var(--bg); color:var(--text-sub); cursor:pointer; transition:all var(--transition); }
    .filter-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    #users-count { font-size:.78rem; color:var(--text-sub); padding:8px 16px 0; }
    #user-list { padding:10px 16px; display:flex; flex-direction:column; gap:10px; }
    .user-card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px; display:flex; gap:12px; align-items:flex-start; transition:opacity var(--transition); }
    .user-card.banned { opacity:.6; }
    .user-avatar { width:44px; height:44px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); font-size:1.1rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
    .user-avatar img { width:100%; height:100%; object-fit:cover; }
    .user-info { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
    .user-name { font-size:.9rem; font-weight:700; }
    .user-meta { font-size:.72rem; color:var(--text-sub); }
    .user-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:6px; }
    .role-select { font-size:.78rem; font-family:var(--font); border:1.5px solid var(--border); border-radius:8px; padding:5px 8px; background:var(--bg); color:var(--text-main); cursor:pointer; outline:none; }
    .btn-ban { font-size:.75rem; font-family:var(--font); font-weight:700; border:none; border-radius:8px; padding:5px 12px; cursor:pointer; transition:filter var(--transition); }
    .btn-ban:hover { filter:brightness(.92); }
    .btn-ban.ban   { background:var(--danger-light); color:var(--danger); }
    .btn-ban.unban { background:var(--primary-light); color:var(--primary-dark); }

    /* ── Toast ── */
    #toast-container { position:fixed; top:calc(var(--header-h) + 12px); left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px; width:min(360px, 90vw); pointer-events:none; }
    .toast { padding:12px 18px; border-radius:12px; font-size:.85rem; font-weight:600; box-shadow:0 4px 16px rgba(0,0,0,.18); animation:toastIn .25s ease; pointer-events:auto; }
    @keyframes toastIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    .toast.success { background:#E8F5E9; color:#2E7D32; }
    .toast.error   { background:#FFEBEE; color:#C62828; }
    .toast.warn    { background:#FFF3E0; color:#E65100; }
    .toast.info    { background:#E3F2FD; color:#1565C0; }

    /* ── Loading ── */
    #loading-overlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,.7); z-index:9998; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
    #loading-overlay.show { display:flex; }
    .spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--primary); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading-text { font-size:.85rem; color:var(--text-sub); }

    /* ── 上傳進度條 ── */
    .upload-progress-wrapper { width:100%; padding:10px 12px; background:var(--card-bg); border:1px solid var(--border); border-radius:10px; }
    .upload-progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; gap:8px; }
    .upload-filename { font-size:.8rem; color:var(--text-main); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
    .upload-pct { font-size:.8rem; color:var(--primary-dark); font-weight:700; white-space:nowrap; }
    .upload-progress-bar-bg { background:var(--border); border-radius:99px; height:8px; overflow:hidden; }
    .upload-progress-bar-fill { height:100%; background:var(--primary); border-radius:99px; transition:width .25s ease; width:0%; }
    .upload-status-row { font-size:.72rem; color:var(--text-sub); margin-top:4px; display:flex; justify-content:space-between; align-items:center; }
    .upload-cancel-btn { font-size:.72rem; color:var(--danger); background:none; border:none; cursor:pointer; padding:0; font-family:var(--font); }
    .upload-cancel-btn:hover { text-decoration:underline; }

    /* ── ★ 字體大小設定 Modal ── */
    .font-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:400; align-items:center; justify-content:center; }
    .font-modal-overlay.open { display:flex; }
    .font-modal-box { background:var(--card-bg); border-radius:16px; width:min(300px, 88vw); overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,.2); animation:popIn .2s ease; }
    @keyframes popIn { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
    .font-modal-title { font-size:.95rem; font-weight:700; padding:16px 20px 12px; border-bottom:1px solid var(--border); }
    .font-size-options { display:flex; flex-direction:column; }
    .font-size-opt { display:flex; align-items:center; justify-content:space-between; padding:14px 20px; cursor:pointer; transition:background var(--transition); border-bottom:1px solid var(--border); gap:12px; }
    .font-size-opt:last-child { border-bottom:none; }
    .font-size-opt:hover { background:var(--bg); }
    .font-size-opt.active { background:var(--primary-light); }
    .font-size-opt .opt-label { font-weight:700; }
    .font-size-opt .opt-preview { color:var(--text-sub); }
    .font-size-opt .opt-check { color:var(--primary); font-size:1.1rem; visibility:hidden; }
    .font-size-opt.active .opt-check { visibility:visible; }
    .font-modal-cancel { width:100%; padding:14px; border:none; border-top:1px solid var(--border); background:var(--bg); font-family:var(--font); font-size:.9rem; font-weight:700; color:var(--text-sub); cursor:pointer; transition:background var(--transition); }
    .font-modal-cancel:hover { background:var(--border); }
  </style>
</head>
<body class="font-medium">
<div id="app">
  <header class="app-header">
    <button id="header-back">←</button>
    <span id="header-title">📒 記事本</span>
    <div class="header-actions">
      <button class="header-btn" id="btn-font-size" title="字體大小">🔤</button>
      <button class="header-btn" id="btn-manage-users" style="display:none">👥 人員管理</button>
    </div>
  </header>

  <!-- 列表頁 -->
  <div class="page active" id="page-list">
    <div class="search-bar">
      <input id="search-input" type="search" placeholder="搜尋標題或內容…"/>

<script>
  /* ============================================================
   Part 2：設定 / State / 工具 / MIME / 附件元素 / ★ 分塊上傳引擎
============================================================ */

/* ── 設定 ── */
const CONFIG = {
  LIFF_ID : '2009456572-AUDE1qmM',
  GAS_URL : 'https://script.google.com/macros/s/AKfycbwj10sVDQypJOUaqXx78_Y05jV6cn4RcdzwFxH0O9q8ECpZ0TuV1YmcMPaFPXYsQWqIIg/exec',
};

/* ── 角色設定 ── */
const ROLE_LABEL = {
  owner  : { text:'版主',   icon:'👑', cls:'role-owner'  },
  admin  : { text:'管理者', icon:'🛡', cls:'role-admin'  },
  member : { text:'會員',   icon:'⭐', cls:'role-member' },
  guest  : { text:'訪客',   icon:'👤', cls:'role-guest'  },
};
const ROLE_LEVEL = { owner:4, admin:3, member:2, guest:1 };
function canWrite(r)      { return (ROLE_LEVEL[r]||0) >= ROLE_LEVEL.admin;  }
function canDownload(r)   { return (ROLE_LEVEL[r]||0) >= ROLE_LEVEL.member; }
function canManageUser(r) { return (ROLE_LEVEL[r]||0) >= ROLE_LEVEL.owner;  }

/* ── 全域狀態 ── */
const State = {
  user        : null,
  myRole      : 'guest',
  notes       : [],
  users       : [],
  editingNote : null,
  viewingNote : null,
  existAttach : [],
  pendingFiles: [],          // { file, id } 待上傳佇列
  uploadAborts: new Map(),   // uploadId → AbortController
};

/* ── MIME 設定 ── */
const MIME_CFG = {
  MAX_SIZE_MB  : 100,
  CHUNK_SIZE_MB: 3,          // ★ 每塊原始大小上限（MB）
  SMALL_MB     : 3,          // 小於此值用單次上傳
  DOC_TYPES    : [
    'application/pdf','application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.ms-excel',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'application/vnd.ms-powerpoint',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation',
  ],
};

const CACHE = {
  KEY_USER  : 'nb_user',
  KEY_ROLE  : 'nb_role',
  KEY_NOTES : 'nb_notes',
  KEY_TS    : 'nb_notes_ts',
  KEY_FONT  : 'nb_font',
  TTL_MS    : 5 * 60 * 1000,   // 記事快取 5 分鐘

  saveUser(user, role) {
    try {
      sessionStorage.setItem(this.KEY_USER, JSON.stringify(user));
      sessionStorage.setItem(this.KEY_ROLE, role);
    } catch {}
  },
  loadUser() {
    try {
      const u = sessionStorage.getItem(this.KEY_USER);
      const r = sessionStorage.getItem(this.KEY_ROLE);
      if (u && r) return { user: JSON.parse(u), role: r };
    } catch {}
    return null;
  },

  saveNotes(notes) {
    try {
      localStorage.setItem(this.KEY_NOTES, JSON.stringify(notes));
      localStorage.setItem(this.KEY_TS,    String(Date.now()));
    } catch {}
  },
  loadNotes() {
    try {
      const ts    = Number(localStorage.getItem(this.KEY_TS) || 0);
      const fresh = Date.now() - ts < this.TTL_MS;
      if (!fresh) return null;
      const raw = localStorage.getItem(this.KEY_NOTES);
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  },
  clearNotes() {
    try { localStorage.removeItem(this.KEY_NOTES); localStorage.removeItem(this.KEY_TS); } catch {}
  },

  saveFont(size) {
    try { localStorage.setItem(this.KEY_FONT, size); } catch {}
  },
  loadFont() {
    try { return localStorage.getItem(this.KEY_FONT) || 'medium'; } catch { return 'medium'; }
  },
};

/* ============================================================
   ★ 字體大小管理
============================================================ */
const FontManager = {
  current: 'medium',

  init() {
    this.current = CACHE.loadFont();
    this.apply(this.current, false);
  },

  apply(size, save = true) {
    document.body.classList.remove('font-small', 'font-medium', 'font-large');
    document.body.classList.add(`font-${size}`);
    this.current = size;
    if (save) CACHE.saveFont(size);

    // 同步 Modal 選項的 active 狀態
    document.querySelectorAll('.font-size-opt').forEach(el => {
      el.classList.toggle('active', el.dataset.size === size);
    });
  },

  openModal() {
    // 同步當前選中狀態
    document.querySelectorAll('.font-size-opt').forEach(el => {
      el.classList.toggle('active', el.dataset.size === this.current);
    });
    document.getElementById('font-modal').classList.add('open');
  },

  closeModal() {
    document.getElementById('font-modal').classList.remove('open');
  },

  bindEvents() {
    // 字體選項點擊
    document.querySelectorAll('.font-size-opt').forEach(el => {
      el.addEventListener('click', () => {
        this.apply(el.dataset.size);
        this.closeModal();
        showToast(`字體已設為「${el.querySelector('.opt-label').textContent.replace('（預設）','').trim()}」`, 'success', 2000);
      });
    });

    // 開啟按鈕
    document.getElementById('btn-font-size')
      .addEventListener('click', () => this.openModal());

    // 關閉按鈕
    document.getElementById('font-modal-cancel')
      .addEventListener('click', () => this.closeModal());

    // 點擊背景關閉
    document.getElementById('font-modal')
      .addEventListener('click', e => {
        if (e.target === e.currentTarget) this.closeModal();
      });
  },
};

/* ============================================================
   ★ 修改後的 initApp（含快取跳過邏輯）
============================================================ */
async function initApp() {

  // ── 1. 立即套用字體設定（無需等待 LIFF） ──
  FontManager.init();
  FontManager.bindEvents();

  // ── 2. 嘗試從快取還原使用者（跳過 LIFF 初始化等待） ──
  const cached = CACHE.loadUser();
  if (cached) {
    State.user   = cached.user;
    State.myRole = cached.role;

    // 先用快取資料渲染畫面（立即顯示）
    const cachedNotes = CACHE.loadNotes();
    if (cachedNotes) {
      State.notes = cachedNotes;
      applySearch();
      showToast('⚡ 快速載入（背景更新中）', 'info', 1500);
    }

    bindEvents();
    if (canManageUser(State.myRole)) {
      document.getElementById('btn-manage-users').style.display = '';
    }
    switchPage('list');

    // 背景靜默更新記事（不顯示 loading）
    loadNotes(true).catch(() => {});

    // 背景重新驗證 LIFF（不阻塞 UI）
    _refreshLiffSilently();
    return;
  }

  // ── 3. 首次開啟：完整 LIFF 初始化 ──
  showLoading('初始化中…');
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile  = await liff.getProfile();
    State.user     = { userId: profile.userId, displayName: profile.displayName, pictureUrl: profile.pictureUrl };
    const res      = await callAPI('login', { name: profile.displayName, picture: profile.pictureUrl });
    State.myRole   = res.role || 'guest';

    CACHE.saveUser(State.user, State.myRole);

    bindEvents();
    await loadNotes();

    if (canManageUser(State.myRole)) {
      document.getElementById('btn-manage-users').style.display = '';
    }
    switchPage('list');

  } catch (err) {
    showToast(`初始化失敗：${err.message}`, 'error', 6000);
    console.error('[initApp]', err);
  } finally {
    hideLoading();
  }
}

/* ── 背景靜默重新驗證 LIFF ── */
async function _refreshLiffSilently() {
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) return;
    const profile = await liff.getProfile();
    const res     = await callAPI('login', { name: profile.displayName, picture: profile.pictureUrl });
    const newRole = res.role || 'guest';

    // 若角色有變，更新快取並重新渲染
    if (newRole !== State.myRole) {
      State.myRole = newRole;
      CACHE.saveUser(State.user, newRole);
      applySearch();
      if (canManageUser(newRole)) {
        document.getElementById('btn-manage-users').style.display = '';
      }
    }
  } catch (err) {
    console.warn('[refreshLiff]', err.message);
  }
}

/* ============================================================
   ★ 修改後的 loadNotes（支援靜默模式 + 快取更新）
============================================================ */
async function loadNotes(silent = false) {
  try {
    if (!silent) showLoading('載入記事…');
    const res   = await callAPI('getNotes');
    State.notes = res.notes || [];
    CACHE.saveNotes(State.notes);   // ★ 存入快取
    applySearch();
  } catch (err) {
    if (!silent) showToast(`載入記事失敗：${err.message}`, 'error');
  } finally {
    if (!silent) hideLoading();
  }
}

/* ============================================================
   ★ 修改後的 submitNote / deleteNote（操作後清除快取）
   在原本的 submitNote 與 deleteNote 內，
   await loadNotes() 之前加入：CACHE.clearNotes();
============================================================ */
// 覆寫 submitNote（在 closeModal 後、loadNotes 前清快取）
async function submitNote() {
  const title   = document.getElementById('form-title').value.trim();
  const content = document.getElementById('form-content').value.trim();
  if (!title)   { showToast('請輸入標題', 'warn'); return; }
  if (!content) { showToast('請輸入內容', 'warn'); return; }

  const submitBtn    = document.getElementById('form-submit');
  submitBtn.disabled = true;
  showLoading('儲存中…');

  try {
    const newUrls     = await uploadPendingFiles();
    const attachments = [...State.existAttach, ...newUrls];

    if (State.editingNote) {
      await callAPI('editNote', { noteId: State.editingNote.NoteID, title, content, attachments });
      showToast('✅ 記事已更新', 'success');
    } else {
      await callAPI('addNote', { title, content, attachments });
      showToast('✅ 記事已新增', 'success');
    }

    closeModal();
    CACHE.clearNotes();          // ★ 清除快取，強制重新載入
    await loadNotes();

  } catch (err) {
    showToast(`儲存失敗：${err.message}`, 'error');
  } finally {
    submitBtn.disabled = false;
    hideLoading();
  }
}

// 覆寫 deleteNote
async function deleteNote(noteId) {
  if (!confirm('確定要刪除這則記事嗎？')) return;
  showLoading('刪除中…');
  try {
    await callAPI('deleteNote', { noteId });
    showToast('🗑 記事已刪除', 'success');
    if (State.viewingNote?.NoteID === noteId) switchPage('list');
    CACHE.clearNotes();          // ★ 清除快取
    await loadNotes();
  } catch (err) {
    showToast(`刪除失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   工具函式
============================================================ */
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    const diff = Date.now() - d;
    if (diff < 60000)        return '剛剛';
    if (diff < 3600000)      return `${Math.floor(diff / 60000)} 分鐘前`;
    if (diff < 86400000)     return `${Math.floor(diff / 3600000)} 小時前`;
    if (diff < 86400000 * 7) return `${Math.floor(diff / 86400000)} 天前`;
    return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
  } catch { return '—'; }
}

function genUploadId() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function getDriveFileId(url) {
  if (!url) return null;
  const s  = String(url);
  const m1 = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/); if (m1) return m1[1];
  const m2 = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);    if (m2) return m2[1];
  const m3 = s.match(/\/d\/([a-zA-Z0-9_-]+)/);       if (m3) return m3[1];
  return null;
}

function driveOpenUrl(url) {
  const id = getDriveFileId(url);
  return id ? `https://drive.google.com/file/d/${id}/view?usp=sharing` : url;
}

function isImageUrl(url) {
  if (!url) return false;
  const s = String(url);
  if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i.test(s)) return true;
  if (s.includes('drive.google.com/thumbnail'))            return true;
  if (s.includes('lh3.googleusercontent.com'))             return true;
  return false;
}

function getFileNameFromUrl(url) {
  try {
    return decodeURIComponent(String(url).split('/').pop().split('?')[0]) || '附件';
  } catch { return '附件'; }
}

function bindImgFallback(imgEl, url) {
  const fileId = getDriveFileId(url);
  if (!fileId) return;
  const fallbacks = [
    `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`,
    `https://lh3.googleusercontent.com/d/${fileId}`,
    `https://drive.google.com/uc?export=view&id=${fileId}`,
  ];
  let idx = 0;
  imgEl.addEventListener('error', function retry() {
    idx++;
    if (idx < fallbacks.length) {
      imgEl.src = fallbacks[idx];
    } else {
      imgEl.removeEventListener('error', retry);
      imgEl.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);color:var(--text-hint);font-size:.7rem;gap:4px;border-radius:inherit';
      ph.innerHTML = '<span style="font-size:1.5rem">🖼</span><span>無法載入</span>';
      imgEl.parentNode?.appendChild(ph);
    }
  });
}

/* ── MIME 工具 ── */
function getMimeCategory(m) {
  if (!m) return 'other';
  if (m.startsWith('image/')) return 'image';
  if (m.startsWith('video/')) return 'video';
  if (m.startsWith('audio/')) return 'audio';
  if (MIME_CFG.DOC_TYPES.includes(m)) return 'doc';
  return 'other';
}

function guessMimeFromName(n) {
  const ext = (n || '').split('.').pop().toLowerCase();
  const M = {
    mp4:'video/mp4', mov:'video/quicktime', avi:'video/x-msvideo',
    webm:'video/webm', mkv:'video/x-matroska', '3gp':'video/3gpp',
    mp3:'audio/mpeg', m4a:'audio/x-m4a', aac:'audio/aac',
    ogg:'audio/ogg', wav:'audio/wav',
    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
    gif:'image/gif', webp:'image/webp', bmp:'image/bmp',
    pdf:'application/pdf',
    doc:'application/msword',
    docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    xls:'application/vnd.ms-excel',
    xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    ppt:'application/vnd.ms-powerpoint',
    pptx:'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    zip:'application/zip', rar:'application/x-rar-compressed',
  };
  return M[ext] || 'application/octet-stream';
}

function getCategoryIcon(c) {
  return { image:'🖼', video:'🎬', audio:'🎵', doc:'📄', other:'📎' }[c] || '📎';
}

/* ============================================================
   Toast / Loading
============================================================ */
function showToast(msg, type = 'info', duration = 3000) {
  const c  = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className  = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity .3s';
    el.style.opacity    = '0';
    setTimeout(() => el.remove(), 320);
  }, duration);
}

function showLoading(text = '載入中…') {
  document.getElementById('loading-text').textContent = text;
  document.getElementById('loading-overlay').classList.add('show');
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('show');
}

/* ============================================================
   進度條元件
============================================================ */
function createProgressBar(containerId, onCancel) {
  const container = document.getElementById(containerId);
  if (!container) return null;

  const wrapper = document.createElement('div');
  wrapper.className = 'upload-progress-wrapper';
  wrapper.innerHTML = `
    <div class="upload-progress-top">
      <span class="upload-filename">準備中…</span>
      <span class="upload-pct">0%</span>
    </div>
    <div class="upload-progress-bar-bg">
      <div class="upload-progress-bar-fill"></div>
    </div>
    <div class="upload-status-row">
      <span class="upload-status-text"></span>
      <button class="upload-cancel-btn" type="button">✕ 取消</button>
    </div>`;
  container.appendChild(wrapper);

  const STATUS_TEXT = {
    preparing : '🔧 準備中…',
    reading   : '📖 讀取檔案…',
    uploading : '⬆️ 上傳中…',
    merging   : '🔗 合併檔案…',
    done      : '✅ 完成！',
    cancelled : '🚫 已取消',
    error     : '❌ 上傳失敗',
  };

  const cancelBtn = wrapper.querySelector('.upload-cancel-btn');
  if (onCancel) {
    cancelBtn.addEventListener('click', () => { onCancel(); });
  } else {
    cancelBtn.style.display = 'none';
  }

  return {
    update(pct, fileName, status) {
      wrapper.querySelector('.upload-filename').textContent = fileName || '';
      wrapper.querySelector('.upload-pct').textContent      = `${pct}%`;
      wrapper.querySelector('.upload-progress-bar-fill').style.width = `${pct}%`;
      wrapper.querySelector('.upload-status-text').textContent = STATUS_TEXT[status] || status;
      if (status === 'done') {
        wrapper.querySelector('.upload-progress-bar-fill').style.background = '#00B900';
        cancelBtn.style.display = 'none';
      }
      if (status === 'cancelled' || status === 'error') {
        wrapper.querySelector('.upload-progress-bar-fill').style.background = '#E53935';
        cancelBtn.style.display = 'none';
      }
    },
    remove() { wrapper.remove(); },
  };
}

/* ============================================================
   API 呼叫
============================================================ */
async function callAPI(action, body = {}) {
  const payload = JSON.stringify({
    action,
    userId: State.user?.userId ?? '',
    ...body,
  });
  const res = await fetch(CONFIG.GAS_URL, {
    method  : 'POST',
    redirect: 'follow',
    body    : payload,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  let json;
  try { json = await res.json(); } catch { throw new Error('伺服器回應格式錯誤'); }
  if (!json.success) throw new Error(json.error || '伺服器錯誤');
  return json;
}

/* ============================================================
   ★ 核心：分塊上傳引擎
   - 小檔（< SMALL_MB）：單次 uploadFile
   - 大檔（>= SMALL_MB）：分塊 uploadChunk × N → mergeChunks
============================================================ */

/**
 * 主入口：自動判斷小檔 / 大檔
 * @param {File}     file
 * @param {Function} onProgress  (pct, fileName, status) => void
 * @param {string}   uploadId    外部傳入可取消用的 ID
 * @returns {Promise<{url, fileId, fileName, mimeType, category}>}
 */
async function uploadFileAuto(file, onProgress, uploadId) {
  const sizeMB   = file.size / 1024 / 1024;
  const mimeType = file.type || guessMimeFromName(file.name);

  if (sizeMB < MIME_CFG.SMALL_MB) {
    return await uploadSmall(file, mimeType, onProgress);
  } else {
    return await uploadChunked(file, mimeType, onProgress, uploadId);
  }
}

/* ── 小檔單次上傳 ── */
async function uploadSmall(file, mimeType, onProgress) {
  if (onProgress) onProgress(0, file.name, 'reading');
  const b64 = await fileToBase64(file);
  if (onProgress) onProgress(50, file.name, 'uploading');
  const res = await callAPI('uploadFile', {
    fileName: file.name,
    mimeType,
    data    : b64,
  });
  if (onProgress) onProgress(100, file.name, 'done');
  return { url: res.url, fileId: res.fileId, fileName: res.fileName, mimeType, category: res.category };
}

/* ── ★ 大檔分塊上傳 ── */
async function uploadChunked(file, mimeType, onProgress, uploadId) {
  const CHUNK_BYTES = MIME_CFG.CHUNK_SIZE_MB * 1024 * 1024;
  const totalChunks = Math.ceil(file.size / CHUNK_BYTES);
  const uid         = uploadId || genUploadId();

  // 建立 AbortController 供外部取消
  const abortCtrl = new AbortController();
  State.uploadAborts.set(uid, abortCtrl);

  if (onProgress) onProgress(0, file.name, 'preparing');

  try {
    for (let i = 0; i < totalChunks; i++) {

      // 檢查是否已取消
      if (abortCtrl.signal.aborted) {
        await callAPI('cancelUpload', { uploadId: uid, totalChunks }).catch(() => {});
        throw new DOMException('上傳已取消', 'AbortError');
      }

      // 切出此塊
      const start = i * CHUNK_BYTES;
      const end   = Math.min(start + CHUNK_BYTES, file.size);
      const chunk = file.slice(start, end);

      // 讀取此塊為 Base64
      if (onProgress) onProgress(
        Math.round((i / totalChunks) * 90),
        file.name,
        'reading'
      );
      const b64 = await fileSliceToBase64(chunk);

      // 上傳此塊
      if (onProgress) onProgress(
        Math.round(((i + 0.5) / totalChunks) * 90),
        file.name,
        'uploading'
      );

      await callAPI('uploadChunk', {
        uploadId    : uid,
        chunkIndex  : i,
        totalChunks,
        fileName    : file.name,
        mimeType,
        data        : b64,
      });

      // 更新進度
      if (onProgress) onProgress(
        Math.round(((i + 1) / totalChunks) * 90),
        file.name,
        'uploading'
      );
    }

    // 所有塊傳完，呼叫合併
    if (onProgress) onProgress(92, file.name, 'merging');
    const res = await callAPI('mergeChunks', { uploadId: uid });
    if (onProgress) onProgress(100, file.name, 'done');

    return {
      url     : res.url,
      fileId  : res.fileId,
      fileName: res.fileName,
      mimeType,
      category: res.category,
    };

  } catch (err) {
    // 非取消錯誤 → 嘗試通知後端清理
    if (err.name !== 'AbortError') {
      await callAPI('cancelUpload', { uploadId: uid, totalChunks }).catch(() => {});
    }
    throw err;
  } finally {
    State.uploadAborts.delete(uid);
  }
}

/* ── 取消指定上傳 ── */
function cancelUpload(uploadId) {
  const ctrl = State.uploadAborts.get(uploadId);
  if (ctrl) ctrl.abort();
}

/* ── File → Base64（整個檔案） ── */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve(e.target.result.split(',')[1]);
    r.onerror = () => reject(new Error('讀取檔案失敗'));
    r.readAsDataURL(file);
  });
}

/* ── Blob（slice）→ Base64 ── */
function fileSliceToBase64(blob) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload  = e => resolve(e.target.result.split(',')[1]);
    r.onerror = () => reject(new Error('讀取分塊失敗'));
    r.readAsDataURL(blob);
  });
}

/* ============================================================
   ★ 上傳佇列：處理所有 pendingFiles
============================================================ */
async function uploadPendingFiles() {
  if (!State.pendingFiles.length) return [];
  const urls = [];

  for (const item of State.pendingFiles) {
    const { file, id: uploadId } = item;
    const sizeMB   = file.size / 1024 / 1024;
    const category = getMimeCategory(file.type || guessMimeFromName(file.name));

    if (sizeMB > MIME_CFG.MAX_SIZE_MB) {
      showToast(`❌ 檔案過大：${file.name}（${sizeMB.toFixed(1)}MB，上限 ${MIME_CFG.MAX_SIZE_MB}MB）`, 'error', 5000);
      continue;
    }

    // 建立進度條（含取消按鈕）
    const bar = createProgressBar('preview-list', () => {
      cancelUpload(uploadId);
      showToast(`🚫 已取消：${file.name}`, 'warn');
    });

    showLoading(`上傳 ${getCategoryIcon(category)} ${file.name}（${sizeMB.toFixed(1)}MB）`);

    try {
      const result = await uploadFileAuto(
        file,
        (pct, name, status) => {
          bar?.update(pct, name, status);
          showLoading(`上傳中 ${pct}%：${file.name}`);
        },
        uploadId
      );
      urls.push(result.url);
      showToast(`✅ 上傳完成：${file.name}`, 'success');
    } catch (err) {
      if (err.name === 'AbortError') {
        bar?.update(0, file.name, 'cancelled');
      } else {
        bar?.update(0, file.name, 'error');
        showToast(`❌ 上傳失敗：${file.name} — ${err.message}`, 'error', 6000);
        console.error('[Upload]', file.name, err);
      }
    } finally {
      setTimeout(() => bar?.remove(), 2500);
    }
  }

  hideLoading();
  return urls;
}

/* ============================================================
   buildAttachElement — 依類型建立附件顯示元素
============================================================ */
function buildAttachElement(url, options = {}) {
  const { canDl = false, thumbSize = 80, isDetail = false } = options;

  let mimeType = '', realUrl = url;
  if (url && typeof url === 'object') {
    mimeType = url.mimeType || '';
    realUrl  = url.url || '';
  }

  const fileId   = getDriveFileId(realUrl);
  const openUrl  = fileId ? driveOpenUrl(realUrl) : realUrl;
  const fileName = getFileNameFromUrl(realUrl);
  if (!mimeType) mimeType = guessMimeFromName(fileName);
  const category = getMimeCategory(mimeType);
  const thumb    = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w${thumbSize * 2}` : null;
  const isImg    = category === 'image' || (thumb !== null && category !== 'video' && category !== 'audio');

  /* ── 影片 ── */
  if (category === 'video') {
    if (isDetail && canDl) {
      const wrap  = document.createElement('div'); wrap.className = 'attach-video-wrap';
      const video = document.createElement('video'); video.controls = true; video.preload = 'metadata';
      video.src   = fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : realUrl;
      const link  = document.createElement('a');
      link.href   = openUrl; link.target = '_blank'; link.rel = 'noopener noreferrer';
      link.className = 'detail-attach-file'; link.style.marginTop = '6px';
      link.innerHTML = `🎬 <span>在 Drive 開啟：${escHtml(fileName)}</span>`;
      wrap.appendChild(video); wrap.appendChild(link); return wrap;
    }
    if (isDetail && !canDl) {
      const span = document.createElement('span'); span.className = 'detail-attach-file locked';
      span.innerHTML = `🔒 <span>${escHtml(fileName)}</span>`;
      span.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限才能播放影片', 'warn'); });
      return span;
    }
    if (canDl) {
      const a = document.createElement('a'); a.className = 'attach-media-badge video';
      a.href = openUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = `🎬 <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(fileName)}</span>`;
      a.addEventListener('click', e => e.stopPropagation()); return a;
    }
    const span = document.createElement('span'); span.className = 'attach-media-badge video'; span.style.cursor = 'not-allowed';
    span.innerHTML = `🔒 <span>${escHtml(fileName)}</span>`;
    span.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限', 'warn'); }); return span;
  }

  /* ── 音訊 ── */
  if (category === 'audio') {
    if (isDetail && canDl) {
      const wrap  = document.createElement('div'); wrap.className = 'attach-audio-wrap';
      const icon  = document.createElement('span'); icon.className = 'attach-audio-icon'; icon.textContent = '🎵';
      const audio = document.createElement('audio'); audio.controls = true; audio.preload = 'metadata';
      audio.src   = fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : realUrl;
      wrap.appendChild(icon); wrap.appendChild(audio); return wrap;
    }
    if (isDetail && !canDl) {
      const span = document.createElement('span'); span.className = 'detail-attach-file locked';
      span.innerHTML = `🔒 <span>${escHtml(fileName)}</span>`;
      span.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限才能播放音訊', 'warn'); });
      return span;
    }
    if (canDl) {
      const a = document.createElement('a'); a.className = 'attach-media-badge audio';
      a.href = openUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = `🎵 <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(fileName)}</span>`;
      a.addEventListener('click', e => e.stopPropagation()); return a;
    }
    const span = document.createElement('span'); span.className = 'attach-media-badge audio'; span.style.cursor = 'not-allowed';
    span.innerHTML = `🔒 <span>${escHtml(fileName)}</span>`;
    span.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限', 'warn'); }); return span;
  }

  /* ── 圖片 ── */
  if (isImg) {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:relative;width:${thumbSize}px;height:${thumbSize}px;border-radius:8px;overflow:hidden;border:1px solid var(--border);flex-shrink:0`;
    const img = document.createElement('img'); img.src = thumb ?? realUrl; img.alt = '附件圖片';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block';
    if (fileId) bindImgFallback(img, realUrl);
    if (canDl) {
      wrapper.style.cursor = 'pointer'; wrapper.title = '點擊開啟原始檔';
      wrapper.addEventListener('click', e => { e.stopPropagation(); window.open(openUrl, '_blank'); });
      wrapper.appendChild(img);
    } else {
      img.style.filter = 'brightness(.5)'; wrapper.style.cursor = 'not-allowed';
      const lock = document.createElement('div');
      lock.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem';
      lock.textContent = '🔒'; wrapper.appendChild(img); wrapper.appendChild(lock);
      wrapper.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限才能下載附件', 'warn'); });
    }
    return wrapper;
  }

  /* ── 一般檔案 ── */
  if (canDl) {
    const a = document.createElement('a');
    a.className = isDetail ? 'detail-attach-file' : 'attach-file';
    a.href = openUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
    a.innerHTML = `${getCategoryIcon(category)} <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(fileName)}</span>`;
    a.addEventListener('click', e => e.stopPropagation()); return a;
  }
  const span = document.createElement('span');
  span.className = (isDetail ? 'detail-attach-file' : 'attach-file') + ' locked'; span.style.cursor = 'not-allowed';
  span.innerHTML = `🔒 <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(fileName)}</span>`;
  span.addEventListener('click', e => { e.stopPropagation(); showToast('🔒 需要會員以上權限才能下載附件', 'warn'); }); return span;
}

   Part 3：LIFF 初始化 / 頁面切換 / 記事 CRUD / 附件預覽渲染
============================================================ */

/* ============================================================
   LIFF 初始化
============================================================ */
async function initApp() {
  showLoading('初始化中…');
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    State.user = {
      userId     : profile.userId,
      displayName: profile.displayName,
      pictureUrl : profile.pictureUrl,
    };

    const res      = await callAPI('login', { name: profile.displayName, picture: profile.pictureUrl });
    State.myRole   = res.role || 'guest';

    bindEvents();
    await loadNotes();

    if (canManageUser(State.myRole)) {
      document.getElementById('btn-manage-users').style.display = '';
    }
    switchPage('list');

  } catch (err) {
    showToast(`初始化失敗：${err.message}`, 'error', 6000);
    console.error('[initApp]', err);
  } finally {
    hideLoading();
  }
}

/* ============================================================
   頁面切換
============================================================ */
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById(`page-${name}`);
  if (target) target.classList.add('active');

  const headerTitle = document.getElementById('header-title');
  const headerBack  = document.getElementById('header-back');
  const fab         = document.getElementById('fab-add');
  const btnMgr      = document.getElementById('btn-manage-users');

  // 重置 header 狀態
  headerBack.classList.remove('visible');
  fab.classList.remove('hidden');
  btnMgr.style.display = 'none';

  switch (name) {

    case 'list':
      headerTitle.textContent = '📒 記事本';
      fab.classList.toggle('hidden', !canWrite(State.myRole));
      if (canManageUser(State.myRole)) btnMgr.style.display = '';
      break;

    case 'detail': {
      // 用 cloneNode 避免重複綁定返回事件
      const nb = headerBack.cloneNode(true);
      headerBack.replaceWith(nb);
      nb.classList.add('visible');
      nb.addEventListener('click', () => switchPage('list'));
      fab.classList.add('hidden');
      const t = State.viewingNote?.Title ?? '文章詳細';
      headerTitle.textContent = t.length > 16 ? t.slice(0, 16) + '…' : t;
      break;
    }

    case 'users': {
      const bb = headerBack.cloneNode(true);
      headerBack.replaceWith(bb);
      bb.classList.add('visible');
      bb.addEventListener('click', () => switchPage('list'));
      fab.classList.add('hidden');
      headerTitle.textContent = '👥 人員管理';
      break;
    }
  }
}

/* ============================================================
   事件綁定
============================================================ */
function bindEvents() {

  // FAB 新增
  document.getElementById('fab-add')
    .addEventListener('click', () => openEditForm(null));

  // 人員管理
  document.getElementById('btn-manage-users')
    .addEventListener('click', () => { loadUsers(); switchPage('users'); });

  // 搜尋 / 排序
  document.getElementById('search-input')
    .addEventListener('input', applySearch);
  document.getElementById('search-sort')
    .addEventListener('change', applySearch);

  // Modal 關閉
  document.getElementById('modal-close')
    .addEventListener('click', closeModal);
  document.getElementById('form-cancel')
    .addEventListener('click', closeModal);
  document.getElementById('note-modal')
    .addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  // 儲存
  document.getElementById('form-submit')
    .addEventListener('click', submitNote);

  // 檔案選擇
  document.getElementById('file-input')
    .addEventListener('change', e => {
      const files = Array.from(e.target.files || []);

      // 過濾超大檔
      const over = files.filter(f => f.size / 1024 / 1024 > MIME_CFG.MAX_SIZE_MB);
      over.forEach(f =>
        showToast(`❌ 檔案過大：${f.name}（上限 ${MIME_CFG.MAX_SIZE_MB}MB）`, 'error', 5000)
      );

      // 加入佇列，每個檔案附帶唯一 uploadId
      const valid = files.filter(f => f.size / 1024 / 1024 <= MIME_CFG.MAX_SIZE_MB);
      valid.forEach(f => State.pendingFiles.push({ file: f, id: genUploadId() }));

      renderNewFilePreviews();
      e.target.value = '';
    });

  // 人員篩選按鈕
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyUserFilter(btn.dataset.filter);
    });
  });
}

/* ============================================================
   記事：載入 & 搜尋
============================================================ */
async function loadNotes() {
  try {
    const res  = await callAPI('getNotes');
    State.notes = res.notes || [];
    applySearch();
  } catch (err) {
    showToast(`載入記事失敗：${err.message}`, 'error');
  }
}

function applySearch() {
  const q    = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const sort = document.getElementById('search-sort').value;
  let list   = [...State.notes];

  if (q) {
    list = list.filter(n =>
      String(n.Title   || '').toLowerCase().includes(q) ||
      String(n.Content || '').toLowerCase().includes(q)
    );
  }

  switch (sort) {
    case 'oldest': list.sort((a, b) => new Date(a.CreatedAt) - new Date(b.CreatedAt)); break;
    case 'views':  list.sort((a, b) => (b.ViewCount || 0) - (a.ViewCount || 0));       break;
    default:       list.sort((a, b) => new Date(b.CreatedAt) - new Date(a.CreatedAt)); break;
  }

  renderNoteList(list);
}

/* ============================================================
   記事：開啟新增 / 編輯表單
============================================================ */
function openEditForm(note) {
  State.editingNote  = note;
  State.pendingFiles = [];

  if (note) {
    document.getElementById('modal-title-text').textContent = '✏️ 編輯記事';
    document.getElementById('form-title').value             = note.Title   || '';
    document.getElementById('form-content').value           = note.Content || '';
    try   { State.existAttach = JSON.parse(note.Attachments || '[]'); }
    catch { State.existAttach = []; }
  } else {
    document.getElementById('modal-title-text').textContent = '📝 新增記事';
    document.getElementById('form-title').value             = '';
    document.getElementById('form-content').value           = '';
    State.existAttach = [];
  }

  renderExistingAttachPreviews();
  renderNewFilePreviews();
  document.getElementById('note-modal').classList.add('open');
  document.getElementById('form-title').focus();
}

/* ============================================================
   記事：關閉 Modal
============================================================ */
function closeModal() {
  // 若有進行中上傳，先全部取消
  State.uploadAborts.forEach((ctrl, uid) => {
    ctrl.abort();
    callAPI('cancelUpload', { uploadId: uid }).catch(() => {});
  });
  State.uploadAborts.clear();

  document.getElementById('note-modal').classList.remove('open');
  document.getElementById('preview-list').innerHTML = '';
  State.editingNote  = null;
  State.pendingFiles = [];
  State.existAttach  = [];
}

/* ============================================================
   記事：儲存（新增 / 編輯）
============================================================ */
async function submitNote() {
  const title   = document.getElementById('form-title').value.trim();
  const content = document.getElementById('form-content').value.trim();
  if (!title)   { showToast('請輸入標題', 'warn'); return; }
  if (!content) { showToast('請輸入內容', 'warn'); return; }

  const submitBtn      = document.getElementById('form-submit');
  submitBtn.disabled   = true;
  showLoading('儲存中…');

  try {
    // 上傳所有待上傳附件
    const newUrls   = await uploadPendingFiles();
    const attachments = [...State.existAttach, ...newUrls];

    if (State.editingNote) {
      await callAPI('editNote', {
        noteId     : State.editingNote.NoteID,
        title,
        content,
        attachments,
      });
      showToast('✅ 記事已更新', 'success');
    } else {
      await callAPI('addNote', { title, content, attachments });
      showToast('✅ 記事已新增', 'success');
    }

    closeModal();
    await loadNotes();

  } catch (err) {
    showToast(`儲存失敗：${err.message}`, 'error');
  } finally {
    submitBtn.disabled = false;
    hideLoading();
  }
}

/* ============================================================
   記事：刪除
============================================================ */
async function deleteNote(noteId) {
  if (!confirm('確定要刪除這則記事嗎？')) return;
  showLoading('刪除中…');
  try {
    await callAPI('deleteNote', { noteId });
    showToast('🗑 記事已刪除', 'success');
    if (State.viewingNote?.NoteID === noteId) switchPage('list');
    await loadNotes();
  } catch (err) {
    showToast(`刪除失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   記事：閱覽紀錄
============================================================ */
async function recordView(noteId) {
  try {
    await callAPI('recordView', { noteId });
    const note = State.notes.find(n => n.NoteID === noteId);
    if (note) note.ViewCount = (note.ViewCount || 0) + 1;
  } catch (err) {
    console.warn('[recordView]', err.message);
  }
}

/* ============================================================
   記事：轉發 Flex Message
============================================================ */
async function forwardNote(note) {
  if (!liff.isApiAvailable('shareTargetPicker')) {
    showToast('此環境不支援轉發功能', 'warn'); return;
  }
  try {
    await liff.shareTargetPicker([{
      type    : 'flex',
      altText : `📒 ${note.Title}`,
      contents: {
        type  : 'bubble',
        header: {
          type      : 'box', layout: 'vertical',
          contents  : [{ type:'text', text:'📒 記事本', size:'sm', color:'#ffffff', weight:'bold' }],
          backgroundColor: '#00B900', paddingAll: '12px',
        },
        body: {
          type: 'box', layout: 'vertical', spacing: 'sm',
          contents: [
            { type:'text', text: note.Title,   weight:'bold', size:'lg', wrap:true },
            { type:'text', text: note.Content, size:'sm', color:'#666666', wrap:true, maxLines:3 },
            {
              type: 'box', layout: 'horizontal', margin: 'md',
              contents: [
                { type:'text', text:`👤 ${note.CreatedByUserName || '未知'}`, size:'xs', color:'#999999', flex:1 },
                { type:'text', text:`👁 ${note.ViewCount || 0} 次`,           size:'xs', color:'#999999', align:'end' },
              ],
            },
          ],
        },
      },
    }]);
    showToast('✅ 已轉發', 'success');
  } catch (err) {
    if (err.code !== 'CANCEL') showToast(`轉發失敗：${err.message}`, 'error');
  }
}

/* ============================================================
   附件預覽：已存在附件
============================================================ */
function renderExistingAttachPreviews() {
  const list = document.getElementById('preview-list');
  // 只移除「已存在」的預覽，保留「待上傳」的
  list.querySelectorAll('.preview-item:not([data-new])').forEach(el => el.remove());

  State.existAttach.forEach((url, i) => {
    const item     = document.createElement('div');
    item.className = 'preview-item';

    const fileId   = getDriveFileId(url);
    const thumb    = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w200` : null;
    const fileName = getFileNameFromUrl(url);
    const category = getMimeCategory(guessMimeFromName(fileName));

    if (category === 'video') {
      const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = '🎬';
      const name = document.createElement('div'); name.className = 'file-name'; name.textContent = fileName;
      item.appendChild(icon); item.appendChild(name);

    } else if (category === 'audio') {
      const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = '🎵';
      const name = document.createElement('div'); name.className = 'file-name'; name.textContent = fileName;
      item.appendChild(icon); item.appendChild(name);

    } else if (thumb || isImageUrl(url)) {
      const img = document.createElement('img');
      img.src   = thumb ?? url; img.alt = '附件';
      if (fileId) bindImgFallback(img, url);
      item.appendChild(img);

    } else {
      const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = getCategoryIcon(category);
      const name = document.createElement('div'); name.className = 'file-name'; name.textContent = fileName;
      item.appendChild(icon); item.appendChild(name);
    }

    // 刪除按鈕
    const rm = document.createElement('button');
    rm.className   = 'preview-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => {
      State.existAttach.splice(i, 1);
      renderExistingAttachPreviews();
    });
    item.appendChild(rm);

    // 插入到 list 最前面（已存在附件排在待上傳之前）
    list.insertBefore(item, list.firstChild);
  });
}

/* ============================================================
   附件預覽：待上傳新檔案
============================================================ */
function renderNewFilePreviews() {
  // 移除舊的 data-new 預覽
  document.querySelectorAll('.preview-item[data-new]').forEach(el => el.remove());

  const list = document.getElementById('preview-list');

  State.pendingFiles.forEach((item, i) => {
    const { file, id: uploadId } = item;
    const previewEl  = document.createElement('div');
    previewEl.className  = 'preview-item';
    previewEl.dataset.new = '1';

    const category = getMimeCategory(file.type || guessMimeFromName(file.name));

    if (category === 'image') {
      // 圖片：用 FileReader 顯示預覽
      const img = document.createElement('img');
      const r   = new FileReader();
      r.onload  = e => { img.src = e.target.result; };
      r.readAsDataURL(file);
      previewEl.appendChild(img);

    } else if (category === 'video') {
      // 影片：嘗試擷取縮圖
      const icon    = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = '🎬';
      const name    = document.createElement('div'); name.className = 'file-name'; name.textContent = file.name;
      const videoEl = document.createElement('video');
      videoEl.src   = URL.createObjectURL(file);
      videoEl.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
      videoEl.muted   = true;
      videoEl.preload = 'metadata';
      videoEl.addEventListener('loadedmetadata', () => { videoEl.currentTime = 1; });
      videoEl.addEventListener('seeked', () => {
        const canvas = document.createElement('canvas');
        canvas.width = 72; canvas.height = 72;
        canvas.getContext('2d').drawImage(videoEl, 0, 0, 72, 72);
        const thumbImg = document.createElement('img');
        thumbImg.src   = canvas.toDataURL('image/jpeg');
        thumbImg.className = 'video-thumb';
        previewEl.insertBefore(thumbImg, previewEl.firstChild);
        videoEl.remove(); icon.remove();
        URL.revokeObjectURL(videoEl.src);
      });
      const playIcon = document.createElement('div');
      playIcon.className   = 'video-play-icon';
      playIcon.textContent = '▶';
      previewEl.appendChild(videoEl);
      previewEl.appendChild(icon);
      previewEl.appendChild(name);
      previewEl.appendChild(playIcon);

    } else if (category === 'audio') {
      const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = '🎵';
      const name = document.createElement('div'); name.className = 'file-name'; name.textContent = file.name;
      previewEl.appendChild(icon); previewEl.appendChild(name);

    } else {
      const icon = document.createElement('div'); icon.className = 'file-icon'; icon.textContent = getCategoryIcon(category);
      const name = document.createElement('div'); name.className = 'file-name'; name.textContent = file.name;
      previewEl.appendChild(icon); previewEl.appendChild(name);
    }

    // 大小標示
    const sizeMB = file.size / 1024 / 1024;
    if (sizeMB >= 1) {
      const sizeTag = document.createElement('div');
      sizeTag.style.cssText = 'position:absolute;bottom:2px;left:2px;font-size:.5rem;background:rgba(0,0,0,.55);color:#fff;border-radius:4px;padding:1px 4px;';
      sizeTag.textContent   = `${sizeMB.toFixed(1)}M`;
      previewEl.appendChild(sizeTag);
    }

    // 刪除 / 取消按鈕
    const rm = document.createElement('button');
    rm.className   = 'preview-remove';
    rm.textContent = '✕';
    rm.title       = '移除此檔案';
    rm.addEventListener('click', () => {
      // 若正在上傳中則取消
      cancelUpload(uploadId);
      State.pendingFiles.splice(i, 1);
      renderNewFilePreviews();
    });
    previewEl.appendChild(rm);
    list.appendChild(previewEl);
  });
}

function openDetail(note) {
  State.viewingNote = note;
  recordView(note.NoteID);

/* ============================================================
   詳細頁：渲染
============================================================ */
function renderDetail(note) {
  const myRole  = State.myRole;
  const isOwner = note.CreatedByUserID === State.user.userId;
  const canEdit = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canDel  = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canFwd  = canWrite(myRole);
  const canDl   = canDownload(myRole);

  let attachUrls = [];
  try { attachUrls = note.Attachments ? JSON.parse(note.Attachments) : []; } catch {}
  let viewers = [];
  try { viewers = note.Viewers ? JSON.parse(note.Viewers) : []; } catch {}

  // 標題 & meta
  document.getElementById('detail-title').textContent = note.Title;
  const metaEl = document.getElementById('detail-meta');
  metaEl.innerHTML =
    `<span class="meta-badge">👤 ${escHtml(note.CreatedByUserName ?? '未知')}</span>` +
    `<span class="meta-badge">🕐 ${escHtml(fmtTime(note.CreatedAt))}</span>` +
    `<span class="meta-badge">👁 ${escHtml(String(note.ViewCount ?? 0))} 次</span>` +
    (note.LastEditedAt && note.LastEditedAt !== note.CreatedAt
      ? `<span class="meta-badge">✏️ 編輯於 ${escHtml(fmtTime(note.LastEditedAt))}</span>` : '');

  // 內容
  document.getElementById('detail-content').textContent = note.Content;

  // 附件
  const attachSection = document.getElementById('detail-attach-section');
  const attachWrap    = document.getElementById('detail-attachments');
  attachWrap.innerHTML = '';
  if (attachUrls.length) {
    attachSection.style.display = '';
    attachUrls.forEach(url => {
      const el  = buildAttachElement(url, { canDl, thumbSize: 100, isDetail: true });
      const cat = getMimeCategory(
        guessMimeFromName(getFileNameFromUrl(typeof url === 'object' ? (url.url || '') : url))
      );
      if (cat === 'video' || cat === 'audio') el.style.width = '100%';
      attachWrap.appendChild(el);
    });
  } else {
    attachSection.style.display = 'none';
  }

  // 閱覽紀錄
  const viewersSection = document.getElementById('detail-viewers-section');
  const viewersWrap    = document.getElementById('detail-viewers');
  viewersWrap.innerHTML = '';
  if (viewers.length) {
    viewersSection.style.display = '';
    viewers.forEach(name => {
      const chip = document.createElement('span');
      chip.className   = 'viewer-chip';
      chip.textContent = `👤 ${name}`;
      viewersWrap.appendChild(chip);
    });
  } else {
    viewersSection.style.display = 'none';
  }

  // 底部按鈕
  const footer = document.getElementById('detail-footer');
  footer.innerHTML = '';

  const btnBack = document.createElement('button');
  btnBack.className   = 'btn-detail-back';
  btnBack.textContent = '← 返回';
  btnBack.addEventListener('click', () => switchPage('list'));
  footer.appendChild(btnBack);

  if (canFwd) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-forward';
    btn.textContent = '↗ 轉發';
    btn.addEventListener('click', () => forwardNote(note));
    footer.appendChild(btn);
  }
  if (canEdit) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-edit';
    btn.textContent = '✏️ 編輯';
    btn.addEventListener('click', () => openEditForm(note));
    footer.appendChild(btn);
  }
  if (canDel) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-delete';
    btn.textContent = '🗑 刪除';
    btn.addEventListener('click', async () => { await deleteNote(note.NoteID); });
    footer.appendChild(btn);
  }
}

/* ============================================================
   記事列表：建立卡片
============================================================ */
function buildNoteCard(note) {
  const myRole  = State.myRole;
  const isOwner = note.CreatedByUserID === State.user?.userId;
  const canEdit = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canDel  = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canFwd  = canWrite(myRole);
  const canDl   = canDownload(myRole);

  let attachUrls = [];
  try { attachUrls = note.Attachments ? JSON.parse(note.Attachments) : []; } catch {}

  const card = document.createElement('div');
  card.className = 'note-card';
  card.addEventListener('click', () => openDetail(note));

  /* ── 左側色條 ── */
  const stripe = document.createElement('div');
  stripe.className = 'note-card-stripe';
  card.appendChild(stripe);

  /* ── 主體 ── */
  const body = document.createElement('div');
  body.className = 'note-card-body';

  /* 標題 */
  const titleEl = document.createElement('div');
  titleEl.className   = 'note-card-title';
  titleEl.textContent = note.Title;
  body.appendChild(titleEl);

  /* Meta 徽章 */
  const metaRow = document.createElement('div');
  metaRow.className = 'note-card-meta';

  const roleCfg = ROLE_LABEL[myRole] || ROLE_LABEL.guest;
  metaRow.innerHTML =
    `<span class="meta-badge">👤 ${escHtml(note.CreatedByUserName ?? '未知')}</span>` +
    `<span class="meta-badge">🕐 ${escHtml(fmtTime(note.CreatedAt))}</span>`          +
    `<span class="meta-badge">👁 ${escHtml(String(note.ViewCount ?? 0))}</span>`       +
    `<span class="role-badge ${roleCfg.cls}">${roleCfg.icon} ${roleCfg.text}</span>`;
  body.appendChild(metaRow);

  /* 內容預覽 */
  const contentEl = document.createElement('div');
  contentEl.className   = 'note-card-content';
  contentEl.textContent = note.Content;
  body.appendChild(contentEl);

  /* 附件縮圖列（最多顯示 4 個） */
  if (attachUrls.length) {
    const attachRow = document.createElement('div');
    attachRow.className = 'note-card-attachments';
    const show = attachUrls.slice(0, 4);
    show.forEach(url => {
      const el = buildAttachElement(url, { canDl, thumbSize: 56 });
      attachRow.appendChild(el);
    });
    if (attachUrls.length > 4) {
      const more = document.createElement('span');
      more.className   = 'meta-badge';
      more.textContent = `+${attachUrls.length - 4}`;
      more.style.cssText = 'display:flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:8px;font-size:.8rem;';
      attachRow.appendChild(more);
    }
    body.appendChild(attachRow);
  }

  /* 操作按鈕列 */
  const actions = document.createElement('div');
  actions.className = 'note-card-actions';

  if (canFwd) {
    const btn = document.createElement('button');
    btn.className   = 'btn-card btn-forward';
    btn.textContent = '↗ 轉發';
    btn.addEventListener('click', e => { e.stopPropagation(); forwardNote(note); });
    actions.appendChild(btn);
  }
  if (canEdit) {
    const btn = document.createElement('button');
    btn.className   = 'btn-card btn-edit';
    btn.textContent = '✏️ 編輯';
    btn.addEventListener('click', e => { e.stopPropagation(); openEditForm(note); });
    actions.appendChild(btn);
  }
  if (canDel) {
    const btn = document.createElement('button');
    btn.className   = 'btn-card btn-delete';
    btn.textContent = '🗑 刪除';
    btn.addEventListener('click', e => { e.stopPropagation(); deleteNote(note.NoteID); });
    actions.appendChild(btn);
  }
  if (actions.children.length) body.appendChild(actions);

  card.appendChild(body);
  return card;
}

/* ============================================================
   人員管理：載入
============================================================ */
async function loadUsers() {
  showLoading('載入人員中…');
  try {
    const res    = await callAPI('getUsers');
    State.users  = res.users || [];
    applyUserFilter('all');
  } catch (err) {
    showToast(`載入人員失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   人員管理：篩選
============================================================ */
function applyUserFilter(filter) {
  let list = [...State.users];

  switch (filter) {
    case 'admin'  : list = list.filter(u => u.Role   === 'admin');   break;
    case 'member' : list = list.filter(u => u.Role   === 'member');  break;
    case 'guest'  : list = list.filter(u => u.Role   === 'guest');   break;
    case 'banned' : list = list.filter(u => u.Status === 'banned');  break;
    default       : /* all — 不過濾 */ break;
  }

  /* 排序：owner > admin > member > guest，封鎖排最後 */
  list.sort((a, b) => {
    if (a.Status === 'banned' && b.Status !== 'banned') return  1;
    if (b.Status === 'banned' && a.Status !== 'banned') return -1;
    return (ROLE_LEVEL[b.Role] || 0) - (ROLE_LEVEL[a.Role] || 0);
  });

  document.getElementById('users-count').textContent =
    `共 ${list.length} 位${filter !== 'all' ? `（篩選：${filter}）` : ''}`;

  renderUserList(list);
}
