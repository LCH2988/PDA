<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary:   #4CAF50;
      --secondary: #6c757d;
      --danger:    #dc3545;
      --bg:        #f4f4f9;
      --text:      #333;
      --fs-base:   20px;
      --fs-lg:     24px;
      --fs-xl:     28px;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 15px;
      font-size: var(--fs-base);
      line-height: 1.6;
    }

    h1, h2 { color: var(--primary); text-align: center; }

    .container { max-width: 600px; margin: 0 auto; }

    /* ── 按鈕 ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: var(--fs-lg);
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }
    .btn-secondary { background: var(--secondary); }
    .btn-danger    { background: var(--danger); }
    .btn:hover     { opacity: .88; }
    .btn:disabled  { opacity: .5; cursor: not-allowed; }

    /* ── 表單 ── */
    .form-group { margin-bottom: 20px; }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: var(--fs-lg);
    }
    input[type="text"],
    textarea,
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: var(--fs-base);
    }
    textarea { height: 200px; resize: vertical; }

    /* ── 記事卡片 ── */
    .note-card {
      background: #fff;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      border-left: 8px solid var(--primary);
      cursor: pointer;
    }
    .note-title   { font-size: var(--fs-xl); font-weight: bold; margin-bottom: 10px; color: #222; }
    .note-meta    { font-size: 16px; color: #777; margin-bottom: 10px; }
    .note-content { white-space: pre-wrap; margin-bottom: 15px; font-size: var(--fs-base); }

    /* ── 附件 ── */
    .attachment-preview { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .attachment-img {
      width: 80px; height: 80px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #ddd;
      cursor: pointer;
    }
    .attachment-link {
      font-size: 16px;
      padding: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      text-decoration: none;
      color: #333;
    }

    /* ── 搜尋 ── */
    .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box input { flex: 1; }
    .search-box .btn  { width: auto; margin: 0; padding: 10px 20px; font-size: var(--fs-base); }

    /* ── 按鈕群組 ── */
    .button-group { margin-top: 15px; display: flex; gap: 10px; }
    .button-group .btn { flex: 1; margin: 0; padding: 10px; font-size: 16px; }

    /* ── 閱覽者 ── */
    .viewers-list {
      margin-top: 10px;
      padding: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      font-size: 16px;
      word-break: break-all;
    }

    /* ── Toast 通知 ── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      color: #fff;
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 18px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* ── 載入動畫 ── */
    .loading { text-align: center; font-size: var(--fs-lg); margin-top: 50px; }
    .spinner {
      display: inline-block;
      width: 40px; height: 40px;
      border: 5px solid #ccc;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-bottom: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- 載入中 -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>載入中，請稍候...</p>
  </div>

  <!-- 主畫面 -->
  <div id="app" class="hidden">
    <h1>📒 網路記事本</h1>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋...">
      <button class="btn" onclick="searchNotes()">搜尋</button>
    </div>
    <button class="btn" onclick="showAddForm()">＋ 新增記事</button>

    <div id="noteList"></div>
  </div>

  <!-- 新增 / 編輯表單 -->
  <div id="noteForm" class="hidden">
    <h2 id="formTitle">新增記事</h2>
    <div class="form-group">
      <label for="title">標題</label>
      <input type="text" id="title" placeholder="請輸入標題">
    </div>
    <div class="form-group">
      <label for="content">內容</label>
      <textarea id="content" placeholder="請輸入內容"></textarea>
    </div>
    <div class="form-group">
      <label for="attachments">附件（可多選）</label>
      <input type="file" id="attachments" multiple onchange="previewFiles()">
      <div id="previewContainer" class="attachment-preview"></div>
    </div>
    <button class="btn" id="saveBtn" onclick="saveNote()">儲存</button>
    <button class="btn btn-secondary" onclick="showList()">取消</button>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // =============================================
  // 設定區（請依實際情況修改）
  // =============================================
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbym2nS4Swxq-HE_KZLwMnbGtXs58KKurmvJ5--m27GyiCcUgEYZ10MnXbwbmHm44aRagw/exec';
  const LIFF_ID = '2001679903-jkND3El9';

  // =============================================
  // 全域狀態
  // =============================================
  let currentUser   = { userID: '', userName: '' };
  let currentNotes  = [];
  let editingNoteID = null;

  // =============================================
  // 初始化
  // =============================================
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();
      currentUser.userID   = profile.userId;
      currentUser.userName = profile.displayName;
    } catch (err) {
      console.warn('LIFF 初始化失敗，使用測試模式', err);
      currentUser = { userID: 'test_user', userName: '測試使用者' };
    }
    loadNotes();
  }

  // =============================================
  // API 呼叫（GET + URLSearchParams，解決 CORS）
  // =============================================
  async function callGasApi(action, data) {
    try {
      const params = new URLSearchParams({
        action: action,
        data: JSON.stringify(data)
      });
      const url = GAS_WEB_APP_URL + '?' + params.toString();

      const response = await fetch(url, {
        method: 'GET',
        redirect: 'follow'   // GAS 會 302 redirect，必須加
      });

      if (!response.ok) throw new Error('HTTP ' + response.status);
      return await response.json();

    } catch (error) {
      console.error('API 呼叫失敗:', error);
      return { success: false, message: error.message };
    }
  }

  // =============================================
  // 記事清單
  // =============================================
  async function loadNotes(keyword) {
    showLoading(true);
    const result = await callGasApi('getNotes', { keyword: keyword || '' });
    showLoading(false);

    if (result.success) {
      currentNotes = result.data;
      renderNotes(result.data);
    } else {
      showToast('載入失敗：' + result.message);
    }
  }

  function renderNotes(notes) {
    const listDiv = document.getElementById('noteList');
    listDiv.innerHTML = '';

    if (!notes || notes.length === 0) {
      listDiv.innerHTML = '<p style="text-align:center;color:#999;">目前沒有記事</p>';
      return;
    }

    notes.forEach(function(note) {
      // 後端已過濾，但保留防呆
      if (note.Status === 'deleted') return;

      const card = document.createElement('div');
      card.className = 'note-card';
      card.onclick = function() { recordView(note.NoteID); };

      // 附件處理（支援物件格式與舊版字串格式）
      let attachments = [];
      try { attachments = JSON.parse(note.Attachments || '[]'); } catch(e) {}

      let attachHtml = '';
      attachments.forEach(function(item) {
        // 新格式：{ url, mimeType, name }；舊格式：字串 URL
        const url      = (typeof item === 'object') ? item.url      : item;
        const mimeType = (typeof item === 'object') ? item.mimeType : '';
        const name     = (typeof item === 'object') ? item.name     : '附件';

        if (mimeType.startsWith('image/')) {
          // 圖片：顯示縮圖，點擊開新分頁
          attachHtml += '<img src="' + url + '" class="attachment-img" '
            + 'alt="' + name + '" onclick="event.stopPropagation();window.open(\'' + url + '\',\'_blank\')">';
        } else {
          attachHtml += '<a href="' + url + '" target="_blank" '
            + 'class="attachment-link" onclick="event.stopPropagation()">📎 ' + name + '</a>';
        }
      });

      // 閱覽者
      let viewers = [];
      try { viewers = JSON.parse(note.Viewers || '[]'); } catch(e) {}
      const viewersHtml = viewers.length > 0
        ? '<div class="viewers-list"><strong>閱覽者：</strong>' + viewers.join(', ') + '</div>'
        : '';

      // 本人才顯示編輯/刪除按鈕
      const isOwner = note.CreatedByUserID === currentUser.userID;
      const actionHtml = isOwner
        ? '<div class="button-group">'
          + '<button class="btn btn-secondary" onclick="event.stopPropagation();editNote(\'' + note.NoteID + '\')">✏️ 編輯</button>'
          + '<button class="btn btn-danger"    onclick="event.stopPropagation();confirmDelete(\'' + note.NoteID + '\')">🗑️ 刪除</button>'
          + '</div>'
        : '';

      card.innerHTML =
        '<div class="note-title">' + escHtml(note.Title) + '</div>'
        + '<div class="note-meta">'
        +   '發言者：' + escHtml(note.CreatedByUserName)
        +   ' ｜ 時間：' + fmtDate(note.CreatedAt)
        +   ' ｜ 閱覽：' + (note.ViewCount || 0) + ' 次'
        + '</div>'
        + '<div class="note-content">' + escHtml(note.Content) + '</div>'
        + '<div class="attachment-preview">' + attachHtml + '</div>'
        + viewersHtml
        + actionHtml;

      listDiv.appendChild(card);
    });
  }

  function searchNotes() {
    const kw = document.getElementById('searchInput').value.trim();
    loadNotes(kw);
  }

  // =============================================
  // 新增 / 編輯表單
  // =============================================
  function showAddForm() {
    editingNoteID = null;
    document.getElementById('formTitle').innerText = '新增記事';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML = '';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('noteForm').classList.remove('hidden');
  }

  function editNote(noteID) {
    const note = currentNotes.find(function(n) { return n.NoteID === noteID; });
    if (!note) return;
    editingNoteID = noteID;
    document.getElementById('formTitle').innerText = '編輯記事';
    document.getElementById('title').value   = note.Title;
    document.getElementById('content').value = note.Content;
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML =
      '<p style="font-size:16px;color:#666;">（新上傳的附件將追加至現有附件）</p>';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('noteForm').classList.remove('hidden');
  }

  function showList() {
    document.getElementById('noteForm').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }

  // =============================================
  // 附件預覽
  // =============================================
  function previewFiles() {
    const preview = document.getElementById('previewContainer');
    preview.innerHTML = '';
    const files = document.getElementById('attachments').files;
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'attachment-img';
          img.alt = file.name;
          preview.appendChild(img);
        };
        reader.readAsDataURL(file);
      } else {
        const span = document.createElement('span');
        span.className = 'attachment-link';
        span.innerText = '📎 ' + file.name;
        preview.appendChild(span);
      }
    }
  }

  // =============================================
  // 儲存記事
  // =============================================
  async function saveNote() {
    const title   = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!title || !content) {
      showToast('請填寫標題與內容');
      return;
    }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.innerText = '儲存中...';
    showLoading(true);
    document.getElementById('noteForm').classList.add('hidden');

    // 附件轉 Base64
    const files = document.getElementById('attachments').files;
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      const b64 = await toBase64(files[i]);
      attachments.push({
        fileName: files[i].name,
        mimeType: files[i].type,
        base64:   b64.split(',')[1]
      });
    }

    const noteData = {
      title:       title,
      content:     content,
      attachments: attachments,
      userID:      currentUser.userID,
      userName:    currentUser.userName
    };

    let result;
    if (editingNoteID) {
      result = await callGasApi('updateNote', {
        noteID:   editingNoteID,
        noteData: noteData,
        userID:   currentUser.userID
      });
    } else {
      result = await callGasApi('addNote', noteData);
    }

    saveBtn.disabled = false;
    saveBtn.innerText = '儲存';

    if (result.success) {
      showToast(editingNoteID ? '記事已更新 ✅' : '記事已新增 ✅');
      showList();
      loadNotes();
    } else {
      showToast('儲存失敗：' + result.message);
      showLoading(false);
      document.getElementById('noteForm').classList.remove('hidden');
    }
  }

  // =============================================
  // 刪除記事
  // =============================================
  function confirmDelete(noteID) {
    if (confirm('確定要刪除這筆記事嗎？')) {
      doDeleteNote(noteID);
    }
  }

  async function doDeleteNote(noteID) {
    showLoading(true);
    const result = await callGasApi('deleteNote', {
      noteID: noteID,
      userID: currentUser.userID
    });
    showLoading(false);

    if (result.success) {
      showToast('記事已刪除 🗑️');
      loadNotes();
    } else {
      showToast('刪除失敗：' + result.message);
    }
  }

  // =============================================
  // 閱覽紀錄
  // =============================================
  async function recordView(noteID) {
    await callGasApi('recordView', {
      noteID: noteID,
      userID: currentUser.userID
    });
  }

  // =============================================
  // 輔助函數
  // =============================================
  const toBase64 = function(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload  = function() { resolve(reader.result); };
      reader.onerror = function(e) { reject(e); };
    });
  };

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtDate(val) {
    if (!val) return '—';
    const d = new Date(val);
    return isNaN(d) ? String(val) : d.toLocaleString('zh-TW');
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('hidden', !show);
    document.getElementById('app').classList.toggle('hidden',  show);
  }

  let toastTimer;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
  }

  // =============================================
  // 啟動
  // =============================================
  window.onload = initLiff;
</script>
</body>
</html>
