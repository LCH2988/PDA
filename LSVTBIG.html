<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title><?= APP_NAME ?></title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
  :root {
    --primary:    #06C755;
    --primary-dk: #05a847;
    --secondary:  #1a1a2e;
    --accent:     #e94560;
    --bg:         #f0f2f5;
    --card:       #ffffff;
    --text:       #2d3436;
    --muted:      #636e72;
    --border:     #dfe6e9;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 2px 12px rgba(0,0,0,0.08);
    --shadow-md:  0 4px 20px rgba(0,0,0,0.12);
    --transition: all 0.2s ease;
    --nav-h:      60px;
    --header-h:   56px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh; max-width: 480px;
    margin: 0 auto; background: var(--card);
    position: relative; overflow: hidden;
  }
  /* ── Header ── */
  #header {
    height: var(--header-h);
    background: linear-gradient(135deg, var(--secondary), #16213e);
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 16px; flex-shrink: 0;
    z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  #header .app-title {
    color: white; font-size: 17px; font-weight: 800;
    display: flex; align-items: center; gap: 8px;
  }
  #header .app-title .logo { font-size: 22px; }
  #userBar { display: flex; align-items: center; gap: 8px; }
  #userBar .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    object-fit: cover; border: 2px solid var(--primary); cursor: pointer;
  }
  #userBar .user-name {
    color: rgba(255,255,255,0.9); font-size: 13px; font-weight: 600;
    max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .role-badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .rb-admin { background: #e74c3c; color: white; }
  .rb-mod   { background: #e67e22; color: white; }
  .rb-vip   { background: #9b59b6; color: white; }
  .rb-user  { background: var(--primary); color: white; }
  .rb-guest { background: #95a5a6; color: white; }
  /* ── Pages ── */
  #pages { flex: 1; overflow: hidden; position: relative; }
  .page {
    position: absolute; inset: 0;
    overflow-y: auto; overflow-x: hidden;
    display: none;
    padding-bottom: calc(var(--nav-h) + 16px);
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }
  /* ── Nav ── */
  #nav {
    height: var(--nav-h); background: white;
    border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
    flex-shrink: 0; z-index: 100;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 3px; cursor: pointer; color: var(--muted);
    font-size: 10px; font-weight: 600;
    transition: var(--transition);
    border: none; background: none; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item i { font-size: 20px; transition: var(--transition); }
  .nav-item.active { color: var(--primary); }
  .nav-item.active i { transform: scale(1.15); }
  .nav-item:active { background: var(--bg); }
  /* ── 登入頁 ── */
  /* 修正後 */
#page-login {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 24px;
  background: linear-gradient(160deg, var(--secondary) 0%, #16213e 50%, #0f3460 100%);
}

/* 新增：登入頁顯示時才用 flex */
#page-login.active {
  display: flex !important;
}

  .login-logo { font-size: 80px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .login-title { color: white; font-size: 26px; font-weight: 800; margin-bottom: 8px; text-align: center; }
  .login-sub { color: rgba(255,255,255,0.7); font-size: 14px; margin-bottom: 40px; text-align: center; line-height: 1.6; }
  .btn-line {
    width: 100%; max-width: 280px;
    background: var(--primary); color: white;
    border: none; border-radius: var(--radius);
    padding: 14px 24px; font-size: 16px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 10px;
    transition: var(--transition); margin-bottom: 12px;
  }
  .btn-line:hover { background: var(--primary-dk); transform: translateY(-1px); }
  .btn-guest {
    width: 100%; max-width: 280px;
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: var(--radius); padding: 12px 24px;
    font-size: 14px; cursor: pointer; transition: var(--transition);
  }
  .btn-guest:hover { background: rgba(255,255,255,0.1); color: white; }
  /* ── 登記頁 ── */
  #page-register { padding: 24px 20px; background: var(--bg); }
  .register-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
  .register-card h2 { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .register-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  /* ── 表單 ── */
  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .form-label .required { color: var(--accent); margin-left: 2px; }
  .form-control {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--text); background: white;
    transition: var(--transition); outline: none; font-family: inherit;
  }
  .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.15); }
  .form-control:disabled { background: var(--bg); color: var(--muted); cursor: not-allowed; }
  textarea.form-control { resize: vertical; min-height: 120px; line-height: 1.6; }
  select.form-control { cursor: pointer; }
  /* ── 按鈕 ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px; padding: 10px 18px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600; cursor: pointer;
    border: none; transition: var(--transition); font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-primary   { background: var(--primary); color: white; }
  .btn-primary:hover:not(:disabled)   { background: var(--primary-dk); }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { background: var(--border); }
  .btn-danger    { background: #fce4ec; color: #c62828; }
  .btn-danger:hover:not(:disabled)    { background: #f48fb1; }
  .btn-full { width: 100%; }
  .btn-sm   { padding: 6px 12px; font-size: 12px; }
  /* ── 文章列表 ── */
  .page-header { padding: 16px 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .search-bar { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-input {
    flex: 1; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; outline: none; background: white; transition: var(--transition);
  }
  .search-input:focus { border-color: var(--primary); }
  .search-btn {
    padding: 10px 14px; background: var(--primary); color: white;
    border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 16px;
  }
  .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
  .cat-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: white;
    font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--muted); transition: var(--transition); white-space: nowrap;
  }
  .cat-btn.active, .cat-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
  .article-list { padding: 8px 16px 0; }
  .article-card {
    background: white; border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow);
    cursor: pointer; transition: var(--transition); border: 1.5px solid transparent;
  }
  .article-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-title {
    font-size: 15px; font-weight: 700; line-height: 1.4; flex: 1;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .vis-badge { flex-shrink: 0; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .vb-public  { background: #e8f5e9; color: #2e7d32; }
  .vb-vip     { background: #f3e5f5; color: #7b1fa2; }
  .vb-private { background: #fce4ec; color: #c62828; }
  .card-summary {
    font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 10px;
    overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .card-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .card-meta-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .cat-tag { padding: 2px 8px; background: var(--bg); border-radius: 20px; font-size: 11px; font-weight: 600; color: var(--muted); }
  .author-name { font-size: 12px; color: var(--muted); }
  .read-count  { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
  .tag-list    { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
  .tag-item    { padding: 1px 7px; background: #e3f2fd; color: #1565c0; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .pagination  { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px; }
  .page-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid var(--border); background: white;
    cursor: pointer; font-size: 14px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; transition: var(--transition);
  }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .page-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }
  .page-info { font-size: 13px; color: var(--muted); }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 16px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
  .empty-state p  { font-size: 13px; line-height: 1.6; }
  /* ── 撰寫頁 ── */
  #page-write { padding: 16px; background: var(--bg); }
  .write-card { background: white; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 12px; }
  .write-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--secondary); }
  .char-count { text-align: right; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .char-count.warn { color: #e67e22; }
  .char-count.over { color: var(--accent); }
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 24px; text-align: center; cursor: pointer;
    transition: var(--transition); background: var(--bg);
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--primary); background: rgba(6,199,85,0.05); }
  .upload-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-zone p { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-zone strong { color: var(--primary); }
  .file-preview-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .file-item { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
  .file-item .file-info { flex: 1; min-width: 0; }
  .file-item .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-item .file-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-progress { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .file-progress-bar { height: 100%; background: var(--primary); border-radius: 2px; transition: width 0.3s ease; }
  .file-status { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .file-status.error   { color: var(--accent); }
  .file-status.success { color: var(--primary); }
  /* ── 統計頁 ── */
  #page-stats { padding: 16px; background: var(--bg); }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: white; border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); text-align: center; }
  .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
  .stat-card .stat-num  { font-size: 28px; font-weight: 800; color: var(--primary); line-height: 1; }
  .stat-card .stat-lbl  { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .top-list { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .top-list-header { padding: 14px 16px; font-size: 14px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .top-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); transition: var(--transition); }
  .top-item:last-child { border-bottom: none; }
  .top-item:hover { background: var(--bg); }
  .top-rank { width: 24px; height: 24px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; }
  .top-rank.r1 { background: #ffd700; color: #7d6608; }
  .top-rank.r2 { background: #c0c0c0; color: #555; }
  .top-rank.r3 { background: #cd7f32; color: white; }
  .top-title { flex: 1; font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top-count { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  /* ── 管理頁 ── */
  #page-admin { padding: 16px; background: var(--bg); }
  .user-item { background: white; border-radius: var(--radius); padding: 14px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px; }
  .user-item .u-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); flex-shrink: 0; }
  .user-item .u-info { flex: 1; min-width: 0; }
  .user-item .u-name { font-size: 14px; font-weight: 700; }
  .user-item .u-real { font-size: 12px; color: var(--muted); }
  .user-item .u-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .sb-active   { background: #e8f5e9; color: #2e7d32; }
  .sb-inactive { background: #fff3e0; color: #e65100; }
  .sb-banned   { background: #fce4ec; color: #c62828; }
  /* ── 個人資料頁 ── */
  #page-profile { padding: 16px; background: var(--bg); }
  .profile-card { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); margin-bottom: 12px; text-align: center; }
  .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); margin-bottom: 12px; }
  .profile-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .profile-role { margin-bottom: 16px; }
  /* ── 文章 Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: none; align-items: flex-end; backdrop-filter: blur(2px); }
  .modal-overlay.active { display: flex; }
  .modal-sheet { background: white; border-radius: 20px 20px 0 0; width: 100%; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .modal-header { padding: 16px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-shrink: 0; }
  .modal-title  { font-size: 17px; font-weight: 800; line-height: 1.4; flex: 1; }
  .modal-close  { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: var(--transition); }
  .modal-close:hover { background: var(--border); }
  .modal-body   { flex: 1; overflow-y: auto; padding: 16px 20px; -webkit-overflow-scrolling: touch; }
  .modal-meta   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .modal-content { font-size: 14px; line-height: 1.8; color: var(--text); white-space: pre-wrap; word-break: break-word; }
  .modal-footer  { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
  .attach-section { margin-top: 20px; }
  .attach-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .attach-item  { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg); border-radius: var(--radius-sm); margin-bottom: 8px; }
  .attach-icon  { font-size: 24px; flex-shrink: 0; }
  .attach-info  { flex: 1; min-width: 0; }
  .attach-name  { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .attach-size  { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .attach-actions { display: flex; gap: 6px; flex-shrink: 0; }
  /* ── 預覽 Modal ── */
  .preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
  .preview-modal.active { display: flex; }
  .preview-modal img    { max-width: 95vw; max-height: 80vh; object-fit: contain; border-radius: 8px; }
  .preview-modal iframe { width: 95vw; height: 80vh; border: none; border-radius: 8px; background: white; }
  .preview-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  /* ── Toast ── */
  #toastContainer { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: calc(100% - 32px); max-width: 440px; }
  .toast { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); animation: toastIn 0.3s ease; pointer-events: auto; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .toast.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid var(--primary); }
  .toast.error   { background: #fce4ec; color: #c62828; border-left: 4px solid var(--accent); }
  .toast.info    { background: #e3f2fd; color: #1565c0; border-left: 4px solid #3498db; }
  .toast.warning { background: #fff3e0; color: #e65100; border-left: 4px solid #f39c12; }
  /* ── Loading ── */
  #loadingOverlay { position: fixed; inset: 0; background: rgba(255,255,255,0.85); z-index: 5000; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #loadingOverlay.active { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--muted); font-weight: 600; }
  /* ── 編輯 Modal ── */
  .edit-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .edit-modal.active { display: flex; }
  .edit-modal-box { background: white; border-radius: var(--radius); padding: 24px; width: 100%; max-width: 360px; box-shadow: var(--shadow-md); animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

<script>
// ================================================================
// GAS 注入變數
// ================================================================
const LIFF_ID  = '2009456572-AUDE1qmM';
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbxs2y13vYVBLeKPUixuK0GgUr3g5yh46tvAb0sA0W9VzpfDWqr0vYl0LjTY46UMtiYDmg/exec';
const APP_NAME = 'PDA';
const VERSION  = '85202581';

// ================================================================
// nb 物件（所有功能封裝於此，HTML onclick 統一用 nb.xxx() 呼叫）
// ================================================================
const nb = (function () {

  // ── 狀態變數 ──
  let currentUser      = null;
  let currentToken     = localStorage.getItem('nb_token') || null;
  let currentPage      = 1;
  let currentCategory  = '';
  let currentKeyword   = '';
  let pendingFiles     = [];
  let editingArticleId = null;
  let draftTimer       = null;

  // ── 常數 ──
  const ALLOWED_TYPES = [
    'image/jpeg','image/jpg','image/png','image/gif','image/webp',
    'image/svg+xml','image/bmp','application/pdf','application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.ms-excel',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'application/vnd.ms-powerpoint',
    'application/vnd.openxmlformats-officedocument.presentationml.presentation',
    'text/plain','text/csv','application/zip','application/x-zip-compressed',
    'video/mp4','video/quicktime','audio/mpeg','audio/wav'
  ];
  const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

  // ================================================================
  // 初始化
  // ================================================================
  async function init() {
    document.getElementById('appName').textContent = APP_NAME;
    if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') {
      _showConfigError('LIFF_ID 尚未設定，請在 Code.gs 填入正確的 LIFF_ID');
      return;
    }
    if (!GAS_URL || !GAS_URL.trim()) {
      _showConfigError('GAS_URL 無法取得，請確認已正確部署');
      return;
    }
    if (currentToken) {
      _showLoading('自動登入中...');
      await _autoLogin();
      _hideLoading();
    }
  }

  // ================================================================
  // 認證
  // ================================================================
  async function initLiff() {
    _showLoading('連接 LINE 中...');
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }
      const profile = await liff.getProfile();
      const idToken = liff.getIDToken();
      _hideLoading();
      _showToast('LINE 授權成功！', 'success');
      _showRegisterPage(profile, idToken);
    } catch (err) {
      _hideLoading();
      let msg = 'LIFF 錯誤：' + (err.message || '未知');
      if (err.message && err.message.includes('liffId is necessary'))
        msg = 'LIFF ID 為空，請確認 Code.gs 設定';
      else if (err.message && err.message.includes('Invalid liffId'))
        msg = 'LIFF ID 格式錯誤（應為 1234567890-xxxxxxxx）';
      _showToast(msg, 'error');
      console.error('LIFF Error:', err);
    }
  }

  function _showRegisterPage(profile, idToken) {
    nb._pendingProfile = profile;
    nb._pendingIdToken = idToken;
    const el = document.getElementById('regDisplayName');
    if (el) el.value = profile.displayName || '';
    _showPage('register');
  }

  async function submitRegister() {
    const realName = (document.getElementById('regRealName').value || '').trim();
    if (!realName) { _showToast('請輸入真實姓名', 'error'); return; }
    const profile = nb._pendingProfile;
    if (!profile)  { _showToast('請重新登入', 'error'); return; }

    const btn = document.querySelector('#page-register .btn-primary');
    _setButtonLoading(btn, true, '登記中...');

    const res = await _apiPost({
      action:      'registerUser',
      lineUserId:  profile.userId,
      displayName: profile.displayName,
      pictureUrl:  profile.pictureUrl || '',
      realName,
      email:   (document.getElementById('regEmail')?.value  || '').trim(),
      phone:   (document.getElementById('regPhone')?.value  || '').trim(),
      idToken: nb._pendingIdToken || ''
    });

    _setButtonLoading(btn, false, '完成登記並進入');

    if (res.success) {
      currentToken = res.token;
      currentUser  = res.user;
      localStorage.setItem('nb_token', currentToken);
      _showToast(res.isNewUser ? '🎉 歡迎加入！' : '✅ 登入成功！', 'success');
      _enterApp();
    } else {
      _showToast('登記失敗：' + res.message, 'error');
    }
  }

  function guestMode() {
    currentUser  = { role: 'guest', displayName: '遊客', pictureUrl: '' };
    currentToken = null;
    _enterApp();
  }

  async function _autoLogin() {
    try {
      const res = await _apiPost({ action: 'getUserProfile', token: currentToken });
      if (res.success) {
        currentUser = res.user;
        _enterApp();
      } else {
        currentToken = null;
        localStorage.removeItem('nb_token');
      }
    } catch (e) {
      currentToken = null;
      localStorage.removeItem('nb_token');
    }
  }

  async function logout() {
    if (!confirm('確定要登出嗎？')) return;
    currentToken = null;
    currentUser  = null;
    localStorage.removeItem('nb_token');
    localStorage.removeItem('nb_draft');
    if (draftTimer) clearInterval(draftTimer);
    try {
      if (typeof liff !== 'undefined' && liff.isLoggedIn()) liff.logout();
    } catch (e) {}
    document.getElementById('nav').style.display = 'none';
    document.getElementById('userBar').innerHTML = '';
    document.querySelectorAll('#pages .page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-login').classList.add('active');
    _showToast('已登出', 'info');
  }

  // ================================================================
  // App 主流程
  // ================================================================
  function _enterApp() {
    _renderUserBar();
    document.getElementById('nav').style.display = 'flex';
    const role     = currentUser ? currentUser.role : 'guest';
    const adminNav = document.getElementById('nav-admin');
    const writeNav = document.getElementById('nav-write');
    if (adminNav) adminNav.style.display = ['admin','mod'].includes(role) ? 'flex' : 'none';
    if (writeNav) writeNav.style.display = (currentUser && role !== 'guest') ? 'flex' : 'none';
    switchTab('articles');
  }

  function _renderUserBar() {
    const bar = document.getElementById('userBar');
    if (!bar || !currentUser) return;
    const roleMap = {
      admin: { label: '管理者', cls: 'rb-admin' },
      mod:   { label: '版主',   cls: 'rb-mod'   },
      vip:   { label: 'VIP',    cls: 'rb-vip'   },
      user:  { label: '會員',   cls: 'rb-user'  },
      guest: { label: '遊客',   cls: 'rb-guest' }
    };
    const r = roleMap[currentUser.role] || roleMap.guest;
    bar.innerHTML =
      '<span class="role-badge ' + r.cls + '">' + r.label + '</span>' +
      '<span class="user-name">' + _esc(currentUser.displayName || '使用者') + '</span>' +
      '<img class="avatar"' +
        ' src="' + _esc(currentUser.pictureUrl || 'https://i.pravatar.cc/150?img=0') + '"' +
        ' alt="avatar"' +
        ' onerror="this.src=\'https://i.pravatar.cc/150?img=0\'"' +
        ' onclick="nb.switchTab(\'profile\')">';
  }

  function switchTab(tab) {
    document.querySelectorAll('#pages .page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const page = document.getElementById('page-' + tab);
    const nav  = document.getElementById('nav-'  + tab);
    if (page) page.classList.add('active');
    if (nav)  nav.classList.add('active');
    if      (tab === 'articles') _loadArticles();
    else if (tab === 'write')    _initWritePage();
    else if (tab === 'stats')    _loadStats();
    else if (tab === 'admin')    _loadUsers();
    else if (tab === 'profile')  _loadProfile();
  }

  // ================================================================
  // 文章列表
  // ================================================================
  function doSearch() {
    currentKeyword = (document.getElementById('searchInput').value || '').trim();
    currentPage    = 1;
    _loadArticles(1);
  }

  function filterCategory(cat, btn) {
    currentCategory = cat;
    currentPage     = 1;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    _loadArticles(1);
  }

  function goPage(page) {
    _loadArticles(page);
  }

  async function _loadArticles(page) {
    currentPage = page || 1;
    const list  = document.getElementById('articleList');
    if (!list) return;
    list.innerHTML =
      '<div class="empty-state">' +
        '<div class="empty-icon">⏳</div>' +
        '<h3>載入中...</h3>' +
      '</div>';

    const res = await _apiPost({
      action:   currentKeyword ? 'searchArticles' : 'listArticles',
      token:    currentToken,
      page:     currentPage,
      pageSize: 8,
      category: currentCategory,
      keyword:  currentKeyword
    });

    if (!res.success) {
      list.innerHTML =
        '<div class="empty-state">' +
          '<div class="empty-icon">❌</div>' +
          '<h3>載入失敗</h3>' +

  function _renderPagination(p) {
    const el = document.getElementById('pagination');
    if (!el) return;
    if (!p || p.totalPages <= 1) { el.innerHTML = ''; return; }
    let html =
      '<button class="page-btn" ' + (p.page <= 1 ? 'disabled' : '') +
      ' onclick="nb.goPage(' + (p.page - 1) + ')">' +
      '<i class="fas fa-chevron-left"></i></button>';
    const start = Math.max(1, p.page - 2);
    const end   = Math.min(p.totalPages, start + 4);
    for (let i = start; i <= end; i++) {
      html +=
        '<button class="page-btn ' + (i === p.page ? 'active' : '') + '"' +
        ' onclick="nb.goPage(' + i + ')">' + i + '</button>';
    }
    html +=
      '<button class="page-btn" ' + (p.page >= p.totalPages ? 'disabled' : '') +
      ' onclick="nb.goPage(' + (p.page + 1) + ')">' +
      '<i class="fas fa-chevron-right"></i></button>' +
      '<span class="page-info">' + p.page + ' / ' + p.totalPages + ' 頁・共 ' + p.total + ' 篇</span>';
    el.innerHTML = html;
  }

  function _renderAttachments(files) {

  function _initWritePage() {
    if (!currentUser || currentUser.role === 'guest') {
      _showToast('請先登入才能發文', 'warning');
      switchTab('articles');
      return;

  function updateCharCount(inputId, countId, max) {
    const val = document.getElementById(inputId)?.value || '';
    const len = val.length;
    const el  = document.getElementById(countId);
    if (!el) return;
    el.textContent = len + ' / ' + max;
    el.className   = 'char-count' +
      (len > max ? ' over' : len > max * 0.9 ? ' warn' : '');
  }

  function _startDraftTimer() {
    if (draftTimer) clearInterval(draftTimer);
    draftTimer = setInterval(_saveDraft, 30000);
  }

  function _saveDraft() {
    const title   = document.getElementById('articleTitle')?.value   || '';
    const content = document.getElementById('articleContent')?.value || '';
    if (!title && !content) return;
    localStorage.setItem('nb_draft', JSON.stringify({
      title, content,
      category:   document.getElementById('articleCategory')?.value   || '',
      visibility: document.getElementById('articleVisibility')?.value || 'public',
      tags:       document.getElementById('articleTags')?.value       || '',
      savedAt:    new Date().toISOString()
    }));
  }

  function _restoreDraft() {
    try {
      const raw = localStorage.getItem('nb_draft');
      if (!raw) return;
      const draft = JSON.parse(raw);
      if (!draft.title && !draft.content) return;
      const savedAt = draft.savedAt
        ? new Date(draft.savedAt).toLocaleString('zh-TW') : '';
      const el = document.getElementById('page-write');
      if (!el) return;
      const notice = document.createElement('div');
      notice.style.cssText =
        'background:#fff3cd;border:1px solid #ffc107;border-radius:8px;' +
        'padding:12px;margin-bottom:12px;font-size:13px;display:flex;' +
        'align-items:center;justify-content:space-between;gap:8px';
      notice.setAttribute('data-draft-notice', '1');
      notice.innerHTML =
        '<span>📝 發現未完成草稿（' + savedAt + '），是否恢復？</span>' +
        '<div style="display:flex;gap:6px;flex-shrink:0">' +
          '<button class="btn btn-secondary btn-sm"' +
            ' onclick="nb.discardDraft(this)">捨棄</button>' +
          '<button class="btn btn-primary btn-sm"' +
            ' data-draft="' + _esc(JSON.stringify(draft)) + '"' +
            ' onclick="nb.applyDraft(this)">恢復</button>' +
        '</div>';
      el.insertBefore(notice, el.firstChild);
    } catch (e) { console.error('restoreDraft:', e); }
  }

  function applyDraft(btn) {
    try {
      const draft  = JSON.parse(btn.getAttribute('data-draft'));
      const notice = btn.closest('[data-draft-notice]');
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      set('articleTitle',      draft.title);
      set('articleContent',    draft.content);
      set('articleCategory',   draft.category);
      set('articleVisibility', draft.visibility);
      set('articleTags',       draft.tags);
      updateCharCount('articleTitle',   'titleCount',   100);
      updateCharCount('articleContent', 'contentCount', 5000);
      if (notice) notice.remove();
      _showToast('草稿已恢復', 'success');
    } catch (e) { _showToast('草稿恢復失敗', 'error'); }
  }

  function discardDraft(btn) {
    localStorage.removeItem('nb_draft');
    const notice = btn.closest('[data-draft-notice]');
    if (notice) notice.remove();
    _showToast('草稿已捨棄', 'info');
  }

  function clearWriteForm() {
    ['articleTitle','articleContent','articleTags'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const cat = document.getElementById('articleCategory');
    const vis = document.getElementById('articleVisibility');
    if (cat) cat.value = '技術';
    if (vis) vis.value = 'public';
    pendingFiles     = [];
    editingArticleId = null;
    _renderPendingFiles();
    updateCharCount('articleTitle',   'titleCount',   100);
    updateCharCount('articleContent', 'contentCount', 5000);
    const t = document.getElementById('writePageTitle');
    if (t) t.textContent = '撰寫文章';
    const b = document.getElementById('submitBtn');
    if (b) b.innerHTML = '<i class="fas fa-paper-plane"></i> 發布文章';
    localStorage.removeItem('nb_draft');
    if (draftTimer) clearInterval(draftTimer);
  }

  async function submitArticle() {
  const title   = (document.getElementById('articleTitle')?.value   || '').trim();
  const content = (document.getElementById('articleContent')?.value || '').trim();
  if (!title)        { _showToast('請輸入文章標題', 'error'); return; }
  if (!content)      { _showToast('請輸入文章內容', 'error'); return; }
  if (!currentToken) { _showToast('請先登入', 'error');       return; }

  const tags   = (document.getElementById('articleTags')?.value || '')
    .split(',').map(t => t.trim()).filter(t => t);
  const isEdit = !!editingArticleId;
  const btn    = document.getElementById('submitBtn');
  _setButtonLoading(btn, true, isEdit ? '更新中...' : '發布中...');

  try {
    const res = await _apiPost({
      action:     isEdit ? 'updateArticle' : 'createArticle',
      token:      currentToken,
      articleId:  editingArticleId || undefined,
      title, content,
      category:   document.getElementById('articleCategory')?.value   || '未分類',
      visibility: document.getElementById('articleVisibility')?.value || 'public',
      tags
    });
    if (!res.success) { _showToast('❌ ' + res.message, 'error'); return; }

    const targetId = isEdit ? editingArticleId : res.articleId;

    // ★ 加入這行
    console.log('📝 targetId：', targetId, '| pendingFiles：', pendingFiles.length);

    // ★ 有附件才上傳
    if (pendingFiles.length > 0) {
      _showToast('📤 上傳附件中...', 'info');
      await _uploadAllFiles(targetId);
    }

    _showToast(isEdit ? '✅ 文章更新成功！' : '🎉 文章發布成功！', 'success');
    localStorage.removeItem('nb_draft');

    const hadFiles = pendingFiles.length > 0;
    clearWriteForm();

    // ★ 若有附件且是編輯模式，重新開啟 modal 顯示最新附件
    if (hadFiles && isEdit) {
      setTimeout(() => {
        switchTab('articles');
        setTimeout(() => openArticle(targetId), 500);
      }, 800);
    } else {
      setTimeout(() => switchTab('articles'), 800);
    }

  } finally {
    _setButtonLoading(btn, false, isEdit ? '<i class="fas fa-save"></i> 更新文章' : '<i class="fas fa-paper-plane"></i> 發布文章');
  }
}

    const r      = roleMap[currentUser.role] || roleMap.guest;
    const avatar = document.getElementById('profileAvatar');
    const name   = document.getElementById('profileName');
    const role   = document.getElementById('profileRole');
    if (avatar) {
      avatar.src     = currentUser.pictureUrl || 'https://i.pravatar.cc/150?img=0';
      avatar.onerror = () => { avatar.src = 'https://i.pravatar.cc/150?img=0'; };
    }
    if (name) name.textContent = currentUser.displayName || '';
    if (role) role.innerHTML   =
      '<span class="role-badge ' + r.cls +
      '" style="font-size:13px;padding:4px 14px">' + r.label + '</span>';
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
    set('profileRealName', currentUser.realName);
    set('profileEmail',    currentUser.email);
    set('profilePhone',    currentUser.phone);
  }

  async function saveProfile() {
    const realName = (document.getElementById('profileRealName')?.value || '').trim();
    if (!realName) { _showToast('真實姓名不可為空', 'error'); return; }
    const btn = document.querySelector('#page-profile .btn-primary');
    _setButtonLoading(btn, true, '儲存中...');
    const res = await _apiPost({
      action: 'updateUserProfile', token: currentToken,
      realName,
      email: (document.getElementById('profileEmail')?.value || '').trim(),
      phone: (document.getElementById('profilePhone')?.value || '').trim()
    });
    _setButtonLoading(btn, false, '儲存變更');
    if (res.success) {
      currentUser.realName = realName;
      _showToast('✅ 個人資料已更新', 'success');
    } else {
      _showToast('❌ ' + res.message, 'error');
    }
  }

  // ================================================================
  // 附件上傳
  // ================================================================
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.add('dragover');
  }
  function handleDragLeave(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('dragover');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('uploadZone').classList.remove('dragover');
    _processFiles(Array.from(e.dataTransfer.files));
  }
  function handleFileSelect(e) {
    _processFiles(Array.from(e.target.files));
    e.target.value = '';
  }

  function _processFiles(files) {
    files.forEach(file => {
      if (file.size > MAX_FILE_SIZE) {
        _showToast('❌ ' + file.name + '：超過 10MB 限制', 'error'); return;
      }
      const mime = file.type || _mimeByExt(file.name);
      if (!ALLOWED_TYPES.includes(mime)) {
        _showToast('❌ ' + file.name + '：不支援的檔案類型', 'error'); return;
      }
      if (pendingFiles.find(f => f.name === file.name && f.size === file.size)) {
        _showToast('⚠️ ' + file.name + ' 已在列表中', 'warning'); return;
      }
      pendingFiles.push(file);
    });
    _renderPendingFiles();
  }

  function _mimeByExt(name) {
    const ext = (name || '').split('.').pop().toLowerCase();
    const map = {
      jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
      gif:'image/gif',  webp:'image/webp', svg:'image/svg+xml',
      pdf:'application/pdf',
      doc:'application/msword',
      docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
      xls:'application/vnd.ms-excel',
      xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      ppt:'application/vnd.ms-powerpoint',
      pptx:'application/vnd.openxmlformats-officedocument.presentationml.presentation',
      txt:'text/plain', csv:'text/csv', zip:'application/zip',
      mp4:'video/mp4',  mov:'video/quicktime',
      mp3:'audio/mpeg', wav:'audio/wav'
    };
    return map[ext] || 'application/octet-stream';
  }

  function _fileEmoji(mime) {
    if (!mime)                           return '📎';
    if (mime.startsWith('image/'))       return '🖼️';
    if (mime === 'application/pdf')      return '📄';
    if (mime.includes('word'))           return '📝';
    if (mime.includes('excel') || mime.includes('sheet'))        return '📊';
    if (mime.includes('powerpoint') || mime.includes('presentation')) return '📑';
    if (mime.startsWith('video/'))       return '🎬';
    if (mime.startsWith('audio/'))       return '🎵';
    if (mime.includes('zip'))            return '🗜️';
    if (mime === 'text/plain')           return '📃';
    return '📎';
  }

  function removePendingFile(idx) {
    pendingFiles.splice(idx, 1);
    _renderPendingFiles();
  }

  function _renderPendingFiles() {
    const container = document.getElementById('filePreviewList');
    if (!container) return;
    if (pendingFiles.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = pendingFiles.map((f, i) => {
      const mime    = f.type || _mimeByExt(f.name);
      const isImage = mime.startsWith('image/');
      return (
        '<div class="file-item" id="pf_' + i + '">' +
          '<div style="width:44px;height:44px;border-radius:8px;background:var(--bg);' +
                      'display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
            (isImage
              ? '<img id="thumb_' + i + '" src="" style="width:44px;height:44px;object-fit:cover;border-radius:8px">'
              : '<span style="font-size:22px">' + _fileEmoji(mime) + '</span>') +
          '</div>' +
          '<div class="file-info">' +
            '<div class="file-name">' + _esc(f.name) + '</div>' +
            '<div class="file-size">' + _formatSize(f.size) + '</div>' +
            '<div class="file-progress">' +
              '<div class="file-progress-bar" id="fpb_' + i + '" style="width:0%"></div>' +
            '</div>' +
            '<div class="file-status" id="fps_' + i + '">等待上傳</div>' +
          '</div>' +
          '<button class="btn btn-danger btn-sm" onclick="nb.removePendingFile(' + i + ')">' +
            '<i class="fas fa-times"></i>' +
          '</button>' +
        '</div>'
      );
    }).join('');
    pendingFiles.forEach((f, i) => {
      if (f.type && f.type.startsWith('image/')) {
        const reader  = new FileReader();
        reader.onload = e => {
          const el = document.getElementById('thumb_' + i);
          if (el) el.src = e.target.result;
        };
        reader.readAsDataURL(f);
      }
    });
  }

  function _setFileProgress(idx, pct, text, isError) {
    const bar = document.getElementById('fpb_' + idx);
    const txt = document.getElementById('fps_' + idx);
    if (bar) {
      bar.style.width      = pct + '%';
      bar.style.background = isError ? '#e74c3c' : 'var(--primary)';
    }
    if (txt) {
      txt.textContent = text;
      txt.className   = 'file-status' +
        (isError ? ' error' : pct === 100 ? ' success' : '');
    }
  }

  function previewFile(url, mimeType, fileName) {
    if (!url) { _showToast('預覽連結無效', 'error'); return; }
    const modal   = document.getElementById('previewModal');
    const content = document.getElementById('previewContent');
    if (mimeType && mimeType.startsWith('image/')) {
      content.innerHTML = '<img src="' + _esc(url) + '" alt="' + _esc(fileName) + '">';
    } else {
      content.innerHTML =
        '<iframe src="' + _esc(url) + '" title="' + _esc(fileName) + '" allowfullscreen></iframe>';
    }
    modal.classList.add('active');
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('active');
    document.getElementById('previewContent').innerHTML = '';
  }

  async function _uploadAllFiles(articleId) {
    const results = [];
    for (let i = 0; i < pendingFiles.length; i++) {
      results.push(await _uploadSingleFile(pendingFiles[i], articleId, i));
    }
    const ok   = results.filter(r => r && r.success).length;
    const fail = results.length - ok;
    if (fail === 0) {
      _showToast('✅ ' + ok + ' 個附件上傳成功', 'success');
    } else {
      _showToast('⚠️ ' + ok + ' 個成功，' + fail + ' 個失敗',
        fail === results.length ? 'error' : 'warning');
    }
    return results;
  }

  async function _uploadSingleFile(file, articleId, idx) {
    for (let attempt = 1; attempt <= 2; attempt++) {
      try {
        _setFileProgress(idx, 10, attempt > 1 ? '重試第 ' + attempt + ' 次...' : '讀取中...', false);
        const dataUrl = await new Promise((resolve, reject) => {
          const reader   = new FileReader();
          reader.onload  = e => resolve(e.target.result);
          reader.onerror = () => reject(new Error('檔案讀取失敗'));
          reader.readAsDataURL(file);
        });
        if (!dataUrl || !dataUrl.includes(',')) throw new Error('Base64 轉換失敗');
        _setFileProgress(idx, 50, '上傳中...', false);
        const res = await _apiPost({
          action:   'uploadFile',
          token:    currentToken,
          articleId,
          fileName: file.name,
          fileType: file.type || _mimeByExt(file.name),
          fileData: dataUrl
        });
        // ★ 加入這行
          console.log('📤 上傳回應：', JSON.stringify(res));

        if (res.success) {
          _setFileProgress(idx, 100, '✅ 上傳成功', false);
          return res;
        } else {
          _setFileProgress(idx, 100, '❌ ' + res.message, true);
          return res;
        }
      } catch (err) {
        if (attempt < 2) {
          _setFileProgress(idx, 0, '失敗，準備重試...', true);
          await new Promise(r => setTimeout(r, 1500));
        } else {
          _setFileProgress(idx, 100, '❌ ' + err.message, true);
          return { success: false, message: err.message };
        }
      }
    }
  }

  // ================================================================
  // API
  // ================================================================
  async function _apiPost(payload) {
    try {
      const res = await fetch(GAS_URL, {
        method:  'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body:    JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (err) {
      console.error('API Error:', err);
      return { success: false, message: '網路錯誤：' + err.message };
    }
  }

  // ================================================================
  // UI 工具
  // ================================================================
  function _showPage(name) {
    document.querySelectorAll('#pages .page').forEach(p => p.classList.remove('active'));
    const p = document.getElementById('page-' + name);
    if (p) p.classList.add('active');
  }

  function _showToast(msg, type) {
    const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
    const c     = document.getElementById('toastContainer');
    if (!c) return;
    const t = document.createElement('div');
    t.className = 'toast ' + (type || 'info');
    t.innerHTML =
      '<span>' + (icons[type] || 'ℹ️') + '</span>' +
      '<span>' + _esc(String(msg)) + '</span>';
    c.appendChild(t);
    setTimeout(() => {
      t.style.opacity    = '0';
      t.style.transition = 'opacity 0.3s';
      setTimeout(() => t.remove(), 300);
    }, 3500);
  }

  function _showLoading(text) {
    const el = document.getElementById('loadingOverlay');
    const tx = document.getElementById('loadingText');
    if (el) el.classList.add('active');
    if (tx) tx.textContent = text || '載入中...';
  }

  function _hideLoading() {
    const el = document.getElementById('loadingOverlay');
    if (el) el.classList.remove('active');
  }

  function _setButtonLoading(btn, loading, text) {
    if (!btn) return;
    btn.disabled  = loading;
    btn.innerHTML = loading
      ? '<i class="fas fa-spinner fa-spin"></i> ' + _esc(text)
      : '<i class="fas fa-check"></i> ' + _esc(text);
  }

  function _showConfigError(msg) {
    const p = document.getElementById('page-login');
    if (!p) return;
    p.innerHTML =
      '<div style="text-align:center;padding:40px 24px">' +
        '<div style="font-size:64px;margin-bottom:16px">⚙️</div>' +
        '<h2 style="color:#e74c3c;margin-bottom:12px">系統設定不完整</h2>' +
        '<div style="background:#fce4ec;border-radius:12px;padding:16px;' +
                    'max-width:320px;margin:0 auto 20px;text-align:left">' +
          '<p style="font-size:13px;color:#c62828;line-height:1.8">' +
            '<i class="fas fa-exclamation-circle"></i> ' + _esc(msg) +
          '</p>' +
        '</div>' +
        '<div style="background:#f8f9fa;border-radius:12px;padding:16px;' +
                    'max-width:320px;margin:0 auto;text-align:left">' +
          '<p style="font-size:13px;font-weight:700;margin-bottom:8px">🔧 修正步驟：</p>' +
          '<ol style="font-size:12px;color:#636e72;line-height:2;padding-left:16px">' +
            '<li>開啟 GAS 編輯器</li>' +
            '<li>在 Code.gs 填入正確的 LIFF_ID</li>' +
            '<li>重新部署（選「新版本」）</li>' +
            '<li>使用新的部署網址開啟</li>' +
          '</ol>' +
        '</div>' +
      '</div>';
    p.classList.add('active');
  }

  function _esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function _formatSize(bytes) {
    if (!bytes || bytes <= 0)        return '0 B';
    if (bytes < 1024)                return bytes + ' B';
    if (bytes < 1024 * 1024)         return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 * 1024 * 1024)  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
  }

  // ================================================================
  // ★ 對外公開（HTML onclick 可呼叫）
  // ================================================================
  return {
    init,
    // 認證
    initLiff, guestMode, submitRegister, logout,
    // App
    switchTab,
    // 文章
    doSearch, filterCategory, goPage,
    openArticle, closeArticleModal,
    editArticle, confirmDeleteArticle,
    submitArticle, clearWriteForm, updateCharCount,
    applyDraft, discardDraft,
    // 附件
    handleDragOver, handleDragLeave, handleDrop,
    handleFileSelect, removePendingFile,
    previewFile, closePreview,
    // 管理
    loadUsers, openEditModal, closeEditModal, saveUserRole,
    // 個人資料
    saveProfile
  };

})(); // end IIFE

// ================================================================
// 啟動 + 鍵盤快捷鍵
// ================================================================
window.onload = async function () {
  await nb.init();
};

document.addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    document.getElementById('articleModal')?.classList.remove('active');
    document.getElementById('previewModal')?.classList.remove('active');
    document.getElementById('editUserModal')?.classList.remove('active');
  }
});
</script>
