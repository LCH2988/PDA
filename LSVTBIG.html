<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>文章管理系統</title>
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Microsoft JhengHei",sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}

    /* ── Navbar ── */
    .navbar{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:12px 20px;
            display:flex;align-items:center;justify-content:space-between;
            box-shadow:0 2px 12px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;gap:10px}
    .navbar h1{font-size:1.1rem;font-weight:700;white-space:nowrap}
    .navbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);object-fit:cover}
    .user-name{font-size:.82rem;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .role-badge{padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:700}
    .role-admin {background:#ffd700;color:#744210}
    .role-editor{background:#9ae6b4;color:#22543d}
    .role-viewer{background:#bee3f8;color:#2a4365}

    /* ── Tabs ── */
    .tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e2e8f0;
          position:sticky;top:57px;z-index:90;overflow-x:auto}
    .tab-btn{padding:11px 20px;border:none;background:none;cursor:pointer;font-size:.88rem;
             font-weight:600;color:#718096;border-bottom:3px solid transparent;
             transition:all .2s;white-space:nowrap}
    .tab-btn.active{color:#667eea;border-bottom-color:#667eea}
    .tab-btn:hover:not(.active){color:#4a5568;background:#f7fafc}
    .tab-content{display:none}
    .tab-content.active{display:block}

    /* ── Container ── */
    .container{max-width:960px;margin:24px auto;padding:0 16px}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;
         border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
    .btn-danger{background:#fc5c65;color:#fff}
    .btn-danger:hover:not(:disabled){background:#eb3b5a}
    .btn-edit{background:#f7b731;color:#fff}
    .btn-edit:hover:not(:disabled){background:#f0a500}
    .btn-success{background:#38a169;color:#fff}
    .btn-success:hover:not(:disabled){background:#2f855a}
    .btn-sm{padding:4px 10px;font-size:.78rem}

    /* ── Cards ── */
    .card{background:#fff;border-radius:14px;padding:22px;
          box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:18px}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px}
    .article-title{font-size:1.1rem;font-weight:700;color:#2d3748}
    .article-meta{font-size:.8rem;color:#718096;margin-bottom:8px}
    .article-content{font-size:.93rem;line-height:1.75;color:#4a5568;white-space:pre-wrap;word-break:break-word}
    .tags{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0}
    .tag{background:#ebf4ff;color:#3182ce;padding:2px 9px;border-radius:20px;font-size:.75rem;font-weight:600}
    .attachments{margin-top:12px;border-top:1px solid #e2e8f0;padding-top:10px}
    .attachments h4{font-size:.82rem;color:#718096;margin-bottom:6px}
    .att-list{display:flex;flex-wrap:wrap;gap:7px}
    .att-item{display:flex;align-items:center;gap:5px;background:#f7fafc;
              border:1px solid #e2e8f0;border-radius:8px;padding:5px 9px;font-size:.8rem}
    .att-item a{color:#3182ce;text-decoration:none;font-weight:600}
    .att-item a:hover{text-decoration:underline}
    .action-btns{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}

    /* ── User Table ── */
    .user-table{width:100%;border-collapse:collapse;font-size:.88rem}
    .user-table th{background:#f7fafc;padding:10px 12px;text-align:left;
                   border-bottom:2px solid #e2e8f0;font-weight:700;color:#4a5568}
    .user-table td{padding:10px 12px;border-bottom:1px solid #f0f4f8;vertical-align:middle}
    .user-table tr:hover td{background:#fafbff}
    .user-avatar-sm{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:6px}
    .role-select{padding:4px 8px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:.82rem;cursor:pointer}

    /* ── Modal ── */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
                   z-index:200;align-items:center;justify-content:center}
    .modal-overlay.active{display:flex}
    .modal{background:#fff;border-radius:16px;padding:26px;width:100%;max-width:620px;
           max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
    .modal h2{font-size:1.1rem;font-weight:700;margin-bottom:18px;color:#2d3748;
              border-bottom:2px solid #e2e8f0;padding-bottom:10px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:.83rem;font-weight:600;color:#4a5568;margin-bottom:5px}
    .form-group input,.form-group textarea{width:100%;padding:9px 13px;border:1.5px solid #e2e8f0;
      border-radius:8px;font-size:.88rem;transition:border .2s;font-family:inherit}
    .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#667eea;
      box-shadow:0 0 0 3px rgba(102,126,234,.15)}
    .form-group textarea{resize:vertical;min-height:130px}
    .upload-area{border:2px dashed #cbd5e0;border-radius:10px;padding:18px;text-align:center;
                 cursor:pointer;transition:all .2s;background:#fafafa}
    .upload-area:hover,.upload-area.dragover{border-color:#667eea;background:#ebf4ff}
    .upload-area p{color:#718096;font-size:.85rem}
    .upload-icon{font-size:1.8rem;margin-bottom:4px}
    #fileInput{display:none}
    .file-preview{margin-top:8px;display:flex;flex-wrap:wrap;gap:7px}
    .file-chip{display:flex;align-items:center;gap:5px;background:#ebf4ff;
               border:1px solid #bee3f8;border-radius:20px;padding:3px 11px;font-size:.78rem;color:#2b6cb0}
    .remove-file{cursor:pointer;color:#fc5c65;font-weight:700;margin-left:3px}

    /* ── Search ── */
    .search-bar{display:flex;gap:10px;margin-bottom:18px}
    .search-bar input{flex:1;padding:9px 15px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.88rem}
    .search-bar input:focus{outline:none;border-color:#667eea}

    /* ── States ── */
    .empty{text-align:center;padding:50px 20px;color:#a0aec0}
    .empty-icon{font-size:3rem;margin-bottom:10px}
    .loading{text-align:center;padding:40px;color:#718096}
    .spinner{display:inline-block;width:30px;height:30px;border:3px solid #e2e8f0;
             border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── Login Screen ── */
    #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;
                 min-height:100vh;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:20px}
    #loginScreen h2{font-size:1.6rem;margin-bottom:8px}
    #loginScreen p{opacity:.85;margin-bottom:28px;text-align:center}
    .login-card{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);
                border-radius:20px;padding:32px;text-align:center;max-width:360px;width:100%}
    .login-icon{font-size:4rem;margin-bottom:16px}

    /* ── No Permission ── */
    .no-perm{text-align:center;padding:60px 20px;color:#a0aec0}
    .no-perm-icon{font-size:3rem;margin-bottom:12px}

    /* ── Toast ── */
    .toast{position:fixed;bottom:20px;right:20px;background:#2d3748;color:#fff;
           padding:11px 18px;border-radius:10px;font-size:.85rem;
           box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:999;
           transform:translateY(80px);opacity:0;transition:all .3s}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{background:#38a169}
    .toast.error{background:#e53e3e}

    /* ── Profile Card ── */
    .profile-card{display:flex;align-items:center;gap:16px;background:#fff;
                  border-radius:14px;padding:20px;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:18px}
    .profile-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #e2e8f0}
    .profile-info h3{font-size:1.1rem;font-weight:700;margin-bottom:4px}
    .profile-info p{font-size:.82rem;color:#718096}

    /* ── API Info ── */
    .api-box{background:#1a202c;color:#68d391;border-radius:10px;padding:14px 18px;
             font-family:monospace;font-size:.82rem;line-height:1.8;overflow-x:auto;margin-top:8px}
  </style>
</head>
<body>

<!-- ══ 登入畫面 ══ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">📝</div>
    <h2>文章管理系統</h2>
    <p>請透過 LINE 登入以繼續使用</p>
    <div class="loading"><div class="spinner"></div><p style="margin-top:10px;color:rgba(255,255,255,.7)">初始化中…</p></div>
  </div>
</div>

<!-- ══ 主應用程式（登入後顯示）══ -->
<div id="app" style="display:none">
  <nav class="navbar">
    <h1>📝 文章管理</h1>
    <div class="navbar-right">
      <img id="navAvatar" class="user-avatar" src="" alt="avatar"/>
      <span id="navName" class="user-name"></span>
      <span id="navRole" class="role-badge"></span>
    </div>
  </nav>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('articles')">📄 文章列表</button>
    <button class="tab-btn" id="tabProfile" onclick="showTab('profile')">👤 我的資料</button>
    <button class="tab-btn" id="tabUsers" onclick="showTab('users')" style="display:none">👥 使用者管理</button>
  </div>

  <!-- ── Tab: 文章列表 ── -->
  <div id="tab-articles" class="tab-content active">
    <div class="container">
      <div style="display:flex;gap:10px;margin-bottom:18px;align-items:center">
        <div class="search-bar" style="margin:0;flex:1">
          <input type="text" id="searchInput" placeholder="🔍 搜尋標題、作者或標籤…" oninput="renderArticles()"/>
        </div>
        <button class="btn btn-primary" id="btnWrite" onclick="openModal()" style="display:none">✏️ 撰寫</button>
      </div>
      <div id="articleList">
        <div class="loading"><div class="spinner"></div><p style="margin-top:10px">載入中…</p></div>
      </div>
    </div>
  </div>

  <!-- ── Tab: 我的資料 ── -->
  <div id="tab-profile" class="tab-content">
    <div class="container">
      <div class="profile-card" id="profileCard"></div>
      <div class="card">
        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:12px;color:#4a5568">🔗 API 端點資訊</h3>
        <div class="api-box" id="apiInfoBox"></div>
      </div>
    </div>
  </div>

  <!-- ── Tab: 使用者管理（Admin） ── -->
  <div id="tab-users" class="tab-content">
    <div class="container">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="font-size:.95rem;font-weight:700;color:#4a5568">👥 使用者列表</h3>
          <button class="btn btn-primary btn-sm" onclick="loadUsers()">🔄 重新整理</button>
        </div>
        <div style="overflow-x:auto">
          <table class="user-table">
            <thead>
              <tr>
                <th>使用者</th>
                <th>角色</th>
                <th>註冊時間</th>
                <th>最後登入</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
              <tr><td colspan="5" style="text-align:center;padding:20px;color:#a0aec0">載入中…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ 文章 Modal ══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modalTitle">✏️ 撰寫新文章</h2>
    <input type="hidden" id="editId"/>
    <div class="form-group">
      <label>標題 *</label>
      <input type="text" id="fTitle" placeholder="請輸入文章標題"/>
    </div>
    <div class="form-group">
      <label>內容 *</label>
      <textarea id="fContent" placeholder="請輸入文章內容…"></textarea>
    </div>
    <div class="form-group">
      <label>標籤（以逗號分隔）</label>
      <input type="text" id="fTags" placeholder="例：技術, 生活, 旅遊"/>
    </div>
    <div id="existingAttachments" style="display:none" class="form-group">
      <label>現有附件</label>
      <div id="existingAttList" class="att-list"></div>
    </div>
    <div class="form-group">
      <label>上傳附件</label>
      <div class="upload-area" id="uploadArea"
           onclick="document.getElementById('fileInput').click()"
           ondragover="dragOver(event)" ondragleave="dragLeave()" ondrop="dropFiles(event)">
        <div class="upload-icon">📎</div>
        <p>點擊或拖曳檔案至此</p>
        <p style="font-size:.72rem;margin-top:3px;color:#a0aec0">單檔最大 10MB</p>
      </div>
      <input type="file" id="fileInput" multiple onchange="addFiles(this.files)"/>
      <div class="file-preview" id="filePreview"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="btn" style="background:#e2e8f0;color:#4a5568" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="submitBtn" onclick="submitArticle()">💾 儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ══════════════════════════════════════════
  //  全域狀態
  // ══════════════════════════════════════════
  var GAS_URL      = "https://script.google.com/macros/s/AKfycbxBXOiLdypQcNPus_6v2atytJ1sVm5s8oFx07Qmo5m6aFYJ9CF2z5imd4PHqBdSIWaX/exec";   // 由 google.script.url 取得
  var currentUser  = null; // { userId, displayName, pictureUrl, role }
  var articles     = [];
  var pendingFiles = [];
  var LIFF_ID      = "2009456572-AUDE1qmM"; // ← 替換成你的 LIFF ID

  // ══════════════════════════════════════════
  //  初始化流程
  // ══════════════════════════════════════════
  window.onload = function() {
    initApp();
  };

  function initApp() {
    // 取得目前 GAS Web App URL（用於後續 fetch 呼叫）
    google.script.url.getLocation(function(location) {
      GAS_URL = location.href.split("?")[0]; // 取得基礎 URL
      initLiff();
    });
  }

  // ══════════════════════════════════════════
  //  LIFF 初始化
  // ══════════════════════════════════════════
  function initLiff() {
    liff.init({ liffId: LIFF_ID })
      .then(function() {
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        return liff.getProfile();
      })
      .then(function(profile) {
        if (!profile) return;
        // 向後端註冊/更新使用者
        return apiPost("registerUser", { profile: {
          userId:      profile.userId,
          displayName: profile.displayName,
          pictureUrl:  profile.pictureUrl,
          email:       ""
        }});
      })
      .then(function(res) {
        if (!res || !res.success) {
          showLoginError("使用者註冊失敗");
          return;
        }
        currentUser = res.user;
        onLoginSuccess();
      })
      .catch(function(err) {
        console.warn("LIFF 初始化失敗，切換為開發模式：", err.message);
        // ── 開發模式（非 LINE 環境）──
        devModeLogin();
      });
  }

  // 開發模式：模擬登入（測試用）
  function devModeLogin() {
    apiPost("registerUser", { profile: {
      userId:      "DEV-" + Date.now(),
      displayName: "開發者測試",
      pictureUrl:  "",
      email:       ""
    }}).then(function(res) {
      if (res && res.success) {
        currentUser = res.user;
        onLoginSuccess();
      }
    });
  }

  function onLoginSuccess() {
    // 更新 Navbar
    document.getElementById("navAvatar").src = currentUser.pictureUrl || "https://via.placeholder.com/34";
    document.getElementById("navName").textContent  = currentUser.displayName;
    var roleEl = document.getElementById("navRole");
    roleEl.textContent  = roleLabel(currentUser.role);
    roleEl.className    = "role-badge role-" + currentUser.role;

    // 依角色顯示功能
    if (currentUser.role === "admin" || currentUser.role === "editor") {
      document.getElementById("btnWrite").style.display = "inline-flex";
    }
    if (currentUser.role === "admin") {
      document.getElementById("tabUsers").style.display = "inline-block";
    }

    // 更新個人資料頁
    renderProfile();

    // 切換畫面
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    // 載入文章
    loadArticles();
  }

  function showLoginError(msg) {
    document.getElementById("loginScreen").innerHTML =
      '<div class="login-card"><div class="login-icon">⚠️</div>' +
      '<h2>登入失敗</h2><p>' + msg + '</p></div>';
  }

  // ══════════════════════════════════════════
  //  API 呼叫（透過 URL fetch）
  // ══════════════════════════════════════════

  // GET 請求：GAS_URL?action=xxx&userId=xxx
  function apiGet(action, extraParams) {
    var url = GAS_URL + "?action=" + action + "&userId=" + (currentUser ? currentUser.userId : "");
    if (extraParams) {
      for (var k in extraParams) url += "&" + k + "=" + encodeURIComponent(extraParams[k]);
    }
    return fetch(url, { redirect: "follow" })
      .then(function(r) { return r.json(); });
  }

  // POST 請求：body JSON
  function apiPost(action, body) {
    if (!GAS_URL) {
      // 尚未取得 URL，使用 google.script.run 作為 fallback
      return new Promise(function(resolve) {
        var fn = google.script.run.withSuccessHandler(resolve);
        if (action === "registerUser") fn.registerUser(body.profile);
      });
    }
    var payload = Object.assign({ action: action, userId: currentUser ? currentUser.userId : "" }, body);
    return fetch(GAS_URL, {
      method:   "POST",
      redirect: "follow",
      headers:  { "Content-Type": "application/json" },
      body:     JSON.stringify(payload)
    }).then(function(r) { return r.json(); });
  }

  // ══════════════════════════════════════════
  //  Tab 切換
  // ══════════════════════════════════════════
  function showTab(name) {
    var tabs     = document.querySelectorAll(".tab-content");
    var tabBtns  = document.querySelectorAll(".tab-btn");
    for (var i = 0; i < tabs.length; i++)    tabs[i].classList.remove("active");
    for (var i = 0; i < tabBtns.length; i++) tabBtns[i].classList.remove("active");
    document.getElementById("tab-" + name).classList.add("active");
    event.target.classList.add("active");

    if (name === "users") loadUsers();
  }

  // ══════════════════════════════════════════
  //  文章列表
  // ══════════════════════════════════════════
  function loadArticles() {
    document.getElementById("articleList").innerHTML =
      '<div class="loading"><div class="spinner"></div><p style="margin-top:10px">載入中…</p></div>';

    apiGet("getArticles")
      .then(function(res) {
        if (res.success) {
          articles = res.data || [];
          renderArticles();
        } else {
          showToast("載入失敗：" + res.error, "error");
          document.getElementById("articleList").innerHTML =
            '<div class="empty"><div class="empty-icon">⚠️</div><p>' + res.error + '</p></div>';
        }
      })
      .catch(function(err) {
        showToast("網路錯誤：" + err.message, "error");
      });
  }

  function renderArticles() {
    var q      = document.getElementById("searchInput").value.toLowerCase();
    var list   = document.getElementById("articleList");
    var result = [];
    for (var i = 0; i < articles.length; i++) {
      var a = articles[i];
      var match = a.title.toLowerCase().indexOf(q) > -1 ||
                  (a.author || "").toLowerCase().indexOf(q) > -1;
      if (!match) {
        for (var j = 0; j < (a.tags || []).length; j++) {
          if (a.tags[j].toLowerCase().indexOf(q) > -1) { match = true; break; }
        }
      }
      if (match) result.push(a);
    }
    if (!result.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>' +
        (q ? "找不到符合的文章" : "尚無文章") + '</p></div>';
      return;
    }
    var html = "";
    for (var i = 0; i < result.length; i++) html += buildCard(result[i]);
    list.innerHTML = html;
  }

  function buildCard(a) {
    var canEdit   = currentUser && (currentUser.role === "admin" || currentUser.role === "editor");
    var canDelete = currentUser && currentUser.role === "admin";

    var tagsHtml = "";
    if (a.tags && a.tags.length) {
      tagsHtml = '<div class="tags">';
      for (var i = 0; i < a.tags.length; i++) {
        if (a.tags[i].trim()) tagsHtml += '<span class="tag">#' + esc(a.tags[i].trim()) + '</span>';
      }
      tagsHtml += '</div>';
    }
    var attHtml = "";
    if (a.attachments && a.attachments.length) {
      attHtml = '<div class="attachments"><h4>📎 附件（' + a.attachments.length + '）</h4><div class="att-list">';
      for (var i = 0; i < a.attachments.length; i++) {
        var f = a.attachments[i];
        attHtml += '<div class="att-item"><span>' + fileIcon(f.mimeType) + '</span>' +
          '<a href="' + f.url + '" target="_blank">' + esc(f.name) + '</a>' +
          '<span style="color:#a0aec0;font-size:.73rem">' + fmtSize(f.size) + '</span></div>';
      }
      attHtml += '</div></div>';
    }
    var updHtml = (a.updatedAt && a.updatedAt !== a.createdAt) ? ' | ✏️ ' + a.updatedAt : "";
    var actionHtml = "";
    if (canEdit)   actionHtml += '<button class="btn btn-edit btn-sm" onclick="openEdit(\'' + a.id + '\')">✏️ 編輯</button>';
    if (canDelete) actionHtml += '<button class="btn btn-danger btn-sm" onclick="confirmDelete(\'' + a.id + '\',\'' + esc(a.title).replace(/'/g,"&#39;") + '\')">🗑️</button>';

    return '<div class="card">' +
      '<div class="card-header">' +
        '<div style="flex:1;min-width:0">' +
          '<div class="article-title">' + esc(a.title) + '</div>' +
          '<div class="article-meta">👤 ' + esc(a.author || "匿名") + ' | 🕐 ' + a.createdAt + updHtml + '</div>' +
          tagsHtml +
        '</div>' +
        (actionHtml ? '<div class="action-btns">' + actionHtml + '</div>' : '') +
      '</div>' +
      '<div class="article-content">' + esc(a.content) + '</div>' +
      attHtml + '</div>';
  }

  // ══════════════════════════════════════════
  //  使用者管理（Admin）
  // ══════════════════════════════════════════
  function loadUsers() {
    document.getElementById("userTableBody").innerHTML =
      '<tr><td colspan="5" style="text-align:center;padding:20px;color:#a0aec0">載入中…</td></tr>';

    apiGet("getUsers")
      .then(function(res) {
        if (!res.success) {
          showToast(res.error, "error"); return;
        }
        renderUserTable(res.data || []);
      });
  }

  function renderUserTable(users) {
    if (!users.length) {
      document.getElementById("userTableBody").innerHTML =
        '<tr><td colspan="5" style="text-align:center;padding:20px;color:#a0aec0">尚無使用者</td></tr>';
      return;
    }
    var html = "";
    for (var i = 0; i < users.length; i++) {
      var u = users[i];
      var isSelf = currentUser && u.userId === currentUser.userId;
      html += '<tr>' +
        '<td><img class="user-avatar-sm" src="' + (u.pictureUrl || "https://via.placeholder.com/28") + '" alt=""/>' +
          esc(u.displayName) + (isSelf ? ' <span style="color:#667eea;font-size:.75rem">(我)</span>' : '') +
        '</td>' +
        '<td>' +
          '<select class="role-select" onchange="changeRole(\'' + u.userId + '\',this.value)"' +
            (isSelf ? ' disabled' : '') + '>' +
            '<option value="admin"  ' + (u.role==="admin"  ? "selected" : "") + '>👑 管理員</option>' +
            '<option value="editor" ' + (u.role==="editor" ? "selected" : "") + '>✏️ 編輯者</option>' +
            '<option value="viewer" ' + (u.role==="viewer" ? "selected" : "") + '>👁️ 檢視者</option>' +
          '</select>' +
        '</td>' +
        '<td>' + (u.registerAt || "-") + '</td>' +
        '<td>' + (u.lastLoginAt || "-") + '</td>' +
        '<td>' +
          (!isSelf ? '<button class="btn btn-danger btn-sm" onclick="removeUser(\'' + u.userId + '\',\'' + esc(u.displayName) + '\')">🗑️ 移除</button>' : '-') +
        '</td>' +
      '</tr>';
    }
    document.getElementById("userTableBody").innerHTML = html;
  }

  function changeRole(userId, newRole) {
    apiPost("updateUserRole", { targetUserId: userId, newRole: newRole })
      .then(function(res) {
        if (res.success) showToast("角色已更新", "success");
        else showToast("更新失敗：" + res.error, "error");
      });
  }

  function removeUser(userId, name) {
    if (!confirm("確定要移除使用者「" + name + "」？")) return;
    apiPost("deleteUser", { targetUserId: userId })
      .then(function(res) {
        if (res.success) { showToast("使用者已移除", "success"); loadUsers(); }
        else showToast("移除失敗：" + res.error, "error");
      });
  }

  // ══════════════════════════════════════════
  //  個人資料頁
  // ══════════════════════════════════════════
  function renderProfile() {
    if (!currentUser) return;
    document.getElementById("profileCard").innerHTML =
      '<img class="profile-avatar" src="' + (currentUser.pictureUrl || "https://via.placeholder.com/64") + '" alt=""/>' +
      '<div class="profile-info">' +
        '<h3>' + esc(currentUser.displayName) + '</h3>' +
        '<p>角色：<span class="role-badge role-' + currentUser.role + '">' + roleLabel(currentUser.role) + '</span></p>' +
        '<p style="margin-top:6px;font-size:.78rem;color:#a0aec0">ID：' + currentUser.userId + '</p>' +
      '</div>';

    document.getElementById("apiInfoBox").innerHTML =
      "GET  " + GAS_URL + "?action=getArticles&userId=" + currentUser.userId + "\n" +
      "GET  " + GAS_URL + "?action=getUser&userId=" + currentUser.userId + "\n" +
      "POST " + GAS_URL + "\n" +
      '     body: { "action":"saveArticle", "userId":"' + currentUser.userId + '", "data":{...} }';
  }

  // ══════════════════════════════════════════
  //  Modal 開關
  // ══════════════════════════════════════════
  function openModal() {
    document.getElementById("editId").value = "";
    document.getElementById("modalTitle").textContent = "✏️ 撰寫新文章";
    document.getElementById("fTitle").value   = "";
    document.getElementById("fContent").value = "";
    document.getElementById("fTags").value    = "";
    pendingFiles = [];
    document.getElementById("filePreview").innerHTML = "";
    document.getElementById("existingAttachments").style.display = "none";
    document.getElementById("modalOverlay").classList.add("active");
  }

  function openEdit(id) {
    var a = findById(id);
    if (!a) return;
    document.getElementById("editId").value   = id;
    document.getElementById("modalTitle").textContent = "✏️ 編輯文章";
    document.getElementById("fTitle").value   = a.title;
    document.getElementById("fContent").value = a.content;
    document.getElementById("fTags").value    = (a.tags || []).join(", ");
    pendingFiles = [];
    document.getElementById("filePreview").innerHTML = "";

    var existDiv = document.getElementById("existingAttachments");
    var attList  = document.getElementById("existingAttList");
    if (a.attachments && a.attachments.length) {
      existDiv.style.display = "block";
      var html = "";
      for (var i = 0; i < a.attachments.length; i++) {
        var f = a.attachments[i];
        html += '<div class="att-item" id="att-' + f.fileId + '">' +
          fileIcon(f.mimeType) + ' <a href="' + f.url + '" target="_blank">' + esc(f.name) + '</a>' +
          '<span style="color:#a0aec0;font-size:.73rem">' + fmtSize(f.size) + '</span>' +
          '<span class="remove-file" onclick="removeExistingAtt(\'' + id + '\',\'' + f.fileId + '\')">✕</span>' +
          '</div>';
      }
      attList.innerHTML = html;
    } else {
      existDiv.style.display = "none";
    }
    document.getElementById("modalOverlay").classList.add("active");
  }

  function closeModal() { document.getElementById("modalOverlay").classList.remove("active"); }
  function closeModalOutside(e) { if (e.target.id === "modalOverlay") closeModal(); }

  // ══════════════════════════════════════════
  //  文章 CRUD
  // ══════════════════════════════════════════
  function submitArticle() {
    var title   = document.getElementById("fTitle").value.trim();
    var content = document.getElementById("fContent").value.trim();
    if (!title)   { showToast("請輸入標題", "error"); return; }
    if (!content) { showToast("請輸入內容", "error"); return; }

    var rawTags = document.getElementById("fTags").value.split(",");
    var tags = [];
    for (var i = 0; i < rawTags.length; i++) {
      var t = rawTags[i].trim(); if (t) tags.push(t);
    }

    setSubmitLoading(true);
    readAllFiles(pendingFiles, function(filesData) {
      var editId = document.getElementById("editId").value;
      var action = editId ? "updateArticle" : "saveArticle";
      var body   = { data: { title: title, content: content, tags: tags }, files: filesData };
      if (editId) body.articleId = editId;

      apiPost(action, body)
        .then(function(res) {
          setSubmitLoading(false);
          if (res && res.success) {
            showToast("文章已儲存！", "success");
            closeModal();
            loadArticles();
          } else {
            showToast("錯誤：" + (res ? res.error : "未知"), "error");
          }
        })
        .catch(function(err) {
          setSubmitLoading(false);
          showToast("儲存失敗：" + err.message, "error");
        });
    });
  }

  function confirmDelete(id, title) {
    if (!confirm("確定要刪除「" + title + "」？")) return;
    apiPost("deleteArticle", { articleId: id })
      .then(function(res) {
        if (res && res.success) { showToast("已刪除", "success"); loadArticles(); }
        else showToast("刪除失敗：" + (res ? res.error : ""), "error");
      });
  }

  // ══════════════════════════════════════════
//  removeExistingAtt 完整版（接續上段）
// ══════════════════════════════════════════
function removeExistingAtt(articleId, fileId) {
  if (!confirm("確定要刪除此附件？")) return;
  apiPost("deleteAttachment", { articleId: articleId, fileId: fileId })
    .then(function(res) {
      if (res && res.success) {
        var el = document.getElementById("att-" + fileId);
        if (el) el.remove();
        showToast("附件已刪除", "success");
        loadArticles();
      } else {
        showToast("刪除失敗：" + (res ? res.error : ""), "error");
      }
    })
    .catch(function(err) {
      showToast("刪除失敗：" + err.message, "error");
    });
}

// ══════════════════════════════════════════
//  Submit 按鈕狀態
// ══════════════════════════════════════════
function setSubmitLoading(on) {
  var btn = document.getElementById("submitBtn");
  btn.disabled    = on;
  btn.textContent = on ? "⏳ 儲存中…" : "💾 儲存";
}

// ══════════════════════════════════════════
//  檔案處理
// ══════════════════════════════════════════
function addFiles(fileList) {
  for (var i = 0; i < fileList.length; i++) {
    if (fileList[i].size > 10 * 1024 * 1024) {
      showToast(fileList[i].name + " 超過 10MB 限制", "error");
      continue;
    }
    pendingFiles.push(fileList[i]);
  }
  renderFilePreview();
  document.getElementById("fileInput").value = "";
}

function removeFile(i) {
  pendingFiles.splice(i, 1);
  renderFilePreview();
}

function renderFilePreview() {
  var html = "";
  for (var i = 0; i < pendingFiles.length; i++) {
    html += '<div class="file-chip">' +
      fileIcon(pendingFiles[i].type) + ' ' + esc(pendingFiles[i].name) +
      '<span class="remove-file" onclick="removeFile(' + i + ')">✕</span>' +
      '</div>';
  }
  document.getElementById("filePreview").innerHTML = html;
}

function dragOver(e)  { e.preventDefault(); document.getElementById("uploadArea").classList.add("dragover"); }
function dragLeave()  { document.getElementById("uploadArea").classList.remove("dragover"); }
function dropFiles(e) { e.preventDefault(); dragLeave(); addFiles(e.dataTransfer.files); }

// 讀取所有檔案為 Base64（callback 版）
function readAllFiles(files, callback) {
  if (!files || files.length === 0) { callback([]); return; }
  var result  = [];
  var pending = files.length;
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        result.push({
          name:     file.name,
          mimeType: file.type || "application/octet-stream",
          data:     e.target.result.split(",")[1],
          size:     file.size
        });
        if (--pending === 0) callback(result);
      };
      reader.readAsDataURL(file);
    })(files[i]);
  }
}

// ══════════════════════════════════════════
//  通用工具函式
// ══════════════════════════════════════════

// 查找文章
function findById(id) {
  for (var i = 0; i < articles.length; i++) {
    if (articles[i].id === id) return articles[i];
  }
  return null;
}

// HTML 跳脫
function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// 檔案大小格式化
function fmtSize(b) {
  if (!b) return "";
  if (b < 1024)    return b + " B";
  if (b < 1048576) return (b / 1024).toFixed(1) + " KB";
  return (b / 1048576).toFixed(1) + " MB";
}

// 檔案類型圖示
function fileIcon(m) {
  if (!m) return "📄";
  if (m.indexOf("image")       > -1) return "🖼️";
  if (m.indexOf("video")       > -1) return "🎬";
  if (m.indexOf("audio")       > -1) return "🎵";
  if (m.indexOf("pdf")         > -1) return "📕";
  if (m.indexOf("word")        > -1) return "📘";
  if (m.indexOf("excel")       > -1 ||
      m.indexOf("spreadsheet") > -1) return "📗";
  if (m.indexOf("zip")         > -1 ||
      m.indexOf("rar")         > -1) return "🗜️";
  return "📄";
}

// 角色中文標籤
function roleLabel(role) {
  var map = { admin: "👑 管理員", editor: "✏️ 編輯者", viewer: "👁️ 檢視者" };
  return map[role] || role;
}

// Toast 通知
function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.className   = "toast show " + (type || "");
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove("show"); }, 3200);
}
