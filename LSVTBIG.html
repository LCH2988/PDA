<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路記事本</title>
  <!-- 引入 LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* 專為年長者設計的大字體與手機介面優化 */
    :root {
      --primary-color: #4CAF50;
      --bg-color: #f4f4f9;
      --text-color: #333;
      --font-size-base: 20px; /* 基礎字體加大 */
      --font-size-large: 24px;
      --font-size-xlarge: 28px;
    }

    body {
      font-family: "Microsoft JhengHei", Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 15px;
      font-size: var(--font-size-base);
      line-height: 1.6;
    }

    h1, h2, h3 {
      color: var(--primary-color);
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    /* 按鈕樣式加大 */
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 15px 0;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: var(--font-size-large);
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .btn-secondary {
      background-color: #6c757d;
    }

    .btn-danger {
      background-color: #dc3545;
    }

    .btn:hover {
      opacity: 0.9;
    }

    /* 表單樣式加大 */
    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: var(--font-size-large);
    }

    input[type="text"], textarea, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: var(--font-size-base);
      box-sizing: border-box;
    }

    textarea {
      height: 200px;
      resize: vertical;
    }

    /* 記事本清單樣式 */
    .note-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-left: 8px solid var(--primary-color);
      cursor: pointer;
    }

    .note-title {
      font-size: var(--font-size-xlarge);
      font-weight: bold;
      margin-bottom: 10px;
      color: #222;
    }

    .note-meta {
      font-size: 16px;
      color: #777;
      margin-bottom: 10px;
    }

    .note-content {
      white-space: pre-wrap;
      margin-bottom: 15px;
      font-size: var(--font-size-base);
    }

    .attachment-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .attachment-item {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    /* 搜尋框樣式 */
    .search-box {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
    }

    .search-box .btn {
      width: auto;
      margin: 0;
      padding: 10px 20px;
      font-size: var(--font-size-large);
    }

    /* 隱藏區塊 */
    .hidden {
      display: none;
    }

    /* 載入中動畫 */
    .loading {
      text-align: center;
      font-size: var(--font-size-large);
      margin-top: 50px;
    }

    /* 按鈕容器 */
    .button-group {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    .button-group .btn {
      flex: 1;
      margin: 0;
      padding: 10px;
      font-size: 16px;
    }

    /* 閱覽者名單 */
    .viewers-list {
      margin-top: 10px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<div class="container">
  <div id="loading" class="loading">載入中，請稍候...</div>

  <div id="app" class="hidden">
    <h1>網路記事本</h1>
    
    <!-- 搜尋與新增按鈕 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="輸入關鍵字搜尋...">
      <button class="btn" onclick="searchNotes()">搜尋</button>
    </div>
    <button class="btn" onclick="showAddForm()">＋ 新增記事</button>

    <!-- 記事本清單 -->
    <div id="noteList"></div>
  </div>

  <!-- 新增/編輯表單 -->
  <div id="noteForm" class="hidden">
    <h2 id="formTitle">新增記事</h2>
    <div class="form-group">
      <label for="title">標題</label>
      <input type="text" id="title" placeholder="請輸入標題">
    </div>
    <div class="form-group">
      <label for="content">內容</label>
      <textarea id="content" placeholder="請輸入內容"></textarea>
    </div>
    <div class="form-group">
      <label for="attachments">附件 (可多選)</label>
      <input type="file" id="attachments" multiple onchange="previewFiles()">
      <div id="previewContainer" class="attachment-preview"></div>
    </div>
    <button class="btn" onclick="saveNote()">儲存</button>
    <button class="btn btn-secondary" onclick="showList()">取消</button>
  </div>
</div>

<script>
  // 設定 GAS Web App URL (請替換為您的實際 URL)
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzKWq0EWYetLcMqYXoASj0OpqBvp6wqMiO2C99TuhxTX2iDxhwukML8K8FLa3jLdCH94g/exec'; // 例如: https://script.google.com/macros/d/YOUR_ID/userweb

  let currentUser = { userID: '', userName: '' };
  let currentNotes = [];
  let editingNoteID = null;

  /**
   * 初始化 LIFF
   */
  async function initLiff() {
    try {
      await liff.init({ liffId: "2001679903-jkND3El9" }); // 請替換為您的 LIFF ID
      if (!liff.isLoggedIn()) {
        liff.login();
      } else {
        const profile = await liff.getProfile();
        currentUser.userID = profile.userId;
        currentUser.userName = profile.displayName;
        loadNotes();
      }
    } catch (err) {
      console.error('LIFF 初始化失敗', err);
      // 測試環境模擬
      currentUser = { userID: 'test_user_' + Date.now(), userName: '測試使用者' };
      loadNotes();
    }
  }

  /**
   * 向 GAS 後端發送請求
   */
  async function callGasApi(action, data) {
    try {
      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          action: action,
          data: data
        })
      });

      if (!response.ok) {
        throw new Error(`HTTP Error: ${response.status}`);
      }

      const result = await response.json();
      return result;
    } catch (error) {
      console.error('API 呼叫失敗:', error);
      return { success: false, message: error.message };
    }
  }

  /**
   * 載入記事本
   */
  async function loadNotes(keyword = '') {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
    
    const result = await callGasApi('getNotes', { keyword: keyword });
    
    if (result.success) {
      currentNotes = result.data;
      renderNotes(result.data);
    } else {
      alert('載入記事本失敗: ' + result.message);
    }

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }

  /**
   * 渲染記事本清單
   */
  function renderNotes(notes) {
    const listDiv = document.getElementById('noteList');
    listDiv.innerHTML = '';
    
    if (notes.length === 0) {
      listDiv.innerHTML = '<p style="text-align: center; font-size: 20px; color: #999;">目前沒有記事</p>';
      return;
    }

    notes.forEach(note => {
      if (note.Status === 'deleted') return;

      const card = document.createElement('div');
      card.className = 'note-card';
      card.onclick = () => recordView(note.NoteID);

      const attachments = JSON.parse(note.Attachments || '[]');
      let attachmentHtml = '';
      attachments.forEach(url => {
        if (url.match(/\.(jpeg|jpg|gif|png)$/) != null) {
          attachmentHtml += `<img src="${url}" class="attachment-item" alt="附件圖片">`;
        } else {
          attachmentHtml += `<a href="${url}" target="_blank" style="font-size:16px; padding: 10px; background: #e0e0e0; border-radius: 5px;">📎 附件</a> `;
        }
      });

      const viewers = JSON.parse(note.Viewers || '[]');
      let viewersHtml = '';
      if (viewers.length > 0) {
        viewersHtml = `<div class="viewers-list"><strong>閱覽者:</strong> ${viewers.join(', ')}</div>`;
      }

      card.innerHTML = `
        <div class="note-title">${note.Title}</div>
        <div class="note-meta">
          發言者: ${note.CreatedByUserName} | 
          時間: ${new Date(note.CreatedAt).toLocaleString()} | 
          閱覽: ${note.ViewCount} 次
        </div>
        <div class="note-content">${note.Content}</div>
        <div class="attachment-preview">${attachmentHtml}</div>
        ${viewersHtml}
        ${(note.CreatedByUserID === currentUser.userID) ? `
          <div class="button-group">
            <button class="btn btn-secondary" onclick="event.stopPropagation(); editNote('${note.NoteID}')">編輯</button>
            <button class="btn btn-danger" onclick="event.stopPropagation(); deleteNote('${note.NoteID}')">刪除</button>
          </div>
        ` : ''}
      `;
      listDiv.appendChild(card);
    });
  }

  /**
   * 搜尋功能
   */
  function searchNotes() {
    const keyword = document.getElementById('searchInput').value;
    loadNotes(keyword);
  }

  /**
   * 顯示新增表單
   */
  function showAddForm() {
    editingNoteID = null;
    document.getElementById('formTitle').innerText = '新增記事';
    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('attachments').value = '';
    document.getElementById('previewContainer').innerHTML = '';
    document.getElementById('app').classList.add('hidden');
    document.getElementById('noteForm').classList.remove('hidden');
  }

  /**
   * 顯示清單
   */
  function showList() {
    document.getElementById('noteForm').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  }

  /**
   * 預覽附件
   */
  function previewFiles() {
    const preview = document.getElementById('previewContainer');
    preview.innerHTML = '';
    const files = document.getElementById('attachments').files;

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.createElement('img');
          img.src = e.target.result;
          img.className = 'attachment-item';
          img.alt = file.name;
          preview.appendChild(img);
        }
        reader.readAsDataURL(file);
      } else {
        const span = document.createElement('span');
        span.innerText = '📎 ' + file.name;
        span.style.fontSize = '16px';
        span.style.padding = '10px';
        span.style.background = '#e0e0e0';
        span.style.borderRadius = '5px';
        preview.appendChild(span);
      }
    }
  }

  /**
   * 儲存記事
   */
  async function saveNote() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const fileInput = document.getElementById('attachments');
    const files = fileInput.files;

    if (!title || !content) {
      alert('請填寫標題與內容');
      return;
    }

    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('noteForm').classList.add('hidden');

    // 處理附件轉 Base64
    const attachments = [];
    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      const base64 = await toBase64(file);
      attachments.push({
        fileName: file.name,
        mimeType: file.type,
        base64: base64.split(',')[1]
      });
    }

    const noteData = {
      title: title,
      content: content,
      attachments: attachments,
      userID: currentUser.userID,
      userName: currentUser.userName
    };

    let result;
    if (editingNoteID) {
      result = await callGasApi('updateNote', {
        noteID: editingNoteID,
        noteData: noteData,
        userID: currentUser.userID
      });
    } else {
      result = await callGasApi('addNote', noteData);
    }

    if (result.success) {
      loadNotes();
      showList();
    } else {
      alert('儲存失敗: ' + result.message);
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('noteForm').classList.remove('hidden');
    }
  }

  /**
   * 輔助函數：檔案轉 Base64
   */
  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });

  /**
   * 編輯記事
   */
  function editNote(noteID) {
    const note = currentNotes.find(n => n.NoteID === noteID);
    if (note) {
      editingNoteID = noteID;
      document.getElementById('formTitle').innerText = '編輯記事';
      document.getElementById('title').value = note.Title;
      document.getElementById('content').value = note.Content;
      document.getElementById('previewContainer').innerHTML = '<p style="font-size: 16px; color: #666;">（編輯模式下，新上傳的附件將會追加）</p>';
      document.getElementById('app').classList.add('hidden');
      document.getElementById('noteForm').classList.remove('hidden');
    }
  }

  /**
   * 刪除記事
   */
  async function deleteNote(noteID) {
    if (confirm('確定要刪除這筆記事嗎？')) {
      const result = await callGasApi('deleteNote', {
        noteID: noteID,
        userID: currentUser.userID
      });

      if (result.success) {
        loadNotes();
      } else {
        alert('刪除失敗: ' + result.message);
      }
    }
  }

  /**
   * 紀錄閱覽
   */
  async function recordView(noteID) {
    await callGasApi('recordView', {
      noteID: noteID,
      userID: currentUser.userID
    });
  }

  // 啟動應用程式
  window.onload = initLiff;
</script>

</body>
</html>
