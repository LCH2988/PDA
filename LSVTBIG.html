<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樂齡社群平台</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
      }

      body {
          font-family: 'Microsoft JhengHei', Arial, sans-serif;
          font-size: 20px;
          line-height: 1.6;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          color: #333;
      }

      .container {
          max-width: 1200px;
          margin: 0 auto;
          padding: 20px;
      }

      .header {
          background: white;
          padding: 30px;
          border-radius: 15px;
          text-align: center;
          margin-bottom: 30px;
          box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      }

      .header h1 {
          font-size: 36px;
          color: #4a5568;
          margin-bottom: 10px;
      }

      .header p {
          font-size: 22px;
          color: #718096;
      }

      .nav-menu {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
          gap: 25px;
          margin-bottom: 30px;
      }

      .nav-item {
          background: white;
          padding: 40px 30px;
          border-radius: 15px;
          text-align: center;
          cursor: pointer;
          transition: all 0.3s ease;
          box-shadow: 0 8px 25px rgba(0,0,0,0.1);
          border: 3px solid transparent;
      }

      .nav-item:hover {
          transform: translateY(-5px);
          box-shadow: 0 15px 35px rgba(0,0,0,0.15);
          border-color: #667eea;
      }

      .nav-item.active {
          border-color: #667eea;
          background: #f7fafc;
      }

      .nav-item h3 {
          font-size: 28px;
          margin-bottom: 15px;
          color: #2d3748;
      }

      .nav-item p {
          font-size: 18px;
          color: #718096;
      }

      .content-area {
          background: white;
          padding: 40px;
          border-radius: 15px;
          box-shadow: 0 8px 25px rgba(0,0,0,0.1);
          display: none;
      }

      .content-area.active {
          display: block;
      }

      .form-group {
          margin-bottom: 25px;
      }

      .form-group label {
          display: block;
          font-size: 22px;
          font-weight: bold;
          margin-bottom: 10px;
          color: #2d3748;
      }

      .form-control {
          width: 100%;
          padding: 20px;
          font-size: 20px;
          border: 3px solid #e2e8f0;
          border-radius: 10px;
          background: #f7fafc;
          transition: border-color 0.3s ease;
      }

      .form-control:focus {
          outline: none;
          border-color: #667eea;
          background: white;
      }

      select.form-control {
          height: 70px;
          cursor: pointer;
      }

      textarea.form-control {
          min-height: 150px;
          resize: vertical;
      }

      .btn {
          padding: 20px 40px;
          font-size: 22px;
          font-weight: bold;
          border: none;
          border-radius: 10px;
          cursor: pointer;
          transition: all 0.3s ease;
          margin: 10px;
          min-width: 150px;
      }

      .btn:disabled {
          opacity: 0.6;
          cursor: not-allowed;
      }

      .btn-primary {
          background: #667eea;
          color: white;
      }

      .btn-primary:hover:not(:disabled) {
          background: #5a67d8;
          transform: translateY(-2px);
      }

      .btn-success {
          background: #48bb78;
          color: white;
      }

      .btn-success:hover:not(:disabled) {
          background: #38a169;
          transform: translateY(-2px);
      }

      .btn-info {
          background: #4299e1;
          color: white;
      }

      .btn-info:hover:not(:disabled) {
          background: #3182ce;
          transform: translateY(-2px);
      }

      .file-upload {
          border: 3px dashed #cbd5e0;
          padding: 40px;
          text-align: center;
          border-radius: 10px;
          background: #f7fafc;
          cursor: pointer;
          transition: all 0.3s ease;
      }

      .file-upload:hover {
          border-color: #667eea;
          background: #edf2f7;
      }

      .file-upload input {
          display: none;
      }

      .post-item {
          background: #f7fafc;
          padding: 30px;
          margin-bottom: 20px;
          border-radius: 10px;
          border-left: 5px solid #667eea;
      }

      .post-title {
          font-size: 24px;
          font-weight: bold;
          color: #2d3748;
          margin-bottom: 10px;
      }

      .post-content {
          font-size: 18px;
          color: #4a5568;
          margin-bottom: 15px;
      }

      .post-meta {
          font-size: 16px;
          color: #718096;
          border-top: 1px solid #e2e8f0;
          padding-top: 15px;
      }

      .post-attachments {
          margin: 15px 0;
      }

      .attachment-link {
          display: inline-block;
          background: #e2e8f0;
          padding: 10px 15px;
          border-radius: 5px;
          text-decoration: none;
          color: #4a5568;
          margin: 5px;
          font-size: 16px;
      }

      .attachment-link:hover {
          background: #cbd5e0;
      }

      .photo-gallery {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 20px;
          margin-top: 20px;
      }

      .photo-item {
          background: #f7fafc;
          border-radius: 10px;
          overflow: hidden;
          box-shadow: 0 4px 15px rgba(0,0,0,0.1);
          transition: transform 0.3s ease;
      }

      .photo-item:hover {
          transform: scale(1.05);
      }

      .photo-item img {
          width: 100%;
          height: 200px;
          object-fit: cover;
      }

      .photo-info {
          padding: 15px;
      }

      .modal {
          display: none;
          position: fixed;
          z-index: 1000;
          left: 0;
          top: 0;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.8);
      }

      .modal-content {
          background: white;
          margin: 5% auto;
          padding: 40px;
          width: 90%;
          max-width: 800px;
          border-radius: 15px;
          position: relative;
          max-height: 90vh;
          overflow-y: auto;
      }

      .close {
          position: absolute;
          right: 20px;
          top: 20px;
          font-size: 40px;
          cursor: pointer;
          color: #718096;
      }

      .close:hover {
          color: #2d3748;
      }

      .loading {
          text-align: center;
          padding: 20px;
          color: #718096;
      }

      .error {
          background: #fed7d7;
          color: #c53030;
          padding: 15px;
          border-radius: 5px;
          margin: 10px 0;
      }

      .success {
          background: #c6f6d5;
          color: #22543d;
          padding: 15px;
          border-radius: 5px;
          margin: 10px 0;
      }

      .file-preview {
          margin-top: 10px;
          padding: 10px;
          background: #f7fafc;
          border-radius: 5px;
          font-size: 16px;
      }

      @media (max-width: 768px) {
          .container {
              padding: 10px;
          }
          
          .nav-menu {
              grid-template-columns: 1fr;
          }
          
          .content-area {
              padding: 20px;
          }
          
          .btn {
              width: 100%;
              margin: 5px 0;
          }
      }
  </style>
</head>
<body>
  <div class="container">
      <div class="header">
          <h1>🌟 樂齡社群平台</h1>
          <p>分享生活、交流經驗、記錄美好時光</p>
      </div>

      <div class="nav-menu">
          <div class="nav-item active" onclick="showContent('forum')">
              <h3>💬 分享論壇</h3>
              <p>發表主題、分享心得、交流討論</p>
          </div>
          <div class="nav-item" onclick="showContent('info')">
              <h3>📢 資訊平台</h3>
              <p>重要公告、活動資訊、實用知識</p>
          </div>
          <div class="nav-item" onclick="showContent('gallery')">
              <h3>📸 活動花絮</h3>
              <p>相簿管理、照片分享、回憶收藏</p>
          </div>
      </div>

      <!-- 分享論壇 -->
      <div id="forum" class="content-area active">
          <h2 style="font-size: 32px; margin-bottom: 30px; color: #2d3748;">💬 分享論壇</h2>
          
          <div style="margin-bottom: 40px;">
              <button class="btn btn-primary" onclick="showModal('createPost')">✏️ 發表新主題</button>
              <button class="btn btn-info" onclick="loadPosts()">🔄 重新整理</button>
          </div>

          <div class="form-group">
              <label>🔍 搜尋主題</label>
              <select class="form-control" onchange="filterPosts(this.value)">
                  <option value="">所有主題</option>
                  <option value="生活分享">生活分享</option>
                  <option value="健康養生">健康養生</option>
                  <option value="興趣愛好">興趣愛好</option>
                  <option value="旅遊心得">旅遊心得</option>
                  <option value="料理食譜">料理食譜</option>
                  <option value="其他">其他</option>
              </select>
          </div>

          <div id="postsList">
              <div class="loading">📡 載入中...</div>
          </div>
      </div>

      <!-- 資訊平台 -->
      <div id="info" class="content-area">
          <h2 style="font-size: 32px; margin-bottom: 30px; color: #2d3748;">📢 資訊平台</h2>
          
          <div style="margin-bottom: 40px;">
              <button class="btn btn-primary" onclick="showModal('createInfo')">📝 發布資訊</button>
              <button class="btn btn-info" onclick="loadInfo()">🔄 重新整理</button>
          </div>

          <div class="form-group">
              <label>📂 資訊分類</label>
              <select class="form-control" onchange="filterInfo(this.value)">
                  <option value="">所有資訊</option>
                  <option value="重要公告">重要公告</option>
                  <option value="活動通知">活動通知</option>
                  <option value="健康資訊">健康資訊</option>
                  <option value="生活小貼士">生活小貼士</option>
                  <option value="社區消息">社區消息</option>
              </select>
          </div>

          <div id="infoList">
              <div class="loading">📡 載入中...</div>
          </div>
      </div>

      <!-- 活動花絮 -->
      <div id="gallery" class="content-area">
          <h2 style="font-size: 32px; margin-bottom: 30px; color: #2d3748;">📸 活動花絮</h2>
          
          <div style="margin-bottom: 40px;">
              <button class="btn btn-primary" onclick="showModal('createAlbum')">📁 建立相簿</button>
              <button class="btn btn-info" onclick="showModal('uploadPhoto')">📷 上傳照片</button>
              <button class="btn btn-success" onclick="loadGallery()">🔄 重新整理</button>
          </div>

          <div class="form-group">
              <label>📂 選擇相簿</label>
              <select class="form-control" id="galleryFilter" onchange="filterGallery(this.value)">
                  <option value="">所有相簿</option>
              </select>
          </div>

          <div class="photo-gallery" id="photoGallery">
              <div class="loading">📡 載入中...</div>
          </div>
      </div>
  </div>

  <!-- 模態視窗 -->
  <div id="modal" class="modal">
      <div class="modal-content">
          <span class="close" onclick="closeModal()">&times;</span>
          <div id="modalContent"></div>
      </div>
  </div>

  <script>
      // 設定 Google Apps Script Web App URL
      const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzOQ5s6enlJ2oFRpGJ5wGDTe8nV-CyiY4o31B8XF00jbQxShmupZJRZC88267bN5F5SdA/exec';
      
      // 全域變數
      let currentPosts = [];
      let currentInfo = [];
      let currentGallery = [];
      let selectedFiles = [];

      // LIFF 初始化
      window.onload = function() {
          if (typeof liff !== 'undefined') {
              liff.init({
                  liffId: '2009456572-AUDE1qmM' // 請替換為實際的 LIFF ID
              }).then(() => {
                  console.log('LIFF 初始化成功');
              }).catch((err) => {
                  console.log('LIFF 初始化失敗', err);
              });
          }
          
          // 載入初始資料
          loadPosts();
      };

      // API 呼叫函數
      async function callGASAPI(action, data = null, method = 'GET') {
          try {
              let url = `${GAS_WEB_APP_URL}?action=${action}`;
              let options = {
                  method: method,
                  mode: 'cors'
              };

              if (method === 'POST' && data) {
                  options.headers = {
                      'Content-Type': 'application/json',
                  };
                  options.body = JSON.stringify({ action, ...data });
              } else if (method === 'GET' && data) {
                  const params = new URLSearchParams(data);
                  url += '&' + params.toString();
              }

              const response = await fetch(url, options);
              
              if (!response.ok) {
                  throw new Error(`HTTP error! status: ${response.status}`);
              }
              
              const result = await response.json();
              return result;
          } catch (error) {
              console.error('API 呼叫錯誤:', error);
              showMessage('❌ 連線錯誤，請檢查網路連線', 'error');
              return { error: error.message };
          }
      }

      // 顯示訊息
      function showMessage(message, type = 'info') {
          const messageDiv = document.createElement('div');
          messageDiv.className = type;
          messageDiv.textContent = message;
          
          // 找到當前活動的內容區域並插入訊息
          const activeContent = document.querySelector('.content-area.active');
          activeContent.insertBefore(messageDiv, activeContent.firstChild);
          
          // 3秒後移除訊息
          setTimeout(() => {
              if (messageDiv.parentNode) {
                  messageDiv.parentNode.removeChild(messageDiv);
              }
          }, 3000);
      }

      // 顯示內容區域
      function showContent(contentId) {
          // 隱藏所有內容區域
          const contents = document.querySelectorAll('.content-area');
          contents.forEach(content => content.classList.remove('active'));
          
          // 移除所有導航項目的 active 類別
          const navItems = document.querySelectorAll('.nav-item');
          navItems.forEach(item => item.classList.remove('active'));
          
          // 顯示選中的內容區域
          document.getElementById(contentId).classList.add('active');
          
          // 添加對應導航項目的 active 類別
          event.target.closest('.nav-item').classList.add('active');
          
          // 載入對應資料
          switch(contentId) {
              case 'forum':
                  if (currentPosts.length === 0) loadPosts();
                  break;
              case 'info':
                  if (currentInfo.length === 0) loadInfo();
                  break;
              case 'gallery':
                  if (currentGallery.length === 0) loadGallery();
                  break;
          }
      }

      // 載入貼文
      async function loadPosts(category = '') {
          const postsList = document.getElementById('postsList');
          postsList.innerHTML = '<div class="loading">📡 載入中...</div>';
          
          const result = await callGASAPI('getPosts', { category });
          
          if (result.error) {
              postsList.innerHTML = '<div class="error">❌ 載入失敗: ' + result.error + '</div>';
              return;
          }
          
          currentPosts = result;
          displayPosts(result);
      }

      // 顯示貼文
      function displayPosts(posts) {
          const postsList = document.getElementById('postsList');
          
          if (!posts || posts.length === 0) {
              postsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #718096;">📝 還沒有任何貼文，快來發表第一篇吧！</div>';
              return;
          }
          
          let html = '';
          posts.forEach(post => {
              let attachmentsHtml = '';
              if (post.attachments) {
                  try {
                      const attachments = JSON.parse(post.attachments);
                      attachmentsHtml = '<div class="post-attachments">📎 附件: ';
                      attachments.forEach(att => {
                          attachmentsHtml += `<a href="${att.url}" target="_blank" class="attachment-link">${att.name}</a>`;
                      });
                      attachmentsHtml += '</div>';
                  } catch (e) {
                      // 如果解析失敗，忽略附件
                  }
              }
              
              let linkHtml = '';
              if (post.link) {
                  linkHtml = `<div style="margin: 10px 0;"><a href="${post.link}" target="_blank" style="color: #667eea;">🔗 相關連結</a></div>`;
              }
              
              html += `
                  <div class="post-item">
                      <div class="post-title">${escapeHtml(post.title)}</div>
                      <div class="post-content">${escapeHtml(post.content)}</div>
                      ${attachmentsHtml}
                      ${linkHtml}
                      <div class="post-meta">
                          分類：${post.category} | 作者：${post.author} | 發表時間：${formatDate(post.timestamp)} | 👍 ${post.likes || 0}個讚
                          <br style="margin: 10px 0;">
                          <button class="btn btn-success" onclick="likePost(${post.id})" style="margin: 5px;">👍 按讚</button>
                          <button class="btn btn-info" onclick="shareToLine('${escapeHtml(post.title)}')" style="margin: 5px;">📤 LINE分享</button>
                      </div>
                  </div>
              `;
          });
          
          postsList.innerHTML = html;
      }

      // 載入資訊
      async function loadInfo(category = '') {
          const infoList = document.getElementById('infoList');
          infoList.innerHTML = '<div class="loading">📡 載入中...</div>';
          
          const result = await callGASAPI('getInfo', { category });
          
          if (result.error) {
              infoList.innerHTML = '<div class="error">❌ 載入失敗: ' + result.error + '</div>';
              return;
          }
          
          currentInfo = result;
          displayInfo(result);
      }

      // 顯示資訊
      function displayInfo(info) {
          const infoList = document.getElementById('infoList');
          
          if (!info || info.length === 0) {
              infoList.innerHTML = '<div style="text-align: center; padding: 40px; color: #718096;">📢 還沒有任何資訊</div>';
              return;
          }
          
          let html = '';
          info.forEach(item => {
              let attachmentsHtml = '';
              if (item.attachments) {
                  try {
                      const attachments = JSON.parse(item.attachments);
                      attachmentsHtml = '<div class="post-attachments">📎 附件: ';
                      attachments.forEach(att => {
                          attachmentsHtml += `<a href="${att.url}" target="_blank" class="attachment-link">${att.name}</a>`;
                      });
                      attachmentsHtml += '</div>';
                  } catch (e) {
                      // 如果解析失敗，忽略附件
                  }
              }
              
              html += `
                  <div class="post-item">
                      <div class="post-title">${escapeHtml(item.title)}</div>
                      <div class="post-content">${escapeHtml(item.content)}</div>
                      ${attachmentsHtml}
                      <div class="post-meta">
                          分類：${item.category} | 發布者：${item.publisher} | 發布時間：${formatDate(item.timestamp)}
                          <br style="margin: 10px 0;">
                          <button class="btn btn-info" onclick="shareToLine('${escapeHtml(item.title)}')" style="margin: 5px;">📤 LINE分享</button>
                      </div>
                  </div>
              `;
          });
          
          infoList.innerHTML = html;
      }

      // 載入相簿
      async function loadGallery(album = '') {
          const photoGallery = document.getElementById('photoGallery');
          const galleryFilter = document.getElementById('galleryFilter');
          
          photoGallery.innerHTML = '<div class="loading">📡 載入中...</div>';
          
          const result = await callGASAPI('getGallery', { album });
          
          if (result.error) {
              photoGallery.innerHTML = '<div class="error">❌ 載入失敗: ' + result.error + '</div>';
              return;
          }
          
          currentGallery = result;
          
          // 更新相簿選單
          updateGalleryFilter(result);
          displayGallery(result);
      }

      // 更新相簿篩選選單
      function updateGalleryFilter(galleries) {
          const galleryFilter = document.getElementById('galleryFilter');
          const currentValue = galleryFilter.value;
          
          // 保留現有選項，添加新的相簿
          const existingOptions = Array.from(galleryFilter.options).map(opt => opt.value);
          
          galleries.forEach(gallery => {
              if (!existingOptions.includes(gallery.name)) {
                  const option = document.createElement('option');
                  option.value = gallery.name;
                  option.textContent = gallery.name;
                  galleryFilter.appendChild(option);
              }
          });
          
          // 恢復之前的選擇
          galleryFilter.value = currentValue;
      }

      // 顯示相簿
      function displayGallery(galleries) {
          const photoGallery = document.getElementById('photoGallery');
          
          if (!galleries || galleries.length === 0) {
              photoGallery.innerHTML = '<div style="text-align: center; padding: 40px; color: #718096;">📸 還沒有任何相簿</div>';
              return;
          }
          
          let html = '';
          galleries.forEach(gallery => {
              if (gallery.photos && gallery.photos.length > 0) {
                  gallery.photos.forEach(photo => {
                      html += `
                          <div class="photo-item">
                              <img src="${photo.url}" alt="${photo.name}" onclick="viewPhoto('${photo.url}', '${photo.name}')">
                              <div class="photo-info">
                                  <strong>${escapeHtml(gallery.name)}</strong><br>
                                  ${photo.name}<br>
                                  ${formatDate(gallery.date)}<br>
                                  <button class="btn btn-info" onclick="downloadPhoto('${photo.downloadUrl}', '${photo.name}')">💾 下載</button>
                              </div>
                          </div>
                      `;
                  });
              } else {
                  html += `
                      <div class="photo-item">
                          <div style="height: 200px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; color: #999;">
                              📁 空相簿
                          </div>
                          <div class="photo-info">
                              <strong>${escapeHtml(gallery.name)}</strong><br>
                              ${formatDate(gallery.date)}<br>
                              <em>尚無照片</em>
                          </div>
                      </div>
                  `;
              }
          });
          
          photoGallery.innerHTML = html;
      }

      // 顯示模態視窗
      function showModal(type) {
          const modal = document.getElementById('modal');
          const modalContent = document.getElementById('modalContent');
          
          let content = '';
          
          switch(type) {
              case 'createPost':
                  content = `
                      <h3 style="font-size: 28px; margin-bottom: 20px;">✏️ 發表新主題</h3>
                      <div class="form-group">
                          <label>📝 主題標題</label>
                          <input type="text" class="form-control" id="postTitle" placeholder="請輸入主題標題...">
                      </div>
                      <div class="form-group">
                          <label>📂 主題分類</label>
                          <select class="form-control" id="postCategory">
                              <option value="生活分享">生活分享</option>
                              <option value="健康養生">健康養生</option>
                              <option value="興趣愛好">興趣愛好</option>
                              <option value="旅遊心得">旅遊心得</option>
                              <option value="料理食譜">料理食譜</option>
                              <option value="其他">其他</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <label>📄 內容描述</label>
                          <textarea class="form-control" id="postContent" placeholder="請輸入內容..."></textarea>
                      </div>
                      <div class="form-group">
                          <label>📎 附件上傳</label>
                          <div class="file-upload" onclick="document.getElementById('postFile').click()">
                              <input type="file" id="postFile" multiple accept="image/*,application/pdf,.doc,.docx" onchange="handleFileSelect(this, 'postFilePreview')">
                              <p style="font-size: 20px; color: #718096;">📁 點擊上傳檔案<br><small>支援圖片、PDF、Word文件</small></p>
                          </div>
                          <div id="postFilePreview"></div>
                      </div>
                      <div class="form-group">
                          <label>🔗 相關連結</label>
                          <input type="url" class="form-control" id="postLink" placeholder="https://...">
                      </div>
                      <div style="text-align: center; margin-top: 30px;">
                          <button class="btn btn-primary" onclick="submitPost()">📤 發表主題</button>
                          <button class="btn" onclick="closeModal()" style="background: #e2e8f0;">❌ 取消</button>
                      </div>
                  `;
                  break;
                  
              case 'createInfo':
                  content = `
                      <h3 style="font-size: 28px; margin-bottom: 20px;">📝 發布資訊</h3>
                      <div class="form-group">
                          <label>📢 資訊標題</label>
                          <input type="text" class="form-control" id="infoTitle" placeholder="請輸入資訊標題...">
                      </div>
                      <div class="form-group">
                          <label>📂 資訊分類</label>
                          <select class="form-control" id="infoCategory">
                              <option value="重要公告">重要公告</option>
                              <option value="活動通知">活動通知</option>
                              <option value="健康資訊">健康資訊</option>
                              <option value="生活小貼士">生活小貼士</option>
                              <option value="社區消息">社區消息</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <label>📄 資訊內容</label>
                          <textarea class="form-control" id="infoContent" placeholder="請輸入資訊內容..."></textarea>
                      </div>
                      <div class="form-group">
                          <label>📎 附件上傳</label>
                          <div class="file-upload" onclick="document.getElementById('infoFile').click()">
                              <input type="file" id="infoFile" multiple onchange="handleFileSelect(this, 'infoFilePreview')">
                              <p style="font-size: 20px; color: #718096;">📁 點擊上傳檔案</p>
                          </div>
                          <div id="infoFilePreview"></div>
                      </div>
                      <div style="text-align: center; margin-top: 30px;">
                          <button class="btn btn-primary" onclick="submitInfo()">📤 發布資訊</button>
                          <button class="btn" onclick="closeModal()" style="background: #e2e8f0;">❌ 取消</button>
                      </div>
                  `;
                  break;
                  
              case 'createAlbum':
                  content = `
                      <h3 style="font-size: 28px; margin-bottom: 20px;">📁 建立相簿</h3>
                      <div class="form-group">
                          <label>📸 相簿名稱</label>
                          <input type="text" class="form-control" id="albumName" placeholder="請輸入相簿名稱...">
                      </div>
                      <div class="form-group">
                          <label>📅 活動日期</label>
                          <input type="date" class="form-control" id="albumDate">
                      </div>
                      <div class="form-group">
                          <label>📄 相簿描述</label>
                          <textarea class="form-control" id="albumDescription" placeholder="請輸入相簿描述..."></textarea>
                      </div>
                      <div style="text-align: center; margin-top: 30px;">
                          <button class="btn btn-primary" onclick="createAlbum()">📁 建立相簿</button>
                          <button class="btn" onclick="closeModal()" style="background: #e2e8f0;">❌ 取消</button>
                      </div>
                  `;
                  break;
                  
              case 'uploadPhoto':
                  content = `
                      <h3 style="font-size: 28px; margin-bottom: 20px;">📷 上傳照片</h3>
                      <div class="form-group">
                          <label>📂 選擇相簿</label>
                          <select class="form-control" id="photoAlbum">
                              ${getAlbumOptions()}
                          </select>
                      </div>
                      <div class="form-group">
                          <label>📸 選擇照片</label>
                          <div class="file-upload" onclick="document.getElementById('photoFiles').click()">
                              <input type="file" id="photoFiles" multiple accept="image/*" onchange="handleFileSelect(this, 'photoFilePreview')">
                              <p style="font-size: 20px; color: #718096;">📁 點擊選擇照片<br><small>可同時選擇多張照片</small></p>
                          </div>
                          <div id="photoFilePreview"></div>
                      </div>
                      <div style="text-align: center; margin-top: 30px;">
                          <button class="btn btn-primary" onclick="uploadPhotos()">📤 上傳照片</button>
                          <button class="btn" onclick="closeModal()" style="background: #e2e8f0;">❌ 取消</button>
                      </div>
                  `;
                  break;
          }
          
          modalContent.innerHTML = content;
          modal.style.display = 'block';
      }

      // 取得相簿選項
      function getAlbumOptions() {
          let options = '<option value="">請選擇相簿</option>';
          currentGallery.forEach(gallery => {
              options += `<option value="${gallery.folderId}">${gallery.name}</option>`;
          });
          return options;
      }

      // 處理檔案選擇
      function handleFileSelect(input, previewId) {
          const preview = document.getElementById(previewId);
          const files = input.files;
          
          if (files.length === 0) {
              preview.innerHTML = '';
              return;
          }
          
          let html = '<div class="file-preview"><strong>已選擇檔案:</strong><br>';
          for (let i = 0; i < files.length; i++) {
              const file = files[i];
              html += `📄 ${file.name} (${formatFileSize(file.size)})<br>`;
          }
          html += '</div>';
          
          preview.innerHTML = html;
      }

      // 提交貼文
      async function submitPost() {
          const title = document.getElementById('postTitle').value;
          const category = document.getElementById('postCategory').value;
          const content = document.getElementById('postContent').value;
          const link = document.getElementById('postLink').value;
          const fileInput = document.getElementById('postFile');
          
          if (!title || !content) {
              showMessage('❌ 請填寫標題和內容', 'error');
              return;
          }
          
          // 禁用按鈕防止重複提交
          const submitBtn = event.target;
          submitBtn.disabled = true;
          submitBtn.textContent = '📤 提交中...';
          
          try {
              // 處理檔案上傳
              let attachments = [];
              if (fileInput.files.length > 0) {
                  attachments = await processFiles(fileInput.files);
              }
              
              const postData = {
                  title,
                  category,
                  content,
                  link,
                  attachments,
                  author: '用戶' // 可以從 LIFF 取得用戶資訊
              };
              
              const result = await callGASAPI('createPost', postData, 'POST');
              
              if (result.success) {
                  showMessage('✅ 主題發表成功！', 'success');
                  closeModal();
                  loadPosts();
              } else {
                  showMessage('❌ 發表失敗: ' + (result.message || '未知錯誤'), 'error');
              }
          } catch (error) {
              showMessage('❌ 發表失敗: ' + error.message, 'error');
          } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = '📤 發表主題';
          }
      }

      // 提交資訊
      async function submitInfo() {
          const title = document.getElementById('infoTitle').value;
          const category = document.getElementById('infoCategory').value;
          const content = document.getElementById('infoContent').value;
          const fileInput = document.getElementById('infoFile');
          
          if (!title || !content) {
              showMessage('❌ 請填寫標題和內容', 'error');
              return;
          }
          
          const submitBtn = event.target;
          submitBtn.disabled = true;
          submitBtn.textContent = '📤 發布中...';
          
          try {
              let attachments = [];
              if (fileInput.files.length > 0) {
                  attachments = await processFiles(fileInput.files);
              }
              
              const infoData = {
                  title,
                  category,
                  content,
                  attachments,
                  publisher: '管理員'
              };
              
              const result = await callGASAPI('createInfo', infoData, 'POST');
              
              if (result.success) {
                  showMessage('✅ 資訊發布成功！', 'success');
                  closeModal();
                  loadInfo();
              } else {
                  showMessage('❌ 發布失敗: ' + (result.message || '未知錯誤'), 'error');
              }
          } catch (error) {
              showMessage('❌ 發布失敗: ' + error.message, 'error');
          } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = '📤 發布資訊';
          }
      }

      // 建立相簿
      async function createAlbum() {
          const name = document.getElementById('albumName').value;
          const date = document.getElementById('albumDate').value;
          const description = document.getElementById('albumDescription').value;
          
          if (!name) {
              showMessage('❌ 請填寫相簿名稱', 'error');
              return;
          }
          
          const submitBtn = event.target;
          submitBtn.disabled = true;
          submitBtn.textContent = '📁 建立中...';
          
          try {
              const albumData = {
                  name,
                  date,
                  description,
                  creator: '管理員'
              };
              
              const result = await callGASAPI('createAlbum', albumData, 'POST');
              
              if (result.success) {
                  showMessage('✅ 相簿建立成功！', 'success');
                  closeModal();
                  loadGallery();
              } else {
                  showMessage('❌ 建立失敗: ' + (result.message || '未知錯誤'), 'error');
              }
          } catch (error) {
              showMessage('❌ 建立失敗: ' + error.message, 'error');
          } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = '📁 建立相簿';
          }
      }

      // 上傳照片
      async function uploadPhotos() {
          const albumFolderId = document.getElementById('photoAlbum').value;
          const fileInput = document.getElementById('photoFiles');
          
          if (!albumFolderId) {
              showMessage('❌ 請選擇相簿', 'error');
              return;
          }
          
          if (fileInput.files.length === 0) {
              showMessage('❌ 請選擇要上傳的照片', 'error');
              return;
          }
          
          const submitBtn = event.target;
          submitBtn.disabled = true;
          submitBtn.textContent = '📤 上傳中...';
          
          try {
              const photos = await processFiles(fileInput.files);
              
              const uploadData = {
                  albumFolderId,
                  photos
              };
              
              const result = await callGASAPI('uploadPhoto', uploadData, 'POST');
              
              if (result.success) {
                  showMessage(`✅ 成功上傳 ${result.files.length} 張照片！`, 'success');
                  closeModal();
                  loadGallery();
              } else {
                  showMessage('❌ 上傳失敗: ' + (result.message || '未知錯誤'), 'error');
              }
          } catch (error) {
              showMessage('❌ 上傳失敗: ' + error.message, 'error');
          } finally {
              submitBtn.disabled = false;
              submitBtn.textContent = '📤 上傳照片';
          }
      }

      // 處理檔案轉換為 base64
      async function processFiles(files) {
          const processedFiles = [];
          
          for (let i = 0; i < files.length; i++) {
              const file = files[i];
              const base64 = await fileToBase64(file);
              
              processedFiles.push({
                  name: file.name,
                  data: base64.split(',')[1], // 移除 data:image/jpeg;base64, 前綴
                  mimeType: file.type
              });
          }
          
          return processedFiles;
      }

      // 檔案轉 base64
      function fileToBase64(file) {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = () => resolve(reader.result);
              reader.onerror = error => reject(error);
          });
      }

      // 按讚功能
      async function likePost(postId) {
          try {
              const result = await callGASAPI('likePost', { postId }, 'POST');
              
              if (result.success) {
                  showMessage('👍 按讚成功！', 'success');
                  loadPosts(); // 重新載入以更新讚數
              } else {
                  showMessage('❌ 按讚失敗', 'error');
              }
          } catch (error) {
              showMessage('❌ 按讚失敗: ' + error.message, 'error');
          }
      }

      // LINE 分享功能
      function shareToLine(title) {
          if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
              liff.shareTargetPicker([
                  {
                      type: 'text',
                      text: `來看看這個有趣的主題：${title}\n\n來自樂齡社群平台的分享 🌟`
                  }
              ]).then(() => {
                  showMessage('✅ 分享成功！', 'success');
              }).catch((err) => {
                  console.log('分享失敗', err);
                  showMessage('❌ 分享失敗，請稍後再試', 'error');
              });
          } else {
              // 備用分享方式
              const shareText = `來看看這個有趣的主題：${title}`;
              const shareUrl = `https://line.me/R/share?text=${encodeURIComponent(shareText)}`;
              window.open(shareUrl, '_blank');
          }
      }

      // 篩選功能
      function filterPosts(category) {
          if (category === '') {
              displayPosts(currentPosts);
          } else {
              const filtered = currentPosts.filter(post => post.category === category);
              displayPosts(filtered);
          }
      }

      function filterInfo(category) {
          if (category === '') {
              displayInfo(currentInfo);
          } else {
              const filtered = currentInfo.filter(info => info.category === category);
              displayInfo(filtered);
          }
      }

      function filterGallery(album) {
          if (album === '') {
              displayGallery(currentGallery);
          } else {
              const filtered = currentGallery.filter(gallery => gallery.name === album);
              displayGallery(filtered);
          }
      }

      // 查看照片
      function viewPhoto(url, name) {
          const modal = document.getElementById('modal');
          const modalContent = document.getElementById('modalContent');
          
          modalContent.innerHTML = `
              <h3 style="font-size: 24px; margin-bottom: 20px;">${escapeHtml(name)}</h3>
              <div style="text-align: center;">
                  <img src="${url}" alt="${escapeHtml(name)}" style="max-width: 100%; max-height: 70vh; border-radius: 10px;">
              </div>
              <div style="text-align: center; margin-top: 20px;">
                  <button class="btn btn-info" onclick="downloadPhoto('${url}', '${name}')">💾 下載照片</button>
              </div>
          `;
          
          modal.style.display = 'block';
      }

      // 下載照片
      function downloadPhoto(url, filename) {
          const link = document.createElement('a');
          link.href = url;
          link.download = filename;
          link.click();
          showMessage('📥 照片下載中...', 'success');
      }

      // 關閉模態視窗
      function closeModal() {
          document.getElementById('modal').style.display = 'none';
      }

      // 工具函數
      function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
      }

      function formatDate(date) {
          if (!date) return '';
          const d = new Date(date);
          return d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      }

      function formatFileSize(bytes) {
          if (bytes === 0) return '0 Bytes';
          const k = 1024;
          const sizes = ['Bytes', 'KB', 'MB', 'GB'];
          const i = Math.floor(Math.log(bytes) / Math.log(k));
          return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }

      // 點擊模態視窗外部關閉
      window.onclick = function(event) {
          const modal = document.getElementById('modal');
          if (event.target === modal) {
              closeModal();
          }
      }
  </script>
</body>
</html>
