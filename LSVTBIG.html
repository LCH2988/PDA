        <div style="background:var(--bg-secondary);padding:var(--space-3);border-radius:var(--radius);">
          <h4 style="margin:0 0 var(--space-2) 0;">📊 活動統計</h4>
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:var(--space-2);font-size:var(--font-sm);">
            <div>發表文章：${currentUser.postCount||0}篇</div>
            <div>參與活動：${currentUser.eventCount||0}次</div>
            <div>獲得讚數：${currentUser.likeCount||0}個</div>
            <div>評論數：${currentUser.commentCount||0}則</div>
          </div>
        </div>
      </div>
      <div class="modal-footer"><button class="btn btn-outline" onclick="closeAllModals()">關閉</button><button class="btn btn-error" onclick="confirmLogout()">登出</button></div>
    </div>
  </div>`);
}
function confirmLogout(){if(confirm('確定要登出嗎？'))logout();}
async function logout(){
  try{
    stopNotificationPolling();
    if(liffInitialized&&liff.isLoggedIn())liff.logout();
    if(currentUser)await apiCall('logoutUser').catch(console.error);
    currentUser=null;lineProfile=null;userApprovalStatus='pending';notificationsCache=[];
    updateUserInterface(false);closeAllModals();showSuccessMessage('已成功登出');showHome();
    if(userPreferences.voiceEnabled)speakText('已成功登出');
  }catch(e){showErrorMessage('登出失敗：'+e.message);}
}
function updateUserInterface(isLoggedIn){
  try{
    const lb=document.getElementById('login-button');
    const um=document.getElementById('user-menu');
    const ua=document.getElementById('user-avatar');
    const un=document.getElementById('user-name');
    if(isLoggedIn&&currentUser){
      if(ua&&lineProfile&&lineProfile.pictureUrl)ua.innerHTML=`<img src="${lineProfile.pictureUrl}" alt="頭像" style="width:24px;height:24px;border-radius:50%;object-fit:cover;">`;
      if(un)un.textContent=currentUser.displayName||currentUser.userName;
      if(lb)lb.style.display='none';if(um)um.style.display='block';
      showSuccessMessage('歡迎回來，'+currentUser.displayName+'！');
    }else{
      if(lb)lb.style.display='inline-flex';if(um)um.style.display='none';
      const b=document.getElementById('notification-badge');if(b)b.style.display='none';
    }
  }catch(e){console.error(e);}
}
function showLoginRequired(){}
function showManualLoginOption(){showWarningMessage('LINE登入系統暫時無法使用，請稍後再試');}

// ═══════════════════════════════════════
//  我的內容
// ═══════════════════════════════════════
async function updateMyContentStats(){
  try{
    const r=await apiCall('getUserStats');
    if(r.success){
      const s=r.data;
      document.getElementById('my-posts-count').textContent=s.postCount||0;
      document.getElementById('my-likes-count').textContent=s.likeCount||0;
      document.getElementById('my-comments-count').textContent=s.commentCount||0;
      document.getElementById('my-events-count').textContent=s.eventCount||0;
    }
  }catch(e){console.error(e);}
}
function showMyTab(tab){
  currentMyTab=tab;
  document.querySelectorAll('[id^="tab-my-"]').forEach(b=>{b.classList.remove('btn-primary');b.classList.add('btn-outline');b.style.borderBottom='none';});
  const at=document.getElementById('tab-my-'+tab);
  if(at){at.classList.add('btn-primary');at.classList.remove('btn-outline');at.style.borderBottom='2px solid var(--primary)';}
  document.querySelectorAll('[id^="my-"][id$="-content"]').forEach(c=>c.style.display='none');
  const ac=document.getElementById('my-'+tab+'-content');if(ac)ac.style.display='block';
  if(tab==='posts')loadMyPosts();
  else if(tab==='events')loadMyEvents();
  else if(tab==='favorites')loadMyFavorites();
}
async function loadMyPosts(){
  const c=document.getElementById('my-posts-list');
  c.innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';
  try{
    const r=await apiCall('getMyPosts');const posts=r.data||[];
    if(posts.length===0){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">📝</div><h3>還沒有發表文章</h3><button class="btn btn-primary" onclick="showNewPostModal()">發表文章</button></div>';return;}
    c.innerHTML=posts.map(p=>createPostHTML(p)).join('');
  }catch(e){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">❌</div><h3>載入失敗</h3><button class="btn btn-primary" onclick="loadMyPosts()">重新載入</button></div>';}
}
async function loadMyEvents(){
  const c=document.getElementById('my-events-list');
  c.innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';
  try{
    const r=await apiCall('getMyEvents');const evs=r.data||[];
    if(evs.length===0){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">📅</div><h3>還沒有建立活動</h3><button class="btn btn-primary" onclick="showAddEventModal()">新增活動</button></div>';return;}
    c.innerHTML=evs.map(e=>`<div class="event-item" onclick="showEventDetail('${e.id}')">
      <div class="event-date"><div class="event-day">${new Date(e.date).getDate()}</div><div class="event-month">${new Date(e.date).getMonth()+1}月</div></div>
      <div class="event-details"><div class="event-title">${escapeHtml(e.title)}</div><div class="event-time">${escapeHtml(e.time)}</div><div style="font-size:var(--font-sm);color:var(--text-muted);">📍 ${escapeHtml(e.location)} • 👥 ${e.attendees}/${e.maxAttendees}人</div></div>
      <div style="margin-left:auto;"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();editEvent('${e.id}')">✏️ 編輯</button></div>
    </div>`).join('');
  }catch(e){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">❌</div><h3>載入失敗</h3><button class="btn btn-primary" onclick="loadMyEvents()">重新載入</button></div>';}
}
async function loadMyFavorites(){
  const c=document.getElementById('my-favorites-list');
  c.innerHTML='<div class="loading-spinner"><div class="spinner"></div></div>';
  try{
    const r=await apiCall('getMyFavorites');const favs=r.data||[];
    if(favs.length===0){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">⭐</div><h3>還沒有收藏內容</h3><button class="btn btn-primary" onclick="showPosts()">瀏覽文章</button></div>';return;}
    c.innerHTML=favs.map(p=>createPostHTML(p)).join('');
  }catch(e){c.innerHTML='<div class="empty-state"><div style="font-size:3rem;">❌</div><h3>載入失敗</h3><button class="btn btn-primary" onclick="loadMyFavorites()">重新載入</button></div>';}
}

// ═══════════════════════════════════════
//  頁面導航
// ═══════════════════════════════════════
function showPage(pageId){
  try{
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    const tp=document.getElementById(pageId);
    if(tp){tp.style.display='block';currentPage=pageId.replace('-page','');}
    updateNavigation(pageId);
    if(pageId==='posts-page')loadPosts(true);
    else if(pageId==='database-page')loadDatabase();
    else if(pageId==='calendar-page'){renderCalendar();loadEvents();}
    else if(pageId==='my-content-page'){
      if(currentUser){updateMyContentStats();showMyTab(currentMyTab);}
      else showErrorMessage('請先登入才能查看我的內容');
    }
    const names={'home-page':'首頁','posts-page':'討論區','database-page':'資料庫','calendar-page':'行事曆','my-content-page':'我的內容'};
    if(userPreferences.voiceEnabled)speakText('已切換到'+(names[pageId]||'頁面'));
  }catch(e){console.error(e);}
}
function updateNavigation(activePageId){
  try{
    document.querySelectorAll('.nav-link').forEach(l=>{l.classList.remove('active');l.style.background='';l.style.color='var(--text-primary)';});
    const map={'home-page':'nav-home','posts-page':'nav-posts','database-page':'nav-database','calendar-page':'nav-calendar','my-content-page':'nav-my-content'};
    const nid=map[activePageId];
    if(nid){const el=document.getElementById(nid);if(el){el.classList.add('active');el.style.background='var(--primary)';el.style.color='var(--text-inverse)';}}
  }catch(e){console.error(e);}
}
function showHome(){showPage('home-page');}
function showPosts(){showPage('posts-page');}
function showDatabase(){showPage('database-page');}
function showCalendar(){showPage('calendar-page');}
function showMyContent(){showPage('my-content-page');}

// ═══════════════════════════════════════
//  基本功能設定
// ═══════════════════════════════════════
function setupBasicFeatures(){setupKeyboardShortcuts();if(userPreferences.voiceEnabled)setupVoiceFeatures();setupErrorHandling();}
function setupNavigation(){
  document.querySelectorAll('.nav-link').forEach(l=>{
    l.addEventListener('mouseenter',function(){if(!this.classList.contains('active')){this.style.background='var(--surface-hover)';this.style.color='var(--primary)';}});
    l.addEventListener('mouseleave',function(){if(!this.classList.contains('active')){this.style.background='';this.style.color='var(--text-primary)';}});
  });
}
function setupKeyboardShortcuts(){
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if((e.ctrlKey||e.metaKey)&&e.key>='1'&&e.key<='5'){
      e.preventDefault();
      [showHome,showPosts,showDatabase,showCalendar,showMyContent][parseInt(e.key)-1]();
    }
    if(e.key==='Escape')closeAllModals();
  });
}
function setupVoiceFeatures(){
  if(!('speechSynthesis' in window)){userPreferences.voiceEnabled=false;return;}
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();
}
function setupErrorHandling(){
  window.addEventListener('error',e=>console.error('全域錯誤:',e.error));
  window.addEventListener('unhandledrejection',e=>{console.error('未處理Promise錯誤:',e.reason);e.preventDefault();});
}

// ═══════════════════════════════════════
//  初始化
// ═══════════════════════════════════════
function updateLoadingProgress(msg){const el=document.getElementById('loading-progress');if(el)el.textContent=msg;}
async function safeExecute(name,func,...args){try{return await func(...args);}catch(e){console.warn('⚠️',name,'失敗:',e);return null;}}
async function loadInitialData(){try{await loadEvents();if(currentUser)await loadNotifications();}catch(e){console.warn(e);}}
function handleInitializationTimeout(){updateLoadingProgress('啟用緊急模式...');showApp();setTimeout(()=>showWarningMessage('系統載入較慢，部分功能可能需要稍後才能使用'),1000);}
function handleInitializationError(e){console.error('初始化失敗:',e);setTimeout(()=>{showApp();showErrorMessage('系統初始化時遇到問題，部分功能可能無法正常使用');},2000);}
function showApp(){
  const ls=document.getElementById('loading-screen');
  const app=document.getElementById('app');
  if(ls&&app){
    ls.style.opacity='0';ls.style.transition='opacity 0.5s ease';
    setTimeout(()=>{
      ls.style.display='none';app.style.display='block';
      app.style.opacity='0';app.style.transition='opacity 0.5s ease';
      setTimeout(()=>app.style.opacity='1',50);
    },500);
  }
  console.log('📊 系統載入完成，總耗時：'+(Date.now()-initStartTime)+'ms');
}
async function initializeApp(){
  try{
    console.log('🚀 LSVTBIG論壇初始化開始...');
    updateLoadingProgress('正在初始化系統...');
    initializationTimeout=setTimeout(()=>handleInitializationTimeout(),20000);
    await safeExecute('loadUserPreferences',loadUserPreferences);
    await safeExecute('applyUserPreferences',applyUserPreferences);
    await safeExecute('setupBasicFeatures',setupBasicFeatures);
    initializeLIFF().catch(e=>{console.warn('LIFF初始化失敗，使用降級模式:',e);handleLIFFFailure();});
    await safeExecute('setupNavigation',setupNavigation);
    await safeExecute('initializeCalendar',initializeCalendar);
    await safeExecute('loadInitialData',loadInitialData);
    if(initializationTimeout){clearTimeout(initializationTimeout);initializationTimeout=null;}
    updateLoadingProgress('初始化完成！');
    setTimeout(showApp,800);
  }catch(e){console.error('初始化失敗:',e);handleInitializationError(e);}
}

// ═══════════════════════════════════════
//  頁面載入事件
// ═══════════════════════════════════════
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',()=>setTimeout(initializeApp,100));}
else{setTimeout(initializeApp,100);}

window.addEventListener('beforeunload',function(){
  if(initializationTimeout)clearTimeout(initializationTimeout);
  stopNotificationPolling();
  if(speechSynthesisObj&&speechSynthesisObj.speaking)speechSynthesisObj.cancel();
  saveUserPreferences();
});
</script>
</body>
