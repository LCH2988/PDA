<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    /* ── CSS 變數 ── */
    :root {
      --primary      : #00B900;
      --primary-dark : #009900;
      --primary-light: #E8F5E9;
      --danger       : #E53935;
      --danger-light : #FFEBEE;
      --warn         : #F57C00;
      --warn-light   : #FFF3E0;
      --info         : #1565C0;
      --info-light   : #E3F2FD;
      --gold         : #F9A825;
      --purple       : #6A1B9A;
      --bg           : #F5F5F5;
      --card-bg      : #FFFFFF;
      --border       : #E0E0E0;
      --text-main    : #212121;
      --text-sub     : #757575;
      --text-hint    : #BDBDBD;
      --shadow       : 0 2px 8px rgba(0,0,0,.08);
      --radius       : 12px;
      --transition   : .18s ease;
      --header-h     : 56px;
      --max-w        : 480px;
      --font         : 'Noto Sans TC', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family: var(--font);
      background : var(--bg);
      color      : var(--text-main);
      min-height : 100dvh;
      display    : flex;
      justify-content: center;
    }
    #app {
      width    : 100%;
      max-width: var(--max-w);
      display  : flex;
      flex-direction: column;
      min-height: 100dvh;
      position : relative;
    }

    /* ── Header ── */
    .app-header {
      position  : sticky;
      top       : 0;
      z-index   : 100;
      height    : var(--header-h);
      background: var(--primary);
      color     : #fff;
      display   : flex;
      align-items: center;
      padding   : 0 12px;
      gap       : 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    #header-back {
      background: none; border:none; color:#fff;
      font-size:1.3rem; cursor:pointer; padding:6px;
      border-radius:8px; display:none;
      transition: background var(--transition);
    }
    #header-back.visible { display:block; }
    #header-back:hover   { background: rgba(255,255,255,.2); }
    #header-title {
      flex:1; font-size:1.05rem; font-weight:700;
      letter-spacing:.03em; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap;
    }
    #btn-manage-users {
      background: rgba(255,255,255,.2); border:none; color:#fff;
      font-size:.8rem; font-weight:700; padding:6px 12px;
      border-radius:20px; cursor:pointer;
      transition: background var(--transition); white-space:nowrap;
    }
    #btn-manage-users:hover { background: rgba(255,255,255,.35); }

    /* ── Page ── */
    .page { display:none; flex-direction:column; flex:1; overflow-y:auto; }
    .page.active { display:flex; }

    /* ── Search Bar ── */
    .search-bar {
      padding:10px 16px; background:var(--card-bg);
      border-bottom:1px solid var(--border);
      display:flex; gap:8px; align-items:center;
      position:sticky; top:var(--header-h); z-index:90;
    }
    .search-bar input {
      flex:1; border:1px solid var(--border); border-radius:20px;
      padding:8px 14px; font-size:.88rem; font-family:var(--font);
      background:var(--bg); color:var(--text-main);
      outline:none; transition:border-color var(--transition);
    }
    .search-bar input:focus { border-color:var(--primary); }
    .search-bar select {
      border:1px solid var(--border); border-radius:20px;
      padding:8px 10px; font-size:.82rem; font-family:var(--font);
      background:var(--bg); color:var(--text-main);
      outline:none; cursor:pointer;
    }
    #list-meta {
      padding:8px 16px 0; font-size:.78rem; color:var(--text-sub);
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }

    /* ── Note Card ── */
    #note-list {
      padding:10px 16px; display:flex;
      flex-direction:column; gap:10px; padding-bottom:90px;
    }
    .note-card {
      background:var(--card-bg); border-radius:var(--radius);
      box-shadow:var(--shadow); display:flex; overflow:hidden;
      cursor:pointer; transition:transform var(--transition), box-shadow var(--transition);
    }
    .note-card:hover  { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
    .note-card:active { transform:scale(.98); }
    .note-card-stripe { width:4px; background:var(--primary); flex-shrink:0; }
    .note-card-body {
      flex:1; padding:12px 14px; display:flex;
      flex-direction:column; gap:6px; min-width:0;
    }
    .note-card-title {
      font-size:.95rem; font-weight:700; color:var(--text-main);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .note-card-meta { display:flex; flex-wrap:wrap; gap:4px; }
    .meta-badge {
      font-size:.7rem; color:var(--text-sub); background:var(--bg);
      border-radius:10px; padding:2px 8px; border:1px solid var(--border);
    }
    .note-card-content {
      font-size:.82rem; color:var(--text-sub); line-height:1.6;
      display:-webkit-box; -webkit-line-clamp:2;
      -webkit-box-orient:vertical; overflow:hidden;
    }
    .note-card-attachments { display:flex; flex-wrap:wrap; gap:6px; margin-top:4px; }
    .attach-thumb {
      width:60px; height:60px; border-radius:8px;
      object-fit:cover; border:1px solid var(--border);
    }
    .attach-file {
      display:inline-flex; align-items:center; gap:4px;
      font-size:.75rem; color:var(--primary-dark);
      background:var(--primary-light); border-radius:8px;
      padding:4px 10px; text-decoration:none;
      max-width:160px; overflow:hidden;
      text-overflow:ellipsis; white-space:nowrap;
    }
    .note-card-viewers { font-size:.7rem; color:var(--text-hint); }
    .note-card-actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
    .btn-card {
      font-size:.75rem; font-family:var(--font); font-weight:700;
      border:none; border-radius:8px; padding:5px 12px;
      cursor:pointer; transition:filter var(--transition);
    }
    .btn-card:hover  { filter:brightness(.92); }
    .btn-edit    { background:var(--primary-light); color:var(--primary-dark); }
    .btn-delete  { background:var(--danger-light);  color:var(--danger); }
    .btn-forward { background:var(--info-light);    color:var(--info); }

    /* ── Role Badge ── */
    .role-badge {
      display:inline-flex; align-items:center; gap:3px;
      font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:10px;
    }
    .role-owner  { background:#FFF8E1; color:#F9A825; }
    .role-admin  { background:#F3E5F5; color:#6A1B9A; }
    .role-member { background:#E3F2FD; color:#1565C0; }
    .role-guest  { background:#F5F5F5; color:#757575; }

    /* ── Empty State ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-hint); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }
    .empty-state p     { font-size:.88rem; line-height:1.8; }

    /* ── FAB ── */
    #fab-add {
      position:fixed; bottom:24px;
      right:max(24px, calc((100vw - var(--max-w)) / 2 + 24px));
      width:56px; height:56px; border-radius:50%;
      background:var(--primary); color:#fff; font-size:1.8rem;
      border:none; cursor:pointer;
      box-shadow:0 4px 16px rgba(0,185,0,.4);
      display:flex; align-items:center; justify-content:center;
      transition:transform var(--transition), box-shadow var(--transition);
      z-index:150;
    }
    #fab-add:hover  { transform:scale(1.1); box-shadow:0 6px 24px rgba(0,185,0,.5); }
    #fab-add:active { transform:scale(.95); }
    #fab-add.hidden { display:none; }

    /* ── Modal ── */
    .modal-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:300;
      align-items:flex-end; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal-sheet {
      background:var(--card-bg); border-radius:20px 20px 0 0;
      width:min(var(--max-w), 100vw); max-height:90dvh;
      display:flex; flex-direction:column;
      overflow:hidden; animation:slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0);    }
    }
    .modal-header {
      display:flex; align-items:center;
      padding:16px 20px 12px;
      border-bottom:1px solid var(--border); gap:10px;
    }
    .modal-title { flex:1; font-size:1rem; font-weight:700; }
    .modal-close {
      background:none; border:none; font-size:1.3rem;
      cursor:pointer; color:var(--text-sub); padding:4px;
      border-radius:6px; transition:background var(--transition);
    }
    .modal-close:hover { background:var(--bg); }
    .modal-body {
      flex:1; overflow-y:auto; padding:16px 20px;
      display:flex; flex-direction:column; gap:14px;
    }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:.8rem; font-weight:700; color:var(--text-sub); }
    .form-input, .form-textarea {
      border:1.5px solid var(--border); border-radius:10px;
      padding:10px 14px; font-size:.9rem; font-family:var(--font);
      color:var(--text-main); background:var(--bg);
      outline:none; transition:border-color var(--transition); resize:none;
    }
    .form-input:focus, .form-textarea:focus { border-color:var(--primary); }
    .form-textarea { min-height:120px; }

    /* ── 附件預覽 ── */
    .preview-list { display:flex; flex-wrap:wrap; gap:8px; min-height:0; }
    .preview-item {
      position:relative; width:72px; height:72px;
      border-radius:10px; overflow:hidden;
      border:1px solid var(--border); background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      flex-direction:column; gap:3px;
    }
    .preview-item img { width:100%; height:100%; object-fit:cover; }
    .file-icon { font-size:1.6rem; }
    .file-name {
      font-size:.55rem; color:var(--text-sub); text-align:center;
      padding:0 4px; overflow:hidden; text-overflow:ellipsis;
      white-space:nowrap; width:100%;
    }
    .preview-remove {
      position:absolute; top:2px; right:2px;
      width:18px; height:18px; border-radius:50%;
      background:rgba(0,0,0,.6); color:#fff; border:none;
      font-size:.65rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center; line-height:1;
    }

    /* ★ 新增：影片預覽縮圖樣式 */
    .preview-item .video-thumb {
      width:100%; height:100%; object-fit:cover; display:block;
    }
    .preview-item .video-play-icon {
      position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center;
      font-size:1.6rem; pointer-events:none;
      background:rgba(0,0,0,.25);
    }

    /* ★ 新增：影音附件播放器樣式 */
    .attach-video-wrap, .attach-audio-wrap {
      width:100%; border-radius:10px; overflow:hidden;
      border:1px solid var(--border); background:#000;
    }
    .attach-video-wrap video {
      width:100%; max-height:280px; display:block;
      border-radius:10px;
    }
    .attach-audio-wrap {
      background:var(--bg); padding:10px 14px;
      display:flex; align-items:center; gap:10px;
    }
    .attach-audio-wrap audio { flex:1; min-width:0; }
    .attach-audio-icon { font-size:1.6rem; flex-shrink:0; }

    /* ★ 新增：卡片列表中影音 badge */
    .attach-media-badge {
      display:inline-flex; align-items:center; gap:4px;
      font-size:.75rem; border-radius:8px; padding:4px 10px;
      text-decoration:none; max-width:160px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .attach-media-badge.video { background:#EDE7F6; color:#4527A0; }
    .attach-media-badge.audio { background:#E0F2F1; color:#00695C; }

    /* ── 上傳按鈕 ── */
    .btn-upload {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--bg); border:1.5px dashed var(--border);
      border-radius:10px; padding:10px 16px; font-size:.85rem;
      font-family:var(--font); color:var(--text-sub);
      cursor:pointer; transition:border-color var(--transition), color var(--transition);
    }
    .btn-upload:hover { border-color:var(--primary); color:var(--primary); }

    /* ── Modal 底部 ── */
    .modal-footer {
      padding:12px 20px; border-top:1px solid var(--border);
      display:flex; gap:10px;
    }
    .btn-submit, .btn-cancel {
      flex:1; padding:13px; border:none; border-radius:10px;
      font-family:var(--font); font-size:.9rem; font-weight:700;
      cursor:pointer; transition:filter var(--transition), transform var(--transition);
    }
    .btn-submit:hover, .btn-cancel:hover  { filter:brightness(.93); }
    .btn-submit:active, .btn-cancel:active{ transform:scale(.97); }
    .btn-submit { background:var(--primary); color:#fff; }
    .btn-cancel { background:var(--border);  color:var(--text-main); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }

    /* ── Page: Detail ── */
    #page-detail { overflow-y:auto; padding-bottom:100px; gap:0; }
    .detail-hero {
      background:var(--card-bg); padding:20px 16px 16px;
      border-bottom:1px solid var(--border);
      position:sticky; top:var(--header-h); z-index:80;
      box-shadow:0 2px 8px rgba(0,0,0,.06);
    }
    .detail-title {
      font-size:1.15rem; font-weight:700; color:var(--text-main);
      line-height:1.4; margin-bottom:10px; word-break:break-word;
    }
    .detail-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .detail-section {
      background:var(--card-bg); margin:12px 16px 0;
      border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;
    }
    .detail-section-label {
      font-size:.78rem; font-weight:700; color:var(--text-sub);
      letter-spacing:.05em; padding:12px 16px 8px;
      border-bottom:1px solid var(--border); background:var(--bg);
    }
    .detail-content {
      padding:16px; font-size:.92rem; line-height:1.85;
      color:var(--text-main); white-space:pre-wrap; word-break:break-word;
    }
    .detail-attachments {
      padding:14px 16px; display:flex; flex-wrap:wrap; gap:10px;
    }
    .detail-attach-img {
      width:100px; height:100px; border-radius:10px;
      object-fit:cover; border:1px solid var(--border);
      cursor:pointer; transition:transform var(--transition);
    }
    .detail-attach-img:hover { transform:scale(1.04); }
    .detail-attach-img.locked { filter:brightness(.5); cursor:not-allowed; }
    .detail-attach-file {
      display:inline-flex; align-items:center; gap:6px;
      font-size:.82rem; color:var(--primary-dark);
      background:var(--primary-light); border-radius:10px;
      padding:8px 14px; text-decoration:none; max-width:100%;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
      transition:filter var(--transition);
    }
    .detail-attach-file:hover { filter:brightness(.93); }
    .detail-attach-file.locked {
      background:var(--border); color:var(--text-hint); cursor:not-allowed;
    }
    .detail-viewers {
      padding:12px 16px; display:flex; flex-wrap:wrap; gap:8px;
    }
    .viewer-chip {
      display:inline-flex; align-items:center; gap:4px;
      background:var(--bg); border:1px solid var(--border);
      border-radius:20px; padding:4px 12px;
      font-size:.75rem; color:var(--text-sub);
    }
    .detail-footer {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:min(var(--max-w), 100vw); background:var(--card-bg);
      border-top:1px solid var(--border); padding:12px 16px;
      display:flex; gap:10px; z-index:200;
    }
    .detail-footer button {
      flex:1; padding:13px; border:none; border-radius:10px;
      font-family:var(--font); font-size:.85rem; font-weight:700;
      cursor:pointer; transition:filter var(--transition), transform var(--transition);
    }
    .detail-footer button:hover  { filter:brightness(.93); }
    .detail-footer button:active { transform:scale(.97); }
    .btn-detail-back    { background:var(--border);        color:var(--text-main); }
    .btn-detail-edit    { background:var(--primary-light); color:var(--primary-dark); }
    .btn-detail-delete  { background:var(--danger-light);  color:var(--danger); }
    .btn-detail-forward { background:var(--info-light);    color:var(--info); }

    /* ── Page: Users ── */
    #page-users { overflow-y:auto; padding-bottom:20px; gap:0; }
    .users-filter {
      padding:10px 16px; background:var(--card-bg);
      border-bottom:1px solid var(--border);
      display:flex; gap:8px; flex-wrap:wrap;
      position:sticky; top:var(--header-h); z-index:90;
    }
    .filter-btn {
      font-size:.78rem; font-family:var(--font); font-weight:700;
      border:1.5px solid var(--border); border-radius:20px;
      padding:5px 14px; background:var(--bg); color:var(--text-sub);
      cursor:pointer; transition:all var(--transition);
    }
    .filter-btn.active { background:var(--primary); border-color:var(--primary); color:#fff; }
    #users-count { font-size:.78rem; color:var(--text-sub); padding:8px 16px 0; }
    #user-list { padding:10px 16px; display:flex; flex-direction:column; gap:10px; }
    .user-card {
      background:var(--card-bg); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:14px;
      display:flex; gap:12px; align-items:flex-start;
      transition:opacity var(--transition);
    }
    .user-card.banned { opacity:.6; }
    .user-avatar {
      width:44px; height:44px; border-radius:50%;
      background:var(--primary-light); color:var(--primary-dark);
      font-size:1.1rem; font-weight:700;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0; overflow:hidden;
    }
    .user-avatar img { width:100%; height:100%; object-fit:cover; }
    .user-info  { flex:1; min-width:0; display:flex; flex-direction:column; gap:4px; }
    .user-name  { font-size:.9rem; font-weight:700; }
    .user-meta  { font-size:.72rem; color:var(--text-sub); }
    .user-actions { display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-top:6px; }
    .role-select {
      font-size:.78rem; font-family:var(--font);
      border:1.5px solid var(--border); border-radius:8px;
      padding:5px 8px; background:var(--bg); color:var(--text-main);
      cursor:pointer; outline:none;
    }
    .btn-ban {
      font-size:.75rem; font-family:var(--font); font-weight:700;
      border:none; border-radius:8px; padding:5px 12px;
      cursor:pointer; transition:filter var(--transition);
    }
    .btn-ban:hover { filter:brightness(.92); }
    .btn-ban.ban   { background:var(--danger-light); color:var(--danger); }
    .btn-ban.unban { background:var(--primary-light);color:var(--primary-dark); }

    /* ── Toast ── */
    #toast-container {
      position:fixed; top:calc(var(--header-h) + 12px);
      left:50%; transform:translateX(-50%);
      z-index:9999; display:flex; flex-direction:column;
      gap:8px; width:min(360px, 90vw); pointer-events:none;
    }
    .toast {
      padding:12px 18px; border-radius:12px;
      font-size:.85rem; font-weight:600;
      box-shadow:0 4px 16px rgba(0,0,0,.18);
      animation:toastIn .25s ease; pointer-events:auto;
    }
    @keyframes toastIn {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .toast.success { background:#E8F5E9; color:#2E7D32; }
    .toast.error   { background:#FFEBEE; color:#C62828; }
    .toast.warn    { background:#FFF3E0; color:#E65100; }
    .toast.info    { background:#E3F2FD; color:#1565C0; }

    /* ── Loading ── */
    #loading-overlay {
      display:none; position:fixed; inset:0;
      background:rgba(255,255,255,.7); z-index:9998;
      align-items:center; justify-content:center;
      flex-direction:column; gap:12px;
    }
    #loading-overlay.show { display:flex; }
    .spinner {
      width:40px; height:40px;
      border:4px solid var(--border); border-top-color:var(--primary);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading-text { font-size:.85rem; color:var(--text-sub); }

    /* ── 上傳進度條 ── */
    .upload-progress-wrapper {
      padding:10px 12px; background:var(--card-bg);
      border:1px solid var(--border); border-radius:10px; margin:6px 0;
    }
    .upload-progress-info {
      display:flex; justify-content:space-between;
      font-size:.8rem; margin-bottom:6px; color:var(--text-sub);
    }
    .upload-filename {
      overflow:hidden; text-overflow:ellipsis;
      white-space:nowrap; max-width:75%;
    }
    .upload-progress-bar-bg {
      background:var(--border); border-radius:99px; height:8px; overflow:hidden;
    }
    .upload-progress-bar-fill {
      height:100%; background:#00B900; border-radius:99px;
      transition:width .3s ease; width:0%;
    }
    .upload-status { font-size:.75rem; color:var(--text-hint); margin-top:4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <button id="header-back">←</button>
    <span   id="header-title">📒 記事本</span>
    <button id="btn-manage-users" style="display:none">👥 人員管理</button>
  </header>

  <!-- Page: List -->
  <div class="page active" id="page-list">
    <div class="search-bar">
      <input  id="search-input" type="search" placeholder="搜尋標題或內容…"/>
      <select id="search-sort">

const ROLE_LEVEL = { owner:4, admin:3, member:2, guest:1 };
function canWrite(role)      { return (ROLE_LEVEL[role]||0) >= ROLE_LEVEL.admin;  }
function canDownload(role)   { return (ROLE_LEVEL[role]||0) >= ROLE_LEVEL.member; }

/* ============================================================
   基本工具函式
============================================================ */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtTime(iso) {
  if (!iso) return '—';
  try {
    const d    = new Date(iso);
    if (isNaN(d)) return '—';
    const diff = Date.now() - d;
    if (diff < 60000)      return '剛剛';
    if (diff < 3600000)    return `${Math.floor(diff/60000)} 分鐘前`;
    if (diff < 86400000)   return `${Math.floor(diff/3600000)} 小時前`;
    if (diff < 86400000*7) return `${Math.floor(diff/86400000)} 天前`;
    return d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  } catch { return '—'; }
}

function getDriveFileId(url) {
  if (!url) return null;
  const s  = String(url);
  const m1 = s.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
  if (m1) return m1[1];
  const m2 = s.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return m2[1];
  const m3 = s.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m3) return m3[1];
  return null;
}

function driveOpenUrl(url) {
  const id = getDriveFileId(url);
  return id ? `https://drive.google.com/file/d/${id}/view?usp=sharing` : url;
}

function isImageUrl(url) {
  if (!url) return false;
  const s = String(url);
  if (/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?|$)/i.test(s)) return true;
  if (s.includes('drive.google.com/thumbnail'))            return true;
  if (s.includes('lh3.googleusercontent.com'))             return true;
  return false;
}

function isDriveUrl(url) {
  return String(url).includes('drive.google.com') ||
         String(url).includes('docs.google.com');
}

function getFileNameFromUrl(url) {
  try {
    return decodeURIComponent(String(url).split('/').pop().split('?')[0]) || '附件';
  } catch { return '附件'; }
}

function bindImgFallback(imgEl, url) {
  const fileId = getDriveFileId(url);
  if (!fileId) return;
  const fallbacks = [
    `https://drive.google.com/thumbnail?id=${fileId}&sz=w400`,
    `https://lh3.googleusercontent.com/d/${fileId}`,
    `https://drive.google.com/uc?export=view&id=${fileId}`,
  ];
  let idx = 0;
  imgEl.addEventListener('error', function retry() {
    idx++;
    if (idx < fallbacks.length) {
      imgEl.src = fallbacks[idx];
    } else {
      imgEl.removeEventListener('error', retry);
      imgEl.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = [
        'width:100%','height:100%','display:flex','flex-direction:column',
        'align-items:center','justify-content:center',
        'background:var(--bg)','color:var(--text-hint)',
        'font-size:.7rem','gap:4px','border-radius:inherit',
      ].join(';');
      ph.innerHTML = '<span style="font-size:1.5rem">🖼</span><span>無法載入</span>';
      imgEl.parentNode?.appendChild(ph);
    }
  });
}

============================================================ */
const MIME_CFG = {
  VIDEO : ['video/mp4','video/quicktime','video/x-msvideo',
           'video/webm','video/mpeg','video/3gpp','video/x-matroska','video/ogg'],
  AUDIO : ['audio/mpeg','audio/mp4','audio/ogg','audio/wav',
           'audio/webm','audio/aac','audio/x-m4a'],
  IMAGE : ['image/jpeg','image/png','image/gif',
           'image/webp','image/bmp','image/svg+xml'],
  DOC   : ['application/pdf',
           'application/msword',
           'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
           'application/vnd.ms-excel',
           'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
           'application/vnd.ms-powerpoint',
           'application/vnd.openxmlformats-officedocument.presentationml.presentation'],
  MAX_SIZE_MB : 100,       // ★ 對應後端 100MB 上限
  GAS_LIMIT_MB: 4,         // 小於此值走 GAS Base64，大於走 Drive API
  CHUNK_SIZE  : 5 * 1024 * 1024,
};

function getMimeCategory(mimeType) {
  if (!mimeType) return 'other';
  if (mimeType.startsWith('image/'))                    return 'image';
  if (mimeType.startsWith('video/'))                    return 'video';
  if (mimeType.startsWith('audio/'))                    return 'audio';
  if (MIME_CFG.DOC.includes(mimeType))                  return 'doc';
  if (mimeType === 'application/pdf')                   return 'doc';
  return 'other';
}

/* 副檔名 → MIME 類型（fallback） */
function guessMimeFromName(fileName) {
  const ext = (fileName || '').split('.').pop().toLowerCase();
  const MAP = {
    mp4:'video/mp4', mov:'video/quicktime', avi:'video/x-msvideo',
    webm:'video/webm', mkv:'video/x-matroska', '3gp':'video/3gpp',
    mp3:'audio/mpeg', m4a:'audio/x-m4a', aac:'audio/aac',
    ogg:'audio/ogg', wav:'audio/wav',
    jpg:'image/jpeg', jpeg:'image/jpeg', png:'image/png',
    gif:'image/gif', webp:'image/webp', bmp:'image/bmp',
    pdf:'application/pdf',
  };
  return MAP[ext] || 'application/octet-stream';
}

/* 取得分類 icon */
function getCategoryIcon(category) {
  return { image:'🖼', video:'🎬', audio:'🎵', doc:'📄', other:'📎' }[category] || '📎';
}

async function uploadPendingFiles() {
  if (!State.pendingFiles.length) return [];
  const urls = [];

  for (const file of State.pendingFiles) {
    const sizeMB   = file.size / 1024 / 1024;
    const category = getMimeCategory(file.type || guessMimeFromName(file.name));
    const isLarge  = sizeMB >= MIME_CFG.GAS_LIMIT_MB;

    /* 大小驗證（前端先擋） */
    if (sizeMB > MIME_CFG.MAX_SIZE_MB) {
      showToast(`❌ 檔案過大：${file.name}（${sizeMB.toFixed(1)}MB，上限 ${MIME_CFG.MAX_SIZE_MB}MB）`, 'error', 5000);
      continue;
    }

    showLoading(isLarge
      ? `上傳 ${category === 'video' ? '🎬 影片' : category === 'audio' ? '🎵 音訊' : '📁 檔案'}：${file.name}（${sizeMB.toFixed(1)}MB）`
      : `上傳附件：${file.name}`
    );

    /* 建立進度條 */
    const bar = createProgressBar('preview-list');

    try {
      const result = await uploadFileAuto(file, (pct, name, status) => {
        if (bar) bar.update(pct, name, status);
        if (isLarge) showLoading(`上傳中 ${pct}%：${file.name}`);
      });

      urls.push(result.url);
      showToast(`✅ 上傳完成：${file.name}`, 'success');
      console.log(`[Upload] ${file.name} → ${result.via} → ${result.url}`);

    } catch(err) {
      showToast(`❌ 上傳失敗：${file.name} — ${err.message}`, 'error', 6000);
      console.error(`[Upload] ${file.name}`, err);
    } finally {
      if (bar) setTimeout(() => bar.remove(), 2000);
    }
  }

  hideLoading();
  return urls;
}

async function uploadFileAuto(file, onProgress) {
  const sizeMB = file.size / 1024 / 1024;
  return sizeMB < MIME_CFG.GAS_LIMIT_MB
    ? await uploadViaGAS(file, onProgress)
    : await uploadViaDriveAPI(file, onProgress);
}

/* GAS Base64 上傳（小檔案） */
async function uploadViaGAS(file, onProgress) {
  if (onProgress) onProgress(0, file.name, 'reading');
  const b64 = await fileToBase64(file);
  if (onProgress) onProgress(50, file.name, 'uploading');
  const res = await callAPI('uploadFile', {
    fileName: file.name,
    mimeType: file.type || guessMimeFromName(file.name),
    data    : b64,
  });
  if (onProgress) onProgress(100, file.name, 'done');
  return { url: res.url, fileId: res.fileId, fileName: res.fileName, via: 'GAS' };
}

/* Drive API 直接上傳（大檔案 / 影片） */
async function uploadViaDriveAPI(file, onProgress) {
  const configRes = await callAPI('getUploadConfig');
  const folderId  = configRes.folderId;
  if (!folderId) throw new Error('無法取得上傳資料夾設定');

  const token = await getAccessToken();
  if (onProgress) onProgress(0, file.name, 'preparing');

  const initRes = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable',
    {
      method : 'POST',
      headers: {
        'Authorization'          : `Bearer ${token}`,
        'Content-Type'           : 'application/json; charset=UTF-8',
        'X-Upload-Content-Type'  : file.type || 'application/octet-stream',
        'X-Upload-Content-Length': String(file.size),
      },
      body: JSON.stringify({ name: file.name, parents: [folderId] }),
    }
  );
  if (!initRes.ok) {
    const t = await initRes.text();
    throw new Error(`建立上傳 Session 失敗（${initRes.status}）：${t}`);
  }
  const uploadUrl = initRes.headers.get('Location');
  if (!uploadUrl) throw new Error('無法取得上傳 URL');

  const fileId = await resumableUpload(file, uploadUrl, onProgress);

  if (onProgress) onProgress(99, file.name, 'sharing');
  await callAPI('setFilePublic', { fileId });

  if (onProgress) onProgress(100, file.name, 'done');
  return {
    url     : `https://drive.google.com/file/d/${fileId}/view?usp=sharing`,
    fileId,
    fileName: file.name,
    via     : 'DriveAPI',
  };
}

/* 分段上傳核心 */
async function resumableUpload(file, uploadUrl, onProgress) {
  const chunkSize = MIME_CFG.CHUNK_SIZE;
  let start = 0, fileId = null;
  while (start < file.size) {
    const end   = Math.min(start + chunkSize, file.size);
    const chunk = file.slice(start, end);
    const res   = await fetch(uploadUrl, {
      method : 'PUT',
      headers: {
        'Content-Range': `bytes ${start}-${end - 1}/${file.size}`,
        'Content-Type' : file.type || 'application/octet-stream',
      },
      body: chunk,
    });
    if (res.status === 308) {
      const range = res.headers.get('Range');
      start = range ? parseInt(range.split('-')[1]) + 1 : end;
      if (onProgress) onProgress(Math.round((start / file.size) * 95), file.name, 'uploading');
      continue;
    }
    if (res.status === 200 || res.status === 201) {
            fileId = (await res.json()).id;
      break;
    }
    throw new Error(`上傳失敗（${res.status}）：${await res.text()}`);
  }
  if (!fileId) throw new Error('上傳完成但未取得 File ID');
  return fileId;
}

/* ============================================================
   取得 Access Token（LIFF 優先）
============================================================ */
async function getAccessToken() {
  try {
    if (typeof liff !== 'undefined' && liff.isLoggedIn()) {
      const token = liff.getAccessToken();
      if (token) return token;
    }
  } catch(e) {
    console.warn('[getAccessToken] LIFF token 失敗：', e.message);
  }
  try {
    const res = await callAPI('getAccessToken');
    if (res.token) return res.token;
  } catch(e) {
    console.warn('[getAccessToken] GAS token 失敗：', e.message);
  }
  throw new Error('無法取得 Access Token，請確認已登入');
}

/* ============================================================
   fileToBase64
============================================================ */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r   = new FileReader();
    r.onload  = e => resolve(e.target.result.split(',')[1]);
    r.onerror = () => reject(new Error('讀取檔案失敗'));
    r.readAsDataURL(file);
  });
}

/* ============================================================
   進度條 UI
============================================================ */
function createProgressBar(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return null;

  const wrapper = document.createElement('div');
  wrapper.className = 'upload-progress-wrapper';
  wrapper.innerHTML = `
    <div class="upload-progress-info">
      <span class="upload-filename"></span>
      <span class="upload-pct">0%</span>
    </div>
    <div class="upload-progress-bar-bg">
      <div class="upload-progress-bar-fill"></div>
    </div>
    <div class="upload-status"></div>
  `;
  container.appendChild(wrapper);

  const STATUS_TEXT = {
    reading  : '📖 讀取中…',
    preparing: '🔧 準備上傳…',
    uploading: '⬆️ 上傳中…',
    sharing  : '🔗 設定分享…',
    done     : '✅ 完成！',
  };

  return {
    update(pct, fileName, status) {
      wrapper.querySelector('.upload-filename').textContent = fileName || '';
      wrapper.querySelector('.upload-pct').textContent      = `${pct}%`;
      wrapper.querySelector('.upload-progress-bar-fill').style.width = `${pct}%`;
      wrapper.querySelector('.upload-status').textContent   = STATUS_TEXT[status] || status;
      if (status === 'done') {
        wrapper.querySelector('.upload-progress-bar-fill').style.background = '#00B900';
      }
    },
    remove() { wrapper.remove(); },
  };
}

  const container = document.getElementById('toast-container');

/* ============================================================
   頁面切換
============================================================ */
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById(`page-${name}`);
  if (target) target.classList.add('active');

  const headerTitle = document.getElementById('header-title');
  const headerBack  = document.getElementById('header-back');
  const fab         = document.getElementById('fab-add');
  const btnMgr      = document.getElementById('btn-manage-users');

  headerBack.classList.remove('visible');
  fab.classList.remove('hidden');
  btnMgr.style.display = 'none';

  switch (name) {
    case 'list':
      headerTitle.textContent = '📒 記事本';
      fab.classList.toggle('hidden', !canWrite(State.myRole));
      if (canManageUser(State.myRole)) btnMgr.style.display = '';
      break;

    case 'detail': {
      const newBack = headerBack.cloneNode(true);
      headerBack.replaceWith(newBack);
      newBack.classList.add('visible');
      newBack.addEventListener('click', () => switchPage('list'));
      fab.classList.add('hidden');
      const t = State.viewingNote?.Title ?? '文章詳細';
      headerTitle.textContent = t.length > 16 ? t.slice(0,16)+'…' : t;
      break;
    }

    case 'users': {
      const backBtn = headerBack.cloneNode(true);
      headerBack.replaceWith(backBtn);
      backBtn.classList.add('visible');
      backBtn.addEventListener('click', () => switchPage('list'));
      fab.classList.add('hidden');
      headerTitle.textContent = '👥 人員管理';
      break;
    }
  }
}

/* ============================================================
   API 呼叫
============================================================ */
async function callAPI(action, body = {}) {
  const payload = JSON.stringify({
    action,
    userId: State.user?.userId ?? '',
    ...body,
  });
  const res = await fetch(CONFIG.GAS_URL, {
    method  : 'POST',
    redirect: 'follow',
    body    : payload,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  let json;
  try { json = await res.json(); }
  catch { throw new Error('伺服器回應格式錯誤'); }
  if (!json.success) throw new Error(json.error || '伺服器錯誤');
  return json;
}

/* ============================================================
   LIFF 初始化
============================================================ */
async function initApp() {
  showLoading('初始化中…');
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile  = await liff.getProfile();
    State.user = {
      userId     : profile.userId,
      displayName: profile.displayName,
      pictureUrl : profile.pictureUrl,
    };

    const res    = await callAPI('login', {
      name   : profile.displayName,
      picture: profile.pictureUrl,
    });
    State.myRole = res.role || 'guest';

    bindEvents();
    await loadNotes();

    if (canManageUser(State.myRole)) {
      document.getElementById('btn-manage-users').style.display = '';
    }
    switchPage('list');
  } catch(err) {
    showToast(`初始化失敗：${err.message}`, 'error', 6000);
    console.error('[initApp]', err);
  } finally {
    hideLoading();
  }
}

/* ============================================================
   綁定事件
============================================================ */
function bindEvents() {
  document.getElementById('fab-add')
    .addEventListener('click', () => openEditForm(null));
  document.getElementById('btn-manage-users')
    .addEventListener('click', () => { loadUsers(); switchPage('users'); });
  document.getElementById('search-input')
    .addEventListener('input',  applySearch);
  document.getElementById('search-sort')
    .addEventListener('change', applySearch);
  document.getElementById('modal-close')
    .addEventListener('click', closeModal);
  document.getElementById('form-cancel')
    .addEventListener('click', closeModal);
  document.getElementById('note-modal')
    .addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('form-submit')
    .addEventListener('click', submitNote);

  /* ★ 修改：file-input 加入大小前端驗證 */
  document.getElementById('file-input')
    .addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      const oversize = files.filter(f => f.size / 1024 / 1024 > MIME_CFG.MAX_SIZE_MB);
      if (oversize.length) {
        oversize.forEach(f =>
          showToast(`❌ 檔案過大：${f.name}（上限 ${MIME_CFG.MAX_SIZE_MB}MB）`, 'error', 5000)
        );
      }
      const valid = files.filter(f => f.size / 1024 / 1024 <= MIME_CFG.MAX_SIZE_MB);
      State.pendingFiles.push(...valid);
      renderNewFilePreviews();
      e.target.value = '';
    });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyUserFilter(btn.dataset.filter);
    });
  });
}

/* ============================================================
   記事 CRUD
============================================================ */
async function loadNotes() {
  try {
    const res   = await callAPI('getNotes');
    State.notes = res.notes || [];
    applySearch();
  } catch(err) {
    showToast(`載入記事失敗：${err.message}`, 'error');
  }
}

function applySearch() {
  const q    = (document.getElementById('search-input').value || '').trim().toLowerCase();
  const sort = document.getElementById('search-sort').value;
  let list   = [...State.notes];
  if (q) list = list.filter(n =>
    String(n.Title||'').toLowerCase().includes(q) ||
    String(n.Content||'').toLowerCase().includes(q)
  );
  switch (sort) {
    case 'oldest': list.sort((a,b) => new Date(a.CreatedAt)-new Date(b.CreatedAt)); break;
    case 'views' : list.sort((a,b) => (b.ViewCount||0)-(a.ViewCount||0));           break;
    default      : list.sort((a,b) => new Date(b.CreatedAt)-new Date(a.CreatedAt)); break;
  }
  renderNoteList(list);
}

function openEditForm(note) {
  State.editingNote  = note;
  State.pendingFiles = [];
  if (note) {
    document.getElementById('modal-title-text').textContent = '✏️ 編輯記事';
    document.getElementById('form-title'  ).value = note.Title   || '';
    document.getElementById('form-content').value = note.Content || '';
    try { State.existAttach = JSON.parse(note.Attachments || '[]'); }
    catch { State.existAttach = []; }
  } else {
    document.getElementById('modal-title-text').textContent = '📝 新增記事';
    document.getElementById('form-title'  ).value = '';
    document.getElementById('form-content').value = '';
    State.existAttach = [];
  }
  renderExistingAttachPreviews();
  renderNewFilePreviews();
  document.getElementById('note-modal').classList.add('open');
  document.getElementById('form-title').focus();
}

function closeModal() {
  document.getElementById('note-modal').classList.remove('open');
  State.editingNote  = null;
  State.pendingFiles = [];
  State.existAttach  = [];
  document.getElementById('preview-list').innerHTML = '';
}

async function submitNote() {
  const title   = document.getElementById('form-title'  ).value.trim();
  const content = document.getElementById('form-content').value.trim();
  if (!title)   { showToast('請輸入標題', 'warn'); return; }
  if (!content) { showToast('請輸入內容', 'warn'); return; }

  const submitBtn    = document.getElementById('form-submit');
  submitBtn.disabled = true;
  showLoading('儲存中…');
  try {
    /* ★ 修改：改呼叫支援影音進度的 uploadPendingFiles */
    const newUrls     = await uploadPendingFiles();
    const attachments = [...State.existAttach, ...newUrls];
    if (State.editingNote) {
      await callAPI('editNote', {
        noteId: State.editingNote.NoteID, title, content, attachments,
      });
      showToast('✅ 記事已更新', 'success');
    } else {
      await callAPI('addNote', { title, content, attachments });
      showToast('✅ 記事已新增', 'success');
    }
    closeModal();
    await loadNotes();
  } catch(err) {
    showToast(`儲存失敗：${err.message}`, 'error');
  } finally {
    submitBtn.disabled = false;
    hideLoading();
  }
}

async function deleteNote(noteId) {
  if (!confirm('確定要刪除這則記事嗎？')) return;
  showLoading('刪除中…');
  try {
    await callAPI('deleteNote', { noteId });
    showToast('🗑 記事已刪除', 'success');
    if (State.viewingNote?.NoteID === noteId) switchPage('list');
    await loadNotes();
  } catch(err) {
    showToast(`刪除失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

async function recordView(noteId) {
  try {
    await callAPI('recordView', { noteId });
    const note = State.notes.find(n => n.NoteID === noteId);
    if (note) note.ViewCount = (note.ViewCount || 0) + 1;
  } catch(err) {
    console.warn('[recordView]', err.message);
  }
}

async function forwardNote(note) {
  if (!liff.isApiAvailable('shareTargetPicker')) {
    showToast('此環境不支援轉發功能', 'warn'); return;
  }
  try {
    await liff.shareTargetPicker([{
      type    : 'flex',
      altText : `📒 ${note.Title}`,
      contents: {
        type  : 'bubble',
        header: {
          type:'box', layout:'vertical',
          contents:[{ type:'text', text:'📒 記事本', size:'sm', color:'#ffffff', weight:'bold' }],
          backgroundColor:'#00B900', paddingAll:'12px',
        },
        body: {
          type:'box', layout:'vertical', spacing:'sm',
          contents:[
            { type:'text', text:note.Title,   weight:'bold', size:'lg', wrap:true },
            { type:'text', text:note.Content, size:'sm', color:'#666666', wrap:true, maxLines:3 },
            { type:'box', layout:'horizontal', margin:'md', contents:[
              { type:'text', text:`👤 ${note.CreatedByUserName||'未知'}`, size:'xs', color:'#999999', flex:1 },
              { type:'text', text:`👁 ${note.ViewCount||0} 次`, size:'xs', color:'#999999', align:'end' },
            ]},
          ],
        },
      },
    }]);
    showToast('✅ 已轉發', 'success');
  } catch(err) {
    if (err.code !== 'CANCEL') showToast(`轉發失敗：${err.message}`, 'error');
  }
}

   人員管理
============================================================ */
async function loadUsers() {
  showLoading('載入人員…');
  try {
    const res   = await callAPI('getUsers');
    State.users = res.users || [];
    applyUserFilter('all');
  } catch(err) {
    showToast(`載入人員失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

function applyUserFilter(filter) {
  let list = [...State.users];
  switch (filter) {
    case 'admin' : list = list.filter(u => u.Role==='admin'  && u.Status!=='banned'); break;
    case 'member': list = list.filter(u => u.Role==='member' && u.Status!=='banned'); break;
    case 'guest' : list = list.filter(u => u.Role==='guest'  && u.Status!=='banned'); break;
    case 'banned': list = list.filter(u => u.Status==='banned'); break;
  }
  renderUserList(list);
}

async function updateUserRole(targetId, newRole, selectEl) {
  try {
    await callAPI('updateRole', { targetId, newRole });
    showToast('✅ 角色已更新', 'success');
    const u = State.users.find(u => u.UserID === targetId);
    if (u) u.Role = newRole;
  } catch(err) {
    showToast(`更新失敗：${err.message}`, 'error');
    const u = State.users.find(u => u.UserID === targetId);
    if (u && selectEl) selectEl.value = u.Role;
  }
}

async function toggleBanUser(targetId, ban) {
  const action = ban ? '封鎖' : '解封';
  if (!confirm(`確定要${action}此使用者嗎？`)) return;
  showLoading(`${action}中…`);
  try {
    await callAPI('toggleBan', { targetId, ban });
    showToast(`✅ 已${action}`, 'success');
    await loadUsers();
  } catch(err) {
    showToast(`${action}失敗：${err.message}`, 'error');
  } finally {
    hideLoading();
  }
}

/* ============================================================
   記事卡片建構
============================================================ */
function buildNoteCard(note) {
  const isOwner = note.CreatedByUserID === State.user.userId;
  const myRole  = State.myRole;
  const canEdit = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canDel  = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canFwd  = canWrite(myRole);
  const canDl   = canDownload(myRole);

  let attachUrls = [];
  try { attachUrls = note.Attachments ? JSON.parse(note.Attachments) : []; } catch {}

  const card = document.createElement('div');
  card.className = 'note-card';

  const stripe = document.createElement('div');
  stripe.className = 'note-card-stripe';
  card.appendChild(stripe);

  const body = document.createElement('div');
  body.className = 'note-card-body';
  card.appendChild(body);

  /* 標題 */
  const titleEl = document.createElement('div');
  titleEl.className   = 'note-card-title';
  titleEl.textContent = note.Title;
  body.appendChild(titleEl);

  /* Meta */
  const metaEl = document.createElement('div');
  metaEl.className = 'note-card-meta';
  metaEl.innerHTML =
    `<span class="meta-badge">👤 ${escHtml(note.CreatedByUserName ?? '未知')}</span>` +
    `<span class="meta-badge">🕐 ${escHtml(fmtTime(note.CreatedAt))}</span>` +
    `<span class="meta-badge">👁 ${escHtml(String(note.ViewCount ?? 0))} 次</span>`;
  body.appendChild(metaEl);

  /* 內容預覽 */
  const contentEl = document.createElement('div');
  contentEl.className   = 'note-card-content';
  contentEl.textContent = note.Content;
  body.appendChild(contentEl);

  /* ★ 修改：附件（支援影音 badge） */
  if (attachUrls.length) {
    const wrap = document.createElement('div');
    wrap.className = 'note-card-attachments';
    attachUrls.forEach(url => {
      wrap.appendChild(buildAttachElement(url, { canDl, thumbSize:60, isDetail:false }));
    });
    body.appendChild(wrap);
  }

  /* 操作按鈕 */
  if (canEdit || canDel || canFwd) {
    const actions = document.createElement('div');
    actions.className = 'note-card-actions';
    if (canEdit) {
      const btn = document.createElement('button');
      btn.className   = 'btn-card btn-edit';
      btn.textContent = '✏️ 編輯';
      btn.addEventListener('click', e => { e.stopPropagation(); openEditForm(note); });
      actions.appendChild(btn);
    }
    if (canDel) {
      const btn = document.createElement('button');
      btn.className   = 'btn-card btn-delete';
      btn.textContent = '🗑 刪除';
      btn.addEventListener('click', e => { e.stopPropagation(); deleteNote(note.NoteID); });
      actions.appendChild(btn);
    }
    if (canFwd) {
      const btn = document.createElement('button');
      btn.className   = 'btn-card btn-forward';
      btn.textContent = '↗ 轉發';
      btn.addEventListener('click', e => { e.stopPropagation(); forwardNote(note); });
      actions.appendChild(btn);
    }
    body.appendChild(actions);
  }

  card.addEventListener('click', () => openDetail(note));
  return card;
}

/* ============================================================
   附件預覽：已存在附件
============================================================ */
function renderExistingAttachPreviews() {
  const list = document.getElementById('preview-list');
  list.innerHTML = '';

  State.existAttach.forEach((url, i) => {
    const item = document.createElement('div');
    item.className = 'preview-item';

    const fileId   = getDriveFileId(url);
    const thumb    = fileId
      ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w200`
      : null;
    const fileName = getFileNameFromUrl(url);
    const mimeType = guessMimeFromName(fileName);
    const category = getMimeCategory(mimeType);

    if (category === 'video') {
      /* ★ 新增：影片預覽 */
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = '🎬';
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = fileName;
      item.appendChild(icon);
      item.appendChild(name);
    } else if (category === 'audio') {
      /* ★ 新增：音訊預覽 */
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = '🎵';
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = fileName;
      item.appendChild(icon);
      item.appendChild(name);
    } else if (thumb || isImageUrl(url)) {
      const img = document.createElement('img');
      img.src   = thumb ?? url;
      img.alt   = '附件';
      if (fileId) bindImgFallback(img, url);
      item.appendChild(img);
    } else {
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = getCategoryIcon(category);
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = fileName;
      item.appendChild(icon);
      item.appendChild(name);
    }

    const rm = document.createElement('button');
    rm.className   = 'preview-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => {
      State.existAttach.splice(i, 1);
      renderExistingAttachPreviews();
    });
    item.appendChild(rm);
    list.appendChild(item);
  });
}

/* ============================================================
   ★ 修改：附件預覽：待上傳新檔案（支援影音縮圖）
============================================================ */
function renderNewFilePreviews() {
  document.querySelectorAll('.preview-item[data-new]').forEach(el => el.remove());
  const list = document.getElementById('preview-list');

  State.pendingFiles.forEach((file, i) => {
    const item = document.createElement('div');
    item.className   = 'preview-item';
    item.dataset.new = '1';

    const category = getMimeCategory(file.type || guessMimeFromName(file.name));

    if (category === 'image') {
      /* 圖片：FileReader 預覽 */
      const img = document.createElement('img');
      const r   = new FileReader();
      r.onload  = e => { img.src = e.target.result; };
      r.readAsDataURL(file);
      item.appendChild(img);

    } else if (category === 'video') {
      /* ★ 新增：影片：顯示播放 icon + 檔名 */
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = '🎬';
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = file.name;
      /* 嘗試用 createObjectURL 顯示縮圖 */
      const videoEl = document.createElement('video');
      videoEl.src    = URL.createObjectURL(file);
      videoEl.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;inset:0';
      videoEl.muted  = true;
      videoEl.preload = 'metadata';
      videoEl.addEventListener('loadedmetadata', () => {
        videoEl.currentTime = 1;
      });
      videoEl.addEventListener('seeked', () => {
        /* 截圖第 1 秒畫面當縮圖 */
        const canvas  = document.createElement('canvas');
        canvas.width  = 72;
        canvas.height = 72;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoEl, 0, 0, 72, 72);
        const thumbImg = document.createElement('img');
        thumbImg.src   = canvas.toDataURL('image/jpeg');
        thumbImg.className = 'video-thumb';
        item.insertBefore(thumbImg, item.firstChild);
        videoEl.remove();
        icon.remove();
      });
      const playIcon = document.createElement('div');
      playIcon.className   = 'video-play-icon';
      playIcon.textContent = '▶';
      item.appendChild(videoEl);
      item.appendChild(icon);
      item.appendChild(name);
      item.appendChild(playIcon);

    } else if (category === 'audio') {
      /* ★ 新增：音訊：顯示音符 icon + 檔名 */
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = '🎵';
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = file.name;
      item.appendChild(icon);
      item.appendChild(name);

    } else {
      /* 其他檔案 */
      const icon = document.createElement('div');
      icon.className   = 'file-icon';
      icon.textContent = getCategoryIcon(category);
      const name = document.createElement('div');
      name.className   = 'file-name';
      name.textContent = file.name;
      item.appendChild(icon);
      item.appendChild(name);
    }

    const rm = document.createElement('button');
    rm.className   = 'preview-remove';
    rm.textContent = '✕';
    rm.addEventListener('click', () => {
      State.pendingFiles.splice(i, 1);
      renderNewFilePreviews();
    });
    item.appendChild(rm);
    list.appendChild(item);
  });
}

function openDetail(note) {
  State.viewingNote = note;
  recordView(note.NoteID);
  renderDetail(note);
  switchPage('detail');
}


function renderDetail(note) {
  const myRole  = State.myRole;
  const isOwner = note.CreatedByUserID === State.user.userId;
  const canEdit = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canDel  = myRole === 'owner' || (canWrite(myRole) && isOwner);
  const canFwd  = canWrite(myRole);
  const canDl   = canDownload(myRole);

  let attachUrls = [];
  try { attachUrls = note.Attachments ? JSON.parse(note.Attachments) : []; } catch {}
  let viewers = [];
  try { viewers = note.Viewers ? JSON.parse(note.Viewers) : []; } catch {}

  /* 標題 */
  document.getElementById('detail-title').textContent = note.Title;

  /* Meta */
  const metaEl = document.getElementById('detail-meta');
  metaEl.innerHTML =
    `<span class="meta-badge">👤 ${escHtml(note.CreatedByUserName ?? '未知')}</span>` +
    `<span class="meta-badge">🕐 ${escHtml(fmtTime(note.CreatedAt))}</span>` +
    `<span class="meta-badge">👁 ${escHtml(String(note.ViewCount ?? 0))} 次</span>` +
    (note.LastEditedAt && note.LastEditedAt !== note.CreatedAt
      ? `<span class="meta-badge">✏️ 編輯於 ${escHtml(fmtTime(note.LastEditedAt))}</span>`
      : '');

  /* 內容 */
  document.getElementById('detail-content').textContent = note.Content;

  /* ★ 修改：附件（影片顯示播放器、音訊顯示播放條） */
  const attachSection = document.getElementById('detail-attach-section');
  const attachWrap    = document.getElementById('detail-attachments');
  attachWrap.innerHTML = '';

  if (attachUrls.length) {
    attachSection.style.display = '';
    attachUrls.forEach(url => {
      const el = buildAttachElement(url, { canDl, thumbSize:100, isDetail:true });
      /* 影片 / 音訊需要全寬 */
      const mimeType = guessMimeFromName(getFileNameFromUrl(
        typeof url === 'object' ? (url.url || '') : url
      ));
      const cat = getMimeCategory(mimeType);
      if (cat === 'video' || cat === 'audio') {
        el.style.width = '100%';
      }
      attachWrap.appendChild(el);
    });
  } else {
    attachSection.style.display = 'none';
  }

  /* 閱覽者 */
  const viewersSection = document.getElementById('detail-viewers-section');
  const viewersWrap    = document.getElementById('detail-viewers');
  viewersWrap.innerHTML = '';
  if (viewers.length) {
    viewersSection.style.display = '';
    viewers.forEach(name => {
      const chip = document.createElement('span');
      chip.className   = 'viewer-chip';
      chip.textContent = `👤 ${name}`;
      viewersWrap.appendChild(chip);
    });
  } else {
    viewersSection.style.display = 'none';
  }

  /* 底部按鈕 */
  const footer = document.getElementById('detail-footer');
  footer.innerHTML = '';

  const btnBack = document.createElement('button');
  btnBack.className   = 'btn-detail-back';
  btnBack.textContent = '← 返回';
  btnBack.addEventListener('click', () => switchPage('list'));
  footer.appendChild(btnBack);

  if (canFwd) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-forward';
    btn.textContent = '↗ 轉發';
    btn.addEventListener('click', () => forwardNote(note));
    footer.appendChild(btn);
  }
  if (canEdit) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-edit';
    btn.textContent = '✏️ 編輯';
    btn.addEventListener('click', () => openEditForm(note));
    footer.appendChild(btn);
  }
  if (canDel) {
    const btn = document.createElement('button');
    btn.className   = 'btn-detail-delete';
    btn.textContent = '🗑 刪除';
    btn.addEventListener('click', async () => { await deleteNote(note.NoteID); });
    footer.appendChild(btn);
  }
}

/* ============================================================
   人員管理：列表渲染
============================================================ */
function renderUserList(users) {
  const container = document.getElementById('user-list');
  const countEl   = document.getElementById('users-count');
  container.innerHTML = '';
  countEl.textContent = `共 ${users.length} 人`;

  renderOwnerStats(State.users);

  if (!users.length) {
    const el = document.createElement('div');
    el.className = 'empty-state';
    el.innerHTML = `<div class="icon">👥</div><p>此分類目前沒有使用者</p>`;
    container.appendChild(el);
    return;
  }
  users.forEach(u => container.appendChild(buildUserCard(u)));
}

/* ============================================================
   人員管理：使用者卡片
============================================================ */
function buildUserCard(user) {
  const isSelf     = user.UserID === State.user.userId;
  const isOwner    = user.Role   === 'owner';
  const isBanned   = user.Status === 'banned';
  const canOperate = canManageUser(State.myRole) && !isSelf && !isOwner;

  const card = document.createElement('div');
  card.className = `user-card${isBanned ? ' banned' : ''}`;

  /* 頭像 */
  const avatarEl = document.createElement('div');
  avatarEl.className = 'user-avatar';
  if (user.PictureUrl) {
    const img = document.createElement('img');
    img.src   = user.PictureUrl;
    img.alt   = user.DisplayName;
    avatarEl.appendChild(img);
  } else {
    avatarEl.textContent = (user.DisplayName || '?')[0].toUpperCase();
  }
  card.appendChild(avatarEl);

  /* 資訊 */
  const infoEl = document.createElement('div');
  infoEl.className = 'user-info';

  const nameRow = document.createElement('div');
  nameRow.style.cssText = 'display:flex;align-items:center;gap:6px;flex-wrap:wrap';

  const nameEl = document.createElement('span');
  nameEl.className   = 'user-name';
  nameEl.textContent = user.DisplayName || '（未知）';
  nameRow.appendChild(nameEl);

  const badge = document.createElement('span');
  badge.innerHTML = roleBadgeHtml(isBanned ? 'guest' : user.Role);
  nameRow.appendChild(badge);

  if (isBanned) {
    const banTag = document.createElement('span');
    banTag.className = 'role-badge';
    banTag.style.cssText = 'background:#ffebee;color:#e53935';
    banTag.textContent = '🚫 已封鎖';
    nameRow.appendChild(banTag);
  }
  if (isSelf) {
    const selfTag = document.createElement('span');
    selfTag.className = 'role-badge role-member';
    selfTag.textContent = '（我）';
    nameRow.appendChild(selfTag);
  }
  infoEl.appendChild(nameRow);

  const metaEl = document.createElement('div');
  metaEl.className = 'user-meta';
  metaEl.innerHTML = `加入：${fmtTime(user.JoinedAt)}　上線：${fmtTime(user.LastSeenAt)}`;
  infoEl.appendChild(metaEl);

  /* 操作區 */
  if (canOperate) {
    const actionsEl = document.createElement('div');
    actionsEl.className = 'user-actions';

    if (!isBanned) {
      const select = document.createElement('select');
      select.className = 'role-select';
      [
        { value:'admin',  label:'🛡 管理者' },
        { value:'member', label:'⭐ 會員'  },
        { value:'guest',  label:'👤 訪客'  },
      ].forEach(opt => {
        const o = document.createElement('option');
        o.value       = opt.value;
        o.textContent = opt.label;
        if (opt.value === user.Role) o.selected = true;
        select.appendChild(o);
      });
      select.addEventListener('change', () =>
        updateUserRole(user.UserID, select.value, select)
      );
      actionsEl.appendChild(select);
    }

    const btnBan = document.createElement('button');
    btnBan.className   = `btn-ban ${isBanned ? 'unban' : 'ban'}`;
    btnBan.textContent = isBanned ? '✅ 解封' : '🚫 封鎖';
    btnBan.addEventListener('click', () => toggleBanUser(user.UserID, !isBanned));
    actionsEl.appendChild(btnBan);

    infoEl.appendChild(actionsEl);
  }

  card.appendChild(infoEl);
  return card;
}

/* ============================================================
   版主統計面板
============================================================ */
function renderOwnerStats(users) {
  if (State.myRole !== 'owner') return;
  const existing = document.getElementById('owner-stats');
  if (existing) existing.remove();

  const counts = { owner:0, admin:0, member:0, guest:0, banned:0 };
  users.forEach(u => {
    if (u.Status === 'banned') { counts.banned++; return; }
    counts[u.Role] = (counts[u.Role] || 0) + 1;
  });

  const panel = document.createElement('div');
  panel.id = 'owner-stats';
  panel.style.cssText = [
    'display:grid','grid-template-columns:repeat(5,1fr)',
    'gap:8px','padding:12px 16px',
    'background:var(--card-bg)','border-bottom:1px solid var(--border)',
  ].join(';');

  [
    { label:'版主',   count:counts.owner,  color:'var(--gold)',     icon:'👑' },
    { label:'管理者', count:counts.admin,  color:'var(--purple)',   icon:'🛡' },
    { label:'會員',   count:counts.member, color:'var(--info)',     icon:'⭐' },
    { label:'訪客',   count:counts.guest,  color:'var(--text-sub)', icon:'👤' },
    { label:'封鎖',   count:counts.banned, color:'var(--danger)',   icon:'🚫' },
  ].forEach(item => {
    const cell = document.createElement('div');
    cell.style.cssText = 'text-align:center;padding:8px 4px;border-radius:8px;background:var(--bg)';
    cell.innerHTML = `
      <div style="font-size:1.2rem">${item.icon}</div>
      <div style="font-size:1.1rem;font-weight:700;color:${item.color}">${item.count}</div>
      <div style="font-size:.65rem;color:var(--text-sub)">${item.label}</div>
    `;
    panel.appendChild(cell);
  });

  const filter = document.getElementById('users-filter');
  filter.insertAdjacentElement('afterend', panel);
}

/* ============================================================
   權限提示（訪客 / 會員）
============================================================ */
function renderPermissionHint() {
  const existing = document.getElementById('permission-hint');
  if (existing) existing.remove();

  const role = State.myRole;
  if (canWrite(role)) return;

  const hint = document.createElement('div');
  hint.id = 'permission-hint';
  hint.style.cssText = [
    'margin:12px 16px 0','padding:12px 16px',
    'border-radius:10px','font-size:.8rem','line-height:1.7',
    'display:flex','gap:10px','align-items:flex-start',
    role === 'guest'
      ? 'background:var(--warn-light);color:#E65100;border:1px solid #FFE0B2'
      : 'background:var(--info-light);color:#1565C0;border:1px solid #BBDEFB',
  ].join(';');

  const icon = role === 'guest' ? '👤' : '⭐';
  const text = role === 'guest'
    ? '您目前是<strong>訪客</strong>，只能瀏覽記事。<br/>如需下載附件，請聯絡管理員升級為會員。'
    : '您目前是<strong>會員</strong>，可瀏覽及下載附件。<br/>如需新增或編輯記事，請聯絡管理員升級為管理者。';

  hint.innerHTML = `<span style="font-size:1.3rem">${icon}</span><div>${text}</div>`;

  const searchBar = document.querySelector('.search-bar');
  if (searchBar) searchBar.insertAdjacentElement('afterend', hint);
}
