<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>雅珍的店</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary:#4A90D9; --secondary:#F5A623; --dark:#2C3E50; --light-bg:#F8F9FA; }
    body { background:var(--light-bg); font-family:'Segoe UI',sans-serif; }
    .navbar { background:var(--dark) !important; box-shadow:0 2px 10px rgba(0,0,0,.3); }
    .navbar-brand { font-weight:700; font-size:1.4rem; color:#fff !important; }
    .cart-badge { background:var(--secondary); color:#fff; border-radius:50%; padding:2px 6px; font-size:.7rem; }
    .hero { background:linear-gradient(135deg,var(--primary),var(--dark)); color:#fff; padding:60px 0; }
    .product-card { transition:transform .2s,box-shadow .2s; border:none; border-radius:12px; overflow:hidden; }
    .product-card:hover { transform:translateY(-5px); box-shadow:0 10px 30px rgba(0,0,0,.15); }
    .product-card .card-img-top { height:200px; object-fit:cover; }
    .product-price { color:var(--primary); font-weight:700; font-size:1.2rem; }
    .btn-add-cart { background:var(--primary); color:#fff; border:none; border-radius:8px; }
    .btn-add-cart:hover { background:#357ABD; color:#fff; }
    .category-pill { cursor:pointer; border-radius:20px; padding:6px 18px; border:2px solid var(--primary); color:var(--primary); background:#fff; transition:all .2s; user-select:none; }
    .category-pill.active,.category-pill:hover { background:var(--primary); color:#fff; }
    .cart-offcanvas .offcanvas-header { background:var(--dark); color:#fff; }
    .cart-item { border-bottom:1px solid #eee; padding:12px 0; }
    .cart-total { font-size:1.2rem; font-weight:700; color:var(--primary); }
    .modal-header { background:var(--primary); color:#fff; }
    .modal-header .btn-close { filter:invert(1); }
    .toast-container { z-index:9999; }
    footer { background:var(--dark); color:#aaa; padding:30px 0; margin-top:60px; }
    .stock-badge { font-size:.75rem; }
    .order-status-badge { font-size:.8rem; padding:3px 10px; border-radius:20px; }
    .qty-btn { width:30px; height:30px; border:1px solid #ddd; background:#fff; border-radius:6px; cursor:pointer; }
    .qty-btn:hover { background:#f0f0f0; }
  </style>
</head>
<body>

<!-- ═══ NAVBAR ═══ -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#"><i class="bi bi-bag-heart-fill me-2"></i><span id="siteNameNav">雅珍的店</span></a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('shop')"><i class="bi bi-shop me-1"></i>商品</a></li>
        <li class="nav-item" id="nav-orders" style="display:none">
          <a class="nav-link" href="#" onclick="showPage('orders')"><i class="bi bi-box-seam me-1"></i>我的訂單</a>
        </li>
        <li class="nav-item" id="nav-profile" style="display:none">
          <a class="nav-link" href="#" onclick="showPage('profile')"><i class="bi bi-person me-1"></i>個人資料</a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <div id="authButtons" class="d-flex gap-1">
          <button class="btn btn-outline-light btn-sm" onclick="showModal('loginModal')">登入</button>
          <button class="btn btn-warning btn-sm" onclick="showModal('registerModal')">註冊</button>
        </div>
        <div id="userMenu" style="display:none" class="d-flex align-items-center gap-2">
          <span class="text-white small" id="userGreeting"></span>
          <button class="btn btn-outline-light btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right"></i> 登出</button>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ═══ HERO ═══ -->
<div class="hero" id="heroSection">
  <div class="container text-center">
    <h1 class="display-5 fw-bold mb-3"><i class="bi bi-bag-heart me-2"></i>歡迎來到 雅珍的店</h1>
    <p class="lead mb-4" id="siteDescHero">精選優質商品，安心購物體驗</p>
     <div class="input-group input-group-lg" style="width:200px">
          <input type="text" id="searchInput" class="form-control" placeholder="搜尋商品..."
                 onkeydown="if(event.key==='Enter') searchProducts()">
          <button class="btn btn-outline-light" onclick="searchProducts()"><i class="bi bi-search"></i></button>
        </div>
        <button class="btn btn-outline-warning btn-lg px-5" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
          <i class="bi bi-cart3"></i> <span class="cart-badge" id="cartCount">0</span>
        </button>
  </div>
</div>

<!-- ═══ MAIN CONTENT ═══ -->
<div class="container my-4">

  <!-- 商品頁 -->
  <div id="shopSection">
    <div class="d-flex flex-wrap gap-2 mb-4" id="categoryFilter">
      <span class="category-pill active" onclick="filterCategory('all',this)">
        <i class="bi bi-grid me-1"></i>全部商品
      </span>
    </div>
    <div class="row g-4" id="productList">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary"></div>
        <p class="mt-2 text-muted">載入商品中...</p>
      </div>
    </div>
  </div>

  <!-- 訂單頁 -->
  <div id="ordersSection" style="display:none">
    <h4 class="mb-4"><i class="bi bi-box-seam me-2"></i>我的訂單</h4>
    <div id="orderList"></div>
  </div>

  <!-- 個人資料頁 -->
  <div id="profileSection" style="display:none">
    <h4 class="mb-4"><i class="bi bi-person-circle me-2"></i>個人資料</h4>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <form id="profileForm">
              <div class="mb-3">
                <label class="form-label fw-bold">姓名 *</label>
                <input type="text" class="form-control" id="profileName" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" class="form-control" id="profileEmail" readonly style="background:#f8f9fa">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">電話</label>
                <input type="tel" class="form-control" id="profilePhone">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">地址</label>
                <input type="text" class="form-control" id="profileAddress">
              </div>
              <hr>
              <h6 class="text-muted">修改密碼（選填）</h6>
              <div class="mb-3">
                <label class="form-label">目前密碼</label>
                <input type="password" class="form-control" id="currentPassword">
              </div>
              <div class="mb-3">
                <label class="form-label">新密碼（至少6字元）</label>
                <input type="password" class="form-control" id="newPassword">
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle me-2"></i>儲存變更
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<!-- ═══ CART OFFCANVAS ═══ -->
<div class="offcanvas offcanvas-end cart-offcanvas" tabindex="-1" id="cartOffcanvas" style="width:420px">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title"><i class="bi bi-cart3 me-2"></i>購物車</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column p-3">
    <div id="cartItems" class="flex-grow-1 overflow-auto"></div>
    <div class="border-top pt-3 mt-2">
      <div class="d-flex justify-content-between mb-1 text-muted small">
        <span>小計</span><span id="cartSubtotal">NT$ 0</span>
      </div>
      <div class="d-flex justify-content-between mb-1 text-muted small">
        <span>運費 <span id="freeShipHint" class="text-success" style="display:none">（免運）</span></span>
        <span id="cartShipping">NT$ 60</span>
      </div>
      <div class="d-flex justify-content-between cart-total mb-3 pt-2 border-top">
        <span>總計</span><span id="cartTotal">NT$ 60</span>
      </div>
      <p class="text-muted small mb-2" id="freeShipMsg"></p>
      <button class="btn btn-primary w-100 py-2" onclick="proceedCheckout()">
        <i class="bi bi-credit-card me-2"></i>前往結帳
      </button>
      <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()">
        <i class="bi bi-trash me-2"></i>清空購物車
      </button>
    </div>
  </div>
</div>

<!-- ═══ MODALS ═══ -->

<!-- 登入 -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-box-arrow-in-right me-2"></i>會員登入</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" id="loginEmail" required placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">密碼 *</label>
            <input type="password" class="form-control" id="loginPassword" required placeholder="••••••">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-2"></i>登入
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 small">還沒有帳號？
          <a href="#" onclick="switchModal('loginModal','registerModal')">立即註冊</a>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- 註冊 -->
<div class="modal fade" id="registerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>會員註冊</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="registerForm">
          <div class="mb-3">
            <label class="form-label">姓名 *</label>
            <input type="text" class="form-control" id="regName" required placeholder="王小明">
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input type="email" class="form-control" id="regEmail" required placeholder="your@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label">密碼 * <small class="text-muted">（至少6字元）</small></label>
            <input type="password" class="form-control" id="regPassword" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">電話</label>
            <input type="tel" class="form-control" id="regPhone" placeholder="0912-345-678">
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-check me-2"></i>立即註冊
          </button>
        </form>
        <hr>
        <p class="text-center mb-0 small">已有帳號？
          <a href="#" onclick="switchModal('registerModal','loginModal')">立即登入</a>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- 商品詳情 -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="productModalTitle">商品詳情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="productModalBody"></div>
    </div>
  </div>
</div>

<!-- 結帳 -->
<div class="modal fade" id="checkoutModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-credit-card me-2"></i>確認結帳</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-4">
          <div class="col-md-6">
            <h6 class="fw-bold mb-3"><i class="bi bi-geo-alt me-2"></i>收件資訊</h6>
            <form id="checkoutForm">
              <div class="mb-3">
                <label class="form-label">姓名 *</label>
                <input type="text" class="form-control" id="checkoutName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email *</label>
                <input type="email" class="form-control" id="checkoutEmail" required>
              </div>
              <div class="mb-3">
                <label class="form-label">電話 *</label>
                <input type="tel" class="form-control" id="checkoutPhone" required>
              </div>
              <div class="mb-3">
                <label class="form-label">收件地址 *</label>
                <input type="text" class="form-control" id="checkoutAddress" required placeholder="台北市信義區...">
              </div>
              <div class="mb-3">
                <label class="form-label">備註</label>
                <textarea class="form-control" id="checkoutNote" rows="2" placeholder="特殊需求或備注..."></textarea>
              </div>
            </form>
          </div>
          <div class="col-md-6">
            <h6 class="fw-bold mb-3"><i class="bi bi-receipt me-2"></i>訂單摘要</h6>
            <div id="checkoutSummary"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary px-4" onclick="submitOrder()">
          <i class="bi bi-check-circle me-2"></i>確認下單
        </button>
      </div>
    </div>
  </div>
</div>

<!-- 訂單詳情 -->
<div class="modal fade" id="orderDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-receipt me-2"></i>訂單詳情</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderDetailBody"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="toastMsg" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-bold" id="toastText"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <div class="container text-center">
    <p class="mb-1"><i class="bi bi-bag-heart-fill me-2"></i><span id="siteNameFooter">雅珍的店</span></p>
    <p class="small mb-0">Powered by Google Apps Script</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// 全域變數
// ═══════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzC_dnbSEpothb3KQhZcgJ-ozwH4N2Y15q-2Pkov3ZOY48twupzV75vB4ywRBdFA-1i/exec'; // ← 部署後填入 Web App URL
let currentUser = JSON.parse(localStorage.getItem('gasUser')) || null;
let cart        = JSON.parse(localStorage.getItem('gasCart')) || [];
let allProducts = [];
let categories  = [];
let shippingFee = 60;
let freeShippingThreshold = 500;
let currentCategory = 'all';

// ═══════════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  updateAuthUI();
  await loadSettings();
  await loadCategories();
  await loadProducts();
  updateCartUI();
  bindForms();
});

// ═══════════════════════════════════════════════════════════
// API 呼叫
// ═══════════════════════════════════════════════════════════
async function apiCall(data) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json();
}

// ═══════════════════════════════════════════════════════════
// 設定 & 分類 & 商品載入
// ═══════════════════════════════════════════════════════════
async function loadSettings() {
  try {
    const res = await apiCall({ action: 'getSettings' });
    if (res.success) {
      shippingFee = parseFloat(res.settings.shippingFee) || 60;
      freeShippingThreshold = parseFloat(res.settings.freeShippingThreshold) || 500;
      const name = res.settings.siteName || 'GAS 購物平台';
      const desc = res.settings.siteDescription || '精選優質商品，安心購物體驗';
      document.title = name;
      document.getElementById('siteNameNav').textContent = name;
      document.getElementById('siteNameFooter').textContent = name;
      document.getElementById('siteDescHero').textContent = desc;
    }
  } catch(e) { console.warn('loadSettings error', e); }
}

async function loadCategories() {
  try {
    const res = await apiCall({ action: 'getCategories' });
    if (res.success) {
      categories = res.categories;
      const filter = document.getElementById('categoryFilter');
      categories.forEach(cat => {
        const span = document.createElement('span');
        span.className = 'category-pill';
        span.innerHTML = `<i class="bi bi-tag me-1"></i>${cat.name}`;
        span.onclick = () => filterCategory(cat.categoryId, span);
        filter.appendChild(span);
      });
    }
  } catch(e) { console.warn('loadCategories error', e); }
}

async function loadProducts(params = {}) {
  document.getElementById('productList').innerHTML =
    `<div class="col-12 text-center py-5">
       <div class="spinner-border text-primary"></div>
       <p class="mt-2 text-muted">載入商品中...</p>
     </div>`;
  try {
    const res = await apiCall({ action: 'getProducts', ...params });
    if (res.success) {
      allProducts = res.products;
      renderProducts(allProducts);
    }
  } catch(e) {
    document.getElementById('productList').innerHTML =
      `<div class="col-12 text-center py-5 text-danger">
         <i class="bi bi-exclamation-triangle display-4"></i>
         <p class="mt-3">載入失敗，請確認 GAS_URL 設定</p>
       </div>`;
  }
}

function renderProducts(products) {
  const list = document.getElementById('productList');
  if (!products.length) {
    list.innerHTML = `<div class="col-12 text-center py-5 text-muted">
      <i class="bi bi-search display-4"></i><p class="mt-3">找不到相關商品</p></div>`;
    return;
  }
  list.innerHTML = products.map(p => `
    <div class="col-sm-6 col-lg-4 col-xl-3">
      <div class="card product-card shadow-sm h-100">
        <img src="${p.imageUrl || 'https://via.placeholder.com/300x300?text=商品'}"
             class="card-img-top" alt="${p.name}"
             onerror="this.src='https://via.placeholder.com/300x300?text=商品'">
        <div class="card-body d-flex flex-column">
          <h6 class="card-title mb-1">${p.name}</h6>
          <p class="card-text text-muted small flex-grow-1 mb-2">${(p.description||'').substring(0,60)}${p.description&&p.description.length>60?'...':''}</p>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="product-price">NT$ ${p.price.toLocaleString()}</span>
            <span class="badge ${p.stock > 10 ? 'bg-success' : p.stock > 0 ? 'bg-warning text-dark' : 'bg-danger'} stock-badge">
              ${p.stock > 0 ? `庫存 ${p.stock}` : '售完'}
            </span>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm flex-grow-1"
                    onclick="showProductDetail('${p.productId}')">
              <i class="bi bi-eye"></i> 詳情
            </button>
            <button class="btn btn-add-cart btn-sm flex-grow-1"
                    onclick="addToCart('${p.productId}')"
                    ${p.stock <= 0 ? 'disabled' : ''}>
              <i class="bi bi-cart-plus"></i> 加入
            </button>
          </div>
        </div>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// 分類篩選 & 搜尋
// ═══════════════════════════════════════════════════════════
function filterCategory(catId, el) {
  currentCategory = catId;
  document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('searchInput').value = '';
  loadProducts(catId === 'all' ? {} : { categoryId: catId });
}

function searchProducts() {
  const kw = document.getElementById('searchInput').value.trim();
  if (!kw) { loadProducts(); return; }
  document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
  loadProducts({ search: kw });
}

// ═══════════════════════════════════════════════════════════
// 商品詳情
// ═══════════════════════════════════════════════════════════
async function showProductDetail(productId) {
  const res = await apiCall({ action: 'getProduct', productId });
  if (!res.success) { showToast(res.message, 'danger'); return; }
  const p = res.product;
  document.getElementById('productModalTitle').textContent = p.name;
  document.getElementById('productModalBody').innerHTML = `
    <div class="row g-4">
      <div class="col-md-5">
        <img src="${p.imageUrl || 'https://via.placeholder.com/400x400?text=商品'}"
             class="img-fluid rounded" alt="${p.name}"
             onerror="this.src='https://via.placeholder.com/400x400?text=商品'">
      </div>
      <div class="col-md-7">
        <h4 class="mb-2">${p.name}</h4>
        <p class="text-muted mb-3">${p.description || '暫無描述'}</p>
        <div class="d-flex align-items-center gap-3 mb-3">
          <span class="fs-3 fw-bold text-primary">NT$ ${p.price.toLocaleString()}</span>
          <span class="badge ${p.stock > 0 ? 'bg-success' : 'bg-danger'}">
            ${p.stock > 0 ? `庫存 ${p.stock} 件` : '已售完'}
          </span>
        </div>
        <div class="d-flex align-items-center gap-3 mb-4">
          <label class="fw-bold">數量：</label>
          <div class="d-flex align-items-center gap-2">
            <button class="qty-btn" onclick="changeDetailQty(-1)">−</button>
            <input type="number" id="detailQty" value="1" min="1" max="${p.stock}"
                   class="form-control text-center" style="width:70px">
            <button class="qty-btn" onclick="changeDetailQty(1)">+</button>
          </div>
        </div>
        <button class="btn btn-add-cart btn-lg w-100"
                onclick="addToCartWithQty('${p.productId}', ${p.stock})"
                ${p.stock <= 0 ? 'disabled' : ''}>
          <i class="bi bi-cart-plus me-2"></i>加入購物車
        </button>
      </div>
    </div>`;
  showModal('productModal');
}

function changeDetailQty(delta) {
  const input = document.getElementById('detailQty');
  const val = parseInt(input.value) + delta;
  if (val >= 1 && val <= parseInt(input.max)) input.value = val;
}

function addToCartWithQty(productId, stock) {
  const qty = parseInt(document.getElementById('detailQty').value) || 1;
  addToCart(productId, qty, stock);
  bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
}

// ═══════════════════════════════════════════════════════════
// 購物車
// ═══════════════════════════════════════════════════════════
function addToCart(productId, qty = 1, maxStock = null) {
  const product = allProducts.find(p => p.productId === productId);
  if (!product) { showToast('商品不存在', 'danger'); return; }
  if (product.stock <= 0) { showToast('此商品已售完', 'danger'); return; }

  const existing = cart.find(i => i.productId === productId);
  const currentQty = existing ? existing.quantity : 0;
  const stock = maxStock || product.stock;

  if (currentQty + qty > stock) {
    showToast(`庫存不足，最多可購買 ${stock} 件`, 'warning'); return;
  }

  if (existing) {
    existing.quantity += qty;
  } else {
    cart.push({
      productId: product.productId,
      name: product.name,
      price: product.price,
      imageUrl: product.imageUrl,
      quantity: qty,
      stock: product.stock
    });
  }
  saveCart();
  updateCartUI();
  showToast(`✅ 已加入「${product.name}」`, 'success');
}

function removeFromCart(productId) {
  cart = cart.filter(i => i.productId !== productId);
  saveCart();
  updateCartUI();
}

function updateCartQty(productId, qty) {
  const item = cart.find(i => i.productId === productId);
  if (!item) return;
  if (qty <= 0) { removeFromCart(productId); return; }
  if (qty > item.stock) { showToast('超過庫存數量', 'warning'); return; }
  item.quantity = qty;
  saveCart();
  updateCartUI();
}

function clearCart() {
  if (!cart.length) return;
  if (confirm('確定要清空購物車嗎？')) {
    cart = [];
    saveCart();
    updateCartUI();
  }
}

function saveCart() {
  localStorage.setItem('gasCart', JSON.stringify(cart));
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').textContent = count;

  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const shipping = subtotal >= freeShippingThreshold ? 0 : (cart.length ? shippingFee : 0);
  const total = subtotal + shipping;

  document.getElementById('cartSubtotal').textContent = `NT$ ${subtotal.toLocaleString()}`;
  document.getElementById('cartShipping').textContent = shipping === 0 && subtotal > 0 ? 'NT$ 0（免運）' : `NT$ ${shipping}`;
  document.getElementById('cartTotal').textContent = `NT$ ${total.toLocaleString()}`;

  const hint = document.getElementById('freeShipHint');
  const msg  = document.getElementById('freeShipMsg');
  if (subtotal >= freeShippingThreshold && subtotal > 0) {
    hint.style.display = 'inline';
    msg.textContent = '';
  } else if (subtotal > 0) {
    hint.style.display = 'none';
    msg.textContent = `再消費 NT$ ${(freeShippingThreshold - subtotal).toLocaleString()} 即可免運費`;
  } else {
    hint.style.display = 'none';
    msg.textContent = '';
  }

  const cartItems = document.getElementById('cartItems');
  if (!cart.length) {
    cartItems.innerHTML = `<div class="text-center py-5 text-muted">
      <i class="bi bi-cart-x display-4"></i><p class="mt-3">購物車是空的</p></div>`;
    return;
  }
  cartItems.innerHTML = cart.map(item => `
    <div class="cart-item d-flex align-items-center gap-3">
      <img src="${item.imageUrl || 'https://via.placeholder.com/60x60?text=商品'}"
           width="60" height="60" class="rounded" style="object-fit:cover"
           onerror="this.src='https://via.placeholder.com/60x60?text=商品'">
      <div class="flex-grow-1">
        <div class="fw-bold small">${item.name}</div>
        <div class="text-primary small">NT$ ${item.price.toLocaleString()}</div>
        <div class="d-flex align-items-center gap-2 mt-1">
          <button class="qty-btn" onclick="updateCartQty('${item.productId}', ${item.quantity - 1})">−</button>
          <span class="small fw-bold">${item.quantity}</span>
          <button class="qty-btn" onclick="updateCartQty('${item.productId}', ${item.quantity + 1})">+</button>
        </div>
      </div>
      <div class="text-end">
        <div class="fw-bold small">NT$ ${(item.price * item.quantity).toLocaleString()}</div>
        <button class="btn btn-link btn-sm text-danger p-0 mt-1"
                onclick="removeFromCart('${item.productId}')">
          <i class="bi bi-trash"></i>
        </button>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════════════
// 結帳
// ═══════════════════════════════════════════════════════════
function proceedCheckout() {
  if (!cart.length) { showToast('購物車是空的', 'warning'); return; }
  bootstrap.Offcanvas.getInstance(document.getElementById('cartOffcanvas'))?.hide();

  // 預填用戶資料
  if (currentUser) {
    document.getElementById('checkoutName').value    = currentUser.name || '';
    document.getElementById('checkoutEmail').value   = currentUser.email || '';
    document.getElementById('checkoutPhone').value   = currentUser.phone || '';
    document.getElementById('checkoutAddress').value = currentUser.address || '';
  }

  // 訂單摘要
  const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const shipping = subtotal >= freeShippingThreshold ? 0 : shippingFee;
  const total = subtotal + shipping;

  document.getElementById('checkoutSummary').innerHTML = `
    <div class="table-responsive">
      <table class="table table-sm">
        <thead><tr><th>商品</th><th class="text-end">小計</th></tr></thead>
        <tbody>
          ${cart.map(i => `
            <tr>
              <td>${i.name} × ${i.quantity}</td>
              <td class="text-end">NT$ ${(i.price * i.quantity).toLocaleString()}</td>
            </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr><td>小計</td><td class="text-end">NT$ ${subtotal.toLocaleString()}</td></tr>
          <tr><td>運費</td><td class="text-end">${shipping === 0 ? '<span class="text-success">免運</span>' : `NT$ ${shipping}`}</td></tr>
          <tr class="table-primary fw-bold">
            <td>總計</td><td class="text-end">NT$ ${total.toLocaleString()}</td>
          </tr>
        </tfoot>
      </table>
    </div>`;

  showModal('checkoutModal');
}

async function submitOrder() {
  const name    = document.getElementById('checkoutName').value.trim();
  const email   = document.getElementById('checkoutEmail').value.trim();
  const phone   = document.getElementById('checkoutPhone').value.trim();
  const address = document.getElementById('checkoutAddress').value.trim();
  const note    = document.getElementById('checkoutNote').value.trim();

  if (!name || !email || !phone || !address) {
    showToast('請填寫完整收件資訊', 'danger'); return;
  }

  const btn = document.querySelector('#checkoutModal .btn-primary');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>處理中...';

  try {
    const res = await apiCall({
      action: 'createOrder',
      userId: currentUser?.userId || 'guest',
      userName: name,
      userEmail: email,
      userPhone: phone,
      shippingAddress: address,
      note,
      items: cart.map(i => ({ productId: i.productId, quantity: i.quantity }))
    });

    if (res.success) {
      bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
      cart = [];
      saveCart();
      updateCartUI();
      showToast(`🎉 訂單 ${res.orderId} 建立成功！`, 'success');
      if (currentUser) {
        setTimeout(() => showPage('orders'), 1500);
      }
    } else {
      showToast(res.message, 'danger');
    }
  } catch(e) {
    showToast('訂單建立失敗，請稍後再試', 'danger');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-circle me-2"></i>確認下單';
  }
}

// ═══════════════════════════════════════════════════════════
// 訂單
// ═══════════════════════════════════════════════════════════
async function loadOrders() {
  if (!currentUser) return;
  const orderList = document.getElementById('orderList');
  orderList.innerHTML = `<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>`;

  const res = await apiCall({ action: 'getOrders', userId: currentUser.userId });
  if (!res.success) { orderList.innerHTML = `<p class="text-danger">${res.message}</p>`; return; }

  if (!res.orders.length) {
    orderList.innerHTML = `<div class="text-center py-5 text-muted">
      <i class="bi bi-box-seam display-4"></i><p class="mt-3">尚無訂單記錄</p></div>`;
    return;
  }

  const statusMap = {
    pending:   ['待確認','warning'],
    confirmed: ['已確認','info'],
    shipping:  ['配送中','primary'],
    delivered: ['已送達','success'],
    cancelled: ['已取消','danger']
  };

  orderList.innerHTML = res.orders.map(o => {
    const [statusText, statusColor] = statusMap[o.status] || ['未知','secondary'];
    return `
      <div class="card mb-3 shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="fw-bold">${o.orderId}</span>
          <span class="badge bg-${statusColor} order-status-badge">${statusText}</span>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-8">
              ${o.items.slice(0,3).map(i => `
                <div class="small text-muted">${i.name} × ${i.quantity} — NT$ ${(i.price*i.quantity).toLocaleString()}</div>
              `).join('')}
              ${o.items.length > 3 ? `<div class="small text-muted">...等 ${o.items.length} 項商品</div>` : ''}
            </div>
            <div class="col-md-4 text-md-end">
              <div class="fw-bold text-primary">NT$ ${o.total.toLocaleString()}</div>
              <div class="small text-muted">${new Date(o.createdAt).toLocaleDateString('zh-TW')}</div>
              <button class="btn btn-outline-primary btn-sm mt-2"
                      onclick="showOrderDetail('${o.orderId}')">
                <i class="bi bi-eye me-1"></i>查看詳情
              </button>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function showOrderDetail(orderId) {
  const res = await apiCall({ action: 'getOrderDetail', orderId });
  if (!res.success) { showToast(res.message, 'danger'); return; }
  const o = res.order;
  const statusMap = {
    pending:   ['待確認','warning'],
    confirmed: ['已確認','info'],
    shipping:  ['配送中','primary'],
    delivered: ['已送達','success'],
    cancelled: ['已取消','danger']
  };
  const [statusText, statusColor] = statusMap[o.status] || ['未知','secondary'];

  document.getElementById('orderDetailBody').innerHTML = `
    <div class="row g-3">
      <div class="col-md-6">
        <h6 class="fw-bold">訂單資訊</h6>
        <table class="table table-sm table-borderless">
          <tr><td class="text-muted">訂單編號</td><td><code>${o.orderId}</code></td></tr>
          <tr><td class="text-muted">狀態</td>
              <td><span class="badge bg-${statusColor}">${statusText}</span></td></tr>
          <tr><td class="text-muted">下單時間</td>
              <td>${new Date(o.createdAt).toLocaleString('zh-TW')}</td></tr>
          <tr><td class="text-muted">收件人</td><td>${o.userName}</td></tr>
          <tr><td class="text-muted">電話</td><td>${o.userPhone}</td></tr>
          <tr><td class="text-muted">地址</td><td>${o.shippingAddress}</td></tr>
          ${o.note ? `<tr><td class="text-muted">備註</td><td>${o.note}</td></tr>` : ''}
        </table>
      </div>
      <div class="col-md-6">
        <h6 class="fw-bold">商品明細</h6>
        <table class="table table-sm">
          <thead><tr><th>商品</th><th>數量</th><th class="text-end">小計</th></tr></thead>
          <tbody>
            ${o.items.map(i => `
              <tr>
                <td>${i.name}</td>
                <td>${i.quantity}</td>
                <td class="text-end">NT$ ${(i.price*i.quantity).toLocaleString()}</td>
              </tr>`).join('')}
          </tbody>
          <tfoot>
            <tr><td colspan="2">小計</td><td class="text-end">NT$ ${o.subtotal.toLocaleString()}</td></tr>
            <tr><td colspan="2">運費</td>
                <td class="text-end">${o.shipping === 0 ? '<span class="text-success">免運</span>' : `NT$ ${o.shipping}`}</td></tr>
            <tr class="table-primary fw-bold">
              <td colspan="2">總計</td>
              <td class="text-end">NT$ ${o.total.toLocaleString()}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>`;
  showModal('orderDetailModal');
}

// ═══════════════════════════════════════════════════════════
// 個人資料
// ═══════════════════════════════════════════════════════════
function loadProfile() {
  if (!currentUser) return;
  document.getElementById('profileName').value    = currentUser.name || '';
  document.getElementById('profileEmail').value   = currentUser.email || '';
  document.getElementById('profilePhone').value   = currentUser.phone || '';
  document.getElementById('profileAddress').value = currentUser.address || '';
}

// ═══════════════════════════════════════════════════════════
// 表單綁定
// ═══════════════════════════════════════════════════════════
function bindForms() {
  // 登入
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = '登入中...';
    const res = await apiCall({
      action: 'login',
      email: document.getElementById('loginEmail').value,
      password: document.getElementById('loginPassword').value
    });
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>登入';
    if (res.success) {
      currentUser = res.user;
      localStorage.setItem('gasUser', JSON.stringify(currentUser));
      updateAuthUI();
      bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
      showToast(`👋 歡迎回來，${currentUser.name}！`, 'success');
    } else {
      showToast(res.message, 'danger');
    }
  };

  // 註冊
  document.getElementById('registerForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true; btn.textContent = '註冊中...';
    const res = await apiCall({
      action: 'register',
      name:     document.getElementById('regName').value,
      email:    document.getElementById('regEmail').value,
      password: document.getElementById('regPassword').value,
      phone:    document.getElementById('regPhone').value
    });
    btn.disabled = false; btn.innerHTML = '<i class="bi bi-person-check me-2"></i>立即註冊';
    if (res.success) {
      currentUser = res.user;
      localStorage.setItem('gasUser', JSON.stringify(currentUser));
      updateAuthUI();
      bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
      showToast(`🎉 註冊成功，歡迎 ${currentUser.name}！`, 'success');
    } else {
      showToast(res.message, 'danger');
    }
  };

  // 個人資料
  document.getElementById('profileForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await apiCall({
      action:          'updateProfile',
      userId:          currentUser.userId,
      name:            document.getElementById('profileName').value,
      phone:           document.getElementById('profilePhone').value,
      address:         document.getElementById('profileAddress').value,
      currentPassword: document.getElementById('currentPassword').value,
      newPassword:     document.getElementById('newPassword').value
    });
    if (res.success) {
      currentUser.name    = document.getElementById('profileName').value;
      currentUser.phone   = document.getElementById('profilePhone').value;
      currentUser.address = document.getElementById('profileAddress').value;
      localStorage.setItem('gasUser', JSON.stringify(currentUser));
      updateAuthUI();
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value = '';
      showToast('✅ 資料更新成功！', 'success');
    } else {
      showToast(res.message, 'danger');
    }
  };
}

// ═══════════════════════════════════════════════════════════
// 頁面切換
// ═══════════════════════════════════════════════════════════
function showPage(page) {
  document.getElementById('heroSection').style.display   = page === 'shop' ? '' : 'none';
  document.getElementById('shopSection').style.display   = page === 'shop' ? '' : 'none';
  document.getElementById('ordersSection').style.display = page === 'orders' ? '' : 'none';
  document.getElementById('profileSection').style.display= page === 'profile' ? '' : 'none';
  if (page === 'orders') loadOrders();
  if (page === 'profile') loadProfile();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════════════════════════════════════════════
// 認證 UI
// ═══════════════════════════════════════════════════════════
function updateAuthUI() {
  const loggedIn = !!currentUser;
  document.getElementById('authButtons').style.display = loggedIn ? 'none' : 'flex';
  document.getElementById('userMenu').style.display    = loggedIn ? 'flex' : 'none';
  document.getElementById('nav-orders').style.display  = loggedIn ? '' : 'none';
  document.getElementById('nav-profile').style.display = loggedIn ? '' : 'none';
  if (loggedIn) {
    document.getElementById('userGreeting').textContent = `👤 ${currentUser.name}`;
  }
}

function logout() {
  currentUser = null;
  localStorage.removeItem('gasUser');
  updateAuthUI();
  showPage('shop');
  showToast('已登出', 'info');
}

// ═══════════════════════════════════════════════════════════
// 工具函式
// ═══════════════════════════════════════════════════════════
function showModal(id) {
  new bootstrap.Modal(document.getElementById(id)).show();
}

function switchModal(hideId, showId) {
  bootstrap.Modal.getInstance(document.getElementById(hideId))?.hide();
  setTimeout(() => showModal(showId), 400);
}

function showToast(msg, type = 'success') {
  const colorMap = { success:'bg-success', danger:'bg-danger', warning:'bg-warning text-dark', info:'bg-info' };
  const toast = document.getElementById('toastMsg');
  toast.className = `toast align-items-center text-white border-0 ${colorMap[type] || 'bg-secondary'}`;
  document.getElementById('toastText').textContent = msg;
  new bootstrap.Toast(toast, { delay: 3000 }).show();
}
</script>
