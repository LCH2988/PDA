<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>產品活動資料同步異動顯示系統 - 預設列表完整版</title>
<style>
  :root {
      --primary-color: #2E7D32; /* 更深、高對比的綠色 */
      --primary-hover: #1B5E20;
      --danger-color: #C62828;  /* 高對比紅 */
      --warning-color: #F57F17; /* 高對比橘黃 */
      --info-color: #1565C0;    /* 高對比藍 */
      --dark-color: #111111;    /* 極深黑 */
      --light-bg: #F4F6F8;
      --border-color: #333333;  /* 加粗加深的邊框，方便長輩閱讀 */
      --card-shadow: 0 8px 24px rgba(0,0,0,0.15);
      --transition: all 0.2s ease;
  }

  * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
  }

  body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
      background-color: #E5E9EC;
      color: #111111; /* 確保文字皆為高對比深色 */
      line-height: 1.5;
      padding: 10px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
  }

  /* 針對年長者特別設計：提供大字級切換 */
  body.huge-font {
      font-size: 20px;
  }
  body.huge-font .btn { font-size: 1.35rem; padding: 16px 20px; }
  body.huge-font .tab-btn { font-size: 1.5rem; padding: 18px; }
  body.huge-font .card-package { font-size: 2rem; }
  body.huge-font .card-code { font-size: 1.6rem; }
  body.huge-font .deal-label { font-size: 2rem; width: 80px; }
  body.huge-font .deal-value { font-size: 2rem; }
  body.huge-font .price-tag { font-size: 2.6rem; }
  body.huge-font .pv-tag { font-size: 2rem; }
  body.huge-font .stat-val { font-size: 2.2rem; }
  body.huge-font .stat-label { font-size: 1.1rem; }
  body.huge-font .filter-input { font-size: 1.3rem; padding: 14px; }
  body.huge-font .filter-label { font-size: 1.4rem; }
  body.huge-font .status-table th, body.huge-font .status-table td { font-size: 1.15rem; padding: 12px; }

  @media (min-width: 576px) {
      body { padding: 20px; }
  }

  .container {
      max-width: 1200px; /* 為了完整列表，稍微放寬容器 */
      width: 100%;
      margin: auto;
      background: white;
      border-radius: 20px;
      border: 3px solid #111111; /* 明確的主框線 */
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
  }

  /* 頂部 Header */
  .header {
      background: linear-gradient(135deg, var(--primary-color) 0%, #1B5E20 100%);
      color: white;
      padding: 18px 15px;
      text-align: center;
      border-bottom: 3px solid #111111;
  }

  .header h1 {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 1px;
  }

  .header p {
      font-size: 1.1rem;
      margin-top: 5px;
      font-weight: bold;
      opacity: 0.95;
  }

  @media (min-width: 768px) {
      .header { padding: 25px; }
      .header h1 { font-size: 2.2rem; }
      .header p { font-size: 1.2rem; }
  }

  /* 雙頁面切換 Tab 導覽列 */
  .tab-navigation {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background-color: #ECEFF1;
      border-bottom: 3px solid #111111;
  }

  .tab-btn {
      padding: 15px;
      font-size: 1.25rem;
      font-weight: 900;
      border: none;
      cursor: pointer;
      background-color: #ECEFF1;
      color: #555555;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      outline: none;
  }

  .tab-btn:first-child {
      border-right: 3px solid #111111;
  }

  .tab-btn.active {
      background-color: #FFFFFF;
      color: #111111;
      font-size: 1.35rem;
      box-shadow: inset 0 -6px 0 var(--primary-color);
  }

  /* 同步狀態列 */
  .sync-status {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      padding: 12px 20px;
      background: #E8F5E9; 
      border-bottom: 2px solid var(--border-color);
      font-size: 1.05rem;
      font-weight: bold;
      color: #2E7D32;
      text-align: center;
  }

  @media (min-width: 576px) {
      .sync-status {
          flex-direction: row;
          justify-content: space-between;
          text-align: left;
      }
  }

  .status-indicator {
      display: flex;
      align-items: center;
      gap: 10px;
  }

  .status-dot {
      width: 18px; /* 放大指示燈 */
      height: 18px;
      border-radius: 50%;
      background-color: #2E7D32;
      border: 2px solid #111111;
      flex-shrink: 0;
  }

  .status-dot.error { background-color: var(--danger-color); }
  .status-dot.loading { background-color: var(--warning-color); }

  /* 控制與篩選面板 */
  .controls {
      padding: 15px;
      border-bottom: 2px solid var(--border-color);
      background-color: #F8F9FA;
  }

  @media (min-width: 768px) {
      .controls { padding: 20px 25px; }
  }

  .control-group {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* 手機版按鈕兩兩並排 */
      gap: 10px;
      margin-bottom: 12px;
  }

  @media (min-width: 768px) {
      .control-group {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 12px;
          margin-bottom: 15px;
      }
  }

  .control-group:last-child {
      margin-bottom: 0;
  }

  /* 樂齡友善大按鈕：實體化、厚重感、防誤觸 */
  .btn {
      padding: 12px 15px;
      border: 2px solid #111111;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 900;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: white;
      text-decoration: none;
      box-shadow: 0 4px 0 #111111; /* 實體 3D 厚度按鈕 */
      position: relative;
      top: 0;
      width: 100%; /* 手機版撐滿網格 */
  }

  @media (min-width: 768px) {
      .btn {
          padding: 15px 28px;
          font-size: 1.2rem;
          box-shadow: 0 6px 0 #111111;
          width: auto;
      }
  }

  .btn:active {
      top: 4px;
      box-shadow: 0 1px 0 #111111;
  }
  @media (min-width: 768px) {
      .btn:active { box-shadow: 0 2px 0 #111111; }
  }

  .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      top: 0;
      box-shadow: 0 4px 0 #666;
  }

  .btn-primary { background-color: #1565C0; }
  .btn-primary:hover:not(:disabled) { background-color: #0D47A1; }
  .btn-success { background-color: #2E7D32; }
  .btn-success:hover:not(:disabled) { background-color: #1B5E20; }
  .btn-warning { background-color: #EF6C00; color: white; }
  .btn-warning:hover:not(:disabled) { background-color: #E65100; }
  .btn-info { background-color: #00838F; }
  .btn-info:hover:not(:disabled) { background-color: #006064; }
  .btn-secondary { background-color: #424242; }
  .btn-secondary:hover:not(:disabled) { background-color: #212121; }
  
  /* 特別針對年長者設計的字級切換鈕 */
  .btn-font-toggle {
      background-color: #6A1B9A;
      grid-column: span 2; /* 手機版獨佔一行，最顯眼 */
  }
  @media (min-width: 768px) {
      .btn-font-toggle { grid-column: auto; }
  }
  .btn-font-toggle:hover {
      background-color: #4A148C;
  }

  /* 篩選下拉選單 - 加粗、放大 */
  .filter-container {
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      background: #E8F5E9; 
      padding: 10px 15px; 
      border-radius: 16px; 
      border: 2px solid #2E7D32;
      width: 100%;
      gap: 8px;
  }
  @media (min-width: 576px) {
      .filter-container {
          flex-direction: row;
          padding: 12px 25px;
          gap: 0;
      }
  }

  .filter-input {
      padding: 10px 16px;
      border: 3px solid #111111; /* 更粗的邊框使選單顯眼 */
      border-radius: 12px;
      font-size: 1.15rem;
      font-weight: 900;
      outline: none;
      transition: var(--transition);
      background-color: #fff;
      width: 100%;
      max-width: 260px;
      color: #111111;
      cursor: pointer;
      text-align: center;
  }

  .filter-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.25);
  }

  /* 樂齡友善：篩選標籤說明文字 */
  .filter-label {
      font-weight: 900;
      font-size: 1.2rem;
      color: #111111;
  }

  /* ==========================================
      ✨ 頁面一：產品卡片模式 (Card View)
     ========================================== */
  .page-view {
      display: none; /* 預設隱藏所有頁面 */
  }

  .page-view.active {
      display: flex;
      flex-direction: column;
  }

  .focus-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column; /* 手機版垂直排列：卡牌在上，按鈕在下 */
      align-items: center;
      justify-content: center;
      padding: 15px;
      background-color: #E5E9EC;
      gap: 15px;
  }

  @media (min-width: 768px) {
      .focus-area {
          flex-direction: row; /* 電腦版恢復水平排列 */
          padding: 25px;
          gap: 20px;
      }
  }

  /* 手機版導覽按鈕容器 */
  .mobile-nav-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      width: 100%;
      max-width: 700px;
  }
  @media (min-width: 768px) {
      .mobile-nav-container {
          display: none; /* 電腦版隱藏此容器 */
      }
  }

  /* 超醒目導覽切換大按鈕 */
  .nav-arrow {
      background: white;
      border: 3px solid #111111;
      border-radius: 16px;
      display: flex;
      flex-direction: row; /* 手機版改橫向排版 */
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 0 #111111;
      transition: var(--transition);
      user-select: none;
      position: relative;
      top: 0;
      padding: 15px;
      gap: 8px;
      width: 100%;
  }

  .nav-arrow span {
      font-size: 1.1rem;
      font-weight: 900;
  }

  @media (min-width: 768px) {
      .nav-arrow {
          width: 85px;
          height: 85px;
          border-radius: 50%;
          flex-direction: column; /* 電腦版維持圓形垂直排 */
          font-size: 2rem;
          box-shadow: 0 8px 0 #111111;
          padding: 0;
      }
      .nav-arrow span {
          font-size: 0.9rem;
          margin-top: -4px;
      }
  }

  .nav-arrow:hover:not(.disabled) {
      background: var(--primary-color);
      color: white;
  }

  .nav-arrow:active:not(.disabled) {
      top: 4px;
      box-shadow: 0 2px 0 #111111;
  }

  .nav-arrow.disabled {
      opacity: 0.3;
      cursor: not-allowed;
      box-shadow: 0 4px 0 #999;
  }

  /* 電腦版側邊導覽按鈕 (手機版隱藏) */
  .desktop-nav {
      display: none;
  }
  @media (min-width: 768px) {
      .desktop-nav {
          display: flex;
      }
  }

  /* 焦點卡牌本體 */
  .single-card {
      background: white;
      border-radius: 24px;
      border: 3px solid #111111;
      box-shadow: var(--card-shadow);
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: var(--transition);
  }

  /* 狀態邊條加粗，強化視覺提醒 */
  .single-card.force-close-row { border-top: 12px solid var(--danger-color); }
  .single-card.limited-row { border-top: 12px solid var(--warning-color); }
  .single-card.highlight-row { border-top: 15px solid var(--primary-color); }

  @media (min-width: 768px) {
      .single-card.force-close-row { border-top: 15px solid var(--danger-color); }
      .single-card.limited-row { border-top: 15px solid var(--warning-color); }
      .single-card.highlight-row { border-top: 15px solid var(--primary-color); }
  }

  /* 卡牌頭部 */
  .card-header {
      padding: 12px 15px;
      background-color: #F8F9FA;
      border-bottom: 2px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
  }

  @media (min-width: 576px) {
      .card-header { padding: 18px 25px; }
  }

  .card-index {
      font-size: 1.1rem;
      font-weight: 900;
      color: #111111;
      background: #E0E0E0;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid #111111;
  }

  @media (min-width: 576px) {
      .card-index { font-size: 1.3rem; padding: 6px 16px; }
  }

  .card-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
  }

  /* 徽章字體加大 */
  .badge {
      font-size: 1.05rem;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 900;
      border: 2px solid #111111;
  }

  @media (min-width: 576px) {
      .badge { font-size: 1.25rem; padding: 6px 14px; }
  }

  .badge-active { background-color: #C8E6C9; color: #1B5E20; }
  .badge-close { background-color: #FFCDD2; color: #B71C1C; }
  .badge-limit { background-color: #FFE082; color: #E65100; }

  /* 卡牌大圖 */
  .card-photo-wrapper {
      width: 100%;
      height: 220px; /* 手機版高度縮小 */
      background-color: #ECEFF1;
      position: relative;
      overflow: hidden;
      border-bottom: 2px solid var(--border-color);
  }

  @media (min-width: 768px) {
      .card-photo-wrapper { height: 300px; }
  }

  .card-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
  }

  .card-photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #444444;
      font-size: 1.2rem;
      font-weight: 900;
      gap: 8px;
      background: #ECEFF1;
      cursor: pointer;
      padding: 10px;
      text-align: center;
  }
  
  .card-photo-placeholder:hover {
      background: #CFD8DC;
  }

  /* 卡牌主體大字體內容 */
  .card-body {
      padding: 15px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 15px;
  }

  @media (min-width: 768px) {
      .card-body { padding: 25px; gap: 20px; }
  }

  .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
  }

  .card-package {
      color: #4A148C; /* 深紫色 */
      font-weight: 900;
      font-size: 1.4rem;
      word-break: break-all;
  }

  @media (min-width: 576px) {
      .card-package { font-size: 1.9rem; }
  }

  .card-code {
      background-color: #FFF9C4;
      padding: 4px 10px;
      border-radius: 8px;
      border: 2px solid #111111;
      font-weight: 900;
      color: #F57F17;
      font-size: 1.15rem;
      flex-shrink: 0;
  }

  @media (min-width: 576px) {
      .card-code { font-size: 1.5rem; padding: 6px 16px; }
  }

  /* 買送大字體區 */
  .card-deal {
      background: #F8F9FA;
      border-radius: 16px;
      padding: 15px;
      border: 2px solid #111111;
  }

  @media (min-width: 576px) {
      .card-deal { padding: 20px 25px; }
  }

  .deal-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
  }

  .deal-row:last-child { margin-bottom: 0; }

  .deal-label {
      font-weight: 900;
      width: 55px;
      color: #111111;
      font-size: 1.4rem;
      flex-shrink: 0;
  }

  @media (min-width: 576px) {
      .deal-label { font-size: 1.9rem; width: 70px; }
  }

  .deal-value {
      flex-grow: 1;
      color: #000000;
      font-weight: 900;
      font-size: 1.4rem;
      word-break: break-all;
  }

  @media (min-width: 576px) {
      .deal-value { font-size: 1.9rem; }
  }

  /* 價格與點數大字體 */
  .card-pricing {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 0;
      border-bottom: 3px dashed #111111;
  }

  @media (min-width: 576px) {
      .card-pricing {
          flex-direction: row;
          justify-content: space-between;
          padding: 15px 0;
          gap: 0;
      }
  }

  .price-tag {
      font-size: 2rem;
      font-weight: 900;
      color: #D32F2F;
  }

  .pv-tag {
      font-size: 1.5rem;
      font-weight: 900;
      color: #1976D2;
  }

  @media (min-width: 576px) {
      .price-tag { font-size: 2.6rem; }
      .pv-tag { font-size: 2rem; }
  }

  /* 數量統計區 */
  .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: center;
  }

  @media (min-width: 576px) {
      .card-stats { gap: 20px; }
  }

  .stat-box {
      background: #ECEFF1;
      padding: 10px;
      border-radius: 14px;
      border: 2px solid #111111;
  }

  @media (min-width: 576px) {
      .stat-box { padding: 15px; }
  }

  .stat-val {
      font-size: 1.7rem;
      font-weight: 900;
  }

  .stat-val.serial { color: #6A1B9A; }
  .stat-val.rush { color: #E65100; }

  @media (min-width: 576px) {
      .stat-val { font-size: 2.2rem; }
  }
  
  .stat-label {
      color: #111111;
      font-size: 0.95rem;
      font-weight: 900;
      margin-top: 4px;
  }

  @media (min-width: 576px) {
      .stat-label { font-size: 1.15rem; margin-top: 6px; }
  }

  /* 卡牌底部控制開關 */
  .card-footer {
      padding: 15px;
      background-color: #F8F9FA;
      border-top: 2px solid var(--border-color);
      display: grid;
      grid-template-columns: 1fr 1fr; /* 手機版開賣/結單並排 */
      gap: 10px;
  }

  @media (min-width: 768px) {
      .card-footer {
          padding: 20px 25px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 15px;
      }
  }

  /* 明確的 Switch 按鈕，供年長者勾選 */
  .switch-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: 900;
      background: white;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #111111;
      cursor: pointer;
      width: 100%;
  }

  @media (min-width: 768px) {
      .switch-group {
          width: auto;
          font-size: 1.35rem;
          padding: 10px 18px;
      }
  }

  .switch-group input[type="checkbox"] {
      width: 24px; /* 加大核取方塊 */
      height: 24px;
      cursor: pointer;
      flex-shrink: 0;
  }

  @media (min-width: 768px) {
      .switch-group input[type="checkbox"] {
          width: 28px;
          height: 28px;
      }
  }

  .btn-edit-product {
      grid-column: span 2; /* 手機版修改按鈕獨佔整行 */
      width: 100%;
  }
  @media (min-width: 768px) {
      .btn-edit-product {
          grid-column: auto;
          width: auto;
      }
  }

  /* ==========================================
      📋 頁面二：產品列表模式 (List View - 顯示所有資訊)
     ========================================== */
  .status-list-section {
      padding: 15px;
      background-color: #FFFFFF;
      flex-grow: 1;
  }
  @media (min-width: 768px) {
      .status-list-section { padding: 25px; }
  }

  .section-title {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 15px;
      color: #111111;
      display: flex;
      align-items: center;
      gap: 8px;
      border-left: 6px solid var(--primary-color);
      padding-left: 12px;
  }

  /* 電腦版表格排版 - 擴大欄位容納完整資訊 */
  .table-container {
      display: none; /* 預設手機版隱藏表格 */

  }

  .status-table th {

  .status-table tr:last-child td {

  }

  .status-table tr:hover {

  /* 手機版卡片式列表排版 */
  .mobile-list-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
  }
  @media (min-width: 768px) {

  .mobile-status-card {

  .mobile-card-title {

  .mobile-card-desc {

  /* 載入中 */
  .loading {
      text-align: center;
      padding: 40px 15px;
      color: #111111;
      font-size: 1.4rem;
      font-weight: bold;
  }

  @media (min-width: 768px) {
      .loading { padding: 60px 20px; font-size: 1.7rem; }
  }

  .spinner {
      border: 6px solid #f3f3f3;
      border-top: 6px solid var(--primary-color);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
  }

  @media (min-width: 768px) {
      .spinner {
          border: 8px solid #f3f3f3;
          border-top: 8px solid var(--primary-color);
          width: 80px;
          height: 80px;
      }
  }

  @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
  }

  /* 模態框 (彈出視窗) */
  .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.7);
      backdrop-filter: blur(5px);
      overflow-y: auto;
  }

  .modal-content {
      background-color: #FFFFFF;
      margin: 5% auto;
      padding: 20px;
      border-radius: 20px;
      border: 3px solid #111111;
      width: 92%;
      max-width: 600px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  }

  @media (min-width: 768px) {
      .modal-content { margin: 3% auto; padding: 30px; width: 94%; }

  .close {
      color: #111111;
      font-size: 2.5rem;
      font-weight: 900;
      cursor: pointer;
      position: absolute;

      height: 50px;
      border-radius: 50%;
      border: 2px solid #111111;

  @media (min-width: 768px) {
      .close { font-size: 3.5rem; right: 20px; width: 60px; height: 60px; }
  }

  .close:hover { background: #BDBDBD; }

  .form-group {
      margin-bottom: 18px;
  }

  .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 900;
      font-size: 1.15rem;

  }

  @media (min-width: 768px) {
      .form-group label { font-size: 1.3rem; margin-bottom: 10px; }

  .form-group input,
  .form-group textarea {
      width: 100%;
      padding: 12px 15px;

  @media (min-width: 768px) {

  .form-group input:focus, .form-group textarea:focus {

  /* 提示通知 */
  .notification {
      position: fixed;

      border: 3px solid #111111;
      color: white;
      font-weight: 900;
      z-index: 1050;
      opacity: 0;

  }

  @media (min-width: 576px) {
      .notification {
          left: auto;
          right: 30px;
          bottom: 30px;
          width: auto;
          max-width: 400px;
          font-size: 1.35rem;
          text-align: left;
          padding: 20px 35px;

  .notification.show {
      opacity: 1;

  }

  .notification.success { background-color: #2E7D32; }
  .notification.error { background-color: #C62828; }
  .notification.warning { background-color: #EF6C00; }
  .notification.info { background-color: #1565C0; }

  .photo-preview-large {
      max-width: 100%;
      max-height: 240px;
      object-fit: contain;
      border-radius: 12px;
      margin: 15px 0;
      border: 2.5px solid #111111;
  }

  @media (min-width: 768px) {
      .photo-preview-large { max-height: 320px; }

  .photo-actions {

  @media (min-width: 576px) {

  /* 頁面下方導覽指示器 */
  .page-indicator {

  }

  @media (min-width: 768px) {
      .page-indicator { padding: 15px; font-size: 1.4rem; }

</style>

<body>
<div class="container">
  <div class="header">
      <h1>產品設定系統</h1>
      <p>BOGO 買一送一活動管理</p>
  </div>

  <!-- 雙頁面切換導覽列 (預設列表模式 Active) -->
  <div class="tab-navigation">
      <button class="tab-btn" id="tabCardBtn" onclick="switchPage('card')">
          <span>📱</span> 產品卡片模式
      </button>
      <button class="tab-btn active" id="tabListBtn" onclick="switchPage('list')">
          <span>📋</span> 產品列表模式
      </button>
  </div>

  <div class="sync-status">
      <div class="status-indicator">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">正在連接...</span>
      </div>
      <div>
          <span>最後更新時間: </span>
          <span id="lastUpdate">-</span>
      </div>
  </div>

  

  <!-- 🔄 頁面一：單張卡牌焦點區域 (預設隱藏) -->
  <div id="cardViewPage" class="page-view">
      <div class="focus-area">
          <!-- 電腦版左導覽箭頭 (手機版會隱藏) -->
          <div class="nav-arrow desktop-nav" id="prevBtn" onclick="prevCard()" title="上一張">
              <span>◀</span>
              <span>上一張</span>
          </div>
          
          <div class="loading" id="loadingIndicator">
              <div class="spinner"></div>
              <p>正在努力下載資料，請稍候...</p>
          </div>

          <div class="single-card" id="activeCard" style="display: none;">
              <!-- 由 JavaScript 動態渲染單張卡牌 -->
          </div>

          <!-- 電腦版右導覽箭頭 (手機版會隱藏) -->
          <div class="nav-arrow desktop-nav" id="nextBtn" onclick="nextCard()" title="下一張">
              <span>▶</span>
              <span>下一張</span>
          </div>

          <!-- 手機版專屬導覽按鈕容器 (電腦版會隱藏) -->
          <div class="mobile-nav-container" id="mobileNavContainer">
              <div class="nav-arrow" id="prevBtnMobile" onclick="prevCard()">
                  <span>◀ 上一張</span>
              </div>
              <div class="nav-arrow" id="nextBtnMobile" onclick="nextCard()">
                  <span>下一張 ▶</span>
              </div>
          </div>
      </div>
  </div>

  <!-- 📋 頁面二：產品列表模式 (List View - 預設顯示) -->
  <div id="listViewPage" class="page-view active">
      <div class="status-list-section">
          <h2 class="section-title">📋 產品完整活動狀態列表 <span style="font-size: 1rem; font-weight: bold; color: #666;">(點擊項目可直接修改或查看)</span></h2>
          
          <!-- 電腦版表格 (顯示所有欄位) -->
          <div class="table-container">
              <table class="status-table">
                  <thead>
                      <tr>
                          <th>套組分類</th>
                          <th>產品代號</th>
                          <th>買商品</th>
                          <th>送商品</th>
                          <th>單價 (NT$)</th>
                          <th>PV點數</th>
                          <th>限量數量</th>
                          <th>接龍登記</th>
                          <th>官網搶購</th>
                          <th>開賣狀態</th>
                          <th>強制結單</th>
                          <th>操作</th>
                      </tr>
                  </thead>
                  <tbody id="statusTableBody">
                      <!-- 由 JS 動態生成 -->
                  </tbody>
              </table>
          </div>

          <!-- 手機版列表 (整合所有欄位) -->
          <div class="mobile-list-container" id="mobileListContainer">
              <!-- 由 JS 動態生成 -->
          </div>
      </div>
  </div>

  <!-- 頁面指示器 (預設隱藏，因為預設為列表) -->
  <div class="page-indicator" id="pageIndicator" style="display: none;">
      無資料
  </div>
</div>

<!-- 照片編輯模態框 -->
<div id="photoEditModal" class="modal">
  <div class="modal-content">
      <span class="close" onclick="closePhotoModal()">&times;</span>
      <h2 style="margin-bottom: 20px; font-weight: 900;">📷 編輯產品照片</h2>
      <div class="form-group">
          <label>圖片網址 (請輸入完整網址)</label>
          <input type="url" id="photoUrlInput" placeholder="例如: https://example.com/image.jpg">
          <small style="color: #444; margin-top: 6px; display: block; font-size: 1rem; font-weight: bold;">支援格式：JPG, PNG, GIF, WebP</small>
      </div>
      <div class="form-group">
          <label>圖片預覽：</label>
          <div id="photoPreviewContainer" style="text-align: center;">
              <div class="card-photo-placeholder" style="border: 3px dashed #111;">無圖片預覽</div>
          </div>
      </div>
      <div class="photo-actions">
          <button type="button" class="btn btn-success" onclick="savePhotoUrl()">儲存此照片</button>
          <button type="button" class="btn btn-warning" onclick="clearPhoto()">清除此照片</button>
          <button type="button" class="btn btn-secondary" onclick="closePhotoModal()">放棄取消</button>
      </div>
  </div>
</div>

<!-- 編輯模態框 -->
<div id="editModal" class="modal">
  <div class="modal-content">
      <span class="close" onclick="closeEditModal()">&times;</span>
      <h2 style="margin-bottom: 20px; font-weight: 900;">✏️ 編輯產品資料</h2>
      <form id="editForm">
          <div class="form-group">
              <label>套組分類 (唯讀)</label>
              <input type="text" id="editPackage" readonly style="background-color: #E0E0E0; color: #424242; border: 2px dashed #999;">
          </div>
          <div class="form-group">
              <label>產品代號 (唯讀)</label>
              <input type="text" id="editProductCode" readonly style="background-color: #E0E0E0; color: #424242; border: 2px dashed #999;">
          </div>
          <div class="form-group">
              <label>買商品 (例如：薰衣草精油 15ml)</label>
              <input type="text" id="editBuyProduct" required>
          </div>
          <div class="form-group">
              <label>送商品 (例如：薄荷精油 15ml)</label>
              <input type="text" id="editGiftProduct" required>
          </div>
          <div class="form-group">
              <label>產品單價 (新台幣元)</label>
              <input type="number" id="editPrice" min="0" step="1" required>
          </div>
          <div class="form-group">
              <label>PV 點數 (整數)</label>
              <input type="number" id="editPvPoints" min="0" step="1" required>
          </div>
          <div class="form-group">
              <label>限量數量 (若不限量請填 0)</label>
              <input type="number" id="editLimitQty" min="0" step="1">
          </div>
          <div class="form-group">
              <label>產品照片連結網址</label>
              <textarea id="editPhotoLink" placeholder="請輸入圖片 URL (以 http:// 或 https:// 開頭)"></textarea>
          </div>
          <div style="display: flex; gap: 15px; justify-content: flex-end; margin-top: 25px; flex-wrap: wrap;">
              <button type="button" class="btn btn-success" onclick="saveEdit()">確認儲存</button>
              <button type="button" class="btn btn-secondary" onclick="closeEditModal()">取消放棄</button>
          </div>
      </form>
  </div>
</div>

<script>
  // =========================================================================
  // ⚠️ 請在此處填入您部署 Google Apps Script Web App 後產生的網頁應用程式 URL 網址
  // =========================================================================
  const API_URL = "https://script.google.com/macros/s/AKfycbw2bjJ1NzBNDoJTsIEqO9uZU4_6aICWLYOhpmisakKbWXBCyzqsDxAGyEMe--HAwiXEWw/exec"; 

  // 全域變數
  let allProductData = [];
  let filteredData = [];
  let currentIndex = 0; // 當前顯示的卡牌索引
  let currentEditingRow = null;
  let currentPhotoEditRow = null;
  let currentActiveTab = 'list'; // 🌟 變更預設分頁為：'list'

  // 初始化頁面
  document.addEventListener('DOMContentLoaded', function() {
      initializePage();
  });

  function initializePage() {
      updateStatusIndicator('loading', '正在嘗試連接雲端...');
      refreshData();
  }

  // 頁面切換邏輯
  function switchPage(tabName) {
      currentActiveTab = tabName;
      
      // 移除所有 Active 狀態
      document.getElementById('tabCardBtn').classList.remove('active');
      document.getElementById('tabListBtn').classList.remove('active');
      document.getElementById('cardViewPage').classList.remove('active');
      document.getElementById('listViewPage').classList.remove('active');

      // 啟用選中的分頁
      if (tabName === 'card') {
          document.getElementById('tabCardBtn').classList.add('active');
          document.getElementById('cardViewPage').classList.add('active');
          document.getElementById('pageIndicator').style.display = 'block';
          renderActiveCard();
      } else {
          document.getElementById('tabListBtn').classList.add('active');
          document.getElementById('listViewPage').classList.add('active');
          document.getElementById('pageIndicator').style.display = 'none'; // 列表頁隱藏頁碼指示器
          renderStatusList();
      }
  }

  // 大字體切換功能
  function toggleFontSize() {
      document.body.classList.toggle('huge-font');
      const hasClass = document.body.classList.contains('huge-font');
      showNotification(hasClass ? '已啟用樂齡大字體模式！' : '已恢復標準字體。', 'info');
  }

  // 重新整理資料 (API 模式)
  function refreshData() {
      updateStatusIndicator('loading', '正在讀取最新資料...');
      setButtonsEnabled(false);
      showLoading();
      
      if (API_URL && !API_URL.includes("您的部署ID")) {
          fetch(`${API_URL}?action=getAll`)
              .then(response => response.json())
              .then(result => {
                  if (result.success) {
                      onDataLoaded(result.data);
                  } else {
                      onError(new Error(result.message || '無法取得資料'));
                  }
              })
              .catch(err => {
                  onError(new Error('網路連線失敗，請檢查 API 網址或 CORS 設定：' + err.message));
              });
      } else {
          // 本地開發/測試模擬數據 (當未填寫 API_URL 時)
          setTimeout(function() {
              const mockData = [
                  { rowIndex: 2, package: "BOGO 第1天套組", productCode: "BOGO01", buyProduct: "精油保濕洗髮乳 (模擬)", giftProduct: "精油柔順護髮素 (模擬)", price: 950, pvPoints: 25, limitQty: 100, serialQty: 12, rushQty: 8, isActive: true, isForceClose: false, photoLink: "" },
                  { rowIndex: 3, package: "BOGO 第2天套組", productCode: "BOGO02", buyProduct: "薰衣草舒緩精油 15ml (模擬)", giftProduct: "野橘活力精油 15ml (模擬)", price: 1250, pvPoints: 35, limitQty: 0, serialQty: 45, rushQty: 30, isActive: true, isForceClose: false, photoLink: "" },
                  { rowIndex: 4, package: "BOGO 第3天套組", productCode: "BOGO03", buyProduct: "乳香精油 15ml (模擬)", giftProduct: "神氣複方精油 15ml (模擬)", price: 2980, pvPoints: 80, limitQty: 50, serialQty: 48, rushQty: 2, isActive: false, isForceClose: true, photoLink: "" }
              ];
              onDataLoaded(mockData);
              showNotification("目前運行在展示模擬模式 (請於 JS 中設定 API_URL)", "info");
          }, 1000);
      }
  }

  // 資料載入成功
  function onDataLoaded(data) {
      try {
          allProductData = data || [];
          filteredData = [...allProductData];
          
          if (currentIndex >= filteredData.length) {
              currentIndex = 0;
          }
          
          renderActiveCard();
          renderStatusList(); // 渲染狀態列表
          updateLastUpdateTime();
          updateStatusIndicator('success', `已成功同步 ${allProductData.length} 筆產品資料`);
          setButtonsEnabled(true);
          hideLoading();
          
      } catch (error) {
          console.error('處理資料時發生錯誤:', error);
          onError('資料處理失敗: ' + error.message);
      }
  }

  // 錯誤處理
  function onError(error) {
      console.error('API 錯誤:', error);
      updateStatusIndicator('error', '連線失敗: ' + (error.message || error));
      setButtonsEnabled(true);
      hideLoading();
      showNotification('操作失敗: ' + (error.message || error), 'error');
  }

  // 渲染當前選中的單張卡牌
  function renderActiveCard() {
      const cardContainer = document.getElementById('activeCard');
      const pageIndicator = document.getElementById('pageIndicator');
      const mobileNav = document.getElementById('mobileNavContainer');
      
      if (filteredData.length === 0) {
          cardContainer.style.display = 'none';
          if (mobileNav) mobileNav.style.display = 'none';
          pageIndicator.textContent = '該天數目前沒有產品活動資料。';
          updateNavigationButtons();
          return;
      }

      cardContainer.style.display = 'flex';
      if (mobileNav && window.innerWidth < 768) {
          mobileNav.style.display = 'grid';
      }
      const item = filteredData[currentIndex];

      // 狀態色彩標記
      cardContainer.className = 'single-card';
      if (item.isForceClose) {
          cardContainer.classList.add('force-close-row');
      } else if (item.limitQty > 0) {
          cardContainer.classList.add('limited-row');
      } else if (item.isActive) {
          cardContainer.classList.add('highlight-row');
      }

      // 照片顯示
      let photoHTML = '';
      if (item.photoLink && item.photoLink.trim()) {
          photoHTML = `<img src="${item.photoLink}" class="card-img" onclick="event.stopPropagation();showPhotoModal('${item.photoLink}')" onerror="this.parentElement.innerHTML='<div class=\\'card-photo-placeholder\\'>圖片網址無效或損毀</div>'" title="點擊查看大圖">`;
      } else {
          photoHTML = `
            <div class="card-photo-placeholder" onclick="openPhotoEditModal(${item.rowIndex}, '${item.photoLink || ''}')">
                <span style="font-size: 2.5rem;">📷</span>
                <span>點擊這裡為產品添加照片</span>
            </div>`;
      }

      // 徽章狀態標籤
      let badgesHTML = '';
      if (item.isActive) badgesHTML += '<span class="badge badge-active">🟢 已開賣</span>';
      if (item.isForceClose) badgesHTML += '<span class="badge badge-close">🔴 已結單</span>';
      if (item.limitQty > 0) badgesHTML += `<span class="badge badge-limit">⚠️ 限量:${item.limitQty}</span>`;

      cardContainer.innerHTML = `
          <div class="card-header">
              <span class="card-index">表格第 ${item.rowIndex} 列</span>
              <div class="card-badges">${badgesHTML}</div>
          </div>
          <div class="card-photo-wrapper">
              ${photoHTML}
          </div>
          <div class="card-body">
              <div class="card-meta">
                  <span class="card-package">${item.package}</span>

    // 輔助防手抖切換
    function triggerToggleSale(rowIndex) {
        const checkbox = document.getElementById(`sale-${rowIndex}`);
        if (checkbox) {
            checkbox.checked = !checkbox.checked;
            toggleOpenSale(rowIndex, checkbox.checked);
        }
    }

    function triggerToggleClose(rowIndex) {
        const checkbox = document.getElementById(`close-${rowIndex}`);
        if (checkbox) {
            checkbox.checked = !checkbox.checked;
            toggleForceClose(rowIndex, checkbox.checked);
        }
    }

    // 更新導覽按鈕 (同時支援手機與電腦版)
    function updateNavigationButtons() {
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtnMobile = document.getElementById('prevBtnMobile');
        const nextBtnMobile = document.getElementById('nextBtnMobile');

        const isFirst = currentIndex <= 0;
        const isLast = currentIndex >= filteredData.length - 1;

        // 電腦版按鈕狀態
        if (isFirst) {
            prevBtn.classList.add('disabled');
            if (prevBtnMobile) prevBtnMobile.classList.add('disabled');
        } else {
            prevBtn.classList.remove('disabled');
            if (prevBtnMobile) prevBtnMobile.classList.remove('disabled');
        }

        if (isLast) {
            nextBtn.classList.add('disabled');
            if (nextBtnMobile) nextBtnMobile.classList.add('disabled');
        } else {
            nextBtn.classList.remove('disabled');
            if (nextBtnMobile) nextBtnMobile.classList.remove('disabled');
        }
    }

    // 儲存照片網址 (API 模式)
    function savePhotoUrl() {
        if (!currentPhotoEditRow) return;
        
        const urlInput = document.getElementById('photoUrlInput');
        const photoUrl = urlInput.value.trim();
        
        if (photoUrl && !isValidImageUrl(photoUrl)) {
            showNotification('請輸入正確的圖片網址 (包含 http:// 或 https://)', 'warning');
            return;
        }
        
        if (!confirm('您確定要為此商品設定這張照片嗎？')) return;

        updateStatusIndicator('loading', '正在上傳照片網址...');
        
        if (API_URL && !API_URL.includes("您的部署ID")) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateProduct',
                    rowIndex: currentPhotoEditRow,
                    data: { photoLink: photoUrl }
                })
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    const item = allProductData.find(p => p.rowIndex === currentPhotoEditRow);
                    if (item) {
                        item.photoLink = photoUrl;
                    }
                    renderActiveCard();
                    renderStatusList();
                    closePhotoModal();
                    updateStatusIndicator('success', '照片儲存成功');
                    showNotification('照片已成功更新！', 'success');
                } else {
                    onError(new Error(result.message));
                }
            })
            .catch(onError);
        } else {
            const item = allProductData.find(p => p.rowIndex === currentPhotoEditRow);
            if (item) {
                item.photoLink = photoUrl;
            }
            renderActiveCard();
            renderStatusList();
            closePhotoModal();
            updateStatusIndicator('success', '模擬儲存照片成功');
            showNotification('照片已成功模擬更新！', 'success');
        }
    }

    function isValidImageUrl(url) {
        try {
            const urlObj = new URL(url);
            const validProtocols = ['http:', 'https:'];
            return validProtocols.includes(urlObj.protocol);
        } catch (e) {
            return false;
        }
    }

    // 匯出資料 (API 模式)
    function exportData() {
        updateStatusIndicator('loading', '正在嘗試匯出並下載檔案...');

        if (API_URL && !API_URL.includes("您的部署ID")) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'exportCSV' })
            })
            .then(res => res.json())
            .then(result => {
                if (result.success && result.csvData) {
                    downloadCSV(result.csvData);
                    updateStatusIndicator('success', '產品資料下載完成');
                    showNotification('產品資料已成功下載為 CSV 檔！', 'success');
                } else {
                    onError(new Error(result.message || '匯出失敗'));
                }
            })
            .catch(onError);
        } else {
            const mockCsv = [
                ["索引列", "套組分類", "產品代號", "買商品", "送商品", "單價", "PV", "限量"],
                [2, "BOGO 第1天套組", "BOGO01", "精油保濕洗髮乳", "精油柔順護髮素", 950, 25, 100],
                [3, "BOGO 第2天套組", "BOGO02", "薰衣草舒緩精油 15ml", "野橘活力精油 15ml", 1250, 35, 0]
            ];
            downloadCSV(mockCsv);
            updateStatusIndicator('success', '模擬下載 CSV 完成');
            showNotification('模擬資料已成功下載！', 'success');
        }
    }

    function downloadCSV(csvData) {
        const csvContent = csvData.map(row => row.join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        
        link.setAttribute('href', url);
        link.setAttribute('download', `產品活動資料_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

            pvPoints: parseInt(document.getElementById('editPvPoints').value),
            limitQty: parseInt(document.getElementById('editLimitQty').value) || 0,
            photoLink: document.getElementById('editPhotoLink').value.trim()
        };

        if (!updateData.buyProduct || !updateData.giftProduct) {
            showNotification('請務必填寫完整的「買商品」和「送商品」名稱！', 'warning');
            return;
        }

        if (isNaN(updateData.price) || updateData.price < 0) {
            showNotification('請輸入正確的價格數字，不可低於 0 元！', 'warning');
            return;
        }

        if (isNaN(updateData.pvPoints) || updateData.pvPoints < 0) {
            showNotification('請輸入正確的 PV 點數！', 'warning');
            return;
        }

        if (!confirm('您確定要更新並儲存此產品的資料至雲端試算表嗎？')) {
            return;
        }

        updateStatusIndicator('loading', '正在儲存修改至雲端，請勿關閉網頁...');

        if (API_URL && !API_URL.includes("您的部署ID")) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'updateProduct',
                    rowIndex: currentEditingRow,
                    data: updateData
                })
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    const item = allProductData.find(p => p.rowIndex === currentEditingRow);
                    if (item) {
                        Object.assign(item, updateData);
                    }
                    renderActiveCard();
                    renderStatusList();
                    closeEditModal();
                    updateStatusIndicator('success', '資料儲存成功');
                    showNotification('雲端產品資料已成功更新！', 'success');
                } else {
                    onError(new Error(result.message));
                }
            })
            .catch(onError);
        } else {
            const item = allProductData.find(p => p.rowIndex === currentEditingRow);
            if (item) {
                Object.assign(item, updateData);
            }
            renderActiveCard();
            renderStatusList();
            closeEditModal();
            updateStatusIndicator('success', '模擬儲存修改成功');
            showNotification('模擬資料已成功在本地端更新！', 'success');
        }
    }

    function updateStatusIndicator(status, message) {
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        statusDot.className = `status-dot ${status}`;
        statusText.textContent = message;
    }

    function updateLastUpdateTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('lastUpdate').textContent = timeString;
    }

    function setButtonsEnabled(enabled) {
        const buttons = ['refreshBtn', 'syncBtn', 'exportBtn'];
        buttons.forEach(btnId => {
            const btn = document.getElementById(btnId);
            if (btn) btn.disabled = !enabled;
        });
    }

    function showLoading() {
        document.getElementById('loadingIndicator').style.display = 'block';
        document.getElementById('activeCard').style.display = 'none';
        const mobileNav = document.getElementById('mobileNavContainer');
        if (mobileNav) mobileNav.style.display = 'none';
    }

    function hideLoading() {
        document.getElementById('loadingIndicator').style.display = 'none';
    }

    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.classList.add('show');
        }, 100);
        
        setTimeout(() => {
            notification.classList.remove('show');
            setTimeout(() => {
                document.body.removeChild(notification);
            }, 300);
        }, 4000);
    }

    // 監聽視窗大小改變，動態調整手機版/電腦版導覽按鈕顯示
    window.addEventListener('resize', function() {
        const mobileNav = document.getElementById('mobileNavContainer');
        if (mobileNav) {
            if (window.innerWidth < 768 && filteredData.length > 0 && currentActiveTab === 'card') {
                mobileNav.style.display = 'grid';
            } else {
                mobileNav.style.display = 'none';
            }
        }
    });

    window.onclick = function(event) {
        const editModal = document.getElementById('editModal');
        const photoModal = document.getElementById('photoEditModal');
        
        if (event.target === editModal) {
            closeEditModal();
        }
        if (event.target === photoModal) {
            closePhotoModal();
        }
    };

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeEditModal();
            closePhotoModal();
        }
        if (e.key === 'ArrowLeft' && currentActiveTab === 'card') {
            prevCard();
        }
        if (e.key === 'ArrowRight' && currentActiveTab === 'card') {
            nextCard();
        }
    });
</script>
</body>
</html>
