<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>帕金森病友權益促進會</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{
  --primary:#4A90D9;--primary-dark:#2c6fad;--primary-light:#e8f4fd;
  --secondary:#6c757d;--success:#28a745;--danger:#dc3545;
  --warning:#ffc107;--info:#17a2b8;
  --light:#f8f9fa;--dark:#343a40;--border:#dee2e6;
  --shadow:0 2px 15px rgba(0,0,0,.1);--shadow-lg:0 8px 30px rgba(0,0,0,.15);
  --radius:12px;--radius-sm:8px;--transition:all .3s ease;
  --font:'Segoe UI','Microsoft JhengHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#f0f4f8;color:var(--dark);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;outline:none;background:none}
input,textarea,select{outline:none;font-family:var(--font)}
img{max-width:100%}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#4A90D9,#2c6fad);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-content{text-align:center;color:#fff}
.loading-logo{font-size:64px;margin-bottom:16px;animation:pulse 1.5s infinite}
.loading-text{font-size:26px;font-weight:700;margin-bottom:24px;letter-spacing:3px}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}

.navbar{position:fixed;top:0;left:0;right:0;height:64px;background:#fff;box-shadow:var(--shadow);z-index:1000;display:flex;align-items:center;padding:0 20px;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:var(--primary);min-width:150px;white-space:nowrap}
.nav-brand i{font-size:24px}
.nav-menu{display:flex;gap:4px;flex:1;justify-content:center}
.nav-item{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);color:var(--secondary);font-size:14px;font-weight:500;transition:var(--transition);white-space:nowrap}
.nav-item:hover,.nav-item.active{background:var(--primary-light);color:var(--primary)}
.nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-notif{position:relative;width:40px;height:40px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.btn-notif:hover{background:var(--primary-light);color:var(--primary)}
.notif-badge{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
.btn-menu{display:none;width:40px;height:40px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:18px;align-items:center;justify-content:center}
.nav-menu.mobile-open{display:flex;flex-direction:column;position:fixed;top:64px;left:0;right:0;background:#fff;padding:12px;box-shadow:var(--shadow);z-index:999;animation:slideUp .2s ease}
.nav-menu.mobile-open .nav-item{padding:12px 16px}

.notif-panel{position:fixed;top:70px;right:16px;width:320px;max-height:440px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:999;display:none;flex-direction:column;overflow:hidden;animation:fadeIn .2s ease}
.notif-panel.show{display:flex}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px}
.notif-header button{color:var(--primary);font-size:12px;font-weight:600}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.notif-item:hover{background:var(--light)}
.notif-item.unread{background:var(--primary-light)}
.notif-item .notif-title{font-weight:600;font-size:13px;margin-bottom:3px}
.notif-item .notif-body{font-size:12px;color:var(--secondary);line-height:1.4}
.notif-item .notif-time{font-size:11px;color:#bbb;margin-top:4px}

.main-content{margin-top:64px;margin-bottom:70px;min-height:calc(100vh - 134px)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:1000;justify-content:space-around;align-items:center}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--secondary);font-size:10px;transition:var(--transition);flex:1;white-space:nowrap}
.bottom-nav-item i{font-size:20px}
.bottom-nav-item.active{color:var(--primary)}
.page{padding:20px;max-width:1200px;margin:0 auto;animation:fadeIn .3s ease}
.page-header{margin-bottom:24px}
.page-title{font-size:26px;font-weight:700;color:var(--dark);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.page-subtitle{color:var(--secondary);font-size:14px}

.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:var(--transition)}
.card-hover:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600}
.card-body{padding:20px}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);background:var(--light)}

.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:var(--transition);cursor:pointer;border:2px solid transparent;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,144,217,.4)}
.btn-secondary{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.btn-secondary:hover{background:#5a6268;transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#218838;transform:translateY(-1px)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#c82333;transform:translateY(-1px)}
.btn-warning{background:var(--warning);color:var(--dark);border-color:var(--warning)}
.btn-outline{background:transparent;border-color:var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-outline-danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn-outline-danger:hover{background:var(--danger);color:#fff}
.btn-light{background:var(--light);color:var(--dark);border-color:var(--border)}
.btn-light:hover{background:var(--border)}
.btn-line{background:#06C755;color:#fff;border-color:#06C755}
.btn-line:hover{background:#05a847;transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:14px 28px;font-size:16px}
.btn-block{width:100%;justify-content:center}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;justify-content:center}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}

.form-group{margin-bottom:18px}
.form-label{display:block;font-size:14px;font-weight:600;color:var(--dark);margin-bottom:6px}
.required{color:var(--danger);margin-left:3px}
.form-control{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:var(--transition);background:#fff;color:var(--dark)}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.15)}
.form-control.is-invalid{border-color:var(--danger)}
.form-hint{font-size:12px;color:var(--secondary);margin-top:4px}
.form-error{font-size:12px;color:var(--danger);margin-top:4px;display:flex;align-items:center;gap:4px}
textarea.form-control{resize:vertical;min-height:100px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.input-group{display:flex;gap:8px}
.input-group .form-control{flex:1}

.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-size:14px;font-weight:500;color:var(--secondary);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:var(--transition);cursor:pointer;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--primary);background:var(--primary-light)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.hero{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:48px 20px;text-align:center}
.hero h1{font-size:34px;font-weight:800;margin-bottom:10px}
.hero p{font-size:16px;opacity:.9;margin-bottom:8px}
.hero-stats{display:flex;justify-content:center;gap:40px;margin-top:28px;flex-wrap:wrap}
.hero-stat{text-align:center}
.hero-stat .num{font-size:32px;font-weight:800}
.hero-stat .label{font-size:13px;opacity:.85}

.quick-actions{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:20px;background:#fff;box-shadow:var(--shadow)}
.quick-action{background:var(--light);border-radius:var(--radius);padding:18px 8px;text-align:center;transition:var(--transition);cursor:pointer;border:2px solid transparent}
.quick-action:hover{border-color:var(--primary);background:var(--primary-light);transform:translateY(-3px);box-shadow:var(--shadow)}
.quick-action i{font-size:28px;color:var(--primary);margin-bottom:8px;display:block}
.quick-action span{font-size:12px;font-weight:600;color:var(--dark)}

.forum-layout{display:grid;grid-template-columns:220px 1fr;gap:20px}
.category-list{list-style:none}
.category-item{padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;transition:var(--transition);margin-bottom:2px}
.category-item:hover,.category-item.active{background:var(--primary-light);color:var(--primary)}
.post-card{background:#fff;border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);cursor:pointer;transition:var(--transition);border-left:4px solid transparent;margin-bottom:12px}
.post-card:hover{border-left-color:var(--primary);transform:translateX(3px);box-shadow:var(--shadow-lg)}
.post-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.post-category{background:var(--primary-light);color:var(--primary);padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700}
.post-stats{display:flex;gap:16px;font-size:12px;color:var(--secondary);margin-top:8px;flex-wrap:wrap}
.post-stats span{display:flex;align-items:center;gap:4px}
.reply-card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);border-left:3px solid var(--border);animation:fadeIn .3s ease}
.reply-avatar{width:36px;height:36px;border-radius:50%;background:var(--secondary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}

.news-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:var(--transition);cursor:pointer}
.news-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.news-card-img{height:160px;background:linear-gradient(135deg,var(--primary-light),#dbeeff);display:flex;align-items:center;justify-content:center;overflow:hidden}
.news-card-img img{width:100%;height:100%;object-fit:cover}
.news-card-body{padding:14px}
.news-card-title{font-size:15px;font-weight:700;margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-excerpt{font-size:12px;color:var(--secondary);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-meta{font-size:11px;color:#aaa;display:flex;gap:10px;flex-wrap:wrap}
.pin-badge{background:var(--danger);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}

.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.gallery-item{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;aspect-ratio:1;background:var(--light)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.gallery-item:hover img{transform:scale(1.08)}
.gallery-item-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);opacity:0;transition:var(--transition);display:flex;align-items:flex-end;padding:12px}
.gallery-item:hover .gallery-item-overlay{opacity:1}
.gallery-item-caption{color:#fff;font-size:12px;line-height:1.4}

.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:var(--transition);background:var(--light)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-light)}
.upload-zone i{font-size:48px;color:var(--border);margin-bottom:12px;display:block;transition:var(--transition)}
.upload-zone:hover i,.upload-zone.drag-over i{color:var(--primary)}
.upload-zone p{color:var(--secondary);font-size:14px;line-height:1.6}
.upload-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;margin-top:12px}
.upload-preview-item{position:relative;aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:var(--light)}
.upload-preview-item img{width:100%;height:100%;object-fit:cover}
.remove-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;background:var(--danger);color:#fff;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;z-index:1}

.calendar-container{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.calendar-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.calendar-header h2{font-size:20px;font-weight:700}
.calendar-nav-btn{background:rgba(255,255,255,.2);color:#fff;width:36px;height:36px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);border:none}
.calendar-nav-btn:hover{background:rgba(255,255,255,.35)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.calendar-day-header{padding:10px;text-align:center;font-size:12px;font-weight:700;color:var(--secondary);background:var(--light);border-bottom:1px solid var(--border)}
.calendar-day{min-height:80px;padding:6px;border:1px solid var(--border);cursor:pointer;transition:var(--transition);position:relative;vertical-align:top}
.calendar-day:hover{background:var(--primary-light)}
.calendar-day.today{background:#e8f4fd}
.calendar-day.today .day-num{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px}
.calendar-day.other-month{background:#fafafa}
.calendar-day.other-month .day-num{color:#ccc}
.day-num{font-size:13px;font-weight:600;margin-bottom:4px}
.day-events{display:flex;flex-direction:column;gap:2px}
.day-event{background:var(--primary);color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.day-event:hover{background:var(--primary-dark)}

.event-card{background:#fff;border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow);display:flex;gap:16px;cursor:pointer;transition:var(--transition);margin-bottom:12px;align-items:flex-start}
.event-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.event-date-badge{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:var(--radius-sm);padding:8px 12px;text-align:center;min-width:58px;flex-shrink:0}
.event-date-badge .month{font-size:10px;text-transform:uppercase;opacity:.85}
.event-date-badge .day{font-size:26px;font-weight:800;line-height:1}
.event-info{flex:1}
.event-title{font-size:16px;font-weight:700;margin-bottom:6px}
.event-meta{font-size:12px;color:var(--secondary);display:flex;flex-wrap:wrap;gap:10px}
.event-meta span{display:flex;align-items:center;gap:4px}

.profile-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:32px 20px;text-align:center;color:#fff}
.profile-avatar{width:84px;height:84px;border-radius:50%;border:4px solid rgba(255,255,255,.5);margin:0 auto 14px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:34px;overflow:hidden;cursor:pointer;transition:var(--transition)}
.profile-avatar:hover{border-color:#fff}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:22px;font-weight:700;margin-bottom:6px}
.profile-badge{background:rgba(255,255,255,.2);padding:4px 14px;border-radius:20px;font-size:13px;display:inline-block}
.profile-menu{list-style:none}
.profile-menu-item{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.profile-menu-item:hover{background:var(--light)}
.profile-menu-item i{width:22px;color:var(--primary);font-size:16px;text-align:center}
.profile-menu-item span{flex:1;font-size:15px}
.profile-menu-item .arrow{color:var(--border);font-size:12px}

.auth-container{min-height:calc(100vh - 134px);display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#f0f4f8,#e8f4fd)}
.auth-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:36px;width:100%;max-width:440px;animation:slideUp .3s ease}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo i{font-size:52px;color:var(--primary)}
.auth-logo h1{font-size:24px;font-weight:700;margin-top:10px;color:var(--dark)}
.auth-logo p{font-size:14px;color:var(--secondary);margin-top:4px}
.auth-tabs{display:flex;border:2px solid var(--border);border-radius:var(--radius-sm);margin-bottom:24px;overflow:hidden}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);color:var(--secondary)}
.auth-tab.active{background:var(--primary);color:#fff}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--secondary);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s}
.modal-overlay.show{opacity:1;visibility:visible}
.modal{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;transform:scale(.92);transition:transform .25s;display:flex;flex-direction:column}
.modal-overlay.show .modal{transform:scale(1)}
.modal.modal-lg{max-width:760px}
.modal.modal-sm{max-width:400px}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;flex-shrink:0}
.modal-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:15px;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.modal-close:hover{background:var(--danger);color:#fff}
.modal-body{padding:24px;flex:1;overflow-y:auto}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:#fff;position:sticky;bottom:0}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:3000;display:none;align-items:center;justify-content:center}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:88vh;object-fit:contain;border-radius:var(--radius-sm)}
.lightbox-close{position:absolute;top:16px;right:20px;color:#fff;font-size:28px;cursor:pointer;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:50%;transition:var(--transition)}
.lightbox-close:hover{background:rgba(255,255,255,.25)}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:22px;cursor:pointer;background:rgba(255,255,255,.15);width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.lightbox-nav:hover{background:rgba(255,255,255,.3)}
.lightbox-prev{left:16px}
.lightbox-next{right:16px}
.lightbox-caption{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;white-space:nowrap}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;gap:4px}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-success{background:#d4edda;color:var(--success)}
.badge-danger{background:#f8d7da;color:var(--danger)}
.badge-warning{background:#fff3cd;color:#856404}
.badge-secondary{background:var(--light);color:var(--secondary)}
.tag{display:inline-block;background:var(--light);color:var(--secondary);padding:4px 10px;border-radius:20px;font-size:12px;margin:2px;border:1px solid var(--border)}

.health-card{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:var(--radius);padding:20px;border-left:4px solid var(--success)}
.health-card h3{color:#2e7d32;margin-bottom:12px;font-size:16px}
.health-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:14px}
.health-item:last-child{border-bottom:none}
.health-item .label{color:var(--secondary);font-weight:500}
.health-item .value{font-weight:600;color:var(--dark);text-align:right;max-width:60%}

.donation-item{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.donation-icon{width:44px;height:44px;border-radius:50%;background:#fff3cd;color:#856404;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.donation-info{flex:1}
.donation-amount{font-size:18px;font-weight:700;color:var(--success)}

.search-bar{display:flex;gap:8px;margin-bottom:20px}
.search-input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:var(--transition);background:#fff}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.15)}

.pagination{display:flex;gap:6px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.page-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:#fff;border:2px solid var(--border);color:var(--secondary);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.page-btn:hover,.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}

.toast-container{position:fixed;bottom:80px;right:16px;z-index:4000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#333;color:#fff;padding:12px 18px;border-radius:var(--radius-sm);font-size:14px;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;min-width:240px;max-width:320px;pointer-events:all}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.toast.warning{background:var(--warning);color:var(--dark)}
.toast.info{background:var(--info)}

.progress{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:4px;transition:width .4s ease}

.empty-state{text-align:center;padding:60px 20px;color:var(--secondary)}
.empty-state i{font-size:64px;color:var(--border);margin-bottom:16px;display:block}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--dark)}
.empty-state p{font-size:14px;line-height:1.6}

.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
.section-divider{border:none;border-top:1px solid var(--border);margin:20px 0}

.post-images{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:14px}
.post-images img{border-radius:var(--radius-sm);cursor:pointer;width:100%;height:140px;object-fit:cover;transition:var(--transition)}
.post-images img:hover{transform:scale(1.02);box-shadow:var(--shadow)}

    <div class="loading-spinner" style="border-color:var(--border);border-top-color:var(--primary);margin:0 auto 14px"></div>
    <div style="font-size:14px;color:var(--secondary);font-weight:500">處理中，請稍候...</div>
  </div>

<script>
// ════════════════════════════════════════════════
// 全域狀態
// ════════════════════════════════════════════════
const LIFF_ID = '2001679903-O06mNaLy'; // ← 替換為您的 LIFF ID

// ★ 替換為您的 GAS 部署網址
const API_URL = 'https://script.google.com/macros/s/AKfycbyqr5Q82m3oZ4bbb8qORU8BcOXfYSJ5RAytoVVx3sQujKe3p07ir2DQkeEBOr4aLdRj/exec';

const APP = {
  token: localStorage.getItem('token') || null,
  user: JSON.parse(localStorage.getItem('user') || 'null'),
  currentPage: 'home',
  calendarDate: new Date(),
  lightboxImages: [],
  lightboxIndex: 0
};

// ════════════════════════════════════════════════
// 伺服器呼叫（URL fetch 版）
// ════════════════════════════════════════════════
async function callServer(fn, ...args) {
  try {
    const payload = { fn, args };
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    return data;
  } catch(e) {
    console.error(`callServer(${fn}) 失敗:`, e);
    return { success: false, message: e.message || '網路錯誤，請稍後再試' };
  }
}

// ════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════
async function initApp() {
  try { await initLiff(); } catch(e) { console.log('LIFF skip:', e.message); }
  setupNavigation();
  setupToastContainer();
  renderPage('home');
  if (APP.token) { loadNotifications(); setInterval(loadNotifications, 60000); }
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 900);
}

async function initLiff() {
  if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') return;
  await liff.init({ liffId: LIFF_ID });
  if (liff.isLoggedIn() && !APP.token) {
    const profile = await liff.getProfile();
    const res = await callServer('loginMember', {
      lineId: profile.userId,
      name: profile.displayName,
      avatar: profile.pictureUrl
    });
    if (res.success) saveSession(res.token, res.member);
  }
}

// ════════════════════════════════════════════════
// Session 管理
// ════════════════════════════════════════════════
function saveSession(token, member) {
  APP.token = token; APP.user = member;
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(member));
}

function clearSession() {
  APP.token = null; APP.user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
}

// ════════════════════════════════════════════════
// 導航系統
// ════════════════════════════════════════════════
function setupNavigation() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); navigateTo(el.dataset.page); });
  });
}

function navigateTo(page) {
  APP.currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el => el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('notifPanel')?.classList.remove('show');
  document.getElementById('navMenu')?.classList.remove('mobile-open');
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMobileMenu() { document.getElementById('navMenu')?.classList.toggle('mobile-open'); }

function renderPage(page) {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = `<div class="page">${Array(3).fill('<div class="skeleton" style="height:120px;margin-bottom:16px;border-radius:12px"></div>').join('')}</div>`;
  const routes = {
    home: renderHome, forum: renderForum, news: renderNews,
    gallery: renderGallery, calendar: renderCalendar,
    profile: renderProfile, auth: renderAuth
  };
  (routes[page] || renderHome)();
}

// ════════════════════════════════════════════════
// 通知系統
// ════════════════════════════════════════════════
async function loadNotifications() {
  if (!APP.token) return;
  try {
    const res = await callServer('getNotifications', APP.token);
    if (!res.success) return;
    const badge = document.getElementById('notifBadge');
    if (badge) { badge.textContent = res.unread; badge.style.display = res.unread > 0 ? 'flex' : 'none'; }
    const list = document.getElementById('notifList');
    if (!list) return;
    if (!res.notifications.length) {
      list.innerHTML = `<div class="empty-state" style="padding:30px"><i class="fas fa-bell-slash" style="font-size:32px"></i><p>暫無通知</p></div>`;
      return;
    }
    list.innerHTML = res.notifications.map(n => `
      <div class="notif-item ${!n.isRead?'unread':''}" onclick="readNotif('${n.id}')">
        <div class="notif-title">${getNotifIcon(n.type)} ${escHtml(n.title)}</div>
        <div class="notif-body">${escHtml(n.content)}</div>
        <div class="notif-time">${formatDate(n.createdAt)}</div>
      </div>`).join('');
  } catch(e) { console.error('通知載入失敗', e); }
}

function getNotifIcon(type) { return { event:'🎉', message:'✉️', system:'🔔', news:'📢' }[type] || '🔔'; }

function toggleNotifications() {
  const panel = document.getElementById('notifPanel');
  if (!panel) return;
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) loadNotifications();
}

async function readNotif(id) {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, id);
  loadNotifications();
}

async function markAllRead() {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, 'all');
  loadNotifications();
  showToast('已全部標為已讀', 'success');
}

// ════════════════════════════════════════════════
// Modal 系統
// ════════════════════════════════════════════════
function showModal(id, content, opts = {}) {
  closeAllModals();
  const sizeClass = opts.size === 'lg' ? 'modal-lg' : opts.size === 'sm' ? 'modal-sm' : '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'overlay_' + id;
  overlay.innerHTML = `<div class="modal ${sizeClass}" id="modal_${id}">${content}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(id); });
  document.getElementById('modalContainer').appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('show'));
}

function closeModal(id) {
  const overlay = document.getElementById('overlay_' + id);
  if (!overlay) return;
  overlay.classList.remove('show');
  setTimeout(() => overlay.remove(), 280);
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 280);
  });
}

// ════════════════════════════════════════════════
// Lightbox
// ════════════════════════════════════════════════
function openLightbox(images, index) {
  APP.lightboxImages = typeof images === 'string' ? JSON.parse(images) : images;
  APP.lightboxIndex = index || 0;
  updateLightbox();
  document.getElementById('lightbox')?.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox')?.classList.remove('show');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  APP.lightboxIndex = (APP.lightboxIndex + dir + APP.lightboxImages.length) % APP.lightboxImages.length;
  updateLightbox();
}

function updateLightbox() {
  const img = document.getElementById('lightboxImg');
  if (img) img.src = APP.lightboxImages[APP.lightboxIndex];
  const cap = document.getElementById('lightboxCaption');
  if (cap) cap.textContent = `${APP.lightboxIndex + 1} / ${APP.lightboxImages.length}`;
}

// ════════════════════════════════════════════════
// Toast 通知
// ════════════════════════════════════════════════
function setupToastContainer() {
  if (!document.getElementById('toastContainer')) {
    const el = document.createElement('div');
    el.className = 'toast-container'; el.id = 'toastContainer';
    document.body.appendChild(el);
  }
}

function showToast(msg, type = 'info', duration = 3000) {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]||''}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all .3s ease';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ════════════════════════════════════════════════
// 全域 Loading
// ════════════════════════════════════════════════
function showLoading(show) {
  const el = document.getElementById('globalLoading');
  if (el) el.style.display = show ? 'flex' : 'none';
}

// ════════════════════════════════════════════════
// 分頁元件
// ════════════════════════════════════════════════
function renderPagination(containerId, current, total, onPage) {
  const el = document.getElementById(containerId);
  if (!el || total <= 1) { if(el) el.innerHTML=''; return; }
  const pages = [1];
  for (let i = Math.max(2, current-1); i <= Math.min(total-1, current+1); i++) pages.push(i);
  if (total > 1) pages.push(total);
  const unique = [...new Set(pages)];
  let html = '<div class="pagination">';
  html += `<button class="page-btn" ${current<=1?'disabled':''} onclick="(${onPage.toString()})(${current-1})"><i class="fas fa-chevron-left"></i></button>`;
  let prev = 0;
  unique.forEach(p => {
    if (p - prev > 1) html += `<span class="page-btn" style="cursor:default">…</span>`;
    html += `<button class="page-btn ${p===current?'active':''}" onclick="(${onPage.toString()})(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="page-btn" ${current>=total?'disabled':''} onclick="(${onPage.toString()})(${current+1})"><i class="fas fa-chevron-right"></i></button>`;
  html += '</div>';
  el.innerHTML = html;
}

// ════════════════════════════════════════════════
// 檔案處理
// ════════════════════════════════════════════════
const fileStore = {};

function previewFiles(input, previewId, storeKey) {
  fileStore[storeKey] = Array.from(input.files);
  renderFilePreview(storeKey, previewId, input.id);
}

function renderFilePreview(storeKey, previewId, inputId) {
  const preview = document.getElementById(previewId);
  if (!preview) return;
  preview.innerHTML = (fileStore[storeKey] || []).map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="upload-preview-item">
      <img src="${url}" alt="${escHtml(f.name)}">
      <button class="remove-btn" onclick="removeFile('${storeKey}',${i},'${previewId}','${inputId}')"><i class="fas fa-times"></i></button>
    </div>`;
  }).join('');
}

function removeFile(storeKey, idx, previewId, inputId) {
  if (fileStore[storeKey]) fileStore[storeKey].splice(idx, 1);
  renderFilePreview(storeKey, previewId, inputId);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadImages(files) {
  if (!files || !files.length) return [];
  const urls = [];
  for (const file of files) {
    try {
      const b64 = await fileToBase64(file);
      const res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) urls.push(res.url);
    } catch(e) { console.error('圖片上傳失敗', e); }
  }
  return urls;
}

async function uploadFiles(files) {
  if (!files || !files.length) return [];
  const results = [];
  for (const file of files) {
    try {
      const b64 = await fileToBase64(file);
      const res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) results.push({ name: file.name, url: res.url, isImage: res.isImage });
    } catch(e) { console.error('檔案上傳失敗', e); }
  }
  return results;
}

// ════════════════════════════════════════════════
// 工具函數
// ════════════════════════════════════════════════
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    const now = new Date(), diff = now - d;
    if (diff < 60000) return '剛剛';
    if (diff < 3600000) return Math.floor(diff/60000) + ' 分鐘前';
    if (diff < 86400000) return Math.floor(diff/3600000) + ' 小時前';
    if (diff < 604800000) return Math.floor(diff/86400000) + ' 天前';
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  } catch(e) { return String(dateStr); }
}

function formatFullDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  } catch(e) { return String(dateStr); }
}

function getInitial(name) { return name ? String(name).charAt(0).toUpperCase() : '?'; }
function truncate(str, len) { if (!str) return ''; return str.length > len ? str.substring(0, len) + '...' : str; }

function renderMsgList(msgs, nameField) {

  return msgs.map(m => `

      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="notif-title"><i class="fas fa-user-circle"></i> ${escHtml(nameField==='from'?m.fromName:m.toName)}</span>

      </div>
      <div class="notif-body" style="margin-top:6px;line-height:1.5">${escHtml(m.content)}</div>
    </div>`).join('');
}

function switchMsgTab(tab) {
  document.getElementById('msgTabInbox')?.classList.toggle('active', tab==='inbox');
  document.getElementById('msgTabSent')?.classList.toggle('active', tab==='sent');
  const inbox = document.getElementById('msgInbox');
  const sent = document.getElementById('msgSent');
  if (inbox) inbox.style.display = tab==='inbox' ? '' : 'none';
  if (sent) sent.style.display = tab==='sent' ? '' : 'none';
}

let forumCategory = 'all', forumPage = 1;

async function renderForum() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = `
    <div class="page">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div><div class="page-title"><i class="fas fa-comments"></i> 論壇討論</div><div class="page-subtitle">分享您的想法與經驗</div></div>
        ${APP.token?`<button class="btn btn-primary" onclick="showCreatePost()"><i class="fas fa-plus"></i> 發表文章</button>`:''}
      </div>
      <div class="search-bar">
        <input type="text" class="search-input" id="forumSearch" placeholder="搜尋文章標題或內容...">
        <button class="btn btn-primary btn-sm" onclick="loadPosts()"><i class="fas fa-search"></i> 搜尋</button>
      </div>
      <div class="forum-layout">
        <div class="forum-sidebar">
          <div class="card">
            <div class="card-header"><span>文章分類</span></div>
            <div class="card-body" style="padding:8px"><ul class="category-list" id="categoryList"></ul></div>
          </div>
        </div>
        <div>
          <div id="postList"></div>
          <div id="forumPagination"></div>
        </div>
      </div>
    </div>`;
  document.getElementById('forumSearch')?.addEventListener('keypress', e => { if(e.key==='Enter') loadPosts(); });
  await loadForumCategories();
  await loadPosts();
}

async function loadForumCategories() {
  const res = await callServer('getForumCategories');
  if (!res.success) return;
  const el = document.getElementById('categoryList');
  if (!el) return;
  el.innerHTML = ['all', ...res.categories].map(c => `
    <li class="category-item ${c===forumCategory?'active':''}" onclick="filterForum('${c}')">
      <i class="fas fa-${c==='all'?'th-list':'tag'}"></i>
      <span>${c==='all'?'全部分類':c}</span>
    </li>`).join('');
}

async function loadPosts() {
  const el = document.getElementById('postList');
  if (!el) return;
  el.innerHTML = Array(3).fill(`<div class="skeleton" style="height:110px;margin-bottom:12px;border-radius:12px"></div>`).join('');
  const q = document.getElementById('forumSearch')?.value?.trim() || '';
  const res = await callServer('getPosts', forumCategory, forumPage, 10);
  if (!res.success || !res.posts.length) {
    el.innerHTML = `<div class="empty-state"><i class="fas fa-comments"></i><h3>暫無文章</h3><p>成為第一個發文的人吧！</p>
      ${APP.token?`<button class="btn btn-primary" style="margin-top:16px" onclick="showCreatePost()"><i class="fas fa-plus"></i> 發表文章</button>`:''}</div>`;
    return;
  }
  let posts = res.posts;
  if (q) posts = posts.filter(p => p.title?.includes(q) || p.content?.includes(q));
  el.innerHTML = posts.map(p => `
    <div class="post-card" onclick="showPostDetail('${p.id}')">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div class="post-avatar">${getInitial(p.authorName)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
            <span class="post-category">${escHtml(p.category)}</span>
            <span style="font-size:15px;font-weight:600">${escHtml(p.title)}</span>
          </div>
          <div style="font-size:12px;color:var(--secondary);margin-bottom:8px">
            <i class="fas fa-user"></i> ${escHtml(p.authorName)} &nbsp;
            <i class="fas fa-clock"></i> ${formatDate(p.createdAt)}
          </div>
          <div style="font-size:13px;color:var(--secondary);line-height:1.5">${escHtml(truncate(p.content||'',120))}</div>
        </div>
      </div>
      <div class="post-stats">
        <span><i class="fas fa-eye"></i> ${p.views||0}</span>
        <span><i class="fas fa-heart"></i> ${p.likes||0}</span>
        ${JSON.parse(p.images||'[]').length?`<span><i class="fas fa-image"></i> 含圖片</span>`:''}
        ${JSON.parse(p.attachments||'[]').length?`<span><i class="fas fa-paperclip"></i> 含附件</span>`:''}
      </div>
    </div>`).join('');
  renderPagination('forumPagination', forumPage, Math.ceil(res.total/10), p => { forumPage=p; loadPosts(); window.scrollTo(0,0); });
}

function filterForum(cat) {
  forumCategory = cat; forumPage = 1;
  document.querySelectorAll('.category-item').forEach(el => {
    const span = el.querySelector('span');
    el.classList.toggle('active', span?.textContent === (cat==='all'?'全部分類':cat));
  });
  loadPosts();
}

function renderReplyCard(r) {

function addAttachLink() {
  const container = document.getElementById('attachLinks');
  if (!container) return;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:8px';
  div.innerHTML = `
    <input type="text" class="form-control" id="attName${attachCount}" placeholder="名稱" style="flex:1">

    <button class="btn btn-outline-danger btn-sm btn-icon" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>`;
  container.appendChild(div);

async function submitPost() {
  const title = document.getElementById('postTitle')?.value?.trim();
  const content = document.getElementById('postContent')?.value?.trim();
  const category = document.getElementById('postCategory')?.value;
  if (!title) { showToast('請填寫標題','warning'); return; }
  if (!content) { showToast('請填寫內容','warning'); return; }
  showLoading(true);
  try {
    const images = await uploadImages(fileStore['postImgFiles']||[]);
    const attachments = [];
    for (let i = 0; i < attachCount; i++) {
      const name = document.getElementById(`attName${i}`)?.value?.trim();
      const url = document.getElementById(`attUrl${i}`)?.value?.trim();
      if (name && url) attachments.push({ name, url });
    }
    const res = await callServer('createPost', APP.token, { title, content, category, images, attachments });
    showLoading(false);
    if (res.success) { showToast('文章發表成功！','success'); fileStore['postImgFiles']=[]; attachCount=1; closeModal('createPost'); forumPage=1; loadPosts(); }
    else showToast(res.message,'error');
  } catch(e) { showLoading(false); showToast('發表失敗','error'); }
}

}

        <div class="form-group"><label class="form-label">活動名稱</label><input type="text" class="form-control" id="uploadEventName" placeholder="請輸入活動名稱"></div>
        <div class="form-group"><label class="form-label">說明文字</label><input type="text" class="form-control" id="uploadCaption" placeholder="選填說明文字"></div>
      </div>
      <div class="form-group">
        <label class="form-label">選擇照片（最多50張）<span class="required">*</span></label>
        <div class="upload-zone" id="uploadZone"
          onclick="document.getElementById('batchFiles').click()"
          ondragover="event.preventDefault();this.classList.add('drag-over')"
          ondragleave="this.classList.remove('drag-over')"
          ondrop="handlePhotoDrop(event)">
          <i class="fas fa-cloud-upload-alt"></i>
          <p>點擊或拖曳照片到此處</p>
          <p style="font-size:12px;margin-top:4px;color:#aaa">支援 JPG、PNG、GIF，每次最多50張</p>
        </div>
        <input type="file" id="batchFiles" accept="image/*" multiple style="display:none" onchange="previewBatchFiles(this)">
      </div>
      <div id="batchPreview" class="upload-preview"></div>
      <div id="uploadProgressWrap" style="display:none;margin-top:14px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:14px;font-weight:600">上傳進度</span>
          <span id="progressText" style="font-size:14px;font-weight:600">0%</span>
        </div>
        <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div id="progressDetail" style="font-size:12px;color:var(--secondary);margin-top:6px;text-align:center"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('batchUpload')">取消</button>
      <button class="btn btn-primary" id="batchUploadBtn" onclick="submitBatchUpload()"><i class="fas fa-upload"></i> 開始上傳</button>
    </div>`, { size:'lg' });
}

let batchFiles = [];

function previewBatchFiles(input) { batchFiles = Array.from(input.files).slice(0,50); renderBatchPreview(); }

function handlePhotoDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone')?.classList.remove('drag-over');
  batchFiles = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/')).slice(0,50);
  renderBatchPreview();
}

function renderBatchPreview() {
  const preview = document.getElementById('batchPreview');
  if (!preview) return;
  preview.innerHTML = batchFiles.map((f,i) => {
    const url = URL.createObjectURL(f);
    return `<div class="upload-preview-item"><img src="${url}" alt="${escHtml(f.name)}"><button class="remove-btn" onclick="removeBatchFile(${i})"><i class="fas fa-times"></i></button></div>`;
  }).join('');
}

function removeBatchFile(idx) { batchFiles.splice(idx,1); renderBatchPreview(); }

async function submitBatchUpload() {
  if (!batchFiles.length) { showToast('請選擇照片','warning'); return; }
  const eventName = document.getElementById('uploadEventName')?.value?.trim() || '活動照片';
  const caption   = document.getElementById('uploadCaption')?.value?.trim() || '';
  const btn=document.getElementById('batchUploadBtn');
  const progressWrap=document.getElementById('uploadProgressWrap');
  const progressBar=document.getElementById('progressBar');
  const progressText=document.getElementById('progressText');
  const progressDetail=document.getElementById('progressDetail');
  if (btn) btn.disabled = true;
  if (progressWrap) progressWrap.style.display = 'block';
  let processed = 0;
  const photos = [];
  for (const file of batchFiles) {
    try {
      const b64 = await fileToBase64(file);
      photos.push({ base64: b64.split(',')[1], mimeType: file.type, filename: file.name, eventName, caption });
    } catch(e) { console.error('讀取失敗', e); }
    processed++;
    const pct = Math.round((processed/batchFiles.length)*50);
    if (progressBar) progressBar.style.width = pct+'%';
    if (progressText) progressText.textContent = pct+'%';
    if (progressDetail) progressDetail.textContent = `讀取中 ${processed}/${batchFiles.length}`;
  }
  try {
    if (progressDetail) progressDetail.textContent = '上傳至 Google Drive 中，請稍候...';
    if (progressBar) progressBar.style.width = '60%';
    if (progressText) progressText.textContent = '60%';
    const res = await callServer('batchUploadPhotos', APP.token, photos);
    if (progressBar) progressBar.style.width = '100%';
    if (progressText) progressText.textContent = '100%';
    const successCount = res.results?.filter(r=>r.success).length || 0;
    showToast(`成功上傳 ${successCount}/${batchFiles.length} 張照片！`, successCount>0?'success':'error');
    if (successCount > 0) { batchFiles=[]; closeModal('batchUpload'); galleryPage=1; loadGalleryPhotos(); }
  } catch(e) { showToast('上傳失敗，請稍後再試','error'); }
  if (btn) btn.disabled = false;
}

async function renderCalendar() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = `
    <div class="page">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
        <div><div class="page-title"><i class="fas fa-calendar-alt"></i> 行事曆</div><div class="page-subtitle">活動安排與線上報名</div></div>
        ${APP.token && APP.user?.memberType==='管理員'?`<button class="btn btn-primary" onclick="showCreateEvent()"><i class="fas fa-plus"></i> 新增活動</button>`:''}
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchCalTab('calendar')"><i class="fas fa-calendar"></i> 月曆視圖</div>
        <div class="tab" onclick="switchCalTab('list')"><i class="fas fa-list"></i> 活動列表</div>
        ${APP.token?`<div class="tab" onclick="switchCalTab('myregs')"><i class="fas fa-ticket-alt"></i> 我的報名</div>`:''}
      </div>
      <div id="calContent"></div>
    </div>`;
  await renderCalendarView();
}

async function switchCalTab(tab) {
  const tabs = document.querySelectorAll('.tabs .tab');
  const names = ['calendar','list','myregs'];
  tabs.forEach((el,i) => el.classList.toggle('active', names[i]===tab));
  if (tab==='calendar') await renderCalendarView();
  else if (tab==='list') await renderEventList();
  else await renderMyRegistrations();
}

async function renderCalendarView() {
  const el = document.getElementById('calContent');
  if (!el) return;
  el.innerHTML = `<div class="skeleton" style="height:420px;border-radius:12px"></div>`;
  const d = APP.calendarDate;
  const year = d.getFullYear(), month = d.getMonth();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dayNames = ['日','一','二','三','四','五','六'];
  const res = await callServer('getEvents', year, month+1);
  const events = res.success ? res.events : [];
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const today = new Date();
  let cells='', day=1;
  for (let row=0; row<6; row++) {
    for (let col=0; col<7; col++) {
      const cellIdx = row*7+col;
      if (cellIdx < firstDay || day > daysInMonth) {
        cells += `<div class="calendar-day other-month"><div class="day-num"></div></div>`;
      } else {
        const isToday = year===today.getFullYear() && month===today.getMonth() && day===today.getDate();
        const dayEvents = events.filter(e => {
          const ed = new Date(e.startDate);
          return ed.getFullYear()===year && ed.getMonth()===month && ed.getDate()===day;
        });
        const eventsJson = JSON.stringify(dayEvents).replace(/"/g,'&quot;');
        cells += `
          <div class="calendar-day ${isToday?'today':''}" onclick="showDayEvents(${year},${month+1},${day},'${eventsJson}')">
            <div class="day-num">${day}</div>
            <div class="day-events">
              ${dayEvents.slice(0,2).map(e=>`<div class="day-event" title="${escHtml(e.title)}">${escHtml(truncate(e.title,8))}</div>`).join('')}
              ${dayEvents.length>2?`<div style="font-size:10px;color:var(--secondary);padding:1px 4px">+${dayEvents.length-2} 更多</div>`:''}
            </div>
          </div>`;
        day++;
      }
    }
    if (day > daysInMonth) break;
  }
  el.innerHTML = `
    <div class="calendar-container">
      <div class="calendar-header">
        <button class="calendar-nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2>${year} 年 ${monthNames[month]}</h2>
        <button class="calendar-nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="calendar-grid">
        ${dayNames.map(dn=>`<div class="calendar-day-header">${dn}</div>`).join('')}
        ${cells}
      </div>
    </div>
    <div style="margin-top:24px">
      <h3 style="margin-bottom:14px;font-size:16px;font-weight:700"><i class="fas fa-calendar-check"></i> ${year}年${month+1}月活動列表</h3>
      ${events.length ? events.map(e=>renderEventCard(e)).join('') : `<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>本月暫無活動</h3></div>`}
    </div>`;
}

function changeMonth(dir) {
  APP.calendarDate = new Date(APP.calendarDate.getFullYear(), APP.calendarDate.getMonth()+dir, 1);
  renderCalendarView();
}

function showDayEvents(year, month, day, eventsJson) {
  let events = [];
  try { events = JSON.parse(eventsJson.replace(/&quot;/g,'"')); } catch(e) {}
  if (!events.length) return;
  showModal('dayEvents', `
    <div class="modal-header"><div class="modal-title"><i class="fas fa-calendar-day"></i> ${year}/${month}/${day} 活動</div><button class="modal-close" onclick="closeModal('dayEvents')"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">${events.map(e=>renderEventCard(e)).join('')}</div>`, { size:'sm' });
}

async function renderEventList() {
  const el = document.getElementById('calContent');
  if (!el) return;
  el.innerHTML = `<div class="skeleton" style="height:200px;border-radius:12px"></div>`;
  const res = await callServer('getAllEvents');
  if (!res.success || !res.events.length) { el.innerHTML=`<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>暫無活動</h3></div>`; return; }
  const now = new Date();
  const upcoming = res.events.filter(e=>new Date(e.startDate)>=now);
  const past = res.events.filter(e=>new Date(e.startDate)<now);
  el.innerHTML = `
    ${upcoming.length?`<h3 style="margin-bottom:14px;font-size:16px;font-weight:700"><i class="fas fa-calendar-check" style="color:var(--success)"></i> 即將舉辦</h3>${upcoming.map(e=>renderEventCard(e)).join('')}`:''}
    ${past.length?`<h3 style="margin:24px 0 14px;font-size:16px;font-weight:700"><i class="fas fa-history" style="color:var(--secondary)"></i> 已結束活動</h3>${past.map(e=>renderEventCard(e,true)).join('')}`:''}`;
}

function renderEventCard(e, isPast=false) {
  const d = new Date(e.startDate);
  const monthAbbr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const maxP=parseInt(e.maxParticipants)||0, curP=parseInt(e.currentParticipants)||0;
  const isFull = maxP>0 && curP>=maxP;
  return `
    <div class="event-card" style="${isPast?'opacity:0.65':''}">
      <div class="event-date-badge"><div class="month">${monthAbbr[d.getMonth()]}</div><div class="day">${d.getDate()}</div></div>
      <div class="event-info">
        <div class="event-title">${escHtml(e.title)}</div>
        <div class="event-meta">
          ${e.location?`<span><i class="fas fa-map-marker-alt"></i> ${escHtml(e.location)}</span>`:''}
          <span><i class="fas fa-clock"></i> ${formatFullDate(e.startDate)}</span>
          ${maxP>0?`<span><i class="fas fa-users"></i> ${curP}/${maxP} 人 ${isFull?'<span class="badge badge-danger" style="margin-left:4px">已額滿</span>':''}</span>`:''}
        </div>
        ${e.description?`<div style="font-size:13px;color:var(--secondary);margin-top:6px;line-height:1.5">${escHtml(truncate(e.description,80))}</div>`:''}
        ${!isPast?`
          <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-outline btn-sm" onclick="showEventDetail('${e.id}')"><i class="fas fa-info-circle"></i> 詳情</button>
            ${APP.token && !isFull?`<button class="btn btn-primary btn-sm" onclick="registerEvent('${e.id}')"><i class="fas fa-ticket-alt"></i> 立即報名</button>`:''}
            ${APP.token && isFull?`<button class="btn btn-secondary btn-sm" disabled><i class="fas fa-ban"></i> 已額滿</button>`:''}
            ${!APP.token?`<button class="btn btn-outline btn-sm" onclick="navigateTo('auth')"><i class="fas fa-sign-in-alt"></i> 登入報名</button>`:''}
          </div>`:''}
      </div>
    </div>`;
}

async function showEventDetail(eventId) {
  showLoading(true);
  const res = await callServer('getEventById', eventId);
  showLoading(false);
  if (!res.success) { showToast('載入失敗','error'); return; }
  const e = res.event;
  const maxP=parseInt(e.maxParticipants)||0, curP=parseInt(e.currentParticipants)||0;
  const isFull=maxP>0&&curP>=maxP, isPast=new Date(e.startDate)<new Date();
  const attachments = JSON.parse(e.attachments||'[]');
  showModal('eventDetail', `
    <div class="modal-header">
      <div class="modal-title"><i class="fas fa-calendar-check"></i> ${escHtml(e.title)}</div>
      <button class="modal-close" onclick="closeModal('eventDetail')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div style="background:var(--primary-light);border-radius:var(--radius-sm);padding:16px;margin-bottom:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:14px">
          <div><div style="color:var(--secondary);font-size:12px;margin-bottom:2px"><i class="fas fa-clock"></i> 開始時間</div><div style="font-weight:600">${formatFullDate(e.startDate)}</div></div>
          <div><div style="color:var(--secondary);font-size:12px;margin-bottom:2px"><i class="fas fa-flag-checkered"></i> 結束時間</div><div style="font-weight:600">${formatFullDate(e.endDate||e.startDate)}</div></div>
          ${e.location?`<div><div style="color:var(--secondary);font-size:12px;margin-bottom:2px"><i class="fas fa-map-marker-alt"></i> 地點</div><div style="font-weight:600">${escHtml(e.location)}</div></div>`:''}
          ${maxP>0?`<div><div style="color:var(--secondary);font-size:12px;margin-bottom:2px"><i class="fas fa-users"></i> 報名人數</div><div style="font-weight:600">${curP}/${maxP} 人 ${isFull?'<span class="badge badge-danger" style="margin-left:6px">已額滿</span>':''}</div></div>`:''}
        </div>
      </div>
      ${e.description?`<div style="line-height:1.8;font-size:15px;white-space:pre-wrap;margin-bottom:16px">${escHtml(e.description)}</div>`:''}
      ${attachments.length?`
        <div style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:8px"><i class="fas fa-paperclip"></i> 相關附件</div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${attachments.map(a=>`<a href="${escHtml(a.url)}" target="_blank" class="btn btn-light btn-sm"><i class="fas fa-download"></i> ${escHtml(a.name)}</a>`).join('')}
          </div>
        </div>`:''}
      ${!isPast?`
        <div style="border-top:1px solid var(--border);padding-top:16px">
          ${APP.token
            ? (!isFull
                ? `<div class="form-group"><label class="form-label">備註（選填）</label><textarea class="form-control" id="regNotes" rows="2" placeholder="如有特殊需求請填寫..."></textarea></div>
                   <button class="btn btn-primary btn-block" onclick="registerEvent('${e.id}')"><i class="fas fa-ticket-alt"></i> 確認報名</button>`
                : `<div class="empty-state" style="padding:20px"><i class="fas fa-ban" style="font-size:36px;color:var(--danger)"></i><h3>報名已額滿</h3></div>`)
            : `<button class="btn btn-primary btn-block" onclick="navigateTo('auth');closeModal('eventDetail')"><i class="fas fa-sign-in-alt"></i> 登入後報名</button>`}
        </div>`
      :`<div style="text-align:center;padding:12px;background:var(--light);border-radius:var(--radius-sm)"><span style="color:var(--secondary);font-size:14px"><i class="fas fa-history"></i> 此活動已結束</span></div>`}
    </div>`, { size:'md' });
}

async function registerEvent(eventId) {
  if (!APP.token) { navigateTo('auth'); return; }
  const notes = document.getElementById('regNotes')?.value?.trim() || '';
  showLoading(true);
  const res = await callServer('registerEvent', APP.token, eventId, notes);
  showLoading(false);
  if (res.success) {
    showToast(res.message || '報名成功！🎉','success');
    closeModal('eventDetail'); closeModal('dayEvents');
    renderCalendarView();
  } else { showToast(res.message,'error'); }
}

async function renderMyRegistrations() {
  const el = document.getElementById('calContent');
  if (!el) return;
  if (!APP.token) {
    el.innerHTML = `<div class="empty-state"><i class="fas fa-sign-in-alt"></i><h3>請先登入</h3><button class="btn btn-primary" style="margin-top:16px" onclick="navigateTo('auth')">前往登入</button></div>`;
    return;
  }
  el.innerHTML = `<div class="skeleton" style="height:200px;border-radius:12px"></div>`;
  const res = await callServer('getMyRegistrations', APP.token);
  if (!res.success || !res.registrations.length) {
    el.innerHTML = `<div class="empty-state"><i class="fas fa-ticket-alt"></i><h3>尚未報名任何活動</h3><button class="btn btn-primary" style="margin-top:16px" onclick="switchCalTab('list')"><i class="fas fa-search"></i> 瀏覽活動</button></div>`;
    return;
  }
  el.innerHTML = res.registrations.map(r => `
    <div class="event-card" style="margin-bottom:12px">
      <div class="event-date-badge" style="background:var(--success)">
        <div class="month" style="font-size:9px">已報名</div>
        <div style="font-size:20px"><i class="fas fa-check"></i></div>
      </div>
      <div class="event-info">
        <div class="event-title">${escHtml(r.eventTitle)}</div>
        <div class="event-meta">
          <span><i class="fas fa-calendar"></i> 報名時間：${formatDate(r.registeredAt)}</span>
          <span class="badge ${r.status==='confirmed'?'badge-success':'badge-warning'}">${r.status==='confirmed'?'已確認':'待確認'}</span>
        </div>
        ${r.notes?`<div style="font-size:13px;color:var(--secondary);margin-top:4px">備註：${escHtml(r.notes)}</div>`:''}
        <div style="margin-top:10px">
          <button class="btn btn-outline-danger btn-sm" onclick="cancelRegistration('${r.eventId}')"><i class="fas fa-times"></i> 取消報名</button>
        </div>
      </div>
    </div>`).join('');
}

async function cancelRegistration(eventId) {
  const confirmed = await Swal.fire({ title:'確定取消報名？', text:'取消後需重新報名', icon:'warning', showCancelButton:true, confirmButtonText:'確定取消', cancelButtonText:'返回', confirmButtonColor:'#dc3545' });
  if (!confirmed.isConfirmed) return;
  showLoading(true);
  const res = await callServer('cancelRegistration', APP.token, eventId);
  showLoading(false);
  if (res.success) { showToast(res.message||'已取消報名','info'); renderMyRegistrations(); }
  else showToast(res.message,'error');
}

function showCreateEvent() {
  if (!APP.token) return;
  showModal('createEvent', `
    <div class="modal-header"><div class="modal-title"><i class="fas fa-calendar-plus"></i> 新增活動</div><button class="modal-close" onclick="closeModal('createEvent')"><i class="fas fa-times"></i></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">活動名稱<span class="required">*</span></label><input type="text" class="form-control" id="evtTitle" placeholder="請輸入活動名稱"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">開始時間<span class="required">*</span></label><input type="datetime-local" class="form-control" id="evtStart"></div>
        <div class="form-group"><label class="form-label">結束時間</label><input type="datetime-local" class="form-control" id="evtEnd"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">地點</label><input type="text" class="form-control" id="evtLocation" placeholder="活動地點"></div>
        <div class="form-group"><label class="form-label">報名人數上限</label><input type="number" class="form-control" id="evtMaxP" placeholder="0 = 不限制" min="0"></div>
      </div>
      <div class="form-group"><label class="form-label">活動說明</label><textarea class="form-control" id="evtDesc" rows="5" placeholder="請輸入活動詳細說明..."></textarea></div>
      <div class="form-group">
        <label class="form-label">附件</label>
        <label class="btn btn-light btn-sm" for="evtFiles"><i class="fas fa-paperclip"></i> 上傳附件</label>
        <input type="file" id="evtFiles" multiple style="display:none" onchange="previewFiles(this,'evtFilePreview','evtFileList')">
        <div id="evtFilePreview" class="upload-preview"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('createEvent')">取消</button><button class="btn btn-primary" onclick="submitCreateEvent()"><i class="fas fa-save"></i> 建立活動</button></div>`, { size:'lg' });
}

async function submitCreateEvent() {
  const title = document.getElementById('evtTitle')?.value?.trim();
  const start = document.getElementById('evtStart')?.value;
  if (!title) { showToast('請填寫活動名稱','warning'); return; }
  if (!start) { showToast('請選擇開始時間','warning'); return; }
  showLoading(true);
  try {
    const attachments = await uploadFiles(fileStore['evtFileList']||[]);
    const res = await callServer('createEvent', APP.token, {
      title, startDate: start,
      endDate: document.getElementById('evtEnd')?.value || start,
      location: document.getElementById('evtLocation')?.value?.trim(),
      maxParticipants: parseInt(document.getElementById('evtMaxP')?.value)||0,
      description: document.getElementById('evtDesc')?.value?.trim(),
      attachments
    });
    showLoading(false);
    if (res.success) { showToast('活動建立成功！','success'); fileStore['evtFileList']=[]; closeModal('createEvent'); renderCalendarView(); }
    else showToast(res.message,'error');
  } catch(e) { showLoading(false); showToast('建立失敗','error'); }
}
