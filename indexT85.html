<style>

<script>
// ══════════════════════════════════════════
// 設定
// ══════════════════════════════════════════
const LIFF_ID = '2001679903-O06mNaLy';
const API_URL = 'https://script.google.com/macros/s/AKfycbyAr4ORKb2g1JdQdKjacJDIO45HdUEeSQ03yTnHskEahquJ5ArkXlUXnVaV4q4jU7Vj/exec';

const APP = {
  token: localStorage.getItem('token') || null,
  user:  JSON.parse(localStorage.getItem('user') || 'null'),
  currentPage: 'home',
  calendarDate: new Date(),
  lightboxImages: [],
  lightboxIndex: 0
};

// ✅ 修復1：全域變數只宣告一次（移除所有重複宣告）
let forumPage = 1;
let forumCategory = 'all';
let newsPage = 1;
let galleryPage = 1;
let currentAlbumId = null;
let batchFiles = [];
let searchTimer = null;
const fileStore = {};

// ══════════════════════════════════════════
// 字體大小切換
// ══════════════════════════════════════════
function setFontSize(size) {
  document.body.classList.remove('font-small','font-medium','font-large');
  document.body.classList.add('font-' + size);
  localStorage.setItem('fontSize', size);
  document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
  const map = { small:'fontSmBtn', medium:'fontMdBtn', large:'fontLgBtn' };
  document.getElementById(map[size])?.classList.add('active');
}
(function(){ setFontSize(localStorage.getItem('fontSize') || 'medium'); })();

// ══════════════════════════════════════════
// API 呼叫
// ══════════════════════════════════════════
async function callServer(fn, ...args) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ fn, args })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) {
    console.error('callServer(' + fn + ') 失敗:', e);
    return { success: false, message: e.message || '網路錯誤，請稍後再試' };
  }
}

// ══════════════════════════════════════════
// 初始化
// ══════════════════════════════════════════
async function initApp() {
  try { await initLiff(); } catch(e) { console.log('LIFF skip:', e.message); }
  setupNavigation();
  setupToastContainer();
  renderPage('home');
  if (APP.token) {
    loadNotifications();
    setInterval(loadNotifications, 60000);
  }
  setTimeout(() => document.getElementById('loadingScreen')?.classList.add('hidden'), 900);
}

async function initLiff() {
  if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') return;
  await liff.init({ liffId: LIFF_ID });
  if (liff.isLoggedIn() && !APP.token) {
    const profile = await liff.getProfile();
    const res = await callServer('loginMember', {
      lineId: profile.userId, name: profile.displayName, avatar: profile.pictureUrl
    });
    if (res.success) saveSession(res.token, res.member);
  }
}

function saveSession(token, member) {
  APP.token = token; APP.user = member;
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(member));
}

function clearSession() {
  APP.token = null; APP.user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
}

// ══════════════════════════════════════════
// 導航
// ══════════════════════════════════════════
function setupNavigation() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', function(e) {
      e.preventDefault();
      navigateTo(this.dataset.page);
    });
  });
}

function navigateTo(page) {
  APP.currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el =>
    el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('notifPanel')?.classList.remove('show');
  document.getElementById('navMenu')?.classList.remove('mobile-open');
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMobileMenu() {
  document.getElementById('navMenu')?.classList.toggle('mobile-open');
}

function renderPage(page) {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = '<div class="page">' + Array(3).fill(
    '<div class="skeleton" style="height:140px;margin-bottom:20px;border-radius:14px"></div>'
  ).join('') + '</div>';
  const routes = {
    home: renderHome, forum: renderForum, news: renderNews,
    gallery: renderGallery, calendar: renderCalendar,
    profile: renderProfile, auth: renderAuth
  };
  (routes[page] || renderHome)();
}

// ══════════════════════════════════════════
// 通知
// ══════════════════════════════════════════
async function loadNotifications() {
  if (!APP.token) return;
  try {
    const res = await callServer('getNotifications', APP.token);
    if (!res.success) return;
    const badge = document.getElementById('notifBadge');
    if (badge) {
      badge.textContent = res.unread;
      badge.style.display = res.unread > 0 ? 'flex' : 'none';
    }
    const list = document.getElementById('notifList');
    if (!list) return;
    if (!res.notifications || !res.notifications.length) {
      list.innerHTML = '<div class="empty-state" style="padding:36px"><i class="fas fa-bell-slash" style="font-size:44px"></i><p>暫無通知</p></div>';
      return;
    }
    list.innerHTML = res.notifications.map(function(n) {
      return '<div class="notif-item ' + (!n.isRead ? 'unread' : '') + '" onclick="readNotif(\'' + n.id + '\')">' +
        '<div class="notif-title">' + getNotifIcon(n.type) + ' ' + escHtml(n.title) + '</div>' +
        '<div class="notif-body">' + escHtml(n.content) + '</div>' +
        '<div class="notif-time">' + formatDate(n.createdAt) + '</div></div>';
    }).join('');
  } catch(e) { console.error('通知載入失敗', e); }
}

function getNotifIcon(type) {
  var iconMap = { '活動':'🎉', '私信':'✉️', '系統':'🔔', '公告':'📢' };
  return iconMap[type] || '🔔';
}

function toggleNotifications() {
  var panel = document.getElementById('notifPanel');
  if (!panel) return;
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) loadNotifications();
}

async function readNotif(id) {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, id);
  loadNotifications();
}

async function markAllRead() {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, 'all');
  loadNotifications();
  showToast('已全部標為已讀', 'success');
}

// ══════════════════════════════════════════
// Modal
// ══════════════════════════════════════════
function showModal(id, content, opts) {
  opts = opts || {};
  closeAllModals();
  var sizeClass = opts.size === 'lg' ? 'modal-lg' : opts.size === 'sm' ? 'modal-sm' : '';
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'overlay_' + id;
  overlay.innerHTML = '<div class="modal ' + sizeClass + '" id="modal_' + id + '">' + content + '</div>';
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(id); });
  document.getElementById('modalContainer').appendChild(overlay);
  requestAnimationFrame(function() { overlay.classList.add('show'); });
}

function closeModal(id) {
  var overlay = document.getElementById('overlay_' + id);
  if (!overlay) return;
  overlay.classList.remove('show');
  setTimeout(function() { overlay.remove(); }, 280);
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(function(el) {
    el.classList.remove('show');
    setTimeout(function() { el.remove(); }, 280);
  });
}

function setupToastContainer() {
  if (!document.getElementById('toastContainer')) {
    var el = document.createElement('div');
    el.className = 'toast-container';
    el.id = 'toastContainer';
    document.body.appendChild(el);
  }
}

function showToast(msg, type, duration) {
  type = type || 'info';
  duration = duration || 4500;
  var icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  var container = document.getElementById('toastContainer');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span class="toast-icon">' + (icons[type] || 'ℹ️') + '</span><span>' + escHtml(msg) + '</span>';
  container.appendChild(toast);
  setTimeout(function() {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(110%)';
    toast.style.transition = 'all .35s ease';
    setTimeout(function() { toast.remove(); }, 350);
  }, duration);
}

// ══════════════════════════════════════════
// 分頁
// ══════════════════════════════════════════
function renderPagination(containerId, current, total, onPage) {
  var el = document.getElementById(containerId);
  if (!el || total <= 1) { if (el) el.innerHTML = ''; return; }
  var pages = [1];
  for (var i = Math.max(2, current - 1); i <= Math.min(total - 1, current + 1); i++) pages.push(i);
  if (total > 1) pages.push(total);
  var unique = pages.filter(function(v, i, a) { return a.indexOf(v) === i; });
  var fnStr = onPage.toString();
  var html = '<div class="pagination">';
  html += '<button class="page-btn" ' + (current <= 1 ? 'disabled' : '') + ' onclick="(' + fnStr + ')(' + (current - 1) + ')"><i class="fas fa-chevron-left"></i> 上一頁</button>';
  var prev = 0;
  unique.forEach(function(p) {
    if (p - prev > 1) html += '<span class="page-btn" style="cursor:default;border:none">…</span>';
    html += '<button class="page-btn ' + (p === current ? 'active' : '') + '" onclick="(' + fnStr + ')(' + p + ')">' + p + '</button>';
    prev = p;
  });
  html += '<button class="page-btn" ' + (current >= total ? 'disabled' : '') + ' onclick="(' + fnStr + ')(' + (current + 1) + ')">下一頁 <i class="fas fa-chevron-right"></i></button>';
  html += '</div>';
  el.innerHTML = html;
}

function previewFiles(input, previewId, storeKey) {
  fileStore[storeKey] = Array.from(input.files);
  renderFilePreview(storeKey, previewId, input.id);
}

function renderFilePreview(storeKey, previewId, inputId) {
  var preview = document.getElementById(previewId);
  if (!preview) return;
  preview.innerHTML = (fileStore[storeKey] || []).map(function(f, i) {
    var url = URL.createObjectURL(f);
    return '<div class="upload-preview-item"><img src="' + url + '" alt="' + escHtml(f.name) + '">' +
      '<button class="remove-btn" onclick="removeFile(\'' + storeKey + '\',' + i + ',\'' + previewId + '\',\'' + inputId + '\')"><i class="fas fa-times"></i></button></div>';
  }).join('');
}

function removeFile(storeKey, idx, previewId, inputId) {
  if (fileStore[storeKey]) fileStore[storeKey].splice(idx, 1);
  renderFilePreview(storeKey, previewId, inputId);
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) { resolve(e.target.result); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadImages(files) {
  if (!files || !files.length) return [];
  var urls = [];
  for (var i = 0; i < files.length; i++) {
    try {
      var b64 = await fileToBase64(files[i]);
      var res = await callServer('uploadFile', APP.token, b64.split(',')[1], files[i].type, files[i].name);
      if (res.success) urls.push(res.url);
    } catch(e) { console.error('圖片上傳失敗', e); }
  }
  return urls;
}

// ══════════════════════════════════════════
// 工具函數
// ══════════════════════════════════════════
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    var now = new Date(), diff = now - d;
    if (diff < 60000)     return '剛剛';
    if (diff < 3600000)   return Math.floor(diff / 60000) + ' 分鐘前';
    if (diff < 86400000)  return Math.floor(diff / 3600000) + ' 小時前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
  } catch(e) { return String(dateStr); }
}

function formatFullDate(dateStr) {
  if (!dateStr) return '';
  try {
    var d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    return d.getFullYear() + ' 年 ' + (d.getMonth()+1) + ' 月 ' + d.getDate() + ' 日  ' +
      String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  } catch(e) { return String(dateStr); }
}

function getInitial(name) { return name ? String(name).charAt(0).toUpperCase() : '?'; }
function truncate(str, len) { if (!str) return ''; return str.length > len ? str.substring(0, len) + '...' : str; }

async function lineLogin() {
  if (typeof liff === 'undefined' || LIFF_ID === 'YOUR_LIFF_ID') {
    showToast('LIFF 尚未設定，請使用帳號登入', 'warning'); return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    var profile = await liff.getProfile();
    showLoading(true);
    var res = await callServer('loginMember', { lineId: profile.userId, name: profile.displayName, avatar: profile.pictureUrl });
    showLoading(false);
    if (res.success) { saveSession(res.token, res.member); showToast('歡迎回來，' + res.member.name + '！', 'success'); navigateTo('home'); }
    else showToast(res.message, 'error');
  } catch(e) { showLoading(false); showToast('LINE 登入失敗：' + e.message, 'error'); }
}

  var name  = document.getElementById('loginName')?.value?.trim();
  var phone = document.getElementById('loginPhone')?.value?.trim();
  if (!name)  { showToast('請輸入姓名', 'warning'); return; }

  showLoading(true);
  var res = await callServer('loginMember', { name, phone });
  showLoading(false);
  if (res.success) { saveSession(res.token, res.member); showToast('歡迎回來，' + res.member.name + '！', 'success'); navigateTo('home'); }
  else showToast(res.message, 'error');
}

async function switchProfileTab(tab) {

async function submitEditProfile() {
  var name = document.getElementById('epName')?.value?.trim();
  if (!name) { showToast('姓名不能為空', 'warning'); return; }
  showLoading(true);
  var res = await callServer('updateMemberProfile', APP.token, {
    name,
    phone:            document.getElementById('epPhone')?.value?.trim(),
    email:            document.getElementById('epEmail')?.value?.trim(),
    birthday:         document.getElementById('epBirthday')?.value,
    gender:           document.getElementById('epGender')?.value,
    address:          document.getElementById('epAddress')?.value?.trim(),
    emergencyContact: document.getElementById('epEmergencyContact')?.value?.trim(),
    emergencyPhone:   document.getElementById('epEmergencyPhone')?.value?.trim(),
    notes:            document.getElementById('epNotes')?.value?.trim()
  });
  showLoading(false);
  if (res.success) {
    // ✅ 修復6：完整的 localStorage 更新
    APP.user = Object.assign({}, APP.user, { name: name });
    localStorage.setItem('user', JSON.stringify(APP.user));
    showToast('資料更新成功！', 'success');
    closeModal('editProfile');
    renderProfile();
  } else showToast(res.message, 'error');
}

async function changeAvatar() {
  if (!APP.token) return;
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async function() {
    var file = input.files[0];
    if (!file) return;
    showLoading(true);
    try {
      var b64 = await fileToBase64(file);
      var res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) {
        var upd = await callServer('updateMemberProfile', APP.token, { avatar: res.url });
        if (upd.success) {
          APP.user.avatar = res.url;
          localStorage.setItem('user', JSON.stringify(APP.user));
          showToast('頭像更新成功！', 'success');
          renderProfile();
        }
      }
    } catch(e) { showToast('上傳失敗，請再試一次', 'error'); }
    showLoading(false);
  };
  input.click();
}

function confirmLogout() {

    cancelButtonText:'<i class="fas fa-times"></i> 取消',
    confirmButtonColor:'#dc3545', cancelButtonColor:'#6c757d'
  }).then(function(r) {
    if (r.isConfirmed) { clearSession(); showToast('已成功登出', 'info'); navigateTo('home'); }
  });
}

  async function toggleMemberStatus(memberId, newStatus) {
    var confirmed = await Swal.fire({
      title: '確定要' + newStatus + '此會員？', icon:'warning',
      showCancelButton:true,
      confirmButtonText:'確定' + newStatus, cancelButtonText:'取消',
      confirmButtonColor: newStatus==='停用' ? '#dc3545' : '#28a745'
    });
    if (!confirmed.isConfirmed) return;
    showLoading(true);
    var res = await callServer('updateMemberStatus', APP.token, memberId, newStatus);
    showLoading(false);
    if (res.success) { showToast('已' + newStatus + '該會員', 'success'); loadAdminMembers(); }
    else showToast(res.message, 'error');

      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px">' +
      '<h3 style="font-size:var(--font-xl);font-weight:700"><i class="fas fa-calendar-alt" style="color:var(--success)"></i> 活動列表（共 ' + res.events.length + ' 場）</h3>' +

        var d = new Date(e.startDate);
        return '<div class="event-card" style="margin-bottom:14px">' +
          '<div class="event-date-badge"><div class="month">' + monthAbbr[d.getMonth()] + '</div><div class="day">' + d.getDate() + '</div></div>' +

    showLoading(true);

  // ✅ 修復4：submitCreateEvent 只保留一份定義
  async function submitCreateEvent() {
    var title = document.getElementById('evtTitle')?.value?.trim();
    var start = document.getElementById('evtStart')?.value;
    if (!title) { showToast('請填寫活動名稱','warning'); return; }
    if (!start) { showToast('請選擇開始時間','warning'); return; }
    showLoading(true);
    var res = await callServer('createEvent', APP.token, {
      title, startDate: start,
      endDate:         document.getElementById('evtEnd')?.value || start,
      location:        document.getElementById('evtLocation')?.value?.trim(),
      maxParticipants: parseInt(document.getElementById('evtMaxP')?.value) || 0,
      description:     document.getElementById('evtDesc')?.value?.trim()
    });
    showLoading(false);
    if (res.success) {
      showToast('活動建立成功！','success');
      closeModal('createEvent');
      loadAdminEvents();
    } else showToast(res.message,'error');
  }

  async function renderForum() {
    var main = document.getElementById('mainContent');
    if (!main) return;
    main.innerHTML =
      '<div class="page">' +

      ['一般討論','病友分享','醫療資訊','活動討論','公告','其他'].map(function(c) {

      }).join('') +

      '<button class="btn btn-primary" onclick="searchPosts()"><i class="fas fa-search"></i> 搜尋</button>' +
      '</div>' +

  function filterCategorySelect() {
    forumCategory = document.getElementById('forumCategorySelect')?.value || 'all';
    forumPage = 1;
    loadPosts();
  }

  function searchPosts() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() { forumPage = 1; loadPosts(); }, 400);
  }

  async function loadPosts() {
    var el = document.getElementById('postList');
    if (!el) return;
    el.innerHTML = Array(3).fill('<div class="skeleton" style="height:130px;margin-bottom:16px;border-radius:14px"></div>').join('');
    var keyword = document.getElementById('forumSearch')?.value?.trim();
    var res = await callServer('getPosts', forumCategory, forumPage, 10);
    if (!res.success) { el.innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>載入失敗</h3></div>'; return; }
    var posts = res.posts || [];
    if (keyword) posts = posts.filter(function(p) { return (p.title||'').includes(keyword) || (p.content||'').includes(keyword); });
    if (!posts.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><h3>目前沒有文章</h3>' +
        (APP.token ? '<button class="btn btn-primary btn-lg" style="margin-top:20px" onclick="showCreatePost()"><i class="fas fa-pen"></i> 發表文章</button>' : '') + '</div>';
      return;
    }
    el.innerHTML = posts.map(function(p) {
      return '<div class="post-card" onclick="showPostDetail(\'' + p.id + '\')">' +
        '<div style="display:flex;gap:14px;align-items:flex-start">' +
        '<div class="post-avatar">' + getInitial(p.authorName) + '</div>' +
        '<div style="flex:1;min-width:0">' +
        '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px">' +
        '<span class="post-category">' + escHtml(p.category) + '</span>' +
        '<span style="font-size:var(--font-lg);font-weight:700">' + escHtml(p.title) + '</span></div>' +
        '<div style="font-size:var(--font-md);color:var(--secondary);line-height:1.6;margin-bottom:10px">' + escHtml(truncate(p.content||'',80)) + '</div>' +
        '<div class="post-stats">' +
        '<span><i class="fas fa-user"></i> ' + escHtml(p.authorName) + '</span>' +
        '<span><i class="fas fa-clock"></i> ' + formatDate(p.createdAt) + '</span>' +
        '<span><i class="fas fa-eye"></i> ' + (p.views||0) + ' 次</span>' +
        '<span><i class="fas fa-heart"></i> ' + (p.likes||0) + ' 個讚</span></div></div>' +
        '<div style="flex-shrink:0;align-self:center"><i class="fas fa-chevron-right" style="color:var(--border);font-size:20px"></i></div>' +
        '</div></div>';
    }).join('');
    renderPagination('forumPagination', forumPage, Math.ceil(res.total/10), function(p) { forumPage=p; loadPosts(); });
  }

  async function showPostDetail(postId) {
    showLoading(true);
    var res = await callServer('getPost', postId);
    showLoading(false);
    if (!res.success) { showToast('載入失敗','error'); return; }
    var post = res.post, replies = res.replies || [];
    var images = [];
    try { images = JSON.parse(post.images||'[]'); } catch(e) { images = []; }
    showModal('postDetail',
      '<div class="modal-header"><div class="modal-title"><i class="fas fa-file-alt"></i> 文章內容</div>' +
      '<button class="modal-close" onclick="closeModal(\'postDetail\')"><i class="fas fa-times"></i></button></div>' +
      '<div class="modal-body">' +
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:14px;background:var(--primary-light);border-radius:var(--radius-sm)">' +
      '<div class="post-avatar">' + getInitial(post.authorName) + '</div>' +
      '<div style="flex:1"><div style="font-weight:700;font-size:var(--font-lg)">' + escHtml(post.authorName) + '</div>' +
      '<div style="font-size:var(--font-sm);color:var(--secondary)">' + formatDate(post.createdAt) + '</div></div>' +
      '<span class="post-category">' + escHtml(post.category) + '</span></div>' +

      (images.length ?
        '<div class="gallery-grid" style="margin-bottom:18px">' +
        images.map(function(url,i) {
          return '<div class="gallery-item" onclick="openLightbox(' + escHtml(JSON.stringify(images)) + ',' + i + ')">' +
            '<img src="' + escHtml(url) + '" loading="lazy"></div>';
        }).join('') + '</div>' : '') +
      '<div style="border-top:3px solid var(--border);padding-top:18px;margin-top:8px">' +
      '<h3 style="font-size:var(--font-lg);font-weight:700;margin-bottom:16px"><i class="fas fa-comments" style="color:var(--primary)"></i> 回覆留言 (' + replies.length + ')</h3>' +
      replies.map(function(r) {
        return '<div class="reply-card">' +
          '<div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">' +
          '<div class="reply-avatar">' + getInitial(r.authorName) + '</div>' +
          '<div><div style="font-weight:700;font-size:var(--font-md)">' + escHtml(r.authorName) + '</div>' +
          '<div style="font-size:var(--font-sm);color:var(--secondary)">' + formatDate(r.createdAt) + '</div></div></div>' +
          '<div style="font-size:var(--font-md);line-height:1.8;white-space:pre-wrap">' + escHtml(r.content) + '</div></div>';
      }).join('') +
      (APP.token ?
        '<div style="margin-top:18px;padding:18px;background:var(--light);border-radius:var(--radius-sm);border:2px solid var(--border)">' +
        '<div class="form-group"><label class="form-label"><i class="fas fa-pen"></i> 發表您的回覆</label>' +
        '<textarea class="form-control" id="replyContent" rows="4" placeholder="請輸入您的回覆..."></textarea></div>' +
        '<button class="btn btn-primary btn-block" onclick="submitReply(\'' + post.id + '\')"><i class="fas fa-paper-plane"></i> 送出回覆</button></div>' :
        '<div style="text-align:center;margin-top:18px;padding:18px;background:var(--light);border-radius:var(--radius-sm)">' +
        '<p style="font-size:var(--font-md);margin-bottom:14px;color:var(--secondary)">登入後才能回覆留言</p>' +

      '</div></div>', { size:'lg' });

  async function submitReply(postId) {
    var content = document.getElementById('replyContent')?.value?.trim();
    if (!content) { showToast('請輸入回覆內容','warning'); return; }
    showLoading(true);
    var res = await callServer('createReply', APP.token, postId, { content });
    showLoading(false);
    if (res.success) { showToast('回覆成功！','success'); closeModal('postDetail'); showPostDetail(postId); }
    else showToast(res.message,'error');

  function toggleFAQ(id) {
    var el = document.getElementById(id);
    var idx = id.replace('faq','');

    var isOpen = el.style.display !== 'none';

    if (icon) icon.style.transform = isOpen ? '' : 'rotate(180deg)';

        (APP.token ? '<button class="btn btn-primary btn-lg" style="margin-top:20px" onclick="showBatchUploadToAlbum(\'' + album.id + '\',\'' + escHtml(album.title) + '\')"><i class="fas fa-upload"></i> 上傳照片</button>' : '') + '</div>') +
      '</div><div id="albumPhotoPagination"></div>';
    renderPagination('albumPhotoPagination', 1, Math.ceil(totalPhotos/24), function(p){ loadAlbumPhotos(albumId, p); });
  }

  async function loadAlbumPhotos(albumId, page) {
    var res = await callServer('getAlbumById', albumId, page);
    if (!res.success) return;
    var photos = res.photos || [], totalPhotos = res.totalPhotos;
    var allUrls = photos.map(function(p){ return p.url; });
    var grid = document.getElementById('albumPhotoGrid');
    if (grid) grid.innerHTML = photos.map(function(p,i){ return renderPhotoItem(p, i, allUrls, albumId); }).join('');
    renderPagination('albumPhotoPagination', page, Math.ceil(totalPhotos/24), function(p){ loadAlbumPhotos(albumId, p); });
  }

  function renderPhotoItem(p, i, allUrls, albumId) {
    var isOwner = APP.token && APP.user && (p.uploaderId===APP.user.id || APP.user.memberType==='管理員');
    return '<div class="gallery-item" onclick="openLightbox(' + escHtml(JSON.stringify(allUrls)) + ',' + i + ')">' +
      '<img src="' + escHtml(p.url) + '" loading="lazy" alt="' + escHtml(p.caption||'') + '">' +
      '<div class="gallery-item-overlay"><div class="gallery-item-caption">' +
      (p.caption ? '<div style="font-weight:700;margin-bottom:3px">' + escHtml(p.caption) + '</div>' : '') +

      '</div></div>' +
      (isOwner ?
        '<div class="gallery-item-actions" onclick="event.stopPropagation()">' +
        '<button class="photo-action-btn" onclick="showEditCaption(\'' + p.id + '\',\'' + escHtml(p.caption||'') + '\',\'' + (albumId||'') + '\')"><i class="fas fa-pen"></i> 說明</button>' +
        '<button class="photo-action-btn danger" onclick="confirmDeletePhoto(\'' + p.id + '\',\'' + (albumId||'') + '\')"><i class="fas fa-trash"></i> 刪除</button>' +

      '</div>';
  }

  async function loadAllPhotos(page) {

  async function submitCreateAlbum() {
    var title = document.getElementById('albumTitle')?.value?.trim();
    if (!title) { showToast('請輸入相簿名稱','warning'); return; }
    showLoading(true);
    var res = await callServer('createAlbum', APP.token, {
      title,
      description: document.getElementById('albumDesc')?.value?.trim(),

  async function submitEditAlbum(albumId) {
    var title = document.getElementById('editAlbumTitle')?.value?.trim();
    if (!title) { showToast('請輸入相簿名稱','warning'); return; }
    showLoading(true);
    var res = await callServer('updateAlbum', APP.token, albumId, {
      title,
      description: document.getElementById('editAlbumDesc')?.value?.trim(),
      category:    document.getElementById('editAlbumCategory')?.value,
      status:      document.getElementById('editAlbumStatus')?.value
    });
    showLoading(false);
    if (res.success) {
      showToast('相簿更新成功！','success');
      closeModal('editAlbum');
      if (currentAlbumId === albumId) openAlbum(albumId, title);
      else loadAlbums();

  async function confirmDeleteAlbum(albumId) {
    var confirmed = await Swal.fire({
      title:'確定刪除此相簿？',
      text:'刪除後所有照片也會一併移除，無法復原',
      icon:'warning', showCancelButton:true,
      confirmButtonText:'<i class="fas fa-trash"></i> 確定刪除',
      cancelButtonText:'<i class="fas fa-times"></i> 取消',
      confirmButtonColor:'#dc3545'
    });
    if (!confirmed.isConfirmed) return;
    showLoading(true);
    var res = await callServer('deleteAlbum', APP.token, albumId);
    showLoading(false);
    if (res.success) { showToast('相簿已刪除','success'); loadAlbums(); }
    else showToast(res.message,'error');
  }

  function handleDropFiles(e) {
    e.preventDefault();
    document.getElementById('uploadZone')?.classList.remove('drag-over');
    handleBatchFiles(e.dataTransfer.files);
  }

  function handleBatchFiles(files) {
    batchFiles = batchFiles.concat(Array.from(files));
    var preview = document.getElementById('batchPreview');
    var count   = document.getElementById('batchCount');
    if (preview) {
      preview.innerHTML = batchFiles.map(function(f,i) {
        var url = URL.createObjectURL(f);
        return '<div class="upload-preview-item">' +
          '<img src="' + url + '" alt="' + escHtml(f.name) + '">' +
          '<button class="remove-btn" onclick="removeBatchFile(' + i + ')"><i class="fas fa-times"></i></button>' +
          '</div>';
      }).join('');
    }
    if (count) count.textContent = batchFiles.length > 0
      ? '✅ 已選擇 ' + batchFiles.length + ' 張照片，準備上傳' : '';
  }

  function removeBatchFile(idx) {
    batchFiles.splice(idx, 1);
    var preview = document.getElementById('batchPreview');
    var count   = document.getElementById('batchCount');
    if (preview) {
      preview.innerHTML = batchFiles.map(function(f,i) {
        var url = URL.createObjectURL(f);
        return '<div class="upload-preview-item">' +
          '<img src="' + url + '" alt="' + escHtml(f.name) + '">' +
          '<button class="remove-btn" onclick="removeBatchFile(' + i + ')"><i class="fas fa-times"></i></button>' +
          '</div>';
      }).join('');
    }
    if (count) count.textContent = batchFiles.length > 0
      ? '✅ 已選擇 ' + batchFiles.length + ' 張照片，準備上傳' : '';
  }

  async function submitBatchUpload() {
    if (!batchFiles.length) { showToast('請先選擇照片','warning'); return; }
    var albumId   = document.getElementById('uploadAlbumId')?.value || '';
    var albumName = document.getElementById('uploadAlbumName')?.value || '';
    var caption   = document.getElementById('batchCaption')?.value?.trim() || '';
    await runBatchUpload(batchFiles, { albumId, albumName, caption });
  }

  async function submitBatchUploadEvent() {
    if (!batchFiles.length) { showToast('請先選擇照片','warning'); return; }
    var eventId   = document.getElementById('uploadEventId')?.value || '';
    var eventName = document.getElementById('uploadEventName')?.value || '';
    var caption   = document.getElementById('batchCaption')?.value?.trim() || '';
    await runBatchUpload(batchFiles, { eventId, eventName, caption });
  }

  async function runBatchUpload(files, meta) {
    var btn      = document.getElementById('batchUploadBtn');
    var progress = document.getElementById('batchProgress');
    var bar      = document.getElementById('batchProgressBar');
    var text     = document.getElementById('batchProgressText');
    if (btn)      btn.disabled = true;
    if (progress) progress.style.display = 'block';
    var done = 0, success = 0;
    for (var i = 0; i < files.length; i++) {
      try {
        var b64 = await fileToBase64(files[i]);
        var photoData = {
          base64:    b64.split(',')[1],
          mimeType:  files[i].type,
          filename:  files[i].name,
          caption:   meta.caption   || '',
          albumId:   meta.albumId   || '',
          albumName: meta.albumName || '',
          eventId:   meta.eventId   || '',
          eventName: meta.eventName || ''
        };
        var res = await callServer('batchUploadPhotos', APP.token, [photoData]);
        if (res.success && res.successCount > 0) success++;
      } catch(e) { console.error('上傳失敗', e); }
      done++;
      var pct = Math.round(done / files.length * 100);
      if (bar)  bar.style.width  = pct + '%';
      if (text) text.textContent = '上傳中... 第 ' + done + ' 張 / 共 ' + files.length + ' 張（' + pct + '%）';
    }
    if (btn) btn.disabled = false;
    showToast(
      '上傳完成！成功 ' + success + ' 張，失敗 ' + (files.length - success) + ' 張',
      success === files.length ? 'success' : 'warning'
    );
    closeModal('batchUpload');
    batchFiles = [];
    if (currentAlbumId && meta.albumId === currentAlbumId) openAlbum(currentAlbumId, '');
    else if (meta.albumId) openAlbum(meta.albumId, meta.albumName);
    else loadAllPhotos();
  }

  function showEditCaption(photoId, currentCaption, albumId) {
    showModal('editCaption',
      '<div class="modal-header"><div class="modal-title"><i class="fas fa-pen"></i> 編輯照片說明</div>' +
      '<button class="modal-close" onclick="closeModal(\'editCaption\')"><i class="fas fa-times"></i></button></div>' +
      '<div class="modal-body">' +
      '<div class="form-group"><label class="form-label"><i class="fas fa-comment"></i> 照片說明文字</label>' +
      '<input type="text" class="form-control" id="editCaptionInput" value="' + escHtml(currentCaption) + '" placeholder="輸入照片說明..."></div>' +
      '</div>' +
      '<div class="modal-footer">' +
      '<button class="btn btn-secondary" onclick="closeModal(\'editCaption\')"><i class="fas fa-times"></i> 取消</button>' +
      '<button class="btn btn-primary" onclick="submitEditCaption(\'' + photoId + '\',\'' + (albumId||'') + '\')">' +
      '<i class="fas fa-save"></i> 儲存說明</button></div>',
      { size:'sm' });
  }

  async function submitEditCaption(photoId, albumId) {
    var caption = document.getElementById('editCaptionInput')?.value?.trim() || '';
    showLoading(true);
    var res = await callServer('updatePhotoCaption', APP.token, photoId, caption);
    showLoading(false);
    if (res.success) {
      showToast('說明已更新！','success');
      closeModal('editCaption');
      if (albumId) openAlbum(albumId,''); else loadAllPhotos();
    } else showToast(res.message,'error');
  }

  async function confirmDeletePhoto(photoId, albumId) {
    var confirmed = await Swal.fire({
      title:'確定刪除此照片？', text:'刪除後無法復原', icon:'warning',
      showCancelButton:true,
      confirmButtonText:'<i class="fas fa-trash"></i> 確定刪除',
      cancelButtonText:'<i class="fas fa-times"></i> 取消',
      confirmButtonColor:'#dc3545'
    });
    if (!confirmed.isConfirmed) return;
    showLoading(true);
    var res = await callServer('deleteEventPhoto', APP.token, photoId);
    showLoading(false);
    if (res.success) {
      showToast('照片已刪除','success');
      if (albumId) openAlbum(albumId,''); else loadAllPhotos();
    } else showToast(res.message,'error');
  }

  // ══════════════════════════════════════════
  // 行事曆
  // ══════════════════════════════════════════
  async function renderCalendar() {
    var main = document.getElementById('mainContent');
    if (!main) return;
    main.innerHTML =
      '<div class="page">' +
      '<div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px">' +
      '<div><div class="page-title"><i class="fas fa-calendar-alt"></i> 行事曆</div>' +
      '<div class="page-subtitle">活動行程一覽，不錯過任何活動</div></div>' +
      (APP.token && APP.user && APP.user.memberType==='管理員'
        ? '<button class="btn btn-primary" onclick="showCreateEventModal()"><i class="fas fa-plus"></i> 新增活動</button>'
        : '') +
      '</div>' +
      '<div class="grid-3" style="margin-bottom:24px">' +
      '<div class="big-action-btn" id="monthTabBtn" onclick="switchCalendarTab(\'month\')" style="border-color:var(--primary);background:var(--primary-light)"><i class="fas fa-calendar" style="color:var(--primary)"></i><span>月曆檢視</span></div>' +
      '<div class="big-action-btn" id="listTabBtn" onclick="switchCalendarTab(\'list\')"><i class="fas fa-list" style="color:var(--info)"></i><span>活動列表</span></div>' +
      (APP.token
        ? '<div class="big-action-btn" id="mineTabBtn" onclick="switchCalendarTab(\'mine\')"><i class="fas fa-ticket-alt" style="color:var(--success)"></i><span>我的報名</span></div>'
        : '<div></div>') +
      '</div>' +
      '<div id="calendarContent"></div></div>';
    await renderMonthCalendar();
  }

  async function switchCalendarTab(tab) {
    ['month','list','mine'].forEach(function(t) {
      var btn = document.getElementById(t+'TabBtn');
      if (!btn) return;
      btn.style.borderColor = t===tab ? 'var(--primary)' : 'var(--border)';
      btn.style.background  = t===tab ? 'var(--primary-light)' : '#fff';
    });
    if (tab==='month')     await renderMonthCalendar();
    else if (tab==='list') await renderEventList();
    else                   await renderMyRegistrations();
  }

  async function renderMonthCalendar() {
    var el = document.getElementById('calendarContent');
    if (!el) return;
    el.innerHTML = '<div class="skeleton" style="height:440px;border-radius:14px"></div>';
    var year  = APP.calendarDate.getFullYear();
    var month = APP.calendarDate.getMonth() + 1;
    var res   = await callServer('getEvents', year, month);
    var events = res.events || [];
    var firstDay    = new Date(year, month-1, 1).getDay();
    var daysInMonth = new Date(year, month, 0).getDate();
    var today = new Date();
    var monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    var dayNames   = ['日','一','二','三','四','五','六'];

    var calHtml =
      '<div class="calendar-container">' +
      '<div class="calendar-header">' +
      '<button class="calendar-nav-btn" onclick="changeCalendarMonth(-1)"><i class="fas fa-chevron-left"></i></button>' +
      '<h2>' + year + ' 年 ' + monthNames[month-1] + '</h2>' +
      '<button class="calendar-nav-btn" onclick="changeCalendarMonth(1)"><i class="fas fa-chevron-right"></i></button>' +
      '</div>' +
      '<div class="calendar-grid">' +
      dayNames.map(function(d){ return '<div class="calendar-day-header">' + d + '</div>'; }).join('');

    var prevMonthDays = new Date(year, month-1, 0).getDate();
    for (var i = 0; i < firstDay; i++) {
      calHtml += '<div class="calendar-day other-month"><div class="day-num">' + (prevMonthDays - firstDay + i + 1) + '</div></div>';
    }
    for (var d = 1; d <= daysInMonth; d++) {
      var isToday = today.getFullYear()===year && today.getMonth()+1===month && today.getDate()===d;
      var dayEvents = events.filter(function(e){ return new Date(e.startDate).getDate()===d; });
      calHtml +=
        '<div class="calendar-day ' + (isToday?'today':'') + '" onclick="showDayEvents(' + year + ',' + month + ',' + d + ')">' +
        '<div class="day-num">' + d + '</div>' +
        '<div class="day-events">' +
        dayEvents.slice(0,2).map(function(e){
          return '<div class="day-event" title="' + escHtml(e.title) + '">' + escHtml(truncate(e.title,6)) + '</div>';
        }).join('') +
        (dayEvents.length > 2 ? '<div class="day-event" style="background:var(--secondary)">+' + (dayEvents.length-2) + ' 場</div>' : '') +
        '</div></div>';
    }
    var remaining = 42 - firstDay - daysInMonth;
    for (var j = 1; j <= remaining; j++) {
      calHtml += '<div class="calendar-day other-month"><div class="day-num">' + j + '</div></div>';
    }
    calHtml += '</div></div>';

    el.innerHTML = calHtml +
      '<div style="margin-top:28px">' +
      '<h3 style="font-size:var(--font-xl);font-weight:700;margin-bottom:16px"><i class="fas fa-list" style="color:var(--primary)"></i> 本月活動（' + events.length + ' 場）</h3>' +
      (events.length
        ? events.map(function(e){ return renderEventCard(e, false); }).join('')
        : '<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>本月暫無活動</h3></div>') +
      '</div>';
  }

  function changeCalendarMonth(dir) {
    APP.calendarDate = new Date(APP.calendarDate.getFullYear(), APP.calendarDate.getMonth() + dir, 1);
    renderMonthCalendar();
  }

  function showDayEvents(year, month, day) {
    callServer('getEvents', year, month).then(function(res) {
      var events = (res.events||[]).filter(function(e){ return new Date(e.startDate).getDate()===day; });
      if (!events.length) { showToast(month + '月' + day + '日 沒有活動','info'); return; }
      showModal('dayEvents',
        '<div class="modal-header">' +
        '<div class="modal-title"><i class="fas fa-calendar-day"></i> ' + year + ' 年 ' + month + ' 月 ' + day + ' 日</div>' +
        '<button class="modal-close" onclick="closeModal(\'dayEvents\')"><i class="fas fa-times"></i></button></div>' +
        '<div class="modal-body">' +
        '<p style="font-size:var(--font-md);color:var(--secondary);margin-bottom:16px">共 ' + events.length + ' 場活動</p>' +
        events.map(function(e){ return renderEventCard(e, true); }).join('') +
        '</div>' +
        '<div class="modal-footer"><button class="btn btn-secondary btn-lg" onclick="closeModal(\'dayEvents\')"><i class="fas fa-times"></i> 關閉</button></div>',
        { size:'sm' });
    });
  }

  async function renderEventList() {
    var el = document.getElementById('calendarContent');
    if (!el) return;
    el.innerHTML = '<div class="skeleton" style="height:300px;border-radius:14px"></div>';
    var res = await callServer('getAllEvents');
    if (!res.success || !res.events.length) {
      el.innerHTML = '<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>尚無活動</h3></div>';
      return;
    }
    var now = new Date();
    var upcoming = res.events.filter(function(e){ return new Date(e.startDate) >= now; });
    var past     = res.events.filter(function(e){ return new Date(e.startDate) <  now; });
    el.innerHTML =
      (upcoming.length
        ? '<h3 style="font-size:var(--font-xl);font-weight:700;margin-bottom:16px;color:var(--success)"><i class="fas fa-calendar-check"></i> 即將到來（' + upcoming.length + ' 場）</h3>' +
          upcoming.map(function(e){ return renderEventCard(e, false); }).join('')
        : '') +
      (past.length
        ? '<h3 style="font-size:var(--font-xl);font-weight:700;margin:24px 0 16px;color:var(--secondary)"><i class="fas fa-history"></i> 過去活動（' + past.length + ' 場）</h3>' +
          past.map(function(e){ return renderEventCard(e, false); }).join('')
        : '');
  }

  function renderEventCard(e, compact) {
    var d = new Date(e.startDate);
    var monthAbbr = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return '<div class="event-card" style="cursor:pointer" onclick="showEventDetail(\'' + e.id + '\')">' +
      '<div class="event-date-badge">' +
      '<div class="month">' + monthAbbr[d.getMonth()] + '</div>' +
      '<div class="day">' + d.getDate() + '</div></div>' +
      '<div class="event-info">' +
      '<div class="event-title">' + escHtml(e.title) + '</div>' +
      '<div class="event-meta">' +
      (e.location ? '<span><i class="fas fa-map-marker-alt"></i> ' + escHtml(e.location) + '</span>' : '') +
      '<span><i class="fas fa-users"></i> ' + (e.currentParticipants||0) + '/' + (e.maxParticipants||'不限') + ' 人</span>' +
      '<span class="badge ' + (e.status==='進行中'?'badge-success':'badge-secondary') + '">' + escHtml(e.status) + '</span></div>' +
      (!compact && e.description
        ? '<div style="font-size:var(--font-sm);color:var(--secondary);margin-top:6px;line-height:1.6">' +
          escHtml(truncate(e.description,60)) + '</div>'
        : '') +
      '</div>' +
      '<div style="flex-shrink:0;align-self:center"><i class="fas fa-chevron-right" style="color:var(--border);font-size:22px"></i></div>' +
      '</div>';
  }

  async function showEventDetail(eventId) {
    showLoading(true);
    var results = await Promise.all([
      callServer('getEventById', eventId),
      APP.token ? callServer('getMyRegistrations', APP.token) : Promise.resolve({ registrations:[] })
    ]);
    showLoading(false);
    var eventRes = results[0], regRes = results[1];
    if (!eventRes.success) { showToast('載入失敗','error'); return; }
    var e = eventRes.event;
    var isRegistered = (regRes.registrations||[]).some(function(r){ return r.eventId===eventId; });
    var isFull = parseInt(e.maxParticipants)>0 && parseInt(e.currentParticipants)>=parseInt(e.maxParticipants);
    var infoFields = [
      ['fas fa-calendar-day','開始時間',formatFullDate(e.startDate)],
      ['fas fa-calendar-check','結束時間',formatFullDate(e.endDate)],
      ['fas fa-map-marker-alt','活動地點',e.location||'未指定'],
      ['fas fa-users','報名人數',(e.currentParticipants||0) + ' / ' + (e.maxParticipants||'不限') + ' 人']
    ];
    showModal('eventDetail',
      '<div class="modal-header"><div class="modal-title"><i class="fas fa-calendar-alt"></i> 活動詳情</div>' +
      '<button class="modal-close" onclick="closeModal(\'eventDetail\')"><i class="fas fa-times"></i></button></div>' +
      '<div class="modal-body">' +
      (e.coverImage ? '<img src="' + escHtml(e.coverImage) + '" style="width:100%;height:220px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:18px">' : '') +
      '<h2 style="font-size:var(--font-xl);font-weight:700;margin-bottom:16px;line-height:1.4">' + escHtml(e.title) + '</h2>' +
      '<div class="grid-2" style="margin-bottom:18px">' +
      infoFields.map(function(f) {
        return '<div style="padding:14px;background:var(--light);border-radius:var(--radius-sm);border:2px solid var(--border)">' +
          '<div style="font-size:var(--font-sm);color:var(--secondary);margin-bottom:5px"><i class="' + f[0] + '"></i> ' + f[1] + '</div>' +
          '<div style="font-weight:700;font-size:var(--font-md)">' + escHtml(String(f[2])) + '</div></div>';
      }).join('') + '</div>' +
      (e.description
        ? '<div style="font-size:var(--font-md);line-height:1.9;white-space:pre-wrap;padding:16px;background:var(--light);border-radius:var(--radius-sm);border-left:5px solid var(--primary)">' +
          escHtml(e.description) + '</div>'
        : '') +
      (isRegistered
        ? '<div style="margin-top:16px;padding:16px;background:#d4edda;border-radius:var(--radius-sm);border:2px solid var(--success);text-align:center">' +
          '<i class="fas fa-check-circle" style="color:var(--success);font-size:28px;margin-bottom:8px;display:block"></i>' +
          '<div style="font-weight:700;font-size:var(--font-lg);color:var(--success)">您已成功報名此活動！</div></div>'
        : '') +
      (isFull && !isRegistered
        ? '<div style="margin-top:16px;padding:16px;background:#f8d7da;border-radius:var(--radius-sm);border:2px solid var(--danger);text-align:center">' +
          '<i class="fas fa-times-circle" style="color:var(--danger);font-size:28px;margin-bottom:8px;display:block"></i>' +
          '<div style="font-weight:700;font-size:var(--font-lg);color:var(--danger)">報名人數已額滿</div></div>'
        : '') +
      '</div>' +
      '<div class="modal-footer" style="flex-wrap:wrap;gap:10px">' +
      '<button class="btn btn-secondary btn-lg" onclick="closeModal(\'eventDetail\')"><i class="fas fa-times"></i> 關閉</button>' +
      (APP.token && !isRegistered && !isFull
        ? '<button class="btn btn-success btn-lg" onclick="submitRegisterEvent(\'' + eventId + '\')"><i class="fas fa-ticket-alt"></i> 立即報名</button>'
        : '') +
      (APP.token && isRegistered
        ? '<button class="btn btn-outline-danger btn-lg" onclick="submitCancelRegistration(\'' + eventId + '\')"><i class="fas fa-times"></i> 取消報名</button>'
        : '') +
      (!APP.token
        ? '<button class="btn btn-primary btn-lg" onclick="navigateTo(\'auth\');closeModal(\'eventDetail\')"><i class="fas fa-sign-in-alt"></i> 登入後報名</button>'
        : '') +
      '</div>', { size:'md' });
  }

  async function submitRegisterEvent(eventId) {
    showLoading(true);
    var res = await callServer('registerEvent', APP.token, eventId, '');
    showLoading(false);
    if (res.success) {
      showToast(res.message || '報名成功！我們期待您的參與 🎉','success');
      closeModal('eventDetail');
      showEventDetail(eventId);
    } else showToast(res.message,'error');
  }

  async function submitCancelRegistration(eventId) {
    var confirmed = await Swal.fire({
      title:'確定要取消報名嗎？',
      text:'取消後若名額已滿將無法重新報名',
      icon:'question', showCancelButton:true,
      confirmButtonText:'<i class="fas fa-times"></i> 確定取消報名',
      cancelButtonText:'<i class="fas fa-arrow-left"></i> 保留報名',
      confirmButtonColor:'#dc3545', cancelButtonColor:'#6c757d'
    });
    if (!confirmed.isConfirmed) return;
    showLoading(true);
    var res = await callServer('cancelRegistration', APP.token, eventId);
    showLoading(false);
    if (res.success) { showToast(res.message || '已取消報名','info'); closeModal('eventDetail'); }
    else showToast(res.message,'error');
  }

  async function renderMyRegistrations() {
    var el = document.getElementById('calendarContent');
    if (!el) return;
    el.innerHTML = '<div class="skeleton" style="height:200px;border-radius:14px"></div>';
    var res = await callServer('getMyRegistrations', APP.token);
    if (!res.success || !res.registrations.length) {
      el.innerHTML =
        '<div class="empty-state"><i class="fas fa-ticket-alt"></i><h3>尚無報名記錄</h3><p>去看看有哪些活動可以參加吧！</p>' +
        '<button class="btn btn-primary btn-lg" style="margin-top:20px" onclick="switchCalendarTab(\'list\')">' +
        '<i class="fas fa-search"></i> 瀏覽活動</button></div>';
      return;
    }
    el.innerHTML =
      '<h3 style="font-size:var(--font-xl);font-weight:700;margin-bottom:18px">' +
      '<i class="fas fa-ticket-alt" style="color:var(--success)"></i> 我的報名記錄（共 ' + res.registrations.length + ' 筆）</h3>' +
      res.registrations.map(function(r) {
        return '<div class="card" style="margin-bottom:16px"><div class="card-body">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">' +
          '<div style="flex:1;min-width:0">' +
          '<div style="font-size:var(--font-xl);font-weight:700;margin-bottom:8px;line-height:1.4">' + escHtml(r.eventTitle) + '</div>' +
          '<div style="font-size:var(--font-md);color:var(--secondary);display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px">' +
          '<span><i class="fas fa-clock"></i> 報名時間：' + formatDate(r.registeredAt) + '</span>' +
          '<span class="badge badge-success"><i class="fas fa-check"></i> ' + escHtml(r.status) + '</span></div>' +
          (r.notes ? '<div style="font-size:var(--font-sm);color:var(--secondary);padding:8px 12px;background:var(--light);border-radius:var(--radius-sm)"><i class="fas fa-sticky-note"></i> 備註：' + escHtml(r.notes) + '</div>' : '') +
          '</div>' +
          '<button class="btn btn-outline-danger" onclick="submitCancelRegistration(\'' + r.eventId + '\')">' +
          '<i class="fas fa-times"></i> 取消報名</button>' +
          '</div></div></div>';
      }).join('');
  }

</script>
