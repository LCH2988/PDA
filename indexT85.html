<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>台灣帕金森病友權益促進會</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root{
  --primary:#4A90D9;--primary-dark:#2c6fad;--primary-light:#e8f4fd;
  --secondary:#6c757d;--success:#28a745;--danger:#dc3545;
  --warning:#ffc107;--info:#17a2b8;
  --light:#f8f9fa;--dark:#343a40;--border:#dee2e6;
  --shadow:0 2px 15px rgba(0,0,0,.1);--shadow-lg:0 8px 30px rgba(0,0,0,.15);
  --radius:12px;--radius-sm:8px;--transition:all .3s ease;
  --font:'Segoe UI','Microsoft JhengHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#f0f4f8;color:var(--dark);overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;outline:none;background:none}
input,textarea,select{outline:none;font-family:var(--font)}
img{max-width:100%}

/* ── 動畫 ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── 載入畫面 ── */
.loading-screen{position:fixed;inset:0;background:linear-gradient(135deg,#4A90D9,#2c6fad);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
.loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loading-content{text-align:center;color:#fff}
.loading-logo{font-size:64px;margin-bottom:16px;animation:pulse 1.5s infinite}
.loading-text{font-size:26px;font-weight:700;margin-bottom:24px;letter-spacing:3px}
.loading-spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}

/* ── 導覽列 ── */
.navbar{position:fixed;top:0;left:0;right:0;height:64px;background:#fff;box-shadow:var(--shadow);z-index:1000;display:flex;align-items:center;padding:0 20px;gap:16px}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;color:var(--primary);min-width:150px;white-space:nowrap}
.nav-brand i{font-size:24px}
.nav-menu{display:flex;gap:4px;flex:1;justify-content:center}
.nav-item{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);color:var(--secondary);font-size:14px;font-weight:500;transition:var(--transition);white-space:nowrap}
.nav-item:hover,.nav-item.active{background:var(--primary-light);color:var(--primary)}
.nav-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-notif{position:relative;width:40px;height:40px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.btn-notif:hover{background:var(--primary-light);color:var(--primary)}
.notif-badge{position:absolute;top:-2px;right:-2px;background:var(--danger);color:#fff;font-size:10px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
.btn-menu{display:none;width:40px;height:40px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:18px;align-items:center;justify-content:center}
.nav-menu.mobile-open{display:flex;flex-direction:column;position:fixed;top:64px;left:0;right:0;background:#fff;padding:12px;box-shadow:var(--shadow);z-index:999;animation:slideUp .2s ease}
.nav-menu.mobile-open .nav-item{padding:12px 16px}

/* ── 通知面板 ── */
.notif-panel{position:fixed;top:70px;right:16px;width:320px;max-height:440px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:999;display:none;flex-direction:column;overflow:hidden;animation:fadeIn .2s ease}
.notif-panel.show{display:flex}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);font-weight:600;font-size:15px}
.notif-header button{color:var(--primary);font-size:12px;font-weight:600}
.notif-list{overflow-y:auto;flex:1}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.notif-item:hover{background:var(--light)}
.notif-item.unread{background:var(--primary-light)}
.notif-item .notif-title{font-weight:600;font-size:13px;margin-bottom:3px}
.notif-item .notif-body{font-size:12px;color:var(--secondary);line-height:1.4}
.notif-item .notif-time{font-size:11px;color:#bbb;margin-top:4px}

/* ── 主內容 ── */
.main-content{margin-top:64px;margin-bottom:70px;min-height:calc(100vh - 134px)}

/* ── 底部導覽（手機） ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.1);z-index:1000;justify-content:space-around;align-items:center}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;color:var(--secondary);font-size:10px;transition:var(--transition);flex:1;white-space:nowrap}
.bottom-nav-item i{font-size:20px}
.bottom-nav-item.active{color:var(--primary)}

/* ── 頁面 ── */
.page{padding:20px;max-width:1200px;margin:0 auto;animation:fadeIn .3s ease}
.page-header{margin-bottom:24px}
.page-title{font-size:26px;font-weight:700;color:var(--dark);margin-bottom:6px;display:flex;align-items:center;gap:10px}
.page-subtitle{color:var(--secondary);font-size:14px}

/* ── 卡片 ── */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:var(--transition)}
.card-hover:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600}
.card-body{padding:20px}
.card-footer{padding:12px 20px;border-top:1px solid var(--border);background:var(--light)}

/* ── 按鈕 ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;transition:var(--transition);cursor:pointer;border:2px solid transparent;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,144,217,.4)}
.btn-secondary{background:var(--secondary);color:#fff;border-color:var(--secondary)}
.btn-secondary:hover{background:#5a6268;transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#218838;transform:translateY(-1px)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-danger:hover{background:#c82333;transform:translateY(-1px)}
.btn-warning{background:var(--warning);color:var(--dark);border-color:var(--warning)}
.btn-outline{background:transparent;border-color:var(--primary);color:var(--primary)}
.btn-outline:hover{background:var(--primary);color:#fff}
.btn-outline-danger{background:transparent;border-color:var(--danger);color:var(--danger)}
.btn-outline-danger:hover{background:var(--danger);color:#fff}
.btn-light{background:var(--light);color:var(--dark);border-color:var(--border)}
.btn-light:hover{background:var(--border)}
.btn-line{background:#06C755;color:#fff;border-color:#06C755}
.btn-line:hover{background:#05a847;transform:translateY(-1px)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:14px 28px;font-size:16px}
.btn-block{width:100%;justify-content:center}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%;justify-content:center}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── 表單 ── */
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:14px;font-weight:600;color:var(--dark);margin-bottom:6px}
.required{color:var(--danger);margin-left:3px}
.form-control{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:var(--transition);background:#fff;color:var(--dark)}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.15)}
.form-hint{font-size:12px;color:var(--secondary);margin-top:4px}
textarea.form-control{resize:vertical;min-height:100px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.input-group{display:flex;gap:8px}
.input-group .form-control{flex:1}

/* ── 頁籤 ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-size:14px;font-weight:500;color:var(--secondary);border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:var(--transition);cursor:pointer;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--primary);background:var(--primary-light)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .28s ease}
.modal-overlay.show{opacity:1}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);transform:scale(.95);transition:transform .28s ease;overflow:hidden}
.modal-overlay.show .modal{transform:scale(1)}
.modal-lg{max-width:800px}
.modal-sm{max-width:400px}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--light);color:var(--secondary);font-size:16px;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0}
.modal-close:hover{background:var(--danger);color:#fff}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;background:var(--light)}

/* ── Toast ── */
.toast-container{position:fixed;bottom:80px;right:16px;z-index:3000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--radius-sm);background:#fff;box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;min-width:220px;max-width:320px;animation:slideUp .3s ease;pointer-events:auto}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.warning{border-left:4px solid var(--warning)}
.toast.info{border-left:4px solid var(--info)}

/* ── 全域 Loading ── */
.global-loading{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:4000;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.global-loading .spinner{width:50px;height:50px;border:5px solid var(--primary-light);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
.global-loading p{color:var(--primary);font-weight:600;font-size:15px}

/* ── Skeleton ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}

/* ── 格線 ── */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:48px 24px;text-align:center}
.hero h1{font-size:36px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:12px}
.hero p{font-size:16px;opacity:.9;margin-bottom:8px}
.hero-stats{display:flex;justify-content:center;gap:40px;margin-top:28px;flex-wrap:wrap}
.hero-stat .num{font-size:32px;font-weight:800}
.hero-stat .label{font-size:12px;opacity:.8;margin-top:2px}

/* ── 快速入口 ── */
.quick-actions{display:grid;grid-template-columns:repeat(6,1fr);gap:0;background:#fff;border-bottom:1px solid var(--border)}
.quick-action{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 8px;cursor:pointer;transition:var(--transition);color:var(--secondary);font-size:12px;font-weight:500}
.quick-action i{font-size:24px;color:var(--primary)}
.quick-action:hover{background:var(--primary-light);color:var(--primary)}

/* ── 搜尋列 ── */
.search-bar{display:flex;gap:10px;margin-bottom:20px;background:#fff;padding:14px;border-radius:var(--radius);box-shadow:var(--shadow)}
.search-input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:var(--transition)}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.15)}

/* ── 論壇 ── */
.forum-layout{display:grid;grid-template-columns:220px 1fr;gap:20px}
.forum-sidebar .card{position:sticky;top:80px}
.category-list{list-style:none}
.category-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-size:14px;color:var(--secondary)}
.category-item:hover,.category-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.post-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:14px;cursor:pointer;transition:var(--transition);animation:fadeIn .3s ease}
.post-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.post-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.post-category{background:var(--primary-light);color:var(--primary);font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.post-stats{display:flex;gap:16px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--secondary)}
.reply-card{background:var(--light);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.reply-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--success),#1e7e34);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}

/* ── 新聞卡片 ── */
.news-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:var(--transition)}
.news-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.news-card-img{height:140px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;overflow:hidden}
.news-card-img img{width:100%;height:100%;object-fit:cover}
.news-card-body{padding:14px}
.news-card-title{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-excerpt{font-size:13px;color:var(--secondary);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-meta{display:flex;gap:12px;font-size:12px;color:var(--secondary);flex-wrap:wrap}

/* ── 相簿 ── */
.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.album-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;transition:var(--transition)}
.album-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}
.album-cover{height:160px;overflow:hidden;position:relative;background:var(--primary-light)}
.album-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s ease}
.album-card:hover .album-cover img{transform:scale(1.05)}
.album-cover-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.65),transparent);padding:14px 12px 10px}
.album-cover-title{color:#fff;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-cover-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px}
.album-action-btn{background:rgba(255,255,255,.88);border:none;border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:var(--transition)}
.album-action-btn:hover{background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.album-action-btn.danger{background:rgba(220,53,69,.85);color:#fff}
.album-action-btn.danger:hover{background:var(--danger)}
.album-info{padding:12px 14px}
.album-desc{font-size:12px;color:var(--secondary);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.album-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--secondary)}
.album-photo-count{display:flex;align-items:center;gap:4px;font-weight:600;color:var(--primary)}

/* ── 圖片庫 ── */
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gallery-item{position:relative;aspect-ratio:1;overflow:hidden;border-radius:var(--radius-sm);cursor:pointer;background:var(--light)}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .35s ease}
.gallery-item:hover img{transform:scale(1.08)}
.gallery-item-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);transition:background .3s ease;display:flex;align-items:flex-end}
.gallery-item:hover .gallery-item-overlay{background:rgba(0,0,0,.45)}
.gallery-item-caption{padding:10px;color:#fff;font-size:12px;opacity:0;transition:opacity .3s ease;width:100%}
.gallery-item:hover .gallery-item-caption{opacity:1}
.gallery-item-actions{position:absolute;top:6px;right:6px;display:flex;gap:4px;opacity:0;transition:opacity .3s ease;z-index:2}
.gallery-item:hover .gallery-item-actions{opacity:1}
.photo-action-btn{background:rgba(255,255,255,.88);border:none;border-radius:6px;padding:4px 7px;font-size:10px;cursor:pointer;transition:var(--transition)}
.photo-action-btn:hover{background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.photo-action-btn.danger{background:rgba(220,53,69,.85);color:#fff}
.photo-action-btn.danger:hover{background:var(--danger)}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:5000;display:none;align-items:center;justify-content:center;flex-direction:column}
.lightbox.show{display:flex}
.lightbox-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 80px;width:100%}
.lightbox-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:4px}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);color:#fff;border:none;width:52px;height:52px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.lightbox-nav:hover{background:rgba(255,255,255,.3)}
.lightbox-prev{left:16px}
.lightbox-next{right:16px}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.lightbox-close:hover{background:var(--danger)}
.lightbox-caption{color:rgba(255,255,255,.8);font-size:14px;padding:12px 24px;text-align:center}

/* ── 行事曆 ── */
.calendar-container{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:24px}
.calendar-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff}
.calendar-header h2{font-size:20px;font-weight:700}
.calendar-nav-btn{background:rgba(255,255,255,.2);color:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.calendar-nav-btn:hover{background:rgba(255,255,255,.35)}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.calendar-day-header{padding:10px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--secondary);background:var(--light);border-bottom:1px solid var(--border)}
.calendar-day{min-height:80px;padding:6px;border:1px solid var(--border);cursor:pointer;transition:var(--transition);position:relative}
.calendar-day:hover{background:var(--primary-light)}
.calendar-day.today{background:var(--primary-light)}
.calendar-day.today .day-num{background:var(--primary);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.calendar-day.other-month{background:#fafafa;opacity:.5}
.day-num{font-size:13px;font-weight:600;margin-bottom:4px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.day-events{display:flex;flex-direction:column;gap:2px}
.day-event{background:var(--primary);color:#fff;font-size:10px;padding:2px 5px;border-radius:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 活動卡片 ── */
.event-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;display:flex;gap:16px;align-items:flex-start;transition:var(--transition)}
.event-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.event-date-badge{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:var(--radius-sm);padding:8px 12px;text-align:center;min-width:56px;flex-shrink:0}
.event-date-badge .month{font-size:10px;text-transform:uppercase;opacity:.85}
.event-date-badge .day{font-size:26px;font-weight:800;line-height:1}
.event-info{flex:1;min-width:0}
.event-title{font-size:16px;font-weight:700;margin-bottom:6px}
.event-meta{display:flex;gap:14px;font-size:13px;color:var(--secondary);flex-wrap:wrap}

/* ── 個人資料 ── */
.profile-header{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:40px 20px;text-align:center;color:#fff}
.profile-avatar{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.25);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:40px;cursor:pointer;overflow:hidden;border:3px solid rgba(255,255,255,.5);transition:var(--transition)}
.profile-avatar:hover{border-color:#fff;transform:scale(1.05)}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-name{font-size:22px;font-weight:700;margin-bottom:6px}
.profile-badge{background:rgba(255,255,255,.2);padding:4px 14px;border-radius:20px;font-size:13px;display:inline-block}
.profile-menu{list-style:none}
.profile-menu-item{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition);font-size:15px}
.profile-menu-item:hover{background:var(--primary-light)}
.profile-menu-item i:first-child{width:22px;text-align:center;color:var(--primary);font-size:16px}
.profile-menu-item .arrow{margin-left:auto;color:var(--border);font-size:12px}

/* ── 健康卡片 ── */
.health-card{background:var(--primary-light);border-radius:var(--radius-sm);padding:16px}
.health-card h3{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--primary);display:flex;align-items:center;gap:6px}
.health-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(74,144,217,.15);font-size:14px}
.health-item .label{color:var(--secondary);font-weight:500}
.health-item .value{font-weight:600;text-align:right;max-width:60%}

/* ── 捐款 ── */
.donation-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.donation-icon{width:44px;height:44px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.donation-info{flex:1}
.donation-amount{font-size:16px;font-weight:700;color:var(--success)}

/* ── 認證頁 ── */
.auth-container{min-height:calc(100vh - 134px);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:36px;width:100%;max-width:480px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo i{font-size:52px;color:var(--primary);display:block;margin-bottom:10px}
.auth-logo h1{font-size:24px;font-weight:700;color:var(--dark);margin-bottom:6px}
.auth-logo p{color:var(--secondary);font-size:14px}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:24px}
.auth-tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:600;color:var(--secondary);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:var(--transition)}
.auth-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.divider{text-align:center;color:var(--secondary);font-size:13px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}
.divider::after{right:0}

/* ── 上傳區 ── */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;transition:var(--transition);color:var(--secondary)}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.upload-zone i{font-size:40px;margin-bottom:10px;display:block}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.upload-preview-item{position:relative;width:80px;height:80px;border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--border)}
.upload-preview-item img{width:100%;height:100%;object-fit:cover}
.remove-btn{position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* ── 進度條 ── */
.progress{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:5px;transition:width .3s ease}

/* ── 分頁 ── */
.pagination{display:flex;justify-content:center;gap:6px;padding:20px 0;flex-wrap:wrap}
.page-btn{width:38px;height:38px;border-radius:var(--radius-sm);background:#fff;border:2px solid var(--border);color:var(--secondary);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.page-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.page-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── 標籤 ── */
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.badge-primary{background:var(--primary-light);color:var(--primary)}
.badge-success{background:#d4edda;color:var(--success)}
.badge-danger{background:#f8d7da;color:var(--danger)}
.badge-warning{background:#fff3cd;color:#856404}
.badge-secondary{background:var(--light);color:var(--secondary)}
.pin-badge{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tag{background:var(--primary-light);color:var(--primary);padding:3px 10px;border-radius:20px;font-size:12px;margin-right:4px;margin-bottom:4px;display:inline-block}

/* ── 空狀態 ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--secondary)}
.empty-state i{font-size:56px;margin-bottom:16px;display:block;opacity:.4}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--dark)}
.empty-state p{font-size:14px;line-height:1.6}

/* ── 其他 ── */
.section-divider{border:none;border-top:2px solid var(--border);margin:20px 0}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:16px;flex-wrap:wrap}
.breadcrumb a{color:var(--primary);cursor:pointer}
.breadcrumb .sep{color:var(--secondary);font-size:11px}

/* ── RWD ── */
@media(max-width:1024px){
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .gallery-grid{grid-template-columns:repeat(3,1fr)}
  .album-grid{grid-template-columns:repeat(2,1fr)}
  .quick-actions{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .nav-menu{display:none}
  .btn-menu{display:flex}
  .bottom-nav{display:flex}
  .main-content{margin-bottom:60px}
  .forum-layout{grid-template-columns:1fr}
  .forum-sidebar{display:none}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .gallery-grid{grid-template-columns:repeat(3,1fr)}
  .album-grid{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row-3{grid-template-columns:1fr}
  .hero h1{font-size:26px}
  .hero-stats{gap:24px}
  .page{padding:14px}
  .toast-container{bottom:70px;right:8px;left:8px}
  .toast{min-width:unset;max-width:100%}
  .notif-panel{right:8px;left:8px;width:auto}
}
@media(max-width:480px){
  .gallery-grid{grid-template-columns:repeat(2,1fr)}
  .album-grid{grid-template-columns:1fr}
  .quick-actions{grid-template-columns:repeat(3,1fr)}
  .calendar-day{min-height:52px;padding:4px}
  .day-event{display:none}
}
</style>

<body>

<!-- 載入畫面 -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-content">
    <div class="loading-logo">❤️</div>
    <div class="loading-text">台灣帕金森病友權益促進會</div>
    <div class="loading-spinner"></div>
  </div>
</div>

<!-- 全域 Loading -->
<div class="global-loading" id="globalLoading">
  <div class="spinner"></div>
  <p>處理中，請稍候...</p>
</div>

<!-- 導覽列 -->
<nav class="navbar">
  <div class="nav-brand"><i class="fas fa-heart"></i> 社群平台</div>
  <div class="nav-menu" id="navMenu">
    <a class="nav-item active" data-page="home"><i class="fas fa-home"></i> 首頁</a>
    <a class="nav-item" data-page="forum"><i class="fas fa-comments"></i> 論壇</a>
    <a class="nav-item" data-page="news"><i class="fas fa-newspaper"></i> 資訊</a>
    <a class="nav-item" data-page="gallery"><i class="fas fa-images"></i> 花絮</a>
    <a class="nav-item" data-page="calendar"><i class="fas fa-calendar-alt"></i> 行事曆</a>
    <a class="nav-item" data-page="profile"><i class="fas fa-user-circle"></i> 個人</a>
  </div>
  <div class="nav-actions">
    <button class="btn-notif" id="notifBtn" onclick="toggleNotifications()">
      <i class="fas fa-bell"></i>
      <span class="notif-badge" id="notifBadge" style="display:none">0</span>
    </button>
    <button class="btn-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
  </div>
</nav>

<!-- 通知面板 -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <span><i class="fas fa-bell"></i> 通知</span>
    <button onclick="markAllRead()">全部已讀</button>
  </div>
  <div class="notif-list" id="notifList">
    <div class="empty-state" style="padding:30px">
      <i class="fas fa-bell-slash" style="font-size:32px"></i><p>暫無通知</p>
    </div>
  </div>
</div>

<!-- 主內容 -->
<main class="main-content" id="mainContent"></main>

<!-- Modal 容器 -->
<div id="modalContainer"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)"><i class="fas fa-chevron-left"></i></button>
  <div class="lightbox-img-wrap"><img id="lightboxImg" src="" alt=""></div>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)"><i class="fas fa-chevron-right"></i></button>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<!-- 底部導覽（手機） -->
<nav class="bottom-nav">
  <div class="bottom-nav-item active" data-page="home" onclick="navigateTo('home')"><i class="fas fa-home"></i><span>首頁</span></div>
  <div class="bottom-nav-item" data-page="forum" onclick="navigateTo('forum')"><i class="fas fa-comments"></i><span>論壇</span></div>
  <div class="bottom-nav-item" data-page="gallery" onclick="navigateTo('gallery')"><i class="fas fa-images"></i><span>花絮</span></div>
  <div class="bottom-nav-item" data-page="calendar" onclick="navigateTo('calendar')"><i class="fas fa-calendar-alt"></i><span>行事曆</span></div>
  <div class="bottom-nav-item" data-page="profile" onclick="navigateTo('profile')"><i class="fas fa-user-circle"></i><span>個人</span></div>
</nav>

<script>
// ════════════════════════════════════════════════
// 全域設定
// ════════════════════════════════════════════════
const LIFF_ID = '2001679903-O06mNaLy';
const API_URL = 'https://script.google.com/macros/s/AKfycbweBJbLmTGCsAAJMM1M5o04md2Ho1vIJw9-lRrLwvtQyE_vAWhHsR8hwCZBjdwlmjn6/exec';

const APP = {
  token: localStorage.getItem('token') || null,
  user:  JSON.parse(localStorage.getItem('user') || 'null'),
  currentPage: 'home',
  calendarDate: new Date(),
  lightboxImages: [],
  lightboxIndex: 0
};

// ════════════════════════════════════════════════
// API 呼叫（URL fetch）
// ════════════════════════════════════════════════
async function callServer(fn, ...args) {
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ fn, args })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch(e) {
    console.error(`callServer(${fn}) 失敗:`, e);
    return { success: false, message: e.message || '網路錯誤，請稍後再試' };
  }
}

// ════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════
async function initApp() {
  try { await initLiff(); } catch(e) { console.log('LIFF skip:', e.message); }
  setupNavigation();
  setupToastContainer();
  renderPage('home');
  if (APP.token) { loadNotifications(); setInterval(loadNotifications, 60000); }
  setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 900);
}

async function initLiff() {
  if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') return;
  await liff.init({ liffId: LIFF_ID });
  if (liff.isLoggedIn() && !APP.token) {
    const profile = await liff.getProfile();
    const res = await callServer('loginMember', {
      lineId: profile.userId, name: profile.displayName, avatar: profile.pictureUrl
    });
    if (res.success) saveSession(res.token, res.member);
  }
}

function saveSession(token, member) {
  APP.token = token; APP.user = member;
  localStorage.setItem('token', token);
  localStorage.setItem('user', JSON.stringify(member));
}

function clearSession() {
  APP.token = null; APP.user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
}

// ════════════════════════════════════════════════
// 導航
// ════════════════════════════════════════════════
function setupNavigation() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.addEventListener('click', e => { e.preventDefault(); navigateTo(el.dataset.page); });
  });
}

function navigateTo(page) {
  APP.currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el =>
    el.classList.toggle('active', el.dataset.page === page));
  document.getElementById('notifPanel')?.classList.remove('show');
  document.getElementById('navMenu')?.classList.remove('mobile-open');
  renderPage(page);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleMobileMenu() {
  document.getElementById('navMenu')?.classList.toggle('mobile-open');
}

function renderPage(page) {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = `<div class="page">${Array(3).fill(
    '<div class="skeleton" style="height:120px;margin-bottom:16px;border-radius:12px"></div>'
  ).join('')}</div>`;
  const routes = {
    home: renderHome, forum: renderForum, news: renderNews,
    gallery: renderGallery, calendar: renderCalendar,
    profile: renderProfile, auth: renderAuth
  };
  (routes[page] || renderHome)();
}

// ════════════════════════════════════════════════
// 通知
// ════════════════════════════════════════════════
async function loadNotifications() {
  if (!APP.token) return;
  try {
    const res = await callServer('getNotifications', APP.token);
    if (!res.success) return;
    const badge = document.getElementById('notifBadge');
    if (badge) { badge.textContent = res.unread; badge.style.display = res.unread > 0 ? 'flex' : 'none'; }
    const list = document.getElementById('notifList');
    if (!list) return;
    if (!res.notifications.length) {
      list.innerHTML = `<div class="empty-state" style="padding:30px">
        <i class="fas fa-bell-slash" style="font-size:32px"></i><p>暫無通知</p></div>`;
      return;
    }
    list.innerHTML = res.notifications.map(n => `
      <div class="notif-item ${!n.isRead?'unread':''}" onclick="readNotif('${n.id}')">
        <div class="notif-title">${getNotifIcon(n.type)} ${escHtml(n.title)}</div>
        <div class="notif-body">${escHtml(n.content)}</div>
        <div class="notif-time">${formatDate(n.createdAt)}</div>
      </div>`).join('');
  } catch(e) { console.error('通知載入失敗', e); }
}

function getNotifIcon(type) {
  return { '活動':'🎉', '私信':'✉️', '系統':'🔔', '公告':'📢' }[type] || '🔔';
}

function toggleNotifications() {
  const panel = document.getElementById('notifPanel');
  if (!panel) return;
  panel.classList.toggle('show');
  if (panel.classList.contains('show')) loadNotifications();
}

async function readNotif(id) {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, id);
  loadNotifications();
}

async function markAllRead() {
  if (!APP.token) return;
  await callServer('markNotificationRead', APP.token, 'all');
  loadNotifications();
  showToast('已全部標為已讀', 'success');
}

// ════════════════════════════════════════════════
// Modal
// ════════════════════════════════════════════════
function showModal(id, content, opts = {}) {
  closeAllModals();
  const sizeClass = opts.size === 'lg' ? 'modal-lg' : opts.size === 'sm' ? 'modal-sm' : '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'overlay_' + id;
  overlay.innerHTML = `<div class="modal ${sizeClass}" id="modal_${id}">${content}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(id); });
  document.getElementById('modalContainer').appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('show'));
}

function closeModal(id) {
  const overlay = document.getElementById('overlay_' + id);
  if (!overlay) return;
  overlay.classList.remove('show');
  setTimeout(() => overlay.remove(), 280);
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 280);
  });
}

// ════════════════════════════════════════════════
// Lightbox
// ════════════════════════════════════════════════
function openLightbox(images, index) {
  APP.lightboxImages = typeof images === 'string' ? JSON.parse(images) : images;
  APP.lightboxIndex = index || 0;
  updateLightbox();
  document.getElementById('lightbox')?.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox')?.classList.remove('show');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  APP.lightboxIndex = (APP.lightboxIndex + dir + APP.lightboxImages.length) % APP.lightboxImages.length;
  updateLightbox();
}

function updateLightbox() {
  const img = document.getElementById('lightboxImg');
  if (img) img.src = APP.lightboxImages[APP.lightboxIndex];
  const cap = document.getElementById('lightboxCaption');
  if (cap) cap.textContent = `${APP.lightboxIndex + 1} / ${APP.lightboxImages.length}`;
}

// ════════════════════════════════════════════════
// Toast
// ════════════════════════════════════════════════
function setupToastContainer() {
  if (!document.getElementById('toastContainer')) {
    const el = document.createElement('div');
    el.className = 'toast-container'; el.id = 'toastContainer';
    document.body.appendChild(el);
  }
}

function showToast(msg, type = 'info', duration = 3000) {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]||''}</span><span>${escHtml(msg)}</span>`;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all .3s ease';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function showLoading(show) {
  const el = document.getElementById('globalLoading');
  if (el) el.style.display = show ? 'flex' : 'none';
}

// ════════════════════════════════════════════════
// 分頁元件
// ════════════════════════════════════════════════
function renderPagination(containerId, current, total, onPage) {
  const el = document.getElementById(containerId);
  if (!el || total <= 1) { if(el) el.innerHTML=''; return; }
  const pages = [1];
  for (let i = Math.max(2, current-1); i <= Math.min(total-1, current+1); i++) pages.push(i);
  if (total > 1) pages.push(total);
  const unique = [...new Set(pages)];
  const fnStr = onPage.toString();
  let html = '<div class="pagination">';
  html += `<button class="page-btn" ${current<=1?'disabled':''} onclick="(${fnStr})(${current-1})">
    <i class="fas fa-chevron-left"></i></button>`;
  let prev = 0;
  unique.forEach(p => {
    if (p - prev > 1) html += `<span class="page-btn" style="cursor:default">…</span>`;
    html += `<button class="page-btn ${p===current?'active':''}" onclick="(${fnStr})(${p})">${p}</button>`;
    prev = p;
  });
  html += `<button class="page-btn" ${current>=total?'disabled':''} onclick="(${fnStr})(${current+1})">
    <i class="fas fa-chevron-right"></i></button>`;
  html += '</div>';
  el.innerHTML = html;
}

// ════════════════════════════════════════════════
// 檔案處理
// ════════════════════════════════════════════════
const fileStore = {};

function previewFiles(input, previewId, storeKey) {
  fileStore[storeKey] = Array.from(input.files);
  renderFilePreview(storeKey, previewId, input.id);
}

function renderFilePreview(storeKey, previewId, inputId) {
  const preview = document.getElementById(previewId);
  if (!preview) return;
  preview.innerHTML = (fileStore[storeKey] || []).map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="upload-preview-item">
      <img src="${url}" alt="${escHtml(f.name)}">
      <button class="remove-btn" onclick="removeFile('${storeKey}',${i},'${previewId}','${inputId}')">
        <i class="fas fa-times"></i>
      </button>
    </div>`;
  }).join('');
}

function removeFile(storeKey, idx, previewId, inputId) {
  if (fileStore[storeKey]) fileStore[storeKey].splice(idx, 1);
  renderFilePreview(storeKey, previewId, inputId);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadImages(files) {
  if (!files || !files.length) return [];
  const urls = [];
  for (const file of files) {
    try {
      const b64 = await fileToBase64(file);
      const res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) urls.push(res.url);
    } catch(e) { console.error('圖片上傳失敗', e); }
  }
  return urls;
}

async function uploadFiles(files) {
  if (!files || !files.length) return [];
  const results = [];
  for (const file of files) {
    try {
      const b64 = await fileToBase64(file);
      const res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) results.push({ name: file.name, url: res.url, isImage: res.isImage });
    } catch(e) { console.error('檔案上傳失敗', e); }
  }
  return results;
}

// ════════════════════════════════════════════════
// 工具函數
// ════════════════════════════════════════════════
function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    const now = new Date(), diff = now - d;
    if (diff < 60000)    return '剛剛';
    if (diff < 3600000)  return Math.floor(diff/60000) + ' 分鐘前';
    if (diff < 86400000) return Math.floor(diff/3600000) + ' 小時前';
    if (diff < 604800000)return Math.floor(diff/86400000) + ' 天前';
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
  } catch(e) { return String(dateStr); }
}

function formatFullDate(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return String(dateStr);
    return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  } catch(e) { return String(dateStr); }
}

function getInitial(name) { return name ? String(name).charAt(0).toUpperCase() : '?'; }
function truncate(str, len) { if (!str) return ''; return str.length > len ? str.substring(0, len) + '...' : str; }

async function lineLogin() {
  if (typeof liff === 'undefined' || LIFF_ID === 'YOUR_LIFF_ID') {
    showToast('LIFF 尚未設定，請使用帳號登入', 'warning'); return;
  }
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    showLoading(true);
    const res = await callServer('loginMember', { lineId: profile.userId, name: profile.displayName, avatar: profile.pictureUrl });
    showLoading(false);
    if (res.success) { saveSession(res.token, res.member); showToast(`歡迎回來，${res.member.name}！`, 'success'); navigateTo('home'); }
    else showToast(res.message, 'error');
  } catch(e) { showLoading(false); showToast('LINE 登入失敗：' + e.message, 'error'); }
}

  showLoading(true);
  const res = await callServer('loginMember', { name, phone });
  showLoading(false);
  if (res.success) { saveSession(res.token, res.member); showToast(`歡迎回來，${res.member.name}！`, 'success'); navigateTo('home'); }
  else showToast(res.message, 'error');
}

async function changeAvatar() {
  if (!APP.token) return;
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    showLoading(true);
    try {
      const b64 = await fileToBase64(file);
      const res = await callServer('uploadFile', APP.token, b64.split(',')[1], file.type, file.name);
      if (res.success) {
        const upd = await callServer('updateMemberProfile', APP.token, { avatar: res.url });
        if (upd.success) {
          APP.user.avatar = res.url;
          localStorage.setItem('user', JSON.stringify(APP.user));
          showToast('頭像更新成功！', 'success');
          renderProfile();
        }
      }
    } catch(e) { showToast('上傳失敗', 'error'); }
    showLoading(false);
  };
  input.click();
}

async function filterCategory(cat) {
  forumCategory = cat; forumPage = 1;
  document.querySelectorAll('.category-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().includes(cat==='all'?'全部':cat));
  });
  await loadPosts();
}

let searchTimer = null;
function searchPosts() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { forumPage=1; loadPosts(); }, 400);
}

async function loadPosts() {
  const el = document.getElementById('postList');
  if (!el) return;
  el.innerHTML = Array(3).fill(`<div class="skeleton" style="height:100px;margin-bottom:14px;border-radius:12px"></div>`).join('');
  const keyword = document.getElementById('forumSearch')?.value?.trim();
  const res = await callServer('getPosts', forumCategory, forumPage, 10);
  if (!res.success) { el.innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>載入失敗</h3></div>`; return; }
  let posts = res.posts || [];
  if (keyword) posts = posts.filter(p => p.title?.includes(keyword) || p.content?.includes(keyword));
  if (!posts.length) {
    el.innerHTML=`<div class="empty-state"><i class="fas fa-comments"></i><h3>暫無文章</h3>
      ${APP.token?`<button class="btn btn-primary" style="margin-top:16px" onclick="showCreatePost()"><i class="fas fa-pen"></i> 發表第一篇文章</button>`:''}</div>`;
    return;
  }
  el.innerHTML = posts.map(p => `
    <div class="post-card" onclick="showPostDetail('${p.id}')">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div class="post-avatar">${getInitial(p.authorName)}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
            <span class="post-category">${escHtml(p.category)}</span>
            <span style="font-size:15px;font-weight:700">${escHtml(p.title)}</span>
          </div>
          <div style="font-size:13px;color:var(--secondary);line-height:1.5;margin-bottom:8px">
            ${escHtml(truncate(p.content||'',80))}
          </div>
          <div class="post-stats">
            <span><i class="fas fa-user"></i> ${escHtml(p.authorName)}</span>
            <span><i class="fas fa-clock"></i> ${formatDate(p.createdAt)}</span>
            <span><i class="fas fa-eye"></i> ${p.views||0}</span>
            <span><i class="fas fa-heart"></i> ${p.likes||0}</span>
          </div>
        </div>
      </div>
    </div>`).join('');
  renderPagination('forumPagination', forumPage, Math.ceil(res.total/10), p => { forumPage=p; loadPosts(); });
}

  const images = await uploadImages(fileStore['postImgList']||[]);

    title, content,
    category: document.getElementById('postCategory')?.value || '一般討論',

async function submitCreateNews() {
  const title   = document.getElementById('newsTitle')?.value?.trim();
  const content = document.getElementById('newsContent')?.value?.trim();
  if (!title)   { showToast('請輸入標題', 'warning'); return; }
  if (!content) { showToast('請輸入內容', 'warning'); return; }
  showLoading(true);
  const res = await callServer('createNews', APP.token, {
    title, content,
    category: document.getElementById('newsCategory')?.value || '公告',
    isPinned: document.getElementById('newsPinned')?.checked || false
  });
  showLoading(false);
  if (res.success) { showToast('公告發布成功！', 'success'); closeModal('createNews'); loadNewsList(); }
  else showToast(res.message, 'error');
}

function toggleFAQ(id) {
  const el = document.getElementById(id);
  const idx = id.replace('faq','');
  const icon = document.getElementById('faqIcon'+idx);
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (icon) icon.style.transform = isOpen ? '' : 'rotate(180deg)';
}

async function openAlbum(albumId, albumTitle) {

  const res = await callServer('getAlbumById', albumId, 1);

  const { album, photos, totalPhotos } = res;
  const allUrls = photos.map(p => p.url);
  const isOwner = APP.token && (album.creatorId===APP.user?.id || APP.user?.memberType==='管理員');
  el.innerHTML = `

        <i class="fas fa-info-circle" style="color:var(--primary)"></i> ${escHtml(album.description)}
      </div>`:''}
    <div class="gallery-grid" id="albumPhotoGrid">
      ${photos.length
        ? photos.map((p,i) => renderPhotoItem(p, i, allUrls, albumId)).join('')

}

async function loadAlbumPhotos(albumId, page) {
  const res = await callServer('getAlbumById', albumId, page);
  if (!res.success) return;
  const { photos, totalPhotos } = res;
  const allUrls = photos.map(p => p.url);
  const grid = document.getElementById('albumPhotoGrid');
  if (grid) grid.innerHTML = photos.map((p,i) => renderPhotoItem(p, i, allUrls, albumId)).join('');
  renderPagination('albumPhotoPagination', page, Math.ceil(totalPhotos/24), p => loadAlbumPhotos(albumId, p));
}

function handleDropFiles(e) {
  e.preventDefault();
  document.getElementById('uploadZone')?.classList.remove('drag-over');

function handleBatchFiles(files) {
  batchFiles = [...batchFiles, ...Array.from(files)];
  const preview = document.getElementById('batchPreview');
  const count   = document.getElementById('batchCount');
  if (preview) {
    preview.innerHTML = batchFiles.map((f,i) => {
      const url = URL.createObjectURL(f);
      return `
        <div class="upload-preview-item">
          <img src="${url}" alt="${escHtml(f.name)}">
          <button class="remove-btn" onclick="removeBatchFile(${i})"><i class="fas fa-times"></i></button>
        </div>`;
    }).join('');
  }
  if (count) count.textContent = batchFiles.length > 0 ? `已選擇 ${batchFiles.length} 張照片` : '';
}

function removeBatchFile(idx) {
  batchFiles.splice(idx, 1);
  handleBatchFiles([]);
}

async function submitBatchUpload() {
  if (!batchFiles.length) { showToast('請選擇照片', 'warning'); return; }

async function runBatchUpload(files, meta) {
  const btn      = document.getElementById('batchUploadBtn');
  const progress = document.getElementById('batchProgress');
  const bar      = document.getElementById('batchProgressBar');
  const text     = document.getElementById('batchProgressText');
  if (btn) btn.disabled = true;
  if (progress) progress.style.display = 'block';
  let done = 0, success = 0;
  for (const file of files) {
    try {
      const b64 = await fileToBase64(file);
      const photoData = {
        base64:    b64.split(',')[1],
        mimeType:  file.type,
        filename:  file.name,
        caption:   meta.caption || '',
        albumId:   meta.albumId || '',
        albumName: meta.albumName || '',
        eventId:   meta.eventId || '',
        eventName: meta.eventName || ''
      };
      const res = await callServer('batchUploadPhotos', APP.token, [photoData]);
      if (res.success && res.successCount > 0) success++;
    } catch(e) { console.error('上傳失敗', e); }
    done++;
    const pct = Math.round(done / files.length * 100);
    if (bar)  bar.style.width  = pct + '%';
    if (text) text.textContent = `上傳中... ${done}/${files.length}`;
  }
  if (btn) btn.disabled = false;
  showToast(`上傳完成！成功 ${success}/${files.length} 張`, success===files.length?'success':'warning');
  closeModal('batchUpload');
  batchFiles = [];
  if (currentAlbumId && meta.albumId === currentAlbumId) openAlbum(currentAlbumId, '');
  else if (meta.albumId) openAlbum(meta.albumId, meta.albumName);
  else loadAllPhotos();
}

async function renderMonthCalendar() {
  const el = document.getElementById('calendarContent');
  if (!el) return;
  el.innerHTML = `<div class="skeleton" style="height:400px;border-radius:12px"></div>`;
  const year  = APP.calendarDate.getFullYear();
  const month = APP.calendarDate.getMonth() + 1;
  const res   = await callServer('getEvents', year, month);
  const events = res.events || [];
  const firstDay = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = new Date();
  const monthNames = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const dayNames   = ['日','一','二','三','四','五','六'];
  let calHtml = `
    <div class="calendar-container">
      <div class="calendar-header">
        <button class="calendar-nav-btn" onclick="changeCalendarMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2>${year} 年 ${monthNames[month-1]}</h2>
        <button class="calendar-nav-btn" onclick="changeCalendarMonth(1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="calendar-grid">
        ${dayNames.map(d=>`<div class="calendar-day-header">${d}</div>`).join('')}`;
  const prevMonthDays = new Date(year, month-1, 0).getDate();
  for (let i=0; i<firstDay; i++) {
    calHtml += `<div class="calendar-day other-month"><div class="day-num">${prevMonthDays-firstDay+i+1}</div></div>`;
  }
  for (let d=1; d<=daysInMonth; d++) {
    const isToday = today.getFullYear()===year && today.getMonth()+1===month && today.getDate()===d;
    const dayEvents = events.filter(e => new Date(e.startDate).getDate()===d);
    calHtml += `
      <div class="calendar-day ${isToday?'today':''}" onclick="showDayEvents(${year},${month},${d})">
        <div class="day-num">${d}</div>
        <div class="day-events">
          ${dayEvents.slice(0,2).map(e=>`<div class="day-event" title="${escHtml(e.title)}">${escHtml(truncate(e.title,8))}</div>`).join('')}
          ${dayEvents.length>2?`<div class="day-event" style="background:var(--secondary)">+${dayEvents.length-2}</div>`:''}
        </div>
      </div>`;
  }
  const remaining = 42 - firstDay - daysInMonth;
  for (let i=1; i<=remaining; i++) {
    calHtml += `<div class="calendar-day other-month"><div class="day-num">${i}</div></div>`;
  }
  calHtml += `</div></div>`;
  el.innerHTML = calHtml + `
    <div style="margin-top:24px">
      <h3 style="font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px">
        <i class="fas fa-list" style="color:var(--primary)"></i> 本月活動
      </h3>
      ${events.length ? events.map(e => renderEventCard(e)).join('')
        : `<div class="empty-state"><i class="fas fa-calendar-times"></i><h3>本月無活動</h3></div>`}
    </div>`;
}

function changeCalendarMonth(dir) {
  APP.calendarDate = new Date(APP.calendarDate.getFullYear(), APP.calendarDate.getMonth()+dir, 1);
  renderMonthCalendar();
}

function showDayEvents(year, month, day) {
  callServer('getEvents', year, month).then(res => {
    const events = (res.events||[]).filter(e => new Date(e.startDate).getDate()===day);
    if (!events.length) return;
    showModal('dayEvents', `

    </div>
    <div class="modal-body">
      ${e.coverImage?`<img src="${escHtml(e.coverImage)}" style="width:100%;height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-bottom:16px">`:''}
      <h2 style="font-size:20px;font-weight:700;margin-bottom:14px">${escHtml(e.title)}</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        ${[
          ['fas fa-calendar-day','開始時間',formatFullDate(e.startDate)],
          ['fas fa-calendar-check','結束時間',formatFullDate(e.endDate)],
          ['fas fa-map-marker-alt','地點',e.location||'未指定'],
          ['fas fa-users','報名人數',`${e.currentParticipants||0} / ${e.maxParticipants||'不限'}`]
        ].map(([icon,label,val])=>`
          <div style="background:var(--light);padding:12px;border-radius:var(--radius-sm)">
            <div style="font-size:11px;color:var(--secondary);margin-bottom:3px"><i class="${icon}"></i> ${label}</div>
            <div style="font-weight:600;font-size:14px">${escHtml(String(val))}</div>
          </div>`).join('')}
      </div>
      ${e.description?`<div style="font-size:14px;line-height:1.8;white-space:pre-wrap;padding:14px;background:var(--light);border-radius:var(--radius-sm)">${escHtml(e.description)}</div>`:''}
      ${isRegistered?`<div style="margin-top:14px;padding:12px;background:#d4edda;border-radius:var(--radius-sm);color:var(--success);font-weight:600;text-align:center">
        <i class="fas fa-check-circle"></i> 您已報名此活動
      </div>`:''}
      ${isFull&&!isRegistered?`<div style="margin-top:14px;padding:12px;background:#f8d7da;border-radius:var(--radius-sm);color:var(--danger);font-weight:600;text-align:center">
        <i class="fas fa-times-circle"></i> 報名人數已額滿
      </div>`:''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('eventDetail')">關閉</button>
      ${APP.token && !isRegistered && !isFull?`
        <button class="btn btn-primary" onclick="submitRegisterEvent('${eventId}')">
          <i class="fas fa-ticket-alt"></i> 立即報名
        </button>`:''}
      ${APP.token && isRegistered?`
        <button class="btn btn-outline-danger" onclick="submitCancelRegistration('${eventId}')">
          <i class="fas fa-times"></i> 取消報名
        </button>`:''}
      ${!APP.token?`
        <button class="btn btn-primary" onclick="navigateTo('auth');closeModal('eventDetail')">
          <i class="fas fa-sign-in-alt"></i> 登入後報名
        </button>`:''}
    </div>`, { size:'md' });
}

async function submitRegisterEvent(eventId) {
  showLoading(true);
  const res = await callServer('registerEvent', APP.token, eventId, '');
  showLoading(false);
  if (res.success) { showToast(res.message||'報名成功！', 'success'); closeModal('eventDetail'); }
  else showToast(res.message, 'error');
}

async function submitCancelRegistration(eventId) {
  const confirmed = await Swal.fire({
    title:'確定取消報名？', icon:'question', showCancelButton:true,
    confirmButtonText:'確定取消', cancelButtonText:'保留報名', confirmButtonColor:'#dc3545'
  });
  if (!confirmed.isConfirmed) return;
  showLoading(true);
  const res = await callServer('cancelRegistration', APP.token, eventId);
  showLoading(false);
  if (res.success) { showToast(res.message||'已取消報名', 'info'); closeModal('eventDetail'); }
  else showToast(res.message, 'error');
}

async function renderMyRegistrations() {
  const el = document.getElementById('calendarContent');
  if (!el) return;
  el.innerHTML = `<div class="skeleton" style="height:200px;border-radius:12px"></div>`;
  const res = await callServer('getMyRegistrations', APP.token);
  if (!res.success || !res.registrations.length) {
    el.innerHTML=`<div class="empty-state"><i class="fas fa-ticket-alt"></i><h3>尚無報名記錄</h3>
      <button class="btn btn-primary" style="margin-top:16px" onclick="switchCalendarTab('list')">
        <i class="fas fa-search"></i> 瀏覽活動</button></div>`; return;
  }
  el.innerHTML = res.registrations.map(r => `
    <div class="card" style="margin-bottom:12px">
      <div class="card-body" style="padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
          <div>
            <div style="font-size:16px;font-weight:700;margin-bottom:6px">${escHtml(r.eventTitle)}</div>
            <div style="font-size:13px;color:var(--secondary);display:flex;gap:12px;flex-wrap:wrap">
              <span><i class="fas fa-clock"></i> 報名時間：${formatDate(r.registeredAt)}</span>
              <span class="badge badge-success"><i class="fas fa-check"></i> ${escHtml(r.status)}</span>
            </div>
            ${r.notes?`<div style="font-size:12px;color:var(--secondary);margin-top:4px">備註：${escHtml(r.notes)}</div>`:''}
          </div>
          <button class="btn btn-outline-danger btn-sm" onclick="submitCancelRegistration('${r.eventId}')">
            <i class="fas fa-times"></i> 取消報名
          </button>
        </div>
      </div>
    </div>`).join('');
}

// ════════════════════════════════════════════════
// 啟動
// ════════════════════════════════════════════════
window.addEventListener('load', initApp);
</script>
</body>
</html>
