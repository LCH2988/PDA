const CFG = {

lineLoginChannelId: '2001679903',

// ============================================================
// 工具函式
// ============================================================
const _esc     = v => String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const _v       = id => { const el=document.getElementById(id); return el?el.value.trim():''; };
const _set     = (id,val) => { const el=document.getElementById(id); if(el) el.value=val; };
const _html    = (id,h) => { const el=document.getElementById(id); if(el) el.innerHTML=h; };
const _today   = () => new Date().toISOString().slice(0,10);
const _fmtDate = d => d?d.replace(/-/g,'/'):'—';
const _fmtMoney= n => 'NT$'+Number(n||0).toLocaleString();
const _fmtSize = b => !b?'0 B':b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB';
const MIME_ICON= {'image/jpeg':'🖼️','image/png':'🖼️','application/pdf':'📄'};
const _mimeIcon= t => MIME_ICON[t]||'📎';

const STATUS_TAG = {
'待審核' :'tag-orange', '審核中':'tag-blue',
'已核准' :'tag-green',  '已拒絕':'tag-red',
'已完成' :'tag-green',  '已退回':'tag-red',
'待交付' :'tag-orange', '已交付':'tag-teal',
};

// ============================================================
// Toast
// ============================================================
const Toast = (() => {
const IC={success:'✅',error:'❌',warning:'⚠️',info:'ℹ️'};
function show(msg,type='info',dur=3200){
  const el=document.createElement('div');
  el.className='toast '+type;
  el.innerHTML='<span style="font-size:19px;flex-shrink:0">'+(IC[type]||'')+'</span><span style="flex:1">'+msg+'</span>';
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.remove(),320); },dur);
}
return { success:(m,d)=>show(m,'success',d), error:(m,d)=>show(m,'error',d||4500), warning:(m,d)=>show(m,'warning',d), info:(m,d)=>show(m,'info',d) };
})();

// ============================================================
// Modal
// ============================================================
const Modal = (() => {
let _cur=null;
function show(html){
  close();
  const ov=document.createElement('div');
  ov.className='modal-overlay'; ov.id='modal-active';
  ov.innerHTML='<div class="modal-sheet"><div class="modal-handle"></div>'+html+'</div>';
  ov.addEventListener('click',e=>{ if(e.target===ov) close(); });
  document.body.appendChild(ov); _cur=ov;
}
function close(){
  if(!_cur) return;
  _cur.classList.add('hide');
  const s=_cur.querySelector('.modal-sheet'); if(s) s.classList.add('hide');
  const ref=_cur; setTimeout(()=>{ ref.remove(); if(_cur===ref) _cur=null; },320);
}
function confirm(msg,onOk,okLabel,danger){
  show(
    '<div class="modal-title">確認操作</div>' +
    '<p style="font-size:16px;color:#424242;text-align:center;margin-bottom:22px;line-height:1.7">'+msg+'</p>' +
    '<div style="display:flex;gap:12px">' +
    '<button class="btn btn-secondary btn-full" onclick="Modal.close()">取消</button>' +
    '<button class="btn '+(danger?'btn-danger':'btn-success')+' btn-full" id="modal-ok">'+(okLabel||'確認')+'</button>' +
    '</div>'
  );
  document.getElementById('modal-ok').onclick=()=>{ close(); if(onOk) onOk(); };
}
return { show, close, confirm };
})();

// ============================================================
// API
// ============================================================
const API = (() => {
let _pending=new Set(), _userId='';
function setUser(id){ _userId=id; }
async function get(action,params={}){
  const url=new URL(CFG.gasUrl);
  url.searchParams.set('action',action);
  if(_userId) url.searchParams.set('userId',_userId);
  Object.entries(params).forEach(([k,v])=>{ if(v!==undefined&&v!==null&&v!=='') url.searchParams.set(k,String(v)); });
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),15000);
  try {
    const res=await fetch(url.toString(),{signal:ctrl.signal});
    if(!res.ok) throw new Error('伺服器錯誤('+res.status+')');
    const d=await res.json(); if(d&&d.error) throw new Error(d.error); return d;
  } catch(e){ if(e.name==='AbortError') throw new Error('請求逾時'); throw e; }
  finally { clearTimeout(t); }
}
async function post(action,body={}){
  const key=action+JSON.stringify(body).slice(0,100);
  if(_pending.has(key)) throw new Error('請求處理中，請勿重複送出');
  _pending.add(key);
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),25000);
  try {
    const res=await fetch(CFG.gasUrl,{ method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({action,userId:_userId,...body}), signal:ctrl.signal });
    if(!res.ok) throw new Error('伺服器錯誤('+res.status+')');
    const d=await res.json(); if(d&&d.error) throw new Error(d.error); return d;
  } catch(e){ if(e.name==='AbortError') throw new Error('請求逾時'); throw e; }
  finally { clearTimeout(t); _pending.delete(key); }
}
return { setUser, get, post };
})();

// ============================================================
// AuthManager - 混合登入管理
// ============================================================
const AuthManager = (() => {
let _currentUser = null;
let _authMode = null; // 'liff' | 'line-login' | 'demo'

async function init() {
  try {
    _setLoadingSub('檢測執行環境...');
    
    // 檢查 LINE Login 回調
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    const state = urlParams.get('state');
    
    if (code && state) {
      _setLoadingSub('處理 LINE Login 回調...');
      await _handleLineLoginCallback(code, state);
      return;
    }

    // 檢查 LIFF 環境
    if (window.liff) {
      try {
        await liff.init({ liffId: CFG.liffId });
        if (liff.isInClient()) {
          _authMode = 'liff';
          _updateLoginModeInfo('🔵 LIFF 模式', '在 LINE App 中執行，享受完整功能');
          
          if (liff.isLoggedIn()) {
            _setLoadingSub('取得 LINE 用戶資料...');
            await _initLiffUser();
            return;
          } else {
            _showLoginScreen();
            return;
          }
        }
      } catch (liffError) {
        console.warn('LIFF init failed:', liffError);
      }
    }

    // 一般瀏覽器模式
    _authMode = 'web';
    _updateLoginModeInfo('🌐 網頁模式', '建議在 LINE App 中開啟以獲得最佳體驗');
    _showLoginScreen();

  } catch (error) {
    console.error('Auth init error:', error);
    _setLoadingSub('初始化失敗：' + error.message);
    setTimeout(() => _showLoginScreen(), 2000);
  }
}

function _showLoginScreen() {
  _hideLoading();
  document.getElementById('login-screen').classList.add('show');
}

function _updateLoginModeInfo(title, desc) {
  const el = document.getElementById('login-mode-text');
  if (el) el.innerHTML = '<div style="font-weight:700">' + title + '</div><div style="margin-top:2px">' + desc + '</div>';
}

async function _initLiffUser() {
  try {
    const profile = await liff.getProfile();
    _currentUser = {
      id: profile.userId,
      name: profile.displayName,
      avatar: profile.pictureUrl,
      source: 'liff'
    };
    API.setUser(profile.userId);
    await _completeLogin();
  } catch (error) {
    console.error('LIFF user init error:', error);
    Toast.error('取得用戶資料失敗：' + error.message);
    _showLoginScreen();
  }
}

function loginWithLine() {
  if (_authMode === 'liff') {
    // LIFF 模式
    if (liff.isLoggedIn()) {
      _initLiffUser();
    } else {
      liff.login({ redirectUri: window.location.href });
    }
  } else {
    // 網頁模式 - LINE Login
    const state = _generateState();
    localStorage.setItem('line_login_state', state);
    
    const loginUrl = 'https://access.line.me/oauth2/v2.1/authorize?' + new URLSearchParams({
      response_type: 'code',
      client_id: CFG.lineLoginChannelId,
      redirect_uri: CFG.lineLoginRedirectUri,
      state: state,
      scope: 'profile openid'
    });
    
    window.location.href = loginUrl;
  }
}

async function loginDemo() {
  _currentUser = {
    id: 'demo-finance-user-' + Date.now(),
    name: '示範財務管理員',
    avatar: '',
    source: 'demo'
  };
  API.setUser(_currentUser.id);
  Toast.info('已進入示範模式');
  await _completeLogin();
}

async function _handleLineLoginCallback(code, state) {
  try {
    const savedState = localStorage.getItem('line_login_state');
    if (state !== savedState) {
      throw new Error('State 驗證失敗');
    }
    localStorage.removeItem('line_login_state');

    // 這裡應該要用 code 去取得 access token 和用戶資料
    // 為了簡化，我們直接建立示範用戶
    _currentUser = {
      id: 'line-login-finance-user-' + Date.now(),
      name: 'LINE 財務用戶',
      avatar: '',
      source: 'line-login'
    };
    
    API.setUser(_currentUser.id);
    
    // 清除 URL 參數
    const url = new URL(window.location);
    url.searchParams.delete('code');
    url.searchParams.delete('state');
    window.history.replaceState({}, document.title, url.toString());
    
    await _completeLogin();
  } catch (error) {
    console.error('LINE Login callback error:', error);
    Toast.error('LINE Login 失敗：' + error.message);
    _showLoginScreen();
  }
}

async function _completeLogin() {
  try {
    document.getElementById('login-screen').classList.remove('show');
    _setLoadingSub('載入財務系統資料...');
    
    const avatarEl = document.getElementById('top-avatar');
    if (_currentUser.avatar) {
      avatarEl.src = _currentUser.avatar;
      avatarEl.style.display = '';
    }
    document.getElementById('top-name').textContent = _currentUser.name;

    // 顯示 app 並隱藏載入畫面
    document.getElementById('app').classList.add('visible');
    _hideLoading();
    
    // 初始化財務應用
    await FinApp.initAfterAuth();
    
  } catch (error) {
    console.error('Complete login error:', error);
    Toast.error('載入失敗：' + error.message);
  }
}

function logout() {
  Modal.confirm(
    '確定要登出嗎？',
    () => {
      _currentUser = null;
      API.setUser('');
      
      if (_authMode === 'liff' && window.liff && liff.isLoggedIn()) {
        liff.logout();
      }
      
      window.location.reload();
    },
    '確認登出'
  );
}

function getCurrentUser() {
  return _currentUser;
}

function _generateState() {
  return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
}

function _setLoadingSub(msg) {
  const el = document.getElementById('loading-sub');
  if (el) el.textContent = msg;
}

function _hideLoading() {
  const loadingEl = document.getElementById('loading-screen');
  if (loadingEl) {
    loadingEl.classList.add('hide');
    setTimeout(() => loadingEl.style.display = 'none', 420);
  }
}

return {
  init,
  loginWithLine,
  loginDemo,
  logout,
  getCurrentUser
};
})();

function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const t=document.getElementById('page-'+pageId); if(t) t.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.getAttribute('data-page')===pageId));
  document.querySelector('.page-content').scrollTop=0;
  if(pageId==='income')  switchIncomeTab(_incomeTab);
  if(pageId==='expense') switchExpenseTab(_expenseTab);
}

async function _submitIncome(){
  const desc=_v('inc-desc'), amount=parseFloat(_v('inc-amount')), date=_v('inc-date');
  if(!desc)           { Toast.warning('請填寫收入說明'); return; }
  if(!amount||amount<=0){ Toast.warning('請輸入有效金額'); return; }
  if(!date)           { Toast.warning('請選擇收款日期'); return; }
  if(!_attachments.length){ Toast.warning('請上傳至少一份收款憑證'); return; }
  const btn=document.querySelector('#income-container .btn-success');
  if(btn){ btn.disabled=true; btn.textContent='提交中…'; }
  try {
    const r=await API.post('submitIncome',{
      category:_v('inc-cat'), description:desc, amount, date,
      method:_v('inc-method'), payerName:_v('inc-payer'), note:_v('inc-note'),
      attachments:_attachments.map(a=>({name:a.name,mimeType:a.mimeType,size:a.size,base64:a.base64})),
    });
    if(r&&r.success){
      Toast.success('💵 收入資料已提交！等待審核');
      _attachments=[];
      await switchIncomeTab('history');
      _showIncomeReceipt({
        receiptNo:r.recordId, description:desc, amount,
        date, method:_v('inc-method'), category:_v('inc-cat'),
        payerName:_v('inc-payer'),
      });
    } else {
      Toast.error(r.message||'提交失敗');
      if(btn){ btn.disabled=false; btn.textContent='💵 提交收入'; }
    }
  } catch(e){
    Toast.error(e.message);
    if(btn){ btn.disabled=false; btn.textContent='💵 提交收入'; }
  }
}

async function _approveIncome(id, idx){
  const note=_v('inc-review-note-'+idx);
  Modal.confirm('確定核准此收入提交？\n核准後將自動更新財務報表。', async ()=>{
    try {
      const r=await API.post('approveIncome',{id,reviewNote:note});
      if(r&&r.success){ Toast.success('✅ 已核准！財務報表已更新'); await switchIncomeTab('review'); }
      else Toast.error(r.error||'操作失敗');
    } catch(e){ Toast.error(e.message); }
  },'確認核准');
}

async function _rejectIncome(id, idx){
  const note=_v('inc-review-note-'+idx);
  Modal.confirm('確定退回此收入提交？', async ()=>{
    try {
      const r=await API.post('rejectIncome',{id,reviewNote:note});
      if(r&&r.success){ Toast.warning('已退回收入提交'); await switchIncomeTab('review'); }
      else Toast.error(r.error||'操作失敗');
    } catch(e){ Toast.error(e.message); }
  },'確認退回',true);
}

    '⚠️ 送出後需等待主管及財務管理員雙重審核，審核通過後安排撥款</div>' +
    '<button class="btn btn-orange btn-full" onclick="FinApp._submitExpense()">📤 送出申請</button>' +
    '</div></div>';

  const fi=document.getElementById('exp-file');
  if(fi) fi.onchange=async(e)=>{ await _handleFiles(e,'exp-attach-list'); fi.value=''; };
}

async function _submitExpense(){
  const desc=_v('exp-desc'), amount=parseFloat(_v('exp-amount')), date=_v('exp-date');
  if(!desc)            { Toast.warning('請填寫支出說明'); return; }
  if(!amount||amount<=0){ Toast.warning('請輸入有效金額'); return; }
  if(!date)            { Toast.warning('請選擇支出日期'); return; }
  if(!_attachments.length){ Toast.warning('請上傳至少一份收據憑證'); return; }
  const btn=document.querySelector('#expense-container .btn-orange');
  if(btn){ btn.disabled=true; btn.textContent='送出中…'; }
  try {
    const r=await API.post('submitExpense',{
      category:_v('exp-cat'), description:desc, amount, date,
      method:_v('exp-method'), payeeName:_v('exp-payee'), note:_v('exp-note'),
      attachments:_attachments.map(a=>({name:a.name,mimeType:a.mimeType,size:a.size,base64:a.base64})),
    });
    if(r&&r.success){
      Toast.success('📤 支出申請已送出！等待審核');
      _attachments=[];
      await switchExpenseTab('history');
      _showVoucherModal({
        id:r.recordId||'--',
        applicantName:(_memberData||{}).name||'--',
        category:_v('exp-cat'), description:desc,
        amount, date, note:_v('exp-note'),
      });
    } else {
      Toast.error(r.message||'申請失敗');
      if(btn){ btn.disabled=false; btn.textContent='📤 送出申請'; }
    }
  } catch(e){
    Toast.error(e.message);
    if(btn){ btn.disabled=false; btn.textContent='📤 送出申請'; }
  }
}

function _renderFlowStatus(status){
  const steps=[
    {label:'申請送出', done:true},
    {label:'主管審核', done:status!=='待審核'},
    {label:'財務核准', done:status==='已核准'||status==='已完成'},
    {label:'撥款完成', done:status==='已完成'},
  ];
  return (
    '<div style="display:flex;gap:0;margin:12px 0;overflow-x:auto">' +
    steps.map((s,i)=>
      '<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:60px">' +
      '<div style="width:24px;height:24px;border-radius:50%;background:'+(s.done?'var(--green)':'#E2E8F0')+';color:'+(s.done?'#fff':'var(--grey5)')+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">'+(s.done?'✓':(i+1))+'</div>' +
      (i<steps.length-1?'<div style="position:relative;width:100%;height:2px;background:'+(s.done?'var(--green)':'#E2E8F0')+';margin:0 -12px"></div>':'') +
      '<div style="font-size:11px;color:var(--grey5);margin-top:4px;text-align:center;white-space:nowrap">'+s.label+'</div>' +
      '</div>'
    ).join('')+
    '</div>'
  );
}

// ============================================================
// 共用工具函式
// ============================================================
async function _handleFiles(e, listId){
  for(const file of Array.from(e.target.files)){
    if(file.size>10*1024*1024){ Toast.error('檔案大小不可超過 10 MB：'+file.name); continue; }
    try {
      const fd=await _readFile(file);
      _attachments.push(fd);
      _renderAttachList(listId);
      Toast.success('已加入：'+file.name);
    } catch(err){ Toast.error(err.message); }
  }
}

function _readFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve({name:file.name,mimeType:file.type,size:file.size,base64:e.target.result.split(',')[1]});
    reader.onerror=()=>reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function _renderAttachList(listId){
  const el=document.getElementById(listId); if(!el) return;
  if(!_attachments.length){ el.innerHTML=''; return; }
  el.innerHTML='<div style="margin-top:10px">'+
    _attachments.map((a,idx)=>
      '<div class="attach-item">' +
      '<span class="attach-item-icon">'+_mimeIcon(a.mimeType)+'</span>' +
      '<div class="attach-item-info">' +
      '<div class="attach-item-name">'+_esc(a.name)+'</div>' +
      '<div class="attach-item-size">'+_fmtSize(a.size)+'</div>' +
      '</div>' +
      '<button style="background:none;border:none;cursor:pointer;font-size:20px;padding:6px;border-radius:8px" onclick="FinApp._removeAttach('+idx+',\''+listId+'\')">🗑️</button>' +
      '</div>'
    ).join('')+'</div>';
}

function _removeAttach(idx, listId){
  _attachments.splice(idx,1);
  _renderAttachList(listId);
}

function _flowStep(state, num, title, desc){
  return (
    '<div class="flow-step '+state+'">' +
    '<div class="flow-step-left">' +
    '<div class="flow-step-dot">'+(state==='done'?'✓':num)+'</div>' +
    '<div class="flow-step-line"></div>' +
    '</div>' +
    '<div class="flow-step-content">' +
    '<div class="flow-step-title">'+title+'</div>' +
    '<div class="flow-step-desc">'+desc+'</div>' +
    '</div></div>'
  );
}

function _summaryItem(num, label, color){
  return (
    '<div class="summary-item">' +
    '<div class="summary-num" style="color:'+color+'">'+num+'</div>' +
    '<div class="summary-lbl">'+label+'</div>' +
    '</div>'
  );
}

function _fg(label, required, inputHtml){
  return '<div class="form-group"><label class="form-label">'+label+
    (required?'<span class="req">*</span>':'')+
    '</label>'+inputHtml+'</div>';
}

function _skelHtml(){
  return '<div style="padding:16px">'+
    '<div class="skeleton skeleton-line" style="height:44px;margin-bottom:12px"></div>'+
    '<div class="skeleton skeleton-line medium"></div>'+
    '<div class="skeleton skeleton-line short"></div>'+
    '</div>';
}

function _errHtml(msg){
  return '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">載入失敗</div><div class="empty-sub">'+_esc(msg)+'</div></div>';
}

function _emptyHtml(icon, text, sub){
  return '<div class="empty-state"><div class="empty-icon">'+icon+'</div><div class="empty-text">'+text+'</div>'+(sub?'<div class="empty-sub">'+sub+'</div>':'')+'</div>';
}

function _setLoadingSub(msg){
  const el=document.getElementById('loading-sub'); if(el) el.textContent=msg;
}

function _hideLoading(){
  const el=document.getElementById('loading-screen');
  el.classList.add('hide'); setTimeout(()=>el.style.display='none',420);
  document.getElementById('app').classList.add('visible');
}

};

// 全域掛載 & 啟動

window.AuthManager = AuthManager;
window.FinApp      = FinApp;
window.Modal       = Modal;
window.Toast       = Toast;

window.addEventListener('error', e=>{
console.error('[Error]',e.message);
