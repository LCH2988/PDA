<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>年度行事曆維護平台｜手機樂齡版</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root{
      --bg:#EEF4F8;
      --card:#FFFFFF;
      --primary:#1F5D91;
      --primary-dark:#17486F;
      --primary-soft:#EAF4FF;
      --text:#1E293B;
      --muted:#64748B;
      --border:#D9E2EC;
      --danger:#DC2626;
      --warning:#D97706;
      --success:#059669;
      --shadow:0 4px 16px rgba(0,0,0,.08);
      --radius:18px;
      --font-base:18px;
      --font-small:16px;
      --font-xs:14px;
      --font-lg:22px;
      --font-xl:26px;
      --tap:52px;
    }
    html,body{
      height:100%;
      font-family:'Microsoft JhengHei','PingFang TC','Segoe UI',sans-serif;
      font-size:var(--font-base);
      color:var(--text);
      background:var(--bg);
    }
    body{
      overflow:hidden;
    }
    .app{
      display:flex;
      flex-direction:column;
      height:100vh;
    }
    .topbar{
      background:linear-gradient(135deg,var(--primary),#3A86C6);
      color:#fff;
      padding:14px 16px 12px;
      box-shadow:var(--shadow);
      z-index:20;
    }
    .topbar-row{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .menu-btn,.help-btn{
      width:var(--tap);
      height:var(--tap);
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.16);
      color:#fff;
      font-size:22px;
      cursor:pointer;
    }
    .title-wrap{
      flex:1;
      min-width:0;
    }
    .title-main{
      font-size:var(--font-lg);
      font-weight:800;
      line-height:1.25;
    }
    .title-sub{
      font-size:var(--font-small);
      opacity:.92;
      margin-top:2px;
    }
    .year-bar{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
    }
    .year-box{
      background:#fff;
      color:var(--text);
      border-radius:16px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .year-box label{
      font-size:var(--font-small);
      font-weight:800;
      color:var(--muted);
      white-space:nowrap;
    }
    .year-box select{
      flex:1;
      min-height:46px;
      border:2px solid var(--border);
      border-radius:12px;
      padding:0 12px;
      font-size:var(--font-base);
      background:#fff;
    }
    .quick-add{
      min-height:46px;
      padding:0 16px;
      border:none;
      border-radius:14px;
      background:#0F9D7A;
      color:#fff;
      font-size:var(--font-small);
      font-weight:800;
      cursor:pointer;
    }
    .content{
      flex:1;
      overflow:auto;
      padding:14px 14px 88px;
    }
    .page{ display:none; }
    .page.active{ display:block; }
    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      margin-bottom:14px;
    }
    .card-title{
      font-size:var(--font-lg);
      font-weight:800;
      margin-bottom:12px;
      color:var(--primary-dark);
    }
    .big-stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .big-stat{
      background:#fff;
      border:2px solid var(--border);
      border-radius:18px;
      padding:16px;
    }
    .big-stat-label{
      font-size:var(--font-small);
      color:var(--muted);
      font-weight:800;
      margin-bottom:6px;
    }
    .big-stat-value{
      font-size:32px;
      font-weight:900;
      line-height:1;
    }
    .big-stat-sub{
      font-size:var(--font-xs);
      color:var(--muted);
      margin-top:6px;
    }
    .section-btn-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .section-btn{
      min-height:86px;
      border:none;
      border-radius:18px;
      background:var(--primary-soft);
      color:var(--primary-dark);
      font-size:var(--font-base);
      font-weight:800;
      cursor:pointer;
      text-align:left;
      padding:14px;
    }
    .section-btn small{
      display:block;
      font-size:var(--font-xs);
      color:var(--muted);
      margin-top:6px;
      font-weight:700;
    }
    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .action-btn{
      min-height:54px;
      border:none;
      border-radius:16px;
      font-size:var(--font-base);
      font-weight:800;
      cursor:pointer;
    }
    .btn-blue{ background:var(--primary); color:#fff; }
    .btn-green{ background:var(--success); color:#fff; }
    .btn-orange{ background:var(--warning); color:#fff; }
    .btn-red{ background:var(--danger); color:#fff; }
    .btn-white{ background:#fff; color:var(--primary-dark); border:2px solid var(--border); }

    .task-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .task-card{
      background:#fff;
      border:2px solid var(--border);
      border-radius:18px;
      padding:14px;
    }
    .task-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .task-name{
      font-size:20px;
      font-weight:800;
      line-height:1.35;
    }
    .task-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:10px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:34px;
      padding:6px 12px;
      border-radius:999px;
      font-size:var(--font-xs);
      font-weight:800;
    }
    .b-cat{ background:#EAF4FF; color:#1D4E89; }
    .b-date{ background:#FFF7E8; color:#9A5A00; }
    .b-owner{ background:#F1F5F9; color:#334155; }
    .b-status{ background:#EAFBF4; color:#047857; }
    .b-overdue{ background:#FFF1F2; color:#BE123C; }
    .task-note{
      font-size:var(--font-small);
      color:var(--muted);
      margin-top:10px;
      line-height:1.55;
    }
    .task-actions{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:8px;
      margin-top:12px;
    }
    .task-actions button{
      min-height:48px;
      border:none;
      border-radius:14px;
      font-size:var(--font-small);
      font-weight:800;
      cursor:pointer;
    }

    .filter-panel{
      display:grid;
      gap:10px;
    }
    .filter-panel select,.filter-panel input,.modal-box input,.modal-box select,.modal-box textarea{
      width:100%;
      min-height:52px;
      border:2px solid var(--border);
      border-radius:14px;
      padding:12px 14px;
      font-size:var(--font-base);
      background:#fff;
      color:var(--text);
    }
    .modal-box textarea{
      min-height:110px;
      resize:vertical;
    }
    .filter-panel .row2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .list-tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:12px;
    }
    .list-tab{
      min-height:46px;
      border:none;
      border-radius:14px;
      background:#E2E8F0;
      color:#334155;
      font-size:var(--font-small);
      font-weight:800;
      cursor:pointer;
    }
    .list-tab.active{
      background:var(--primary);
      color:#fff;
    }

    .bottom-nav{
      position:fixed;
      left:0; right:0; bottom:0;
      background:#fff;
      border-top:2px solid var(--border);
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:2px;
      padding:8px 8px calc(8px + env(safe-area-inset-bottom));
      z-index:25;
    }
    .nav-btn{
      border:none;
      background:transparent;
      min-height:62px;
      border-radius:16px;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
    }
    .nav-btn .icon{ font-size:22px; }
    .nav-btn.active{
      background:#EAF4FF;
      color:var(--primary-dark);
    }

    .drawer-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      z-index:40;
    }
    .drawer-backdrop.show{ display:block; }
    .drawer{
      position:fixed;
      top:0; left:0; bottom:0;
      width:86%;
      max-width:340px;
      background:#fff;
      transform:translateX(-100%);
      transition:.25s ease;
      z-index:41;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
      overflow:auto;
    }
    .drawer.show{ transform:translateX(0); }
    .drawer-head{
      background:linear-gradient(135deg,var(--primary),#3A86C6);
      color:#fff;
      padding:18px 16px;
    }
    .drawer-title{
      font-size:22px;
      font-weight:900;
    }
    .drawer-sub{
      font-size:var(--font-small);
      margin-top:4px;
      opacity:.94;
    }
    .drawer-list{
      padding:12px;
    }
    .drawer-item{
      width:100%;
      text-align:left;
      min-height:54px;
      border:none;
      background:#fff;
      border-radius:14px;
      padding:0 14px;
      font-size:18px;
      font-weight:800;
      color:var(--text);
      margin-bottom:8px;
      cursor:pointer;
      border:2px solid var(--border);
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:50;
    }
    .modal-overlay.open{ display:flex; }
    .modal-box{
      width:100%;
      max-width:720px;
      background:#fff;
      border-radius:24px 24px 0 0;
      padding:18px 16px 20px;
      max-height:88vh;
      overflow:auto;
    }
    .modal-title{
      font-size:24px;
      font-weight:900;
      margin-bottom:14px;
      color:var(--primary-dark);
    }
    .form-grid{
      display:grid;
      gap:12px;
    }
    .form-group label{
      display:block;
      font-size:var(--font-small);
      color:var(--muted);
      font-weight:900;
      margin-bottom:6px;
    }
    .modal-footer{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    .modal-footer button{
      min-height:54px;
      border:none;
      border-radius:16px;
      font-size:var(--font-base);
      font-weight:900;
      cursor:pointer;
    }

    .toast{
      position:fixed;
      left:12px;
      right:12px;
      bottom:92px;
      padding:14px 16px;
      border-radius:16px;
      font-size:17px;
      font-weight:800;
      z-index:70;
      opacity:0;
      transform:translateY(10px);
      transition:.25s ease;
      pointer-events:none;
    }
    .toast.show{ opacity:1; transform:translateY(0); }
    .toast.success{ background:#ECFDF5; color:#065F46; border:2px solid #A7F3D0; }
    .toast.warning{ background:#FFFBEB; color:#92400E; border:2px solid #FCD34D; }
    .toast.danger{ background:#FFF1F2; color:#9F1239; border:2px solid #FDA4AF; }
    .toast:not(.success):not(.warning):not(.danger){ background:#EFF6FF; color:#1D4ED8; border:2px solid #BFDBFE; }

    .helper-box{
      background:#FFFBEA;
      border:2px solid #FDE68A;
      border-radius:16px;
      padding:14px;
      font-size:var(--font-small);
      line-height:1.7;
      color:#7C4A03;
    }

    .empty-box{
      text-align:center;
      padding:28px 16px;
      color:var(--muted);
      font-size:var(--font-base);
    }

    @media(min-width:768px){
      body{
        max-width:420px;
        margin:0 auto;
        box-shadow:0 0 0 1px #dbe4ee, 0 20px 40px rgba(0,0,0,.08);
      }
      .drawer{ left:50%; transform:translateX(-50%) translateX(-100%); }
      .drawer.show{ transform:translateX(-50%) translateX(-210px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-row">
        <button class="menu-btn" onclick="toggleDrawer()">☰</button>
        <div class="title-wrap">
          <div class="title-main">🌸 年度行事曆</div>
          <div class="title-sub" id="topbarDate">今天日期</div>
        </div>
        <button class="help-btn" onclick="showHelp()">？</button>
      </div>
      <div class="year-bar">
        <div class="year-box">
          <label>年度</label>
          <select id="yearSelector" onchange="changeSelectedYear(this.value)"></select>
        </div>
        <button class="quick-add" onclick="openTaskModal()">＋ 新增</button>
      </div>
    </div>

    <div class="content">
      <div class="page active" id="page-home">
        <div class="card">
          <div class="card-title">今天重點</div>
          <div class="big-stat-grid" id="homeStats"></div>
        </div>

        <div class="card">
          <div class="card-title">快速操作</div>
          <div class="action-row">
            <button class="action-btn btn-blue" onclick="switchMainPage('tasks')">查看任務</button>
            <button class="action-btn btn-green" onclick="switchMainPage('inventory')">庫存任務</button>
            <button class="action-btn btn-orange" onclick="switchMainPage('month')">本月行程</button>
            <button class="action-btn btn-red" onclick="switchMainPage('warning')">逾期提醒</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">主要功能</div>
          <div class="section-btn-grid">
            <button class="section-btn" onclick="switchMainPage('tasks')">📋 任務清單<small>依月份、類別查看與修改</small></button>
            <button class="section-btn" onclick="switchMainPage('inventory')">📦 庫存任務<small>從庫存快速加入年度任務</small></button>
            <button class="section-btn" onclick="switchMainPage('month')">🗓 本月月曆<small>查看本月有哪些工作</small></button>
            <button class="section-btn" onclick="switchMainPage('settings')">⚙️ 設定管理<small>匯出、匯入、清空資料</small></button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">近期到期任務</div>
          <div id="homeUpcoming"></div>
        </div>
      </div>

      <div class="page" id="page-tasks">
        <div class="card">
          <div class="card-title">任務清單</div>
          <div class="filter-panel">
            <div class="row2">
              <select id="filterMonth" onchange="renderTaskList()">
                <option value="">全部月份</option>
              </select>
              <select id="filterStatus" onchange="renderTaskList()">
                <option value="">全部狀態</option>
                <option value="待辦">待辦</option>
                <option value="進行中">進行中</option>
                <option value="已完成">已完成</option>
              </select>
            </div>
            <div class="row2">
              <select id="filterCat" onchange="renderTaskList()">
                <option value="">全部類別</option>
              </select>
              <select id="filterPri" onchange="renderTaskList()">
                <option value="">全部優先級</option>
                <option value="🔴 緊急">🔴 緊急</option>
                <option value="🟡 高">🟡 高</option>
                <option value="🟢 中">🟢 中</option>
                <option value="⚪ 低">⚪ 低</option>
              </select>
            </div>
            <input id="filterSearch" placeholder="輸入關鍵字搜尋任務或負責人" oninput="renderTaskList()">
            <div class="action-row">
              <button class="action-btn btn-white" onclick="resetTaskFilters()">清除篩選</button>
              <button class="action-btn btn-blue" onclick="openTaskModal()">＋ 新增任務</button>
            </div>
          </div>
        </div>
        <div class="task-list" id="taskListWrap"></div>
      </div>

      <div class="page" id="page-inventory">
        <div class="card">
          <div class="card-title">庫存任務</div>
          <div class="filter-panel">
            <div class="row2">
              <select id="invFilterType" onchange="renderInventoryPage()">
                <option value="">全部類型</option>
                <option value="once">一次性</option>
                <option value="periodic">定期</option>
                <option value="irregular">不定期</option>
              </select>
              <select id="invFilterCat" onchange="renderInventoryPage()">
                <option value="">全部類別</option>
                <option value="legal">法定申報</option>
                <option value="finance">財務工作</option>
                <option value="meeting">會議</option>
                <option value="event">活動倡議</option>
              </select>
            </div>
            <input id="invSearch" placeholder="搜尋庫存任務名稱或負責人" oninput="renderInventoryPage()">
            <div class="action-row">
              <button class="action-btn btn-green" onclick="openInventoryModal()">＋ 新增庫存</button>
              <button class="action-btn btn-white" onclick="seedInventoryDefaults()">↺ 載入預設</button>
            </div>
          </div>
        </div>
        <div class="task-list" id="inventoryListWrap"></div>
      </div>

      <div class="page" id="page-month">
        <div class="card">
          <div class="card-title">本月行程</div>
          <div class="helper-box">
            這裡會顯示 <b>目前月份</b> 的任務，方便直接查看本月要處理的事情。
          </div>
        </div>
        <div class="card">
          <div class="action-row">
            <button class="action-btn btn-white" onclick="changeMonth(-1)">◀ 上個月</button>
            <button class="action-btn btn-white" onclick="changeMonth(1)">下個月 ▶</button>
          </div>
          <div style="margin-top:12px;font-size:22px;font-weight:900;color:var(--primary-dark);" id="monthLabel"></div>
        </div>
        <div class="task-list" id="monthListWrap"></div>
      </div>

      <div class="page" id="page-warning">
        <div class="card">
          <div class="card-title">提醒事項</div>
          <div class="big-stat-grid" id="warningStats"></div>
        </div>
        <div class="card">
          <div class="card-title">逾期任務</div>
          <div class="task-list" id="overdueListWrap"></div>
        </div>
        <div class="card">
          <div class="card-title">7天內到期</div>
          <div class="task-list" id="urgentListWrap"></div>
        </div>
      </div>

      <div class="page" id="page-settings">
        <div class="card">
          <div class="card-title">資料管理</div>
          <div class="action-row" style="margin-bottom:10px;">
            <button class="action-btn btn-white" onclick="exportJSON()">匯出備份</button>
            <button class="action-btn btn-white" onclick="importJSON()">匯入備份</button>
          </div>
          <div class="action-row" style="margin-bottom:10px;">
            <button class="action-btn btn-orange" onclick="resetData()">重置預設</button>
            <button class="action-btn btn-red" onclick="clearAllTasks()">清空任務</button>
          </div>
          <div class="action-row">
            <button class="action-btn btn-red" onclick="clearAllInventory()">清空庫存</button>
            <button class="action-btn btn-red" onclick="clearAllData()">全部清空</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">操作提示</div>
          <div class="helper-box">
            1. 要看所有任務，請按下方「任務」<br>
            2. 要從模板加入任務，請按「庫存」<br>
            3. 任務完成後，可按「完成」<br>
            4. 若誤刪，請用「重置預設」或「匯入備份」
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active" data-page="home" onclick="switchMainPage('home',this)"><span class="icon">🏠</span><span>首頁</span></button>
      <button class="nav-btn" data-page="tasks" onclick="switchMainPage('tasks',this)"><span class="icon">📋</span><span>任務</span></button>
      <button class="nav-btn" data-page="inventory" onclick="switchMainPage('inventory',this)"><span class="icon">📦</span><span>庫存</span></button>
      <button class="nav-btn" data-page="month" onclick="switchMainPage('month',this)"><span class="icon">🗓</span><span>本月</span></button>
      <button class="nav-btn" data-page="settings" onclick="switchMainPage('settings',this)"><span class="icon">⚙️</span><span>設定</span></button>
    </div>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop" onclick="toggleDrawer(false)"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <div class="drawer-title">🌸 功能選單</div>
      <div class="drawer-sub">手機樂齡版｜按一下即可切換</div>
    </div>
    <div class="drawer-list">
      <button class="drawer-item" onclick="jumpDrawer('home')">🏠 首頁總覽</button>
      <button class="drawer-item" onclick="jumpDrawer('tasks')">📋 任務清單</button>
      <button class="drawer-item" onclick="jumpDrawer('inventory')">📦 庫存任務</button>
      <button class="drawer-item" onclick="jumpDrawer('month')">🗓 本月行程</button>
      <button class="drawer-item" onclick="jumpDrawer('warning')">⚠️ 逾期提醒</button>

      <div class="modal-title" id="inventoryModalTitle">＋ 新增庫存任務</div>
      <div class="form-grid">

          <input type="text" id="invName" placeholder="請輸入任務名稱">

        <button class="btn-green" onclick="saveInventoryTask()">儲存</button>

  <div class="toast" id="toast"></div>

  <script>
    const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const YEAR_OPTIONS=[2025,2026,2027,2028,2029,2030];
    let selectedYear=parseInt(localStorage.getItem('selected_year'),10)||2026;
    let currentPage='home';
    let editingId=null;
    let editingInventoryId=null;
    let drawerOpen=false;
    let monthViewYear=selectedYear;
    let monthViewMonth=new Date().getMonth()+1;
    let toastTimer=null;

    const CAT_COLOR={
      '法定申報':'#EF4444','財務管理':'#F97316','會議':'#8B5CF6',
      '活動推廣':'#06B6D4','倡議政策':'#10B981','補助計畫':'#F59E0B',
      '行政事務':'#6B7280','志工管理':'#A855F7'
    };

    const INVENTORY_TYPE_LABEL={once:'一次性',periodic:'定期',irregular:'不定期'};
    const INVENTORY_CAT_LABEL={legal:'法定申報',finance:'財務工作',meeting:'會議',event:'活動倡議'};
    const INVENTORY_PRIORITY_LABEL={urgent:'🔴 緊急',high:'🟡 高',mid:'🟢 中'};

    const DEFAULT_TASKS_2026=[
      { id:1, year:2026, mo:1, cat:'法定申報', task:'理監事會議紀錄申報', owner:'秘書長', pri:'🔴 緊急', start:'2026-01-05', end:'2026-01-15', status:'待辦', pct:0, note:'依法於15日前完成' },
      { id:2, year:2026, mo:1, cat:'財務管理', task:'上年度決算報告編製', owner:'財務長', pri:'🔴 緊急', start:'2026-01-10', end:'2026-01-31', status:'待辦', pct:0, note:'' },
      { id:3, year:2026, mo:4, cat:'活動推廣', task:'世界帕金森日公益活動', owner:'活動組長', pri:'🔴 緊急', start:'2026-04-10', end:'2026-04-11', status:'待辦', pct:0, note:'主場地：台北市立醫院' },
      { id:4, year:2026, mo:5, cat:'會議', task:'年度會員大會', owner:'理事長', pri:'🔴 緊急', start:'2026-05-20', end:'2026-05-20', status:'待辦', pct:0, note:'改選理監事' },
      { id:5, year:2026, mo:6, cat:'補助計畫', task:'上半年補助計畫成果報告', owner:'計畫組長', pri:'🟡 高', start:'2026-06-20', end:'2026-06-30', status:'待辦', pct:0, note:'' },
      { id:6, year:2026, mo:9, cat:'補助計畫', task:'衛福部補助計畫期中報告', owner:'計畫組長', pri:'🔴 緊急', start:'2026-09-01', end:'2026-09-30', status:'待辦', pct:0, note:'' },
      { id:7, year:2026, mo:10, cat:'活動推廣', task:'年度病友聯誼大會', owner:'活動組長', pri:'🔴 緊急', start:'2026-10-20', end:'2026-10-20', status:'待辦', pct:0, note:'預計300人參加' },
      { id:8, year:2026, mo:11, cat:'法定申報', task:'年度財務報告書送審', owner:'秘書長', pri:'🔴 緊急', start:'2026-11-01', end:'2026-11-30', status:'待辦', pct:0, note:'' },
      { id:9, year:2026, mo:12, cat:'會議', task:'年度最後一次理監事會', owner:'理事長', pri:'🔴 緊急', start:'2026-12-15', end:'2026-12-15', status:'待辦', pct:0, note:'審議明年預算' }
    ];

    const TASK_INVENTORY_2026=[
      {id:'it1',name:'月份帳務結算',type:'periodic',cat:'finance',owner:'會計',priority:'high',note:'每月底前完成'},
      {id:'it2',name:'Q1 理監事聯席會議',type:'periodic',cat:'meeting',owner:'理事長',priority:'high',note:'3月'},
      {id:'it3',name:'編造年度工作計畫草案',type:'once',cat:'legal',owner:'理事長/總幹事',priority:'high',note:'1月20日前'},
      {id:'it4',name:'召開會員大會',type:'once',cat:'legal',owner:'理事長',priority:'urgent',note:'4月18日'},
      {id:'it5',name:'世界帕金森日活動',type:'once',cat:'event',owner:'總幹事',priority:'urgent',note:'4月11日'},
      {id:'it6',name:'病友教育講座',type:'irregular',cat:'event',owner:'總幹事',priority:'high',note:'疾病知識衛教'},
      {id:'it7',name:'政策論壇辦理',type:'once',cat:'event',owner:'理事長',priority:'high',note:'11月'},
      {id:'it8',name:'志工年終感謝晚會',type:'once',cat:'event',owner:'總幹事',priority:'mid',note:'12月'}
    ];

    let tasks=JSON.parse(localStorage.getItem('senior_mobile_tasks')||'null')||DEFAULT_TASKS_2026.slice();
    let inventory=JSON.parse(localStorage.getItem('senior_mobile_inventory')||'null')||TASK_INVENTORY_2026.slice();
    let nextId=Math.max(...tasks.map(t=>t.id),0)+1;

    function saveData(){
      localStorage.setItem('senior_mobile_tasks',JSON.stringify(tasks));
      localStorage.setItem('senior_mobile_inventory',JSON.stringify(inventory));
    }

    function showToast(msg,type=''){
      const el=document.getElementById('toast');
      el.textContent=msg;
      el.className='toast '+type;
      el.classList.add('show');
      if(toastTimer) clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
    }

    function formatToday(){
      const now=new Date();
      const days=['日','一','二','三','四','五','六'];
      document.getElementById('topbarDate').textContent=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;
    }

    function initSelectors(){
      const yearSel=document.getElementById('yearSelector');
      const fYear=document.getElementById('fYear');
      yearSel.innerHTML=YEAR_OPTIONS.map(y=>`<option value="${y}">${y}年</option>`).join('');
      fYear.innerHTML=YEAR_OPTIONS.map(y=>`<option value="${y}">${y}年</option>`).join('');
      yearSel.value=selectedYear;
      fYear.value=selectedYear;

      document.getElementById('fMonth').innerHTML=MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
      document.getElementById('filterMonth').innerHTML=`<option value="">全部月份</option>`+MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');

      const cats=Object.keys(CAT_COLOR);
      document.getElementById('fCat').innerHTML=cats.map(c=>`<option>${c}</option>`).join('');
      document.getElementById('filterCat').innerHTML=`<option value="">全部類別</option>`+cats.map(c=>`<option>${c}</option>`).join('');
    }

    function todayDate(){
      const d=new Date();
      d.setHours(0,0,0,0);
      return d;
    }
    function parseDate(str){
      if(!str) return null;
      const d=new Date(str+'T00:00:00');
      d.setHours(0,0,0,0);
      return isNaN(d)?null:d;
    }
    function diffDays(str){
      const d=parseDate(str);
      if(!d) return 9999;
      return Math.ceil((d-todayDate())/86400000);
    }
    function yearTasks(){
      return tasks.filter(t=>parseInt(t.year,10)===parseInt(selectedYear,10));
    }
    function isOverdue(t){
      if(t.status==='已完成'||t.status==='取消') return false;
      return diffDays(t.end)<0;
    }
    function isUrgent(t){
      if(t.status==='已完成'||t.status==='取消') return false;
      const d=diffDays(t.end);
      return d>=0&&d<=7;
    }
    function statusBadge(s){
      let cls='b-status';
      if(s==='已完成') cls='b-status';
      if(s==='待辦') cls='b-owner';
      if(s==='進行中') cls='b-cat';
      return `<span class="badge ${cls}">${s}</span>`;
    }
    function catBadge(c){ return `<span class="badge b-cat">${c}</span>`; }
    function ownerBadge(o){ return `<span class="badge b-owner">${o||'未指定'}</span>`; }
    function dateBadge(t){
      if(!t.end) return `<span class="badge b-date">未設定日期</span>`;
      if(isOverdue(t)) return `<span class="badge b-overdue">已逾期 ${t.end}</span>`;
      if(isUrgent(t)) return `<span class="badge b-date">快到期 ${t.end}</span>`;
      return `<span class="badge b-date">${t.end}</span>`;
    }

    function switchMainPage(name,btn=null){
      currentPage=name;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      const page=document.getElementById('page-'+name);
      if(page) page.classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
      const match=btn || document.querySelector(`.nav-btn[data-page="${name}"]`);
      if(match) match.classList.add('active');
      renderCurrentPage();
    }

    function renderCurrentPage(){
      if(currentPage==='home') renderHome();
      if(currentPage==='tasks') renderTaskList();
      if(currentPage==='inventory') renderInventoryPage();
      if(currentPage==='month') renderMonthPage();
      if(currentPage==='warning') renderWarningPage();
    }

    function renderHome(){
      const list=yearTasks();
      const done=list.filter(t=>t.status==='已完成').length;
      const overdue=list.filter(isOverdue).length;
      const urgent=list.filter(isUrgent).length;
      const pending=list.filter(t=>t.status==='待辦').length;
      document.getElementById('homeStats').innerHTML=`
        <div class="big-stat"><div class="big-stat-label">總任務</div><div class="big-stat-value">${list.length}</div><div class="big-stat-sub">${selectedYear} 年</div></div>
        <div class="big-stat"><div class="big-stat-label">待辦</div><div class="big-stat-value" style="color:#D97706;">${pending}</div><div class="big-stat-sub">尚未完成</div></div>
        <div class="big-stat"><div class="big-stat-label">快到期</div><div class="big-stat-value" style="color:#C2410C;">${urgent}</div><div class="big-stat-sub">7天內</div></div>
        <div class="big-stat"><div class="big-stat-label">逾期</div><div class="big-stat-value" style="color:#DC2626;">${overdue}</div><div class="big-stat-sub">需立即處理</div></div>
      `;
      const upcoming=list.filter(isUrgent).sort((a,b)=>(a.end||'').localeCompare(b.end||''));
      const box=document.getElementById('homeUpcoming');
      if(!upcoming.length){
        box.innerHTML=`<div class="empty-box">目前沒有快到期任務</div>`;
        return;
      }
      box.innerHTML=`<div class="task-list">${upcoming.slice(0,4).map(taskCardHTML).join('')}</div>`;
    }

    function taskCardHTML(t,mode='task'){
      const act = mode==='task'
        ? `
          <div class="task-actions">
            <button style="background:#EAF4FF;color:#1D4E89;" onclick="editTask(${t.id})">編輯</button>
            <button style="background:#ECFDF5;color:#047857;" onclick="quickComplete(${t.id})">完成</button>
            <button style="background:#FFF1F2;color:#BE123C;" onclick="deleteTask(${t.id})">刪除</button>
          </div>
        `
        : `
          <div class="task-actions">
            <button style="grid-column:span 2;background:#ECFDF5;color:#047857;" onclick="addInventoryToTasks('${t.id}')">加入今年任務</button>
            <button style="background:#FFF1F2;color:#BE123C;" onclick="deleteInventoryTask('${t.id}')">刪除</button>
          </div>
        `;
      const title = mode==='task' ? t.task : t.name;
      const cat = mode==='task' ? t.cat : (INVENTORY_CAT_LABEL[t.cat]||t.cat);
      const owner = t.owner || '未指定';
      const note = t.note || '';
      const typeBadge = mode==='inventory' ? `<span class="badge b-date">${INVENTORY_TYPE_LABEL[t.type]}</span>` : '';
      const priBadge = mode==='inventory'
        ? `<span class="badge b-date">${INVENTORY_PRIORITY_LABEL[t.priority]}</span>`
        : `<span class="badge b-date">${t.pri}</span>`;

      return `
        <div class="task-card">
          <div class="task-top">
            <div class="task-name">${title}</div>
          </div>
          <div class="task-meta">
            ${catBadge(cat)}
            ${ownerBadge(owner)}
            ${mode==='task' ? dateBadge(t) : typeBadge}
            ${mode==='task' ? statusBadge(t.status) : priBadge}
          </div>
          ${note ? `<div class="task-note">${note}</div>` : ``}
          ${act}
        </div>
      `;
    }

    function renderTaskList(){
      const month=document.getElementById('filterMonth').value;
      const status=document.getElementById('filterStatus').value;
      const cat=document.getElementById('filterCat').value;
      const pri=document.getElementById('filterPri').value;
      const search=(document.getElementById('filterSearch').value||'').toLowerCase();

      const filtered=yearTasks().filter(t=>{
        if(month && String(t.mo)!==String(month)) return false;
        if(status && t.status!==status) return false;
        if(cat && t.cat!==cat) return false;
        if(pri && t.pri!==pri) return false;
        if(search && !String(t.task).toLowerCase().includes(search) && !String(t.owner).toLowerCase().includes(search)) return false;
        return true;
      }).sort((a,b)=>a.mo-b.mo||(a.end||'').localeCompare(b.end||''));

      const wrap=document.getElementById('taskListWrap');
      if(!filtered.length){
        wrap.innerHTML=`<div class="card empty-box">找不到符合條件的任務</div>`;
        return;
      }
      wrap.innerHTML=filtered.map(t=>taskCardHTML(t,'task')).join('');
    }

    function renderInventoryPage(){
      const type=document.getElementById('invFilterType').value;
      const cat=document.getElementById('invFilterCat').value;
      const search=(document.getElementById('invSearch').value||'').toLowerCase();
      const filtered=inventory.filter(t=>{
        if(type && t.type!==type) return false;
        if(cat && t.cat!==cat) return false;
        if(search && !String(t.name).toLowerCase().includes(search) && !String(t.owner).toLowerCase().includes(search)) return false;
        return true;
      });
      const wrap=document.getElementById('inventoryListWrap');
      if(!filtered.length){
        wrap.innerHTML=`<div class="card empty-box">目前沒有符合條件的庫存任務</div>`;
        return;
      }
      wrap.innerHTML=filtered.map(t=>taskCardHTML(t,'inventory')).join('');
    }

    function renderMonthPage(){
      document.getElementById('monthLabel').textContent=`${monthViewYear} 年 ${monthViewMonth} 月`;
      const list=tasks.filter(t=>parseInt(t.year,10)===parseInt(monthViewYear,10)&&parseInt(t.mo,10)===parseInt(monthViewMonth,10));
      const wrap=document.getElementById('monthListWrap');
      if(!list.length){
        wrap.innerHTML=`<div class="card empty-box">這個月份目前沒有任務</div>`;
        return;
      }
      wrap.innerHTML=list.sort((a,b)=>(a.end||'').localeCompare(b.end||'')).map(t=>taskCardHTML(t,'task')).join('');
    }

    function renderWarningPage(){
      const list=yearTasks();
      const overdue=list.filter(isOverdue);
      const urgent=list.filter(isUrgent);
      document.getElementById('warningStats').innerHTML=`
        <div class="big-stat"><div class="big-stat-label">逾期</div><div class="big-stat-value" style="color:#DC2626;">${overdue.length}</div><div class="big-stat-sub">要先處理</div></div>
        <div class="big-stat"><div class="big-stat-label">快到期</div><div class="big-stat-value" style="color:#D97706;">${urgent.length}</div><div class="big-stat-sub">7天內</div></div>
      `;
      document.getElementById('overdueListWrap').innerHTML=overdue.length?overdue.map(t=>taskCardHTML(t,'task')).join(''):`<div class="empty-box">沒有逾期任務</div>`;
      document.getElementById('urgentListWrap').innerHTML=urgent.length?urgent.map(t=>taskCardHTML(t,'task')).join(''):`<div class="empty-box">沒有快到期任務</div>`;
    }

    function resetTaskFilters(){
      ['filterMonth','filterStatus','filterCat','filterPri'].forEach(id=>document.getElementById(id).value='');
      document.getElementById('filterSearch').value='';
      renderTaskList();
    }

    function toggleDrawer(force){
      drawerOpen = typeof force==='boolean' ? force : !drawerOpen;
      document.getElementById('drawer').classList.toggle('show',drawerOpen);
      document.getElementById('drawerBackdrop').classList.toggle('show',drawerOpen);
    }
    function jumpDrawer(page){
      toggleDrawer(false);
      switchMainPage(page);
    }

    function openTaskModal(){
      editingId=null;
      document.getElementById('taskModalTitle').textContent='＋ 新增任務';
      document.getElementById('fYear').value=selectedYear;
      document.getElementById('fMonth').value=monthViewMonth;
      document.getElementById('fCat').value='法定申報';
      document.getElementById('fPri').value='🟡 高';
      document.getElementById('fTask').value='';
      document.getElementById('fOwner').value='';
      document.getElementById('fStatus').value='待辦';
      document.getElementById('fPct').value='0';
      document.getElementById('fStart').value='';
      document.getElementById('fEnd').value='';
      document.getElementById('fNote').value='';
      openModal('taskModal');
    }

    function editTask(id){
      const t=tasks.find(x=>x.id===id);
      if(!t) return;
      editingId=id;
      document.getElementById('taskModalTitle').textContent='✏️ 修改任務';
      document.getElementById('fYear').value=t.year;
      document.getElementById('fMonth').value=t.mo;
      document.getElementById('fCat').value=t.cat;
      document.getElementById('fPri').value=t.pri;
      document.getElementById('fTask').value=t.task;
      document.getElementById('fOwner').value=t.owner;
      document.getElementById('fStatus').value=t.status;
      document.getElementById('fPct').value=t.pct;
      document.getElementById('fStart').value=t.start||'';
      document.getElementById('fEnd').value=t.end||'';
      document.getElementById('fNote').value=t.note||'';
      openModal('taskModal');
    }

    function saveTask(){
      const data={
        year:parseInt(document.getElementById('fYear').value,10),
        mo:parseInt(document.getElementById('fMonth').value,10),
        cat:document.getElementById('fCat').value,
        pri:document.getElementById('fPri').value,
        task:document.getElementById('fTask').value.trim(),
        owner:document.getElementById('fOwner').value.trim(),
        status:document.getElementById('fStatus').value,
        pct:Math.min(100,Math.max(0,parseInt(document.getElementById('fPct').value,10)||0)),
        start:document.getElementById('fStart').value,
        end:document.getElementById('fEnd').value,
        note:document.getElementById('fNote').value.trim()
      };
      if(!data.task){ showToast('請輸入工作事項','warning'); return; }
      if(!data.owner){ showToast('請輸入負責人','warning'); return; }

      if(editingId===null){
        data.id=nextId++;
        tasks.push(data);
        showToast('已新增任務','success');
      }else{
        data.id=editingId;
        const idx=tasks.findIndex(t=>t.id===editingId);
        tasks[idx]=data;
        showToast('已更新任務','success');
      }
      saveData();
      closeModal('taskModal');
      renderCurrentPage();
      renderHome();
    }

    function quickComplete(id){
      const idx=tasks.findIndex(t=>t.id===id);
      if(idx===-1) return;
      tasks[idx].status='已完成';
      tasks[idx].pct=100;
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('任務已標記完成','success');
    }

    function deleteTask(id){
      const t=tasks.find(x=>x.id===id);
      if(!t) return;
      if(!confirm(`確定刪除「${t.task}」？`)) return;
      tasks=tasks.filter(x=>x.id!==id);
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('已刪除任務','warning');
    }

    function openInventoryModal(){
      editingInventoryId=null;
      document.getElementById('inventoryModalTitle').textContent='＋ 新增庫存任務';
      document.getElementById('invName').value='';
      document.getElementById('invType').value='once';
      document.getElementById('invCat').value='legal';
      document.getElementById('invPriority').value='high';
      document.getElementById('invOwner').value='';
      document.getElementById('invNote').value='';
      openModal('inventoryModal');
    }

    function saveInventoryTask(){
      const data={
        id:editingInventoryId || ('it'+Date.now()),
        name:document.getElementById('invName').value.trim(),
        type:document.getElementById('invType').value,
        cat:document.getElementById('invCat').value,
        priority:document.getElementById('invPriority').value,
        owner:document.getElementById('invOwner').value.trim(),
        note:document.getElementById('invNote').value.trim()
      };
      if(!data.name){ showToast('請輸入庫存任務名稱','warning'); return; }

      if(editingInventoryId){
        const idx=inventory.findIndex(t=>t.id===editingInventoryId);
        inventory[idx]=data;
        showToast('已更新庫存任務','success');
      }else{
        inventory.push(data);
        showToast('已新增庫存任務','success');
      }
      saveData();
      closeModal('inventoryModal');
      renderInventoryPage();
    }

    function addInventoryToTasks(id){
      const inv=inventory.find(x=>x.id===id);
      if(!inv) return;
      const task={
        id:nextId++,
        year:selectedYear,
        mo:guessMonthFromNote(inv.note),
        cat:mapInventoryCatToMain(inv.cat),
        task:inv.name,
        owner:inv.owner || '待指定',
        pri:mapInventoryPriorityToMain(inv.priority),
        start:'',
        end:'',
        status:'待辦',
        pct:0,
        note:inv.note || ''
      };
      tasks.push(task);
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('已加入今年任務','success');
    }

    function deleteInventoryTask(id){
      const inv=inventory.find(x=>x.id===id);
      if(!inv) return;
      if(!confirm(`確定刪除庫存任務「${inv.name}」？`)) return;
      inventory=inventory.filter(x=>x.id!==id);
      saveData();
      renderInventoryPage();
      showToast('已刪除庫存任務','warning');
    }

    function mapInventoryCatToMain(cat){
      if(cat==='legal') return '法定申報';
      if(cat==='finance') return '財務管理';
      if(cat==='meeting') return '會議';
      if(cat==='event') return '活動推廣';
      return '行政事務';
    }
    function mapInventoryPriorityToMain(p){
      if(p==='urgent') return '🔴 緊急';
      if(p==='high') return '🟡 高';
      return '🟢 中';
    }
    function guessMonthFromNote(note){
      if(!note) return new Date().getMonth()+1;
      for(let i=1;i<=12;i++){
        if(note.includes(i+'月')) return i;
      }
      return new Date().getMonth()+1;
    }

    function changeSelectedYear(year){
      selectedYear=parseInt(year,10)||2026;
      localStorage.setItem('selected_year',String(selectedYear));
      monthViewYear=selectedYear;
      renderCurrentPage();
      renderHome();
      showToast(`已切換到 ${selectedYear} 年`);
    }

    function changeMonth(delta){
      monthViewMonth+=delta;
      if(monthViewMonth>12){ monthViewMonth=1; monthViewYear++; }
      if(monthViewMonth<1){ monthViewMonth=12; monthViewYear--; }
      renderMonthPage();
    }

    function openModal(id){ document.getElementById(id).classList.add('open'); }
    function closeModal(id){ document.getElementById(id).classList.remove('open'); }

    function exportJSON(){
      const payload={selectedYear,tasks,inventory,exportTime:new Date().toISOString()};
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;
      a.download='樂齡行事曆備份.json';
      a.click();
      URL.revokeObjectURL(url);
      showToast('已匯出備份','success');
    }

    function importJSON(){
      const input=document.createElement('input');
      input.type='file';
      input.accept='.json';
      input.onchange=e=>{
        const file=e.target.files[0];
        if(!file) return;
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const parsed=JSON.parse(ev.target.result);
            if(!confirm('確定匯入備份？目前資料會被覆蓋。')) return;
            tasks=Array.isArray(parsed.tasks)?parsed.tasks:tasks;
            inventory=Array.isArray(parsed.inventory)?parsed.inventory:inventory;
            if(parsed.selectedYear) selectedYear=parseInt(parsed.selectedYear,10);
            nextId=Math.max(...tasks.map(t=>t.id||0),0)+1;
            document.getElementById('yearSelector').value=selectedYear;
            saveData();
            renderCurrentPage();
            renderHome();
            showToast('已匯入備份','success');
          }catch(err){
            showToast('匯入失敗','danger');
          }
        };
        reader.readAsText(file,'utf-8');
      };
      input.click();
    }

    function resetData(){
      if(!confirm('確定重置為預設資料？')) return;
      tasks=DEFAULT_TASKS_2026.slice();
      inventory=TASK_INVENTORY_2026.slice();
      nextId=Math.max(...tasks.map(t=>t.id||0),0)+1;
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('已重置預設資料','warning');
    }

    function clearAllTasks(){
      if(!confirm('確定清空所有正式任務？')) return;
      tasks=[];
      nextId=1;
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('已清空正式任務','warning');
    }

    function clearAllInventory(){
      if(!confirm('確定清空所有庫存任務？')) return;
      inventory=[];
      saveData();
      renderInventoryPage();
      showToast('已清空庫存任務','warning');
    }

    function clearAllData(){
      if(!confirm('確定清空全部資料？')) return;
      tasks=[];
      inventory=[];
      nextId=1;
      saveData();
      renderCurrentPage();
      renderHome();
      showToast('已清空全部資料','danger');
    }

    function seedInventoryDefaults(){
      if(!confirm('要重新載入預設庫存任務嗎？')) return;
      inventory=TASK_INVENTORY_2026.slice();
      saveData();
      renderInventoryPage();
      showToast('已載入預設庫存','success');
    }

    function showHelp(){
      alert('操作說明：\n\n1. 下方選單可切換頁面\n2. 按「＋新增」可新增任務\n3. 任務卡片可直接按「完成」\n4. 庫存任務可按「加入今年任務」\n5. 設定頁可備份與清空資料');
    }

    document.addEventListener('DOMContentLoaded',()=>{
      formatToday();
      initSelectors();
      renderHome();
      renderCurrentPage();

      document.querySelectorAll('.modal-overlay').forEach(el=>{
        el.addEventListener('click',e=>{
          if(e.target===el) el.classList.remove('open');
        });
      });
    });
  </script>
</body>
</html>
