<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Google Drive 相簿</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    /* ===== Header ===== */
    header {
      background: linear-gradient(135deg, #16213e, #0f3460);
      padding: 36px 20px 28px;
      text-align: center;
      border-bottom: 2px solid #e94560;
    }
    header h1 {
      font-size: 1.9rem;
      letter-spacing: 2px;
      color: #fff;
    }
    header p { color: #aaa; margin-top: 6px; font-size: 0.95rem; }

    /* ===== Add Panel ===== */
    .add-panel {
      max-width: 860px;
      margin: 30px auto 0;
      padding: 0 20px;
    }
    .add-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 24px;
    }
    .add-card h2 {
      font-size: 1rem;
      color: #e94560;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .row input {
      flex: 1;
      min-width: 180px;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    .row input:focus { border-color: #e94560; }
    .row input::placeholder { color: #666; }
    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-add    { background: #e94560; color: #fff; }
    .btn-demo   { background: #533483; color: #fff; }
    .btn-clear  { background: #444; color: #fff; }
    .btn-folder { background: #1a7a4a; color: #fff; }

    /* ===== Hint ===== */
    .hint {
      background: #0f3460;
      border-left: 3px solid #e94560;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #aaa;
      line-height: 1.8;
      margin-top: 10px;
    }
    .hint code {
      background: #1a1a2e;
      padding: 1px 6px;
      border-radius: 4px;
      color: #e94560;
      font-size: 0.82rem;
    }

    /* ===== Album Title ===== */
    .album-header {
      max-width: 860px;
      margin: 28px auto 0;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .album-title {
      font-size: 1.1rem;
      color: #ccc;
    }
    .album-title span { color: #e94560; font-weight: bold; }
    .view-btns { display: flex; gap: 8px; }
    .view-btn {
      background: #16213e;
      border: 1px solid #0f3460;
      color: #aaa;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .view-btn.active, .view-btn:hover {
      background: #e94560;
      color: #fff;
      border-color: #e94560;
    }

    /* ===== Gallery ===== */
    .gallery {
      max-width: 860px;
      margin: 20px auto 40px;
      padding: 0 20px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .list { display: flex; flex-direction: column; gap: 12px; }

    /* ===== Photo Card ===== */
    .photo-card {
      background: #16213e;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #0f3460;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
    }
    .photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(233,69,96,0.25);
      border-color: #e94560;
    }
    .photo-card .thumb {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #0f3460;
    }
    .photo-card .thumb-list {
      width: 100px;
      height: 75px;
      object-fit: cover;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .photo-card .info {
      padding: 10px 12px;
    }
    .photo-card .info .name {
      font-size: 0.85rem;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .photo-card .info .meta {
      font-size: 0.75rem;
      color: #666;
      margin-top: 4px;
    }
    .photo-card .del-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .photo-card:hover .del-btn { display: flex; }
    .photo-card .del-btn:hover { background: #e94560; }

    /* List mode card */
    .list .photo-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px;
      border-radius: 10px;
    }
    .list .photo-card .info { flex: 1; }
    .list .photo-card .name { font-size: 0.95rem; white-space: normal; }

    /* ===== Empty State ===== */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #555;
    }
    .empty .icon { font-size: 3.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; line-height: 1.8; }

    /* ===== Lightbox ===== */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 80vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    .lightbox .lb-name {
      margin-top: 14px;
      color: #ccc;
      font-size: 0.9rem;
    }
    .lightbox .lb-close {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 2rem;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
    }
    .lightbox .lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      font-size: 2rem;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lightbox .lb-nav:hover { background: rgba(233,69,96,0.6); }
    .lightbox .lb-prev { left: 16px; }
    .lightbox .lb-next { right: 16px; }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 20px;
      color: #444;
      font-size: 0.8rem;
      border-top: 1px solid #16213e;
    }
  </style>
</head>
<body>

  <header>
    <h1>☁️ Google Drive 相簿</h1>
    <p>使用 Google 雲端硬碟圖片預覽連結，打造你的個人相簿</p>
  </header>

  <!-- 新增圖片面板 -->
  <div class="add-panel">
    <div class="add-card">
      <h2>➕ 新增圖片</h2>
      <div class="row">
        <input type="text" id="inputId" placeholder="Google Drive 檔案 ID（或完整分享連結）"/>
        <input type="text" id="inputName" placeholder="圖片名稱（選填）"/>
      </div>
      <div class="row">
        <button class="btn btn-add" onclick="addPhoto()">新增圖片</button>
        <button class="btn btn-demo" onclick="loadDemo()">載入示範相簿</button>
        <button class="btn btn-clear" onclick="clearAll()">清除全部</button>
      </div>
      <div class="hint">
        📌 <strong>如何取得 Google Drive 檔案 ID？</strong><br>
        1. 上傳圖片到 Google 雲端硬碟，右鍵 → 「共用」→ 設為「<strong>知道連結的任何人</strong>」<br>
        2. 右鍵 → 「取得連結」，連結格式為：<br>
        &nbsp;&nbsp;<code>https://drive.google.com/file/d/<strong>檔案ID</strong>/view</code><br>
        3. 複製中間的 <code>檔案ID</code> 貼入上方輸入框，或直接貼整個連結
      </div>
    </div>
  </div>

  <!-- 相簿標題列 -->
  <div class="album-header">
    <div class="album-title">相簿共 <span id="photoCount">0</span> 張照片</div>
    <div class="view-btns">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')">⊞ 格狀</button>
      <button class="view-btn" id="btnList" onclick="setView('list')">☰ 列表</button>
    </div>
  </div>

  <!-- 相簿展示區 -->
  <div class="gallery">
    <div class="grid" id="gallery"></div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="navPhoto(-1)">‹</button>
    <img id="lbImg" src="" alt=""/>
    <div class="lb-name" id="lbName"></div>
    <button class="lb-nav lb-next" onclick="navPhoto(1)">›</button>
  </div>

  <footer>© 2024 Google Drive 相簿 · 圖片來源為 Google 雲端硬碟預覽連結</footer>

  <script>
    let photos = [];
    let currentView = 'grid';
    let currentIndex = 0;

    // 示範圖片（使用 Google Drive 公開示範圖片 ID）
    const demoPhotos = [
      { id: '1bRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '山景風光' },
      { id: '1yRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '城市夜景' },
      { id: '1cRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '海邊日落' },
      { id: '1dRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '森林小徑' },
      { id: '1eRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '花田春色' },
      { id: '1fRzBMbzMHKxJXDhWNHGbKCRJXPJXGCqI', name: '雪山冬景' },
    ];

    // 從連結或ID中提取 file ID
    function extractId(input) {
      input = input.trim();
      // 完整連結格式：/file/d/ID/view 或 ?id=ID
      const m1 = input.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (m1) return m1[1];
      const m2 = input.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (m2) return m2[1];
      // 直接是 ID
      if (/^[a-zA-Z0-9_-]{10,}$/.test(input)) return input;
      return null;
    }

    function getThumbUrl(id) {
      return `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
    }

    function getPreviewUrl(id) {
      return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
    }

    function addPhoto() {
      const raw = document.getElementById('inputId').value.trim();
      const name = document.getElementById('inputName').value.trim();
      if (!raw) { alert('請輸入 Google Drive 檔案 ID 或分享連結！'); return; }
      const id = extractId(raw);
      if (!id) { alert('無法識別的格式，請確認輸入的是正確的 Drive 連結或 ID'); return; }
      photos.push({ id, name: name || `照片 ${photos.length + 1}` });
      document.getElementById('inputId').value = '';
      document.getElementById('inputName').value = '';
      renderGallery();
    }

    function loadDemo() {
      photos = [...demoPhotos];
      renderGallery();
    }

    function clearAll() {
      if (photos.length === 0) return;
      if (confirm('確定要清除所有照片嗎？')) {
        photos = [];
        renderGallery();
      }
    }

    function deletePhoto(index) {
      photos.splice(index, 1);
      renderGallery();
    }

    function setView(mode) {
      currentView = mode;
      document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
      document.getElementById('btnList').classList.toggle('active', mode === 'list');
      renderGallery();
    }

    function renderGallery() {
      const gallery = document.getElementById('gallery');
      document.getElementById('photoCount').textContent = photos.length;

      gallery.className = currentView;

      if (photos.length === 0) {
        gallery.innerHTML = `
          <div class="empty" style="grid-column:1/-1">
            <div class="icon">🖼️</div>
            <p>相簿是空的<br>請新增 Google Drive 圖片，或點擊「載入示範相簿」</p>
          </div>`;
        return;
      }

      gallery.innerHTML = photos.map((p, i) => {
        const thumb = getThumbUrl(p.id);
        if (currentView === 'list') {
          return `
            <div class="photo-card" onclick="openLightbox(${i})">
              <img class="thumb-list" src="${thumb}" alt="${p.name}"
                onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2275%22><rect fill=%22%230f3460%22 width=%22100%25%22 height=%22100%25%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23555%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22 font-size=%2212%22>無法載入</text></svg>'"/>
              <div class="info">
                <div class="name">${p.name}</div>
                <div class="meta">ID: ${p.id.substring(0,20)}...</div>
                <div class="meta" style="margin-top:4px;">
                  <a href="https://drive.google.com/file/d/${p.id}/view" target="_blank"
                    style="color:#e94560; text-decoration:none;" onclick="event.stopPropagation()">
                    🔗 在 Drive 中開啟
                  </a>
                </div>
              </div>
              <button class="del-btn" onclick="event.stopPropagation(); deletePhoto(${i})">✕</button>
            </div>`;
        } else {
          return `
            <div class="photo-card" onclick="openLightbox(${i})">
              <img class="thumb" src="${thumb}" alt="${p.name}"
                onerror="this.style.background='%230f3460'; this.alt='無法載入圖片'"/>
              <div class="info">
                <div class="name">${p.name}</div>
                <div class="meta">點擊放大查看</div>
              </div>
              <button class="del-btn" onclick="event.stopPropagation(); deletePhoto(${i})">✕</button>
            </div>`;
        }
      }).join('');
    }

    // Lightbox
    function openLightbox(index) {
      currentIndex = index;
      showLightboxPhoto();
      document.getElementById('lightbox').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function showLightboxPhoto() {
      const p = photos[currentIndex];
      document.getElementById('lbImg').src = getPreviewUrl(p.id);
      document.getElementById('lbName').textContent = `${p.name}（${currentIndex + 1} / ${photos.length}）`;
    }

    function closeLightbox(e) {
      if (e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lb-close')) return;
      if (!e) {
        document.getElementById('lightbox').classList.remove('show');
        document.body.style.overflow = '';
      } else {
        document.getElementById('lightbox').classList.remove('show');
        document.body.style.overflow = '';
      }
    }

    function navPhoto(dir) {
      currentIndex = (currentIndex + dir + photos.length) % photos.length;
      showLightboxPhoto();
    }

    // 鍵盤操作
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('show')) return;
      if (e.key === 'ArrowLeft') navPhoto(-1);
      if (e.key === 'ArrowRight') navPhoto(1);
      if (e.key === 'Escape') { document.getElementById('lightbox').classList.remove('show'); document.body.style.overflow = ''; }
    });

    // 初始化
    renderGallery();
  </script>
</body>
</html>
