<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣帕金森病友權益促進會 - 管理系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 針對帕金森病友的防震顫與高對比自訂樣式 */
        .accessible-touch-target {
            min-height: 48px;
            min-width: 48px;
        }
        .high-contrast {
            background-color: #000000 !important;
            color: #FFFF00 !important;
            border-color: #FFFF00 !important;
        }
        .high-contrast-card {
            background-color: #121212 !important;
            border: 2px solid #FFFF00 !important;
            color: #FFFFFF !important;
        }
        .high-contrast-btn {
            background-color: #FFFF00 !important;
            color: #000000 !important;
            font-weight: bold !important;
        }
        /* 滾動條樣式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 模擬 API 網址 (實際部署時替換為 GAS 部署的 Web App URL)
        const API_URL = "https://script.google.com/macros/s/YOUR_GAS_DEPLOYMENT_ID/exec";

        function App() {
            // --- 1. 無障礙與權限狀態 ---
            const [fontSize, setFontSize] = useState('M'); // S, M, L
            const [highContrast, setHighContrast] = useState(false);
            const [userRole, setUserRole] = useState('系統管理員'); // 系統管理員, 理監事/會務人員, 正式會員, 病友/家屬會員, 一般訪客
            const [currentTab, setCurrentTab] = useState('members'); // members, forum, info, album

            // --- 2. 模擬與同步數據庫 ---
            // 會員名冊
            const [members, setMembers] = useState([
                { id: "PA-2026-001", name: "陳志明", nickname: "明哥", type: "正式會員", status: "正常", membership: "有效", phone: "0912-345-678", tel: "02-2765-4321", email: "jimmy.chen@example.com" },
                { id: "PA-2026-002", name: "林美華", nickname: "華姐", type: "病友會員", status: "正常", membership: "有效", phone: "0933-111-222", tel: "04-2345-6789", email: "meihua.lin@example.com" }
            ]);
            const [searchMember, setSearchMember] = useState('');
            const [filterMemberType, setFilterMemberType] = useState('所有會員類型');
            const [showAddMemberModal, setShowAddMemberModal] = useState(false);
            const [newMember, setNewMember] = useState({ name: '', nickname: '', type: '正式會員', phone: '', tel: '', email: '' });

            // 官方論壇 (含多附件)
            const [forumPosts, setForumPosts] = useState([
                {
                    id: 1,
                    category: "日常照護",
                    title: "【經驗分享】關於巴金森氏症藥物「多巴胺受體促效劑」的日常副作用調適",
                    author: "王大同 (家屬會員)",
                    date: "2026-06-15 14:30",
                    content: "大家好，我父親服用多巴胺受體促效劑一陣子了，初期有輕微噁心與嗜睡情況。經過與醫師討論，改為隨餐服用，並在白天安排一些簡單的拉伸活動，目前副作用已經大幅改善。希望這點經驗能幫到大家！",
                    attachments: [{ name: "藥物副作用應對指南.pdf", size: "1.2 MB" }]
                }
            ]);
            const [showAddPostModal, setShowAddPostModal] = useState(false);
            const [newPost, setNewPost] = useState({ category: '日常照護', title: '', content: '', attachments: [] });
            const [tempFiles, setTempFiles] = useState([]); // 暫存待上傳檔案

            // 資訊平台 (醫療新知)
            const [infoArticles, setInfoArticles] = useState([
                {
                    id: 1,
                    category: "醫學新知",
                    title: "深入了解「深腦部刺激術 (DBS)」：手術時機與健保給付資格",
                    summary: "深腦部刺激術 (DBS) 是治療巴金森氏症的重要手術手段，能有效改善顫抖與僵直症狀。本篇為您整理最新健保給付規範與評估流程。",
                    date: "2026-06-20",
                    comments: [{ author: "李醫師", text: "非常詳盡的整理，病友在考慮手術前務必與神經內外科醫師共同評估。" }]
                }
            ]);
            const [showAddInfoModal, setShowAddInfoModal] = useState(false);
            const [newInfo, setNewInfo] = useState({ category: '醫學新知', title: '', summary: '' });

            // 活動花絮 (相簿)
            const [albums, setAlbums] = useState([
                {
                    id: 1,
                    title: "115年度「春櫻飛揚」病友同樂健走暨茶會",
                    location: "陽明山國家公園",
                    date: "2026-04-12",
                    cover: "https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?auto=format&fit=crop&w=600&q=80",
                    photos: [
                        "https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?auto=format&fit=crop&w=600&q=80",
                        "https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&w=600&q=80"
                    ]
                }
            ]);
            const [showAddAlbumModal, setShowAddAlbumModal] = useState(false);
            const [newAlbum, setNewAlbum] = useState({ title: '', location: '', date: '', photos: [] });

            // --- 3. 權限控制邏輯 ---
            const permissions = useMemo(() => {
                const roles = {
                    '系統管理員': { memberRead: true, memberWrite: true, forumRead: true, forumWrite: true, forumAdmin: true, infoWrite: true, albumWrite: true },
                    '理監事/會務人員': { memberRead: true, memberWrite: true, forumRead: true, forumWrite: true, forumAdmin: false, infoWrite: true, albumWrite: true },
                    '正式會員': { memberRead: false, memberWrite: false, forumRead: true, forumWrite: true, forumAdmin: false, infoWrite: false, albumWrite: false },
                    '病友/家屬會員': { memberRead: false, memberWrite: false, forumRead: true, forumWrite: true, forumAdmin: false, infoWrite: false, albumWrite: false },
                    '一般訪客': { memberRead: false, memberWrite: false, forumRead: true, forumWrite: false, forumAdmin: false, infoWrite: false, albumWrite: false }
                };
                return roles[userRole] || roles['一般訪客'];
            }, [userRole]);

            // --- 4. 輔助樣式設定 ---
            const textClass = () => {
                if (fontSize === 'S') return 'text-sm';
                if (fontSize === 'L') return 'text-xl';
                return 'text-base';
            };

            const titleClass = () => {
                if (fontSize === 'S') return 'text-lg font-bold';
                if (fontSize === 'L') return 'text-3xl font-bold';
                return 'text-2xl font-bold';
            };

            // --- 5. 檔案上傳模擬處理器 ---
            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                const formatted = files.map(f => ({
                    name: f.name,
                    size: (f.size / (1024 * 1024)).toFixed(2) + " MB"
                }));
                setTempFiles([...tempFiles, ...formatted]);
            };

            const renameTempFile = (index, newName) => {
                const updated = [...tempFiles];
                const ext = updated[index].name.split('.').pop();
                updated[index].name = newName + (newName.includes('.') ? '' : `.${ext}`);
                setTempFiles(updated);
            };

            const removeTempFile = (index) => {
                setTempFiles(tempFiles.filter((_, i) => i !== index));
            };

            // --- 6. 新增資料提交 (模擬同步至 GAS) ---
            const handleAddMemberSubmit = (e) => {
                e.preventDefault();
                const id = `PA-2026-00${members.length + 1}`;
                setMembers([...members, { ...newMember, id, status: '正常', membership: '有效' }]);
                setShowAddMemberModal(false);
                setNewMember({ name: '', nickname: '', type: '正式會員', phone: '', tel: '', email: '' });
            };

            const handleAddPostSubmit = (e) => {
                e.preventDefault();
                const post = {
                    id: forumPosts.length + 1,
                    category: newPost.category,
                    title: newPost.title,
                    author: `張大明 (${userRole})`,
                    date: new Date().toISOString().replace('T', ' ').substring(0, 16),
                    content: newPost.content,
                    attachments: tempFiles
                };
                setForumPosts([post, ...forumPosts]);
                setShowAddPostModal(false);
                setNewPost({ category: '日常照護', title: '', content: '', attachments: [] });
                setTempFiles([]);
            };

            return (
                <div className={`min-h-screen transition-colors duration-200 ${highContrast ? 'high-contrast' : 'bg-slate-50'}`}>
                    
                    {/* --- 頂部無障礙工具列 --- */}
                    <div className={`py-2 px-4 shadow-sm flex flex-wrap justify-between items-center gap-2 ${highContrast ? 'bg-zinc-900 border-b border-yellow-400' : 'bg-emerald-800 text-white'}`}>
                        <div className="flex items-center gap-4">
                            <span className="font-bold tracking-wide">無障礙關懷工具：</span>
                            <div className="flex gap-1">
                                {['S', 'M', 'L'].map(sz => (
                                    <button 
                                        key={sz}
                                        onClick={() => setFontSize(sz)}
                                        className={`px-3 py-1 rounded font-bold accessible-touch-target ${fontSize === sz ? (highContrast ? 'bg-yellow-400 text-black' : 'bg-white text-emerald-900') : 'border border-current opacity-70'}`}
                                    >
                                        字體 {sz === 'S' ? '小' : sz === 'M' ? '中' : '大'}
                                    </button>
                                ))}
                            </div>
                            <button 
                                onClick={() => setHighContrast(!highContrast)}
                                className={`px-3 py-1 rounded font-bold border accessible-touch-target ${highContrast ? 'bg-yellow-400 text-black border-yellow-400' : 'border-white hover:bg-emerald-700'}`}
                            >
                                {highContrast ? '切換標準模式' : '高對比模式'}
                            </button>
                        </div>
                        
                        {/* 角色切換模擬器 */}
                        <div className="flex items-center gap-2">
                            <span className="text-sm opacity-90">模擬目前權限：</span>
                            <select 
                                value={userRole} 
                                onChange={(e) => setUserRole(e.target.value)}
                                className={`p-1 rounded text-sm ${highContrast ? 'bg-black text-yellow-400 border border-yellow-400' : 'bg-emerald-700 text-white border-none'}`}
                            >
                                <option value="系統管理員">系統管理員</option>
                                <option value="理監事/會務人員">理監事/會務人員</option>
                                <option value="正式會員">正式會員</option>
                                <option value="病友/家屬會員">病友/家屬會員</option>
                                <option value="一般訪客">一般訪客</option>
                            </select>
                        </div>
                    </div>

                    {/* --- 主標題區 --- */}
                    <header className={`py-6 px-6 shadow-md ${highContrast ? 'bg-black border-b-2 border-yellow-400' : 'bg-emerald-700 text-white'}`}>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 className="text-2xl md:text-3xl font-extrabold flex items-center gap-2">
                                    <span className="p-2 bg-white text-emerald-700 rounded-full font-black text-lg">TP</span>
                                    台灣帕金森病友權益促進會 - 管理系統
                                    <span className="text-xs px-2 py-1 rounded bg-emerald-600 text-white border border-emerald-500">GAS雲端試算表版</span>
                                </h1>
                                <p className="text-xs opacity-80 mt-1">26個精細欄位試算表同步 + 雲端硬碟檔案安全管理 | 系統版本 v2.6</p>
                            </div>
                            <div className={`px-4 py-2 rounded-full text-sm font-bold ${highContrast ? 'border-2 border-yellow-400 text-yellow-400' : 'bg-rose-500 text-white'}`}>
                                當前操作權限：{userRole}
                            </div>
                        </div>
                    </header>

                    {/* --- 主導覽頁籤 --- */}
                    <nav className={`sticky top-0 z-10 shadow-md ${highContrast ? 'bg-zinc-900 border-b border-yellow-400' : 'bg-white border-b'}`}>
                        <div className="max-w-7xl mx-auto flex overflow-x-auto">
                            {[
                                { id: 'members', label: '會員名冊 (試算表同步)', icon: 'users' },
                                { id: 'forum', label: '官方論壇 (Drive儲存附件)', icon: 'message-square' },
                                { id: 'info', label: '資訊平台 (醫療新知)', icon: 'book-open' },
                                { id: 'album', label: '活動花絮 (相簿管理)', icon: 'image' }
                            ].map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setCurrentTab(tab.id)}
                                    className={`flex items-center gap-2 px-6 py-4 border-b-4 font-bold whitespace-nowrap transition-all accessible-touch-target ${textClass()} ${
                                        currentTab === tab.id 
                                            ? (highContrast ? 'border-yellow-400 text-yellow-400 bg-black' : 'border-emerald-600 text-emerald-700 bg-emerald-50/50')
                                            : (highContrast ? 'border-transparent text-gray-400 hover:text-yellow-400' : 'border-transparent text-slate-600 hover:text-emerald-600 hover:bg-slate-50')
                                    }`}
                                >
                                    <span>{tab.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* --- 主內容區塊 --- */}
                    <main className="max-w-7xl mx-auto p-4 md:p-6">
                        
                        {/* ================= TAB 1: 會員名冊 ================= */}
                        {currentTab === 'members' && (
                            <div>
                                {!permissions.memberRead ? (
                                    <div className={`p-8 text-center rounded-xl shadow ${highContrast ? 'high-contrast-card' : 'bg-white'}`}>
                                        <p className={`font-bold text-red-500 ${textClass()}`}>⚠️ 您的權限級別（{userRole}）無法閱讀會員名冊。請向系統管理員申請變更權限。</p>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        {/* 數據儀表板 */}
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {[
                                                { title: '總會員數', value: `${members.length} 人`, color: 'text-emerald-600' },
                                                { title: '有效會籍', value: `${members.filter(m => m.membership === '有效').length} 人`, color: 'text-blue-600' },
                                                { title: '累計實收會費', value: '$4,000', color: 'text-teal-600' },
                                                { title: '累計捐款總額', value: '$17,000', color: 'text-indigo-600' }
                                            ].map((card, i) => (
                                                <div key={i} className={`p-6 rounded-xl shadow-sm border ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-100'}`}>
                                                    <h3 className="text-sm font-medium text-slate-500">{card.title}</h3>
                                                    <p className={`text-3xl font-bold mt-2 ${card.color}`}>{card.value}</p>
                                                </div>
                                            ))}
                                        </div>

                                        {/* 搜尋與控制列 */}
                                        <div className={`p-4 rounded-xl shadow-sm border flex flex-wrap gap-4 justify-between items-center ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-100'}`}>
                                            <div className="flex flex-wrap gap-2 flex-1 min-w-[300px]">
                                                <input 
                                                    type="text" 
                                                    placeholder="搜尋姓名、暱稱、編號、手機..."
                                                    value={searchMember}
                                                    onChange={(e) => setSearchMember(e.target.value)}
                                                    className={`px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-emerald-500 flex-1 ${highContrast ? 'bg-black text-yellow-400 border-yellow-400' : 'bg-slate-50 border-slate-200'}`}
                                                />
                                                <select 
                                                    value={filterMemberType}
                                                    onChange={(e) => setFilterMemberType(e.target.value)}
                                                    className={`px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-emerald-500 ${highContrast ? 'bg-black text-yellow-400 border-yellow-400' : 'bg-slate-50 border-slate-200'}`}
                                                >
                                                    <option value="所有會員類型">所有會員類型</option>
                                                    <option value="正式會員">正式會員</option>
                                                    <option value="病友會員">病友會員</option>
                                                </select>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className={`px-4 py-3 rounded-lg font-bold border flex items-center gap-2 accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}>
                                                    📥 匯出 Excel (CSV)
                                                </button>
                                                {permissions.memberWrite && (
                                                    <button 
                                                        onClick={() => setShowAddMemberModal(true)}
                                                        className={`px-5 py-3 rounded-lg font-bold flex items-center gap-2 accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 hover:bg-emerald-700 text-white'}`}
                                                    >
                                                        ➕ 手動建檔會員
                                                    </button>
                                                )}
                                            </div>
                                        </div>

                                        {/* 會員表格 */}
                                        <div className={`rounded-xl shadow border overflow-hidden ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-200'}`}>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left border-collapse">
                                                    <thead>
                                                        <tr className={`border-b font-bold ${highContrast ? 'bg-zinc-900 border-yellow-400' : 'bg-slate-50 border-slate-200'}`}>
                                                            <th className="p-4">操作</th>
                                                            <th className="p-4">會員編號</th>
                                                            <th className="p-4">姓名</th>
                                                            <th className="p-4">暱稱</th>
                                                            <th className="p-4">會員類型</th>
                                                            <th className="p-4">狀態</th>
                                                            <th className="p-4">會籍狀態</th>
                                                            <th className="p-4">手機</th>
                                                            <th className="p-4">電話</th>
                                                            <th className="p-4">Email</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {members
                                                            .filter(m => m.name.includes(searchMember) || m.phone.includes(searchMember))
                                                            .filter(m => filterMemberType === '所有會員類型' || m.type === filterMemberType)
                                                            .map(m => (
                                                                <tr key={m.id} className={`hover:bg-slate-50/50 ${highContrast ? 'hover:bg-zinc-900' : ''}`}>
                                                                    <td className="p-4 flex gap-1">
                                                                        <button className={`px-2 py-1 text-xs rounded font-bold ${highContrast ? 'bg-yellow-400 text-black' : 'bg-blue-100 text-blue-700'}`}>編輯</button>
                                                                        <button className={`px-2 py-1 text-xs rounded font-bold ${highContrast ? 'bg-red-600 text-white' : 'bg-rose-100 text-rose-700'}`}>刪除</button>
                                                                    </td>
                                                                    <td className="p-4 font-mono font-bold">{m.id}</td>
                                                                    <td className="p-4 font-bold">{m.name}</td>
                                                                    <td className="p-4">{m.nickname}</td>
                                                                    <td className="p-4">
                                                                        <span className={`px-2 py-1 rounded-full text-xs font-bold ${m.type === '正式會員' ? 'bg-emerald-100 text-emerald-800' : 'bg-blue-100 text-blue-800'}`}>{m.type}</span>
                                                                    </td>
                                                                    <td className="p-4"><span className="text-emerald-600 font-bold">● {m.status}</span></td>
                                                                    <td className="p-4"><span className="px-2 py-1 bg-sky-100 text-sky-800 rounded text-xs font-bold">{m.membership}</span></td>
                                                                    <td className="p-4">{m.phone}</td>
                                                                    <td className="p-4">{m.tel}</td>
                                                                    <td className="p-4 font-mono text-xs">{m.email}</td>
                                                                </tr>
                                                            ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ================= TAB 2: 官方論壇 ================= */}
                        {currentTab === 'forum' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center flex-wrap gap-4">
                                    <div>
                                        <h2 className={titleClass()}>促進會開放討論區</h2>
                                        <p className="text-sm text-slate-500 mt-1">所有病友、正式會員、與醫療專業志工的交流天地。</p>
                                    </div>
                                    {permissions.forumWrite && (
                                        <button 
                                            onClick={() => setShowAddPostModal(true)}
                                            className={`px-6 py-3 rounded-xl font-bold flex items-center gap-2 accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 hover:bg-emerald-700 text-white'}`}
                                        >
                                            發表新討論主題
                                        </button>
                                    )}
                                </div>

                                <div className={`p-4 rounded-xl border flex items-center gap-2 ${highContrast ? 'high-contrast-card' : 'bg-amber-50 border-amber-200 text-amber-800'}`}>
                                    💡 <span className="font-bold">附件檔不限格式，均會自動安全保存於協會 Google 雲端硬碟中！</span>
                                </div>

                                {/* 文章列表 */}
                                <div className="space-y-4">
                                    {forumPosts.map(post => (
                                        <div key={post.id} className={`p-6 rounded-xl shadow-sm border transition-all ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-100 hover:shadow-md'}`}>
                                            <div className="flex justify-between items-start flex-wrap gap-2 mb-3">
                                                <span className="px-3 py-1 bg-emerald-100 text-emerald-800 rounded-full text-xs font-bold">{post.category}</span>
                                                <span className="text-xs text-slate-400">{post.date}</span>
                                            </div>
                                            <h3 className={`font-bold mb-2 ${fontSize === 'L' ? 'text-2xl' : 'text-xl'}`}>{post.title}</h3>
                                            <p className={`text-slate-600 mb-4 leading-relaxed ${textClass()}`}>{post.content}</p>
                                            
                                            <div className="flex justify-between items-center flex-wrap gap-2 pt-4 border-t border-slate-100">
                                                <span className="text-sm text-slate-500 font-medium">作者: {post.author}</span>
                                                {post.attachments.length > 0 && (
                                                    <div className="flex items-center gap-2">
                                                        <span className="text-xs text-slate-400">📎 附件: {post.attachments.length} 個</span>
                                                        {post.attachments.map((att, idx) => (
                                                            <a key={idx} href="#" className="text-xs font-bold text-emerald-600 hover:underline bg-emerald-50 px-2 py-1 rounded">
                                                                {att.name} ({att.size})
                                                            </a>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ================= TAB 3: 資訊平台 ================= */}
                        {currentTab === 'info' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center flex-wrap gap-4">
                                    <div>
                                        <h2 className={titleClass()}>巴金森醫療照護資訊平台</h2>
                                        <p className="text-sm text-slate-500 mt-1">提供最新衛教與長照補貼福利政策，協助病友家庭及照護者獲得專業支援。</p>
                                    </div>
                                    {permissions.infoWrite && (
                                        <button 
                                            onClick={() => setShowAddInfoModal(true)}
                                            className={`px-6 py-3 rounded-xl font-bold accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 hover:bg-emerald-700 text-white'}`}
                                        >
                                            發佈衛教新知
                                        </button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 gap-6">
                                    {infoArticles.map(art => (
                                        <div key={art.id} className={`p-6 rounded-xl shadow-sm border ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-100'}`}>
                                            <span className="px-2 py-1 bg-sky-100 text-sky-800 rounded text-xs font-bold">{art.category}</span>
                                            <h3 className={`font-bold mt-2 mb-3 ${fontSize === 'L' ? 'text-2xl' : 'text-xl'}`}>{art.title}</h3>
                                            <p className={`text-slate-600 mb-4 ${textClass()}`}>{art.summary}</p>
                                            <div className="text-xs text-slate-400 mb-4">發佈日期: {art.date}</div>
                                            
                                            {/* 讀者互動留言區 */}
                                            <div className="border-t pt-4">
                                                <h4 className="text-sm font-bold text-slate-700 mb-2">醫病互動與回饋：</h4>
                                                <div className="space-y-2">
                                                    {art.comments.map((c, idx) => (
                                                        <div key={idx} className="bg-slate-50 p-3 rounded-lg text-sm">
                                                            <span className="font-bold text-emerald-700">{c.author}: </span>
                                                            <span className="text-slate-600">{c.text}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* ================= TAB 4: 活動花絮 ================= */}
                        {currentTab === 'album' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center flex-wrap gap-4">
                                    <div>
                                        <h2 className={titleClass()}>活動花絮成果相簿</h2>
                                        <p className="text-sm text-slate-500 mt-1">記錄每一次茶會與健行病友的珍貴笑容。新相片可由系統直接寫入 Google Drive 相簿資料夾中。</p>
                                    </div>
                                    {permissions.albumWrite && (
                                        <button 
                                            onClick={() => setShowAddAlbumModal(true)}
                                            className={`px-6 py-3 rounded-xl font-bold accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 hover:bg-emerald-700 text-white'}`}
                                        >
                                            建立新相簿 / 批次上傳
                                        </button>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {albums.map(album => (
                                        <div key={album.id} className={`rounded-xl overflow-hidden shadow-sm border transition-all hover:shadow-md ${highContrast ? 'high-contrast-card' : 'bg-white border-slate-100'}`}>
                                            <img src={album.cover} alt={album.title} className="w-full h-48 object-cover" />
                                            <div className="p-5">
                                                <h3 className="font-bold text-lg mb-2">{album.title}</h3>
                                                <p className="text-sm text-slate-500">📍 地點: {album.location}</p>
                                                <p className="text-sm text-slate-500">📅 時間: {album.date}</p>
                                                <div className="mt-4 flex gap-2">
                                                    <button className={`px-4 py-2 rounded-lg text-xs font-bold accessible-touch-target ${highContrast ? 'high-contrast-btn' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}>
                                                        查看所有相片 ({album.photos.length} 張)
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* --- 頁腳 --- */}
                    <footer className={`py-8 px-4 text-center text-xs mt-12 border-t ${highContrast ? 'bg-black border-yellow-400 text-yellow-400' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>
                        <p>臺灣帕金森病友權益促進會 - GAS 試算表同步管理端 (v2.6)</p>
                        <p className="mt-1">© 2026 Taiwan Parkinson's Disease Patients Rights Promotion Association.</p>
                    </footer>

                    {/* ================= MODAL: 新增會員 ================= */}
                    {showAddMemberModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                            <div className={`w-full max-w-lg p-6 rounded-2xl shadow-xl ${highContrast ? 'high-contrast-card' : 'bg-white'}`}>
                                <h3 className="text-xl font-bold mb-4">手動建檔新會員</h3>
                                <form onSubmit={handleAddMemberSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold mb-1">姓名</label>
                                        <input required type="text" value={newMember.name} onChange={e => setNewMember({...newMember, name: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">暱稱</label>
                                        <input type="text" value={newMember.nickname} onChange={e => setNewMember({...newMember, nickname: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">會員類型</label>
                                        <select value={newMember.type} onChange={e => setNewMember({...newMember, type: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`}>
                                            <option value="正式會員">正式會員</option>
                                            <option value="病友會員">病友會員</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">手機號碼</label>
                                        <input required type="text" value={newMember.phone} onChange={e => setNewMember({...newMember, phone: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`} />
                                    </div>
                                    <div className="flex gap-2 justify-end pt-4">
                                        <button type="button" onClick={() => setShowAddMemberModal(false)} className="px-4 py-3 rounded-lg font-bold border">取消</button>
                                        <button type="submit" className={`px-6 py-3 rounded-lg font-bold ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 text-white'}`}>確認建檔</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* ================= MODAL: 發表論壇新主題 (含強大檔案上傳器) ================= */}
                    {showAddPostModal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 overflow-y-auto">
                            <div className={`w-full max-w-2xl p-6 rounded-2xl shadow-xl my-8 ${highContrast ? 'high-contrast-card' : 'bg-white'}`}>
                                <h3 className="text-xl font-bold mb-4">發表新討論主題</h3>
                                <form onSubmit={handleAddPostSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold mb-1">討論分類</label>
                                        <select value={newPost.category} onChange={e => setNewPost({...newPost, category: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`}>
                                            <option value="日常照護">日常照護</option>
                                            <option value="復健運動">復健運動</option>
                                            <option value="福利補助">福利補助</option>
                                            <option value="心靈關懷">心靈關懷</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">主題名稱</label>
                                        <input required type="text" placeholder="請輸入主題標題" value={newPost.title} onChange={e => setNewPost({...newPost, title: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold mb-1">文章內容 (支援 HTML 格式)</label>
                                        <textarea required rows="5" placeholder="請輸入文章內容..." value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} className={`w-full p-3 rounded-lg border ${highContrast ? 'bg-black border-yellow-400' : 'bg-slate-50'}`}></textarea>
                                    </div>

                                    {/* 強大分批檔案上傳器 */}
                                    <div className={`p-4 rounded-xl border ${highContrast ? 'border-yellow-400' : 'bg-slate-50 border-slate-200'}`}>
                                        <label className="block text-sm font-bold mb-2">📎 檔案附件上傳器 (無格式與大小限制)</label>
                                        <input type="file" multiple onChange={handleFileChange} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100" />
                                        
                                        {tempFiles.length > 0 && (
                                            <div className="mt-4 space-y-2">
                                                <p className="text-xs font-bold text-slate-500">已選取待上傳檔案 (可直接重新命名)：</p>
                                                {tempFiles.map((file, idx) => (
                                                    <div key={idx} className="flex items-center gap-2 bg-white p-2 rounded border shadow-sm justify-between">
                                                        <input 
                                                            type="text" 
                                                            value={file.name.split('.')[0]} 
                                                            onChange={(e) => renameTempFile(idx, e.target.value)}
                                                            className="text-xs p-1 border rounded w-2/3"
                                                        />
                                                        <span className="text-xs text-slate-400">{file.size}</span>
                                                        <button type="button" onClick={() => removeTempFile(idx)} className="text-xs text-red-500 font-bold">移除</button>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-2 justify-end pt-4">
                                        <button type="button" onClick={() => setShowAddPostModal(false)} className="px-4 py-3 rounded-lg font-bold border">取消</button>
                                        <button type="submit" className={`px-6 py-3 rounded-lg font-bold ${highContrast ? 'high-contrast-btn' : 'bg-emerald-600 text-white'}`}>確認發表</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
