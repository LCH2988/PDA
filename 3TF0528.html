<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三鐵飛翔 活動報名</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4A90D9;
      --primary-dark: #2c6fad;
      --success: #27AE60;
      --danger: #E74C3C;
      --bg: #F0F4F8;
      --card: #FFFFFF;
      --text: #2D3748;
      --muted: #718096;
      --border: #E2E8F0;
      --radius: 16px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 20px 16px 28px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(74,144,217,0.3);
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; }
    .header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 80px;
      z-index: 99;
    }
    .tab {
      flex: 1;
      padding: 14px;
      text-align: center;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }

    /* ── Pages ── */
    .page { display: none; padding: 16px; }
    .page.active { display: block; }

    /* ── Event Cards ── */
    .event-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 5px solid var(--primary);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .event-card:active { transform: scale(0.98); }
    .event-card h3 { font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .event-meta { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .event-meta span { font-size: 0.82rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .event-meta .icon { width: 16px; text-align: center; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-top: 8px;
    }
    .badge-open { background: #E8F5E9; color: #27AE60; }
    .badge-closing { background: #FFF3E0; color: #F57C00; }
    .quota-bar {
      margin-top: 12px;
      background: var(--border);
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
    }
    .quota-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.5s;
    }
    .quota-text { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { background: #A0AEC0; cursor: not-allowed; }
    .btn-success { background: var(--success); color: white; }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .form-group label .required { color: var(--danger); margin-left: 2px; }
    .form-control {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      color: var(--text);
      background: white;
      transition: border-color 0.2s;
      appearance: none;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
    }
    .form-control.error { border-color: var(--danger); }
    .error-msg { font-size: 0.78rem; color: var(--danger); margin-top: 4px; }

    /* ── Selected Event Banner ── */
    .selected-event-banner {
      background: linear-gradient(135deg, #EBF4FF, #DBEAFE);
      border: 1px solid #BFDBFE;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .selected-event-banner h4 { font-size: 0.95rem; font-weight: 700; color: var(--primary-dark); }
    .selected-event-banner p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* ── Success Screen ── */
    .success-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .success-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      animation: bounceIn 0.5s;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      70% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .success-screen h2 { font-size: 1.4rem; font-weight: 700; color: var(--success); }
    .success-screen p { color: var(--muted); margin-top: 8px; font-size: 0.9rem; }
    .reg-id-box {
      background: #F0FFF4;
      border: 2px dashed var(--success);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
    }
    .reg-id-box .label { font-size: 0.8rem; color: var(--muted); }
    .reg-id-box .value { font-size: 1.3rem; font-weight: 700; color: var(--success); letter-spacing: 2px; }

    /* ── Query Page ── */
    .reg-record {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .reg-record h4 { font-size: 1rem; font-weight: 700; }
    .reg-info { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .reg-info-row { display: flex; justify-content: space-between; font-size: 0.85rem; }
    .reg-info-row .key { color: var(--muted); }
    .reg-info-row .val { font-weight: 500; }
    .status-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .status-confirmed { background: #E8F5E9; color: var(--success); }
    .status-cancelled { background: #FFEBEE; color: var(--danger); }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2D3748;
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.9rem;
      z-index: 999;
      transition: transform 0.3s;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--danger); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>🏊🚴🏃 三鐵飛翔</h1>
    <p>活動報名系統</p>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('events')">📋 活動列表</div>
    <div class="tab" onclick="switchTab('register')">✏️ 報名表單</div>
    <div class="tab" onclick="switchTab('query')">🔍 查詢報名</div>
  </div>

  <!-- Page: 活動列表 -->
  <div id="page-events" class="page active">
    <div id="events-loading" class="loading">
      <div class="spinner"></div>
      <p>載入活動中...</p>
    </div>
    <div id="events-list"></div>
  </div>

  <!-- Page: 報名表單 -->
  <div id="page-register" class="page">
    <div id="register-content">
      <div class="empty-state">
        <div class="icon">📋</div>
        <p>請先從活動列表選擇要報名的活動</p>
        <button class="btn btn-outline" style="width:auto;padding:10px 24px;margin:16px auto 0;"
                onclick="switchTab('events')">前往活動列表</button>
      </div>
    </div>
  </div>

  <!-- Page: 查詢報名 -->
  <div id="page-query" class="page">
    <div style="background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
      <div class="form-group" style="margin-bottom:0">
        <label>依報名編號查詢</label>
        <div style="display:flex;gap:8px;margin-top:6px;">
          <input type="text" id="query-regid" class="form-control" placeholder="輸入報名編號 REGxxxxxxxx" style="margin:0;flex:1" />
          <button class="btn btn-primary" style="width:auto;margin:0;padding:0 16px;white-space:nowrap"
                  onclick="queryByRegId()">查詢</button>
        </div>
      </div>
    </div>
    <div id="query-loading" class="loading" style="display:none">
      <div class="spinner"></div><p>查詢中...</p>
    </div>
    <div id="query-results"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    // ── 設定 ──────────────────────────────────────
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbynYWtaM475sPlACZHLXoivziuT-76q_sEBYfp548IF7X8O6wqZeYT_KF-X1pUpjcdCLg/exec'; // 替換為你的 GAS 部署 URL
    const LIFF_ID = '2007905012-NXJEXmda';         // 替換為你的 LIFF ID

    let userId = null;
    let selectedEvent = null;

    // ── LIFF 初始化 ───────────────────────────────
    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          userId = profile.userId;
        } else {
          liff.login();
        }
        loadEvents();
        loadMyRegistrations();
      } catch (err) {
        console.error('LIFF init error:', err);
        showToast('初始化失敗，請重新整理', 'error');
        loadEvents(); // 仍嘗試載入活動
      }
    }

    // ── Tab 切換 ──────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((el, i) => {
        el.classList.toggle('active', ['events','register','query'][i] === tab);
      });
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
    }

    // ── 活動列表 ──────────────────────────────────
    async function loadEvents() {
      try {
        const res = await fetch(`${GAS_URL}?action=events`);
        const data = await res.json();
        renderEvents(data.events || []);
      } catch (err) {
        document.getElementById('events-loading').innerHTML =
          '<p style="color:#E74C3C">載入失敗，請重新整理頁面</p>';
      }
    }

    function renderEvents(events) {
      const loading = document.getElementById('events-loading');
      const list = document.getElementById('events-list');
      loading.style.display = 'none';

      if (!events.length) {
        list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>目前沒有可報名的活動</p></div>';
        return;
      }

      list.innerHTML = events.map(ev => {
        const deadline = new Date(ev.deadline);
        const daysLeft = Math.ceil((deadline - new Date()) / 86400000);
        const pct = Math.round((ev.registered / ev.quota) * 100);
        const isClosing = daysLeft <= 7;

        return `
          <div class="event-card" onclick="selectEvent(${JSON.stringify(ev).replace(/"/g,'&quot;')})">
            <h3>${ev.name}</h3>
            <div class="event-meta">
              <span><span class="icon">📅</span>${formatDate(ev.date)}</span>
              <span><span class="icon">📍</span>${ev.location}</span>
              <span><span class="icon">⏰</span>報名截止：${formatDate(ev.deadline)}</span>
              <span><span class="icon">🏅</span>${ev.category}</span>
            </div>
            <span class="badge ${isClosing ? 'badge-closing' : 'badge-open'}">
              ${isClosing ? `⚠️ 僅剩 ${daysLeft} 天` : '✅ 報名開放中'}
            </span>
            <div class="quota-bar">
              <div class="quota-fill" style="width:${pct}%"></div>
            </div>
            <p class="quota-text">已報名 ${ev.registered} / ${ev.quota} 人（${pct}%）</p>
            <button class="btn btn-primary">立即報名 →</button>
          </div>`;
      }).join('');
    }

    function selectEvent(ev) {
      selectedEvent = ev;
      renderRegisterForm();
      switchTab('register');
    }

    // ── 報名表單 ──────────────────────────────────
    function renderRegisterForm() {
      if (!selectedEvent) return;
      const ev = selectedEvent;
      const categories = ev.category.split('/');

      document.getElementById('register-content').innerHTML = `
        <div class="selected-event-banner">
          <h4>🏆 ${ev.name}</h4>
          <p>📅 ${formatDate(ev.date)} ｜ 📍 ${ev.location}</p>
        </div>

        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" id="f-name" class="form-control" placeholder="請輸入真實姓名" />
          <div class="error-msg" id="err-name"></div>
        </div>

        <div class="form-group">
          <label>聯絡電話 <span class="required">*</span></label>
          <input type="tel" id="f-phone" class="form-control" placeholder="09xxxxxxxx" maxlength="10" />
          <div class="error-msg" id="err-phone"></div>
        </div>

        <div class="form-group">
          <label>電子郵件 <span class="required">*</span></label>
          <input type="email" id="f-email" class="form-control" placeholder="example@email.com" />
          <div class="error-msg" id="err-email"></div>
        </div>

        <div class="form-group">
          <label>參加類別 <span class="required">*</span></label>
          <select id="f-category" class="form-control">
            <option value="">請選擇參加類別</option>
            ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
          </select>
          <div class="error-msg" id="err-category"></div>
        </div>

        <div style="background:#FFF3E0;border-radius:10px;padding:12px;margin-bottom:16px;font-size:0.82rem;color:#795548;">
          ⚠️ 報名前請確認您的個人資料正確，報名完成後將無法修改。
        </div>

        <button class="btn btn-primary" id="submit-btn" onclick="submitRegister()">
          🚀 確認報名
        </button>
        <button class="btn btn-outline" onclick="switchTab('events')">返回活動列表</button>
      `;
    }

    async function submitRegister() {
      if (!validateForm()) return;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = '報名中...';

      const payload = {
        action: 'register',
        eventId: selectedEvent.eventId,
        userId: userId || 'GUEST_' + Date.now(),
        name: document.getElementById('f-name').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        category: document.getElementById('f-category').value
      };

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (data.status === 'ok') {
          showSuccessScreen(data);
        } else {
          showToast(data.message || '報名失敗，請稍後再試', 'error');
          btn.disabled = false;
          btn.textContent = '🚀 確認報名';
        }
      } catch (err) {
        showToast('網路錯誤，請稍後再試', 'error');
        btn.disabled = false;
        btn.textContent = '🚀 確認報名';
      }
    }

    function validateForm() {
      let valid = true;
      const fields = [
        { id: 'f-name', errId: 'err-name', msg: '請輸入姓名', test: v => v.length >= 2 },
        { id: 'f-phone', errId: 'err-phone', msg: '請輸入正確的手機號碼（09開頭10碼）', test: v => /^09\d{8}$/.test(v) },
        { id: 'f-email', errId: 'err-email', msg: '請輸入正確的 Email', test: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) },
        { id: 'f-category', errId: 'err-category', msg: '請選擇參加類別', test: v => v !== '' }
      ];

      fields.forEach(f => {
        const el = document.getElementById(f.id);
        const err = document.getElementById(f.errId);
        const val = el.value.trim();
        if (!f.test(val)) {
          el.classList.add('error');
          err.textContent = f.msg;
          valid = false;
        } else {
          el.classList.remove('error');
          err.textContent = '';
        }
      });
      return valid;
    }

    function showSuccessScreen(data) {
      document.getElementById('register-content').innerHTML = `
        <div class="success-screen">
          <div class="success-icon">🎉</div>
          <h2>報名成功！</h2>
          <p>感謝您報名 ${data.eventName}</p>
          <div class="reg-id-box">
            <div class="label">您的報名編號</div>
            <div class="value">${data.regId}</div>
            <div class="label" style="margin-top:6px">請截圖保存此編號</div>
          </div>
          <p style="font-size:0.85rem">確認通知已發送至您的 LINE，<br>如有疑問請使用報名編號查詢。</p>
          <button class="btn btn-success" style="margin-top:20px" onclick="switchTab('query');loadMyRegistrations()">
            🔍 查看我的報名
          </button>
          <button class="btn btn-outline" style="margin-top:8px" onclick="selectedEvent=null;switchTab('events')">
            返回活動列表
          </button>
        </div>`;
      selectedEvent = null;
    }

    // ── 查詢報名 ──────────────────────────────────
    async function loadMyRegistrations() {
      if (!userId) return;
      const loading = document.getElementById('query-loading');
      const results = document.getElementById('query-results');
      loading.style.display = 'block';
      results.innerHTML = '';

      try {
        const res = await fetch(`${GAS_URL}?action=query&userId=${userId}`);
        const data = await res.json();
        loading.style.display = 'none';
        renderQueryResults(data.registrations || []);
      } catch (err) {
        loading.style.display = 'none';
        results.innerHTML = '<p style="color:#E74C3C;text-align:center">查詢失敗，請稍後再試</p>';
      }
    }

    async function queryByRegId() {
      const regId = document.getElementById('query-regid').value.trim();
      if (!regId) { showToast('請輸入報名編號', 'error'); return; }

      const loading = document.getElementById('query-loading');
      const results = document.getElementById('query-results');
      loading.style.display = 'block';
      results.innerHTML = '';

      try {
        const res = await fetch(`${GAS_URL}?action=query&regId=${regId}`);
        const data = await res.json();
        loading.style.display = 'none';
        renderQueryResults(data.registrations || [], data.message);
      } catch (err) {
        loading.style.display = 'none';
        results.innerHTML = '<p style="color:#E74C3C;text-align:center">查詢失敗</p>';
      }
    }

    function renderQueryResults(regs, msg) {
      const el = document.getElementById('query-results');
      if (!regs.length) {
        el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${msg || '查無報名記錄'}</p></div>`;
        return;
      }
      el.innerHTML = regs.map(reg => {
        const ev = reg.eventInfo || {};
        const statusClass = reg.status === 'confirmed' ? 'status-confirmed' : 'status-cancelled';
        const statusText = reg.status === 'confirmed' ? '✅ 已確認' : '❌ 已取消';
        return `
          <div class="reg-record">
            <h4>${ev.name || '活動名稱'}</h4>
            <span class="status-badge ${statusClass}">${statusText}</span>
            <div class="reg-info">
              <div class="reg-info-row"><span class="key">報名編號</span><span class="val">${reg.regId}</span></div>
              <div class="reg-info-row"><span class="key">姓名</span><span class="val">${reg.name}</span></div>
              <div class="reg-info-row"><span class="key">參加類別</span><span class="val">${reg.category}</span></div>
              <div class="reg-info-row"><span class="key">活動日期</span><span class="val">${formatDate(ev.date)}</span></div>
              <div class="reg-info-row"><span class="key">活動地點</span><span class="val">${ev.location || '-'}</span></div>
              <div class="reg-info-row"><span class="key">報名時間</span><span class="val">${reg.regTime}</span></div>
            </div>
          </div>`;
      }).join('');
    }

    // ── 工具函式 ──────────────────────────────────
    function formatDate(d) {
      if (!d) return '-';
      const date = new Date(d);
      return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
    }

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── 啟動 ──────────────────────────────────────
    initLiff();
  </script>
</body>
</html>
