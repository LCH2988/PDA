<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >
  <title>台灣帕金森病友權益促進會管理系統</title>

  <style>
    :root{
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --primary-soft:#dbeafe;

      --success:#16a34a;
      --success-soft:#dcfce7;

      --warning:#d97706;
      --warning-soft:#fef3c7;

      --danger:#dc2626;
      --danger-soft:#fee2e2;

      --info:#0891b2;
      --info-soft:#cffafe;

      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;

      --shadow:0 12px 30px rgba(15,23,42,.08);
      --radius:18px;

      --safe-top:env(safe-area-inset-top);
      --safe-bottom:env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Microsoft JhengHei",
        "Noto Sans TC",
        Arial,
        sans-serif;
      line-height:1.5;
    }

    body{
      overflow-x:hidden;
    }

    button,
    input,
    select,
    textarea{
      font:inherit;
    }

    button{
      cursor:pointer;
      border:none;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .hidden{
      display:none!important;
    }

    .tc{
      text-align:center;
    }

    .tr{
      text-align:right;
    }

    .muted{
      color:var(--muted);
    }

    .req{
      color:var(--danger);
      margin-left:4px;
    }

    .income-c{
      color:var(--success);
    }

    .expense-c{
      color:var(--danger);
    }

    .wrap{
      min-height:100vh;
      padding-bottom:calc(84px + var(--safe-bottom));
    }

    /*******************************************************
     * Header
     *******************************************************/
    .topbar{
      position:sticky;
      top:0;
      z-index:80;
      padding-top:var(--safe-top);
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#38bdf8);
      color:#fff;
      box-shadow:0 8px 22px rgba(37,99,235,.25);
    }

    .topbar-inner{
      height:62px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:0 14px;
    }

    .top-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .menu-btn,
    .back-btn,
    .top-action{
      width:42px;
      height:42px;
      border-radius:14px;
      background:rgba(255,255,255,.16);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:22px;
      flex:0 0 auto;
      transition:.15s ease;
    }

    .menu-btn:active,
    .back-btn:active,
    .top-action:active{
      transform:scale(.96);
      background:rgba(255,255,255,.24);
    }

    .title-box{
      min-width:0;
    }

    .app-title{
      font-size:17px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.2;
    }

    .app-subtitle{
      font-size:12px;
      opacity:.9;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-top:2px;
    }

    .user-pill{
      max-width:118px;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.16);
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:flex;
      align-items:center;
      gap:4px;
    }

    /*******************************************************
     * Main
     *******************************************************/
    .main{
      max-width:980px;
      margin:0 auto;
      padding:16px 14px 24px;
    }

    .page-head{
      margin-bottom:14px;
    }

    .page-title{
      font-size:24px;
      font-weight:900;
      letter-spacing:.5px;
      margin:0;
    }

    .page-desc{
      margin-top:4px;
      color:var(--muted);
      font-size:14px;
    }

    /*******************************************************
     * Cards
     *******************************************************/
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
      border:1px solid rgba(229,231,235,.7);
    }

    .card-title{
      font-size:18px;
      font-weight:900;
      margin-bottom:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .card-subtitle{
      color:var(--muted);
      font-size:14px;
      margin-top:-8px;
      margin-bottom:12px;
    }

    .cg{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    @media(max-width:640px){
      .cg{
        grid-template-columns:1fr;
      }
    }

    .cb{
      width:100%;
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      text-align:left;
      display:flex;
      align-items:center;
      gap:14px;
      box-shadow:0 6px 18px rgba(15,23,42,.05);
      color:var(--text);
      transition:.15s ease;
    }

    .cb:active{
      transform:scale(.985);
      background:#f8fafc;
    }

    .ci{
      width:44px;
      height:44px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--primary-soft);
      color:var(--primary);
      font-size:24px;
      flex:0 0 auto;
    }

    /*******************************************************
     * Forms
     *******************************************************/
    .fg{
      margin-bottom:14px;
    }

    .flabel{
      display:block;
      font-weight:800;
      margin-bottom:7px;
      color:#374151;
      font-size:14px;
    }

    .fc{
      width:100%;
      min-height:46px;
      border:1px solid #d1d5db;
      border-radius:14px;
      padding:11px 13px;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:.15s ease;
    }

    textarea.fc{
      min-height:98px;
      resize:vertical;
    }

    .fc:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(37,99,235,.12);
    }

    .fhint{
      margin:6px 0 0;
      font-size:12px;
      color:var(--muted);
    }

    .form-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    @media(max-width:640px){
      .form-row{
        grid-template-columns:1fr;
      }
    }

    /*******************************************************
     * Buttons
     *******************************************************/
    .btn{
      width:100%;
      min-height:48px;
      border-radius:15px;
      padding:12px 16px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:10px;
      transition:.15s ease;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-p{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
    }

    .btn-s{
      background:var(--success);
      color:#fff;
    }

    .btn-w{
      background:var(--warning);
      color:#fff;
    }

    .btn-d{
      background:var(--danger);
      color:#fff;
    }

    .btn-o{
      background:#fff;
      border:1px solid var(--line);
      color:#374151;
    }

    .btn-i{
      background:var(--info);
      color:#fff;
    }

    .btn-mini{
      width:auto;
      min-height:34px;
      border-radius:10px;
      padding:7px 10px;
      font-size:13px;
      margin:0;
      display:inline-flex;
    }

    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .btn-row .btn{
      flex:1 1 150px;
      margin-top:0;
    }

    /*******************************************************
     * Lists
     *******************************************************/
    .il{
      list-style:none;
      padding:0;
      margin:0;
    }

    .ii{
      padding:14px 0;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .ii:last-child{
      border-bottom:none;
    }

    .ii-main{
      min-width:0;
      flex:1;
    }

    .ii-title{
      font-weight:900;
      font-size:16px;
      word-break:break-word;
    }

    .rs{
      color:var(--muted);
      font-size:13px;
      margin-top:3px;
      word-break:break-word;
    }

    .empty{
      text-align:center;
      color:var(--muted);
      padding:36px 10px;
    }

    .ei{
      font-size:42px;
      margin-bottom:8px;
    }

    /*******************************************************
     * Badge / Status
     *******************************************************/
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .bs{
      background:var(--success-soft);
      color:var(--success);
    }

    .bw{
      background:var(--warning-soft);
      color:var(--warning);
    }

    .bd{
      background:var(--danger-soft);
      color:var(--danger);
    }

    .bi{
      background:var(--info-soft);
      color:var(--info);
    }

    .bp{
      background:var(--primary-soft);
      color:var(--primary);
    }

    /*******************************************************
     * Summary
     *******************************************************/
    .stats{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:12px;
      margin-bottom:14px;
    }

    @media(max-width:700px){
      .stats{
        grid-template-columns:1fr;
      }
    }

    .stat{
      background:#fff;
      border-radius:18px;
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(229,231,235,.7);
    }

    .stat-label{
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      margin-bottom:6px;
    }

    .stat-num{
      font-size:26px;
      font-weight:950;
      line-height:1.2;
    }

    .stat-desc{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    /*******************************************************
     * Alert Boxes
     *******************************************************/
    .info-box,
    .warn-box,
    .danger-box,
    .success-box{
      border-radius:15px;
      padding:13px 14px;
      margin:12px 0;
      font-size:14px;
      line-height:1.6;
    }

    .info-box{
      background:var(--info-soft);
      color:#155e75;
      border:1px solid #67e8f9;
    }

    .warn-box{
      background:var(--warning-soft);
      color:#92400e;
      border:1px solid #fbbf24;
    }

    .danger-box{
      background:var(--danger-soft);
      color:#991b1b;
      border:1px solid #fca5a5;
    }

    .success-box{
      background:var(--success-soft);
      color:#166534;
      border:1px solid #86efac;
    }

    /*******************************************************
     * Login
     *******************************************************/
    .login-wrap{
      min-height:calc(100vh - 62px - var(--safe-top));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 14px;
    }

    .login-card{
      width:100%;
      max-width:460px;
      background:#fff;
      border-radius:26px;
      padding:26px 20px;
      box-shadow:0 24px 60px rgba(15,23,42,.16);
      border:1px solid rgba(229,231,235,.8);
    }

    .logo{
      width:72px;
      height:72px;
      border-radius:22px;
      background:linear-gradient(135deg,#2563eb,#38bdf8);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      margin:0 auto 14px;
      box-shadow:0 16px 36px rgba(37,99,235,.28);
    }

    .login-title{
      text-align:center;
      font-size:22px;
      font-weight:950;
      margin-bottom:5px;
    }

    .login-sub{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      margin-bottom:20px;
    }

    .tab-row{
      display:flex;
      background:#f3f4f6;
      padding:4px;
      border-radius:16px;
      margin-bottom:16px;
      gap:4px;
    }

    .tab{
      flex:1;
      padding:10px 8px;
      border-radius:13px;
      background:transparent;
      color:var(--muted);
      font-weight:900;
    }

    .tab.active{
      background:#fff;
      color:var(--primary);
      box-shadow:0 4px 14px rgba(15,23,42,.08);
    }

    /*******************************************************
     * Bottom Nav
     *******************************************************/
    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:70;
      padding-bottom:var(--safe-bottom);
      background:rgba(255,255,255,.96);
      border-top:1px solid var(--line);
      backdrop-filter:blur(16px);
      box-shadow:0 -8px 30px rgba(15,23,42,.08);
    }

    .bottom-nav-inner{
      max-width:980px;
      margin:0 auto;
      height:68px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
    }

    .nav-item{
      background:transparent;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:3px;
      color:var(--muted);
      font-weight:800;
      font-size:11px;
      position:relative;
    }

    .nav-item .nav-ico{
      font-size:21px;
      line-height:1;
    }

    .nav-item.active{
      color:var(--primary);
    }

    .nav-item.active::before{
      content:"";
      position:absolute;
      top:6px;
      width:34px;
      height:3px;
      border-radius:999px;
      background:var(--primary);
    }

    /*******************************************************
     * Side Menu
     *******************************************************/
    .shade{
      position:fixed;
      inset:0;
      z-index:90;
      background:rgba(15,23,42,.45);
      opacity:0;
      pointer-events:none;
      transition:.18s ease;
    }

    .shade.show{
      opacity:1;
      pointer-events:auto;
    }

    .side{
      position:fixed;
      top:0;
      bottom:0;
      left:0;
      z-index:100;
      width:min(86vw,340px);
      background:#fff;
      transform:translateX(-105%);
      transition:.22s ease;
      box-shadow:20px 0 60px rgba(15,23,42,.25);
      padding-top:var(--safe-top);
      display:flex;
      flex-direction:column;
    }

    .side.show{
      transform:translateX(0);
    }

    .side-head{
      padding:18px;
      background:linear-gradient(135deg,#1d4ed8,#2563eb);
      color:#fff;
    }

    .side-name{
      font-size:20px;
      font-weight:950;
      margin-bottom:4px;
    }

    .side-role{
      opacity:.9;
      font-size:13px;
    }

    .side-body{
      padding:12px;
      overflow:auto;
      flex:1;
    }

    .side-item{
      width:100%;
      padding:13px 12px;
      border-radius:14px;
      background:#fff;
      color:#111827;
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:850;
      text-align:left;
      margin-bottom:4px;
    }

    .side-item:active{
      background:#f3f4f6;
    }

    .side-item.danger{
      color:var(--danger);
    }

    .side-ico{
      width:30px;
      text-align:center;
      font-size:20px;
    }

    .side-section{
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      padding:14px 12px 6px;
      letter-spacing:.5px;
    }

    /*******************************************************
     * Toast / Loading
     *******************************************************/
    .toast-wrap{
      position:fixed;
      left:0;
      right:0;
      bottom:calc(86px + var(--safe-bottom));
      z-index:200;
      display:flex;
      justify-content:center;
      pointer-events:none;
      padding:0 14px;
    }

    .toast{
      max-width:520px;
      width:auto;
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 16px;
      font-weight:800;
      box-shadow:0 16px 40px rgba(15,23,42,.28);
      opacity:0;
      transform:translateY(12px);
      transition:.18s ease;
      text-align:center;
      pointer-events:none;
    }

    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    .toast.success{
      background:var(--success);
    }

    .toast.error{
      background:var(--danger);
    }

    .toast.warning{
      background:var(--warning);
    }

    .toast.info{
      background:var(--info);
    }

    .loading{
      position:fixed;
      inset:0;
      z-index:180;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(6px);
      display:none;
      align-items:center;
      justify-content:center;
    }

    .loading.show{
      display:flex;
    }

    .loader-card{
      background:#fff;
      border-radius:20px;
      padding:22px 26px;
      box-shadow:0 18px 50px rgba(15,23,42,.18);
      text-align:center;
      min-width:180px;
    }

    .spinner{
      width:38px;
      height:38px;
      border-radius:50%;
      border:4px solid #dbeafe;
      border-top-color:var(--primary);
      animation:spin .8s linear infinite;
      margin:0 auto 12px;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    /*******************************************************
     * Tables / Receipt / Print
     *******************************************************/
    .simple-table{
      width:100%;
      border-collapse:collapse;
      font-size:14px;
    }

    .simple-table th,
    .simple-table td{
      padding:10px 8px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
    }

    .simple-table th{
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
      width:110px;
    }

    .print-area{
      display:none;
    }

    .voucher{
      background:#fff;
      color:#111827;
      width:794px;
      min-height:1123px;
      padding:48px;
      font-family:"Microsoft JhengHei","Noto Sans TC",Arial,sans-serif;
    }

    .voucher-title{
      text-align:center;
      font-size:28px;
      font-weight:950;
      margin-bottom:8px;
    }

    .voucher-sub{
      text-align:center;
      color:#6b7280;
      margin-bottom:28px;
    }

    .voucher-table{
      width:100%;
      border-collapse:collapse;
      font-size:16px;
      margin-top:16px;
    }

    .voucher-table th,
    .voucher-table td{
      border:1px solid #111827;
      padding:12px;
    }

    .voucher-table th{
      width:150px;
      background:#f3f4f6;
      text-align:left;
    }

    .signature-row{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-top:48px;
      text-align:center;
    }

    .signature-box{
      border-top:1px solid #111827;
      padding-top:10px;
      min-height:70px;
    }

    @media print{
      body *{
        visibility:hidden;
      }

      .print-area,
      .print-area *{
        visibility:visible;
      }

      .print-area{
        display:block!important;
        position:absolute;
        left:0;
        top:0;
        width:100%;
      }

      .bottom-nav,
      .topbar,
      .side,
      .shade,
      .toast-wrap,
      .loading{
        display:none!important;
      }
    }

    /*******************************************************
     * Utility Layout
     *******************************************************/
    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    @media(max-width:760px){
      .two-col{
        grid-template-columns:1fr;
      }
    }

    .pill-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:8px 0;
    }

    .pill{
      padding:6px 10px;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      font-size:12px;
      font-weight:800;
    }

    .progress{
      height:10px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-top:8px;
    }

    .progress-bar{
      height:100%;
      background:linear-gradient(90deg,var(--primary),#38bdf8);
      border-radius:999px;
      width:0%;
    }

    .progress-bar.warn{
      background:linear-gradient(90deg,var(--warning),#fbbf24);
    }

    .progress-bar.danger{
      background:linear-gradient(90deg,var(--danger),#fb7185);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <!-- Header -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="top-left">
          <button id="backBtn" class="back-btn hidden" onclick="goBack()" aria-label="返回">‹</button>
          <button id="menuBtn" class="menu-btn" onclick="openSide()" aria-label="選單">☰</button>

          <div class="title-box">

  <script>

        /*******************************************************
     * Basic Config
     *******************************************************/

    /**
     * 請改成你 Apps Script Web App 部署後的網址。
     *
     * 格式通常類似：
     * https://script.google.com/macros/s/xxxxxxxxxxxxxxxx/exec
     */
    const API_BASE = '請貼上你的 Apps Script Web App URL';

    const ADMIN_TYPES = [
      '管理員',
      '理事長',
      '理監事',
      '理事',
      '監事',
      '會計',
      '出納',
      '總幹事',
      '行政秘書長'
    ];

    const APP = {
      user:null,
      isAdmin:false,
      history:[],
      page:'login',
      liff:false,
      _params:{},
      cache:{
        funds:[],
        subjects:[],
        accounts:[],
        staff:[],
        members:[]
      }
    };

    const ROUTES = {
      login:renderLogin,
      home:renderHome,
      profile:renderProfile,

      myPayments:renderMyPayments,
      myDonations:renderMyDonations,
      applyRenew:renderApplyRenew,

      members:renderMembers,
      memberDetail:renderMemberDetail,
      addMember:renderAddMember,

      payments:renderPayments,
      donations:renderDonations,
      pending:renderPending,

      finance:renderFinance,
      addIncome:renderAddIncome,
      addExpense:renderAddExpense,
      expenseList:renderExpenseList,
      budget:renderBudget,
      addBudget:renderAddBudget,

      receipts:renderReceipts,

      settings:renderSettings,
      settingSubject:renderSettingSubject,
      settingAccount:renderSettingAccount,
      settingStaff:renderSettingStaff,
      settingFund:renderSettingFund
    };

    const NAV_MAP = {
      home:'nav-home',
      members:'nav-member',
      memberDetail:'nav-member',
      addMember:'nav-member',

      payments:'nav-payment',
      myPayments:'nav-payment',
      applyRenew:'nav-payment',
      pending:'nav-payment',

      finance:'nav-finance',
      addIncome:'nav-finance',
      addExpense:'nav-finance',
      expenseList:'nav-finance',
      budget:'nav-finance',
      addBudget:'nav-finance',
      donations:'nav-finance',
      myDonations:'nav-finance',
      receipts:'nav-finance',

      settings:'nav-settings',
      settingSubject:'nav-settings',
      settingAccount:'nav-settings',
      settingStaff:'nav-settings',
      settingFund:'nav-settings'
    };

    /*******************************************************
     * API
     *******************************************************/
    async function api(action, data = {}) {
      const payload = {
        ...data,
        operator: APP.user?.name || '',
        operatorId: APP.user?.memberId || APP.user?.id || ''
      };

      const res = await fetch(API_BASE, {
        method:'POST',
        headers:{
          'Content-Type':'text/plain;charset=utf-8'
        },
        body:JSON.stringify({
          action,
          data:payload
        })
      });

      const text = await res.text();

      try{
        return JSON.parse(text);
      }catch(e){
        console.error('API parse error:', text);
        throw new Error('伺服器回傳格式錯誤');
      }
    }

    async function runApi(action, data = {}, onSuccess){
      showLoad();

      try{
        const res = await api(action, data);
        hideLoad();

        if(res.success){
          if(onSuccess) onSuccess(res);
          return res;
        }

        toast(res.message || '操作失敗','e');
        return res;
      }catch(e){
        hideLoad();
        toast('連線失敗：' + e.message,'e');
        return {
          success:false,
          message:e.message
        };
      }
    }

    /*******************************************************
     * Utilities
     *******************************************************/
    function $(id){
      return document.getElementById(id);
    }

    function val(id){
      return document.getElementById(id)?.value?.trim() || '';
    }

    function rawVal(id){
      return document.getElementById(id)?.value || '';
    }

    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function fmtMoney(n){
      return 'NT$' + Number(n || 0).toLocaleString('zh-TW');
    }

    function fmtDate(d){
      if(!d) return '--';
      return String(d).slice(0,10);
    }

    function today(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function thisYear(){
      return new Date().getFullYear();
    }

    function isAdminType(type){
      return ADMIN_TYPES.includes(String(type || '').trim());
    }

    function safeHttpUrl(url){
      const s = String(url || '').trim();
      return /^https?:\/\//i.test(s) ? s : '';
    }

    function showLoad(){
      $('loading')?.classList.add('show');
    }

    function hideLoad(){
      $('loading')?.classList.remove('show');
    }

    let _toastTimer = null;

    function toast(msg, type = 'i'){
      const t = $('toast');
      if(!t) return;

      clearTimeout(_toastTimer);

      t.textContent = msg || '';
      t.className = 'toast';

      if(type === 's') t.classList.add('success');
      else if(type === 'e') t.classList.add('error');
      else if(type === 'w') t.classList.add('warning');
      else t.classList.add('info');

      requestAnimationFrame(() => t.classList.add('show'));

      _toastTimer = setTimeout(() => {
        t.classList.remove('show');
      }, 2600);
    }

    function setMain(html){
      $('main').innerHTML = html;
      window.scrollTo({top:0,behavior:'smooth'});
    }

    function setTitle(title, subtitle){
      $('appTitle').textContent = title || '台灣帕金森病友權益促進會';
      $('appSubtitle').textContent = subtitle || '會員暨財務管理系統';
    }

    function pageHead(title, desc = ''){
      return `
        <div class="page-head">
          <h1 class="page-title">${esc(title)}</h1>
          ${desc ? `<div class="page-desc">${esc(desc)}</div>` : ''}
        </div>
      `;
    }

    function badge(status){
      const s = String(status || '');

      let cls = 'bi';
      if(['啟用','已繳費','已確認','已撥款','已建立'].includes(s)) cls = 'bs';
      else if(['待確認','待核准','處理中'].includes(s)) cls = 'bw';
      else if(['停用','已退回','作廢'].includes(s)) cls = 'bd';
      else if(['一般會員','管理員','理事長','會計','出納'].includes(s)) cls = 'bp';

      return `<span class="badge ${cls}">${esc(s || '--')}</span>`;
    }

    function optionHtml(items, valueKey, labelKey, selected){
      return (items || []).map(x => {
        const v = x[valueKey];
        const label = x[labelKey];
        return `<option value="${esc(v)}" ${String(v) === String(selected || '') ? 'selected' : ''}>${esc(label)}</option>`;
      }).join('');
    }

    /*******************************************************
     * Cache Loaders
     *******************************************************/
    async function loadFunds(){
      try{
        const res = await api('fund.list', {});
        APP.cache.funds = Array.isArray(res.items) ? res.items : [];
        return APP.cache.funds;
      }catch(e){
        APP.cache.funds = [];
        return [];
      }
    }

    function fundOptions(selected){
      const rows = APP.cache.funds || [];

      if(!rows.length){
        return `<option value="GENERAL">GENERAL 一般用途</option>`;
      }

      return rows.map(f => `
        <option value="${esc(f.code)}" ${String(f.code) === String(selected || 'GENERAL') ? 'selected' : ''}>
          ${esc(f.code)} ${esc(f.name)}
        </option>
      `).join('');
    }

    function getFundNameFromCache(code){
      const f = (APP.cache.funds || []).find(x => String(x.code) === String(code));
      return f ? f.name : '';
    }

    async function loadSubjects(){
      try{
        const res = await api('subject.list', {});
        APP.cache.subjects = Array.isArray(res.items) ? res.items : [];
        return APP.cache.subjects;
      }catch(e){
        APP.cache.subjects = [];
        return [];
      }
    }

    function subjectOptions(type, selected){
      const rows = (APP.cache.subjects || [])
        .filter(s => !type || String(s.type) === String(type));

      return rows.map(s => `
        <option value="${esc(s.code)}" ${String(s.code) === String(selected || '') ? 'selected' : ''}>
          ${esc(s.code)} ${esc(s.name)}
        </option>
      `).join('');
    }

    function getSubjectNameFromCache(code){
      const s = (APP.cache.subjects || []).find(x => String(x.code) === String(code));
      return s ? s.name : '';
    }

    async function loadAccounts(){
      try{
        const res = await api('account.list', {});
        APP.cache.accounts = Array.isArray(res.items) ? res.items : [];
        return APP.cache.accounts;
      }catch(e){
        APP.cache.accounts = [];
        return [];
      }
    }

    function accountOptions(selected){
      const rows = APP.cache.accounts || [];

      return rows.map(a => `
        <option value="${esc(a.id)}" ${String(a.id) === String(selected || '') ? 'selected' : ''}>
          ${esc(a.name)} ${a.accountNo ? '／' + esc(a.accountNo) : ''}
        </option>
      `).join('');
    }

    async function loadStaff(){
      try{
        const res = await api('staff.list', {});
        APP.cache.staff = Array.isArray(res.items) ? res.items : [];
        return APP.cache.staff;
      }catch(e){
        APP.cache.staff = [];
        return [];
      }
    }

    function staffOptions(selected){
      const rows = APP.cache.staff || [];

      return rows.map(s => `
        <option value="${esc(s.name)}" ${String(s.name) === String(selected || '') ? 'selected' : ''}>
          ${esc(s.name)} ${s.title ? '／' + esc(s.title) : ''}
        </option>
      `).join('');
    }

    /*******************************************************
     * Navigation
     *******************************************************/
    function go(page, params = {}, push = true){
      if(!ROUTES[page]){
        toast('找不到頁面：' + page,'e');
        return;
      }

      if(push && APP.page && APP.page !== page){
        APP.history.push({
          page:APP.page,
          params:APP._params || {}
        });
      }

      APP.page = page;
      APP._params = params || {};

      updateChrome();

      ROUTES[page](params);
    }

    function goBack(){
      const last = APP.history.pop();

      if(last){
        go(last.page, last.params, false);
      }else{
        go('home', {}, false);
      }
    }

    function updateChrome(){
      const logged = !!APP.user;

      $('bottomNav')?.classList.toggle('hidden', !logged);
      $('userPill')?.classList.toggle('hidden', !logged);
      $('adminMenu')?.classList.toggle('hidden', !APP.isAdmin);

      $('backBtn')?.classList.toggle('hidden', APP.history.length === 0 || APP.page === 'login');
      $('menuBtn')?.classList.toggle('hidden', APP.page === 'login');

      if(logged){
        $('userPill').textContent = `👤 ${APP.user.name || '使用者'}`;
        $('sideName').textContent = APP.user.name || '使用者';
        $('sideRole').textContent = APP.user.type || '會員';
      }else{
        $('sideName').textContent = '尚未登入';
        $('sideRole').textContent = '請先登入系統';
      }

      document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));

      const navId = NAV_MAP[APP.page];
      if(navId) $(navId)?.classList.add('active');
    }

    function openSide(){
      $('shade')?.classList.add('show');
      $('side')?.classList.add('show');
    }

    function closeSide(){
      $('shade')?.classList.remove('show');
      $('side')?.classList.remove('show');
    }

    function guardLogin(){
      if(!APP.user){
        toast('請先登入','w');
        go('login', {}, false);
        return false;
      }

      return true;
    }

    function guardAdmin(){
      if(!guardLogin()) return false;

      if(!APP.isAdmin){
        toast('此功能限管理員使用','e');
        go('home', {}, false);
        return false;
      }

      return true;
    }

    /*******************************************************
     * Session
     *******************************************************/
    function saveUser(user){
      APP.user = user;
      APP.isAdmin = isAdminType(user?.type);
      localStorage.setItem('parkUser', JSON.stringify(user || null));
      updateChrome();
    }

    function restoreUser(){
      try{
        const raw = localStorage.getItem('parkUser');
        if(!raw) return false;

        const user = JSON.parse(raw);
        if(!user) return false;

        APP.user = user;
        APP.isAdmin = isAdminType(user.type);
        return true;
      }catch(e){
        return false;
      }
    }

    function logout(){
      localStorage.removeItem('parkUser');
      APP.user = null;
      APP.isAdmin = false;
      APP.history = [];
      closeSide();
      toast('已登出','s');
      go('login', {}, false);
    }

    /*******************************************************
     * Login / Register
     *******************************************************/
    function renderLogin(){
      setTitle('會員登入','台灣帕金森病友權益促進會');
      updateChrome();

      setMain(`
        <div class="login-wrap">

            <div class="logo">P</div>
            <div class="login-title">會員暨財務管理系統</div>

            <div class="tab-row">
              <button id="tabPhone" class="tab active" onclick="switchLoginTab('phone')">電話登入</button>
              <button id="tabPwd" class="tab" onclick="switchLoginTab('pwd')">帳密登入</button>
              <button id="tabReg" class="tab" onclick="switchLoginTab('reg')">註冊</button>
            </div>

            <div id="loginPhoneBox">
              <div class="fg">
                <label class="flabel">姓名</label>
                <input id="lpName" class="fc" type="text" placeholder="請輸入姓名">
              </div>

              <button class="btn btn-p" onclick="doPhoneLogin()">登入</button>

              <div class="info-box">
                預設管理員測試帳號：<br>
                姓名：系統管理員<br>
                電話後9碼：900000000
              </div>
            </div>

            <div id="loginPwdBox" class="hidden">
              <div class="fg">
                <label class="flabel">帳號</label>
                <input id="laId" class="fc" type="text" placeholder="會員編號 / 手機 / Email">
              </div>

              <div class="fg">
                <label class="flabel">密碼</label>
                <input id="laPwd" class="fc" type="password" placeholder="請輸入密碼">
              </div>

              <button class="btn btn-p" onclick="doPwdLogin()">登入</button>

              <div class="info-box">
                預設管理員帳密：<br>
                帳號：M-ADMIN 或 0900000000<br>
                密碼：admin1234
              </div>
            </div>

            <div id="registerBox" class="hidden">
              <div class="fg">
                <label class="flabel">姓名<span class="req">*</span></label>
                <input id="rgName" class="fc" type="text" placeholder="請輸入姓名">
              </div>

              <div class="fg">
                <label class="flabel">暱稱</label>
                <input id="rgNick" class="fc" type="text" placeholder="可不填">
              </div>

              <div class="fg">
                <label class="flabel">手機號碼<span class="req">*</span></label>
                <input id="rgPhone" class="fc" type="tel" inputmode="numeric" placeholder="例：0912345678">
              </div>

              <button class="btn btn-s" onclick="doRegister()">註冊</button>
            </div>
          </div>
        </div>
      `);
    }

    function switchLoginTab(type){
      $('tabPhone')?.classList.toggle('active', type === 'phone');
      $('tabPwd')?.classList.toggle('active', type === 'pwd');
      $('tabReg')?.classList.toggle('active', type === 'reg');

      $('loginPhoneBox')?.classList.toggle('hidden', type !== 'phone');
      $('loginPwdBox')?.classList.toggle('hidden', type !== 'pwd');
      $('registerBox')?.classList.toggle('hidden', type !== 'reg');
    }

    async function doPhoneLogin(){
      const name = val('lpName');
      const phone = val('lpPhone').replace(/\D/g,'');

      if(!name || !phone){
        toast('請輸入姓名與電話後9碼','e');
        return;
      }

      await runApi('auth.loginByPhone', {
        name,
        phone
      }, res => {
        saveUser(res.member);
        toast('登入成功','s');
        go('home', {}, false);
      });
    }

    async function doPwdLogin(){
      const loginId = val('laId');
      const loginPwd = val('laPwd');

      if(!loginId || !loginPwd){
        toast('請輸入帳號與密碼','e');
        return;
      }

      await runApi('auth.login', {
        loginId,
        loginPwd
      }, res => {
        saveUser(res.member);
        toast('登入成功','s');
        go('home', {}, false);
      });
    }

    async function doRegister(){
      const name = val('rgName');
      const nickname = val('rgNick');
      const phone = val('rgPhone').replace(/\D/g,'');

      if(!name || !phone){
        toast('請填寫姓名與手機','e');
        return;
      }

      await runApi('auth.registerByPhone', {
        name,

    function toggleDonCustom(){
      $('apDonCustomGroup')?.classList.toggle('hidden', val('apDonAmount') !== 'other');
    }

    function toggleRestrictedNote(){
      const fundCode = val('apDonFund');
      $('restrictedNoteGroup')?.classList.toggle('hidden', fundCode === 'GENERAL');
    }

    async function submitApplyPayment(){
      if(!guardLogin()) return;

      const amount = Number(val('apPayAmount') || 0);
      if(amount <= 0){
        toast('請輸入正確金額','e');
        return;
      }

      await runApi('payment.apply', {
        memberId: APP.user.memberId || APP.user.id,
        name: APP.user.name,
        phone: APP.user.phone || APP.user.mobile || '',
        year: val('apPayYear') || thisYear(),
        amount,
        method: val('apPayMethod'),
        note: val('apPayNote')
      }, () => {
        toast('繳費申請已送出','s');
        go('myPayments');
      });
    }

    async function submitApplyDonate(){
      if(!guardLogin()) return;

      const amount = val('apDonAmount') === 'other'
        ? Number(val('apDonCustom') || 0)
        : Number(val('apDonAmount') || 0);

      if(amount <= 0){
        toast('請輸入正確捐款金額','e');
        return;
      }

      const fundCode = val('apDonFund') || 'GENERAL';
      const fundName = getFundNameFromCache(fundCode) || (fundCode === 'GENERAL' ? '一般用途' : '');

      await runApi('donation.apply', {
        memberId: APP.user.memberId || APP.user.id,
        name: APP.user.name,
        phone: APP.user.phone || APP.user.mobile || '',
        email: APP.user.email || '',
        amount,
        purpose: val('apDonPurpose'),
        method: val('apDonMethod'),
        fundCode,
        fundName,
        isRestricted: fundCode !== 'GENERAL' ? '是' : '否',
        restrictedNote: val('apDonRestrictedNote'),
        note: val('apDonNote')
      }, () => {
        toast('捐款申請已送出，感謝您的愛心！','s');
        go('myDonations');
      });
    }

    function buildMemberList(rows){
      if(!rows.length){
        return `<div class="empty"><div class="ei">👥</div><div>尚無會員資料</div></div>`;
      }

      return `
        <ul class="il">
          ${rows.map(m => `
            <li class="ii" onclick="go('memberDetail',{id:'${esc(m.memberId || m.id)}'})">
              <div class="ii-main">
                <div class="ii-title">${esc(m.name || '')}</div>
                <div class="rs">編號：${esc(m.memberId || m.id || '')} ｜ 電話：${esc(m.phone || m.mobile || '')}</div>
                <div class="rs">到期：${esc(fmtDate(m.expiryDate))} ｜ 捐款：${fmtMoney(m.totalDonation || 0)}</div>
              </div>
              <div class="tr">
                ${badge(m.type)}
                <div style="margin-top:6px">${badge(m.status)}</div>
              </div>
            </li>
          `).join('')}
        </ul>
      `;
    }

    function filterMembers(){
      const q = val('memberSearch').toLowerCase();
      const rows = (APP.cache.members || []).filter(m => {
        const s = [
          m.name,
          m.memberId,
          m.id,
          m.phone,
          m.mobile,
          m.type
        ].join(' ').toLowerCase();

        return s.includes(q);
      });

      $('memberListBox').innerHTML = buildMemberList(rows);
    }

    async function loadFinanceDashboard(){
      try{
        const y = thisYear();

        const [rpt, fRes, incRes, expRes] = await Promise.all([
          api('finance.report', { year:y }),
          api('fund.summary', { year:y }),
          api('finance.incomeList', { limit:8 }),
          api('finance.expenseList', { limit:8 })
        ]);

        if(rpt.success && rpt.report){
          const r = rpt.report;
          $('financeStats').innerHTML = `
            <div class="stat">
              <div class="stat-label">${y} 收入合計</div>
              <div class="stat-num income-c">${fmtMoney(r.totalIncome)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">${y} 支出合計</div>
              <div class="stat-num expense-c">${fmtMoney(r.totalExpense)}</div>
            </div>
            <div class="stat">
              <div class="stat-label">${y} 淨餘額</div>
              <div class="stat-num ${Number(r.netBalance) >= 0 ? 'income-c' : 'expense-c'}">${fmtMoney(r.netBalance)}</div>
            </div>

    let _budgetPreviewTimer = null;

    function previewBudgetCheck(){
      clearTimeout(_budgetPreviewTimer);

      _budgetPreviewTimer = setTimeout(async () => {
        const subjectCode = val('aeSubject');
        const amount = Number(val('aeAmount') || 0);
        const fundCode = val('aeFund') || 'GENERAL';
        const date = val('aeDate') || today();

        const box = $('budgetCheckBox');
        const txt = $('budgetCheckText');

        if(!box || !txt) return;

        if(!subjectCode || amount <= 0){
          box.classList.add('hidden');
          return;
        }

        box.classList.remove('hidden');
        box.className = 'info-box';
        txt.textContent = '預算檢查中...';

        try{
          const res = await api('budget.check', {
            date,
            subjectCode,
            fundCode,
            amount
          });

          if(res.success && res.result){
            const r = res.result;

            txt.innerHTML = `
              ${esc(r.message)}<br>
              預算：${fmtMoney(r.budgetAmt)}｜
              已用：${fmtMoney(r.usedAmt)}｜
              剩餘：${fmtMoney(r.remainAmt)}｜
              本次後：${fmtMoney(r.afterUsedAmt)}
            `;

            box.className = ['overBlock','overAllow','warning'].includes(r.level)
              ? 'warn-box'
              : 'info-box';
          }else{
            txt.textContent = res.message || '預算檢查失敗';
            box.className = 'warn-box';
          }
        }catch(e){
          txt.textContent = '預算檢查失敗：' + e.message;
          box.className = 'warn-box';
        }
      }, 500);
    }

      const fundName = getFundNameFromCache(fundCode) || '一般用途';

        toast('請填寫科目與金額','e');
        return;
      }

      await runApi('budget.add', {
        year:Number(val('abYear') || thisYear()),
        subjectCode,
        fundCode,
        fundName,
        amount,
        warningRate:Number(val('abWarningRate') || 80),
        allowOver:val('abAllowOver') === '是',
        note:val('abNote')
      }, () => {
        toast('預算新增成功','s');
        go('budget');
      });
    }

    /*******************************************************
     * Receipts
     *******************************************************/
    async function renderReceipts(){
      if(!guardAdmin()) return;

      setTitle('收據管理','正式收據與 PDF');
      setMain(`${pageHead('收據管理','查詢收據與產生正式 PDF')}<div class="card tc muted">載入中...</div>`);

      try{
        const res = await api('receipt.list', {});
        const rows = Array.isArray(res.items || res.receipts) ? (res.items || res.receipts) : [];

        setMain(`
          ${pageHead('收據管理','查詢收據與產生正式 PDF')}

          <div class="card">
            <div class="card-title">收據清單</div>

            ${rows.length ? `
              <ul class="il">
                ${rows.map(r => `
                  <li class="ii">
                    <div class="ii-main">
                      <div class="ii-title">${esc(r.receiptNo)}｜${esc(r.receiptType)}</div>
                      <div class="rs">${fmtDate(r.issueDate || r.date)} ｜ ${esc(r.name || r.recipientName || '')}</div>
                      <div class="rs">${esc(r.purpose || r.item || '')}</div>
                      ${r.fundCode && r.fundCode !== 'GENERAL' ? `
                        <div class="rs" style="color:var(--primary);font-weight:900">
                          🎯 專款：${esc(r.fundName || r.fundCode)}
                        </div>
                      ` : ''}
                    </div>
                    <div class="tr">
                      <div style="font-weight:950">${fmtMoney(r.amount)}</div>
                      <div class="btn-row" style="justify-content:flex-end;margin-top:8px">
                        <button class="btn btn-mini btn-p" onclick="makeReceiptPdf('${esc(r.receiptNo)}',false)">PDF</button>
                        ${r.pdfUrl ? `<button class="btn btn-mini btn-o" onclick="window.open('${esc(r.pdfUrl)}','_blank')">開啟</button>` : ''}
                      </div>
                    </div>
                  </li>
                `).join('')}
              </ul>
            ` : `<div class="empty"><div class="ei">📄</div><div>尚無收據資料</div></div>`}
          </div>
        `);
      }catch(e){
        setMain(`<div class="card tc" style="color:var(--danger)">載入失敗：${esc(e.message)}</div>`);
      }
    }

    async function makeReceiptPdf(receiptNo, force){
      await runApi('receipt.pdf', {
        receiptNo,
        force:!!force
      }, res => {
        toast(res.cached ? '已取得既有 PDF' : 'PDF 已產生','s');
        if(res.pdfUrl) window.open(res.pdfUrl,'_blank');
      });
    }

    /*******************************************************
     * Settings
     *******************************************************/
    function renderSettings(){
      if(!guardAdmin()) return;

      setTitle('系統設定','初始化與基礎資料');

      setMain(`
        ${pageHead('系統設定','初始化、會計科目、帳戶、人員與專款設定')}

        <div class="card">
          <div class="card-title">系統初始化</div>
          <button class="btn btn-p" onclick="doSystemInit()">初始化 / 補齊資料表欄位</button>
          <div class="info-box">
            若首次使用或更新程式後，請先執行初始化，以建立或補齊 Google Sheet 欄位。
          </div>
        </div>

        <div class="card">
          <div class="card-title">基礎資料設定</div>

          <div class="cg">
            <button class="cb" onclick="go('settingSubject')">
              <span class="ci">📚</span>
              <div>
                <div style="font-weight:900">會計科目設定</div>
                <div class="rs">收入、支出與資產科目</div>
              </div>
            </button>

            <button class="cb" onclick="go('settingAccount')">
              <span class="ci">🏦</span>
              <div>
                <div style="font-weight:900">帳戶設定</div>
                <div class="rs">銀行帳戶與餘額</div>
              </div>
            </button>

            <button class="cb" onclick="go('settingStaff')">
              <span class="ci">👔</span>
              <div>
                <div style="font-weight:900">管理人員設定</div>
                <div class="rs">經手人、會計、出納</div>
              </div>
            </button>

            <button class="cb" onclick="go('settingFund')">
              <span class="ci">🎯</span>
              <div>
                <div style="font-weight:900">專款專案設定</div>
                <div class="rs">指定捐款與專款專用管理</div>
              </div>
            </button>
          </div>
        </div>
      `);
    }

    async function doSystemInit(){
      if(!confirm('確定要初始化或補齊資料表欄位？')) return;

      await runApi('system.init', {}, () => {
        toast('初始化完成','s');
      });
    }

    async function renderSettingSubject(){
      if(!guardAdmin()) return;

      setTitle('會計科目設定','系統設定');
      setMain(`${pageHead('會計科目設定','管理收入與支出科目')}<div class="card tc muted">載入中...</div>`);

      await loadSubjects();

      setMain(`
        ${pageHead('會計科目設定','管理收入與支出科目')}

        <div class="card">
          <div class="card-title">科目清單</div>
          ${APP.cache.subjects.length ? `
            <ul class="il">
              ${APP.cache.subjects.map(s => `
                <li class="ii">
                  <div class="ii-main">
                    <div class="ii-title">${esc(s.code)} ${esc(s.name)}</div>
                    <div class="rs">${esc(s.note || '')}</div>
                  </div>
                  ${badge(s.type)}
                </li>
              `).join('')}
            </ul>
          ` : `<div class="empty"><div class="ei">📚</div><div>尚無科目</div></div>`}
        </div>

        <div class="card">
          <div class="card-title">新增會計科目</div>

          <div class="fg">
            <label class="flabel">科目代號</label>
            <input id="nsCode" class="fc" placeholder="例如：5108">
          </div>

          <div class="fg">
            <label class="flabel">科目名稱</label>
            <input id="nsName" class="fc" placeholder="例如：設備費用">
          </div>

          <div class="fg">
            <label class="flabel">科目類型</label>
            <select id="nsType" class="fc">
              <option value="收入">收入</option>
              <option value="支出">支出</option>
              <option value="資產">資產</option>
              <option value="負債">負債</option>
            </select>
          </div>

          <div class="fg">
            <label class="flabel">說明</label>
            <textarea id="nsNote" class="fc"></textarea>
          </div>

          <button class="btn btn-p" onclick="submitAddSubject()">新增科目</button>
          <button class="btn btn-s" onclick="doInitSubjects()">建立預設科目</button>
          <button class="btn btn-o" onclick="goBack()">返回</button>
        </div>
      `);
    }

    async function submitAddSubject(){
      if(!val('nsCode') || !val('nsName')){
        toast('請填寫科目代號與名稱','e');
        return;
      }

      await runApi('subject.add', {
        code:val('nsCode'),
        name:val('nsName'),
        type:val('nsType'),
        note:val('nsNote')
      }, () => {
        toast('科目新增成功','s');
        renderSettingSubject();
      });
    }

    async function doInitSubjects(){
      await runApi('subject.initDefaults', {}, res => {
        toast(`已新增 ${res.count || 0} 個預設科目`,'s');
        renderSettingSubject();
      });
    }

    async function renderSettingAccount(){
      if(!guardAdmin()) return;

      setTitle('帳戶設定','系統設定');
      setMain(`${pageHead('帳戶設定','管理銀行帳戶與餘額')}<div class="card tc muted">載入中...</div>`);

      await loadAccounts();

      setMain(`
        ${pageHead('帳戶設定','管理銀行帳戶與餘額')}

        <div class="card">
          <div class="card-title">帳戶清單</div>
          ${APP.cache.accounts.length ? `
            <ul class="il">
              ${APP.cache.accounts.map(a => `
                <li class="ii">
                  <div class="ii-main">
                    <div class="ii-title">${esc(a.name)}</div>
                    <div class="rs">${esc(a.bankName || '')} ${esc(a.accountNo || '')}</div>
                    <div class="rs">戶名：${esc(a.holder || '')}</div>
                  </div>
                  <div class="tr">
                    <div style="font-weight:950">${fmtMoney(a.balance || 0)}</div>
                    <div style="margin-top:6px">${badge(a.status)}</div>
                  </div>
                </li>
              `).join('')}
            </ul>
          ` : `<div class="empty"><div class="ei">🏦</div><div>尚無帳戶</div></div>`}
        </div>

        <div class="card">
          <div class="card-title">新增帳戶</div>

          <div class="fg"><label class="flabel">帳戶名稱</label><input id="naName" class="fc" placeholder="例如：第一銀行三重埔分行"></div>
          <div class="fg"><label class="flabel">銀行名稱</label><input id="naBank" class="fc" placeholder="第一銀行"></div>
          <div class="fg"><label class="flabel">銀行代號</label><input id="naBankCode" class="fc" placeholder="007"></div>
          <div class="fg"><label class="flabel">帳號</label><input id="naNo" class="fc" placeholder="211-1015-0402"></div>
          <div class="fg"><label class="flabel">戶名</label><input id="naHolder" class="fc" placeholder="社團法人台灣帕金森病友權益促進會"></div>
          <div class="fg"><label class="flabel">初始餘額</label><input id="naBalance" class="fc" type="number" value="0"></div>

          <button class="btn btn-p" onclick="submitAddAccount()">新增帳戶</button>
          <button class="btn btn-s" onclick="doInitAccount()">建立預設帳戶</button>
          <button class="btn btn-o" onclick="goBack()">返回</button>
        </div>
      `);
    }

    async function submitAddAccount(){
      if(!val('naName')){
        toast('請填寫帳戶名稱','e');
        return;
      }

      await runApi('account.add', {
        name:val('naName'),
        bankName:val('naBank'),
        bankCode:val('naBankCode'),
        accountNo:val('naNo'),
        holder:val('naHolder'),
        initBalance:Number(val('naBalance') || 0)
      }, () => {
        toast('帳戶新增成功','s');
        renderSettingAccount();
      });
    }

    async function doInitAccount(){
      await runApi('account.initDefault', {}, () => {
        toast('預設帳戶已建立','s');
        renderSettingAccount();
      });
    }

    async function renderSettingStaff(){
      if(!guardAdmin()) return;

      setTitle('管理人員設定','系統設定');
      setMain(`${pageHead('管理人員設定','管理經手人、會計與出納')}<div class="card tc muted">載入中...</div>`);

      await loadStaff();

      setMain(`
        ${pageHead('管理人員設定','管理經手人、會計與出納')}

        <div class="card">
          <div class="card-title">人員清單</div>
          ${APP.cache.staff.length ? `
            <ul class="il">
              ${APP.cache.staff.map(s => `
                <li class="ii">
                  <div class="ii-main">
                    <div class="ii-title">${esc(s.name)}</div>
                    <div class="rs">${esc(s.title || '')} ｜ ${esc(s.phone || '')}</div>
                    <div class="rs">${esc(s.email || '')}</div>
                  </div>
                  ${badge(s.status)}
                </li>
              `).join('')}
            </ul>
          ` : `<div class="empty"><div class="ei">👔</div><div>尚無人員</div></div>`}
        </div>

        <div class="card">
          <div class="card-title">新增管理人員</div>

          <div class="fg"><label class="flabel">姓名</label><input id="nstName" class="fc"></div>
          <div class="fg"><label class="flabel">職稱</label><input id="nstTitle" class="fc" placeholder="會計、出納、經手人"></div>
          <div class="fg"><label class="flabel">電話</label><input id="nstPhone" class="fc"></div>
          <div class="fg"><label class="flabel">Email</label><input id="nstEmail" class="fc"></div>

          <button class="btn btn-p" onclick="submitAddStaff()">新增人員</button>
          <button class="btn btn-o" onclick="goBack()">返回</button>
        </div>
      `);
    }

    async function submitAddStaff(){
      if(!val('nstName') || !val('nstTitle')){
        toast('請填寫姓名與職稱','e');
        return;
      }

      await runApi('staff.add', {
        name:val('nstName'),
        title:val('nstTitle'),
        phone:val('nstPhone'),
        email:val('nstEmail')
      }, () => {
        toast('人員新增成功','s');
        renderSettingStaff();
      });
    }

    async function renderSettingFund(){
      if(!guardAdmin()) return;

      setTitle('專款專案設定','系統設定');
      setMain(`${pageHead('專款專案設定','指定捐款與專款專用管理')}<div class="card tc muted">載入中...</div>`);

      await loadFunds();

      setMain(`
        ${pageHead('專款專案設定','指定捐款與專款專用管理')}

        <div class="card">
          <div class="card-title">🎯 專款專案清單</div>

          ${APP.cache.funds.length ? `
            <ul class="il">
              ${APP.cache.funds.map(f => `
                <li class="ii">
                  <div class="ii-main">
                    <div class="ii-title">${esc(f.code)} ${esc(f.name)}</div>
                    <div class="rs">${esc(f.note || '')}</div>
                  </div>
                  ${badge(f.status || '啟用')}
                </li>
              `).join('')}
            </ul>
          ` : `
            <div class="empty">
              <div class="ei">🎯</div>
              <div>尚無專款資料</div>
            </div>
          `}
        </div>

        <div class="card">
          <div class="card-title">新增專款專案</div>

          <div class="fg">
            <label class="flabel">專款代號<span class="req">*</span></label>
            <input id="nfCode" class="fc" type="text" placeholder="例：CARE">
            <p class="fhint">建議使用英文大寫，例如 CARE、RESEARCH。</p>
          </div>

          <div class="fg">
            <label class="flabel">專款名稱<span class="req">*</span></label>
            <input id="nfName" class="fc" type="text" placeholder="例：病友照護專款">
          </div>

          <div class="fg">
            <label class="flabel">說明</label>
            <textarea id="nfNote" class="fc" placeholder="此專款用途說明"></textarea>
          </div>

          <button class="btn btn-p" onclick="submitAddFund()">新增專款</button>
          <button class="btn btn-s" onclick="doInitFunds()">建立預設專款</button>
          <button class="btn btn-o" onclick="goBack()">返回</button>
        </div>
      `);
    }

    async function submitAddFund(){
      const code = val('nfCode').toUpperCase();
      const name = val('nfName');

      if(!code || !name){
        toast('請填寫專款代號與名稱','e');
        return;
      }

      await runApi('fund.add', {
        code,
        name,
        note:val('nfNote')
      }, () => {
        toast('專款新增成功','s');
        renderSettingFund();
      });
    }

    async function doInitFunds(){
      await runApi('fund.initDefaults', {}, res => {
        toast(`已建立 ${res.count || 0} 個預設專款`,'s');
        renderSettingFund();
      });
    }
  </script>
