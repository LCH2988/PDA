<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台灣帕金森病友權益促進會</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;background:#f4f6f8;color:#333;line-height:1.6}
    /* 頂欄 */
    .topbar{background:linear-gradient(135deg,#06c755,#04a043);color:#fff;padding:12px 16px;
      display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1);
      position:sticky;top:0;z-index:100}
    .topbar h1{font-size:18px;font-weight:600}
    .topbar .user{font-size:13px;opacity:.9}
    .demo-badge{background:#ff9800;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px}
    /* 主容器 */
    .container{max-width:900px;margin:0 auto;padding:16px}
    /* 卡片 */
    .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .card h2{font-size:16px;margin-bottom:12px;color:#06c755;border-left:4px solid #06c755;padding-left:8px}
    .card h3{font-size:14px;margin:12px 0 8px;color:#555}
    /* Tabs */
    .tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;background:#fff;padding:6px;border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.06);overflow-x:auto}
    .tab{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;color:#666;transition:.2s}
    .tab.active{background:#06c755;color:#fff;font-weight:600}
    .tab:hover:not(.active){background:#f0f0f0}
    /* 表單 */
    .form-row{margin-bottom:12px}
    .form-row label{display:block;font-size:13px;margin-bottom:4px;color:#555;font-weight:500}
    .form-row input,.form-row select,.form-row textarea{width:100%;padding:10px;border:1px solid #ddd;
      border-radius:6px;font-size:14px;font-family:inherit;background:#fafafa}
    .form-row input:focus,.form-row select:focus,.form-row textarea:focus{
      outline:none;border-color:#06c755;background:#fff}
    .form-row textarea{min-height:70px;resize:vertical}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.form-grid{grid-template-columns:1fr}}
    /* 按鈕 */
    .btn{padding:10px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;
      font-weight:500;transition:.2s;display:inline-flex;align-items:center;gap:6px}
    .btn-primary{background:#06c755;color:#fff}
    .btn-primary:hover{background:#04a043}
    .btn-secondary{background:#e0e0e0;color:#333}
    .btn-danger{background:#e74c3c;color:#fff}
    .btn-warn{background:#ff9800;color:#fff}
    .btn-sm{padding:5px 10px;font-size:12px}
    .btn-block{width:100%;justify-content:center}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    /* 表格 */
    .table-wrap{overflow-x:auto;border-radius:8px}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
    th{background:#f5f7fa;padding:10px 8px;text-align:left;font-weight:600;color:#555;border-bottom:2px solid #eee}
    td{padding:8px;border-bottom:1px solid #f0f0f0}
    tr:hover{background:#fafafa}
    /* 標籤 */
    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
    .badge-pending{background:#fff3cd;color:#856404}
    .badge-approved{background:#d4edda;color:#155724}
    .badge-rejected{background:#f8d7da;color:#721c24}
    .badge-processing{background:#cce5ff;color:#004085}
    .badge-done{background:#d1ecf1;color:#0c5460}
    /* Dashboard 卡片 */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
    .stat{background:#fff;padding:14px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.06);
      border-left:4px solid #06c755}
    .stat .label{font-size:12px;color:#888}
    .stat .value{font-size:22px;font-weight:700;color:#333;margin-top:4px}
    .stat.warn{border-left-color:#ff9800}
    .stat.danger{border-left-color:#e74c3c}
    .stat.info{border-left-color:#2196f3}
    /* Toast */
    #toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;
      padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:.3s;pointer-events:none}
    #toast.show{opacity:1;bottom:50px}
    #toast.err{background:#e74c3c}
    #toast.ok{background:#06c755}
    /* Loading */
    #loading{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:9998;
      display:none;align-items:center;justify-content:center}
    #loading.show{display:flex}
    .spinner{width:40px;height:40px;border:4px solid #eee;border-top-color:#06c755;
      border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;
      display:none;align-items:center;justify-content:center;padding:16px}
    .modal-bg.show{display:flex}
    .modal{background:#fff;border-radius:12px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
    .modal-header{padding:14px 16px;border-bottom:1px solid #eee;display:flex;
      justify-content:space-between;align-items:center}
    .modal-header h3{font-size:16px;color:#06c755}
    .modal-body{padding:16px}
    .modal-footer{padding:12px 16px;border-top:1px solid #eee;display:flex;gap:8px;justify-content:flex-end}
    .close{cursor:pointer;font-size:22px;color:#999;background:none;border:none}
    /* 印章預覽 */
    .seal-preview{display:inline-block;margin:10px 0;padding:10px;border:2px dashed #ccc;border-radius:8px;background:#fafafa}
    .seal-preview img{max-width:150px;max-height:150px;display:block}
    /* 空狀態 */
    .empty{text-align:center;padding:30px;color:#999;font-size:14px}
    /* 連結 */
    a{color:#06c755;text-decoration:none}
    a:hover{text-decoration:underline}
    /* 細節顯示 */
    .detail-row{display:flex;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
    .detail-row .k{width:35%;color:#888}
    .detail-row .v{flex:1;color:#333}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<header class="topbar">
  <h1>🏥 帕金森病友促進會</h1>
  <div class="user" id="userInfo">載入中…</div>
</header>

<div class="container" id="app"></div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">標題</h3>
      <button class="close" onclick="UI.closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
/*========== 全域設定 ==========*/
const CONFIG = {
  // ⚠️ 部署後請填入 GAS Web App 網址
  API_URL: 'https://script.google.com/macros/s/AKfycbxrbqMkOVchiF60MSaLfqwN4CJvK7N5XaicH5uvilem1G1u2ic22gEClC_pE9DNoW6jVg/exec',
  LIFF_ID: '2009456572-588gzru4'  // ⚠️ 部署後請填入 LIFF ID
};

/*========== UI 工具 ==========*/
const UI = {
  toast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.className = '', 2500);
  },
  ok(msg) { this.toast('✅ ' + msg, 'ok'); },
  err(msg) { this.toast('❌ ' + msg, 'err'); },
  loading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  },
  openModal(title, bodyHtml, footerHtml = '') {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalBody').innerHTML = bodyHtml;
    document.getElementById('modalFooter').innerHTML = footerHtml;
    document.getElementById('modalBg').classList.add('show');
  },
  closeModal() {
    document.getElementById('modalBg').classList.remove('show');
  },
  badge(status) {
    const map = {
      '待審核': 'pending', '待收件': 'processing', '待撥款': 'processing',
      '已確認': 'approved', '已審核': 'approved', '已入帳': 'approved',
      '已完成': 'done', '已撥款': 'done',
      '已拒絕': 'rejected',
      '有效': 'approved', '待繳費': 'pending'
    };
    return `<span class="badge badge-${map[status]||'pending'}">${status||'-'}</span>`;
  },
  escape(s) {
    return String(s==null?'':s).replace(/[&<>"']/g,
      c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
};

/*========== API 模組 ==========*/
const API = {
  async call(action, payload = {}) {
    UI.loading(true);
    try {
      const res = await fetch(CONFIG.API_URL, {
        method: 'POST',
        // GAS doPost 不支援 preflight，以 text/plain 規避 CORS
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, userId: AuthManager.userId, payload })
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error || '請求失敗');
      return data.data;
    } catch (e) {
      UI.err(e.message);
      throw e;
    } finally {
      UI.loading(false);
    }
  },
  // 檔案轉 base64
  fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }
};

/*========== 身份管理 ==========*/
const AuthManager = {
  userId: '',
  displayName: '',
  role: 'guest',
  isAdmin: false,
  isFinance: false,
  demoMode: false,
  member: null,

  async init() {
    try {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        this.userId = profile.userId;
        this.displayName = profile.displayName;
      } else if (liff.isInClient()) {
        liff.login();
        return;
      } else {
        // 瀏覽器開啟且未登入 → 示範模式
        this.enterDemoMode();
      }
    } catch (err) {
      console.warn('LIFF 初始化失敗，進入示範模式：', err);
      this.enterDemoMode();
    }

    // 向後端查詢角色
    try {
      const who = await API.call('auth.whoami');
      this.role = who.role;
      this.isAdmin = who.isAdmin;
      this.isFinance = who.isFinance;
      this.member = who.member;
    } catch (e) {
      console.warn('whoami 失敗', e);
    }
    this.updateHeader();
    this.render();
  },
  enterDemoMode() {
    this.demoMode = true;
    this.userId = 'DEMO-USER-' + Math.floor(Math.random() * 9999);
    this.displayName = '示範訪客';
  },
  updateHeader() {
    const el = document.getElementById('userInfo');
    const demo = this.demoMode ? '<span class="demo-badge">示範模式</span>' : '';
    const role = this.isAdmin ? '🛡️管理員' : (this.isFinance ? '💰財務' : '👤會員');
    el.innerHTML = `${UI.escape(this.displayName)} ${role} ${demo}`;
  },
  render() {
    if (this.isAdmin || this.isFinance) {
      AdminApp.render();
    } else {
      App.render();
    }
  }
};

/*========== 會員端 App ==========*/
const App = {
  currentTab: 'home',
  tabs: [
    { id:'home',      name:'🏠 首頁' },
    { id:'profile',   name:'👤 個人資料' },
    { id:'payment',   name:'💳 繳費' },
    { id:'donation',  name:'❤️ 捐款' },
    { id:'points',    name:'⭐ 積分' },
    { id:'income',    name:'📥 收入交付' },
    { id:'expense',   name:'📤 支出申請' }
  ],
  render() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="tabs">
        ${this.tabs.map(t => `
          <div class="tab ${this.currentTab===t.id?'active':''}"
               onclick="App.switchTab('${t.id}')">${t.name}</div>`).join('')}
      </div>
      <div id="tabContent"></div>
    `;
    this.renderTab();
  },
  switchTab(id) {
    this.currentTab = id;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    this.renderTab();
  },
  async renderTab() {
    const box = document.getElementById('tabContent');
    box.innerHTML = '<div class="card"><div class="empty">載入中...</div></div>';
    try {
      switch(this.currentTab){
        case 'home': return this.renderHome(box);
        case 'profile': return this.renderProfile(box);
        case 'payment': return this.renderPayment(box);
        case 'donation': return this.renderDonation(box);
        case 'points': return this.renderPoints(box);
        case 'income': return this.renderIncome(box);
        case 'expense': return this.renderExpense(box);
      }
    } catch(e){ console.error(e); }
  },
  /* 首頁 */
  async renderHome(box){
    const m = AuthManager.member;
    if(!m){
      box.innerHTML = `
        <div class="card">
          <h2>歡迎加入</h2>
          <p style="margin-bottom:12px">您尚未註冊為會員，請先完成註冊</p>
          <button class="btn btn-primary" onclick="App.showRegisterForm()">立即註冊</button>
        </div>`;
      return;
    }
    const expiring = AuthManager.demoMode ? false :
      (m['到期日'] && (new Date(m['到期日']).getTime()-Date.now())/86400000 <= 30);
    box.innerHTML = `
      <div class="card">
        <h2>會員狀態</h2>
        <div class="stat-grid">
          <div class="stat"><div class="label">會員類型</div><div class="value" style="font-size:16px">${UI.escape(m['會員類型']||'-')}</div></div>
          <div class="stat ${expiring?'warn':''}"><div class="label">到期日</div><div class="value" style="font-size:16px">${UI.escape(m['到期日']||'未繳費')}</div></div>
          <div class="stat info"><div class="label">積分</div><div class="value">${m['積分']||0}</div></div>
          <div class="stat"><div class="label">累計繳費</div><div class="value" style="font-size:16px">NT$ ${m['累計繳費']||0}</div></div>
        </div>
        ${expiring?'<div style="background:#fff3cd;padding:10px;border-radius:6px;color:#856404;font-size:13px">⚠️ 您的會員將在 30 天內到期，請盡早繳費續會</div>':''}
      </div>
      <div class="card">
        <h2>快速操作</h2>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          <button class="btn btn-primary" onclick="App.switchTabProg('payment')">💳 我要繳費</button>
          <button class="btn btn-warn" onclick="App.switchTabProg('donation')">❤️ 我要捐款</button>
          <button class="btn btn-secondary" onclick="App.switchTabProg('profile')">👤 更新資料</button>
        </div>
      </div>`;
  },
  switchTabProg(id){
    this.currentTab = id;
    document.querySelectorAll('.tab').forEach(t=>{
      t.classList.toggle('active', t.textContent.includes(this.tabs.find(x=>x.id===id).name.substr(2)));
    });
    this.renderTab();
  },
  /* 會員註冊 */
  showRegisterForm(){
    UI.openModal('會員註冊',`
      <div class="form-grid">
        <div class="form-row"><label>姓名 *</label><input id="r_name"></div>
        <div class="form-row"><label>電話 *</label><input id="r_phone"></div>
        <div class="form-row"><label>Email</label><input id="r_email" type="email"></div>
        <div class="form-row"><label>生日</label><input id="r_birthday" type="date"></div>
        <div class="form-row"><label>性別</label>
          <select id="r_gender"><option value="">-</option><option>男</option><option>女</option><option>其他</option></select></div>
        <div class="form-row"><label>病友類型</label>
          <select id="r_patientType"><option>病友本人</option><option>家屬</option><option>關懷者</option></select></div>
        <div class="form-row"><label>主治醫師</label><input id="r_doctor"></div>
        <div class="form-row"><label>就醫院所</label><input id="r_hospital"></div>
        <div class="form-row" style="grid-column:1/-1"><label>地址</label><input id="r_address"></div>
        <div class="form-row"><label>緊急聯絡人</label><input id="r_emName"></div>
        <div class="form-row"><label>緊急聯絡電話</label><input id="r_emPhone"></div>
      </div>
    `,`
      <button class="btn btn-secondary" onclick="UI.closeModal()">取消</button>
      <button class="btn btn-primary" onclick="App.submitRegister()">註冊</button>
    `);
  },
  async submitRegister(){
    const payload = {};
    ['name','phone','email','birthday','gender','patientType','doctor','hospital',
     'address','emName','emPhone'].forEach(k=>{
      payload[k] = document.getElementById('r_'+k).value.trim();
    });
    if(!payload.name || !payload.phone){ UI.err('姓名與電話為必填'); return; }
    try {
      await API.call('member.register', payload);
      UI.ok('註冊成功！');
      UI.closeModal();
      const who = await API.call('auth.whoami');
      AuthManager.member = who.member;
      this.renderTab();
    } catch(e){}
  },
  /* 個人資料 */
  async renderProfile(box){
    const m = AuthManager.member;
    if(!m){ box.innerHTML = '<div class="card"><div class="empty">請先註冊會員</div></div>'; return; }
    box.innerHTML = `
      <div class="card">
        <h2>個人資料</h2>
        <div class="form-grid">
          ${['姓名','電話','Email','生日','地址','性別','主治醫師','就醫院所',
             '病友類型','緊急聯絡人','緊急聯絡電話'].map(k=>`
            <div class="form-row">
              <label>${k}</label>
              <input id="p_${k}" value="${UI.escape(m[k]||'')}">
            </div>`).join('')}
        </div>
        <button class="btn btn-primary btn-block" onclick="App.saveProfile()">儲存變更</button>
      </div>`;
  },
  async saveProfile(){
    const payload = {};
    ['姓名','電話','Email','生日','地址','性別','主治醫師','就醫院所',
     '病友類型','緊急聯絡人','緊急聯絡電話'].forEach(k=>{
      payload[k] = document.getElementById('p_'+k).value.trim();
    });
    try {
      await API.call('member.update', payload);
      UI.ok('已儲存');
      const who = await API.call('auth.whoami');
      AuthManager.member = who.member;
    } catch(e){}
  },
  /* 繳費 */
  async renderPayment(box){
    const { list } = await API.call('payment.listMine').catch(()=>({list:[]}));
    box.innerHTML = `
      <div class="card">
        <h2>💳 繳費申請</h2>
        <div class="form-grid">
          <div class="form-row"><label>繳費類型</label>
            <select id="pay_type"><option>會費</option><option>活動費</option><option>其他</option></select></div>
          <div class="form-row"><label>金額 *</label><input id="pay_amount" type="number" min="0"></div>
          <div class="form-row"><label>繳費方式</label>
            <select id="pay_method"><option>ATM轉帳</option><option>現金</option><option>信用卡</option></select></div>
          <div class="form-row"><label>帳號後5碼</label><input id="pay_last5" maxlength="5"></div>
          <div class="form-row"><label>繳費日期</label><input id="pay_date" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="form-row"><label>匯款截圖</label><input id="pay_file" type="file" accept="image/*,.pdf"></div>
          <div class="form-row" style="grid-column:1/-1"><label>備註</label><textarea id="pay_note"></textarea></div>
        </div>
        <button class="btn btn-primary btn-block" onclick="App.submitPayment()">送出申請</button>
      </div>
      <div class="card">
        <h2>我的繳費記錄</h2>
        ${this.renderTable(list, [
          {k:'繳費ID',label:'編號'},{k:'繳費類型',label:'類型'},{k:'金額',label:'金額'},
          {k:'繳費日期',label:'日期'},{k:'狀態',label:'狀態',badge:true},
          {k:'收據URL',label:'收據',link:true}
        ])}
      </div>`;
  },
  async submitPayment(){
    const amount = Number(document.getElementById('pay_amount').value);
    if(!amount){ UI.err('請填寫金額'); return; }
    const file = document.getElementById('pay_file').files[0];
    const payload = {
      type: document.getElementById('pay_type').value,
      amount,
      method: document.getElementById('pay_method').value,
      last5: document.getElementById('pay_last5').value,
      date: document.getElementById('pay_date').value,
      note: document.getElementById('pay_note').value
    };
    if(file){ payload.attachment = await API.fileToBase64(file); payload.attachmentName = file.name; }
    try {
      await API.call('payment.create', payload);
      UI.ok('繳費申請已送出，請等待審核');

AdminApp.reviewPayment = function(paymentId, approve) {
  const title = approve ? '確認通過繳費' : '拒絕繳費';
  UI.openModal(title, `
    <div class="form-row"><label>審核意見</label><textarea id="rv_comment"></textarea></div>
    ${!approve ? '<div class="form-row"><label>拒絕原因 *</label><textarea id="rv_reject"></textarea></div>' : ''}
  `, `
    <button class="btn btn-secondary" onclick="UI.closeModal()">取消</button>
    <button class="btn ${approve?'btn-primary':'btn-danger'}" onclick="AdminApp.doReviewPayment('${paymentId}', ${approve})">${approve?'確認通過':'確認拒絕'}</button>
  `);
};
AdminApp.doReviewPayment = async function(paymentId, approve) {
  const comment = document.getElementById('rv_comment').value;
  const rejectReason = approve ? '' : document.getElementById('rv_reject').value;
  if (!approve && !rejectReason) { UI.err('請填寫拒絕原因'); return; }
  try {
    await API.call('admin.paymentReview', { paymentId, approve, comment, rejectReason });
    UI.ok('審核完成');
    UI.closeModal();
    this.loadPayments();
  } catch(e){}
};

          <td>${r['附件URL'] ? `<a href="${r['附件URL']}" target="_blank">查看</a>` : '-'}</td>

AdminApp.reviewIncome = function(incomeId, action) {
  const titleMap = { approve:'審核收入', reject:'拒絕收入', confirm:'確認入帳' };
  const isReject = action === 'reject';
  const isConfirm = action === 'confirm';
  UI.openModal(titleMap[action], `
    ${!isConfirm ? '<div class="form-row"><label>審核意見</label><textarea id="rv_comment"></textarea></div>' : '<p>確定要將此收入標記為已入帳？</p>'}

  `, `
    <button class="btn btn-secondary" onclick="UI.closeModal()">取消</button>
    <button class="btn btn-primary" onclick="AdminApp.doReviewIncome('${incomeId}', '${action}')">確認</button>
  `);
};
AdminApp.doReviewIncome = async function(incomeId, action) {
  const comment = (document.getElementById('rv_comment')||{}).value || '';
  const rejectReason = (document.getElementById('rv_reject')||{}).value || '';
  if (action === 'reject' && !rejectReason) { UI.err('請填寫拒絕原因'); return; }
  try {
    await API.call('admin.incomeReview', { incomeId, action, comment, rejectReason });
    UI.ok('處理完成');
    UI.closeModal();
    this.loadIncomes();
  } catch(e){}
};

/*========== 印章管理 ==========*/
AdminApp.renderSeal = async function(box) {
  const { sealUrl } = await API.call('admin.sealGet');
  box.innerHTML = `
    <div class="card">
      <h2>🪪 電子印章管理</h2>
      <p style="color:#666;font-size:13px;margin-bottom:12px">
        🔔 支援 PNG/JPG，建議透明背景、300×300px 以上，最大 5MB<br>
        🔔 傳票建立後會自動快照當下印章，更換印章不影響舊傳票
      </p>
      <h3>目前印章</h3>
      ${sealUrl
        ? `<div class="seal-preview"><img src="${sealUrl}" id="sealImg"></div>
           <div><button class="btn btn-danger" onclick="AdminApp.deleteSeal()">🗑 刪除印章</button></div>`
        : '<div class="empty">尚未設定印章</div>'}
      <h3 style="margin-top:16px">上傳新印章</h3>
      <div class="form-row">
        <input type="file" id="sealFile" accept="image/*" onchange="AdminApp.previewSeal(event)">
      </div>
      <div id="sealPreviewBox"></div>
      <button class="btn btn-primary" onclick="AdminApp.uploadSeal()" id="uploadSealBtn" disabled>💾 儲存印章</button>
    </div>`;
};
AdminApp.previewSeal = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { UI.err('檔案超過 5MB'); e.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('sealPreviewBox').innerHTML =
      `<div class="seal-preview"><img src="${ev.target.result}" id="newSealPreview"></div>
       <p style="font-size:12px;color:#666">預覽效果（尚未儲存）</p>`;
    document.getElementById('uploadSealBtn').disabled = false;
  };
  reader.readAsDataURL(file);
};
AdminApp.uploadSeal = async function() {
  const file = document.getElementById('sealFile').files[0];
  if (!file) { UI.err('請選擇檔案'); return; }
  const base64 = await API.fileToBase64(file);
  try {
    await API.call('admin.sealUpload', { base64, fileName: file.name });
    UI.ok('印章已儲存');
    this.renderTab();
  } catch(e){}
};
AdminApp.deleteSeal = async function() {
  if (!confirm('確定刪除目前印章？\n（舊傳票的印章快照不受影響）')) return;
  try {
    await API.call('admin.sealDelete');
    UI.ok('已刪除');
    this.renderTab();
  } catch(e){}
};
