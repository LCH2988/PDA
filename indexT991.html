<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>台灣帕金森病友權益促進會｜會員會務財務系統</title>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --soft:#eff6ff;
      --success:#16a34a;
      --warn:#f59e0b;
      --danger:#dc2626;
      --purple:#7c3aed;
      --pink:#db2777;
      --line-green:#00B900;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
      --radius2:24px;
      --safe-bottom:env(safe-area-inset-bottom);
      --header-h:64px;
      --nav-h:74px;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-text-size-adjust:100%;
    }

    body{
      padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }

    button,
    input,
    select,
    textarea{
      font-family:inherit;
      font-size:16px;
    }

    button{
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .app{
      min-height:100vh;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      height:var(--header-h);
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#38bdf8);
      color:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 14px;
      box-shadow:0 8px 22px rgba(37,99,235,.22);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:40px;
      height:40px;
      border-radius:14px;
      background:rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:23px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.28);
      flex:0 0 auto;
    }

    .brand-text{
      min-width:0;
    }

    .brand-title{
      font-weight:900;
      font-size:15px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:230px;
    }

    .brand-sub{
      font-size:11px;
      opacity:.9;
      margin-top:2px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .top-btn{
      border:0;
      background:rgba(255,255,255,.18);
      color:white;
      border-radius:999px;
      padding:8px 10px;
      font-size:13px;
      font-weight:800;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:14px;
    }

    .hero{
      background:linear-gradient(135deg,#ffffff,#eff6ff);
      border-radius:var(--radius2);
      padding:18px;
      box-shadow:var(--shadow);
      border:1px solid rgba(37,99,235,.08);
      margin-bottom:14px;
    }

    .hero h1{
      margin:0;
      font-size:22px;
      line-height:1.25;
    }

    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(15,23,42,.05);
      margin-bottom:14px;
    }

    .card-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-weight:900;
      font-size:18px;
      margin-bottom:12px;
    }

    .card-title small{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .grid3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    .stat{
      border-radius:16px;
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
    }

    .stat .k{
      font-size:12px;
      color:var(--muted);
    }

    .stat .v{
      font-size:22px;
      font-weight:950;
      margin-top:4px;
    }

    .stat.blue{
      background:#eff6ff;
      border-color:#bfdbfe;
    }

    .stat.green{
      background:#f0fdf4;
      border-color:#bbf7d0;
    }

    .stat.orange{
      background:#fffbeb;
      border-color:#fde68a;
    }

    .stat.red{
      background:#fef2f2;
      border-color:#fecaca;
    }

    .stat.purple{
      background:#f5f3ff;
      border-color:#ddd6fe;
    }

    .fg{
      margin-bottom:12px;
    }

    .flabel{
      display:block;
      font-weight:850;
      font-size:14px;
      margin-bottom:6px;
    }

    .req{
      color:var(--danger);
      margin-left:3px;
    }

    .fc{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      background:white;
      color:var(--text);
      outline:none;
      min-height:46px;
    }

    textarea.fc{
      min-height:96px;
      resize:vertical;
      line-height:1.6;
    }

    .fc:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.1);
    }

    .btn{
      width:100%;
      min-height:48px;
      border:0;
      border-radius:15px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 14px;
      margin:5px 0;
      transition:.16s;
      text-align:center;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-p{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:white;
    }

    .btn-s{
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:white;
    }

    .btn-w{
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:white;
    }

    .btn-d{
      background:linear-gradient(135deg,#dc2626,#b91c1c);
      color:white;
    }

    .btn-line{
      background:linear-gradient(135deg,#00B900,#009900);
      color:white;
    }

    .btn-o{
      background:white;
      color:var(--primary);
      border:1px solid #bfdbfe;
    }

    .btn-g{
      background:#f8fafc;
      color:#374151;
      border:1px solid var(--line);
    }

    .row{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .row > *{
      flex:1;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:5px 9px;
      background:#f1f5f9;
      color:#475569;
      font-size:12px;
      font-weight:800;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .bs{
      background:#dcfce7;
      color:#166534;
    }

    .bw{
      background:#fef3c7;
      color:#92400e;
    }

    .bd{
      background:#fee2e2;
      color:#991b1b;
    }

    .bb{
      background:#dbeafe;
      color:#1e40af;
    }

    .bp{
      background:#ede9fe;
      color:#5b21b6;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:#fff;
    }

    .item-h{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:6px;
    }

    .item-title{
      font-weight:950;
      font-size:15px;
      line-height:1.4;
    }

    .item-meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-top:4px;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .mini{
      width:auto;
      min-height:36px;
      border-radius:12px;
      padding:7px 11px;
      font-size:13px;
      margin:0;
      flex:0 0 auto;
    }

    .muted{
      color:var(--muted);
    }

    .tc{
      text-align:center;
    }

    .money{
      font-weight:950;
      color:#0f766e;
    }

    .danger{
      color:var(--danger);
    }

    .success{
      color:var(--success);
    }

    .warn{
      color:var(--warn);
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:28px 8px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:#f8fafc;
    }

    .guide{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
      color:#374151;
      font-size:14px;
      line-height:1.7;
    }

    .guide b{
      color:#1d4ed8;
    }

    .guide ul{
      margin:6px 0 0 18px;
      padding:0;
    }

    .guide ol{
      margin:6px 0 0 22px;
      padding:0;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:8px;
      margin-bottom:12px;
      -webkit-overflow-scrolling:touch;
    }

    .tab{
      white-space:nowrap;
      border:1px solid var(--line);
      background:white;
      color:#374151;
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
    }

    .tab.active{
      background:var(--primary);
      border-color:var(--primary);
      color:white;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:60;
      height:calc(var(--nav-h) + var(--safe-bottom));
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(14px);
      border-top:1px solid var(--line);
      display:flex;
      justify-content:center;
      padding-bottom:var(--safe-bottom);
      box-shadow:0 -8px 24px rgba(15,23,42,.08);
    }

    .nav-inner{
      width:100%;
      max-width:760px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:2px;
      padding:7px 8px 8px;
    }

    .nitem{
      border:0;
      background:transparent;
      color:#64748b;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      font-size:11px;
      font-weight:850;
      min-width:0;
    }

    .nitem .ico{
      font-size:20px;
      line-height:1;
    }

    .nitem.active{
      background:#eff6ff;
      color:#1d4ed8;
    }

    .modal-mask{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(15,23,42,.48);
      display:none;
      align-items:flex-end;
      justify-content:center;
    }

    .modal-mask.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:760px;
      max-height:88vh;
      overflow:auto;
      background:#fff;
      border-radius:24px 24px 0 0;
      padding:16px 16px calc(18px + var(--safe-bottom));
      box-shadow:0 -16px 40px rgba(0,0,0,.2);
    }

    .mtitle{
      font-size:19px;
      font-weight:950;
      margin-bottom:12px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(var(--nav-h) + var(--safe-bottom) + 18px);
      transform:translateX(-50%);
      z-index:120;
      background:#111827;
      color:white;
      border-radius:999px;
      padding:11px 16px;
      font-weight:850;
      font-size:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      display:none;
      max-width:90%;
      text-align:center;
    }

    .toast.show{
      display:block;
    }

    .toast.s{
      background:#166534;
    }

    .toast.e{
      background:#991b1b;
    }

    .toast.w{
      background:#92400e;
    }

    .loader{
      position:fixed;
      inset:0;
      z-index:110;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(6px);
    }

    .loader.show{
      display:flex;
    }

    .spinner{
      width:48px;
      height:48px;
      border-radius:50%;
      border:5px solid #bfdbfe;
      border-top-color:#2563eb;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{
        transform:rotate(360deg);
      }
    }

    .report-head{
      text-align:center;
      margin-bottom:16px;
    }

    .report-head h2{
      margin:0;
      font-size:18px;
    }

    .report-head h3{
      margin:8px 0 4px;
      font-size:20px;
    }

    .report-table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      background:white;
    }

    .report-table th,
    .report-table td{
      border:1px solid var(--line);
      padding:8px;
      text-align:left;
      vertical-align:top;
    }

    .report-table th{
      background:#f8fafc;
      font-weight:950;
    }

    .doc-wrap{
      background:#fff;
      color:#111;
      border:2px solid #222;
      border-radius:14px;
      padding:24px;
      margin:12px 0;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    }

    .doc-head{
      text-align:center;
      border-bottom:3px solid #222;
      padding-bottom:14px;
      margin-bottom:18px;
    }

    .doc-org{
      font-size:24px;
      font-weight:900;
      line-height:1.4;
    }

    .doc-title{
      font-size:22px;
      font-weight:900;
      margin-top:6px;
      letter-spacing:4px;
    }

    .doc-no{
      font-size:14px;
      color:#555;
      margin-top:6px;
    }

    .doc-table{
      width:100%;
      border-collapse:collapse;
      margin:14px 0;
      background:#fff;
      font-size:15px;
    }

    .doc-table th,
    .doc-table td{
      border:1px solid #222;
      padding:10px;
      vertical-align:middle;
    }

    .doc-table th{
      background:#f2f2f2;
      color:#111;
      font-weight:800;
      width:28%;
    }

    .doc-amount-box{
      border:2px solid #222;
      border-radius:10px;
      padding:14px;
      margin:16px 0;
      text-align:center;
    }

    .doc-amount{
      font-size:28px;
      font-weight:900;
      color:var(--primary);
    }

    .doc-upper{
      font-size:18px;
      font-weight:800;
      color:#9a5b00;
      margin-top:6px;
    }

    .doc-signs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:22px;
    }

    .doc-sign{
      text-align:center;
      font-size:14px;
    }

    .doc-sign-line{
      height:42px;
      border-bottom:1px solid #222;
      margin-top:6px;
    }

    .doc-paste{
      border:1px dashed #333;
      border-radius:8px;
      padding:24px;
      text-align:center;
      margin-top:18px;
      font-weight:700;
      color:#555;
    }

    .voucher-table{
      width:100%;
      border-collapse:collapse;
      margin:16px 0;
      background:#fff;
      font-size:15px;
    }

    .voucher-table th,
    .voucher-table td{
      border:1px solid #111;
      padding:10px;
      text-align:left;
    }

    .voucher-table th{
      background:#f2f2f2;
      color:#111;
    }

    .voucher-table .amt{
      text-align:right;
      font-weight:900;
    }

    .nowrap{
      white-space:nowrap;
    }

    .hide{
      display:none!important;
    }

    @media (min-width:720px){
      .brand-title{
        max-width:420px;
      }

      .modal{
        border-radius:24px;
        margin-bottom:30px;
      }

      .modal-mask{
        align-items:center;
      }
    }

    async function api(action, data = {}){
      if(!API_BASE){
        throw new Error('尚未設定 API_BASE');
      }

      const payload = {
        action,
        data:{
          ...data,
          operator:data.operator || APP.user?.name || '',
          operatorId:data.operatorId || APP.user?.memberId || APP.user?.id || ''
        }
      };

      const res = await fetch(API_BASE, {
        method:'POST',
        headers:{
          'Content-Type':'text/plain;charset=utf-8'
        },
        body:JSON.stringify(payload)
      });

      const text = await res.text();

      if(!res.ok){
        throw new Error('API HTTP 錯誤 ' + res.status + '：' + text.slice(0,200));
      }

      try{
        return JSON.parse(text);
      }catch(e){
        throw new Error('API 回傳格式錯誤：' + text.slice(0,200));
      }
    }

    async function runApi(action, data = {}, onSuccess){
      showLoad();

      try{
        const res = await api(action, data);

        hideLoad();

        if(res.success){

        }else{

        }

        return res;

        hideLoad();
        toast('連線失敗：' + e.message,'e');

        return {
          success:false,
          message:e.message
        };
      }

    function moneyToZhUpper(amount){
      amount = Number(amount || 0);

      if(!isFinite(amount) || amount < 0){
        return '新臺幣零元整';
      }

      const digits = ['零','壹','貳','參','肆','伍','陸','柒','捌','玖'];
      const units = ['','拾','佰','仟'];
      const bigUnits = ['','萬','億','兆'];

      function fourToZh(num){
        let str = '';
        const s = String(num).padStart(4,'0');

        for(let i = 0; i < 4; i++){
          const n = Number(s[i]);
          const pos = 3 - i;

          if(n === 0){
            if(str && !str.endsWith('零')){
              str += '零';
            }
          }else{
            str += digits[n] + units[pos];
          }
        }

        return str.replace(/零+/g,'零').replace(/零$/,'');
      }

      const intPart = Math.floor(amount);

      if(intPart === 0){
        return '新臺幣零元整';
      }

      const parts = [];
      let n = intPart;
      let unitIndex = 0;

      while(n > 0){
        const section = n % 10000;

        if(section !== 0){
          let sectionZh = fourToZh(section);

          if(unitIndex > 0){
            sectionZh += bigUnits[unitIndex];
          }

          parts.unshift(sectionZh);
        }else{
          if(parts.length && !parts[0].startsWith('零')){
            parts.unshift('零');
          }
        }

        n = Math.floor(n / 10000);
        unitIndex++;
      }

      let result = parts.join('');

      result = result
        .replace(/零+/g,'零')
        .replace(/零萬/g,'萬')
        .replace(/零億/g,'億')
        .replace(/億萬/g,'億')
        .replace(/零$/,'');

      return '新臺幣' + result + '元整';
    }

    function go(page, params = {}, push = true){
      if(push && APP.page && APP.page !== page){
        APP.history.push({
          page:APP.page,
          params:APP._params || {}
        });
      }

      APP.page = page;
      APP._params = params || {};

      document.querySelectorAll('.nitem').forEach(el => el.classList.remove('active'));

      const navId = NAV_MAP[page];

      if(navId){
        $(navId)?.classList.add('active');
      }

      showBack(APP.history.length > 0);

      const fn = ROUTES[page];

      if(fn){
        fn(params || {});
      }else{
        setMain(`<div class="card tc">尚未建立頁面：${esc(page)}</div>`);
      }
    }

    function goBack(){
      if(!APP.history.length) return;

      const prev = APP.history.pop();

      APP.page = prev.page;
      APP._params = prev.params || {};

      document.querySelectorAll('.nitem').forEach(el => el.classList.remove('active'));

      const navId = NAV_MAP[prev.page];

      if(navId){
        $(navId)?.classList.add('active');
      }

      showBack(APP.history.length > 0);

      const fn = ROUTES[prev.page];

      if(fn){
        fn(prev.params || {});
      }else{
        setMain(`<div class="card tc">尚未建立頁面：${esc(prev.page)}</div>`);
      }
    }

    async function submitProfile(){
      const name = requireInput('pfName','姓名');
      const phone = requireInput('pfPhone','手機');

      if(!name || !phone) return;

      if(phone && !isValidTaiwanMobile(phone)){
        toast('請輸入正確手機格式，例如 0912345678','w');
        return;
      }

      showLoad();

      try{
        const res = await api('member.updateProfile', {
          memberId:APP.user.memberId || APP.user.id,
          name,
          nickname:$('pfNick').value.trim(),
          phone,
          mobile:phone,
          email:$('pfEmail').value.trim(),
          birthday:$('pfBirthday').value,
          address:$('pfAddress').value.trim(),
          diagnosisYear:$('pfDiagnosisYear').value.trim(),
          doctor:$('pfDoctor').value.trim(),
          hospital:$('pfHospital').value.trim(),
          medication:$('pfMedication').value.trim(),
          surgery:$('pfSurgery').value.trim(),
          specialNeeds:$('pfSpecialNeeds').value.trim(),
          healthConsent:$('pfHealthConsent').value
        });

        hideLoad();

        if(res.success){
          APP.user = res.member;
          saveSession();
          updateLoginButton();
          toast('資料已更新','s');
          go('memberCenter',{},false);
        }else{
          toast(res.message || '更新失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('更新失敗：' + e.message,'e');
      }
    }

    async function viewReceiptPdf(receiptNo){
      if(!receiptNo || receiptNo === '尚未開立' || receiptNo === '--'){
        toast('尚未開立收據','w');
        return;
      }

      showLoad();

      try{
        const res = await api('receipt.pdf', {
          receiptNo
        });

        hideLoad();

        if(res.success && (res.pdfUrl || res.url || res.downloadUrl || res.pdfDownloadUrl)){
          window.open(res.pdfUrl || res.url || res.downloadUrl || res.pdfDownloadUrl, '_blank');
          toast(res.cached ? '已開啟正式收據 PDF' : '正式收據 PDF 已產生','s');
        }else{
          toast(res.message || '取得收據 PDF 失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('取得收據 PDF 失敗：' + e.message,'e');
      }
    }

    async function submitPaymentApply(){
      const amount = Number($('payAmount').value || 0);

      if(!amount || amount <= 0){
        toast('請選擇繳費金額','w');
        return;
      }

      showLoad();

      try{
        const res = await api('payment.apply', {
          memberId:APP.user.memberId || APP.user.id,
          name:APP.user.name,
          phone:APP.user.phone || APP.user.mobile || '',
          amount,
          year:$('payYear').value,
          method:$('payMethod').value,
          date:$('payDate').value,
          note:$('payNote').value.trim()
        });

        hideLoad();

        if(res.success){
          toast('已送出繳費申請，待管理員確認入帳','s');
          loadMyPayments();
        }else{
          toast(res.message || '送出失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('送出失敗：' + e.message,'e');
      }
    }

    async function loadMyPayments(){
      const area = $('myPayList');

      if(!area) return;

      area.innerHTML = `<div class="empty">載入中...</div>`;

      try{
        const res = await api('payment.list', {
          memberId:APP.user.memberId || APP.user.id,
          phone:APP.user.phone || APP.user.mobile || ''
        });

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無繳費紀錄</div>`;
          return;
        }

        area.innerHTML = rows.map(r => {
          const ok = r.status === '已繳費' || r.status === '已確認';
          const rejected = r.status === '已退回';

          return `
            <div class="item">
              <div class="item-h">
                <div>
                  <div class="item-title">${fmtMoney(r.amount)}</div>
                  <div class="item-meta">
                    年度：${esc(r.year || '')}<br>
                    日期：${esc(r.date || '')}<br>
                    方式：${esc(r.method || '')}<br>
                    項目：${esc(r.item || '會費')}<br>
                    到期日：${esc(r.expiryDate || '')}<br>
                    收據：${esc(r.receiptNo || '尚未開立')}<br>
                    備註：${esc(r.note || '')}
                  </div>
                </div>

                <span class="badge ${ok ? 'bs' : rejected ? 'bd' : 'bw'}">
                  ${esc(r.status || '待確認')}
                </span>
              </div>

              ${ok && r.receiptNo ? `
                <div class="item-actions">
                  <button class="btn btn-o mini" onclick="viewReceiptPdf('${jsStr(r.receiptNo)}')">
                    🧾 正式收據 PDF
                  </button>
                </div>
              ` : ''}

              ${!ok && !rejected ? `
                <div class="guide" style="margin-top:10px">
                  此筆繳費尚待管理員核對實際入帳。
                </div>
              ` : ''}

              ${rejected ? `
                <div class="guide" style="margin-top:10px;border-color:#fecaca;background:#fef2f2;color:#991b1b">
                  此筆申請已退回，請確認備註或聯絡協會。
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

      }catch(e){
        area.innerHTML = `<div class="empty danger">載入失敗：${esc(e.message)}</div>`;
      }
    }

    async function loadMembers(){
      const area = $('memberList');

      if(!area) return;

      area.innerHTML = `<div class="empty">會員載入中...</div>`;

      try{
        const res = await api('member.listAll', {
          keyword:$('memberKw')?.value.trim() || ''
        });

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        let rows = res.items || [];
        const kw = $('memberKw')?.value.trim().toLowerCase() || '';

        if(kw){
          rows = rows.filter(m =>
            String(m.name || '').toLowerCase().includes(kw) ||
            String(m.phone || m.mobile || '').includes(kw) ||
            String(m.memberId || m.id || '').toLowerCase().includes(kw)
          );
        }

        if(!rows.length){
          area.innerHTML = `<div class="empty">查無會員</div>`;
          return;
        }

        area.innerHTML = rows.map(m => `
          <div class="item">
            <div class="item-h">
              <div>
                <div class="item-title">${esc(m.name)} <span class="badge bb">${esc(m.type || '會員')}</span></div>
                <div class="item-meta">
                  編號：${esc(m.memberId || m.id || '')}<br>
                  電話：${esc(m.phone || m.mobile || '')}<br>
                  到期日：${esc(m.expiryDate || '尚未啟用')}<br>
                  會費：${fmtMoney(m.totalFee || 0)}｜捐款：${fmtMoney(m.totalDonation || 0)}
                </div>
              </div>
              <span class="badge ${m.isActive ? 'bs' : 'bw'}">${m.isActive ? '有效' : '未啟用 / 逾期'}</span>
            </div>

            <div class="item-actions">
              <button class="btn btn-o mini" onclick="go('memberDetail',{id:'${jsStr(m.memberId || m.id)}'})">查看 / 編輯</button>
              <button class="btn btn-w mini" onclick="openAdminAddPayment('${jsStr(m.memberId || m.id)}','${jsStr(m.name)}')">登錄會費</button>

    async function renderAccountManage(){
      if(!adminGuard()) return;

      setMain(`

          <div class="row">

    async function loadAccountList(){
      const area = $('accountListArea');

      try{
        const res = await api('account.list', {});

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        APP.accounts = res.items || [];

        if(!APP.accounts.length){
          area.innerHTML = `<div class="empty">尚無帳戶</div>`;
          return;
        }

        area.innerHTML = APP.accounts.map(a => `
          <div class="item">
            <div class="item-title">${esc(a.name)}</div>
            <div class="item-meta">
              銀行：${esc(a.bankName || '')}｜${esc(a.bankCode || '')}<br>
              帳號：${esc(a.accountNo || '')}<br>
              戶名：${esc(a.holder || '')}<br>
              餘額：<span class="money">${fmtMoney(a.balance || 0)}</span>
            </div>
          </div>
        `).join('');
      }catch(e){
        area.innerHTML = `<div class="empty danger">載入失敗：${esc(e.message)}</div>`;
      }
    }

    function openAddAccount(){

        <div class="fg"><label class="flabel">銀行名稱</label><input id="aaBankName" class="fc"></div>
        <div class="fg"><label class="flabel">銀行代號</label><input id="aaBankCode" class="fc"></div>

    /*******************************************************
     * 24. 財務報表
     *******************************************************/

    function renderReportCenter(){
      if(!adminGuard()) return;

      setMain(`
        <section class="card">
          <div class="card-title"><span>📈 財務報表</span></div>

          ${guideBox('報表說明', [
            '收入統計已登錄收入。',
            '支出只統計已撥款支出。',
            '本報表供內部管理參考，正式報表仍建議由會計師確認。'
          ])}

          <div class="row">
            <select id="rpYear" class="fc">${yearOptions()}</select>
            <select id="rpMonth" class="fc">${monthOptions('')}</select>
          </div>

          <button class="btn btn-p" onclick="loadFinanceReport()">查詢報表</button>
          <button class="btn btn-o" onclick="exportFinanceReport()">匯出 CSV</button>

          <div id="reportArea" style="margin-top:12px">
            <div class="empty">請查詢報表</div>
          </div>
        </section>
      `);

      loadFinanceReport();
    }

    async function loadFinanceReport(){
      const area = $('reportArea');

      try{
        const res = await api('finance.report', {
          year:$('rpYear').value,
          month:$('rpMonth').value || null
        });

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '查詢失敗')}</div>`;
          return;
        }

        const r = res.report || {};

        const incomeRows = Object.entries(r.incomeBySubject || {}).map(([k,v]) => `
          <div class="item">
            <div class="item-h">
              <div class="item-title">${esc(k)}</div>
              <div class="money">${fmtMoney(v)}</div>
            </div>
          </div>
        `).join('');

        const expenseRows = Object.entries(r.expenseBySubject || {}).map(([k,v]) => `
          <div class="item">
            <div class="item-h">
              <div class="item-title">${esc(k)}</div>
              <div class="danger">${fmtMoney(v)}</div>
            </div>
          </div>
        `).join('');

        area.innerHTML = `
          <div class="grid">
            <div class="stat green"><div class="k">收入合計</div><div class="v" style="font-size:22px">${fmtMoney(r.totalIncome || 0)}</div></div>
            <div class="stat red"><div class="k">支出合計</div><div class="v" style="font-size:22px">${fmtMoney(r.totalExpense || 0)}</div></div>
            <div class="stat blue"><div class="k">本期餘額</div><div class="v" style="font-size:22px">${fmtMoney(r.netBalance || 0)}</div></div>
          </div>

          <div class="card" style="box-shadow:none;margin-top:12px">
            <div class="card-title"><span>收入分類</span></div>
            ${incomeRows || '<div class="empty">無收入</div>'}
          </div>

          <div class="card" style="box-shadow:none;margin-top:12px">
            <div class="card-title"><span>支出分類</span></div>
            ${expenseRows || '<div class="empty">無支出</div>'}
          </div>
        `;

      }catch(e){
        area.innerHTML = `<div class="empty danger">查詢失敗：${esc(e.message)}</div>`;
      }
    }

    async function exportFinanceReport(){
      showLoad();

      try{
        const res = await api('finance.exportCsv', {
          year:$('rpYear').value,
          month:$('rpMonth').value || null
        });

        hideLoad();

        if(res.success && res.csvUrl){
          window.open(res.csvUrl, '_blank');
          toast('CSV 已產生','s');
        }else{
          toast(res.message || '匯出失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('匯出失敗：' + e.message,'e');
      }
    }

    /*******************************************************
     * 26. 相容函式：若後端未開 member.get，退回搜尋
     *******************************************************/

    async function safeGetMember(id){
      try{
        const res = await api('member.get', { memberId:id, id });
        if(res.success) return res.member || res.item;
      }catch(e){}

      const list = await api('member.listAll', {});
      const rows = list.items || [];
      return rows.find(x => String(x.memberId || x.id) === String(id));
    }


    /*******************************************************
     * 27. 若後端缺少 member.get 的臨時前端容錯
     *******************************************************/

    const _oldRenderMemberDetail = renderMemberDetail;

    renderMemberDetail = async function(params){
      if(!adminGuard()) return;

      const id = params.id;

      setMain(`<section class="card"><div class="empty">會員資料載入中...</div></section>`);

      try{
        const m = await safeGetMember(id);

        if(!m){
          setMain(`<section class="card"><div class="empty danger">找不到會員</div></section>`);
          return;
        }

        setMain(`
          <section class="card">
            <div class="card-title">
              <span>會員詳細資料</span>
              <span class="badge ${m.isActive ? 'bs' : 'bw'}">${m.isActive ? '有效' : '未啟用 / 逾期'}</span>
            </div>

            <div class="fg"><label class="flabel">姓名</label><input id="mdName" class="fc" value="${esc(m.name || '')}"></div>
            <div class="fg"><label class="flabel">手機</label><input id="mdPhone" class="fc" value="${esc(m.phone || m.mobile || '')}"></div>
            <div class="fg"><label class="flabel">會員類型</label><input id="mdType" class="fc" value="${esc(m.type || '')}"></div>
            <div class="fg"><label class="flabel">到期日</label><input id="mdExpiry" type="date" class="fc" value="${esc(m.expiryDate || '')}"></div>
            <div class="fg"><label class="flabel">Email</label><input id="mdEmail" class="fc" value="${esc(m.email || '')}"></div>
            <div class="fg"><label class="flabel">地址</label><input id="mdAddress" class="fc" value="${esc(m.address || '')}"></div>

            <button class="btn btn-s" onclick="submitAdminUpdateMember('${jsStr(m.memberId || m.id)}')">儲存修改</button>
            <button class="btn btn-o" onclick="openAdminAddPayment('${jsStr(m.memberId || m.id)}','${jsStr(m.name)}')">登錄會費</button>
            <button class="btn btn-o" onclick="openAdminAddDonation('${jsStr(m.memberId || m.id)}','${jsStr(m.name)}')">登錄捐款</button>
          </section>
        `);

      }catch(e){
        setMain(`<section class="card"><div class="empty danger">載入失敗：${esc(e.message)}</div></section>`);
      }
    };
