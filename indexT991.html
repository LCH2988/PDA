<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>台灣帕金森病友權益促進會｜會員會務財務系統</title>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --line:#e5e7eb;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --soft:#eff6ff;
      --success:#16a34a;
      --warn:#f59e0b;
      --danger:#dc2626;
      --purple:#7c3aed;
      --pink:#db2777;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:18px;
      --radius2:24px;
      --safe-bottom:env(safe-area-inset-bottom);
      --header-h:64px;
      --nav-h:74px;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-text-size-adjust:100%;
    }

    body{
      padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px);
    }

    button,input,select,textarea{
      font-family:inherit;
      font-size:16px;
    }

    button{
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .app{
      min-height:100vh;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      height:var(--header-h);
      background:linear-gradient(135deg,#1d4ed8,#2563eb,#38bdf8);
      color:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 14px;
      box-shadow:0 8px 22px rgba(37,99,235,.22);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:40px;
      height:40px;
      border-radius:14px;
      background:rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:23px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.28);
      flex:0 0 auto;
    }

    .brand-text{
      min-width:0;
    }

    .brand-title{
      font-weight:900;
      font-size:15px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:230px;
    }

    .brand-sub{
      font-size:11px;
      opacity:.9;
      margin-top:2px;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .top-btn{
      border:0;
      background:rgba(255,255,255,.18);
      color:white;
      border-radius:999px;
      padding:8px 10px;
      font-size:13px;
      font-weight:800;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
      padding:14px;
    }

    .hero{
      background:linear-gradient(135deg,#ffffff,#eff6ff);
      border-radius:var(--radius2);
      padding:18px;
      box-shadow:var(--shadow);
      border:1px solid rgba(37,99,235,.08);
      margin-bottom:14px;
    }

    .hero h1{
      margin:0;
      font-size:22px;
      line-height:1.25;
    }

    .hero p{
      margin:8px 0 0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      border:1px solid rgba(15,23,42,.05);
      margin-bottom:14px;
    }

    .card-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      font-weight:900;
      font-size:18px;
      margin-bottom:12px;
    }

    .card-title small{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .grid3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    .stat{
      border-radius:16px;
      background:#f8fafc;
      border:1px solid var(--line);
      padding:12px;
    }

    .stat .k{
      font-size:12px;
      color:var(--muted);
    }

    .stat .v{
      font-size:22px;
      font-weight:950;
      margin-top:4px;
    }

    .stat.blue{background:#eff6ff;border-color:#bfdbfe;}
    .stat.green{background:#f0fdf4;border-color:#bbf7d0;}
    .stat.orange{background:#fffbeb;border-color:#fde68a;}
    .stat.red{background:#fef2f2;border-color:#fecaca;}
    .stat.purple{background:#f5f3ff;border-color:#ddd6fe;}

    .fg{
      margin-bottom:12px;
    }

    .flabel{
      display:block;
      font-weight:850;
      font-size:14px;
      margin-bottom:6px;
    }

    .req{
      color:var(--danger);
      margin-left:3px;
    }

    .fc{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      background:white;
      color:var(--text);
      outline:none;
      min-height:46px;
    }

    textarea.fc{
      min-height:96px;
      resize:vertical;
      line-height:1.6;
    }

    .fc:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.1);
    }

    .btn{
      width:100%;
      min-height:48px;
      border:0;
      border-radius:15px;
      font-weight:900;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:11px 14px;
      margin:5px 0;
      transition:.16s;
    }

    .btn:active{
      transform:scale(.985);
    }

    .btn-p{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:white;
    }

    .btn-s{
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:white;
    }

    .btn-w{
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:white;
    }

    .btn-d{
      background:linear-gradient(135deg,#dc2626,#b91c1c);
      color:white;
    }

    .btn-o{
      background:white;
      color:var(--primary);
      border:1px solid #bfdbfe;
    }

    .btn-g{
      background:#f8fafc;
      color:#374151;
      border:1px solid var(--line);
    }

    .row{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .row > *{
      flex:1;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:5px 9px;
      background:#f1f5f9;
      color:#475569;
      font-size:12px;
      font-weight:800;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:4px 8px;
      font-size:12px;
      font-weight:900;
      white-space:nowrap;
    }

    .bs{background:#dcfce7;color:#166534;}
    .bw{background:#fef3c7;color:#92400e;}
    .bd{background:#fee2e2;color:#991b1b;}
    .bb{background:#dbeafe;color:#1e40af;}
    .bp{background:#ede9fe;color:#5b21b6;}

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      background:#fff;
    }

    .item-h{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:6px;
    }

    .item-title{
      font-weight:950;
      font-size:15px;
      line-height:1.4;
    }

    .item-meta{
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
      margin-top:4px;
    }

    .item-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .mini{
      width:auto;
      min-height:36px;
      border-radius:12px;
      padding:7px 11px;
      font-size:13px;
      margin:0;
      flex:0 0 auto;
    }

    .muted{
      color:var(--muted);
    }

    .tc{
      text-align:center;
    }

    .money{
      font-weight:950;
      color:#0f766e;
    }

    .danger{
      color:var(--danger);
    }

    .success{
      color:var(--success);
    }

    .warn{
      color:var(--warn);
    }

    .empty{
      color:var(--muted);
      text-align:center;
      padding:28px 8px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:#f8fafc;
    }

    .guide{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      margin-bottom:12px;
      color:#374151;
      font-size:14px;
      line-height:1.7;
    }

    .guide b{
      color:#1d4ed8;
    }

    .guide ul{
      margin:6px 0 0 18px;
      padding:0;
    }

    .tabs{
      display:flex;
      gap:8px;
      overflow:auto;
      padding-bottom:8px;
      margin-bottom:12px;
      -webkit-overflow-scrolling:touch;
    }

    .tab{
      white-space:nowrap;
      border:1px solid var(--line);
      background:white;
      color:#374151;
      border-radius:999px;
      padding:8px 12px;
      font-weight:900;
      font-size:13px;
    }

    .tab.active{
      background:var(--primary);
      border-color:var(--primary);
      color:white;
    }

    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:60;
      height:calc(var(--nav-h) + var(--safe-bottom));
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(14px);
      border-top:1px solid var(--line);
      display:flex;
      justify-content:center;
      padding-bottom:var(--safe-bottom);
      box-shadow:0 -8px 24px rgba(15,23,42,.08);
    }

    .nav-inner{
      width:100%;
      max-width:760px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:2px;
      padding:7px 8px 8px;
    }

    .nitem{
      border:0;
      background:transparent;
      color:#64748b;
      border-radius:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      font-size:11px;
      font-weight:850;
      min-width:0;
    }

    .nitem .ico{
      font-size:20px;
      line-height:1;
    }

    .nitem.active{
      background:#eff6ff;
      color:#1d4ed8;
    }

    .modal-mask{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(15,23,42,.48);
      display:none;
      align-items:flex-end;
      justify-content:center;
    }

    .modal-mask.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:760px;
      max-height:88vh;
      overflow:auto;
      background:#fff;
      border-radius:24px 24px 0 0;
      padding:16px 16px calc(18px + var(--safe-bottom));
      box-shadow:0 -16px 40px rgba(0,0,0,.2);
    }

    .mtitle{
      font-size:19px;
      font-weight:950;
      margin-bottom:12px;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:calc(var(--nav-h) + var(--safe-bottom) + 18px);
      transform:translateX(-50%);
      z-index:120;
      background:#111827;
      color:white;
      border-radius:999px;
      padding:11px 16px;
      font-weight:850;
      font-size:14px;
      box-shadow:0 8px 24px rgba(0,0,0,.18);
      display:none;
      max-width:90%;
      text-align:center;
    }

    .toast.show{
      display:block;
    }

    .toast.s{
      background:#166534;
    }

    .toast.e{
      background:#991b1b;
    }

    .toast.w{
      background:#92400e;
    }

    .loader{
      position:fixed;
      inset:0;
      z-index:110;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(6px);
    }

    .loader.show{
      display:flex;
    }

    .spinner{
      width:48px;
      height:48px;
      border-radius:50%;
      border:5px solid #bfdbfe;
      border-top-color:#2563eb;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    .report-head{
      text-align:center;
      margin-bottom:16px;
    }

    .report-head h2{
      margin:0;
      font-size:18px;
    }

    .report-head h3{
      margin:8px 0 4px;
      font-size:20px;
    }

    .report-table{
      width:100%;
      border-collapse:collapse;
      font-size:13px;
      background:white;
    }

    .report-table th,
    .report-table td{
      border:1px solid var(--line);
      padding:8px;
      text-align:left;
      vertical-align:top;
    }

    .report-table th{
      background:#f8fafc;
      font-weight:950;
    }

    .nowrap{
      white-space:nowrap;
    }

    .hide{
      display:none!important;
    }

    @media (min-width:720px){
      .brand-title{
        max-width:420px;
      }
      .modal{
        border-radius:24px;
        margin-bottom:30px;
      }
      .modal-mask{
        align-items:center;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div class="brand" onclick="go('home')">
        <div class="logo">🌿</div>
        <div class="brand-text">
          <div class="brand-title">台灣帕金森病友權益促進會</div>
          <div class="brand-sub" id="topSub">會員・會務・財務管理系統</div>
        </div>
      </div>

      <div class="top-actions">
        <button id="backBtn" class="top-btn hide" onclick="goBack()">返回</button>
        <button id="loginBtn" class="top-btn" onclick="openLogin()">登入</button>
      </div>
    </header>

    <main id="main" class="wrap"></main>

    <nav class="bottom-nav">
      <div class="nav-inner">
        <button id="navHome" class="nitem active" onclick="go('home')">
          <span class="ico">🏠</span>
          <span>首頁</span>
        </button>
        <button id="navNews" class="nitem" onclick="go('announcements')">
          <span class="ico">📢</span>
          <span>公告</span>
        </button>
        <button id="navMember" class="nitem" onclick="go('memberCenter')">
          <span class="ico">👤</span>
          <span>會員</span>
        </button>
        <button id="navPay" class="nitem" onclick="go('myPayments')">
          <span class="ico">💳</span>
          <span>繳費</span>
        </button>
        <button id="navAdmin" class="nitem" onclick="enterAdmin()">
          <span class="ico">⚙️</span>
          <span>管理</span>
        </button>
      </div>
    </nav>
  </div>

  <div id="modalMask" class="modal-mask" onclick="maskClose(event)">
    <div id="modal" class="modal"></div>
  </div>

  <div id="toast" class="toast"></div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
  </div>

  <script>
    /*******************************************************
     * 1. 基本設定
     *******************************************************/

    /**
     * 同一個 Apps Script Web App 內使用可留空。
     * 外部前端請填入 /exec URL。
     */
    const API_BASE = 'https://script.google.com/macros/s/AKfycbxzJP2nd0DtjNHepPrwS3j00M6nKhO27I-GA257-fn0IYTn28eNTrakYgVaze-JiRg_/exec';

    const ORG_NAME = '社團法人台灣帕金森病友權益促進會';

    const APP = {
      user:null,
      page:'home',
      history:[],
      _params:{},
      isAdminVerified:false,
      subjects:[],
      accounts:[],
      projects:[]
    };

    const NAV_MAP = {
      home:'navHome',
      announcements:'navNews',
      memberCenter:'navMember',
      myPayments:'navPay',
      adminHome:'navAdmin'
    };


    /*******************************************************
     * 2. API 工具
     *******************************************************/

    async function api(action, data = {}){
      const payload = {
        action,
        data:{
          ...data,
          operator:data.operator || APP.user?.name || '',
          operatorId:data.operatorId || APP.user?.memberId || APP.user?.id || ''
        }
      };

      const url = API_BASE || location.href.split('?')[0];

      const res = await fetch(url, {
        method:'POST',
        headers:{
          'Content-Type':'text/plain;charset=utf-8'
        },
        body:JSON.stringify(payload)
      });

      const text = await res.text();

      try{
        return JSON.parse(text);
      }catch(e){
        throw new Error('API 回傳格式錯誤：' + text.slice(0,200));
      }
    }


    /*******************************************************
     * 3. 共用 UI 工具
     *******************************************************/

    function $(id){
      return document.getElementById(id);
    }

    function esc(s){
      return String(s == null ? '' : s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function jsStr(s){
      return String(s == null ? '' : s)
        .replace(/\\/g,'\\\\')
        .replace(/'/g,"\\'")
        .replace(/\n/g,'\\n')
        .replace(/\r/g,'');
    }

    function fmtMoney(n){
      return 'NT$' + Number(n || 0).toLocaleString('zh-TW');
    }

    function today(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function showLoad(){
      $('loader')?.classList.add('show');
    }

    function hideLoad(){
      $('loader')?.classList.remove('show');
    }

    function toast(msg, type){
      const el = $('toast');
      el.textContent = msg || '';
      el.className = 'toast show ' + (type || '');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        el.className = 'toast';
      }, 2600);
    }

    function setMain(html){
      $('main').innerHTML = html;
      window.scrollTo(0,0);
    }

    function openModal(html){
      $('modal').innerHTML = html;
      $('modalMask').classList.add('show');
    }

    function closeModal(){
      $('modalMask').classList.remove('show');
      $('modal').innerHTML = '';
    }

    function maskClose(e){
      if(e.target.id === 'modalMask'){
        closeModal();
      }
    }

    function confirmCritical(msg){
      return confirm(msg || '確定執行此操作？');
    }

    function requireInput(id, label){
      const el = $(id);
      const v = el ? el.value.trim() : '';

      if(!v){
        toast('請填寫：' + label, 'w');
        el?.focus();
        return '';
      }

      return v;
    }

    function requireAmount(id, label){
      const el = $(id);
      const n = Number(el ? el.value : 0);

      if(!n || n <= 0){
        toast((label || '金額') + '必須大於 0', 'w');
        el?.focus();
        return 0;
      }

      return n;
    }

    function guideBox(title, arr){
      return `
        <div class="guide">
          <b>${esc(title)}</b>
          <ul>
            ${(arr || []).map(x => `<li>${esc(x)}</li>`).join('')}
          </ul>
        </div>
      `;
    }

    function simpleReportTable(headers, rows){
      return `
        <div style="overflow:auto">
          <table class="report-table">
            <thead>
              <tr>${(headers || []).map(h => `<th>${esc(h)}</th>`).join('')}</tr>
            </thead>
            <tbody>
              ${(rows || []).map(r => `
                <tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function showBack(show){
      $('backBtn')?.classList.toggle('hide', !show);
    }

    function updateLoginButton(){
      const btn = $('loginBtn');

      if(!btn) return;

      if(APP.user){
        btn.textContent = '登出';
        btn.onclick = logout;
        $('topSub').textContent = `${APP.user.name || ''}｜${APP.user.type || '會員'}`;
      }else{
        btn.textContent = '登入';
        btn.onclick = openLogin;
        $('topSub').textContent = '會員・會務・財務管理系統';
      }
    }

    function saveSession(){
      localStorage.setItem('parkUser', JSON.stringify(APP.user || null));
      localStorage.setItem('parkAdminVerified', APP.isAdminVerified ? 'Y' : '');
    }

    function loadSession(){
      try{
        const u = JSON.parse(localStorage.getItem('parkUser') || 'null');
        APP.user = u;
        APP.isAdminVerified = localStorage.getItem('parkAdminVerified') === 'Y';
      }catch(e){
        APP.user = null;
        APP.isAdminVerified = false;
      }
    }

    function logout(){
      if(!confirm('確定登出？')) return;

      APP.user = null;
      APP.isAdminVerified = false;
      localStorage.removeItem('parkUser');
      localStorage.removeItem('parkAdminVerified');
      updateLoginButton();
      toast('已登出','s');

    function go(page, params = {}, push = true){
      if(push && APP.page && APP.page !== page){
        APP.history.push({
          page:APP.page,
          params:APP._params || {}
        });
      }

      APP.page = page;
      APP._params = params || {};

      document.querySelectorAll('.nitem').forEach(el => el.classList.remove('active'));

      const navId = NAV_MAP[page];

      if(navId){
        $(navId)?.classList.add('active');
      }

      showBack(APP.history.length > 0);

      const fn = ROUTES[page];

      if(fn){
        fn(params || {});
      }else{
        setMain(`<div class="card tc">尚未建立頁面：${esc(page)}</div>`);
      }
    }

    function goBack(){
      if(!APP.history.length) return;

      const prev = APP.history.pop();

      APP.page = prev.page;
      APP._params = prev.params || {};

      document.querySelectorAll('.nitem').forEach(el => el.classList.remove('active'));

      const navId = NAV_MAP[prev.page];

      if(navId){
        $(navId)?.classList.add('active');
      }

      showBack(APP.history.length > 0);

      const fn = ROUTES[prev.page];

      if(fn){
        fn(prev.params || {});
      }else{
        setMain(`<div class="card tc">尚未建立頁面：${esc(prev.page)}</div>`);
      }
    }

     *******************************************************/

    async function loadBaseOptions(){
      try{
        const [sub, acc, proj] = await Promise.all([
          api('subject.list', {}),
          APP.isAdminVerified ? api('account.list', {}) : Promise.resolve({success:true,items:[]}),
          APP.isAdminVerified ? api('project.list', {}) : Promise.resolve({success:true,items:[]})
        ]);

        if(sub.success) APP.subjects = sub.items || [];
        if(acc.success) APP.accounts = acc.items || [];
        if(proj.success) APP.projects = proj.items || [];

      }catch(e){
        // 不中斷主流程
      }
    }

    function subjectOptions(type){
      let rows = APP.subjects || [];

      if(type){
        rows = rows.filter(x => String(x.type || '').includes(type));
      }

      return rows.map(x => `<option value="${esc(x.code)}">${esc(x.code)} ${esc(x.name)}</option>`).join('');
    }

    function accountOptions(){
      return (APP.accounts || []).map(x => `
        <option value="${esc(x.accountId || x.id)}">${esc(x.name)}｜${fmtMoney(x.balance || 0)}</option>
      `).join('');
    }

    function projectOptions(){
      return (APP.projects || []).map(x => `
        <option value="${esc(x.projectId || x.id)}">${esc(x.name)}</option>
      `).join('');
    }

        }catch(e){}
      }

      go('home',{},false);
    });

    async function loadExpenseList(){
      const area = $('expenseList');

      try{
        const res = await api('finance.expenseList', {
          status:$('expStatus')?.value || ''
        });

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">沒有支出資料</div>`;
          return;
        }

        area.innerHTML = rows.map(r => `
          <div class="item">
            <div class="item-h">
              <div>
                <div class="item-title">${esc(r.subjectName || '支出')}｜${fmtMoney(r.amount)}</div>
                <div class="item-meta">
                  日期：${esc(r.date)}<br>
                  用途：${esc(r.description || '')}<br>
                  受款人：${esc(r.payee || '')}<br>
                  專案：${esc(r.projectName || '')}<br>
                  傳票：${esc(r.voucherNo || '尚未建立')}
                </div>
              </div>
              <span class="badge ${expenseBadge(r.status)}">${esc(r.status)}</span>
            </div>

            ${r.attachmentUrl ? `<div class="item-meta">附件：<a href="${esc(r.attachmentUrl)}" target="_blank">開啟附件</a></div>` : ''}

            <div class="item-actions">
              ${r.status === '待核准' ? `
                <button class="btn btn-s mini" onclick="approveExpense('${jsStr(r.id)}')">核准</button>
                <button class="btn btn-d mini" onclick="openRejectExpense('${jsStr(r.id)}')">退回</button>
              ` : ''}
              ${r.status === '已核准' ? `
                <button class="btn btn-p mini" onclick="confirmExpensePaid('${jsStr(r.id)}')">確認撥款</button>
              ` : ''}
            </div>
          </div>
        `).join('');

      }catch(e){
        area.innerHTML = `<div class="empty danger">載入失敗：${esc(e.message)}</div>`;
      }
    }

    function expenseBadge(status){
      if(status === '已撥款') return 'bs';
      if(status === '已核准') return 'bb';
      if(status === '已退回') return 'bd';
      return 'bw';
    }

          return;
        }

        area.innerHTML = rows.map(r => {
          const budget = Number(r.budgetAmt || r.budgetAmount || r.amount || 0);
          const used = Number(r.usedAmt || r.actualAmount || 0);
          const rate = budget ? Math.round(used / budget * 100) : 0;

          return `
            <div class="item">
              <div class="item-title">${esc(r.subjectCode || '')} ${esc(r.subjectName || '')}</div>
              <div class="item-meta">
                專案：${esc(r.projectName || '一般預算')}<br>
                預算：${fmtMoney(budget)}<br>
                已用：${fmtMoney(used)}<br>
                剩餘：${fmtMoney(budget - used)}<br>
                執行率：${rate}%
              </div>
            </div>
          `;
        }).join('');

      }catch(e){
        area.innerHTML = `<div class="empty danger">載入失敗：${esc(e.message)}</div>`;
      }
    }

    function selectReportTab(btn, type){
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));

      APP.currentReport = type;
    }

    async function loadSelectedReport(){
      const type = APP.currentReport || 'incomeExpense';
      const year = $('rpYear').value;
      const month = $('rpMonth').value;
      const area = $('reportArea');

      area.innerHTML = `<div class="empty">報表產生中...</div>`;

      const actionMap = {
        incomeExpense:'report.incomeExpense',
        detailLedger:'report.detailLedger',
        entries:'report.entries',
        budgetFinal:'report.budgetFinal',
        fundraising:'report.fundraising',
        bankReconcile:'report.bankReconcile',
        balanceSheet:'report.balanceSheet',
        netAsset:'report.netAsset',
        cashFlow:'report.cashFlow'
      };

      try{
        const res = await api(actionMap[type], { year, month });

        if(!res.success){
          area.innerHTML = `<div class="empty danger">${esc(res.message || '報表產生失敗')}</div>`;
          return;
        }

        area.innerHTML = renderReportByType(type, res, year, month);

      }catch(e){
        area.innerHTML = `<div class="empty danger">報表產生失敗：${esc(e.message)}</div>`;
      }
    }

    function reportTitle(type){
      const map = {
        incomeExpense:'收支餘絀表',
        detailLedger:'明細分類帳',
        entries:'收支分錄表',
        budgetFinal:'預算決算比較表',
        fundraising:'勸募收支報告',
        bankReconcile:'銀行調節表',
        balanceSheet:'資產負債表',
        netAsset:'淨資產變動表',
        cashFlow:'現金流量表'
      };

      return map[type] || '財務報表';
    }

    function periodText(year, month){
      return month ? `${year} 年 ${month} 月` : `${year} 年度`;
    }

    function renderReportShell(title, period, inner){
      return `
        <div class="report-head">
          <h2>${ORG_NAME}</h2>
          <h3>${esc(title)}</h3>
          <p>期間：${esc(period)}</p>
          <p>產製日期：${today()}</p>
        </div>
        ${inner}
      `;
    }

    function renderReportByType(type, res, year, month){
      if(type === 'incomeExpense'){
        const r = res.report || {};
        const incomes = r.incomes || [];
        const expenses = r.expenses || [];

        const rows = [
          ...incomes.map(x => ['收入', esc(x.subjectName || x.name || ''), fmtMoney(x.amount)]),
          ['收入合計','',fmtMoney(r.summary?.incomeTotal || 0)],
          ...expenses.map(x => ['支出', esc(x.subjectName || x.name || ''), fmtMoney(x.amount)]),
          ['支出合計','',fmtMoney(r.summary?.expenseTotal || 0)],
          ['本期餘絀','',fmtMoney(r.summary?.surplus || 0)]
        ];

        return renderReportShell(reportTitle(type), r.period || periodText(year, month),
          simpleReportTable(['類型','項目','金額'], rows)
        );
      }

      if(type === 'detailLedger'){
        const rows = (res.items || []).map(x => [
          esc(x.date),
          esc(x.subjectCode || ''),
          esc(x.subjectName || ''),
          esc(x.description || x.summary || ''),
          fmtMoney(x.income || 0),
          fmtMoney(x.expense || 0),
          fmtMoney(x.balance || 0),
          esc(x.voucherNo || '')
        ]);

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['日期','科目代號','科目名稱','摘要','收入','支出','餘額','憑證'], rows)
        );
      }

      if(type === 'entries'){
        const rows = (res.items || []).map(x => [
          esc(x.date),
          esc(x.voucherNo || ''),
          esc(x.subjectName || ''),
          esc(x.description || ''),
          fmtMoney(x.debit || 0),
          fmtMoney(x.credit || 0)
        ]);

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['日期','憑證','科目','摘要','借方','貸方'], rows)
        );
      }

      if(type === 'budgetFinal'){
        const rows = (res.items || []).map(x => [
          esc(x.subjectCode || ''),
          esc(x.subjectName || ''),
          esc(x.projectName || ''),
          fmtMoney(x.budgetAmount || 0),
          fmtMoney(x.actualAmount || 0),
          fmtMoney(x.diffAmount || 0),
          esc((x.rate || 0) + '%')
        ]);

        return renderReportShell(reportTitle(type), `${year} 年度`,
          simpleReportTable(['科目代號','科目名稱','專案','預算','實際','差異','執行率'], rows)
        );
      }

      if(type === 'fundraising'){
        const rows = (res.items || []).map(x => [
          esc(x.date),
          esc(x.item || ''),
          esc(x.description || ''),
          fmtMoney(x.income || 0),
          fmtMoney(x.expense || 0),
          fmtMoney(x.balance || 0),
          esc(x.note || '')
        ]);

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['日期','項目','說明','收入','支出','餘額','備註'], rows)
        );
      }

      if(type === 'bankReconcile'){
        const r = res.report || {};
        const rows = [
          ['系統帳面餘額', fmtMoney(r.bookBalance || 0)],
          ['銀行實際餘額', fmtMoney(r.bankBalance || 0)],
          ['差異', fmtMoney((r.bankBalance || 0) - (r.bookBalance || 0))]
        ];

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['項目','金額'], rows)
        );
      }

      if(type === 'balanceSheet'){
        const r = res.report || {};
        const rows = [
          ['資產','',''],
          ...(r.assets || []).map(x => [esc(x.name || x.subjectName || ''),'',fmtMoney(x.amount || 0)]),
          ['負債','',''],
          ...(r.liabilities || []).map(x => [esc(x.name || x.subjectName || ''),'',fmtMoney(x.amount || 0)]),
          ['淨資產','',''],
          ...(r.netAssets || []).map(x => [esc(x.name || x.subjectName || ''),'',fmtMoney(x.amount || 0)])
        ];

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['類別','說明','金額'], rows)
        );
      }

      if(type === 'netAsset'){
        const rows = (res.items || []).map(x => [
          esc(x.item || ''),
          fmtMoney(x.amount || 0),
          esc(x.note || '')
        ]);

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['項目','金額','備註'], rows)
        );
      }

      if(type === 'cashFlow'){
        const rows = (res.items || []).map(x => [
          esc(x.item || ''),
          fmtMoney(x.inflow || 0),
          fmtMoney(x.outflow || 0),
          esc(x.note || '')
        ]);

        return renderReportShell(reportTitle(type), periodText(year, month),
          simpleReportTable(['項目','流入','流出','備註'], rows)
        );
      }

      return `<div class="empty">尚未支援此報表</div>`;
    }

          ${guideBox('系統設定提醒', [
            '正式上線前請務必修改預設管理 PIN。',
            '初始化會建立資料表、預設設定、會計科目與帳戶。',
            '若已有資料，初始化只會補齊缺少的欄位或預設資料。'
          ])}

          <div class="fg">
            <label class="flabel">新的管理 PIN</label>
            <input id="newPin1" class="fc" type="password" placeholder="至少 4 碼">
          </div>

          <div class="fg">
            <label class="flabel">再次輸入管理 PIN</label>
            <input id="newPin2" class="fc" type="password">
          </div>

          <button class="btn btn-p" onclick="updateAdminPin()">更新管理 PIN</button>

          <hr style="border:0;border-top:1px solid var(--line);margin:16px 0">

          <button class="btn btn-o" onclick="systemInit()">初始化 / 補齊資料表</button>
          <button class="btn btn-o" onclick="initDefaultSubjects()">建立預設會計科目</button>
          <button class="btn btn-o" onclick="initDefaultAccount()">建立預設帳戶</button>

          <div class="guide" style="margin-top:12px">
            <b>部署提醒</b>
            <ul>
              <li>Apps Script Web App 執行身分建議選「我」。</li>
              <li>存取權限依實際需求設定；若會員需公開使用，可設任何人。</li>
              <li>Google Sheet 權限請限制在授權管理人員。</li>
            </ul>
          </div>
        </section>
      `);
    }

    async function updateAdminPin(){
      const p1 = requireInput('newPin1','新的管理 PIN');
      const p2 = requireInput('newPin2','再次輸入管理 PIN');

      if(!p1 || !p2) return;

      if(p1 !== p2){
        toast('兩次 PIN 不一致','w');
        return;
      }

      if(p1.length < 4){
        toast('管理 PIN 至少 4 碼','w');
        return;
      }

      showLoad();

      try{
        const res = await api('config.updateAdminPin', {
          pin:p1
        });

        hideLoad();

        if(res.success){
          toast('管理 PIN 已更新','s');
          $('newPin1').value = '';
          $('newPin2').value = '';
        }else{
          toast(res.message || '更新失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('更新失敗：' + e.message,'e');
      }
    }

    async function systemInit(){
      if(!confirmCritical('確定初始化 / 補齊資料表？')) return;

      showLoad();

      try{
        const res = await api('system.init', {});

        hideLoad();

        if(res.success){
          toast('系統初始化完成','s');
        }else{
          toast(res.message || '初始化失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('初始化失敗：' + e.message,'e');
      }
    }

  </script>
</body>
</html>
