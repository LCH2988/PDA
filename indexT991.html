<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>台灣帕金森病友權益促進會 - 會員會務財務管理系統</title>
  <style>
    /* ===== 字體大小 CSS 變數 ===== */
    :root{
      --fs-base:20px;
      --fs-sm:17px;
      --fs-xs:15px;
      --fs-lg:22px;
      --fs-xl:26px;
      --fs-xxl:30px;
      --fs-title:24px;
      --fs-modal-title:26px;
      --fs-label:20px;
      --fs-input:22px;
      --fs-btn:22px;
      --fs-nav:14px;
      --fs-nav-ico:30px;
      --fs-badge:16px;
      --fs-stat-k:17px;
      --fs-stat-v:28px;
      --fs-item-title:21px;
      --fs-item-meta:18px;
      --fs-module-icon:36px;
      --fs-module-label:18px;
      --fs-notice:18px;
      --fs-section:19px;
      --fs-toast:18px;
      --fs-brand-title:18px;
      --fs-brand-sub:14px;
      --fs-top-btn:17px;
      --btn-h:64px;
      --input-h:62px;
      --nav-h:88px;

      --bg:#f0f4ff;
      --card:#fff;
      --primary:#1a56db;
      --primary-dark:#1341b0;
      --primary-light:#e8efff;
      --success:#15803d;
      --success-light:#dcfce7;
      --warn:#b45309;
      --warn-light:#fef3c7;
      --danger:#b91c1c;
      --danger-light:#fee2e2;
      --purple:#6d28d9;
      --purple-light:#ede9fe;
      --line:#00B900;
      --text:#0f172a; 
      --muted:#475569; 
      --border:#cbd5e1; 
      --radius:20px;
      --shadow:0 4px 24px rgba(30,41,59,.10);
      --safe-b:env(safe-area-inset-bottom);
    }

    body.fs-small{
      --fs-base:17px;--fs-sm:15px;--fs-xs:13px;--fs-lg:19px;--fs-xl:22px;--fs-xxl:26px;
      --fs-title:21px;--fs-modal-title:22px;--fs-label:17px;--fs-input:18px;--fs-btn:18px;
      --fs-nav:12px;--fs-nav-ico:26px;--fs-badge:13px;--fs-stat-k:14px;--fs-stat-v:24px;
      --fs-item-title:18px;--fs-item-meta:16px;--fs-module-icon:30px;--fs-module-label:15px;
      --fs-notice:16px;--fs-section:16px;--fs-toast:16px;--fs-brand-title:16px;--fs-brand-sub:13px;
      --fs-top-btn:15px;--btn-h:54px;--input-h:54px;--nav-h:80px;
    }
    body.fs-medium{
      --fs-base:20px;--fs-sm:17px;--fs-xs:15px;--fs-lg:22px;--fs-xl:26px;--fs-xxl:30px;
      --fs-title:24px;--fs-modal-title:26px;--fs-label:20px;--fs-input:22px;--fs-btn:22px;
      --fs-nav:14px;--fs-nav-ico:30px;--fs-badge:16px;--fs-stat-k:17px;--fs-stat-v:28px;
      --fs-item-title:21px;--fs-item-meta:18px;--fs-module-icon:36px;--fs-module-label:18px;
      --fs-notice:18px;--fs-section:19px;--fs-toast:18px;--fs-brand-title:18px;--fs-brand-sub:14px;
      --fs-top-btn:17px;--btn-h:64px;--input-h:62px;--nav-h:88px;
    }
    body.fs-large{
      --fs-base:23px;--fs-sm:20px;--fs-xs:18px;--fs-lg:26px;--fs-xl:30px;--fs-xxl:36px;
      --fs-title:28px;--fs-modal-title:30px;--fs-label:23px;--fs-input:25px;--fs-btn:25px;
      --fs-nav:16px;--fs-nav-ico:34px;--fs-badge:18px;--fs-stat-k:20px;--fs-stat-v:32px;
      --fs-item-title:24px;--fs-item-meta:21px;--fs-module-icon:42px;--fs-module-label:21px;
      --fs-notice:21px;--fs-section:22px;--fs-toast:21px;--fs-brand-title:20px;--fs-brand-sub:16px;
      --fs-top-btn:19px;--btn-h:72px;--input-h:70px;--nav-h:96px;
    }
    body.fs-xlarge{
      --fs-base:27px;--fs-sm:23px;--fs-xs:21px;--fs-lg:30px;--fs-xl:36px;--fs-xxl:42px;
      --fs-title:32px;--fs-modal-title:34px;--fs-label:27px;--fs-input:29px;--fs-btn:29px;
      --fs-nav:18px;--fs-nav-ico:38px;--fs-badge:21px;--fs-stat-k:23px;--fs-stat-v:36px;
      --fs-item-title:28px;--fs-item-meta:24px;--fs-module-icon:48px;--fs-module-label:24px;
      --fs-notice:24px;--fs-section:25px;--fs-toast:24px;--fs-brand-title:22px;--fs-brand-sub:18px;
      --fs-top-btn:21px;--btn-h:80px;--input-h:78px;--nav-h:104px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      width:100%;min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);color:var(--text);
      font-size:var(--fs-base);line-height:1.8;
    }
    body{padding-bottom:calc(var(--nav-h) + var(--safe-b) + 24px);}
    button,input,select,textarea{font-family:inherit;font-size:var(--fs-input);min-height:48px;} 
    button{cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;}
    a{color:inherit;text-decoration:underline;}

    .font-bar{
      background:#1e293b;color:#fff;
      display:flex;align-items:center;justify-content:center;
      gap:12px;padding:10px 12px;
      font-size:15px;font-weight:700;
      position:sticky;top:0;z-index:55;
    }
    .font-bar .fb-label{font-size:14px;opacity:.9;margin-right:4px;}
    .fs-btn{
      background:rgba(255,255,255,.15);color:#fff;
      border:1.5px solid rgba(255,255,255,.3);
      border-radius:8px;padding:6px 14px;
      font-size:14px;font-weight:900;cursor:pointer;
      min-width:48px;min-height:40px; 
    }
    .fs-btn.active{background:var(--primary);border-color:var(--primary);outline:2px solid #fff;}
    .fs-btn:active{opacity:.7;}

    .topbar{
      position:sticky;top:41px;z-index:50;
      background:linear-gradient(135deg,#1341b0,#1a56db 60%,#2563eb);
      color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;
      box-shadow:0 4px 20px rgba(26,86,219,.3);
      min-height:72px;
    }
    .brand{display:flex;align-items:center;gap:12px;cursor:pointer;}
    .logo{
      width:52px;height:52px;border-radius:14px;
      background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:30px;flex-shrink:0;
      border:2px solid rgba(255,255,255,.3);
    }
    .brand-text .brand-title{font-weight:900;font-size:var(--fs-brand-title);line-height:1.2;}
    .brand-text .brand-sub{font-size:var(--fs-brand-sub);opacity:.9;margin-top:2px;}
    .top-actions{display:flex;gap:8px;}
    .top-btn{
      background:rgba(255,255,255,.2);color:#fff;
      border-radius:999px;padding:10px 18px;
      font-size:var(--fs-top-btn);font-weight:800;
      border:1.5px solid rgba(255,255,255,.35);
      min-height:48px;
    }
    .top-btn:active{opacity:.8;}

    .wrap{max-width:780px;margin:0 auto;padding:16px;}

    .card{
      background:var(--card);border-radius:var(--radius);
      padding:22px;box-shadow:var(--shadow);
      border:1px solid rgba(30,41,59,.12);
      margin-bottom:18px;
    }
    .card-title{
      font-size:var(--fs-title);font-weight:900;
      display:flex;align-items:center;gap:10px;
      margin-bottom:18px;color:var(--text);
    }
    .card-title .icon{font-size:calc(var(--fs-title) + 4px);}
    .card-title .sub{font-size:var(--fs-sm);color:var(--muted);font-weight:600;margin-left:auto;}

    .hero-login{
      background:linear-gradient(160deg,#1341b0,#1a56db 50%,#38bdf8);
      border-radius:var(--radius);
      padding:30px 22px 26px;
      color:#fff;
      margin-bottom:18px;
      box-shadow:0 8px 32px rgba(26,86,219,.25);
    }
    .hero-login .org-logo{
      width:80px;height:80px;border-radius:20px;
      background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:46px;margin:0 auto 16px;
      border:2px solid rgba(255,255,255,.35);
    }
    .hero-login h1{font-size:var(--fs-xl);font-weight:900;text-align:center;line-height:1.4;}
    .hero-login .tagline{
      text-align:center;font-size:var(--fs-lg);opacity:.95;
      margin:10px 0 20px;line-height:1.7;
    }
    .intro-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
      margin-bottom:20px;
    }
    .intro-item{
      background:rgba(255,255,255,.15);
      border-radius:14px;padding:14px;
      border:1px solid rgba(255,255,255,.2);
      text-align:center;
    }
    .intro-item .i-icon{font-size:var(--fs-module-icon);display:block;margin-bottom:6px;}
    .intro-item .i-label{font-size:var(--fs-module-label);font-weight:700;opacity:.95;}
    .bank-info{
      background:rgba(255,255,255,.15);
      border-radius:14px;padding:16px;
      border:1px solid rgba(255,255,255,.2);
      margin-bottom:20px;font-size:var(--fs-sm);
      line-height:2;
    }
    .bank-info b{font-size:var(--fs-base);}

    .btn{
      width:100%;min-height:var(--btn-h);border-radius:16px;
      font-weight:900;font-size:var(--fs-btn);
      display:flex;align-items:center;justify-content:center;gap:10px;
      padding:14px 18px;margin:10px 0;
      transition:transform .12s,box-shadow .12s;
      text-align:center;
    }
    .btn:active{transform:scale(.97);}
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;box-shadow:0 4px 16px rgba(26,86,219,.3);
    }
    .btn-success{
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:#fff;box-shadow:0 4px 16px rgba(21,128,61,.25);
    }
    .btn-warn{
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:#fff;box-shadow:0 4px 16px rgba(217,119,6,.25);
    }
    .btn-danger{
      background:linear-gradient(135deg,#dc2626,#b91c1c);
      color:#fff;
    }
    .btn-line{
      background:linear-gradient(135deg,#00B900,#009900);
      color:#fff;box-shadow:0 4px 16px rgba(0,185,0,.25);
    }
    .btn-outline{
      background:#fff;color:var(--primary);
      border:2.5px solid #bfdbfe;
    }
    .btn-ghost{
      background:#f1f5f9;color:#1e293b;
      border:1.5px solid var(--border);
    }
    .btn-sm{
      min-height:52px;font-size:var(--fs-sm);border-radius:13px;
      padding:10px 16px;width:auto;flex:0 0 auto;margin:6px;
    }
    .btn-xs{
      min-height:48px;font-size:var(--fs-xs);border-radius:11px; 
      padding:8px 14px;width:auto;flex:0 0 auto;margin:6px;
    }

    .fg{margin-bottom:18px;}
    .flabel{
      display:block;font-weight:800;font-size:var(--fs-label);
      margin-bottom:10px;color:var(--text);
    }
    .req{color:var(--danger);margin-left:3px;}
    .fc{
      width:100%;border:2.5px solid var(--border);
      border-radius:14px;padding:16px 18px;
      background:#fff;color:var(--text);
      font-size:var(--fs-input);min-height:var(--input-h);outline:none;
      transition:border-color .15s,box-shadow .15s;
      line-height:1.5;
    }
    .fc:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(26,86,219,.2);}
    select.fc{cursor:pointer;}
    textarea.fc{min-height:130px;resize:vertical;line-height:1.7;}

    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .stat{border-radius:16px;padding:18px;border:1.5px solid transparent;}
    .stat .k{font-size:var(--fs-stat-k);color:var(--muted);font-weight:700;}
    .stat .v{font-size:var(--fs-stat-v);font-weight:950;margin-top:6px;line-height:1.2;}
    .stat.blue{background:#eff6ff;border-color:#bfdbfe;}
    .stat.green{background:#f0fdf4;border-color:#bbf7d0;}
    .stat.orange{background:#fffbeb;border-color:#fde68a;}
    .stat.purple{background:#f5f3ff;border-color:#ddd6fe;}
    .stat.red{background:#fef2f2;border-color:#fecaca;}

    .badge{
      display:inline-flex;align-items:center;
      border-radius:999px;padding:6px 14px;
      font-size:var(--fs-badge);font-weight:900;white-space:nowrap;
    }
    .bs{background:#dcfce7;color:#14532d;} 
    .bw{background:#fef3c7;color:#78350f;}
    .bd{background:#fee2e2;color:#7f1d1d;}
    .bb{background:#dbeafe;color:#1e3a8a;}
    .bp{background:#ede9fe;color:#4c1d95;}

    .list{display:flex;flex-direction:column;gap:14px;}
    .item{
      border:2.5px solid var(--border);border-radius:18px;
      padding:18px;background:#fff;
    }
    .item-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .item-title{font-weight:900;font-size:var(--fs-item-title);line-height:1.4;}
    .item-meta{color:var(--muted);font-size:var(--fs-item-meta);line-height:1.9;margin-top:8px;}
    .item-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px;}

    .module-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .module-btn{
      background:#fff;border:2.5px solid var(--border);
      border-radius:18px;padding:20px 12px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:10px;
      font-weight:900;font-size:var(--fs-module-label);color:var(--text);
      text-align:center;min-height:110px;
      transition:all .15s;box-shadow:0 2px 8px rgba(30,41,59,.06);
    }
    .module-btn:active{transform:scale(.96);box-shadow:none;}
    .module-btn .m-icon{font-size:var(--fs-module-icon);line-height:1;}
    .module-btn .m-label{font-size:var(--fs-module-label);line-height:1.3;}
    .module-btn.blue{border-color:#bfdbfe;background:#eff6ff;}
    .module-btn.green{border-color:#bbf7d0;background:#f0fdf4;}
    .module-btn.orange{border-color:#fde68a;background:#fffbeb;}
    .module-btn.purple{border-color:#ddd6fe;background:#f5f3ff;}
    .module-btn.red{border-color:#fecaca;background:#fef2f2;}
    .module-btn.teal{border-color:#99f6e4;background:#f0fdfa;}

    .notice{
      border-radius:14px;padding:16px 18px;
      font-size:var(--fs-notice);line-height:1.9;margin-bottom:16px;
      border-left:6px solid;
    }
    .notice.info{background:#eff6ff;border-color:var(--primary);color:#1e3a8a;}
    .notice.success{background:#f0fdf4;border-color:var(--success);color:#14532d;}
    .notice.warn{background:#fffbeb;border-color:#f59e0b;color:#78350f;}
    .notice.danger{background:#fef2f2;border-color:var(--danger);color:#7f1d1d;}

    .section-header{
      display:flex;align-items:center;gap:8px;
      font-size:var(--fs-section);font-weight:900;color:var(--muted);
      margin:22px 0 12px;padding:0 4px;
      text-transform:uppercase;letter-spacing:.5px;
    }
    .section-header::after{
      content:'';flex:1;height:1.5px;
      background:linear-gradient(to right,var(--border),transparent);
    }

    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(16px);
      border-top:2px solid var(--border);
      height:calc(var(--nav-h) + var(--safe-b));
      display:flex;justify-content:center;
      padding-bottom:var(--safe-b);
      box-shadow:0 -6px 24px rgba(30,41,59,.08);
    }
    .nav-inner{
      width:100%;max-width:780px;
      display:grid;grid-template-columns:repeat(5,1fr);
      gap:2px;padding:8px 6px 10px;
    }
    .nitem{
      background:transparent;color:#475569;
      border-radius:16px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:4px;font-size:var(--fs-nav);font-weight:800;
      min-width:0;padding:4px 2px;
      min-height:48px;
    }
    .nitem .ico{font-size:var(--fs-nav-ico);line-height:1;}
    .nitem.active{background:#eff6ff;color:var(--primary);outline:1.5px solid var(--primary);}

    .modal-mask{
      position:fixed;inset:0;z-index:100;
      background:rgba(15,23,42,.6);
      display:none;align-items:flex-end;justify-content:center;
    }
    .modal-mask.show{display:flex;}
    .modal{
      width:100%;max-width:780px;max-height:92vh;
      overflow-y:auto;background:#fff;
      border-radius:26px 26px 0 0;
      padding:22px 22px calc(22px + var(--safe-b));
      box-shadow:0 -16px 48px rgba(0,0,0,.2);
    }
    .modal-handle{
      width:52px;height:6px;border-radius:999px;
      background:#cbd5e1;margin:0 auto 20px;
    }
    .modal-title{font-size:var(--fs-modal-title);font-weight:950;margin-bottom:18px;}

    .toast{
      position:fixed;left:50%;
      bottom:calc(var(--nav-h) + var(--safe-b) + 24px);
      transform:translateX(-50%);z-index:120;
      background:#0f172a;color:#fff;
      border-radius:999px;padding:16px 26px;
      font-weight:800;font-size:var(--fs-toast);
      box-shadow:0 8px 28px rgba(0,0,0,.2);
      display:none;max-width:88%;text-align:center;
      white-space:nowrap;
    }
    .toast.show{display:block;}
    .toast.s{background:#14532d;}
    .toast.e{background:#7f1d1d;}
    .toast.w{background:#78350f;}

    .loader{
      position:fixed;inset:0;z-index:110;
      display:none;align-items:center;justify-content:center;
      background:rgba(255,255,255,.8);backdrop-filter:blur(6px);
    }
    .loader.show{display:flex;}
    .spinner{
      width:60px;height:60px;border-radius:50%;
      border:6px solid #bfdbfe;border-top-color:var(--primary);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .tabs{
      display:flex;gap:10px;overflow-x:auto;
      padding-bottom:8px;margin-bottom:18px;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      white-space:nowrap;border:2.5px solid var(--border);
      background:#fff;color:#1e293b;
      border-radius:999px;padding:12px 20px;
      font-weight:900;font-size:var(--fs-sm);flex-shrink:0;
      min-height:52px;
    }
    .tab.active{
      background:var(--primary);border-color:var(--primary);color:#fff;
    }

    .divider{border:none;border-top:2px solid var(--border);margin:18px 0;}
    .empty{
      text-align:center;padding:36px 18px;
      color:var(--muted);font-size:var(--fs-base);
      border:2.5px dashed var(--border);
      border-radius:16px;background:#f8fafc;
      line-height:1.9;
    }

    .id-tag{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--primary-light);color:var(--primary);
      border-radius:999px;padding:7px 16px;
      font-size:var(--fs-sm);font-weight:900;
    }

    .row{display:flex;gap:10px;align-items:flex-start;}
    .row>*{flex:1;}
    .money{font-weight:950;color:#0f766e;font-size:var(--fs-lg);}

    .steps{display:flex;align-items:center;margin-bottom:22px;gap:0;}
    .step{
      flex:1;text-align:center;
      font-size:var(--fs-sm);font-weight:800;color:var(--muted);
      position:relative;
    }
    .step .s-num{
      width:40px;height:40px;border-radius:50%;
      background:var(--border);color:var(--muted);
      display:flex;align-items:center;justify-content:center;
      font-size:var(--fs-base);font-weight:900;margin:0 auto 6px;
    }
    .step.active .s-num{background:var(--primary);color:#fff;}
    .step.done .s-num{background:var(--success);color:#fff;}
    .step::after{
      content:'';position:absolute;
      top:20px;left:50%;right:-50%;
      height:2px;background:var(--border);z-index:-1;
    }
    .step:last-child::after{display:none;}
    .step.done::after{background:var(--success);}

    .amount-quick{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
    .amount-chip{
      background:#fff;border:2.5px solid var(--border);
      border-radius:999px;padding:10px 20px;
      font-size:var(--fs-base);font-weight:800;color:var(--text);
      cursor:pointer;transition:all .12s;
      min-height:48px;
      display:flex;align-items:center;
    }
    .amount-chip.active{background:var(--primary);border-color:var(--primary);color:#fff;}
    .amount-chip:active{transform:scale(.95);}

    .admin-section{
      border-radius:var(--radius);border:2px solid transparent;
      padding:18px;margin-bottom:16px;
    }
    .admin-section.finance{border-color:#bfdbfe;background:#f0f7ff;}

/*=======================================================
 * API 工具（改為夾帶 LINE ID 與 會員編號進行安全驗證）
 =======================================================*/
async function api(action, data={}){
  const payload = {
    action,
    data: {
      ...data,
      operatorLineId: APP.user?.lineId || APP.liffProfile?.userId || '', // 自動夾帶登入者的 LINE ID
      operator: data.operator || APP.user?.name || '',
      operatorId: data.operatorId || APP.user?.memberId || APP.user?.id || '' // 自動夾帶登入者的會員編號
    }
  };
  const res=await fetch(API_BASE,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  const text=await res.text();
  if(!res.ok) throw new Error('API 錯誤 '+res.status);
  try{return JSON.parse(text);}catch(e){throw new Error('回傳格式錯誤');}
}
async function runApi(action,data={},onSuccess){
  showLoad();
  try{
    const res=await api(action,data);
    hideLoad();
    if(res.success){if(onSuccess)onSuccess(res);}
    else toast(res.message||'操作失敗','e');
    return res;
  }catch(e){hideLoad();toast('連線失敗：'+e.message,'e');return{success:false,message:e.message};}
}

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function jsStr(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'');}
function fmtMoney(n){return 'NT$'+Number(n||0).toLocaleString('zh-TW');}
function fmtDate(d){if(!d)return'--';try{const dt=new Date(d);if(isNaN(dt.getTime()))return String(d);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}catch(e){return String(d);}}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function yearOptions(sel){const y=new Date().getFullYear();const s=Number(sel||y);return[y+1,y,y-1,y-2].map(v=>`<option value="${v}"${v===s?' selected':''}>${v} 年</option>`).join('');}
function monthOptions(sel){const s=sel?Number(sel):'';return`<option value="">全年</option>${Array.from({length:12}).map((_,i)=>{const v=i+1;return`<option value="${v}"${v===s?' selected':''}>${v} 月</option>`;}).join('')}`;}
function showLoad(){$('loader')?.classList.add('show');$('loader')?.setAttribute('aria-hidden','false');}
function hideLoad(){$('loader')?.classList.remove('show');$('loader')?.setAttribute('aria-hidden','true');}
function toast(msg,type){const el=$('toast');if(!el)return;el.textContent=msg||'';el.className='toast show '+(type||'');clearTimeout(window.__tt);window.__tt=setTimeout(()=>{el.className='toast';},3500);}
function setMain(html){$('main').innerHTML=html;window.scrollTo(0,0);$('main').focus();}
function openModal(html){$('modal').innerHTML='<div class="modal-handle"></div>'+html;$('modalMask').classList.add('show');$('modalMask').setAttribute('aria-hidden','false');}

function maskClose(e){if(e.target.id==='modalMask')closeModal();}
function confirmCritical(msg){return confirm((msg||'確定執行此操作？')+'\n\n⚠️ 此操作將影響正式資料，請確認後再繼續。');}

function go(page,params={},push=true){
  if(push&&APP.page&&APP.page!==page)APP.history.push({page:APP.page,params:APP._params||{}});

  document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));
  const navId=NAV_MAP[page];if(navId)$(navId)?.classList.add('active');
  showBack(APP.history.length>0);
  const fn=ROUTES[page];
  if(fn)fn(params||{});
  else setMain(`<div class="card"><div class="empty">頁面建置中：${esc(page)}</div></div>`);
}
function goBack(){
  if(!APP.history.length)return;
  const prev=APP.history.pop();APP.page=prev.page;APP._params=prev.params||{};
  document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));
  const navId=NAV_MAP[prev.page];if(navId)$(navId)?.classList.add('active');
  showBack(APP.history.length>0);

}

 * 公告頁
 =======================================================*/
async function renderAnnouncements(){
  setMain(`
    <div class="card">
      <div class="card-title"><span class="icon">📢</span>最新公告</div>
      <div class="fg">
        <label class="flabel" for="annKw">搜尋公告</label>
        <input id="annKw" class="fc" placeholder="輸入關鍵字搜尋">
      </div>
      <button class="btn btn-primary" onclick="loadAnnouncements()">🔍 搜尋</button>
      <div id="annList" class="list" style="margin-top:16px;"><div class="empty">公告載入中...</div></div>
    </div>
  `);
  loadAnnouncements();
}
async function loadAnnouncements(){
  const area=$('annList');
  if(area)area.innerHTML=`<div class="empty">載入中...</div>`;
  try{
    const res=await api('announcement.publicList',{keyword:$('annKw')?.value.trim()||'',target:'會員'});
    if(!res.success){area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;return;}
    const rows=res.items||[];
    if(!rows.length){area.innerHTML=`<div class="empty">目前沒有公告</div>`;return;}
    area.innerHTML=rows.map(r=>`
      <div class="item">
        <div class="item-h">
          <div>
            <div class="item-title">${String(r.pinned)==='Y'?'📌 ':''}${esc(r.title)}</div>
            <div class="item-meta">${esc(r.date||'')} ｜ ${esc(r.category||'')} ｜ 對象：${esc(r.target||'全部')}</div>
          </div>
          <span class="badge bb">${esc(r.target||'全部')}</span>
        </div>
        <div class="item-meta" style="white-space:pre-wrap;margin-top:10px;color:var(--text);">${esc(r.content||'')}</div>
      </div>
    `).join('');
  }catch(e){area.innerHTML=`<div class="empty">載入失敗：${esc(e.message)}</div>`;}
}

        <div class="fg"><label class="flabel" for="pfSurgery">手術記錄</label><textarea id="pfSurgery" class="fc" placeholder="請先同意上方告知條款">${esc(u.surgery||'')}</textarea></div>
        <div class="fg"><label class="flabel" for="pfSpecialNeeds">特殊需求</label><textarea id="pfSpecialNeeds" class="fc" placeholder="請先同意上方告知條款">${esc(u.specialNeeds||'')}</textarea></div>

      <button class="btn btn-success" onclick="submitProfile()">💾 儲存資料</button>

function checkHealthConsentState() {
  const consent = $('pfHealthConsent')?.value;
  const group = $('healthFieldsGroup');
  if (!group) return;
  if (consent === '同意') {
    group.style.opacity = '1';
    group.style.pointerEvents = 'auto';
  } else {
    group.style.opacity = '0.5';
    group.style.pointerEvents = 'none';
    if ($('pfDiagnosisYear')) $('pfDiagnosisYear').value = '';
    if ($('pfDoctor')) $('pfDoctor').value = '';
    if ($('pfHospital')) $('pfHospital').value = '';
    if ($('pfMedication')) $('pfMedication').value = '';
    if ($('pfSurgery')) $('pfSurgery').value = '';
    if ($('pfSpecialNeeds')) $('pfSpecialNeeds').value = '';
  }
}

async function submitProfile(){
  const name=requireInput('pfName','姓名');
  const phone=requireInput('pfPhone','手機');
  const consent=$('pfHealthConsent').value;
  if(!name||!phone)return;
  if(!isValidTaiwanMobile(phone)){toast('請輸入正確手機格式，例如 0912345678','w');return;}
  
  const hasHealthData = $('pfDoctor').value.trim() || $('pfMedication').value.trim() || $('pfDiagnosisYear').value;
  if (hasHealthData && consent !== '同意') {
    toast('若要填寫健康資料，個資同意書必須選擇「同意」','w');
    $('pfHealthConsent').focus();
    return;
  }

  showLoad();
  try{
    const res=await api('member.updateProfile',{
      memberId:APP.user.memberId||APP.user.id,
      name,nickname:$('pfNick').value.trim(),phone,mobile:phone,
      email:$('pfEmail').value.trim(),birthday:$('pfBirthday').value,
      address:$('pfAddress').value.trim(),
      diagnosisYear:consent==='同意'?$('pfDiagnosisYear').value:'',
      doctor:consent==='同意'?$('pfDoctor').value.trim():'',
      hospital:consent==='同意'?$('pfHospital').value.trim():'',
      medication:consent==='同意'?$('pfMedication').value.trim():'',
      surgery:consent==='同意'?$('pfSurgery').value.trim():'',
      specialNeeds:consent==='同意'?$('pfSpecialNeeds').value.trim():'',
      healthConsent:consent
    });
    hideLoad();
    if(res.success){APP.user=res.member;saveSession();updateLoginButton();toast('資料已更新 ✅','s');go('memberCenter',{},false);}
    else toast(res.message||'更新失敗','e');
  }catch(e){hideLoad();toast('更新失敗：'+e.message,'e');}
}

/*=======================================================
 * 收據 PDF / 檢視收據
 =======================================================*/
async function viewReceiptPdf(receiptNo){
  if(!receiptNo||receiptNo==='尚未開立'||receiptNo==='--'){toast('尚未開立收據','w');return;}
  showLoad();
  try{
    const res=await api('receipt.pdf',{receiptNo});
    hideLoad();
    if(res.success&&(res.pdfUrl||res.url||res.downloadUrl)){
      window.open(res.pdfUrl||res.url||res.downloadUrl,'_blank');
      toast('收據 PDF 已開啟','s');
    }else if(res.success && res.html){
      openModal(`
        <div class="modal-title">🧾 電子收據明細</div>
        <div id="receiptPrintDoc" style="background:#fff;color:#111;padding:20px;border:2px solid #222;border-radius:12px;font-family:sans-serif;">
          ${res.html}
        </div>
        <button class="btn btn-primary" onclick="printElement('receiptPrintDoc')">🖨️ 列印收據</button>
        <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      `);
    } else {
      toast(res.message||'取得收據失敗','e');
    }
  }catch(e){hideLoad();toast('取得收據失敗：'+e.message,'e');}
}

function selectPayAmount(el,val){
  document.querySelectorAll('.amount-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');$('payAmount').value=val;
}
async function submitPaymentApply(){
  const amount=Number($('payAmount').value||0);
  if(!amount||amount<=0){toast('請選擇繳費金額','w');return;}
  showLoad();
  try{
    const res=await api('payment.apply',{
      memberId:APP.user.memberId||APP.user.id,name:APP.user.name,
      phone:APP.user.phone||APP.user.mobile||'',amount,
      year:$('payYear').value,method:$('payMethod').value,

async function loadMyPayments(){

  try{

    if(!res.success){area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;return;}

    area.innerHTML=rows.map(r=>{

                ${r.note?'備註：'+esc(r.note):''}

          ${rej?`<div class="notice danger" style="margin-top:10px;margin-bottom:0;">❌ 已退回：${esc(r.rejectReason||'請聯絡協會確認')}</div>`:''}

function selectDonAmount(el,val){
  document.querySelectorAll('.amount-chip').forEach(c=>c.classList.remove('active'));

  $('donCustomGroup').classList.toggle('hide',val!=='other');
}
async function submitDonationApply(){
  let amount=$('donAmountVal').value;
  if(amount==='other')amount=$('donAmountCustom')?.value||0;
  amount=Number(amount||0);
  if(!amount||amount<=0){toast('請選擇或輸入捐款金額','w');return;}
  showLoad();
  try{
    const res=await api('donation.apply',{
      memberId:APP.user.memberId||APP.user.id,name:APP.user.name,
      phone:APP.user.phone||APP.user.mobile||'',amount,
      method:$('donMethod').value,date:$('donDate').value,
      purpose:$('donPurpose').value,note:$('donNote').value.trim()
    });
    hideLoad();
    if(res.success){toast('✅ 已送出捐款申請，待管理員確認','s');loadMyDonations();}
    else toast(res.message||'送出失敗','e');
  }catch(e){hideLoad();toast('送出失敗：'+e.message,'e');}
}
async function loadMyDonations(){
  const area=$('myDonList');if(!area)return;

  try{
    const res=await api('donation.myList',{memberId:APP.user.memberId||APP.user.id,phone:APP.user.phone||APP.user.mobile||''});
    if(!res.success){area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;return;}
    const rows=res.items||[];
    if(!rows.length){area.innerHTML=`<div class="empty">尚無捐款紀錄</div>`;return;}
    const total=rows.filter(r=>r.status==='已確認').reduce((s,r)=>s+Number(r.amount||0),0);

function openRejectModal(title,onConfirm){
  openModal(`
    <div class="modal-title">❌ ${esc(title)}</div>
    <div class="fg">
      <label class="flabel" for="rejectReasonSel">退回原因 <span class="req">*</span></label>
      <select id="rejectReasonSel" class="fc" onchange="toggleRejectCustom()">
        <option value="">請選擇原因</option>
        <option value="查無入帳紀錄">查無入帳紀錄</option>
        <option value="金額不符">金額不符</option>
        <option value="資料填寫錯誤">資料填寫錯誤</option>
        <option value="重複申請">重複申請</option>
        <option value="other">其他（請說明）</option>
      </select>
    </div>
    <div id="rejectCustomGroup" class="fg hide">
      <label class="flabel" for="rejectCustom">其他原因說明</label>
      <input id="rejectCustom" class="fc" placeholder="請輸入原因">
    </div>
    <button class="btn btn-danger" onclick="submitRejectModal()">確認退回</button>
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  `);
  window.__rejectCallback=onConfirm;
}
function toggleRejectCustom(){
  const v=$('rejectReasonSel').value;
  const group = $('rejectCustomGroup');
  if(group) group.classList.toggle('hide',v!=='other');
}
async function submitRejectModal(){
  let reason=$('rejectReasonSel').value;
  if(reason==='other')reason=$('rejectCustom')?.value.trim()||'';
  if(!reason){toast('請選擇或填寫退回原因','w');return;}
  closeModal();
  if(window.__rejectCallback)await window.__rejectCallback(reason);
}

            <button class="btn btn-success btn-xs" onclick="approveExpense('${jsStr(e.id)}')">✅ 核准</button>

      target:$('annTarget').value,date:$('annDate').value,
      pinned:$('annPinned').value,status:$('annStatus').value
    });

const REPORT_TYPES=[
  {key:'incomeExpenseStatement',action:'report.incomeExpenseStatement',name:'收支餘絀表',icon:'📈'},
  {key:'ledger',action:'report.ledger',name:'明細分類帳',icon:'📒'},
  {key:'journal',action:'report.journal',name:'收支分錄表',icon:'🧾'},
  {key:'budgetComparison',action:'report.budgetComparison',name:'預算決算比較表',icon:'📊'},
  {key:'fundraising',action:'report.fundraising',name:'勸募收支報告',icon:'💝'},
  {key:'bankReconciliation',action:'report.bankReconciliation',name:'銀行調節表',icon:'🏦'},
  {key:'balanceSheet',action:'report.balanceSheet',name:'資產負債表',icon:'⚖️'},
  {key:'netAssetChanges',action:'report.netAssetChanges',name:'淨資產變動表',icon:'🔄'},
  {key:'cashFlow',action:'report.cashFlow',name:'現金流量表',icon:'💵'}
];
const REPORT_STATE={type:'incomeExpenseStatement',latest:null};

function getReportType(key){return REPORT_TYPES.find(x=>x.key===key)||REPORT_TYPES[0];}
function moneyHtml(v){const n=Number(v||0);return`<span style="font-weight:900;color:${n<0?'var(--danger)':'#0f766e'};">${fmtMoney(n)}</span>`;}

function renderReportCenter(){
  if(!adminGuard())return;
  setMain(`
    <div class="card">
      <div class="card-title"><span class="icon">📈</span>財務報表中心</div>
      <div class="notice info">提供九大財務報表，支援年度、月份或自訂區間，符合內政部申報規範。</div>

        <div class="fg">
          <label class="flabel" for="repType">選擇報表</label>
          <select id="repType" class="fc" onchange="switchReportType(this.value)">
            ${REPORT_TYPES.map(t=>`<option value="${t.key}" ${REPORT_STATE.type===t.key?'selected':''}>${t.icon} ${t.name}</option>`).join('')}
          </select>
        </div>
        <div class="fg">
          <label class="flabel" for="repYear">年度</label>
          <select id="repYear" class="fc">${yearOptions()}</select>

          <select id="repMonth" class="fc">${monthOptions()}</select>
        </div>
        <div class="fg">

          <select id="repProject" class="fc"><option value="">全部專案</option></select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="loadFinanceReport()">📊 產生報表</button>
    </div>

    <div class="card" id="reportResultCard">

        <span id="repResultTitle">報表結果</span>

      </div>

    }
  });
}

function switchReportType(val){
  REPORT_STATE.type=val;
  const t=getReportType(val);
  const icon=$('repResultIcon');
  const title=$('repResultTitle');
  if(icon){icon.textContent=t.icon;icon.setAttribute('aria-label',t.name);}
  if(title)title.textContent=t.name;
}

async function loadFinanceReport(){
  const type=REPORT_STATE.type;
  const t=getReportType(type);
  const area=$('reportPrintArea');
  if(!area)return;
  area.innerHTML=`<div class="empty">報表計算中，請稍候...</div>`;
  showLoad();
  try{
    const res=await api(t.action,{
      year:$('repYear').value,
      month:$('repMonth').value,
      projectName:$('repProject').value
    });
    hideLoad();
    if(!res.success){area.innerHTML=`<div class="empty" style="color:var(--danger);">${esc(res.message||'報表產生失敗')}</div>`;return;}
    REPORT_STATE.latest=res;
    renderReportResult(type,res,area);
  }catch(e){hideLoad();area.innerHTML=`<div class="empty" style="color:var(--danger);">報表產生錯誤：${esc(e.message)}</div>`;}
}

  const org=ORG_NAME;
  const y=$('repYear').value;
  const m=$('repMonth').value;
  const period=m?`${y} 年 ${m} 月`:`${y} 年度`;

  let html=`

      <div style="text-align:center;margin-bottom:20px;border-bottom:3px double #111;padding-bottom:10px;">
        <div style="font-size:22px;font-weight:900;">${esc(org)}</div>

        <div style="font-size:14px;color:#444;margin-top:6px;">期間：${esc(period)}${esc(projText)}</div>
      </div>`;

  if(type==='incomeExpenseStatement'){
    const inc=res.income||[];
    const exp=res.expense||[];
    const totInc=res.totalIncome||0;
    const totExp=res.totalExpense||0;
    const net=res.surplus||0;

        </thead>

          <tr style="font-weight:800;background:#fafafa;"><td style="padding:10px;border-bottom:1px solid #ddd;">一、 收入科目</td><td style="padding:10px;text-align:right;border-bottom:1px solid #ddd;"></td></tr>
          ${inc.map(r=>`<tr><td style="padding:10px 10px 10px 30px;border-bottom:1px dashed #eee;">${esc(r.subjectCode)} ${esc(r.subjectName)}</td><td style="padding:10px;text-align:right;border-bottom:1px dashed #eee;">${moneyHtml(r.amount)}</td></tr>`).join('')}
          <tr style="font-weight:800;background:#f5fdf4;"><td style="padding:10px;border-bottom:1px solid #111;">收入合計</td><td style="padding:10px;text-align:right;border-bottom:1px solid #111;">${moneyHtml(totInc)}</td></tr>
          <tr style="font-weight:800;background:#fafafa;"><td style="padding:10px 10px 10px 10px;border-bottom:1px solid #ddd;margin-top:10px;">二、 支出科目</td><td style="padding:10px;text-align:right;border-bottom:1px solid #ddd;"></td></tr>
          ${exp.map(r=>`<tr><td style="padding:10px 10px 10px 30px;border-bottom:1px dashed #eee;">${esc(r.subjectCode)} ${esc(r.subjectName)}</td><td style="padding:10px;text-align:right;border-bottom:1px dashed #eee;">${moneyHtml(r.amount)}</td></tr>`).join('')}
          <tr style="font-weight:800;background:#fef2f2;"><td style="padding:10px;border-bottom:1px solid #111;">支出合計</td><td style="padding:10px;text-align:right;border-bottom:1px solid #111;">${moneyHtml(totExp)}</td></tr>

    html+=`

        <thead>
          <tr style="background:#f2f2f2;border-top:2px solid #111;border-bottom:2px solid #111;">

            <th style="padding:8px;text-align:right;font-weight:800;">餘額</th>
          </tr>

        <tbody>

      <table style="width:100%;border-collapse:collapse;font-size:14px;margin-bottom:16px;">

  html+=`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px;border-top:1px solid #111;padding-top:14px;">

/*=======================================================
 * 系統設定
 =======================================================*/
async function renderSystemSetting(){
  if(!adminGuard())return;
  setMain(`<div class="card"><div class="empty">載入中...</div></div>`);
  try{
    const res=await api('system.getSettings',{});
    if(!res.success){setMain(`<div class="card"><div class="empty">${esc(res.message||'載入失敗')}</div></div>`);return;}
    const s=res.settings||{};
    setMain(`
      <div class="card">
        <div class="card-title"><span class="icon">🔧</span>系統設定</div>
        <div class="notice info">此處為全系統的全域設定。</div>
        <div class="fg"><label class="flabel" for="sysOrg">組織名稱</label><input id="sysOrg" class="fc" value="${esc(s.orgName||ORG_NAME)}"></div>
        <div class="fg"><label class="flabel" for="sysLiff">LINE LIFF ID</label><input id="sysLiff" class="fc" value="${esc(s.liffId||LIFF_ID)}"></div>
        <div class="fg"><label class="flabel" for="sysBank">銀行存款帳戶資訊</label><textarea id="sysBank" class="fc" style="min-height:100px;">${esc(s.bankInfo||'')}</textarea></div>
        <button class="btn btn-success" onclick="submitSystemSettings()">💾 儲存系統設定</button>
      </div>`);
  }catch(e){setMain(`<div class="card"><div class="empty">載入失敗：${esc(e.message)}</div></div>`);}
}
async function submitSystemSettings(){
  if(!confirmCritical('確定修改系統全域設定？'))return;
  await runApi('system.saveSettings',{
    orgName:$('sysOrg').value.trim(),
    liffId:$('sysLiff').value.trim(),
    bankInfo:$('sysBank').value.trim()
  },()=>{toast('系統設定已更新','s');});
}

/*=======================================================
 * 系統初始化
 =======================================================*/
window.onload=function(){
  loadFontSize();
  loadSession();
  updateLoginButton();
  initLiff();
  
  // 解析 URL 參數
  const urlParams = new URLSearchParams(window.location.search);
  const pageParam = urlParams.get('page');
  if(pageParam && ROUTES[pageParam]){
    go(pageParam);
  } else {
    go('home');
  }
};
</script>
