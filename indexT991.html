<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>台灣帕金森病友權益促進會整合管理系統 v2</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: #f5f7fb;
      color: #1e293b;
    }
    .topbar {
      background: linear-gradient(135deg, #1565C0, #1E88E5);
      color: white;
      padding: 16px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .topbar h1 {
      margin: 0;
      font-size: 18px;
    }
    .topbar .sub {
      font-size: 12px;
      opacity: .92;
      margin-top: 4px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
    }

    .notice {
      background: #EFF6FF;
      color: #1D4ED8;
      border-left: 4px solid #3B82F6;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 16px;
      font-weight: 800;
      color: #1565C0;
      margin-bottom: 14px;
    }

    .user-card {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      background: #DBEAFE;
    }

    .user-meta h3 {
      margin: 0 0 6px 0;
      font-size: 18px;
      color: #1565C0;
    }

    .muted {
      color: #64748B;
      font-size: 12px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 6px;
      margin-top: 4px;
    }
    .badge-blue { background: #DBEAFE; color: #1D4ED8; }
    .badge-green { background: #DCFCE7; color: #166534; }
    .badge-orange { background: #FEF3C7; color: #92400E; }
    .badge-purple { background: #EDE9FE; color: #6D28D9; }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .tab {
      border: none;
      background: #E2E8F0;
      color: #475569;
      padding: 10px 15px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
    }

    .tab.active {
      background: #1565C0;
      color: white;
    }

    .page { display: none; }
    .page.active { display: block; }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .stats {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      margin-bottom: 16px;
    }

    .stat {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }

    .stat .label {
      font-size: 12px;
      color: #64748B;
    }

    .stat .value {
      font-size: 28px;
      color: #1565C0;
      font-weight: 800;
      margin-top: 6px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }

    input, select, textarea, button {
      font-family: inherit;
    }

    input[type="text"], input[type="number"], input[type="date"], input[type="email"], select, textarea {
      width: 100%;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      padding: 10px 12px;
      background: white;
      font-size: 14px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    input[type="file"] {
      width: 100%;
      padding: 8px 0;
      font-size: 13px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      margin-right: 8px;
      margin-top: 8px;
    }

    .btn-primary { background: #1565C0; color: white; }
    .btn-success { background: #16A34A; color: white; }
    .btn-danger { background: #DC2626; color: white; }
    .btn-orange { background: #EA580C; color: white; }
    .btn-gray { background: #64748B; color: white; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: white;
    }

    th {
      background: #F1F5F9;
      color: #475569;
      text-align: left;
      padding: 10px 8px;
      position: sticky;
      top: 0;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #EEF2F7;
      vertical-align: top;
    }

    .section-gap { margin-top: 16px; }

    .seal-preview {
      max-width: 160px;
      max-height: 160px;
      border: 1px solid #E2E8F0;
      border-radius: 10px;
      padding: 8px;
      background: white;
      display: block;
      margin-top: 8px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 12px;
    }

    .toolbar .field {
      min-width: 180px;
      flex: 1;
    }

    .hidden { display: none !important; }

    .pill-ok { color:#166534; font-weight:700; }
    .pill-warn { color:#92400E; font-weight:700; }
    .pill-danger { color:#991B1B; font-weight:700; }

    @media (max-width: 700px) {
      .topbar h1 { font-size: 16px; }
      .stat .value { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>台灣帕金森病友權益促進會整合管理系統 v2</h1>
    <div class="sub">會員 / 財務 / 捐款 / 支出 / 收據 PDF / 傳票 PDF / 電子印章</div>
  </div>

  <div class="container">
    <div id="systemNotice" class="notice">系統載入中...</div>

    <div class="card">
      <div class="user-card">
        <img id="avatar" class="avatar" src="" alt="avatar">
        <div class="user-meta">
          <h3 id="userName">載入中...</h3>
          <div>
            <span id="badgeMode" class="badge badge-blue">模式</span>
            <span id="badgeRole" class="badge badge-purple">角色</span>
            <span id="badgeStatus" class="badge badge-green">會員狀態</span>
          </div>
          <div id="userMetaLine" class="muted"></div>
        </div>
      </div>
    </div>

    <div id="tabs" class="tabs"></div>

    <div id="page-dashboard" class="page"></div>
    <div id="page-profile" class="page"></div>
    <div id="page-payment" class="page"></div>
    <div id="page-donation" class="page"></div>
    <div id="page-income" class="page"></div>
    <div id="page-expense" class="page"></div>
    <div id="page-records" class="page"></div>
    <div id="page-points" class="page"></div>
    <div id="page-members" class="page"></div>
    <div id="page-pending" class="page"></div>
    <div id="page-seal" class="page"></div>
    <div id="page-settings" class="page"></div>
    <div id="page-finance-all" class="page"></div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzls-wVijMxc1nxaw_uKaPrjmPplH_KqJ9TxvvxaA34h-1psbsoORbS6Aujs36-c4DZfg/exec";
    const DEFAULT_LIFF_ID = '2009456572-588gzru4';

    const state = {
      bootstrap: null,
      activePage: '',
      fullFinanceData: null,
      filters: {
        membersKeyword: '',
        financeKeyword: ''
      }
    };

    const memberTabs = [
      ['profile', '👤 我的資料'],
      ['payment', '💳 繳費'],
      ['donation', '💝 捐款'],
      ['income', '📥 收入交付'],
      ['expense', '📤 支出申請'],
      ['records', '📄 我的記錄'],
      ['points', '⭐ 積分'],
    ];

    const financeTabs = [
      ['dashboard', '🏠 Dashboard'],
      ['pending', '📋 待審清單'],
      ['finance-all', '💰 財務總覽'],
      ['seal', '🪪 電子印章'],
      ...memberTabs
    ];

    const adminTabs = [
      ['dashboard', '🏠 Dashboard'],
      ['pending', '📋 待審清單'],
      ['members', '👥 會員管理'],
      ['finance-all', '💰 財務總覽'],
      ['seal', '🪪 電子印章'],
      ['settings', '⚙️ 系統設定'],
      ...memberTabs
    ];

    async function api(action, payload = {}) {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action, ...payload })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message || '系統錯誤');
      return json.data;
    }

    function currentIdentity() {
      const user = state.bootstrap?.user || {};
      return {
        lineUserId: user.lineUserId || '',
        displayName: user.displayName || '',
        pictureUrl: user.pictureUrl || ''
      };
    }

    async function initApp() {
      let lineUserId = '';
      let displayName = '';
      let pictureUrl = '';
      let demoMode = true;

      try {
        const tempSettings = await api('getSystemSettings', {});
        const liffId = tempSettings.liffId || DEFAULT_LIFF_ID;

        if (liffId && liffId !== 'YOUR_LIFF_ID') {
          await liff.init({ liffId });
          if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            lineUserId = profile.userId || '';
            displayName = profile.displayName || '';
            pictureUrl = profile.pictureUrl || '';
            demoMode = false;
          }
        }
      } catch (e) {
        console.warn('LIFF init fail, fallback demo', e);
      }

      const data = await api('bootstrap', { lineUserId, displayName, pictureUrl });
      state.bootstrap = data;

      renderHeader();
      renderTabs();
      await renderAllPages();

      if (data.role === 'admin' || data.role === 'finance') switchPage('dashboard');
      else switchPage('profile');

      document.getElementById('systemNotice').innerHTML = demoMode
        ? '💡 目前為 <b>示範模式</b>。若要以真實 LINE 身份登入，請在系統設定中填入 LIFF ID，並於 LINE 內開啟。'
        : '✅ 已透過 LINE / LIFF 登入系統。';
    }

    function renderHeader() {
      const b = state.bootstrap;
      const user = b.user || {};
      const member = b.member || {};
      const roleMap = {
        member: '一般會員',
        finance: '財務管理員',
        admin: '管理員'
      };

      document.getElementById('avatar').src =
        user.pictureUrl || 'https://dummyimage.com/120x120/dbeafe/1d4ed8&text=User';
      document.getElementById('userName').textContent =
        user.displayName || member.name || '未命名使用者';
      document.getElementById('badgeMode').textContent = user.demoMode ? '示範模式' : 'LINE 模式';
      document.getElementById('badgeRole').textContent = roleMap[b.role] || '一般會員';
      document.getElementById('badgeStatus').textContent = member.status || '未啟用';

      document.getElementById('userMetaLine').textContent =
        `LINE ID: ${user.lineUserId || '-'} ｜ 到期日: ${member.expireDate || '-'} ｜ 積分: ${member.points || 0} ｜ 類型: ${member.memberType || '-'}`;
    }

    function renderTabs() {
      const role = state.bootstrap.role;
      const tabs = role === 'admin' ? adminTabs : role === 'finance' ? financeTabs : memberTabs;
      document.getElementById('tabs').innerHTML = tabs.map(([key, label]) =>
        `<button class="tab" data-page="${key}" onclick="switchPage('${key}')">${label}</button>`
      ).join('');
    }

    function switchPage(page) {
      state.activePage = page;
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      const p = document.getElementById('page-' + page);
      if (p) p.classList.add('active');
      const t = document.querySelector(`.tab[data-page="${page}"]`);
      if (t) t.classList.add('active');
    }

    async function renderAllPages() {
      renderProfilePage();
      renderPaymentPage();
      renderDonationPage();
      renderIncomePage();
      renderExpensePage();
      await renderRecordsPage();
      await renderPointsPage();

      if (state.bootstrap.role === 'admin' || state.bootstrap.role === 'finance') {
        await renderDashboardPage();
        await renderPendingPage();
        await renderFinanceAllPage();
        renderSealPage();
      }

      if (state.bootstrap.role === 'admin') {
        await renderMembersPage();
        renderSettingsPage();
      }
    }

    function renderProfilePage() {
      const p = state.bootstrap.member || {};
      document.getElementById('page-profile').innerHTML = `
        <div class="card">
          <div class="card-title">👤 個人資料</div>
          <div class="form-grid">
            <div><label>姓名</label><input id="pf-name" type="text" value="${esc(p.name)}"></div>
            <div><label>電話</label><input id="pf-phone" type="text" value="${esc(p.phone)}"></div>
            <div><label>Email</label><input id="pf-email" type="email" value="${esc(p.email)}"></div>
            <div><label>生日</label><input id="pf-birthday" type="date" value="${esc(p.birthday)}"></div>
            <div><label>主治醫師</label><input id="pf-doctor" type="text" value="${esc(p.doctor)}"></div>
            <div>
              <label>會員類型</label>
              <select id="pf-memberType">
                ${['一般會員','榮譽會員','贊助會員'].map(x => `<option value="${x}" ${p.memberType===x?'selected':''}>${x}</option>`).join('')}
              </select>
            </div>
            <div style="grid-column:1/-1;"><label>地址</label><input id="pf-address" type="text" value="${esc(p.address)}"></div>
            <div style="grid-column:1/-1;"><label>備註</label><textarea id="pf-remark">${esc(p.remark)}</textarea></div>
          </div>
          <button class="btn btn-primary" onclick="saveProfile()">💾 儲存個人資料</button>
        </div>
      `;
    }

    function renderPaymentPage() {
      document.getElementById('page-payment').innerHTML = `
        <div class="card">
          <div class="card-title">💳 會費繳費申請</div>
          <div class="form-grid">
            <div><label>姓名</label><input id="pay-name" type="text" value="${esc(prefillName())}"></div>
            <div>
              <label>會員類型</label>
              <select id="pay-memberType">
                <option>一般會員</option>
                <option>榮譽會員</option>
                <option>贊助會員</option>
              </select>
            </div>
            <div><label>金額</label><input id="pay-amount" type="number"></div>
            <div>
              <label>繳費方式</label>
              <select id="pay-method">
                <option>銀行轉帳</option>
                <option>LINE Pay</option>
                <option>現金</option>
                <option>其他</option>
              </select>
            </div>
            <div><label>匯款憑證</label><input id="pay-proof" type="file" accept="image/*,.pdf"></div>
          </div>
          <button class="btn btn-primary" onclick="submitPayment()">📤 送出繳費申請</button>
        </div>
      `;
    }

    function renderDonationPage() {
      document.getElementById('page-donation').innerHTML = `
        <div class="card">
          <div class="card-title">💝 捐款申請</div>
          <div class="form-grid">
            <div><label>姓名</label><input id="don-name" type="text" value="${esc(prefillName())}"></div>
            <div><label>金額</label><input id="don-amount" type="number"></div>
            <div><label>用途</label><input id="don-purpose" type="text" placeholder="例如：病友支持服務"></div>
            <div>
              <label>捐款方式</label>
              <select id="don-method">
                <option>銀行轉帳</option>
                <option>LINE Pay</option>
                <option>現金</option>
                <option>其他</option>
              </select>
            </div>
            <div style="grid-column:1/-1;"><label>留言</label><textarea id="don-message"></textarea></div>
            <div><label>捐款憑證</label><input id="don-proof" type="file" accept="image/*,.pdf"></div>
          </div>
          <button class="btn btn-primary" onclick="submitDonation()">📤 送出捐款申請</button>
        </div>
      `;
    }

    function renderIncomePage() {
      document.getElementById('page-income').innerHTML = `
        <div class="card">
          <div class="card-title">📥 收入交付</div>
          <div class="form-grid">
            <div><label>提交人</label><input id="inc-name" type="text" value="${esc(prefillName())}"></div>
            <div>
              <label>收入類別</label>
              <select id="inc-category">
                <option>活動收入</option>
                <option>贊助</option>
                <option>其他</option>
              </select>
            </div>
            <div><label>金額</label><input id="inc-amount" type="number"></div>
            <div><label>收款日期</label><input id="inc-date" type="date"></div>
            <div style="grid-column:1/-1;"><label>說明</label><textarea id="inc-description"></textarea></div>
            <div><label>附件</label><input id="inc-file" type="file" accept="image/*,.pdf"></div>
          </div>
          <button class="btn btn-primary" onclick="submitIncome()">📤 送出收入交付</button>
        </div>
      `;
    }

    function renderExpensePage() {
      document.getElementById('page-expense').innerHTML = `
        <div class="card">
          <div class="card-title">📤 支出申請</div>
          <div class="form-grid">
            <div><label>申請人</label><input id="exp-name" type="text" value="${esc(prefillName())}"></div>
            <div>
              <label>支出類別</label>
              <select id="exp-category">
                <option>行政費用</option>
                <option>活動費用</option>
                <option>交通費</option>
                <option>講師費</option>
                <option>其他</option>
              </select>
            </div>
            <div><label>金額</label><input id="exp-amount" type="number"></div>
            <div>
              <label>付款方式</label>
              <select id="exp-payMethod">
                <option>匯款</option>
                <option>現金</option>
                <option>其他</option>
              </select>
            </div>
            <div style="grid-column:1/-1;"><label>說明</label><textarea id="exp-description"></textarea></div>
            <div><label>原始附件</label><input id="exp-file" type="file" accept="image/*,.pdf"></div>
          </div>
          <button class="btn btn-primary" onclick="submitExpense()">📤 送出支出申請</button>
        </div>

        <div class="card">
          <div class="card-title">✍️ 簽名文件回傳</div>
          <div class="notice">支出核准後，系統會產生正式支出憑證 PDF。請簽名後再於此上傳。</div>
          <div class="form-grid">
            <div><label>支出申請 ID</label><input id="signed-expense-id" type="text" placeholder="EXP_..."></div>
            <div><label>簽名文件</label><input id="signed-expense-file" type="file" accept="image/*,.pdf"></div>
          </div>
          <button class="btn btn-success" onclick="uploadSignedExpense()">📎 上傳簽名文件</button>
        </div>
      `;
    }

    async function renderRecordsPage() {
      const data = await api('getMyRecords', currentIdentity());
      document.getElementById('page-records').innerHTML = `
        <div class="card">
          <div class="card-title">📄 我的申請記錄</div>
          ${tableBlock('會費繳費記錄', ['ID','姓名','金額','狀態','收據PDF','時間'], data.payments.map(x => [
            x.paymentId, x.name, `NT$ ${x.amount}`, x.status, linkify(x.receiptPdfUrl, '查看'), x.createdAt
          ]))}
          <div class="section-gap"></div>
          ${tableBlock('捐款記錄', ['ID','姓名','金額','狀態','收據PDF','時間'], data.donations.map(x => [
            x.donationId, x.name, `NT$ ${x.amount}`, x.status, linkify(x.receiptPdfUrl, '查看'), x.createdAt
          ]))}
          <div class="section-gap"></div>
          ${tableBlock('收入交付記錄', ['ID','類別','金額','狀態','附件','時間'], data.incomes.map(x => [
            x.incomeId, x.category, `NT$ ${x.amount}`, x.status, linkify(x.attachmentUrl, '查看'), x.createdAt
          ]))}
          <div class="section-gap"></div>
          ${tableBlock('支出申請記錄', ['ID','類別','金額','狀態','正式憑證PDF','簽名檔','時間'], data.expenses.map(x => [
            x.expenseId, x.category, `NT$ ${x.amount}`, x.status, linkify(x.officialPdfUrl, '查看'), linkify(x.signedDocUrl, '查看'), x.createdAt
          ]))}
        </div>
      `;
    }

    async function renderPointsPage() {
      const data = await api('getMyPoints', currentIdentity());
      document.getElementById('page-points').innerHTML = `
        <div class="stats">
          <div class="stat">
            <div class="label">目前積分</div>
            <div class="value">${data.current || 0}</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">⭐ 積分歷史</div>
          ${tableBlock('', ['時間','類型','點數','原因','參考編號'], data.logs.map(x => [
            x.createdAt, x.changeType, x.pointsDelta, x.reason, x.refId
          ]))}
        </div>
      `;
    }

    async function renderDashboardPage() {
      const data = await api('getDashboard', currentIdentity());

    function doRenderFinanceAllPage() {

      const payments = filterRows(data.payments, ['paymentId','name','status','memberType','method']);
      const donations = filterRows(data.donations, ['donationId','name','purpose','status']);
      const incomes = filterRows(data.incomes, ['incomeId','name','category','status']);

          ]))}

          ${tableBlock('捐款', ['ID','姓名','金額','用途','狀態','收據','時間'], donations.map(x => [

          ]))}
          <div class="section-gap"></div>
          ${tableBlock('收入', ['ID','姓名','類別','金額','狀態','附件','時間'], incomes.map(x => [
            x.incomeId, x.name, x.category, `NT$ ${x.amount}`, x.status, linkify(x.attachmentUrl, '查看'), x.createdAt
          ]))}
          <div class="section-gap"></div>
          ${tableBlock('支出', ['ID','姓名','類別','金額','狀態','正式憑證','簽名檔','時間'], expenses.map(x => [

    async function reviewItem(type, id, approved) {

        payment: 'reviewPayment',
        donation: 'reviewDonation',
        income: 'reviewIncome',
        expense: 'reviewExpense'
      };
      const idMap = {
        payment: 'paymentId',
        donation: 'donationId',
        income: 'incomeId',
        expense: 'expenseId'
      };

      try {
        await api(actionMap[type], {
          ...currentIdentity(),
          [idMap[type]]: id,
          approved: approved,
          reviewNote: note

        alert('處理完成');
        await renderPendingPage();
        await refreshAdminPages();
      } catch (e) {
        alert(e.message);

    function renderReviewTable(type, rows) {
      if (!rows || !rows.length) return `<div class="muted">目前沒有資料</div>`;

      const idField = {
        payment: 'paymentId',
        donation: 'donationId',
        income: 'incomeId'
      }[type];

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>金額</th>
                <th>狀態</th>
                <th>附件</th>
                <th>建立時間</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(x => `
                <tr>
                  <td>${esc(x[idField])}</td>
                  <td>${esc(x.name)}</td>
                  <td>NT$ ${esc(x.amount)}</td>
                  <td>${esc(x.status)}</td>
                  <td>${linkify(x.proofUrl || x.attachmentUrl, '查看')}</td>
                  <td>${esc(x.createdAt)}</td>
                  <td>
                    <button class="btn btn-success" onclick="reviewItem('${type}','${x[idField]}',true)">核准</button>
                    <button class="btn btn-danger" onclick="reviewItem('${type}','${x[idField]}',false)">拒絕</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderExpenseReviewTable(rows) {

            <thead>

                <th>ID</th>
                <th>姓名</th>
                <th>類別</th>
                <th>金額</th>
                <th>狀態</th>
                <th>原始附件</th>
                <th>正式憑證PDF</th>
                <th>簽名檔</th>
                <th>傳票ID</th>

            </thead>
            <tbody>
              ${rows.map(x => `
                <tr>
                  <td>${esc(x.expenseId)}</td>
                  <td>${esc(x.name)}</td>
                  <td>${esc(x.category)}</td>
                  <td>NT$ ${esc(x.amount)}</td>
                  <td>${esc(x.status)}</td>
                  <td>${linkify(x.attachmentUrl, '查看')}</td>
                  <td>${linkify(x.officialPdfUrl, 'PDF')}</td>
                  <td>${linkify(x.signedDocUrl, '查看')}</td>
                  <td>${esc(x.voucherId || '-')}</td>
                  <td>
                    ${x.status === '待審核' ? `
                      <button class="btn btn-success" onclick="reviewItem('expense','${x.expenseId}',true)">核准</button>
                      <button class="btn btn-danger" onclick="reviewItem('expense','${x.expenseId}',false)">拒絕</button>
                    ` : ''}
                    ${x.status === '待確認收件' ? `
                      <button class="btn btn-orange" onclick="confirmExpenseReceived('${x.expenseId}')">確認收件</button>
                    ` : ''}
                    ${x.status === '待撥款' ? `
                      <button class="btn btn-primary" onclick="confirmExpensePaid('${x.expenseId}')">確認撥款</button>
                    ` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

    function tableBlock(title, headers, rows) {
      return `
        ${title ? `<div class="card-title">${title}</div>` : ''}
        <div class="table-wrap">
          <table>
            <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
            <tbody>
              ${rows && rows.length
                ? rows.map(r => `<tr>${r.map(c => `<td>${c ?? ''}</td>`).join('')}</tr>`).join('')
                : `<tr><td colspan="${headers.length}" class="muted">目前沒有資料</td></tr>`
              }
            </tbody>
          </table>
        </div>
      `;
    }

    function statusClass(status) {
      if (status === '有效') return `<span class="pill-ok">${esc(status)}</span>`;
      if (status === '未啟用') return `<span class="pill-warn">${esc(status)}</span>`;
      return `<span class="pill-danger">${esc(status)}</span>`;
    }

    async function refreshAdminPages() {
      if (state.bootstrap.role === 'admin' || state.bootstrap.role === 'finance') {
        await renderDashboardPage();
        await renderFinanceAllPage();
      }
      if (state.bootstrap.role === 'admin') {
        await renderMembersPage();
      }
      await renderRecordsPage();
      await renderPointsPage();
    }

    function handleMembersFilter(vv) {
      state.filters.membersKeyword = vv;
      renderMembersPage();
    }

    function handleFinanceFilter(vv) {
      state.filters.financeKeyword = vv;
      doRenderFinanceAllPage();
    }

    function prefillName() {
      return state.bootstrap?.member?.name || state.bootstrap?.user?.displayName || '';
    }

    function v(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    function esc(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function linkify(url, text='查看') {
      if (!url) return '-';
      return `<a href="${url}" target="_blank" rel="noopener noreferrer">${text}</a>`;
    }

    function fileToBase64Payload(file) {
      return new Promise((resolve, reject) => {
        if (!file) return reject(new Error('請先選擇檔案'));
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const parts = result.split(',');
          const meta = parts[0] || '';
          const base64 = parts[1] || '';
          const mimeType = file.type || (meta.match(/data:(.*?);base64/) || [])[1] || 'application/octet-stream';
          const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
          resolve({ base64, mimeType, ext });
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    initApp();
  </script>
