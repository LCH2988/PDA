<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>台灣帕金森病友權益促進會</title>

  <style>
    /* ===== 字體大小 CSS 變數（可動態切換）===== */
    :root{
      --fs-base:20px;
      --fs-sm:17px;
      --fs-xs:15px;
      --fs-lg:22px;
      --fs-xl:26px;
      --fs-xxl:30px;
      --fs-title:24px;
      --fs-modal-title:26px;
      --fs-label:20px;
      --fs-input:22px;
      --fs-btn:22px;
      --fs-nav:14px;
      --fs-nav-ico:30px;
      --fs-badge:16px;
      --fs-stat-k:17px;
      --fs-stat-v:28px;
      --fs-item-title:21px;
      --fs-item-meta:18px;
      --fs-module-icon:36px;
      --fs-module-label:18px;
      --fs-notice:18px;
      --fs-section:19px;
      --fs-toast:18px;
      --fs-brand-title:18px;
      --fs-brand-sub:14px;
      --fs-top-btn:17px;
      --btn-h:64px;
      --input-h:62px;
      --nav-h:88px;

      --bg:#f0f4ff;
      --card:#fff;
      --primary:#1a56db;
      --primary-dark:#1341b0;
      --primary-light:#e8efff;
      --success:#15803d;
      --success-light:#dcfce7;
      --warn:#b45309;
      --warn-light:#fef3c7;
      --danger:#b91c1c;
      --danger-light:#fee2e2;
      --purple:#6d28d9;
      --purple-light:#ede9fe;
      --line:#00B900;
      --text:#1e293b;
      --muted:#64748b;
      --border:#e2e8f0;
      --radius:20px;
      --shadow:0 4px 24px rgba(30,41,59,.10);
      --safe-b:env(safe-area-inset-bottom);
    }

    body.fs-small{
      --fs-base:17px;--fs-sm:15px;--fs-xs:13px;--fs-lg:19px;--fs-xl:22px;--fs-xxl:26px;
      --fs-title:21px;--fs-modal-title:22px;--fs-label:17px;--fs-input:18px;--fs-btn:18px;
      --fs-nav:12px;--fs-nav-ico:26px;--fs-badge:13px;--fs-stat-k:14px;--fs-stat-v:24px;
      --fs-item-title:18px;--fs-item-meta:16px;--fs-module-icon:30px;--fs-module-label:15px;
      --fs-notice:16px;--fs-section:16px;--fs-toast:16px;--fs-brand-title:16px;--fs-brand-sub:13px;
      --fs-top-btn:15px;--btn-h:54px;--input-h:54px;--nav-h:80px;
    }

    body.fs-medium{
      --fs-base:20px;--fs-sm:17px;--fs-xs:15px;--fs-lg:22px;--fs-xl:26px;--fs-xxl:30px;
      --fs-title:24px;--fs-modal-title:26px;--fs-label:20px;--fs-input:22px;--fs-btn:22px;
      --fs-nav:14px;--fs-nav-ico:30px;--fs-badge:16px;--fs-stat-k:17px;--fs-stat-v:28px;
      --fs-item-title:21px;--fs-item-meta:18px;--fs-module-icon:36px;--fs-module-label:18px;
      --fs-notice:18px;--fs-section:19px;--fs-toast:18px;--fs-brand-title:18px;--fs-brand-sub:14px;
      --fs-top-btn:17px;--btn-h:64px;--input-h:62px;--nav-h:88px;
    }

    body.fs-large{
      --fs-base:23px;--fs-sm:20px;--fs-xs:18px;--fs-lg:26px;--fs-xl:30px;--fs-xxl:36px;
      --fs-title:28px;--fs-modal-title:30px;--fs-label:23px;--fs-input:25px;--fs-btn:25px;
      --fs-nav:16px;--fs-nav-ico:34px;--fs-badge:18px;--fs-stat-k:20px;--fs-stat-v:32px;
      --fs-item-title:24px;--fs-item-meta:21px;--fs-module-icon:42px;--fs-module-label:21px;
      --fs-notice:21px;--fs-section:22px;--fs-toast:21px;--fs-brand-title:20px;--fs-brand-sub:16px;
      --fs-top-btn:19px;--btn-h:72px;--input-h:70px;--nav-h:96px;
    }

    body.fs-xlarge{
      --fs-base:27px;--fs-sm:23px;--fs-xs:21px;--fs-lg:30px;--fs-xl:36px;--fs-xxl:42px;
      --fs-title:32px;--fs-modal-title:34px;--fs-label:27px;--fs-input:29px;--fs-btn:29px;
      --fs-nav:18px;--fs-nav-ico:38px;--fs-badge:21px;--fs-stat-k:23px;--fs-stat-v:36px;
      --fs-item-title:28px;--fs-item-meta:24px;--fs-module-icon:48px;--fs-module-label:24px;
      --fs-notice:24px;--fs-section:25px;--fs-toast:24px;--fs-brand-title:22px;--fs-brand-sub:18px;
      --fs-top-btn:21px;--btn-h:80px;--input-h:78px;--nav-h:104px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    html,body{
      width:100%;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      font-size:var(--fs-base);
      line-height:1.8;
    }

    body{
      padding-bottom:calc(var(--nav-h) + var(--safe-b) + 24px);
    }

    button,input,select,textarea{
      font-family:inherit;
      font-size:var(--fs-input);
    }

    button{
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
      border:none;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    /* ===== 字體調整列 ===== */
    .font-bar{
      background:#1e293b;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:8px 12px;
      font-size:15px;
      font-weight:700;
      position:sticky;
      top:0;
      z-index:55;
    }

    .font-bar .fb-label{
      font-size:14px;
      opacity:.8;
      margin-right:4px;
    }

    .fs-btn{
      background:rgba(255,255,255,.15);
      color:#fff;
      border:1.5px solid rgba(255,255,255,.3);
      border-radius:8px;
      padding:5px 12px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      min-width:44px;
      min-height:36px;
    }

    .fs-btn.active{
      background:var(--primary);
      border-color:var(--primary);
    }

    .fs-btn:active{
      opacity:.7;
    }

    /* ===== TOP BAR ===== */
    .topbar{
      position:sticky;
      top:41px;
      z-index:50;
      background:linear-gradient(135deg,#1341b0,#1a56db 60%,#2563eb);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      box-shadow:0 4px 20px rgba(26,86,219,.3);
      min-height:72px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      cursor:pointer;
      min-width:0;
    }

    .logo{
      width:52px;
      height:52px;
      border-radius:14px;
      background:rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:30px;
      flex-shrink:0;
      border:2px solid rgba(255,255,255,.3);
    }

    .brand-text{
      min-width:0;
    }

    .brand-text .brand-title{
      font-weight:900;
      font-size:var(--fs-brand-title);
      line-height:1.2;
    }

    .brand-text .brand-sub{
      font-size:var(--fs-brand-sub);
      opacity:.85;
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:360px;
    }

    .top-actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .top-btn{
      background:rgba(255,255,255,.2);
      color:#fff;
      border-radius:999px;
      padding:10px 18px;
      font-size:var(--fs-top-btn);
      font-weight:800;
      border:1.5px solid rgba(255,255,255,.35);
      min-height:46px;
      white-space:nowrap;
    }

    .top-btn:active{
      opacity:.8;
    }

    /* ===== WRAP ===== */
    .wrap{
      max-width:780px;
      margin:0 auto;
      padding:16px;
    }

    /* ===== CARDS ===== */
    .card{
      background:var(--card);
      border-radius:var(--radius);
      padding:22px;
      box-shadow:var(--shadow);
      border:1px solid rgba(30,41,59,.06);
      margin-bottom:18px;
    }

    .card-title{
      font-size:var(--fs-title);
      font-weight:900;
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:18px;
      color:var(--text);
      flex-wrap:wrap;
    }

    .card-title .icon{
      font-size:calc(var(--fs-title) + 4px);
    }

    .card-title .sub{
      font-size:var(--fs-sm);
      color:var(--muted);
      font-weight:600;
      margin-left:auto;
    }

    /* ===== HERO LOGIN ===== */
    .hero-login{
      background:linear-gradient(160deg,#1341b0,#1a56db 50%,#38bdf8);
      border-radius:var(--radius);
      padding:30px 22px 26px;
      color:#fff;
      margin-bottom:18px;
      box-shadow:0 8px 32px rgba(26,86,219,.25);
    }

    .hero-login .org-logo{
      width:80px;
      height:80px;
      border-radius:20px;
      background:rgba(255,255,255,.2);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:46px;
      margin:0 auto 16px;
      border:2px solid rgba(255,255,255,.35);
    }

    .hero-login h1{
      font-size:var(--fs-xl);
      font-weight:900;
      text-align:center;
      line-height:1.4;
    }

    .hero-login .tagline{
      text-align:center;
      font-size:var(--fs-lg);
      opacity:.9;
      margin:10px 0 20px;
      line-height:1.7;
    }

    .bank-info{
      background:rgba(255,255,255,.15);
      border-radius:14px;
      padding:16px;
      border:1px solid rgba(255,255,255,.2);
      margin-bottom:20px;
      font-size:var(--fs-sm);
      line-height:2;
    }

    .bank-info b{
      font-size:var(--fs-base);
    }

    /* ===== BUTTONS ===== */
    .btn{
      width:100%;
      min-height:var(--btn-h);
      border-radius:16px;
      font-weight:900;
      font-size:var(--fs-btn);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 18px;
      margin:10px 0;
      transition:transform .12s,box-shadow .12s;
      text-align:center;
    }

    .btn:active{
      transform:scale(.97);
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;
      box-shadow:0 4px 16px rgba(26,86,219,.3);
    }

    .btn-success{
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:#fff;
      box-shadow:0 4px 16px rgba(21,128,61,.25);
    }

    .btn-warn{
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:#fff;
      box-shadow:0 4px 16px rgba(217,119,6,.25);
    }

    .btn-danger{
      background:linear-gradient(135deg,#dc2626,#b91c1c);
      color:#fff;
    }

    .btn-line{
      background:linear-gradient(135deg,#00B900,#009900);
      color:#fff;
      box-shadow:0 4px 16px rgba(0,185,0,.25);
    }

    .btn-outline{
      background:#fff;
      color:var(--primary);
      border:2px solid #bfdbfe;
    }

    .btn-ghost{
      background:#f1f5f9;
      color:#475569;
      border:1.5px solid var(--border);
    }

    .btn-sm{
      min-height:52px;
      font-size:var(--fs-sm);
      border-radius:13px;
      padding:10px 16px;
      width:auto;
      flex:0 0 auto;
      margin:4px;
    }

    .btn-xs{
      min-height:46px;
      font-size:var(--fs-xs);
      border-radius:11px;
      padding:8px 14px;
      width:auto;
      flex:0 0 auto;
      margin:4px;
    }

    /* ===== FORM ===== */
    .fg{
      margin-bottom:18px;
    }

    .flabel{
      display:block;
      font-weight:800;
      font-size:var(--fs-label);
      margin-bottom:10px;
      color:var(--text);
    }

    .req{
      color:var(--danger);
      margin-left:3px;
    }

    .fc{
      width:100%;
      border:2.5px solid var(--border);
      border-radius:14px;
      padding:16px 18px;
      background:#fff;
      color:var(--text);
      font-size:var(--fs-input);
      min-height:var(--input-h);
      outline:none;
      transition:border-color .15s,box-shadow .15s;
      line-height:1.5;
    }

    .fc:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(26,86,219,.1);
    }

    select.fc{
      cursor:pointer;
    }

    textarea.fc{
      min-height:130px;
      resize:vertical;
      line-height:1.7;
    }

    /* ===== STATS ===== */
    .stat-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .stat{
      border-radius:16px;
      padding:18px;
      border:1.5px solid transparent;
      min-width:0;
    }

    .stat .k{
      font-size:var(--fs-stat-k);
      color:var(--muted);
      font-weight:700;
    }

    .stat .v{
      font-size:var(--fs-stat-v);
      font-weight:950;
      margin-top:6px;
      line-height:1.2;
      word-break:break-word;
    }

    .stat.blue{background:#eff6ff;border-color:#bfdbfe;}
    .stat.green{background:#f0fdf4;border-color:#bbf7d0;}
    .stat.orange{background:#fffbeb;border-color:#fde68a;}
    .stat.purple{background:#f5f3ff;border-color:#ddd6fe;}
    .stat.red{background:#fef2f2;border-color:#fecaca;}

    /* ===== BADGES ===== */
    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 14px;
      font-size:var(--fs-badge);
      font-weight:900;
      white-space:nowrap;
    }

    .bs{background:#dcfce7;color:#166534;}
    .bw{background:#fef3c7;color:#92400e;}
    .bd{background:#fee2e2;color:#991b1b;}
    .bb{background:#dbeafe;color:#1e40af;}
    .bp{background:#ede9fe;color:#5b21b6;}

    /* ===== LIST ITEMS ===== */
    .list{
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .item{
      border:2px solid var(--border);
      border-radius:18px;
      padding:18px;
      background:#fff;
    }

    .item-h{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
    }

    .item-title{
      font-weight:900;
      font-size:var(--fs-item-title);
      line-height:1.4;
      word-break:break-word;
    }

    .item-meta{
      color:var(--muted);
      font-size:var(--fs-item-meta);
      line-height:1.9;
      margin-top:8px;
      word-break:break-word;
    }

    .item-actions{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:14px;
    }

    /* ===== MODULES ===== */
    .module-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .module-btn{
      background:#fff;
      border:2.5px solid var(--border);
      border-radius:18px;
      padding:20px 12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      font-weight:900;
      font-size:var(--fs-module-label);
      color:var(--text);
      text-align:center;
      min-height:100px;
      transition:all .15s;
      box-shadow:0 2px 8px rgba(30,41,59,.06);
    }

    .module-btn:active{
      transform:scale(.96);
      box-shadow:none;
    }

    .module-btn .m-icon{
      font-size:var(--fs-module-icon);
      line-height:1;
    }

    .module-btn .m-label{
      font-size:var(--fs-module-label);
      line-height:1.3;
    }

    .module-btn.blue{border-color:#bfdbfe;background:#eff6ff;}
    .module-btn.green{border-color:#bbf7d0;background:#f0fdf4;}
    .module-btn.orange{border-color:#fde68a;background:#fffbeb;}
    .module-btn.purple{border-color:#ddd6fe;background:#f5f3ff;}
    .module-btn.red{border-color:#fecaca;background:#fef2f2;}
    .module-btn.teal{border-color:#99f6e4;background:#f0fdfa;}

    /* ===== NOTICE ===== */
    .notice{
      border-radius:14px;
      padding:16px 18px;
      font-size:var(--fs-notice);
      line-height:1.9;
      margin-bottom:16px;
      border-left:6px solid;
    }

    .notice.info{background:#eff6ff;border-color:var(--primary);color:#1e40af;}
    .notice.success{background:#f0fdf4;border-color:var(--success);color:#166534;}
    .notice.warn{background:#fffbeb;border-color:#f59e0b;color:#92400e;}
    .notice.danger{background:#fef2f2;border-color:var(--danger);color:#991b1b;}

    /* ===== SECTION HEADER ===== */
    .section-header{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:var(--fs-section);
      font-weight:900;
      color:var(--muted);
      margin:22px 0 12px;
      padding:0 4px;
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .section-header::after{
      content:'';
      flex:1;
      height:1.5px;
      background:linear-gradient(to right,var(--border),transparent);
    }

    /* ===== BOTTOM NAV ===== */
    .bottom-nav{
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      z-index:60;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(16px);
      border-top:2px solid var(--border);
      height:calc(var(--nav-h) + var(--safe-b));
      display:flex;
      justify-content:center;
      padding-bottom:var(--safe-b);
      box-shadow:0 -6px 24px rgba(30,41,59,.08);
    }

    .nav-inner{
      width:100%;
      max-width:780px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:2px;
      padding:8px 6px 10px;
    }

    .nitem{
      background:transparent;
      color:#64748b;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      font-size:var(--fs-nav);
      font-weight:800;
      min-width:0;
      padding:4px 2px;
    }

    .nitem .ico{
      font-size:var(--fs-nav-ico);
      line-height:1;
    }

    .nitem.active{
      background:#eff6ff;
      color:var(--primary);
    }

    /* ===== MODAL ===== */
    .modal-mask{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(15,23,42,.5);
      display:none;
      align-items:flex-end;
      justify-content:center;
    }

    .modal-mask.show{
      display:flex;
    }

    .modal{
      width:100%;
      max-width:780px;
      max-height:92vh;
      overflow-y:auto;
      background:#fff;
      border-radius:26px 26px 0 0;
      padding:22px 22px calc(22px + var(--safe-b));
      box-shadow:0 -16px 48px rgba(0,0,0,.2);
    }

    .modal-handle{
      width:52px;
      height:6px;
      border-radius:999px;
      background:#e2e8f0;
      margin:0 auto 20px;
    }

    .modal-title{
      font-size:var(--fs-modal-title);
      font-weight:950;
      margin-bottom:18px;
    }

    /* ===== TOAST ===== */
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(var(--nav-h) + var(--safe-b) + 24px);
      transform:translateX(-50%);
      z-index:120;
      background:#1e293b;
      color:#fff;
      border-radius:999px;
      padding:16px 26px;
      font-weight:800;
      font-size:var(--fs-toast);
      box-shadow:0 8px 28px rgba(0,0,0,.2);
      display:none;
      max-width:88%;
      text-align:center;
      white-space:nowrap;
    }

    .toast.show{display:block;}
    .toast.s{background:#166534;}
    .toast.e{background:#991b1b;}
    .toast.w{background:#92400e;}

    /* ===== LOADER ===== */
    .loader{
      position:fixed;
      inset:0;
      z-index:110;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.75);
      backdrop-filter:blur(6px);
    }

    .loader.show{
      display:flex;
    }

    .spinner{
      width:60px;
      height:60px;
      border-radius:50%;
      border:6px solid #bfdbfe;
      border-top-color:var(--primary);
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    /* ===== TABS ===== */
    .tabs{
      display:flex;
      gap:10px;
      overflow-x:auto;
      padding-bottom:8px;
      margin-bottom:18px;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }

    .tabs::-webkit-scrollbar{
      display:none;
    }

    .tab{
      white-space:nowrap;

      color:#475569;
      border-radius:999px;
      padding:12px 20px;
      font-weight:900;
      font-size:var(--fs-sm);
      flex-shrink:0;
      min-height:52px;
    }

    .tab.active{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
    }

    .divider{
      border:none;
      border-top:1.5px solid var(--border);
      margin:18px 0;
    }

    .empty{
      text-align:center;
      padding:36px 18px;
      color:var(--muted);
      font-size:var(--fs-base);
      border:2px dashed var(--border);
      border-radius:16px;
      background:#f8fafc;
      line-height:1.9;

    .id-tag{
      display:inline-flex;

      gap:6px;

      color:var(--primary);
      border-radius:999px;
      padding:7px 16px;
      font-size:var(--fs-sm);
      font-weight:900;
    }

    .row{

      gap:10px;
      align-items:flex-start;

    .row>*{
      flex:1;
    }

    .money{
      font-weight:950;
      color:#0f766e;
      font-size:var(--fs-lg);
    }

    .steps{
      display:flex;
      align-items:center;
      margin-bottom:22px;
      gap:0;
    }

    .step{
      flex:1;
      text-align:center;
      font-size:var(--fs-sm);
      font-weight:800;
      color:var(--muted);
      position:relative;
    }

    .step .s-num{
      width:40px;
      height:40px;
      border-radius:50%;
      background:var(--border);
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:var(--fs-base);
      font-weight:900;
      margin:0 auto 6px;
    }

    .step.active .s-num{
      background:var(--primary);
      color:#fff;
    }

    .step.done .s-num{
      background:var(--success);
      color:#fff;
    }

    .step::after{
      content:'';
      position:absolute;
      top:20px;
      left:50%;
      right:-50%;
      height:2px;
      background:var(--border);
      z-index:-1;
    }

    .step:last-child::after{
      display:none;
    }

    .step.done::after{
      background:var(--success);
    }

    .amount-quick{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:14px;
    }

    .amount-chip{
      background:#fff;
      border:2.5px solid var(--border);
      border-radius:999px;
      padding:10px 20px;
      font-size:var(--fs-base);
      font-weight:800;
      color:var(--text);
      cursor:pointer;
      transition:all .12s;
    }

    .amount-chip.active{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
    }

    .amount-chip:active{
      transform:scale(.95);
    }

    .admin-section{
      border-radius:var(--radius);
      border:2px solid transparent;
      padding:18px;
      margin-bottom:16px;

    .admin-section.member{border-color:#bbf7d0;background:#f0fdf4;}

    .admin-section.report{border-color:#fde68a;background:#fffbeb;}
    .admin-section.event{border-color:#99f6e4;background:#f0fdfa;}

      font-weight:900;
      margin-bottom:14px;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .avatar{
      width:72px;
      height:72px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#38bdf8);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      color:#fff;
      font-weight:900;
      flex-shrink:0;
    }

    /* ===== 活動模組補充 ===== */
    #evtKw::placeholder{

    .event-card-grid{

    .rpt-table th{

  <script>
    /*=======================================================
     * 字體大小控制
     =======================================================*/
    function setFontSize(size){
      document.body.classList.remove('fs-small','fs-medium','fs-large','fs-xlarge');
      document.body.classList.add('fs-'+size);

      localStorage.setItem('parkFontSize',size);

      document.querySelectorAll('.fs-btn').forEach(b=>b.classList.remove('active'));

      const map={
        small:'fsSmall',
        medium:'fsMedium',
        large:'fsLarge',
        xlarge:'fsXlarge'
      };

      const el=document.getElementById(map[size]);
      if(el)el.classList.add('active');
    }

    function loadFontSize(){
      const saved=localStorage.getItem('parkFontSize')||'medium';
      setFontSize(saved);
    }


    /*=======================================================
     * 系統設定
     =======================================================*/
    const API_BASE = 'https://script.google.com/macros/s/AKfycbwo-4p2YNomqYU-Zb52LfEIhT6BxN7mbfQAQOuaKE9Npr84Ba-18UDDecUhab65e-k3/exec';
    const LIFF_ID  = '2009456572-588gzru4';
    const ORG_NAME = '社團法人台灣帕金森病友權益促進會';

      '管理員',

    };

      home:'navHome',

      adminTransport:'navAdmin',
      adminEventReport:'navAdmin'
    };


    /*=======================================================
     * API 工具
     =======================================================*/
    async function api(action, data={}){
      const payload = {
        action,
        data:{
          ...data,
          operator:data.operator || APP.user?.name || '',
          operatorId:data.operatorId || APP.user?.memberId || APP.user?.id || ''
        }
      };

      const res = await fetch(API_BASE,{
        method:'POST',
        headers:{
          'Content-Type':'text/plain;charset=utf-8'
        },
        body:JSON.stringify(payload)
      });

      const text = await res.text();

      if(!res.ok){
        throw new Error('API 錯誤 '+res.status);
      }

      try{
        return JSON.parse(text);
      }catch(e){
        throw new Error('回傳格式錯誤：' + text.slice(0,120));
      }
    }

    async function runApi(action,data={},onSuccess){
      showLoad();

      try{
        const res = await api(action,data);
        hideLoad();

        if(res.success){
          if(onSuccess) onSuccess(res);
        }else{
          toast(res.message||'操作失敗','e');
        }

        return res;
      }catch(e){
        hideLoad();
        toast('連線失敗：'+e.message,'e');
        return {
          success:false,
          message:e.message
        };
      }
    }


    /*=======================================================
     * UI 工具
     =======================================================*/
    function $(id){
      return document.getElementById(id);
    }

    function esc(s){
      return String(s==null?'':s)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#39;');
    }

    function jsStr(s){
      return String(s==null?'':s)
        .replace(/\\/g,'\\\\')
        .replace(/'/g,"\\'")
        .replace(/\n/g,'\\n')
        .replace(/\r/g,'');
    }

    function fmtMoney(n){
      return 'NT$'+Number(n||0).toLocaleString('zh-TW');
    }

    function fmtDate(d){
      if(!d) return '--';

      try{
        const dt = new Date(d);
        if(isNaN(dt.getTime())) return String(d);

        return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
      }catch(e){
        return String(d);
      }
    }

    function today(){
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function yearOptions(sel){
      const y = new Date().getFullYear();
      const s = Number(sel||y);

      return [y+1,y,y-1,y-2,y-3].map(v=>
        `<option value="${v}"${v===s?' selected':''}>${v} 年</option>`
      ).join('');
    }

    function monthOptions(sel){
      const s = sel ? Number(sel) : '';

      return `<option value="">全年</option>` +
        Array.from({length:12}).map((_,i)=>{
          const v = i+1;
          return `<option value="${v}"${v===s?' selected':''}>${v} 月</option>`;
        }).join('');
    }

    function showLoad(){
      $('loader')?.classList.add('show');
    }

    function hideLoad(){
      $('loader')?.classList.remove('show');
    }

    function toast(msg,type){
      const el = $('toast');
      if(!el) return;

      el.textContent = msg || '';
      el.className = 'toast show ' + (type || '');

      clearTimeout(window.__tt);
      window.__tt = setTimeout(()=>{
        el.className='toast';
      },3500);
    }

    function setMain(html){
      $('main').innerHTML = html;
      window.scrollTo(0,0);
    }

    function openModal(html){
      $('modal').innerHTML = '<div class="modal-handle"></div>' + html;
      $('modalMask').classList.add('show');
    }

    function closeModal(){
      $('modalMask').classList.remove('show');
      $('modal').innerHTML = '';
    }

    function maskClose(e){
      if(e.target.id === 'modalMask') closeModal();
    }

    function confirmCritical(msg){
      return confirm((msg || '確定執行此操作？') + '\n\n⚠️ 此操作將影響正式資料，請確認後再繼續。');
    }

    function requireInput(id,label){
      const el = $(id);
      const v = el ? el.value.trim() : '';

      if(!v){
        toast('請填寫：'+label,'w');
        el?.focus();
        return '';
      }

      return v;
    }

    function requireAmount(id,label){
      const el = $(id);
      const n = Number(el ? el.value : 0);

      if(!n || n <= 0){
        toast((label || '金額') + '必須大於 0','w');
        el?.focus();
        return 0;
      }

      return n;
    }

    function isValidTaiwanMobile(p){
      return /^09\d{8}$/.test(String(p||'').trim());
    }

    function isAdminUser(u){
      return !!(u && ADMIN_TYPES.includes(String(u.type||'')));
    }

    function showBack(show){
      $('backBtn')?.classList.toggle('hide',!show);
    }

    function selectOnlyWithin(selector, activeEl){
      document.querySelectorAll(selector).forEach(t=>t.classList.remove('active'));
      if(activeEl) activeEl.classList.add('active');
    }


    /*=======================================================
     * Session / 登出
     =======================================================*/
    function updateLoginButton(){
      const btn = $('loginBtn');
      if(!btn) return;

      if(APP.user){
        btn.textContent = '登出';
        btn.onclick = logout;

        $('topSub').textContent = `${APP.user.name||''}｜${APP.user.type||'會員'}`;
      }else{
        btn.textContent = '登入';
        btn.onclick = openLogin;

        $('topSub').textContent = '會員・會務・財務管理系統';
      }
    }

    function saveSession(){
      localStorage.setItem('parkUser',JSON.stringify(APP.user||null));
      localStorage.setItem('parkAdminVerified',APP.isAdminVerified?'Y':'');
    }

    function loadSession(){
      try{
        APP.user = JSON.parse(localStorage.getItem('parkUser')||'null');
        APP.isAdminVerified = localStorage.getItem('parkAdminVerified') === 'Y';
      }catch(e){
        APP.user = null;
        APP.isAdminVerified = false;
      }
    }

    function logout(){
      if(!confirm('確定登出？')) return;

      APP.user = null;
      APP.isAdminVerified = false;

      localStorage.removeItem('parkUser');
      localStorage.removeItem('parkAdminVerified');

      updateLoginButton();
      toast('已登出','s');
      go('home',{},false);
    }


    /*=======================================================
     * 路由
     * 注意：
     * 下列 renderXXX 函式會在後續 Unit 2~6 定義。
     * 函式宣告會被 hoist，因此此處可以先引用。
     =======================================================*/
    const ROUTES = {
      home: renderHome,

      announcements: renderAnnouncements,
      events: renderEvents,
      eventDetail: renderEventDetail,

      memberCenter: renderMemberCenter,
      editProfile: renderEditProfile,
      myEvents: renderMyEvents,

      myPayments: renderMyPayments,
      myDonations: renderMyDonations,

      adminHome: renderAdminHome,
      memberManage: renderMemberManage,
      memberDetail: renderMemberDetail,
      pendingPayments: renderPendingPayments,
      pendingDonations: renderPendingDonations,

      financeIncome: renderFinanceIncome,
      financeExpense: renderFinanceExpense,
      expenseList: renderExpenseList,
      expenseDetail: renderExpenseDetail,
      receiptList: renderReceiptList,
      voucherList: renderVoucherList,
      budgetManage: renderBudgetManage,
      projectManage: renderProjectManage,
      subjectManage: renderSubjectManage,
      accountManage: renderAccountManage,
      reportCenter: renderReportCenter,

      staffManage: renderStaffManage,
      systemSetting: renderSystemSetting,
      announceManage: renderAnnounceManage,

      adminEvents: renderAdminEvents,
      adminEventDetail: renderAdminEventDetail,
      adminVolunteer: renderAdminVolunteer,
      adminTransport: renderAdminTransport,
      adminEventReport: renderAdminEventReport
    };

    function go(page,params={},push=true){
      if(push && APP.page && APP.page !== page){
        APP.history.push({
          page:APP.page,
          params:APP._params || {}
        });
      }

      APP.page = page;
      APP._params = params || {};

      document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));

      const navId = NAV_MAP[page];
      if(navId) $(navId)?.classList.add('active');

      showBack(APP.history.length > 0);

      const fn = ROUTES[page];

      if(fn){
        fn(params || {});
      }else{
        setMain(`<div class="card"><div class="empty">頁面建置中：${esc(page)}</div></div>`);
      }
    }

    function goBack(){
      if(!APP.history.length) return;

      const prev = APP.history.pop();

      APP.page = prev.page;
      APP._params = prev.params || {};

      document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));

      const navId = NAV_MAP[prev.page];
      if(navId) $(navId)?.classList.add('active');

      showBack(APP.history.length > 0);

      const fn = ROUTES[prev.page];

      if(fn){
        fn(prev.params || {});
      }else{
        setMain(`<div class="card"><div class="empty">頁面建置中：${esc(prev.page)}</div></div>`);
      }
    }

        /*=======================================================
     * 登入頁面
     =======================================================*/
    function openLogin(){
      openModal(`
        <div style="background:linear-gradient(135deg,#1341b0,#1a56db 60%,#38bdf8);border-radius:18px;padding:24px 20px;color:#fff;margin-bottom:20px;text-align:center;">
          <div style="font-size:50px;margin-bottom:12px;">🌿</div>
          <div style="font-size:var(--fs-xl);font-weight:900;line-height:1.4;margin-bottom:10px;">台灣帕金森病友<br>權益促進會</div>
          <div style="font-size:var(--fs-base);opacity:.9;line-height:1.8;">陪伴病友・守護權益・共創希望</div>
        </div>

        <div class="modal-title">請選擇登入方式</div>

    function openPhoneLogin(){

        </div>

        <div class="fg">
          <label class="flabel">手機後 9 碼 <span class="req">*</span></label>

    function initLiff(){

        APP.liffReady = false;
        return;
      }

      if(window.liff){
        doInitLiff();
        return;
      }

      const s = document.createElement('script');
      s.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
      s.onload = doInitLiff;
      s.onerror = ()=>{
        APP.liffReady = false;
      };

      document.head.appendChild(s);
    }

    async function doInitLiff(){
      try{
        await liff.init({liffId:LIFF_ID});

        APP.liffReady = true;

        if(liff.isLoggedIn()){

          }catch(e){}
        }
      }catch(e){
        APP.liffReady = false;
      }
    }

    async function loadAnnouncements(){
      const area = $('annList');

      if(area){
        area.innerHTML = `<div class="empty">載入中...</div>`;
      }

      try{
        const res = await api('announcement.publicList',{
          keyword:$('annKw')?.value.trim() || '',
          target:'會員'
        });

        if(!area) return;

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">目前沒有公告</div>`;
          return;
        }

        area.innerHTML = rows.map(r=>`
          <div class="item">
            <div class="item-h">
              <div>
                <div class="item-title">${String(r.pinned)==='Y'?'📌 ':''}${esc(r.title)}</div>
                <div class="item-meta">
                  ${esc(r.date || '')} ｜ ${esc(r.category || '')} ｜ 對象：${esc(r.target || '全部')}
                </div>
              </div>

              <span class="badge bb">${esc(r.target || '全部')}</span>
            </div>

            <div class="item-meta" style="white-space:pre-wrap;margin-top:10px;color:var(--text);">
              ${esc(r.content || '')}
            </div>
          </div>
        `).join('');

      }catch(e){
        if(area){
          area.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`;
        }
      }
    }

    async function submitProfile(){

      const phone = requireInput('pfPhone','手機');

      if(!name || !phone) return;

      if(!isValidTaiwanMobile(phone)){
        toast('請輸入正確手機格式，例如 0912345678','w');
        return;
      }

      showLoad();

      try{
        const res = await api('member.updateProfile',{
          memberId:APP.user.memberId || APP.user.id,
          name,
          nickname:$('pfNick').value.trim(),
          phone,
          mobile:phone,
          email:$('pfEmail').value.trim(),
          birthday:$('pfBirthday').value,
          address:$('pfAddress').value.trim(),
          diagnosisYear:$('pfDiagnosisYear').value,
          doctor:$('pfDoctor').value.trim(),
          hospital:$('pfHospital').value.trim(),
          medication:$('pfMedication').value.trim(),
          surgery:$('pfSurgery').value.trim(),
          specialNeeds:$('pfSpecialNeeds').value.trim(),
          healthConsent:$('pfHealthConsent').value
        });

        hideLoad();

        if(res.success){
          APP.user = res.member;

          saveSession();
          updateLoginButton();

          toast('資料已更新 ✅','s');
          go('memberCenter',{},false);
        }else{
          toast(res.message || '更新失敗','e');
        }
      }catch(e){
        hideLoad();
        toast('更新失敗：'+e.message,'e');
      }
    }

    async function viewReceiptPdf(receiptNo){

          window.open(res.pdfUrl || res.url || res.downloadUrl,'_blank');

      }catch(e){
        hideLoad();

      }
    }

    async function submitPaymentApply(){
      const amount = Number($('payAmount').value || 0);

      if(!amount || amount <= 0){

        return;
      }

      showLoad();

      try{
        const res = await api('payment.apply',{
          memberId:APP.user.memberId || APP.user.id,
          name:APP.user.name,
          phone:APP.user.phone || APP.user.mobile || '',
          amount,
          year:$('payYear').value,
          method:$('payMethod').value,
          date:$('payDate').value,
          note:$('payNote').value.trim()
        });

        hideLoad();

    async function loadMyPayments(){
      const area = $('myPayList');
      if(!area) return;

      area.innerHTML = `<div class="empty">載入中...</div>`;

      try{
        const res = await api('payment.list',{
          memberId:APP.user.memberId || APP.user.id,
          phone:APP.user.phone || APP.user.mobile || ''
        });

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無繳費紀錄</div>`;
          return;
        }

        area.innerHTML = rows.map(r=>{
          const ok = r.status==='已繳費' || r.status==='已確認';
          const rej = r.status==='已退回';

          return `
            <div class="item">
              <div class="item-h">
                <div>
                  <div class="item-title">${fmtMoney(r.amount)} ｜ ${esc(r.year||'')} 年度</div>

                  <div class="item-meta">
                    日期：${esc(r.date||'')} ｜ 方式：${esc(r.method||'')}<br>
                    到期日：${esc(r.expiryDate||'--')} ｜ 收據：${esc(r.receiptNo||'尚未開立')}<br>
                    ${r.note?'備註：'+esc(r.note):''}
                  </div>
                </div>

                <span class="badge ${ok?'bs':rej?'bd':'bw'}">${esc(r.status||'待確認')}</span>
              </div>

              ${ok && r.receiptNo ? `
                <div class="item-actions">
                  <button class="btn btn-outline btn-xs" onclick="viewReceiptPdf('${jsStr(r.receiptNo)}')">🧾 下載收據 PDF</button>

              ${!ok && !rej ? `
                <div class="notice warn" style="margin-top:10px;margin-bottom:0;">⏳ 等待管理員確認入帳中</div>
              `:''}

              ${rej ? `

              `:''}
            </div>
          `;
        }).join('');

      }catch(e){
        area.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`;
      }
    }

    function filterExpenseList(el,status){
      document.querySelectorAll('#main .tab').forEach(t=>t.classList.remove('active'));
      el.classList.add('active');
      loadExpenseList(status);
    }

    async function loadExpenseList(statusFilter){
      const area = $('expenseListArea');
      if(!area) return;

      try{
        const res = await api('expense.list',{});

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        let rows = res.items || [];

        if(statusFilter){
          rows = rows.filter(e=>e.status === statusFilter);
        }

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無支出申請</div>`;
          return;
        }

        window._expenseCache = {};

        area.innerHTML = rows.map(e=>{
          window._expenseCache[e.id] = e;

          return `
            <div class="item">
              <div class="item-h">
                <div>
                  <div class="item-title">${esc(e.description||e.subjectName)} ｜ ${fmtMoney(e.amount)}</div>

                  <div class="item-meta">
                    日期：${esc(e.date||'')} ｜ 科目：${esc(e.subjectCode||'')} ${esc(e.subjectName||'')}<br>
                    申請人：${esc(e.applicant||'')} ｜ 受款人：${esc(e.payee||'--')}<br>
                    ${e.projectName?`專案：${esc(e.projectName)}<br>`:''}
                    ${e.voucherNo&&e.voucherNo!=='--'?`傳票：${esc(e.voucherNo)}<br>`:''}
                    ${e.rejectReason?`<span style="color:var(--danger);">退回原因：${esc(e.rejectReason)}</span>`:''}
                  </div>
                </div>

                <span class="badge ${e.status==='已撥款'?'bs':e.status==='已核准'?'bb':e.status==='已退回'?'bd':'bw'}">
                  ${esc(e.status||'待核准')}
                </span>
              </div>

              <div class="item-actions">
                <button class="btn btn-outline btn-xs" onclick="openExpenseVoucherById('${jsStr(e.id)}')">📄 憑證</button>

                ${(e.status==='待核准' || !e.status)?`
                  <button class="btn btn-success btn-xs" onclick="approveExpense('${jsStr(e.id)}')">✅ 核准</button>
                  <button class="btn btn-danger btn-xs" onclick="rejectExpense('${jsStr(e.id)}')">❌ 退回</button>
                `:''}

                ${(e.status!=='已撥款' && e.status!=='已退回')?`
                  <button class="btn btn-warn btn-xs" onclick="confirmExpensePaid('${jsStr(e.id)}')">💸 確認撥款</button>
                `:''}
              </div>
            </div>
          `;
        }).join('');

      }catch(e){
        area.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`;
      }
    }

    function openExpenseVoucherById(id){
      const e = window._expenseCache?.[id];

      if(!e){
        toast('找不到憑證資料','e');
        return;
      }

      openExpenseVoucher(e);
    }

    function openExpenseVoucher(e){
      openModal(`
        <div class="modal-title">📄 支出憑證單</div>

        ${buildExpenseVoucherHtml(e)}

        <button class="btn btn-primary" onclick="printElement('expenseVoucherDoc')">🖨️ 列印</button>
        <button class="btn btn-ghost" onclick="closeModal()">關閉</button>
      `);
    }

    async function approveExpense(id){
      if(!confirmCritical('確定核准此筆支出？')) return;

      await runApi('expense.approve',{id},()=>{
        toast('支出已核准','s');
        loadExpenseList('');

    async function rejectExpense(id){
      openRejectModal('支出退回原因',async(reason)=>{

        toast(`✅ 已撥款，傳票：${res.voucherNo||''}`,'s');
        loadExpenseList('');
      });
    }

    async function loadBudgetList(){
      const area = $('budgetListArea');
      if(!area) return;

      area.innerHTML = `<div class="empty">載入中...</div>`;

      try{
        const res = await api('budget.list',{
          year:$('budgetYearFilter')?.value || '',
          month:$('budgetMonthFilter')?.value || ''
        });

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message||'載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無預算資料</div>`;
          return;
        }

        area.innerHTML = rows.map(b=>{
          const amount = Number(b.amount||b.budgetAmount||0);
          const used = Number(b.usedAmount||0);
          const rate = amount ? Math.round(used / amount * 100) : 0;

          return `
            <div class="item">
              <div class="item-h">
                <div>
                  <div class="item-title">${esc(b.year)} 年 ${b.month?esc(b.month)+' 月':'全年'} ｜ ${fmtMoney(amount)}</div>
                  <div class="item-meta">
                    科目：${esc(b.subjectCode||'')} ${esc(b.subjectName||'')}<br>
                    專案：${esc(b.projectName||'整體預算')}<br>
                    已使用：${fmtMoney(used)} ｜ 使用率：${rate}%
                    ${b.note?`<br>備註：${esc(b.note)}`:''}
                  </div>
                </div>
                <span class="badge ${rate>=100?'bd':rate>=80?'bw':'bs'}">${rate}%</span>
              </div>
            </div>
          `;
        }).join('');

      }catch(e){
        area.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`;
      }
    }

    async function submitBudget(){
      const amount = requireAmount('budAmount','預算金額');
      if(!amount) return;

      await runApi('budget.add',{
        year:$('budYear').value,
        month:$('budMonth').value,
        subjectCode:$('budSubject').value,
        projectName:$('budProjectName').value.trim(),
        amount,
        note:$('budNote').value.trim()
      },()=>{
        toast('預算已儲存','s');
        go('budgetManage',{},false);
      });
    }

      {key:'全部', icon:'🌟'},
      {key:'講座', icon:'🎤'},
      {key:'復健', icon:'🧘'},
      {key:'聚會', icon:'🤝'},

    let _evtCatFilter = '全部';

    function evtStatusBadge(status){
      const s = String(status || '');
      if(s === '開放報名') return `<span class="badge bs">開放報名</span>`;
      if(s === '已額滿') return `<span class="badge bw">已額滿</span>`;
      if(s === '已截止') return `<span class="badge bd">已截止</span>`;
      if(s === '已取消') return `<span class="badge bd">已取消</span>`;
      if(s === '草稿') return `<span class="badge bb">草稿</span>`;
      return `<span class="badge bb">${esc(s || '未設定')}</span>`;
    }

    function evtDateText(e){
      const d = e.eventDate || e.date || '';
      const st = e.startTime || '';
      const et = e.endTime || '';
      return `${esc(d)}${st ? ' ' + esc(st) : ''}${et ? ' ~ ' + esc(et) : ''}`;
    }

    function canRegisterEvent(e){
      const status = String(e.status || '');
      if(status !== '開放報名') return false;

      const cap = Number(e.capacity || e.limit || 0);
      const reg = Number(e.registeredCount || e.registrationCount || e.regCount || 0);

      if(cap > 0 && reg >= cap) return false;

      const deadline = e.deadline || e.registerDeadline || '';
      if(deadline){
        const todayDate = new Date(today() + 'T00:00:00');
        const deadDate = new Date(deadline + 'T23:59:59');
        if(todayDate > deadDate) return false;
      }

      return true;
    }

    async function loadPublicEvents(){
      const area = $('eventListArea');
      if(area) area.innerHTML = `<div class="empty">活動載入中...</div>`;

      try{
        const res = await api('event.list',{
          keyword:$('evtKw')?.value.trim() || '',
          publicOnly:true
        });

        if(!res.success){
          if(area) area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        _evtListCache = res.items || [];
        renderEventCards();

      }catch(e){
        if(area) area.innerHTML = `<div class="empty">活動載入失敗：${esc(e.message)}</div>`;
      }
    }

    function renderEventCards(){
      const area = $('eventListArea');
      if(!area) return;

      let rows = _evtListCache || [];
      const kw = $('evtKw')?.value.trim().toLowerCase() || '';

      if(_evtCatFilter && _evtCatFilter !== '全部'){
        rows = rows.filter(e => String(e.category || '') === _evtCatFilter);
      }

      if(kw){
        rows = rows.filter(e =>
          String(e.title || '').toLowerCase().includes(kw) ||
          String(e.location || '').toLowerCase().includes(kw) ||
          String(e.category || '').toLowerCase().includes(kw)
        );
      }

      if(!rows.length){
        area.innerHTML = `<div class="empty">目前沒有符合條件的活動</div>`;
        return;
      }

      const groups = {};
      rows.forEach(e=>{
        const cat = e.category || '其他';
        if(!groups[cat]) groups[cat] = [];
        groups[cat].push(e);
      });

      area.innerHTML = Object.keys(groups).map(cat=>`
        <div class="section-header">${esc(cat)}</div>
        <div class="event-card-grid">
          ${groups[cat].map(e => buildEventCard(e)).join('')}
        </div>
      `).join('');
    }

    function buildEventCard(e){
      const id = e.eventId || e.id || '';
      const cap = Number(e.capacity || e.limit || 0);
      const reg = Number(e.registeredCount || e.registrationCount || e.regCount || 0);
      const fee = Number(e.fee || 0);
      const canReg = canRegisterEvent(e);

      return `
        <div class="item" style="margin:0;">
          <div class="item-h">
            <div>
              <div class="item-title">${esc(e.title || '')}</div>
              <div class="item-meta">
                📅 ${evtDateText(e)}<br>
                📍 ${esc(e.location || '')}<br>
                👥 ${reg}${cap ? ' / ' + cap : ''} 人 ｜ 💰 ${fee ? fmtMoney(fee) : '免費'}
              </div>
            </div>
            ${evtStatusBadge(e.status)}
          </div>

          <div class="item-actions">
            <button class="btn btn-outline btn-xs" onclick="go('eventDetail',{id:'${jsStr(id)}'})">查看詳情</button>
            ${canReg ? `
              <button class="btn btn-success btn-xs" onclick="openEventRegister('${jsStr(id)}')">我要報名</button>
            `:''}
          </div>
        </div>
      `;
    }

    async function loadEventRegistrations(eventId){
      const area = $('eventRegList');
      if(!area) return;

      area.innerHTML = `<div class="empty">載入中...</div>`;

      try{
        const res = await api('event.registrationList',{eventId});

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無報名資料</div>`;
          return;
        }

        area.innerHTML = rows.map(r=>{
          const regId = r.registrationId || r.id || '';
          return `

              <div class="item-h">
                <div>
                  <div class="item-title">${esc(r.name || '')}</div>
                  <div class="item-meta">

                    飲食：${esc(r.diet || '無')} ｜ 分組：${esc(r.groupName || '未分組')}<br>
                    備註：${esc(r.note || '--')}

                </div>
                <span class="badge ${r.status==='已確認'?'bs':r.status==='已取消'?'bd':'bw'}">${esc(r.status || '待確認')}</span>

                  <button class="btn btn-success btn-xs" onclick="confirmEventReg('${jsStr(regId)}','${jsStr(eventId)}')">確認</button>

        returnTime:$('transReturnTime')?.value || '',
        origin:$('transOrigin')?.value.trim() || '',
        destination:$('transDestination')?.value.trim() || '',
        seats:Number($('transSeats')?.value || 10),
        volunteerName:$('transVolunteer')?.value.trim() || '',
        note:$('transNote')?.value.trim() || ''
      },()=>{
        toast('交通安排已建立','s');
        loadTransportList();
        showTransportTab($('transportListTab'),'list');
      });
    }

    async function loadTransportPassengers(){
      const area = $('transportPassengerArea');
      if(!area) return;

      area.innerHTML = `<div class="empty">載入中...</div>`;

      try{
        const res = await api('transport.getPassengers',{eventId:$('transFilterEventId')?.value || window._transEventId || ''});

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '載入失敗')}</div>`;
          return;
        }

        const rows = res.items || [];

        if(!rows.length){
          area.innerHTML = `<div class="empty">尚無交通需求乘客</div>`;
          return;
        }

        area.innerHTML = rows.map(p=>`
          <div class="item">
            <div class="item-h">
              <div>
                <div class="item-title">${esc(p.name || '')}</div>
                <div class="item-meta">
                  電話：${esc(p.phone || '')}<br>
                  上車地點：${esc(p.pickupLocation || '--')}<br>
                  活動：${esc(p.eventTitle || p.eventId || '--')}<br>
                  狀態：${p.transportArranged==='Y'?'已安排':'未安排'}
                </div>
              </div>
              <span class="badge ${p.transportArranged==='Y'?'bs':'bw'}">${p.transportArranged==='Y'?'已安排':'待安排'}</span>
            </div>
          </div>
        `).join('');

      }catch(e){
        area.innerHTML = `<div class="empty">載入失敗：${esc(e.message)}</div>`;
      }
    }


    /*=======================================================
     * 活動報表
     =======================================================*/
    async function renderAdminEventReport(){
      if(!adminGuard()) return;

      const y = new Date().getFullYear();

      setMain(`
        <div class="card">
          <div class="card-title">
            <span class="icon">📊</span>活動報表
          </div>

          <div class="row">
            <div class="fg">
              <label class="flabel">年度</label>
              <select id="evtRptYear" class="fc">${yearOptions(y)}</select>
            </div>

            <div class="fg">
              <label class="flabel">月份</label>
              <select id="evtRptMonth" class="fc">${monthOptions('')}</select>
            </div>
          </div>

          <div class="fg">
            <label class="flabel">活動編號</label>
            <input id="evtRptEventId" class="fc" placeholder="可不填，留空代表全部活動">
          </div>

          <div class="module-grid">
            <button class="module-btn blue" onclick="loadEventReport('summary')">
              <span class="m-icon">📋</span><span class="m-label">活動總覽</span>
            </button>
            <button class="module-btn green" onclick="loadEventReport('registration')">
              <span class="m-icon">👥</span><span class="m-label">報名統計</span>
            </button>
            <button class="module-btn orange" onclick="loadEventReport('finance')">
              <span class="m-icon">💰</span><span class="m-label">財務收支</span>
            </button>
            <button class="module-btn purple" onclick="loadEventReport('volunteer')">
              <span class="m-icon">🙋</span><span class="m-label">志工參與</span>
            </button>
            <button class="module-btn teal" onclick="loadEventReport('transport')">
              <span class="m-icon">🚌</span><span class="m-label">交通安排</span>
            </button>
            <button class="module-btn red" onclick="loadEventReport('all')">
              <span class="m-icon">📦</span><span class="m-label">完整報表</span>
            </button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <span class="icon">📄</span>報表結果
          </div>

          <div id="eventReportArea">
            <div class="empty">請選擇上方報表類型</div>
          </div>

          <button class="btn btn-outline" onclick="exportEventReport()">⬇️ 匯出 CSV</button>
        </div>
      `);
    }

    function readEventReportFilter(){
      return {
        year:$('evtRptYear')?.value || new Date().getFullYear(),
        month:$('evtRptMonth')?.value || '',
        eventId:$('evtRptEventId')?.value.trim() || ''
      };
    }

    async function loadEventReport(type){
      EVENT_REPORT_STATE.type = type;

      const area = $('eventReportArea');
      if(!area) return;

      area.innerHTML = `<div class="empty">報表產生中...</div>`;
      showLoad();

      try{
        const res = await api('report.eventSummary',{
          ...readEventReportFilter(),
          reportType:type
        });

        hideLoad();

        if(!res.success){
          area.innerHTML = `<div class="empty">${esc(res.message || '報表產生失敗')}</div>`;
          return;
        }

        area.innerHTML = renderEventReportResult(res,type);
        toast('報表已產生 ✅','s');

      }catch(e){
        hideLoad();
        area.innerHTML = `<div class="empty">失敗：${esc(e.message)}</div>`;
      }
    }

    function renderEventReportResult(res,type){
      const d = res.data || {};

      return `
        <div class="notice success">
          <b>${esc(res.reportName || '活動報表')}</b><br>
          期間：${esc(res.period || '')}<br>
          產生時間：${esc(res.generatedAt || new Date().toLocaleString('zh-TW'))}
        </div>

        ${renderEventReportBody(d,type)}
      `;
    }

    function renderEventReportBody(d,type){
      if(type === 'all'){
        return `
          <div class="section-header">📋 活動總覽</div>
          ${renderEventSummaryReport(d.summary || {})}

          <div class="divider"></div>
          <div class="section-header">👥 報名統計</div>
          ${renderEventRegReport(d.registration || {})}

          <div class="divider"></div>
          <div class="section-header">💰 財務收支</div>
          ${renderEventFinanceReport(d.finance || {})}

          <div class="divider"></div>
          <div class="section-header">🙋 志工參與</div>
          ${renderEventVolunteerReport(d.volunteer || {})}

          <div class="divider"></div>
          <div class="section-header">🚌 交通安排</div>
          ${renderEventTransportReport(d.transport || {})}
        `;
      }

      if(type === 'summary') return renderEventSummaryReport(d);
      if(type === 'registration') return renderEventRegReport(d);
      if(type === 'finance') return renderEventFinanceReport(d);
      if(type === 'volunteer') return renderEventVolunteerReport(d);
      if(type === 'transport') return renderEventTransportReport(d);

      return `<pre style="font-size:var(--fs-xs);overflow:auto;">${esc(JSON.stringify(d,null,2))}</pre>`;
    }

    function renderEventSummaryReport(d){
      const summary = d.summary || d;
      const items = d.items || d.events || [];

      return `
        ${renderObjectCards(summary)}
        ${items.length ? renderGenericReportTable('活動清單',items,{}) : ''}
      `;
    }

    function renderEventRegReport(d){
      const items = d.items || d.registrations || [];
      return `
        ${renderObjectCards(d.summary || d)}
        ${items.length ? renderGenericReportTable('報名明細',items,{}) : ''}
      `;
    }

    function renderEventFinanceReport(d){
      const items = d.items || d.details || [];
      return `
        ${renderObjectCards(d.summary || d)}
        ${items.length ? renderGenericReportTable('財務明細',items,{}) : ''}
      `;
    }

    function renderEventVolunteerReport(d){
      const items = d.items || d.volunteers || [];
      return `
        ${renderObjectCards(d.summary || d)}
        ${items.length ? renderGenericReportTable('志工明細',items,{}) : ''}
      `;
    }

    function renderEventTransportReport(d){
      const items = d.items || d.routes || [];
      return `
        ${renderObjectCards(d.summary || d)}
        ${items.length ? renderGenericReportTable('交通明細',items,{}) : ''}
      `;
    }

    async function exportEventReport(){
      showLoad();

      try{
        const res = await api('report.eventExportCsv',{
          ...readEventReportFilter(),
          reportType:EVENT_REPORT_STATE.type || 'summary'
        });

        hideLoad();

        if(res.success && (res.csvUrl || res.url)){
          window.open(res.csvUrl || res.url,'_blank');
          toast('CSV 已匯出','s');
        }else{
          toast(res.message || '匯出失敗','e');
        }

      }catch(e){
        hideLoad();
        toast('匯出失敗：'+e.message,'e');
      }
    }


    /*=======================================================
     * 啟動初始化
     =======================================================*/
    function boot(){
      loadFontSize();
      loadSession();
      updateLoginButton();
      initLiff();
      loadBaseOptions();
      go('home',{},false);
    }

    document.addEventListener('DOMContentLoaded',boot);
  </script>
</body>
</html>
