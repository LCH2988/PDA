<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --primary:#4A90D9; --dark:#2C3E50; --sidebar-w:240px; }
    body { background:#f0f2f5; font-family:'Segoe UI',sans-serif; }
    .sidebar { width:var(--sidebar-w); min-height:100vh; background:var(--dark); position:fixed; top:0; left:0; z-index:100; transition:.3s; }
    .sidebar-brand { padding:20px; color:#fff; font-weight:700; font-size:1.1rem; border-bottom:1px solid rgba(255,255,255,.1); }
    .sidebar-menu { list-style:none; padding:10px 0; margin:0; }
    .sidebar-menu li a { display:flex; align-items:center; gap:10px; padding:12px 20px; color:rgba(255,255,255,.7); text-decoration:none; transition:.2s; font-size:.9rem; }
    .sidebar-menu li a:hover,.sidebar-menu li a.active { background:rgba(255,255,255,.1); color:#fff; border-left:3px solid var(--primary); }
    .sidebar-menu li a i { width:20px; text-align:center; }
    .sidebar-menu .menu-section { padding:16px 20px 4px; font-size:.7rem; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:.08em; }
    .main-content { margin-left:var(--sidebar-w); min-height:100vh; }
    .topbar { background:#fff; padding:15px 25px; box-shadow:0 1px 5px rgba(0,0,0,.1); display:flex; justify-content:space-between; align-items:center; }
    .page-content { padding:25px; }
    .stat-card { border:none; border-radius:12px; overflow:hidden; transition:transform .2s; }
    .stat-card:hover { transform:translateY(-3px); }
    .stat-icon { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
    .table th { background:#f8f9fa; font-weight:600; font-size:.85rem; }
    .table td { vertical-align:middle; font-size:.9rem; }
    #loginOverlay { position:fixed; inset:0; background:linear-gradient(135deg,var(--primary),var(--dark)); z-index:9999; display:flex; align-items:center; justify-content:center; }
    .login-card { background:#fff; border-radius:16px; padding:40px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
    .status-badge { font-size:.75rem; padding:4px 10px; border-radius:20px; }
    .section-card { background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); padding:24px; margin-bottom:24px; }
    /* ── 報表專用 ── */
    .rank-bar { height:10px; border-radius:5px; background:#e9ecef; overflow:hidden; }
    .rank-bar-fill { height:100%; border-radius:5px; transition:width .6s ease; }
    .rank-num { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; }
    .rank-1{background:#FFD700;color:#7a5c00} .rank-2{background:#C0C0C0;color:#555} .rank-3{background:#CD7F32;color:#fff} .rank-n{background:#e9ecef;color:#666}
    .kpi-card { border-radius:12px; padding:18px 20px; color:#fff; }
    .kpi-val { font-size:1.7rem; font-weight:700; line-height:1.1; }
    .kpi-label { font-size:.78rem; opacity:.85; margin-top:3px; }
    .member-avatar { width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; color:#fff; }
    .tab-btn { border:none; background:transparent; padding:10px 18px; font-size:.9rem; color:#666; border-bottom:2px solid transparent; cursor:pointer; transition:.2s; }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:700; }
    .search-highlight { background:#fff3cd; border-radius:2px; }
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%);}
      .sidebar.show{transform:translateX(0);}
      .main-content{margin-left:0;}
    }
  </style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">
  <div class="login-card text-center">
    <i class="bi bi-shield-lock display-4 text-primary mb-3"></i>
    <h4 class="mb-1">後台管理系統</h4>
    <p class="text-muted small mb-4">GAS 購物平台</p>
    <form id="adminLoginForm">
      <div class="mb-3 text-start">
        <label class="form-label fw-bold">管理員密碼</label>
        <input type="password" class="form-control form-control-lg" id="adminPwd" placeholder="••••••••" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">
        <i class="bi bi-box-arrow-in-right me-2"></i>登入後台
      </button>
      <div id="loginError" class="text-danger small mt-2" style="display:none"></div>
    </form>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-brand"><i class="bi bi-bag-heart-fill me-2"></i>GAS 後台管理</div>
  <ul class="sidebar-menu">
    <li class="menu-section">主選單</li>
    <li><a href="#" class="active" onclick="showAdminPage('dashboard',this)"><i class="bi bi-speedometer2"></i>儀表板</a></li>
    <li><a href="#" onclick="showAdminPage('categories',this)"><i class="bi bi-tags"></i>分類管理</a></li>
    <li><a href="#" onclick="showAdminPage('products',this)"><i class="bi bi-box-seam"></i>商品管理</a></li>
    <li><a href="#" onclick="showAdminPage('orders',this)"><i class="bi bi-receipt"></i>訂單管理</a></li>
    <li class="menu-section">統計報表</li>
    <li><a href="#" onclick="showAdminPage('prodstat',this)"><i class="bi bi-bar-chart-line"></i>商品訂購統計</a></li>
    <li><a href="#" onclick="showAdminPage('memberstat',this)"><i class="bi bi-person-lines-fill"></i>個人訂購清單</a></li>
    <li class="menu-section">系統</li>
    <li><a href="#" onclick="showAdminPage('settings',this)"><i class="bi bi-gear"></i>系統設定</a></li>
  </ul>
  <div style="position:absolute;bottom:20px;left:20px;right:20px">
    <a href="?page=index" target="_blank" class="btn btn-outline-light btn-sm w-100 mb-2">
      <i class="bi bi-shop me-2"></i>前往前台
    </a>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="adminLogout()">
      <i class="bi bi-box-arrow-right me-2"></i>登出
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
  <div class="topbar">
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-sm btn-outline-secondary d-md-none" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h5 class="mb-0 fw-bold" id="pageTitle">📊 儀表板</h5>
    </div>
    <div class="text-muted small" id="topbarTime"></div>
  </div>

  <div class="page-content">

    <!-- ── 儀表板 ── -->
    <div id="page-dashboard">
      <div class="row g-4 mb-4" id="statsCards">
        <div class="col-12 text-center py-4"><div class="spinner-border text-primary"></div></div>
      </div>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="section-card">
            <h6 class="fw-bold mb-3"><i class="bi bi-receipt me-2 text-primary"></i>訂單狀態分佈</h6>
            <div id="orderStatusChart"></div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="section-card">
            <h6 class="fw-bold mb-3"><i class="bi bi-clock-history me-2 text-primary"></i>最新訂單</h6>
            <div id="recentOrders"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 分類管理 ── -->
    <div id="page-categories" style="display:none">
      <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h6 class="fw-bold mb-0"><i class="bi bi-tags me-2 text-primary"></i>分類列表</h6>
          <button class="btn btn-primary btn-sm" onclick="openCategoryModal()"><i class="bi bi-plus-lg me-1"></i>新增分類</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead><tr><th>ID</th><th>名稱</th><th>描述</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="categoryTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── 商品管理 ── -->
    <div id="page-products" style="display:none">
      <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h6 class="fw-bold mb-0"><i class="bi bi-box-seam me-2 text-primary"></i>商品列表</h6>
          <div class="d-flex gap-2">
            <input type="text" id="productSearch" class="form-control form-control-sm" placeholder="搜尋商品..." oninput="filterProductTable()" style="width:180px">
            <button class="btn btn-primary btn-sm" onclick="openProductModal()"><i class="bi bi-plus-lg me-1"></i>新增商品</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead><tr><th>圖片</th><th>商品名稱</th><th>分類</th><th>價格</th><th>庫存</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="productTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ── 訂單管理 ── -->
    <div id="page-orders" style="display:none">
      <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h6 class="fw-bold mb-0"><i class="bi bi-receipt me-2 text-primary"></i>訂單列表</h6>
          <div class="d-flex gap-2 flex-wrap">
            <input type="text" id="orderSearch" class="form-control form-control-sm" placeholder="搜尋訂單/Email..." oninput="loadAdminOrders()" style="width:180px">
            <select class="form-select form-select-sm" id="orderStatusFilter" onchange="loadAdminOrders()" style="width:120px">
              <option value="all">全部狀態</option>
              <option value="pending">待確認</option>
              <option value="confirmed">已確認</option>
              <option value="shipping">配送中</option>
              <option value="delivered">已送達</option>
              <option value="cancelled">已取消</option>
            </select>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead><tr><th>訂單編號</th><th>客戶</th><th>金額</th><th>狀態</th><th>下單時間</th><th>操作</th></tr></thead>
            <tbody id="orderTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════
         ── 商品訂購總數量統計 ──
    ══════════════════════════════════════════ -->
    <div id="page-prodstat" style="display:none">

      <!-- 篩選列 -->
      <div class="section-card py-3 mb-3">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <i class="bi bi-funnel text-primary"></i>
          <select class="form-select form-select-sm" id="psRange" onchange="loadProdStat()" style="width:130px">
            <option value="0">全部時間</option>
            <option value="7">近 7 天</option>
            <option value="30" selected>近 30 天</option>
            <option value="90">近 90 天</option>
            <option value="365">近 1 年</option>
          </select>
          <select class="form-select form-select-sm" id="psStatus" onchange="loadProdStat()" style="width:150px">
            <option value="delivered,confirmed,shipping">已成立訂單</option>
            <option value="all">全部狀態</option>
            <option value="delivered">已送達</option>
            <option value="pending">待確認</option>
            <option value="cancelled">已取消</option>
          </select>
          <select class="form-select form-select-sm" id="psCatFilter" onchange="renderProdStat()" style="width:130px">
            <option value="">全部分類</option>
          </select>
          <input type="text" id="psSearch" class="form-control form-control-sm" placeholder="搜尋商品名稱..." oninput="renderProdStat()" style="width:160px">
          <button class="btn btn-outline-primary btn-sm ms-auto" onclick="exportProdStatCSV()">
            <i class="bi bi-download me-1"></i>匯出 CSV
          </button>
        </div>
      </div>

      <!-- KPI -->
      <div class="row g-3 mb-4" id="psKpiRow">
        <div class="col-12 text-center py-3"><div class="spinner-border text-primary"></div></div>
      </div>

      <!-- 排行榜 -->
      <div class="section-card">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h6 class="fw-bold mb-0"><i class="bi bi-trophy me-2 text-warning"></i>商品訂購排行榜</h6>
          <div class="d-flex gap-2">
            <button class="tab-btn active" id="psTabQty" onclick="switchPsTab('qty',this)">依數量排序</button>
            <button class="tab-btn" id="psTabRev" onclick="switchPsTab('revenue',this)">依金額排序</button>
          </div>
        </div>
        <div id="psRankTable"></div>
      </div>

      <!-- 分類佔比 -->
      <div class="section-card">
        <h6 class="fw-bold mb-3"><i class="bi bi-pie-chart me-2 text-primary"></i>各分類銷售佔比</h6>
        <div id="psCatChart"></div>
      </div>
    </div>

    <!-- ══════════════════════════════════════════
         ── 個人訂購清單明細 ──
    ══════════════════════════════════════════ -->
    <div id="page-memberstat" style="display:none">

      <!-- 篩選列 -->
      <div class="section-card py-3 mb-3">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <i class="bi bi-funnel text-primary"></i>
          <input type="text" id="msSearch" class="form-control form-control-sm" placeholder="搜尋姓名 / Email..." oninput="renderMemberList()" style="width:200px">
          <select class="form-select form-select-sm" id="msRange" onchange="loadMemberStat()" style="width:130px">
            <option value="0">全部時間</option>
            <option value="30" selected>近 30 天</option>
            <option value="90">近 90 天</option>
            <option value="365">近 1 年</option>
          </select>
          <select class="form-select form-select-sm" id="msStatus" onchange="loadMemberStat()" style="width:150px">
            <option value="delivered,confirmed,shipping">已成立訂單</option>
            <option value="all">全部狀態</option>
          </select>
          <select class="form-select form-select-sm" id="msSortBy" onchange="renderMemberList()" style="width:130px">
            <option value="revenue">依消費金額</option>
            <option value="orders">依訂單數</option>
            <option value="qty">依購買件數</option>
          </select>
          <button class="btn btn-outline-primary btn-sm ms-auto" onclick="exportMemberStatCSV()">
            <i class="bi bi-download me-1"></i>匯出 CSV
          </button>
        </div>
      </div>

      <!-- KPI -->
      <div class="row g-3 mb-4" id="msKpiRow">
        <div class="col-12 text-center py-3"><div class="spinner-border text-primary"></div></div>
      </div>

      <div class="row g-4">
        <!-- 左：會員列表 -->
        <div class="col-md-4">
          <div class="section-card p-0" style="overflow:hidden">
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
              <h6 class="fw-bold mb-0"><i class="bi bi-people me-2 text-primary"></i>會員列表</h6>
              <span class="badge bg-primary" id="msMemberCount">0</span>
            </div>
            <div id="msMemberList" style="max-height:520px;overflow-y:auto"></div>
          </div>
        </div>
        <!-- 右：訂購明細 -->
        <div class="col-md-8">
          <div class="section-card" id="msDetailPanel">
            <div class="text-center text-muted py-5">
              <i class="bi bi-person-circle display-4 text-muted opacity-25"></i>
              <p class="mt-3">← 請從左側選擇會員查看訂購明細</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 系統設定 ── -->
    <div id="page-settings" style="display:none">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="section-card">
            <h6 class="fw-bold mb-4"><i class="bi bi-gear me-2 text-primary"></i>系統設定</h6>
            <form id="settingsForm">
              <div class="mb-3">
                <label class="form-label fw-bold">網站名稱</label>
                <input type="text" class="form-control" id="settingSiteName">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">網站描述</label>
                <textarea class="form-control" id="settingSiteDesc" rows="2"></textarea>
              </div>
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">運費 (NT$)</label>
                  <input type="number" class="form-control" id="settingShipping" min="0">
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label fw-bold">免運門檻 (NT$)</label>
                  <input type="number" class="form-control" id="settingFreeThreshold" min="0">
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle me-2"></i>儲存設定
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /page-content -->
</div><!-- /main-content -->

<!-- ── 分類 Modal ── -->
<div class="modal fade" id="categoryModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header" style="background:var(--primary);color:#fff">
      <h5 class="modal-title" id="categoryModalTitle">新增分類</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <form id="categoryForm">
        <input type="hidden" id="catId">
        <div class="mb-3"><label class="form-label fw-bold">分類名稱 *</label><input type="text" class="form-control" id="catName" required></div>
        <div class="mb-3"><label class="form-label fw-bold">描述</label><textarea class="form-control" id="catDesc" rows="2"></textarea></div>
        <div class="mb-3"><label class="form-label fw-bold">狀態</label>
          <select class="form-select" id="catStatus"><option value="active">啟用</option><option value="inactive">停用</option></select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
      <button type="button" class="btn btn-primary" onclick="saveCategory()"><i class="bi bi-check-circle me-2"></i>儲存</button>
    </div>
  </div></div>
</div>

<!-- ── 商品 Modal ── -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header" style="background:var(--primary);color:#fff">
      <h5 class="modal-title" id="productModalTitle">新增商品</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <form id="productForm">
        <input type="hidden" id="prodId">
        <div class="row g-3">
          <div class="col-md-8"><label class="form-label fw-bold">商品名稱 *</label><input type="text" class="form-control" id="prodName" required></div>
          <div class="col-md-4"><label class="form-label fw-bold">分類</label><select class="form-select" id="prodCategory"></select></div>
          <div class="col-12"><label class="form-label fw-bold">商品描述</label><textarea class="form-control" id="prodDesc" rows="3"></textarea></div>
          <div class="col-md-4"><label class="form-label fw-bold">價格 (NT$) *</label><input type="number" class="form-control" id="prodPrice" min="0" required></div>
          <div class="col-md-4"><label class="form-label fw-bold">庫存數量</label><input type="number" class="form-control" id="prodStock" min="0" value="0"></div>
          <div class="col-md-4"><label class="form-label fw-bold">狀態</label>
            <select class="form-select" id="prodStatus"><option value="active">上架</option><option value="inactive">下架</option></select>
          </div>
          <div class="col-12"><label class="form-label fw-bold">圖片網址</label>
            <input type="url" class="form-control" id="prodImage" placeholder="https://...">
            <div class="mt-2"><img id="prodImagePreview" src="" alt="" class="rounded" style="height:80px;object-fit:cover;display:none"></div>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
      <button type="button" class="btn btn-primary" onclick="saveProduct()"><i class="bi bi-check-circle me-2"></i>儲存商品</button>
    </div>
  </div></div>
</div>

<!-- ── 訂單詳情 Modal ── -->
<div class="modal fade" id="adminOrderModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header" style="background:var(--primary);color:#fff">
      <h5 class="modal-title"><i class="bi bi-receipt me-2"></i>訂單詳情</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body" id="adminOrderBody"></div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
    </div>
  </div></div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="adminToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-bold" id="adminToastText"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// 設定 & 全域變數
// ═══════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxlMm2hm8EvbGN4DrSXwy18tcD2uqzdyHy4HBWFLVqmswnfTBKPihxefcx_klbvW-S9/exec';
let adminToken      = sessionStorage.getItem('adminToken') || null;
let adminCategories = [];
let adminProducts   = [];

// 報表快取
let psOrders     = [];   // 商品統計用訂單
let psProductMap = {};   // productId -> {name,categoryId}
let psCategoryMap= {};   // categoryId -> name
let psSortKey    = 'qty';// qty | revenue

let msOrders     = [];   // 個人統計用訂單
let msMemberData = {};   // email -> {name,email,orders:[],totalRev,totalQty}
let msCurrentEmail = null;

const CHART_COLORS = ['#4A90D9','#28A745','#FFC107','#DC3545','#6F42C1','#17A2B8','#FD7E14','#20C997','#E83E8C','#6C757D'];

const STATUS_MAP = {
  pending:   ['待確認','warning'],
  confirmed: ['已確認','info'],
  shipping:  ['配送中','primary'],
  delivered: ['已送達','success'],
  cancelled: ['已取消','danger']
};

const pageTitles = {
  dashboard:  '📊 儀表板',
  categories: '🏷️ 分類管理',
  products:   '📦 商品管理',
  orders:     '📋 訂單管理',
  prodstat:   '📦 商品訂購總數量統計',
  memberstat: '👤 個人訂購清單明細',
  settings:   '⚙️ 系統設定'
};

// ═══════════════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  if (adminToken) {
    document.getElementById('loginOverlay').style.display = 'none';
    loadDashboard();
  }
  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('adminLoginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>驗證中...';
    const res = await apiCall({ action:'adminLogin', password:document.getElementById('adminPwd').value });
    if (res.success) {
      adminToken = res.token;
      sessionStorage.setItem('adminToken', adminToken);
      document.getElementById('loginOverlay').style.display = 'none';
      loadDashboard();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = '❌ ' + res.message;
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>登入後台';
    }
  };

  document.getElementById('settingsForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await apiCall({
      action:'saveSettings',
      siteName: document.getElementById('settingSiteName').value,
      siteDescription: document.getElementById('settingSiteDesc').value,
      shippingFee: document.getElementById('settingShipping').value,
      freeShippingThreshold: document.getElementById('settingFreeThreshold').value
    });
    showAdminToast(res.message, res.success ? 'success' : 'danger');
  };

  document.getElementById('prodImage').oninput = function() {
    const p = document.getElementById('prodImagePreview');
    if (this.value) { p.src=this.value; p.style.display='block'; p.onerror=()=>p.style.display='none'; }
    else p.style.display='none';
  };
});

// ═══════════════════════════════════════════════════════════
// 工具函式
// ═══════════════════════════════════════════════════════════
async function apiCall(data) {
  const res = await fetch(GAS_URL, { method:'POST', body:JSON.stringify(data) });
  return res.json();
}
function updateClock() {
  document.getElementById('topbarTime').textContent = new Date().toLocaleString('zh-TW',{hour12:false});
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
function adminLogout() {
  sessionStorage.removeItem('adminToken'); adminToken = null;
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('adminPwd').value = '';
  document.getElementById('loginError').style.display = 'none';
}
function showAdminToast(msg, type='success') {
  const m = {success:'bg-success',danger:'bg-danger',warning:'bg-warning text-dark',info:'bg-info'};
  const t = document.getElementById('adminToast');
  t.className = `toast align-items-center text-white border-0 ${m[type]||'bg-secondary'}`;
  document.getElementById('adminToastText').textContent = msg;
  new bootstrap.Toast(t,{delay:3000}).show();
}
function filterByDays(orders, days) {
  if (!days || days == 0) return orders;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
  return orders.filter(o => new Date(o.createdAt) >= cutoff);
}
function filterByStatus(orders, statusVal) {
  if (statusVal === 'all') return orders;
  const allowed = statusVal.split(',');
  return orders.filter(o => allowed.includes(o.status));
}
function avatarColor(str) {
  const colors = ['#4A90D9','#28A745','#FFC107','#DC3545','#6F42C1','#17A2B8','#FD7E14','#20C997'];
  let h = 0; for (let i=0;i<str.length;i++) h = str.charCodeAt(i) + ((h<<5)-h);
  return colors[Math.abs(h) % colors.length];
}

// ═══════════════════════════════════════════════════════════
// 頁面切換
// ═══════════════════════════════════════════════════════════
function showAdminPage(page, el) {
  ['dashboard','categories','products','orders','prodstat','memberstat','settings'].forEach(p => {
    document.getElementById('page-'+p).style.display = p===page ? '' : 'none';
  });
  document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('pageTitle').textContent = pageTitles[page] || page;
  if (page==='dashboard')  loadDashboard();
  if (page==='categories') loadCategories();
  if (page==='products')   loadProducts();
  if (page==='orders')     loadAdminOrders();
  if (page==='prodstat')   loadProdStat();
  if (page==='memberstat') loadMemberStat();
  if (page==='settings')   loadSettings();
  document.getElementById('sidebar').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════
// 儀表板
// ═══════════════════════════════════════════════════════════
async function loadDashboard() {
  const res = await apiCall({ action:'getDashboard' });
  if (!res.success) return;
  const s = res.stats;
  const statDefs = [
    {label:'會員總數', value:s.totalMembers,  icon:'bi-people-fill',    bg:'bg-primary', text:'text-primary'},
    {label:'商品總數', value:s.totalProducts, icon:'bi-box-seam-fill',  bg:'bg-success', text:'text-success'},
    {label:'訂單總數', value:s.totalOrders,   icon:'bi-receipt-cutoff', bg:'bg-warning', text:'text-warning'},
    {label:'總營收',   value:'NT$ '+Number(s.totalRevenue).toLocaleString(), icon:'bi-currency-dollar', bg:'bg-danger', text:'text-danger'}
  ];
  document.getElementById('statsCards').innerHTML = statDefs.map(d=>`
    <div class="col-sm-6 col-xl-3">
      <div class="card stat-card shadow-sm">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon ${d.bg} bg-opacity-10"><i class="bi ${d.icon} ${d.text} fs-4"></i></div>
          <div><div class="text-muted small">${d.label}</div><div class="fw-bold fs-4">${d.value}</div></div>
        </div>
      </div>
    </div>`).join('');

  const statusItems=[
    {key:'pending',label:'待確認',color:'#FFC107'},{key:'confirmed',label:'已確認',color:'#17A2B8'},
    {key:'shipping',label:'配送中',color:'#4A90D9'},{key:'delivered',label:'已送達',color:'#28A745'},
    {key:'cancelled',label:'已取消',color:'#DC3545'}
  ];
  document.getElementById('orderStatusChart').innerHTML = statusItems.map(item=>{
    const count=s[item.key+'Orders']||0;
    const pct=s.totalOrders>0?Math.round(count/s.totalOrders*100):0;
    return `<div class="mb-2">
      <div class="d-flex justify-content-between small mb-1"><span>${item.label}</span><span class="fw-bold">${count} 筆 (${pct}%)</span></div>
      <div class="progress" style="height:8px"><div class="progress-bar" style="width:${pct}%;background:${item.color}"></div></div>
    </div>`;
  }).join('');

  const ordRes = await apiCall({action:'adminGetOrders',status:'all'});
  if (ordRes.success) {
    const recent = ordRes.orders.slice(0,5);
    document.getElementById('recentOrders').innerHTML = recent.length ? `
      <div class="table-responsive"><table class="table table-sm">
        <thead><tr><th>訂單</th><th>客戶</th><th>金額</th><th>狀態</th></tr></thead>
        <tbody>${recent.map(o=>{const[t,c]=STATUS_MAP[o.status]||['未知','secondary'];return`<tr>
          <td><code class="small">${o.orderId.slice(-8)}</code></td>
          <td class="small">${o.userName}</td>
          <td class="small">NT$ ${o.total.toLocaleString()}</td>
          <td><span class="badge bg-${c} status-badge">${t}</span></td>
        </tr>`;}).join('')}</tbody>
      </table></div>` : '<p class="text-muted text-center py-3">尚無訂單</p>';
  }
}

// ═══════════════════════════════════════════════════════════
// 分類管理
// ═══════════════════════════════════════════════════════════
async function loadCategories() {
  const res = await apiCall({action:'adminGetCategories'});
  if (!res.success) return;
  adminCategories = res.categories;
  const tbody = document.getElementById('categoryTableBody');
  if (!adminCategories.length) { tbody.innerHTML='<tr><td colspan="5" class="text-center text-muted py-4">尚無分類</td></tr>'; return; }
  tbody.innerHTML = adminCategories.filter(c=>c.status!=='deleted').map(c=>`
    <tr>
      <td><code class="small">${c.categoryId}</code></td>
      <td class="fw-bold">${c.name}</td>
      <td class="text-muted small">${c.description||'-'}</td>
      <td><span class="badge ${c.status==='active'?'bg-success':'bg-secondary'} status-badge">${c.status==='active'?'啟用':'停用'}</span></td>
      <td>
        <button class="btn btn-outline-primary btn-sm me-1" onclick="openCategoryModal('${c.categoryId}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger btn-sm" onclick="deleteCategory('${c.categoryId}','${c.name}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}
function openCategoryModal(categoryId=null) {
  ['catId','catName','catDesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('catStatus').value='active';
  document.getElementById('categoryModalTitle').textContent=categoryId?'編輯分類':'新增分類';
  if (categoryId) {
    const cat=adminCategories.find(c=>c.categoryId===categoryId);
    if (cat) {
      document.getElementById('catId').value=cat.categoryId;
      document.getElementById('catName').value=cat.name;
      document.getElementById('catDesc').value=cat.description||'';
      document.getElementById('catStatus').value=cat.status;
    }
  }
  new bootstrap.Modal(document.getElementById('categoryModal')).show();
}

async function saveCategory() {
  const res = await apiCall({
    action:'adminSaveCategory',
    categoryId: document.getElementById('catId').value||null,
    name:        document.getElementById('catName').value,
    description: document.getElementById('catDesc').value,
    status:      document.getElementById('catStatus').value
  });
  showAdminToast(res.message, res.success?'success':'danger');
  if (res.success) {
    bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
    loadCategories();
  }
}
async function deleteCategory(categoryId, name) {
  if (!confirm(`確定要刪除分類「${name}」嗎？`)) return;
  const res = await apiCall({action:'adminDeleteCategory', categoryId});
  showAdminToast(res.message, res.success?'success':'danger');
  if (res.success) loadCategories();
}

// ═══════════════════════════════════════════════════════════
// 商品管理
// ═══════════════════════════════════════════════════════════
async function loadProducts() {
  const [prodRes, catRes] = await Promise.all([
    apiCall({action:'adminGetProducts'}),
    apiCall({action:'adminGetCategories'})
  ]);
  if (!prodRes.success) return;
  adminProducts = prodRes.products;
  if (catRes.success) adminCategories = catRes.categories;
  renderProductTable(adminProducts);
}
function renderProductTable(products) {
  const tbody = document.getElementById('productTableBody');
  const filtered = products.filter(p=>p.status!=='deleted');
  if (!filtered.length) {
    tbody.innerHTML='<tr><td colspan="7" class="text-center text-muted py-4">尚無商品</td></tr>'; return;
  }
  const catMap={};
  adminCategories.forEach(c=>{catMap[c.categoryId]=c.name;});
  tbody.innerHTML = filtered.map(p=>`
    <tr>
      <td><img src="${p.imageUrl||'https://via.placeholder.com/50x50?text=商品'}"
           width="50" height="50" class="rounded" style="object-fit:cover"
           onerror="this.src='https://via.placeholder.com/50x50?text=商品'"></td>
      <td class="fw-bold">${p.name}</td>
      <td><span class="badge bg-light text-dark border">${catMap[p.categoryId]||'-'}</span></td>
      <td class="text-primary fw-bold">NT$ ${p.price.toLocaleString()}</td>
      <td><span class="badge ${p.stock>10?'bg-success':p.stock>0?'bg-warning text-dark':'bg-danger'}">${p.stock}</span></td>
      <td><span class="badge ${p.status==='active'?'bg-success':'bg-secondary'} status-badge">
        ${p.status==='active'?'上架':'下架'}</span></td>
      <td>
        <button class="btn btn-outline-primary btn-sm me-1" onclick="openProductModal('${p.productId}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-outline-danger btn-sm" onclick="deleteProduct('${p.productId}','${p.name}')"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}
function filterProductTable() {
  const kw=document.getElementById('productSearch').value.toLowerCase();
  renderProductTable(adminProducts.filter(p=>
    p.name.toLowerCase().includes(kw)||(p.description||'').toLowerCase().includes(kw)));
}
function openProductModal(productId=null) {
  ['prodId','prodName','prodDesc','prodPrice','prodImage'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('prodStock').value='0';
  document.getElementById('prodStatus').value='active';
  document.getElementById('prodImagePreview').style.display='none';
  document.getElementById('productModalTitle').textContent=productId?'編輯商品':'新增商品';
  const catSel=document.getElementById('prodCategory');
  catSel.innerHTML='<option value="">-- 選擇分類 --</option>'+
    adminCategories.filter(c=>c.status==='active').map(c=>`<option value="${c.categoryId}">${c.name}</option>`).join('');
  if (productId) {
    const p=adminProducts.find(p=>p.productId===productId);
    if (p) {
      document.getElementById('prodId').value=p.productId;
      document.getElementById('prodName').value=p.name;
      document.getElementById('prodDesc').value=p.description||'';
      document.getElementById('prodPrice').value=p.price;
      document.getElementById('prodStock').value=p.stock;
      document.getElementById('prodImage').value=p.imageUrl||'';
      document.getElementById('prodStatus').value=p.status;
      catSel.value=p.categoryId;
      if (p.imageUrl) {
        const prev=document.getElementById('prodImagePreview');
        prev.src=p.imageUrl; prev.style.display='block';
      }
    }
  }
  new bootstrap.Modal(document.getElementById('productModal')).show();
}
async function saveProduct() {
  const res = await apiCall({
    action:'adminSaveProduct',
    productId:   document.getElementById('prodId').value||null,
    categoryId:  document.getElementById('prodCategory').value,
    name:        document.getElementById('prodName').value,
    description: document.getElementById('prodDesc').value,
    price:       document.getElementById('prodPrice').value,
    stock:       document.getElementById('prodStock').value,
    imageUrl:    document.getElementById('prodImage').value,
    status:      document.getElementById('prodStatus').value
  });
  showAdminToast(res.message, res.success?'success':'danger');
  if (res.success) {
    bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
    loadProducts();
  }
}
async function deleteProduct(productId, name) {
  if (!confirm(`確定要刪除商品「${name}」嗎？`)) return;
  const res = await apiCall({action:'adminDeleteProduct', productId});
  showAdminToast(res.message, res.success?'success':'danger');
  if (res.success) loadProducts();
}

// ═══════════════════════════════════════════════════════════
// 訂單管理
// ═══════════════════════════════════════════════════════════
async function loadAdminOrders() {
  const status=document.getElementById('orderStatusFilter').value;
  const search=document.getElementById('orderSearch').value;
  const res = await apiCall({action:'adminGetOrders', status, search});
  if (!res.success) return;
  const tbody=document.getElementById('orderTableBody');
  if (!res.orders.length) {
    tbody.innerHTML='<tr><td colspan="6" class="text-center text-muted py-4">尚無訂單</td></tr>'; return;
  }
  tbody.innerHTML = res.orders.map(o=>{
    const [statusText,statusColor]=STATUS_MAP[o.status]||['未知','secondary'];
    return `<tr>
      <td><code class="small">${o.orderId}</code></td>
      <td><div class="fw-bold small">${o.userName}</div><div class="text-muted small">${o.userEmail}</div></td>
      <td class="fw-bold text-primary">NT$ ${o.total.toLocaleString()}</td>
      <td>
        <select class="form-select form-select-sm" style="width:110px"

          ${['pending','confirmed','shipping','delivered','cancelled'].map(s=>{

// ═══════════════════════════════════════════════════════════
// 商品訂購總數量統計
// ═══════════════════════════════════════════════════════════
async function loadProdStat() {
  document.getElementById('psKpiRow').innerHTML =
    '<div class="col-12 text-center py-3"><div class="spinner-border text-primary"></div></div>';

  const days      = parseInt(document.getElementById('psRange').value);
  const statusVal = document.getElementById('psStatus').value;

  const [ordRes, prodRes, catRes] = await Promise.all([
    apiCall({action:'adminGetOrders', status:'all'}),
    apiCall({action:'adminGetProducts'}),
    apiCall({action:'adminGetCategories'})
  ]);
  if (!ordRes.success) return;

  // 建立對照表
  psProductMap  = {};
  psCategoryMap = {};
  if (prodRes.success)  prodRes.products.forEach(p  => { psProductMap[p.productId]   = {name:p.name, categoryId:p.categoryId}; });
  if (catRes.success)   catRes.categories.forEach(c => { psCategoryMap[c.categoryId] = c.name; });

  // 填入分類篩選下拉
  const catSel = document.getElementById('psCatFilter');
  catSel.innerHTML = '<option value="">全部分類</option>' +
    Object.entries(psCategoryMap).map(([id,name])=>`<option value="${id}">${name}</option>`).join('');

  // 篩選訂單
  let orders = filterByDays(ordRes.orders, days);
  orders     = filterByStatus(orders, statusVal);
  psOrders   = orders;

  // KPI
  const totalRev = orders.reduce((s,o)=>s+(o.total||0), 0);
  const totalQty = orders.reduce((s,o)=>s+(o.items||[]).reduce((q,i)=>q+(i.quantity||0),0), 0);
  const skuCount = (() => {
    const s=new Set();
    orders.forEach(o=>(o.items||[]).forEach(i=>s.add(i.productId||i.name)));
    return s.size;
  })();

  const kpis = [
    {label:'篩選訂單數',  value:orders.length+' 筆',           bg:'linear-gradient(135deg,#4A90D9,#2C6FAC)', icon:'bi-receipt-cutoff'},
    {label:'銷售商品件數',value:totalQty.toLocaleString()+' 件',bg:'linear-gradient(135deg,#28A745,#1a7a32)', icon:'bi-box-seam-fill'},
    {label:'銷售 SKU 數', value:skuCount+' 種',                bg:'linear-gradient(135deg,#6F42C1,#4a2a8a)', icon:'bi-tags-fill'},
    {label:'銷售總金額',  value:'NT$ '+totalRev.toLocaleString(),bg:'linear-gradient(135deg,#DC3545,#a71d2a)', icon:'bi-currency-dollar'}
  ];
  document.getElementById('psKpiRow').innerHTML = kpis.map(k=>`
    <div class="col-sm-6 col-xl-3">
      <div class="kpi-card" style="background:${k.bg}">
        <div class="d-flex justify-content-between align-items-start">
          <div><div class="kpi-label">${k.label}</div><div class="kpi-val">${k.value}</div></div>
          <i class="bi ${k.icon} fs-2 opacity-50"></i>
        </div>
      </div>
    </div>`).join('');

  renderProdStat();
}

function switchPsTab(key, el) {
  psSortKey = key;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderProdStat();
}

function renderProdStat() {
  const catFilter = document.getElementById('psCatFilter').value;
  const keyword   = (document.getElementById('psSearch').value||'').toLowerCase();

  // 統計各商品
  const stats = {};
  psOrders.forEach(o=>{
    (o.items||[]).forEach(item=>{
      const pid   = item.productId || item.name;
      const info  = psProductMap[pid] || {};
      const name  = item.name || info.name || pid;
      const catId = info.categoryId || '';
      if (catFilter && catId !== catFilter) return;
      if (keyword && !name.toLowerCase().includes(keyword)) return;
      if (!stats[pid]) stats[pid] = {name, catId, qty:0, revenue:0, orderCount:0};
      stats[pid].qty        += (item.quantity||0);
      stats[pid].revenue    += (item.price||0)*(item.quantity||0);
      stats[pid].orderCount += 1;
    });
  });

  const list = Object.values(stats).sort((a,b)=>b[psSortKey]-a[psSortKey]);
  const maxVal = list.length ? list[0][psSortKey] : 1;
  const totalQty = list.reduce((s,p)=>s+p.qty, 0);
  const totalRev = list.reduce((s,p)=>s+p.revenue, 0);

  // ── 排行榜表格 ──
  document.getElementById('psRankTable').innerHTML = list.length ? `
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead><tr>
          <th style="width:44px">排名</th>
          <th>商品名稱</th><th>分類</th>
          <th style="width:220px">銷售量（件）</th>
          <th>銷售額</th><th>訂單次數</th><th>佔比</th>
        </tr></thead>
        <tbody>
          ${list.map((p,idx)=>{
            const rc   = idx===0?'rank-1':idx===1?'rank-2':idx===2?'rank-3':'rank-n';
            const pct  = maxVal>0 ? Math.round(p[psSortKey]/maxVal*100) : 0;
            const share= (psSortKey==='qty'?totalQty:totalRev)>0
                          ? (p[psSortKey]/(psSortKey==='qty'?totalQty:totalRev)*100).toFixed(1) : '0.0';
            const color= CHART_COLORS[idx%CHART_COLORS.length];
            const cat  = psCategoryMap[p.catId]||'-';
            return `<tr>
              <td><span class="rank-num ${rc}">${idx+1}</span></td>
              <td class="fw-bold">${p.name}</td>
              <td><span class="badge bg-light text-dark border small">${cat}</span></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <div class="rank-bar flex-grow-1">
                    <div class="rank-bar-fill" style="width:${pct}%;background:${color}"></div>
                  </div>
                  <span class="small fw-bold" style="min-width:36px">${p.qty} 件</span>
                </div>
              </td>
              <td class="fw-bold text-primary">NT$ ${p.revenue.toLocaleString()}</td>
              <td class="text-muted">${p.orderCount} 次</td>
              <td><span class="badge bg-primary bg-opacity-10 text-primary">${share}%</span></td>
            </tr>`;
          }).join('')}
        </tbody>
        <tfoot class="table-light fw-bold">
          <tr>
            <td colspan="3">合計</td>
            <td>${totalQty.toLocaleString()} 件</td>
            <td>NT$ ${totalRev.toLocaleString()}</td>
            <td>${list.reduce((s,p)=>s+p.orderCount,0)} 次</td>
            <td>100%</td>
          </tr>
        </tfoot>
      </table>
    </div>` : '<p class="text-muted text-center py-4">此篩選條件無銷售資料</p>';

  // ── 分類佔比長條 ──
  const catStats = {};
  list.forEach(p=>{
    const cat = psCategoryMap[p.catId]||'未分類';
    if (!catStats[cat]) catStats[cat]={qty:0,revenue:0};
    catStats[cat].qty     += p.qty;
    catStats[cat].revenue += p.revenue;
  });
  const catList = Object.entries(catStats).sort((a,b)=>b[1].revenue-a[1].revenue);
  const maxCatRev = catList.length ? catList[0][1].revenue : 1;

  document.getElementById('psCatChart').innerHTML = catList.length ? catList.map(([name,v],idx)=>{
    const pct = maxCatRev>0 ? Math.round(v.revenue/maxCatRev*100) : 0;
    const share=(totalRev>0?(v.revenue/totalRev*100).toFixed(1):'0.0');
    const color=CHART_COLORS[idx%CHART_COLORS.length];
    return `<div class="mb-3">
      <div class="d-flex justify-content-between small mb-1">
        <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:6px"></span>
        <strong>${name}</strong></span>
        <span class="text-muted">${v.qty} 件 ／ NT$ ${v.revenue.toLocaleString()} (${share}%)</span>
      </div>
      <div class="rank-bar"><div class="rank-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('') : '<p class="text-muted text-center py-3">無資料</p>';
}

function exportProdStatCSV() {
  if (!psOrders.length) { showAdminToast('目前無資料可匯出','warning'); return; }
  const stats={};
  psOrders.forEach(o=>{
    (o.items||[]).forEach(item=>{
      const pid=item.productId||item.name;
      const info=psProductMap[pid]||{};
      const name=item.name||info.name||pid;
      const cat=psCategoryMap[info.categoryId||'']||'-';
      if (!stats[pid]) stats[pid]={name,cat,qty:0,revenue:0,orderCount:0};
      stats[pid].qty+=item.quantity||0;
      stats[pid].revenue+=(item.price||0)*(item.quantity||0);
      stats[pid].orderCount+=1;
    });
  });
  const BOM='\uFEFF';
  let csv=BOM+'商品名稱,分類,銷售數量(件),銷售金額(NT$),訂單次數\r\n';
  Object.values(stats).sort((a,b)=>b.qty-a.qty).forEach(p=>{
    csv+=`"${p.name}","${p.cat}",${p.qty},${p.revenue},${p.orderCount}\r\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`商品訂購統計_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showAdminToast('✅ CSV 已匯出','success');
}


// ═══════════════════════════════════════════════════════════
// 個人訂購清單明細
// ═══════════════════════════════════════════════════════════
async function loadMemberStat() {
  document.getElementById('msKpiRow').innerHTML =
    '<div class="col-12 text-center py-3"><div class="spinner-border text-primary"></div></div>';
  document.getElementById('msMemberList').innerHTML =
    '<div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div></div>';

  const days      = parseInt(document.getElementById('msRange').value);
  const statusVal = document.getElementById('msStatus').value;
  const ordRes    = await apiCall({action:'adminGetOrders', status:'all'});
  if (!ordRes.success) return;

  let orders = filterByDays(ordRes.orders, days);
  orders     = filterByStatus(orders, statusVal);
  msOrders   = orders;

  // 彙整會員資料
  msMemberData = {};
  orders.forEach(o=>{
    const key = o.userEmail||o.userName;
    if (!msMemberData[key]) msMemberData[key]={
      name:o.userName, email:o.userEmail||'-', phone:o.userPhone||'-',
      orders:[], totalRev:0, totalQty:0
    };
    msMemberData[key].orders.push(o);
    msMemberData[key].totalRev += o.total||0;
    msMemberData[key].totalQty += (o.items||[]).reduce((s,i)=>s+(i.quantity||0),0);
  });

  // KPI
  const memberCount = Object.keys(msMemberData).length;
  const totalRev    = orders.reduce((s,o)=>s+(o.total||0),0);
  const avgPerMember= memberCount ? Math.round(totalRev/memberCount) : 0;
  const topMember   = Object.values(msMemberData).sort((a,b)=>b.totalRev-a.totalRev)[0];

  const kpis=[
    {label:'活躍會員數',  value:memberCount+' 人',              bg:'linear-gradient(135deg,#4A90D9,#2C6FAC)', icon:'bi-people-fill'},
    {label:'篩選訂單數',  value:orders.length+' 筆',            bg:'linear-gradient(135deg,#28A745,#1a7a32)', icon:'bi-receipt-cutoff'},
    {label:'會員平均消費',value:'NT$ '+avgPerMember.toLocaleString(), bg:'linear-gradient(135deg,#FFC107,#d4a000)', icon:'bi-graph-up-arrow'},
    {label:'最高消費會員',value:topMember?topMember.name:'－',  bg:'linear-gradient(135deg,#DC3545,#a71d2a)', icon:'bi-trophy-fill'}
  ];
  document.getElementById('msKpiRow').innerHTML = kpis.map(k=>`
    <div class="col-sm-6 col-xl-3">
      <div class="kpi-card" style="background:${k.bg}">
        <div class="d-flex justify-content-between align-items-start">
          <div><div class="kpi-label">${k.label}</div><div class="kpi-val" style="font-size:1.3rem">${k.value}</div></div>
          <i class="bi ${k.icon} fs-2 opacity-50"></i>
        </div>
      </div>
    </div>`).join('');

  renderMemberList();
}

function renderMemberList() {
  const kw     = (document.getElementById('msSearch').value||'').toLowerCase();
  const sortBy = document.getElementById('msSortBy').value;

  let list = Object.values(msMemberData).filter(m=>
    m.name.toLowerCase().includes(kw) || m.email.toLowerCase().includes(kw)
  );
  list.sort((a,b)=> sortBy==='orders' ? b.orders.length-a.orders.length
                  : sortBy==='qty'    ? b.totalQty-a.totalQty
                  :                     b.totalRev-a.totalRev);

  document.getElementById('msMemberCount').textContent = list.length;

  if (!list.length) {
    document.getElementById('msMemberList').innerHTML =
      '<p class="text-muted text-center py-4 small">無符合條件的會員</p>';
    return;
  }

  const maxRev = list[0].totalRev || 1;
  document.getElementById('msMemberList').innerHTML = list.map((m,idx)=>{
    const color  = avatarColor(m.email||m.name);
    const initial= (m.name||'?')[0].toUpperCase();
    const isActive= msCurrentEmail === (m.email||m.name);
    const barPct = Math.round(m.totalRev/maxRev*100);
    return `
      <div class="p-3 border-bottom cursor-pointer ${isActive?'bg-primary bg-opacity-10':''}"
           style="cursor:pointer" onclick="showMemberDetail('${(m.email||m.name).replace(/'/g,"\\'")}')">
        <div class="d-flex align-items-center gap-2 mb-1">
          <div class="member-avatar" style="background:${color};width:34px;height:34px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0">${initial}</div>
          <div class="flex-grow-1 overflow-hidden">
            <div class="fw-bold small text-truncate">${m.name}</div>
            <div class="text-muted" style="font-size:.72rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.email}</div>
          </div>
          <div class="text-end flex-shrink-0">
            <div class="small fw-bold text-primary">NT$ ${m.totalRev.toLocaleString()}</div>
            <div class="text-muted" style="font-size:.7rem">${m.orders.length} 筆</div>
          </div>
        </div>
        <div class="rank-bar mt-1"><div class="rank-bar-fill" style="width:${barPct}%;background:${color}"></div></div>
      </div>`;
  }).join('');
}

function showMemberDetail(emailKey) {
  msCurrentEmail = emailKey;
  renderMemberList(); // 更新選中狀態

  const m = msMemberData[emailKey];
  if (!m) return;

  const orders = [...m.orders].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const color  = avatarColor(emailKey);
  const initial= (m.name||'?')[0].toUpperCase();

  // 統計此會員最愛商品
  const prodFreq={};
  orders.forEach(o=>(o.items||[]).forEach(i=>{
    const k=i.name; if(!prodFreq[k]) prodFreq[k]=0; prodFreq[k]+=i.quantity||0;
  }));
  const topProds=Object.entries(prodFreq).sort((a,b)=>b[1]-a[1]).slice(0,3);

  document.getElementById('msDetailPanel').innerHTML = `
    <!-- 會員資訊卡 -->
    <div class="d-flex align-items-center gap-3 mb-4 pb-3 border-bottom">
      <div style="width:52px;height:52px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:#fff;flex-shrink:0">${initial}</div>
      <div class="flex-grow-1">
        <h6 class="fw-bold mb-0">${m.name}</h6>
        <div class="text-muted small">${m.email} ／ ${m.phone}</div>
      </div>
      <div class="text-end">
        <div class="fw-bold text-primary fs-5">NT$ ${m.totalRev.toLocaleString()}</div>
        <div class="text-muted small">總消費 ／ ${m.orders.length} 筆訂單 ／ ${m.totalQty} 件</div>
      </div>
    </div>

    <!-- 最愛商品 -->
    ${topProds.length ? `
    <div class="mb-4">
      <div class="small fw-bold text-muted mb-2">🏆 最常購買商品</div>
      <div class="d-flex gap-2 flex-wrap">
        ${topProds.map(([name,qty],i)=>`
          <span class="badge bg-primary bg-opacity-${i===0?'100':i===1?'75':'50'} text-${i===2?'primary':'white'} px-3 py-2">
            ${name} × ${qty}
          </span>`).join('')}
      </div>
    </div>` : ''}

    <!-- 訂單列表 -->
    <div class="small fw-bold text-muted mb-2">📋 訂單明細（共 ${orders.length} 筆）</div>
    <div style="max-height:380px;overflow-y:auto">
      ${orders.map(o=>{
        const [st,sc]=STATUS_MAP[o.status]||['未知','secondary'];
        const dt=new Date(o.createdAt).toLocaleString('zh-TW',{hour12:false});
        const items=(o.items||[]).map(i=>`${i.name}×${i.quantity}`).join('、');
        return `
          <div class="border rounded p-3 mb-2">
            <div class="d-flex justify-content-between align-items-start mb-1">
              <div>
                <code class="small text-muted">${o.orderId}</code>
                <span class="badge bg-${sc} status-badge ms-2">${st}</span>
              </div>
              <div class="fw-bold text-primary">NT$ ${o.total.toLocaleString()}</div>
            </div>
            <div class="text-muted small mb-1">${dt}</div>
            <div class="small text-truncate" style="max-width:100%;color:#555" title="${items}">
              <i class="bi bi-bag me-1"></i>${items||'（無商品資料）'}
            </div>
            ${o.shippingAddress?`<div class="small text-muted mt-1"><i class="bi bi-geo-alt me-1"></i>${o.shippingAddress}</div>`:''}
          </div>`;
      }).join('')}
    </div>`;
}

function exportMemberStatCSV() {
  if (!Object.keys(msMemberData).length) { showAdminToast('目前無資料可匯出','warning'); return; }
  const BOM='\uFEFF';
  let csv=BOM+'姓名,Email,電話,訂單數,購買件數,總消費(NT$),平均客單價(NT$)\r\n';

  // 會員摘要
  Object.values(msMemberData).sort((a,b)=>b.totalRev-a.totalRev).forEach(m=>{
    const avg=m.orders.length?Math.round(m.totalRev/m.orders.length):0;
    csv+=`"${m.name}","${m.email}","${m.phone}",${m.orders.length},${m.totalQty},${m.totalRev},${avg}\r\n`;
  });

  csv+='\r\n訂單明細\r\n';
  csv+='姓名,Email,訂單編號,狀態,商品,數量,金額,下單時間\r\n';
  msOrders.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).forEach(o=>{
    const [st]=STATUS_MAP[o.status]||['未知'];
    (o.items||[]).forEach(i=>{
      const dt=new Date(o.createdAt).toLocaleString('zh-TW',{hour12:false});
      csv+=`"${o.userName}","${o.userEmail}","${o.orderId}","${st}","${i.name}",${i.quantity||0},${(i.price||0)*(i.quantity||0)},"${dt}"\r\n`;
    });
  });

  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`個人訂購清單_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showAdminToast('✅ CSV 已匯出','success');
}
