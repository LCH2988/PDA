<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>樂齡友善 - 會員活動報名系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      /* WCAG AAA 級高對比色彩定義 */
      --primary: #0b3c95; 
      --primary-light: #eff6ff; 
      --success: #064e3b; 
      --success-light: #ecfdf5;
      --warning: #78350f; 
      --warning-light: #fffbeb;
      --danger: #991b1b; 
      --danger-light: #fef2f2;
      --bg: #f8fafc;
      --card-radius: 16px;
      --shadow: 0 6px 24px rgba(0,0,0,.12);
    }
    
    * { box-sizing: border-box; }
    body { 
      background: var(--bg); 
      font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; 
      min-height: 100vh; 
      font-size: 1.25rem; /* 預設字體放大至 1.25rem (約 20px) */
      color: #0f172a; /* 接近純黑，極高對比 */
      line-height: 1.7;
    }

    /* ── Topbar (大字版) ── */
    .topbar { 
      background: linear-gradient(135deg,#0b3c95,#1d4ed8); 
      color:#fff; 
      padding: 1.2rem 1.5rem; 
      display:flex; 
      align-items:center; 
      justify-content:space-between; 
      box-shadow:0 4px 15px rgba(0,0,0,.25); 
      position:sticky; 
      top:0; 
      z-index:100; 
    }
    .topbar .brand { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }
    .topbar .brand span { opacity: 0.9; font-size: 1rem; font-weight: 700; margin-left: .5rem; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 6px; }

    /* ── Nav Tabs (超大好按) ── */
    .nav-tabs-custom { background:#fff; border-bottom:4px solid #cbd5e1; display:flex; gap:0; overflow-x:auto; }
    .nav-tab-btn { 
      border:none; 
      background:none; 
      padding: 1.2rem 1.8rem; 
      font-size: 1.25rem; 
      font-weight: 800; 
      color: #334155; 
      cursor:pointer; 
      border-bottom:5px solid transparent; 
      transition:all .2s; 
      white-space:nowrap; 
    }
    .nav-tab-btn:hover { color:var(--primary); background:#f1f5f9; }
    .nav-tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:#fff; }
    .nav-tab-btn i { margin-right: .5rem; font-size: 1.4rem; }

    /* ── Content ── */
    .content-wrap { max-width:1100px; margin:0 auto; padding:2rem 1rem 5rem; }
    .page-section { display:none; }
    .page-section.active { display:block; }

    /* ── Cards (高對比粗邊框) ── */
    .card-custom { 
      background:#fff; 
      border-radius:var(--card-radius); 
      box-shadow:var(--shadow); 
      border: 3px solid #cbd5e1; /* 邊框加粗 */
      overflow:hidden; 
      margin-bottom: 1.5rem;
    }
    .card-custom:hover { border-color: var(--primary); }

    /* ── Event Card ── */
    .event-card { cursor:pointer; transition:all .2s; }
    .event-card-banner { height:110px; display:flex; align-items:flex-end; padding:1.25rem; }
    .banner-theme-default { background:linear-gradient(135deg,#0b3c95,#2563eb); }
    .banner-theme-sunset  { background:linear-gradient(135deg,#701a75,#f43f5e); }
    .banner-theme-forest  { background:linear-gradient(135deg,#064e3b,#10b981); }
    .banner-theme-ocean   { background:linear-gradient(135deg,#0f172a,#0284c7); }
    .event-card-body { padding: 1.5rem; }
    .event-card-body h6 { font-size: 1.4rem; font-weight: 900; color: #0f172a; }
    
    /* 狀態標籤（高對比白字） */
    .event-status-badge { 
      font-size: 1.05rem; 
      padding: 6px 14px; 
      border-radius: 8px; 
      font-weight: 900; 
      color: #ffffff !important;
      border: 2px solid #ffffff;
    }
    .status-open   { background: var(--success); }
    .status-prep   { background: var(--primary); }
    .status-closed { background: var(--danger); }
    
    /* 進度條加粗 */
    .seats-bar { height: 14px; background:#e2e8f0; border-radius: 6px; overflow:hidden; margin-top:10px; border: 1px solid #cbd5e1; }
    .seats-bar-fill { height:100%; background:linear-gradient(90deg,#10b981,#059669); border-radius:6px; }

    /* ── Calendar (大格大字) ── */
    .cal-header { display:flex; align-items:center; justify-content:space-between; padding:1.2rem; background:#fff; border-bottom:3px solid #cbd5e1; }
    .cal-header h5 { font-size: 1.6rem; font-weight: 900; color: var(--primary); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-day-header { text-align:center; padding:1rem .5rem; font-size: 1.1rem; font-weight: 900; color:#0f172a; background:#e2e8f0; border: 1px solid #cbd5e1; }
    .cal-day { min-height: 120px; border:2px solid #cbd5e1; padding:.5rem; background:#fff; }
    .cal-day-num { font-size: 1.15rem; font-weight: 800; color:#0f172a; }
    .cal-day.today .cal-day-num { background:var(--primary); color:#fff; width:34px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .cal-event-dot { 
      font-size: 0.95rem; 
      font-weight: bold;
      background: var(--primary-light); 
      color: var(--primary); 
      border: 2px solid var(--primary);
      border-radius: 6px; 
      padding: 4px 8px; 
      margin-top: 4px;
      cursor: pointer; 
      display: block;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
    .cal-event-dot:hover { background: var(--primary); color: #fff; }

    /* ── Form Inputs (大框粗線) ── */
    .form-control, .form-select {
      font-size: 1.25rem !important;
      padding: 0.85rem 1.2rem !important;
      border: 3px solid #64748b !important;
      border-radius: 12px !important;
      font-weight: bold !important;
      color: #0f172a !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 5px rgba(11, 60, 149, 0.3) !important;
    }
    .form-label {
      font-size: 1.3rem !important;
      font-weight: 900 !important;
      color: #0f172a !important;
      margin-bottom: 0.6rem;
    }

    /* ── 超大好按任務卡片 ── */
    .task-select-card { 
      border: 3px solid #cbd5e1; 
      border-radius: 16px; 
      padding: 1.5rem; 
      cursor: pointer; 
      transition: all .2s; 
      margin-bottom: 1rem; 
      position: relative; 
      background: #ffffff;
    }
    .task-select-card:hover:not(.task-full) { border-color: var(--primary); background: #f0f6ff; }
    .task-select-card.selected { border-color: var(--primary); border-width: 4px; background: #eff6ff; }
    .task-select-card.task-full { opacity: .6; cursor: not-allowed; background: #cbd5e1; border-color: #94a3b8; }
    .task-check-icon { 
      display: none; 
      position: absolute; 
      top: 15px; 
      right: 15px; 
      width: 32px; 
      height: 32px; 
      background: var(--primary); 
      border-radius: 50%; 
      color: #fff; 
      font-size: 1.1rem; 
      align-items: center; 
      justify-content: center; 
    }
    .task-select-card.selected .task-check-icon { display: flex; }

    /* ── 超大提交按鈕 ── */
    .submit-btn { 
      background: linear-gradient(135deg, #0b3c95, #1d4ed8); 
      border: none; 
      border-radius: 16px; 
      padding: 1.25rem; 
      font-size: 1.4rem; 
      font-weight: 900; 
      width: 100%; 
      color: #fff; 
      cursor: pointer; 
      box-shadow: 0 6px 20px rgba(11, 60, 149, 0.4);
    }
    .submit-btn:hover { background: #002366; }

    /* ── 狀態查詢卡片 ── */
    .status-card { 
      border-radius: 16px; 
      padding: 1.5rem; 
      margin-bottom: 1.25rem; 
      border: 3px solid #cbd5e1;
      border-left: 10px solid; 
    }
    .status-pending   { border-left-color: #d97706; background: #fffbeb; }
    .status-confirmed { border-left-color: #059669; background: #ecfdf5; }
    .status-cancelled { border-left-color: #dc2626; background: #fef2f2; }
    
    .status-badge-pill {
      font-size: 1.1rem;
      padding: 6px 16px;
      border-radius: 8px;
      font-weight: 900;
      color: #ffffff !important;
    }
    .pill-pending   { background: #d97706; }
    .pill-confirmed { background: #059669; }
    .pill-cancelled { background: #dc2626; }

    /* 必填星號加粗 */
    .text-danger { color: #dc2626 !important; font-weight: 900; }
  </style>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="brand"><i class="fa-solid fa-calendar-heart me-2"></i>會員活動報名系統 <span>長輩友善大字版</span></div>
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-lg btn-outline-light fw-bold" onclick="showSection('status')"><i class="fa-solid fa-clipboard-list me-1"></i>我的報名</button>
    </div>
  </div>

  <!-- Nav Tabs -->
  <div class="nav-tabs-custom">
    <button class="nav-tab-btn active" data-sec="calendar" onclick="showSection('calendar')"><i class="fa-solid fa-calendar-days"></i> 看月曆</button>
    <button class="nav-tab-btn" data-sec="category" onclick="showSection('category')"><i class="fa-solid fa-tags"></i> 按類別</button>
    <button class="nav-tab-btn" data-sec="list" onclick="showSection('list')"><i class="fa-solid fa-list"></i> 看清單</button>
    <button class="nav-tab-btn" data-sec="status" onclick="showSection('status')"><i class="fa-solid fa-user-check"></i> 查報名</button>
  </div>

  <!-- 主內容 -->
  <div class="content-wrap">
    
    <!-- 1. 月曆檢視 -->
    <div id="sec-calendar" class="page-section active">
      <div class="card-custom p-4">
        <div class="cal-header mb-3">
          <button class="btn btn-lg btn-outline-primary" onclick="prevMonth()"><i class="fa-solid fa-chevron-left"></i> 上個月</button>
          <h5 class="mb-0" id="cal-month-title">2026 年 6 月</h5>
          <button class="btn btn-lg btn-outline-primary" onclick="nextMonth()">下個月 <i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="cal-grid-container"></div>
      </div>
    </div>

    <!-- 2. 類別檢視 -->
    <div id="sec-category" class="page-section">
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><button class="btn btn-lg btn-outline-primary w-100 py-3 fw-bold" onclick="filterByCategory('handcycle')">🚲 手搖車培訓</button></div>
        <div class="col-6 col-md-3"><button class="btn btn-lg btn-outline-success w-100 py-3 fw-bold" onclick="filterByCategory('kayak')">🛶 獨木舟體驗</button></div>
        <div class="col-6 col-md-3"><button class="btn btn-lg btn-outline-warning w-100 py-3 fw-bold text-dark" onclick="filterByCategory('shuttle')">🚌 無障礙接駁</button></div>
        <div class="col-6 col-md-3"><button class="btn btn-lg btn-outline-secondary w-100 py-3 fw-bold" onclick="filterByCategory('all')">📋 顯示全部</button></div>
      </div>
      <div class="row g-3" id="category-events-container"></div>
    </div>

    <!-- 3. 清單檢視 -->
    <div id="sec-list" class="page-section">
      <div class="mb-4">
        <input type="text" id="list-search" class="form-control py-3" placeholder="搜尋活動名稱、地點..." oninput="renderListEvents()">
      </div>
      <div class="row g-3" id="list-events-container"></div>
    </div>

    <!-- 4. 報名狀態查詢 -->
    <div id="sec-status" class="page-section">
      <div class="card-custom p-4 mb-4">
        <h4 class="fw-bold mb-3"><i class="fa-solid fa-magnifying-glass text-primary me-2"></i>輸入您的基本資料進行查詢</h4>
        <div class="row g-3">
          <div class="col-md-5"><input type="text" id="query-name" class="form-control py-3" placeholder="請輸入姓名"></div>
          <div class="col-md-5"><input type="tel" id="query-phone" class="form-control py-3" placeholder="請輸入手機號碼"></div>
          <div class="col-md-2"><button class="btn btn-lg btn-primary-custom btn-custom w-100 py-3" onclick="queryRegistrations()"><i class="fa-solid fa-search"></i> 查詢</button></div>
        </div>
      </div>
      <div id="query-results-container"></div>
    </div>

    <!-- 5. 活動詳情與報名表單 -->
    <div id="sec-form" class="page-section">
      <div class="no-print mb-3"><button class="btn btn-lg btn-outline-secondary btn-custom" onclick="goBackToPrevious()"><i class="fa-solid fa-arrow-left me-1"></i>返回上頁</button></div>
      <div class="card-custom shadow-lg overflow-hidden border-0">
        <div class="public-form-banner" id="form-banner">
          <h2 class="fw-bold mb-2" id="form-title">線上活動報名表單</h2>
          <span id="form-subtitle"><i class="fa-solid fa-calendar-day me-2"></i>載入中...</span>
        </div>
        <div class="p-4 p-md-5 bg-white">
          <div class="alert alert-light border mb-4" id="form-welcome-box" style="border-left: 5px solid var(--primary)!important;">
            <h5 class="fw-bold text-dark mb-2"><i class="fa-solid fa-circle-info text-primary me-2"></i>活動與報名簡介</h5>
            <p class="m-0 text-muted fs-5" id="form-welcome-desc" style="line-height:1.8; white-space:pre-line; font-weight: bold;">載入中...</p>
          </div>
          
          <form id="portal-registration-form">
            <h4 class="fw-bold mb-4 pb-2 border-bottom text-primary"><i class="fa-regular fa-id-card me-2"></i>1. 個人基本資料填寫</h4>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">中文姓名 <span class="text-danger">*</span></label><input type="text" id="reg-name" class="form-control py-3" placeholder="請輸入姓名" required></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">生理性別 <span class="text-danger">*</span></label><select id="reg-gender" class="form-select py-3" required><option value="男">男</option><option value="女">女</option></select></div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">出生日期 <span class="text-danger">*</span></label><input type="text" id="reg-birthdate" class="form-control py-3" placeholder="範例: 501115 (不要有符號)" required></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">報名的身分別 <span class="text-danger">*</span></label><select id="reg-identity" class="form-select py-3" required><option value="身障夥伴">身障夥伴</option><option value="樂齡長者">樂齡長者</option><option value="特教生">特教生</option><option value="陪伴親友">陪伴親友</option><option value="志工夥伴">志工夥伴</option><option value="對生命勵健康促進活動有興趣的民眾">對生命勵健康促進活動有興趣的民眾</option><option value="其他">其他</option></select></div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">聯絡行動電話 <span class="text-danger">*</span></label><input type="tel" id="reg-phone" class="form-control py-3" placeholder="例如：0912345678" required></div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold" id="reg-id-label">身分證字號 / 護照號碼 <span class="text-danger">*</span></label>
                <input type="text" id="reg-idnumber" class="form-control py-3" placeholder="保險必填 A123456789">
                <small class="text-muted d-block mt-2" style="font-size:.95rem; font-weight: bold;"><i class="fa-solid fa-shield-halved me-1"></i>本資料僅用於本次活動公共意外險投保用途，大會將嚴格保密。</small>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">室內電話號碼</label><input type="tel" id="reg-homephone" class="form-control py-3" placeholder="室內電話"></div>
              <div class="col-md-6 mb-3"><label class="form-label fw-bold">Line-ID</label><input type="text" id="reg-lineid" class="form-control py-3" placeholder="Line-ID"></div>
            </div>
            <div class="mb-3"><label class="form-label fw-bold">地址(含郵遞區號) <span class="text-danger">*</span></label><input type="text" id="reg-address" class="form-control py-3" placeholder="地址" required></div>
            <div class="mb-3"><label class="form-label fw-bold" id="reg-email-label">Email 電子信箱 <span class="text-danger">*</span></label><input type="email" id="reg-email" class="form-control py-3" placeholder="請輸入可聯絡的電子信箱"></div>
            <div class="mb-4"><label class="form-label fw-bold">餐飲需求偏好 <span class="text-danger">*</span></label><select id="reg-lunch" class="form-select py-3" required><option value="葷食">大會提供 - 葷食便當</option><option value="素食">大會提供 - 素食便當</option><option value="不需要">不需要大會餐點</option></select></div>
            
            <h4 class="fw-bold mb-2 text-success"><i class="fa-solid fa-list-check me-2"></i>2. 選擇報名任務分組 / 班次</h4>
            <p class="text-muted small mb-3 fs-5" style="font-weight: bold;">每個成員在本次活動中僅限報名一個核心任務。各班次/分組皆有名額上限，額滿即截止。</p>
            <div class="row g-3 mb-4" id="portal-form-tasks-container"></div>
            <div class="mb-4"><label class="form-label fw-bold">生理狀況備註 / 特殊需求說明</label><textarea id="reg-note" class="form-control" rows="3" placeholder="例：輪椅使用者、特殊藥物需求、陪同者姓名等..."></textarea></div>
            <div class="d-grid gap-2 pt-3"><button type="submit" class="submit-btn"><i class="fa-solid fa-paper-plane me-2"></i>確認提交報名表單</button></div>
          </form>

          <!-- 報名成功畫面 -->
          <div class="text-center p-5 border rounded bg-white my-3" id="portal-form-success-box" style="display:none; border: 3px solid var(--success)!important;">
            <div class="mb-4"><i class="fa-solid fa-circle-check text-success" style="font-size:6rem;"></i></div>
            <h2 class="fw-bold text-success mb-3">🎉 報名成功提交！</h2>
            <p class="text-muted fs-5 px-lg-5 mb-4" style="font-weight: bold; line-height: 1.8;">恭喜您已成功完成本次活動報名。大會系統已將您的資料編入現場公務投保名冊及餐食採購統計中。期待活動現場與您相見！</p>
            <div class="card bg-light p-4 border-0 text-start mb-4 mx-auto" style="max-width:550px; border: 2px solid #cbd5e1!important;">
              <h5 class="fw-bold border-bottom pb-2 mb-3"><i class="fa-solid fa-clipboard-list me-2"></i>您的報名明細：</h5>
              <div class="d-flex justify-content-between mb-2 fs-5"><span class="text-muted">報名姓名：</span><strong id="p-success-name"></strong></div>
              <div class="d-flex justify-content-between mb-2 fs-5"><span class="text-muted">指派任務：</span><strong id="p-success-task" class="text-primary"></strong></div>
              <div class="d-flex justify-content-between mb-2 fs-5"><span class="text-muted">餐食偏好：</span><strong id="p-success-lunch"></strong></div>
              <div class="d-flex justify-content-between fs-5"><span class="text-muted">投保狀況：</span><strong class="text-success"><i class="fa-solid fa-shield-halved me-1"></i>大會全程公共旅平險保障</strong></div>
            </div>
            <div class="d-flex gap-3 justify-content-center flex-wrap">
              <button type="button" class="btn btn-outline-primary btn-custom py-3 px-4" onclick="printPortalRegistrationForm()"><i class="fa-solid fa-print me-1"></i>列印個人報名單</button>
              <button type="button" class="btn btn-outline-secondary btn-custom py-3 px-4" onclick="showSection('calendar')"><i class="fa-solid fa-house me-1"></i>回首頁</button>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- Toast 提示容器 -->
  <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 1060; display: flex; flex-direction: column; gap: 10px;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ==================== 環境與狀態 ====================
    const isGas = typeof google !== 'undefined' && google.script && google.script.run;
    let GAS_WEB_APP_URL = localStorage.getItem('GAS_WEB_APP_URL') || '';
    
    let state = {
      events: [], tasks: [], members: [], registrations: [], formConfigs: {},
      currentYear: 2026, currentMonth: 5, // 0-indexed, 5 = June
      activeEventId: '', activeSelectedTaskId: '', previousSection: 'calendar',
      lastRegisteredData: null
    };

    // 解析 URL 參數
    function parseUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const page = params.get('page');
      const eventId = params.get('event');
      if (page === 'register' && eventId) {
        return { page: 'form', eventId };
      }
      return { page: page || 'calendar', eventId: eventId || '' };
    }

    // ==================== 載入資料庫 ====================
    async function loadDatabase() {
      if (isGas || GAS_WEB_APP_URL) {
        try {

    async function gasCall(fnName, ...args) {
      if (isGas) {
        return new Promise((resolve, reject) => {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fnName](...args);
        });
      }
      if (GAS_WEB_APP_URL) {
        let url = GAS_WEB_APP_URL + '?action=' + fnName;
        if (args.length > 0) {
          if (typeof args[0] === 'string') url += '&eventId=' + encodeURIComponent(args[0]);
          else if (typeof args[0] === 'object') {
            Object.keys(args[0]).forEach(k => url += '&' + k + '=' + encodeURIComponent(args[0][k]));
          }
        }
        const resp = await fetch(url);
        return await resp.json();
      }
      // 模擬延遲
      return new Promise(resolve => setTimeout(() => {
        if (fnName === 'getEvents') resolve(state.events);
        else if (fnName === 'getMembers') resolve(state.members);
        else if (fnName === 'getTasks') resolve(state.tasks.filter(t => t.eventId === args[0]));
        else if (fnName === 'getRegistrations') resolve(state.registrations.filter(r => r.eventId === args[0]));
        else if (fnName === 'getFormConfig') resolve(state.formConfigs[args[0]] || null);
        else if (fnName === 'addRegistration') {
          const r = { ...args[0], id: 'R-' + Date.now(), confirmStatus: 'pending', registeredAt: new Date().toISOString() };
          state.registrations.push(r);
          localStorage.setItem('EM_SYSTEM_DATA_V2', JSON.stringify({ events:state.events, tasks:state.tasks, members:state.members, registrations:state.registrations, formConfigs:state.formConfigs }));
          resolve(r);
        }
      }, 100));
    }

    // ==================== 頁面路由與切換 ====================
    function showSection(secId) {
      document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-tab-btn').forEach(b => b.classList.remove('active'));
      
      const target = document.getElementById('sec-' + secId);
      if (target) target.classList.add('active');
      
      const btn = document.querySelector(`.nav-tab-btn[data-sec="${secId}"]`);
      if (btn) btn.classList.add('active');
      
      if (secId !== 'form') state.previousSection = secId;
      
      if (secId === 'calendar') renderCalendar();
      else if (secId === 'category') renderCategoryEvents();
      else if (secId === 'list') renderListEvents();
    }

    function goBackToPrevious() {
      showSection(state.previousSection);
    }

    // ==================== 1. 月曆渲染 ====================
    function renderCalendar() {
      const container = document.getElementById('cal-grid-container');
      container.innerHTML = '';
      
      const daysInMonth = new Date(state.currentYear, state.currentMonth + 1, 0).getDate();
      const firstDayIndex = new Date(state.currentYear, state.currentMonth, 1).getDay();
      
      document.getElementById('cal-month-title').innerText = `${state.currentYear} 年 ${state.currentMonth + 1} 月`;
      
      // 星期表頭
      const weekHeaders = ['日', '一', '二', '三', '四', '五', '六'];
      weekHeaders.forEach(h => {
        container.innerHTML += `<div class="cal-day-header">${h}</div>`;
      });
      
      // 空白格
      for (let i = 0; i < firstDayIndex; i++) {
        container.innerHTML += `<div class="cal-day bg-light" style="opacity:0.5;"></div>`;
      }
      
      // 日期格
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${state.currentYear}-${String(state.currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = state.events.filter(e => e.date === dateStr);
        
        let eventHtml = '';
        dayEvents.forEach(e => {
          if (e.status === '報名中' || e.status === '籌備中') {
            eventHtml += `<span class="cal-event-dot" onclick="openRegistrationForm('${e.id}')" title="${e.name}">🚲 ${e.name}</span>`;
          }
        });
        
        const isToday = new Date().toDateString() === new Date(state.currentYear, state.currentMonth, day).toDateString();
        container.innerHTML += `
          <div class="cal-day ${isToday ? 'today' : ''}">
            <div class="cal-day-num">${day}</div>
            ${eventHtml}
          </div>`;
      }
    }

    function prevMonth() {
      state.currentMonth--;
      if (state.currentMonth < 0) { state.currentMonth = 11; state.currentYear--; }
      renderCalendar();
    }
    function nextMonth() {
      state.currentMonth++;
      if (state.currentMonth > 11) { state.currentMonth = 0; state.currentYear++; }
      renderCalendar();
    }

    // ==================== 2. 類別渲染 ====================
    function renderCategoryEvents() {
      filterByCategory('all');
    }

    async function filterByCategory(type) {
      const container = document.getElementById('category-events-container');
      container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div></div>';
      
      let filteredEvents = state.events.filter(e => e.status === '報名中' || e.status === '籌備中');
      
      // 模擬模式下，我們需要根據任務類型來過濾活動
      if (type !== 'all') {
        const matchedEventIds = [...new Set(state.tasks.filter(t => t.type === type).map(t => t.eventId))];
        filteredEvents = filteredEvents.filter(e => matchedEventIds.includes(e.id));
      }

      container.innerHTML = '';
      if (!filteredEvents.length) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-5 fw-bold">目前無此類型的開放活動</div>';
        return;
      }

      filteredEvents.forEach(e => {
        container.appendChild(createEventCard(e));
      });
    }

    // ==================== 3. 清單渲染 ====================
    function renderListEvents() {
      const container = document.getElementById('list-events-container');
      container.innerHTML = '';
      const search = document.getElementById('list-search').value.toLowerCase();
      
      const filtered = state.events.filter(e => 
        (e.status === '報名中' || e.status === '籌備中') &&
        (e.name.toLowerCase().includes(search) || e.location.toLowerCase().includes(search))
      );

      if (!filtered.length) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-5 fw-bold">無符合搜尋條件的活動</div>';
        return;
      }

      filtered.forEach(e => {
        container.appendChild(createEventCard(e));
      });
    }

    function createEventCard(e) {
      const col = document.createElement('div');
      col.className = 'col-12 col-md-6';
      
      let themeClass = 'banner-theme-default';
      if (e.name.includes('獨木舟')) themeClass = 'banner-theme-forest';
      else if (e.name.includes('接駁')) themeClass = 'banner-theme-sunset';
      else if (e.name.includes('培訓')) themeClass = 'banner-theme-ocean';

      let statusBadge = '';
      if (e.status === '報名中') statusBadge = '<span class="event-status-badge status-open">✅ 開放報名</span>';
      else statusBadge = '<span class="event-status-badge status-prep">籌備中</span>';

      col.innerHTML = `
        <div class="card-custom event-card h-100" onclick="openRegistrationForm('${e.id}')">
          <div class="event-card-banner ${themeClass}">
            ${statusBadge}
          </div>
          <div class="event-card-body">
            <h6 class="mb-2">${e.name}</h6>

    // ==================== 4. 報名表單渲染與提交 ====================
    async function openRegistrationForm(eid) {
      state.activeEventId = eid;
      state.activeSelectedTaskId = '';
      showSection('form');
      
      const ev = state.events.find(e => e.id === eid);
      if (!ev) return;
      
      // 載入表單設定與任務
      let cfg = state.formConfigs[eid];
      if (!cfg) {
        try {
          cfg = await gasCall('getFormConfig', eid);
        } catch(e) {}
        if (!cfg) {
          cfg = { title: `【線上報名】${ev.name}`, bannerTheme: 'banner-theme-default', description: ev.description, requireIdNumber: true, requireEmail: true, allowHandcycle: true, allowKayak: true, allowShuttle: true, allowOther: true, isEnabled: true };
        }
      }

      document.getElementById('form-title').innerText = cfg.title;
      document.getElementById('form-subtitle').innerHTML = `<i class="fa-solid fa-location-dot me-1"></i>地點：${ev.location} | <i class="fa-regular fa-calendar-check me-1"></i>日期：${ev.date}`;
      document.getElementById('form-welcome-desc').innerText = cfg.description || '歡迎填寫資料報名本次活動。';
      
      const banner = document.getElementById('form-banner');
      banner.className = 'public-form-banner ' + (cfg.bannerTheme || 'banner-theme-default');
      
      // 必填欄位調整
      const idInput = document.getElementById('reg-idnumber'), emailInput = document.getElementById('reg-email');

      else { idInput.required = false; document.getElementById('reg-id-label').innerHTML = '身分證字號 / 護照號碼（選填）'; }
      if (cfg.requireEmail) { emailInput.required = true; document.getElementById('reg-email-label').innerHTML = 'Email 電子信箱 <span class="text-danger">*</span>'; }
      else { emailInput.required = false; document.getElementById('reg-email-label').innerHTML = 'Email 電子信箱（選填）'; }

      document.getElementById('portal-registration-form').reset();
      document.getElementById('portal-registration-form').style.display = 'block';
      document.getElementById('form-welcome-box').style.display = 'block';
      document.getElementById('portal-form-success-box').style.display = 'none';

      // 載入該活動的任務
      try {
        state.tasks = await gasCall('getTasks', eid);
        state.registrations = await gasCall('getRegistrations', eid);
      } catch(err) {}

      renderPortalTasks(cfg);
    }

    function renderPortalTasks(cfg) {
      const container = document.getElementById('portal-form-tasks-container');
      container.innerHTML = '';
      
      const allowed = [];
      if (cfg.allowHandcycle !== false) allowed.push('handcycle');
      if (cfg.allowKayak !== false) allowed.push('kayak');
      if (cfg.allowShuttle !== false) allowed.push('shuttle');
      if (cfg.allowOther !== false) allowed.push('other');
      
      const evTasks = state.tasks.filter(t => t.eventId === state.activeEventId && allowed.includes(t.type));
      
      if (!evTasks.length) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-4 border rounded bg-light"><p class="m-0 fs-5 fw-bold">本活動目前暫無開放線上報名的分組任務。</p></div>';
        return;
      }

      evTasks.forEach(task => {
        const ac = state.registrations.filter(r => r.taskId === task.id).length;
        const sl = Number(task.seats || 0);
        const rem = Math.max(0, sl - ac);
        const full = rem <= 0;
        
        let icon = '🚲', bb = 'bg-primary-light text-primary', dh = '';
        if (task.type === 'handcycle') { icon = '🚲'; bb = 'bg-primary-light text-primary'; dh = `組別：${task.subGroup || 'A組'}`; }
        else if (task.type === 'kayak') { icon = '🛶'; bb = 'bg-success-light text-success'; dh = `場次：${task.session || '第一場'} | 下水：${task.time || '—'}`; }
        else if (task.type === 'shuttle') { icon = '🚌'; bb = 'bg-warning-light text-warning'; dh = `發車：${task.time || '—'} | 起：${task.location || '大會'}`; }
        else { icon = '📋'; bb = 'bg-secondary-light text-secondary'; dh = `場次：${task.session || '整天'}`; }

        const col = document.createElement('div');
        col.className = 'col-md-6';
        col.innerHTML = `
          <div class="task-select-card ${full ? 'task-full' : ''}" id="portal-task-card-${task.id}" onclick="selectPortalTask('${task.id}', ${full})">
            <div class="task-check-icon"><i class="fa-solid fa-check"></i></div>
            <div class="d-flex align-items-center mb-2">
              <span class="fs-3 me-2">${icon}</span>
              <h5 class="fw-bold mb-0 text-dark text-truncate" style="max-width:80%;">${task.name}</h5>
            </div>
            <div class="d-flex justify-content-between align-items-center" style="font-size:1.1rem; font-weight: bold;">
              <span class="text-secondary">${dh}</span>
              <span class="badge ${full ? 'bg-danger' : bb} py-2 px-3">${full ? '已額滿' : `賸餘 ${rem} / ${sl} 位`}</span>
            </div>
            ${task.note ? `<p class="m-0 mt-2 small text-muted text-truncate" style="font-style:italic; font-size:1rem;">備註: ${task.note}</p>` : ''}
          </div>`;
        container.appendChild(col);
      });
    }

    function selectPortalTask(tid, full) {
      if (full) { showToast('該任務名額已滿，請選擇其他班次！', 'warning'); return; }
      if (state.activeSelectedTaskId) {
        const oc = document.getElementById('portal-task-card-' + state.activeSelectedTaskId);
        if (oc) oc.classList.remove('selected');
      }
      state.activeSelectedTaskId = tid;
      const nc = document.getElementById('portal-task-card-' + tid);
      if (nc) nc.classList.add('selected');
    }

    document.getElementById('portal-registration-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!state.activeSelectedTaskId) { showToast('請選擇一個您要加入的任務分組！', 'warning'); return; }
      
      const name = document.getElementById('reg-name').value.trim();
      const gender = document.getElementById('reg-gender').value;
      const birthdate = document.getElementById('reg-birthdate').value.trim();
      const identity = document.getElementById('reg-identity').value;
      const phone = document.getElementById('reg-phone').value.trim();
      const homephone = document.getElementById('reg-homephone').value.trim();
      const lineid = document.getElementById('reg-lineid').value.trim();
      const address = document.getElementById('reg-address').value.trim();

          memberId = nm.id;

          subGroup: task.subGroup || '',

          insurance: !!idNumber
        });

    // ==================== 5. 報名狀態查詢 ====================
    async function queryRegistrations() {
      const name = document.getElementById('query-name').value.trim();
      const phone = document.getElementById('query-phone').value.trim();
      if (!name || !phone) { showToast('請填寫姓名與手機號碼！', 'warning'); return; }
      
      const container = document.getElementById('query-results-container');
      container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2 fw-bold">正在向雲端查詢中，請稍候...</p></div>';
      
      try {
        // 雲端模式下，需要向後端取得最新報名狀態
        if (isGas || GAS_WEB_APP_URL) {
          state.registrations = await gasCall('getPendingRegistrations'); // 取得所有待審核與已確認
        }
        
        const member = state.members.find(m => m.name === name && m.phone === phone);
        if (!member) {
          container.innerHTML = '<div class="alert alert-warning py-3 px-3 fw-bold"><i class="fa-solid fa-triangle-exclamation me-1"></i>查無您的會員名冊資料，請確認輸入是否正確，或直接前往活動進行報名。</div>';
          return;
        }

        const myRegs = state.registrations.filter(r => r.memberId === member.id);
        if (!myRegs.length) {
          container.innerHTML = '<div class="alert alert-info py-3 px-3 fw-bold"><i class="fa-solid fa-circle-info me-1"></i>您目前尚未報名任何活動。</div>';
          return;
        }

        container.innerHTML = '';
        myRegs.forEach(r => {
          const ev = state.events.find(e => e.id === r.eventId) || { name: '未知活動', date: '' };
          const task = state.tasks.find(t => t.id === r.taskId) || { name: '未知任務' };
          
          let statusClass = 'status-pending', statusText = '待確認 ⌛', pillClass = 'pill-pending';
          if (r.confirmStatus === 'confirmed') { statusClass = 'status-confirmed'; statusText = '已確認 ✅'; pillClass = 'pill-confirmed'; }
          else if (r.confirmStatus === 'cancelled') { statusClass = 'status-cancelled'; statusText = '已取消 ❌'; pillClass = 'pill-cancelled'; }

          container.innerHTML += `
            <div class="status-card ${statusClass}">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                  <h4 class="fw-bold mb-1 text-dark">${ev.name}</h4>
                  <p class="m-0 text-muted fw-bold" style="font-size:1.1rem;"><i class="fa-regular fa-clock me-1"></i>活動日期：${ev.date}</p>
                </div>
                <span class="status-badge-pill ${pillClass}">${statusText}</span>
              </div>
              <div class="row g-2 fw-bold text-dark fs-5">
                <div class="col-md-6"><strong>指派任務：</strong><span class="text-primary">${task.name}</span></div>
                <div class="col-md-6"><strong>餐食偏好：</strong>${r.lunch || '葷食'}</div>
                <div class="col-12 mt-2 border-top pt-2"><small class="text-muted">報名時間：${r.registeredAt ? new Date(r.registeredAt).toLocaleString('zh-TW') : '—'}</small></div>
              </div>
            </div>`;
        });
      } catch (err) {
        container.innerHTML = `<div class="alert alert-danger py-3 px-3 fw-bold">查詢失敗：${err}</div>`;
      }
    }

    // ==================== 個人報名單列印 ====================
    function printPortalRegistrationForm() {
      if (!state.lastRegisteredData) return;
      const ev = state.events.find(e => e.id === state.lastRegisteredData.eventId) || { name: '大會活動', date: '', location: '' };
      
      // 呼叫與 index.html 相同的列印生成邏輯
      const html = `
        <div class="reg-form-print">
          <div class="reg-header" style="text-align: center; border-bottom: 3px solid #0b3c95; padding-bottom: 12px; margin-bottom: 16px;">
            <h2 style="color:#0b3c95; font-size:1.6rem; font-weight:bold; margin:0;">🏅 大會活動個人報名確認單</h2>
            <p style="color:#1e293b; font-size:1.1rem; margin:6px 0 0; font-weight:bold;">${ev.name}</p>
            <p style="color:#475569; font-size:1rem; margin:4px 0 0; font-weight:bold;">活動日期：${ev.date} | 地點：${ev.location}</p>
          </div>
          <div style="margin-bottom: 20px;">
            <div style="background:#0b3c95; color:white; padding:8px 14px; border-radius:4px; font-size:1.1rem; margin-bottom:12px; font-weight:bold;">👤 個人基本資料</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
              <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">中文姓名</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.name}</span></div>
              <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">生理性別</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.gender}</span></div>
              <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">出生日期</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.birthdate}</span></div>
              <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">身分別</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.identity}</span></div>
            </div>
          </div>
          <div style="margin-bottom: 20px;">
            <div style="background:#0b3c95; color:white; padding:8px 14px; border-radius:4px; font-size:1.1rem; margin-bottom:12px; font-weight:bold;">🎯 報名任務分組</div>
            <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">指派任務</span><span style="color:#0b3c95; font-weight:bold;">${state.lastRegisteredData.taskName}</span></div>
            <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">組別/場次</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.taskGroup}</span></div>
            <div style="display:flex; border-bottom:2px solid #e2e8f0; padding:8px 0; font-size:1.05rem;"><span style="color:#475569; min-width:130px; font-weight:bold;">餐食偏好</span><span style="color:#0f172a; font-weight:bold;">${state.lastRegisteredData.lunchChoice}</span></div>
          </div>
          <div style="margin-top: 30px; padding-top: 12px; border-top: 1px dashed #9ca3af; display: flex; justify-content: space-between; font-size: .9rem; color: #475569;">
            <span>報名編號：${state.lastRegisteredData.regId || '—'} | 時間：${new Date().toLocaleString('zh-TW')}</span>
            <span>大會工作人員核章：__________________</span>
          </div>
        </div>`;

      const win = window.open('', '_blank', 'width=900,height=700');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>個人報名單 - ${state.lastRegisteredData.name}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{padding:30px;background:#fff;}@media print{button{display:none;}}</style></head><body><div class="mb-3 text-center"><button class="btn btn-primary btn-lg fw-bold px-4 py-2" onclick="window.print()">🖨️ 列印此報名單</button></div>${html}</body></html>`);
      win.document.close();
    }

    // ==================== Toast 提示 ====================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = 'p-3 bg-white border rounded shadow d-flex align-items-center';
      toast.style.minWidth = '320px';
      toast.style.borderLeft = '8px solid ' + (type === 'error' ? 'var(--danger)' : type === 'warning' ? 'var(--warning)' : 'var(--success)') + '!important';
      
      let icon = '✔️';
      if (type === 'error') icon = '❌';
      else if (type === 'warning') icon = '⚠️';

      toast.innerHTML = `<span class="fs-3 me-3">${icon}</span><div><strong class="d-block text-dark" style="font-size:1.1rem;">系統提示</strong><span class="text-secondary" style="font-size:1.05rem; font-weight:bold;">${message}</span></div>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // ==================== 初始化 ====================
    window.addEventListener('DOMContentLoaded', async () => {
      await loadDatabase();
      
      const route = parseUrlParams();
      if (route.page === 'form' && route.eventId) {
        openRegistrationForm(route.eventId);
      } else {
        showSection('calendar');
      }
    });
  </script>
</body>
</html>
