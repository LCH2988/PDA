<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會員活動報名系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  :root {
    --primary: #1e3a8a; --primary-light: #dbeafe; --success: #16a34a;
    --warning: #d97706; --danger: #dc2626; --bg: #f0f4f8;
    --card-radius: 14px; --shadow: 0 4px 20px rgba(0,0,0,.08);
  }
  * { box-sizing: border-box; }
  body { background: var(--bg); font-family: 'Microsoft JhengHei','Noto Sans TC',sans-serif; min-height: 100vh; }

  /* ── Topbar ── */
  .topbar { background: linear-gradient(135deg,#1e3a8a,#2563eb); color:#fff; padding:.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(0,0,0,.2); position:sticky; top:0; z-index:100; }
  .topbar .brand { font-size:1.1rem; font-weight:700; letter-spacing:.5px; }
  .topbar .brand span { opacity:.75; font-size:.85rem; font-weight:400; margin-left:.5rem; }

  /* ── Nav Tabs ── */
  .nav-tabs-custom { background:#fff; border-bottom:2px solid #e2e8f0; display:flex; gap:0; overflow-x:auto; }
  .nav-tab-btn { border:none; background:none; padding:.85rem 1.4rem; font-size:.9rem; font-weight:600; color:#64748b; cursor:pointer; border-bottom:3px solid transparent; transition:all .2s; white-space:nowrap; }
  .nav-tab-btn:hover { color:var(--primary); background:#f8fafc; }
  .nav-tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); background:#fff; }
  .nav-tab-btn i { margin-right:.4rem; }

  /* ── Content ── */
  .content-wrap { max-width:1100px; margin:0 auto; padding:1.5rem 1rem 4rem; }
  .page-section { display:none; }
  .page-section.active { display:block; }

  /* ── Cards ── */
  .card-custom { background:#fff; border-radius:var(--card-radius); box-shadow:var(--shadow); border:none; overflow:hidden; }
  .card-custom:hover { box-shadow:0 8px 30px rgba(0,0,0,.12); transform:translateY(-2px); transition:all .2s; }

  /* ── Event Card ── */
  .event-card { cursor:pointer; transition:all .2s; }
  .event-card-banner { height:90px; display:flex; align-items:flex-end; padding:1rem; }
  .banner-theme-default { background:linear-gradient(135deg,#1e3a8a,#3b82f6); }
  .banner-theme-sunset  { background:linear-gradient(135deg,#701a75,#f43f5e); }
  .banner-theme-forest  { background:linear-gradient(135deg,#064e3b,#10b981); }
  .banner-theme-ocean   { background:linear-gradient(135deg,#0f172a,#0284c7); }
  .event-card-body { padding:1rem; }
  .event-status-badge { font-size:.72rem; padding:3px 10px; border-radius:20px; font-weight:700; }
  .status-open   { background:#dcfce7; color:#166534; }
  .status-prep   { background:#fef9c3; color:#854d0e; }
  .status-closed { background:#fee2e2; color:#991b1b; }
  .seats-bar { height:6px; background:#e2e8f0; border-radius:3px; overflow:hidden; margin-top:6px; }
  .seats-bar-fill { height:100%; background:linear-gradient(90deg,#22c55e,#16a34a); border-radius:3px; transition:width .4s; }
  .seats-bar-fill.warn { background:linear-gradient(90deg,#f59e0b,#d97706); }
  .seats-bar-fill.full { background:linear-gradient(90deg,#ef4444,#dc2626); }

  /* ── Calendar ── */
  .cal-header { display:flex; align-items:center; justify-content:space-between; padding:.75rem 1rem; background:#fff; border-radius:var(--card-radius) var(--card-radius) 0 0; border-bottom:1px solid #e2e8f0; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
  .cal-day-header { text-align:center; padding:.5rem; font-size:.75rem; font-weight:700; color:#64748b; background:#f8fafc; }
  .cal-day { min-height:90px; border:1px solid #f1f5f9; padding:.35rem; background:#fff; vertical-align:top; }
  .cal-day.other-month { background:#f8fafc; }
  .cal-day.today { background:#eff6ff; }
  .cal-day-num { font-size:.8rem; font-weight:600; color:#374151; margin-bottom:3px; }
  .cal-day.today .cal-day-num { background:var(--primary); color:#fff; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .cal-event-dot { font-size:.7rem; background:var(--primary-light); color:var(--primary); border-radius:4px; padding:1px 5px; margin-bottom:2px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cal-event-dot:hover { background:var(--primary); color:#fff; }

  /* ── Category Tags ── */
  .cat-filter { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
  .cat-btn { border:2px solid #e2e8f0; background:#fff; border-radius:20px; padding:.35rem 1rem; font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; }
  .cat-btn.active { border-color:var(--primary); background:var(--primary); color:#fff; }
  .cat-btn:hover:not(.active) { border-color:#94a3b8; }

  /* ── List View ── */
  .list-event-row { display:flex; align-items:center; gap:1rem; padding:1rem 1.25rem; border-bottom:1px solid #f1f5f9; cursor:pointer; transition:background .15s; }
  .list-event-row:hover { background:#f8fafc; }
  .list-event-row:last-child { border-bottom:none; }
  .list-date-badge { min-width:52px; text-align:center; background:var(--primary-light); color:var(--primary); border-radius:10px; padding:.4rem .5rem; }
  .list-date-badge .month { font-size:.65rem; font-weight:700; text-transform:uppercase; }
  .list-date-badge .day { font-size:1.3rem; font-weight:800; line-height:1; }

  /* ── Registration Modal ── */
  .reg-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:flex; align-items:center; justify-content:center; padding:1rem; opacity:0; pointer-events:none; transition:opacity .25s; }
  .reg-modal-overlay.show { opacity:1; pointer-events:all; }
  .reg-modal { background:#fff; border-radius:18px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.25); transform:scale(.95); transition:transform .25s; }
  .reg-modal-overlay.show .reg-modal { transform:scale(1); }
  .reg-modal-banner { padding:1.75rem 2rem; color:#fff; }
  .reg-modal-body { padding:1.75rem 2rem; }
  .section-title { font-weight:700; font-size:.95rem; color:var(--primary); border-left:4px solid #3b82f6; padding-left:.75rem; margin:1.25rem 0 .85rem; }
  .task-select-card { border:2px solid #e2e8f0; border-radius:12px; padding:.9rem 1rem; cursor:pointer; transition:all .2s; margin-bottom:.6rem; position:relative; }
  .task-select-card:hover:not(.task-full) { border-color:#3b82f6; background:#f0f9ff; }
  .task-select-card.selected { border-color:#2563eb; background:#eff6ff; }
  .task-select-card.task-full { opacity:.6; cursor:not-allowed; background:#f8fafc; }
  .task-check-icon { display:none; position:absolute; top:10px; right:10px; width:22px; height:22px; background:#2563eb; border-radius:50%; color:#fff; font-size:.65rem; align-items:center; justify-content:center; }
  .task-select-card.selected .task-check-icon { display:flex; }
  .submit-btn { background:linear-gradient(135deg,#1e3a8a,#3b82f6); border:none; border-radius:12px; padding:.9rem; font-size:1rem; font-weight:700; width:100%; color:#fff; cursor:pointer; transition:all .2s; }
  .submit-btn:hover { opacity:.9; transform:translateY(-1px); }
  .submit-btn:disabled { opacity:.6; cursor:not-allowed; transform:none; }

  /* ── Status Page ── */
  .status-card { border-radius:12px; padding:1rem 1.25rem; margin-bottom:.75rem; border-left:4px solid; }
  .status-pending   { border-color:#f59e0b; background:#fffbeb; }
  .status-confirmed { border-color:#16a34a; background:#f0fdf4; }
  .status-cancelled { border-color:#dc2626; background:#fef2f2; }
  .status-badge-pill { font-size:.72rem; padding:3px 10px; border-radius:20px; font-weight:700; }
  .pill-pending   { background:#fef9c3; color:#854d0e; }
  .pill-confirmed { background:#dcfce7; color:#166534; }
  .pill-cancelled { background:#fee2e2; color:#991b1b; }

  /* ── Toast ── */
  .toast-wrap { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; display:flex; flex-direction:column; gap:.5rem; }
  .toast-item { background:#1e293b; color:#fff; border-radius:10px; padding:.75rem 1.25rem; font-size:.88rem; box-shadow:0 4px 16px rgba(0,0,0,.2); transform:translateX(120%); transition:transform .3s cubic-bezier(.68,-.55,.265,1.55); min-width:240px; }
  .toast-item.show { transform:translateX(0); }
  .toast-item.success { border-left:4px solid #22c55e; }
  .toast-item.error   { border-left:4px solid #ef4444; }
  .toast-item.warning { border-left:4px solid #f59e0b; }

  /* ── Success Box ── */
  .success-box { text-align:center; padding:2.5rem 1.5rem; }

  /* ── Responsive ── */
  @media(max-width:640px) {
    .cal-day { min-height:55px; }
    .cal-event-dot { display:none; }
    .cal-day.has-event::after { content:'●'; color:var(--primary); font-size:.5rem; display:block; text-align:center; }
    .reg-modal-body { padding:1.25rem; }
  }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="brand"><i class="fa-solid fa-calendar-heart me-2"></i>會員活動報名系統 <span>Member Portal</span></div>
  <div class="d-flex align-items:center gap-3">
    <button class="btn btn-sm btn-outline-light" onclick="showSection('status')"><i class="fa-solid fa-clipboard-list me-1"></i>我的報名</button>
    <div id="conn-badge" class="badge bg-warning text-dark" style="font-size:.72rem;">未連線</div>
  </div>
</div>

<!-- Nav Tabs -->
<div class="nav-tabs-custom">
  <button class="nav-tab-btn active" data-sec="calendar" onclick="showSection('calendar')"><i class="fa-solid fa-calendar-days"></i>月曆</button>
  <button class="nav-tab-btn" data-sec="category" onclick="showSection('category')"><i class="fa-solid fa-tags"></i>類別</button>
  <button class="nav-tab-btn" data-sec="list" onclick="showSection('list')"><i class="fa-solid fa-list"></i>清單</button>
  <button class="nav-tab-btn" data-sec="status" onclick="showSection('status')"><i class="fa-solid fa-user-check"></i>我的報名</button>
</div>

<!-- Content -->
<div class="content-wrap">

  <!-- GAS 設定提示 -->
  <div id="gas-setup-alert" class="alert alert-warning d-flex align-items-start gap-2 mb-3" style="display:none!important;">
    <i class="fa-solid fa-triangle-exclamation mt-1"></i>
    <div>
      <strong>尚未連線後台</strong>，目前顯示示範資料。<br>
      <small>請在下方輸入 GAS Web App 網址後儲存，即可同步真實資料。</small>
      <div class="mt-2 d-flex gap-2">
        <input type="text" id="gas-url-input" class="form-control form-control-sm" placeholder="https://script.google.com/macros/s/.../exec" style="max-width:400px;">
        <button class="btn btn-sm btn-warning" onclick="saveGasUrl()">儲存連線</button>
      </div>
    </div>
  </div>

  <!-- ① 月曆視圖 -->
  <div id="sec-calendar" class="page-section active">
    <div class="card-custom mb-3">
      <div class="cal-header">
        <button class="btn btn-sm btn-outline-secondary" onclick="calPrev()"><i class="fa-solid fa-chevron-left"></i></button>
        <h5 class="fw-bold mb-0" id="cal-month-label"></h5>
        <button class="btn btn-sm btn-outline-secondary" onclick="calNext()"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
      <div class="cal-grid" id="cal-day-headers"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div id="cal-event-list" class="row g-3"></div>
  </div>

  <!-- ② 類別視圖 -->
  <div id="sec-category" class="page-section">
    <div class="cat-filter" id="cat-filter-btns"></div>
    <div class="row g-3" id="cat-event-grid"></div>
  </div>

  <!-- ③ 清單視圖 -->
  <div id="sec-list" class="page-section">
    <div class="card-custom mb-3 px-3 py-2 d-flex gap-2 flex-wrap align-items-center">
      <div class="position-relative flex-grow-1" style="min-width:200px;">
        <i class="fa-solid fa-magnifying-glass text-muted position-absolute" style="top:10px;left:12px;"></i>
        <input type="text" id="list-search" class="form-control ps-5" placeholder="搜尋活動名稱或地點" oninput="renderList()">
      </div>
      <select id="list-status-filter" class="form-select" style="max-width:140px;" onchange="renderList()">
        <option value="">全部狀態</option>
        <option value="報名中">報名中</option>
        <option value="籌備中">籌備中</option>
        <option value="已截止">已截止</option>
      </select>
    </div>
    <div class="card-custom" id="list-container"></div>
  </div>

  <!-- ④ 我的報名 -->
  <div id="sec-status" class="page-section">
    <div class="card-custom p-4 mb-4">
      <h5 class="fw-bold mb-3"><i class="fa-solid fa-user-check text-primary me-2"></i>查詢我的報名記錄</h5>
      <div class="row g-2">
        <div class="col-md-5"><input type="text" id="query-name" class="form-control" placeholder="姓名"></div>
        <div class="col-md-5"><input type="tel" id="query-phone" class="form-control" placeholder="手機號碼（必填）"></div>
        <div class="col-md-2"><button class="btn btn-primary w-100" onclick="queryMyRegistrations()"><i class="fa-solid fa-search me-1"></i>查詢</button></div>
      </div>
    </div>
    <div id="my-regs-container"></div>
  </div>

</div><!-- /content-wrap -->

<!-- Toast Container -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Registration Modal -->
<div class="reg-modal-overlay" id="reg-modal-overlay" onclick="closeRegModal(event)">
  <div class="reg-modal" id="reg-modal">
    <div class="reg-modal-banner" id="reg-modal-banner">
      <h4 class="fw-bold mb-1" id="reg-modal-title"></h4>
      <div style="font-size:.85rem;opacity:.85;" id="reg-modal-subtitle"></div>
    </div>
    <div class="reg-modal-body">
      <!-- 活動說明 -->
      <div class="alert alert-light border mb-3" id="reg-modal-desc-box">
        <p class="m-0 small text-muted" id="reg-modal-desc" style="white-space:pre-line;line-height:1.7;"></p>
      </div>
      <!-- 成功畫面 -->
      <div id="reg-success-box" class="success-box" style="display:none;">
        <i class="fa-solid fa-circle-check text-success mb-3" style="font-size:4.5rem;"></i>
        <h4 class="fw-bold text-success">🎉 報名成功提交！</h4>
        <p class="text-muted mb-3">您的報名已送出，<strong>待後台管理員確認後即生效</strong>。確認後將無法自行修改，如需變更請聯絡管理員。</p>
        <div class="card bg-light border-0 p-3 text-start mx-auto mb-4" style="max-width:400px;">
          <div class="d-flex justify-content-between mb-1"><span class="text-muted">報名姓名：</span><strong id="suc-name"></strong></div>
          <div class="d-flex justify-content-between mb-1"><span class="text-muted">報名任務：</span><strong id="suc-task" class="text-primary"></strong></div>
          <div class="d-flex justify-content-between mb-1"><span class="text-muted">餐食偏好：</span><strong id="suc-lunch"></strong></div>
          <div class="d-flex justify-content-between"><span class="text-muted">審核狀態：</span><span class="status-badge-pill pill-pending">⏳ 待後台確認</span></div>
        </div>
        <div class="d-flex gap-2 justify-content-center flex-wrap">
          <button class="btn btn-outline-primary" onclick="closeRegModal()"><i class="fa-solid fa-arrow-left me-1"></i>返回活動列表</button>
          <button class="btn btn-outline-secondary" onclick="showSection('status')"><i class="fa-solid fa-clipboard-list me-1"></i>查看我的報名</button>
        </div>
      </div>
      <!-- 報名表單 -->
      <form id="reg-form" onsubmit="submitRegistration(event)">
        <div class="section-title"><i class="fa-regular fa-id-card me-2"></i>個人基本資料</div>
        <div class="row g-2">
          <div class="col-md-6"><label class="form-label fw-bold">中文姓名 <span class="text-danger">*</span></label><input type="text" id="f-name" class="form-control" required></div>
          <div class="col-md-6"><label class="form-label fw-bold">生理性別 <span class="text-danger">*</span></label><select id="f-gender" class="form-select" required><option value="男">男</option><option value="女">女</option></select></div>
          <div class="col-md-6"><label class="form-label fw-bold">出生日期 <span class="text-danger">*</span></label><input type="text" id="f-birthdate" class="form-control" placeholder="例：501115" required></div>
          <div class="col-md-6"><label class="form-label fw-bold">報名身分別 <span class="text-danger">*</span></label><select id="f-identity" class="form-select" required><option>身障夥伴</option><option>樂齡長者</option><option>特教生</option><option>陪伴親友</option><option>志工夥伴</option><option>對生命勵健康促進活動有興趣的民眾</option><option>其他</option></select></div>
          <div class="col-md-6"><label class="form-label fw-bold">聯絡手機 <span class="text-danger">*</span></label><input type="tel" id="f-phone" class="form-control" placeholder="0912345678" required></div>
          <div class="col-md-6"><label class="form-label fw-bold" id="f-id-label">身分證字號 <span class="text-danger">*</span></label><input type="text" id="f-idnumber" class="form-control" placeholder="A123456789"><small class="text-muted" style="font-size:.72rem;"><i class="fa-solid fa-shield-halved me-1"></i>僅用於活動公共意外險投保，大會嚴格保密。</small></div>
          <div class="col-md-6"><label class="form-label fw-bold">室內電話</label><input type="tel" id="f-homephone" class="form-control"></div>
          <div class="col-md-6"><label class="form-label fw-bold">Line ID</label><input type="text" id="f-lineid" class="form-control"></div>
          <div class="col-12"><label class="form-label fw-bold">地址（含郵遞區號）<span class="text-danger">*</span></label><input type="text" id="f-address" class="form-control" required></div>
          <div class="col-12"><label class="form-label fw-bold" id="f-email-label">Email 電子信箱</label><input type="email" id="f-email" class="form-control" placeholder="請輸入電子信箱"></div>
        </div>

        <div class="section-title mt-3"><i class="fa-solid fa-list-check me-2"></i>選擇報名任務 / 班次</div>
        <p class="text-muted small mb-2">每位成員限報名一個核心任務，名額有限額滿截止。</p>
        <div id="task-cards-container"></div>
        <div id="task-error" class="alert alert-warning py-2 small" style="display:none;"><i class="fa-solid fa-triangle-exclamation me-1"></i>請選擇一個報名任務分組</div>

        <div class="section-title mt-2"><i class="fa-solid fa-utensils me-2"></i>餐食偏好</div>
        <select id="f-lunch" class="form-select mb-3" required>
          <option value="葷食">大會提供 - 葷食便當</option>
          <option value="素食">大會提供 - 素食便當</option>
          <option value="不需要">不需要大會餐點</option>
        </select>

        <div class="mb-3"><label class="form-label fw-bold">備註 / 特殊需求</label><textarea id="f-note" class="form-control" rows="2" placeholder="例：輪椅使用者、特殊藥物需求..."></textarea></div>

        <button type="submit" class="submit-btn" id="submit-btn"><i class="fa-solid fa-paper-plane me-2"></i>確認提交報名</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ==================== 設定 ====================
let GAS_URL = localStorage.getItem('MEMBER_PORTAL_GAS_URL') || '';
let allEvents = [], currentEventId = '', selectedTaskId = '', currentDetail = null;
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

// ==================== 初始化 ====================
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('gas-url-input').value = GAS_URL;
  if (!GAS_URL) {
    document.getElementById('gas-setup-alert').style.display = 'flex';
    document.getElementById('conn-badge').textContent = '示範模式';
    document.getElementById('conn-badge').className = 'badge bg-secondary';
  } else {
    document.getElementById('conn-badge').textContent = '已連線';
    document.getElementById('conn-badge').className = 'badge bg-success';
  }
  await loadEvents();
  renderCalendar();
  renderCategory();
  renderList();
});

function saveGasUrl() {
  const url = document.getElementById('gas-url-input').value.trim();
  if (!url) return;
  GAS_URL = url;
  localStorage.setItem('MEMBER_PORTAL_GAS_URL', url);
  document.getElementById('gas-setup-alert').style.display = 'none';
  document.getElementById('conn-badge').textContent = '已連線';
  document.getElementById('conn-badge').className = 'badge bg-success';
  loadEvents().then(() => { renderCalendar(); renderCategory(); renderList(); });
  showToast('後台連線設定已儲存！', 'success');
}

// ==================== 資料載入 ====================
async function api(action, params = {}) {
  if (!GAS_URL) return null;
  let url = GAS_URL + '?action=' + action;
  Object.keys(params).forEach(k => url += '&' + k + '=' + encodeURIComponent(params[k]));
  const resp = await fetch(url);
  return await resp.json();
}

async function apiPost(action, data) {
  if (!GAS_URL) return null;
  const resp = await fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action, data })
  });
  return await resp.json();
}

// ==================== 月曆視圖 ====================
const WEEKDAYS = ['日','一','二','三','四','五','六'];
function renderCalendar() {
  const label = document.getElementById('cal-month-label');
  label.textContent = `${calYear} 年 ${calMonth + 1} 月`;
  const headers = document.getElementById('cal-day-headers');
  headers.innerHTML = WEEKDAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const first = new Date(calYear, calMonth, 1);
  const last = new Date(calYear, calMonth + 1, 0);
  const today = new Date(); today.setHours(0,0,0,0);
  let cells = [];
  for (let i = 0; i < first.getDay(); i++) {
    const d = new Date(calYear, calMonth, -first.getDay() + i + 1);
    cells.push({ date: d, other: true });
  }
  for (let d = 1; d <= last.getDate(); d++) cells.push({ date: new Date(calYear, calMonth, d), other: false });
  while (cells.length % 7 !== 0) {
    const d = new Date(calYear, calMonth + 1, cells.length - last.getDate() - first.getDay() + 1);
    cells.push({ date: d, other: true });
  }
  cells.forEach(cell => {
    const dayStr = cell.date.toISOString().slice(0, 10);
    const isToday = cell.date.getTime() === today.getTime();
    const evs = allEvents.filter(e => e.date === dayStr);
    const div = document.createElement('div');
    div.className = 'cal-day' + (cell.other ? ' other-month' : '') + (isToday ? ' today' : '') + (evs.length ? ' has-event' : '');
    div.innerHTML = `<div class="cal-day-num">${cell.date.getDate()}</div>` +
      evs.map(ev => `<div class="cal-event-dot" onclick="openEventDetail('${ev.id}')">${ev.name}</div>`).join('');
    grid.appendChild(div);
  });
  // 本月活動清單
  const monthEvs = allEvents.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === calYear && d.getMonth() === calMonth;
  });
  const listEl = document.getElementById('cal-event-list');
  if (monthEvs.length === 0) {
    listEl.innerHTML = '<div class="col-12 text-center text-muted py-3"><i class="fa-regular fa-calendar-xmark fs-3 mb-2"></i><p>本月暫無活動</p></div>';
  } else {
    listEl.innerHTML = monthEvs.map(ev => renderEventCard(ev)).join('');
  }
}
function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); }

// ==================== 活動詳情 & 報名表單 ====================
async function openEventDetail(eventId) {
  currentEventId = eventId;
  selectedTaskId = '';
  document.getElementById('reg-success-box').style.display = 'none';
  document.getElementById('reg-form').style.display = 'block';
  document.getElementById('reg-form').reset();
  document.getElementById('task-error').style.display = 'none';

  let detail = null;
  if (GAS_URL) {
    try { detail = await api('getEventDetail', { eventId }); } catch(e) {}
  }
  if (!detail) {
    const ev = allEvents.find(e => e.id === eventId) || DEMO_EVENTS.find(e => e.id === eventId);
    if (!ev) return;
    detail = { event: ev, tasks: DEMO_TASKS.filter(t => t.eventId === eventId).map(t => ({...t, used:0, remaining:t.seats})), config: {}, registeredCount: 0 };
  }
  currentDetail = detail;
  const { event, tasks, config } = detail;

  // 設定 Modal
  const banner = document.getElementById('reg-modal-banner');
  banner.className = 'reg-modal-banner ' + (config.bannerTheme || event.bannerTheme || 'banner-theme-default');
  document.getElementById('reg-modal-title').textContent = config.title || event.name;
  document.getElementById('reg-modal-subtitle').innerHTML =
    `<i class="fa-solid fa-location-dot me-1"></i>${event.location||''} &nbsp;|&nbsp; <i class="fa-regular fa-calendar-check me-1"></i>${event.date}`;
  document.getElementById('reg-modal-desc').textContent = config.description || event.description || '';

  // 欄位必填設定
  const requireId = config.requireIdNumber !== false;
  const requireEmail = config.requireEmail !== false;
  const idInput = document.getElementById('f-idnumber');
  const emailInput = document.getElementById('f-email');
  idInput.required = requireId;
  document.getElementById('f-id-label').innerHTML = '身分證字號' + (requireId ? ' <span class="text-danger">*</span>' : '（選填）');
  emailInput.required = requireEmail;
  document.getElementById('f-email-label').innerHTML = 'Email 電子信箱' + (requireEmail ? ' <span class="text-danger">*</span>' : '（選填）');

  // 任務卡片
  const typeMap = { handcycle:'手搖車 🚲', kayak:'獨木舟 🛶', shuttle:'接駁車 🚌', other:'其他活動 📋' };
  const typeAllowed = {
    handcycle: config.allowHandcycle !== false,
    kayak:     config.allowKayak !== false,
    shuttle:   config.allowShuttle !== false,
    other:     config.allowOther !== false
  };
  const allowedTasks = tasks.filter(t => typeAllowed[t.type]);
  const container = document.getElementById('task-cards-container');
  if (!allowedTasks.length) {
    container.innerHTML = '<div class="alert alert-secondary small">目前沒有開放報名的任務分組。</div>';
  } else {
    container.innerHTML = allowedTasks.map(t => {
      const full = t.remaining <= 0;
      let detail2 = '';
      if (t.type === 'handcycle') detail2 = t.subGroup ? '組別：' + t.subGroup : '';
      else if (t.type === 'kayak') detail2 = '場次：' + (t.session||'第一場') + (t.time ? ' | 時間：' + t.time : '');
      else if (t.type === 'shuttle') detail2 = '發車：' + (t.time||'—') + ' | 起：' + (t.location||'大會');
      else detail2 = t.session || t.subGroup || '';
      return `<div class="task-select-card ${full?'task-full':''}" id="tsc-${t.id}" onclick="selectTask('${t.id}',${full})">
        <div class="task-check-icon"><i class="fa-solid fa-check"></i></div>
        <div class="d-flex align-items-start gap-2">
          <div class="flex-grow-1">
            <span style="font-size:.72rem;background:#dbeafe;color:#1e40af;border-radius:20px;padding:2px 8px;font-weight:700;">${typeMap[t.type]||t.type}</span>
            <div class="fw-bold mt-1">${t.name}</div>
            ${detail2 ? '<div class="text-muted small">' + detail2 + '</div>' : ''}
            ${t.note ? '<div class="text-muted small" style="font-style:italic;">📌 ' + t.note + '</div>' : ''}
          </div>
          <div style="font-size:.78rem;font-weight:700;color:${full?'#dc2626':'#16a34a'};white-space:nowrap;">${full?'已額滿':'剩 '+t.remaining+' 位'}</div>
        </div>
      </div>`;
    }).join('');
  }

  // 表單開放狀態
  const isClosed = config.isEnabled === false || event.status === '已截止' || event.status === '已完成';
  if (isClosed) {
    document.getElementById('reg-form').innerHTML = `<div class="text-center py-4">
      <i class="fa-regular fa-calendar-times text-danger mb-3" style="font-size:3rem;"></i>
      <h5 class="fw-bold">此活動報名表單暫未開放</h5>
      <p class="text-muted">報名期限已過或管理員暫時關閉，如有疑問請聯絡大會工作人員。</p>
    </div>`;
  }

  openModal();
}

function selectTask(tid, full) {
  if (full) { showToast('此任務名額已滿，請選擇其他班次！', 'warning'); return; }
  if (selectedTaskId) {
    const old = document.getElementById('tsc-' + selectedTaskId);
    if (old) old.classList.remove('selected');
  }
  selectedTaskId = tid;
  const el = document.getElementById('tsc-' + tid);
  if (el) el.classList.add('selected');
  document.getElementById('task-error').style.display = 'none';
}

async function submitRegistration(e) {
  e.preventDefault();
  if (!selectedTaskId) { document.getElementById('task-error').style.display = 'block'; return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>提交中...';

  const data = {
    name: document.getElementById('f-name').value.trim(),
    gender: document.getElementById('f-gender').value,
    birthdate: document.getElementById('f-birthdate').value.trim(),
    identity: document.getElementById('f-identity').value,
    phone: document.getElementById('f-phone').value.trim(),
    homephone: document.getElementById('f-homephone').value.trim(),
    lineid: document.getElementById('f-lineid').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    idNumber: document.getElementById('f-idnumber').value.trim().toUpperCase(),
    email: document.getElementById('f-email').value.trim(),
    lunchChoice: document.getElementById('f-lunch').value,
    note: document.getElementById('f-note').value.trim(),
    eventId: currentEventId,
    taskId: selectedTaskId
  };

  try {
    let memberResult, regResult;
    if (GAS_URL) {
      memberResult = await apiPost('addMember', data);
      if (!memberResult || !memberResult.id) throw new Error('建立成員資料失敗');
      const task = currentDetail.tasks.find(t => t.id === selectedTaskId);
      regResult = await apiPost('addRegistration', {
        eventId: currentEventId, taskId: selectedTaskId, memberId: memberResult.id,
        name: data.name, taskType: task.type, subGroup: task.subGroup||'',
        session: task.session||'', lunch: data.lunchChoice, insurance: !!data.idNumber, note: data.note
      });
      if (!regResult || !regResult.id) throw new Error('報名寫入失敗');
    } else {
      // 示範模式
      memberResult = { id: 'DEMO-M' };
      regResult = { id: 'DEMO-R-' + Date.now() };
    }
    // 顯示成功
    const task = currentDetail.tasks.find(t => t.id === selectedTaskId);
    document.getElementById('suc-name').textContent = data.name;
    document.getElementById('suc-task').textContent = task.name + (task.subGroup ? ' ('+task.subGroup+')' : task.session ? ' ('+task.session+')' : '');
    document.getElementById('suc-lunch').textContent = data.lunchChoice;
    document.getElementById('reg-form').style.display = 'none';
    document.getElementById('reg-success-box').style.display = 'block';
    showToast('報名已成功提交，待後台確認！', 'success');
    // 重新載入活動資料
    await loadEvents();
  } catch(err) {
    showToast('報名提交失敗：' + err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i>確認提交報名';
  }
}

async function queryMyRegistrations() {
  const name = document.getElementById('query-name').value.trim();
  const phone = document.getElementById('query-phone').value.trim();
  if (!phone) { showToast('請輸入手機號碼', 'warning'); return; }
  const container = document.getElementById('my-regs-container');
  container.innerHTML = '<div class="text-center py-4"><span class="spinner-border text-primary"></span></div>';
  let regs = [];
  if (GAS_URL) {
    try { regs = await api('getRegistrationsByMember', { phone, name }) || []; } catch(e) {}
  } else {
    regs = DEMO_REGS.filter(r => r.phone === phone || (name && r.name === name));
  }
  if (!regs.length) {
    container.innerHTML = `<div class="card-custom p-5 text-center text-muted">
      <i class="fa-solid fa-inbox fs-2 mb-2"></i><p>查無報名記錄，請確認手機號碼是否正確。</p></div>`;
    return;
  }
  container.innerHTML = regs.map(r => {
    const statusClass = r.confirmStatus === 'confirmed' ? 'status-confirmed' : r.confirmStatus === 'cancelled' ? 'status-cancelled' : 'status-pending';
    const pillClass = r.confirmStatus === 'confirmed' ? 'pill-confirmed' : r.confirmStatus === 'cancelled' ? 'pill-cancelled' : 'pill-pending';
    const statusText = r.confirmStatus === 'confirmed' ? '✅ 已確認' : r.confirmStatus === 'cancelled' ? '❌ 已取消' : '⏳ 待確認';
    const canCancel = r.confirmStatus !== 'confirmed' && r.confirmStatus !== 'cancelled';
    return `<div class="status-card ${statusClass}">
      <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
        <div>
          <div class="fw-bold">${r.eventName || '活動'}</div>
          <div class="text-muted small"><i class="fa-regular fa-calendar me-1"></i>${r.eventDate||''} &nbsp;|&nbsp; <i class="fa-solid fa-location-dot me-1"></i>${r.eventLocation||''}</div>
          <div class="small mt-1"><strong>任務：</strong>${r.taskName||r.taskType} ${r.subGroup?'('+r.subGroup+')':''} ${r.session?'('+r.session+')':''}</div>
          <div class="small"><strong>餐食：</strong>${r.lunch} &nbsp;|&nbsp; <strong>報名時間：</strong>${r.registeredAt ? new Date(r.registeredAt).toLocaleString('zh-TW') : '—'}</div>
          ${r.confirmStatus === 'confirmed' ? `<div class="small text-success mt-1"><i class="fa-solid fa-check-circle me-1"></i>確認時間：${r.confirmedAt ? new Date(r.confirmedAt).toLocaleString('zh-TW') : '—'}</div>` : ''}
        </div>
        <div class="d-flex flex-column align-items-end gap-2">
          <span class="status-badge-pill ${pillClass}">${statusText}</span>
          ${canCancel ? `<button class="btn btn-sm btn-outline-danger" onclick="cancelMyReg('${r.id}')"><i class="fa-solid fa-xmark me-1"></i>取消報名</button>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function cancelMyReg(regId) {
  if (!confirm('確定要取消此報名嗎？取消後如需重新報名請再次填寫表單。')) return;
  if (GAS_URL) {
    try {
      const res = await apiPost('cancelRegistration', { id: regId, reason: '會員自行取消' });
      if (res && res.success) { showToast('報名已取消', 'success'); queryMyRegistrations(); }
      else showToast(res.error || '取消失敗', 'error');
    } catch(e) { showToast('操作失敗：' + e.message, 'error'); }
  } else {
    showToast('示範模式：取消操作不會實際寫入', 'warning');
  }
}

// ==================== Toast ====================
function showToast(msg, type = 'success') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.innerHTML = `<i class="fa-solid ${type==='success'?'fa-circle-check':type==='error'?'fa-circle-xmark':'fa-triangle-exclamation'} me-2"></i>${msg}`;
  wrap.appendChild(el);
  setTimeout(() => el.classList.add('show'), 50);
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 3500);
}
