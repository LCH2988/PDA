<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>手搖車體驗課程 報名</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#e0f7e9,#e3f2fd);min-height:100vh;padding:16px;}
    .container{max-width:500px;margin:0 auto;}
    .banner{background:linear-gradient(135deg,#1b5e20,#0288d1);border-radius:18px 18px 0 0;padding:24px 20px 16px;text-align:center;color:#fff;}
    .banner .icon{font-size:42px;margin-bottom:6px;}
    .banner h1{font-size:18px;font-weight:800;letter-spacing:1px;}
    .banner .sub{font-size:12px;opacity:.85;margin-top:5px;}
    .info-bar{background:#fff8e1;border-left:5px solid #f9a825;padding:10px 16px;display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:#5d4037;}
    .form-card{background:#fff;border-radius:0 0 18px 18px;padding:20px 18px 28px;box-shadow:0 8px 32px rgba(0,0,0,.10);}
    .sec{font-size:13px;font-weight:700;color:#1b5e20;margin:16px 0 8px;display:flex;align-items:center;gap:6px;}
    .sec::after{content:'';flex:1;height:1px;background:#c8e6c9;}
    label{display:block;font-size:13px;color:#444;margin-bottom:3px;font-weight:600;}
    label .req{color:#e53935;margin-left:2px;}
    input[type=text],input[type=tel],input[type=email],textarea{width:100%;padding:9px 12px;border:1.5px solid #b2dfdb;border-radius:9px;font-size:14px;margin-bottom:12px;background:#f9fffe;outline:none;color:#222;transition:border .2s;}
    input:focus,textarea:focus{border-color:#0288d1;background:#fff;}
    .rg,.cg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;}
    .rg label,.cg label{font-weight:400;display:flex;align-items:center;gap:4px;background:#f1f8e9;border:1.5px solid #c5e1a5;border-radius:20px;padding:5px 12px;cursor:pointer;margin-bottom:0;font-size:13px;}
    .rg input,.cg input{width:auto;margin-bottom:0;padding:0;}
    .rg label:has(input:checked),.cg label:has(input:checked){background:#b2dfdb;border-color:#00897b;font-weight:700;color:#004d40;}
    .liff-bar{background:#e3f2fd;border-radius:10px;padding:9px 13px;font-size:12px;color:#1565c0;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .dot{width:9px;height:9px;background:#43a047;border-radius:50%;flex-shrink:0;animation:pulse 1.2s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .submit-btn{width:100%;padding:14px;background:linear-gradient(90deg,#1b5e20,#0288d1);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:2px;margin-top:6px;transition:opacity .2s;}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed;}
    .progress{display:none;text-align:center;padding:40px 20px;}
    .spinner{width:40px;height:40px;border:4px solid #e3f2fd;border-top:4px solid #0288d1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .success{display:none;text-align:center;padding:36px 16px;}
    .success .big{font-size:64px;}
    .success h2{color:#1b5e20;font-size:22px;margin:10px 0 6px;}
    .success p{color:#555;font-size:14px;line-height:1.9;}
    .divider{height:1px;background:#e0f2f1;margin:4px 0 14px;}
    .readonly-field{background:#f5f5f5!important;color:#888!important;cursor:not-allowed;}
  </style>
</head>
<body>
<div class="container">
  <div class="banner">
    <div class="icon">🚴</div>
    <h1>生命勵｜手搖車教學體驗課程</h1>
    <div class="sub">讓每一個人都能感受河濱騎乘的自由與快樂</div>
  </div>
  <div class="info-bar">
    <span>📅 2026年6月25日（四）</span>
    <span>⏰ 09:30 ~ 12:00</span>
    <span>📍 台北河濱｜觀山站</span>
  </div>
  <div class="form-card">

    <div class="liff-bar">
      <div class="dot"></div>
      <span id="liff-status">正在連接 LINE 帳號資訊...</span>
    </div>

    <form id="reg-form">
      <div class="sec">👤 報名者資料</div>

      <label>姓名 <span class="req">*</span></label>
      <input type="text" id="name" placeholder="請輸入真實姓名" required/>

      <label>聯絡電話 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="09xx-xxxxxx" required/>

      <label>電子信箱</label>
      <input type="email" id="email" placeholder="選填"/>

      <label>LINE 顯示名稱（自動帶入）</label>
      <input type="text" id="line-name" class="readonly-field" readonly/>

      <div class="sec">♿ 參加者狀況</div>
      <label>身份類別 <span class="req">*</span></label>
      <div class="rg">
        <label><input type="radio" name="identity" value="肢體障礙" required> 肢體障礙</label>
        <label><input type="radio" name="identity" value="視覺障礙"> 視覺障礙</label>
        <label><input type="radio" name="identity" value="其他障礙"> 其他障礙</label>
        <label><input type="radio" name="identity" value="一般民眾"> 一般民眾</label>
        <label><input type="radio" name="identity" value="志工"> 志工</label>
      </div>

      <label>是否需要陪同者協助？</label>
      <div class="rg">
        <label><input type="radio" name="companion" value="不需要"> 不需要</label>
        <label><input type="radio" name="companion" value="需要1位"> 需要 1 位</label>
        <label><input type="radio" name="companion" value="需要2位以上"> 需要 2 位以上</label>
      </div>

      <label>陪同者姓名（如有）</label>
      <input type="text" id="companion-name" placeholder="選填"/>

      <div class="sec">🚲 騎乘經驗</div>
      <label>是否有手搖車騎乘經驗？ <span class="req">*</span></label>
      <div class="rg">
        <label><input type="radio" name="experience" value="從未騎過" required> 從未騎過</label>
        <label><input type="radio" name="experience" value="有一點經驗"> 有一點經驗</label>
        <label><input type="radio" name="experience" value="熟悉操作"> 熟悉操作</label>
      </div>

      <label>特殊需求或注意事項</label>
      <textarea id="special" rows="3" placeholder="例如：輪椅接送、特殊輔具、健康狀況..."></textarea>

      <div class="sec">🚌 交通方式</div>
      <div class="cg">
        <label><input type="checkbox" name="transport" value="自行前往"> 自行前往</label>
        <label><input type="checkbox" name="transport" value="大眾運輸"> 大眾運輸</label>
        <label><input type="checkbox" name="transport" value="復康巴士"> 復康巴士</label>
        <label><input type="checkbox" name="transport" value="家人接送"> 家人接送</label>
      </div>

      <label>是否需要協助申請復康巴士？</label>
      <div class="rg">
        <label><input type="radio" name="rehab" value="不需要"> 不需要</label>
        <label><input type="radio" name="rehab" value="需要協助"> 需要協助</label>
      </div>

      <div class="divider"></div>
      <div class="cg">
        <label style="border-radius:10px;padding:10px 13px;background:#fff3e0;border-color:#ffb74d;font-size:12px;">
          <input type="checkbox" id="agree" required>
          本人已閱讀並同意活動注意事項，願意配合主辦單位安排 <span class="req">*</span>
        </label>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">✅ 確認送出報名</button>
    </form>

    <!-- 送出中 -->
    <div class="progress" id="progress">
      <div class="spinner"></div>
      <p style="color:#0288d1;font-size:14px;">正在送出報名資料，請稍候...</p>
    </div>

    <!-- 成功畫面 -->
    <div class="success" id="success">
      <div class="big">🎉</div>
      <h2>報名成功！</h2>
      <p id="success-msg"></p>
      <br/>
      <button class="submit-btn" onclick="closeLIFF()" style="font-size:14px;padding:11px;">
        ✅ 關閉並返回 LINE 群組
      </button>
    </div>

  </div>
</div>

<script>
  // ============================================================
  // ⚙️ 請替換以下設定值
  // ============================================================
  const LIFF_ID = "2007905012-NXJEXmda";
  const GAS_URL = "https://script.google.com/macros/s/AKfycby8_cGMLIIWiLKhPLlUmYgC0N1nO4xz_WEHn3tLxA-QiZggdC_bpBD3M-_i5Ho6B4nvCA/exec";
  // ============================================================

  let lineProfile = null;
  let sourceGroupId = null;  // ← 記錄來源群組 ID

  async function initLIFF() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }

      // 取得使用者資料
      lineProfile = await liff.getProfile();
      document.getElementById('line-name').value = lineProfile.displayName;

      // 取得來源群組 ID（從 URL 參數或 liff.getContext）
      const ctx = liff.getContext();
      if (ctx && ctx.groupId) {
        sourceGroupId = ctx.groupId;
      }
      // 也支援從 URL 參數帶入 groupId（?groupId=Cxxxxx）
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('groupId')) {
        sourceGroupId = urlParams.get('groupId');
      }

      // 更新 LIFF 狀態列
      document.getElementById('liff-status').textContent =
        `✅ 已連接 LINE：${lineProfile.displayName}`;
      const bar = document.querySelector('.liff-bar');
      bar.style.background = '#e8f5e9';
      bar.style.color = '#2e7d32';
      document.querySelector('.dot').style.background = '#43a047';

    } catch(e) {
      document.getElementById('liff-status').textContent = '⚠️ 非 LINE 環境，以一般模式開啟';
      const bar = document.querySelector('.liff-bar');
      bar.style.background = '#fff8e1';
      bar.style.color = '#f57f17';
    }
  }

  function getRadio(name) {
    const el = document.querySelector(`input[name="${name}"]:checked`);
    return el ? el.value : '未填寫';
  }
  function getChecked(name) {
    return [...document.querySelectorAll(`input[name="${name}"]:checked`)]
      .map(e => e.value).join('、') || '未填寫';
  }

  document.getElementById('reg-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('reg-form').style.display = 'none';
    document.getElementById('progress').style.display = 'block';

    const payload = {
      name:          document.getElementById('name').value.trim(),
      phone:         document.getElementById('phone').value.trim(),
      email:         document.getElementById('email').value.trim() || '未提供',
      lineName:      lineProfile ? lineProfile.displayName : '非LINE環境',
      lineUID:       lineProfile ? lineProfile.userId : '',
      lineAvatar:    lineProfile ? lineProfile.pictureUrl : '',
      sourceGroupId: sourceGroupId || '',   // ← 來源群組 ID 傳給 GAS
      identity:      getRadio('identity'),
      companion:     getRadio('companion'),
      companionName: document.getElementById('companion-name').value.trim() || '無',
      experience:    getRadio('experience'),
      special:       document.getElementById('special').value.trim() || '無',
      transport:     getChecked('transport'),
      rehab:         getRadio('rehab'),
      timestamp:     new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei'})
    };

    try {
      // 1️⃣ 送資料到 GAS（寫入 Sheets + 回覆群組 + 通知管理員）
      await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      // 2️⃣ LIFF sendMessages — 在群組中顯示「我也要報名！」Flex Card
      if (liff.isInClient()) {
        await liff.sendMessages([
          {
            type: 'flex',
            altText: `✅ ${payload.name} 已完成手搖車體驗課程報名！`,
            contents: {
              type: 'bubble',
              size: 'kilo',
              header: {
                type: 'box', layout: 'vertical',
                backgroundColor: '#1b5e20', paddingAll: '14px',
                contents: [{
                  type: 'text',
                  text: '🚴 手搖車體驗課程｜報名確認',
                  color: '#ffffff', size: 'sm', weight: 'bold'
                }]
              },
              body: {
                type: 'box', layout: 'vertical', spacing: 'sm', paddingAll: '16px',
                contents: [
                  {
                    type: 'box', layout: 'horizontal', spacing: 'md',
                    contents: [
                      {
                        type: 'image',
                        url: payload.lineAvatar || 'https://profile.line-scdn.net/0h00',
                        size: '40px', aspectMode: 'cover',
                        style: 'circle', flex: 0
                      },
                      {
                        type: 'box', layout: 'vertical', flex: 1,
                        contents: [
                          { type: 'text', text: payload.name, weight: 'bold', size: 'md', color: '#1b5e20' },
                          { type: 'text', text: '已成功完成報名 ✅', size: 'sm', color: '#555' }
                        ]
                      }
                    ]
                  },
                  { type: 'separator', margin: 'md' },
                  { type: 'text', text: '📅 2026年6月25日  09:30', size: 'sm', color: '#555' },
                  { type: 'text', text: '📍 台北河濱 觀山站', size: 'sm', color: '#555' },
                ]
              },
              footer: {
                type: 'box', layout: 'vertical', paddingAll: '12px', spacing: 'sm',
                contents: [{
                  type: 'button', style: 'primary', color: '#0288d1',
                  action: {
                    type: 'uri',
                    label: '🙋 我也要報名！',
                    uri: `https://liff.line.me/${LIFF_ID}`
                  }
                }]
              }
            }
          }
        ]);
      }

      // 顯示成功畫面
      document.getElementById('progress').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      document.getElementById('success-msg').innerHTML =
        `您好 <b>${payload.name}</b>，<br>您已成功完成報名！<br><br>` +
        `📅 <b>2026年6月25日</b>　⏰ <b>09:30 集合</b><br>` +
        `📍 台北河濱 觀山站<br><br>` +
        `<span style="font-size:12px;color:#888;">主辦單位將透過 LINE 與您確認細節</span>`;

    } catch(err) {
      document.getElementById('progress').style.display = 'none';
      document.getElementById('reg-form').style.display = 'block';
      document.getElementById('submit-btn').disabled = false;
      alert('⚠️ 送出失敗，請確認網路後再試。\n' + err.message);
    }
  });

  function closeLIFF() {
    if (liff.isInClient()) liff.closeWindow();
    else window.close();
  }

  initLIFF();
</script>
</body>
</html>
