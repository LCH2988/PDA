<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生命勵【手搖車教學體驗課程】</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Microsoft JhengHei', '微軟正黑體', Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .flyer {
      width: 600px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #FF6B35, #F7C59F, #FFD166);
      padding: 40px 30px 30px;
      text-align: center;
      position: relative;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0; right: 0;
      height: 40px;
      background: white;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .tag {
      display: inline-block;
      background: rgba(255,255,255,0.4);
      color: #7B2D00;
      font-size: 13px;
      font-weight: bold;
      padding: 4px 16px;
      border-radius: 20px;
      margin-bottom: 14px;
      letter-spacing: 2px;
    }
    .title-main {
      font-size: 28px;
      font-weight: 900;
      color: #7B2D00;
      line-height: 1.4;
      text-shadow: 1px 1px 3px rgba(255,255,255,0.5);
    }
    .title-sub {
      font-size: 18px;
      color: #5C1A00;
      margin-top: 6px;
      font-weight: bold;
    }
    .icon-row {
      font-size: 36px;
      margin-top: 14px;
      letter-spacing: 8px;
    }

    /* Body */
    .body {
      padding: 40px 36px 30px;
    }
    .info-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .info-item {
      display: flex;
      align-items: center;
      background: #FFF8F3;
      border-left: 5px solid #FF6B35;
      border-radius: 10px;
      padding: 14px 18px;
      gap: 16px;
    }
    .info-icon {
      font-size: 28px;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .info-content {}
    .info-label {
      font-size: 12px;
      color: #999;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .info-value {
      font-size: 17px;
      color: #333;
      font-weight: bold;
    }
    .info-value span {
      color: #FF6B35;
    }

    /* Map Button */
    .map-btn {
      display: block;
      margin: 24px auto 0;
      background: linear-gradient(135deg, #FF6B35, #FF9A5C);
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      padding: 14px 40px;
      border-radius: 50px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(255,107,53,0.4);
      letter-spacing: 1px;
    }

    /* Organizer */
    .organizer {
      margin: 28px 0 0;
      display: flex;
      gap: 12px;
    }
    .org-item {
      flex: 1;
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
    }
    .org-item.main {
      background: linear-gradient(135deg, #FF6B35, #FF9A5C);
      color: white;
    }
    .org-item.co {
      background: #F3F0FF;
      border: 2px solid #9B7FD4;
      color: #5A3E9B;
    }
    .org-role {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 4px;
      opacity: 0.85;
    }
    .org-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.4;
    }

    /* Footer */
    .footer {
      background: linear-gradient(135deg, #FF6B35, #FFD166);
      padding: 22px 30px;
      text-align: center;
      margin-top: 30px;
    }
    .footer-text {
      color: white;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }
    .footer-sub {
      color: rgba(255,255,255,0.85);
      font-size: 12px;
      margin-top: 4px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="flyer">
    <!-- Header -->
    <div class="header">
      <div class="tag">🎯 公益活動</div>
      <div class="title-main">生命勵</div>
      <div class="title-sub">【手搖車教學體驗課程】</div>
      <div class="icon-row">🚲♿🌟</div>
    </div>

    <!-- Body -->
    <div class="body">
      <div class="info-grid">
        <div class="info-item">
          <div class="info-icon">📅</div>
          <div class="info-content">
            <div class="info-label">活動日期</div>
            <div class="info-value">2026年 <span>6月25日</span>（星期四）</div>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">⏰</div>
          <div class="info-content">
            <div class="info-label">活動時間</div>
            <div class="info-value"><span>09:30</span> ～ <span>12:00</span></div>
          </div>
        </div>
        <div class="info-item">
          <div class="info-icon">📍</div>
          <div class="info-content">
            <div class="info-label">活動地點</div>
            <div class="info-value">台北市河濱自行車租借站<br><span>｜ 觀山站</span></div>
          </div>
        </div>
      </div>

      <a class="map-btn" href="#">🗺️ Google Maps 導航</a>

      <!-- Organizer -->
      <div class="organizer">
        <div class="org-item main">
          <div class="org-role">🏆 主辦單位</div>
          <div class="org-name">生命勵</div>
        </div>
        <div class="org-item co">
          <div class="org-role">🤝 協辦單位</div>
          <div class="org-name">帕金森病友<br>權益促進會</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="footer-text">🌈 勇敢前行，生命無限可能！</div>
      <div class="footer-sub">期待您的參與 · 一起創造美好回憶</div>
    </div>
  </div>
</body>
</html>
