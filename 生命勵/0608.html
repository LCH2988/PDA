<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>生命勵｜會員註冊登記系統</title>
  <style>
    :root{
      --fs-base:20px;
      --fs-sm:17px;
      --fs-xs:15px;
      --fs-lg:22px;
      --fs-xl:26px;
      --fs-xxl:30px;
      --fs-title:24px;
      --fs-modal-title:26px;
      --fs-label:20px;
      --fs-input:22px;
      --fs-btn:22px;
      --fs-nav:14px;
      --fs-nav-ico:30px;
      --fs-badge:16px;
      --fs-stat-k:17px;
      --fs-stat-v:28px;
      --fs-item-title:21px;
      --fs-item-meta:18px;
      --fs-module-icon:36px;
      --fs-module-label:18px;
      --fs-notice:18px;
      --fs-section:19px;
      --fs-toast:18px;
      --fs-brand-title:20px;
      --fs-brand-sub:14px;
      --fs-top-btn:17px;
      --btn-h:64px;
      --input-h:62px;
      --nav-h:88px;

      --bg:#f0fdf4;
      --card:#fff;
      --primary:#15803d;
      --primary-dark:#166534;
      --primary-light:#dcfce7;
      --success:#15803d;
      --success-light:#dcfce7;
      --warn:#b45309;
      --warn-light:#fef3c7;
      --danger:#b91c1c;
      --danger-light:#fee2e2;
      --purple:#7c3aed;
      --purple-light:#ede9fe;
      --blue:#2563eb;
      --blue-light:#dbeafe;
      --teal:#0f766e;
      --teal-light:#ccfbf1;
      --line:#00B900;
      --text:#1e293b;
      --muted:#64748b;
      --border:#e2e8f0;
      --radius:20px;
      --shadow:0 4px 24px rgba(30,41,59,.10);
      --safe-b:env(safe-area-inset-bottom);
    }

    body.fs-small{
      --fs-base:17px;--fs-sm:15px;--fs-xs:13px;--fs-lg:19px;--fs-xl:22px;--fs-xxl:26px;
      --fs-title:21px;--fs-modal-title:22px;--fs-label:17px;--fs-input:18px;--fs-btn:18px;
      --fs-nav:12px;--fs-nav-ico:26px;--fs-badge:13px;--fs-stat-k:14px;--fs-stat-v:24px;
      --fs-item-title:18px;--fs-item-meta:16px;--fs-module-icon:30px;--fs-module-label:15px;
      --fs-notice:16px;--fs-section:16px;--fs-toast:16px;--fs-brand-title:17px;--fs-brand-sub:13px;
      --fs-top-btn:15px;--btn-h:54px;--input-h:54px;--nav-h:80px;
    }
    body.fs-medium{
      --fs-base:20px;--fs-sm:17px;--fs-xs:15px;--fs-lg:22px;--fs-xl:26px;--fs-xxl:30px;
      --fs-title:24px;--fs-modal-title:26px;--fs-label:20px;--fs-input:22px;--fs-btn:22px;
      --fs-nav:14px;--fs-nav-ico:30px;--fs-badge:16px;--fs-stat-k:17px;--fs-stat-v:28px;
      --fs-item-title:21px;--fs-item-meta:18px;--fs-module-icon:36px;--fs-module-label:18px;
      --fs-notice:18px;--fs-section:19px;--fs-toast:18px;--fs-brand-title:20px;--fs-brand-sub:14px;
      --fs-top-btn:17px;--btn-h:64px;--input-h:62px;--nav-h:88px;
    }
    body.fs-large{
      --fs-base:23px;--fs-sm:20px;--fs-xs:18px;--fs-lg:26px;--fs-xl:30px;--fs-xxl:36px;
      --fs-title:28px;--fs-modal-title:30px;--fs-label:23px;--fs-input:25px;--fs-btn:25px;
      --fs-nav:16px;--fs-nav-ico:34px;--fs-badge:18px;--fs-stat-k:20px;--fs-stat-v:32px;
      --fs-item-title:24px;--fs-item-meta:21px;--fs-module-icon:42px;--fs-module-label:21px;
      --fs-notice:21px;--fs-section:22px;--fs-toast:21px;--fs-brand-title:22px;--fs-brand-sub:16px;
      --fs-top-btn:19px;--btn-h:72px;--input-h:70px;--nav-h:96px;
    }
    body.fs-xlarge{
      --fs-base:27px;--fs-sm:23px;--fs-xs:21px;--fs-lg:30px;--fs-xl:36px;--fs-xxl:42px;
      --fs-title:32px;--fs-modal-title:34px;--fs-label:27px;--fs-input:29px;--fs-btn:29px;
      --fs-nav:18px;--fs-nav-ico:38px;--fs-badge:21px;--fs-stat-k:23px;--fs-stat-v:36px;
      --fs-item-title:28px;--fs-item-meta:24px;--fs-module-icon:48px;--fs-module-label:24px;
      --fs-notice:24px;--fs-section:25px;--fs-toast:24px;--fs-brand-title:24px;--fs-brand-sub:18px;
      --fs-top-btn:21px;--btn-h:80px;--input-h:78px;--nav-h:104px;
    }

    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      width:100%;min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
      background:var(--bg);color:var(--text);
      font-size:var(--fs-base);line-height:1.8;
    }
    body{padding-bottom:calc(var(--nav-h) + var(--safe-b) + 24px);}
    button,input,select,textarea{font-family:inherit;font-size:var(--fs-input);}
    button{cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;}
    a{color:inherit;text-decoration:none;}

    .hide{display:none!important;}

    .font-bar{
      background:#14532d;color:#fff;
      display:flex;align-items:center;justify-content:center;
      gap:8px;padding:8px 12px;
      font-size:15px;font-weight:700;
      position:sticky;top:0;z-index:55;
    }
    .font-bar .fb-label{font-size:14px;opacity:.85;margin-right:4px;}
    .fs-btn{
      background:rgba(255,255,255,.15);color:#fff;
      border:1.5px solid rgba(255,255,255,.3);
      border-radius:8px;padding:5px 12px;
      font-size:14px;font-weight:900;
      min-width:44px;min-height:36px;
    }
    .fs-btn.active{background:#22c55e;border-color:#22c55e;}
    .fs-btn:active{opacity:.7;}

    .topbar{
      position:sticky;top:41px;z-index:50;
      background:linear-gradient(135deg,#14532d,#15803d 60%,#22c55e);
      color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:12px 16px;
      box-shadow:0 4px 20px rgba(21,128,61,.3);
      min-height:72px;
    }
    .brand{display:flex;align-items:center;gap:12px;cursor:pointer;min-width:0;}
    .logo{
      width:52px;height:52px;border-radius:14px;
      background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:30px;flex-shrink:0;
      border:2px solid rgba(255,255,255,.3);
    }
    .brand-text{min-width:0;}
    .brand-title{font-weight:900;font-size:var(--fs-brand-title);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .brand-sub{font-size:var(--fs-brand-sub);opacity:.9;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .top-actions{display:flex;gap:8px;flex-shrink:0;}
    .top-btn{
      background:rgba(255,255,255,.2);color:#fff;
      border-radius:999px;padding:10px 16px;
      font-size:var(--fs-top-btn);font-weight:800;
      border:1.5px solid rgba(255,255,255,.35);
      min-height:46px;white-space:nowrap;
    }

    .wrap{max-width:780px;margin:0 auto;padding:16px;}

    .card{
      background:var(--card);border-radius:var(--radius);
      padding:22px;box-shadow:var(--shadow);
      border:1px solid rgba(30,41,59,.06);
      margin-bottom:18px;
    }
    .card-title{
      font-size:var(--fs-title);font-weight:900;
      display:flex;align-items:center;gap:10px;
      margin-bottom:18px;color:var(--text);
      flex-wrap:wrap;
    }
    .card-title .icon{font-size:calc(var(--fs-title) + 4px);}
    .card-title .sub{font-size:var(--fs-sm);color:var(--muted);font-weight:600;margin-left:auto;}

    .hero{
      background:linear-gradient(160deg,#14532d,#15803d 50%,#86efac);
      border-radius:var(--radius);
      padding:30px 22px 26px;
      color:#fff;
      margin-bottom:18px;
      box-shadow:0 8px 32px rgba(21,128,61,.25);
    }
    .hero .org-logo{
      width:86px;height:86px;border-radius:24px;
      background:rgba(255,255,255,.2);
      display:flex;align-items:center;justify-content:center;
      font-size:48px;margin:0 auto 16px;
      border:2px solid rgba(255,255,255,.35);
    }
    .hero h1{font-size:var(--fs-xxl);font-weight:950;text-align:center;line-height:1.3;}
    .hero .tagline{
      text-align:center;font-size:var(--fs-lg);opacity:.95;
      margin:10px 0 20px;line-height:1.7;
    }
    .intro-grid{
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
      margin-bottom:20px;
    }
    .intro-item{
      background:rgba(255,255,255,.16);
      border-radius:14px;padding:14px;
      border:1px solid rgba(255,255,255,.25);
      text-align:center;
    }
    .intro-item .i-icon{font-size:var(--fs-module-icon);display:block;margin-bottom:6px;}
    .intro-item .i-label{font-size:var(--fs-module-label);font-weight:800;opacity:.98;}

    .activity-box{
      background:rgba(255,255,255,.16);
      border-radius:14px;padding:16px;
      border:1px solid rgba(255,255,255,.25);
      margin-bottom:20px;font-size:var(--fs-sm);
      line-height:2;
    }
    .activity-box b{font-size:var(--fs-base);}

    .btn{
      width:100%;min-height:var(--btn-h);border-radius:16px;
      font-weight:900;font-size:var(--fs-btn);
      display:flex;align-items:center;justify-content:center;gap:10px;
      padding:14px 18px;margin:10px 0;
      transition:transform .12s,box-shadow .12s;
      text-align:center;
    }
    .btn:active{transform:scale(.97);}
    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:#fff;box-shadow:0 4px 16px rgba(21,128,61,.3);
    }
    .btn-success{
      background:linear-gradient(135deg,#16a34a,#15803d);
      color:#fff;box-shadow:0 4px 16px rgba(21,128,61,.25);
    }
    .btn-warn{
      background:linear-gradient(135deg,#f59e0b,#d97706);
      color:#fff;box-shadow:0 4px 16px rgba(217,119,6,.25);
    }
    .btn-danger{
      background:linear-gradient(135deg,#dc2626,#b91c1c);
      color:#fff;
    }
    .btn-line{
      background:linear-gradient(135deg,#00B900,#009900);
      color:#fff;box-shadow:0 4px 16px rgba(0,185,0,.25);
    }
    .btn-outline{
      background:#fff;color:var(--primary);
      border:2px solid #bbf7d0;
    }
    .btn-ghost{
      background:#f1f5f9;color:#475569;
      border:1.5px solid var(--border);
    }
    .btn-sm{
      min-height:52px;font-size:var(--fs-sm);border-radius:13px;
      padding:10px 16px;width:auto;flex:0 0 auto;margin:4px;
    }
    .btn-xs{
      min-height:46px;font-size:var(--fs-xs);border-radius:11px;
      padding:8px 14px;width:auto;flex:0 0 auto;margin:4px;
    }

    .fg{margin-bottom:18px;}
    .flabel{
      display:block;font-weight:800;font-size:var(--fs-label);
      margin-bottom:10px;color:var(--text);
    }
    .req{color:var(--danger);margin-left:3px;}
    .fc{
      width:100%;border:2.5px solid var(--border);
      border-radius:14px;padding:16px 18px;
      background:#fff;color:var(--text);
      font-size:var(--fs-input);min-height:var(--input-h);outline:none;
      transition:border-color .15s,box-shadow .15s;
      line-height:1.5;
    }
    .fc:focus{border-color:#86efac;box-shadow:0 0 0 4px rgba(21,128,61,.1);}
    select.fc{cursor:pointer;}
    textarea.fc{min-height:130px;resize:vertical;line-height:1.7;}

    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .stat{border-radius:16px;padding:18px;border:1.5px solid transparent;}
    .stat .k{font-size:var(--fs-stat-k);color:var(--muted);font-weight:700;}
    .stat .v{font-size:var(--fs-stat-v);font-weight:950;margin-top:6px;line-height:1.25;}
    .stat.blue{background:#eff6ff;border-color:#bfdbfe;}
    .stat.green{background:#f0fdf4;border-color:#bbf7d0;}
    .stat.orange{background:#fffbeb;border-color:#fde68a;}
    .stat.purple{background:#f5f3ff;border-color:#ddd6fe;}
    .stat.red{background:#fef2f2;border-color:#fecaca;}
    .stat.teal{background:#f0fdfa;border-color:#99f6e4;}

    .badge{
      display:inline-flex;align-items:center;
      border-radius:999px;padding:6px 14px;
      font-size:var(--fs-badge);font-weight:900;white-space:nowrap;
    }
    .bs{background:#dcfce7;color:#166534;}
    .bw{background:#fef3c7;color:#92400e;}
    .bd{background:#fee2e2;color:#991b1b;}
    .bb{background:#dbeafe;color:#1e40af;}
    .bp{background:#ede9fe;color:#5b21b6;}
    .bt{background:#ccfbf1;color:#115e59;}

    .list{display:flex;flex-direction:column;gap:14px;}
    .item{
      border:2px solid var(--border);border-radius:18px;
      padding:18px;background:#fff;
    }
    .item-h{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .item-title{font-weight:900;font-size:var(--fs-item-title);line-height:1.4;}
    .item-meta{color:var(--muted);font-size:var(--fs-item-meta);line-height:1.9;margin-top:8px;}
    .item-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}

    .module-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    .module-btn{
      background:#fff;border:2.5px solid var(--border);
      border-radius:18px;padding:20px 12px;
      display:flex;flex-direction:column;
      align-items:center;gap:10px;
      font-weight:900;font-size:var(--fs-module-label);color:var(--text);
      text-align:center;min-height:106px;
      transition:all .15s;box-shadow:0 2px 8px rgba(30,41,59,.06);
    }
    .module-btn:active{transform:scale(.96);box-shadow:none;}
    .module-btn .m-icon{font-size:var(--fs-module-icon);line-height:1;}
    .module-btn .m-label{font-size:var(--fs-module-label);line-height:1.3;}
    .module-btn.blue{border-color:#bfdbfe;background:#eff6ff;}
    .module-btn.green{border-color:#bbf7d0;background:#f0fdf4;}
    .module-btn.orange{border-color:#fde68a;background:#fffbeb;}
    .module-btn.purple{border-color:#ddd6fe;background:#f5f3ff;}
    .module-btn.red{border-color:#fecaca;background:#fef2f2;}
    .module-btn.teal{border-color:#99f6e4;background:#f0fdfa;}

    .notice{
      border-radius:14px;padding:16px 18px;
      font-size:var(--fs-notice);line-height:1.9;margin-bottom:16px;
      border-left:6px solid;
    }
    .notice.info{background:#eff6ff;border-color:#2563eb;color:#1e40af;}
    .notice.success{background:#f0fdf4;border-color:var(--success);color:#166534;}
    .notice.warn{background:#fffbeb;border-color:#f59e0b;color:#92400e;}
    .notice.danger{background:#fef2f2;border-color:var(--danger);color:#991b1b;}
    .notice.teal{background:#f0fdfa;border-color:#0f766e;color:#115e59;}

    .section-header{
      display:flex;align-items:center;gap:8px;
      font-size:var(--fs-section);font-weight:900;color:var(--muted);
      margin:24px 0 12px;padding:0 4px;
      text-transform:uppercase;letter-spacing:.5px;
    }
    .section-header::after{
      content:'';flex:1;height:1.5px;
      background:linear-gradient(to right,var(--border),transparent);
    }

    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;z-index:60;
      background:rgba(255,255,255,.97);
      backdrop-filter:blur(16px);
      border-top:2px solid var(--border);
      height:calc(var(--nav-h) + var(--safe-b));
      display:flex;justify-content:center;
      padding-bottom:var(--safe-b);
      box-shadow:0 -6px 24px rgba(30,41,59,.08);
    }
    .nav-inner{
      width:100%;max-width:780px;
      display:grid;grid-template-columns:repeat(5,1fr);
      gap:2px;padding:8px 6px 10px;
    }
    .nitem{
      background:transparent;color:#64748b;
      border-radius:16px;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:4px;font-size:var(--fs-nav);font-weight:800;
      min-width:0;padding:4px 2px;
    }
    .nitem .ico{font-size:var(--fs-nav-ico);line-height:1;}
    .nitem.active{background:#f0fdf4;color:var(--primary);}

    .modal-mask{
      position:fixed;inset:0;z-index:100;
      background:rgba(15,23,42,.5);
      display:none;align-items:flex-end;justify-content:center;
    }
    .modal-mask.show{display:flex;}
    .modal{
      width:100%;max-width:780px;max-height:92vh;
      overflow-y:auto;background:#fff;
      border-radius:26px 26px 0 0;
      padding:22px 22px calc(22px + var(--safe-b));
      box-shadow:0 -16px 48px rgba(0,0,0,.2);
    }
    .modal-handle{
      width:52px;height:6px;border-radius:999px;
      background:#e2e8f0;margin:0 auto 20px;
    }
    .modal-title{font-size:var(--fs-modal-title);font-weight:950;margin-bottom:18px;}

    .toast{
      position:fixed;left:50%;
      bottom:calc(var(--nav-h) + var(--safe-b) + 24px);
      transform:translateX(-50%);z-index:120;
      background:#1e293b;color:#fff;
      border-radius:999px;padding:16px 26px;
      font-weight:800;font-size:var(--fs-toast);
      box-shadow:0 8px 28px rgba(0,0,0,.2);
      display:none;max-width:88%;text-align:center;
      white-space:nowrap;
    }
    .toast.show{display:block;}
    .toast.s{background:#166534;}
    .toast.e{background:#991b1b;}
    .toast.w{background:#92400e;}

    .loader{
      position:fixed;inset:0;z-index:110;
      display:none;align-items:center;justify-content:center;
      background:rgba(255,255,255,.75);backdrop-filter:blur(6px);
    }
    .loader.show{display:flex;}
    .spinner{
      width:60px;height:60px;border-radius:50%;
      border:6px solid #bbf7d0;border-top-color:var(--primary);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    .empty{
      text-align:center;padding:36px 18px;
      color:var(--muted);font-size:var(--fs-base);
      border:2px dashed var(--border);
      border-radius:16px;background:#f8fafc;
      line-height:1.9;
    }

    .avatar{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#86efac);
      display:flex;align-items:center;justify-content:center;
      font-size:32px;color:#fff;font-weight:900;flex-shrink:0;
    }

    .id-tag{
      display:inline-flex;align-items:center;gap:6px;
      background:var(--primary-light);color:var(--primary);
      border-radius:999px;padding:7px 16px;
      font-size:var(--fs-sm);font-weight:900;
    }

    .admin-section{
      border-radius:var(--radius);border:2px solid transparent;
      padding:18px;margin-bottom:16px;
    }
    .admin-section.member{border-color:#bbf7d0;background:#f0fdf4;}
    .admin-section.system{border-color:#ddd6fe;background:#f5f3ff;}
    .admin-section.activity{border-color:#bfdbfe;background:#eff6ff;}
    .admin-section-title{
      font-size:var(--fs-lg);font-weight:900;margin-bottom:14px;
      display:flex;align-items:center;gap:8px;
    }

    .check-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }
    .check-item{
      display:flex;align-items:flex-start;gap:10px;
      padding:12px 14px;border:2px solid var(--border);
      border-radius:14px;background:#fff;
      font-size:var(--fs-base);font-weight:700;
    }
    .check-item input{
      width:24px;height:24px;margin-top:4px;
      flex-shrink:0;
    }

    @media(min-width:600px){
      .module-grid{grid-template-columns:repeat(3,1fr);}
      .modal{border-radius:26px;margin-bottom:32px;}
      .modal-mask{align-items:center;}
      .check-grid{grid-template-columns:1fr 1fr;}
    }
    @media(min-width:720px){
      .module-grid{grid-template-columns:repeat(4,1fr);}
    }
    @media(max-width:420px){
      .brand-title{max-width:130px;}
      .top-btn{padding:9px 12px;}
    }
    @media(max-width:380px){
      .font-bar .fb-label{display:none;}
    }
  </style>
</head>
<body class="fs-medium">

<div class="font-bar">
  <span class="fb-label">字體大小：</span>
  <button class="fs-btn" id="fsSmall" onclick="setFontSize('small')">小</button>
  <button class="fs-btn active" id="fsMedium" onclick="setFontSize('medium')">中</button>
  <button class="fs-btn" id="fsLarge" onclick="setFontSize('large')">大</button>

/*******************************************************
 * API
 *******************************************************/
async function api(action,data={}){
  const payload={
    action,
    data:{
      ...data,
      operator:data.operator||APP.user?.name||'',
      operatorId:data.operatorId||APP.user?.memberId||APP.user?.id||''
    }
  };
  const res=await fetch(API_BASE,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  const text=await res.text();
  if(!res.ok) throw new Error('API 錯誤 '+res.status);
  try{return JSON.parse(text);}
  catch(e){throw new Error('回傳格式錯誤');}
}

async function runApi(action,data={},onSuccess){
  showLoad();
  try{
    const res=await api(action,data);
    hideLoad();
    if(res.success){
      if(onSuccess)onSuccess(res);
    }else{
      toast(res.message||'操作失敗','e');
    }
    return res;
  }catch(e){
    hideLoad();
    toast('連線失敗：'+e.message,'e');
    return{success:false,message:e.message};
  }
}

/*******************************************************
 * UI 工具
 *******************************************************/
function $(id){return document.getElementById(id);}
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}
function jsStr(s){
  return String(s==null?'')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/\n/g,'\\n')
    .replace(/\r/g,'');
}
function fmtDate(d){
  if(!d)return'--';
  try{
    const dt=new Date(d);
    if(isNaN(dt.getTime()))return String(d);
    return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  }catch(e){return String(d);}
}
function today(){
  const d=new Date();
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function showLoad(){$('loader')?.classList.add('show');}
function hideLoad(){$('loader')?.classList.remove('show');}
function toast(msg,type){
  const el=$('toast');if(!el)return;
  el.textContent=msg||'';
  el.className='toast show '+(type||'');
  clearTimeout(window.__tt);
  window.__tt=setTimeout(()=>{el.className='toast';},3500);
}
function setMain(html){
  $('main').innerHTML=html;
  window.scrollTo(0,0);
}
function openModal(html){
  $('modal').innerHTML='<div class="modal-handle"></div>'+html;
  $('modalMask').classList.add('show');
}
function closeModal(){
  $('modalMask').classList.remove('show');
  $('modal').innerHTML='';
}
function maskClose(e){
  if(e.target.id==='modalMask')closeModal();
}
function requireInput(id,label){
  const el=$(id);
  const v=el?el.value.trim():'';
  if(!v){
    toast('請填寫：'+label,'w');
    el?.focus();
    return'';
  }
  return v;
}
function isValidTaiwanMobile(p){
  return/^09\d{8}$/.test(String(p||'').trim());
}
function isAdminUser(u){
  return!!(u&&ADMIN_TYPES.includes(String(u.type||'')));
}
function showBack(show){

}

function getCheckValues(name){

function updateLoginButton(){

function saveSession(){
  localStorage.setItem('lifeEnergyUser',JSON.stringify(APP.user||null));
  localStorage.setItem('lifeEnergyAdminVerified',APP.isAdminVerified?'Y':'');
}
function loadSession(){
  try{
    APP.user=JSON.parse(localStorage.getItem('lifeEnergyUser')||'null');
    APP.isAdminVerified=localStorage.getItem('lifeEnergyAdminVerified')==='Y';
  }catch(e){
    APP.user=null;
    APP.isAdminVerified=false;
  }
}
function logout(){
  if(!confirm('確定登出？'))return;
  APP.user=null;
  APP.isAdminVerified=false;
  localStorage.removeItem('lifeEnergyUser');
  localStorage.removeItem('lifeEnergyAdminVerified');
  updateLoginButton();
  toast('已登出','s');
  go('home',{},false);
}

/*******************************************************
 * 路由
 *******************************************************/
function go(page,params={},push=true){
  if(push&&APP.page&&APP.page!==page)APP.history.push({page:APP.page,params:APP._params||{}});
  APP.page=page;
  APP._params=params||{};
  document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));
  const navId=NAV_MAP[page];
  if(navId)$(navId)?.classList.add('active');
  showBack(APP.history.length>0);
  const fn=ROUTES[page];
  if(fn)fn(params||{});
  else setMain(`<div class="card"><div class="empty">頁面建置中：${esc(page)}</div></div>`);
}
function goBack(){
  if(!APP.history.length)return;
  const prev=APP.history.pop();
  APP.page=prev.page;
  APP._params=prev.params||{};
  document.querySelectorAll('.nitem').forEach(el=>el.classList.remove('active'));
  const navId=NAV_MAP[prev.page];
  if(navId)$(navId)?.classList.add('active');
  showBack(APP.history.length>0);
  const fn=ROUTES[prev.page];
  if(fn)fn(prev.params||{});
}

/*******************************************************
 * LINE LIFF
 *******************************************************/
function initLiff(){
  if(!LIFF_ID||LIFF_ID==='YOUR_LIFF_ID'){
    APP.liffReady=false;
    return;
  }
  if(window.liff){
    doInitLiff();
    return;
  }
  const s=document.createElement('script');
  s.src='https://static.line-scdn.net/liff/edge/2/sdk.js';
  s.onload=doInitLiff;
  s.onerror=()=>{APP.liffReady=false;};
  document.head.appendChild(s);
}

async function doInitLiff(){
  try{
    await liff.init({liffId:LIFF_ID});
    APP.liffReady=true;
    if(liff.isLoggedIn()){
      try{APP.liffProfile=await liff.getProfile();}catch(e){}
    }
  }catch(e){
    APP.liffReady=false;
  }
}

async function doLineLogin(){
  if(!APP.liffReady||!window.liff){
    toast('LINE 功能尚未就緒，請使用電話登入','w');
    return;
  }
  try{
    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }
    showLoad();
    const profile=await liff.getProfile();
    const res=await api('auth.loginByLine',{
      lineId:profile.userId,
      lineName:profile.displayName
    });
    hideLoad();
    if(res.success){
      if(res.isFirstLogin){
        openLineFirstLogin(profile.userId,profile.displayName);
      }else{
        APP.user=res.member;
        APP.isAdminVerified=false;
        saveSession();
        localStorage.removeItem('lifeEnergyAdminVerified');
        updateLoginButton();
        closeModal();
        toast('LINE 登入成功','s');
        go('memberCenter',{},false);
      }
    }else{
      toast(res.message||'LINE 登入失敗','e');
    }
  }catch(e){
    hideLoad();
    toast('LINE 登入失敗：'+e.message,'e');
  }
}

    <div class="modal-title">💚 LINE 首次登入</div>

async function renderAnnouncements(){
  setMain(`
    <div class="card">
      <div class="card-title"><span class="icon">📢</span>最新公告</div>
      <div class="fg">
        <label class="flabel">搜尋公告</label>
        <input id="annKw" class="fc" placeholder="輸入關鍵字搜尋">
      </div>
      <button class="btn btn-primary" onclick="loadAnnouncements()">🔍 搜尋</button>
      <div id="annList" class="list" style="margin-top:16px;"><div class="empty">公告載入中...</div></div>
    </div>
  `);
  loadAnnouncements();
}

async function loadAnnouncements(){
  const area=$('annList');
  if(area)area.innerHTML=`<div class="empty">載入中...</div>`;
  try{
    const res=await api('announcement.publicList',{
      keyword:$('annKw')?.value.trim()||'',
      target:'會員'
    });
    if(!res.success){
      area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;
      return;
    }
    const rows=res.items||[];
    if(!rows.length){
      area.innerHTML=`<div class="empty">目前沒有公告</div>`;
      return;
    }
    area.innerHTML=rows.map(r=>`
      <div class="item">
        <div class="item-h">
          <div>
            <div class="item-title">${String(r.pinned)==='Y'?'📌 ':''}${esc(r.title)}</div>
            <div class="item-meta">${esc(r.date||'')} ｜ ${esc(r.category||'')} ｜ 對象：${esc(r.target||'全部')}</div>
          </div>
          <span class="badge bb">${esc(r.target||'全部')}</span>
        </div>
        <div class="item-meta" style="white-space:pre-wrap;margin-top:10px;color:var(--text);">${esc(r.content||'')}</div>
      </div>
    `).join('');
  }catch(e){
    area.innerHTML=`<div class="empty">載入失敗：${esc(e.message)}</div>`;
  }
}

  if(!name||!phone||!identity)return;

  if(!isValidTaiwanMobile(phone)){

  }

  const payload={

    name,
    phone,
    mobile:phone,
    lineId:$('svLineId')?.value.trim()||'',

    disabilityLevel:$('svDisabilityLevel')?.value.trim()||'',
    assistiveDevice:$('svAssistiveDevice')?.value||'',

    heightWeight:$('svHeightWeight')?.value.trim()||'',

    handcycleInterest:$('svHandcycleInterest')?.value||'',
    mobilityMode:$('svMobilityMode')?.value||'',
    rideExperience:$('svRideExperience')?.value||'',
    rideDistance:$('svRideDistance')?.value||'',

    canoeInterest:$('svCanoeInterest')?.value||'',
    waterExperience:$('svWaterExperience')?.value||'',
    swimAbility:$('svSwimAbility')?.value||'',
    boatTransfer:$('svBoatTransfer')?.value||'',

    transportNeed:$('svTransportNeed')?.value.trim()||'',
    activityNote:$('svActivityNote')?.value.trim()||'',
    companionInfo:$('svCompanionInfo')?.value.trim()||'',
    specialNeeds:$('svActivityNote')?.value.trim()||'',
    message:$('svMessage')?.value.trim()||''
  };

  showLoad();
  try{
    const res=await api('member.updateLifeEnergyProfile',payload);
    hideLoad();

    if(res.success){
      APP.user=res.member||{...APP.user,...payload};
      saveSession();
      updateLoginButton();

      go('memberCenter',{},false);

      toast(res.message||'儲存失敗','e');
    }

    toast('儲存失敗：'+e.message,'e');

async function loadMembers(){
  const area=$('memberList');
  if(!area)return;
  area.innerHTML=`<div class="empty">載入中...</div>`;
  try{
    const res=await api('member.listAll',{
      keyword:$('memberKw')?.value.trim()||''
    });
    if(!res.success){
      area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;
      return;
    }
    let rows=res.items||[];
    const kw=$('memberKw')?.value.trim().toLowerCase()||'';
    if(kw){
      rows=rows.filter(m=>
        String(m.name||'').toLowerCase().includes(kw)||
        String(m.phone||m.mobile||'').includes(kw)||
        String(m.memberId||m.id||'').toLowerCase().includes(kw)
      );
    }
    if(!rows.length){
      area.innerHTML=`<div class="empty">查無會員</div>`;
      return;
    }
    area.innerHTML=rows.map(m=>`
      <div class="item">
        <div class="item-h">
          <div>
            <div class="item-title">${esc(m.name)} <span class="badge bs">${esc(m.loginIdentity||m.type||'會員')}</span></div>
            <div class="item-meta">
              編號：${esc(m.memberId||m.id||'')} ｜ 電話：${esc(m.phone||m.mobile||'')}<br>
              是否身障：${esc(m.disabledStatus||'未填')} ｜ 輔具：${esc(m.assistiveDevice||'未填')}<br>
              手搖車：${esc(m.handcycleInterest||'未填')} ｜ 獨木舟：${esc(m.canoeInterest||'未填')}
            </div>
          </div>
          <span class="badge ${m.disabledStatus?'bb':'bw'}">${m.disabledStatus?'已登記':'待補'}</span>
        </div>
        <div class="item-actions">
          <button class="btn btn-outline btn-xs" onclick="go('memberDetail',{id:'${jsStr(m.memberId||m.id)}'})">查看 / 編輯</button>
        </div>
      </div>
    `).join('');
  }catch(e){
    area.innerHTML=`<div class="empty">載入失敗：${esc(e.message)}</div>`;
  }
}

async function submitAnnouncement(){
  const title=requireInput('annTitle','標題');
  const content=requireInput('annContent','內容');
  if(!title||!content)return;
  showLoad();
  try{
    const res=await api('announcement.add',{
      title,
      content,
      category:$('annCategory').value,
      target:$('annTarget').value,
      date:$('annDate').value,
      pinned:$('annPinned').value,
      status:$('annStatus').value
    });
    hideLoad();
    if(res.success){
      toast('公告已發布 ✅','s');
      $('annTitle').value='';
      $('annContent').value='';
      $('annPinned').value='';
      $('annStatus').value='發布';
      loadAnnounceList();
    }else{
      toast(res.message||'發布失敗','e');
    }
  }catch(e){
    hideLoad();
    toast('發布失敗：'+e.message,'e');
  }
}

async function loadAnnounceList(){
  const area=$('announceListArea');
  const countEl=$('annCount');
  if(!area)return;
  area.innerHTML=`<div class="empty">載入中...</div>`;
  try{
    const res=await api('announcement.list',{
      keyword:$('annSearchKw')?.value.trim()||''
    });
    if(!res.success){
      area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;
      return;
    }
    const rows=res.items||[];
    if(countEl)countEl.textContent='共 '+rows.length+' 則';
    if(!rows.length){
      area.innerHTML=`<div class="empty">尚無公告</div>`;
      return;
    }
    area.innerHTML=rows.map(r=>`
      <div class="item">
        <div class="item-h">
          <div style="flex:1;min-width:0;">
            <div class="item-title">${r.pinned==='Y'?'📌 ':''}${esc(r.title)}</div>

          <button class="btn btn-outline btn-xs" onclick="openEditAnnounce('${jsStr(r.id)}')">✏️ 編輯</button>
          ${r.status==='草稿'?`
            <button class="btn btn-success btn-xs" onclick="publishAnnounce('${jsStr(r.id)}')">📢 發布</button>
          `:`
            <button class="btn btn-warn btn-xs" onclick="unpublishAnnounce('${jsStr(r.id)}')">📥 下架</button>

          <button class="btn btn-danger btn-xs" onclick="deleteAnnounce('${jsStr(r.id)}')">🗑️ 刪除</button>

    window.__announceCache={};
    rows.forEach(r=>window.__announceCache[r.id]=r);
  }catch(e){
    area.innerHTML=`<div class="empty">載入失敗：${esc(e.message)}</div>`;
  }

    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  `);
}

async function submitEditAnnounce(id){
  const title=requireInput('editAnnTitle','標題');
  const content=requireInput('editAnnContent','內容');
  if(!title||!content)return;
  await runApi('announcement.update',{
    id,
    title,
    content,
    category:$('editAnnCategory').value,
    target:$('editAnnTarget').value,
    date:$('editAnnDate').value,
    pinned:$('editAnnPinned').value,
    status:$('editAnnStatus').value
  },()=>{
    closeModal();
    toast('公告已更新','s');
    loadAnnounceList();
  });
}

async function publishAnnounce(id){
  if(!confirm('確定發布此公告？'))return;
  await runApi('announcement.update',{id,status:'發布'},()=>{
    toast('公告已發布','s');
    loadAnnounceList();
  });
}
async function unpublishAnnounce(id){
  if(!confirm('確定下架此公告？'))return;
  await runApi('announcement.update',{id,status:'草稿'},()=>{
    toast('公告已下架','s');
    loadAnnounceList();
  });
}
async function deleteAnnounce(id){
  if(!confirm('確定刪除此公告？刪除後無法復原。'))return;
  await runApi('announcement.delete',{id},()=>{
    toast('公告已刪除','s');
    loadAnnounceList();
  });
}

/*******************************************************
 * 工作人員資料
 *******************************************************/
async function renderStaffManage(){
  if(!adminGuard())return;
  setMain(`
    <div class="card">
      <div class="card-title"><span class="icon">👔</span>工作人員</div>
      <button class="btn btn-success" onclick="openAddStaff()">➕ 新增人員</button>
      <div id="staffListArea" class="list" style="margin-top:14px;"><div class="empty">載入中...</div></div>
    </div>
  `);
  loadStaffList();
}

async function loadStaffList(){
  const area=$('staffListArea');
  try{
    const res=await api('staff.list',{});
    if(!res.success){
      area.innerHTML=`<div class="empty">${esc(res.message||'載入失敗')}</div>`;
      return;
    }
    const rows=res.items||[];
    if(!rows.length){
      area.innerHTML=`<div class="empty">尚無工作人員</div>`;
      return;
    }
    area.innerHTML=rows.map(s=>`
      <div class="item">
        <div class="item-h">
          <div>
            <div class="item-title">${esc(s.name)} <span class="badge bb">${esc(s.title||'')}</span></div>
            <div class="item-meta">電話：${esc(s.phone||'--')} ｜ Email：${esc(s.email||'--')}</div>
          </div>
          <span class="badge ${s.status==='停用'?'bd':'bs'}">${esc(s.status||'啟用')}</span>
        </div>
      </div>
    `).join('');
  }catch(e){
    area.innerHTML=`<div class="empty">載入失敗：${esc(e.message)}</div>`;
  }
}

function openAddStaff(){
  openModal(`
    <div class="modal-title">➕ 新增工作人員</div>
    <div class="fg">
      <label class="flabel">姓名 <span class="req">*</span></label>
      <input id="stName" class="fc" placeholder="請輸入姓名">
    </div>
    <div class="fg">
      <label class="flabel">職稱</label>
      <select id="stTitle" class="fc">
        <option>工作人員</option>
        <option>志工幹部</option>
        <option>理事長</option>
        <option>理事</option>
        <option>監事</option>
        <option>總幹事</option>
        <option>行政秘書長</option>
        <option>管理員</option>
      </select>
    </div>
    <div class="fg"><label class="flabel">電話</label><input id="stPhone" class="fc" inputmode="tel" placeholder="可不填"></div>
    <div class="fg"><label class="flabel">Email</label><input id="stEmail" class="fc" type="email" placeholder="可不填"></div>
    <button class="btn btn-success" onclick="submitAddStaff()">新增人員</button>
    <button class="btn btn-ghost" onclick="closeModal()">取消</button>
  `);
}

async function submitAddStaff(){
  const name=requireInput('stName','姓名');
  if(!name)return;
  await runApi('staff.add',{
    name,
    title:$('stTitle').value,
    phone:$('stPhone').value.trim(),
    email:$('stEmail').value.trim()
  },()=>{
    closeModal();
    toast('人員已新增','s');
    loadStaffList();
  });
}
