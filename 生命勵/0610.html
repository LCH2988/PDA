<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🌿 生命勵會員活動系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    :root{
      --green-dark:#0B5D1E;
      --green:#147A2E;
      --green-light:#E8F7EA;
      --green-soft:#F4FFF4;
      --blue:#1565C0;
      --blue-soft:#E3F2FD;
      --gold:#FFB300;
      --gold-soft:#FFF8E1;
      --red:#D50000;
      --red-soft:#FFEBEE;
      --gray:#666;
      --gray-soft:#F3F3F3;
      --black:#111;
      --white:#fff;
      --shadow:0 4px 18px rgba(0,0,0,.16);
    }
    html,body{
      margin:0;padding:0;min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:var(--green-soft);color:var(--black);font-size:20px;line-height:1.65;
    }
    body{padding-bottom:96px;}
    button,input,select,textarea{font-family:inherit;}
    .page{display:none;min-height:100vh;}
    .page.active{display:block;}
    .app-header{
      position:sticky;top:0;z-index:100;
      background:linear-gradient(135deg,var(--green-dark),var(--green));
      color:#fff;padding:16px 18px;
      box-shadow:0 2px 12px rgba(0,0,0,.22);
      display:flex;justify-content:space-between;align-items:center;
    }
    .app-title{font-size:24px;font-weight:900;}
    .app-subtitle{font-size:15px;font-weight:700;opacity:.95;}
    .avatar{
      width:52px;height:52px;border-radius:50%;background:#C8F5D0;color:var(--green-dark);
      display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;
      border:3px solid rgba(255,255,255,.75);overflow:hidden;
    }
    .avatar img{width:100%;height:100%;object-fit:cover;}
    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;min-height:88px;background:#fff;border-top:2px solid #ddd;
      display:flex;z-index:100;box-shadow:0 -3px 14px rgba(0,0,0,.15);overflow-x:auto;
    }
    .nav-item{
      min-width:72px;flex:1;border:none;background:#fff;color:#333;font-size:15px;font-weight:900;padding:8px 4px;cursor:pointer;
    }
    .nav-item .icon{display:block;font-size:29px;line-height:1.1;}
    .nav-item.active{background:var(--green-light);color:var(--green-dark);border-top:6px solid var(--green-dark);}
    .auth-page{
      min-height:100vh;padding:28px 18px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:linear-gradient(150deg,var(--green-dark),var(--green),#DFF7E4);
    }
    .auth-logo{font-size:82px;margin-bottom:4px;}
    .auth-title{color:#fff;font-size:36px;font-weight:900;text-align:center;}
    .auth-subtitle{color:#fff;font-size:20px;text-align:center;font-weight:800;margin-bottom:24px;}
    .auth-box{
      width:100%;max-width:520px;background:#fff;border-radius:28px;padding:26px 20px;box-shadow:0 18px 50px rgba(0,0,0,.28);
    }
    .line-box{
      background:var(--blue-soft);border-left:8px solid var(--blue);border-radius:16px;padding:12px 14px;margin-bottom:18px;
      font-size:18px;font-weight:800;color:#0D47A1;
    }
    .form-group{margin-bottom:18px;}
    .form-label{display:block;color:var(--green-dark);font-size:22px;font-weight:900;margin-bottom:8px;}
    .req{color:var(--red);}
    .form-input,.form-select,.form-textarea{
      width:100%;min-height:64px;border:3px solid #777;border-radius:16px;padding:14px 15px;
      font-size:23px;font-weight:800;background:#fff;color:#000;
    }
    .form-textarea{min-height:120px;resize:vertical;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{
      outline:none;border-color:var(--blue);box-shadow:0 0 0 5px rgba(21,101,192,.16);
    }
    .hint{
      margin-top:8px;background:var(--gold-soft);border-left:8px solid var(--gold);border-radius:12px;
      padding:10px 12px;font-size:18px;font-weight:800;
    }
    .btn{
      width:100%;min-height:68px;border:none;border-radius:18px;padding:14px 16px;font-size:23px;font-weight:900;cursor:pointer;
    }
    .btn:active{transform:scale(.98);}
    .btn-primary{background:var(--green);color:#fff;}
    .btn-secondary{background:var(--blue-soft);color:#0D47A1;border:3px solid var(--blue);}
    .btn-gold{background:var(--gold);color:#000;border:3px solid #E65100;}
    .btn-danger{background:var(--red);color:#fff;}
    .btn-outline{background:#fff;color:var(--green-dark);border:3px solid var(--green-dark);}
    .btn-line{background:#00B900;color:#fff;}
    .btn-small{min-height:52px;width:auto;font-size:19px;padding:10px 14px;border-radius:14px;}
    .card{
      background:#fff;margin:14px 12px;padding:20px 16px;border-radius:22px;box-shadow:var(--shadow);border:2px solid #D7EAD7;
    }
    .card-title{font-size:24px;font-weight:900;color:var(--green-dark);margin-bottom:14px;}
    .hero{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;padding:26px 20px;}
    .hero-name{font-size:30px;font-weight:900;}
    .hero-meta{font-size:18px;font-weight:800;opacity:.95;}
    .badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .badge{
      display:inline-block;border-radius:999px;padding:7px 12px;font-size:17px;font-weight:900;
      background:rgba(255,255,255,.22);color:#fff;border:2px solid rgba(255,255,255,.45);
    }
    .badge.green{background:var(--green);color:#fff;}
    .badge.red{background:var(--red);color:#fff;}
    .badge.gold{background:var(--gold);color:#000;}
    .section-title{
      margin:18px 12px 8px;padding:10px 13px;border-radius:14px;background:var(--gold-soft);
      border-left:8px solid var(--gold);font-size:22px;font-weight:900;
    }
    .quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .quick{
      background:#fff;border:3px solid var(--green);border-radius:18px;padding:20px 8px;text-align:center;
      font-weight:900;color:var(--green-dark);cursor:pointer;
    }
    .quick .qicon{font-size:42px;display:block;}
    .view-switch{display:flex;gap:8px;padding:12px;}
    .view-switch button{
      flex:1;min-height:52px;border-radius:14px;border:3px solid var(--green);background:#fff;
      color:var(--green-dark);font-size:19px;font-weight:900;
    }
    .view-switch button.active{background:var(--green);color:#fff;}
    .event-card{
      background:#fff;margin:14px 12px;border-radius:22px;overflow:hidden;box-shadow:var(--shadow);border-left:12px solid var(--green);
    }
    .event-card.full{border-left-color:var(--red);}
    .event-card.past{border-left-color:#777;opacity:.72;}
    .event-card.incart{border-left-color:var(--gold);}
    .event-head{
      background:var(--green-light);padding:14px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;
    }
    .event-date{font-size:22px;font-weight:900;color:var(--green-dark);}
    .event-status{border-radius:999px;padding:6px 12px;font-size:18px;font-weight:900;background:var(--green);color:#fff;}
    .event-body{padding:17px;}
    .event-name{font-size:26px;font-weight:900;line-height:1.45;margin-bottom:8px;}
    .event-info{font-size:20px;font-weight:800;color:#222;margin:5px 0;}
    .event-desc{margin-top:10px;background:#FAFAFA;border-radius:14px;padding:10px;font-size:19px;font-weight:700;color:#333;}
    .event-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
    .event-actions .btn{flex:1;}
    .agenda-day{margin:14px 12px;background:#fff;border-radius:20px;box-shadow:var(--shadow);overflow:hidden;}
    .agenda-date{background:var(--green);color:#fff;font-size:22px;font-weight:900;padding:12px 16px;}
    .agenda-item{padding:14px 16px;border-bottom:1px solid #eee;font-size:20px;font-weight:800;}
    .calendar-header{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:12px;}
    .calendar-title{font-size:26px;font-weight:900;color:var(--green-dark);}
    .calendar-grid{margin:12px;display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
    .cal-week{text-align:center;font-weight:900;font-size:16px;color:var(--green-dark);padding:6px 0;}
    .cal-day{min-height:74px;background:#fff;border-radius:12px;border:1px solid #ddd;padding:5px;font-size:16px;font-weight:900;}
    .cal-day.empty{background:transparent;border:none;}
    .cal-day.has{border:3px solid var(--green);background:var(--green-light);}
    .cal-dot{margin-top:4px;background:var(--gold);color:#000;border-radius:8px;padding:2px 4px;font-size:12px;font-weight:900;}
    .cart-count{
      display:inline-flex;min-width:26px;height:26px;background:var(--red);color:#fff;border-radius:999px;justify-content:center;align-items:center;font-size:16px;font-weight:900;
    }
    .cart-item{
      background:#fff;margin:14px 12px;border-radius:22px;box-shadow:var(--shadow);border-left:10px solid var(--gold);padding:18px;
    }
    .question-box{background:#FAFAFA;border-radius:16px;padding:14px;margin-top:14px;border:1px solid #ddd;}
    .question-title{font-size:20px;font-weight:900;color:var(--green-dark);margin-bottom:8px;}
    .option-row{
      display:block;background:#fff;border:2px solid #ccc;border-radius:14px;padding:10px 12px;margin:8px 0;font-size:20px;font-weight:800;
    }
    .option-row input{transform:scale(1.45);margin-right:10px;}
    .reg-card{
      background:#fff;margin:14px 12px;padding:18px;border-radius:20px;box-shadow:var(--shadow);border-left:10px solid var(--green);
    }
    .reg-card.cancelled{border-left-color:#777;opacity:.72;}
    .reg-card.attended{border-left-color:var(--gold);}
    .profile-row{display:flex;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid #eee;}
    .profile-key{font-size:20px;font-weight:900;color:#333;}
    .profile-val{font-size:21px;font-weight:900;text-align:right;}
    .empty{text-align:center;padding:44px 16px;font-size:22px;font-weight:900;color:#555;}
    .empty .icon{font-size:70px;display:block;}
    .modal{
      display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center;
    }
    .modal.show{display:flex;}
    .modal-box{
      width:100%;max-width:680px;max-height:88vh;overflow-y:auto;background:#fff;border-radius:28px 28px 0 0;padding:24px 18px 38px;
    }
    .modal-title{
      font-size:27px;font-weight:900;color:var(--green-dark);display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
    }
    .close{font-size:36px;padding:0 8px;cursor:pointer;}
    .sub-tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;}
    .sub-tab{
      min-width:110px;min-height:48px;border:2px solid var(--green);border-radius:999px;background:#fff;color:var(--green-dark);font-size:18px;font-weight:900;
    }
    .sub-tab.active{background:var(--green);color:#fff;}
    .sub-panel{display:none;}
    .sub-panel.active{display:block;}
    #toast{
      position:fixed;top:88px;left:50%;transform:translateX(-50%) translateY(-18px);background:#222;color:#fff;z-index:1000;
      padding:15px 22px;border-radius:18px;font-size:21px;font-weight:900;box-shadow:var(--shadow);
      opacity:0;pointer-events:none;transition:.25s;max-width:92%;text-align:center;white-space:pre-line;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    #toast.success{background:var(--green);}
    #toast.error{background:var(--red);}
    #toast.info{background:var(--blue);}
    #loading{
      display:none;position:fixed;inset:0;z-index:999;background:rgba(255,255,255,.92);align-items:center;justify-content:center;flex-direction:column;
    }
    .spinner{
      width:60px;height:60px;border-radius:50%;border:7px solid #BFE8C6;border-top-color:var(--green);animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{margin-top:14px;font-size:24px;font-weight:900;color:var(--green-dark);}
    .mt{margin-top:12px;}
    @media (max-width:390px){
      html,body{font-size:18px;}
      .form-input,.form-select,.form-textarea{font-size:21px;}
      .btn{font-size:21px;}
      .event-name{font-size:24px;}
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">處理中，請稍候...</div>
  </div>

  <div id="toast"></div>

  <div id="authPage" class="page active">
    <div class="auth-page">
      <div class="auth-logo">🌿</div>
      <div class="auth-title">生命勵</div>
      <div class="auth-subtitle">會員活動系統</div>
      <div class="auth-box" id="authBox"></div>
    </div>
  </div>

  <div id="app" style="display:none">
    <header class="app-header">
      <div>
        <div class="app-title">🌿 生命勵</div>
        <div class="app-subtitle">會員活動系統</div>
      </div>
      <div id="headerAvatar" class="avatar" onclick="showPage('profile')">👤</div>
    </header>

    <div id="pageHome" class="page active">
      <div class="hero">
        <div id="heroName" class="hero-name">歡迎回來</div>
        <div id="heroMeta" class="hero-meta">會員編號：---</div>
        <div id="heroBadges" class="badge-row"></div>
      </div>

      <div class="card">
        <div class="card-title">⚡ 快速功能</div>
        <div class="quick-grid">
          <div class="quick" onclick="showPage('events')"><span class="qicon">📅</span>活動瀏覽</div>
          <div class="quick" onclick="showPage('cart')"><span class="qicon">🛒</span>報名車 <span id="quickCartCount" class="cart-count">0</span></div>
          <div class="quick" onclick="showPage('myregs')"><span class="qicon">📋</span>我的報名</div>
          <div class="quick" onclick="showPage('checkin')"><span class="qicon">✅</span>活動打卡</div>
        </div>
      </div>

      <div class="section-title">📅 近期活動</div>
      <div id="homeEvents"></div>

      <div class="card">
        <div class="card-title">📢 重要公告</div>
        <div style="font-size:21px;font-weight:800;line-height:1.9">
          🌿 活動可先加入「報名車」，再一次送出多場報名。<br>
          🔗 可使用電話登入或 LINE 帳號登入。<br>
          💰 年費 NT$850，支持生命勵持續服務。<br>
          📞 聯絡宋老師 Line：song0928896003
        </div>
      </div>
    </div>

    <div id="pageEvents" class="page">
      <div class="view-switch">
        <button id="viewCardBtn" class="active" onclick="setEventView('card')">卡片</button>
        <button id="viewAgendaBtn" onclick="setEventView('agenda')">行事曆</button>
        <button id="viewMonthBtn" onclick="setEventView('month')">月曆</button>
      </div>
      <div id="eventCardView"></div>
      <div id="eventAgendaView" style="display:none"></div>
      <div id="eventMonthView" style="display:none"></div>
    </div>

    <div id="pageCart" class="page">
      <div class="section-title">🛒 報名車</div>
      <div id="cartList"></div>
      <div class="card">
        <button class="btn btn-primary" onclick="submitCart()">✅ 送出全部報名</button>
        <button class="btn btn-outline mt" onclick="clearCart()">清空報名車</button>
      </div>
    </div>

    <div id="pageMyregs" class="page">
      <div class="section-title">📋 我的報名</div>
      <div id="myRegList"></div>
    </div>

    <div id="pageCheckin" class="page">
      <div class="card" style="text-align:center">
        <div style="font-size:82px">✅</div>
        <div class="card-title">活動報到打卡</div>
        <div style="font-size:21px;font-weight:800">請先報名活動，活動當天選擇活動後打卡。</div>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">選擇活動</label>
          <select id="checkinEvent" class="form-select"></select>
        </div>
        <button class="btn btn-gold" onclick="doCheckIn()">✅ 確認打卡</button>
      </div>
      <div id="checkinResult" class="card" style="display:none;text-align:center">
        <div style="font-size:70px">🎉</div>
        <div id="checkinMsg" style="white-space:pre-line;font-size:25px;font-weight:900;color:var(--green-dark)"></div>
        <div id="checkinTime" style="font-size:20px;font-weight:800"></div>
      </div>
    </div>

    <div id="pageProfile" class="page">
      <div class="card" style="text-align:center">
        <div id="profileAvatar" class="avatar" style="width:100px;height:100px;font-size:52px;margin:0 auto 12px">👤</div>
        <div id="profileName" style="font-size:30px;font-weight:900">---</div>
        <div id="profileId" style="font-size:20px;font-weight:800;color:#555">---</div>
      </div>

      <div class="card">
        <div class="card-title">👤 會員資料</div>
        <div id="profileRows"></div>
      </div>

      <div class="card">
        <div class="card-title">💰 年費與繳費</div>
        <div id="paymentInfo"></div>
      </div>

      <div class="card">
        <button class="btn btn-secondary" onclick="openEditProfile()">✏️ 編輯完整資料</button>
        <button class="btn btn-outline mt" onclick="unbindLine()">🔓 解除 LINE 綁定</button>
        <button class="btn btn-danger mt" onclick="logout()">🚪 登出</button>
      </div>
    </div>

    <nav class="bottom-nav">
      <button id="nav-home" class="nav-item active" onclick="showPage('home')"><span class="icon">🏠</span>首頁</button>
      <button id="nav-events" class="nav-item" onclick="showPage('events')"><span class="icon">📅</span>活動</button>
      <button id="nav-cart" class="nav-item" onclick="showPage('cart')"><span class="icon">🛒</span>報名<span id="navCartCount" class="cart-count">0</span></button>
      <button id="nav-myregs" class="nav-item" onclick="showPage('myregs')"><span class="icon">📋</span>紀錄</button>
      <button id="nav-checkin" class="nav-item" onclick="showPage('checkin')"><span class="icon">✅</span>打卡</button>
      <button id="nav-profile" class="nav-item" onclick="showPage('profile')"><span class="icon">👤</span>我的</button>
    </nav>
  </div>

  <div id="eventDetailModal" class="modal">
    <div class="modal-box">
      <div class="modal-title">活動詳情<span class="close" onclick="closeModal('eventDetailModal')">×</span></div>
      <div id="eventDetailContent"></div>
    </div>
  </div>

  <div id="profileModal" class="modal">
    <div class="modal-box">
      <div class="modal-title">編輯會員資料<span class="close" onclick="closeModal('profileModal')">×</span></div>

      <div class="sub-tabs">
        <button class="sub-tab active" data-tab="basic" onclick="showProfileTab('basic')">基本資料</button>
        <button class="sub-tab" data-tab="insurance" onclick="showProfileTab('insurance')">保險資料</button>
        <button class="sub-tab" data-tab="fitness" onclick="showProfileTab('fitness')">體適能</button>
        <button class="sub-tab" data-tab="equipment" onclick="showProfileTab('equipment')">器材偏好</button>
        <button class="sub-tab" data-tab="transport" onclick="showProfileTab('transport')">交通飲食</button>
      </div>

      <div id="tab-basic" class="sub-panel active">
        <div class="form-group"><label class="form-label">姓名</label><input id="editName" class="form-input"></div>
        <div class="form-group"><label class="form-label">手機</label><input id="editPhone" class="form-input" type="tel"></div>
        <div class="form-group"><label class="form-label">性別</label>
          <select id="editGender" class="form-select"><option value="">請選擇</option><option value="男">男</option><option value="女">女</option></select>
        </div>
        <div class="form-group"><label class="form-label">出生日期</label><input id="editBirthday" class="form-input" type="date"></div>
        <div class="form-group"><label class="form-label">身分別</label>
          <select id="editIdentity" class="form-select">
            <option value="身障夥伴">身障夥伴</option>
            <option value="樂齡長者">樂齡長者</option>
            <option value="特教生">特教生</option>
            <option value="陪伴親友">陪伴親友</option>
            <option value="志工夥伴">志工夥伴</option>
            <option value="一般會員">一般會員</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">障礙類別</label><input id="editDisabilityType" class="form-input"></div>
        <div class="form-group"><label class="form-label">障礙程度</label>
          <select id="editDisabilityLevel" class="form-select">
            <option value="">請選擇</option>
            <option value="輕度">輕度</option>
            <option value="中度">中度</option>
            <option value="重度">重度</option>
            <option value="極重度">極重度</option>
            <option value="無">無</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">輔具需求</label><input id="editAssistiveDevice" class="form-input"></div>
        <div class="form-group"><label class="form-label">緊急聯絡人</label><input id="editEmergencyName" class="form-input"></div>

        <div class="form-group"><label class="form-label">過敏食材</label><input id="editFoodAllergy" class="form-input"></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx_9hGHa9Ex3UJ7JnPkF1aMOc6xg_AyLfpyN97k65bfT2cNluKw47A-sW3CXtSHE4_z/exec';
    const LIFF_ID = '2005891423-hTZ5rhmd';

    let currentUser = null;
    let lineProfile = null;
    let allEvents = [];
    let myRegs = [];
    let cart = [];
    let eventQuestionsCache = {};
    let currentView = 'card';
    let currentMonth = new Date();
    let toastTimer = null;

    window.addEventListener('load', async () => {
      loadCartFromStorage();
      renderLoginHome();

      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          lineProfile = await liff.getProfile();
          const box = document.getElementById('lineStatusBox');
          if (box) box.innerHTML = '已偵測 LINE：' + escapeHtml(lineProfile.displayName || '');
        }
      } catch (err) {
        console.warn(err);
      }

      const saved = localStorage.getItem('lifeUserV2');
      if (saved) {
        try {
          currentUser = JSON.parse(saved);
          if (currentUser && currentUser.memberId) {
            await refreshMyProfile();
            await enterApp();
          }
        } catch (e) {
          localStorage.removeItem('lifeUserV2');
        }
      }
    });

    function renderLoginHome() {
      document.getElementById('authBox').innerHTML = `
        <div id="lineStatusBox" class="line-box">
          ${lineProfile ? '已偵測 LINE：' + escapeHtml(lineProfile.displayName || '') : '可選擇電話登入或 LINE 登入'}
        </div>
        <div class="card-title" style="text-align:center">🔑 請選擇登入方式</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <button class="btn btn-primary" onclick="renderPhoneLogin()">📱 電話號碼登入</button>
          <button class="btn btn-line" onclick="doLineLogin()">💚 LINE 帳號登入</button>
        </div>
        <hr style="margin:22px 0;border:none;border-top:1px solid #ddd">
        <div style="text-align:center;font-size:18px;font-weight:800;color:#666;margin-bottom:12px">還不是會員？</div>
        <button class="btn btn-outline" onclick="renderRegisterHome()">📝 立即註冊</button>
      `;
    }

    function renderPhoneLogin() {
      document.getElementById('authBox').innerHTML = `
        <div class="card-title">📱 電話登入</div>
        <div class="form-group">
          <label class="form-label">您的姓名 <span class="req">*</span></label>
          <input id="lName" class="form-input" type="text" placeholder="請輸入真實姓名">
        </div>
        <div class="form-group">
          <label class="form-label">電話後 9 碼 <span class="req">*</span></label>
          <input id="lPhone" class="form-input" type="tel" placeholder="例：928896003" maxlength="9" inputmode="numeric">
          <div class="hint">例如手機 0928896003，請輸入 928896003</div>
        </div>
        <button class="btn btn-primary" onclick="doPhoneLogin()">✅ 確認登入</button>
        <button class="btn btn-outline mt" onclick="renderLoginHome()">← 返回</button>
      `;
    }

    async function doPhoneLogin() {
      const name = val('lName');
      const phone9 = val('lPhone');
      if (!name || phone9.length !== 9) return showToast('請填寫姓名與電話後 9 碼', 'error');

      showLoading(true);
      const res = await apiPost({ action:'auth.loginByPhone', data:{ name, phone: phone9 }});
      showLoading(false);

      if (!res.success) return showToast(res.message || '登入失敗', 'error');

      currentUser = res.member;
      localStorage.setItem('lifeUserV2', JSON.stringify(currentUser));
      await refreshMyProfile();
      await enterApp();
      showToast(`歡迎回來，${currentUser.name}！`, 'success');
    }

    async function doLineLogin() {
      try {
        showLoading(true);
        if (!liff.isLoggedIn()) {
          showLoading(false);
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        lineProfile = profile;

        const res = await apiPost({
          action:'auth.loginByLine',
          data:{
            lineId: profile.userId,
            lineName: profile.displayName,
            linePictureUrl: profile.pictureUrl || ''
          }
        });

        showLoading(false);

        if (!res.success) return showToast(res.message || 'LINE 登入失敗', 'error');

        if (res.isFirstLogin) {
          renderLineFirstLogin(profile.userId, profile.displayName, profile.pictureUrl || '');
          return;
        }

        currentUser = res.member;
        localStorage.setItem('lifeUserV2', JSON.stringify(currentUser));
        await refreshMyProfile();
        await enterApp();
        showToast(`歡迎回來，${currentUser.name}！`, 'success');
      } catch (e) {
        showLoading(false);
        showToast('LINE 登入失敗：' + e.message, 'error');
      }
    }

    function renderLineFirstLogin(lineId, lineName, pictureUrl) {
      document.getElementById('authBox').innerHTML = `
        <div class="card-title">💚 LINE 首次登入</div>
        <div class="line-box">首次登入請完成實名驗證。</div>
        <div class="form-group">
          <label class="form-label">LINE 名稱</label>
          <input class="form-input" value="${escapeAttr(lineName || '')}" disabled style="background:#f4f4f4">
        </div>
        <div class="form-group">
          <label class="form-label">真實姓名 <span class="req">*</span></label>
          <input id="llName" class="form-input" type="text">
        </div>
        <div class="form-group">
          <label class="form-label">手機號碼 <span class="req">*</span></label>
          <input id="llPhone" class="form-input" type="tel" placeholder="例：0928896003">
        </div>
        <button class="btn btn-line" onclick="submitLineFirstLogin('${escapeJs(lineId)}','${escapeJs(lineName)}','${escapeJs(pictureUrl)}')">✅ 完成驗證並登入</button>
        <button class="btn btn-outline mt" onclick="renderLoginHome()">← 返回</button>
      `;
    }

    async function submitLineFirstLogin(lineId, lineName, pictureUrl) {
      const name = val('llName');
      const phone = normalizePhone(val('llPhone'));
      if (!name || !validatePhone(phone)) return showToast('請填寫真實姓名與正確手機號碼', 'error');

      showLoading(true);
      const res = await apiPost({
        action:'auth.completeLineProfile',
        data:{ lineId, lineName, linePictureUrl: pictureUrl, name, phone }
      });
      showLoading(false);

      if (!res.success) return showToast(res.message || '驗證失敗', 'error');

      currentUser = res.member;
      localStorage.setItem('lifeUserV2', JSON.stringify(currentUser));
      await refreshMyProfile();
      await enterApp();
      showToast(`歡迎回來，${currentUser.name}！`, 'success');
    }

    function renderRegisterHome() {
      document.getElementById('authBox').innerHTML = `
        <div class="card-title">📝 新會員註冊</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <button class="btn btn-primary" onclick="renderPhoneRegister()">📱 電話號碼註冊</button>
          <button class="btn btn-line" onclick="doLineRegister()">💚 LINE 快速註冊</button>
        </div>
        <button class="btn btn-outline mt" onclick="renderLoginHome()">← 返回登入</button>
      `;
    }

    function renderPhoneRegister() {
      document.getElementById('authBox').innerHTML = `
        <div class="card-title">📱 電話號碼註冊</div>
        <div class="form-group"><label class="form-label">姓名 <span class="req">*</span></label><input id="rName" class="form-input"></div>
        <div class="form-group"><label class="form-label">手機號碼 <span class="req">*</span></label><input id="rPhone" class="form-input" type="tel" placeholder="例：0928896003"></div>
        <div class="form-group"><label class="form-label">暱稱，選填</label><input id="rNickname" class="form-input"></div>
        <button class="btn btn-primary" onclick="doPhoneRegister()">✅ 完成註冊</button>
        <button class="btn btn-outline mt" onclick="renderRegisterHome()">← 返回</button>
      `;
    }

    async function doPhoneRegister() {
      const name = val('rName');
      const phone = normalizePhone(val('rPhone'));
      const nickname = val('rNickname');
      if (!name || !validatePhone(phone)) return showToast('請填寫姓名與正確手機號碼', 'error');

      showLoading(true);
      const res = await apiPost({ action:'auth.registerByPhone', data:{ name, phone, nickname }});
      showLoading(false);

      if (!res.success) return showToast(res.message || '註冊失敗', 'error');

      showToast('註冊成功！請登入', 'success');
      renderPhoneLogin();
    }

    async function doLineRegister() {
      try {
        showLoading(true);
        if (!liff.isLoggedIn()) {
          showLoading(false);
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        lineProfile = profile;
        showLoading(false);

        document.getElementById('authBox').innerHTML = `
          <div class="card-title">💚 LINE 快速註冊</div>
          <div class="form-group"><label class="form-label">LINE 名稱</label><input class="form-input" value="${escapeAttr(profile.displayName || '')}" disabled style="background:#f4f4f4"></div>
          <div class="form-group"><label class="form-label">真實姓名 <span class="req">*</span></label><input id="lrName" class="form-input"></div>
          <div class="form-group"><label class="form-label">手機號碼 <span class="req">*</span></label><input id="lrPhone" class="form-input" type="tel"></div>
          <button class="btn btn-line" onclick="submitLineRegister('${escapeJs(profile.userId)}','${escapeJs(profile.displayName || '')}','${escapeJs(profile.pictureUrl || '')}')">✅ 完成註冊</button>
          <button class="btn btn-outline mt" onclick="renderRegisterHome()">← 返回</button>
        `;
      } catch (e) {
        showLoading(false);
        showToast('LINE 註冊失敗：' + e.message, 'error');
      }
    }

    async function submitLineRegister(lineId, lineName, pictureUrl) {
      const name = val('lrName');
      const phone = normalizePhone(val('lrPhone'));
      if (!name || !validatePhone(phone)) return showToast('請填寫姓名與正確手機號碼', 'error');

      showLoading(true);
      const res = await apiPost({
        action:'auth.registerByLine',
        data:{ lineId, lineName, linePictureUrl: pictureUrl, name, phone }
      });
      showLoading(false);

      if (!res.success) return showToast(res.message || '註冊失敗', 'error');

      currentUser = res.member;
      localStorage.setItem('lifeUserV2', JSON.stringify(currentUser));
      await refreshMyProfile();
      await enterApp();
      showToast(`歡迎回來，${currentUser.name}！`, 'success');
    }

    async function refreshMyProfile() {
      if (!currentUser?.memberId) return;
      const res = await apiGet({ action:'getMemberProfile', memberId: currentUser.memberId });
      if (res.success && res.member) {
        currentUser = res.member;
        localStorage.setItem('lifeUserV2', JSON.stringify(currentUser));
      }
    }

    async function enterApp() {
      document.getElementById('authPage').classList.remove('active');
      document.getElementById('authPage').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      renderUser();
      renderProfile();
      updateCartBadge();

      showLoading(true);
      await Promise.all([loadEvents(), loadMyRegs()]);
      showLoading(false);

      showPage('home');
    }

    function logout() {
      if (!confirm('確定要登出嗎？')) return;
      localStorage.removeItem('lifeUserV2');
      currentUser = null;
      document.getElementById('app').style.display = 'none';
      document.getElementById('authPage').classList.add('active');
      document.getElementById('authPage').style.display = 'block';
      renderLoginHome();
      showToast('已登出', 'info');
    }

    async function unbindLine() {
      if (!confirm('確定要解除 LINE 綁定嗎？')) return;
      showLoading(true);
      const res = await apiPost({ action:'unbindMyLine', memberId: currentUser.memberId });
      showLoading(false);

      if (!res.success) return showToast(res.message || '解除失敗', 'error');

      await refreshMyProfile();
      renderUser();
      renderProfile();
      showToast('已解除 LINE 綁定', 'info');
    }

    function renderUser() {
      document.getElementById('heroName').textContent = '歡迎回來，' + (currentUser.name || '');
      document.getElementById('heroMeta').textContent = '會員編號：' + (currentUser.memberId || '');
      const paid = String(currentUser.feeStatus || '').includes('已繳');

      document.getElementById('heroBadges').innerHTML = `
        <span class="badge">${escapeHtml(currentUser.identity || '會員')}</span>
        <span class="badge ${paid ? 'green' : 'red'}">${escapeHtml(currentUser.feeStatus || '未繳費')}</span>
        <span class="badge ${currentUser.lineBindStatus === '已綁定' ? 'green' : 'red'}">LINE ${escapeHtml(currentUser.lineBindStatus || '未綁定')}</span>
      `;

      const avatarHtml = currentUser.linePictureUrl ? `<img src="${escapeAttr(currentUser.linePictureUrl)}">` : '👤';
      document.getElementById('headerAvatar').innerHTML = avatarHtml;
      document.getElementById('profileAvatar').innerHTML = avatarHtml;
    }

    function showPage(name) {
      const map = {
        home:'pageHome',
        events:'pageEvents',
        cart:'pageCart',
        myregs:'pageMyregs',
        checkin:'pageCheckin',
        profile:'pageProfile'
      };

      Object.values(map).forEach(id => document.getElementById(id)?.classList.remove('active'));
      document.getElementById(map[name])?.classList.add('active');

      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      document.getElementById('nav-' + name)?.classList.add('active');

      if (name === 'events') renderAllEventViews();
      if (name === 'cart') renderCart();
      if (name === 'myregs') loadMyRegs();
      if (name === 'checkin') setupCheckin();
      if (name === 'profile') renderProfile();

      window.scrollTo(0,0);
    }

    async function loadEvents() {
      const res = await apiGet({ action:'getEvents' });
      if (!res.success) return showToast(res.message || '活動載入失敗', 'error');
      allEvents = res.events || [];
      renderHomeEvents();
      renderAllEventViews();
      setupCheckin();
    }

    function renderHomeEvents() {
      const upcoming = allEvents.slice(0,3);
      renderEventCards('homeEvents', upcoming);
    }

    function setEventView(view) {
      currentView = view;
      document.getElementById('viewCardBtn').classList.toggle('active', view === 'card');
      document.getElementById('viewAgendaBtn').classList.toggle('active', view === 'agenda');
      document.getElementById('viewMonthBtn').classList.toggle('active', view === 'month');
      document.getElementById('eventCardView').style.display = view === 'card' ? 'block' : 'none';
      document.getElementById('eventAgendaView').style.display = view === 'agenda' ? 'block' : 'none';
      document.getElementById('eventMonthView').style.display = view === 'month' ? 'block' : 'none';
      renderAllEventViews();
    }

    function renderAllEventViews() {
      renderEventCards('eventCardView', allEvents);
      renderAgenda();
      renderMonthCalendar();
    }

    function renderEventCards(containerId, events) {
      const box = document.getElementById(containerId);
      if (!box) return;

      if (!events.length) {
        box.innerHTML = `<div class="empty"><span class="icon">📅</span>目前沒有活動</div>`;
        return;
      }

      box.innerHTML = events.map(e => {
        const inCart = cart.some(c => c.eventId === e.id);
        const joined = myRegs.some(r => r.eventId === e.id && r.status === '已報名');
        const isPast = e.computedStatus === '已結束';
        const isFull = e.computedStatus === '額滿';
        const cls = isPast ? 'past' : isFull ? 'full' : inCart ? 'incart' : '';

        let status = e.computedStatus || e.status || '';
        if (joined) status = '已報名';
        if (inCart) status = '已加入報名車';

        let btn = '';
        if (joined) {
          btn = `<button class="btn btn-danger btn-small" onclick="cancelReg('${escapeJs(e.id)}')">取消報名</button>`;
        } else if (inCart) {
          btn = `<button class="btn btn-outline btn-small" onclick="removeFromCart('${escapeJs(e.id)}')">移出報名車</button>`;
        } else if (e.canRegister) {
          btn = `<button class="btn btn-primary btn-small" onclick="addToCart('${escapeJs(e.id)}')">加入報名車</button>`;
        }

        return `
          <div class="event-card ${cls}">
            <div class="event-head">
              <div class="event-date">📅 ${escapeHtml(e.date)}</div>
              <div class="event-status">${escapeHtml(status)}</div>
            </div>
            <div class="event-body">
              <div class="event-name">${escapeHtml(e.name)}</div>
              <div class="event-info">🏷️ ${escapeHtml(e.type || '活動')}</div>
              <div class="event-info">🕐 ${escapeHtml(e.startTime || '')} - ${escapeHtml(e.endTime || '')}</div>
              <div class="event-info">📍 ${escapeHtml(e.location || '')}</div>
              <div class="event-info">👥 已報名 ${e.registeredCount || 0} / ${e.limit || '不限'} 人</div>
              <div class="event-desc">${escapeHtml(e.description || '')}</div>
              <div class="event-actions">
                <button class="btn btn-secondary btn-small" onclick="openEventDetail('${escapeJs(e.id)}')">查看詳情</button>
                ${btn}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAgenda() {
      const box = document.getElementById('eventAgendaView');
      const grouped = {};
      allEvents.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = [];
        grouped[e.date].push(e);
      });

      const dates = Object.keys(grouped).sort();
      if (!dates.length) {
        box.innerHTML = `<div class="empty"><span class="icon">📅</span>目前沒有活動</div>`;
        return;
      }

      box.innerHTML = dates.map(date => `
        <div class="agenda-day">
          <div class="agenda-date">${escapeHtml(date)}</div>
          ${grouped[date].map(e => `
            <div class="agenda-item" onclick="openEventDetail('${escapeJs(e.id)}')">
              🕐 ${escapeHtml(e.startTime || '')}　${escapeHtml(e.name)}<br>
              📍 ${escapeHtml(e.location || '')}
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function renderMonthCalendar() {
      const box = document.getElementById('eventMonthView');
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const ym = `${year}-${String(month + 1).padStart(2,'0')}`;
      const monthEvents = allEvents.filter(e => String(e.date).startsWith(ym));
      const byDay = {};
      monthEvents.forEach(e => {
        const d = Number(String(e.date).slice(8,10));
        if (!byDay[d]) byDay[d] = [];
        byDay[d].push(e);
      });

      const first = new Date(year, month, 1).getDay();
      const days = new Date(year, month + 1, 0).getDate();
      const weeks = ['日','一','二','三','四','五','六'];
      let cells = '';
      weeks.forEach(w => cells += `<div class="cal-week">${w}</div>`);
      for (let i = 0; i < first; i++) cells += `<div class="cal-day empty"></div>`;
      for (let d = 1; d <= days; d++) {
        const has = byDay[d] && byDay[d].length;
        cells += `
          <div class="cal-day ${has ? 'has' : ''}" onclick="${has ? `showDayEvents(${d})` : ''}">
            ${d}
            ${has ? `<div class="cal-dot">${byDay[d].length} 場活動</div>` : ''}
          </div>
        `;
      }

      box.innerHTML = `
        <div class="calendar-header">
          <button class="btn btn-secondary btn-small" onclick="moveMonth(-1)">上月</button>
          <div class="calendar-title">${year} 年 ${month + 1} 月</div>
          <button class="btn btn-secondary btn-small" onclick="moveMonth(1)">下月</button>
        </div>
        <div class="calendar-grid">${cells}</div>
        <div id="monthDayEvents"></div>
      `;
    }

    function moveMonth(delta) {
      currentMonth.setMonth(currentMonth.getMonth() + delta);
      renderMonthCalendar();
    }

    function showDayEvents(day) {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth() + 1;
      const date = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const events = allEvents.filter(e => e.date === date);
      renderEventCards('monthDayEvents', events);
    }

    function openEventDetail(eventId) {
      const e = allEvents.find(x => x.id === eventId);
      if (!e) return;

      document.getElementById('eventDetailContent').innerHTML = `
        <div class="event-name">${escapeHtml(e.name)}</div>
        <div class="event-info">🏷️ 類型：${escapeHtml(e.type || '')}</div>
        <div class="event-info">📅 日期：${escapeHtml(e.date || '')}</div>
        <div class="event-info">🕐 時間：${escapeHtml(e.startTime || '')} - ${escapeHtml(e.endTime || '')}</div>
        <div class="event-info">📍 地點：${escapeHtml(e.location || '')}</div>
        <div class="event-info">👥 名額：${e.registeredCount || 0} / ${e.limit || '不限'}</div>
        <div class="event-info">🍱 供餐：${escapeHtml(e.meal || '否')}</div>
        <div class="event-info">🙋 志工協助：${escapeHtml(e.needVolunteer || '否')}</div>
        <div class="event-desc">${escapeHtml(e.description || '')}</div>
        <div class="event-actions">
          ${e.canRegister && !cart.some(c => c.eventId === e.id) ? `<button class="btn btn-primary" onclick="addToCart('${escapeJs(e.id)}');closeModal('eventDetailModal')">加入報名車</button>` : ''}
        </div>
      `;
      openModal('eventDetailModal');
    }

    async function addToCart(eventId) {
      const e = allEvents.find(x => x.id === eventId);
      if (!e) return;
      if (cart.some(c => c.eventId === eventId)) return showToast('已在報名車中', 'info');
      if (myRegs.some(r => r.eventId === eventId && r.status === '已報名')) return showToast('您已報名此活動', 'error');

      showLoading(true);
      const qRes = await apiGet({ action:'getEventQuestions', eventId });
      showLoading(false);

      const questions = qRes.success ? qRes.questions || [] : [];
      eventQuestionsCache[eventId] = questions;

      const defaultAnswers = {};
      questions.forEach(q => defaultAnswers[q.questionId] = q.type === '複選' ? [] : '');

      cart.push({
        eventId: e.id,
        eventName: e.name,
        eventDate: e.date,
        answers: defaultAnswers,
        note: ''
      });

      saveCart();
      updateCartBadge();
      renderAllEventViews();
      showToast('已加入報名車', 'success');
    }

    function removeFromCart(eventId) {
      cart = cart.filter(c => c.eventId !== eventId);
      saveCart();
      updateCartBadge();
      renderCart();
      renderAllEventViews();
      showToast('已移出報名車', 'info');
    }

    function clearCart() {
      if (!cart.length) return;
      if (!confirm('確定要清空報名車嗎？')) return;
      cart = [];
      saveCart();
      updateCartBadge();
      renderCart();
      renderAllEventViews();
    }

    async function renderCart() {
      const box = document.getElementById('cartList');
      if (!cart.length) {
        box.innerHTML = `<div class="empty"><span class="icon">🛒</span>報名車目前是空的</div>`;
        return;
      }

      for (const item of cart) {
        if (!eventQuestionsCache[item.eventId]) {
          const qRes = await apiGet({ action:'getEventQuestions', eventId:item.eventId });
          eventQuestionsCache[item.eventId] = qRes.success ? qRes.questions || [] : [];
        }
      }

      box.innerHTML = cart.map(item => {
        const questions = eventQuestionsCache[item.eventId] || [];
        return `
          <div class="cart-item">
            <div class="event-name">${escapeHtml(item.eventName)}</div>
            <div class="event-info">📅 ${escapeHtml(item.eventDate)}</div>
            ${questions.map(q => renderQuestionInput(item.eventId, q, item.answers[q.questionId])).join('')}
            <div class="question-box">
              <div class="question-title">備註</div>
              <textarea class="form-textarea" onchange="setCartNote('${escapeJs(item.eventId)}', this.value)">${escapeHtml(item.note || '')}</textarea>
            </div>
            <button class="btn btn-danger mt" onclick="removeFromCart('${escapeJs(item.eventId)}')">移除此活動</button>
          </div>
        `;
      }).join('');
    }

    function renderQuestionInput(eventId, q, value) {
      const req = q.required ? ' <span class="req">*</span>' : '';
      if (q.type === '單選') {
        return `
          <div class="question-box">
            <div class="question-title">${escapeHtml(q.text)}${req}</div>
            ${q.options.map(opt => `
              <label class="option-row">
                <input type="radio" name="${escapeAttr(eventId)}_${escapeAttr(q.questionId)}" value="${escapeAttr(opt)}"
                  ${value === opt ? 'checked' : ''}
                  onchange="setCartAnswer('${escapeJs(eventId)}','${escapeJs(q.questionId)}',this.value)">
                ${escapeHtml(opt)}
              </label>
            `).join('')}
          </div>
        `;
      }
      if (q.type === '複選') {
        const arr = Array.isArray(value) ? value : [];
        return `
          <div class="question-box">
            <div class="question-title">${escapeHtml(q.text)}${req}</div>
            ${q.options.map(opt => `
              <label class="option-row">
                <input type="checkbox" value="${escapeAttr(opt)}"
                  ${arr.includes(opt) ? 'checked' : ''}
                  onchange="toggleCartCheckbox('${escapeJs(eventId)}','${escapeJs(q.questionId)}',this.value,this.checked)">
                ${escapeHtml(opt)}
              </label>
            `).join('')}
          </div>
        `;
      }
      return `
        <div class="question-box">
          <div class="question-title">${escapeHtml(q.text)}${req}</div>
          <textarea class="form-textarea" onchange="setCartAnswer('${escapeJs(eventId)}','${escapeJs(q.questionId)}',this.value)">${escapeHtml(value || '')}</textarea>
        </div>
      `;
    }

    function setCartAnswer(eventId, qid, value) {
      const item = cart.find(c => c.eventId === eventId);
      if (!item) return;
      item.answers[qid] = value;
      saveCart();
    }

    function toggleCartCheckbox(eventId, qid, value, checked) {
      const item = cart.find(c => c.eventId === eventId);
      if (!item) return;
      if (!Array.isArray(item.answers[qid])) item.answers[qid] = [];
      if (checked && !item.answers[qid].includes(value)) item.answers[qid].push(value);
      if (!checked) item.answers[qid] = item.answers[qid].filter(v => v !== value);
      saveCart();
    }

    function setCartNote(eventId, note) {
      const item = cart.find(c => c.eventId === eventId);
      if (!item) return;
      item.note = note;
      saveCart();
    }

    async function submitCart() {
      if (!cart.length) return showToast('報名車是空的', 'error');
      if (!confirm(`確定送出 ${cart.length} 場活動報名嗎？`)) return;

      showLoading(true);
      const res = await apiPost({
        action:'submitRegistrationCart',
        memberId: currentUser.memberId,
        items: cart.map(c => ({ eventId:c.eventId, answers:c.answers, note:c.note }))
      });
      showLoading(false);

      if (!res.success) return showToast(res.message || '報名失敗', 'error');

      showToast(res.message, 'success');
      cart = [];
      saveCart();
      updateCartBadge();
      await Promise.all([loadEvents(), loadMyRegs()]);
      showPage('myregs');
    }

    function saveCart() {
      localStorage.setItem('lifeCartV2', JSON.stringify(cart));
    }

    function loadCartFromStorage() {
      try { cart = JSON.parse(localStorage.getItem('lifeCartV2') || '[]'); }
      catch(e){ cart = []; }
      updateCartBadge();
    }

    function updateCartBadge() {
      ['navCartCount','quickCartCount'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = cart.length;
      });
    }

    async function loadMyRegs() {
      if (!currentUser) return;
      const res = await apiGet({ action:'getMyRegistrations', memberId: currentUser.memberId });
      myRegs = res.success ? res.registrations || [] : [];
      renderMyRegs();
    }

    function renderMyRegs() {
      const box = document.getElementById('myRegList');
      if (!myRegs.length) {
        box.innerHTML = `<div class="empty"><span class="icon">📋</span>尚無報名紀錄</div>`;
        return;
      }

      box.innerHTML = myRegs.map(r => {
        const cancelled = r.status === '已取消';
        const attended = r.attendance === '已出席';
        return `
          <div class="reg-card ${cancelled ? 'cancelled' : attended ? 'attended' : ''}">
            <div class="event-name">${escapeHtml(r.eventName)}</div>
            <div class="event-info">📅 ${escapeHtml(r.eventDate)}</div>
            <div class="event-info">狀態：${escapeHtml(attended ? '已出席' : r.status)}</div>
            <div class="event-info">報名時間：${formatDate(r.regTime)}</div>
            ${r.note ? `<div class="event-info">備註：${escapeHtml(r.note)}</div>` : ''}
            ${r.status === '已報名' && !attended ? `<button class="btn btn-danger mt" onclick="cancelReg('${escapeJs(r.eventId)}')">取消報名</button>` : ''}
          </div>
        `;
      }).join('');
    }

    async function cancelReg(eventId) {
      if (!confirm('確定要取消此活動報名嗎？')) return;

      showLoading(true);
      const res = await apiPost({ action:'cancelEvent', memberId: currentUser.memberId, eventId });
      showLoading(false);

      if (!res.success) return showToast(res.message || '取消失敗', 'error');

      showToast('已取消報名', 'info');
      await Promise.all([loadEvents(), loadMyRegs()]);
    }

    function setupCheckin() {
      const sel = document.getElementById('checkinEvent');
      if (!sel) return;

      const today = new Date().toLocaleDateString('en-CA', { timeZone:'Asia/Taipei' });
            const activeRegs = myRegs.filter(r => r.status === '已報名');
      const candidates = allEvents.filter(e =>
        activeRegs.some(r => r.eventId === e.id) &&
        e.date === today
      );

      sel.innerHTML = '<option value="">請選擇今日已報名活動</option>';

      if (!candidates.length) {
        sel.innerHTML += '<option value="">今日沒有可打卡活動</option>';
      } else {
        candidates.forEach(e => {
          sel.innerHTML += `<option value="${escapeAttr(e.id)}">${escapeHtml(e.date)} ${escapeHtml(e.name)}</option>`;
        });
      }
    }

    async function doCheckIn() {
      const eventId = val('checkinEvent');
      if (!eventId) return showToast('請選擇活動', 'error');

      showLoading(true);
      const res = await apiPost({
        action:'checkIn',
        memberId: currentUser.memberId,
        eventId
      });
      showLoading(false);

      if (!res.success) return showToast(res.message || '打卡失敗', 'error');

      document.getElementById('checkinMsg').textContent = res.message || '打卡成功';
      document.getElementById('checkinTime').textContent = '時間：' + (res.checkInTime || '');
      document.getElementById('checkinResult').style.display = 'block';

      showToast('打卡成功', 'success');
      await loadMyRegs();
    }

    function renderProfile() {
      if (!currentUser) return;

      document.getElementById('profileName').textContent = currentUser.name || '';
      document.getElementById('profileId').textContent = '會員編號：' + (currentUser.memberId || '');

      const rows = [
        ['會員編號', currentUser.memberId || ''],
        ['姓名', currentUser.name || ''],
        ['手機', currentUser.phone || currentUser.rawPhone || ''],
        ['性別', currentUser.gender || '未填寫'],
        ['出生日期', currentUser.birthday || '未填寫'],
        ['身分別', currentUser.identity || '未填寫'],
        ['障礙類別', currentUser.disabilityType || '未填寫'],
        ['障礙程度', currentUser.disabilityLevel || '未填寫'],
        ['輔具需求', currentUser.assistiveDevice || '未填寫'],
        ['緊急聯絡人', currentUser.emergencyName || '未填寫'],
        ['緊急聯絡人關係', currentUser.emergencyRelation || '未填寫'],
        ['緊急聯絡電話', currentUser.emergencyPhone || '未填寫'],
        ['身分證號', currentUser.idNumber || '未填寫'],
        ['受益人姓名', currentUser.beneficiary || '未填寫'],
        ['受益人關係', currentUser.beneficiaryRelation || '未填寫'],
        ['投保備註', currentUser.insuranceNote || '未填寫'],
        ['慢性病史', currentUser.chronicDisease || '未填寫'],
        ['用藥狀況', currentUser.medication || '未填寫'],
        ['體能等級', currentUser.fitnessLevel || '未填寫'],
        ['手搖車偏好車型', currentUser.handcycleType || '未填寫'],
        ['手搖車騎乘經驗', currentUser.handcycleLevel || '未填寫'],
        ['適合路線難度', currentUser.handcycleRoute || '未填寫'],
        ['獨木舟舟型偏好', currentUser.kayakType || '未填寫'],
        ['水上活動經驗', currentUser.kayakExp || '未填寫'],
        ['需要教練陪同', currentUser.kayakCoach || '未填寫'],
        ['交通方式偏好', currentUser.transportMode || '未填寫'],
        ['座位需求', currentUser.seatType || '未填寫'],
        ['上車地點偏好', currentUser.pickupLocation || '未填寫'],
        ['飲食偏好', currentUser.mealPref || '未填寫'],
        ['過敏食材', currentUser.foodAllergy || '未填寫'],
        ['醫療需求', currentUser.medicalNeeds || '未填寫'],
        ['會員等級', currentUser.level || '一般會員'],
        ['年費狀態', currentUser.feeStatus || '未繳費'],
        ['LINE 綁定', currentUser.lineBindStatus || '未綁定'],
        ['備註', currentUser.note || '']
      ];

      document.getElementById('profileRows').innerHTML = rows.map(r => `
        <div class="profile-row">
          <div class="profile-key">${escapeHtml(r[0])}</div>
          <div class="profile-val">${escapeHtml(r[1])}</div>
        </div>
      `).join('');

      const paid = String(currentUser.feeStatus || '').includes('已繳');

      document.getElementById('paymentInfo').innerHTML = paid
        ? `
          <div style="font-size:22px;font-weight:900;color:var(--green)">✅ 已完成年費繳納，感謝您的支持！</div>
          <div class="hint">若需更新繳費資料，請聯繫管理員。</div>
        `
        : `
          <div style="font-size:22px;font-weight:900;color:var(--red)">⚠️ 尚未繳費</div>
          <div class="hint">
            年費：NT$850<br>
            銀行：台北富邦銀行（市府分行）<br>
            帳號：411120000136<br>
            戶名：社團法人台北生命勵樂活輔健會<br>
            匯款後請 Line 告知宋老師帳號後 5 碼。
          </div>
        `;
    }

    function showProfileTab(tab) {
      document.querySelectorAll('.sub-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.tab === tab);
      });
      document.querySelectorAll('.sub-panel').forEach(el => el.classList.remove('active'));
      const panel = document.getElementById('tab-' + tab);
      if (panel) panel.classList.add('active');
    }

    function openEditProfile() {
      setVal('editName', currentUser.name || '');
      setVal('editPhone', currentUser.rawPhone || currentUser.phone || '');
      setVal('editGender', currentUser.gender || '');
      setVal('editBirthday', currentUser.birthday || '');
      setVal('editIdentity', currentUser.identity || '一般會員');
      setVal('editDisabilityType', currentUser.disabilityType || '');
      setVal('editDisabilityLevel', currentUser.disabilityLevel || '');
      setVal('editAssistiveDevice', currentUser.assistiveDevice || '');
      setVal('editEmergencyName', currentUser.emergencyName || '');
      setVal('editEmergencyRelation', currentUser.emergencyRelation || '');
      setVal('editEmergencyPhone', currentUser.emergencyPhone || '');

      setVal('editIdNumber', currentUser.idNumber || '');
      setVal('editBeneficiary', currentUser.beneficiary || '');
      setVal('editBeneficiaryRelation', currentUser.beneficiaryRelation || '');
      setVal('editInsuranceNote', currentUser.insuranceNote || '');

      setVal('editChronicDisease', currentUser.chronicDisease || '');
      setVal('editMedication', currentUser.medication || '');
      setVal('editFitnessLevel', currentUser.fitnessLevel || '');

      setVal('editHandcycleType', currentUser.handcycleType || '');
      setVal('editHandcycleLevel', currentUser.handcycleLevel || '');
      setVal('editHandcycleRoute', currentUser.handcycleRoute || '');
      setVal('editKayakType', currentUser.kayakType || '');
      setVal('editKayakExp', currentUser.kayakExp || '');
      setVal('editKayakCoach', currentUser.kayakCoach || '');

      setVal('editTransportMode', currentUser.transportMode || '');
      setVal('editSeatType', currentUser.seatType || '');
      setVal('editPickupLocation', currentUser.pickupLocation || '');
      setVal('editMealPref', currentUser.mealPref || '');
      setVal('editFoodAllergy', currentUser.foodAllergy || '');
      setVal('editMedicalNeeds', currentUser.medicalNeeds || '');
      setVal('editNote', currentUser.note || '');

      showProfileTab('basic');
      openModal('profileModal');
    }
  </script>
</body>
