<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動報名平台</title>
  <script src="https://cdn.jsdelivr.net/npm/@line/liff@2.22.3/dist/liff.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --secondary: #7C3AED;
      --success: #059669;
      --warning: #D97706;
      --danger: #DC2626;
      --neutral: #6B7280;
      --bg: #F9FAFB;
      --white: #ffffff;
      --card-shadow: 0 4px 6px rgba(0,0,0,0.07);
      --card-shadow-hover: 0 12px 24px rgba(0,0,0,0.12);
      --radius: 16px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: #1F2937;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      padding: 16px 20px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(37,99,235,0.3);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header h1 span { font-size: 13px; opacity: 0.85; display: block; font-weight: 400; }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .view-controls {
      max-width: 1200px; margin: 0 auto;
      padding: 16px 20px 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .view-tabs {
      display: flex; background: white;
      border-radius: 12px; padding: 4px;
      box-shadow: var(--card-shadow);
    }
    .view-tab {
      padding: 8px 16px; border: none; background: transparent;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      font-family: inherit; color: var(--neutral);
      transition: all var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .view-tab.active {
      background: var(--primary); color: white;
      box-shadow: 0 2px 8px rgba(37,99,235,0.35);
    }
    .search-filter {
      display: flex; gap: 8px; align-items: center;
    }
    .search-box {
      display: flex; align-items: center;
      background: white; border-radius: 10px;
      padding: 8px 14px; gap: 8px;
      box-shadow: var(--card-shadow);
      border: 1px solid transparent;
      transition: border-color var(--transition);
    }
    .search-box:focus-within { border-color: var(--primary); }
    .search-box input {
      border: none; outline: none; font-size: 14px;
      font-family: inherit; width: 180px; background: transparent;
    }
    .filter-btn {
      background: white; border: none; border-radius: 10px;
      padding: 8px 14px; cursor: pointer; font-size: 13px;
      box-shadow: var(--card-shadow); color: var(--neutral);
      display: flex; align-items: center; gap: 6px;
      transition: all var(--transition);
    }
    .filter-btn:hover { background: var(--primary); color: white; }

    .main { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .activity-card {
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      overflow: hidden;
      background: var(--white);
      cursor: pointer;
      animation: fadeInUp 0.4s ease both;
    }
    .activity-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cover-image {
      width: 100%; height: 180px; object-fit: cover;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 48px;
      position: relative;
    }
    .cover-image img { width: 100%; height: 100%; object-fit: cover; }
    .status-badge {
      position: absolute; top: 12px; right: 12px;
      border-radius: 999px; padding: 4px 12px;
      font-size: 12px; font-weight: 600;
      backdrop-filter: blur(8px);
    }
    .badge-open { background: rgba(5,150,105,0.9); color: white; }
    .badge-soon { background: rgba(217,119,6,0.9); color: white; }
    .badge-closed { background: rgba(220,38,38,0.9); color: white; }
    .badge-draft { background: rgba(107,114,128,0.9); color: white; }
    .badge-ended { background: rgba(55,65,81,0.9); color: white; }
    .card-body { padding: 16px; }
    .card-unit {
      font-size: 11px; color: var(--primary); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .card-title {
      font-size: 16px; font-weight: 700; margin-bottom: 8px;
      line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .card-meta-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--neutral);
    }
    .card-meta-item i { width: 14px; color: var(--primary); }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid #F3F4F6;
    }
    .quota-bar { flex: 1; margin-right: 12px; }
    .quota-text { font-size: 11px; color: var(--neutral); margin-bottom: 4px; }
    .quota-track {
      height: 6px; background: #E5E7EB; border-radius: 3px; overflow: hidden;
    }
    .quota-fill {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--success), #34D399);
      transition: width 0.5s ease;
    }
    .quota-fill.warn { background: linear-gradient(90deg, var(--warning), #FCD34D); }
    .quota-fill.full { background: linear-gradient(90deg, var(--danger), #F87171); }
    .btn-register {
      background: var(--primary); color: white;
      border: none; border-radius: 10px;
      padding: 8px 16px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn-register:hover { background: #1D4ED8; transform: scale(1.03); }
    .btn-register:disabled { background: #9CA3AF; cursor: not-allowed; transform: none; }
    .btn-register.registered { background: var(--success); }
    .btn-register.waitlist { background: var(--warning); }

    .calendar-wrap, .week-wrap, .list-wrap {
      background: white; border-radius: var(--radius); box-shadow: var(--card-shadow); overflow: hidden;
    }
    .cal-header, .week-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: var(--primary); color: white;
    }
    .cal-header h2, .week-header h2 { font-size: 18px; font-weight: 700; }
    .cal-nav {
      background: rgba(255,255,255,0.2); border: none; color: white;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 16px;
    }
    .cal-weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      background: #EFF6FF;
    }
    .cal-weekday {
      text-align: center; padding: 10px 4px;
      font-size: 12px; font-weight: 600; color: var(--primary);
    }
    .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
    .cal-day {
      min-height: 90px; padding: 6px; border: 1px solid #F3F4F6;
      cursor: pointer; transition: background var(--transition);
      position: relative;
    }
    .cal-day:hover { background: #EFF6FF; }
    .cal-day.other-month { background: #FAFAFA; }
    .cal-day.today { background: #EFF6FF; }
    .cal-day.today .day-num { background: var(--primary); color: white; border-radius: 50%; }
    .day-num {
      font-size: 13px; font-weight: 600; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .cal-event {
      font-size: 10px; padding: 2px 6px; border-radius: 4px;
      margin-bottom: 2px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; cursor: pointer;
      background: var(--primary); color: white;
    }
    .cal-event.warning { background: var(--warning); }
    .cal-event.danger { background: var(--danger); }

    .week-days-header {
      display: grid; grid-template-columns: 60px repeat(7, 1fr);
      border-bottom: 2px solid #E5E7EB;
    }
    .week-day-label {
      padding: 10px 6px; text-align: center;
      font-size: 12px; font-weight: 600; color: var(--neutral);
      border-right: 1px solid #F3F4F6;
    }
    .week-day-label.today { color: var(--primary); }
    .week-body { display: grid; grid-template-columns: 60px repeat(7, 1fr); }
    .week-time-col { display: flex; flex-direction: column; }
    .week-time-slot {
      height: 60px; padding: 4px 8px;
      font-size: 11px; color: var(--neutral);
      border-bottom: 1px solid #F9FAFB;
    }
    .week-day-col {
      border-right: 1px solid #F3F4F6;
      position: relative; min-height: 780px;
    }
    .week-event {
      position: absolute; left: 2px; right: 2px;
      background: var(--primary); color: white;
      border-radius: 6px; padding: 4px 6px;
      font-size: 11px; cursor: pointer; overflow: hidden;
    }

    .list-toolbar {
      padding: 16px 20px; border-bottom: 1px solid #F3F4F6;
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .list-filter-select {
      padding: 8px 12px; border: 1px solid #E5E7EB;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: white; color: #374151; cursor: pointer;
    }
    .list-table { width: 100%; border-collapse: collapse; }
    .list-table th {
      padding: 12px 16px; text-align: left;
      background: #F9FAFB; font-size: 12px;
      font-weight: 600; color: var(--neutral);
      border-bottom: 1px solid #E5E7EB; cursor: pointer;
    }
    .list-table td {
      padding: 14px 16px; font-size: 13px;
      border-bottom: 1px solid #F9FAFB; vertical-align: middle;
    }
    .list-pagination {
      padding: 16px 20px; display: flex;
      align-items: center; justify-content: space-between;
      border-top: 1px solid #F3F4F6;
    }
    .page-btn {
      padding: 6px 12px; border: 1px solid #E5E7EB;
      border-radius: 6px; background: white; cursor: pointer;
      font-size: 13px;
    }
    .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none; transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 24px 24px 0 0;
      width: 100%; max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px; background: #E5E7EB;
      border-radius: 2px; margin: 12px auto 0;
    }
    .modal-cover {
      width: 100%; height: 220px; object-fit: cover;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 64px; margin-top: 8px;
    }
    .modal-cover img { width: 100%; height: 100%; object-fit: cover; }
    .modal-body { padding: 20px; }
    .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal-unit { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 16px; }
    .modal-desc { font-size: 14px; line-height: 1.7; color: #374151; margin-bottom: 20px; }
    .modal-info-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .info-item {
      background: #F9FAFB; border-radius: 10px; padding: 12px;
    }
    .info-label { font-size: 11px; color: var(--neutral); margin-bottom: 4px; }
    .info-value { font-size: 13px; font-weight: 600; color: #1F2937; }
    .modal-actions {
      display: flex; gap: 12px; padding: 0 20px 20px;
    }
    .btn-primary {
      flex: 1; background: var(--primary); color: white;
      border: none; border-radius: 12px; padding: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-secondary {
      background: #F3F4F6; color: #374151;
      border: none; border-radius: 12px; padding: 14px 20px;
      font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
    }

    .reg-modal { max-width: 600px; margin: 0 auto; }
    .progress-bar {
      padding: 16px 20px 0;
      display: flex; align-items: center; gap: 8px;
    }
    .progress-step {
      flex: 1; height: 4px; border-radius: 2px;
      background: #E5E7EB; transition: background 0.3s;
    }
    .progress-step.done { background: var(--success); }
    .progress-step.active { background: var(--primary); }
    .progress-label {
      font-size: 12px; color: var(--neutral); text-align: center; margin-top: 6px;
    }
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }
    .form-label .required { color: var(--danger); margin-left: 2px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      font-size: 14px; font-family: inherit; background: white;
    }
    .form-input.error, .form-textarea.error { border-color: var(--danger); }
    .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }
    .form-textarea { resize: vertical; min-height: 80px; }
    .radio-group, .checkbox-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-item, .checkbox-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border: 1.5px solid #E5E7EB;
      border-radius: 10px; cursor: pointer;
    }
    .radio-item.selected, .checkbox-item.selected {
      border-color: var(--primary); background: #EFF6FF;
    }
    .rating-stars { display: flex; gap: 8px; }
    .star { font-size: 28px; cursor: pointer; color: #E5E7EB; }
    .star.active { color: #F59E0B; }
    .scale-wrap { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .scale-btn {
      width: 36px; height: 36px; border: 1.5px solid #E5E7EB;
      border-radius: 8px; background: white; cursor: pointer;
      font-size: 13px; font-weight: 600;
    }
    .scale-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    .confirm-item {
      padding: 12px; background: #F9FAFB; border-radius: 10px; margin-bottom: 10px;
    }
    .confirm-q { font-size: 12px; color: var(--neutral); margin-bottom: 4px; }
    .confirm-a { font-size: 14px; font-weight: 600; color: #1F2937; }

    .success-screen {
      text-align: center; padding: 40px 20px;
    }
    .success-icon {
      width: 80px; height: 80px; background: #D1FAE5;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 36px;
    }
    .success-title { font-size: 22px; font-weight: 700; color: var(--success); margin-bottom: 8px; }
    .success-subtitle { font-size: 14px; color: var(--neutral); margin-bottom: 24px; }
    .reg-id-box {
      background: #EFF6FF; border-radius: 12px; padding: 16px; margin-bottom: 24px;
    }
    .reg-id-label { font-size: 12px; color: var(--neutral); margin-bottom: 4px; }
    .reg-id-value { font-size: 20px; font-weight: 700; color: var(--primary); letter-spacing: 2px; }

    .toast-container {
      position: fixed; top: 80px; right: 20px;
      z-index: 300; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: white; border-radius: 12px; padding: 12px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      display: flex; align-items: center; gap: 10px;
      min-width: 260px; max-width: 320px;
      border-left: 4px solid var(--primary);
    }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    .toast.warning { border-color: var(--warning); }

    .filter-panel {
      background: white; border-radius: var(--radius);
      box-shadow: var(--card-shadow); padding: 16px 20px;
      margin-bottom: 16px; display: none;
    }
    .filter-panel.open { display: block; }
    .filter-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 12px; font-weight: 600; color: var(--neutral); }
    .filter-group select, .filter-group input {
      padding: 8px 12px; border: 1px solid #E5E7EB;
      border-radius: 8px; font-size: 13px; font-family: inherit;
      background: white;
    }
    .tag-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
    .tag {
      padding: 4px 12px; border-radius: 999px;
      font-size: 12px; cursor: pointer;
      border: 1.5px solid #E5E7EB; background: white;
    }
    .tag.active { background: var(--primary); color: white; border-color: var(--primary); }

    .my-reg-section { margin-top: 24px; }
    .section-title {
      font-size: 18px; font-weight: 700; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .my-reg-card {
      background: white; border-radius: var(--radius);
      box-shadow: var(--card-shadow); padding: 16px;
      margin-bottom: 12px; display: flex; align-items: center; gap: 14px;
    }
    .my-reg-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 20px; flex-shrink: 0;
    }
    .my-reg-info { flex: 1; }
    .my-reg-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .my-reg-meta { font-size: 12px; color: var(--neutral); }
    .my-reg-status {
      padding: 4px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
    }
    .status-confirmed { background: #D1FAE5; color: var(--success); }
    .status-pending { background: #FEF3C7; color: var(--warning); }
    .status-waitlist { background: #E0E7FF; color: var(--secondary); }
    .status-cancelled { background: #FEE2E2; color: var(--danger); }
    .status-attended { background: #DCFCE7; color: #15803D; }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid #F3F4F6;
      display: flex; padding: 8px 0;
      padding-bottom: calc(8px + env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 4px; cursor: pointer;
      padding: 4px; color: var(--neutral); font-size: 10px; font-weight: 500;
      border: none; background: transparent; font-family: inherit;
    }
    .nav-item.active { color: var(--primary); }
    .nav-item i { font-size: 20px; }
    .content-pad { padding-bottom: 80px; }

    @media (min-width: 768px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .bottom-nav { display: none; }
      .content-pad { padding-bottom: 20px; }
    }
    @media (min-width: 1024px) {
      .card-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <h1>
      <i class="fas fa-calendar-check"></i> 活動報名平台
      <span id="headerSubtitle">載入中...</span>
    </h1>
    <div class="user-avatar" id="userAvatar" onclick="showUserMenu()">
      <i class="fas fa-user"></i>
    </div>
  </div>
</header>

<div class="toast-container" id="toastContainer"></div>

<div class="view-controls" id="viewControls">
  <div class="view-tabs">
    <button class="view-tab active" onclick="switchView('card')" id="tab-card"><i class="fas fa-th-large"></i> 卡牌</button>
    <button class="view-tab" onclick="switchView('calendar')" id="tab-calendar"><i class="fas fa-calendar"></i> 月曆</button>
    <button class="view-tab" onclick="switchView('week')" id="tab-week"><i class="fas fa-calendar-week"></i> 週</button>
    <button class="view-tab" onclick="switchView('list')" id="tab-list"><i class="fas fa-list"></i> 清單</button>
  </div>
  <div class="search-filter">
    <div class="search-box">
      <i class="fas fa-search" style="color:var(--neutral);font-size:13px"></i>
      <input type="text" id="searchInput" placeholder="搜尋活動..." oninput="handleSearch(this.value)">
    </div>
    <button class="filter-btn" onclick="toggleFilter()">
      <i class="fas fa-sliders-h"></i> 篩選
    </button>
  </div>
</div>

<div class="main">
  <div class="filter-panel" id="filterPanel">

const DEMO_ACTIVITIES = [

    registerDeadline:'2026-07-03T23:59', maxParticipants:80, currentParticipants:45,

  },

    location:'中正區樂齡中心', startDate:'2026-06-20T14:00', endDate:'2026-06-20T17:00',

const DEMO_REGISTRATIONS = [
  { registrationId:'REG20260001', activityId:'ACT001', title:'2026 夏季志工培訓營', registeredAt:'2026-06-01', status:'confirmed' },
  { registrationId:'REG20260002', activityId:'ACT003', title:'職涯探索工作坊', registeredAt:'2026-06-05', status:'pending' }
];

async function init() {
  try {
    if (CONFIG.DEMO_MODE) {
      state.user = { userId:'U_DEMO', displayName:'示範用戶', pictureUrl:'' };
      state.token = 'demo';
    } else {
      await liff.init({ liffId: CONFIG.LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();
      const res = await apiCall('POST', '/auth/login', {
        lineUid: profile.userId,
        displayName: profile.displayName,
        pictureUrl: profile.pictureUrl,
        accessToken: liff.getAccessToken()
      });
      if (!res.success) throw new Error(res.error || '登入失敗');
      state.user = res.user;
      state.token = res.token || '';
      localStorage.setItem('auth_token', state.token);
    }

    updateHeader();
    await loadActivities();
  } catch (e) {
    console.error(e);
    showToast('初始化失敗，切換為示範模式', 'warning');
    state.user = { userId:'U_DEMO', displayName:'訪客', pictureUrl:'' };
    state.token = 'demo';
    updateHeader();
    state.activities = [...DEMO_ACTIVITIES];
    state.filteredActivities = [...DEMO_ACTIVITIES];
    state.registrations = [...DEMO_REGISTRATIONS];
    populateFilterOptions();
    renderCurrentView();
  }
}

function updateHeader() {
  document.getElementById('headerSubtitle').textContent =
    state.user ? `歡迎，${state.user.displayName || '使用者'}` : '請登入';

  if (state.user && state.user.pictureUrl) {
    document.getElementById('userAvatar').innerHTML = `<img src="${state.user.pictureUrl}" alt="avatar">`;
  } else {
    document.getElementById('userAvatar').innerHTML = `<i class="fas fa-user"></i>`;
  }
}

async function apiCall(method, path, body = null) {
  if (CONFIG.DEMO_MODE) {
    return demoApiHandler(method, path, body);
  }

  const token = localStorage.getItem('auth_token') || state.token || '';
  const res = await fetch(CONFIG.GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ method, path, body, token })
  });

  return res.json();
}

function demoApiHandler(method, path, body) {
  if (path === '/activities' && method === 'GET') {
    return { success: true, data: DEMO_ACTIVITIES };
  }
  if (path === '/my-registrations' && method === 'GET') {
    return { success: true, data: DEMO_REGISTRATIONS };
  }
  if (path.startsWith('/activities/') && path.endsWith('/questions') && method === 'GET') {
    return { success: true, data: getDemoQuestions() };
  }
  if (path === '/registrations' && method === 'POST') {
    const isWaitlist = state.currentActivity && state.currentActivity.maxParticipants > 0 && state.currentActivity.currentParticipants >= state.currentActivity.maxParticipants;
    return {
      success: true,
      registrationId: 'REG' + Date.now(),
      status: isWaitlist ? 'waitlist' : 'pending',
      isWaitlist
    };
  }
  if (path.startsWith('/registrations/') && method === 'DELETE') {
    return { success: true };
  }
  return { success: true, data: [] };
}

function getDemoQuestions() {
  return [
    { questionId:'Q1', questionText:'您的姓名', questionType:'TEXT', isRequired:true, placeholder:'請輸入真實姓名' },
    { questionId:'Q2', questionText:'聯絡電話', questionType:'TEXT', isRequired:true, placeholder:'09xx-xxxxxx' },
    { questionId:'Q3', questionText:'電子郵件', questionType:'TEXT', isRequired:true, placeholder:'example@email.com' },
    { questionId:'Q4', questionText:'您是否曾參加過本單位活動？', questionType:'SINGLE_CHOICE', isRequired:true, options:['是，曾參加過','否，這是第一次'] },
    { questionId:'Q5', questionText:'您對哪些主題感興趣？（可複選）', questionType:'MULTIPLE_CHOICE', isRequired:false, options:['志工服務','職涯發展','文化藝術','環境保護','社區關懷'] },
    { questionId:'Q6', questionText:'您對本次活動的期待程度', questionType:'RATING', isRequired:false },
    { questionId:'Q7', questionText:'其他備註或特殊需求', questionType:'TEXTAREA', isRequired:false, placeholder:'如有飲食禁忌、行動不便等需求，請在此說明' }
  ];
}

async function loadActivities() {
  const res = await apiCall('GET', '/activities');
  if (res.success) {
    state.activities = Array.isArray(res.data) ? res.data : [];
    state.filteredActivities = [...state.activities];
  } else {
    throw new Error(res.error || '活動載入失敗');
  }

  const regRes = await apiCall('GET', '/my-registrations');
  if (regRes.success) {
    state.registrations = Array.isArray(regRes.data) ? regRes.data : [];
  } else {
    state.registrations = [];
  }

  populateFilterOptions();
  renderCurrentView();
}

function populateFilterOptions() {
  const units = [...new Set(state.activities.map(a => a.unitName).filter(Boolean))];
  const tags  = [...new Set(state.activities.flatMap(a => a.tags || []))];

  const filterUnit = document.getElementById('filterUnit');
  const listUnitFilter = document.getElementById('listUnitFilter');
  filterUnit.innerHTML = '<option value="">全部單位</option>';
  listUnitFilter.innerHTML = '<option value="">全部單位</option>';

  units.forEach(u => {
    filterUnit.innerHTML += `<option value="${u}">${u}</option>`;
    listUnitFilter.innerHTML += `<option value="${u}">${u}</option>`;
  });

  const tagFilter = document.getElementById('tagFilter');
  tagFilter.innerHTML = '';
  tags.forEach(t => {
    const el = document.createElement('span');
    el.className = 'tag';
    el.textContent = t;
    el.onclick = () => toggleTag(t, el);
    tagFilter.appendChild(el);
  });
}

function switchView(view) {
  state.currentView = view;
  ['card','calendar','week','list'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === view ? 'block' : 'none';
    document.getElementById(`tab-${v}`).classList.toggle('active', v === view);
  });
  renderCurrentView();
}

function renderCurrentView() {
  if (document.getElementById('myRegSection').style.display === 'block') return;

  ['card','calendar','week','list'].forEach(v => {
    document.getElementById(`view-${v}`).style.display = v === state.currentView ? 'block' : 'none';
  });

  switch (state.currentView) {
    case 'calendar': renderCalendarView(); break;
    case 'week': renderWeekView(); break;
    case 'list': renderListView(); break;
    default: renderCardView();
  }
}

function getStatusInfo(act) {
  const now = new Date();

  if (act.status === 'draft') return { status:'draft', label:'草稿', cls:'badge-draft', canReg:false };
  if (act.status === 'ended') return { status:'ended', label:'已結束', cls:'badge-ended', canReg:false };

  const deadline = act.registerDeadline ? new Date(act.registerDeadline) : null;
  if (act.status === 'closed' || (deadline && now > deadline)) {
    return { status:'closed', label:'已截止', cls:'badge-closed', canReg:false };
  }

  if (act.status === 'soon') return { status:'soon', label:'即將截止', cls:'badge-soon', canReg:true };

  if (deadline) {
    const hoursLeft = (deadline - now) / 36e5;
    if (hoursLeft <= 72 && hoursLeft >= 0) {
      return { status:'soon', label:'即將截止', cls:'badge-soon', canReg:true };
    }
  }

  return { status:'open', label:'開放報名', cls:'badge-open', canReg:true };
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDateFull(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function isRegistered(activityId) {
  return state.registrations.some(r => r.activityId === activityId && r.status !== 'cancelled');
}

function renderCardView() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';

  const acts = state.filteredActivities;
  if (!acts.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--neutral)">
      <i class="fas fa-calendar-times" style="font-size:48px;margin-bottom:16px;display:block"></i>
      沒有符合條件的活動</div>`;
    return;
  }

  acts.forEach((act, i) => grid.appendChild(createActivityCard(act, i)));
}

function createActivityCard(act, index) {
  const card = document.createElement('div');
  card.className = 'activity-card';
  card.style.animationDelay = `${index * 50}ms`;

  const si = getStatusInfo(act);
  const pct = act.maxParticipants > 0 ? Math.round(act.currentParticipants / act.maxParticipants * 100) : 0;
  const quotaClass = pct >= 100 ? 'full' : pct >= 80 ? 'warn' : '';
  const quotaText = act.maxParticipants > 0 ? `${act.currentParticipants}/${act.maxParticipants} 人` : `${act.currentParticipants} 人（不限）`;
  const registered = isRegistered(act.activityId);

  let btnLabel = '立即報名';
  let btnClass = 'btn-register';
  if (registered) {
    btnLabel = '已報名';
    btnClass += ' registered';
  } else if (act.maxParticipants > 0 && act.currentParticipants >= act.maxParticipants) {
    btnLabel = '候補報名';
    btnClass += ' waitlist';
  }

  card.innerHTML = `
    <div class="cover-image" style="background:${act.coverColor || 'linear-gradient(135deg,#667eea,#764ba2)'}">
      ${act.coverImageUrl ? `<img src="${act.coverImageUrl}" alt="${escapeHtml(act.title)}">` : `<span style="font-size:56px">${act.coverEmoji || '🎪'}</span>`}
      <span class="status-badge ${si.cls}">${si.label}</span>
    </div>
    <div class="card-body">
      <div class="card-unit">${act.unitName || '未分類單位'}</div>
      <div class="card-title">${escapeHtml(act.title || '')}</div>
      <div class="card-meta">
        <div class="card-meta-item"><i class="fas fa-calendar"></i>${formatDate(act.startDate)}</div>
        <div class="card-meta-item"><i class="fas fa-map-marker-alt"></i>${escapeHtml(act.location || '未提供')}</div>
        <div class="card-meta-item"><i class="fas fa-clock"></i>截止：${formatDate(act.registerDeadline)}</div>
      </div>
      <div class="card-footer">
        <div class="quota-bar">
          <div class="quota-text">報名人數：${quotaText}</div>
          ${act.maxParticipants > 0 ? `<div class="quota-track"><div class="quota-fill ${quotaClass}" style="width:${Math.min(pct, 100)}%"></div></div>` : ''}
        </div>
        <button class="${btnClass}" onclick="event.stopPropagation();handleRegisterClick('${act.activityId}')" ${!si.canReg && !registered ? 'disabled' : ''}>${btnLabel}</button>
      </div>
    </div>
  `;
  card.onclick = () => openActivityDetail(act);
  return card;
}

function renderCalendarView() {
  const d = state.calDate;
  const y = d.getFullYear();
  const m = d.getMonth();
  document.getElementById('calTitle').textContent = `${y}年${m + 1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const today = new Date();
  const container = document.getElementById('calDays');
  container.innerHTML = '';

  const prevDays = new Date(y, m, 0).getDate();
  for (let i = firstDay - 1; i >= 0; i--) {
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.innerHTML = `<div class="day-num" style="color:#D1D5DB">${prevDays - i}</div>`;
    container.appendChild(cell);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement('div');
    const isToday = today.getFullYear() === y && today.getMonth() === m && today.getDate() === day;
    cell.className = 'cal-day' + (isToday ? ' today' : '');

    const dateStr = `${y}-${String(m + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayActs = state.filteredActivities.filter(a => (a.startDate || '').substring(0, 10) === dateStr);

    let html = `<div class="day-num">${day}</div>`;
    dayActs.slice(0, 3).forEach(a => {
      const si = getStatusInfo(a);
      const cls = si.status === 'soon' ? 'warning' : si.status === 'closed' ? 'danger' : '';
      html += `<div class="cal-event ${cls}" onclick="event.stopPropagation();openActivityDetailById('${a.activityId}')">${escapeHtml(a.title)}</div>`;
    });

    if (dayActs.length > 3) {
      html += `<div style="font-size:10px;color:var(--neutral)">+${dayActs.length - 3} 更多</div>`;
    }

    cell.innerHTML = html;
    cell.onclick = () => {
      if (dayActs.length === 1) openActivityDetail(dayActs[0]);
    };
    container.appendChild(cell);
  }

  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.innerHTML = `<div class="day-num" style="color:#D1D5DB">${i}</div>`;
    container.appendChild(cell);
  }
}

function prevMonth() {
  state.calDate = new Date(state.calDate.getFullYear(), state.calDate.getMonth() - 1, 1);
  renderCalendarView();
}
function nextMonth() {
  state.calDate = new Date(state.calDate.getFullYear(), state.calDate.getMonth() + 1, 1);
  renderCalendarView();
}

function renderWeekView() {
  const base = new Date(state.weekDate);
  const day = base.getDay();
  const sunday = new Date(base);
  sunday.setDate(base.getDate() - day);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + i);
    return d;
  });

  const today = new Date();
  const hdr = document.getElementById('weekDaysHeader');
  hdr.innerHTML = '<div class="week-day-label" style="background:#F9FAFB"></div>';

  days.forEach(d => {
    const isToday = d.toDateString() === today.toDateString();
    hdr.innerHTML += `<div class="week-day-label ${isToday ? 'today' : ''}">
      <div>${['日','一','二','三','四','五','六'][d.getDay()]}</div>
      <div style="font-size:16px;font-weight:700;color:${isToday ? 'var(--primary)' : '#1F2937'}">${d.getDate()}</div>
    </div>`;
  });

  document.getElementById('weekTitle').textContent =
    `${days[0].getMonth()+1}/${days[0].getDate()} — ${days[6].getMonth()+1}/${days[6].getDate()}`;

  const body = document.getElementById('weekBody');
  body.innerHTML = '';

  const timeCol = document.createElement('div');
  timeCol.className = 'week-time-col';
  for (let h = 8; h <= 20; h++) {
    const slot = document.createElement('div');
    slot.className = 'week-time-slot';
    slot.textContent = `${String(h).padStart(2,'0')}:00`;
    timeCol.appendChild(slot);
  }
  body.appendChild(timeCol);

  days.forEach(d => {
    const col = document.createElement('div');
    col.className = 'week-day-col';

    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const dayActs = state.filteredActivities.filter(a => (a.startDate || '').substring(0, 10) === dateStr);

    dayActs.forEach(a => {
      const start = new Date(a.startDate);
      const end = new Date(a.endDate || a.startDate);
      const startMinutes = (start.getHours() - 8) * 60 + start.getMinutes();
      const endMinutes = (end.getHours() - 8) * 60 + end.getMinutes();
      const top = Math.max(0, startMinutes);
      const height = Math.max(30, endMinutes - startMinutes);

      const ev = document.createElement('div');
      ev.className = 'week-event';
      ev.style.top = `${top}px`;
      ev.style.height = `${height}px`;
      ev.innerHTML = `<div style="font-weight:600">${escapeHtml(a.title)}</div><div>${escapeHtml(a.location || '')}</div>`;
      ev.onclick = () => openActivityDetail(a);
      col.appendChild(ev);
    });

    body.appendChild(col);
  });
}

function prevWeek() {
  const d = new Date(state.weekDate);
  d.setDate(d.getDate() - 7);
  state.weekDate = d;
  renderWeekView();
}
function nextWeek() {
  const d = new Date(state.weekDate);
  d.setDate(d.getDate() + 7);
  state.weekDate = d;
  renderWeekView();
}

function renderListView() {
  const PAGE_SIZE = 20;
  let acts = [...state.filteredActivities];

  const statusF = document.getElementById('listStatusFilter').value;
  const unitF = document.getElementById('listUnitFilter').value;

  if (statusF) {
    acts = acts.filter(a => getStatusInfo(a).status === statusF);
  }
  if (unitF) {
    acts = acts.filter(a => a.unitName === unitF);
  }

  acts.sort((a, b) => {
    let va, vb;

    if (state.listSort.field === 'unit') {
      va = a.unitName || '';
      vb = b.unitName || '';
      return state.listSort.dir === 'asc' ? va.localeCompare(vb, 'zh-Hant') : vb.localeCompare(va, 'zh-Hant');
    }

    if (state.listSort.field === 'startDate' || state.listSort.field === 'registerDeadline') {
      va = new Date(a[state.listSort.field] || 0).getTime();
      vb = new Date(b[state.listSort.field] || 0).getTime();
      return state.listSort.dir === 'asc' ? va - vb : vb - va;
    }

    va = String(a[state.listSort.field] || '');
    vb = String(b[state.listSort.field] || '');
    return state.listSort.dir === 'asc' ? va.localeCompare(vb, 'zh-Hant') : vb.localeCompare(va, 'zh-Hant');
  });

  document.getElementById('listCount').textContent = `共 ${acts.length} 筆`;

  const total = Math.ceil(acts.length / PAGE_SIZE);
  const page = Math.min(state.listPage, total || 1);
  const slice = acts.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  const tbody = document.getElementById('listBody');
  tbody.innerHTML = '';
    slice.forEach(act => {
    const si = getStatusInfo(act);
    const registered = isRegistered(act.activityId);
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td><strong style="cursor:pointer;color:var(--primary)" onclick="openActivityDetailById('${act.activityId}')">${escapeHtml(act.title)}</strong></td>
      <td>${escapeHtml(act.unitName || '—')}</td>
      <td>${formatDateFull(act.startDate)}</td>
      <td>${formatDateFull(act.registerDeadline)}</td>
      <td><span class="status-badge ${si.cls}" style="position:static">${si.label}</span></td>
      <td>${act.currentParticipants}${act.maxParticipants > 0 ? '/' + act.maxParticipants : ' (不限)'}</td>
      <td>
        <button class="btn-register" style="padding:6px 12px;font-size:12px"
          onclick="handleRegisterClick('${act.activityId}')"
          ${!si.canReg && !registered ? 'disabled' : ''}>
          ${registered ? '已報名' : '報名'}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  const pg = document.getElementById('listPagination');
  let pageHtml = `<span style="font-size:13px;color:var(--neutral)">第 ${page}/${total || 1} 頁</span><div style="display:flex;gap:4px">`;
  for (let i = 1; i <= total; i++) {
    pageHtml += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="state.listPage=${i};renderListView()">${i}</button>`;
  }
  pageHtml += `</div>`;
  pg.innerHTML = pageHtml;
}

function sortList(field) {
  if (state.listSort.field === field) {
    state.listSort.dir = state.listSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    state.listSort.field = field;
    state.listSort.dir = 'asc';
  }
  renderListView();
}

function applyListFilter() {
  state.listPage = 1;
  renderListView();
}

function handleSearch(q) {
  state.searchQuery = (q || '').toLowerCase();
  applyFilters();
}

function toggleFilter() {
  document.getElementById('filterPanel').classList.toggle('open');
}

function toggleTag(tag, el) {
  const idx = state.filters.tags.indexOf(tag);
  if (idx > -1) {
    state.filters.tags.splice(idx, 1);
    el.classList.remove('active');
  } else {
    state.filters.tags.push(tag);
    el.classList.add('active');
  }
  applyFilters();
}

function applyFilters() {
  const status = document.getElementById('filterStatus').value;
  const unit   = document.getElementById('filterUnit').value;
  const from   = document.getElementById('filterDateFrom').value;
  const to     = document.getElementById('filterDateTo').value;

  state.filteredActivities = state.activities.filter(a => {
    const title = (a.title || '').toLowerCase();
    const desc = (a.description || '').toLowerCase();

    if (state.searchQuery && !title.includes(state.searchQuery) && !desc.includes(state.searchQuery)) return false;
    if (status && getStatusInfo(a).status !== status) return false;
    if (unit && a.unitName !== unit) return false;
    if (from && (a.startDate || '').substring(0, 10) < from) return false;
    if (to && (a.startDate || '').substring(0, 10) > to) return false;
    if (state.filters.tags.length && !state.filters.tags.some(t => (a.tags || []).includes(t))) return false;

    return true;
  });

  state.listPage = 1;
  renderCurrentView();
}

function openActivityDetailById(activityId) {
  const act = state.activities.find(a => a.activityId === activityId);
  if (act) openActivityDetail(act);
}

function openActivityDetail(act) {
  if (!act) return;
  state.currentActivity = act;

  const si = getStatusInfo(act);
  const remaining = act.maxParticipants > 0 ? `${Math.max(0, act.maxParticipants - act.currentParticipants)} 名` : '不限';

  const cover = document.getElementById('modalCover');
  cover.style.background = act.coverColor || 'linear-gradient(135deg,#667eea,#764ba2)';
  cover.innerHTML = act.coverImageUrl
    ? `<img src="${act.coverImageUrl}" alt="${escapeHtml(act.title)}">`
    : `<span style="font-size:64px">${act.coverEmoji || '🎪'}</span>`;

  document.getElementById('modalUnit').textContent = act.unitName || '未分類單位';
  document.getElementById('modalTitle').textContent = act.title || '';
  document.getElementById('modalDesc').textContent = act.description || '';
  document.getElementById('modalStart').textContent = formatDateFull(act.startDate);
  document.getElementById('modalEnd').textContent = formatDateFull(act.endDate);
  document.getElementById('modalLocation').textContent = act.location || '未提供';
  document.getElementById('modalQuota').textContent = remaining;
  document.getElementById('modalDeadline').textContent = formatDateFull(act.registerDeadline);

  const regBtn = document.getElementById('modalRegBtn');
  const registered = isRegistered(act.activityId);

  if (registered) {
    regBtn.textContent = '已報名';
    regBtn.disabled = false;
    regBtn.style.background = 'var(--success)';
  } else if (!si.canReg) {
    regBtn.textContent = '報名已截止';
    regBtn.disabled = true;
    regBtn.style.background = '#9CA3AF';
  } else if (act.maxParticipants > 0 && act.currentParticipants >= act.maxParticipants) {
    regBtn.textContent = '候補報名';
    regBtn.disabled = false;
    regBtn.style.background = 'var(--warning)';
  } else {
    regBtn.textContent = '立即報名';
    regBtn.disabled = false;
    regBtn.style.background = 'var(--primary)';
  }

  openModal('detailModal');
}

async function handleRegisterClick(activityId) {
  const act = state.activities.find(a => a.activityId === activityId);
  if (!act) return;

  state.currentActivity = act;

  if (isRegistered(activityId)) {
    openActivityDetail(act);
    return;
  }

  closeModal('detailModal');
  await startRegistration();
}

async function startRegistration() {
  if (!state.currentActivity) return;

  closeModal('detailModal');

  const res = await apiCall('GET', `/activities/${state.currentActivity.activityId}/questions`);
  state.regQuestions = Array.isArray(res.data) ? res.data : [];
  state.regAnswers = {};
  state.regStep = 1;

  renderRegForm();
  openModal('regModal');
}

function renderRegForm() {
  const act = state.currentActivity;
  const qs = state.regQuestions;
  const totalSteps = 3;

  let html = `
    <div style="padding:16px 20px 0">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <h3 style="font-size:16px;font-weight:700">報名：${escapeHtml(act.title)}</h3>
        <button onclick="closeModal('regModal')" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--neutral)">✕</button>
      </div>
      <div class="progress-bar">
        ${Array.from({ length: totalSteps }, (_, i) => `<div class="progress-step ${i + 1 < state.regStep ? 'done' : i + 1 === state.regStep ? 'active' : ''}"></div>`).join('')}
      </div>
      <div class="progress-label">步驟 ${state.regStep} / ${totalSteps}</div>
    </div>
  `;

  if (state.regStep === 1) {
    html += `
      <div style="padding:20px">
        <div style="background:#EFF6FF;border-radius:12px;padding:16px;margin-bottom:20px">
          <div style="font-size:14px;font-weight:700;margin-bottom:8px">📋 活動資訊確認</div>
          <div style="font-size:13px;color:#374151;line-height:1.8">
            <div>📅 時間：${formatDateFull(act.startDate)} ~ ${formatDateFull(act.endDate)}</div>
            <div>📍 地點：${escapeHtml(act.location || '未提供')}</div>
            <div>⏰ 截止：${formatDateFull(act.registerDeadline)}</div>
            <div>👥 名額：${act.maxParticipants > 0 ? act.maxParticipants + '人' : '不限'}</div>
          </div>
        </div>
        <div style="background:#FEF3C7;border-radius:10px;padding:12px;font-size:12px;color:#92400E;margin-bottom:20px">
          ⚠️ 報名後如需取消，請至少於活動前 24 小時辦理，以免影響候補者權益。
        </div>
        <button class="btn-primary" onclick="state.regStep=2;renderRegForm()">下一步：填寫報名資料</button>
      </div>
    `;
  } else if (state.regStep === 2) {
    html += `<div style="padding:20px">`;
    qs.forEach(q => { html += renderQuestion(q); });
    html += `
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn-secondary" onclick="state.regStep=1;renderRegForm()">上一步</button>
        <button class="btn-primary" onclick="validateAndNext()">下一步：確認資料</button>
      </div>
    </div>`;
  } else if (state.regStep === 3) {
    html += `<div style="padding:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px">📝 請確認您的報名資料</div>`;
    qs.forEach(q => {
      const ans = state.regAnswers[q.questionId];
      const ansText = Array.isArray(ans) ? ans.join('、') : (ans || '（未填寫）');
      html += `
        <div class="confirm-item">
          <div class="confirm-q">${escapeHtml(q.questionText)}</div>
          <div class="confirm-a">${escapeHtml(String(ansText))}</div>
        </div>
      `;
    });
    html += `
      <div style="display:flex;gap:12px;margin-top:16px">
        <button class="btn-secondary" onclick="state.regStep=2;renderRegForm()">修改</button>
        <button class="btn-primary" id="submitRegBtn" onclick="submitRegistration()">✅ 確認送出報名</button>
      </div>
    </div>`;
  }

  document.getElementById('regFormContent').innerHTML = html;
  if (state.regStep === 2) restoreAnswers();
}

function renderQuestion(q) {
  let input = '';

  switch (q.questionType) {
    case 'TEXT':
      input = `<input class="form-input" id="q_${q.questionId}" type="text" placeholder="${escapeAttr(q.placeholder || '')}" oninput="state.regAnswers['${q.questionId}']=this.value">`;
      break;
    case 'TEXTAREA':
      input = `<textarea class="form-textarea" id="q_${q.questionId}" placeholder="${escapeAttr(q.placeholder || '')}" oninput="state.regAnswers['${q.questionId}']=this.value"></textarea>`;
      break;
    case 'SINGLE_CHOICE':
      input = `<div class="radio-group">` +
        (q.options || []).map(opt => `
          <div class="radio-item" id="ri_${q.questionId}_${encodeKey(opt)}" onclick="selectRadio('${q.questionId}', ${JSON.stringify(opt)})">
            <i class="fas fa-circle" style="font-size:10px;color:var(--neutral)" id="ri_icon_${q.questionId}_${encodeKey(opt)}"></i>
            <span>${escapeHtml(opt)}</span>
          </div>`).join('') + `</div>`;
      break;
    case 'MULTIPLE_CHOICE':
      input = `<div class="checkbox-group">` +
        (q.options || []).map(opt => `
          <div class="checkbox-item" id="ci_${q.questionId}_${encodeKey(opt)}" onclick="toggleCheckbox('${q.questionId}', ${JSON.stringify(opt)})">
            <i class="fas fa-square" style="font-size:12px;color:var(--neutral)" id="ci_icon_${q.questionId}_${encodeKey(opt)}"></i>
            <span>${escapeHtml(opt)}</span>
          </div>`).join('') + `</div>`;
      break;
    case 'DROPDOWN':
      input = `<select class="form-select" id="q_${q.questionId}" onchange="state.regAnswers['${q.questionId}']=this.value">
        <option value="">請選擇...</option>
        ${(q.options || []).map(o => `<option value="${escapeAttr(o)}">${escapeHtml(o)}</option>`).join('')}
      </select>`;
      break;
    case 'RATING':
      input = `<div class="rating-stars" id="stars_${q.questionId}">
        ${[1,2,3,4,5].map(n => `<span class="star" onclick="setRating('${q.questionId}',${n})">★</span>`).join('')}
      </div>`;
      break;
    case 'SCALE':
      input = `<div class="scale-wrap">
        ${Array.from({ length: 10 }, (_, i) => `<button type="button" class="scale-btn" id="sc_${q.questionId}_${i+1}" onclick="setScale('${q.questionId}',${i+1})">${i+1}</button>`).join('')}
      </div>`;
      break;
    case 'DATE':
      input = `<input class="form-input" id="q_${q.questionId}" type="date" onchange="state.regAnswers['${q.questionId}']=this.value">`;
      break;
    default:
      input = `<input class="form-input" id="q_${q.questionId}" type="text" oninput="state.regAnswers['${q.questionId}']=this.value">`;
  }

  return `
    <div class="form-group" id="fg_${q.questionId}">
      <label class="form-label">${escapeHtml(q.questionText)}${q.isRequired ? '<span class="required">*</span>' : ''}</label>
      ${input}
      <div class="form-error" id="err_${q.questionId}" style="display:none"></div>
    </div>
  `;
}

function restoreAnswers() {
  state.regQuestions.forEach(q => {
    const ans = state.regAnswers[q.questionId];
    if (ans === undefined || ans === null || ans === '') return;

    if (['TEXT','TEXTAREA','DROPDOWN','DATE'].includes(q.questionType)) {
      const el = document.getElementById(`q_${q.questionId}`);
      if (el) el.value = ans;
    } else if (q.questionType === 'SINGLE_CHOICE') {
      selectRadio(q.questionId, ans, true);
    } else if (q.questionType === 'MULTIPLE_CHOICE' && Array.isArray(ans)) {
      ans.forEach(v => toggleCheckbox(q.questionId, v, true));
    } else if (q.questionType === 'RATING') {
      setRating(q.questionId, ans, true);
    } else if (q.questionType === 'SCALE') {
      setScale(q.questionId, ans, true);
    }
  });
}

function selectRadio(qId, val, silent = false) {
  const q = state.regQuestions.find(x => x.questionId === qId);
  if (!q) return;

  (q.options || []).forEach(opt => {
    const key = encodeKey(opt);
    const el = document.getElementById(`ri_${qId}_${key}`);
    const ic = document.getElementById(`ri_icon_${qId}_${key}`);
    const active = opt === val;

    if (el) el.classList.toggle('selected', active);
    if (ic) {
      ic.className = active ? 'fas fa-dot-circle' : 'fas fa-circle';
      ic.style.color = active ? 'var(--primary)' : 'var(--neutral)';
    }
  });

  if (!silent) state.regAnswers[qId] = val;
}

function toggleCheckbox(qId, val, silent = false) {
  if (!Array.isArray(state.regAnswers[qId])) state.regAnswers[qId] = [];
  const arr = state.regAnswers[qId];

  if (!silent) {
    const idx = arr.indexOf(val);
    if (idx > -1) arr.splice(idx, 1);
    else arr.push(val);
  }

  const key = encodeKey(val);
  const el = document.getElementById(`ci_${qId}_${key}`);
  const ic = document.getElementById(`ci_icon_${qId}_${key}`);
  const active = arr.includes(val);

  if (el) el.classList.toggle('selected', active);
  if (ic) {
    ic.className = active ? 'fas fa-check-square' : 'fas fa-square';
    ic.style.color = active ? 'var(--primary)' : 'var(--neutral)';
  }
}

function setRating(qId, val, silent = false) {
  if (!silent) state.regAnswers[qId] = val;
  const container = document.getElementById(`stars_${qId}`);
  if (!container) return;

  container.querySelectorAll('.star').forEach((s, i) => {
    s.classList.toggle('active', i < val);
  });
}

function setScale(qId, val, silent = false) {
  if (!silent) state.regAnswers[qId] = val;
  for (let i = 1; i <= 10; i++) {
    const btn = document.getElementById(`sc_${qId}_${i}`);
    if (btn) btn.classList.toggle('active', i === val);
  }
}

function validateAndNext() {
  let valid = true;

  state.regQuestions.forEach(q => {
    const errEl = document.getElementById(`err_${q.questionId}`);
    const inputEl = document.getElementById(`q_${q.questionId}`);
    if (!q.isRequired) {
      if (errEl) errEl.style.display = 'none';
      return;
    }

    const ans = state.regAnswers[q.questionId];
    const isEmpty = ans === undefined || ans === null || ans === '' || (Array.isArray(ans) && ans.length === 0);

    if (isEmpty) {
      valid = false;
      if (errEl) {
        errEl.textContent = '此欄位為必填';
        errEl.style.display = 'block';
      }
      if (inputEl) inputEl.classList.add('error');
    } else {
      if (errEl) errEl.style.display = 'none';
      if (inputEl) inputEl.classList.remove('error');
    }
  });

  if (valid) {
    state.regStep = 3;
    renderRegForm();
  } else {
    showToast('請填寫所有必填欄位', 'error');
  }
}

async function submitRegistration() {
  const btn = document.getElementById('submitRegBtn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = '送出中...';
  }

  try {
    const res = await apiCall('POST', '/registrations', {
      activityId: state.currentActivity.activityId,
      userId: state.user.userId,
      answers: state.regAnswers
    });

    if (res.success) {
      state.registrations.push({
        registrationId: res.registrationId,
        activityId: state.currentActivity.activityId,
        title: state.currentActivity.title,
        registeredAt: new Date().toISOString().substring(0, 10),
        status: res.status || 'pending'
      });

      const act = state.activities.find(a => a.activityId === state.currentActivity.activityId);
      if (act && !res.isWaitlist) {
        act.currentParticipants += 1;
      }

      state.filteredActivities = [...state.activities];
      applyFilters();
      renderSuccessScreen(res.registrationId, res.status || 'pending');
    } else {
      showToast(res.error || '報名失敗，請稍後再試', 'error');
      if (btn) {
        btn.disabled = false;
        btn.textContent = '✅ 確認送出報名';
      }
    }
  } catch (e) {
    console.error(e);
    showToast('網路錯誤，請稍後再試', 'error');
    if (btn) {
      btn.disabled = false;
      btn.textContent = '✅ 確認送出報名';
    }
  }
}

function renderSuccessScreen(regId, status = 'pending') {
  const statusText = status === 'waitlist' ? '您已進入候補名單，我們將於有名額時通知您' : '我們已收到您的報名，後續將透過 LINE 通知您';
  document.getElementById('regFormContent').innerHTML = `
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">報名成功！</div>
      <div class="success-subtitle">感謝您報名「${escapeHtml(state.currentActivity.title)}」<br>${escapeHtml(statusText)}</div>
      <div class="reg-id-box">
        <div class="reg-id-label">報名編號</div>
        <div class="reg-id-value">${escapeHtml(regId)}</div>
      </div>
      <button class="btn-primary" onclick="closeModal('regModal')">完成</button>
    </div>
  `;
}

function renderMyRegistrations() {
  const list = document.getElementById('myRegList');
  if (!state.registrations.length) {
    list.innerHTML = `<div style="text-align:center;padding:40px;color:var(--neutral)">
      <i class="fas fa-ticket-alt" style="font-size:48px;margin-bottom:16px;display:block;opacity:0.3"></i>
      尚無報名記錄</div>`;
    return;
  }

  const statusMap = {
    confirmed:'已確認',
    pending:'待確認',
    waitlist:'候補中',
    cancelled:'已取消',
    attended:'已出席'
  };

  const statusCls = {
    confirmed:'status-confirmed',
    pending:'status-pending',
    waitlist:'status-waitlist',
    cancelled:'status-cancelled',
    attended:'status-attended'
  };

  list.innerHTML = state.registrations.map(r => `
    <div class="my-reg-card">
      <div class="my-reg-icon"><i class="fas fa-calendar-check"></i></div>
      <div class="my-reg-info">
        <div class="my-reg-title">${escapeHtml(r.title || '未命名活動')}</div>
        <div class="my-reg-meta">報名編號：${escapeHtml(r.registrationId)} ｜ ${escapeHtml(r.registeredAt || '')}</div>
      </div>
      <span class="my-reg-status ${statusCls[r.status] || 'status-pending'}">${statusMap[r.status] || r.status}</span>
    </div>
  `).join('');
}

function showPage(page) {
  ['home','my','notify','profile'].forEach(p => {
    document.getElementById(`nav-${p}`).classList.toggle('active', p === page);
  });

  const viewControls = document.getElementById('viewControls');
  const myRegSection = document.getElementById('myRegSection');

  if (page === 'home') {
    viewControls.style.display = 'flex';
    myRegSection.style.display = 'none';

    ['card','calendar','week','list'].forEach(v => {
      document.getElementById(`view-${v}`).style.display = v === state.currentView ? 'block' : 'none';
    });

    renderCurrentView();
  } else if (page === 'my') {
    viewControls.style.display = 'none';
    ['card','calendar','week','list'].forEach(v => {
      document.getElementById(`view-${v}`).style.display = 'none';
    });
    myRegSection.style.display = 'block';
    renderMyRegistrations();
  } else if (page === 'notify') {
    showToast('通知功能開發中', 'warning');
  } else if (page === 'profile') {
    showUserMenu();
  }
}

function showUserMenu() {
  if (!state.user) return;
  showToast(`${state.user.displayName || '使用者'}，歡迎使用活動報名平台 👋`, 'success');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function showToast(msg, type = 'info', duration = 3000) {
  const icons = { success:'✅', error:'❌', warning:'⚠️', info:'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span style="font-size:13px;font-weight:500;flex:1">${escapeHtml(msg)}</span>`;
  document.getElementById('toastContainer').appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all 0.3s';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g, '&#96;');
}

function encodeKey(str) {
  return btoa(unescape(encodeURIComponent(String(str)))).replace(/=/g, '').replace(/\+/g, '_').replace(/\//g, '-');
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
