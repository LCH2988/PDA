<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>生命勵活動管理系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    [v-cloak]{display:none!important}
    html{scroll-behavior:smooth}
    *{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    input,select,textarea{-webkit-appearance:none;appearance:none}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    @keyframes slideUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .slide-up{animation:slideUp .25s ease forwards}
    .fade-in{animation:fadeIn .2s ease forwards}
    .page-enter{animation:slideUp .25s ease forwards}
    @supports(height:100dvh){.min-h-screen{min-height:100dvh}}
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
<div id="app" v-cloak>

  <!-- ══════════════════════════════════════════
       全域載入畫面
  ══════════════════════════════════════════ -->
  <div v-if="appLoading"
       class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
    <div class="w-16 h-16 border-4 border-green-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-gray-500 text-sm">系統初始化中...</p>
  </div>

  <template v-else>

    <!-- ══════════════════════════════════════════
         Header（各頁共用）
    ══════════════════════════════════════════ -->
    <header :class="headerBg" class="text-white shadow-lg sticky top-0 z-40">
      <div class="flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-2">
          <button v-if="currentPage !== 'dashboard'" @click="goBack"
                  class="text-white text-xl mr-1">←</button>
          <span v-if="currentPage === 'dashboard'" class="text-2xl">🌱</span>
          <div>
            <h1 class="font-bold text-base leading-tight">{{ pageTitle }}</h1>
            <p v-if="currentPage==='dashboard'" class="text-xs opacity-75">Life Encouragement</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <img v-if="lineProfile.pictureUrl && currentPage==='dashboard'"
               :src="lineProfile.pictureUrl"
               class="w-8 h-8 rounded-full border-2 border-white" />
          <span v-if="currentPage==='dashboard'" class="text-sm font-medium truncate max-w-20">
            {{ lineProfile.displayName || '訪客' }}
          </span>
        </div>
      </div>
      <!-- Dashboard 角色標籤 -->
      <div v-if="currentPage==='dashboard'" class="px-4 pb-2">
        <span :class="roleBadgeClass"
              class="text-xs px-2 py-0.5 rounded-full font-medium">{{ roleLabel }}</span>
      </div>
      <!-- 活動列表篩選列 -->
      <div v-if="currentPage==='events'"
           class="flex gap-2 px-4 pb-2 overflow-x-auto scrollbar-hide">
        <button v-for="f in eventFilters" :key="f.value"
                @click="ev.filter=f.value; loadEvents()"
                :class="ev.filter===f.value
                  ? 'bg-white text-green-700 font-bold'
                  : 'bg-green-700 bg-opacity-50 text-white'"
                class="text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition-colors">
          {{ f.label }}
        </button>
      </div>
      <!-- 簽到模式切換 -->
      <div v-if="currentPage==='checkin'" class="px-4 pb-2 flex gap-1">
        <button v-for="m in checkinModes" :key="m.id"
                @click="ci.mode=m.id; onCheckinModeChange(m.id)"
                :class="ci.mode===m.id ? 'bg-white text-green-700 font-bold' : 'bg-green-700 bg-opacity-50 text-white'"
                class="text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition-colors">
          {{ m.label }}
        </button>
      </div>
      <!-- 管理後台 Tab -->
      <div v-if="currentPage==='admin'"
           class="flex overflow-x-auto scrollbar-hide border-t border-red-400 border-opacity-40">
        <button v-for="t in adminTabs" :key="t.id"
                @click="ad.tab=t.id; onAdminTabChange(t.id)"
                :class="ad.tab===t.id
                  ? 'border-b-2 border-white font-bold'
                  : 'opacity-70'"
                class="flex-shrink-0 px-4 py-2 text-sm text-white whitespace-nowrap transition-colors">
          {{ t.icon }} {{ t.label }}
        </button>
      </div>
    </header>

    <!-- ══════════════════════════════════════════
         頁面容器
    ══════════════════════════════════════════ -->
    <main class="pb-24">

      <!-- ────────────────────────────────────────
           📍 PAGE: Dashboard
      ──────────────────────────────────────── -->
      <div v-if="currentPage==='dashboard'" class="page-enter">
        <!-- 未登入提示 -->
        <div v-if="!member" class="mx-4 mt-4 p-4 bg-yellow-50 border border-yellow-200 rounded-xl">
          <p class="text-yellow-800 text-sm font-medium">⚠️ 尚未完成個人資料設定</p>
          <p class="text-yellow-600 text-xs mt-1">請先前往「個人設定」完成登錄</p>
          <button @click="navigate('profile')"
                  class="mt-2 inline-block bg-yellow-500 text-white text-sm px-4 py-1.5 rounded-lg">
            立即設定 →
          </button>
        </div>
        <!-- 統計卡 -->
        <div class="grid grid-cols-2 gap-3 px-4 mt-4">
          <div v-for="s in dashStats" :key="s.label"
               class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div class="text-2xl mb-1">{{ s.icon }}</div>
            <div class="text-2xl font-bold text-gray-800">{{ s.value }}</div>
            <div class="text-xs text-gray-500 mt-0.5">{{ s.label }}</div>
          </div>
        </div>
        <!-- 快速入口 -->
        <div class="px-4 mt-5">
          <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-3">快速入口</h2>
          <div class="grid grid-cols-3 gap-3">
            <button v-for="e in quickEntries" :key="e.label"
                    @click="navigate(e.page, e.params)"
                    class="flex flex-col items-center bg-white rounded-2xl p-3 shadow-sm border border-gray-100 active:scale-95 transition-transform">
              <span class="text-2xl mb-1">{{ e.icon }}</span>
              <span class="text-xs text-gray-600 text-center leading-tight">{{ e.label }}</span>
            </button>
          </div>
        </div>
        <!-- 近期活動 -->
        <div class="px-4 mt-5">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">近期活動</h2>
            <button @click="navigate('events')" class="text-xs text-green-600 font-medium">查看全部 →</button>
          </div>
          <div v-if="db.recentEvents.length===0" class="text-center py-8 text-gray-400 text-sm">
            目前沒有近期活動
          </div>
          <div v-for="ev in db.recentEvents" :key="ev.event_id"
               class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-3">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <h3 class="font-bold text-gray-800 text-sm">{{ ev.event_name }}</h3>
                <p class="text-xs text-gray-500 mt-1">📅 {{ ev.event_date }}</p>
                <p class="text-xs text-gray-500">📍 {{ ev.location }}</p>
              </div>
              <span :class="statusBadge(ev.status)"
                    class="text-xs px-2 py-0.5 rounded-full font-medium ml-2 whitespace-nowrap">
                {{ ev.status }}
              </span>
            </div>
            <div class="flex gap-2 mt-3">
              <button @click="navigate('eventDetail', {event_id: ev.event_id})"
                      class="flex-1 text-center text-xs bg-gray-100 text-gray-700 py-1.5 rounded-lg">
                查看詳情
              </button>
              <button v-if="ev.status==='報名中'"
                      @click="navigate('register', {event_id: ev.event_id})"
                      class="flex-1 text-center text-xs bg-green-500 text-white py-1.5 rounded-lg">
                立即報名
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- ────────────────────────────────────────
           📍 PAGE: Events 活動列表
      ──────────────────────────────────────── -->
      <div v-if="currentPage==='events'" class="px-4 py-3 page-enter">
        <div class="relative mb-3">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">🔍</span>
          <input v-model="ev.keyword" @input="debounce('evSearch', ()=>loadEvents(), 500)"
                 placeholder="搜尋活動名稱或地點..."
                 class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
        </div>
        <div v-if="ev.loading" class="flex justify-center py-12">
          <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div v-else-if="ev.list.length===0" class="text-center py-16 text-gray-400">
          <div class="text-5xl mb-3">🎪</div>
          <p class="text-sm">沒有符合條件的活動</p>
        </div>
        <template v-else>
          <div v-for="event in ev.list" :key="event.event_id"
               @click="openEventDetail(event)"
               class="bg-white rounded-2xl shadow-sm border border-gray-100 mb-3 overflow-hidden active:scale-95 transition-transform cursor-pointer">
            <div :class="statusBar(event.status)" class="h-1.5"></div>
            <div class="p-4">
              <div class="flex items-start justify-between">
                <h3 class="font-bold text-gray-800 text-base flex-1 pr-2">{{ event.event_name }}</h3>
                <span :class="statusBadge(event.status)"
                      class="text-xs px-2 py-0.5 rounded-full font-medium whitespace-nowrap">
                  {{ event.status }}
                </span>
              </div>
              <p class="text-xs text-gray-500 mt-2">📅 {{ event.event_date }} &nbsp; {{ event.start_time }}~{{ event.end_time }}</p>
              <p class="text-xs text-gray-500">📍 {{ event.location }}</p>
              <p class="text-xs text-gray-500">👥 {{ event.registered_count||0 }} / {{ event.max_capacity }} 人</p>
              <button v-if="event.status==='報名中'"
                      @click.stop="navigate('register',{event_id:event.event_id})"
                      class="mt-3 w-full text-center bg-green-500 text-white text-sm py-2 rounded-xl font-medium">
                立即報名
              </button>
            </div>
          </div>
          <!-- 分頁 -->
          <div v-if="ev.pagination.pages>1" class="flex justify-center items-center gap-3 mt-2">
            <button @click="loadEvents(ev.pagination.page-1)" :disabled="ev.pagination.page<=1"
                    class="px-4 py-2 text-sm bg-white border rounded-xl disabled:opacity-40">← 上頁</button>
            <span class="text-sm text-gray-500">{{ ev.pagination.page }}/{{ ev.pagination.pages }}</span>
            <button @click="loadEvents(ev.pagination.page+1)" :disabled="ev.pagination.page>=ev.pagination.pages"
                    class="px-4 py-2 text-sm bg-white border rounded-xl disabled:opacity-40">下頁 →</button>
          </div>
        </template>
        <!-- 管理員新增按鈕 -->
        <button v-if="isAdmin" @click="openEventForm('create')"
                class="fixed bottom-20 right-4 w-14 h-14 bg-green-500 text-white rounded-full shadow-lg flex items-center justify-center text-2xl z-30 active:scale-95 transition-transform">＋</button>
      </div>

      <!-- ────────────────────────────────────────
           📍 PAGE: EventDetail 活動詳情
      ──────────────────────────────────────── -->
      <div v-if="currentPage==='eventDetail'" class="px-4 py-4 page-enter">
        <div v-if="ev.detail" class="space-y-4">
          <div :class="statusBar(ev.detail.status)" class="h-2 rounded-xl"></div>
          <div class="flex items-start justify-between">
            <h2 class="font-bold text-xl text-gray-800 flex-1 pr-3">{{ ev.detail.event_name }}</h2>
            <span :class="statusBadge(ev.detail.status)"
                  class="text-sm px-3 py-1 rounded-full font-medium whitespace-nowrap">{{ ev.detail.status }}</span>
          </div>
          <!-- 資訊卡 -->
          <div class="space-y-2">
            <div v-for="info in eventDetailInfo" :key="info.label"
                 class="flex items-start gap-3 bg-white rounded-xl p-3 shadow-sm border border-gray-100">
              <span class="text-xl">{{ info.icon }}</span>
              <div>
                <p class="text-xs text-gray-500">{{ info.label }}</p>
                <p class="text-sm font-medium text-gray-800">{{ info.value }}</p>
              </div>
            </div>
          </div>
          <!-- 報名進度 -->
          <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100">
            <div class="flex justify-between text-xs text-gray-500 mb-1">
              <span>報名進度</span>
              <span>{{ ev.detail.registered_count||0 }} / {{ ev.detail.max_capacity }} 人</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
              <div class="bg-green-500 h-2 rounded-full transition-all"
                   :style="`width:${Math.min(100,((ev.detail.registered_count||0)/ev.detail.max_capacity)*100)}%`"></div>
            </div>
          </div>
          <!-- 活動描述 -->
          <div v-if="ev.detail.description" class="bg-white rounded-xl p-4 shadow-sm border border-gray-100">
            <h3 class="text-sm font-bold text-gray-700 mb-2">活動說明</h3>
            <p class="text-sm text-gray-600 leading-relaxed">{{ ev.detail.description }}</p>
          </div>
          <!-- 操作按鈕 -->
          <button v-if="ev.detail.status==='報名中'"
                  @click="navigate('register',{event_id:ev.detail.event_id})"
                  class="w-full bg-green-500 text-white py-3.5 rounded-xl font-bold text-base">
            📝 立即報名
          </button>
          <template v-if="isAdmin">
            <button @click="openEventForm('edit', ev.detail)"
                    class="w-full bg-blue-500 text-white py-3 rounded-xl font-medium">✏️ 編輯活動</button>
            <button @click="deleteEvent(ev.detail.event_id)"
                    class="w-full bg-red-500 text-white py-3 rounded-xl font-medium">🗑️ 刪除活動</button>
          </template>
        </div>
        <div v-else class="flex justify-center py-12">
          <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>

      <!-- ────────────────────────────────────────
           📍 PAGE: Register 活動報名
      ──────────────────────────────────────── -->
      <div v-if="currentPage==='register'" class="px-4 py-4 page-enter">
        <!-- 報名成功 -->
        <div v-if="reg.success" class="flex flex-col items-center text-center py-12">
          <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-4xl mb-4">✅</div>
          <h2 class="text-xl font-bold text-gray-800 mb-2">報名成功！</h2>
          <p class="text-gray-500 text-sm mb-1">{{ ev.detail?.event_name }}</p>
          <p class="text-gray-400 text-xs mb-6">報名編號：{{ reg.regId }}</p>
          <button @click="sendRegLineMsg"
                  class="w-full bg-green-500 text-white py-3.5 rounded-xl font-bold mb-2">📤 傳送確認至 LINE</button>
          <button @click="navigate('dashboard')"
                  class="w-full bg-gray-100 text-gray-700 py-3 rounded-xl font-medium">返回首頁</button>
        </div>
        <!-- 報名表單 -->
        <template v-else>
          <!-- 活動資訊 -->
          <div v-if="ev.detail" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden mb-4">
            <div class="bg-green-500 h-1.5"></div>
            <div class="p-4">
              <h2 class="font-bold text-gray-800">{{ ev.detail.event_name }}</h2>
              <p class="text-xs text-gray-500 mt-1">📅 {{ ev.detail.event_date }} &nbsp; {{ ev.detail.start_time }}~{{ ev.detail.end_time }}</p>
              <p class="text-xs text-gray-500">📍 {{ ev.detail.location }}</p>
              <p class="text-xs text-gray-500">👥 剩餘名額：{{ Math.max(0,(ev.detail.max_capacity||0)-(ev.detail.registered_count||0)) }} 位</p>
            </div>
          </div>
          <form @submit.prevent="submitRegister" class="space-y-4">
            <!-- 個人資訊 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
              <h3 class="font-bold text-gray-700 text-sm mb-3">📋 報名人資訊</h3>
              <div v-if="member" class="space-y-1.5">
                <div class="flex justify-between text-sm">
                  <span class="text-gray-500">姓名</span>
                  <span class="font-medium">{{ member.name }}</span>
                </div>
                <div class="flex justify-between text-sm">
                  <span class="text-gray-500">電話</span>
                  <span class="font-medium">{{ member.phone }}</span>
                </div>
              </div>
              <div v-else class="text-sm text-red-500">請先完成個人資料設定</div>
              <button type="button" @click="navigate('profile')"
                      class="mt-2 text-xs text-green-600 block text-right w-full">修改個人資料 →</button>
            </div>
            <!-- 便當 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
              <h3 class="font-bold text-gray-700 text-sm mb-3">🍱 便當偏好</h3>
              <div class="grid grid-cols-3 gap-2">
                <label v-for="opt in mealOptions" :key="opt.value"
                       :class="reg.form.meal_preference===opt.value ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-200 text-gray-600'"
                       class="flex flex-col items-center border-2 rounded-xl p-3 cursor-pointer transition-colors">
                  <input type="radio" v-model="reg.form.meal_preference" :value="opt.value" class="hidden" />
                  <span class="text-2xl mb-1">{{ opt.icon }}</span>
                  <span class="text-xs font-medium">{{ opt.label }}</span>
                </label>
              </div>
            </div>
            <!-- 復康巴士 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
              <h3 class="font-bold text-gray-700 text-sm mb-3">🚌 交通需求</h3>
              <label class="flex items-center justify-between cursor-pointer">
                <div>
                  <p class="text-sm font-medium text-gray-800">需要復康巴士接送</p>
                  <p class="text-xs text-gray-500 mt-0.5">由主辦單位安排接送服務</p>
                </div>
                <div @click="reg.form.need_transport=!reg.form.need_transport"
                     :class="reg.form.need_transport ? 'bg-green-500' : 'bg-gray-300'"
                     class="relative w-12 h-6 rounded-full transition-colors cursor-pointer flex-shrink-0">
                  <div :class="reg.form.need_transport ? 'translate-x-6' : 'translate-x-0.5'"
                       class="absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform"></div>
                </div>
              </label>
            </div>
            <!-- 備註 -->
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
              <h3 class="font-bold text-gray-700 text-sm mb-3">📝 備註</h3>
              <textarea v-model="reg.form.remarks" rows="3" placeholder="如有特殊需求請在此說明..."
                        class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 resize-none"></textarea>
            </div>
            <!-- 注意事項 -->
            <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4">
              <p class="font-bold text-yellow-800 text-sm mb-1">⚠️ 注意事項</p>
              <ul class="text-xs text-yellow-700 space-y-1 list-disc list-inside">
                <li>報名後如需取消，請至少提前 3 天通知</li>
                <li>如需復康巴士，請確認接送地點正確</li>
                <li>活動當天請攜帶個人藥品及必要物品</li>
              </ul>
            </div>
            <button type="submit" :disabled="reg.submitting||!member"
                    class="w-full bg-green-500 text-white py-4 rounded-2xl font-bold text-base shadow-lg shadow-green-200 disabled:opacity-60 active:scale-95 transition-transform">
              {{ reg.submitting ? '報名處理中...' : '確認報名 ✓' }}
            </button>
          </form>
        </template>
      </div>

      <!-- ────────────────────────────────────────
           📍 PAGE: MyRegistrations 我的報名
      ──────────────────────────────────────── -->
      <div v-if="currentPage==='myRegistrations'" class="px-4 py-4 page-enter">
        <div v-if="myReg.loading" class="flex justify-center py-12">
          <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <div v-else-if="myReg.list.length===0" class="text-center py-16 text-gray-400">
          <div class="text-5xl mb-3">📋</div>
          <p class="text-sm">尚無報名紀錄</p>
          <button @click="navigate('events')" class="mt-4 bg-green-500 text-white px-6 py-2 rounded-xl text-sm">瀏覽活動</button>
        </div>
        <div v-else class="space-y-3">
          <div v-for="r in myReg.list" :key="r.reg_id"
               class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
            <div class="flex items-start justify-between">
              <div class="flex-1">
                <h3 class="font-bold text-gray-800 text-sm">{{ r.event_name }}</h3>
                <p class="text-xs text-gray-500 mt-1">📅 {{ r.event_date }}</p>
                <p class="text-xs text-gray-500">📍 {{ r.location }}</p>
                <p class="text-xs text-gray-400 mt-1">報名時間：{{ r.reg_date }}</p>
              </div>
              <span :class="statusBadge(r.attendance_status)"
                    class="text-xs px-2 py-0.5 rounded-full font-medium ml-2 whitespace-nowrap">
                {{ r.attendance_status }}
              </span>
            </div>
            <div class="flex gap-2 mt-3">
              <span v-if="r.need_transport==='TRUE'"
                    class="text-xs bg-orange-100 text-orange-600 px-2 py-0.5 rounded-full">🚌 需接送</span>
              <span class="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full">🍱 {{ r.meal_preference }}</span>
            </div>
            <button v-if="r.attendance_status==='已報名'"

      { icon:'📋', label:'我的報名', value: myReg.list.filter(r=>r.attendance_status!=='取消').length },

        { icon:'🏠', label:'詳細地址', value: ev.detail.address || '（未提供）' }
      ];
    });

    // ══════════════════════════════════════════
    // 工具函式
    // ══════════════════════════════════════════
    function statusBadge(status) {
      const map = {
        '報名中':'bg-green-100 text-green-700',
        '草稿':  'bg-gray-100 text-gray-600',

        '已完成':'bg-blue-100 text-blue-700',
        '取消':  'bg-red-100 text-red-700',
        '已報名':'bg-blue-100 text-blue-700',
        '出席':  'bg-green-100 text-green-700',
        '缺席':  'bg-red-100 text-red-700',
        '待確認':'bg-yellow-100 text-yellow-700',
        '已確認':'bg-blue-100 text-blue-700',
        '完成':  'bg-green-100 text-green-700'
      };
      return map[status] || 'bg-gray-100 text-gray-600';
    }

    function statusBar(status) {
      const map = {
        '報名中':'bg-green-500', '草稿':'bg-gray-300',
        '已截止':'bg-orange-400','已完成':'bg-blue-400','取消':'bg-red-400'
      };
      return map[status] || 'bg-gray-300';
    }

    function roleBadge(role) {
      const map = { admin:'bg-red-100 text-red-700', volunteer:'bg-blue-100 text-blue-700', student:'bg-green-100 text-green-700' };
      return map[role] || 'bg-gray-100 text-gray-600';
    }

    function roleLabel2(role) {
      return { admin:'管理員', volunteer:'志工', student:'學員' }[role] || role;
    }

    function attendDot(status) {
      return { '出席':'bg-green-500','缺席':'bg-red-400','已報名':'bg-blue-400','取消':'bg-gray-300' }[status] || 'bg-gray-300';
    }

    function debounce(key, fn, delay=500) {
      clearTimeout(timers[key]);
      timers[key] = setTimeout(fn, delay);
    }

    function showToast(message, type='info') {
      const cfg = {
        success: { color:'bg-green-500', icon:'✅' },
        error:   { color:'bg-red-500',   icon:'❌' },
        warning: { color:'bg-yellow-500',icon:'⚠️' },
        info:    { color:'bg-blue-500',  icon:'ℹ️' }
      };
      Object.assign(toast, { show:true, message, ...cfg[type]||cfg.info });
      setTimeout(() => { toast.show = false; }, 3000);
    }

    function showConfirm(title, message) {
      return new Promise(resolve => {
        Object.assign(confirm, { show:true, title, message, resolve });
      });
    }

        // ══════════════════════════════════════════
    // API 呼叫
    // ══════════════════════════════════════════
    async function apiCall(action, payload={}) {
      let token = '';
      try { token = liff.getAccessToken() || ''; } catch(e) {}
      try {
        const res = await fetch(GAS_URL, {
          method:  'POST',
          headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ action, token, payload })
        });
        return await res.json();
      } catch(err) {
        console.error('[API]', action, err);
        return { status:'error', message: navigator.onLine ? err.message : '網路連線中斷' };
      }
    }

    // ══════════════════════════════════════════
    // 路由導航
    // ══════════════════════════════════════════
    async function navigate(page, params={}) {
      // 離開簽到頁時停止 QR Scanner
      if (currentPage.value === 'checkin' && qrScanner) {
        try { await qrScanner.stop(); } catch(e) {}
        qrScanner = null;
      }
      pageHistory.value.push(page);
      currentPage.value = page;
      window.scrollTo(0, 0);
      await nextTick();
      await onPageEnter(page, params);
    }

    function goBack() {
      if (pageHistory.value.length > 1) {
        pageHistory.value.pop();
        const prev = pageHistory.value[pageHistory.value.length - 1];
        navigate(prev);
      } else {
        navigate('dashboard');
      }
    }

    async function onPageEnter(page, params={}) {
      if (page === 'events')          { await loadEvents(); }
      if (page === 'eventDetail')     { await loadEventDetail(params.event_id); }
      if (page === 'register')        { await loadEventDetail(params.event_id); reg.success=false; reg.form.event_id=params.event_id||''; }
      if (page === 'myRegistrations') { await loadMyRegistrations(); }
      if (page === 'myTasks')         { await loadMyTasks(); }
      if (page === 'checkin')         { await loadCheckinPage(); }
      if (page === 'admin' && isAdmin.value) { await loadAdminDashboard(); }
    }

    // ══════════════════════════════════════════
    // 活動模組
    // ══════════════════════════════════════════
    async function loadEvents(page=1) {
      ev.loading = true;
      const res = await apiCall('getEventList', {
        status: ev.filter, keyword: ev.keyword, page, pageSize: 10
      });
      if (res.status === 'success') {
        ev.list       = res.data?.items || [];
        ev.pagination = res.data || { page:1, pages:1 };
      }
      ev.loading = false;
    }

    async function loadEventDetail(eventId) {
      if (!eventId) return;
      ev.detail = null;
      const res = await apiCall('getEventDetail', { event_id: eventId });
      if (res.status === 'success') ev.detail = res.data;
    }

    async function openEventDetail(event) {
      navigate('eventDetail', { event_id: event.event_id });
    }

    function openEventForm(mode, data=null) {
      ev.formMode = mode;
      if (mode === 'create') {
        Object.assign(ev.form, {
          event_id:'', event_name:'', event_date:'', start_time:'',
          end_time:'', location:'', address:'', description:'',
          max_capacity:50, status:'草稿'
        });
      } else {
        Object.assign(ev.form, data);
      }
      ev.showForm = true;
    }

    async function submitEventForm() {
      ev.submitting = true;
      const action = ev.formMode === 'create' ? 'createEvent' : 'updateEvent';
      const res    = await apiCall(action, ev.form);
      if (res.status === 'success') {
        showToast(ev.formMode === 'create' ? '活動建立成功！' : '活動更新成功！', 'success');
        ev.showForm = false;
        await loadEvents();
      } else {
        showToast(res.message, 'error');
      }
      ev.submitting = false;
    }

    async function deleteEvent(eventId) {
      const ok = await showConfirm('刪除活動', '確定要刪除此活動嗎？此操作無法復原。');
      if (!ok) return;
      const res = await apiCall('deleteEvent', { event_id: eventId });
      if (res.status === 'success') {
        showToast('活動已刪除', 'success');
        navigate('events');
      } else {
        showToast(res.message, 'error');
      }
    }

    // ══════════════════════════════════════════
    // 報名模組
    // ══════════════════════════════════════════
    async function submitRegister() {
      if (!member.value) { showToast('請先完成個人資料設定', 'warning'); return; }
      reg.submitting = true;
      const res = await apiCall('registerEvent', reg.form);
      if (res.status === 'success') {
        reg.regId   = res.data.reg_id;
        reg.success = true;
        window.scrollTo(0, 0);
      } else {
        showToast(res.message, 'error');
      }
      reg.submitting = false;
    }

        await liff.sendMessages([{
          type: 'text',

        }]);
        showToast('訊息已傳送至 LINE', 'success');
      } catch(e) {
        showToast('訊息傳送失敗（非 LINE 環境）', 'warning');
      }
    }

    async function loadMyRegistrations() {
      myReg.loading = true;
      const res = await apiCall('getMyRegistrations', {});
      myReg.list    = res.status === 'success' ? (res.data || []) : [];
      myReg.loading = false;
    }

    async function cancelReg(regId) {
      const ok = await showConfirm('取消報名', '確定要取消此報名嗎？');
      if (!ok) return;
      const res = await apiCall('cancelRegistration', { reg_id: regId });
      if (res.status === 'success') {
        showToast('報名已取消', 'success');
        await loadMyRegistrations();
      } else {
        showToast(res.message, 'error');
      }
    }

    // ══════════════════════════════════════════
    // 任務模組
    // ══════════════════════════════════════════
    async function loadMyTasks() {
      myTask.loading = true;
      const res = await apiCall('getMyTasks', {});
      myTask.list    = res.status === 'success' ? (res.data || []) : [];
      myTask.loading = false;
    }

    async function updateTask(task, status) {
      const res = await apiCall('updateTaskStatus', { task_id: task.task_id, status });
      if (res.status === 'success') {
        task.status = status;
        showToast('任務狀態已更新', 'success');
      } else {
        showToast(res.message, 'error');
      }
    }

    // ══════════════════════════════════════════
    // 簽到模組
    // ══════════════════════════════════════════
    async function loadCheckinPage() {
      ci.mode = isVolunteerOrAdmin.value ? 'scan' : 'qr';
      // 查詢個人報名記錄（取最近一筆有效報名）
      const rRes = await apiCall('getMyRegistrations', {});
      if (rRes.status === 'success' && rRes.data?.length) {
        const active = rRes.data.find(r => r.attendance_status === '已報名');
        ci.myRegId = active ? active.reg_id : '';
      }
      await onCheckinModeChange(ci.mode);
    }

    async function onCheckinModeChange(mode) {
      // 停止舊掃描器
      if (qrScanner) {
        try { await qrScanner.stop(); } catch(e) {}
        qrScanner = null;
      }
      if (mode === 'scan' && isVolunteerOrAdmin.value) {
        await nextTick();
        startQRScanner();
      }
      if (mode === 'qr' && ci.myRegId) {
        await nextTick();
        generateQR();
      }
      if (mode === 'list') {
        await loadCheckinList();
      }
    }

    function startQRScanner() {
      const el = document.getElementById('qr-reader');
      if (!el) return;
      qrScanner = new Html5Qrcode('qr-reader');
      qrScanner.start(
        { facingMode:'environment' },
        { fps:10, qrbox:{ width:250, height:250 } },
        async (decoded) => {
          try { await qrScanner.stop(); qrScanner=null; } catch(e) {}
          await doCheckin(decoded);
          setTimeout(() => startQRScanner(), 3000);
        },
        () => {}
      ).catch(() => showToast('無法啟動相機，請使用手動輸入', 'warning'));
    }

    function generateQR() {
      const canvas = document.getElementById('qr-canvas');
      if (!canvas || !ci.myRegId) return;
      QRCode.toCanvas(canvas, ci.myRegId, { width:200, margin:2,
        color:{ dark:'#1a1a1a', light:'#ffffff' } });
    }

    async function doCheckin(regId) {
      if (!regId?.trim()) return;
      ci.result = null;
      const res = await apiCall('updateAttendance', {
        reg_id: regId.trim(), attendance_status:'出席'
      });
      ci.result = { ok: res.status==='success', message: res.message };
      if (res.status === 'success') {
        showToast('✅ 簽到成功！', 'success');
        ci.manualId = '';
        if (ci.mode === 'list') await loadCheckinList();
      } else {
        showToast(res.message, 'error');
      }
      setTimeout(() => { ci.result = null; }, 4000);
    }

    async function loadCheckinList() {
      // 取最近一個進行中的活動名單
      const evRes = await apiCall('getEventList', { status:'報名中', pageSize:1 });
      const eventId = evRes.data?.items?.[0]?.event_id;
      if (!eventId) return;
      const res = await apiCall('getRegistrationList', { event_id: eventId });
      if (res.status === 'success') {
        ci.regList    = res.data?.items || [];
        ci.attended   = ci.regList.filter(r=>r.attendance_status==='出席').length;
        ci.registered = ci.regList.filter(r=>r.attendance_status==='已報名').length;
        ci.absent     = ci.regList.filter(r=>r.attendance_status==='缺席').length;
        ci.filteredList = ci.regList;
      }
    }

    async function quickCheckin(r) {
      const ok = await showConfirm('確認簽到', `確定為「${r.member_name}」簽到？`);
      if (!ok) return;
      await doCheckin(r.reg_id);
      r.attendance_status = '出席';
      ci.attended++;
      ci.registered = Math.max(0, ci.registered - 1);
    }

    watch(() => ci.listSearch, (val) => {
      if (!val) { ci.filteredList = ci.regList; return; }
      const kw = val.toLowerCase();
      ci.filteredList = ci.regList.filter(r=>(r.member_name||'').toLowerCase().includes(kw));
    });

    // ══════════════════════════════════════════
    // 個人設定
    // ══════════════════════════════════════════
    async function saveProfile() {
      prof.submitting = true;
      const action = prof.isRegistered ? 'updateMember' : 'createMember';
      const payload = prof.isRegistered
        ? { ...prof.form }
        : { line_user_id: lineProfile.value.userId, ...prof.form };
      const res = await apiCall(action, payload);
      if (res.status === 'success') {
        showToast(prof.isRegistered ? '個人資料已更新！' : '登錄成功！歡迎加入 🎉', 'success');
        prof.isRegistered = true;
        if (!prof.form.member_id && res.data?.member_id) {
          prof.form.member_id = res.data.member_id;
        }
        // 同步更新 member
        member.value = { ...member.value, ...prof.form };
        try {
          await liff.sendMessages([{
            type:'text',
            text:`✅ 個人資料${prof.isRegistered?'更新':'登錄'}成功！\n👤 ${prof.form.name}\n📞 ${prof.form.phone}`
          }]);
        } catch(e) {}
      } else {
        showToast(res.message, 'error');
      }
      prof.submitting = false;
    }

    // ══════════════════════════════════════════
    // 管理後台
    // ══════════════════════════════════════════
    async function loadAdminDashboard() {
      const [evRes, mbRes] = await Promise.all([
        apiCall('getEventList',  { pageSize:100 }),
        apiCall('getMemberList', { pageSize:100 })
      ]);
      const events  = evRes.data?.items  || [];
      const members = mbRes.data?.items  || [];
      ad.stats = [
        { label:'活動總數',   value:events.length,                                       icon:'🎪', bg:'bg-gradient-to-br from-green-500 to-teal-500' },
        { label:'報名中活動', value:events.filter(e=>e.status==='報名中').length,         icon:'✅', bg:'bg-gradient-to-br from-blue-500 to-indigo-500' },
        { label:'人員總數',   value:members.length,                                      icon:'👥', bg:'bg-gradient-to-br from-purple-500 to-pink-500' },
        { label:'志工人數',   value:members.filter(m=>m.role==='volunteer').length,      icon:'🙋', bg:'bg-gradient-to-br from-orange-500 to-red-500' }
      ];
      ad.eventOptions = events;
    }

    async function onAdminTabChange(tab) {
      if (tab === 'members'  && !ad.members.length)   await loadAdminMembers();
      if (tab === 'settings' && !ad.settings.length)  await loadAdminSettings();
      if (tab === 'dashboard') await loadAdminDashboard();
    }

    async function loadAdminMembers() {
      ad.membersLoading = true;
      const res = await apiCall('getMemberList', {
        keyword: ad.memberSearch, role: ad.memberRole, pageSize:50
      });
      ad.members        = res.status==='success' ? (res.data?.items||[]) : [];
      ad.membersLoading = false;
    }

    async function saveMemberRole() {
      ad.savingMember = true;
      const res = await apiCall('updateMemberRole', {
        member_id:   ad.editMember.member_id,
        role:        ad.editMember.role,
        join_status: ad.editMember.join_status
      });
      if (res.status === 'success') {
        showToast('人員資料已更新', 'success');
        ad.showMemberModal = false;
        await loadAdminMembers();
      } else {
        showToast(res.message, 'error');
      }
      ad.savingMember = false;
    }

    async function loadAdminRegs() {
      if (!ad.selectedEvent) return;
      ad.regsLoading = true;
      const res = await apiCall('getRegistrationList', { event_id: ad.selectedEvent });
      ad.regs        = res.status==='success' ? (res.data?.items||[]) : [];
      ad.regsLoading = false;
    }

    async function adminUpdateAttendance(r, status) {
      if (!status) return;
      const res = await apiCall('updateAttendance', { reg_id:r.reg_id, attendance_status:status });
      if (res.status === 'success') {
        r.attendance_status = status;
        showToast('出席狀態已更新', 'success');
      } else {
        showToast(res.message, 'error');
      }
    }

    function exportCSV() {
      if (!ad.regs.length) { showToast('沒有資料可匯出', 'warning'); return; }
      const headers = ['姓名','電話','便當','需接送','出席狀態','備註','報名時間'];
      const rows = ad.regs.map(r => [
        r.member_name, r.member_phone, r.meal_preference,
        r.need_transport==='TRUE'?'是':'否',
        r.attendance_status, r.remarks||'', r.reg_date
      ]);
      const csv  = [headers,...rows].map(r=>r.map(c=>`"${c||''}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url, download:`報名名單_${ad.selectedEvent}_${new Date().toLocaleDateString()}.csv`
      });
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV 已匯出', 'success');
    }

    async function loadAdminSettings() {
      ad.settingsLoading = true;
      const res = await apiCall('getSettings', {});
      ad.settings        = res.status==='success' ? (res.data||[]) : [];
      ad.settingsLoading = false;
    }

    async function saveSetting() {
      ad.savingSetting = true;
      const res = await apiCall('updateSettings', {
        setting_key:   ad.editSetting.setting_key,
        setting_value: ad.editSetting.setting_value
      });
      if (res.status === 'success') {
        showToast('設定已儲存', 'success');
        ad.showSettingModal = false;
        await loadAdminSettings();
      } else {
        showToast(res.message, 'error');
      }
      ad.savingSetting = false;
    }

    // ══════════════════════════════════════════
    // 初始化
    // ══════════════════════════════════════════
    onMounted(async () => {
      try {
        // 初始化 LIFF
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          if (liff.isInClient()) liff.login();
        } else {
          lineProfile.value = await liff.getProfile();
        }
      } catch(e) {
        console.warn('LIFF init failed, using dev mode');
        lineProfile.value = { userId:'dev_'+Date.now(), displayName:'開發測試', pictureUrl:'' };
      }

      // 查詢人員資料
      if (lineProfile.value.userId) {
        const res = await apiCall('getMemberByLineId', { line_user_id: lineProfile.value.userId });
        if (res.status==='success' && res.data?.registered) {
          member.value = res.data;
          Object.assign(prof.form, res.data);
          prof.isRegistered = true;
        } else {
          // 預填 LINE 名稱
          prof.form.name = lineProfile.value.displayName || '';
        }
      }

      // 載入近期活動
      const evRes = await apiCall('getEventList', { status:'報名中', pageSize:5 });
      if (evRes.status==='success') db.recentEvents = evRes.data?.items || [];

      // 預載個人報名與任務（背景）
      if (member.value) {
        apiCall('getMyRegistrations', {}).then(r => {
          if (r.status==='success') myReg.list = r.data || [];
        });
        apiCall('getMyTasks', {}).then(r => {
          if (r.status==='success') myTask.list = r.data || [];
        });
      }

      appLoading.value = false;
    });

    // ══════════════════════════════════════════
    // Return
    // ══════════════════════════════════════════
    return {
      // 狀態
      appLoading, currentPage, lineProfile, member,
      toast, confirm, ev, reg, myReg, myTask, ci, prof, ad, db,
      // 常數
      eventFilters, mealOptions, checkinModes, adminTabs,
      adminQuickActions, bottomNav,
      // Computed
      isAdmin, isVolunteerOrAdmin, roleLabel, roleBadgeClass,
      headerBg, pageTitle, quickEntries, dashStats, eventDetailInfo,
      // 工具
      statusBadge, statusBar, roleBadge, roleLabel2: roleLabel2,
      attendDot, debounce, showToast, showConfirm,
      // 方法
      navigate, goBack,
      loadEvents, openEventDetail, openEventForm, submitEventForm, deleteEvent,
      submitRegister, sendRegLineMsg, loadMyRegistrations, cancelReg,
      loadMyTasks, updateTask,
      onCheckinModeChange, doCheckin, quickCheckin,
      saveProfile,
      onAdminTabChange, loadAdminMembers, saveMemberRole,
      loadAdminRegs, adminUpdateAttendance, exportCSV,
      loadAdminSettings, saveSetting
    };
  }
}).mount('#app');
</script>
</body>
</html>
