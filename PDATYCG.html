<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社群論壇</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary:      #06C755;
      --primary-dark: #04a847;
      --secondary:    #4A90D9;
      --bg:           #F0F2F5;
      --card:         #FFFFFF;
      --text:         #1a1a2e;
      --text-muted:   #6c757d;
      --border:       #e0e0e0;
      --shadow:       0 2px 12px rgba(0,0,0,0.08);
      --radius:       12px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
    }

    /* ── Navbar ── */
    .navbar {
      background:linear-gradient(135deg,#06C755,#04a847);
      color:white; padding:0 16px; height:56px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
      box-shadow:0 2px 8px rgba(6,199,85,0.3);
    }
    .navbar-brand {
      font-size:18px; font-weight:700;
      display:flex; align-items:center; gap:8px;
    }
    .navbar-actions { display:flex; gap:8px; }
    .btn-icon {
      background:rgba(255,255,255,0.2); border:none; color:white;
      width:36px; height:36px; border-radius:50%; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; transition:background 0.2s;
    }
    .btn-icon:hover { background:rgba(255,255,255,0.35); }

    /* ── Category Bar ── */
    .category-bar {
      background:white; padding:0 8px;
      display:flex; gap:4px; overflow-x:auto;
      border-bottom:1px solid var(--border);
      scrollbar-width:none;
      position:sticky; top:56px; z-index:99;
    }
    .category-bar::-webkit-scrollbar { display:none; }
    .cat-btn {
      flex-shrink:0; padding:10px 14px;
      border:none; background:none; cursor:pointer;
      font-size:13px; color:var(--text-muted);
      border-bottom:2px solid transparent;
      transition:all 0.2s; white-space:nowrap;
    }
    .cat-btn.active {
      color:var(--primary);
      border-bottom-color:var(--primary);
      font-weight:600;
    }

    /* ── Search ── */
    .search-box {
      padding:12px 16px; background:white;
      border-bottom:1px solid var(--border);
    }
    .search-wrap { position:relative; }
    .search-input {
      width:100%; padding:8px 36px 8px 12px;
      border:1px solid var(--border); border-radius:20px;
      font-size:14px; outline:none; background:var(--bg);
      transition:border-color 0.2s;
    }
    .search-input:focus { border-color:var(--primary); }
    .search-wrap i {
      position:absolute; right:12px; top:50%;
      transform:translateY(-50%); color:var(--text-muted);
      pointer-events:none;
    }

    /* ── Post List ── */
    .post-list { padding:12px 16px; max-width:800px; margin:0 auto; }
    .post-card {
      background:var(--card); border-radius:var(--radius);
      padding:16px; margin-bottom:10px;
      box-shadow:var(--shadow); cursor:pointer;
      transition:transform 0.15s, box-shadow 0.15s, border-left-color 0.15s;
      border-left:4px solid transparent;
    }
    .post-card:hover {
      transform:translateY(-2px);
      box-shadow:0 4px 20px rgba(0,0,0,0.12);
      border-left-color:var(--primary);
    }
    .post-header {
      display:flex; align-items:center; gap:10px; margin-bottom:10px;
    }
    .avatar {
      width:38px; height:38px; border-radius:50%; object-fit:cover;
      background:var(--primary); display:flex; align-items:center;
      justify-content:center; color:white; font-weight:700;
      font-size:14px; flex-shrink:0; overflow:hidden;
    }
    .avatar img { width:100%; height:100%; object-fit:cover; }
    .post-meta { flex:1; min-width:0; }
    .post-author { font-weight:600; font-size:14px; }
    .post-date   { font-size:12px; color:var(--text-muted); }
    .post-title  { font-size:16px; font-weight:700; margin-bottom:6px; line-height:1.4; }
    .post-preview {
      font-size:13px; color:var(--text-muted);
      line-height:1.5; margin-bottom:10px;
    }
    .post-footer {
      display:flex; align-items:center; gap:8px; flex-wrap:wrap;
    }
    .badge {
      padding:2px 8px; border-radius:10px; font-size:11px;
      font-weight:600; background:#e8f5e9; color:var(--primary);
      flex-shrink:0;
    }
    .tag {
      padding:2px 8px; border-radius:10px; font-size:11px;
      background:#e3f2fd; color:var(--secondary);
    }
    .stat {
      font-size:12px; color:var(--text-muted);
      display:flex; align-items:center; gap:3px;
    }
    .has-files { color:#ff9800; font-size:12px; }

    /* ── FAB ── */
    .fab {
      position:fixed; bottom:24px; right:20px;
      width:56px; height:56px; border-radius:50%;
      background:linear-gradient(135deg,#06C755,#04a847);
      color:white; border:none; font-size:24px; cursor:pointer;
      box-shadow:0 4px 16px rgba(6,199,85,0.4);
      display:flex; align-items:center; justify-content:center;
      transition:transform 0.2s, box-shadow 0.2s; z-index:200;
    }
    .fab:hover {
      transform:scale(1.1);
      box-shadow:0 6px 20px rgba(6,199,85,0.5);
    }

    /* ── Loading / Empty ── */
    .loading { text-align:center; padding:40px; color:var(--text-muted); }
    .spinner {
      width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--primary); border-radius:50%;
      animation:spin 0.8s linear infinite; margin:0 auto 12px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .empty i { font-size:48px; margin-bottom:12px; opacity:0.4; display:block; }

    /* ── User Panel ── */
    .user-panel {
      position:fixed; top:0; right:-300px; width:280px; height:100vh;
      background:white; box-shadow:-4px 0 20px rgba(0,0,0,0.15);
      z-index:300; transition:right 0.3s;
      display:flex; flex-direction:column;
    }
    .user-panel.open { right:0; }
    .panel-header {
      background:linear-gradient(135deg,#06C755,#04a847);
      padding:40px 20px 20px; color:white; text-align:center;
    }
    .panel-avatar {
      width:70px; height:70px; border-radius:50%;
      border:3px solid white; margin:0 auto 10px;
      display:block; object-fit:cover; background:#ccc;
    }
    .panel-name     { font-size:16px; font-weight:700; }
    .panel-realname { font-size:12px; opacity:0.85; margin-top:3px; }
    .panel-body { padding:16px; flex:1; overflow-y:auto; }
    .panel-item {
      display:flex; align-items:center; gap:12px;
      padding:13px 8px; border-bottom:1px solid var(--border);
      font-size:14px; cursor:pointer; border-radius:8px;
      transition:background 0.15s;
    }
    .panel-item:hover { background:var(--bg); }
    .panel-item:last-child { border-bottom:none; }
    .panel-item i { width:20px; color:var(--primary); text-align:center; }

    /* ── Overlay ── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.4);
      z-index:250; display:none;
    }
    .overlay.show { display:block; }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.82); color:white; padding:10px 22px;
      border-radius:20px; font-size:14px; z-index:999;
      opacity:0; transition:opacity 0.3s; pointer-events:none;
      white-space:nowrap; max-width:90vw;
    }
    .toast.show { opacity:1; }

    /* ── Pagination ── */
    .pagination {
      display:flex; justify-content:center;
      gap:6px; padding:16px 16px 80px;
    }
    .page-btn {
      padding:6px 13px; border:1px solid var(--border);
      border-radius:6px; background:white; cursor:pointer;
      font-size:13px; transition:all 0.15s;
    }
    .page-btn:hover   { border-color:var(--primary); color:var(--primary); }
    .page-btn.active  { background:var(--primary); color:white; border-color:var(--primary); }
    .page-btn:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── Connection Error Banner ── */
    .conn-banner {
      background:#fff3e0; border-bottom:1px solid #ffcc80;
      padding:8px 16px; font-size:13px; color:#e65100;
      display:none; align-items:center; gap:8px;
    }
    .conn-banner.show { display:flex; }
    .conn-banner button {
      margin-left:auto; padding:4px 12px; border:1px solid #ff9800;
      border-radius:12px; background:none; color:#e65100;
      cursor:pointer; font-size:12px;
    }

    /* ── Responsive ── */
    @media(min-width:768px) {
      .post-list  { padding:20px; }
      .post-card  { padding:20px; }
      .post-title { font-size:18px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand">
    <i class="fab fa-line"></i> 社群論壇
  </div>
  <div class="navbar-actions">
    <button class="btn-icon" id="refreshBtn" onclick="loadPosts()" title="重新整理">
      <i class="fas fa-sync-alt"></i>
    </button>
    <button class="btn-icon" onclick="openUserPanel()" title="個人資料">
      <i class="fas fa-user"></i>
    </button>
  </div>
</nav>

<!-- 連線錯誤提示 -->
<div class="conn-banner" id="connBanner">
  <i class="fas fa-exclamation-triangle"></i>
  <span id="connBannerMsg">連線異常，部分功能可能無法使用</span>
  <button onclick="retryConnection()">重試</button>
</div>

<!-- Category Bar -->
<div class="category-bar" id="categoryBar">
  <button class="cat-btn active">🏠 全部</button>
</div>

<!-- Search -->
<div class="search-box">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
           placeholder="搜尋帖子標題或內容..."
           oninput="debounceSearch()">
    <i class="fas fa-search"></i>
  </div>
</div>

<!-- Post List -->
<div class="post-list" id="postList">
  <div class="loading"><div class="spinner"></div>初始化中...</div>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<!-- FAB -->
<button class="fab" onclick="goToCreatePost()" title="發佈帖子">
  <i class="fas fa-pen"></i>
</button>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeUserPanel()"></div>

<!-- User Panel -->
<div class="user-panel" id="userPanel">
  <div class="panel-header">
    <img class="panel-avatar" id="panelAvatar"
         src="https://via.placeholder.com/70" alt="avatar"
         onerror="this.src='https://via.placeholder.com/70'">
    <div class="panel-name"     id="panelName">載入中...</div>
    <div class="panel-realname" id="panelRealName"></div>
  </div>
  <div class="panel-body">
    <div class="panel-item" onclick="goToCreatePost(); closeUserPanel();">
      <i class="fas fa-pen"></i><span>發佈帖子</span>
    </div>
    <div class="panel-item" onclick="filterMyPosts(); closeUserPanel();">
      <i class="fas fa-list-alt"></i><span>我的帖子</span>
    </div>
    <div class="panel-item" onclick="loadPosts(); closeUserPanel();">
      <i class="fas fa-sync-alt"></i><span>重新整理</span>
    </div>
    <div class="panel-item" onclick="confirmLogout()">
      <i class="fas fa-sign-out-alt"></i><span>登出</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // =============================================
  // 設定
  // =============================================
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbySOROWjGNXfkVpj1inYfnk5R-zBPPvG4HY5v1h4a143KZYLMJrCrrmCKJVCkBcdkN5fw/exec';
  const LIFF_ID     = '2009456572-F5PRsV4X';

  let currentUser     = null;
  let currentCategory = 'all';
  let currentPage     = 1;
  let searchTimer     = null;
  let categories      = [];
  let isMyPostsMode   = false;
  let myUserID        = null;

  // =============================================
  // CORS 安全 API 呼叫（GET + Base64 Payload）
  // =============================================
  async function apiCall(data) {
    try {
      const jsonStr = JSON.stringify(data);
      const b64     = btoa(unescape(encodeURIComponent(jsonStr)));
      const url     = WEB_APP_URL + '?payload=' + encodeURIComponent(b64);

      const res = await fetch(url, {
        method:   'GET',
        redirect: 'follow'
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const txt = await res.text();
      return parseResponse(txt);

    } catch (err) {
      console.error('[apiCall]', data.action, err);
      showConnBanner('連線失敗：' + err.message);
      return { success: false, message: err.message };
    }
  }

  function parseResponse(txt) {
    try {
      return JSON.parse(txt);
    } catch (e) {
      const m = txt.match(/(\{[\s\S]*\})/);
      if (m) {
        try { return JSON.parse(m[1]); } catch(e2) {}
      }
      console.warn('無法解析回應：', txt.substring(0, 300));
      return { success: false, message: '回應解析失敗' };
    }
  }

  // =============================================
  // LIFF 初始化
  // =============================================
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }

      const profile = await liff.getProfile();
      await checkUserLogin(profile);

    } catch (e) {
      console.error('LIFF init error:', e);
      showToast('⚠️ LIFF 初始化失敗：' + e.message);
      // 仍嘗試載入帖子（訪客模式）
      loadCategories();
    }
  }

  async function checkUserLogin(profile) {
    showToast('🔄 登入驗證中...');
    const res = await apiCall({
      action:  'login',
      lineUID: profile.userId
    });

    if (res.needRegister) {
      // 導向註冊頁
      location.href = WEB_APP_URL
        + '?page=register'
        + '&lineUID='      + encodeURIComponent(profile.userId)
        + '&displayName='  + encodeURIComponent(profile.displayName || '')
        + '&avatar='       + encodeURIComponent(profile.pictureUrl  || '');
      return;
    }

    if (res.success && res.user) {
      currentUser = res.user;
      myUserID    = res.user.userID;
      updateUserPanel(res.user);
      hideConnBanner();
      showToast('👋 歡迎回來，' + res.user.displayName + '！');
    } else {
      showToast('⚠️ 登入失敗：' + (res.message || '未知錯誤'));
    }

    loadCategories();
  }

  // =============================================
  // 更新用戶面板
  // =============================================
  function updateUserPanel(user) {
    const avatar = document.getElementById('panelAvatar');
    if (user.avatar) {
      avatar.src = user.avatar;
    }
    document.getElementById('panelName').textContent     = user.displayName || '';
    document.getElementById('panelRealName').textContent = user.realName    || '';
  }

  // =============================================
  // 分類
  // =============================================
  async function loadCategories() {
    const res = await apiCall({ action: 'getCategories' });
    if (res.success && res.categories) {
      categories = res.categories;
    } else {
      // 預設分類（離線備援）
      categories = [
        { id:'all',  name:'全部',     icon:'🏠' },
        { id:'公告', name:'公告',     icon:'📢' },
        { id:'一般', name:'一般討論', icon:'💬' },
        { id:'技術', name:'技術交流', icon:'💻' },
        { id:'生活', name:'生活分享', icon:'🌟' },
        { id:'問答', name:'問答',     icon:'❓' },
        { id:'活動', name:'活動資訊', icon:'🎉' }
      ];
    }
    renderCategories();
    loadPosts();
  }

  function renderCategories() {
    const bar = document.getElementById('categoryBar');
    bar.innerHTML = categories.map(c => `
      <button class="cat-btn ${c.id === currentCategory ? 'active' : ''}"
              onclick="selectCategory('${escAttr(c.id)}')">
        ${c.icon} ${escHtml(c.name)}
      </button>`
    ).join('');
  }

  function selectCategory(id) {
    currentCategory = id;
    currentPage     = 1;
    isMyPostsMode   = false;
    renderCategories();
    loadPosts();
  }

  // =============================================
  // 帖子列表
  // =============================================
  async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';

    // 旋轉重新整理按鈕
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.querySelector('i').classList.add('fa-spin');

    const keyword = document.getElementById('searchInput').value.trim();

    const payload = {
      action:   'getPosts',
      category: currentCategory,
      page:     currentPage,
      pageSize: 10,
      keyword:  keyword
    };

    // 我的帖子模式
    if (isMyPostsMode && myUserID) {
      payload.userID = myUserID;
    }

    const res = await apiCall(payload);

    refreshBtn.querySelector('i').classList.remove('fa-spin');

    if (res.success) {
      hideConnBanner();
      renderPosts(res.posts || []);
      renderPagination(res.total || 0, res.pageSize || 10);
    } else {
      list.innerHTML = `
        <div class="empty">
          <i class="fas fa-exclamation-circle" style="color:#e53935"></i>
          <p>載入失敗</p>
          <p style="font-size:12px;margin-top:6px;color:#aaa">${escHtml(res.message||'')}</p>
          <button onclick="loadPosts()"
            style="margin-top:14px;padding:8px 20px;background:var(--primary);
                   color:white;border:none;border-radius:20px;cursor:pointer;font-size:13px">
            重試
          </button>
        </div>`;
      showConnBanner(res.message || '載入失敗');
    }
  }

  function renderPosts(posts) {
    const list = document.getElementById('postList');

    if (!posts.length) {
      list.innerHTML = `
        <div class="empty">
          <i class="fas fa-comments"></i>
          <p>${isMyPostsMode ? '您還沒有發佈任何帖子' : '暫無帖子，來發第一篇吧！'}</p>
        </div>`;
      return;
    }

    list.innerHTML = posts.map(p => {
      // 頭像
      const avatarHtml = p.avatar
        ? `<div class="avatar"><img src="${escAttr(p.avatar)}" alt="avatar"
             onerror="this.parentElement.textContent='${escAttr((p.displayName||'?')[0])}'"></div>`
        : `<div class="avatar">${escHtml((p.displayName||'?')[0])}</div>`;

      // 標籤
      const tagsHtml = (p.tags||[]).slice(0,3)
        .map(t => `<span class="tag">#${escHtml(t)}</span>`)
        .join('');

      // 附件
      const filesHtml = (p.files && p.files.length)
        ? `<span class="has-files"><i class="fas fa-paperclip"></i> ${p.files.length}</span>`
        : '';

      return `
        <div class="post-card" onclick="viewPost('${escAttr(p.postID)}')">
          <div class="post-header">
            ${avatarHtml}
            <div class="post-meta">
              <div class="post-author">${escHtml(p.displayName)}</div>
              <div class="post-date">${formatRelTime(p.createDate)}</div>
            </div>
            <span class="badge">${escHtml(p.category)}</span>
          </div>
          <div class="post-title">${escHtml(p.title)}</div>
          <div class="post-preview">${escHtml(p.content)}</div>
          <div class="post-footer">
            ${tagsHtml}
            ${filesHtml}
            <span class="stat" style="margin-left:auto">
              <i class="fas fa-eye"></i> ${p.views||0}
            </span>
            <span class="stat">
              <i class="fas fa-comment"></i> ${p.replyCount||0}
            </span>
          </div>
        </div>`;
    }).join('');
  }

  // =============================================
  // 分頁
  // =============================================
  function renderPagination(total, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    const pg         = document.getElementById('pagination');

    if (totalPages <= 1) { pg.innerHTML = ''; return; }

    let html = '';

    // 上一頁
    html += `<button class="page-btn" onclick="changePage(${currentPage-1})"
              ${currentPage <= 1 ? 'disabled' : ''}>
              <i class="fas fa-chevron-left"></i>
             </button>`;

    // 頁碼（最多顯示 5 個）
    const start = Math.max(1, currentPage - 2);
    const end   = Math.min(totalPages, start + 4);

    if (start > 1) {
      html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
      if (start > 2) html += `<span style="padding:6px 4px;color:#aaa">…</span>`;
    }

    for (let i = start; i <= end; i++) {
      html += `<button class="page-btn ${i===currentPage?'active':''}"
                       onclick="changePage(${i})">${i}</button>`;
    }

    if (end < totalPages) {
      if (end < totalPages - 1) html += `<span style="padding:6px 4px;color:#aaa">…</span>`;
      html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
    }

    // 下一頁
    html += `<button class="page-btn" onclick="changePage(${currentPage+1})"
              ${currentPage >= totalPages ? 'disabled' : ''}>
              <i class="fas fa-chevron-right"></i>
             </button>`;

    pg.innerHTML = html;
  }

  function changePage(p) {
    if (p < 1) return;
    currentPage = p;
    loadPosts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // =============================================
  // 導航
  // =============================================
  function viewPost(postID) {
    location.href = WEB_APP_URL + '?page=postDetail&postID=' + encodeURIComponent(postID);
  }

  function goToCreatePost() {
    if (!currentUser) {
      showToast('⚠️ 請先登入後才能發佈帖子');
      return;
    }
    location.href = WEB_APP_URL + '?page=post';
  }

  function filterMyPosts() {
    if (!currentUser) { showToast('請先登入'); return; }
    isMyPostsMode   = true;
    currentPage     = 1;
    currentCategory = 'all';
    renderCategories();
    loadPosts();
    showToast('📋 顯示我的帖子');
  }

  // =============================================
  // 搜尋（防抖）
  // =============================================
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      currentPage   = 1;
      isMyPostsMode = false;
      loadPosts();
    }, 500);
  }

  // =============================================
  // User Panel
  // =============================================
  function openUserPanel() {
    document.getElementById('userPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }

  function closeUserPanel() {
    document.getElementById('userPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  function confirmLogout() {
    if (confirm('確定要登出嗎？')) {
      try { liff.logout(); } catch(e) {}
      location.reload();
    }
  }

  // =============================================
  // 連線狀態提示
  // =============================================
  function showConnBanner(msg) {
    const banner = document.getElementById('connBanner');
    document.getElementById('connBannerMsg').textContent = msg || '連線異常';
    banner.classList.add('show');
  }

  function hideConnBanner() {
    document.getElementById('connBanner').classList.remove('show');
  }

  async function retryConnection() {
    hideConnBanner();
    showToast('🔄 重新連線中...');
    const res = await apiCall({ action: 'healthCheck' });
    if (res.success) {
      showToast('✅ 連線恢復正常');
      loadPosts();
    } else {
      showConnBanner('仍無法連線，請稍後再試');
    }
  }

  // =============================================
  // 工具函數
  // =============================================
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;')
                          .replace(/</g,'&lt;')
                          .replace(/>/g,'&gt;')
                          .replace(/"/g,'&quot;');
  }

  function escAttr(s) {
    return String(s || '').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  }

  function formatRelTime(dateStr) {
    if (!dateStr) return '';
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60)      return '剛剛';
    if (diff < 3600)    return Math.floor(diff / 60)   + ' 分鐘前';
    if (diff < 86400)   return Math.floor(diff / 3600) + ' 小時前';
    if (diff < 2592000) return Math.floor(diff / 86400)+ ' 天前';
    return String(dateStr).substring(0, 10);
  }

  // =============================================
  // 啟動
  // =============================================
  initLiff();
</script>
</body>
</html>
