<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>LINE 論壇</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --primary:       #06C755;
      --primary-dark:  #05a847;
      --primary-light: #e8f9ef;
      --danger:        #e53935;
      --danger-light:  #fdecea;
      --bg:            #ffffff;
      --bg-secondary:  #f7f8fa;
      --border:        #e8eaed;
      --text:          #1a1a1a;
      --text-light:    #6b7280;
      --text-muted:    #9ca3af;
      --shadow:        0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg:     0 8px 32px rgba(0,0,0,0.14);
      --radius:        12px;
      --radius-sm:     8px;
      --transition:    all 0.2s ease;
      --fs-base:       15px;
      --fs-title:      17px;
      --fs-detail:     16px;
      --fs-reply:      15px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      font-size: var(--fs-base);
      line-height: 1.6;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }
    input, textarea, select { font-family: inherit; outline: none; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ── Loading ── */
    #loading-screen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 20px;
    }
    .loading-logo {
      width: 72px; height: 72px; border-radius: 20px;
      background: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: white;
      box-shadow: 0 8px 24px rgba(6,199,85,0.35);
      animation: logoPulse 1.8s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { transform: scale(1);    box-shadow: 0 8px 24px rgba(6,199,85,0.35); }
      50%      { transform: scale(1.08); box-shadow: 0 12px 32px rgba(6,199,85,0.5); }
    }
    .loading-text { font-size: 15px; color: var(--text-light); }
    .loading-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Register ── */
    #register-screen {
      display: none; min-height: 100vh;
      background: linear-gradient(160deg, #e8f9ef 0%, #f7f8fa 100%);
      align-items: center; justify-content: center; padding: 24px;
    }
    .register-card {
      background: var(--bg); border-radius: 20px;
      padding: 36px 28px; width: 100%; max-width: 400px;
      box-shadow: var(--shadow-lg);
    }
    .register-logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: var(--primary); margin: 0 auto 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: white;
      box-shadow: 0 6px 20px rgba(6,199,85,0.3);
    }
    .register-title { text-align: center; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .register-sub   { text-align: center; font-size: 13px; color: var(--text-light); margin-bottom: 28px; }
    .form-group  { margin-bottom: 16px; }
    .form-label  { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .form-input  {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: var(--fs-base); background: var(--bg);
      color: var(--text); transition: var(--transition);
    }
    .form-input:focus        { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.12); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-hint   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .btn-register {
      width: 100%; padding: 14px; border-radius: var(--radius-sm);
      background: var(--primary); color: white;
      font-size: 15px; font-weight: 700;
      transition: var(--transition); margin-top: 8px;
    }
    .btn-register:hover    { background: var(--primary-dark); }
    .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── App ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 16px; height: 56px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .header-logo  {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--primary); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: white;
    }
    .header-title { font-size: 17px; font-weight: 700; color: var(--text); flex: 1; }
    .header-user  { display: flex; align-items: center; gap: 8px; }
    .header-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--primary-light); flex-shrink: 0;
    }
    .header-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .font-size-toggle {
      display: flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: var(--transition); flex-shrink: 0; color: var(--text);
    }
    .font-size-toggle:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ── Toolbar ── */
    .toolbar {
      background: var(--bg); padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; gap: 8px; align-items: center;
    }
    .search-wrap { position: relative; flex: 1; }
    .search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 14px;
      color: var(--text-muted); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 9px 12px 9px 32px;
      border: 1.5px solid var(--border); border-radius: 20px;
      font-size: 14px; background: var(--bg-secondary);
      color: var(--text); transition: var(--transition);
    }
    .search-input:focus { border-color: var(--primary); background: var(--bg); box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .cat-select {
      padding: 9px 10px; border: 1.5px solid var(--border);
      border-radius: 20px; font-size: 13px;
      background: var(--bg-secondary); color: var(--text);
      cursor: pointer; transition: var(--transition); max-width: 110px;
    }
    .cat-select:focus { border-color: var(--primary); }

    /* ── Post List ── */
    .posts-container { flex: 1; padding: 12px 16px; }
    .post-card {
      background: var(--bg); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px;
      box-shadow: var(--shadow); cursor: pointer;
      transition: var(--transition); border: 1px solid transparent;
    }
    .post-card:hover { border-color: var(--primary-light); box-shadow: 0 4px 20px rgba(6,199,85,0.12); transform: translateY(-1px); }
    .post-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0; border: 2px solid var(--primary-light);
    }
    .post-meta   { flex: 1; min-width: 0; }
    .post-author { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .post-time   { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .post-cat-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: var(--primary-light); color: var(--primary);
      font-weight: 600; white-space: nowrap; flex-shrink: 0;
    }
    .post-title   { font-size: var(--fs-title); font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.4; }
    .post-preview {
      font-size: var(--fs-base); color: var(--text-light); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .post-footer { display: flex; align-items: center; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .post-stat   { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-muted); }
    .post-tags   { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .tag-badge   { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg-secondary); color: var(--text-light); border: 1px solid var(--border); }

    /* ── FAB ── */
    .fab {
      position: fixed; right: 20px; bottom: 28px;
      width: 54px; height: 54px; border-radius: 50%;
      background: var(--primary); color: white; font-size: 26px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(6,199,85,0.4);
      transition: var(--transition); z-index: 50;
    }
    .fab:hover { background: var(--primary-dark); box-shadow: 0 8px 28px rgba(6,199,85,0.5); transform: scale(1.08); }

    /* ── Pagination ── */
    #pagination { display: flex; justify-content: center; gap: 6px; padding: 16px 0 80px; flex-wrap: wrap; }
    .page-btn {
      min-width: 36px; height: 36px; padding: 0 10px;
      border-radius: var(--radius-sm); border: 1.5px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 14px; transition: var(--transition);
    }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .page-btn.active   { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 3px 10px rgba(6,199,85,0.3); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 680px; max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px 14px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-close {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg-secondary); color: var(--text-light);
      font-size: 14px; display: flex; align-items: center; justify-content: center;
      transition: var(--transition);
    }
    .modal-close:hover { background: var(--danger-light); color: var(--danger); }
    .modal-body   { padding: 20px; }
    .modal-footer { padding: 14px 20px 24px; border-top: 1px solid var(--border); }

    /* ── Detail ── */
    .detail-author-row  { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .detail-avatar      { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-light); }
    .detail-author-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .detail-author-time { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .detail-title   { font-size: calc(var(--fs-title) + 2px); font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 14px; }
    .detail-content { font-size: var(--fs-detail); color: var(--text); line-height: 1.8; white-space: pre-wrap; margin-bottom: 16px; }
    .detail-attachments { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .attach-img  { width: 100px; height: 100px; object-fit: cover; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid var(--border); transition: var(--transition); }
    .attach-img:hover { opacity: 0.85; transform: scale(1.03); }
    .attach-file {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      background: var(--bg-secondary); border: 1px solid var(--border);
      font-size: 13px; color: var(--primary); transition: var(--transition);
    }
    .attach-file:hover { background: var(--primary-light); }

    /* ── Replies ── */
    .replies-section { margin-top: 20px; }
    .replies-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 2px solid var(--primary-light);
      display: flex; align-items: center; gap: 6px;
    }
    .reply-item { display: flex; gap: 10px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .reply-item:last-child { border-bottom: none; margin-bottom: 0; }
    .reply-avatar  { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid var(--primary-light); }
    .reply-body    { flex: 1; min-width: 0; }
    .reply-header  { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .reply-author  { font-size: 13px; font-weight: 700; color: var(--text); }
    .reply-time    { font-size: 11px; color: var(--text-muted); }
    .reply-content { font-size: var(--fs-reply); color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .reply-delete-btn { margin-left: auto; font-size: 11px; color: var(--text-muted); background: none; padding: 2px 6px; border-radius: 4px; transition: var(--transition); }
    .reply-delete-btn:hover { color: var(--danger); background: var(--danger-light); }

    /* ── Reply Input ── */
    .reply-input-area { background: var(--bg-secondary); border-radius: var(--radius); padding: 14px; margin-top: 20px; }
    .reply-textarea {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: var(--fs-base); resize: vertical; min-height: 80px;
      background: var(--bg); color: var(--text); transition: var(--transition);
    }
    .reply-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .reply-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .reply-file-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 12px; border-radius: var(--radius-sm);
      background: var(--bg); border: 1.5px solid var(--border);
      font-size: 13px; color: var(--text-light); transition: var(--transition);
    }
    .reply-file-btn:hover { border-color: var(--primary); color: var(--primary); }
    .btn-reply-submit { padding: 9px 22px; border-radius: var(--radius-sm); background: var(--primary); color: white; font-size: 14px; font-weight: 700; transition: var(--transition); }
    .btn-reply-submit:hover    { background: var(--primary-dark); }
    .btn-reply-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── New Post ── */
    .form-textarea {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: var(--fs-base); resize: vertical;
      background: var(--bg); color: var(--text); transition: var(--transition);
    }
    .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .form-select {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: var(--fs-base); background: var(--bg);
      color: var(--text); cursor: pointer; transition: var(--transition);
    }
    .form-select:focus { border-color: var(--primary); }
    .char-count { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 4px; }
    .file-upload-area {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 20px; text-align: center; cursor: pointer;
      transition: var(--transition); background: var(--bg-secondary);
    }
    .file-upload-area:hover        { border-color: var(--primary); background: var(--primary-light); }
    .file-upload-area .upload-icon { font-size: 28px; margin-bottom: 8px; }
    .file-upload-area .upload-text { font-size: 13px; color: var(--text-light); }
    .file-upload-area .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .preview-item { position: relative; width: 80px; height: 80px; border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .preview-remove {
      position: absolute; top: 2px; right: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.6); color: white; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: var(--transition);
    }
    .preview-item .preview-remove:hover { background: var(--danger); }
    .preview-file-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: var(--radius-sm);
      background: var(--bg-secondary); border: 1px solid var(--border);
      font-size: 12px; color: var(--text-light);
    }
    .btn-submit { width: 100%; padding: 14px; border-radius: var(--radius-sm); background: var(--primary); color: white; font-size: 15px; font-weight: 700; transition: var(--transition); }
    .btn-submit:hover    { background: var(--primary-dark); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Font Modal ── */
    .font-size-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 8px 0; }
    .font-size-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 14px 16px; border-radius: var(--radius);
      border: 2px solid var(--border); background: var(--bg);
      cursor: pointer; transition: var(--transition); min-width: 68px; color: var(--text);
    }
    .font-size-btn:hover  { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .font-size-btn.active { border-color: var(--primary); background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(6,199,85,0.3); }
    .font-size-btn .btn-sample { font-weight: 700; line-height: 1; }
    .font-size-btn .btn-label  { font-size: 11px; opacity: 0.85; }
    .font-preview-label { font-size: 12px; color: var(--text-light); margin-bottom: 14px; text-align: center; }
    .font-preview-box { background: var(--bg-secondary); border-radius: var(--radius); padding: 16px 20px; margin-top: 20px; border: 1px solid var(--border); }
    .font-preview-box .preview-title   { font-weight: 700; color: var(--text); font-size: var(--fs-title); margin-bottom: 8px; line-height: 1.4; }
    .font-preview-box .preview-content { color: var(--text-light); line-height: 1.7; font-size: var(--fs-detail); }
    .font-preview-box .preview-reply   { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); font-size: var(--fs-reply); color: var(--text); line-height: 1.6; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    #lightbox.show { opacity: 1; pointer-events: all; }
    #lightbox img  { max-width: 95vw; max-height: 90vh; border-radius: var(--radius-sm); box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
    #lightbox-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: white; font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: var(--transition);
    }
    #lightbox-close:hover { background: rgba(255,255,255,0.3); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333; color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; white-space: nowrap;
      opacity: 0; transition: all 0.3s ease;
      pointer-events: none; z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    }
    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--primary); }
    #toast.error   { background: var(--danger); }
    #toast.info    { background: #1a73e8; }

    /* ── Skeleton ── */
    .skeleton-card { background: var(--bg); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Empty ── */
    .empty-state            { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .empty-text { font-size: 15px; margin-bottom: 6px; color: var(--text-light); }
    .empty-state .empty-sub  { font-size: 13px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">💬</div>
  <div class="loading-text">載入中，請稍候…</div>
  <div class="loading-spinner"></div>
</div>

<!-- Register -->
<div id="register-screen">
  <div class="register-card">
    <div class="register-logo">💬</div>
    <div class="register-title">加入論壇</div>
    <div class="register-sub">首次使用請完成基本資料填寫</div>
    <div class="form-group">
      <label class="form-label">真實姓名 <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="reg-name" type="text" placeholder="請輸入您的真實姓名" maxlength="20" />
    </div>
    <div class="form-group">
      <label class="form-label">手機號碼 <span style="color:var(--danger)">*</span></label>
      <input class="form-input" id="reg-phone" type="tel" placeholder="09xxxxxxxx" maxlength="10" />
      <div class="form-hint">請輸入 09 開頭的 10 位數手機號碼</div>
    </div>
    <button class="btn-register" id="reg-btn" onclick="submitRegister()">完成註冊 →</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header class="header">
    <div class="header-logo">💬</div>
    <div class="header-title">社群論壇</div>
    <div class="header-user">
      <img class="header-avatar" id="header-avatar" src="" alt="avatar"
           onerror="this.style.display='none'" />
      <span class="header-name" id="header-name"></span>
      <button class="font-size-toggle" onclick="openFontPanel()" title="字體大小設定">文</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="search-input" type="search"
             placeholder="搜尋帖子…" oninput="debounceSearch(this.value)" />
    </div>
    <select class="cat-select" id="cat-filter" onchange="onCatChange(this.value)">
      <option value="">全部分類</option>
    </select>
  </div>

  <div class="posts-container">
    <div id="posts-list"></div>
    <div id="pagination"></div>
  </div>

  <button class="fab" onclick="openNewPost()" title="發新帖子">＋</button>
</div>

<!-- 帖子詳情 Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📄 帖子詳情</span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="detail-content">
        <div style="text-align:center;padding:40px">
          <div class="loading-spinner" style="margin:0 auto"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增帖子 Modal -->
<div class="modal-overlay" id="newpost-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">✏️ 發表新帖子</span>
      <button class="modal-close" onclick="closeModal('newpost-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">分類 <span style="color:var(--danger)">*</span></label>
        <select class="form-select" id="post-cat"><option value="">請選擇分類</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">標題 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" id="post-title" type="text"
               placeholder="請輸入帖子標題（最多 100 字）" maxlength="100"
               oninput="document.getElementById('title-count').textContent=this.value.length" />
        <div class="char-count"><span id="title-count">0</span> / 100</div>
      </div>
      <div class="form-group">
        <label class="form-label">內容 <span style="color:var(--danger)">*</span></label>
        <textarea class="form-textarea" id="post-content" rows="6"
                  placeholder="請輸入帖子內容（最多 5000 字）" maxlength="5000"
                  oninput="document.getElementById('content-count').textContent=this.value.length"></textarea>
        <div class="char-count"><span id="content-count">0</span> / 5000</div>
      </div>
      <div class="form-group">
        <label class="form-label">標籤</label>
        <input class="form-input" id="post-tags" type="text"
               placeholder="多個標籤請用逗號分隔，例：生活,分享,心得" />
        <div class="form-hint">最多 5 個標籤，每個標籤最多 10 字</div>
      </div>
      <div class="form-group">
        <label class="form-label">附件</label>
        <div class="file-upload-area" onclick="document.getElementById('post-file-input').click()">
          <div class="upload-icon">📎</div>
          <div class="upload-text">點擊上傳圖片或檔案</div>
          <div class="upload-hint">支援 JPG、PNG、GIF、PDF，單檔最大 5MB，最多 5 個</div>
        </div>
        <input type="file" id="post-file-input" multiple accept="image/*,.pdf"
               style="display:none" onchange="handlePostFiles(this.files)" />
        <div class="preview-grid" id="post-preview"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-submit" id="post-submit-btn" onclick="submitPost()">🚀 發表帖子</button>
    </div>
  </div>
</div>

<!-- 字體大小 Modal -->
<div class="modal-overlay" id="font-modal">
  <div class="modal" style="max-height:70vh">
    <div class="modal-header">
      <span class="modal-title">🔤 字體大小設定</span>
      <button class="modal-close" onclick="closeModal('font-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="font-preview-label">選擇適合您的閱讀字體大小</div>
      <div class="font-size-options">
        <button class="font-size-btn" data-size="small"  onclick="applyFontSize('small')">
          <span class="btn-sample" style="font-size:13px">文</span>
          <span class="btn-label">小</span>
        </button>
        <button class="font-size-btn" data-size="medium" onclick="applyFontSize('medium')">
          <span class="btn-sample" style="font-size:15px">文</span>
          <span class="btn-label">中</span>
        </button>
        <button class="font-size-btn" data-size="medlg"  onclick="applyFontSize('medlg')">
          <span class="btn-sample" style="font-size:17px">文</span>
          <span class="btn-label">中大</span>
        </button>
        <button class="font-size-btn" data-size="large"  onclick="applyFontSize('large')">
          <span class="btn-sample" style="font-size:19px">文</span>
          <span class="btn-label">大</span>
        </button>
        <button class="font-size-btn" data-size="xlarge" onclick="applyFontSize('xlarge')">
          <span class="btn-sample" style="font-size:22px">文</span>
          <span class="btn-label">特大</span>
        </button>
      </div>
      <div class="font-preview-box">
        <div class="preview-title">📌 帖子標題預覽</div>
        <div class="preview-content">這是帖子內容的預覽文字，您可以透過上方按鈕即時調整字體大小，選擇最適合您閱讀的尺寸，設定會自動儲存。</div>
        <div class="preview-reply">💬 這是回覆內容的預覽文字，感謝您的分享！</div>
      </div>
    </div>
    <div class="modal-footer" style="text-align:center">
      <button class="btn-submit" onclick="closeModal('font-modal')" style="padding:10px 40px">✅ 確認</button>
      <div style="font-size:12px;color:var(--text-light);margin-top:8px">預設值：中大｜設定自動儲存於裝置</div>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="預覽圖片" onclick="event.stopPropagation()" />
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ══════════════════════════════════════
// ⚙️ 設定（請填入實際值）
// ══════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRJUrYv7zYeLa1vAwJ1-jQtgAhxjcTlZoM1jpNgRsbAAwRp7pIwgIFvWyN9Q4DtB30bA/exec';
const LIFF_ID = '2009456572-F5PRsV4X';

// ══════════════════════════════════════
// 🔤 字體大小
// ══════════════════════════════════════
const FONT_SIZES = {
  small:  { base: 13, title: 15, detail: 14, reply: 13 },
  medium: { base: 14, title: 16, detail: 15, reply: 14 },
  medlg:  { base: 15, title: 17, detail: 16, reply: 15 },
  large:  { base: 16, title: 19, detail: 17, reply: 16 },
  xlarge: { base: 18, title: 22, detail: 19, reply: 18 },
};
const FONT_SIZE_KEY  = 'forum_font_size';
let   currentFontSize = localStorage.getItem(FONT_SIZE_KEY) || 'medlg';

function applyFontSize(sizeKey) {
  const cfg  = FONT_SIZES[sizeKey] || FONT_SIZES.medlg;
  const root = document.documentElement;
  root.style.setProperty('--fs-base',   cfg.base   + 'px');
  root.style.setProperty('--fs-title',  cfg.title  + 'px');
  root.style.setProperty('--fs-detail', cfg.detail + 'px');
  root.style.setProperty('--fs-reply',  cfg.reply  + 'px');
  document.querySelectorAll('.font-size-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.size === sizeKey)
  );
  currentFontSize = sizeKey;
  localStorage.setItem(FONT_SIZE_KEY, sizeKey);
}

function openFontPanel() { openModal('font-modal'); }

// ══════════════════════════════════════
// 🌐 全域狀態
// ══════════════════════════════════════
let currentUser      = null;
let categories       = [];
let currentPage      = 1;
let currentCat       = '';
let currentKeyword   = '';
let currentPostId    = null;
let postAttachments  = [];
let replyAttachments = [];
let searchTimer      = null;
const PAGE_SIZE      = 15;

// ══════════════════════════════════════
// 🚀 初始化
// ══════════════════════════════════════
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    console.log('[LIFF] profile:', profile);

    const res = await apiGet('getUser', { uid: profile.userId });
    console.log('[API] getUser:', res);

    // ✅ 修正：嚴格判斷 res.success 且 res.user 存在且有 uid
    if (res.success === true && res.user && res.user.uid) {
      currentUser = res.user;
      showApp();
    } else {
      showRegister(profile);
    }
  } catch (e) {
    console.error('[init] error:', e);
    document.getElementById('loading-screen').innerHTML =
      `<div style="text-align:center;padding:40px;color:var(--danger)">
         ⚠️ 初始化失敗，請重新整理頁面<br>
         <small style="color:var(--text-muted);font-size:12px">${e.message || ''}</small>
       </div>`;
  }
}

// ══════════════════════════════════════
// 📝 註冊
// ══════════════════════════════════════
let pendingProfile = null;

function showRegister(profile) {
  pendingProfile = profile;
  document.getElementById('loading-screen').style.display  = 'none';
  document.getElementById('register-screen').style.display = 'flex';
}

async function submitRegister() {
  const name  = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const btn   = document.getElementById('reg-btn');

  if (!name)                    { showToast('請輸入真實姓名', 'error'); return; }
  if (!/^09\d{8}$/.test(phone)) { showToast('手機號碼格式不正確', 'error'); return; }

  btn.disabled    = true;
  btn.textContent = '註冊中…';

  const res = await apiPost({
    action:    'register',
    uid:       pendingProfile.userId,
    lineName:  pendingProfile.displayName,
    avatarUrl: pendingProfile.pictureUrl || '',
    name, phone,
  });

  if (res.success) {
    currentUser = res.user;
    document.getElementById('register-screen').style.display = 'none';
    showApp();
    showToast('🎉 註冊成功，歡迎加入！', 'success');
  } else {
    showToast(res.message || '註冊失敗，請稍後再試', 'error');
    btn.disabled    = false;
    btn.textContent = '完成註冊 →';
  }
}

// ══════════════════════════════════════
// 🏠 顯示主應用程式
// ══════════════════════════════════════
function showApp() {
  document.getElementById('loading-screen').style.display  = 'none';
  document.getElementById('register-screen').style.display = 'none';
  document.getElementById('app').style.display             = 'flex';
  document.getElementById('header-avatar').src             = currentUser.avatarUrl || '';
  document.getElementById('header-name').textContent       =
    currentUser.name || currentUser.lineName || '';
  loadCategories();
  loadPosts();
}

// ══════════════════════════════════════
// 📂 分類
// ══════════════════════════════════════
async function loadCategories() {
  const res = await apiGet('getCategories', {});
  if (!res.success) return;
  categories = res.categories || [];

  const filter  = document.getElementById('cat-filter');
  const postCat = document.getElementById('post-cat');
  filter.innerHTML  = '<option value="">全部分類</option>';
  postCat.innerHTML = '<option value="">請選擇分類</option>';

  categories.forEach(c => {
    const text = `${c.icon || ''} ${c.name}`.trim();
    [filter, postCat].forEach(sel => {
      const opt       = document.createElement('option');
      opt.value       = c.id;
      opt.textContent = text;
      sel.appendChild(opt);
    });
  });
}

function onCatChange(val) {
  currentCat  = val;
  currentPage = 1;
  loadPosts();
}

// ══════════════════════════════════════
// 📋 帖子列表
// ══════════════════════════════════════
async function loadPosts() {
  const list = document.getElementById('posts-list');
  list.innerHTML = renderSkeletons(4);

  const res = await apiGet('getPosts', {
    page: currentPage, size: PAGE_SIZE,
    cat: currentCat, keyword: currentKeyword,
  });

  if (!res.success) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-text">載入失敗</div>
      <div class="empty-sub">${escHtml(res.message || '請稍後再試')}</div>
    </div>`;
    return;
  }

  const posts = res.posts || [];
  if (posts.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">目前沒有帖子</div>
      <div class="empty-sub">成為第一個發帖的人吧！</div>
    </div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = posts.map(renderPostCard).join('');
  renderPagination(res.totalPages || 1, currentPage);
}

// ══════════════════════════════════════
// 🃏 帖子卡片
// ══════════════════════════════════════
function renderPostCard(post) {
  // ✅ 修正：tags 型別保護
  const tagsHtml = renderTagBadges(post.tags);
  const initial  = escHtml((post.authorName || '?')[0]);
  const fbUrl    = makeSvgAvatar(40, initial, 18);

  return `
    <div class="post-card" onclick="openPostDetail('${escHtml(post.id)}')">
      <div class="post-card-header">
        <img class="post-avatar"
             src="${escHtml(post.avatarUrl || '')}"
             onerror="this.src='${fbUrl}'" alt="avatar" />
        <div class="post-meta">
          <div class="post-author">${escHtml(post.authorName || '匿名')}</div>
          <div class="post-time">${formatTime(post.createdAt)}</div>
        </div>
        <span class="post-cat-badge">${escHtml(getCatLabel(post.cat))}</span>
      </div>
      <div class="post-title">${escHtml(post.title)}</div>
      <div class="post-preview">${escHtml(post.content)}</div>
      ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
      <div class="post-footer">
        <span class="post-stat">💬 ${Number(post.replyCount) || 0} 則回覆</span>
        <span class="post-stat">🕐 ${formatTime(post.updatedAt || post.createdAt)}</span>
      </div>
    </div>`;
}

// ══════════════════════════════════════
// 📖 帖子詳情
// ══════════════════════════════════════
async function openPostDetail(postId) {
  currentPostId = postId;
  openModal('detail-modal');
  document.getElementById('detail-content').innerHTML = `
    <div style="text-align:center;padding:40px">
      <div class="loading-spinner" style="margin:0 auto"></div>
    </div>`;

  const res = await apiGet('getPostDetail', { postId, uid: currentUser.uid });
  if (!res.success) {
    document.getElementById('detail-content').innerHTML =
      `<div class="empty-state">
         <div class="empty-icon">⚠️</div>
         <div class="empty-text">${escHtml(res.message || '載入失敗')}</div>
       </div>`;
    return;
  }
  document.getElementById('detail-content').innerHTML =
    renderDetail(res.post, res.replies || []);
}

// ══════════════════════════════════════
// 📄 渲染詳情
// ══════════════════════════════════════
function renderDetail(post, replies) {
  const isOwner  = currentUser && post.uid === currentUser.uid;
  // ✅ 修正：tags 型別保護
  const tagsHtml = renderTagBadges(post.tags);
  const fb44     = makeSvgAvatar(44, escHtml((post.authorName || '?')[0]), 20);

  return `
    <div class="detail-author-row">
      <img class="detail-avatar"
           src="${escHtml(post.avatarUrl || '')}"
           onerror="this.src='${fb44}'" alt="avatar" />
      <div>
        <div class="detail-author-name">${escHtml(post.authorName || '匿名')}</div>
        <div class="detail-author-time">
          <span class="post-cat-badge" style="font-size:10px">
            ${escHtml(getCatLabel(post.cat))}
          </span>
          &nbsp;${formatTime(post.createdAt)}
        </div>
      </div>
      ${isOwner
        ? `<button class="reply-delete-btn" style="margin-left:auto"
                   onclick="deletePost('${escHtml(post.id)}')">🗑️ 刪除</button>`
        : ''}
    </div>
    <div class="detail-title">${escHtml(post.title)}</div>
    <div class="detail-content">${escHtml(post.content)}</div>
    ${tagsHtml ? `<div class="post-tags" style="margin-bottom:14px">${tagsHtml}</div>` : ''}
    ${renderAttachments(post.attachments)}
    <div class="replies-section">
      <div class="replies-title">
        💬 回覆
        <span style="font-size:13px;font-weight:400;color:var(--text-muted)">
          共 ${replies.length} 則
        </span>
      </div>
      <div id="replies-list">
        ${replies.length === 0
          ? `<div class="empty-state" style="padding:30px 0">
               <div class="empty-icon" style="font-size:32px">💭</div>
               <div class="empty-text">還沒有回覆，來搶沙發吧！</div>
             </div>`
          : replies.map(r => renderReplyItem(r)).join('')}
      </div>
    </div>
    <div class="reply-input-area">
      <textarea class="reply-textarea" id="reply-text"
                placeholder="輸入您的回覆…" rows="3" maxlength="1000"></textarea>
      <div class="reply-actions">
        <button class="reply-file-btn"
                onclick="document.getElementById('reply-file-input').click()">
          📎 附加檔案
        </button>
        <button class="btn-reply-submit" id="reply-submit-btn"
                onclick="submitReply()">送出回覆</button>
      </div>
      <input type="file" id="reply-file-input" multiple accept="image/*,.pdf"
             style="display:none" onchange="handleReplyFiles(this.files)" />
      <div class="preview-grid" id="reply-preview"></div>
    </div>`;
}

// ══════════════════════════════════════
// 💬 單則回覆
// ══════════════════════════════════════
function renderReplyItem(reply) {
  const isOwner = currentUser &&
    (reply.uid === currentUser.uid || currentUser.isAdmin);
  const fb34    = makeSvgAvatar(34, escHtml((reply.authorName || '?')[0]), 16);
  return `
    <div class="reply-item" id="reply-${escHtml(reply.id)}">
      <img class="reply-avatar"
           src="${escHtml(reply.avatarUrl || '')}"
           onerror="this.src='${fb34}'" alt="avatar" />
      <div class="reply-body">
        <div class="reply-header">
          <span class="reply-author">${escHtml(reply.authorName || '匿名')}</span>
          <span class="reply-time">${formatTime(reply.createdAt)}</span>
          ${isOwner
            ? `<button class="reply-delete-btn"
                       onclick="deleteReply('${escHtml(reply.id)}')">🗑️</button>`
            : ''}
        </div>
        <div class="reply-content">${escHtml(reply.content)}</div>
        ${renderAttachments(reply.attachments)}
      </div>
    </div>`;
}

// ══════════════════════════════════════
// 🖼️ 附件渲染
// ══════════════════════════════════════
function renderAttachments(attachments) {
  if (!attachments) return '';
  let list = attachments;
  if (typeof attachments === 'string') {
    try { list = JSON.parse(attachments); } catch { return ''; }
  }
  if (!Array.isArray(list) || list.length === 0) return '';

  const html = list.map(a => {
    if (a.type && a.type.startsWith('image/')) {
      return `<img class="attach-img"
                   src="${escHtml(a.url)}"
                   alt="${escHtml(a.name || '圖片')}"
                   onclick="openLightbox('${escHtml(a.url)}')" />`;
    }
    return `<a class="attach-file" href="${escHtml(a.url)}"
               target="_blank" rel="noopener">
              📄 ${escHtml(a.name || '附件')}
            </a>`;
  }).join('');

  return `<div class="detail-attachments">${html}</div>`;
}

// ══════════════════════════════════════
// ✏️ 開啟新增帖子
// ══════════════════════════════════════
function openNewPost() {
  document.getElementById('post-title').value          = '';
  document.getElementById('post-content').value        = '';
  document.getElementById('post-tags').value           = '';
  document.getElementById('post-cat').value            = '';
  document.getElementById('title-count').textContent   = '0';
  document.getElementById('content-count').textContent = '0';
  document.getElementById('post-preview').innerHTML    = '';
  document.getElementById('post-file-input').value     = '';
  postAttachments = [];
  openModal('newpost-modal');
}

// ══════════════════════════════════════
// 🚀 送出帖子
// ══════════════════════════════════════
async function submitPost() {
  const title   = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const cat     = document.getElementById('post-cat').value;
  const tags    = document.getElementById('post-tags').value.trim();
  const btn     = document.getElementById('post-submit-btn');

  if (!cat)     { showToast('請選擇分類', 'error'); return; }
  if (!title)   { showToast('請輸入標題', 'error'); return; }
  if (!content) { showToast('請輸入內容', 'error'); return; }

  btn.disabled    = true;
  btn.textContent = '發表中…';

  let uploadedFiles = [];
  if (postAttachments.length > 0) {
    showToast('上傳附件中…', 'info');
    uploadedFiles = await uploadFiles(postAttachments, 'post');
  }

  const res = await apiPost({
    action:      'createPost',
    uid:         currentUser.uid,
    title, content, cat, tags,
    attachments: JSON.stringify(uploadedFiles),
  });

  if (res.success) {
    showToast('🎉 帖子發表成功！', 'success');
    closeModal('newpost-modal');
    currentPage = 1;
    loadPosts();
  } else {
    showToast(res.message || '發表失敗，請稍後再試', 'error');
  }

  btn.disabled    = false;
  btn.textContent = '🚀 發表帖子';
}

// ══════════════════════════════════════
// 💬 送出回覆
// ══════════════════════════════════════
async function submitReply() {
  const content = document.getElementById('reply-text').value.trim();
  const btn     = document.getElementById('reply-submit-btn');

  if (!content && replyAttachments.length === 0) {
    showToast('請輸入回覆內容', 'error'); return;
  }

  btn.disabled    = true;
  btn.textContent = '送出中…';

  let uploadedFiles = [];
  if (replyAttachments.length > 0) {
    showToast('上傳附件中…', 'info');
    uploadedFiles = await uploadFiles(replyAttachments, 'reply');
  }

  const res = await apiPost({
    action:      'createReply',
    uid:         currentUser.uid,
    postId:      currentPostId,
    content,
    attachments: JSON.stringify(uploadedFiles),
  });

  if (res.success) {
    showToast('✅ 回覆成功！', 'success');
    document.getElementById('reply-text').value        = '';
    document.getElementById('reply-preview').innerHTML = '';
    document.getElementById('reply-file-input').value  = '';
    replyAttachments = [];
    openPostDetail(currentPostId);
    loadPosts();
  } else {
    showToast(res.message || '回覆失敗，請稍後再試', 'error');
  }

  btn.disabled    = false;
  btn.textContent = '送出回覆';
}

// ══════════════════════════════════════
// 🗑️ 刪除帖子
// ══════════════════════════════════════
async function deletePost(postId) {
  if (!confirm('確定要刪除此帖子嗎？\n刪除後無法復原。')) return;

    action: 'deletePost',
    uid:    currentUser.uid,

// ══════════════════════════════════════
// 🗑️ 刪除回覆
// ══════════════════════════════════════
async function deleteReply(replyId) {
  if (!confirm('確定要刪除此回覆嗎？')) return;
  const res = await apiPost({
    action: 'deleteReply',
    uid:    currentUser.uid,

  });

// ══════════════════════════════════════
// 📎 附件處理
// ══════════════════════════════════════
function handlePostFiles(files) {
  const maxCount = 5, maxSize = 5 * 1024 * 1024;
  Array.from(files).forEach(file => {
    if (postAttachments.length >= maxCount) {
      showToast(`最多上傳 ${maxCount} 個附件`, 'error'); return;
    }
    if (file.size > maxSize) {
      showToast(`${file.name} 超過 5MB 限制`, 'error'); return;
    }
    postAttachments.push(file);
  });
  refreshPreview('post');
}

function handleReplyFiles(files) {
  const maxCount = 3, maxSize = 5 * 1024 * 1024;
  Array.from(files).forEach(file => {
    if (replyAttachments.length >= maxCount) {
      showToast(`最多上傳 ${maxCount} 個附件`, 'error'); return;
    }
    if (file.size > maxSize) {
      showToast(`${file.name} 超過 5MB 限制`, 'error'); return;
    }
    replyAttachments.push(file);
  });
  refreshPreview('reply');
}

function refreshPreview(type) {
  const files     = type === 'post' ? postAttachments : replyAttachments;
  const container = document.getElementById(type + '-preview');
  if (!container) return;
  container.innerHTML = files.map((file, idx) => {
    if (file.type.startsWith('image/')) {
      const url = URL.createObjectURL(file);
      return `
        <div class="preview-item">
          <img src="${url}" alt="${escHtml(file.name)}" />
          <div class="preview-remove"
               onclick="removeAttachment('${type}',${idx})">✕</div>
        </div>`;
    }
    return `
      <div class="preview-file-item">
        📄 ${escHtml(file.name)}
        <span class="preview-remove"
              style="position:static;margin-left:auto"
              onclick="removeAttachment('${type}',${idx})">✕</span>
      </div>`;
  }).join('');
}

function removeAttachment(type, idx) {
  if (type === 'post') postAttachments.splice(idx, 1);
  else                 replyAttachments.splice(idx, 1);
  refreshPreview(type);
}

// ══════════════════════════════════════
// ☁️ 上傳附件
// ══════════════════════════════════════
async function uploadFiles(files, type) {
  const results = [];
  for (const file of files) {
    try {
      const base64 = await fileToBase64(file);
      const res    = await apiPost({
        action:   'uploadFile',
        uid:      currentUser.uid,
        fileType: type,
        fileName: file.name,
        mimeType: file.type,
        data:     base64,
      });
      if (res.success) {
        results.push({ url: res.url, name: file.name, type: file.type });
      } else {
        showToast(`${file.name} 上傳失敗`, 'error');
      }
    } catch (e) {
      showToast(`${file.name} 上傳錯誤`, 'error');
    }
  }
  return results;
}

// ══════════════════════════════════════
// 📑 分頁
// ══════════════════════════════════════
function renderPagination(totalPages, page) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn"
                onclick="goPage(${page - 1})"
                ${page <= 1 ? 'disabled' : ''}>‹</button>`;

  const pages = new Set([1, totalPages]);
  for (let i = Math.max(1, page - 1); i <= Math.min(totalPages, page + 1); i++) {
    pages.add(i);
  }
  let prev = 0;
  [...pages].sort((a, b) => a - b).forEach(p => {
    if (p - prev > 1) html += `<button class="page-btn" disabled>…</button>`;
    html += `<button class="page-btn ${p === page ? 'active' : ''}"
               onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });

  html += `<button class="page-btn"
             onclick="goPage(${page + 1})"
             ${page >= totalPages ? 'disabled' : ''}>›</button>`;
  el.innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  loadPosts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openModal(id) {

// ══════════════════════════════════════
// 🌐 API
// ══════════════════════════════════════
async function apiGet(action, params) {
  try {
    const query = new URLSearchParams({ action, ...params }).toString();
    const res   = await fetch(`${GAS_URL}?${query}`, { method: 'GET' });
    return await res.json();
  } catch (e) {
    console.error('[apiGet] error:', e);
    return { success: false, message: '網路錯誤，請稍後再試' };
  }
}

async function apiPost(data) {
  try {
    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(data),
    });
    return await res.json();
  } catch (e) {
    console.error('[apiPost] error:', e);
    return { success: false, message: '網路錯誤，請稍後再試' };
  }
}

// ══════════════════════════════════════
// 🛠️ 工具函式
// ══════════════════════════════════════

/** 防 XSS */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/** 時間格式化 */
function formatTime(isoStr) {
  if (!isoStr) return '';
  const date = new Date(isoStr);
  if (isNaN(date.getTime())) return '';
  const diff = Math.floor((Date.now() - date) / 1000);
  if (diff < 60)     return '剛剛';
  if (diff < 3600)   return `${Math.floor(diff / 60)} 分鐘前`;
  if (diff < 86400)  return `${Math.floor(diff / 3600)} 小時前`;
  if (diff < 604800) return `${Math.floor(diff / 86400)} 天前`;
  return date.toLocaleDateString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit',
  });
}

/** 取得分類標籤 */
function getCatLabel(catId) {
  const cat = categories.find(c => c.id === catId);
  return cat ? `${cat.icon || ''} ${cat.name}`.trim() : (catId || '一般');
}

/**
 * ✅ 修正：tags 型別保護 — 支援 string / array / number / null / undefined
 * @param {*} tags
 * @returns {string} HTML badge 字串
 */
function renderTagBadges(tags) {
  if (!tags && tags !== 0) return '';
  // 若是陣列，先 join
  const raw = Array.isArray(tags)
    ? tags.join(',')
    : String(tags);
  if (!raw.trim()) return '';
  return raw
    .split(',')
    .filter(Boolean)
    .map(t => t.trim())
    .filter(Boolean)
    .map(t => `<span class="tag-badge">#${escHtml(t)}</span>`)
    .join('');
}

/**
 * 產生 SVG 文字頭像（避免模板字串巢狀問題）
 * @param {number} size  - 寬高 px
 * @param {string} text  - 顯示文字（單字）
 * @param {number} fontSize
 * @returns {string} data URI
 */
function makeSvgAvatar(size, text, fontSize) {
  const r   = size / 2;
  const svg = [
    `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${size} ${size}">`,
    `<rect width="${size}" height="${size}" rx="${r}" fill="%2306C755"/>`,
    `<text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle"`,
    ` fill="white" font-size="${fontSize}">${text}</text>`,
    `</svg>`,
  ].join('');
  return 'data:image/svg+xml,' + svg.replace(/#/g, '%23').replace(/"/g, "'");
}

/** File → Base64 */
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader   = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
