<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LINE 論壇</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #06C755; --primary-dark: #05a847; --primary-light: #e8f9ee;
      --secondary: #1a1a2e; --accent: #f0a500; --danger: #e74c3c;
      --text: #2c3e50; --text-light: #7f8c8d; --border: #e0e0e0;
      --bg: #f5f7fa; --card: #ffffff;
      --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-hover: 0 6px 24px rgba(0,0,0,0.14);
      --radius: 12px; --radius-sm: 8px; --transition: all 0.25s ease;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }
    button { cursor: pointer; border: none; outline: none; font-family: inherit; }
    input, textarea, select { font-family: inherit; outline: none; }

    /* Loading */
    #loading-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #06C755, #05a847);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; color: white;
    }
    .loading-logo { font-size: 64px; margin-bottom: 16px; animation: bounce 1s infinite; }
    .loading-text { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .loading-sub { font-size: 14px; opacity: 0.8; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-top: 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    /* Register */
    #register-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #e8f9ee 100%); }
    .register-card { background: white; border-radius: 20px; padding: 40px 32px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.12); width: 100%; max-width: 420px; }
    .register-header { text-align: center; margin-bottom: 32px; }
    .register-header .logo { font-size: 48px; margin-bottom: 12px; }
    .register-header h1 { font-size: 24px; font-weight: 700; color: var(--secondary); }
    .register-header p { color: var(--text-light); margin-top: 6px; font-size: 14px; }
    .line-profile { display: flex; align-items: center; gap: 12px; background: var(--primary-light);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 24px; }
    .line-profile img { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--primary); }
    .line-profile-info { flex: 1; }
    .line-profile-name { font-weight: 600; font-size: 15px; }
    .line-profile-badge { font-size: 11px; color: var(--primary); background: white;
      padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 2px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .form-group label span { color: var(--danger); }
    .form-input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 15px; transition: var(--transition); background: #fafafa; }
    .form-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .form-hint { font-size: 12px; color: var(--text-light); margin-top: 4px; }
    .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white;
      border-radius: var(--radius-sm); font-size: 16px; font-weight: 700;
      transition: var(--transition); margin-top: 8px; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* App Layout */
    #app { display: none; min-height: 100vh; }
    .app-header { position: sticky; top: 0; z-index: 100; background: white;
      border-bottom: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .header-top { display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; max-width: 900px; margin: 0 auto; }
    .header-logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: var(--primary); }
    .header-logo span { font-size: 24px; }
    .header-user { display: flex; align-items: center; gap: 8px; }
    .header-avatar { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--primary); }
    .header-name { font-size: 13px; font-weight: 600; max-width: 80px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .header-search { padding: 8px 16px; border-bottom: 1px solid var(--border); background: #fafafa; }
    .search-wrap { max-width: 900px; margin: 0 auto; position: relative; }
    .search-input { width: 100%; padding: 9px 16px 9px 40px; border: 1.5px solid var(--border);
      border-radius: 20px; font-size: 14px; background: white; transition: var(--transition); }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-light); font-size: 16px; }
    .category-tabs-wrap { max-width: 900px; margin: 0 auto; }
    .category-tabs { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto;
      background: white; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab { flex-shrink: 0; padding: 6px 14px; border-radius: 16px; font-size: 13px;
      font-weight: 500; background: var(--bg); color: var(--text-light);
      border: 1.5px solid transparent; transition: var(--transition); cursor: pointer; }
    .cat-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    .cat-tab:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    /* Main */
    .main-content { max-width: 900px; margin: 0 auto; padding: 16px; }

    /* Post Card */
    .post-card { background: var(--card); border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px; box-shadow: var(--shadow); cursor: pointer;
      transition: var(--transition); border: 1px solid transparent; }
    .post-card:hover { box-shadow: var(--shadow-hover); border-color: var(--primary-light); transform: translateY(-2px); }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .post-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
    .post-author-info { flex: 1; min-width: 0; }
    .post-author-name { font-size: 13px; font-weight: 600; }
    .post-time { font-size: 11px; color: var(--text-light); }
    .post-category-badge { font-size: 11px; padding: 3px 10px; border-radius: 10px;
      background: var(--primary-light); color: var(--primary); font-weight: 600; flex-shrink: 0; }
    .post-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-preview { font-size: 13px; color: var(--text-light); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-footer { display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
    .post-tags { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
    .tag { font-size: 11px; padding: 2px 8px; background: #f0f4ff; color: #5b6af0; border-radius: 8px; font-weight: 500; }
    .post-meta { display: flex; gap: 12px; color: var(--text-light); font-size: 12px; flex-shrink: 0; }
    .post-meta span { display: flex; align-items: center; gap: 3px; }
    .post-thumb-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .post-thumb { width: 70px; height: 70px; border-radius: 8px; object-fit: cover;
      border: 1px solid var(--border); cursor: pointer; }

    /* FAB */
    .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px;
      background: var(--primary); color: white; border-radius: 50%; font-size: 28px;
      box-shadow: 0 4px 16px rgba(6,199,85,0.4); transition: var(--transition);
      z-index: 50; display: flex; align-items: center; justify-content: center; }
    .fab:hover { background: var(--primary-dark); transform: scale(1.1); }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 6px; padding: 20px 0; flex-wrap: wrap; }
    .page-btn { min-width: 36px; height: 36px; border-radius: 8px; font-size: 13px; font-weight: 600;
      background: white; border: 1.5px solid var(--border); color: var(--text);
      transition: var(--transition); padding: 0 10px; }
    .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .page-btn:hover:not(.active):not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal { background: white; width: 100%; max-width: 700px; max-height: 92vh;
      border-radius: 20px 20px 0 0; overflow: hidden; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1); }
    .modal-overlay.show .modal { transform: translateY(0); }
    .modal-header { display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg);
      font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .modal-body { flex: 1; overflow-y: auto; padding: 20px; }
    .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); flex-shrink: 0; }

    /* Detail */
    .detail-author { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .detail-avatar { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--primary); }
    .detail-author-name { font-weight: 700; font-size: 15px; }
    .detail-time { font-size: 12px; color: var(--text-light); }
    .detail-title { font-size: 20px; font-weight: 800; line-height: 1.4; margin-bottom: 12px; }
    .detail-content { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-wrap; }
    .detail-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0; }
    .detail-attachments { margin-top: 16px; }
    .attach-images { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 10px; }
    .attach-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border); cursor: pointer; transition: var(--transition); }
    .attach-img:hover { transform: scale(1.03); }
    .attach-file { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      background: var(--bg); border-radius: 8px; margin-bottom: 6px; font-size: 13px; border: 1px solid var(--border); }
    .attach-file a { color: var(--primary); font-weight: 500; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .replies-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text-light); }
    .reply-item { display: flex; gap: 10px; margin-bottom: 16px; }
    .reply-avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; }
    .reply-bubble { flex: 1; background: var(--bg); border-radius: 0 12px 12px 12px; padding: 10px 14px; }
    .reply-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .reply-name { font-size: 13px; font-weight: 600; }
    .reply-time { font-size: 11px; color: var(--text-light); }
    .reply-content { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .reply-images { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .reply-img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px;
      border: 1px solid var(--border); cursor: pointer; }
    .reply-del-btn { margin-left: auto; font-size: 12px; color: var(--danger); cursor: pointer;
      padding: 2px 8px; border-radius: 6px; border: 1px solid var(--danger); background: white; }

    /* Reply Input */
    .reply-input-area { display: flex; flex-direction: column; gap: 8px; }
    .reply-textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; resize: none; min-height: 80px; transition: var(--transition); }
    .reply-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .reply-actions { display: flex; gap: 8px; align-items: center; }
    .btn-attach { padding: 8px 14px; background: var(--bg); border-radius: 8px;
      font-size: 13px; border: 1.5px solid var(--border); transition: var(--transition); }
    .btn-attach:hover { border-color: var(--primary); color: var(--primary); }
    .btn-submit { padding: 10px 24px; background: var(--primary); color: white;
      border-radius: 8px; font-size: 14px; font-weight: 700; transition: var(--transition); }
    .btn-submit:hover { background: var(--primary-dark); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .char-count { text-align: right; font-size: 11px; color: var(--text-light); margin-top: 2px; }

    /* New Post */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; background: #fafafa; transition: var(--transition); }
    .form-select:focus { border-color: var(--primary); background: white; }
    .form-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; resize: vertical;
      min-height: 140px; transition: var(--transition); background: #fafafa; }
    .form-textarea:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(6,199,85,0.1); }
    .upload-area { border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 20px; text-align: center; cursor: pointer; transition: var(--transition);
      color: var(--text-light); font-size: 13px; }
    .upload-area:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .upload-icon { font-size: 28px; margin-bottom: 6px; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 10px; }
    .preview-item { position: relative; }
    .preview-item img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
    .preview-item .remove-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
      background: var(--danger); color: white; border-radius: 50%; font-size: 12px;
      display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .file-item { display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--bg); border-radius: 6px; margin-top: 6px; font-size: 13px; }
    .file-item .remove-btn { color: var(--danger); cursor: pointer; font-size: 16px; background: none; }
    .upload-progress { margin-top: 8px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s; width: 0%; }
    .progress-text { font-size: 11px; color: var(--text-light); margin-top: 4px; }

    /* Lightbox */
    #lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 999;
      display: none; align-items: center; justify-content: center; }
    #lightbox.show { display: flex; }
    #lightbox img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    #lightbox-close { position: absolute; top: 16px; right: 20px; color: white;
      font-size: 36px; cursor: pointer; line-height: 1; }

    /* Toast */
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; z-index: 500;
      opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--primary); }
    #toast.error { background: var(--danger); }

    /* Empty / Skeleton */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
    .empty-state .empty-icon { font-size: 56px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .skeleton-card { background: white; border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      box-shadow: var(--shadow); }

    /* Delete btn */
    .post-del-btn { font-size: 12px; color: var(--danger); cursor: pointer;
      padding: 3px 10px; border-radius: 6px; border: 1px solid var(--danger);
      background: white; margin-left: auto; }

    @media (min-width: 768px) {
      .modal { align-self: center; border-radius: 20px; max-height: 85vh; }
      .modal-overlay { align-items: center; }
      .main-content { padding: 20px; }
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .header-name { display: none; }
      .register-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div class="loading-logo">💬</div>
  <div class="loading-text">LINE 論壇</div>
  <div class="loading-sub">正在初始化...</div>
  <div class="loading-spinner"></div>
</div>

<!-- Register -->
<div id="register-screen" style="display:none">
  <div class="register-card">
    <div class="register-header">
      <div class="logo">💬</div>
      <h1>加入 LINE 論壇</h1>
      <p>請完成實名制註冊以使用論壇功能</p>
    </div>
    <div class="line-profile">
      <img id="reg-avatar" src="" alt="頭像" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 44 44%22><circle cx=%2222%22 cy=%2222%22 r=%2222%22 fill=%22%2306C755%22/><text x=%2222%22 y=%2228%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2220%22>👤</text></svg>'">
      <div class="line-profile-info">
        <div class="line-profile-name" id="reg-line-name">載入中...</div>
        <div class="line-profile-badge">✓ LINE 帳號已驗證</div>
      </div>
    </div>
    <div class="form-group">
      <label>真實姓名 <span>*</span></label>
      <input type="text" id="reg-name" class="form-input" placeholder="請輸入您的真實姓名" maxlength="20">
    </div>
    <div class="form-group">
      <label>手機號碼 <span>*</span></label>
      <input type="tel" id="reg-phone" class="form-input" placeholder="09xxxxxxxx" maxlength="10">
      <div class="form-hint">📱 台灣手機號碼格式（09開頭，共10碼）</div>
    </div>
    <button class="btn-primary" id="reg-btn" onclick="submitRegister()">✅ 完成註冊，進入論壇</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <div class="header-top">
      <div class="header-logo"><span>💬</span> LINE 論壇</div>
      <div class="header-user">
        <img class="header-avatar" id="h-avatar" src="" alt=""
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 34 34%22><circle cx=%2217%22 cy=%2217%22 r=%2217%22 fill=%22%2306C755%22/><text x=%2217%22 y=%2222%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2216%22>👤</text></svg>'">
        <span class="header-name" id="h-name"></span>
      </div>
    </div>
    <div class="header-search">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-input"
               placeholder="搜尋帖子標題、內容、標籤..." oninput="debounceSearch(this.value)">
      </div>
    </div>
    <div class="category-tabs-wrap">
      <div class="category-tabs" id="category-tabs">
        <div class="cat-tab active" data-cat="all" onclick="selectCategory('all')">🏠 全部</div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <div id="post-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>
  <button class="fab" onclick="openNewPost()" title="發新帖">＋</button>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📄 帖子詳情</span>
      <button class="modal-close" onclick="closeModal('detail-modal')">✕</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <div class="reply-input-area">
        <textarea class="reply-textarea" id="reply-content" placeholder="輸入回覆內容..." maxlength="1000"
          oninput="document.getElementById('reply-char').textContent=this.value.length"></textarea>
        <div class="char-count"><span id="reply-char">0</span>/1000</div>
        <div class="reply-actions">
          <button class="btn-attach" onclick="document.getElementById('reply-file-input').click()">📎 附件</button>
          <input type="file" id="reply-file-input" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
                 style="display:none" onchange="handleReplyFiles(this.files)">
          <button class="btn-submit" id="reply-submit-btn" onclick="submitReply()">💬 回覆</button>
        </div>
        <div id="reply-preview" class="preview-grid"></div>
        <div id="reply-progress" style="display:none" class="upload-progress">
          <div class="progress-bar"><div class="progress-fill" id="reply-prog-fill"></div></div>
          <div class="progress-text" id="reply-prog-text"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Post Modal -->
<div class="modal-overlay" id="newpost-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">📝 發佈新帖</span>
      <button class="modal-close" onclick="closeModal('newpost-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>標題 <span>*</span></label>
        <input type="text" id="post-title" class="form-input" placeholder="請輸入帖子標題" maxlength="100"
          oninput="document.getElementById('title-char').textContent=this.value.length">
        <div class="char-count"><span id="title-char">0</span>/100</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>分類 <span>*</span></label>
          <select id="post-category" class="form-select"></select>
        </div>
        <div class="form-group">
          <label>標籤（逗號分隔）</label>
          <input type="text" id="post-tags" class="form-input" placeholder="例：新手,問題,討論">
        </div>
      </div>
      <div class="form-group">
        <label>內容 <span>*</span></label>
        <textarea id="post-content" class="form-textarea" placeholder="請輸入帖子內容..." maxlength="5000"
          oninput="document.getElementById('content-char').textContent=this.value.length"></textarea>
        <div class="char-count"><span id="content-char">0</span>/5000</div>
      </div>
      <div class="form-group">
        <label>附件（最多5個，單檔 ≤ 10MB）</label>
        <div class="upload-area" onclick="document.getElementById('post-file-input').click()">
          <div class="upload-icon">📁</div>
          <div>點擊上傳檔案</div>
          <div style="font-size:11px;margin-top:4px">支援 JPG / PNG / GIF / PDF / Word / Excel</div>
        </div>
        <input type="file" id="post-file-input" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
               style="display:none" onchange="handlePostFiles(this.files)">
        <div id="post-preview" class="preview-grid"></div>
        <div id="post-progress" style="display:none" class="upload-progress">
          <div class="progress-bar"><div class="progress-fill" id="post-prog-fill"></div></div>
          <div class="progress-text" id="post-prog-text"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-submit" id="post-submit-btn" onclick="submitPost()"
        style="width:100%;padding:14px;font-size:15px">🚀 發佈帖子</button>
    </div>

</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <span id="lightbox-close" onclick="closeLightbox()">✕</span>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ============================================================
// ⚙️ 設定
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRJUrYv7zYeLa1vAwJ1-jQtgAhxjcTlZoM1jpNgRsbAAwRp7pIwgIFvWyN9Q4DtB30bA/exec';  // ← 填入 GAS 部署 URL
const LIFF_ID = '2009456572-F5PRsV4X';         // ← 填入 LIFF ID

// ============================================================
// 🌐 狀態管理
// ============================================================
let currentUser = null;
let currentPage = 1;
let currentCategory = 'all';
let currentKeyword = '';
let currentPostId = null;
let postAttachments = [];   // 發帖附件暫存
let replyAttachments = [];  // 回覆附件暫存
let searchTimer = null;
let categories = [];

// ============================================================
// 🚀 初始化
// ============================================================
async function init() {
  try {
    setLoadingText('初始化 LIFF...');
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: location.href });
      return;
    }

    setLoadingText('取得 LINE 資料...');
    const profile = await liff.getProfile();

    setLoadingText('驗證身份...');
    const loginRes = await apiGet('autoLogin', { uid: profile.userId });

    if (loginRes.success) {
      currentUser = loginRes.user;
      showApp();
    } else {
      showRegister(profile);
    }
  } catch (err) {
    console.error('Init error:', err);
    showToast('初始化失敗，請重新整理頁面', 'error');
    hideLoading();
  }
}

function setLoadingText(text) {
  document.querySelector('.loading-sub').textContent = text;
}

function hideLoading() {
  document.getElementById('loading-screen').style.display = 'none';
}

// ============================================================
// 🔐 顯示註冊畫面
// ============================================================
function showRegister(profile) {
  hideLoading();
  document.getElementById('register-screen').style.display = 'flex';
  document.getElementById('reg-avatar').src = profile.pictureUrl || '';
  document.getElementById('reg-line-name').textContent = profile.displayName;
  // 儲存 profile 供後續使用
  window._lineProfile = profile;
}

async function submitRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const profile = window._lineProfile;

  if (!name) { showToast('請輸入真實姓名', 'error'); return; }
  if (!phone) { showToast('請輸入手機號碼', 'error'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = '註冊中...';

  const res = await apiPost({
    action: 'register',
    uid: profile.userId,
    name, phone,
    lineName: profile.displayName,
    avatar: profile.pictureUrl || ''
  });

  if (res.success) {
    currentUser = res.user;
    document.getElementById('register-screen').style.display = 'none';
    showToast('🎉 註冊成功！歡迎加入論壇', 'success');
    showApp();
  } else {
    showToast(res.message || '註冊失敗', 'error');
    btn.disabled = false;
    btn.textContent = '✅ 完成註冊，進入論壇';
  }
}

// ============================================================
// 🏠 顯示主應用
// ============================================================
async function showApp() {
  hideLoading();
  document.getElementById('app').style.display = 'block';
  document.getElementById('h-avatar').src = currentUser.avatar || '';
  document.getElementById('h-name').textContent = currentUser.name;
  await loadCategories();
  loadPosts();
}

// ============================================================
// 🏷️ 載入分類
// ============================================================
async function loadCategories() {
  const res = await apiGet('getCategories', {});
  if (!res.success) return;
  categories = res.categories;

  const tabsEl = document.getElementById('category-tabs');
  const selectEl = document.getElementById('post-category');

  categories.forEach(cat => {
    // Tab
    const tab = document.createElement('div');
    tab.className = 'cat-tab';
    tab.dataset.cat = cat.id;
    tab.textContent = `${cat.icon} ${cat.name}`;
    tab.onclick = () => selectCategory(cat.id);
    tabsEl.appendChild(tab);

    // Select option
    const opt = document.createElement('option');
    opt.value = cat.id;
    opt.textContent = `${cat.icon} ${cat.name}`;
    selectEl.appendChild(opt);
  });
}

function selectCategory(catId) {
  currentCategory = catId;
  currentPage = 1;
  document.querySelectorAll('.cat-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === catId);
  });
  loadPosts();
}

// ============================================================
// 📋 載入帖子列表
// ============================================================
async function loadPosts() {
  const listEl = document.getElementById('post-list');
  listEl.innerHTML = renderSkeletons(4);

  const res = await apiGet('getPosts', {
    category: currentCategory,
    keyword: currentKeyword,
    page: currentPage,
    pageSize: 10
  });

  if (!res.success) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>載入失敗，請重試</p></div>`;
    return;
  }

  if (res.posts.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>${currentKeyword ? '找不到相關帖子' : '目前沒有帖子，來發第一篇吧！'}</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  listEl.innerHTML = res.posts.map(renderPostCard).join('');
  renderPagination(res.totalPages, res.page);
}

function renderPostCard(post) {
  const images = (post.attachments || []).filter(a => a.isImage).slice(0, 3);
  const thumbsHtml = images.length > 0
    ? `<div class="post-thumb-row">${images.map(img =>
        `<img class="post-thumb" src="${img.thumbUrl || img.fileUrl}" alt="" onclick="event.stopPropagation();openLightbox('${img.fileUrl}')">`
      ).join('')}</div>` : '';

  const tagsHtml = (post.tags || []).filter(t => t).slice(0, 4)
    .map(t => `<span class="tag">#${t.trim()}</span>`).join('');

  const isOwner = currentUser && (post.uid === currentUser.uid || currentUser.isAdmin);
  const delBtn = isOwner
    ? `<button class="post-del-btn" onclick="event.stopPropagation();deletePost('${post.id}')">🗑 刪除</button>` : '';

  return `
    <div class="post-card" onclick="openPostDetail('${post.id}')">
      <div class="post-header">
        <img class="post-avatar" src="${post.authorAvatar || ''}" alt=""
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 38 38%22><circle cx=%2219%22 cy=%2219%22 r=%2219%22 fill=%22%23ddd%22/><text x=%2219%22 y=%2225%22 text-anchor=%22middle%22 font-size=%2218%22>👤</text></svg>'">
        <div class="post-author-info">
          <div class="post-author-name">${escHtml(post.authorName)}</div>
          <div class="post-time">${formatTime(post.createdAt)}</div>
        </div>
        <span class="post-category-badge">${getCatLabel(post.category)}</span>
        ${delBtn}
      </div>
      <div class="post-title">${escHtml(post.title)}</div>
      <div class="post-preview">${escHtml(post.content)}</div>
      ${thumbsHtml}
      <div class="post-footer">
        <div class="post-tags">${tagsHtml}</div>
        <div class="post-meta">
          <span>💬 ${post.replyCount || 0}</span>
          ${(post.attachments || []).length > 0 ? `<span>📎 ${post.attachments.length}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ============================================================
// 📄 帖子詳情
// ============================================================
async function openPostDetail(postId) {
  currentPostId = postId;
  replyAttachments = [];
  document.getElementById('reply-content').value = '';
  document.getElementById('reply-char').textContent = '0';
  document.getElementById('reply-preview').innerHTML = '';
  document.getElementById('detail-body').innerHTML = renderSkeletons(2);
  openModal('detail-modal');

  const res = await apiGet('getPostDetail', { postId });
  if (!res.success) {
    document.getElementById('detail-body').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${res.message}</p></div>`;
    return;
  }

  document.getElementById('detail-body').innerHTML = renderDetail(res.post, res.replies);
}

function renderDetail(post, replies) {
  const isOwner = currentUser && (post.uid === currentUser.uid || currentUser.isAdmin);
  const delBtn = isOwner
    ? `<button class="post-del-btn" onclick="deletePost('${post.id}',true)" style="margin-top:8px">🗑 刪除此帖</button>` : '';

  const tagsHtml = (post.tags || []).filter(t => t)
    .map(t => `<span class="tag">#${t.trim()}</span>`).join('');

  const attachHtml = renderAttachments(post.attachments || []);

  const repliesHtml = replies.length === 0
    ? `<div style="text-align:center;color:var(--text-light);padding:20px;font-size:14px">尚無回覆，來搶沙發！🛋️</div>`
    : replies.map((r, idx) => renderReplyItem(r, idx + 1)).join('');

  return `
    <div class="detail-author">
      <img class="detail-avatar" src="${post.authorAvatar || ''}" alt=""
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 44 44%22><circle cx=%2222%22 cy=%2222%22 r=%2222%22 fill=%22%23ddd%22/><text x=%2222%22 y=%2228%22 text-anchor=%22middle%22 font-size=%2220%22>👤</text></svg>'">
      <div>
        <div class="detail-author-name">${escHtml(post.authorName)}</div>
        <div class="detail-time">${formatTime(post.createdAt)} · ${getCatLabel(post.category)}</div>
      </div>
    </div>
    <div class="detail-title">${escHtml(post.title)}</div>
    ${tagsHtml ? `<div class="detail-tags">${tagsHtml}</div>` : ''}
    <div class="detail-content">${escHtml(post.content)}</div>
    ${attachHtml}
    ${delBtn}
    <hr class="divider">
    <div class="replies-title">💬 回覆（${replies.length}）</div>
    ${repliesHtml}`;
}

function renderReplyItem(reply, idx) {
  const isOwner = currentUser && (reply.uid === currentUser.uid || currentUser.isAdmin);
  const delBtn = isOwner
    ? `<button class="reply-del-btn" onclick="deleteReply('${reply.id}')">🗑</button>` : '';

  const attachHtml = renderAttachments(reply.attachments || [], true);

  return `
    <div class="reply-item" id="reply-${reply.id}">
      <img class="reply-avatar" src="${reply.authorAvatar || ''}" alt=""
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 34 34%22><circle cx=%2217%22 cy=%2217%22 r=%2217%22 fill=%22%23ddd%22/><text x=%2217%22 y=%2222%22 text-anchor=%22middle%22 font-size=%2216%22>👤</text></svg>'">
      <div class="reply-bubble">
        <div class="reply-header">
          <span class="reply-name">${escHtml(reply.authorName)}</span>
          <span class="reply-time">${formatTime(reply.createdAt)}</span>
          <span style="font-size:11px;color:var(--text-light)">#${idx}</span>
          ${delBtn}
        </div>
        <div class="reply-content">${escHtml(reply.content)}</div>
        ${attachHtml}
      </div>
    </div>`;
}

function renderAttachments(attachments, small = false) {
  if (!attachments || attachments.length === 0) return '';
  const images = attachments.filter(a => a.isImage);
  const files = attachments.filter(a => !a.isImage);

  let html = '<div class="detail-attachments">';
  if (images.length > 0) {
    html += small
      ? `<div class="reply-images">${images.map(img =>
          `<img class="reply-img" src="${img.thumbUrl || img.fileUrl}" alt="" onclick="openLightbox('${img.fileUrl}')">`
        ).join('')}</div>`
      : `<div class="attach-images">${images.map(img =>
          `<img class="attach-img" src="${img.thumbUrl || img.fileUrl}" alt="" onclick="openLightbox('${img.fileUrl}')">`
        ).join('')}</div>`;
  }
  files.forEach(f => {
    html += `<div class="attach-file">📄 <a href="${f.fileUrl}" target="_blank">${escHtml(f.fileName)}</a></div>`;
  });
  html += '</div>';
  return html;
}

// ============================================================
// 📝 發佈新帖
// ============================================================
function openNewPost() {
  postAttachments = [];
  document.getElementById('post-title').value = '';
  document.getElementById('post-content').value = '';
  document.getElementById('post-tags').value = '';
  document.getElementById('post-preview').innerHTML = '';
  document.getElementById('title-char').textContent = '0';
  document.getElementById('content-char').textContent = '0';
  openModal('newpost-modal');
}

async function submitPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  const category = document.getElementById('post-category').value;
  const tagsRaw = document.getElementById('post-tags').value.trim();

  if (!title) { showToast('請輸入標題', 'error'); return; }
  if (!content) { showToast('請輸入內容', 'error'); return; }

  const btn = document.getElementById('post-submit-btn');
  btn.disabled = true;
  btn.textContent = '發佈中...';

  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];

  const res = await apiPost({
    action: 'createPost',
    uid: currentUser.uid,
    title, content, category, tags,
    attachments: postAttachments
  });

  btn.disabled = false;
  btn.textContent = '🚀 發佈帖子';

  if (res.success) {
    closeModal('newpost-modal');
    showToast('🎉 帖子發佈成功！', 'success');
    currentPage = 1;
    loadPosts();
  } else {
    showToast(res.message || '發佈失敗', 'error');
  }
}

// ============================================================
// 💬 發佈回覆
// ============================================================
async function submitReply() {
  const content = document.getElementById('reply-content').value.trim();
  if (!content) { showToast('請輸入回覆內容', 'error'); return; }

  const btn = document.getElementById('reply-submit-btn');
  btn.disabled = true;
  btn.textContent = '回覆中...';

  const res = await apiPost({
    action: 'createReply',
    uid: currentUser.uid,
    postId: currentPostId,
    content,
    attachments: replyAttachments
  });

  btn.disabled = false;
  btn.textContent = '💬 回覆';

  if (res.success) {
    document.getElementById('reply-content').value = '';
    document.getElementById('reply-char').textContent = '0';
    replyAttachments = [];
    document.getElementById('reply-preview').innerHTML = '';
    showToast('✅ 回覆成功', 'success');
    // 重新載入詳情
    openPostDetail(currentPostId);
    // 更新列表回覆數
    loadPosts();
  } else {
    showToast(res.message || '回覆失敗', 'error');
  }
}

// ============================================================
// 📁 檔案上傳處理
// ============================================================
async function handlePostFiles(files) {
  if (postAttachments.length + files.length > 5) {
    showToast('最多上傳 5 個附件', 'error'); return;
  }
  await uploadFiles(files, 'post', postAttachments,
    'post-preview', 'post-progress', 'post-prog-fill', 'post-prog-text');
  document.getElementById('post-file-input').value = '';
}

async function handleReplyFiles(files) {
  if (replyAttachments.length + files.length > 3) {
    showToast('回覆最多上傳 3 個附件', 'error'); return;
  }
  await uploadFiles(files, 'reply', replyAttachments,
    'reply-preview', 'reply-progress', 'reply-prog-fill', 'reply-prog-text');
  document.getElementById('reply-file-input').value = '';
}

async function uploadFiles(files, type, attachArr, previewId, progressId, fillId, textId) {
  const progressEl = document.getElementById(progressId);
  const fillEl = document.getElementById(fillId);
  const textEl = document.getElementById(textId);
  progressEl.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    textEl.textContent = `上傳中 ${i + 1}/${files.length}：${file.name}`;
    fillEl.style.width = `${((i) / files.length) * 100}%`;

    if (file.size > 10 * 1024 * 1024) {
      showToast(`${file.name} 超過 10MB 限制`, 'error'); continue;
    }

    try {
      const base64 = await fileToBase64(file);
      const res = await apiPost({
        action: 'uploadFile',
        uid: currentUser.uid,
        base64: base64.split(',')[1],
        fileName: file.name,
        mimeType: file.type,
        type
      });

      if (res.success) {
        attachArr.push({
          fileId: res.fileId, fileUrl: res.fileUrl,
          thumbUrl: res.thumbUrl, fileName: res.fileName,
          mimeType: res.mimeType, isImage: res.isImage
        });
        renderPreviewItem(res, attachArr, previewId);
      } else {
        showToast(`${file.name} 上傳失敗：${res.message}`, 'error');
      }
    } catch (e) {
      showToast(`${file.name} 上傳失敗`, 'error');
    }
  }

  fillEl.style.width = '100%';
  textEl.textContent = '上傳完成！';
  setTimeout(() => { progressEl.style.display = 'none'; }, 1500);
}

function renderPreviewItem(fileInfo, attachArr, previewId) {
  const previewEl = document.getElementById(previewId);
  const idx = attachArr.length - 1;
  const div = document.createElement('div');
  div.className = 'preview-item';
  div.id = `preview-${previewId}-${idx}`;

  if (fileInfo.isImage) {
    div.innerHTML = `
      <img src="${fileInfo.thumbUrl || fileInfo.fileUrl}" alt="">
      <div class="remove-btn" onclick="removeAttachment(${idx},'${previewId}',${JSON.stringify(attachArr).replace(/'/g,'')})">✕</div>`;
  } else {
    div.innerHTML = `
      <div class="file-item" style="font-size:11px">
        📄 ${escHtml(fileInfo.fileName.substring(0, 15))}
        <button class="remove-btn" onclick="removeAttachmentByIdx(${idx},'${previewId}')">✕</button>
      </div>`;
  }
  previewEl.appendChild(div);
}

function removeAttachmentByIdx(idx, previewId) {
  const arr = previewId.startsWith('post') ? postAttachments : replyAttachments;
  arr.splice(idx, 1);
  refreshPreview(arr, previewId);
}

function refreshPreview(arr, previewId) {
  const el = document.getElementById(previewId);
  el.innerHTML = '';
  arr.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    if (f.isImage) {
      div.innerHTML = `<img src="${f.thumbUrl || f.fileUrl}" alt=""><div class="remove-btn" onclick="removeAttachmentByIdx(${i},'${previewId}')">✕</div>`;
    } else {
      div.innerHTML = `<div class="file-item" style="font-size:11px">📄 ${escHtml(f.fileName.substring(0,15))}<button class="remove-btn" onclick="removeAttachmentByIdx(${i},'${previewId}')">✕</button></div>`;
    }
    el.appendChild(div);
  });
}

// ============================================================
// 🗑️ 刪除帖子 / 回覆
// ============================================================
async function deletePost(postId, fromDetail = false) {
  if (!confirm('確定要刪除此帖子嗎？')) return;
  const res = await apiPost({ action: 'deletePost', uid: currentUser.uid, postId });
  if (res.success) {
    showToast('帖子已刪除', 'success');
    if (fromDetail) closeModal('detail-modal');
    loadPosts();
  } else {
    showToast(res.message || '刪除失敗', 'error');
  }
}

// ============================================================
// 🗑️ 刪除回覆（接續）
// ============================================================
async function deleteReply(replyId) {
  if (!confirm('確定要刪除此回覆嗎？')) return;
  const res = await apiPost({ action: 'deleteReply', uid: currentUser.uid, replyId });
  if (res.success) {
    showToast('回覆已刪除', 'success');
    // 移除 DOM 元素
    const el = document.getElementById('reply-' + replyId);
    if (el) el.remove();
    // 重新整理詳情
    openPostDetail(currentPostId);
    loadPosts();
  } else {
    showToast(res.message || '刪除失敗', 'error');
  }
}

// ============================================================
// 🔍 搜尋（防抖）
// ============================================================
function debounceSearch(value) {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentKeyword = value.trim();
    currentPage = 1;
    loadPosts();
  }, 400);
}

// ============================================================
// 📑 分頁渲染
// ============================================================
function renderPagination(totalPages, page) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = '';

  // 上一頁
  html += `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;

  // 頁碼邏輯：顯示首頁、末頁、當前頁前後各1頁
  const pages = new Set();
  pages.add(1);
  pages.add(totalPages);
  for (let i = Math.max(1, page - 1); i <= Math.min(totalPages, page + 1); i++) pages.add(i);
  const sortedPages = [...pages].sort((a, b) => a - b);

  let prev = 0;
  sortedPages.forEach(p => {
    if (p - prev > 1) html += `<button class="page-btn" disabled>…</button>`;
    html += `<button class="page-btn ${p === page ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  });

  // 下一頁
  html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;

  el.innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  loadPosts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// 🪟 Modal 開關
// ============================================================
function openModal(id) {
  const overlay = document.getElementById(id);
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  const overlay = document.getElementById(id);
  overlay.classList.remove('show');
  document.body.style.overflow = '';
  if (id === 'detail-modal') {
    currentPostId = null;
    replyAttachments = [];
  }
  if (id === 'newpost-modal') {
    postAttachments = [];
  }
}

// 點擊遮罩關閉
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) closeModal(this.id);
  });
});

// ============================================================
// 🖼️ Lightbox
// ============================================================
function openLightbox(url) {
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}

// ESC 關閉 Lightbox
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    ['detail-modal', 'newpost-modal'].forEach(closeModal);
  }
});

// ============================================================
// 🍞 Toast 通知
// ============================================================
let toastTimer = null;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;

// ============================================================
// 🌐 API 呼叫
// ============================================================
async function apiGet(action, params) {
  try {
    const query = new URLSearchParams({ action, ...params }).toString();
    const res = await fetch(`${GAS_URL}?${query}`, { method: 'GET' });
    return await res.json();
  } catch (e) {
    console.error('apiGet error:', e);
    return { success: false, message: '網路錯誤，請稍後再試' };
  }
}

async function apiPost(data) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
    return await res.json();
  } catch (e) {
    console.error('apiPost error:', e);
    return { success: false, message: '網路錯誤，請稍後再試' };
  }
}

// ============================================================
// 🛠️ 工具函式
// ============================================================

// 防 XSS：HTML 跳脫
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// 時間格式化
function formatTime(isoStr) {
  if (!isoStr) return '';
  const date = new Date(isoStr);
  const now = new Date();
  const diff = Math.floor((now - date) / 1000);

  if (diff < 60)    return '剛剛';
  if (diff < 3600)  return `${Math.floor(diff / 60)} 分鐘前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)} 小時前`;
  if (diff < 604800)return `${Math.floor(diff / 86400)} 天前`;

  return date.toLocaleDateString('zh-TW', {
    year: 'numeric', month: '2-digit', day: '2-digit'
  });
}

// 取得分類標籤
function getCatLabel(catId) {
  const cat = categories.find(c => c.id === catId);
  return cat ? `${cat.icon} ${cat.name}` : catId || '一般';
}

// File → Base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
