<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社群論壇</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #06C755;
      --primary-dark: #05a847;
      --secondary: #4A90D9;
      --bg: #F0F2F5;
      --card: #FFFFFF;
      --text: #1a1a2e;
      --text-muted: #6c757d;
      --border: #e0e0e0;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Navbar ── */
    .navbar {
      background: linear-gradient(135deg, #06C755, #04a847);
      color: white; padding: 0 16px;
      height: 56px; display: flex; align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(6,199,85,0.3);
    }
    .navbar-brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .navbar-actions { display: flex; gap: 8px; }
    .btn-icon { background: rgba(255,255,255,0.2); border: none; color: white;
                width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                font-size: 16px; transition: background 0.2s; }
    .btn-icon:hover { background: rgba(255,255,255,0.35); }

    /* ── Category Bar ── */
    .category-bar {
      background: white; padding: 0 8px;
      display: flex; gap: 4px; overflow-x: auto;
      border-bottom: 1px solid var(--border);
      scrollbar-width: none; position: sticky; top: 56px; z-index: 99;
    }
    .category-bar::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0; padding: 10px 14px;
      border: none; background: none; cursor: pointer;
      font-size: 13px; color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s; white-space: nowrap;
    }
    .cat-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

    /* ── Search ── */
    .search-box {
      padding: 12px 16px; background: white;
      border-bottom: 1px solid var(--border);
    }
    .search-input {
      width: 100%; padding: 8px 36px 8px 12px;
      border: 1px solid var(--border); border-radius: 20px;
      font-size: 14px; outline: none; background: var(--bg);
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--primary); }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
                     color: var(--text-muted); }

    /* ── Post List ── */
    .post-list { padding: 12px 16px; max-width: 800px; margin: 0 auto; }
    .post-card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px;
      box-shadow: var(--shadow); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      border-left: 4px solid transparent;
    }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.12);
                       border-left-color: var(--primary); }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
              background: var(--primary); display: flex; align-items: center;
              justify-content: center; color: white; font-weight: 700; font-size: 14px;
              flex-shrink: 0; }
    .post-meta { flex: 1; }
    .post-author { font-weight: 600; font-size: 14px; }
    .post-date { font-size: 12px; color: var(--text-muted); }
    .post-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .post-preview { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .post-footer { display: flex; align-items: center; gap: 12px; }
    .badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
             background: #e8f5e9; color: var(--primary); }
    .tag { padding: 2px 8px; border-radius: 10px; font-size: 11px;
           background: #e3f2fd; color: var(--secondary); }
    .stat { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 3px; }
    .has-files { color: #ff9800; font-size: 12px; }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 24px; right: 20px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, #06C755, #04a847);
      color: white; border: none; font-size: 24px;
      cursor: pointer; box-shadow: 0 4px 16px rgba(6,199,85,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s; z-index: 200;
    }
    .fab:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(6,199,85,0.5); }

    /* ── Loading / Empty ── */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border);
               border-top-color: var(--primary); border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty i { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

    /* ── User Panel ── */
    .user-panel {
      position: fixed; top: 0; right: -300px; width: 280px; height: 100vh;
      background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
      z-index: 300; transition: right 0.3s; padding: 0;
      display: flex; flex-direction: column;
    }
    .user-panel.open { right: 0; }
    .panel-header {
      background: linear-gradient(135deg, #06C755, #04a847);
      padding: 40px 20px 20px; color: white; text-align: center;
    }
    .panel-avatar { width: 70px; height: 70px; border-radius: 50%;
                    border: 3px solid white; margin: 0 auto 10px; display: block; }
    .panel-name { font-size: 16px; font-weight: 700; }
    .panel-body { padding: 20px; flex: 1; overflow-y: auto; }
    .panel-item { display: flex; align-items: center; gap: 12px;
                  padding: 12px 0; border-bottom: 1px solid var(--border);
                  font-size: 14px; cursor: pointer; }
    .panel-item i { width: 20px; color: var(--primary); }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4);
               z-index: 250; display: none; }
    .overlay.show { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; z-index: 999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── Pagination ── */
    .pagination { display: flex; justify-content: center; gap: 8px; padding: 16px; }
    .page-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
                background: white; cursor: pointer; font-size: 13px; }
    .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    @media (min-width: 768px) {
      .post-list { padding: 20px; }
      .post-card { padding: 20px; }
      .post-title { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand"><i class="fab fa-line"></i> 社群論壇</div>
  <div class="navbar-actions">
    <button class="btn-icon" onclick="openUserPanel()" title="個人資料">
      <i class="fas fa-user"></i>
    </button>
  </div>
</nav>

<!-- Category Bar -->
<div class="category-bar" id="categoryBar"></div>

<!-- Search -->
<div class="search-box">
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text"
           placeholder="搜尋帖子..." oninput="debounceSearch()">
    <i class="fas fa-search"></i>
  </div>
</div>

<!-- Post List -->
<div class="post-list" id="postList">
  <div class="loading"><div class="spinner"></div>載入中...</div>
</div>

<!-- Pagination -->
<div class="pagination" id="pagination"></div>

<!-- FAB -->
<button class="fab" onclick="goToCreatePost()" title="發佈帖子">
  <i class="fas fa-pen"></i>
</button>

<!-- User Panel -->
<div class="overlay" id="overlay" onclick="closeUserPanel()"></div>
<div class="user-panel" id="userPanel">
  <div class="panel-header">
    <img class="panel-avatar" id="panelAvatar" src="" alt="avatar">
    <div class="panel-name" id="panelName">載入中...</div>
    <div style="font-size:12px;opacity:0.8" id="panelRealName"></div>
  </div>
  <div class="panel-body">
    <div class="panel-item" onclick="goToCreatePost()">
      <i class="fas fa-pen"></i><span>發佈帖子</span>
    </div>
    <div class="panel-item" onclick="closeUserPanel()">
      <i class="fas fa-list"></i><span>我的帖子</span>
    </div>
    <div class="panel-item" onclick="liff.logout(); location.reload();">
      <i class="fas fa-sign-out-alt"></i><span>登出</span>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const WEB_APP_URL = '<?= WEB_APP_URL ?>';
  const LIFF_ID = '<?= LIFF_ID ?>';
  let currentUser = null;
  let currentCategory = 'all';
  let currentPage = 1;
  let searchTimer = null;
  let categories = [];

  // ── LIFF 初始化 ──
  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      await checkUserLogin(profile);
    } catch (e) {
      showToast('LIFF 初始化失敗：' + e.message);
    }
  }

  async function checkUserLogin(profile) {
    const res = await apiCall({ action: 'login', lineUID: profile.userId });
    if (res.needRegister) {
      location.href = `?page=register&lineUID=${profile.userId}&displayName=${encodeURIComponent(profile.displayName)}&avatar=${encodeURIComponent(profile.pictureUrl || '')}`;
      return;
    }
    if (res.success) {
      currentUser = res.user;
      updateUserPanel();
      loadCategories();
    }
  }

  function updateUserPanel() {
    if (!currentUser) return;
    document.getElementById('panelAvatar').src = currentUser.avatar || 'https://via.placeholder.com/70';
    document.getElementById('panelName').textContent = currentUser.displayName;
    document.getElementById('panelRealName').textContent = currentUser.realName;
  }

  // ── 分類 ──
  async function loadCategories() {
    const res = await apiCall({ action: 'getCategories' });
    if (res.success) {
      categories = res.categories;
      renderCategories();
      loadPosts();
    }
  }

  function renderCategories() {
    const bar = document.getElementById('categoryBar');
    bar.innerHTML = categories.map(c =>
      `<button class="cat-btn ${c.id === currentCategory ? 'active' : ''}"
        onclick="selectCategory('${c.id}')">${c.icon} ${c.name}</button>`
    ).join('');
  }

  function selectCategory(id) {
    currentCategory = id;
    currentPage = 1;
    renderCategories();
    loadPosts();
  }

  // ── 帖子列表 ──
  async function loadPosts() {
    const list = document.getElementById('postList');
    list.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
    const keyword = document.getElementById('searchInput').value;
    const res = await apiCall({
      action: 'getPosts', category: currentCategory,
      page: currentPage, pageSize: 10, keyword
    });
    if (res.success) {
      renderPosts(res.posts);
      renderPagination(res.total, res.pageSize);
    } else {
      list.innerHTML = '<div class="empty"><i class="fas fa-exclamation-circle"></i><p>載入失敗</p></div>';
    }
  }

  function renderPosts(posts) {
    const list = document.getElementById('postList');
    if (!posts.length) {
      list.innerHTML = '<div class="empty"><i class="fas fa-comments"></i><p>暫無帖子，來發第一篇吧！</p></div>';
      return;
    }
    list.innerHTML = posts.map(p => {
      const avatarEl = p.avatar
        ? `<img class="avatar" src="${p.avatar}" alt="avatar" onerror="this.style.display='none'">`
        : `<div class="avatar">${(p.displayName||'?')[0]}</div>`;
      const tagsHtml = (p.tags||[]).slice(0,3).map(t => `<span class="tag">#${t}</span>`).join('');
      const filesHtml = p.files && p.files.length ? `<span class="has-files"><i class="fas fa-paperclip"></i> ${p.files.length}</span>` : '';
      return `
        <div class="post-card" onclick="viewPost('${p.postID}')">
          <div class="post-header">
            ${avatarEl}
            <div class="post-meta">
              <div class="post-author">${escHtml(p.displayName)}</div>
              <div class="post-date">${formatRelTime(p.createDate)}</div>
            </div>
            <span class="badge">${escHtml(p.category)}</span>
          </div>
          <div class="post-title">${escHtml(p.title)}</div>
          <div class="post-preview">${escHtml(p.content)}</div>
          <div class="post-footer">
            ${tagsHtml}
            ${filesHtml}
            <span class="stat" style="margin-left:auto"><i class="fas fa-eye"></i> ${p.views}</span>
            <span class="stat"><i class="fas fa-comment"></i> ${p.replyCount}</span>
          </div>
        </div>`;
    }).join('');
  }

  function renderPagination(total, pageSize) {
    const totalPages = Math.ceil(total / pageSize);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" onclick="changePage(${currentPage-1})">‹</button>`;
    for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
      html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
    }
    if (currentPage < totalPages) html += `<button class="page-btn" onclick="changePage(${currentPage+1})">›</button>`;
    document.getElementById('pagination').innerHTML = html;
  }

  function changePage(p) { currentPage = p; loadPosts(); window.scrollTo(0,0); }

  // ── 導航 ──
  function viewPost(postID) {
    location.href = `?page=postDetail&postID=${postID}`;
  }
  function goToCreatePost() {
    if (!currentUser) { showToast('請先登入'); return; }
    location.href = '?page=post';
  }

  // ── 搜尋 ──
  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadPosts(); }, 500);
  }

  // ── User Panel ──
  function openUserPanel() {
    document.getElementById('userPanel').classList.add('open');
    document.getElementById('overlay').classList.add('show');
  }
  function closeUserPanel() {
    document.getElementById('userPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }

  // ── 工具 ──
  async function apiCall(data) {
    const res = await fetch(WEB_APP_URL, {
      method: 'POST', body: JSON.stringify(data),
      headers: { 'Content-Type': 'application/json' }
    });
    return res.json();
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatRelTime(dateStr) {
    const diff = (Date.now() - new Date(dateStr)) / 1000;
    if (diff < 60) return '剛剛';
    if (diff < 3600) return Math.floor(diff/60) + ' 分鐘前';
    if (diff < 86400) return Math.floor(diff/3600) + ' 小時前';
    if (diff < 2592000) return Math.floor(diff/86400) + ' 天前';
    return dateStr.substring(0,10);
  }

  initLiff();
</script>
</body>
</html>
