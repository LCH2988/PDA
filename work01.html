<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

  body{font-family:'Microsoft JhengHei',sans-serif;background:#f0f4f8;color:#2d3748;font-size:13px;}
  /* LAYOUT */
  .app{display:flex;flex-direction:column;height:100vh;}
  .topbar{background:linear-gradient(135deg,#2b6cb0,#4299e1);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .topbar h1{font-size:1rem;font-weight:700;}
  .topbar .sub{font-size:0.75rem;opacity:.8;}
  .main{display:flex;flex:1;overflow:hidden;}
  /* LEFT PANEL */
  .left-panel{width:320px;min-width:260px;background:#fff;border-right:2px solid #e2e8f0;display:flex;flex-direction:column;flex-shrink:0;}
  .panel-header{padding:10px 14px;background:#2d3748;color:#fff;font-weight:700;font-size:0.82rem;display:flex;align-items:center;justify-content:space-between;}
  .panel-tabs{display:flex;border-bottom:2px solid #e2e8f0;}
  .ptab{flex:1;padding:7px 4px;text-align:center;cursor:pointer;font-size:0.75rem;font-weight:600;color:#718096;border-bottom:3px solid transparent;transition:.2s;}
  .ptab.active{color:#2b6cb0;border-bottom-color:#2b6cb0;background:#ebf8ff;}
  .task-list-area{flex:1;overflow-y:auto;padding:8px;}
  .task-card{background:#f7fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:grab;transition:.15s;position:relative;}
  .task-card:hover{border-color:#4299e1;background:#ebf8ff;box-shadow:0 2px 8px rgba(66,153,225,.15);}
  .task-card.dragging{opacity:.5;border-style:dashed;}
  .task-card.used{opacity:.45;background:#f0f0f0;cursor:not-allowed;}
  .task-card .tc-name{font-weight:700;font-size:0.8rem;color:#2d3748;margin-bottom:3px;}
  .task-card .tc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.68rem;font-weight:700;}
  .b-once{background:#fed7d7;color:#c53030;}
  .b-periodic{background:#c6f6d5;color:#276749;}
  .b-irregular{background:#fefcbf;color:#b7791f;}
  .b-legal{background:#bee3f8;color:#2b6cb0;}
  .b-finance{background:#c6f6d5;color:#276749;}
  .b-meeting{background:#e9d8fd;color:#6b46c1;}
  .b-event{background:#fed7d7;color:#c53030;}
  .b-person{background:#e2e8f0;color:#4a5568;}
  .b-urgent{background:#fc8181;color:#fff;}
  .b-high{background:#f6ad55;color:#fff;}
  .b-mid{background:#68d391;color:#fff;}
  /* ADD TASK */
  .add-task-btn{margin:8px;padding:7px;background:#ebf8ff;border:2px dashed #4299e1;border-radius:8px;color:#2b6cb0;font-weight:700;font-size:0.78rem;cursor:pointer;text-align:center;transition:.15s;}
  .add-task-btn:hover{background:#bee3f8;}
  /* RIGHT PANEL */
  .right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .month-nav{display:flex;flex-wrap:wrap;gap:4px;padding:8px 12px;background:#fff;border-bottom:2px solid #e2e8f0;flex-shrink:0;}
  .mnav-btn{padding:5px 11px;border-radius:16px;border:2px solid #e2e8f0;background:#f7fafc;cursor:pointer;font-size:0.75rem;font-weight:700;color:#4a5568;transition:.15s;}
  .mnav-btn:hover{border-color:#4299e1;color:#2b6cb0;}
  .mnav-btn.active{background:#2b6cb0;color:#fff;border-color:#2b6cb0;}
  .mnav-btn .mc{font-size:0.65rem;background:rgba(0,0,0,.15);border-radius:8px;padding:1px 5px;margin-left:3px;}
  .month-area{flex:1;overflow-y:auto;padding:12px;}
  .month-window{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.07);overflow:hidden;}
  .mw-header{padding:12px 16px;background:linear-gradient(90deg,#2b6cb0,#4299e1);color:#fff;display:flex;align-items:center;gap:12px;}
  .mw-title{font-size:1rem;font-weight:800;}
  .mw-stats{display:flex;gap:6px;flex-wrap:wrap;}
  .mw-stat{background:rgba(255,255,255,.2);border-radius:10px;padding:2px 9px;font-size:0.7rem;font-weight:600;}
  .drop-zone{min-height:60px;padding:10px;border:2px dashed #bee3f8;border-radius:8px;margin:10px;background:#f7fafc;transition:.2s;}
  .drop-zone.drag-over{background:#ebf8ff;border-color:#4299e1;box-shadow:inset 0 0 0 3px #bee3f8;}
  .drop-zone-label{text-align:center;color:#a0aec0;font-size:0.75rem;padding:8px;display:none;}
  .drop-zone.empty .drop-zone-label{display:block;}
  .month-task{background:#f7fafc;border:1.5px solid #e2e8f0;border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:flex-start;gap:8px;}
  .month-task .mt-info{flex:1;}
  .month-task .mt-name{font-weight:700;font-size:0.8rem;color:#2d3748;}
  .month-task .mt-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .month-task .mt-deadline{font-size:0.72rem;color:#718096;margin-top:3px;}
  .remove-btn{background:#fff5f5;border:1px solid #fed7d7;color:#c53030;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:0.72rem;font-weight:700;flex-shrink:0;transition:.15s;}
  .remove-btn:hover{background:#fed7d7;}
  .cat-section{margin-bottom:10px;}
  .cat-header{padding:6px 12px;font-size:0.75rem;font-weight:700;color:#fff;border-radius:6px;margin-bottom:4px;}
  .ch-legal{background:#2b6cb0;}
  .ch-finance{background:#276749;}
  .ch-meeting{background:#6b46c1;}
  .ch-event{background:#c53030;}
  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:24px;width:420px;max-width:95vw;box-shadow:0 10px 40px rgba(0,0,0,.2);}
  .modal h2{font-size:1rem;font-weight:800;margin-bottom:16px;color:#2d3748;}
  .form-row{margin-bottom:12px;}
  .form-row label{display:block;font-size:0.78rem;font-weight:700;color:#4a5568;margin-bottom:4px;}
  .form-row input,.form-row select,.form-row textarea{width:100%;padding:7px 10px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:0.8rem;font-family:inherit;transition:.15s;}
  .form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#4299e1;}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
  .btn-cancel{padding:7px 16px;border:1.5px solid #e2e8f0;border-radius:8px;background:#f7fafc;cursor:pointer;font-size:0.8rem;font-weight:700;}
  .btn-save{padding:7px 16px;border:none;border-radius:8px;background:#2b6cb0;color:#fff;cursor:pointer;font-size:0.8rem;font-weight:700;}
  .btn-save:hover{background:#2c5282;}
  /* SCROLLBAR */
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:#f0f4f8;}
  ::-webkit-scrollbar-thumb{background:#cbd5e0;border-radius:3px;}
  /* STATS BAR */
  .stats-bar{display:flex;gap:10px;padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0;flex-wrap:wrap;}
  .stat-item{display:flex;align-items:center;gap:5px;font-size:0.75rem;font-weight:600;color:#4a5568;}
  .stat-dot{width:10px;height:10px;border-radius:50%;}
  .search-bar{padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:20px;font-size:0.78rem;width:100%;margin:6px 8px;width:calc(100% - 16px);}
  .search-bar:focus{outline:none;border-color:#4299e1;}
</style>

<body>
<div class="app">
  <div class="topbar">
    <div>

      </div>

        <div class="ptab" onclick="filterTasks('periodic',this)">定期</div>
        <div class="ptab" onclick="filterTasks('irregular',this)">不定期</div>
      </div>

      <div class="task-list-area" id="task-pool"></div>
      <div class="add-task-btn" onclick="openAddModal()">＋ 新增工作任務</div>
    </div>

    <!-- RIGHT: MONTH WINDOWS -->
    <div class="right-panel">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="month-nav" id="month-nav"></div>
      <div class="month-area" id="month-area"></div>
    </div>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-overlay" id="modal">

        <option value="periodic">定期任務</option>
        <option value="irregular">不定期任務</option>
      </select>
    </div>
    <div class="form-row"><label>工作類別</label>
      <select id="f-cat">
        <option value="legal">📌 法定申報</option>
        <option value="finance">💰 財務工作</option>
        <option value="meeting">🏛️ 會議</option>
        <option value="event">🎪 活動倡議</option>
      </select>
    </div>
    <div class="form-row"><label>負責人</label>
      <select id="f-person">
        <option value="理事長">理事長</option>
        <option value="總幹事">總幹事</option>
        <option value="會計">會計</option>

        <option value="行政秘書">行政秘書</option>
        <option value="全體理監事">全體理監事</option>
      </select>
    </div>
    <div class="form-row"><label>優先級</label>
      <select id="f-priority">
        <option value="urgent">🔴 緊急</option>
        <option value="high">🟡 高</option>
        <option value="mid">🟢 中</option>
      </select>
    </div>
    <div class="form-row"><label>備註</label><input id="f-note" placeholder="法規依據、截止日期等"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveTask()">儲存</button>
    </div>
  </div>
</div>

  m6:[{taskId:'t29',deadline:'06/30',note:''},{taskId:'t30',deadline:'06/15',note:''},{taskId:'t3',deadline:'06/30',note:''},{taskId:'t6',deadline:'06/20',note:''},{taskId:'t44',deadline:'06/13',note:''},{taskId:'t45',deadline:'06/30',note:''}],
  m7:[{taskId:'t11',deadline:'07/16',note:''},{taskId:'t46',deadline:'07/11',note:''},{taskId:'t47',deadline:'07/01',note:''}],
  m8:[{taskId:'t12',deadline:'08/20',note:''},{taskId:'t48',deadline:'08/10',note:''},{taskId:'t49',deadline:'08/22',note:''}],
  m9:[{taskId:'t31',deadline:'09/30',note:''},{taskId:'t32',deadline:'09/30',note:''},{taskId:'t4',deadline:'09/30',note:''},{taskId:'t7',deadline:'09/19',note:''},{taskId:'t50',deadline:'09/01',note:''}],
  m10:[{taskId:'t33',deadline:'10/20',note:''},{taskId:'t51',deadline:'10/01',note:''},{taskId:'t52',deadline:'10/17',note:''}],
  m11:[{taskId:'t34',deadline:'11/30',note:''},{taskId:'t13',deadline:'11/19',note:''},{taskId:'t53',deadline:'11/14',note:''}],
  m12:[{taskId:'t35',deadline:'12/31',note:''},{taskId:'t36',deadline:'12/31',note:''},{taskId:'t37',deadline:'12/31',note:''},{taskId:'t8',deadline:'12/12',note:''},{taskId:'t54',deadline:'12/19',note:''}],
};

let currentMonth = 'm1';
let currentFilter = 'all';
let searchQuery = '';
let dragTaskId = null;

// ============================================================
// HELPERS
// ============================================================
function getTask(id){ return tasks.find(t=>t.id===id); }

function isTaskUsed(id){
  // once tasks: used if assigned anywhere
  const t = getTask(id);
  if(!t) return false;
  if(t.type !== 'once') return false;
  return Object.values(monthTasks).some(arr=>arr.some(a=>a.taskId===id));
}

function getMonthCount(mk){
  return (monthTasks[mk]||[]).length;
}

function catLabel(cat){
  return TASK_CATS[cat]||cat;
}

// ============================================================
// RENDER LEFT PANEL
// ============================================================
function renderTaskPool(){
  const pool = document.getElementById('task-pool');
  let filtered = tasks.filter(t=>{
    if(currentFilter !== 'all' && t.type !== currentFilter) return false;
    if(searchQuery && !t.name.toLowerCase().includes(searchQuery.toLowerCase()) && !t.person.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  // Group by category
  const cats = ['legal','finance','meeting','event'];
  let html = '';
  cats.forEach(cat=>{
    const group = filtered.filter(t=>t.cat===cat);
    if(!group.length) return;
    html += `<div style="font-size:0.7rem;font-weight:800;color:#718096;padding:4px 2px 2px;margin-top:4px;">${catLabel(cat)}</div>`;
    group.forEach(t=>{
      const used = isTaskUsed(t.id);
      html += `<div class="task-card${used?' used':''}" 
        draggable="${!used}"
        id="tc-${t.id}"
        ondragstart="onDragStart(event,'${t.id}')"
        ondragend="onDragEnd(event)"
        title="${used?'此一次性任務已安排至月份':'拖曳至右側月份視窗'}">
        <div class="tc-name">${t.name}${used?'<span style="color:#a0aec0;font-weight:400;font-size:0.7rem;"> ✓已安排</span>':''}</div>
        <div class="tc-meta">
          <span class="badge b-${t.type}">${TASK_TYPES[t.type]}</span>
          <span class="badge b-${t.cat}" style="font-size:0.65rem;">${catLabel(t.cat)}</span>
          <span class="badge b-person">${t.person}</span>
          <span class="badge b-${t.priority}">${PRIORITIES[t.priority]}</span>
        </div>
        ${t.note?`<div style="font-size:0.68rem;color:#718096;margin-top:3px;">📎 ${t.note}</div>`:''}
      </div>`;
    });
  });

  pool.innerHTML = html || '<div style="text-align:center;color:#a0aec0;padding:20px;font-size:0.8rem;">無符合條件的任務</div>';
  document.getElementById('total-count').textContent = tasks.length;
  renderStats();
}

// ============================================================
// RENDER STATS
// ============================================================
function renderStats(){
  const bar = document.getElementById('stats-bar');
  const total = tasks.length;
  const usedOnce = tasks.filter(t=>t.type==='once' && isTaskUsed(t.id)).length;
  const totalOnce = tasks.filter(t=>t.type==='once').length;
  const totalPeriodic = tasks.filter(t=>t.type==='periodic').length;
  const totalIrreg = tasks.filter(t=>t.type==='irregular').length;
  bar.innerHTML = `
    <div class="stat-item"><div class="stat-dot" style="background:#2b6cb0"></div>總任務 ${total} 項</div>
    <div class="stat-item"><div class="stat-dot" style="background:#c53030"></div>一次性 ${totalOnce} 項（已安排 ${usedOnce}）</div>
    <div class="stat-item"><div class="stat-dot" style="background:#276749"></div>定期 ${totalPeriodic} 項</div>
    <div class="stat-item"><div class="stat-dot" style="background:#b7791f"></div>不定期 ${totalIrreg} 項</div>
    <div class="stat-item"><div class="stat-dot" style="background:#6b46c1"></div>全年已分配 ${Object.values(monthTasks).reduce((s,a)=>s+a.length,0)} 項次</div>
  `;
}

// ============================================================
// RENDER MONTH NAV
// ============================================================
function renderMonthNav(){
  const nav = document.getElementById('month-nav');
  nav.innerHTML = MONTH_KEYS.map((mk,i)=>`
    <div class="mnav-btn${mk===currentMonth?' active':''}" onclick="switchMonth('${mk}')">
      ${MONTHS[i]}<span class="mc">${getMonthCount(mk)}</span>
    </div>`).join('');
}

// ============================================================
// RENDER MONTH WINDOW
// ============================================================
function renderMonthArea(){
  const area = document.getElementById('month-area');
  const mk = currentMonth;
  const mi = MONTH_KEYS.indexOf(mk);
  const assigned = monthTasks[mk]||[];

  // Group by category
  const cats = ['legal','finance','meeting','event'];
  const catHeaders = {legal:'📌 法定申報',finance:'💰 財務工作',meeting:'🏛️ 會議',event:'🎪 活動倡議'};
  const catColors = {legal:'ch-legal',finance:'ch-finance',meeting:'ch-meeting',event:'ch-event'};

  let catSections = '';
  cats.forEach(cat=>{
    const items = assigned.filter(a=>{ const t=getTask(a.taskId); return t&&t.cat===cat; });
    if(!items.length) return;
    catSections += `<div class="cat-section">
      <div class="cat-header ${catColors[cat]}">${catHeaders[cat]}</div>`;
    items.forEach(a=>{
      const t = getTask(a.taskId);
      if(!t) return;
      catSections += `<div class="month-task">
        <div class="mt-info">
          <div class="mt-name">${t.name}</div>
          <div class="mt-meta">
            <span class="badge b-${t.type}">${TASK_TYPES[t.type]}</span>
            <span class="badge b-person">${t.person}</span>
            <span class="badge b-${t.priority}">${PRIORITIES[t.priority]}</span>
          </div>
          ${a.deadline?`<div class="mt-deadline">📅 截止：${a.deadline}　${t.note?'📎 '+t.note:''}</div>`:''}
        </div>
        <button class="remove-btn" onclick="removeFromMonth('${mk}','${a.taskId}')">✕ 移除</button>
      </div>`;
    });
    catSections += '</div>';
  });

  const isEmpty = assigned.length === 0;
  const urgentCount = assigned.filter(a=>{const t=getTask(a.taskId);return t&&t.priority==='urgent';}).length;
  const alertHtml = urgentCount > 0 ? `<div style="background:#fff5f5;border-left:4px solid #fc8181;padding:8px 12px;margin:10px;border-radius:0 8px 8px 0;font-size:0.78rem;color:#742a2a;">⚠️ 本月有 <strong>${urgentCount}</strong> 項緊急任務，請優先安排！</div>` : '';

  area.innerHTML = `
    <div class="month-window">
      <div class="mw-header">
        <div class="mw-title">${MONTHS[mi]} 工作視窗</div>
        <div class="mw-stats">
          <span class="mw-stat">共 ${assigned.length} 項</span>
          ${urgentCount?`<span class="mw-stat" style="background:#fc8181;">🔴 緊急 ${urgentCount}</span>`:''}
        </div>
      </div>
      ${alertHtml}
      <div class="drop-zone${isEmpty?' empty':''}" 
        id="drop-${mk}"
        ondragover="onDragOver(event)"
        ondragleave="onDragLeave(event)"
        ondrop="onDrop(event,'${mk}')">
        <div class="drop-zone-label">⬅️ 從左側拖曳任務至此處</div>
        ${catSections}
      </div>
    </div>`;
}

// ============================================================
// DRAG & DROP
// ============================================================
function onDragStart(e, taskId){
  dragTaskId = taskId;
  e.dataTransfer.effectAllowed = 'copy';
  setTimeout(()=>{ const el=document.getElementById('tc-'+taskId); if(el) el.classList.add('dragging'); },0);
}
function onDragEnd(e){
  if(dragTaskId){ const el=document.getElementById('tc-'+dragTaskId); if(el) el.classList.remove('dragging'); }
  dragTaskId = null;
}
function onDragOver(e){
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}
function onDrop(e, mk){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!dragTaskId) return;
  const t = getTask(dragTaskId);
  if(!t) return;
  // Check if already in this month
  if((monthTasks[mk]||[]).some(a=>a.taskId===dragTaskId)){
    alert('此任務已在本月清單中！');
    return;
  }
  // For once tasks, check if used elsewhere
  if(t.type==='once' && isTaskUsed(dragTaskId)){
    alert('此一次性任務已安排至其他月份！\n請先從原月份移除後再重新分配。');
    return;
  }
  if(!monthTasks[mk]) monthTasks[mk]=[];
  monthTasks[mk].push({taskId:dragTaskId, deadline:'', note:''});
  refresh();
}

// ============================================================
// REMOVE FROM MONTH
// ============================================================
function removeFromMonth(mk, taskId){
  if(!monthTasks[mk]) return;
  monthTasks[mk] = monthTasks[mk].filter(a=>a.taskId!==taskId);
  refresh();
}

// ============================================================
// SWITCH MONTH
// ============================================================
function switchMonth(mk){
  currentMonth = mk;
  renderMonthNav();
  renderMonthArea();
}

// ============================================================
// FILTER & SEARCH
// ============================================================
function filterTasks(type, el){
  currentFilter = type;
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTaskPool();
}
function searchTasks(q){
  searchQuery = q;
  renderTaskPool();
}

// ============================================================
// ADD TASK MODAL
// ============================================================
function openAddModal(){
  document.getElementById('modal').classList.add('show');
}
function closeModal(){
  document.getElementById('modal').classList.remove('show');
  ['f-name','f-note'].forEach(id=>document.getElementById(id).value='');
}
function saveTask(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ alert('請輸入任務名稱！'); return; }
  const newId = 't'+(Date.now());
  tasks.push({
    id: newId,
    name,
    type: document.getElementById('f-type').value,
    cat: document.getElementById('f-cat').value,
    person: document.getElementById('f-person').value,
    priority: document.getElementById('f-priority').value,
    note: document.getElementById('f-note').value.trim(),
  });
  closeModal();
  refresh();
}

// ============================================================
// REFRESH ALL
// ============================================================
function refresh(){
  renderTaskPool();
  renderMonthNav();
  renderMonthArea();
}

// INIT
refresh();
</script>
