<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>家庭相簿</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --red:#d63031; --green:#00b894; --blue:#0984e3; --orange:#e17055;
      --bg:#f2ede8; --card:#fff; --text:#1a1a1a; --sub:#555;
      --border:#ddd; --radius:18px; --shadow:0 4px 16px rgba(0,0,0,0.12);
    }
    html { font-size:18px; }
    body { font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:120px; }

    /* ── Header ── */
    header { background:var(--red); padding:16px 18px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 3px 10px rgba(0,0,0,0.2); }
    .logo { font-size:1.5rem; font-weight:900; color:#fff; letter-spacing:1px; }
    .stats-badge { background:rgba(255,255,255,0.25); color:#fff; border-radius:50px; padding:6px 14px; font-size:1rem; font-weight:700; }

    /* ── Album Bar ── */
    .album-bar { background:#fff; border-bottom:2px solid var(--border); padding:12px 14px; display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
    .album-bar::-webkit-scrollbar { display:none; }
    .album-tab { flex-shrink:0; padding:11px 20px; border-radius:50px; border:3px solid var(--border); background:#f8f8f8; color:var(--sub); font-size:1.05rem; font-weight:700; cursor:pointer; white-space:nowrap; min-height:50px; display:flex; align-items:center; transition:all 0.2s; }
    .album-tab.active { background:var(--red); border-color:var(--red); color:#fff; box-shadow:0 4px 12px rgba(214,48,49,0.35); }

    /* ── Action Row ── */
    .action-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:14px 14px 8px; }
    .action-btn { background:var(--card); border:3px solid var(--border); border-radius:var(--radius); padding:16px 10px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; box-shadow:var(--shadow); transition:all 0.18s; min-height:88px; }
    .action-btn:active { transform:scale(0.95); }
    .action-btn .ab-icon { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; font-weight:900; color:#fff; }
    .action-btn .ab-label { font-size:1rem; font-weight:800; text-align:center; }
    .action-btn.red    { border-color:var(--red); }    .action-btn.red    .ab-icon { background:var(--red); }    .action-btn.red    .ab-label { color:var(--red); }
    .action-btn.green  { border-color:var(--green); }  .action-btn.green  .ab-icon { background:var(--green); }  .action-btn.green  .ab-label { color:var(--green); }
    .action-btn.blue   { border-color:var(--blue); }   .action-btn.blue   .ab-icon { background:var(--blue); }   .action-btn.blue   .ab-label { color:var(--blue); }
    .action-btn.orange { border-color:var(--orange); } .action-btn.orange .ab-icon { background:var(--orange); } .action-btn.orange .ab-label { color:var(--orange); }

    /* ── Gallery ── */
    .section-title { font-size:1.1rem; font-weight:800; color:var(--sub); padding:10px 16px 6px; }
    .photo-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:4px 12px 20px; }
    .photo-card { background:var(--card); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); border:3px solid transparent; cursor:pointer; transition:all 0.2s; position:relative; animation:fadeUp 0.35s ease; }
    .photo-card:active { transform:scale(0.97); }
    .photo-card.selected { border-color:var(--red); box-shadow:0 0 0 4px rgba(214,48,49,0.22); }
    .card-check { position:absolute; top:8px; left:8px; z-index:5; width:30px; height:30px; border-radius:50%; border:3px solid #fff; background:rgba(0,0,0,0.3); display:none; align-items:center; justify-content:center; font-size:1rem; color:#fff; font-weight:900; }
    .select-mode .card-check { display:flex; }
    .photo-card.selected .card-check { background:var(--red); border-color:var(--red); }
    .photo-card.selected .card-check::after { content:'V'; }
    .img-wrap { width:100%; aspect-ratio:1; overflow:hidden; background:#e8e8e8; }
    .img-wrap img { width:100%; height:100%; object-fit:cover; pointer-events:none; transition:transform 0.3s; }
    .photo-card:active .img-wrap img { transform:scale(1.05); }
    .card-info { padding:10px 12px 12px; }
    .card-name { font-size:0.95rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text); margin-bottom:3px; }
    .card-date { font-size:0.85rem; color:var(--sub); }

    /* ── Loading / Empty ── */
    .loading { text-align:center; padding:60px 20px; display:flex; flex-direction:column; align-items:center; gap:16px; }
    .spinner { width:54px; height:54px; border:5px solid #ddd; border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; }
    .loading p { font-size:1.15rem; color:var(--sub); font-weight:700; }
    .empty-state { text-align:center; padding:60px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
    .empty-icon { width:72px; height:72px; border-radius:50%; background:#eee; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:900; color:#aaa; }
    .empty-state h3 { font-size:1.25rem; font-weight:800; color:var(--sub); }
    .empty-state p  { font-size:1rem; color:#aaa; }

    /* ── Select Bar ── */
    .select-bar { display:none; position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:3px solid var(--red); padding:12px 14px 24px; box-shadow:0 -4px 20px rgba(0,0,0,0.15); z-index:200; flex-direction:column; gap:10px; }
    .select-bar.show { display:flex; }
    .select-bar-info { font-size:1.15rem; font-weight:800; color:var(--red); text-align:center; }
    .select-bar-btns { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
    .sel-btn { padding:14px 6px; border-radius:14px; border:none; font-size:0.95rem; font-weight:800; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:opacity 0.2s; font-family:inherit; }
    .sel-btn:active { opacity:0.75; }
    .sel-btn .si { font-size:1.4rem; }
    .sel-btn.dl  { background:var(--green); color:#fff; }
    .sel-btn.all { background:var(--blue);  color:#fff; }
    .sel-btn.cls { background:#888;         color:#fff; }

    /* ── Lightbox ── */
    #lightbox { display:none; position:fixed; inset:0; background:#000; z-index:9999; flex-direction:column; }
    #lightbox.open { display:flex; }
    #lbTop { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:rgba(0,0,0,0.7); flex-shrink:0; }
    #lbCounter { font-size:1.15rem; font-weight:800; color:#fff; }
    #lbCloseBtn { width:50px; height:50px; border-radius:50%; border:3px solid rgba(255,255,255,0.5); background:rgba(255,255,255,0.15); color:#fff; font-size:1.3rem; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    #lbThumbs { display:flex; gap:8px; padding:10px 14px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; background:rgba(0,0,0,0.5); }
    #lbThumbs::-webkit-scrollbar { display:none; }
    .lb-thumb { width:58px; height:58px; flex-shrink:0; border-radius:10px; overflow:hidden; border:3px solid transparent; cursor:pointer; opacity:0.5; transition:all 0.2s; }
    .lb-thumb img { width:100%; height:100%; object-fit:cover; }
    .lb-thumb.active { border-color:var(--red); opacity:1; transform:scale(1.08); }
    #lbImgArea { flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #lbImg { max-width:100%; max-height:100%; object-fit:contain; display:none; }
    #lbImg.loaded { display:block; }
    #lbSpinner { width:58px; height:58px; border:5px solid rgba(255,255,255,0.2); border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; position:absolute; }
    #lbSpinner.hide { display:none; }
    .lb-nav-btn { position:absolute; top:50%; transform:translateY(-50%); width:52px; height:80px; border-radius:12px; border:none; background:rgba(255,255,255,0.18); color:#fff; font-size:2rem; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; backdrop-filter:blur(4px); transition:background 0.2s; }
    .lb-nav-btn:active { background:rgba(214,48,49,0.6); }
    #lbPrev { left:8px; } #lbNext { right:8px; }
    #lbBottom { background:rgba(0,0,0,0.75); padding:14px 16px 24px; flex-shrink:0; }
    #lbName { font-size:1.1rem; font-weight:800; color:#fff; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #lbMeta { font-size:0.9rem; color:rgba(255,255,255,0.6); margin-bottom:14px; }
    #lbActions { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .lb-action-btn { padding:16px; border-radius:14px; border:none; font-size:1.05rem; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.2s; font-family:inherit; }
    .lb-action-btn:active { opacity:0.75; }
    .lb-action-btn.dl  { background:var(--green); color:#fff; }
    .lb-action-btn.cls { background:rgba(255,255,255,0.2); color:#fff; }

    /* ── Modals ── */
    .modal-back { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:10000; align-items:flex-end; justify-content:center; }
    .modal-back.open { display:flex; }
    .modal-sheet { background:#fff; width:100%; max-height:88vh; border-radius:26px 26px 0 0; padding:22px 18px 40px; overflow-y:auto; animation:slideUp 0.3s ease; }
    .sheet-handle { width:46px; height:5px; border-radius:3px; background:#ddd; margin:0 auto 18px; }
    .sheet-title { font-size:1.35rem; font-weight:900; color:var(--text); margin-bottom:18px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:1rem; font-weight:800; color:var(--sub); margin-bottom:7px; }
    .field input, .field textarea, .field select { width:100%; padding:15px; border:3px solid var(--border); border-radius:14px; font-size:1.05rem; font-family:inherit; color:var(--text); background:#fafafa; outline:none; transition:border-color 0.2s; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--red); }
    .field textarea { resize:vertical; min-height:80px; }
    .sheet-btn { width:100%; padding:18px; border-radius:16px; border:none; font-size:1.2rem; font-weight:900; cursor:pointer; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; transition:opacity 0.2s; font-family:inherit; }
    .sheet-btn:active { opacity:0.8; }
    .sheet-btn.confirm { background:var(--red);   color:#fff; }
    .sheet-btn.cancel  { background:#eee;         color:var(--sub); margin-top:10px; }
    .sheet-btn.upload  { background:var(--green); color:#fff; }
    .sheet-btn:disabled { opacity:0.4; cursor:not-allowed; }

    /* ── Upload Zone ── */
    .upload-zone { border:3px dashed #ccc; border-radius:16px; padding:30px 18px; text-align:center; cursor:pointer; transition:all 0.2s; margin-bottom:14px; background:#fafafa; }
    .upload-zone.drag-over { border-color:var(--red); background:#fff5f5; }
    .upload-zone .uz-icon { width:56px; height:56px; border-radius:50%; background:#eee; display:flex; align-items:center; justify-content:center; font-size:1.6rem; font-weight:900; color:#888; margin:0 auto 10px; }
    .upload-zone p { font-size:1.05rem; color:var(--sub); font-weight:700; }
    .upload-zone input { display:none; }
    .upload-preview { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    .prev-item { aspect-ratio:1; border-radius:10px; overflow:hidden; position:relative; }
    .prev-item img { width:100%; height:100%; object-fit:cover; }
    .prev-item .rm { position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:var(--red); border:none; color:#fff; font-size:0.7rem; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* ── Progress Modal ── */
    #progressModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10002; align-items:center; justify-content:center; }
    #progressModal.open { display:flex; }
    .prog-box { background:#fff; border-radius:22px; padding:30px 26px; width:86%; max-width:340px; text-align:center; box-shadow:0 12px 40px rgba(0,0,0,0.2); }
    .prog-box h3 { font-size:1.25rem; font-weight:900; margin-bottom:16px; }
    .prog-wrap { background:#eee; border-radius:50px; height:13px; overflow:hidden; margin-bottom:10px; }
    .prog-fill { height:100%; background:linear-gradient(90deg,var(--red),var(--orange)); border-radius:50px; transition:width 0.3s; }
    .prog-text { font-size:0.95rem; color:var(--sub); font-weight:700; }

    /* ── Animations ── */
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes fadeUp  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">家庭相簿</div>
  <div class="stats-badge" id="stats">載入中</div>
</header>

<!-- ── Album Tab Bar ── -->
<div class="album-bar" id="albumBar">
  <div class="album-tab active" onclick="loadFolder(null,this)">全部相片</div>
</div>

<!-- ── Action Buttons ── -->
<div class="action-row">
  <button class="action-btn blue"   onclick="openCreateAlbumModal()"><div class="ab-icon">+</div><div class="ab-label">新增相簿</div></button>
  <button class="action-btn green"  onclick="openUploadModal()"><div class="ab-icon">↑</div><div class="ab-label">上傳相片</div></button>
  <button class="action-btn orange" onclick="toggleSelectMode()"><div class="ab-icon" id="selIcon">☑</div><div class="ab-label" id="selLabel">選取下載</div></button>
  <button class="action-btn red"    onclick="downloadAlbum()"><div class="ab-icon">↓</div><div class="ab-label">下載相簿</div></button>
</div>

<!-- ── Gallery ── -->
<div class="section-title">相片</div>
<div id="gallery">
  <div class="loading"><div class="spinner"></div><p>正在載入相片...</p></div>
</div>

<!-- ── Select Bar (fixed bottom) ── -->
<div class="select-bar" id="selectBar">
  <div class="select-bar-info" id="selCount">已選 0 張相片</div>
  <div class="select-bar-btns">
    <button class="sel-btn dl"  onclick="batchDownload()"><span class="si">↓</span>下載選取</button>
    <button class="sel-btn all" onclick="selectAll()"><span class="si">V</span>全部選取</button>
    <button class="sel-btn cls" onclick="clearSelection()"><span class="si">X</span>取消選取</button>
  </div>
</div>

<!-- ── Lightbox ── -->
<div id="lightbox">
  <div id="lbTop">
    <div id="lbCounter">1 / 1</div>
    <button id="lbCloseBtn">X</button>
  </div>
  <div id="lbThumbs"></div>
  <div id="lbImgArea">
    <div id="lbSpinner"></div>
    <img id="lbImg" src="" alt="photo">
    <button class="lb-nav-btn" id="lbPrev">&lt;</button>
    <button class="lb-nav-btn" id="lbNext">&gt;</button>
  </div>
  <div id="lbBottom">
    <div id="lbName"></div>
    <div id="lbMeta"></div>
    <div id="lbActions">
      <button class="lb-action-btn dl"  onclick="downloadCurrentPhoto()">下載這張</button>
      <button class="lb-action-btn cls" onclick="closeLightbox()">關閉</button>
    </div>
  </div>
</div>

<!-- ── Create Album Modal ── -->
<div class="modal-back" id="createAlbumModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">新增相簿</div>
    <div class="field"><label>相簿名稱（必填）</label><input type="text" id="albumName" placeholder="例：2024 過年家庭聚餐"></div>
    <div class="field"><label>說明（可不填）</label><textarea id="albumDesc" placeholder="這個相簿的說明..."></textarea></div>
    <button class="sheet-btn confirm" onclick="createAlbum()">建立相簿</button>
    <button class="sheet-btn cancel"  onclick="closeModal('createAlbumModal')">取消</button>
  </div>
</div>

<!-- ── Upload Modal ── -->
<div class="modal-back" id="uploadModal">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">上傳相片</div>
    <div class="field">
      <label>上傳到哪個相簿？</label>
      <select id="uploadTarget"></select>
    </div>
    <div class="upload-zone" id="uploadZone">
      <div class="uz-icon">+</div>
      <p>點這裡選擇相片</p>
      <p style="font-size:0.88rem;color:#aaa;margin-top:6px;">可一次選多張</p>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
    <div class="upload-preview" id="uploadPreview"></div>
    <button class="sheet-btn upload" id="doUploadBtn" onclick="doUpload()" disabled>開始上傳</button>
    <button class="sheet-btn cancel" onclick="closeModal('uploadModal')">取消</button>
  </div>
</div>

<!-- ── Progress Modal ── -->
<div id="progressModal">
  <div class="prog-box">
    <h3 id="progressTitle">處理中...</h3>
    <div class="prog-wrap"><div class="prog-fill" id="progressFill" style="width:0%"></div></div>
    <div class="prog-text" id="progressText">請稍候</div>
  </div>
</div>

<script>
  // =============================================
  //  ★ 請換成您的 Apps Script 部署網址
  // =============================================
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwf9vu29IEivziRUkR6yadZVeEsZutdTHr7hFh8J12-QsEG3S8SC8ZN3uGtHbKogYWv/exec';

  // =============================================
  //  JSONP 核心（GET 請求用）
  // =============================================
  var _cbIndex = 0;

  function api(params, onSuccess, onError) {
    var cbName = '_gasCb' + (++_cbIndex);
    var timer;

    window[cbName] = function(res) {
      clearTimeout(timer);
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      if (res && res.success) {
        if (onSuccess) onSuccess(res);
      } else {
        var msg = (res && res.error) ? res.error : '未知錯誤';
        if (onError) onError(msg); else alert('錯誤：' + msg);
      }
    };

    timer = setTimeout(function() {
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      var msg = '請求逾時，請稍後再試';
      if (onError) onError(msg); else alert(msg);
    }, 15000);

    params.callback = cbName;
    var parts = [];
    for (var k in params) {
      if (params.hasOwnProperty(k)) {
        var v = params[k];
        if (typeof v === 'object') v = JSON.stringify(v);
        parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(v));
      }
    }

    var script = document.createElement('script');
    script.id  = cbName;
    script.src = SCRIPT_URL + '?' + parts.join('&');
    script.onerror = function() {
      clearTimeout(timer);
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      var msg = '網路錯誤，請檢查部署網址';
      if (onError) onError(msg); else alert(msg);
    };
    document.head.appendChild(script);
  }

  // =============================================
  //  ★ fetch POST（上傳專用，避免 URL 超長）
  // =============================================
  function apiPost(body, onSuccess, onError) {
    fetch(SCRIPT_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify(body)
    })
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(function(result) {
      if (!result.success) throw new Error(result.error || '操作失敗');
      if (onSuccess) onSuccess(result);
    })
    .catch(function(err) {
      if (onError) onError(err.message); else alert('錯誤：' + err.message);
    });
  }

  // =============================================
  //  State
  // =============================================
  var allPhotos       = [];
  var filteredPhotos  = [];
  var currentIndex    = 0;
  var selectMode      = false;
  var selectedIds     = {};
  var selectedCount   = 0;
  var currentFolderId = null;
  var pendingFiles    = [];

  window.onload = function() {
    loadFolders();
    loadAllPhotos();
    initLightbox();
    initUploadZone();
    initModals();
  };

  // =============================================
  //  Folders
  // =============================================
  function loadFolders() {
    api({ action: 'getFolders' }, function(res) {
      renderAlbumBar(res.folders);
      populateUploadTarget(res.folders);
    });
  }

  function renderAlbumBar(folders) {
    var bar = document.getElementById('albumBar');
    bar.innerHTML = '';
    for (var i = 0; i < folders.length; i++) {
      (function(f, idx) {
        var el = document.createElement('div');
        el.className  = 'album-tab' + (idx === 0 ? ' active' : '');
        el.textContent = f.name;
        el.onclick = function() { loadFolder(idx === 0 ? null : f.id, this); };
        bar.appendChild(el);
      })(folders[i], i);
    }
  }

  function populateUploadTarget(folders) {
    var sel = document.getElementById('uploadTarget');
    sel.innerHTML = '';
    for (var i = 0; i < folders.length; i++) {
      var opt = document.createElement('option');
      opt.value       = folders[i].id;
      opt.textContent = folders[i].name;
      sel.appendChild(opt);
    }
  }

  // =============================================
  //  Photos
  // =============================================
  function loadAllPhotos() {
    showLoading();
    currentFolderId = null;
    api({ action: 'getPhotos', folderId: '' }, handlePhotos, showError);
  }

  function loadFolder(folderId, tabEl) {
    var tabs = document.querySelectorAll('.album-tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    tabEl.classList.add('active');
    currentFolderId = folderId;
    showLoading();
    api({ action: 'getPhotos', folderId: folderId || '' }, handlePhotos, showError);
  }

  function handlePhotos(res) {
    allPhotos      = res.photos;
    filteredPhotos = allPhotos.slice();
    selectedIds    = {};
    selectedCount  = 0;
    updateSelectBar();
    document.getElementById('stats').textContent = res.total + ' 張';
    renderGallery(filteredPhotos);
  }

  // =============================================
  //  Gallery
  // =============================================
  function renderGallery(photos) {
    var gallery = document.getElementById('gallery');
    if (!photos.length) {
      gallery.innerHTML = '<div class="empty-state"><div class="empty-icon">?</div><h3>這裡還沒有相片</h3><p>請點上方「上傳相片」按鈕</p></div>';
      return;
    }
    var grid = document.createElement('div');
    grid.className = 'photo-grid' + (selectMode ? ' select-mode' : '');
    for (var i = 0; i < photos.length; i++) {
      (function(photo, idx) {
        var card = document.createElement('div');
        card.className = 'photo-card' + (selectedIds[photo.id] ? ' selected' : '');
        card.innerHTML =
          '<div class="card-check"></div>' +
          '<div class="img-wrap"><img src="' + photo.thumbnail + '" alt="photo" loading="lazy" onerror="this.src=\'https://placehold.co/300x300/f2ede8/d63031?text=X\'"></div>' +
          '<div class="card-info"><div class="card-name">' + escHtml(photo.name) + '</div><div class="card-date">' + photo.date + '</div></div>';
        card.addEventListener('click', function() {
          if (selectMode) toggleSelect(photo.id, card);
          else openLightbox(idx);
        });
        grid.appendChild(card);
      })(photos[i], i);
    }
    gallery.innerHTML = '';
    gallery.appendChild(grid);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // =============================================
  //  Select Mode
  // =============================================
  function toggleSelectMode() {
    selectMode = !selectMode;
    document.getElementById('selIcon').textContent  = selectMode ? 'X' : '☑';
    document.getElementById('selLabel').textContent = selectMode ? '結束選取' : '選取下載';
    if (!selectMode) { selectedIds = {}; selectedCount = 0; }
    updateSelectBar();
    renderGallery(filteredPhotos);
  }

  function toggleSelect(id, card) {
    if (selectedIds[id]) {
      delete selectedIds[id]; selectedCount--;
      card.classList.remove('selected');
    } else {
      selectedIds[id] = true; selectedCount++;
      card.classList.add('selected');
    }
    updateSelectBar();
  }

  function selectAll() {
    for (var i = 0; i < filteredPhotos.length; i++) selectedIds[filteredPhotos[i].id] = true;
    selectedCount = filteredPhotos.length;
    renderGallery(filteredPhotos);
    updateSelectBar();
  }

  function clearSelection() {
    selectedIds = {}; selectedCount = 0;
    renderGallery(filteredPhotos);
    updateSelectBar();
  }

  function updateSelectBar() {
    var bar = document.getElementById('selectBar');
    if (selectMode) bar.classList.add('show'); else bar.classList.remove('show');
    document.getElementById('selCount').textContent = '已選 ' + selectedCount + ' 張相片';
  }

  // =============================================
  //  Lightbox
  // =============================================
  function initLightbox() {
    document.getElementById('lbCloseBtn').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', function() { lbNavigate(-1); });
    document.getElementById('lbNext').addEventListener('click', function() { lbNavigate(1); });
    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'ArrowLeft')  lbNavigate(-1);
      if (e.key === 'ArrowRight') lbNavigate(1);
      if (e.key === 'Escape')     closeLightbox();
    });
    var tx = 0, ty = 0, lb = document.getElementById('lightbox');
    lb.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive:true });
    lb.addEventListener('touchend',   function(e) {
      var dx = tx - e.changedTouches[0].clientX;
      var dy = ty - e.changedTouches[0].clientY;
      if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) lbNavigate(dx > 0 ? 1 : -1);
    });
  }

  function openLightbox(idx) {
    currentIndex = idx;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    buildThumbs();
    loadLbImage(idx);
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    var img = document.getElementById('lbImg');
    img.src = ''; img.classList.remove('loaded');
  }

  function lbNavigate(dir) {
    currentIndex = (currentIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    loadLbImage(currentIndex);
    var ts = document.querySelectorAll('.lb-thumb');
    for (var i = 0; i < ts.length; i++) {
      if (i === currentIndex) ts[i].classList.add('active');
      else ts[i].classList.remove('active');
    }
    var at = document.querySelector('.lb-thumb.active');
    if (at) at.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }

  function loadLbImage(idx) {
    var p   = filteredPhotos[idx];
    var img = document.getElementById('lbImg');
    var sp  = document.getElementById('lbSpinner');
    document.getElementById('lbCounter').textContent = (idx + 1) + ' / ' + filteredPhotos.length;
    document.getElementById('lbName').textContent    = p.name;
    document.getElementById('lbMeta').textContent    = p.date + '  ' + p.size;
    img.classList.remove('loaded'); img.src = ''; sp.classList.remove('hide');
    api({ action: 'getImageBase64', fileId: p.id },
      function(res) {
        sp.classList.add('hide');
        img.onload = function() { img.classList.add('loaded'); };
        img.src = res.dataUrl;
      },
      function() {
        sp.classList.add('hide');
        img.src = 'https://placehold.co/600x600/f2ede8/d63031?text=X';
        img.classList.add('loaded');
      }
    );
  }

  function buildThumbs() {
    var wrap = document.getElementById('lbThumbs');
    wrap.innerHTML = '';
    for (var i = 0; i < filteredPhotos.length; i++) {
      (function(ph, idx) {
        var d = document.createElement('div');
        d.className = 'lb-thumb' + (idx === currentIndex ? ' active' : '');
        d.innerHTML = '<img src="' + ph.thumbnail + '" loading="lazy">';
        d.addEventListener('click', (function(i2) {
          return function(e) {
            e.stopPropagation();
            currentIndex = i2;
            loadLbImage(i2);
            var ts = document.querySelectorAll('.lb-thumb');
            for (var j = 0; j < ts.length; j++) {
              if (j === i2) ts[j].classList.add('active');
              else ts[j].classList.remove('active');
            }
            d.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
          };
        })(idx));
        wrap.appendChild(d);
      })(filteredPhotos[i], i);
    }
  }

  function downloadCurrentPhoto() { downloadByIndex(currentIndex); }

  // =============================================
  //  Download
  // =============================================
  function downloadByIndex(idx) {
    var photo = filteredPhotos[idx];
    showProgress('下載中...', 30, photo.name);
    api({ action: 'getBatchBase64', ids: JSON.stringify([photo.id]) },
      function(res) {
        hideProgress();
        triggerDownload(res.files[0].base64, res.files[0].mimeType, res.files[0].name);
      },
      function(err) { hideProgress(); alert('下載失敗：' + err); }
    );
  }

  function batchDownload() {
    var ids = Object.keys(selectedIds);
    if (!ids.length) { alert('請先選取相片'); return; }
    var total = ids.length, done = 0, CHUNK = 5;
    showProgress('下載中...', 0, '共 ' + total + ' 張');
    function doChunk(start) {
      if (start >= total) { hideProgress(); return; }
      api({ action: 'getBatchBase64', ids: JSON.stringify(ids.slice(start, start + CHUNK)) },
        function(res) {
          for (var i = 0; i < res.files.length; i++) {
            triggerDownload(res.files[i].base64, res.files[i].mimeType, res.files[i].name);
          }
          done += res.files.length;
          showProgress('下載中...', Math.round(done / total * 100), done + ' / ' + total + ' 張');
          doChunk(start + CHUNK);
        },
        function(err) { hideProgress(); alert('下載失敗：' + err); }
      );
    }
    doChunk(0);
  }

  function downloadAlbum() {
    showProgress('打包相簿...', 10, '壓縮中，請稍候...');
    api({ action: 'downloadAlbumZip', folderId: currentFolderId || '' },
      function(res) { hideProgress(); triggerDownload(res.base64, res.mimeType, res.name); },
      function(err) { hideProgress(); alert('失敗：' + err); }
    );
  }

  function triggerDownload(base64, mimeType, filename) {
    var bytes = atob(base64), arr = new Uint8Array(bytes.length);
    for (var i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    var url = URL.createObjectURL(new Blob([arr], { type: mimeType }));
    var a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 3000);
  }

  // =============================================
  //  Create Album
  // =============================================
  function openCreateAlbumModal() { openModal('createAlbumModal'); }

  function createAlbum() {
    var name = document.getElementById('albumName').value.trim();
    var desc = document.getElementById('albumDesc').value.trim();
    if (!name) { alert('請輸入相簿名稱'); return; }
    showProgress('建立中...', 50, name);
    api({ action: 'createAlbum', name: name, description: desc },
      function(res) {
        hideProgress();
        closeModal('createAlbumModal');
        document.getElementById('albumName').value = '';
        document.getElementById('albumDesc').value = '';
        loadFolders();
        alert('相簿「' + res.folder.name + '」建立成功！');
      },
      function(err) { hideProgress(); alert('建立失敗：' + err); }
    );
  }

  // =============================================
  //  Upload Zone
  // =============================================
  function initUploadZone() {
    var zone  = document.getElementById('uploadZone');
    var input = document.getElementById('fileInput');
    zone.addEventListener('click', function() { input.click(); });
    input.addEventListener('change', function(e) { addFiles(e.target.files); });
    zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function()  { zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); zone.classList.remove('drag-over'); addFiles(e.dataTransfer.files);
    });
  }

  function addFiles(fileList) {
    for (var i = 0; i < fileList.length; i++) {
      var f = fileList[i];
      if (!f.type.startsWith('image/')) continue;
      var dup = false;
      for (var j = 0; j < pendingFiles.length; j++) {
        if (pendingFiles[j].name === f.name && pendingFiles[j].size === f.size) { dup = true; break; }
      }
      if (!dup) pendingFiles.push(f);
    }
    renderUploadPreview();
    document.getElementById('doUploadBtn').disabled = pendingFiles.length === 0;
  }

  function renderUploadPreview() {
    var wrap = document.getElementById('uploadPreview');
    wrap.innerHTML = '';
    for (var i = 0; i < pendingFiles.length; i++) {
      (function(f, idx) {
        var url  = URL.createObjectURL(f);
        var item = document.createElement('div');
        item.className = 'prev-item';
        item.innerHTML = '<img src="' + url + '"><button class="rm">X</button>';
        item.querySelector('.rm').addEventListener('click', function() {
          pendingFiles.splice(idx, 1);
          renderUploadPreview();
          document.getElementById('doUploadBtn').disabled = pendingFiles.length === 0;
        });
        wrap.appendChild(item);
      })(pendingFiles[i], i);
    }
  }

  function openUploadModal() {
    pendingFiles = [];
    renderUploadPreview();
    document.getElementById('doUploadBtn').disabled = true;
    document.getElementById('fileInput').value = '';
    openModal('uploadModal');
  }

  // =============================================
  //  ★ 上傳：改用 fetch POST（修正網路錯誤）
  // =============================================
  function doUpload() {
    if (!pendingFiles.length) return;
    var folderId = document.getElementById('uploadTarget').value;
    var total = pendingFiles.length, done = 0;
    showProgress('上傳中...', 0, '共 ' + total + ' 張');
    closeModal('uploadModal');

    function uploadNext(idx) {
      if (idx >= total) {
        hideProgress();
        pendingFiles = [];
        var at = document.querySelector('.album-tab.active');
        if (at) at.click(); else loadAllPhotos();
        return;
      }
      var file   = pendingFiles[idx];
      var reader = new FileReader();
      reader.onload = function(e) {
        var base64 = e.target.result.split(',')[1];
        apiPost(
          {
            action: 'uploadPhoto',
            data: {
              name:     file.name,
              mimeType: file.type,
              base64:   base64,
              folderId: folderId
            }
          },
          function() {
            done++;
            showProgress('上傳中...', Math.round(done / total * 100), done + ' / ' + total + ' 張');
            uploadNext(idx + 1);
          },
          function(err) {
            hideProgress();
            alert('上傳失敗：' + err);
          }
        );
      };
      reader.readAsDataURL(file);
    }
    uploadNext(0);
  }

  // =============================================
  //  Modal / Progress
  // =============================================
  function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }

  function initModals() {
    var backs = document.querySelectorAll('.modal-back');
    for (var i = 0; i < backs.length; i++) {
      (function(el) {
        el.addEventListener('click', function(e) { if (e.target === el) closeModal(el.id); });
      })(backs[i]);
    }
  }

  function showProgress(title, pct, text) {
    document.getElementById('progressTitle').textContent = title;
    document.getElementById('progressFill').style.width  = pct + '%';
    document.getElementById('progressText').textContent  = text;
    document.getElementById('progressModal').classList.add('open');
  }

  function hideProgress() {
    setTimeout(function() {
      document.getElementById('progressModal').classList.remove('open');
    }, 700);
  }

  function showLoading() {
    document.getElementById('gallery').innerHTML =
      '<div class="loading"><div class="spinner"></div><p>正在載入相片...</p></div>';
  }

  function showError(err) {
    document.getElementById('gallery').innerHTML =
      '<div class="empty-state"><div class="empty-icon">!</div><h3>載入失敗</h3><p>' + err + '</p></div>';
  }
</script>
</body>
