<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>帕金森病友權益促進會 — 家庭相簿</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌷</text></svg>">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --red:#c0392b; --red2:#e74c3c; --green:#27ae60; --blue:#2980b9;
      --orange:#e67e22; --purple:#8e44ad; --teal:#16a085;
      --bg:#f0f4f8; --card:#fff; --text:#2c3e50; --sub:#7f8c8d;
      --border:#dce1e7; --radius:14px; --shadow:0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:linear-gradient(135deg,var(--red) 0%,var(--red2) 100%); padding:0 20px; height:64px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(192,57,43,0.4); }
    .hd-left { display:flex; align-items:center; gap:12px; }
    .hd-logo { width:38px; height:38px; background:rgba(255,255,255,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.3rem; }
    .hd-title h1 { font-size:1.1rem; font-weight:900; color:#fff; line-height:1.2; }
    .hd-title p  { font-size:0.75rem; color:rgba(255,255,255,0.85); }
    .hd-right { display:flex; gap:8px; }
    .hd-btn { padding:8px 16px; border-radius:8px; border:2px solid rgba(255,255,255,0.5); background:rgba(255,255,255,0.15); color:#fff; font-size:0.9rem; font-weight:700; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .hd-btn:hover { background:rgba(255,255,255,0.3); }
    .hd-btn.primary { background:#fff; color:var(--red); border-color:#fff; }
    .layout { display:flex; min-height:calc(100vh - 64px); }
    .sidebar { width:240px; flex-shrink:0; background:#fff; border-right:1px solid var(--border); padding:16px 0; position:sticky; top:64px; height:calc(100vh - 64px); overflow-y:auto; }
    .main { flex:1; padding:20px; min-width:0; }
    .sidebar-title { padding:8px 18px 6px; font-size:0.75rem; font-weight:800; color:var(--sub); text-transform:uppercase; letter-spacing:1px; display:flex; align-items:center; justify-content:space-between; }
    .album-item { display:flex; align-items:center; gap:10px; padding:10px 18px; cursor:pointer; transition:all 0.15s; border-left:3px solid transparent; }
    .album-item:hover { background:#fef9f9; }
    .album-item.active { background:#fef2f2; border-left-color:var(--red); }
    .album-icon { width:36px; height:36px; border-radius:10px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; overflow:hidden; }
    .album-icon img { width:100%; height:100%; object-fit:cover; }
    .album-info { flex:1; min-width:0; }
    .album-name { font-size:0.9rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .album-count { font-size:0.75rem; color:var(--sub); margin-top:1px; }
    .album-item.active .album-name { color:var(--red); }
    .add-album-btn { width:28px; height:28px; border-radius:8px; border:none; background:var(--red); color:#fff; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .toolbar { display:flex; gap:10px; margin-bottom:18px; flex-wrap:wrap; align-items:center; }
    .album-header-info { flex:1; }
    .album-header-info h2 { font-size:1.2rem; font-weight:900; }
    .album-header-info p  { font-size:0.85rem; color:var(--sub); margin-top:2px; }
    .tb-btn { padding:10px 18px; border-radius:10px; border:none; font-size:0.9rem; font-weight:800; cursor:pointer; display:flex; align-items:center; gap:6px; font-family:inherit; white-space:nowrap; transition:all 0.2s; }
    .tb-btn:active { transform:scale(0.97); }
    .tb-btn.upload   { background:var(--red);   color:#fff; }
    .tb-btn.download { background:var(--green); color:#fff; }
    .tb-btn.view-toggle { background:#fff; color:var(--text); border:2px solid var(--border); }
    .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:14px; }
    .photo-grid.list-view { grid-template-columns:1fr; }
    .photo-card { background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; position:relative; }
    .photo-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.12); }
    .photo-card .thumb-wrap { position:relative; padding-top:75%; overflow:hidden; background:#f0f0f0; }
    .photo-grid.list-view .photo-card .thumb-wrap { padding-top:0; height:80px; }
    .photo-card .thumb { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:transform 0.3s; }
    .photo-card:hover .thumb { transform:scale(1.05); }
    .photo-card .thumb-placeholder { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2rem; color:#ccc; }
    .photo-card .photo-info { padding:10px 12px; }
    .photo-card .photo-name { font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .photo-card .photo-meta { font-size:0.75rem; color:var(--sub); margin-top:3px; display:flex; justify-content:space-between; }
    .photo-card .photo-actions { position:absolute; top:8px; right:8px; display:flex; gap:4px; opacity:0; transition:opacity 0.2s; }
    .photo-card:hover .photo-actions { opacity:1; }
    .photo-action-btn { width:28px; height:28px; border-radius:8px; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.8rem; backdrop-filter:blur(4px); }
    .photo-action-btn.view-btn { background:rgba(255,255,255,0.9); color:var(--blue); }
    .photo-action-btn.del-btn  { background:rgba(255,255,255,0.9); color:var(--red); }
    .select-overlay { position:absolute; top:8px; left:8px; }
    .photo-checkbox { width:20px; height:20px; cursor:pointer; accent-color:var(--red); }
    .center-msg { text-align:center; padding:80px 20px; }
    .center-msg .icon { font-size:4rem; margin-bottom:16px; }
    .center-msg h3 { font-size:1.1rem; color:var(--sub); margin-bottom:8px; }
    .center-msg p  { font-size:0.9rem; color:#aaa; }
    .spinner { width:48px; height:48px; border:4px solid #eee; border-top-color:var(--red); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    .lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:2000; align-items:center; justify-content:center; }
    .lightbox.open { display:flex; }
    .lb-img-wrap { position:relative; max-width:90vw; max-height:85vh; display:flex; align-items:center; justify-content:center; }
    .lb-img { max-width:90vw; max-height:85vh; object-fit:contain; border-radius:8px; animation:fadeIn 0.3s; }
    .lb-close { position:fixed; top:20px; right:20px; width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15); border:none; color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .lb-prev, .lb-next { position:fixed; top:50%; transform:translateY(-50%); width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.15); border:none; color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
    .lb-prev { left:16px; } .lb-next { right:16px; }
    .lb-prev:hover, .lb-next:hover { background:rgba(255,255,255,0.3); }
    .lb-info { position:fixed; bottom:0; left:0; right:0; background:linear-gradient(transparent,rgba(0,0,0,0.7)); padding:20px; color:#fff; text-align:center; }
    .lb-info h3 { font-size:1rem; font-weight:700; }
    .lb-info p  { font-size:0.85rem; opacity:0.7; margin-top:4px; }
    .lb-loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
    .lb-spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; }
    .modal-back { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:16px; }
    .modal-back.open { display:flex; }
    .modal-box { background:#fff; border-radius:20px; width:100%; max-width:500px; animation:scaleIn 0.25s ease; overflow:hidden; }
    .modal-head { padding:20px 24px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-head h2 { font-size:1.15rem; font-weight:900; }
    .modal-close { width:36px; height:36px; border-radius:50%; border:none; background:#f0f0f0; cursor:pointer; font-size:1.1rem; }
    .modal-body { padding:20px 24px; }
    .modal-foot { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
    .upload-area { border:2px dashed var(--border); border-radius:12px; padding:32px; text-align:center; cursor:pointer; transition:all 0.2s; }
    .upload-area:hover, .upload-area.drag-over { border-color:var(--red); background:#fef2f2; }
    .upload-area .upload-icon { font-size:2.5rem; margin-bottom:10px; }
    .upload-area p { font-size:0.9rem; color:var(--sub); }
    .upload-area strong { color:var(--red); }
    .upload-preview { display:grid; grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); gap:8px; margin-top:14px; }
    .preview-item { position:relative; padding-top:100%; border-radius:8px; overflow:hidden; background:#f0f0f0; }
    .preview-item img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
    .preview-item .rm-btn { position:absolute; top:3px; right:3px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,0.6); border:none; color:#fff; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .progress-bar { height:8px; background:#eee; border-radius:4px; margin-top:12px; overflow:hidden; display:none; }
    .progress-fill { height:100%; background:var(--red); border-radius:4px; transition:width 0.3s; }
    .upload-status-box { margin-top:10px; font-size:0.85rem; color:var(--sub); text-align:center; min-height:20px; }
    .field { display:flex; flex-direction:column; gap:5px; margin-bottom:14px; }
    .field label { font-size:0.85rem; font-weight:700; color:var(--sub); }
    .field input, .field textarea, .field select { padding:10px 12px; border:2px solid var(--border); border-radius:10px; font-size:0.95rem; font-family:inherit; outline:none; transition:border-color 0.2s; background:#fafafa; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:var(--red); background:#fff; }
    .field textarea { resize:vertical; min-height:80px; }
    .btn { padding:11px 24px; border-radius:10px; border:none; font-size:0.95rem; font-weight:800; cursor:pointer; font-family:inherit; transition:all 0.2s; }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--red);   color:#fff; }
    .btn.success { background:var(--green); color:#fff; }
    .btn.cancel  { background:#f0f0f0;      color:var(--sub); }
    .btn:disabled { opacity:0.4; cursor:not-allowed; }
    .confirm-box { background:#fff; border-radius:18px; padding:28px 24px; width:100%; max-width:360px; text-align:center; animation:scaleIn 0.25s ease; }
    .confirm-icon { font-size:3rem; margin-bottom:12px; }
    .confirm-box h3 { font-size:1.15rem; font-weight:900; margin-bottom:8px; }
    .confirm-box p  { font-size:0.9rem; color:var(--sub); margin-bottom:20px; }
    .confirm-btns { display:flex; gap:10px; justify-content:center; }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#2c3e50; color:#fff; padding:12px 24px; border-radius:50px; font-size:0.95rem; font-weight:700; z-index:9999; transition:transform 0.3s; box-shadow:0 4px 20px rgba(0,0,0,0.2); white-space:nowrap; pointer-events:none; }
    #toast.show    { transform:translateX(-50%) translateY(0); }
    #toast.success { background:var(--green); }
    #toast.error   { background:var(--red2); }
    .batch-bar { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#2c3e50; color:#fff; padding:12px 20px; border-radius:50px; display:none; align-items:center; gap:12px; z-index:500; box-shadow:0 4px 20px rgba(0,0,0,0.2); white-space:nowrap; }
    .batch-bar.show { display:flex; }
    .batch-bar-btn { padding:7px 16px; border-radius:50px; border:none; font-size:0.85rem; font-weight:800; cursor:pointer; font-family:inherit; }
    .batch-bar-btn.dl     { background:var(--green); color:#fff; }
    .batch-bar-btn.cancel { background:rgba(255,255,255,0.15); color:#fff; }
    @media (max-width:768px) {
      .sidebar { display:none; }
      .photo-grid { grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); }
    }
    @keyframes spin    { to { transform:rotate(360deg); } }
    @keyframes scaleIn { from { transform:scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  </style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="hd-logo">🌷</div>
    <div class="hd-title">
      <h1>帕金森病友權益促進會</h1>
      <p>家庭相簿系統</p>
    </div>
  </div>
  <div class="hd-right">
    <button class="hd-btn" onclick="location.href='member.html'">👥 會員管理</button>
    <button class="hd-btn primary" onclick="openUploadModal()">＋ 上傳相片</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">
      相簿列表
      <button class="add-album-btn" title="新增相簿" onclick="openNewAlbumModal()">＋</button>
    </div>
    <div id="albumList">
      <div style="padding:20px;text-align:center;"><div class="spinner" style="width:28px;height:28px;border-width:3px;"></div></div>
    </div>
  </aside>

  <main class="main">
    <div class="toolbar">
      <div class="album-header-info">
        <h2 id="currentAlbumName">載入中...</h2>
        <p  id="currentAlbumDesc">請稍候</p>
      </div>
      <button class="tb-btn view-toggle" id="viewToggleBtn" onclick="toggleView()">☰ 列表</button>
      <button class="tb-btn download" onclick="downloadCurrentAlbum()">↓ 下載相簿</button>
      <button class="tb-btn upload"   onclick="openUploadModal()">＋ 上傳</button>
    </div>
    <div id="photoGrid" class="photo-grid">
      <div class="center-msg"><div class="spinner"></div><p>載入相片中...</p></div>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-prev"  onclick="lbNav(-1)">‹</button>
  <div class="lb-img-wrap">
    <div class="lb-loading" id="lbLoading"><div class="lb-spinner"></div></div>
    <img id="lbImg" class="lb-img" src="" alt="" style="display:none;" onload="lbImgLoaded()">
  </div>
  <button class="lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-info">
    <h3 id="lbName"></h3>
    <p  id="lbMeta"></p>
  </div>
</div>

<!-- 上傳 Modal -->
<div class="modal-back" id="uploadModal">
  <div class="modal-box" style="max-width:560px;">
    <div class="modal-head">
      <h2>📷 上傳相片</h2>
      <button class="modal-close" onclick="closeModal('uploadModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>上傳至相簿</label>
        <select id="uploadTarget"></select>
      </div>
      <div class="upload-area" id="uploadArea"
           onclick="document.getElementById('fileInput').click()"
           ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFiles(event)">
        <div class="upload-icon">📷</div>
        <p><strong>點擊選擇</strong>或拖曳相片到這裡</p>
        <p style="font-size:0.8rem;margin-top:6px;">支援 JPG、PNG、GIF、WebP，每次最多 10 張</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" onchange="filesSelected(this.files)">
      <div class="upload-preview" id="uploadPreview"></div>
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="upload-status-box" id="uploadStatus"></div>
    </div>
    <div class="modal-foot">
      <button class="btn cancel"  onclick="closeModal('uploadModal')">取消</button>
      <button class="btn primary" id="uploadBtn" onclick="startUpload()">開始上傳</button>
    </div>
  </div>
</div>

<!-- 新增相簿 Modal -->
<div class="modal-back" id="newAlbumModal">
  <div class="modal-box">
    <div class="modal-head">
      <h2>新增相簿</h2>
      <button class="modal-close" onclick="closeModal('newAlbumModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>相簿名稱 *</label>
        <input type="text" id="newAlbumName" placeholder="例：2025 春節家庭聚會">
      </div>
      <div class="field">
        <label>相簿說明</label>
        <textarea id="newAlbumDesc" placeholder="相簿描述（選填）"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn cancel"  onclick="closeModal('newAlbumModal')">取消</button>
      <button class="btn primary" id="createAlbumBtn" onclick="createAlbum()">建立相簿</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-back" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">⚠️</div>
    <h3 id="confirmTitle">確認操作</h3>
    <p  id="confirmMsg">確定要執行此操作嗎？</p>
    <div class="confirm-btns">
      <button class="btn cancel"  onclick="closeModal('confirmModal')">取消</button>
      <button class="btn primary" id="confirmOkBtn">確定</button>
    </div>
  </div>
</div>

<!-- Batch Bar -->
<div class="batch-bar" id="batchBar">
  <span id="batchCount">已選 0 張</span>
  <button class="batch-bar-btn dl"     onclick="batchDownload()">↓ 下載</button>
  <button class="batch-bar-btn cancel" onclick="clearSelection()">取消選取</button>
</div>

<div id="toast"></div>

<script>
  // ★ Apps Script 部署網址
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxO2UUhh_gff-sPy9BGzTMm1rLLCTxoWC8jkjEYxHk8So32K0TB-2z2iYWab2n4Fkox/exec';

  // ════════════════════════════════════════
  //  JSONP 通用請求
  // ════════════════════════════════════════
  var _cbIdx = 0;
  function api(params, onSuccess, onError) {
    var cbName = '_cb' + (++_cbIdx);
    var timer;
    window[cbName] = function(res) {
      clearTimeout(timer);
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      if (res && res.success) { if (onSuccess) onSuccess(res); }
      else {
        var msg = (res && res.error) ? res.error : '未知錯誤';
        if (onError) onError(msg); else showToast(msg, 'error');
      }
    };
    timer = setTimeout(function() {
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      var errMsg = '請求逾時（圖片可能太大，請選較小的圖片）';
      if (onError) onError(errMsg); else showToast(errMsg, 'error');
    }, 60000); // ★ 延長至 60 秒
    params.callback = cbName;
    var parts = [];
    for (var k in params) {
      if (!params.hasOwnProperty(k)) continue;
      parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(params[k]));
    }
    var s = document.createElement('script');
    s.id  = cbName;
    s.src = SCRIPT_URL + '?' + parts.join('&');
    s.onerror = function() {
      clearTimeout(timer);
      var el = document.getElementById(cbName);
      if (el) el.parentNode.removeChild(el);
      delete window[cbName];
      if (onError) onError('網路錯誤'); else showToast('網路錯誤', 'error');
    };
    document.head.appendChild(s);
  }

  // ════════════════════════════════════════
  //  ★ 核心修正：圖片壓縮函式
  //    將圖片縮小並轉為 JPEG，確保 base64 不超過限制
  // ════════════════════════════════════════
  function compressImage(file, callback) {
    var MAX_PX  = 1280;   // 最長邊上限（px）
    var QUALITY = 0.82;   // JPEG 品質

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = new Image();
      img.onload = function() {
        var w = img.width, h = img.height;
        // 等比縮放
        if (w > MAX_PX || h > MAX_PX) {
          if (w >= h) { h = Math.round(h * MAX_PX / w); w = MAX_PX; }
          else        { w = Math.round(w * MAX_PX / h); h = MAX_PX; }
        }
        var canvas = document.createElement('canvas');
        canvas.width  = w;
        canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // 輸出壓縮後 base64（統一轉 JPEG）
        var dataUrl = canvas.toDataURL('image/jpeg', QUALITY);
        callback({
          base64:   dataUrl.split(',')[1],
          mimeType: 'image/jpeg',
          name:     file.name.replace(/\.[^.]+$/, '') + '.jpg'
        });
      };
      img.onerror = function() {
        // 壓縮失敗 → 直接用原始 base64
        var raw = e.target.result;
        callback({
          base64:   raw.split(',')[1],
          mimeType: file.type,
          name:     file.name
        });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ════════════════════════════════════════
  //  State
  // ════════════════════════════════════════
  var folders         = [];
  var currentFolderId = null;
  var currentPhotos   = [];
  var lbIndex         = 0;
  var isListView      = false;
  var selectedIds     = {};
  var uploadFiles     = [];

  // ════════════════════════════════════════
  //  Init
  // ════════════════════════════════════════
  window.onload = function() { loadFolders(); };

  // ════════════════════════════════════════
  //  相簿列表
  // ════════════════════════════════════════
  function loadFolders() {
    api({ action: 'getFolders' }, function(res) {
      folders = res.folders;
      renderAlbumList();
      if (folders.length > 0) selectAlbum(folders[0].id);
    }, function(err) {
      document.getElementById('albumList').innerHTML =
        '<p style="padding:16px;color:var(--sub);font-size:0.85rem;">載入失敗：' + esc(err) + '</p>';
    });
  }

  function renderAlbumList() {
    var html = '';
    folders.forEach(function(f) {
      var active = (f.id === currentFolderId) ? ' active' : '';
      html += '<div class="album-item' + active + '" onclick="selectAlbum(\'' + f.id + '\')" id="album-' + f.id + '">' +
        '<div class="album-icon">📁</div>' +
        '<div class="album-info">' +
          '<div class="album-name">' + esc(f.name) + '</div>' +
          '<div class="album-count">' + (f.count || 0) + ' 張相片</div>' +
        '</div></div>';
    });
    document.getElementById('albumList').innerHTML =
      html || '<p style="padding:16px;color:var(--sub);font-size:0.85rem;">尚無相簿</p>';
  }

  function selectAlbum(folderId) {
    currentFolderId = folderId;
    selectedIds = {};
    updateBatchBar();
    document.querySelectorAll('.album-item').forEach(function(el) { el.classList.remove('active'); });
    var el = document.getElementById('album-' + folderId);
    if (el) el.classList.add('active');
    var folder = folders.find(function(f) { return f.id === folderId; });
    document.getElementById('currentAlbumName').textContent = folder ? folder.name : '相片';
    document.getElementById('currentAlbumDesc').textContent = folder ? (folder.desc || (folder.count + ' 張相片')) : '';
    loadPhotos(folderId);
  }

  // ════════════════════════════════════════
  //  相片列表
  // ════════════════════════════════════════
  function loadPhotos(folderId) {
    document.getElementById('photoGrid').innerHTML =
      '<div class="center-msg"><div class="spinner"></div><p>載入相片中...</p></div>';
    api({ action: 'getPhotos', folderId: folderId }, function(res) {
      currentPhotos = res.photos;
      renderPhotos();
    }, function(err) {
      document.getElementById('photoGrid').innerHTML =
        '<div class="center-msg"><div class="icon">⚠️</div><h3>' + esc(err) + '</h3></div>';
    });
  }

  function renderPhotos() {
    if (!currentPhotos.length) {
      document.getElementById('photoGrid').innerHTML =
        '<div class="center-msg"><div class="icon">📷</div><h3>此相簿還沒有相片</h3><p>點擊右上角「上傳」新增相片</p></div>';
      return;
    }
    var grid = document.getElementById('photoGrid');
    grid.className = 'photo-grid' + (isListView ? ' list-view' : '');
    var html = '';
    currentPhotos.forEach(function(p, idx) {
      var checked = selectedIds[p.id] ? 'checked' : '';
      html += '<div class="photo-card" id="card-' + p.id + '">' +
        '<div class="thumb-wrap">' +
          '<img class="thumb" src="' + p.thumbnail + '" alt="' + esc(p.name) + '" loading="lazy"' +
            ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
          '<div class="thumb-placeholder" style="display:none;">🖼️</div>' +
          '<div class="photo-actions">' +
            '<button class="photo-action-btn view-btn" onclick="openLightbox(' + idx + ');event.stopPropagation();">🔍</button>' +
            '<button class="photo-action-btn del-btn"  onclick="confirmDeletePhoto(\'' + p.id + '\',\'' + esc(p.name) + '\');event.stopPropagation();">🗑</button>' +
          '</div>' +
          '<div class="select-overlay">' +
            '<input type="checkbox" class="photo-checkbox" ' + checked + ' onclick="toggleSelect(\'' + p.id + '\',event)">' +
          '</div>' +
        '</div>' +
        '<div class="photo-info">' +
          '<div class="photo-name">' + esc(p.name) + '</div>' +
          '<div class="photo-meta"><span>' + esc(p.date) + '</span><span>' + esc(p.size) + '</span></div>' +
        '</div></div>';
    });
    grid.innerHTML = html;
    currentPhotos.forEach(function(p, idx) {
      var card = document.getElementById('card-' + p.id);
      if (card) {
        card.addEventListener('click', function(e) {
          if (e.target.type === 'checkbox' || e.target.classList.contains('photo-action-btn')) return;
          openLightbox(idx);
        });
      }
    });
  }

  // ════════════════════════════════════════
  //  View Toggle
  // ════════════════════════════════════════
  function toggleView() {
    isListView = !isListView;
    document.getElementById('viewToggleBtn').textContent = isListView ? '⊞ 格狀' : '☰ 列表';
    renderPhotos();
  }

  // ════════════════════════════════════════
  //  Lightbox
  // ════════════════════════════════════════
  function openLightbox(idx) {
    lbIndex = idx;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
    loadLbPhoto();
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('lbImg').src = '';
    document.getElementById('lbImg').style.display = 'none';
    document.getElementById('lbLoading').style.display = 'flex';
  }
  function lbNav(dir) {
    lbIndex = (lbIndex + dir + currentPhotos.length) % currentPhotos.length;
    document.getElementById('lbImg').style.display = 'none';
    document.getElementById('lbLoading').style.display = 'flex';
    loadLbPhoto();
  }
  function loadLbPhoto() {
    var p = currentPhotos[lbIndex];
    if (!p) return;
    document.getElementById('lbName').textContent = p.name;
    document.getElementById('lbMeta').textContent =
      p.date + '　' + p.size + '　(' + (lbIndex + 1) + ' / ' + currentPhotos.length + ')';
    var img = document.getElementById('lbImg');
    img.src = '';
    img.style.display = 'none';
    document.getElementById('lbLoading').style.display = 'flex';
    // 直接用 Google Drive thumbnail URL（避免 base64 請求過大）
    img.src = p.thumbnail.replace('w400', 'w1200');
    img.style.display = 'block';
    document.getElementById('lbLoading').style.display = 'none';
  }
  function lbImgLoaded() {
    document.getElementById('lbImg').style.display = 'block';
    document.getElementById('lbLoading').style.display = 'none';
  }
  document.addEventListener('keydown', function(e) {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape')     closeLightbox();
  });

  // ════════════════════════════════════════
  //  選取
  // ════════════════════════════════════════
  function toggleSelect(id, e) {
    e.stopPropagation();
    if (selectedIds[id]) delete selectedIds[id]; else selectedIds[id] = true;
    updateBatchBar();
  }
  function clearSelection() {
    selectedIds = {};
    updateBatchBar();
    document.querySelectorAll('.photo-checkbox').forEach(function(cb) { cb.checked = false; });
  }
  function updateBatchBar() {
    var count = Object.keys(selectedIds).length;
    var bar   = document.getElementById('batchBar');
    if (count > 0) {
      bar.classList.add('show');
      document.getElementById('batchCount').textContent = '已選 ' + count + ' 張';
    } else {
      bar.classList.remove('show');
    }
  }
  function batchDownload() {
    var ids = Object.keys(selectedIds);
    if (!ids.length) return;
    showToast('準備下載 ' + ids.length + ' 張相片...', '');
    api({ action: 'getBatchBase64', ids: JSON.stringify(ids) }, function(res) {
      res.files.forEach(function(f) {
        var a = document.createElement('a');
        a.href = 'data:' + f.mimeType + ';base64,' + f.base64;
        a.download = f.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      });
      showToast('已下載 ' + res.files.length + ' 張相片', 'success');
      clearSelection();
    });
  }

  // ════════════════════════════════════════
  //  下載整個相簿
  // ════════════════════════════════════════
  function downloadCurrentAlbum() {
    if (!currentFolderId) return;
    showToast('打包中，請稍候...', '');
    api({ action: 'downloadAlbumZip', folderId: currentFolderId }, function(res) {
      var a = document.createElement('a');
      a.href = 'data:' + res.mimeType + ';base64,' + res.base64;
      a.download = res.name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showToast('已下載 ' + res.count + ' 張相片', 'success');
    });
  }

  // ════════════════════════════════════════
  //  ★ 上傳相片（核心修正區）
  // ════════════════════════════════════════
  function openUploadModal() {
    uploadFiles = [];
    document.getElementById('uploadPreview').innerHTML = '';
    document.getElementById('uploadStatus').textContent = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('fileInput').value = '';
    var sel = document.getElementById('uploadTarget');
    sel.innerHTML = '';
    folders.forEach(function(f) {
      var opt = document.createElement('option');
      opt.value = f.id;
      opt.textContent = f.name;
      if (f.id === currentFolderId) opt.selected = true;
      sel.appendChild(opt);
    });
    openModal('uploadModal');
  }

  function dragOver(e)  { e.preventDefault(); document.getElementById('uploadArea').classList.add('drag-over'); }
  function dragLeave(e) { document.getElementById('uploadArea').classList.remove('drag-over'); }
  function dropFiles(e) {
    e.preventDefault();
    document.getElementById('uploadArea').classList.remove('drag-over');
    filesSelected(e.dataTransfer.files);
  }
  function filesSelected(files) {
    for (var i = 0; i < Math.min(files.length, 10); i++) {
      if (files[i].type.indexOf('image/') === 0) uploadFiles.push(files[i]);
    }
    renderUploadPreview();
  }
  function renderUploadPreview() {
    var html = '';
    uploadFiles.forEach(function(f, i) {
      var url = URL.createObjectURL(f);
      html += '<div class="preview-item">' +
        '<img src="' + url + '">' +
        '<button class="rm-btn" onclick="removeUploadFile(' + i + ')">✕</button>' +
      '</div>';
    });
    document.getElementById('uploadPreview').innerHTML = html;
  }
  function removeUploadFile(idx) {
    uploadFiles.splice(idx, 1);
    renderUploadPreview();
  }

  // ★ 修正後的上傳主函式：先壓縮再上傳
  function startUpload() {
    if (!uploadFiles.length) { showToast('請先選擇相片', 'error'); return; }
    var folderId = document.getElementById('uploadTarget').value;
    if (!folderId) { showToast('請選擇要上傳的相簿', 'error'); return; }

    var btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = '上傳中...';
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = '0%';

    var total = uploadFiles.length;
    var done  = 0;
    var failed = 0;

    function uploadNext(idx) {
      if (idx >= total) {
        // 全部完成
        btn.disabled = false;
        btn.textContent = '開始上傳';
        var msg = '成功上傳 ' + done + ' 張';
        if (failed > 0) msg += '，失敗 ' + failed + ' 張';
        showToast(msg, done > 0 ? 'success' : 'error');
        if (done > 0) {
          closeModal('uploadModal');
          loadPhotos(folderId);
          loadFolders();
        }
        return;
      }

      var file = uploadFiles[idx];
      var statusEl = document.getElementById('uploadStatus');
      statusEl.textContent = '壓縮中 ' + (idx + 1) + ' / ' + total + '：' + file.name;

      // ★ 先壓縮，再上傳
      compressImage(file, function(compressed) {
        statusEl.textContent = '上傳中 ' + (idx + 1) + ' / ' + total + '：' + compressed.name;

        api({
          action: 'uploadPhoto',
          data: JSON.stringify({
            folderId: folderId,
            name:     compressed.name,
            mimeType: compressed.mimeType,
            base64:   compressed.base64
          })
        }, function(res) {
          done++;
          var pct = Math.round((idx + 1) / total * 100);
          document.getElementById('progressFill').style.width = pct + '%';
          statusEl.textContent = '✅ 已完成 ' + done + ' / ' + total + ' 張';
          uploadNext(idx + 1);
        }, function(err) {
          failed++;
          statusEl.textContent = '⚠️ 第 ' + (idx + 1) + ' 張失敗：' + err;
          showToast('第 ' + (idx + 1) + ' 張上傳失敗：' + err, 'error');
          uploadNext(idx + 1);
        });
      });
    }

    uploadNext(0);
  }

  // ════════════════════════════════════════
  //  新增相簿
  // ════════════════════════════════════════
  function openNewAlbumModal() {
    document.getElementById('newAlbumName').value = '';
    document.getElementById('newAlbumDesc').value = '';
    openModal('newAlbumModal');
  }
  function createAlbum() {
    var name = document.getElementById('newAlbumName').value.trim();
    var desc = document.getElementById('newAlbumDesc').value.trim();
    if (!name) { showToast('請輸入相簿名稱', 'error'); return; }
    var btn = document.getElementById('createAlbumBtn');
    btn.disabled = true; btn.textContent = '建立中...';
    api({ action: 'createAlbum', name: name, description: desc }, function(res) {
      btn.disabled = false; btn.textContent = '建立相簿';
      closeModal('newAlbumModal');
      showToast('相簿「' + name + '」建立成功', 'success');
      loadFolders();
    }, function(err) {
      btn.disabled = false; btn.textContent = '建立相簿';
      showToast(err, 'error');
    });
  }

  // ════════════════════════════════════════
  //  刪除相片
  // ════════════════════════════════════════
  function confirmDeletePhoto(fileId, name) {
    document.getElementById('confirmIcon').textContent  = '🗑️';
    document.getElementById('confirmTitle').textContent = '刪除相片';
    document.getElementById('confirmMsg').textContent   = '確定要刪除「' + name + '」嗎？';
    document.getElementById('confirmOkBtn').className   = 'btn primary';
    document.getElementById('confirmOkBtn').textContent = '確定刪除';
    document.getElementById('confirmOkBtn').onclick = function() {
      closeModal('confirmModal');
      api({ action: 'deletePhoto', fileId: fileId }, function() {
        showToast('相片已刪除', 'success');
        currentPhotos = currentPhotos.filter(function(p) { return p.id !== fileId; });
        renderPhotos();
        loadFolders();
      });
    };
    openModal('confirmModal');
  }

  // ════════════════════════════════════════
  //  Modal / Toast / Esc
  // ════════════════════════════════════════
  function openModal(id)  { document.getElementById(id).classList.add('open');    document.body.style.overflow = 'hidden'; }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; }
  document.querySelectorAll('.modal-back').forEach(function(el) {
    el.addEventListener('click', function(e) { if (e.target === el) closeModal(el.id); });
  });

  var toastTimer;
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { t.className = ''; }, 3500);
  }

  function esc(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
