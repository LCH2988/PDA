<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📓 網路記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    :root {
      --primary: #4CAF50;
      --primary-dark: #388E3C;
      --primary-light: #C8E6C9;
      --bg: #F5F5F5;
      --card-bg: #FFFFFF;
      --text: #333333;
      --text-muted: #888888;
      --border: #E0E0E0;
      --danger: #F44336;
      --warning: #FF9800;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 12px;
      --transition: 0.2s ease;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* === Header === */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(76,175,80,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 1.15rem; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      object-fit: cover; cursor: pointer;
    }
    .user-name {
      font-size: 0.85rem; opacity: 0.9;
      max-width: 90px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .perm-badge {
      font-size: 0.68rem; padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.4);
    }

    /* === Container === */
    .container { max-width: 800px; margin: 0 auto; padding: 16px; }

    /* === Search === */
    .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-input {
      flex: 1; padding: 10px 16px;
      border: 2px solid var(--border);
      border-radius: 25px; font-size: 0.95rem;
      outline: none; background: var(--card-bg);
      transition: border-color var(--transition);
    }
    .search-input:focus { border-color: var(--primary); }

    /* === Buttons === */
    .btn {
      padding: 10px 18px; border: none;
      border-radius: 25px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer;
      transition: all var(--transition);
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-outline { background: var(--card-bg); color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary-light); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #D32F2F; }
    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg); }
    .btn-sm { padding: 6px 12px; font-size: 0.78rem; border-radius: 20px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* === Action Bar === */
    .action-bar {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px; gap: 8px;
    }
    .action-bar-left { display: flex; gap: 8px; flex-wrap: wrap; }

    /* === Note Cards === */
    .notes-list { display: flex; flex-direction: column; gap: 12px; }
    .note-card {
      background: var(--card-bg); border-radius: var(--radius);
      padding: 16px; box-shadow: var(--shadow);
      cursor: pointer; transition: all var(--transition);
      border-left: 4px solid transparent;
    }
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      border-left-color: var(--primary);
    }
    .note-card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 8px;
    }
    .note-title { font-size: 1rem; font-weight: 700; flex: 1; margin-right: 8px; }
    .note-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .note-summary {
      font-size: 0.87rem; color: var(--text-muted);
      line-height: 1.5; margin-bottom: 10px;
    }
    .note-footer {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 0.77rem; color: var(--text-muted);
      flex-wrap: wrap; gap: 6px;
    }
    .note-meta { display: flex; gap: 10px; align-items: center; }
    .note-stats { display: flex; gap: 8px; align-items: center; }
    .attachment-icons { display: flex; gap: 4px; flex-wrap: wrap; }
    .attachment-icon {
      font-size: 0.72rem; padding: 2px 6px;
      background: var(--primary-light); color: var(--primary-dark);
      border-radius: 4px;
    }

    /* === Empty State === */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; }
    .empty-desc { font-size: 0.88rem; }

    /* === Modal === */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 1000;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 800px;
      max-height: 92vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      padding: 24px;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 1.05rem; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--bg);
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-footer {
      display: flex; justify-content: flex-end;
      gap: 10px; margin-top: 20px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }

    /* === Forms === */
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 0.87rem; font-weight: 600; margin-bottom: 6px; }
    .form-input, .form-textarea, .form-select {
      width: 100%; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 8px;
      font-size: 0.93rem; outline: none;
      transition: border-color var(--transition);
      font-family: inherit; background: var(--card-bg); color: var(--text);
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--primary); }
    .form-textarea { resize: vertical; min-height: 140px; line-height: 1.6; }

    /* === File Upload === */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 28px; text-align: center;
      cursor: pointer; transition: all var(--transition);
      background: var(--bg);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--primary); background: var(--primary-light);
    }
    .upload-icon { font-size: 2rem; margin-bottom: 8px; }
    .upload-text { font-size: 0.88rem; color: var(--text-muted); }
    .upload-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--bg);
      border-radius: 8px; border: 1px solid var(--border);
    }
    .file-item-icon { font-size: 1.4rem; flex-shrink: 0; }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-name { font-size: 0.87rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item-size { font-size: 0.76rem; color: var(--text-muted); }
    .file-item-remove { background: none; border: none; cursor: pointer; color: var(--danger); font-size: 1rem; padding: 4px; }
    .upload-progress {
      height: 4px; background: var(--border);
      border-radius: 2px; margin-top: 6px; overflow: hidden;
    }
    .upload-progress-bar {
      height: 100%; background: var(--primary);
      border-radius: 2px; transition: width 0.3s ease;
    }

    /* === Detail View === */
    .detail-meta {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 0.82rem; color: var(--text-muted);
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .detail-content {
      font-size: 0.95rem; line-height: 1.8;
      white-space: pre-wrap; word-break: break-word;
      margin-bottom: 20px;
    }
    .attachments-section { margin-top: 20px; }
    .attachments-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; }
    .attachments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .attachment-card {
      border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; cursor: pointer;
      transition: all var(--transition); background: var(--bg);
    }
    .attachment-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .attachment-preview { width: 100%; height: 100px; object-fit: cover; display: block; }
    .attachment-preview-icon {
      width: 100%; height: 100px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; background: var(--primary-light);
    }
    .attachment-info { padding: 8px; }
    .attachment-name { font-size: 0.75rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .attachment-actions { display: flex; gap: 4px; margin-top: 6px; }

    /* === Viewers Modal === */
    .viewers-list { display: flex; flex-direction: column; gap: 10px; }
    .viewer-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px; background: var(--bg); border-radius: 8px;
    }
    .viewer-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--primary-light); display: flex;
      align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700; color: var(--primary-dark);
      flex-shrink: 0;
    }
    .viewer-name { font-size: 0.9rem; font-weight: 600; }
    .viewer-time { font-size: 0.78rem; color: var(--text-muted); }

    /* === Admin Panel === */
    .admin-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
    .admin-tab {
      padding: 8px 16px; border: none; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      background: var(--bg); color: var(--text-muted);
      transition: all var(--transition);
    }
    .admin-tab.active { background: var(--primary); color: white; }
    .admin-tab-content { display: none; }
    .admin-tab-content.active { display: block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--bg); border-radius: 10px;
      padding: 16px; text-align: center;
      border: 1px solid var(--border);
    }
    .stat-card-value { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
    .stat-card-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th {
      background: var(--primary); color: white;
      padding: 10px 12px; text-align: left; font-weight: 600;
    }
    .data-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .data-table tr:hover td { background: var(--bg); }
    .perm-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.82rem; }

    /* === Toast === */
    .toast-container { position: fixed; top: 70px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      padding: 12px 18px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      animation: slideIn 0.3s ease;
      max-width: 300px;
    }
    .toast-success { background: var(--primary); color: white; }
    .toast-error { background: var(--danger); color: white; }
    .toast-warning { background: var(--warning); color: white; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* === Loading === */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85); z-index: 9998;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--primary-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.9rem; color: var(--text-muted); }

    /* === Permission Denied === */
    .permission-denied {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; text-align: center; padding: 40px;
    }
    .permission-denied-icon { font-size: 4rem; margin-bottom: 16px; }
    .permission-denied-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; color: var(--danger); }
    .permission-denied-desc { font-size: 0.9rem; color: var(--text-muted); }

    /* === Responsive === */
    @media (max-width: 600px) {
      .container { padding: 12px; }
      .modal { padding: 18px; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .action-bar-left { justify-content: space-between; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .attachments-grid { grid-template-columns: repeat(2, 1fr); }
      .note-actions .btn-sm span { display: none; }
      .data-table { font-size: 0.78rem; }
      .data-table th, .data-table td { padding: 8px; }
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">載入中...</div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span style="font-size:1.4rem">📓</span>
      <span class="header-title">網路記事本</span>
    </div>
    <div class="header-right">
      <span class="perm-badge" id="permBadge">載入中</span>
      <span class="user-name" id="userName"></span>
      <img class="user-avatar" id="userAvatar" src="https://via.placeholder.com/36" alt="avatar"
           onclick="App.openAdmin()">
    </div>
  </header>

  <!-- Main Content -->
  <div class="container" id="mainContent" style="display:none">

    <!-- Search Bar -->
    <div class="search-bar">
      <input class="search-input" id="searchInput" type="text"
             placeholder="🔍 搜尋記事標題或內容..."
             oninput="App.onSearchInput(this.value)">
      <button class="btn btn-primary" onclick="App.search()">搜尋</button>
    </div>

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-bar-left">
        <button class="btn btn-primary" id="btnNewNote" onclick="App.openNewNote()" style="display:none">
          ＋ 新增記事
        </button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="App.loadNotes()">🔄 重新整理</button>
    </div>

    <!-- Notes List -->
    <div class="notes-list" id="notesList"></div>
  </div>

  <!-- Permission Denied -->
  <div class="permission-denied" id="permDenied" style="display:none">
    <div class="permission-denied-icon">🚫</div>
    <div class="permission-denied-title">無存取權限</div>
    <div class="permission-denied-desc">您的帳號尚未獲得存取授權，<br>請聯絡管理員開通權限。</div>
  </div>

  <!-- ==================== Modal: 新增/編輯記事 ==================== -->
  <div class="modal-overlay" id="noteModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="noteModalTitle">新增記事</span>
        <button class="modal-close" onclick="App.closeModal('noteModal')">✕</button>
      </div>
      <div class="form-group">
        <label class="form-label">標題 <span style="color:var(--danger)">*</span></label>
        <input class="form-input" id="noteTitle" type="text" placeholder="請輸入記事標題" maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">內容</label>
        <textarea class="form-textarea" id="noteContent" placeholder="請輸入記事內容..." style="min-height:180px"></textarea>
      </div>
      <!-- 附件上傳（僅 perm >= 4 顯示） -->
      <div class="form-group" id="uploadSection" style="display:none">
        <label class="form-label">附件上傳</label>
        <div class="upload-zone" id="uploadZone"
             onclick="document.getElementById('fileInput').click()"
             ondragover="App.onDragOver(event)"
             ondragleave="App.onDragLeave(event)"
             ondrop="App.onDrop(event)">
          <div class="upload-icon">📎</div>
          <div class="upload-text">點擊或拖曳檔案至此</div>
          <div class="upload-hint">支援 JPG/PNG/GIF/WebP/PDF/Word/Excel/MP4，單檔最大 10MB</div>
        </div>
        <input type="file" id="fileInput" style="display:none" multiple
               accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.mp4"
               onchange="App.onFileSelect(this.files)">
        <div class="file-list" id="fileList"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="App.closeModal('noteModal')">取消</button>
        <button class="btn btn-primary" id="btnSaveNote" onclick="App.saveNote()">💾 儲存</button>
      </div>
    </div>
  </div>

  <!-- ==================== Modal: 記事詳情 ==================== -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="detailTitle">記事詳情</span>
        <button class="modal-close" onclick="App.closeModal('detailModal')">✕</button>
      </div>
      <div class="detail-meta" id="detailMeta"></div>
      <div class="detail-content" id="detailContent"></div>
      <div class="attachments-section" id="attachmentsSection" style="display:none">
        <div class="attachments-title">📎 附件</div>
        <div class="attachments-grid" id="attachmentsGrid"></div>
      </div>
      <div class="modal-footer" id="detailFooter"></div>
    </div>
  </div>

  <!-- ==================== Modal: 附件預覽 ==================== -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="previewTitle">附件預覽</span>
        <button class="modal-close" onclick="App.closeModal('previewModal')">✕</button>
      </div>
      <div id="previewContent" style="text-align:center;min-height:200px"></div>
      <div class="modal-footer" id="previewFooter"></div>
    </div>
  </div>

  <!-- ==================== Modal: 觀看名單 ==================== -->
  <div class="modal-overlay" id="viewersModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">👁 觀看名單</span>
        <button class="modal-close" onclick="App.closeModal('viewersModal')">✕</button>
      </div>
      <div class="viewers-list" id="viewersList"></div>
    </div>
  </div>

  <!-- ==================== Modal: 管理員後台 ==================== -->
  <div class="modal-overlay" id="adminModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">⚙️ 管理員後台</span>
        <button class="modal-close" onclick="App.closeModal('adminModal')">✕</button>
      </div>
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="App.switchAdminTab('stats', this)">📊 統計</button>
        <button class="admin-tab" onclick="App.switchAdminTab('users', this)">👥 使用者</button>
        <button class="admin-tab" onclick="App.switchAdminTab('deleted', this)">🗑️ 已刪除</button>
      </div>
      <!-- 統計 Tab -->
      <div class="admin-tab-content active" id="adminTab-stats">
        <div class="stats-grid" id="adminStatsGrid"></div>
        <div style="margin-bottom:12px;font-weight:700;font-size:0.9rem">🔥 熱門記事</div>
        <table class="data-table" id="adminTopNotes">
          <thead><tr><th>記事標題</th><th>觀看次數</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- 使用者 Tab -->
      <div class="admin-tab-content" id="adminTab-users">
        <table class="data-table" id="adminUsersTable">
          <thead><tr><th>名稱</th><th>權限</th><th>更新時間</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- 已刪除 Tab -->
      <div class="admin-tab-content" id="adminTab-deleted">
        <table class="data-table" id="adminDeletedTable">
          <thead><tr><th>標題</th><th>作者</th><th>刪除時間</th><th>操作</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
  // ============================================================
  // 全域狀態
  // ============================================================
  const State = {
    gasUrl: 'https://script.google.com/macros/s/AKfycbzRXOCyh48b7-RnILEifVUhfp7RJG_i6GVCPj10zgRX0Q5IfWqB5C6xKgtfwdrX0wRrFw/exec',
    liffId: '2009456572-ZBfM2edk',
    userId: null,
    displayName: null,
    pictureUrl: null,
    permissionLevel: 0,
    currentNoteId: null,   // 編輯中的記事 ID
    pendingFiles: [],       // 待上傳檔案
    searchTimer: null,
    currentDetailNote: null
  };

  const PERM_NAMES = {
    0: '禁止', 1: '檢視', 2: '編輯', 3: '下載', 4: '管理員'
  };

  // ============================================================
  // API 工具
  // ============================================================
  const API = {
    async get(params) {
      const qs = new URLSearchParams({ ...params, userId: State.userId }).toString();
      const res = await fetch(`${State.gasUrl}?${qs}`);
      return res.json();
    },
    async post(body) {
      const res = await fetch(State.gasUrl, {
        method: 'POST',
        body: JSON.stringify({ ...body, userId: State.userId })
      });
      return res.json();
    }
  };

  // ============================================================
  // Toast 通知
  // ============================================================
  const Toast = {
    show(msg, type = 'success', duration = 3000) {
      const el = document.createElement('div');
      el.className = `toast toast-${type}`;
      el.textContent = msg;
      document.getElementById('toastContainer').appendChild(el);
      setTimeout(() => el.remove(), duration);
    }
  };

  // ============================================================
  // Loading 控制
  // ============================================================
  const Loading = {
    show(text = '載入中...') {
      document.querySelector('.loading-text').textContent = text;
      document.getElementById('loadingOverlay').style.display = 'flex';
    },
    hide() {
      document.getElementById('loadingOverlay').style.display = 'none';
    }
  };

  // ============================================================
  // 主應用程式
  // ============================================================
  const App = {

    // ----------------------------------------------------------
    // 初始化
    // ----------------------------------------------------------
    async init() {
      Loading.show('初始化 LIFF...');
      try {
        await liff.init({ liffId: State.liffId });

        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: location.href });
          return;
        }

        const profile = await liff.getProfile();
        State.userId      = profile.userId;
        State.displayName = profile.displayName;
        State.pictureUrl  = profile.pictureUrl;

        // 更新 Header UI
        document.getElementById('userName').textContent = profile.displayName;
        document.getElementById('userAvatar').src = profile.pictureUrl || 'https://via.placeholder.com/36';

        // 取得權限
        Loading.show('驗證權限...');
        const permRes = await API.get({ action: 'getPermission' });
        if (permRes.success) {
          State.permissionLevel = permRes.data.permissionLevel;
        }

        this.applyPermissionUI();
        Loading.hide();

        if (State.permissionLevel === 0) {
          document.getElementById('permDenied').style.display = 'flex';
        } else {
          document.getElementById('mainContent').style.display = 'block';
          await this.loadNotes();
        }

      } catch (err) {
        Loading.hide();
        Toast.show('初始化失敗：' + err.message, 'error');
        console.error(err);
      }
    },

    // ----------------------------------------------------------
    // 套用權限 UI
    // ----------------------------------------------------------
    applyPermissionUI() {
      const p = State.permissionLevel;
      document.getElementById('permBadge').textContent = PERM_NAMES[p] || '未知';

      // 新增按鈕（perm >= 2）
      if (p >= 2) document.getElementById('btnNewNote').style.display = 'inline-flex';

      // 上傳區塊（perm >= 4）
      if (p >= 4) document.getElementById('uploadSection').style.display = 'block';
    },

    // ----------------------------------------------------------
    // 載入記事列表
    // ----------------------------------------------------------
    async loadNotes(keyword = '') {
      Loading.show('載入記事...');
      try {
        const res = await API.get({ action: 'getNotes', keyword });
        Loading.hide();
        if (!res.success) { Toast.show(res.message, 'error'); return; }
        this.renderNotesList(res.data.notes);
      } catch (e) {
        Loading.hide();
        Toast.show('載入失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 渲染記事列表
    // ----------------------------------------------------------
    renderNotesList(notes) {
      const container = document.getElementById('notesList');
      if (!notes || notes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">目前沒有記事</div>
            <div class="empty-desc">點擊「＋ 新增記事」建立第一篇記事</div>
          </div>`;
        return;
      }

      container.innerHTML = notes.map(note => {
        const attachIcons = (note.attachments || []).slice(0, 3).map(a => {
          const icon = this.getFileIcon(a.fileType || '');
          return `<span class="attachment-icon">${icon}</span>`;
        }).join('');

        const canEdit = note.isOwner || State.permissionLevel >= 4;
        const editBtn = canEdit
          ? `<button class="btn btn-outline btn-sm" onclick="event.stopPropagation();App.openEditNote('${note.noteId}')">✏️ <span>編輯</span></button>`
          : '';
        const delBtn = canEdit
          ? `<button class="btn btn-danger btn-sm" onclick="event.stopPropagation();App.deleteNote('${note.noteId}')">🗑️</button>`
          : '';

        return `
          <div class="note-card" onclick="App.openDetail('${note.noteId}')">
            <div class="note-card-header">
              <div class="note-title">${note.title}</div>
              <div class="note-actions">${editBtn}${delBtn}</div>
            </div>
            <div class="note-summary">${note.summary}</div>
            <div class="note-footer">
              <div class="note-meta">
                <span>✍️ ${note.authorName}</span>
                <span>🕐 ${note.updatedAt}</span>
              </div>
              <div class="note-stats">
                ${attachIcons ? `<div class="attachment-icons">${attachIcons}</div>` : ''}
                <span>👁 ${note.viewCount}</span>
              </div>
            </div>
          </div>`;
      }).join('');
    },

    // ----------------------------------------------------------
    // 搜尋（防抖）
    // ----------------------------------------------------------
    onSearchInput(val) {
      clearTimeout(State.searchTimer);
      State.searchTimer = setTimeout(() => this.loadNotes(val), 400);
    },
    search() {
      this.loadNotes(document.getElementById('searchInput').value);
    },

    // ----------------------------------------------------------
    // 開啟記事詳情
    // ----------------------------------------------------------
    async openDetail(noteId) {
      Loading.show('載入記事...');
      try {
        const res = await API.get({ action: 'getNoteDetail', noteId });
        Loading.hide();
        if (!res.success) { Toast.show(res.message, 'error'); return; }

        const note = res.data.note;
        State.currentDetailNote = note;

        document.getElementById('detailTitle').textContent = note.title;
        document.getElementById('detailMeta').innerHTML = `
          <span>✍️ ${note.authorName}</span>
          <span>📅 建立：${note.createdAt}</span>
          <span>🔄 更新：${note.updatedAt}</span>
          <span>👁 ${note.viewCount} 次觀看</span>`;
        document.getElementById('detailContent').textContent = note.content;

        // 附件
        const attachments = note.attachments || [];
        const attSection = document.getElementById('attachmentsSection');
        if (attachments.length > 0) {
          attSection.style.display = 'block';
          document.getElementById('attachmentsGrid').innerHTML =
            attachments.map(a => this.renderAttachmentCard(a, note.canDownload)).join('');
        } else {
          attSection.style.display = 'none';
        }

        // Footer 按鈕
        const footer = document.getElementById('detailFooter');
        let footerBtns = '';
        if (note.canViewViewers) {
          footerBtns += `<button class="btn btn-outline btn-sm" onclick="App.openViewers('${noteId}')">👁 觀看名單</button>`;
        }
        if (note.canEdit) {
          footerBtns += `<button class="btn btn-primary btn-sm" onclick="App.closeModal('detailModal');App.openEditNote('${noteId}')">✏️ 編輯</button>`;
        }
        footer.innerHTML = footerBtns;

        this.openModal('detailModal');
      } catch (e) {
        Loading.hide();
        Toast.show('載入失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 渲染附件卡片
    // ----------------------------------------------------------
    renderAttachmentCard(attachment, canDownload) {
      const isImage = (attachment.fileType || '').startsWith('image/');
      const preview = isImage
        ? `<img class="attachment-preview" src="${attachment.previewUrl || attachment.thumbnailUrl}" alt="${attachment.fileName}" loading="lazy">`
        : `<div class="attachment-preview-icon">${this.getFileIcon(attachment.fileType)}</div>`;

      const dlBtn = canDownload
        ? `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();App.downloadFile('${attachment.fileId}')">⬇️</button>`
        : '';

      return `
        <div class="attachment-card" onclick="App.previewFile('${attachment.fileId}','${attachment.fileName}','${attachment.fileType}','${attachment.previewUrl}')">
          ${preview}
          <div class="attachment-info">
            <div class="attachment-name" title="${attachment.fileName}">${attachment.fileName}</div>
            <div class="attachment-actions">${dlBtn}</div>
          </div>
        </div>`;
    },

    // ----------------------------------------------------------
    // 預覽附件
    // ----------------------------------------------------------
    previewFile(fileId, fileName, fileType, previewUrl) {
      document.getElementById('previewTitle').textContent = fileName;
      const content = document.getElementById('previewContent');
      const footer  = document.getElementById('previewFooter');

      if (fileType.startsWith('image/')) {
        content.innerHTML = `<img src="${previewUrl}" style="max-width:100%;border-radius:8px" alt="${fileName}">`;
      } else if (fileType === 'application/pdf' || fileType === 'video/mp4') {
        content.innerHTML = `<iframe src="${previewUrl}" style="width:100%;height:60vh;border:none;border-radius:8px"></iframe>`;
      } else if (fileType.includes('officedocument') || fileType.includes('msword') || fileType.includes('excel')) {
        const embedUrl = `https://docs.google.com/viewer?srcid=${fileId}&pid=explorer&efh=false&a=v&chrome=false&embedded=true`;
        content.innerHTML = `<iframe src="${embedUrl}" style="width:100%;height:60vh;border:none;border-radius:8px"></iframe>`;
      } else {
        content.innerHTML = `
          <div style="padding:40px;text-align:center">
            <div style="font-size:3rem;margin-bottom:12px">${this.getFileIcon(fileType)}</div>
            <div style="font-size:0.9rem;color:var(--text-muted)">${fileName}</div>
          </div>`;
      }

      if (State.permissionLevel >= 3) {
        footer.innerHTML = `<button class="btn btn-primary" onclick="App.downloadFile('${fileId}')">⬇️ 下載</button>`;
      } else {
        footer.innerHTML = '';
      }

      this.openModal('previewModal');
    },

    // ----------------------------------------------------------
    // 下載檔案
    // ----------------------------------------------------------
    async downloadFile(fileId) {
      try {
        const res = await API.get({ action: 'downloadFile', fileId });
        if (!res.success) { Toast.show(res.message, 'error'); return; }
        window.open(res.data.downloadUrl, '_blank');
      } catch (e) {
        Toast.show('下載失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 觀看名單
    // ----------------------------------------------------------
    async openViewers(noteId) {
      Loading.show('載入觀看名單...');
      try {
        const res = await API.get({ action: 'getViewers', noteId });
        Loading.hide();
        if (!res.success) { Toast.show(res.message, 'error'); return; }

        const list = document.getElementById('viewersList');
        const viewers = res.data.viewers;
        if (viewers.length === 0) {
          list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted)">尚無觀看紀錄</div>';
        } else {
          list.innerHTML = viewers.map(v => `
            <div class="viewer-item">
              <div class="viewer-avatar">${v.viewerName.charAt(0)}</div>
              <div>
                <div class="viewer-name">${v.viewerName}</div>
                <div class="viewer-time">最後觀看：${v.lastViewedAt}　共 ${v.viewCount} 次</div>
              </div>
            </div>`).join('');
        }
        this.openModal('viewersModal');
      } catch (e) {
        Loading.hide();
        Toast.show('載入失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 開啟新增記事 Modal
    // ----------------------------------------------------------
    openNewNote() {
      State.currentNoteId = null;
      State.pendingFiles  = [];
      document.getElementById('noteModalTitle').textContent = '新增記事';
      document.getElementById('noteTitle').value   = '';
      document.getElementById('noteContent').value = '';
      document.getElementById('fileList').innerHTML = '';
      this.openModal('noteModal');
    },

    // ----------------------------------------------------------
    // 開啟編輯記事 Modal
    // ----------------------------------------------------------
    async openEditNote(noteId) {
      Loading.show('載入記事...');
      try {
        const res = await API.get({ action: 'getNoteDetail', noteId });
        Loading.hide();
        if (!res.success) { Toast.show(res.message, 'error'); return; }

        const note = res.data.note;
        State.currentNoteId = noteId;
        State.pendingFiles  = [];

        document.getElementById('noteModalTitle').textContent = '編輯記事';
        document.getElementById('noteTitle').value   = note.title;
        document.getElementById('noteContent').value = note.content;
        document.getElementById('fileList').innerHTML = '';

        // 顯示現有附件
        if (note.attachments && note.attachments.length > 0) {
          const fileList = document.getElementById('fileList');
          note.attachments.forEach(a => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `
              <div class="file-item-icon">${this.getFileIcon(a.fileType)}</div>
              <div class="file-item-info">
                <div class="file-item-name">${a.fileName}</div>
                <div class="file-item-size">已上傳</div>
              </div>`;
            fileList.appendChild(item);
          });
        }

        this.openModal('noteModal');
      } catch (e) {
        Loading.hide();
        Toast.show('載入失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 儲存記事
    // ----------------------------------------------------------
    async saveNote() {
      const title   = document.getElementById('noteTitle').value.trim();
      const content = document.getElementById('noteContent').value.trim();

      if (!title) { Toast.show('請填寫標題', 'warning'); return; }

      const btn = document.getElementById('btnSaveNote');
      btn.disabled = true;
      btn.textContent = '儲存中...';

      try {
        // 先上傳附件
        const uploadedFiles = [];
        for (const file of State.pendingFiles) {
          const fileData = await this.uploadFile(file);
          if (fileData) uploadedFiles.push(fileData);
        }

        let res;
        if (State.currentNoteId) {
          // 編輯
          res = await API.post({
            action: 'updateNote',
            noteId: State.currentNoteId,
            title, content,
            attachments: uploadedFiles,
            authorName: State.displayName
          });
        } else {
          // 新增
          res = await API.post({
            action: 'createNote',
            title, content,
            attachments: uploadedFiles,
            authorName: State.displayName
          });
        }

        if (res.success) {
          Toast.show(res.message || '儲存成功');
          this.closeModal('noteModal');
          await this.loadNotes();
        } else {
          Toast.show(res.message, 'error');
        }
      } catch (e) {
        Toast.show('儲存失敗：' + e.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 儲存';
      }
    },

    // ----------------------------------------------------------
    // 刪除記事
    // ----------------------------------------------------------
    async deleteNote(noteId) {
      if (!confirm('確定要刪除此記事嗎？')) return;
      try {
        const res = await API.post({ action: 'deleteNote', noteId });
        if (res.success) {
          Toast.show('記事已刪除');
          await this.loadNotes();
        } else {
          Toast.show(res.message, 'error');
        }
      } catch (e) {
        Toast.show('刪除失敗', 'error');
      }
    },

    // ----------------------------------------------------------
    // 檔案選擇處理
    // ----------------------------------------------------------
    onFileSelect(files) {
      Array.from(files).forEach(file => this.addPendingFile(file));
    },
    onDragOver(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.add('drag-over');
    },
    onDragLeave(e) {
      document.getElementById('uploadZone').classList.remove('drag-over');
    },
    onDrop(e) {
      e.preventDefault();
      document.getElementById('uploadZone').classList.remove('drag-over');
      Array.from(e.dataTransfer.files).forEach(file => this.addPendingFile(file));
    },

    addPendingFile(file) {
      const MAX = 10 * 1024 * 1024;
      if (file.size > MAX) { Toast.show(`${file.name} 超過 10MB 限制`, 'warning'); return; }

      State.pendingFiles.push(file);
      const fileList = document.getElementById('fileList');
      const idx = State.pendingFiles.length - 1;
      const item = document.createElement('div');
      item.className = 'file-item';
      item.id = `pending-file-${idx}`;
      item.innerHTML = `
        <div class="file-item-icon">${this.getFileIcon(file.type)}</div>
        <div class="file-item-info">
          <div class="file-item-name">${file.name}</div>
          <div class="file-item-size">${this.formatSize(file.size)}</div>
          <div class="upload-progress"><div class="upload-progress-bar" id="progress-${idx}" style="width:0%"></div></div>
        </div>
        <button class="file-item-remove" onclick="App.removePendingFile(${idx})">✕</button>`;
      fileList.appendChild(item);
    },

    removePendingFile(idx) {
      State.pendingFiles[idx] = null;
      const el = document.getElementById(`pending-file-${idx}`);
      if (el) el.remove();
    },

    // ----------------------------------------------------------
    // 上傳單一檔案（Base64）
    // ----------------------------------------------------------
    async uploadFile(file) {
      if (!file) return null;
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const base64 = e.target.result;
            const res = await API.post({
              action: 'uploadFile',
              noteId: State.currentNoteId || 'temp_' + Date.now(),
              fileName: file.name,
              fileType: file.type,
              fileBase64: base64,
              fileSize: file.size
            });
            if (res.success) resolve(res.data);
            else { Toast.show('上傳失敗：' + res.message, 'error'); resolve(null); }
          } catch (err) { reject(err); }
        };
        reader.readAsDataURL(file);
      });
    },

    // ----------------------------------------------------------
    // 管理員後台
    // ----------------------------------------------------------
    async openAdmin() {
      if (State.permissionLevel < 4) return;
      Loading.show('載入管理資料...');
      try {
        const res = await API.get({ action: 'adminGetStats' });
        Loading.hide();
        if (!res.success) { Toast.show(res.message, 'error'); return; }

        const { summary, topNotes, deletedNotesList } = res.data;

        // 統計卡片
        document.getElementById('adminStatsGrid').innerHTML = [
          { label: '記事總數', value: summary.totalNotes, icon: '📝' },
          { label: '已刪除', value: summary.deletedNotes, icon: '🗑️' },
          { label: '檔案數', value: summary.totalFiles, icon: '📎' },
          { label: '總觀看', value: summary.totalViews, icon: '👁' },
          { label: '使用者', value: summary.totalUsers, icon: '👥' }
        ].map(s => `
          <div class="stat-card">
            <div style="font-size:1.5rem">${s.icon}</div>
            <div class="stat-card-value">${s.value}</div>
            <div class="stat-card-label">${s.label}</div>
          </div>`).join('');

        // 熱門記事
        document.querySelector('#adminTopNotes tbody').innerHTML =
          topNotes.map(n => `<tr><td>${n.title}</td><td>👁 ${n.viewCount}</td></tr>`).join('');

        // 已刪除記事
        document.querySelector('#adminDeletedTable tbody').innerHTML =
          deletedNotesList.length === 0
            ? '<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">無已刪除記事</td></tr>'
            : deletedNotesList.map(n => `
                <tr>
                  <td>${n.title}</td>
                  <td>${n.authorName}</td>
                  <td>${n.updatedAt}</td>
                  <td><button class="btn btn-primary btn-sm" onclick="App.restoreNote('${n.noteId}')">還原</button></td>
                </tr>`).join('');

        // 載入使用者列表
        await this.loadAdminUsers();
        this.openModal('adminModal');
      } catch (e) {
        Loading.hide();
        Toast.show('載入失敗', 'error');
      }
    },

    async loadAdminUsers() {
      const res = await API.get({ action: 'adminGetUsers' });
      if (!res.success) return;
      document.querySelector('#adminUsersTable tbody').innerHTML =
        res.data.map(u => `
          <tr>
            <td>${u.displayName}</td>
            <td>
              <select class="perm-select" onchange="App.updatePermission('${u.userId}', this.value)">
                ${[0,1,2,3,4].map(l =>
                  `<option value="${l}" ${u.permissionLevel === l ? 'selected' : ''}>${l} - ${PERM_NAMES[l]}</option>`
                ).join('')}
              </select>
            </td>
            <td>${u.updatedAt}</td>
            <td><span style="font-size:0.75rem;color:var(--text-muted)">${u.note || ''}</span></td>
          </tr>`).join('');
    },

    async updatePermission(targetUserId, level) {
      const res = await API.post({
        action: 'updatePermission',
        targetUserId,
        permissionLevel: parseInt(level),
        note: '管理員手動調整'
      });
      if (res.success) Toast.show('權限已更新');
      else Toast.show(res.message, 'error');
    },

    async restoreNote(noteId) {
      const res = await API.post({ action: 'restoreNote', noteId });
      if (res.success) {
        Toast.show('記事已還原');
        await this.openAdmin();
      } else {
        Toast.show(res.message, 'error');
      }
    },

    switchAdminTab(tab, el) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-tab-content').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById(`adminTab-${tab}`).classList.add('active');
    },

    // ----------------------------------------------------------
    // Modal 控制
    // ----------------------------------------------------------
    openModal(id) {
      document.getElementById(id).classList.add('active');
    },
    closeModal(id) {
      document.getElementById(id).classList.remove('active');
    },

    // ----------------------------------------------------------
    // 工具函式
    // ----------------------------------------------------------
    getFileIcon(mimeType) {
      if (!mimeType) return '📄';
      if (mimeType.startsWith('image/')) return '🖼️';
      if (mimeType === 'application/pdf') return '📕';
      if (mimeType === 'video/mp4') return '🎬';
      if (mimeType.includes('word')) return '📘';
      if (mimeType.includes('excel') || mimeType.includes('sheet')) return '📗';
      return '📄';
    },

    formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  };

  // ============================================================
  // 點擊 Modal 背景關閉
  // ============================================================
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('active');
    });
  });

  // ============================================================
  // 啟動
  // ============================================================
