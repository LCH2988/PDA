<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📓 網路記事本</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --primary:#4CAF50; --primary-dark:#388E3C; --primary-light:#C8E6C9;
      --bg:#F5F5F5; --card-bg:#FFFFFF; --text-main:#333; --text-sub:#888;
      --danger:#F44336; --warning:#FF9800; --info:#2196F3;
      --border:#E0E0E0; --shadow:0 2px 8px rgba(0,0,0,.10);
      --radius:12px; --transition:.2s ease;
    }
    html,body { height:100%; font-family:'Segoe UI','Noto Sans TC',sans-serif;
                background:var(--bg); color:var(--text-main); }
    /* ── Header ── */
    .header { position:sticky; top:0; z-index:100;
      background:linear-gradient(135deg,var(--primary-dark),var(--primary));
      color:#fff; padding:12px 16px; display:flex; align-items:center; gap:10px;
      box-shadow:0 2px 8px rgba(0,0,0,.2); }
    .header-title { font-size:1.2rem; font-weight:700; flex:1; }
    .user-avatar  { width:36px; height:36px; border-radius:50%;
                    border:2px solid rgba(255,255,255,.7); object-fit:cover; }
    .user-name    { font-size:.85rem; opacity:.9; max-width:100px;
                    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .perm-badge   { font-size:.7rem; background:rgba(255,255,255,.25);
                    padding:2px 8px; border-radius:20px; }
    /* ── Layout ── */
    .container  { max-width:800px; margin:0 auto; padding:16px; }
    .search-bar { display:flex; gap:8px; margin-bottom:12px; }
    .search-bar input { flex:1; padding:10px 14px; border:1px solid var(--border);
      border-radius:8px; font-size:.95rem; outline:none;
      transition:border-color var(--transition); }
    .search-bar input:focus { border-color:var(--primary); }
    .btn-search { padding:10px 18px; background:var(--primary); color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.9rem;
      transition:background var(--transition); }
    .btn-search:hover { background:var(--primary-dark); }
    .action-bar { display:flex; gap:8px; margin-bottom:16px; align-items:center; }
    .btn-add { flex:1; padding:11px; background:var(--primary); color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.95rem;
      font-weight:600; transition:background var(--transition);
      display:flex; align-items:center; justify-content:center; gap:6px; }
    .btn-add:hover    { background:var(--primary-dark); }
    .btn-add:disabled { background:#ccc; cursor:not-allowed; }
    .btn-refresh { padding:11px 14px; background:var(--card-bg);
      border:1px solid var(--border); border-radius:8px; cursor:pointer;
      font-size:1rem; transition:all var(--transition); }
    .btn-refresh:hover { background:var(--primary-light); border-color:var(--primary); }
    .btn-admin { padding:11px 14px; background:var(--warning); color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.85rem;
      transition:background var(--transition); }
    .btn-admin:hover { background:#e65100; }
    /* ── Note Card ── */
    .notes-list { display:flex; flex-direction:column; gap:12px; }
    .note-card { background:var(--card-bg); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:16px; cursor:pointer;
      transition:transform var(--transition),box-shadow var(--transition);
      border-left:4px solid var(--primary); }
    .note-card:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(0,0,0,.15); }
    .note-card-header { display:flex; justify-content:space-between;
                        align-items:flex-start; gap:8px; }
    .note-title   { font-size:1rem; font-weight:600; flex:1; }
    .note-meta    { font-size:.75rem; color:var(--text-sub); white-space:nowrap; }
    .note-summary { font-size:.88rem; color:var(--text-sub); margin:6px 0;
      line-height:1.5; display:-webkit-box;
      -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .note-footer  { display:flex; align-items:center; gap:10px;
                    margin-top:8px; flex-wrap:wrap; }
    .note-author,.note-views { font-size:.78rem; color:var(--text-sub); }
    .note-attach  { font-size:.78rem; color:var(--info); }
    .note-actions { margin-left:auto; display:flex; gap:6px; }
    .btn-edit,.btn-delete { padding:4px 10px; border:none; border-radius:6px;
      cursor:pointer; font-size:.78rem; transition:all var(--transition); }
    .btn-edit         { background:var(--primary-light); color:var(--primary-dark); }
    .btn-edit:hover   { background:var(--primary); color:#fff; }
    .btn-delete       { background:#FFEBEE; color:var(--danger); }
    .btn-delete:hover { background:var(--danger); color:#fff; }
    /* ── States ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text-sub); }
    .empty-state .icon { font-size:3rem; margin-bottom:12px; }
    .loading { text-align:center; padding:40px; color:var(--text-sub); font-size:.95rem; }
    .spinner { display:inline-block; width:28px; height:28px;
      border:3px solid var(--primary-light); border-top-color:var(--primary);
      border-radius:50%; animation:spin .8s linear infinite; margin-bottom:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .no-access { text-align:center; padding:80px 20px; color:var(--text-sub); }
    .no-access .icon { font-size:4rem; margin-bottom:16px; }
    .no-access h2    { color:var(--danger); margin-bottom:8px; }
    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.5); z-index:200;
      align-items:center; justify-content:center; padding:16px; }
    .modal-overlay.active { display:flex; }
    .modal { background:var(--card-bg); border-radius:var(--radius);
      width:100%; max-width:600px; max-height:90vh; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,.2); animation:slideUp .25s ease; }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0}
                         to  {transform:translateY(0);   opacity:1} }
    .modal-header { display:flex; align-items:center; padding:16px 20px;
      border-bottom:1px solid var(--border); gap:10px;
      position:sticky; top:0; background:var(--card-bg); z-index:1; }
    .modal-title { font-size:1.05rem; font-weight:700; flex:1; }
    .modal-close { background:none; border:none; font-size:1.4rem;
      cursor:pointer; color:var(--text-sub); padding:2px 6px; border-radius:4px; }
    .modal-close:hover { background:var(--bg); }
    .modal-body   { padding:20px; }
    .modal-footer { padding:12px 20px; border-top:1px solid var(--border);
      display:flex; gap:8px; justify-content:flex-end;
      position:sticky; bottom:0; background:var(--card-bg); }
    /* ── Form ── */
    .form-group { margin-bottom:16px; }
    .form-group label { display:block; font-size:.88rem; font-weight:600;
                        margin-bottom:6px; }
    .form-group input,.form-group textarea { width:100%; padding:10px 12px;
      border:1px solid var(--border); border-radius:8px; font-size:.95rem;
      outline:none; transition:border-color var(--transition); font-family:inherit; }
    .form-group input:focus,.form-group textarea:focus { border-color:var(--primary); }
    .form-group textarea { min-height:140px; resize:vertical; }
    /* ── Buttons ── */
    .btn-primary { padding:10px 20px; background:var(--primary); color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.95rem;
      font-weight:600; transition:background var(--transition); }
    .btn-primary:hover    { background:var(--primary-dark); }
    .btn-primary:disabled { background:#ccc; cursor:not-allowed; }
    .btn-secondary { padding:10px 20px; background:var(--bg); color:var(--text-main);
      border:1px solid var(--border); border-radius:8px; cursor:pointer;
      font-size:.95rem; transition:all var(--transition); }
    .btn-secondary:hover { background:var(--border); }
    .btn-danger { padding:10px 20px; background:var(--danger); color:#fff;
      border:none; border-radius:8px; cursor:pointer; font-size:.95rem;
      transition:background var(--transition); }
    .btn-danger:hover { background:#c62828; }
    /* ── Detail ── */
    .detail-content { line-height:1.8; font-size:.95rem;
                      word-break:break-word; white-space:pre-wrap; }
    .detail-meta { font-size:.82rem; color:var(--text-sub); margin-bottom:16px;
                   display:flex; flex-wrap:wrap; gap:12px; }
    /* ── Attachments ── */
    .attachments-section { margin-top:20px; border-top:1px solid var(--border); padding-top:16px; }
    .attachments-title   { font-size:.9rem; font-weight:600; margin-bottom:10px; }
    .attachment-item { display:flex; align-items:center; gap:10px; padding:8px 12px;
      background:var(--bg); border-radius:8px; margin-bottom:8px; }
    .attachment-icon { font-size:1.4rem; }
    .attachment-name { flex:1; font-size:.88rem; overflow:hidden;
                       text-overflow:ellipsis; white-space:nowrap; }
    .attachment-actions { display:flex; gap:6px; }
    .btn-preview,.btn-download { padding:4px 10px; border:none; border-radius:6px;
      cursor:pointer; font-size:.78rem; transition:all var(--transition); }
    .btn-preview        { background:var(--primary-light); color:var(--primary-dark); }
    .btn-preview:hover  { background:var(--primary); color:#fff; }
    .btn-download       { background:#E3F2FD; color:var(--info); }
    .btn-download:hover { background:var(--info); color:#fff; }
    /* ── Upload ── */
    .upload-zone { border:2px dashed var(--border); border-radius:8px; padding:24px;
      text-align:center; cursor:pointer; transition:all var(--transition); color:var(--text-sub); }
    .upload-zone:hover,.upload-zone.drag-over {
      border-color:var(--primary); background:var(--primary-light); color:var(--primary-dark); }
    .upload-zone input[type="file"] { display:none; }
    .progress-bar  { height:6px; background:var(--border); border-radius:3px; overflow:hidden; margin-top:6px; }
    .progress-fill { height:100%; background:var(--primary); transition:width .3s ease; }
    /* ── Toast ── */
    .toast-container { position:fixed; bottom:20px; right:20px; z-index:999;
                       display:flex; flex-direction:column; gap:8px; }
    .toast { padding:12px 18px; border-radius:8px; color:#fff; font-size:.9rem;
      box-shadow:var(--shadow); animation:toastIn .3s ease;
      max-width:300px; word-break:break-word; }
    .toast.success { background:var(--primary-dark); }
    .toast.error   { background:var(--danger); }
    .toast.info    { background:var(--info); }
    @keyframes toastIn { from{transform:translateX(100%);opacity:0}
                         to  {transform:translateX(0);   opacity:1} }
    /* ── Admin ── */
    .admin-tab { padding:8px 16px; border:none; background:none; cursor:pointer;
      font-size:.9rem; color:var(--text-sub);
      border-bottom:3px solid transparent; transition:all var(--transition); }
    .admin-tab.active { color:var(--primary); border-bottom-color:var(--primary); font-weight:600; }
    .admin-tab:hover  { color:var(--primary-dark); }
    .user-row { display:flex; align-items:center; gap:10px; padding:10px 12px;
      border-radius:8px; border:1px solid var(--border); margin-bottom:8px; background:var(--card-bg); }
    .user-row-info { flex:1; }
    .user-row-name { font-size:.9rem; font-weight:600; }
    .user-row-id   { font-size:.75rem; color:var(--text-sub); word-break:break-all; }
    .perm-select { padding:4px 8px; border:1px solid var(--border);
      border-radius:6px; font-size:.82rem; outline:none; cursor:pointer; }
    .btn-save-perm { padding:4px 10px; background:var(--primary); color:#fff;
      border:none; border-radius:6px; cursor:pointer; font-size:.78rem;
      transition:background var(--transition); }
    .btn-save-perm:hover { background:var(--primary-dark); }
    .deleted-card { padding:12px; border-radius:8px; border:1px dashed var(--border);
      margin-bottom:8px; background:#FFF8F8; }
    .deleted-card-title { font-size:.9rem; font-weight:600; color:var(--danger); }
    .deleted-card-meta  { font-size:.78rem; color:var(--text-sub); margin:4px 0 8px; }
    .btn-restore { padding:4px 12px; background:var(--primary-light); color:var(--primary-dark);
      border:none; border-radius:6px; cursor:pointer; font-size:.82rem;
      transition:all var(--transition); }
    .btn-restore:hover { background:var(--primary); color:#fff; }
    /* ── View Log ── */
    .view-log-item { display:flex; align-items:center; gap:10px;
      padding:8px 0; border-bottom:1px solid var(--border); }
    .view-log-item:last-child { border-bottom:none; }
    .view-log-name { font-size:.9rem; font-weight:600; flex:1; }
    .view-log-time { font-size:.78rem; color:var(--text-sub); }
    /* ── Preview ── */
    .preview-iframe { width:100%; height:480px; border:none;
                      border-radius:0 0 var(--radius) var(--radius); }
    .preview-img    { width:100%; max-height:480px; object-fit:contain;
                      display:block; padding:12px; }
    .preview-video  { width:100%; max-height:480px; display:block; background:#000; }
    @media(max-width:480px) {
      .container    { padding:10px; }
      .note-actions { width:100%; justify-content:flex-end; }
      .modal        { max-height:95vh; }
    }
  </style>
</head>
<body>

<header class="header">
  <span style="font-size:1.4rem">📓</span>
  <span class="header-title">網路記事本</span>
  <span class="perm-badge" id="permBadge" style="display:none"></span>
  <span class="user-name"  id="userName"></span>
  <img  class="user-avatar" id="userAvatar" alt="avatar">
</header>

<div class="container">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="🔍 搜尋記事標題或內容..." autocomplete="off"
           onkeydown="if(event.key==='Enter')App.searchNotes()">
    <button class="btn-search" onclick="App.searchNotes()">搜尋</button>
  </div>
  <div class="action-bar">
    <button class="btn-add" id="btnAddNote" onclick="App.openCreateModal()" disabled>＋ 新增記事</button>
    <button class="btn-refresh" onclick="App.loadNotes()" title="重新整理">🔄</button>
    <button class="btn-admin" id="btnAdmin" onclick="App.openAdminModal()" style="display:none">⚙️ 管理</button>
  </div>
  <div id="notesList">
    <div class="loading"><div class="spinner"></div><br>初始化中...</div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Modal：新增/編輯記事 -->
<div class="modal-overlay" id="noteModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="noteModalTitle">📝 新增記事</span>
      <button class="modal-close" onclick="App.closeModal('noteModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>標題 <span style="color:var(--danger)">*</span></label>
        <input type="text" id="noteTitle" placeholder="請輸入記事標題..." maxlength="100">
      </div>
      <div class="form-group">
        <label>內容</label>
        <textarea id="noteContent" placeholder="請輸入記事內容..."></textarea>
      </div>
      <div id="uploadSection" style="display:none">
        <div class="form-group">
          <label>附件上傳</label>
          <div class="upload-zone" id="uploadZone"
               onclick="document.getElementById('fileInput').click()"
               ondragover="event.preventDefault();this.classList.add('drag-over')"
               ondragleave="this.classList.remove('drag-over')"
               ondrop="App.handleFileDrop(event)">
            <div style="font-size:2rem;margin-bottom:8px">📎</div>
            <div>點擊或拖曳檔案至此處</div>
            <div style="font-size:.78rem;margin-top:4px">支援圖片、PDF、Word、Excel、MP4，單檔最大 10MB</div>
            <input type="file" id="fileInput" multiple
                   accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.mp4"
                   onchange="App.handleFileSelect(event)">
          </div>
        </div>
        <div id="pendingFiles"></div>
        <div id="uploadProgress" style="display:none;margin-top:8px">
          <div id="uploadFileName" style="font-size:.82rem;color:var(--text-sub);margin-bottom:4px"></div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="App.closeModal('noteModal')">取消</button>
      <button class="btn-primary" id="btnSaveNote" onclick="App.saveNote()">儲存</button>
    </div>
  </div>
</div>

<!-- Modal：記事詳情 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <span class="modal-title" id="detailTitle">載入中...</span>
      <button class="modal-close" onclick="App.closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body"   id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- Modal：觀看名單 -->
<div class="modal-overlay" id="viewLogModal">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <span class="modal-title">👁 觀看名單</span>
      <button class="modal-close" onclick="App.closeModal('viewLogModal')">✕</button>
    </div>
    <div class="modal-body" id="viewLogBody">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- Modal：管理員後台 -->
<div class="modal-overlay" id="adminModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <span class="modal-title">⚙️ 管理員後台</span>
      <button class="modal-close" onclick="App.closeModal('adminModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid var(--border)">
        <button class="admin-tab active" data-tab="users"   onclick="App.switchAdminTab('users')">👥 使用者權限</button>
        <button class="admin-tab"        data-tab="deleted" onclick="App.switchAdminTab('deleted')">🗑 已刪除記事</button>
      </div>
      <div id="adminTabUsers">
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input type="text" id="adminSearchUser" placeholder="搜尋使用者 ID 或名稱..."
            style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:.9rem"
            oninput="App.adminFilterUsers()">
        </div>
        <div id="adminUserList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
        <div style="margin-top:16px;padding:14px;background:var(--bg);border-radius:8px">
          <div style="font-size:.9rem;font-weight:600;margin-bottom:10px">➕ 新增 / 修改使用者權限</div>
          <div style="display:flex;flex-direction:column;gap:8px">
            <input type="text" id="adminUserId"      placeholder="LINE userId（必填）"
              style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:.88rem">
            <input type="text" id="adminDisplayName" placeholder="顯示名稱（選填）"
              style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:.88rem">
            <select id="adminPermLevel"
              style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:.88rem">
              <option value="0">0 — 禁止存取</option>
              <option value="1">1 — 檢視</option>
              <option value="2" selected>2 — 編輯</option>
              <option value="3">3 — 下載</option>
              <option value="4">4 — 上傳（管理員）</option>
            </select>
            <input type="text" id="adminNote" placeholder="備註（選填）"
              style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;outline:none;font-size:.88rem">
            <button class="btn-primary" onclick="App.adminUpdatePermission()">✅ 儲存權限</button>
          </div>
        </div>
      </div>
      <div id="adminTabDeleted" style="display:none">
        <div id="adminDeletedList">
          <div class="loading"><div class="spinner"></div>
        </div>
       </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal：檔案預覽 -->
<div class="modal-overlay" id="previewModal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <span class="modal-title" id="previewTitle">檔案預覽</span>
      <button class="modal-close" onclick="App.closeModal('previewModal')">✕</button>
    </div>
    <div class="modal-body" id="previewBody" style="padding:0;min-height:300px"></div>
  </div>
</div>

<!-- Modal：確認刪除 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <span class="modal-title">⚠️ 確認刪除</span>
      <button class="modal-close" onclick="App.closeModal('confirmModal')">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="font-size:.95rem;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="App.closeModal('confirmModal')">取消</button>
      <button class="btn-danger"    id="btnConfirmOk">確認刪除</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════
     JavaScript — 完整修正版
     CORS 修正：一般請求用 GET，檔案上傳用 text/plain POST
════════════════════════════════════════════════════════ -->
<script>
  const App = (() => {

  // ── 設定（請修改這兩個值）────────────────────────────────
  const CFG = {
    liffId: '2009456572-AUDE1qmM',          // ← 填入您的 LIFF ID

  // ══════════════════════════════════════════════════════════
  // 工具函式
  // ══════════════════════════════════════════════════════════

  function toast(msg, type, duration) {
    type     = type     || 'success';
    duration = duration || 3000;
    const el = document.createElement('div');
    el.className   = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(function() {
      el.style.opacity    = '0';
      el.style.transition = 'opacity .4s';
      setTimeout(function() { el.remove(); }, 400);
    }, duration);
  }

  function fmtDate(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    return d.getFullYear() + '/' +
      String(d.getMonth()+1).padStart(2,'0') + '/' +
      String(d.getDate()).padStart(2,'0') + ' ' +
      String(d.getHours()).padStart(2,'0') + ':' +
      String(d.getMinutes()).padStart(2,'0');
  }

  function fileIcon(type) {
    if (!type) return '📄';
    if (type.startsWith('image/'))  return '🖼️';
    if (type === 'application/pdf') return '📕';
    if (type.includes('word'))      return '📘';
    if (type.includes('excel') || type.includes('spreadsheet')) return '📗';
    if (type.startsWith('video/'))  return '🎬';
    return '📄';
  }

  function fmtSize(bytes) {
    if (!bytes) return '';
    if (bytes < 1024)        return bytes + ' B';
    if (bytes < 1024*1024)   return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  function openModal(id) {
    document.getElementById(id).classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('active');
    document.body.style.overflow = '';
  }

  function setLoading(elId, msg) {
    document.getElementById(elId).innerHTML =
      '<div class="loading"><div class="spinner"></div><br>' + (msg||'載入中...') + '</div>';
  }

  // ══════════════════════════════════════════════════════════
  // CORS 修正版 API 請求
  // ══════════════════════════════════════════════════════════

  /**
   * gasGet — 所有一般請求統一使用 GET + URLSearchParams
   * 避免 POST application/json 觸發 CORS Preflight
   */
  async function gasGet(params) {
    const p = Object.assign({}, params, { userId: S.userId });
    Object.keys(p).forEach(function(k) {
      if (p[k] === undefined || p[k] === null) delete p[k];
    });
    const qs  = new URLSearchParams(p).toString();
    const res = await fetch(CFG.gasUrl + '?' + qs, {
      method  : 'GET',
      redirect: 'follow',
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
    return res.json();
  }

  /**
   * gasPost — 僅用於檔案上傳
   * Content-Type: text/plain 不觸發 CORS Preflight
   * GAS doPost 可正常接收並 JSON.parse
   */
  async function gasPost(payload) {
    const body = JSON.stringify(
      Object.assign({}, payload, { userId: S.userId, token: S.accessToken })
    );
    const res = await fetch(CFG.gasUrl, {
      method  : 'POST',
      headers : { 'Content-Type': 'text/plain;charset=utf-8' },
      body    : body,
      redirect: 'follow',
    });
    if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + res.statusText);
    return res.json();
  }

  // ══════════════════════════════════════════════════════════
  // LIFF 初始化
  // ══════════════════════════════════════════════════════════

  async function initLiff() {
    try {
      await liff.init({ liffId: CFG.liffId });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: location.href });
        return;
      }
      const profile   = await liff.getProfile();
      S.userId        = profile.userId;
      S.displayName   = profile.displayName;
      S.pictureUrl    = profile.pictureUrl;
      S.accessToken   = liff.getAccessToken();

      // 更新 Header
      document.getElementById('userName').textContent = S.displayName;
      const avatar = document.getElementById('userAvatar');
      avatar.alt = S.displayName;
      if (S.pictureUrl) {
        avatar.src     = S.pictureUrl;
        avatar.onerror = function() { avatar.src = DEFAULT_AVATAR; };
      } else {
        avatar.src = DEFAULT_AVATAR;
      }

      await loadNotes();
    } catch(err) {
      console.error('LIFF init error:', err);
      document.getElementById('notesList').innerHTML =
        '<div class="no-access"><div class="icon">⚠️</div>' +
        '<h2>初始化失敗</h2><p>' + err.message + '</p>' +
        '<p style="margin-top:12px;font-size:.82rem;color:var(--text-sub)">' +
        '請確認 LIFF ID 與 GAS URL 設定是否正確</p></div>';
    }
  }

  // ══════════════════════════════════════════════════════════
  // 記事列表
  // ══════════════════════════════════════════════════════════

  async function loadNotes(keyword) {
    setLoading('notesList', '載入中...');
    try {
      const res = await gasGet({ action:'getNotes', keyword: keyword||'' });
      if (!res.success) {
        if (res.errorCode === 'NO_PERMISSION') return renderNoAccess();
        return toast(res.message, 'error');
      }
      S.notes    = res.data.notes    || [];
      S.userPerm = res.data.userPerm || 0;
      updatePermUI();
      renderNotesList(S.notes);
    } catch(err) {
      document.getElementById('notesList').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div>' +
        '<p>載入失敗：' + err.message + '</p></div>';
    }
  }

  function searchNotes() {
    loadNotes(document.getElementById('searchInput').value.trim());
  }

  function updatePermUI() {
    const perm  = S.userPerm;
    const badge = document.getElementById('permBadge');
    badge.textContent      = PERM_LABEL[perm] || '未知';
    badge.style.background = (PERM_COLOR[perm]||'#888') + '55';
    badge.style.display    = 'inline-block';
    const btnAdd           = document.getElementById('btnAddNote');
    btnAdd.disabled        = perm < 2;
    btnAdd.title           = perm < 2 ? '您的權限不足以新增記事' : '';
    document.getElementById('btnAdmin').style.display = perm >= 4 ? 'inline-flex' : 'none';
  }

  function renderNotesList(notes) {
    const container = document.getElementById('notesList');
    if (!notes || !notes.length) {
      container.innerHTML =
        '<div class="empty-state"><div class="icon">📭</div><p>目前沒有記事</p>' +
        (S.userPerm >= 2 ? '<p style="margin-top:8px;font-size:.85rem">點擊「＋ 新增記事」開始建立</p>' : '') +
        '</div>';
      return;
    }
    const list = document.createElement('div');
    list.className = 'notes-list';
    notes.forEach(function(note) {
      const card = document.createElement('div');
      card.className = 'note-card';
      const attachBadge = (note.attachments && note.attachments.length)
        ? '<span class="note-attach">📎 ' + note.attachments.length + ' 個附件</span>' : '';
      const actionBtns = note.canEdit
        ? '<div class="note-actions" onclick="event.stopPropagation()">' +
            '<button class="btn-edit"   onclick="App.openEditModal(\'' + note.noteId + '\')">✏️ 編輯</button>' +
            '<button class="btn-delete" onclick="App.confirmDelete(\'' + note.noteId + '\',\'' +
              note.title.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\')">🗑 刪除</button>' +
          '</div>' : '';
      card.innerHTML =
        '<div class="note-card-header">' +
          '<span class="note-title">' + note.title + '</span>' +
          '<span class="note-meta">'  + fmtDate(note.updatedAt) + '</span>' +
        '</div>' +
        '<div class="note-summary">'  + (note.summary || '（無內容摘要）') + '</div>' +
        '<div class="note-footer">' +
          '<span class="note-author">✍️ ' + note.authorName + '</span>' +
          '<span class="note-views">👁 '  + (note.viewCount||0) + ' 次</span>' +
          attachBadge + actionBtns +
        '</div>';
      card.addEventListener('click', function() { openDetailModal(note.noteId); });
      list.appendChild(card);
    });
    container.innerHTML = '';
    container.appendChild(list);
  }

    document.getElementById('notesList').innerHTML =
      '<div class="no-access"><div class="icon">🔒</div>' +
      '<h2>無存取權限</h2><p>您的帳號尚未獲得存取授權，請聯絡管理員。</p>' +

    document.getElementById('btnAddNote').disabled = true;

  function openCreateModal() {
    S.editingNoteId = null;
    S.pendingFiles  = [];
    document.getElementById('noteModalTitle').textContent       = '📝 新增記事';
    document.getElementById('noteTitle').value                  = '';
    document.getElementById('noteContent').value                = '';
    document.getElementById('pendingFiles').innerHTML           = '';
    document.getElementById('uploadProgress').style.display     = 'none';
    document.getElementById('uploadSection').style.display      = S.userPerm >= 4 ? 'block' : 'none';
    document.getElementById('btnSaveNote').disabled             = false;
    document.getElementById('btnSaveNote').textContent          = '儲存';
    openModal('noteModal');
    setTimeout(function() { document.getElementById('noteTitle').focus(); }, 100);

  async function openEditModal(noteId) {
    S.editingNoteId = noteId;
    S.pendingFiles  = [];
    document.getElementById('noteModalTitle').textContent       = '✏️ 編輯記事';
    document.getElementById('noteTitle').value                  = '';
    document.getElementById('noteContent').value                = '';
    document.getElementById('pendingFiles').innerHTML           = '';
    document.getElementById('uploadProgress').style.display     = 'none';
    document.getElementById('uploadSection').style.display      = S.userPerm >= 4 ? 'block' : 'none';
    document.getElementById('btnSaveNote').disabled             = true;
    document.getElementById('btnSaveNote').textContent          = '載入中...';
    openModal('noteModal');
    try {
      const res = await gasGet({ action:'getNoteDetail', noteId:noteId });
      if (!res.success) {
        toast(res.message, 'error');
        closeModal('noteModal');
        return;
      }
      document.getElementById('noteTitle').value   =
        res.data.title.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>');
      document.getElementById('noteContent').value = res.data.content || '';
    } catch(err) {
      toast('載入記事失敗：' + err.message, 'error');
      closeModal('noteModal');
    } finally {
      document.getElementById('btnSaveNote').disabled    = false;
      document.getElementById('btnSaveNote').textContent = '儲存';
    }
  }

  async function saveNote() {
    const title   = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    if (!title) {
      toast('請輸入標題', 'error');
      document.getElementById('noteTitle').focus();
      return;
    }
    const btn = document.getElementById('btnSaveNote');
    btn.disabled    = true;
    btn.textContent = '儲存中...';
    try {
      let noteId = S.editingNoteId;
      if (!noteId) {
        const res = await gasGet({
          action: 'createNote', token: S.accessToken, title: title, content: content,
        });
        if (!res.success) { toast(res.message, 'error'); return; }
        noteId = res.data.noteId;
        toast('記事新增成功 🎉');
      } else {
        const res = await gasGet({
          action: 'updateNote', token: S.accessToken,
          noteId: noteId, title: title, content: content,
        });
        if (!res.success) { toast(res.message, 'error'); return; }
        toast('記事更新成功 ✅');
      }
      if (S.pendingFiles.length > 0) await uploadPendingFiles(noteId);
      closeModal('noteModal');
      await loadNotes();
    } catch(err) {
      toast('操作失敗：' + err.message, 'error');
    } finally {
      btn.disabled    = false;
      btn.textContent = '儲存';
    }
  }

  function confirmDelete(noteId, title) {
    document.getElementById('confirmMsg').textContent =
      '確定要刪除記事「' + title + '」嗎？此操作可由管理員還原。';
    document.getElementById('btnConfirmOk').onclick = function() { deleteNote(noteId); };
    openModal('confirmModal');
  }

  async function deleteNote(noteId) {
    closeModal('confirmModal');
    try {
      const res = await gasGet({ action:'deleteNote', token:S.accessToken, noteId:noteId });
      if (!res.success) { toast(res.message, 'error'); return; }
      toast('記事已刪除 🗑');
      await loadNotes();
    } catch(err) {
      toast('刪除失敗：' + err.message, 'error');
    }
  }

  async function openDetailModal(noteId) {
    document.getElementById('detailTitle').textContent = '載入中...';
    document.getElementById('detailBody').innerHTML    =
      '<div class="loading"><div class="spinner"></div></div>';
    document.getElementById('detailFooter').innerHTML  = '';
    openModal('detailModal');
    try {
      const res = await gasGet({
        action    : 'getNoteDetail',
        noteId    : noteId,
        deviceInfo: navigator.userAgent.slice(0, 80),
      });
      if (!res.success) {
        document.getElementById('detailBody').innerHTML =
          '<p style="color:var(--danger)">' + res.message + '</p>';
        return;
      }
      renderDetailModal(res.data);
    } catch(err) {
      document.getElementById('detailBody').innerHTML =
        '<p style="color:var(--danger)">載入失敗：' + err.message + '</p>';
    }
  }

  function renderDetailModal(note) {
    document.getElementById('detailTitle').textContent = note.title;

    const safeContent = (typeof DOMPurify !== 'undefined')
      ? DOMPurify.sanitize(note.content || '（無內容）')
      : (note.content || '（無內容）').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const attachHtml = (note.attachments && note.attachments.length)
      ? '<div class="attachments-section">' +
          '<div class="attachments-title">📎 附件（' + note.attachments.length + ' 個）</div>' +
          note.attachments.map(function(a) {
            return '<div class="attachment-item">' +
              '<span class="attachment-icon">' + fileIcon(a.fileType) + '</span>' +
              '<span class="attachment-name" title="' + a.fileName + '">' + a.fileName + '</span>' +
              '<div class="attachment-actions">' +
                '<button class="btn-preview" onclick="App.previewFile(\'' +
                  a.fileId + '\',\'' + a.fileName.replace(/'/g,"\\'") + '\',\'' +
                  a.fileType + '\',\'' + a.driveFileId + '\')">' +
                  '👁 預覽</button>' +
                (note.canDownload
                  ? '<button class="btn-download" onclick="App.downloadFile(\'' +
                      a.fileId + '\')">⬇️ 下載</button>' : '') +
              '</div>' +
            '</div>';
          }).join('') +
        '</div>'
      : '';

    document.getElementById('detailBody').innerHTML =
      '<div class="detail-meta">' +
        '<span>✍️ ' + note.authorName + '</span>' +
        '<span>📅 建立：' + fmtDate(note.createdAt) + '</span>' +
        '<span>🔄 更新：' + fmtDate(note.updatedAt) + '</span>' +
        '<span>👁 ' + (note.viewCount||0) + ' 次觀看</span>' +
      '</div>' +
      '<div class="detail-content">' + safeContent + '</div>' +
      attachHtml;

    const footer = document.getElementById('detailFooter');
    footer.innerHTML = '';
    if (note.canViewLog) {
      const btnLog = document.createElement('button');
      btnLog.className   = 'btn-secondary';
      btnLog.textContent = '👥 觀看名單';
      btnLog.onclick     = function() { openViewLogModal(note.noteId); };
      footer.appendChild(btnLog);
    }
    if (note.canEdit) {
      const btnEdit = document.createElement('button');
      btnEdit.className   = 'btn-primary';
      btnEdit.textContent = '✏️ 編輯';
      btnEdit.onclick     = function() {
        closeModal('detailModal');
        openEditModal(note.noteId);
      };
      footer.appendChild(btnEdit);
    }
  }

  // ══════════════════════════════════════════════════════════
  // 檔案上傳
  // ══════════════════════════════════════════════════════════

  function handleFileSelect(event) {
    Array.from(event.target.files).forEach(function(file) {
      if (file.size > 10*1024*1024) {
        toast(file.name + ' 超過 10MB 限制', 'error');
        return;
      }
      S.pendingFiles.push(file);
    });
    renderPendingFiles();
    event.target.value = '';
  }

  function handleFileDrop(event) {
    event.preventDefault();
    document.getElementById('uploadZone').classList.remove('drag-over');
    Array.from(event.dataTransfer.files).forEach(function(file) {
      if (file.size > 10*1024*1024) {
        toast(file.name + ' 超過 10MB 限制', 'error');
        return;
      }
      S.pendingFiles.push(file);
    });
    renderPendingFiles();
  }

  function renderPendingFiles() {
    document.getElementById('pendingFiles').innerHTML =
      S.pendingFiles.map(function(f, i) {
        return '<div class="attachment-item">' +
          '<span class="attachment-icon">' + fileIcon(f.type) + '</span>' +
          '<span class="attachment-name">' + f.name +
            ' <span style="color:var(--text-sub)">(' + fmtSize(f.size) + ')</span></span>' +
          '<button onclick="App.removePendingFile(' + i + ')" ' +
            'style="padding:2px 8px;border:none;background:#FFEBEE;' +
            'color:var(--danger);border-radius:4px;cursor:pointer">✕</button>' +
        '</div>';
      }).join('');
  }

  function removePendingFile(index) {
    S.pendingFiles.splice(index, 1);
    renderPendingFiles();
  }

  function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader   = new FileReader();
      reader.onload  = function(e) { resolve(e.target.result); };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadPendingFiles(noteId) {
    const progressDiv  = document.getElementById('uploadProgress');
    const progressFill = document.getElementById('progressFill');
    const fileNameEl   = document.getElementById('uploadFileName');
    progressDiv.style.display = 'block';

    for (let i = 0; i < S.pendingFiles.length; i++) {
      const file = S.pendingFiles[i];
      fileNameEl.textContent   = '上傳中：' + file.name +
        ' (' + (i+1) + '/' + S.pendingFiles.length + ')';
      progressFill.style.width = '0%';
      try {
        const base64 = await fileToBase64(file);
        progressFill.style.width = '50%';
        const res = await gasPost({
          action    : 'uploadFile',
          noteId    : noteId,
          fileName  : file.name,
          fileType  : file.type,
          fileBase64: base64,
        });
        progressFill.style.width = '100%';
        toast(
          res.success ? file.name + ' 上傳成功 ✅' : file.name + ' 上傳失敗：' + res.message,
          res.success ? 'success' : 'error'
        );
      } catch(err) {
        toast(file.name + ' 上傳失敗：' + err.message, 'error');
      }
    }
    S.pendingFiles = [];
    renderPendingFiles();
    progressDiv.style.display = 'none';
  }

  // ══════════════════════════════════════════════════════════
  // 檔案預覽 / 下載
  // ══════════════════════════════════════════════════════════

  async function previewFile(fileId, fileName, fileType, driveFileId) {
    document.getElementById('previewTitle').textContent = fileName;
    document.getElementById('previewBody').innerHTML    =
      '<div class="loading" style="padding:40px"><div class="spinner"></div></div>';
    openModal('previewModal');
    try { await gasGet({ action:'getFilePreview', fileId:fileId }); } catch(e) {}

    const previewUrl = 'https://drive.google.com/file/d/' + driveFileId + '/preview';
    if (fileType && fileType.startsWith('image/')) {
      const imgUrl = 'https://drive.google.com/uc?export=view&id=' + driveFileId;
      document.getElementById('previewBody').innerHTML =
        '<img class="preview-img" src="' + imgUrl + '" alt="' + fileName + '" ' +
        'onerror="this.style.display=\'none\';' +
        'document.getElementById(\'previewFallback\').style.display=\'block\'">' +
        '<iframe id="previewFallback" class="preview-iframe" src="' +
        previewUrl + '" style="display:none"></iframe>';
    } else if (fileType && fileType.startsWith('video/')) {
      document.getElementById('previewBody').innerHTML =
        '<video class="preview-video" controls>' +
        '<source src="' + previewUrl + '">您的瀏覽器不支援影片播放</video>';
    } else {
      document.getElementById('previewBody').innerHTML =
        '<iframe class="preview-iframe" src="' + previewUrl + '" allowfullscreen></iframe>';
    }
  }

  async function downloadFile(fileId) {
    try {
      const res = await gasGet({ action:'downloadFile', fileId:fileId });
      if (!res.success) { toast(res.message, 'error'); return; }
      window.open(res.data.downloadUrl, '_blank');
    } catch(err) {
      toast('下載失敗：' + err.message, 'error');
    }
  }

  // ══════════════════════════════════════════════════════════
  // 管理員後台
  // ══════════════════════════════════════════════════════════

  async function openAdminModal() {
    openModal('adminModal');
    await adminLoadUsers();
  }

  function switchAdminTab(tab) {
    document.querySelectorAll('.admin-tab').forEach(function(t) {
      t.classList.remove('active');
    });
    document.querySelector('[data-tab="' + tab + '"]').classList.add('active');
    document.getElementById('adminTabUsers').style.display   = tab === 'users'   ? 'block' : 'none';
    document.getElementById('adminTabDeleted').style.display = tab === 'deleted' ? 'block' : 'none';
    if (tab === 'deleted') adminLoadDeleted();
  }

  async function adminLoadUsers() {
    setLoading('adminUserList');
    try {
      const res = await gasGet({ action:'getAllUsers' });
      if (!res.success) {
        document.getElementById('adminUserList').innerHTML =
          '<p style="color:var(--danger)">' + res.message + '</p>';
        return;
      }
      S.allUsers = res.data.users || [];
      renderAdminUserList(S.allUsers);
    } catch(err) {
      document.getElementById('adminUserList').innerHTML =
        '<p style="color:var(--danger)">載入失敗：' + err.message + '</p>';
    }
  }

  function adminFilterUsers() {
    const kw = document.getElementById('adminSearchUser').value.trim().toLowerCase();
    const filtered = kw
      ? S.allUsers.filter(function(u) {
          return (u.displayName||'').toLowerCase().includes(kw) ||
                 (u.userId||'').toLowerCase().includes(kw);
        })
      : S.allUsers;
    renderAdminUserList(filtered);
  }

  function renderAdminUserList(users) {
    const container = document.getElementById('adminUserList');
    if (!users || !users.length) {
      container.innerHTML =
        '<p style="color:var(--text-sub);text-align:center;padding:16px">尚無使用者資料</p>';
      return;
    }
    container.innerHTML = users.map(function(u) {
      const perm = Number(u.permissionLevel) || 0;
      return '<div class="user-row">' +
        '<div style="font-size:1.5rem">' + ['🚫','👁','✏️','⬇️','⬆️'][perm] + '</div>' +
        '<div class="user-row-info">' +
          '<div class="user-row-name">' + (u.displayName || '未命名') + '</div>' +
          '<div class="user-row-id">'   + u.userId + '</div>' +
        '</div>' +
        '<select class="perm-select" id="perm_' + u.userId + '">' +
          [0,1,2,3,4].map(function(v) {
            return '<option value="' + v + '"' + (v === perm ? ' selected' : '') + '>' +
              v + ' — ' + ['禁止','檢視','編輯','下載','上傳'][v] + '</option>';
          }).join('') +
        '</select>' +
        '<button class="btn-save-perm" onclick="App.adminSaveUserPerm(\'' +
          u.userId + '\',\'' + (u.displayName||'').replace(/'/g,"\\'") + '\')">儲存</button>' +
      '</div>';
    }).join('');
  }

  async function adminSaveUserPerm(targetUserId, displayName) {
    const sel  = document.getElementById('perm_' + targetUserId);
    const perm = sel ? sel.value : '1';
    try {
      const res = await gasGet({
        action          : 'updatePermission',
        token           : S.accessToken,
        targetUserId    : targetUserId,
        targetDisplayName: displayName,
        permissionLevel : perm,
      });
      toast(res.success ? '權限已更新 ✅' : res.message, res.success ? 'success' : 'error');
      if (res.success) await adminLoadUsers();
    } catch(err) {
      toast('更新失敗：' + err.message, 'error');
    }
  }

  async function adminUpdatePermission() {
    const targetUserId  = document.getElementById('adminUserId').value.trim();
    const displayName   = document.getElementById('adminDisplayName').value.trim();
    const permLevel     = document.getElementById('adminPermLevel').value;
    const note          = document.getElementById('adminNote').value.trim();
    if (!targetUserId) { toast('請輸入 LINE userId', 'error'); return; }
    try {
      const res = await gasGet({
        action           : 'updatePermission',
        token            : S.accessToken,
        targetUserId     : targetUserId,
        targetDisplayName: displayName,
        permissionLevel  : permLevel,
        note             : note,
      });
      toast(res.success ? '權限設定成功 ✅' : res.message, res.success ? 'success' : 'error');
      if (res.success) {
        document.getElementById('adminUserId').value      = '';
        document.getElementById('adminDisplayName').value = '';
        document.getElementById('adminNote').value        = '';
        document.getElementById('adminPermLevel').value   = '2';
        await adminLoadUsers();
      }
    } catch(err) {
      toast('操作失敗：' + err.message, 'error');
    }
  }

  async function adminLoadDeleted() {
    setLoading('adminDeletedList');
    try {
      const res = await gasGet({ action:'getNotes', includeDeleted:'true' });
      if (!res.success) {
        document.getElementById('adminDeletedList').innerHTML =
          '<p style="color:var(--danger)">' + res.message + '</p>';
        return;
      }
      const notes = res.data.notes || [];
      if (!notes.length) {
        document.getElementById('adminDeletedList').innerHTML =
          '<p style="color:var(--text-sub);text-align:center;padding:20px">沒有已刪除的記事</p>';
        return;
      }
      document.getElementById('adminDeletedList').innerHTML =
        notes.map(function(n) {
          return '<div class="deleted-card">' +
            '<div class="deleted-card-title">🗑 ' + n.title + '</div>' +
            '<div class="deleted-card-meta">' +
              '✍️ ' + n.authorName + '　📅 ' + fmtDate(n.updatedAt) +
            '</div>' +
            '<button class="btn-restore" onclick="App.adminRestoreNote(\'' +
              n.noteId + '\')">♻️ 還原</button>' +
          '</div>';
        }).join('');
    } catch(err) {
      document.getElementById('adminDeletedList').innerHTML =
        '<p style="color:var(--danger)">載入失敗：' + err.message + '</p>';
    }
  }

  async function adminRestoreNote(noteId) {
    try {
      const res = await gasGet({ action:'restoreNote', token:S.accessToken, noteId:noteId });
      toast(res.success ? '記事已還原 ♻️' : res.message, res.success ? 'success' : 'error');
      if (res.success) adminLoadDeleted();
    } catch(err) {
      toast('還原失敗：' + err.message, 'error');
    }
  }

  // ══════════════════════════════════════════════════════════
  // 初始化
  // ══════════════════════════════════════════════════════════

  document.addEventListener('DOMContentLoaded', function() {
    initLiff();
  });

  // ── 公開 API ─────────────────────────────────────────────
  return {
    loadNotes        : loadNotes,
    searchNotes      : searchNotes,
    openCreateModal  : openCreateModal,
    openEditModal    : openEditModal,
    saveNote         : saveNote,
    confirmDelete    : confirmDelete,
    openDetailModal  : openDetailModal,
    openViewLogModal : openViewLogModal,
    handleFileSelect : handleFileSelect,
    handleFileDrop   : handleFileDrop,
    removePendingFile: removePendingFile,
    previewFile      : previewFile,
    downloadFile     : downloadFile,
    openAdminModal   : openAdminModal,
    switchAdminTab   : switchAdminTab,
    adminFilterUsers : adminFilterUsers,
    adminSaveUserPerm: adminSaveUserPerm,
    adminUpdatePermission: adminUpdatePermission,
    adminRestoreNote : adminRestoreNote,
    closeModal       : closeModal,
  };
})();
</script>
</body>
</html>
