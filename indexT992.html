<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網路記事本</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary:#06C755;--primary-dark:#05a847;--secondary:#1a1a2e;
      --accent:#e94560;--bg:#f0f2f5;--card:#ffffff;--text:#2d3436;
      --text-muted:#636e72;--border:#dfe6e9;--shadow:0 2px 12px rgba(0,0,0,0.08);
      --radius:12px;--admin-color:#e74c3c;--mod-color:#e67e22;
      --vip-color:#9b59b6;--user-color:#3498db;--guest-color:#95a5a6;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .navbar{background:linear-gradient(135deg,var(--secondary),#16213e);color:white;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.3);}
    .navbar-brand{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .navbar-brand i{color:var(--primary);}
    .navbar-actions{display:flex;align-items:center;gap:8px;}
    .btn-icon{background:none;border:none;color:white;cursor:pointer;padding:8px;border-radius:8px;font-size:18px;transition:background 0.2s;}
    .btn-icon:hover{background:rgba(255,255,255,0.1);}
    .user-bar{background:var(--card);padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);}
    .user-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--primary);}
    .user-info{flex:1;}
    .user-name{font-weight:600;font-size:14px;}
    .user-role-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;color:white;margin-top:2px;}
    .role-admin{background:var(--admin-color);}.role-mod{background:var(--mod-color);}
    .role-vip{background:var(--vip-color);}.role-user{background:var(--user-color);}.role-guest{background:var(--guest-color);}
    .tabs{display:flex;background:var(--card);border-bottom:2px solid var(--border);overflow-x:auto;}
    .tab-btn{flex:1;min-width:70px;padding:12px 8px;background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-muted);display:flex;flex-direction:column;align-items:center;gap:4px;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
    .tab-btn i{font-size:18px;}
    .tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600;}
    .main-content{padding:16px;max-width:800px;margin:0 auto;}
    .page{display:none;}.page.active{display:block;}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
    .card-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-weight:600;}
    .card-body{padding:16px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.2s;text-decoration:none;}
    .btn-primary{background:var(--primary);color:white;}.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);}
    .btn-danger{background:var(--accent);color:white;}
    .btn-warning{background:#f39c12;color:white;}
    .btn-info{background:#3498db;color:white;}
    .btn-outline{background:none;border:2px solid var(--border);color:var(--text);}
    .btn-outline:hover{border-color:var(--primary);color:var(--primary);}
    .btn-sm{padding:6px 12px;font-size:12px;}
    .btn-full{width:100%;justify-content:center;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-muted);}
    .form-control{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px;transition:border 0.2s;background:var(--bg);}
    .form-control:focus{outline:none;border-color:var(--primary);background:white;}
    textarea.form-control{resize:vertical;min-height:120px;}
    select.form-control{cursor:pointer;}
    .article-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;transition:transform 0.2s;cursor:pointer;}
    .article-card:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,0.12);}
    .article-card-body{padding:14px 16px;}
    .article-title{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text);}
    .article-summary{font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:10px;}
    .article-meta{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text-muted);flex-wrap:wrap;}
    .article-tag{display:inline-block;padding:2px 8px;background:#e8f5e9;color:var(--primary);border-radius:20px;font-size:11px;margin-right:4px;}
    .visibility-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;}
    .vis-public{background:#e8f5e9;color:#27ae60;}.vis-private{background:#fce4ec;color:#e91e63;}.vis-vip{background:#f3e5f5;color:#9c27b0;}
    .search-bar{display:flex;gap:8px;margin-bottom:16px;}
    .search-bar .form-control{flex:1;}
    .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text-muted);flex-direction:column;gap:12px;}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .toast-container{position:fixed;top:70px;right:16px;z-index:9999;}
    .toast{background:var(--secondary);color:white;padding:12px 18px;border-radius:10px;margin-bottom:8px;font-size:14px;display:flex;align-items:center;gap:8px;animation:slideIn 0.3s ease;box-shadow:var(--shadow);max-width:280px;}
    .toast.success{border-left:4px solid var(--primary);}.toast.error{border-left:4px solid var(--accent);}.toast.info{border-left:4px solid #3498db;}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:none;align-items:flex-end;justify-content:center;}
    .modal-overlay.active{display:flex;}
    .modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;padding:20px;animation:slideUp 0.3s ease;}
    @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
    .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
    .modal-title{font-size:18px;font-weight:700;}
    .modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-muted);}
    .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
    .stat-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
    .stat-number{font-size:28px;font-weight:800;color:var(--primary);}
    .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
    .file-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:8px;}
    .file-icon{font-size:24px;width:32px;text-align:center;}
    .file-info{flex:1;}
    .file-name{font-size:13px;font-weight:600;}
    .file-size{font-size:11px;color:var(--text-muted);}
    .file-actions{display:flex;gap:6px;}
    .login-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:32px;text-align:center;}
    .login-logo{font-size:64px;margin-bottom:16px;}
    .login-title{font-size:24px;font-weight:800;margin-bottom:8px;}
    .login-subtitle{color:var(--text-muted);margin-bottom:32px;line-height:1.6;}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
    .empty-state i{font-size:48px;margin-bottom:12px;display:block;}
    .pagination{display:flex;justify-content:center;gap:8px;margin-top:16px;}
    .page-btn{width:36px;height:36px;border-radius:8px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .page-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
    .page-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}
    .article-content{line-height:1.8;font-size:15px;white-space:pre-wrap;}
    .article-detail-title{font-size:22px;font-weight:800;margin-bottom:8px;}
    .article-detail-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:13px;color:var(--text-muted);margin-bottom:16px;}
    .upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg);}
    .upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:#e8f5e9;}
    .upload-zone i{font-size:32px;color:var(--text-muted);margin-bottom:8px;display:block;}
    .user-row{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);}
    .user-row:last-child{border-bottom:none;}
    .user-row-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;}
    .user-row-info{flex:1;}
    .user-row-name{font-size:13px;font-weight:600;}
    .user-row-real{font-size:11px;color:var(--text-muted);}
    .preview-frame{width:100%;height:400px;border:none;border-radius:8px;background:#f8f9fa;}
    .preview-img{max-width:100%;border-radius:8px;display:block;margin:0 auto;}
    .top-article-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
    .top-article-item:last-child{border-bottom:none;}
    .top-rank{width:28px;height:28px;border-radius:50%;background:var(--primary);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
    .top-rank.rank-1{background:#f1c40f;}.top-rank.rank-2{background:#95a5a6;}.top-rank.rank-3{background:#cd7f32;}
    .category-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;}
    .cat-btn{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:12px;white-space:nowrap;transition:all 0.2s;}
    .cat-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
    .divider{height:1px;background:var(--border);margin:16px 0;}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
    .badge-success{background:#e8f5e9;color:#27ae60;}
    .badge-warning{background:#fff3cd;color:#856404;}
    .badge-danger{background:#fce4ec;color:#c0392b;}
    .read-count-bar{height:4px;background:var(--border);border-radius:2px;margin-top:4px;}
    .read-count-fill{height:100%;background:var(--primary);border-radius:2px;transition:width 0.5s;}
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ===== 導覽列 ===== -->
<nav class="navbar" id="navbar" style="display:none">
  <div class="navbar-brand">
    <i class="fas fa-book-open"></i>
    <span id="appName">網路記事本</span>
  </div>
  <div class="navbar-actions">
    <button class="btn-icon" onclick="switchTab('write')" id="btnWrite" style="display:none" title="寫文章">
      <i class="fas fa-pen"></i>
    </button>
    <button class="btn-icon" onclick="switchTab('admin')" id="btnAdmin" style="display:none" title="管理">
      <i class="fas fa-cog"></i>
    </button>
  </div>
</nav>

<!-- ===== 使用者資訊列 ===== -->
<div class="user-bar" id="userBar" style="display:none">
  <img id="userAvatar" class="user-avatar" src="https://via.placeholder.com/40" alt="avatar">
  <div class="user-info">
    <div class="user-name" id="userName">載入中...</div>
    <span class="user-role-badge role-guest" id="userRoleBadge">遊客</span>
  </div>
  <button class="btn btn-outline btn-sm" onclick="switchTab('profile')">
    <i class="fas fa-user-edit"></i> 資料
  </button>
</div>

<!-- ===== 頁籤列 ===== -->
<div class="tabs" id="mainTabs" style="display:none">
  <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">
    <i class="fas fa-home"></i><span>首頁</span>
  </button>
  <button class="tab-btn" onclick="switchTab('articles')" id="tab-articles">
    <i class="fas fa-newspaper"></i><span>文章</span>
  </button>
  <button class="tab-btn" onclick="switchTab('write')" id="tab-write">
    <i class="fas fa-pen-nib"></i><span>撰寫</span>
  </button>
  <button class="tab-btn" onclick="switchTab('stats')" id="tab-stats">
    <i class="fas fa-chart-bar"></i><span>統計</span>
  </button>
  <button class="tab-btn" onclick="switchTab('admin')" id="tab-admin" style="display:none">
    <i class="fas fa-shield-alt"></i><span>管理</span>
  </button>
</div>

<!-- ===== 主內容 ===== -->
<div class="main-content">

  <!-- ① 登入頁 -->
  <div id="page-login" class="page active">
    <div class="login-page">
      <div class="login-logo">📓</div>
      <h1 class="login-title">網路記事本</h1>
      <p class="login-subtitle">
        使用 LINE 帳號登入<br>享受完整記事本功能<br>
        <small style="font-size:11px">支援文章發布・檔案上傳・閱讀統計</small>
      </p>
      <button class="btn btn-primary btn-full" onclick="initLiff()" style="max-width:280px">
        <i class="fab fa-line"></i> 使用 LINE 登入
      </button>
      <button class="btn btn-outline btn-full" onclick="guestMode()" style="max-width:280px;margin-top:12px">
        <i class="fas fa-eye"></i> 以遊客身份瀏覽
      </button>
    </div>
  </div>

  <!-- ② 實名制註冊頁 -->
  <div id="page-register" class="page">
    <div class="card">
      <div class="card-header">
        <span><i class="fas fa-id-card" style="color:var(--primary)"></i> 實名制登記</span>
        <span class="badge badge-warning"><i class="fas fa-lock"></i> 首次登入</span>
      </div>
      <div class="card-body">
        <p style="color:var(--text-muted);font-size:13px;margin-bottom:20px;line-height:1.6;background:#fff3cd;padding:10px;border-radius:8px;">
          <i class="fas fa-info-circle"></i>
          首次使用需完成實名登記，資料僅供系統識別使用，不對外公開。
        </p>
        <div class="form-group">
          <label class="form-label"><i class="fab fa-line"></i> LINE 顯示名稱</label>
          <input type="text" class="form-control" id="regDisplayName" readonly style="background:#f8f9fa">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-user"></i> 真實姓名 <span style="color:red">*</span></label>
          <input type="text" class="form-control" id="regRealName" placeholder="請輸入您的真實姓名">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-envelope"></i> 電子郵件</label>
          <input type="email" class="form-control" id="regEmail" placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label class="form-label"><i class="fas fa-phone"></i> 手機號碼</label>
          <input type="tel" class="form-control" id="regPhone" placeholder="09xx-xxxxxx">
        </div>
        <button class="btn btn-primary btn-full" onclick="submitRegister()">
          <i class="fas fa-check-circle"></i> 完成登記並進入
        </button>
      </div>
    </div>
  </div>

  <!-- ③ 首頁 -->
  <div id="page-home" class="page">
    <!-- 歡迎橫幅 -->
    <div class="card" style="background:linear-gradient(135deg,var(--secondary),#16213e);color:white;margin-bottom:16px">
      <div class="card-body" style="padding:20px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:40px">📓</div>
          <div>
            <div style="font-size:18px;font-weight:800" id="homeWelcome">歡迎回來！</div>
            <div style="font-size:13px;opacity:0.8;margin-top:4px" id="homeSubtitle">今天想記錄什麼？</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 快速統計 -->
    <div class="stats-grid" style="margin-bottom:16px">
      <div class="stat-card">
        <div class="stat-number" id="homeStatArticles">-</div>
        <div class="stat-label"><i class="fas fa-newspaper"></i> 篇文章</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="homeStatReads">-</div>
        <div class="stat-label"><i class="fas fa-eye"></i> 總閱讀數</div>
      </div>
    </div>

    <!-- 最新文章 -->
    <div class="card">
      <div class="card-header">
        <span><i class="fas fa-fire" style="color:#e74c3c"></i> 最新文章</span>
        <button class="btn btn-outline btn-sm" onclick="switchTab('articles')">
          查看全部 <i class="fas fa-arrow-right"></i>
        </button>
      </div>
      <div class="card-body" id="homeLatestArticles">
        <div class="loading"><div class="spinner"></div><span>載入中...</span></div>
      </div>
    </div>

    <!-- 熱門文章 -->
    <div class="card" id="homeHotCard" style="display:none">
      <div class="card-header">
        <span><i class="fas fa-trophy" style="color:#f1c40f"></i> 熱門排行</span>
      </div>
      <div class="card-body" id="homeHotArticles"></div>
    </div>
  </div>

  <!-- ④ 文章列表頁 -->
  <div id="page-articles" class="page">
    <!-- 搜尋列 -->
    <div class="search-bar">
      <input type="text" class="form-control" id="searchInput" placeholder="🔍 搜尋文章標題、作者、標籤...">
      <button class="btn btn-primary btn-sm" onclick="doSearch()">
        <i class="fas fa-search"></i>
      </button>
    </div>

    <!-- 分類篩選 -->
    <div class="category-filter" id="categoryFilter">
      <button class="cat-btn active" onclick="filterCategory('',this)">全部</button>
      <button class="cat-btn" onclick="filterCategory('技術',this)">技術</button>
      <button class="cat-btn" onclick="filterCategory('生活',this)">生活</button>
      <button class="cat-btn" onclick="filterCategory('學習',this)">學習</button>
      <button class="cat-btn" onclick="filterCategory('工作',this)">工作</button>
      <button class="cat-btn" onclick="filterCategory('其他',this)">其他</button>
    </div>

    <!-- 文章列表容器 -->
    <div id="articleList">
      <div class="loading"><div class="spinner"></div><span>載入文章中...</span></div>
    </div>

    <!-- 分頁 -->
    <div class="pagination" id="articlePagination"></div>
  </div>

  <!-- ⑤ 撰寫文章頁 -->
  <div id="page-write" class="page">
    <div class="card">
      <div class="card-header">
        <span><i class="fas fa-pen-nib" style="color:var(--primary)"></i> <span id="writePageTitle">撰寫新文章</span></span>
        <span class="badge badge-success" id="writeDraftBadge" style="display:none">草稿已儲存</span>
      </div>
      <div class="card-body">
        <input type="hidden" id="editArticleId">

        <div class="form-group">
          <label class="form-label"><i class="fas fa-heading"></i> 文章標題 *</label>
          <input type="text" class="form-control" id="articleTitle" placeholder="請輸入文章標題（最多 100 字）" maxlength="100">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label"><i class="fas fa-folder"></i> 分類</label>
            <select class="form-control" id="articleCategory">
              <option value="未分類">未分類</option>
              <option value="技術">技術</option>
              <option value="生活">生活</option>
              <option value="學習">學習</option>
              <option value="工作">工作</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label"><i class="fas fa-eye"></i> 可見度</label>
            <select class="form-control" id="articleVisibility">
              <option value="public">🌐 公開</option>
              <option value="vip">👑 VIP 限定</option>
              <option value="private">🔒 私人</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-tags"></i> 標籤（逗號分隔）</label>
          <input type="text" class="form-control" id="articleTags" placeholder="例：技術, GAS, LINE">
        </div>

        <div class="form-group">
          <label class="form-label"><i class="fas fa-align-left"></i> 文章內容 *</label>
          <textarea class="form-control" id="articleContent" placeholder="請輸入文章內容..." style="min-height:200px"></textarea>

      <a id="previewDownloadBtn" href="#" target="_blank" class="btn btn-primary btn-full">

    <div class="modal-header">

      <button class="modal-close" onclick="closeModal('roleModal')">×</button>
    </div>
    <div id="roleModalContent"></div>
  </div>

<script>
// ============================================================
// 全域變數
// ============================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwGU5xHRCpY3RpFwtSh540zud0V45FDHR3yi7WC8PIx1c-sUNd9cbGQ1Taydy0lgxSnpg/exec'; // ← 替換為你的 GAS 部署網址
let APP_CONFIG = {};
let currentUser = null;
let currentToken = localStorage.getItem('nb_token') || null;
let currentPage = 1;
let currentCategory = '';
let currentSearchKeyword = '';
let pendingFiles = []; // 待上傳的檔案列表
let editingArticleId = null;

// ============================================================
// 初始化
// ============================================================
window.onload = function() {
  try {
    APP_CONFIG = JSON.parse('<?= config ?>');
  } catch(e) {
    APP_CONFIG = { liffId: '', appName: '網路記事本' };
  }
  document.getElementById('appName').textContent = APP_CONFIG.appName || '網路記事本';

  // 若有 token 嘗試自動登入
  if (currentToken) {
    autoLogin();
  }
};

// ============================================================
// LIFF 初始化
// ============================================================
async function initLiff() {
  showToast('正在連接 LINE...', 'info');
  try {
    await liff.init({ liffId: APP_CONFIG.liffId });
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }
    const profile = await liff.getProfile();
    const idToken  = liff.getIDToken();
    // 進入實名制登記流程
    showRegisterPage(profile, idToken);
  } catch(err) {
    showToast('LIFF 初始化失敗：' + err.message, 'error');
    console.error(err);
  }
}

// ============================================================
// 顯示實名制登記頁
// ============================================================
function showRegisterPage(profile, idToken) {
  window._pendingProfile = profile;
  window._pendingIdToken = idToken;
  document.getElementById('regDisplayName').value = profile.displayName || '';
  showPage('register');
}

// ============================================================
// 提交實名制登記
// ============================================================
async function submitRegister() {
  const realName = document.getElementById('regRealName').value.trim();
  if (!realName) { showToast('請輸入真實姓名', 'error'); return; }

  const profile = window._pendingProfile;
  const payload = {
    action: 'registerUser',
    lineUserId:   profile.userId,
    displayName:  profile.displayName,
    pictureUrl:   profile.pictureUrl,
    realName:     realName,
    email:        document.getElementById('regEmail').value.trim(),
    phone:        document.getElementById('regPhone').value.trim(),
    idToken:      window._pendingIdToken
  };

  showToast('登記中...', 'info');
  const res = await apiPost(payload);
  if (res.success) {
    currentToken = res.token;
    currentUser  = res.user;
    localStorage.setItem('nb_token', currentToken);
    showToast(res.isNewUser ? '🎉 歡迎加入！' : '✅ 登入成功！', 'success');
    enterApp();
  } else {
    showToast(res.message, 'error');
  }
}

// ============================================================
// 遊客模式
// ============================================================
function guestMode() {
  currentUser = { role: 'guest', displayName: '遊客', pictureUrl: '' };
  currentToken = null;
  enterApp();
}

// ============================================================
// 自動登入（Token 驗證）
// ============================================================
async function autoLogin() {
  const res = await apiPost({ action: 'getUserProfile', token: currentToken });
  if (res.success) {
    currentUser = res.user;
    enterApp();
  } else {
    currentToken = null;
    localStorage.removeItem('nb_token');
  }
}

// ============================================================
// 進入應用程式
// ============================================================
function enterApp() {
  // 顯示導覽
  document.getElementById('navbar').style.display = 'flex';
  document.getElementById('userBar').style.display = 'flex';
  document.getElementById('mainTabs').style.display = 'flex';

  // 更新使用者資訊列
  const u = currentUser;
  document.getElementById('userName').textContent = u.displayName || '遊客';
  if (u.pictureUrl) document.getElementById('userAvatar').src = u.pictureUrl;

  const roleMap = {
    admin: { label:'管理者', cls:'role-admin' },
    mod:   { label:'版主',   cls:'role-mod'   },
    vip:   { label:'VIP',    cls:'role-vip'   },
    user:  { label:'一般使用者', cls:'role-user' },
    guest: { label:'遊客',   cls:'role-guest' }
  };
  const rm = roleMap[u.role] || roleMap.guest;
  const badge = document.getElementById('userRoleBadge');
  badge.textContent = rm.label;
  badge.className = 'user-role-badge ' + rm.cls;

  // 管理者/版主顯示管理頁籤
  if (['admin','mod'].includes(u.role)) {
    document.getElementById('tab-admin').style.display = 'flex';
    document.getElementById('btnAdmin').style.display = 'flex';
  }
  // 非遊客顯示撰寫按鈕
  if (u.role !== 'guest') {
    document.getElementById('btnWrite').style.display = 'flex';
  }

  switchTab('home');
}

// ============================================================
// 頁籤切換
// ============================================================
function switchTab(tab) {
  // 隱藏所有頁面
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  const pageEl = document.getElementById('page-' + tab);
  const tabEl  = document.getElementById('tab-' + tab);
  if (pageEl) pageEl.classList.add('active');
  if (tabEl)  tabEl.classList.add('active');

  // 各頁面載入邏輯
  if (tab === 'home')     loadHome();
  if (tab === 'articles') loadArticles();
  if (tab === 'stats')    loadStats();
  if (tab === 'profile')  loadProfile();
  if (tab === 'admin')    loadAdminUsers();
  if (tab === 'write') {
    if (!currentUser || currentUser.role === 'guest') {
      showToast('請先登入才能撰寫文章', 'error');
      switchTab('home');
      return;
    }
  }
}

function showPage(page) { switchTab(page); }

// ============================================================
// 載入首頁
// ============================================================
async function loadHome() {
  const u = currentUser;
  if (u) {
    document.getElementById('homeWelcome').textContent =
      '歡迎回來，' + (u.displayName || '朋友') + '！';
    document.getElementById('homeSubtitle').textContent =
      u.role === 'guest' ? '登入後可發布文章' : '今天想記錄什麼？';
  }

  // 載入最新文章
  const res = await apiPost({ action:'listArticles', page:1, pageSize:5, token:currentToken });
  const container = document.getElementById('homeLatestArticles');
  if (res.success && res.articles.length > 0) {
    document.getElementById('homeStatArticles').textContent = res.pagination.total;
    container.innerHTML = res.articles.map(a => renderArticleCard(a, true)).join('');
  } else {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i>目前還沒有文章</div>';
  }

  // 統計（管理者/版主）
  if (currentUser && ['admin','mod'].includes(currentUser.role)) {
    const sr = await apiPost({ action:'getStats', token:currentToken });
    if (sr.success) {
      document.getElementById('homeStatReads').textContent = sr.stats.totalReadCount;
      if (sr.stats.topArticles && sr.stats.topArticles.length > 0) {
        document.getElementById('homeHotCard').style.display = 'block';
        const maxRead = sr.stats.topArticles[0].readCount || 1;
        document.getElementById('homeHotArticles').innerHTML =
          sr.stats.topArticles.map((a, i) => `
            <div class="top-article-item">
              <div class="top-rank rank-${i+1}">${i+1}</div>
              <div style="flex:1">
                <div style="font-size:13px;font-weight:600">${escHtml(a.title)}</div>
                <div class="read-count-bar">
                  <div class="read-count-fill" style="width:${Math.round(a.readCount/maxRead*100)}%"></div>
                </div>
              </div>
              <div style="font-size:12px;color:var(--text-muted)">${a.readCount} 次</div>
            </div>`).join('');
      }
    }
  } else {
    document.getElementById('homeStatReads').textContent = '-';
  }
}

// ============================================================
// 載入文章列表
// ============================================================
async function loadArticles(page) {
  currentPage = page || 1;
  const container = document.getElementById('articleList');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><span>載入中...</span></div>';

  const payload = {
    action: currentSearchKeyword ? 'searchArticles' : 'listArticles',
    page: currentPage, pageSize: 8,
    category: currentCategory,
    keyword: currentSearchKeyword,
    token: currentToken
  };
  const res = await apiPost(payload);

  if (!res.success) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i>' + res.message + '</div>';
    return;
  }
  if (res.articles.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i>沒有找到相關文章</div>';
    document.getElementById('articlePagination').innerHTML = '';
    return;
  }

  container.innerHTML = res.articles.map(a => renderArticleCard(a, false)).join('');
  renderPagination(res.pagination);
}

// ============================================================
// 渲染文章卡片
// ============================================================
function renderArticleCard(a, compact) {
  const visMap = { public:'vis-public', private:'vis-private', vip:'vis-vip' };
  const visLabel = { public:'🌐 公開', private:'🔒 私人', vip:'👑 VIP' };
  const tags = (a.tags || []).filter(t=>t).map(t=>`<span class="article-tag">${escHtml(t)}</span>`).join('');
  return `
    <div class="article-card" onclick="openArticle('${a.articleId}')">
      <div class="article-card-body">
        <div class="article-title">${escHtml(a.title)}</div>
        <div class="article-summary">${escHtml(a.summary || '')}</div>
        <div style="margin-bottom:8px">${tags}</div>
        <div class="article-meta">
          <span><i class="fas fa-user"></i> ${escHtml(a.authorName)}</span>
          <span><i class="fas fa-folder"></i> ${escHtml(a.category)}</span>
          <span><i class="fas fa-eye"></i> ${a.readCount} 次</span>
          <span><i class="fas fa-clock"></i> ${formatRelTime(a.createdAt)}</span>
          <span class="visibility-badge ${visMap[a.visibility]||'vis-public'}">${visLabel[a.visibility]||'公開'}</span>
        </div>
      </div>
    </div>`;
}

// ============================================================
// 開啟文章詳情
// ============================================================
async function openArticle(articleId) {
  const res = await apiPost({ action:'getArticle', articleId, token:currentToken });
  if (!res.success) { showToast(res.message, 'error'); return; }

  const a = res.article;
  document.getElementById('modalArticleTitle').textContent = a.title;
  document.getElementById('modalArticleMeta').innerHTML = `
    <span><i class="fas fa-user"></i> ${escHtml(a.authorName)}</span>
    <span><i class="fas fa-folder"></i> ${escHtml(a.category)}</span>
    <span><i class="fas fa-eye"></i> ${a.readCount} 次閱讀</span>
    <span><i class="fas fa-clock"></i> ${a.createdAt}</span>
    ${(a.tags||[]).filter(t=>t).map(t=>`<span class="article-tag">${escHtml(t)}</span>`).join('')}
  `;
  document.getElementById('modalArticleContent').textContent = a.content;

  // 附件
  const filesHtml = (a.files && a.files.length > 0)
    ? `<div style="font-weight:600;margin-bottom:10px"><i class="fas fa-paperclip"></i> 附件（${a.files.length}）</div>` +
      a.files.map(f => renderFileItem(f, false)).join('')
    : '';
  document.getElementById('modalArticleFiles').innerHTML = filesHtml;

  // 操作按鈕
  let actions = '';
  if (currentUser && (currentUser.userId === a.authorId || ['admin','mod'].includes(currentUser.role))) {
    actions += `<button class="btn btn-warning btn-sm" onclick="editArticle('${a.articleId}')"><i class="fas fa-edit"></i> 編輯</button>`;
    actions += `<button class="btn btn-danger btn-sm" onclick="confirmDeleteArticle('${a.articleId}')"><i class="fas fa-trash"></i> 刪除</button>`;
  }
  document.getElementById('modalArticleActions').innerHTML = actions;

  openModal('articleModal');
}

// ============================================================
// 渲染檔案項目
// ============================================================
function renderFileItem(f, canDelete) {
  const iconMap = {
    'image': 'fa-image', 'pdf': 'fa-file-pdf',
    'word': 'fa-file-word', 'excel': 'fa-file-excel',
    'video': 'fa-file-video', 'audio': 'fa-file-audio',
    'default': 'fa-file'
  };
  let iconKey = 'default';
  if (f.fileType) {
    if (f.fileType.startsWith('image/')) iconKey = 'image';
    else if (f.fileType === 'application/pdf') iconKey = 'pdf';
    else if (f.fileType.includes('word')) iconKey = 'word';
    else if (f.fileType.includes('excel') || f.fileType.includes('sheet')) iconKey = 'excel';
    else if (f.fileType.startsWith('video/')) iconKey = 'video';
    else if (f.fileType.startsWith('audio/')) iconKey = 'audio';
  }
  const sizeStr = formatFileSize(f.fileSize || 0);
  return `
    <div class="file-item">
      <div class="file-icon"><i class="fas ${iconMap[iconKey]}" style="color:var(--primary)"></i></div>
      <div class="file-info">
        <div class="file-name">${escHtml(f.fileName)}</div>
        <div class="file-size">${sizeStr}</div>
      </div>
      <div class="file-actions">
        <button class="btn btn-info btn-sm" onclick="previewFile('${f.fileId}','${escHtml(f.fileName)}','${f.fileType}','${f.previewUrl}','${f.driveUrl}')">
          <i class="fas fa-eye"></i>
        </button>
        ${canDelete ? `<button class="btn btn-danger btn-sm" onclick="deleteFile('${f.fileId}')"><i class="fas fa-trash"></i></button>` : ''}
      </div>
    </div>`;
}

// ============================================================
// 檔案預覽
// ============================================================
function previewFile(fileId, fileName, fileType, previewUrl, driveUrl) {
  document.getElementById('previewFileName').textContent = fileName;
  document.getElementById('previewDownloadBtn').href = driveUrl;
  let html = '';
  if (fileType && fileType.startsWith('image/')) {
    html = `<img src="${previewUrl}" class="preview-img" alt="${escHtml(fileName)}">`;
  } else if (fileType === 'application/pdf' || (fileType && fileType.startsWith('video/'))) {
    html = `<iframe src="${previewUrl}" class="preview-frame"></iframe>`;
  } else {
    html = `<iframe src="${previewUrl}" class="preview-frame"></iframe>`;
  }
  document.getElementById('previewContent').innerHTML = html;
  openModal('filePreviewModal');
}

// ============================================================
// 搜尋 & 分類
// ============================================================
function doSearch() {
  currentSearchKeyword = document.getElementById('searchInput').value.trim();
  currentPage = 1;
  loadArticles();
}
document.addEventListener('DOMContentLoaded', () => {
  const si = document.getElementById('searchInput');
  if (si) si.addEventListener('keypress', e => { if (e.key === 'Enter') doSearch(); });
});
function filterCategory(cat, btn) {
  currentCategory = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadArticles();
}

// ============================================================
// 分頁渲染
// ============================================================
function renderPagination(p) {
  const container = document.getElementById('articlePagination');
  if (p.totalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  if (p.page > 1) html += `<button class="page-btn" onclick="loadArticles(${p.page-1})"><i class="fas fa-chevron-left"></i></button>`;
  for (let i = Math.max(1,p.page-2); i <= Math.min(p.totalPages,p.page+2); i++) {
    html += `<button class="page-btn ${i===p.page?'active':''}" onclick="loadArticles(${i})">${i}</button>`;
  }
  if (p.page < p.totalPages) html += `<button class="page-btn" onclick="loadArticles(${p.page+1})"><i class="fas fa-chevron-right"></i></button>`;
  container.innerHTML = html;
}

// ============================================================
// 撰寫 & 編輯文章
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const ac = document.getElementById('articleContent');
  if (ac) ac.addEventListener('input', () => {
    document.getElementById('contentCharCount').textContent = ac.value.length;
  });
});

async function submitArticle() {
  const title   = document.getElementById('articleTitle').value.trim();
  const content = document.getElementById('articleContent').value.trim();
  if (!title)   { showToast('請輸入文章標題', 'error'); return; }
  if (!content) { showToast('請輸入文章內容', 'error'); return; }

  const tagsRaw = document.getElementById('articleTags').value;
  const tags = tagsRaw ? tagsRaw.split(',').map(t=>t.trim()).filter(t=>t) : [];
  const isEdit = !!editingArticleId;

  const payload = {
    action:     isEdit ? 'updateArticle' : 'createArticle',
    token:      currentToken,
    articleId:  editingArticleId,
    title, content,
    category:   document.getElementById('articleCategory').value,
    tags,
    visibility: document.getElementById('articleVisibility').value
  };

  showToast(isEdit ? '更新中...' : '發布中...', 'info');
  const res = await apiPost(payload);
  if (!res.success) { showToast(res.message, 'error'); return; }

  // 上傳待傳檔案
  const targetId = isEdit ? editingArticleId : res.articleId;
  if (pendingFiles.length > 0) {
    showToast('上傳附件中...', 'info');
    for (const pf of pendingFiles) {
      await uploadPendingFile(pf, targetId);
    }
  }

// ============================================================
// 檔案上傳 - 拖曳事件
// ============================================================
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('dragover');
}
function handleDragLeave(e) {
  document.getElementById('uploadZone').classList.remove('dragover');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  processFiles(files);
}
function handleFileSelect(e) {
  const files = Array.from(e.target.files);
  processFiles(files);
  e.target.value = ''; // 重置 input
}

// ============================================================
// 處理選取的檔案（加入待上傳佇列）
// ============================================================
function processFiles(files) {
  const maxSize = 10 * 1024 * 1024; // 10MB
  const allowedTypes = [
    'image/jpeg','image/png','image/gif','image/webp',
    'application/pdf',
    'application/msword',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    'application/vnd.ms-excel',
    'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    'text/plain','text/csv','video/mp4','audio/mpeg'
  ];

  files.forEach(file => {
    if (file.size > maxSize) {
      showToast(`${file.name} 超過 10MB 限制`, 'error');
      return;
    }
    if (!allowedTypes.includes(file.type)) {
      showToast(`${file.name} 不支援的檔案類型`, 'error');
      return;
    }
    // 避免重複加入
    if (pendingFiles.find(f => f.name === file.name && f.size === file.size)) {
      showToast(`${file.name} 已在列表中`, 'info');
      return;
    }
    pendingFiles.push(file);
  });
  renderPendingFiles();
}

// ============================================================
// 渲染待上傳檔案預覽列表
// ============================================================
function renderPendingFiles() {
  const container = document.getElementById('filePreviewList');
  if (pendingFiles.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = pendingFiles.map((f, idx) => {
    const isImage = f.type.startsWith('image/');
    const iconMap = {
      'application/pdf': '📄',
      'application/msword': '📝',
      'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '📝',
      'application/vnd.ms-excel': '📊',
      'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': '📊',
      'text/plain': '📃', 'text/csv': '📊',
      'video/mp4': '🎬', 'audio/mpeg': '🎵'
    };
    const icon = isImage ? '' : (iconMap[f.type] || '📎');
    return `
      <div class="file-item" id="pendingFile_${idx}">
        <div class="file-icon">
          ${isImage
            ? `<img id="thumb_${idx}" src="" style="width:40px;height:40px;object-fit:cover;border-radius:6px">`
            : `<span style="font-size:24px">${icon}</span>`}
        </div>
        <div class="file-info">
          <div class="file-name">${escHtml(f.name)}</div>
          <div class="file-size">${formatFileSize(f.size)}</div>
          <div style="height:4px;background:var(--border);border-radius:2px;margin-top:4px">
            <div id="progress_${idx}" style="height:100%;width:0%;background:var(--primary);border-radius:2px;transition:width 0.3s"></div>
          </div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="removePendingFile(${idx})">
          <i class="fas fa-times"></i>
        </button>
      </div>`;
  }).join('');

  // 產生圖片縮圖
  pendingFiles.forEach((f, idx) => {
    if (f.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        const thumb = document.getElementById('thumb_' + idx);
        if (thumb) thumb.src = e.target.result;
      };
      reader.readAsDataURL(f);
    }
  });
}

// ============================================================
// 移除待上傳檔案
// ============================================================
function removePendingFile(idx) {
  pendingFiles.splice(idx, 1);
  renderPendingFiles();
}

// ============================================================
// 上傳單一待傳檔案（Base64 轉換後送出）
// ============================================================
async function uploadPendingFile(file, articleId) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const payload = {
          action:    'uploadFile',
          token:     currentToken,
          articleId: articleId,
          fileName:  file.name,
          fileType:  file.type,
          fileData:  e.target.result  // base64 data URL
        };
        const res = await apiPost(payload);
        if (res.success) {
          showToast(`✅ ${file.name} 上傳成功`, 'success');
        } else {
          showToast(`❌ ${file.name} 上傳失敗：${res.message}`, 'error');
        }
        resolve(res);
      } catch(err) {
        showToast(`❌ ${file.name} 上傳錯誤`, 'error');
        resolve({ success: false });
      }
    };
    reader.readAsDataURL(file);
  });
}

  try {
    const res = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(payload)
    });
    return await res.json();
  } catch(err) {
    console.error('API Error:', err);
    return { success: false, message: '網路連線錯誤，請稍後再試' };
  }
}

// ============================================================
// Toast 通知
// ============================================================
function showToast(msg, type = 'info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${escHtml(msg)}</span>`;
  document.getElementById('toastContainer').appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ============================================================
// 工具函式
// ============================================================

// HTML 跳脫（防 XSS）
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// 格式化檔案大小
function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  if (bytes < 1024)        return bytes + ' B';
  if (bytes < 1024*1024)   return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

// 相對時間格式化
function formatRelTime(dateStr) {
  if (!dateStr) return '';
  const now  = new Date();
  const date = new Date(dateStr);
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60)           return '剛剛';
  if (diff < 3600)         return Math.floor(diff/60) + ' 分鐘前';
  if (diff < 86400)        return Math.floor(diff/3600) + ' 小時前';
  if (diff < 86400*30)     return Math.floor(diff/86400) + ' 天前';
  if (diff < 86400*365)    return Math.floor(diff/86400/30) + ' 個月前';
  return Math.floor(diff/86400/365) + ' 年前';
}

// ============================================================
// 鍵盤快捷鍵
// ============================================================
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.active').forEach(m => closeModal(m.id));
  }
});

// ============================================================
// 初始化事件監聽（DOMContentLoaded）
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // 搜尋框 Enter 鍵
  const si = document.getElementById('searchInput');
  if (si) si.addEventListener('keypress', e => { if (e.key==='Enter') doSearch(); });

  // 文章內容字數統計
  const ac = document.getElementById('articleContent');
  if (ac) ac.addEventListener('input', () => {
    document.getElementById('contentCharCount').textContent = ac.value.length;
  });

  // 自動儲存草稿（每 30 秒）
  setInterval(() => {
    const title   = document.getElementById('articleTitle');
    const content = document.getElementById('articleContent');
    if (title && content && (title.value || content.value)) {
      localStorage.setItem('nb_draft', JSON.stringify({
        title:   title.value,
        content: content.value,
        tags:    document.getElementById('articleTags')?.value || '',
        savedAt: new Date().toISOString()
      }));
      const badge = document.getElementById('writeDraftBadge');
      if (badge) {
        badge.style.display = 'inline-flex';
        setTimeout(() => { badge.style.display = 'none'; }, 2000);
      }
    }
  }, 30000);

  // 恢復草稿提示
  const draft = localStorage.getItem('nb_draft');
  if (draft) {
    try {
      const d = JSON.parse(draft);
      const savedTime = formatRelTime(d.savedAt);
      const restore = confirm(`發現 ${savedTime} 的草稿：「${d.title}」\n是否恢復？`);
      if (restore) {
        document.getElementById('articleTitle').value   = d.title   || '';
        document.getElementById('articleContent').value = d.content || '';
        document.getElementById('articleTags').value    = d.tags    || '';
        document.getElementById('contentCharCount').textContent = (d.content||'').length;
        showToast('草稿已恢復', 'success');
      }
      localStorage.removeItem('nb_draft');
    } catch(e) { localStorage.removeItem('nb_draft'); }
  }
});
</script>
