<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>溫馨志工護送任務系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .active-scale:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex justify-center">

  <div class="w-full max-w-md bg-slate-50 min-h-screen shadow-lg flex flex-col pb-12 relative">
    
    <!-- LINE LIFF 頂部狀態 -->
    <div class="bg-[#06C755] text-white px-4 py-2.5 text-sm flex justify-between items-center font-bold shadow-sm">
      <span class="flex items-center gap-1">🟢 LINE 認證安全連線</span>
      <span id="liff-status" class="bg-white/20 px-2.5 py-0.5 rounded-full text-xs">載入中...</span>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 z-50 flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-600 border-t-transparent"></div>
      <p class="mt-4 text-lg font-bold text-slate-600">系統資料讀取中，請稍候...</p>
    </div>

    <!-- ================= 畫面 A：首次註冊綁定 ================= -->
    <div id="view-register" class="hidden flex-1 p-6 flex flex-col justify-center bg-gradient-to-b from-emerald-50 to-white">
      <div class="space-y-6 my-auto">
        <div class="text-center space-y-2">
          <div class="inline-flex p-4 bg-emerald-100 text-emerald-600 rounded-full mb-2">
            <i data-lucide="heart" class="w-12 h-12 text-emerald-600 animate-pulse"></i>
          </div>
          <h1 class="text-3xl font-extrabold text-emerald-800 tracking-wide">溫馨護送志工系統</h1>
          <p class="text-lg text-slate-600 font-medium">首次使用，請填寫基本資料綁定 LINE</p>
        </div>

        <form id="register-form" class="space-y-5 bg-white p-6 rounded-2xl shadow-md border border-emerald-100">
          <div class="space-y-2">
            <label class="block text-xl font-bold text-slate-700">您的真實姓名</label>
            <input type="text" id="reg-name" placeholder="例如：王大明" class="w-full px-4 py-3.5 text-lg border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:outline-none" required>
          </div>

          <div class="space-y-2">
            <label class="block text-xl font-bold text-slate-700">聯絡電話</label>
            <input type="tel" id="reg-phone" placeholder="例如：0912345678" class="w-full px-4 py-3.5 text-lg border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:outline-none" required>
          </div>

          <div class="space-y-2">
            <label class="block text-xl font-bold text-slate-700">您的身分角色</label>
            <div class="grid grid-cols-3 gap-2" id="role-selector">
              <button type="button" data-role="護送志工" class="role-btn py-3 rounded-xl text-base font-bold border-2 bg-emerald-600 text-white border-emerald-600">護送志工</button>
              <button type="button" data-role="法師" class="role-btn py-3 rounded-xl text-base font-bold border-2 bg-slate-50 text-slate-600 border-slate-200">法師</button>
              <button type="button" data-role="排班志工" class="role-btn py-3 rounded-xl text-base font-bold border-2 bg-slate-50 text-slate-600 border-slate-200">排班志工</button>
            </div>
          </div>

          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl text-xl shadow-lg active-scale mt-4">
            確認綁定 LINE 帳號
          </button>
        </form>
      </div>
    </div>

    <!-- ================= 畫面 B：主功能畫面 ================= -->
    <div id="view-main" class="hidden flex-1 flex flex-col">
      
      <!-- 個人資訊欄 -->
      <div class="bg-gradient-to-r from-emerald-700 to-emerald-800 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center font-bold text-xl border-2 border-white/40" id="user-avatar">
            志
          </div>
          <div>
            <div class="flex items-center space-x-2">
              <span class="text-xl font-extrabold" id="user-name">載入中</span>
              <span class="bg-amber-400 text-slate-900 text-xs px-2 py-0.5 rounded-full font-bold" id="user-role">志工</span>
            </div>
            <p class="text-xs text-emerald-100 mt-0.5">LINE 已成功綁定安全登入</p>
          </div>
        </div>
      </div>

      <!-- 快捷操作區 -->
      <div class="bg-white p-4 border-b border-slate-100 shadow-sm flex justify-between items-center">
        <h2 class="text-lg font-bold text-slate-700">專屬功能</h2>
        <button id="btn-action-trigger" class="hidden bg-emerald-600 text-white px-4 py-2.5 rounded-xl font-bold flex items-center gap-1 shadow-md text-base active-scale">
          <i data-lucide="plus" class="w-5 h-5"></i>
          <span id="action-btn-text">新增行程</span>
        </button>
        <span id="volunteer-tips" class="text-emerald-600 font-bold text-sm bg-emerald-50 px-3 py-1.5 rounded-full">
          👍 歡迎您今天行善積德！
        </span>
      </div>

      <!-- 核心 1：當週任務卡片 (左右切換) -->
      <div class="p-4 bg-amber-50/50 border-b border-amber-100">
        <div class="flex justify-between items-center mb-3">
          <div class="flex items-center gap-1.5">
            <span class="w-2.5 h-6 bg-amber-500 rounded-full inline-block"></span>
            <h3 class="text-xl font-extrabold text-slate-800">本週待辦任務卡片</h3>
          </div>
          <span class="text-sm font-bold text-slate-500" id="card-counter">0 / 0</span>
        </div>

        <!-- 卡片容器 -->
        <div id="card-container" class="relative">
          <!-- 卡片內容會由 JS 動態渲染 -->
        </div>
      </div>

      <!-- 核心 2 & 3：任務搜尋、篩選與顯示切換 -->
      <div class="p-4 space-y-4">
        
        <!-- 顯示範圍切換 -->
        <div class="space-y-2">
          <label class="block text-lg font-bold text-slate-700">選擇顯示範圍</label>
          <div class="grid grid-cols-3 gap-2 bg-slate-200 p-1 rounded-xl">
            <button data-view="week" class="view-mode-btn py-2.5 rounded-lg text-base font-bold bg-white text-emerald-700 shadow-sm">本週任務</button>
            <button data-view="month" class="view-mode-btn py-2.5 rounded-lg text-base font-bold text-slate-600">本月行程</button>
            <button data-view="year" class="view-mode-btn py-2.5 rounded-lg text-base font-bold text-slate-600">年度總覽</button>
          </div>
        </div>

        <!-- 關鍵字搜尋 -->
        <div class="space-y-2">
          <label class="block text-lg font-bold text-slate-700">快速搜尋任務</label>
          <input type="text" id="search-input" placeholder="🔍 輸入關鍵字（如：醫院、姓名、地點）" class="w-full px-4 py-3 text-lg border-2 border-slate-200 rounded-xl focus:border-emerald-500 focus:outline-none">
        </div>

        <!-- 條件篩選 -->
        <div class="space-y-2">
          <label class="block text-lg font-bold text-slate-700">條件篩選</label>
          <div class="flex flex-wrap gap-2" id="filter-container">
            <button data-filter="全部" class="filter-btn px-4 py-2 rounded-full text-base font-bold border-2 bg-emerald-50 text-emerald-700 border-emerald-500">全部顯示</button>
            <button data-filter="待承接" class="filter-btn px-4 py-2 rounded-full text-base font-bold border-2 bg-white text-slate-600 border-slate-200">待承接護送</button>
            <button data-filter="法師行程" class="filter-btn px-4 py-2 rounded-full text-base font-bold border-2 bg-white text-slate-600 border-slate-200">法師專區</button>
          </div>
        </div>

        <!-- 任務清單列表 -->
        <div class="space-y-3">
          <h3 class="text-xl font-extrabold text-slate-800" id="list-title">任務清單</h3>
          <div id="mission-list" class="space-y-3">
            <!-- 列表內容由 JS 動態渲染 -->
          </div>
        </div>

      </div>
    </div>

    <!-- ================= 彈出視窗：新增任務/行程 ================= -->
    <div id="create-modal" class="hidden fixed inset-0 bg-black/60 flex items-end justify-center z-50 p-4">
      <div class="bg-white w-full max-w-md rounded-t-3xl p-6 space-y-4">
        <div class="flex justify-between items-center border-b pb-3">
          <h3 class="text-2xl font-extrabold text-slate-800" id="modal-title">建立新護送任務</h3>
          <button id="btn-close-modal" class="text-slate-400 text-2xl font-bold p-1">✕</button>
        </div>

        <form id="create-mission-form" class="space-y-4">
          <div class="space-y-1">
            <label class="block text-lg font-bold text-slate-700">行程/任務標題</label>
            <input type="text" id="m-title" placeholder="例如：護送張爺爺至台大醫院" class="w-full p-3 text-base border-2 border-slate-200 rounded-xl focus:outline-none" required>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <label class="block text-lg font-bold text-slate-700">日期</label>
              <input type="date" id="m-date" class="w-full p-3 text-base border-2 border-slate-200 rounded-xl focus:outline-none" required>
            </div>
            <div class="space-y-1">
              <label class="block text-lg font-bold text-slate-700">時間</label>
              <input type="text" id="m-time" placeholder="例如：09:00-12:00" class="w-full p-3 text-base border-2 border-slate-200 rounded-xl focus:outline-none" required>
            </div>
          </div>

          <div class="space-y-1">
            <label class="block text-lg font-bold text-slate-700">地點</label>
            <input type="text" id="m-location" placeholder="例如：大安區 -> 台大醫院" class="w-full p-3 text-base border-2 border-slate-200 rounded-xl focus:outline-none" required>
          </div>

          <button type="submit" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-xl text-xl shadow-lg mt-2 active-scale">
            確認發佈行程
          </button>
        </form>
      </div>
    </div>

  </div>

  <script>
    // 請替換為部署後的 GAS Web App URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxgz-9ktUTHGxIF5hSTCxa-LTWAQqvW3COsCgRpp0BePQRYeFm1q3cC7XSh3s0kewFPrw/exec"; 
    
    let currentUser = null;
    let lineUserId = "MOCK_LINE_USER_001"; // 預設測試 ID
    let allMissions = [];
    let currentCardIndex = 0;
    let selectedRole = "護送志工";
    let currentViewMode = "week";
    let currentFilter = "全部";

    window.onload = function() {
      lucide.createIcons();
      initLIFF();
    };

    // 初始化 LINE LIFF
    // 初始化 LINE LIFF (正式上線版：關閉測試模式)
function initLIFF() {
  // 請確保此處填入您 LINE Developers 後台正確的 LIFF ID
  liff.init({ liffId: "2006468619-tbzccSNz" })
    .then(() => {
      if (liff.isLoggedIn()) {
        document.getElementById("liff-status").innerText = "LINE 已連線";
        liff.getProfile()
          .then(profile => {
            lineUserId = profile.userId; // 取得真實的 LINE User ID
            checkUserRegistration();     // 檢查是否註冊過
          })
          .catch(err => {
            console.error("取得 LINE 個人資料失敗", err);
            alert("無法取得您的 LINE 帳號資訊，請重新開啟網頁。");
          });
      } else {
        // 🔴 關鍵修改：只要未登入，不論在什麼環境，一律強制執行 LINE 登入
        document.getElementById("liff-status").innerText = "引導登入中...";
        liff.login(); 
      }
    })
    .catch((err) => {
      // 🔴 關鍵修改：初始化失敗時，不再進入測試模式，直接提示錯誤
      console.error("LIFF 初始化失敗", err);
      document.getElementById("liff-status").innerText = "連線失敗";
      alert("系統安全連線失敗！請確保您是在 LINE 軟體內開啟此連結。");
      showLoading(false);
    });
}


    // 檢查使用者是否已註冊
    function checkUserRegistration() {
      showLoading(true);
      fetch(`${API_URL}?action=getUser&lineId=${lineUserId}`)
        .then(res => res.json())
        .then(data => {
          if (data.success && data.exists) {
            currentUser = data.user;
            showMainView();
          } else {
            showRegisterView();
          }
        })
        .catch(err => alert("網路連線失敗，請檢查後端 API 網址！"))
        .finally(() => showLoading(false));
    }

    // 顯示註冊畫面
    function showRegisterView() {
      document.getElementById("view-register").classList.remove("hidden");
      document.getElementById("view-main").classList.add("hidden");
      
      const roleBtns = document.querySelectorAll(".role-btn");
      roleBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          roleBtns.forEach(b => {
            b.className = "role-btn py-3 rounded-xl text-base font-bold border-2 bg-slate-50 text-slate-600 border-slate-200";
          });
          this.className = "role-btn py-3 rounded-xl text-base font-bold border-2 bg-emerald-600 text-white border-emerald-600";
          selectedRole = this.getAttribute("data-role");
        });
      });

      document.getElementById("register-form").onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById("reg-name").value;
        const phone = document.getElementById("reg-phone").value;

        showLoading(true);
        // ⚠️ 修正重點：使用 text/plain 避免 OPTIONS 預檢請求導致的 CORS 錯誤
        fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "register",
            lineId: lineUserId,
            name: name,
            phone: phone,
            role: selectedRole
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            currentUser = { name, phone, role: selectedRole };
            showMainView();
          } else {
            alert("註冊失敗，請重試");
          }
        })
        .finally(() => showLoading(false));
      };
    }

    // 顯示主畫面
    function showMainView() {
      document.getElementById("view-register").classList.add("hidden");
      document.getElementById("view-main").classList.remove("hidden");

      document.getElementById("user-name").innerText = currentUser.name;
      document.getElementById("user-role").innerText = currentUser.role;
      document.getElementById("user-avatar").innerText = currentUser.name[0];

      const actionBtn = document.getElementById("btn-action-trigger");
      const actionText = document.getElementById("action-btn-text");
      const tips = document.getElementById("volunteer-tips");

      if (currentUser.role === "排班志工") {
        actionBtn.classList.remove("hidden");
        actionText.innerText = "新增護送任務";
        tips.classList.add("hidden");
      } else if (currentUser.role === "法師") {
        actionBtn.classList.remove("hidden");
        actionText.innerText = "登入我的行程";
        tips.classList.add("hidden");
      } else {
        actionBtn.classList.add("hidden");
        tips.classList.remove("hidden");
      }

      initMainEvents();
      loadMissions();
    }

    function loadMissions() {
      showLoading(true);
      fetch(`${API_URL}?action=getMissions`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            allMissions = data.missions;
            renderAll();
          }
        })
        .finally(() => showLoading(false));
    }

    function renderAll() {
      renderCards();
      renderList();
    }

    // 判斷日期是否在今天起算 7 天內（本週任務）
    function isWithinNext7Days(dateStr) {
      const missionDate = new Date(dateStr);
      const today = new Date();
      today.setHours(0,0,0,0);
      const nextWeek = new Date();
      nextWeek.setDate(today.getDate() + 7);
      nextWeek.setHours(23,59,59,999);
      return missionDate >= today && missionDate <= nextWeek;
    }

    // 1. 渲染當週任務卡片
    function renderCards() {
      const container = document.getElementById("card-container");
      
      // ⚠️ 修正重點：只篩選出「未來 7 天內」且「待承接」或「法師行程」的任務
      const weekMissions = allMissions.filter(m => {
        const isUpcoming = isWithinNext7Days(m.date);
        return isUpcoming && (m.status === "待承接" || m.type === "法師行程");
      });

      if (weekMissions.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-slate-200 text-slate-500 text-lg">
            目前沒有待承接的當週任務喔！
          </div>
        `;
        document.getElementById("card-counter").innerText = "0 / 0";
        return;
      }

      if (currentCardIndex >= weekMissions.length) {
        currentCardIndex = 0;
      }

      const mission = weekMissions[currentCardIndex];
      document.getElementById("card-counter").innerText = `${currentCardIndex + 1} / ${weekMissions.length}`;

      let actionButtonHTML = "";
      if (currentUser.role === "護送志工" && mission.status === "待承接") {
        actionButtonHTML = `
          <button onclick="acceptMission('${mission.id}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl text-xl shadow-md flex items-center justify-center gap-2 active-scale mt-4">
            <i data-lucide="heart"></i>
            <span>我要承接此任務</span>
          </button>
        `;
      } else {
        actionButtonHTML = `
          <div class="bg-slate-50 p-3.5 rounded-xl text-center text-slate-500 font-bold text-base mt-4">
            ${mission.status === '已承接' ? `已由志工【${mission.volunteer}】承接` : `發佈者：${mission.creator}`}
          </div>
        `;
      }

      container.innerHTML = `
        <div class="bg-white rounded-2xl p-5 shadow-lg border-2 border-amber-200">
          <div class="flex justify-between items-start mb-3">
            <span class="px-3 py-1 rounded-full text-sm font-bold ${mission.type === '法師行程' ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700'}">
              ${mission.type}
            </span>
            <span class="px-3 py-1 rounded-full text-sm font-bold bg-amber-100 text-amber-700">
              ${mission.status}
            </span>
          </div>

          <h4 class="text-2xl font-bold text-slate-800 mb-4 leading-snug">${mission.title}</h4>

          <div class="space-y-3 text-base text-slate-600">
            <div class="flex items-center gap-2">
              <i data-lucide="calendar" class="text-emerald-600 w-5 h-5"></i>
              <span class="font-semibold text-lg">${mission.date}</span>
            </div>
            <div class="flex items-center gap-2">
              <i data-lucide="clock" class="text-emerald-600 w-5 h-5"></i>
              <span class="font-semibold text-lg">${mission.time}</span>
            </div>
            <div class="flex items-center gap-2">
              <i data-lucide="map-pin" class="text-emerald-600 w-5 h-5"></i>
              <span class="font-semibold text-lg">${mission.location}</span>
            </div>
          </div>

          ${actionButtonHTML}
        </div>

        <div class="flex justify-between items-center mt-4 gap-4">
          <button onclick="prevCard(${weekMissions.length})" class="flex-1 bg-white border-2 border-slate-200 py-3.5 rounded-xl flex items-center justify-center gap-1 text-lg font-bold text-slate-700 active-scale">
            <i data-lucide="chevron-left"></i> 上一個
          </button>
          <button onclick="nextCard(${weekMissions.length})" class="flex-1 bg-white border-2 border-slate-200 py-3.5 rounded-xl flex items-center justify-center gap-1 text-lg font-bold text-slate-700 active-scale">
            下一個 <i data-lucide="chevron-right"></i>
          </button>
        </div>
      `;
      lucide.createIcons();
    }

    function prevCard(total) {
      if (currentCardIndex > 0) {
        currentCardIndex--;
        renderCards();
      }
    }

    function nextCard(total) {
      if (currentCardIndex < total - 1) {
        currentCardIndex++;
        renderCards();
      }
    }

    // 2. 渲染下方清單 (支援時間範圍、搜尋與篩選)
    function renderList() {
      const listContainer = document.getElementById("mission-list");
      const keyword = document.getElementById("search-input").value.toLowerCase();

      const filtered = allMissions.filter(m => {
        // A. 關鍵字過濾
        const matchKeyword = m.title.toLowerCase().includes(keyword) || m.location.toLowerCase().includes(keyword);
        
        // B. 條件篩選過濾
        let matchFilter = true;
        if (currentFilter === "待承接") matchFilter = (m.status === "待承接");
        if (currentFilter === "法師行程") matchFilter = (m.type === "法師行程");

        // C. 顯示範圍過濾 (週、月、年)
        let matchView = true;
        const mDate = new Date(m.date);
        const today = new Date();
        
        if (currentViewMode === "week") {
          matchView = isWithinNext7Days(m.date);
        } else if (currentViewMode === "month") {
          matchView = (mDate.getMonth() === today.getMonth() && mDate.getFullYear() === today.getFullYear());
        } else if (currentViewMode === "year") {
          matchView = (mDate.getFullYear() === today.getFullYear());
        }

        return matchKeyword && matchFilter && matchView;
      });

      document.getElementById("list-title").innerText = `${currentViewMode === 'week' ? '本週' : currentViewMode === 'month' ? '本月' : '年度'}任務清單 (${filtered.length})`;

      if (filtered.length === 0) {
        listContainer.innerHTML = `
          <div class="bg-white rounded-xl p-8 text-center border border-slate-200 text-slate-400 text-lg">
            沒有找到符合條件的行程
          </div>
        `;
        return;
      }

      listContainer.innerHTML = filtered.map(m => `
        <div class="p-4 rounded-xl border-2 bg-white ${m.status === '待承接' ? 'border-amber-200' : 'border-slate-100'}">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-bold px-2 py-0.5 rounded ${m.type === '法師行程' ? 'bg-purple-100 text-purple-700' : 'bg-emerald-100 text-emerald-700'}">
              ${m.type}
            </span>
            <span class="text-sm font-bold text-slate-500">${m.date}</span>
          </div>
          <h4 class="text-lg font-bold text-slate-800 mb-2">${m.title}</h4>
          <div class="text-sm text-slate-500 space-y-1">
            <p>📍 地點：${m.location}</p>
            <p>⏰ 時間：${m.time}</p>
            ${m.volunteer ? `<p>🙋‍♂️ 承接志工：${m.volunteer}</p>` : ''}
          </div>
          ${currentUser.role === '護送志工' && m.status === '待承接' ? `
            <button onclick="acceptMission('${m.id}')" class="mt-3 w-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 font-bold py-2.5 rounded-lg text-base flex items-center justify-center gap-1 active-scale">
              <i data-lucide="heart" class="w-4 h-4"></i> 我要承接
            </button>
          ` : ''}
        </div>
      `).join("");
      lucide.createIcons();
    }

    // 承接任務
    function acceptMission(missionId) {
      if (!confirm("您確定要承接這個護送任務嗎？")) return;
      
      showLoading(true);
      // ⚠️ 修正重點：使用 text/plain 避免 OPTIONS 預檢請求
      fetch(API_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "acceptMission",
          missionId: missionId,
          volunteerName: currentUser.name
        })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        if (data.success) {
          loadMissions();
        }
      })
      .finally(() => showLoading(false));
    }

    function initMainEvents() {
      document.getElementById("search-input").addEventListener("input", renderList);

      const viewBtns = document.querySelectorAll(".view-mode-btn");
      viewBtns.forEach(btn => {
        btn.onclick = function() {
          viewBtns.forEach(b => b.className = "view-mode-btn py-2.5 rounded-lg text-base font-bold text-slate-600");
          this.className = "view-mode-btn py-2.5 rounded-lg text-base font-bold bg-white text-emerald-700 shadow-sm";
          currentViewMode = this.getAttribute("data-view");
          renderList();
        };
      });

      const filterBtns = document.querySelectorAll(".filter-btn");
      filterBtns.forEach(btn => {
        btn.onclick = function() {
          filterBtns.forEach(b => b.className = "filter-btn px-4 py-2 rounded-full text-base font-bold border-2 bg-white text-slate-600 border-slate-200");
          this.className = "filter-btn px-4 py-2 rounded-full text-base font-bold border-2 bg-emerald-50 text-emerald-700 border-emerald-500";
          currentFilter = this.getAttribute("data-filter");
          renderList();
        };
      });

      const modal = document.getElementById("create-modal");
      document.getElementById("btn-action-trigger").onclick = function() {
        document.getElementById("modal-title").innerText = currentUser.role === "法師" ? "登入法師行程" : "建立新護送任務";
        modal.classList.remove("hidden");
      };
      document.getElementById("btn-close-modal").onclick = function() {
        modal.classList.add("hidden");
      };

      document.getElementById("create-mission-form").onsubmit = function(e) {
        e.preventDefault();
        const title = document.getElementById("m-title").value;
        const date = document.getElementById("m-date").value;
        const time = document.getElementById("m-time").value;
        const location = document.getElementById("m-location").value;

        showLoading(true);
        // ⚠️ 修正重點：使用 text/plain 避免 OPTIONS 預檢請求
        fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "createMission",
            title: title,
            date: date,
            time: time,
            location: location,
            type: currentUser.role === "法師" ? "法師行程" : "護送任務",
            status: currentUser.role === "法師" ? "已安排" : "待承接",
            volunteer: currentUser.role === "法師" ? currentUser.name : "",
            creator: currentUser.name
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            alert("發佈成功！");
            modal.classList.add("hidden");
            document.getElementById("create-mission-form").reset();
            loadMissions();
          } else {
            alert("發佈失敗，請重試");
          }
        })
        .finally(() => showLoading(false));
      };
    }

    function showLoading(show) {
      const overlay = document.getElementById("loading-overlay");
      if (show) overlay.classList.remove("hidden");
      else overlay.classList.add("hidden");
    }
  </script>
</body>
</html>
