<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>法師接送護持隨身助手</title>

  <!-- LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      font-size: 17px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, "Microsoft JhengHei", "PingFang TC",
                   "Noto Sans TC", sans-serif;
      background: #f1f5f9;
      margin: 0;
    }

    input, select, textarea, button {
      font-size: 17px !important;
      font-family: inherit;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    .animate-spin { animation: spin 1s linear infinite; }
    .animate-pulse { animation: pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
    .animate-fadein { animation: fadeInDown .35s ease both; }

    .btn-tap { transition: transform .12s ease, opacity .12s ease; }
    .btn-tap:active { transform: scale(.96); opacity: .85; }

    .card-shadow {
      box-shadow: 0 2px 12px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
    }

    .card-shadow-lg {
      box-shadow: 0 4px 24px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.08);
    }

    .badge-waiting {
      background:#fef2f2;
      color:#991b1b;
      border:1.5px solid #fecaca;
    }

    .badge-assigned {
      background:#eff6ff;
      color:#1e40af;
      border:1.5px solid #bfdbfe;
    }

    .badge-ongoing {
      background:#fffbeb;
      color:#92400e;
      border:1.5px solid #fde68a;
    }

    .badge-done {
      background:#f8fafc;
      color:#475569;
      border:1.5px solid #e2e8f0;
    }

    .badge-cancel {
      background:#f8fafc;
      color:#94a3b8;
      border:1.5px solid #e2e8f0;
      text-decoration:line-through;
    }

    .safe-bottom {
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    // =========================================================================
    // 必填設定
    // =========================================================================
    const LIFF_ID = "2006181829-l81j2YrD";
    const API_URL = "https://script.google.com/macros/s/AKfycbz6P8l7j_cmv6BTOamm9iozoCaUTH4CXmq-8LEXiwtm6G9sqn9Hi2ahwD547PS155cKrA/exec";
    // =========================================================================

    const ROLE_LABEL = {
      volunteer: '志工',
      monk: '法師',
      scheduler: '排班',
    };

    const ROLE_COLOR = {
      volunteer: 'bg-emerald-900 text-emerald-100',
      monk: 'bg-amber-900 text-amber-100',
      scheduler: 'bg-blue-900 text-blue-100',
    };

    const STATUS_BADGE = {
      '待領取': 'badge-waiting',
      '已排定': 'badge-assigned',
      '進行中': 'badge-ongoing',
      '已完成': 'badge-done',
      '已取消': 'badge-cancel',
    };

    const STATUS_DOT = {
      '待領取': 'bg-red-500',
      '已排定': 'bg-blue-500',
      '進行中': 'bg-amber-500',
      '已完成': 'bg-slate-400',
      '已取消': 'bg-slate-300',
    };

    const MOCK = {
      profile: {
        userId: 'U_MOCK_VOL',
        role: 'volunteer',
        name: '林東毅（模擬）',
        phone: '0912-345-678',
        monkId: '',
      },
      monks: [
        { monkId: 'M0001', monkName: '如英法師', active: true },
        { monkId: 'M0002', monkName: '清幢法師', active: true },
        { monkId: 'M0003', monkName: '淨遠法師', active: true },
      ],
      tasks: [
        {
          id: 'REC0001',
          status: '已排定',
          monkId: 'M0001',
          monkName: '如英法師',
          date: '2026-07-10',
          time: '19:00',
          pickup: '妙覺寺',
          dropoff: '華藏樓',
          driverId: 'U_MOCK_VOL',
          driverName: '林東毅（模擬）',
          driverPhone: '0912-345-678',
          notes: '法師行李較多，請預留後車廂空間。',
          createdAt: '2026-07-01 10:00:00',
          updatedAt: '2026-07-01 10:00:00',
        },
        {
          id: 'REC0002',
          status: '待領取',
          monkId: 'M0003',
          monkName: '淨遠法師',
          date: '2026-07-11',
          time: '09:00',
          pickup: '鳳山寺',
          dropoff: '妙覺寺',
          driverId: '',
          driverName: '',
          driverPhone: '',
          notes: '無',
          createdAt: '2026-07-01 11:00:00',
          updatedAt: '2026-07-01 11:00:00',
        },
        {
          id: 'REC0003',
          status: '已完成',
          monkId: 'M0002',
          monkName: '清幢法師',
          date: '2026-07-03',
          time: '14:30',
          pickup: '鳳山寺',
          dropoff: '妙覺寺',
          driverId: 'U_MOCK_VOL',
          driverName: '林東毅（模擬）',
          driverPhone: '0912-345-678',
          notes: '無',
          createdAt: '2026-06-30 09:00:00',
          updatedAt: '2026-07-03 16:00:00',
        },
      ],
    };

    function App() {
      const [appState, setAppState] = React.useState('loading');
      const [errorMsg, setErrorMsg] = React.useState('');
      const [isMock, setIsMock] = React.useState(false);
      const [idToken, setIdToken] = React.useState(null);

      const [profile, setProfile] = React.useState(null);
      const [tasks, setTasks] = React.useState([]);
      const [monks, setMonks] = React.useState([]);
      const [loading, setLoading] = React.useState(false);
      const [activeTab, setActiveTab] = React.useState('my-tasks');
      const [toast, setToast] = React.useState(null);

      const [searchQ, setSearchQ] = React.useState('');
      const [statusFilter, setStatusFilter] = React.useState('全部');
      const [newForm, setNewForm] = React.useState({
        monkId: '',
        date: '',
        time: '',
        pickup: '',
        dropoff: '',
        notes: '',
      });
      const [driverPhone, setDriverPhone] = React.useState('');

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        window.setTimeout(() => setToast(null), 4000);
      };

      React.useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [appState, activeTab, tasks, toast, loading, profile, monks]);

      React.useEffect(() => {
        if (!LIFF_ID || LIFF_ID === 'YOUR_LIFF_ID') {
          console.warn('未設定 LIFF_ID，進入本機模擬模式。');
          activateMock();
          return;
        }

        liff.init({ liffId: LIFF_ID })
          .then(() => {
            if (!liff.isLoggedIn()) {
              liff.login();
              return;
            }

            const token = liff.getIDToken();

            if (!token) {
              setAppState('error');
              setErrorMsg('無法取得 LINE 身分權杖 idToken。請確認 LIFF 已開啟 openid scope。');
              return;
            }

            setIdToken(token);
            loadData(token);
          })
          .catch(err => {
            setAppState('error');
            setErrorMsg('LIFF 初始化失敗：' + err.message);
          });
      }, []);

      const activateMock = () => {
        setIsMock(true);
        setProfile(MOCK.profile);
        setMonks(MOCK.monks);
        setTasks(MOCK.tasks);
        setDriverPhone(MOCK.profile.phone);
        setActiveTab('my-tasks');
        setAppState('ready');
      };

      const apiPost = async (token, payload) => {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8',
          },
          body: JSON.stringify({
            idToken: token,
            ...payload,
          }),
        });

        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (err) {
          throw new Error('伺服器回應格式錯誤：' + text.slice(0, 120));
        }

        if (!data.success) {
          throw new Error(data.error || '操作失敗');
        }

        return data;
      };

      const loadData = async (token) => {
        setLoading(true);

        try {
          const data = await apiPost(token, { action: 'list' });

          setProfile(data.profile);
          setTasks(data.tasks || []);
          setMonks(data.monks || []);
          setDriverPhone(data.profile?.phone || '');
          setActiveTab(data.profile?.role === 'scheduler' ? 'all-tasks' : 'my-tasks');
          setAppState('ready');

        } catch (err) {
          setAppState('error');
          setErrorMsg(err.message);

        } finally {
          setLoading(false);
        }
      };

      const refreshTasks = async () => {
        if (isMock) {
          showToast('本機模擬模式，資料已是最新狀態', 'info');
          return;
        }

        if (!idToken) {
          showToast('尚未取得 LINE 身分權杖，請重新開啟 LIFF', 'error');
          return;
        }

        setLoading(true);

        try {
          const data = await callApi({ action: 'list' });

          setProfile(data.profile);
          setTasks(data.tasks || []);
          setMonks(data.monks || []);
          showToast('已成功同步最新行程', 'success');

        } catch (err) {
          showToast('同步失敗：' + err.message, 'error');

        } finally {
          setLoading(false);
        }
      };

      const callApi = async (payload) => {
        if (isMock) return mockCall(payload);

        if (!idToken) {
          throw new Error('尚未取得 LINE 身分權杖，請重新開啟 LIFF');
        }

        return await apiPost(idToken, payload);
      };

      const mockCall = (payload) => new Promise(resolve => {
        setTimeout(() => {
          if (payload.action === 'list') {
            resolve({
              success: true,
              profile,
              tasks,
              monks,
            });
            return;
          }

          if (payload.action === 'claim') {
            setTasks(prev => prev.map(t => t.id === payload.id
              ? {
                  ...t,
                  status: '已排定',
                  driverId: profile.userId,
                  driverName: profile.name,
                  driverPhone: payload.driverPhone,
                }
              : t
            ));
          }

          if (payload.action === 'updateStatus') {
            setTasks(prev => prev.map(t => t.id === payload.id
              ? { ...t, status: payload.status }
              : t
            ));
          }

          if (payload.action === 'create') {
            const monk = monks.find(m => m.monkId === payload.monkId);
            const newId = 'REC' + Math.random().toString(36).slice(2, 6).toUpperCase();

            setTasks(prev => [{
              id: newId,
              status: '待領取',
              monkId: payload.monkId,
              monkName: monk?.monkName || '',
              date: payload.date,
              time: payload.time,
              pickup: payload.pickup,
              dropoff: payload.dropoff,
              driverId: '',
              driverName: '',
              driverPhone: '',
              notes: payload.notes || '無',
              createdAt: new Date().toISOString(),
              updatedAt: new Date().toISOString(),
            }, ...prev]);
          }

          if (payload.action === 'cancel') {
            setTasks(prev => prev.map(t => t.id === payload.id
              ? { ...t, status: '已取消' }
              : t
            ));
          }

          resolve({ success: true });
        }, 450);
      });

      const handleClaim = async (task) => {
        if (!driverPhone.trim()) {
          showToast('請先填寫您的聯絡電話再接單', 'error');
          return;
        }

        setLoading(true);

        try {
          await callApi({
            action: 'claim',
            id: task.id,
            driverPhone: driverPhone.trim(),
          });

          showToast('您已成功接下此護持任務，功德無量！', 'success');
          if (!isMock) await refreshTasks();

        } catch (err) {
          showToast(err.message, 'error');

        } finally {
          setLoading(false);
        }
      };

      const handleUpdateStatus = async (task, newStatus) => {
        setLoading(true);

        try {
          await callApi({
            action: 'updateStatus',
            id: task.id,
            status: newStatus,
          });

          showToast('狀態已更新為：' + newStatus, 'success');
          if (!isMock) await refreshTasks();

        } catch (err) {
          showToast(err.message, 'error');

        } finally {
          setLoading(false);
        }
      };

      const handleCancel = async (task) => {
        if (!window.confirm(`確定要取消【${task.monkName}】${task.date} ${task.time} 的行程嗎？`)) {
          return;
        }

        setLoading(true);

        try {
          await callApi({
            action: 'cancel',
            id: task.id,
          });

          showToast('行程已取消', 'success');
          if (!isMock) await refreshTasks();

        } catch (err) {
          showToast(err.message, 'error');

        } finally {
          setLoading(false);
        }
      };

      const handleCreate = async (e) => {
        e.preventDefault();

        const { monkId, date, time, pickup, dropoff } = newForm;

        if (!monkId || !date || !time || !pickup || !dropoff) {
          showToast('請完整填寫所有必填欄位', 'error');
          return;
        }

        setLoading(true);

        try {
          await callApi({
            action: 'create',
            ...newForm,
          });

          showToast('接送需求已成功登記並廣播至群組！', 'success');

          setNewForm({
            monkId: '',
            date: '',
            time: '',
            pickup: '',
            dropoff: '',
            notes: '',
          });

          setActiveTab('all-tasks');
          if (!isMock) await refreshTasks();

        } catch (err) {
          showToast(err.message, 'error');

        } finally {
          setLoading(false);
        }
      };

      const copyTask = (task) => {
        const text = [
          '【法師接送護持隨身助手】',
          '━━━━━━━━━━━━━━━',
          '👤 護持法師：' + task.monkName,
          '📅 接送時間：' + task.date + ' ' + task.time,
          '🛫 接地（上車）：' + task.pickup,
          '🛬 送地（下車）：' + task.dropoff,
          '🚗 護持司機：' + (task.driverName ? `${task.driverName}（${task.driverPhone}）` : '尚無，等待接單中'),
          '📝 備註：' + (task.notes || '無'),
          '━━━━━━━━━━━━━━━',
          (!task.driverName ? '👉 群組快速接單指令：/接單 ' + task.id : ''),
        ].filter(Boolean).join('\n');

        navigator.clipboard.writeText(text)
          .then(() => showToast('行程詳情已複製，可前往 LINE 群組貼上！', 'success'))
          .catch(() => showToast('複製失敗，請手動圈選文字複製', 'error'));
      };

      if (appState === 'loading') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-100 gap-5">
            <div className="w-14 h-14 border-4 border-emerald-700 border-t-transparent rounded-full animate-spin"></div>
            <p className="text-slate-500 font-bold text-lg">正在驗證您的 LINE 身分中...</p>
          </div>
        );
      }

      if (appState === 'error') {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center bg-slate-100 gap-4 p-6 text-center">
            <div className="bg-white p-7 rounded-2xl border-2 border-rose-200 card-shadow-lg max-w-sm w-full">
              <div className="w-16 h-16 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="alert-triangle" className="w-8 h-8 text-rose-600"></i>
              </div>
              <p className="text-xl font-black text-rose-700 mb-2">無法載入系統</p>
              <p className="text-sm text-slate-600 font-bold leading-relaxed">{errorMsg}</p>
              <div className="mt-4 bg-slate-50 rounded-xl p-3 text-xs text-slate-500 font-bold text-left leading-relaxed">
                <p>若顯示「尚未被授權」，請聯繫排班組將您的 LINE 帳號加入志工名冊白名單。</p>
              </div>
            </div>
          </div>
        );
      }

      const myTasks = tasks.filter(t => {
        if (profile.role === 'volunteer') {
          return String(t.driverId) === String(profile.userId)
            && t.status !== '已完成'
            && t.status !== '已取消';
        }

        if (profile.role === 'monk') {
          return String(t.monkId) === String(profile.monkId)
            && t.status !== '已完成'
            && t.status !== '已取消';
        }

        return false;
      });

      const filteredTasks = tasks.filter(t => {
        const q = searchQ.trim().toLowerCase();

        const matchSearch =
          (t.monkName || '').toLowerCase().includes(q) ||
          (t.pickup || '').toLowerCase().includes(q) ||
          (t.dropoff || '').toLowerCase().includes(q) ||
          (t.driverName || '').toLowerCase().includes(q) ||
          (t.id || '').toLowerCase().includes(q);

        return (statusFilter === '全部' || t.status === statusFilter) && matchSearch;
      });

      const stats = {
        waiting: tasks.filter(t => t.status === '待領取').length,
        assigned: tasks.filter(t => t.status === '已排定').length,
        ongoing: tasks.filter(t => t.status === '進行中').length,
      };

      return (
        <div className="max-w-md mx-auto bg-slate-100 min-h-screen flex flex-col pb-6 text-slate-900 relative">
          {toast && (
            <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-50 px-5 py-4 rounded-2xl card-shadow-lg text-base font-black flex items-center gap-3 w-[92%] max-w-sm animate-fadein ${
              toast.type === 'success' ? 'bg-emerald-700 text-white' :
              toast.type === 'error' ? 'bg-rose-600 text-white' :
              'bg-slate-800 text-white'
            }`}>
              <i data-lucide={toast.type === 'success' ? 'check-circle-2' : toast.type === 'error' ? 'x-circle' : 'info'} className="w-6 h-6 shrink-0"></i>
              <span className="leading-snug">{toast.message}</span>
            </div>
          )}

          <header className="bg-emerald-800 text-white px-5 pt-5 pb-4 sticky top-0 z-20" style={{ boxShadow:'0 4px 20px rgba(0,0,0,.25)' }}>
            <div className="flex justify-between items-start">
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <span className="text-2xl">🚗</span>
                  <h1 className="text-xl font-black tracking-wide leading-tight">法師接送護持隨身助手</h1>
                </div>

                <div className="flex items-center gap-2 flex-wrap">
                  <span className="flex items-center gap-1.5 text-sm text-emerald-200 font-bold">
                    <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
                    {profile.name}
                  </span>

                  <span className={`text-[11px] px-2 py-0.5 rounded font-black font-mono ${ROLE_COLOR[profile.role] || 'bg-slate-900 text-white'}`}>
                    {ROLE_LABEL[profile.role] || profile.role}
                  </span>
                </div>
              </div>

              <button
                onClick={refreshTasks}
                disabled={loading}
                className="btn-tap bg-emerald-900 hover:bg-emerald-950 p-3 rounded-full border border-emerald-700 shrink-0 ml-3"
                title="重整同步資料"
              >
                <i data-lucide="refresh-cw" className={`w-5 h-5 block ${loading ? 'animate-spin' : ''}`}></i>
              </button>
            </div>

            <div className="grid grid-cols-3 gap-2 mt-4">
              {[
                { label: '待接單', value: stats.waiting, color: 'bg-rose-500/20 text-rose-200 border-rose-500/30' },
                { label: '已排定', value: stats.assigned, color: 'bg-blue-500/20 text-blue-200 border-blue-500/30' },
                { label: '進行中', value: stats.ongoing, color: 'bg-amber-500/20 text-amber-200 border-amber-500/30' },
              ].map(s => (
                <div key={s.label} className={`rounded-xl px-3 py-2 text-center border ${s.color}`}>
                  <p className="text-2xl font-black leading-none">{s.value}</p>
                  <p className="text-[11px] font-bold mt-0.5 opacity-90">{s.label}</p>
                </div>
              ))}
            </div>

            {isMock && (
              <div className="mt-3 bg-amber-500/20 text-amber-100 text-xs px-3 py-2 rounded-xl text-center font-bold border border-amber-500/30">
                ⚠️ 本機模擬模式：資料僅存於記憶體，重新整理將重置。
              </div>
            )}
          </header>

          <div className="flex bg-white border-b-2 border-slate-200 z-10" style={{ boxShadow:'0 2px 8px rgba(0,0,0,.08)' }}>
            {profile.role !== 'scheduler' && (
              <TabBtn
                active={activeTab === 'my-tasks'}
                onClick={() => setActiveTab('my-tasks')}
                icon="user-check"
                label="我的行程"
                badge={myTasks.length > 0 ? myTasks.length : null}
              />
            )}

            <TabBtn
              active={activeTab === 'all-tasks'}
              onClick={() => setActiveTab('all-tasks')}
              icon="calendar-days"
              label="所有行程"
            />

            {profile.role === 'scheduler' && (
              <TabBtn
                active={activeTab === 'create'}
                onClick={() => setActiveTab('create')}
                icon="plus-circle"
                label="登記接送"
              />
            )}
          </div>

          <main className="flex-1 p-4 space-y-4">
            {activeTab === 'my-tasks' && profile.role !== 'scheduler' && (
              <div className="space-y-4">
                <div className="bg-gradient-to-br from-amber-50 to-orange-50 border-2 border-amber-200 rounded-2xl p-4 card-shadow">
                  <p className="text-lg font-black text-amber-950">🙏 阿彌陀佛，{profile.name}</p>
                  <p className="text-sm mt-1 font-bold text-slate-600">以下是您目前的專屬護持行程：</p>

                  {profile.role === 'volunteer' && (
                    <div className="mt-3 bg-white rounded-xl border border-amber-200 p-3">
                      <label className="block text-xs font-black text-slate-500 mb-1.5">
                        您的護持聯絡電話：
                      </label>

                      <input
                        type="tel"
                        value={driverPhone}
                        onChange={e => setDriverPhone(e.target.value)}
                        placeholder="例如：0912-345-678"
                        className="w-full border-2 border-slate-200 px-3 py-2 rounded-lg text-sm bg-slate-50 font-bold focus:border-emerald-600 focus:bg-white focus:outline-none transition"
                      />
                    </div>
                  )}
                </div>

                {myTasks.length === 0 ? (
                  <EmptyState icon="calendar-x" title="目前沒有進行中的接送" desc="請點選「所有行程」尋找待接單需求！" />
                ) : (
                  myTasks.map(task => (
                    <TaskDetailCard
                      key={task.id}
                      task={task}
                      role={profile.role}
                      onUpdateStatus={handleUpdateStatus}
                      onCopy={copyTask}
                      loading={loading}
                    />
                  ))
                )}
              </div>
            )}

            {activeTab === 'all-tasks' && (
              <div className="space-y-4">
                <div className="bg-white p-4 rounded-2xl border-2 border-slate-200 card-shadow space-y-3">
                  <div className="relative">
                    <i data-lucide="search" className="w-5 h-5 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2 pointer-events-none"></i>

                    <input
                      type="text"
                      placeholder="搜尋法師、地點、司機、編號..."
                      value={searchQ}
                      onChange={e => setSearchQ(e.target.value)}
                      className="w-full pl-10 pr-4 py-2.5 rounded-xl border-2 border-slate-200 focus:outline-none focus:border-emerald-600 font-bold bg-slate-50 transition"
                    />
                  </div>

                  <div className="flex gap-1.5 overflow-x-auto no-scrollbar pb-0.5">
                    {['全部', '待領取', '已排定', '進行中', '已完成', '已取消'].map(st => (
                      <button
                        key={st}
                        onClick={() => setStatusFilter(st)}
                        className={`btn-tap px-4 py-1.5 rounded-full text-sm font-black shrink-0 border transition-all ${
                          statusFilter === st
                            ? 'bg-emerald-800 text-white border-emerald-800 shadow-sm'
                            : 'bg-slate-100 text-slate-600 border-slate-200 hover:border-slate-300'
                        }`}
                      >
                        {st}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="flex items-center justify-between px-1">
                  <h2 className="text-lg font-black text-slate-800">全部接送需求</h2>
                  <span className="text-sm bg-slate-200 text-slate-700 px-3 py-0.5 rounded-full font-black">
                    {filteredTasks.length} 筆
                  </span>
                </div>

                {filteredTasks.length === 0 ? (
                  <EmptyState icon="search-x" title="找不到相符的行程" desc="請嘗試其他關鍵字或篩選條件" />
                ) : (
                  filteredTasks.map(task => (
                    <TaskListItem
                      key={task.id}
                      task={task}
                      role={profile.role}
                      profile={profile}
                      onClaim={handleClaim}
                      onCancel={handleCancel}
                      onCopy={copyTask}
                      loading={loading}
                    />
                  ))
                )}
              </div>
            )}

            {activeTab === 'create' && profile.role === 'scheduler' && (
              <form onSubmit={handleCreate} className="bg-white p-5 rounded-2xl border-2 border-slate-200 card-shadow-lg space-y-5">
                <div className="flex justify-between items-center pb-3 border-b-2 border-slate-100">
                  <h2 className="text-xl font-black text-slate-800">登記新接送需求</h2>
                  <span className="bg-blue-100 text-blue-800 text-xs px-2.5 py-1 rounded-lg font-black border border-blue-200">排班人員專用</span>
                </div>

                <FormField label="1. 需護持接送的法師" required>
                  <select
                    value={newForm.monkId}
                    onChange={e => setNewForm({ ...newForm, monkId: e.target.value })}
                    className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold bg-white transition"
                    required
                  >
                    <option value="">請選擇法師</option>
                    {monks.map(m => (
                      <option key={m.monkId} value={m.monkId}>{m.monkName}</option>
                    ))}
                  </select>
                </FormField>

                <div className="grid grid-cols-2 gap-3">
                  <FormField label="2. 接送日期" required>
                    <input
                      type="date"
                      value={newForm.date}
                      onChange={e => setNewForm({ ...newForm, date: e.target.value })}
                      className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold transition"
                      required
                    />
                  </FormField>

                  <FormField label="3. 上車時間" required>
                    <input
                      type="time"
                      value={newForm.time}
                      onChange={e => setNewForm({ ...newForm, time: e.target.value })}
                      className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold transition"
                      required
                    />
                  </FormField>
                </div>

                <FormField label="4. 接地（上車起點）" required>
                  <input
                    type="text"
                    placeholder="例如：鳳山寺"
                    value={newForm.pickup}
                    onChange={e => setNewForm({ ...newForm, pickup: e.target.value })}
                    className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold transition"
                    required
                  />
                </FormField>

                <FormField label="5. 送地（下車終點）" required>
                  <input
                    type="text"
                    placeholder="例如：妙覺寺"
                    value={newForm.dropoff}
                    onChange={e => setNewForm({ ...newForm, dropoff: e.target.value })}
                    className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold transition"
                    required
                  />
                </FormField>

                <FormField label="6. 備註特別說明事項">
                  <textarea
                    rows={3}
                    placeholder="若無請填無"
                    value={newForm.notes}
                    onChange={e => setNewForm({ ...newForm, notes: e.target.value })}
                    className="w-full border-2 border-slate-200 rounded-xl p-3 focus:outline-none focus:border-emerald-600 font-bold transition resize-none"
                  />
                </FormField>

                <button
                  type="submit"
                  disabled={loading}
                  className="btn-tap w-full bg-emerald-700 hover:bg-emerald-800 text-white py-4 rounded-xl text-lg font-black card-shadow disabled:opacity-50 transition"
                >
                  {loading ? '儲存同步中...' : '儲存並廣播至群組'}
                </button>
              </form>
            )}
          </main>

          <footer className="text-center py-5 text-xs text-slate-400 border-t border-slate-200 bg-white px-4 safe-bottom">
            <p className="font-black text-sm text-slate-500">妙覺寺 / 鳳山寺 護法車隊隨身系統</p>
            <p className="mt-1">LINE LIFF × Google Apps Script × Google Sheets</p>
          </footer>
        </div>
      );
    }

    function TabBtn({ active, onClick, icon, label, badge }) {
      return (
        <button
          onClick={onClick}
          className={`flex-1 py-3 text-sm font-black flex flex-col items-center gap-0.5 transition relative ${
            active
              ? 'text-emerald-800 border-b-4 border-emerald-800 bg-emerald-50/60'
              : 'text-slate-500 border-b-4 border-transparent'
          }`}
        >
          <span className="relative">
            <i data-lucide={icon} className="w-5 h-5"></i>
            {badge !== null && badge !== undefined && (
              <span className="absolute -top-1.5 -right-2 bg-rose-500 text-white text-[10px] font-black w-4 h-4 rounded-full flex items-center justify-center">
                {badge}
              </span>
            )}
          </span>
          <span>{label}</span>
        </button>
      );
    }

    function EmptyState({ icon, title, desc }) {
      return (
        <div className="bg-white rounded-2xl p-12 text-center border-2 border-dashed border-slate-200 card-shadow">
          <div className="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide={icon} className="w-7 h-7 text-slate-400"></i>
          </div>
          <p className="text-lg font-black text-slate-600">{title}</p>
          {desc && <p className="text-sm text-slate-400 mt-2 font-bold">{desc}</p>}
        </div>
      );
    }

    function FormField({ label, required, children }) {
      return (
        <div>
          <label className="block text-sm font-black text-slate-700 mb-1.5">
            {label}{required && <span className="text-rose-500 ml-0.5">*</span>}
          </label>
          {children}
        </div>
      );
    }

    function StatusBadge({ status }) {
      return (
        <span className={`inline-flex items-center gap-1.5 text-sm px-3 py-1 rounded-full font-black ${STATUS_BADGE[status] || ''}`}>
          <span className={`w-2 h-2 rounded-full ${STATUS_DOT[status] || 'bg-slate-400'}`}></span>
          {status}
        </span>
      );
    }

    function TaskDetailCard({ task, role, onUpdateStatus, onCopy, loading }) {
      const isOngoing = task.status === '進行中';
      const isAssigned = task.status === '已排定';

      return (
        <div className={`bg-white rounded-2xl overflow-hidden card-shadow-lg border-2 ${isOngoing ? 'border-amber-400' : 'border-emerald-600/30'}`}>
          <div className={`px-4 py-3 flex justify-between items-center ${isOngoing ? 'bg-amber-500' : 'bg-emerald-700'} text-white`}>
            <StatusBadge status={task.status} />
            <span className="text-xs font-mono font-bold bg-black/20 px-2.5 py-1 rounded-lg">#{task.id}</span>
          </div>

          <div className="p-4 space-y-4">
            <div className="flex justify-between items-start pb-3 border-b border-slate-100">
              <div className="flex items-center gap-3">
                <div className="bg-emerald-50 p-2.5 rounded-xl shrink-0">
                  <i data-lucide="user" className="w-7 h-7 text-emerald-700"></i>
                </div>
                <div>
                  <p className="text-xs text-slate-400 font-bold">需護持的法師</p>
                  <p className="text-2xl font-black text-slate-800">{task.monkName}</p>
                </div>
              </div>

              <button
                onClick={() => onCopy(task)}
                className="btn-tap text-slate-500 bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-xl border border-slate-200 flex items-center gap-1.5 text-sm font-bold"
              >
                <i data-lucide="copy" className="w-4 h-4"></i>
                <span>複製分享</span>
              </button>
            </div>

            <div className="grid grid-cols-2 gap-2 bg-slate-50 p-3 rounded-xl border border-slate-200">
              <div className="flex items-center gap-2">
                <i data-lucide="calendar" className="w-5 h-5 text-emerald-700 shrink-0"></i>
                <span className="text-base font-black text-slate-700">{task.date}</span>
              </div>
              <div className="flex items-center gap-2">
                <i data-lucide="clock" className="w-5 h-5 text-emerald-700 shrink-0"></i>
                <span className="text-base font-black text-slate-700">{task.time}</span>
              </div>
            </div>

            <div className="bg-emerald-50/30 p-4 rounded-xl border border-emerald-100 space-y-3">
              <div className="flex items-start gap-3">
                <div className="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center shrink-0 mt-0.5">
                  <i data-lucide="map-pin" className="w-4 h-4 text-blue-600"></i>
                </div>
                <div>
                  <span className="text-xs font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded-md border border-blue-200">接地（上車）</span>
                  <p className="text-lg font-black text-slate-800 mt-1">{task.pickup}</p>
                </div>
              </div>

              <div className="h-5 border-l-4 border-dashed border-slate-300 ml-4"></div>

              <div className="flex items-start gap-3">
                <div className="w-8 h-8 bg-rose-100 rounded-full flex items-center justify-center shrink-0 mt-0.5">
                  <i data-lucide="map-pin" className="w-4 h-4 text-rose-600"></i>
                </div>
                <div>
                  <span className="text-xs font-black text-rose-600 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-200">送地（下車）</span>
                  <p className="text-lg font-black text-slate-800 mt-1">{task.dropoff}</p>
                </div>
              </div>
            </div>

            {role === 'monk' && task.driverName && (
              <div className="bg-blue-50 p-4 rounded-xl border border-blue-200 flex justify-between items-center">
                <div>
                  <p className="text-xs text-blue-600 font-bold">負責接送的護法志工</p>
                  <p className="text-xl font-black text-slate-800 mt-0.5">{task.driverName}</p>
                  <p className="text-sm text-slate-600 font-bold mt-0.5">{task.driverPhone}</p>
                </div>
                <a href={`tel:${task.driverPhone}`} className="btn-tap bg-blue-600 text-white p-3.5 rounded-full card-shadow">
                  <i data-lucide="phone" className="w-6 h-6"></i>
                </a>
              </div>
            )}

            {task.notes && task.notes !== '無' && (
              <div className="bg-amber-50 p-3 rounded-xl border border-amber-200 flex items-start gap-2">
                <i data-lucide="info" className="w-5 h-5 text-amber-600 mt-0.5 shrink-0"></i>
                <p className="text-sm font-bold text-amber-950 leading-relaxed">備註：{task.notes}</p>
              </div>
            )}

            {role === 'volunteer' && (
              <div className="space-y-3 pt-1">
                <div className="grid grid-cols-2 gap-2">
                  <a
                    href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.pickup)}`}
                    target="_blank"
                    rel="noreferrer"
                    className="btn-tap bg-slate-800 text-white py-3 px-2 rounded-xl text-sm font-black flex justify-center items-center gap-1.5 card-shadow"
                  >
                    <i data-lucide="compass" className="w-4 h-4"></i>
                    <span>導航去接地</span>
                  </a>

                  <a
                    href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(task.dropoff)}`}
                    target="_blank"
                    rel="noreferrer"
                    className="btn-tap bg-slate-800 text-white py-3 px-2 rounded-xl text-sm font-black flex justify-center items-center gap-1.5 card-shadow"
                  >
                    <i data-lucide="navigation" className="w-4 h-4"></i>
                    <span>導航去送地</span>
                  </a>
                </div>

                {isAssigned && (
                  <button
                    onClick={() => onUpdateStatus(task, '進行中')}
                    disabled={loading}
                    className="btn-tap w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-xl text-lg font-black card-shadow disabled:opacity-50 transition"
                  >
                    🚗 我現在出發去接法師了
                  </button>
                )}

                {isOngoing && (
                  <button
                    onClick={() => onUpdateStatus(task, '已完成')}
                    disabled={loading}
                    className="btn-tap w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl text-lg font-black flex justify-center items-center gap-2 card-shadow disabled:opacity-50 transition animate-pulse"
                  >
                    <i data-lucide="check-circle-2" className="w-6 h-6"></i>
                    法師已安全抵達目的地
                  </button>
                )}
              </div>
            )}
          </div>
        </div>
      );
    }

    function TaskListItem({ task, role, profile, onClaim, onCancel, onCopy, loading }) {
      const canClaim = role === 'volunteer' && !task.driverId && task.status === '待領取';
      const canCancel = role === 'scheduler' && (task.status === '待領取' || task.status === '已排定');

      return (
        <div className="bg-white p-4 rounded-2xl border-2 border-slate-200 card-shadow space-y-3">
          <div className="flex justify-between items-center">
            <StatusBadge status={task.status} />
            <span className="text-xs font-mono text-slate-400 font-bold">#{task.id}</span>
          </div>

          <div className="flex justify-between items-center">
            <h3 className="text-2xl font-black text-slate-800">{task.monkName}</h3>

            <div className="flex gap-1.5">
              <button
                onClick={() => onCopy(task)}
                className="btn-tap p-2 text-slate-400 hover:text-slate-600 rounded-xl bg-slate-50 border border-slate-200"
                title="複製分享"
              >
                <i data-lucide="share-2" className="w-5 h-5"></i>
              </button>

              {canCancel && (
                <button
                  onClick={() => onCancel(task)}
                  className="btn-tap p-2 text-rose-500 hover:text-rose-700 rounded-xl bg-rose-50 border border-rose-200"
                  title="取消行程"
                >
                  <i data-lucide="x-circle" className="w-5 h-5"></i>
                </button>
              )}
            </div>
          </div>

          <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 space-y-2">
            <div className="flex items-center gap-2 text-sm font-bold text-slate-600">
              <i data-lucide="calendar" className="w-4 h-4 text-slate-400 shrink-0"></i>
              <span>{task.date}</span>
              <i data-lucide="clock" className="w-4 h-4 text-slate-400 shrink-0 ml-1"></i>
              <span>{task.time}</span>
            </div>

            <div className="flex items-start gap-2 text-sm font-bold text-slate-600">
              <i data-lucide="navigation-2" className="w-4 h-4 text-slate-400 shrink-0 mt-0.5"></i>
              <span>
                <span className="text-blue-600 font-black">{task.pickup}</span>
                <span className="text-slate-400 mx-1.5">→</span>
                <span className="text-rose-600 font-black">{task.dropoff}</span>
              </span>
            </div>
          </div>

          <div className="flex justify-between items-center pt-1 border-t border-slate-100">
            {task.driverName ? (
              <div className="flex items-center gap-2 text-sm font-bold text-slate-700 flex-wrap">
                <span className="bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded-lg text-xs font-black border border-emerald-200">司機</span>
                <span className="font-black">{task.driverName}</span>
                <span className="text-slate-400 text-xs">{task.driverPhone}</span>
              </div>
            ) : (
              <div className="flex items-center gap-1.5 text-sm font-black text-rose-600">
                <i data-lucide="alert-circle" className="w-4 h-4"></i>
                <span>尚無司機護持，等待發心</span>
              </div>
            )}

            {canClaim && (
              <button
                onClick={() => onClaim(task)}
                disabled={loading}
                className="btn-tap bg-emerald-700 hover:bg-emerald-800 text-white px-5 py-2.5 rounded-xl text-sm font-black card-shadow disabled:opacity-50 transition shrink-0 ml-2"
              >
                我要接單
              </button>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
