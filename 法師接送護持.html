<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>溫馨志工護送任務系統</title>
  
  <!-- 1. 使用標準靜態 Tailwind CSS (徹底消除 cdn.tailwindcss.com 的生產環境警告) -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  
  <!-- 2. Lucide Icons 圖標庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- 3. LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* 專為長輩設計的防誤觸與流暢動畫 */
    body {
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f1f5f9;
    }
    .active-scale:active {
      transform: scale(0.96);
    }
    /* 強制全局黑粗體，適合中高齡志工閱讀 */
    .font-black-bold {
      font-weight: 900 !important;
      color: #0f172a !important; /* Slate 900 */
    }
    /* 自訂卡片陰影與框線分割 */
    .mission-card {
      border: 3px solid #e2e8f0;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
    }
    .mission-card-pending {
      border: 3px solid #fcd34d !important; /* 待承接使用亮眼橘黃框 */
      box-shadow: 0 10px 20px -3px rgba(251, 191, 36, 0.15);
    }
  </style>
</head>
<body class="min-h-screen flex justify-center">

  <div class="w-full max-w-md bg-gray-50 min-h-screen shadow-2xl flex flex-col pb-12 relative">
    
    <!-- LINE LIFF 頂部狀態 -->
    <div class="bg-green-600 text-white px-4 py-3 text-sm flex justify-between items-center font-extrabold shadow-md">
      <span class="flex items-center text-base">🟢 LINE 認證安全連線</span>
      <span id="liff-status" class="bg-green-700 px-3 py-0.5 rounded-full text-xs">安全載入中...</span>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-90 z-50 flex flex-col items-center justify-center">
      <div class="animate-spin rounded-full h-14 w-14 border-4 border-green-600 border-t-transparent"></div>
      <p class="mt-4 text-xl font-black text-gray-700">系統安全連線中，請稍候...</p>
    </div>

    <!-- ================= 畫面 A：首次註冊綁定 ================= -->
    <div id="view-register" class="hidden flex-1 p-6 flex flex-col justify-center bg-gradient-to-b from-green-50 to-white">
      <div class="space-y-6 my-auto">
        <div class="text-center space-y-2">
          <div class="inline-flex p-4 bg-green-100 text-green-600 rounded-full mb-2">
            <i data-lucide="heart" class="w-14 h-14 text-green-600"></i>
          </div>
          <h1 class="text-3xl font-black text-green-800 tracking-wide">溫馨護送志工系統</h1>
          <p class="text-lg text-gray-600 font-bold">首次使用，請填寫基本資料綁定 LINE</p>
        </div>

        <form id="register-form" class="space-y-5 bg-white p-6 rounded-2xl shadow-lg border-2 border-green-100">
          <div class="space-y-2">
            <label class="block text-xl font-black-bold">您的真實姓名</label>
            <input type="text" id="reg-name" placeholder="例如：王大明" class="w-full px-4 py-3.5 text-lg border-2 border-gray-300 rounded-xl focus:border-green-500 focus:outline-none font-bold" required>
          </div>

          <div class="space-y-2">
            <label class="block text-xl font-black-bold">聯絡電話</label>
            <input type="tel" id="reg-phone" placeholder="例如：0912345678" class="w-full px-4 py-3.5 text-lg border-2 border-gray-300 rounded-xl focus:border-green-500 focus:outline-none font-bold" required>
          </div>

          <div class="space-y-2">
            <label class="block text-xl font-black-bold">您的身分角色</label>
            <div class="grid grid-cols-3 gap-2" id="role-selector">
              <button type="button" data-role="護送志工" class="role-btn py-3 rounded-xl text-base font-black border-2 bg-green-600 text-white border-green-600">護送志工</button>
              <button type="button" data-role="法師" class="role-btn py-3 rounded-xl text-base font-black border-2 bg-gray-50 text-gray-600 border-gray-200">法師</button>
              <button type="button" data-role="排班志工" class="role-btn py-3 rounded-xl text-base font-black border-2 bg-gray-50 text-gray-600 border-gray-200">排班志工</button>
            </div>
          </div>

          <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl text-xl shadow-lg active-scale mt-4">
            確認綁定 LINE 帳號
          </button>
        </form>
      </div>
    </div>

    <!-- ================= 畫面 B：主功能畫面 ================= -->
    <div id="view-main" class="hidden flex-1 flex flex-col">
      
      <!-- 個人資訊欄 -->
      <div class="bg-gradient-to-r from-green-700 to-green-800 text-white p-4 shadow-md flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <div class="w-12 h-12 bg-white bg-opacity-20 rounded-full flex items-center justify-center font-black text-xl border-2 border-white border-opacity-40" id="user-avatar">
            志
          </div>
          <div>
            <div class="flex items-center space-x-2">
              <span class="text-2xl font-black" id="user-name">載入中</span>
              <span class="bg-yellow-400 text-gray-900 text-sm px-2.5 py-0.5 rounded-full font-black" id="user-role">志工</span>
            </div>
            <p class="text-xs text-green-100 mt-0.5 font-bold">LINE 已成功綁定安全登入</p>
          </div>
        </div>
      </div>

      <!-- 快捷操作區 -->
      <div class="bg-white p-4 border-b border-gray-200 shadow-sm flex justify-between items-center">
        <h2 class="text-xl font-black-bold">專屬功能</h2>
        <button id="btn-action-trigger" class="hidden bg-green-600 text-white px-4 py-2.5 rounded-xl font-black flex items-center gap-1 shadow-md text-base active-scale">
          <i data-lucide="plus" class="w-5 h-5"></i>
          <span id="action-btn-text">新增行程</span>
        </button>
        <span id="volunteer-tips" class="text-green-700 font-black text-base bg-green-50 px-3 py-1.5 rounded-full border border-green-200">
          👍 歡迎您今天行善積德！
        </span>
      </div>

      <!-- 核心 1：最近 5 筆任務卡片 (左右切換) -->
      <div class="p-4 bg-yellow-50 bg-opacity-60 border-b-2 border-yellow-200">
        <div class="flex justify-between items-center mb-3">
          <div class="flex items-center gap-1.5">
            <span class="w-3 h-6 bg-yellow-500 rounded-full inline-block"></span>
            <h3 class="text-xl font-black text-yellow-900">最新 5 筆待辦任務</h3>
          </div>
          <span class="text-base font-black text-yellow-800 bg-yellow-100 px-2.5 py-0.5 rounded-full" id="card-counter">0 / 0</span>
        </div>

        <!-- 卡片容器 -->
        <div id="card-container" class="relative">
          <!-- 卡片內容會由 JS 動態渲染 -->
        </div>
      </div>

      <!-- 核心 2 & 3：任務搜尋、篩選與顯示切換 -->
      <div class="p-4 space-y-5">
        
        <!-- 顯示範圍切換 -->
        <div class="space-y-2">
          <label class="block text-lg font-black-bold">選擇顯示範圍</label>
          <div class="grid grid-cols-3 gap-2 bg-gray-200 p-1 rounded-xl border border-gray-300">
            <button data-view="week" class="view-mode-btn py-2.5 rounded-lg text-lg font-black bg-white text-green-800 shadow-sm">本週任務</button>
            <button data-view="month" class="view-mode-btn py-2.5 rounded-lg text-lg font-black text-gray-600">本月行程</button>
            <button data-view="year" class="view-mode-btn py-2.5 rounded-lg text-lg font-black text-gray-600">年度總覽</button>
          </div>
        </div>

        <!-- 關鍵字搜尋 -->
        <div class="space-y-2">
          <label class="block text-lg font-black-bold">快速搜尋任務</label>
          <input type="text" id="search-input" placeholder="🔍 輸入關鍵字（如：醫院、姓名、地點）" class="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-xl focus:border-green-500 focus:outline-none font-bold">
        </div>

        <!-- 條件篩選 -->
        <div class="space-y-2">
          <label class="block text-lg font-black-bold">條件篩選</label>
          <div class="flex flex-wrap gap-2" id="filter-container">
            <button data-filter="全部" class="filter-btn px-4 py-2 rounded-full text-base font-black border-2 bg-green-50 text-green-800 border-green-500 shadow-sm">全部顯示</button>
            <button data-filter="待承接" class="filter-btn px-4 py-2 rounded-full text-base font-black border-2 bg-white text-gray-600 border-gray-300 shadow-sm">待承接護送</button>
            <button data-filter="法師行程" class="filter-btn px-4 py-2 rounded-full text-base font-black border-2 bg-white text-gray-600 border-gray-300 shadow-sm">法師專區</button>
          </div>
        </div>

        <!-- 任務清單列表 -->
        <div class="space-y-3">
          <h3 class="text-2xl font-black text-gray-800 border-b-2 border-gray-200 pb-2" id="list-title">任務清單</h3>
          <div id="mission-list" class="space-y-4">
            <!-- 列表內容由 JS 動態渲染 -->
          </div>
        </div>

      </div>
    </div>

    <!-- ================= 彈出視窗：新增任務/行程 ================= -->
    <div id="create-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-end justify-center z-50 p-4">
      <div class="bg-white w-full max-w-md rounded-t-3xl p-6 space-y-4 shadow-2xl border-t-4 border-green-600">
        <div class="flex justify-between items-center border-b pb-3">
          <h3 class="text-2xl font-black text-gray-800" id="modal-title">建立新護送任務</h3>
          <button id="btn-close-modal" class="text-gray-400 text-3xl font-black p-1">✕</button>
        </div>

        <form id="create-mission-form" class="space-y-4">
          <div class="space-y-1">
            <label class="block text-lg font-black-bold">行程/任務標題</label>
            <input type="text" id="m-title" placeholder="例如：護送張爺爺至台大醫院" class="w-full p-3 text-base border-2 border-gray-300 rounded-xl focus:outline-none font-bold" required>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div class="space-y-1">
              <label class="block text-lg font-black-bold">日期</label>
              <input type="date" id="m-date" class="w-full p-3 text-base border-2 border-gray-300 rounded-xl focus:outline-none font-bold" required>
            </div>
            <div class="space-y-1">
              <label class="block text-lg font-black-bold">時間</label>
              <input type="text" id="m-time" placeholder="例如：09:00" class="w-full p-3 text-base border-2 border-gray-300 rounded-xl focus:outline-none font-bold" required>
            </div>
          </div>

          <div class="space-y-1">
            <label class="block text-lg font-black-bold">地點</label>
            <input type="text" id="m-location" placeholder="例如：大安區 -> 台大醫院" class="w-full p-3 text-base border-2 border-gray-300 rounded-xl focus:outline-none font-bold" required>
          </div>

          <button type="submit" class="w-full bg-green-600 text-white font-black py-4 rounded-xl text-xl shadow-lg mt-2 active-scale">
            確認發佈行程
          </button>
        </form>
      </div>
    </div>

  </div>

  <script>
    // 請替換為您部署後的 GAS Web App URL
    const API_URL = "https://script.google.com/macros/s/AKfycby_6VP7yptHsQDy5RZzMgLUg0XSK4dTcp9HZkFeAhC0ICh6jLixoGjeEof6mdppcih3VQ/exec"; 
    
    let currentUser = null;
    let lineUserId = ""; // 正式版移除預設測試 ID，強制由 LINE 授權取得
    let allMissions = [];
    let currentCardIndex = 0;
    let selectedRole = "護送志工";
    let currentViewMode = "week";
    let currentFilter = "全部";

    window.onload = function() {
      lucide.createIcons();
      initLIFF();
    };

    // 初始化 LINE LIFF (正式上線版：強制登入，關閉測試模式)
    function initLIFF() {
      liff.init({ liffId: "2006468619-tbzccSNz" })
        .then(() => {
          if (liff.isLoggedIn()) {
            document.getElementById("liff-status").innerText = "LINE 已連線";
            liff.getProfile()
              .then(profile => {
                lineUserId = profile.userId;
                checkUserRegistration();
              })
              .catch(err => {
                console.error("取得 LINE 個人資料失敗", err);
                alert("無法取得您的 LINE 帳號資訊，請重新開啟網頁。");
              });
          } else {
            // 未登入，強制跳轉 LINE 授權登入
            document.getElementById("liff-status").innerText = "引導登入中...";
            liff.login();
          }
        })
        .catch((err) => {
          console.error("LIFF 初始化失敗", err);
          document.getElementById("liff-status").innerText = "連線失敗";
          alert("系統安全連線失敗！請確保您是在 LINE 軟體內開啟此連結。");
          showLoading(false);
        });
    }

    // 檢查使用者是否已註冊
    function checkUserRegistration() {
      showLoading(true);
      fetch(`${API_URL}?action=getUser&lineId=${lineUserId}`)
        .then(res => res.json())
        .then(data => {
          if (data.success && data.exists) {
            currentUser = data.user;
            showMainView();
          } else {
            showRegisterView();
          }
        })
        .catch(err => alert("網路連線失敗，請檢查後端 API 網址！"))
        .finally(() => showLoading(false));
    }

    // 顯示註冊畫面
    function showRegisterView() {
      document.getElementById("view-register").classList.remove("hidden");
      document.getElementById("view-main").classList.add("hidden");
      
      const roleBtns = document.querySelectorAll(".role-btn");
      roleBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          roleBtns.forEach(b => {
            b.className = "role-btn py-3 rounded-xl text-base font-black border-2 bg-gray-50 text-gray-600 border-gray-200";
          });
          this.className = "role-btn py-3 rounded-xl text-base font-black border-2 bg-green-600 text-white border-green-600";
          selectedRole = this.getAttribute("data-role");
        });
      });

      document.getElementById("register-form").onsubmit = function(e) {
        e.preventDefault();
        const name = document.getElementById("reg-name").value;
        const phone = document.getElementById("reg-phone").value;

        showLoading(true);
        fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "register",
            lineId: lineUserId,
            name: name,
            phone: phone,
            role: selectedRole
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            currentUser = { name, phone, role: selectedRole };
            showMainView();
          } else {
            alert("註冊失敗，請重試");
          }
        })
        .finally(() => showLoading(false));
      };
    }

    // 顯示主畫面
    function showMainView() {
      document.getElementById("view-register").classList.add("hidden");
      document.getElementById("view-main").classList.remove("hidden");

      document.getElementById("user-name").innerText = currentUser.name;
      document.getElementById("user-role").innerText = currentUser.role;
      document.getElementById("user-avatar").innerText = currentUser.name[0];

      const actionBtn = document.getElementById("btn-action-trigger");
      const actionText = document.getElementById("action-btn-text");
      const tips = document.getElementById("volunteer-tips");

      if (currentUser.role === "排班志工") {
        actionBtn.classList.remove("hidden");
        actionText.innerText = "新增護送任務";
        tips.classList.add("hidden");
      } else if (currentUser.role === "法師") {
        actionBtn.classList.remove("hidden");
        actionText.innerText = "登入我的行程";
        tips.classList.add("hidden");
      } else {
        actionBtn.classList.add("hidden");
        tips.classList.remove("hidden");
      }

      initMainEvents();
      loadMissions();
    }

    function loadMissions() {
      showLoading(true);
      fetch(`${API_URL}?action=getMissions`)
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            allMissions = data.missions;
            renderAll();
          }
        })
        .finally(() => showLoading(false));
    }

    function renderAll() {
      renderCards();
      renderList();
    }

    // 格式化時間輔助函數：將異常的 1899-12-30 格式過濾，只保留 HH:mm
    function formatCleanTime(timeStr) {
      if (!timeStr) return "未定";
      if (timeStr.includes("T")) {
        const parts = timeStr.split("T");
        if (parts.length > 1) {
          return parts[1].substring(0, 5); // 取得 "11:30"
        }
      }
      return timeStr;
    }

    // 判斷日期是否在今天起算 7 天內
    function isWithinNext7Days(dateStr) {
      const missionDate = new Date(dateStr);
      const today = new Date();
      today.setHours(0,0,0,0);
      const nextWeek = new Date();
      nextWeek.setDate(today.getDate() + 7);
      nextWeek.setHours(23,59,59,999);
      return missionDate >= today && missionDate <= nextWeek;
    }

    // 1. 渲染「最近 5 筆任務」卡片 (左右切換)
    function renderCards() {
      const container = document.getElementById("card-container");
      
      // 篩選出「待承接」或「法師行程」的任務，並只取最新 5 筆
      const recentMissions = allMissions
        .filter(m => m.status === "待承接" || m.type === "法師行程")
        .slice(0, 5);

      if (recentMissions.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-8 text-center border-2 border-dashed border-gray-300 text-gray-500 text-lg font-black">
            目前沒有待承接的任務喔！
          </div>
        `;
        document.getElementById("card-counter").innerText = "0 / 0";
        return;
      }

      if (currentCardIndex >= recentMissions.length) {
        currentCardIndex = 0;
      }

      const mission = recentMissions[currentCardIndex];
      document.getElementById("card-counter").innerText = `${currentCardIndex + 1} / ${recentMissions.length}`;

      let actionButtonHTML = "";
      if (currentUser.role === "護送志工" && mission.status === "待承接") {
        actionButtonHTML = `
          <button onclick="acceptMission('${mission.id}')" class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 rounded-xl text-xl shadow-md flex items-center justify-center gap-2 active-scale mt-4 border-2 border-green-700">
            <i data-lucide="heart" style="fill: white;"></i>
            <span>我要承接此任務</span>
          </button>
        `;
      } else {
        actionButtonHTML = `
          <div class="bg-gray-100 p-3.5 rounded-xl text-center text-gray-700 font-black text-base mt-4 border border-gray-300">
            ${mission.status === '已承接' ? `已由志工【${mission.volunteer}】承接` : `發佈者：${mission.creator}`}
          </div>
        `;
      }

      // 視覺優化：對標題進行法師名稱高亮 (紫色框體)
      let highlightedTitle = mission.title;
      highlightedTitle = highlightedTitle.replace(/【(.*?)】/g, '<span class="text-purple-800 font-black bg-purple-100 px-1.5 py-0.5 rounded border border-purple-300">$1</span>');

      container.innerHTML = `
        <div class="bg-white rounded-2xl p-5 shadow-lg border-2 border-yellow-300 relative overflow-hidden">
          <div class="flex justify-between items-start mb-4">
            <span class="px-3 py-1 rounded-full text-sm font-black ${mission.type === '法師行程' ? 'bg-purple-100 text-purple-800 border border-purple-300' : 'bg-green-100 text-green-800 border border-green-300'}">
              ${mission.type}
            </span>
            <span class="px-3 py-1 rounded-full text-sm font-black ${mission.status === '待承接' ? 'bg-yellow-100 text-yellow-800 border border-yellow-300' : 'bg-gray-100 text-gray-600 border border-gray-300'}">
              ${mission.status}
            </span>
          </div>

          <h4 class="text-2xl font-black text-gray-900 mb-4 leading-snug">${highlightedTitle}</h4>

          <div class="space-y-3 text-lg border-t border-b border-gray-100 py-3">
            <div class="flex items-center">
              <i data-lucide="calendar" class="text-green-600 w-6 h-6 mr-2"></i>
              <span class="font-black text-gray-800">${mission.date}</span>
            </div>
            <div class="flex items-center">
              <i data-lucide="clock" class="text-yellow-600 w-6 h-6 mr-2"></i>
              <span class="font-black text-yellow-800 bg-yellow-50 px-2 py-0.5 rounded border border-yellow-200">${formatCleanTime(mission.time)}</span>
            </div>
            <div class="flex items-start">
              <i data-lucide="map-pin" class="text-blue-600 w-6 h-6 mr-2 mt-0.5"></i>
              <span class="font-black text-blue-800 bg-blue-50 px-2 py-0.5 rounded border border-blue-200 leading-tight">${mission.location}</span>
            </div>
          </div>

          ${actionButtonHTML}
        </div>

        <!-- 左右切換按鈕 -->
        <div class="flex justify-between items-center mt-4 gap-4">
          <button onclick="prevCard(${recentMissions.length})" class="flex-1 bg-white border-2 border-gray-300 py-3.5 rounded-xl flex items-center justify-center gap-1 text-lg font-black text-gray-700 shadow-sm active-scale">
            <i data-lucide="chevron-left"></i> 上一個
          </button>
          <button onclick="nextCard(${recentMissions.length})" class="flex-1 bg-white border-2 border-gray-300 py-3.5 rounded-xl flex items-center justify-center gap-1 text-lg font-black text-gray-700 shadow-sm active-scale">
            下一個 <i data-lucide="chevron-right"></i>
          </button>
        </div>
      `;
      lucide.createIcons();
    }

    function prevCard(total) {
      if (currentCardIndex > 0) {
        currentCardIndex--;
        renderCards();
      }
    }

    function nextCard(total) {
      if (currentCardIndex < total - 1) {
        currentCardIndex++;
        renderCards();
      }
    }

    // 2. 渲染下方任務清單 (加強框線分割與顏色對比)
    function renderList() {
      const listContainer = document.getElementById("mission-list");
      const keyword = document.getElementById("search-input").value.toLowerCase();

      const filtered = allMissions.filter(m => {
        const matchKeyword = m.title.toLowerCase().includes(keyword) || m.location.toLowerCase().includes(keyword);
        
        let matchFilter = true;
        if (currentFilter === "待承接") matchFilter = (m.status === "待承接");
        if (currentFilter === "法師行程") matchFilter = (m.type === "法師行程");

        let matchView = true;
        const mDate = new Date(m.date);
        const today = new Date();
        
        if (currentViewMode === "week") {
          matchView = isWithinNext7Days(m.date);
        } else if (currentViewMode === "month") {
          matchView = (mDate.getMonth() === today.getMonth() && mDate.getFullYear() === today.getFullYear());
        } else if (currentViewMode === "year") {
          matchView = (mDate.getFullYear() === today.getFullYear());
        }

        return matchKeyword && matchFilter && matchView;
      });

      document.getElementById("list-title").innerText = `${currentViewMode === 'week' ? '本週' : currentViewMode === 'month' ? '本月' : '年度'}任務清單 (${filtered.length})`;

      if (filtered.length === 0) {
        listContainer.innerHTML = `
          <div class="bg-white rounded-xl p-8 text-center border-2 border-dashed border-gray-300 text-gray-500 text-lg font-black">
            沒有找到符合條件的行程
          </div>
        `;
        return;
      }

      listContainer.innerHTML = filtered.map(m => {
        let highlightedTitle = m.title;
        highlightedTitle = highlightedTitle.replace(/【(.*?)】/g, '<span class="text-purple-800 font-black bg-purple-50 px-1.5 py-0.5 rounded border border-purple-200">$1</span>');

        return `
          <!-- 任務卡片分割框線 -->
          <div class="p-5 rounded-2xl border-2 bg-white shadow-md ${m.status === '待承接' ? 'border-yellow-300' : 'border-gray-200'}">
            <div class="flex justify-between items-center mb-3">
              <span class="text-xs font-black px-2.5 py-1 rounded border ${m.type === '法師行程' ? 'bg-purple-100 text-purple-800 border-purple-300' : 'bg-green-100 text-green-800 border-green-300'}">
                ${m.type}
              </span>
              <span class="text-base font-black text-gray-500">${m.date}</span>
            </div>
            
            <h4 class="text-xl font-black text-gray-900 mb-3 leading-snug">${highlightedTitle}</h4>
            
            <div class="text-base space-y-2 border-t border-gray-100 pt-2.5">
              <p class="font-black text-blue-800 bg-blue-50 px-2 py-1 rounded border border-blue-200">
                📍 地點：${m.location}
              </p>
              <p class="font-black text-yellow-800 bg-yellow-50 px-2 py-1 rounded border border-yellow-200">
                ⏰ 時間：${formatCleanTime(m.time)}
              </p>
              ${m.volunteer ? `
                <p class="font-black text-gray-700 bg-gray-100 px-2 py-1 rounded border border-gray-300">
                  🙋‍♂️ 承接志工：<span class="text-green-700 underline">${m.volunteer}</span>
                </p>
              ` : ''}
            </div>
            
            ${currentUser.role === '護送志工' && m.status === '待承接' ? `
              <button onclick="acceptMission('${m.id}')" class="mt-4 w-full bg-green-50 hover:bg-green-100 text-green-800 border-2 border-green-300 font-black py-3 rounded-xl text-lg flex items-center justify-center gap-1.5 active-scale shadow-sm">
                <i data-lucide="heart" class="w-5 h-5" style="fill: #065f46; color: #065f46;"></i> 我要承接
              </button>
            ` : ''}
          </div>
        `;
      }).join("");
      lucide.createIcons();
    }

    function acceptMission(missionId) {
      if (!confirm("您確定要承接這個護送任務嗎？")) return;
      
      showLoading(true);
      fetch(API_URL, {
        method: "POST",
        mode: "cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "acceptMission",
          missionId: missionId,
          volunteerName: currentUser.name
        })
      })
      .then(res => res.json())
      .then(data => {
        alert(data.message);
        if (data.success) {
          loadMissions();
        }
      })
      .finally(() => showLoading(false));
    }

    function initMainEvents() {
      document.getElementById("search-input").addEventListener("input", renderList);

      const viewBtns = document.querySelectorAll(".view-mode-btn");
      viewBtns.forEach(btn => {
        btn.onclick = function() {
          viewBtns.forEach(b => b.className = "view-mode-btn py-2.5 rounded-lg text-lg font-black text-gray-600");
          this.className = "view-mode-btn py-2.5 rounded-lg text-lg font-black bg-white text-green-800 shadow-sm";
          currentViewMode = this.getAttribute("data-view");
          renderList();
        };
      });

      const filterBtns = document.querySelectorAll(".filter-btn");
      filterBtns.forEach(btn => {
        btn.onclick = function() {
          filterBtns.forEach(b => b.className = "filter-btn px-4 py-2 rounded-full text-base font-black border-2 bg-white text-gray-600 border-gray-300 shadow-sm");
          this.className = "filter-btn px-4 py-2 rounded-full text-base font-black border-2 bg-green-50 text-green-800 border-green-500 shadow-sm";
          currentFilter = this.getAttribute("data-filter");
          renderList();
        };
      });

      const modal = document.getElementById("create-modal");
      document.getElementById("btn-action-trigger").onclick = function() {
        document.getElementById("modal-title").innerText = currentUser.role === "法師" ? "登入法師行程" : "建立新護送任務";
        modal.classList.remove("hidden");
      };
      document.getElementById("btn-close-modal").onclick = function() {
        modal.classList.add("hidden");
      };

      document.getElementById("create-mission-form").onsubmit = function(e) {
        e.preventDefault();
        const title = document.getElementById("m-title").value;
        const date = document.getElementById("m-date").value;
        const time = document.getElementById("m-time").value;
        const location = document.getElementById("m-location").value;

        showLoading(true);
        fetch(API_URL, {
          method: "POST",
          mode: "cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({
            action: "createMission",
            title: title,
            date: date,
            time: time,
            location: location,
            type: currentUser.role === "法師" ? "法師行程" : "護送任務",
            status: currentUser.role === "法師" ? "已安排" : "待承接",
            volunteer: currentUser.role === "法師" ? currentUser.name : "",
            creator: currentUser.name
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            alert("發佈成功！");
            modal.classList.add("hidden");
            document.getElementById("create-mission-form").reset();
            loadMissions();
          } else {
            alert("發佈失敗，請重試");
          }
        })
        .finally(() => showLoading(false));
      };
    }

    function showLoading(show) {
      const overlay = document.getElementById("loading-overlay");
      if (show) overlay.classList.remove("hidden");
      else overlay.classList.add("hidden");
    }
  </script>
</body>
</html>
