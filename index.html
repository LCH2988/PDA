<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台灣帕金森病友權益促進會</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    :root {
      --primary:   #6B4FA0;
      --secondary: #4A90D9;
      --success:   #27AE60;
      --warning:   #F39C12;
      --danger:    #E74C3C;
      --bg:        #F5F0FF;
      --card:      #FFFFFF;
      --text:      #2C3E50;
      --muted:     #7F8C8D;
      --border:    #D5C5F0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 18px;
    }
    .header {
      background: linear-gradient(135deg, var(--primary), #8B6FC0);
      color: white;
      padding: 24px 20px 20px;
      text-align: center;
    }
    .header .logo { font-size: 2.5rem; margin-bottom: 8px; }
    .header h1   { font-size: 1.3rem; font-weight: 700; line-height: 1.4; }
    .header p    { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }

    .container { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(107,79,160,0.12);
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      text-align: center;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary  { background: var(--primary);   color: white; }
    .btn-line     { background: #06C755;           color: white; }
    .btn-secondary{ background: var(--secondary);  color: white; }
    .btn-outline  { background: white; color: var(--primary); border: 2px solid var(--primary); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 1.1rem;
      color: var(--text);
      background: #FAFAFA;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus { border-color: var(--primary); background: white; }

    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin: 16px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .alert {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 16px;
      display: none;
    }
    .alert-success { background: #D5F5E3; color: #1E8449; border: 1px solid #A9DFBF; }
    .alert-danger  { background: #FADBD8; color: #C0392B; border: 1px solid #F1948A; }
    .alert-info    { background: #D6EAF8; color: #1A5276; border: 1px solid #85C1E9; }

    .tab-bar {
      display: flex;
      background: white;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s;
    }
    .tab-btn.active { background: var(--primary); color: white; }

    .page { display: none; }
    .page.active { display: block; }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hint { font-size: 0.85rem; color: var(--muted); margin-top: 6px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🫀</div>
  <h1>台灣帕金森病友<br>權益促進會</h1>
  <p>會員服務系統</p>
</div>

<div class="container">

  <!-- 登入/註冊 Tab -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('login')">🔑 登入</button>
    <button class="tab-btn"        onclick="switchTab('register')">📝 註冊</button>
  </div>

  <!-- 提示訊息 -->
  <div id="alertBox" class="alert"></div>

  <!-- ===== 登入頁 ===== -->
  <div id="loginPage" class="page active">
    <div class="card">
      <div class="card-title">📱 LINE 快速登入</div>
      <button class="btn btn-line" onclick="liffLogin()">
        使用 LINE 登入
      </button>
      <p class="hint" style="text-align:center">首次登入需完成實名認證</p>
    </div>

    <div class="divider">或使用電話登入</div>

    <div class="card">
      <div class="card-title">📞 電話登入</div>
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" id="loginName" class="form-control" placeholder="請輸入真實姓名">
      </div>
      <div class="form-group">
        <label class="form-label">電話後9碼</label>
        <input type="tel" id="loginPhone" class="form-control" placeholder="例：936893693" maxlength="9">
      </div>
      <button class="btn btn-primary" onclick="phoneLogin()">登入</button>
    </div>
  </div>

  <!-- ===== 註冊頁 ===== -->
  <div id="registerPage" class="page">
    <div class="card">
      <div class="card-title">📱 LINE 快速註冊</div>
      <button class="btn btn-line" onclick="liffRegister()">
        使用 LINE 快速註冊
      </button>
      <p class="hint" style="text-align:center">系統自動取得 LINE ID 與名稱</p>
    </div>

    <div class="divider">或手動填寫資料</div>

    <div class="card">
      <div class="card-title">✏️ 填寫資料</div>
      <div class="form-group">
        <label class="form-label">姓名 <span style="color:red">*</span></label>
        <input type="text" id="regName" class="form-control" placeholder="請輸入真實姓名">
      </div>
      <div class="form-group">
        <label class="form-label">電話 <span style="color:red">*</span></label>
        <input type="tel" id="regPhone" class="form-control" placeholder="例：0936893693">
        <p class="hint">電話後9碼將作為您的會員ID</p>
      </div>
      <div class="form-group">
        <label class="form-label">暱稱（選填）</label>
        <input type="text" id="regNickname" class="form-control" placeholder="例：小劉（彤彤爸）">
      </div>
      <button class="btn btn-primary" onclick="phoneRegister()">完成註冊</button>
    </div>
  </div>

  <!-- ===== LIFF 實名認證彈窗 ===== -->
  <div id="realIdModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:999; padding:20px; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:400px; margin:0;">
      <div class="card-title">🪪 首次登入實名認證</div>
      <div class="form-group">
        <label class="form-label">真實姓名 <span style="color:red">*</span></label>
        <input type="text" id="realName" class="form-control" placeholder="請輸入真實姓名">
      </div>
      <div class="form-group">
        <label class="form-label">電話 <span style="color:red">*</span></label>
        <input type="tel" id="realPhone" class="form-control" placeholder="請輸入電話號碼">
      </div>
      <button class="btn btn-primary" onclick="submitRealId()">確認送出</button>
      <button class="btn btn-outline" onclick="closeRealIdModal()">取消</button>
    </div>
  </div>

  <!-- 載入中 -->
  <div id="loadingDiv" class="loading" style="display:none;">
    <div class="spinner"></div>
    <p>處理中，請稍候...</p>
  </div>

</div>

<script>
  // ===== 設定 =====
  const API_URL  = 'https://script.google.com/macros/s/AKfycby88k95QPzmrt8tiahwaERfwh85p5s_MsLMrA8eqexE4dxieWz91mTtGkPBSAqPmreA/exec';
  const LIFF_ID  = '2009456572-588gzru4';
  let   pendingLineId   = '';
  let   pendingLineName = '';

  // ===== Tab 切換 =====
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
    document.getElementById('loginPage').classList.toggle('active', tab === 'login');
    document.getElementById('registerPage').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  // ===== 提示訊息 =====
  function showAlert(msg, type = 'info') {
    const box = document.getElementById('alertBox');
    box.className = `alert alert-${type}`;
    box.textContent = msg;
    box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
  }
  function hideAlert() {
    document.getElementById('alertBox').style.display = 'none';
  }

  // ===== Loading =====
  function showLoading(show) {
    document.getElementById('loadingDiv').style.display = show ? 'block' : 'none';
  }

  // ===== API 呼叫 =====
  async function callAPI(data) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
    return res.json();
  }

  // ===== 電話登入 =====
  async function phoneLogin() {
    const name  = document.getElementById('loginName').value.trim();
    const phone = document.getElementById('loginPhone').value.trim();
    if (!name || !phone) { showAlert('請填寫姓名與電話', 'danger'); return; }
    showLoading(true);
    try {
      const result = await callAPI({ action: 'login', name, phone });
      if (result.success) {
        saveMemberSession(result);
        showAlert('登入成功！正在跳轉...', 'success');
        setTimeout(() => { window.location.href = 'member.html'; }, 1000);
      } else {
        showAlert(result.message, 'danger');
      }
    } catch(e) { showAlert('網路錯誤，請稍後再試', 'danger'); }
    showLoading(false);
  }

  // ===== 電話註冊 =====
  async function phoneRegister() {
    const name     = document.getElementById('regName').value.trim();
    const phone    = document.getElementById('regPhone').value.trim();
    const nickname = document.getElementById('regNickname').value.trim();
    if (!name || !phone) { showAlert('請填寫姓名與電話', 'danger'); return; }
    showLoading(true);
    try {
      const result = await callAPI({ action: 'register', name, phone, nickname });
      if (result.success) {
        saveMemberSession(result);
        showAlert('註冊成功！正在跳轉...', 'success');
        setTimeout(() => { window.location.href = 'member.html'; }, 1000);
      } else {
        showAlert(result.message, 'danger');
      }
    } catch(e) { showAlert('網路錯誤，請稍後再試', 'danger'); }
    showLoading(false);
  }

  // ===== LIFF 登入 =====
  async function liffLogin() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      showLoading(true);
      const result = await callAPI({
        action:   'liffLogin',
        lineId:   profile.userId,
        lineName: profile.displayName
      });
      if (result.success) {
        saveMemberSession(result);
        showAlert('登入成功！', 'success');
        setTimeout(() => { window.location.href = 'member.html'; }, 1000);
      } else if (result.requireRealId) {
        pendingLineId   = result.lineId;
        pendingLineName = result.lineName;
        document.getElementById('realIdModal').style.display = 'flex';
      } else {
        showAlert(result.message, 'danger');
      }
      showLoading(false);
    } catch(e) { showAlert('LINE 登入失敗：' + e.message, 'danger'); showLoading(false); }
  }

  // ===== LIFF 快速註冊 =====
  async function liffRegister() {
    await liffLogin();
  }

  // ===== 提交實名認證 =====
  async function submitRealId() {
    const name  = document.getElementById('realName').value.trim();
    const phone = document.getElementById('realPhone').value.trim();
    if (!name || !phone) { showAlert('請填寫姓名與電話', 'danger'); return; }
    showLoading(true);
    try {
      const result = await callAPI({
        action:   'liffLogin',
        lineId:   pendingLineId,
        lineName: pendingLineName,
        name, phone
      });
      if (result.success) {
        saveMemberSession(result);
        closeRealIdModal();
        showAlert('實名認證完成！', 'success');
        setTimeout(() => { window.location.href = 'member.html'; }, 1000);
      } else {
        showAlert(result.message, 'danger');
      }
    } catch(e) { showAlert('網路錯誤', 'danger'); }
    showLoading(false);
  }

  function closeRealIdModal() {
    document.getElementById('realIdModal').style.display = 'none';
  }

  // ===== 儲存 Session =====
  function saveMemberSession(data) {
    localStorage.setItem('member', JSON.stringify(data));
  }

  // ===== 初始化：已登入則跳轉 =====
  window.onload = function() {
    const member = localStorage.getItem('member');
    if (member) {
      const m = JSON.parse(member);
      if (m.success && m.memberId) {
        window.location.href = 'member.html';
      }
    }
  };
</script>
</body>
</html>
