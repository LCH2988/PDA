<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee Wallet 咖啡寄杯</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(251, 191, 36, .15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(120, 53, 15, .25), transparent 30%),
        linear-gradient(135deg, #111827, #1f2937 45%, #422006);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, .12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, .15);
    }
    .card {
      background: linear-gradient(145deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.08);
    }
    .shadow-soft {
      box-shadow: 0 20px 40px rgba(0,0,0,.28);
    }
    .qr-box canvas,
    .qr-box img {
      margin: 0 auto;
      background: white;
      padding: 10px;
      border-radius: 16px;
    }
  </style>
</head>
<body class="text-white">
  <div class="max-w-md mx-auto px-4 py-6">
    <header class="mb-6">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-amber-400 text-gray-900 flex items-center justify-center text-3xl shadow-soft">
          ☕
        </div>
        <div>
          <h1 class="text-2xl font-black tracking-tight">Coffee Wallet</h1>
          <p class="text-sm text-amber-100/80">LINE 咖啡寄杯平台</p>
        </div>
      </div>
    </header>

    <section class="glass rounded-3xl p-5 shadow-soft mb-5">
      <div class="flex items-center justify-between gap-3">
        <div>
          <p class="text-sm text-white/60">目前剩餘</p>
          <div class="flex items-end gap-2">
            <span id="balance" class="text-5xl font-black">0</span>
            <span class="pb-2 text-white/70">杯</span>
          </div>
        </div>
        <div class="text-right">
          <img id="avatar" class="w-12 h-12 rounded-full ml-auto mb-2 hidden border border-white/20" alt="avatar" />
          <p id="displayName" class="font-bold">載入中...</p>
          <p class="text-xs text-white/50">會員帳戶</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3 mt-5">
        <button onclick="refreshWallet()" class="rounded-2xl py-3 bg-white/10 hover:bg-white/20 transition font-bold">
          重新整理
        </button>
        <button onclick="showUsageHelp()" class="rounded-2xl py-3 bg-amber-500 hover:bg-amber-400 text-gray-900 transition font-black">
          使用說明
        </button>
      </div>
    </section>

    <section class="mb-6">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-black">購買寄杯方案</h2>
        <span class="text-xs text-amber-200">立即入帳</span>
      </div>
      <div id="products" class="space-y-3"></div>
    </section>

    <section class="glass rounded-3xl p-5 mb-6 shadow-soft">
      <h2 class="text-xl font-black mb-2">我要兌換咖啡</h2>
      <p class="text-sm text-white/60 mb-4">產生核銷碼後，請於有效期限內出示數字或 QRCode 給店員。</p>

      <div class="flex gap-3">
        <select id="redeemCups" class="flex-1 rounded-2xl px-4 py-3 text-gray-900 bg-white">
          <option value="1">兌換 1 杯</option>
          <option value="2">兌換 2 杯</option>
          <option value="3">兌換 3 杯</option>
        </select>
        <button onclick="createRedeem()" class="rounded-2xl px-5 py-3 bg-amber-500 hover:bg-amber-400 text-gray-900 font-black transition">
          產生
        </button>
      </div>

      <div id="redeemBox" class="hidden mt-5 rounded-3xl bg-black/30 p-5 text-center border border-amber-300/30">
        <p class="text-sm text-white/60">請出示給店員</p>
        <p id="redeemCode" class="text-5xl font-black tracking-widest my-3 text-amber-300">------</p>
        <div id="qrcode" class="qr-box my-4 flex justify-center"></div>
        <p id="redeemInfo" class="text-sm text-white/60 mb-4"></p>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="copyRedeemCode()" class="rounded-2xl py-3 bg-white/10 hover:bg-white/20 transition font-bold">
            複製核銷碼
          </button>
          <button onclick="downloadQR()" class="rounded-2xl py-3 bg-amber-500 hover:bg-amber-400 text-gray-900 transition font-black">
            下載 QR
          </button>
        </div>
      </div>
    </section>

    <section class="mb-8">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-black">最近交易紀錄</h2>
        <span class="text-xs text-white/50">最新 20 筆</span>
      </div>
      <div id="ledger" class="space-y-2"></div>
    </section>

    <footer class="text-center text-xs text-white/40 pb-6">
      Coffee Wallet © Powered by GAS + LINE Bot + LIFF
    </footer>
  </div>

  <div id="loading" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="text-center">
      <div class="text-5xl mb-3">☕</div>
      <p class="font-bold">咖啡帳戶載入中...</p>
    </div>
  </div>

  <script>
    /************************************************
     * 請修改這兩個值
     ************************************************/
    const LIFF_ID = '2006181829-l81j2YrD';
    const API_URL = 'https://script.google.com/macros/s/AKfycbzuGuL5Y0PFaPs65dkByWmZv5ew8teU1PimTSAMhC1qUPiu2rnNWr9sfar2Zx81YXYj/exec';

    let profile = null;
    let currentOrder = null;
    let latestRedeemCode = '';

    function showLoading(show) {
      const el = document.getElementById('loading');
      if (show) {
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    function showUsageHelp() {
      alert(
        'Coffee Wallet 使用說明 ☕\n\n' +
        '1. 選擇寄杯方案並完成購買\n' +
        '2. 付款成功後，杯數會立即入帳\n' +
        '3. 點選「產生」建立核銷碼\n' +
        '4. 出示 6 位數字或 QRCode 給店員\n' +
        '5. 店員輸入或掃描後即可完成核銷'
      );
    }

    async function api(action, data = {}) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action,
          ...data
        })
      });

      const text = await res.text();
      console.log('API raw response:', text);

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error(
          'API 回傳不是 JSON，請檢查 API_URL 是否為 GAS Web App /exec URL。\n\n前 200 字：\n' +
          text.slice(0, 200)
        );
      }
    }

    async function main() {
      try {
        showLoading(true);

        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        profile = await liff.getProfile();

        document.getElementById('displayName').innerText = profile.displayName || 'LINE 使用者';

        if (profile.pictureUrl) {
          const avatar = document.getElementById('avatar');
          avatar.src = profile.pictureUrl;
          avatar.classList.remove('hidden');
        }

        const loginResult = await api('login', {
          user: {
            userId: profile.userId,
            displayName: profile.displayName,
            pictureUrl: profile.pictureUrl
          }
        });

        if (!loginResult.ok) {
          throw new Error(loginResult.message || '登入失敗');
        }

        await loadProducts();
        await refreshWallet();
      } catch (err) {
        console.error(err);
        alert(err.message || '系統發生錯誤');
      } finally {
        showLoading(false);
      }
    }

    async function loadProducts() {
      const result = await api('getProducts');

      if (!result.ok) {
        throw new Error(result.message || '商品載入失敗');
      }

      const box = document.getElementById('products');
      box.innerHTML = '';

      if (!result.products || result.products.length === 0) {
        box.innerHTML = `
          <div class="card rounded-3xl p-5 text-sm text-white/60">
            目前沒有可購買的寄杯方案
          </div>
        `;
        return;
      }

      result.products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'card rounded-3xl p-5 shadow-soft';

        div.innerHTML = `
          <div class="flex justify-between items-start gap-3">
            <div>
              <h3 class="text-lg font-black">${escapeHtml(p.name)}</h3>
              <p class="text-sm text-white/60 mt-1">${escapeHtml(p.description || '')}</p>
              <p class="text-amber-200 font-bold mt-3">${p.cups} 杯</p>
            </div>
            <div class="text-right shrink-0">
              <p class="text-2xl font-black">NT$${Number(p.price).toLocaleString('zh-TW')}</p>
              <p class="text-xs text-white/50">TWD</p>
            </div>
          </div>

          <button class="mt-4 w-full rounded-2xl py-3 bg-amber-500 hover:bg-amber-400 text-gray-900 font-black transition">
            立即購買
          </button>
        `;

        div.querySelector('button').onclick = () => checkout(p.productId);
        box.appendChild(div);
      });
    }

    async function checkout(productId) {
      try {
        showLoading(true);

        const result = await api('checkout', {
          userId: profile.userId,
          productId
        });

        if (!result.ok) {
          throw new Error(result.message || '建立訂單失敗');
        }

        currentOrder = result.order;

        const confirmed = confirm(
          '請確認購買資訊：\n\n' +
          '商品：' + currentOrder.productName + '\n' +
          '杯數：' + currentOrder.cups + ' 杯\n' +
          '金額：NT$' + Number(currentOrder.amount).toLocaleString('zh-TW') + '\n\n' +
          '目前為 Demo 模式，是否模擬付款完成？'
        );

        if (!confirmed) return;

        await payDemo(currentOrder.orderId);
      } catch (err) {
        console.error(err);
        alert(err.message || '購買失敗');
      } finally {
        showLoading(false);
      }
    }

    async function payDemo(orderId) {
      const result = await api('payDemo', {
        userId: profile.userId,
        orderId
      });

      if (!result.ok) {
        throw new Error(result.message || '付款失敗');
      }

      alert('付款成功，寄杯已入帳！');
      await refreshWallet();
    }

    async function refreshWallet() {
      const result = await api('getWallet', {
        userId: profile.userId
      });

      if (!result.ok) {
        throw new Error(result.message || '讀取錢包失敗');
      }

      const wallet = result.wallet || {};
      document.getElementById('balance').innerText = Number(wallet.balance || 0);

      const ledgerBox = document.getElementById('ledger');
      ledgerBox.innerHTML = '';

      if (!result.ledger || result.ledger.length === 0) {
        ledgerBox.innerHTML = `
          <div class="card rounded-2xl p-4 text-sm text-white/50">
            尚無交易紀錄
          </div>
        `;
        return;
      }

      result.ledger.forEach(item => {
        const cups = Number(item.cups || 0);
        const isPlus = cups > 0;

        const div = document.createElement('div');
        div.className = 'rounded-2xl bg-white/10 p-4 flex justify-between items-center';

        div.innerHTML = `
          <div>
            <p class="font-bold">${escapeHtml(item.note || item.type || '')}</p>
            <p class="text-xs text-white/50">${formatDate(item.createdAt)}</p>
          </div>
          <div class="${isPlus ? 'text-green-300' : 'text-red-300'} font-black">
            ${isPlus ? '+' : ''}${cups} 杯
          </div>
        `;

        ledgerBox.appendChild(div);
      });
    }

    async function createRedeem() {
      try {
        showLoading(true);

        const cups = Number(document.getElementById('redeemCups').value);

        const result = await api('createRedeem', {
          userId: profile.userId,
          cups
        });

        if (!result.ok) {
          throw new Error(result.message || '建立核銷碼失敗');
        }

        const redeem = result.redeem;
        latestRedeemCode = redeem.code;

        document.getElementById('redeemBox').classList.remove('hidden');
        document.getElementById('redeemCode').innerText = redeem.code;
        document.getElementById('redeemInfo').innerText =
          '本次兌換 ' + redeem.cups + ' 杯，有效至 ' + formatDate(redeem.expiredAt);

        renderQRCode(redeem.code);
        await refreshWallet();
      } catch (err) {
        console.error(err);
        alert(err.message || '建立核銷碼失敗');
      } finally {
        showLoading(false);
      }
    }

    function renderQRCode(code) {
      const box = document.getElementById('qrcode');
      box.innerHTML = '';

      new QRCode(box, {
        text: code,
        width: 220,
        height: 220,
        colorDark: '#111827',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }

    async function copyRedeemCode() {
      if (!latestRedeemCode) {
        alert('目前沒有可複製的核銷碼');
        return;
      }

      try {
        await navigator.clipboard.writeText(latestRedeemCode);
        alert('核銷碼已複製：' + latestRedeemCode);
      } catch (err) {
        alert('複製失敗，請手動複製：' + latestRedeemCode);
      }
    }

    function downloadQR() {
      const qrBox = document.getElementById('qrcode');
      const canvas = qrBox.querySelector('canvas');
      const img = qrBox.querySelector('img');

      let dataUrl = '';

      if (canvas) {
        dataUrl = canvas.toDataURL('image/png');
      } else if (img) {
        dataUrl = img.src;
      }

      if (!dataUrl) {
        alert('目前沒有可下載的 QRCode');
        return;
      }

      const link = document.createElement('a');
      link.href = dataUrl;
      link.download = 'coffee-redeem-' + (latestRedeemCode || 'code') + '.png';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value);
      if (isNaN(d.getTime())) return String(value);
      return d.toLocaleString('zh-TW');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    main();
  </script>
</body>
</html>
